body:
  text: 卷三十一痘疹部上自發熱報痘灌漿起脹收靨以及面耳部位預知順逆諸家祕而不傳之朮祕法俱匯於此部中以便檢閲參治論痘瘡根源朱純嘏曰粵稽上古之世未聞痘瘡之說亦無治痘之書即素問集中並無隻字言及於痘非黃帝岐伯以痘為輕易不詳加問難而無一言以及之耶蓋三皇五帝之時天清地寧民淳俗朴虛邪苛毒無由而生及至漢時建武年間徵邊染毒軍中遂生此疾其說出於萬密齊痘疹心要查建武二十五年徵武陵蠻伏波軍次下雋從壺頭進兵會甚暑士卒疫死大半援亦中病卒于軍史乃以疫書之意者其痘乎然傳之年久姑存以後之考正總之當日不知是何病證因其生長收藏尖圓紅潤有似於痘故名之為痘後此班師毒氣傳入中國諸家計議調治皆據內經諸痛癢瘡瘍皆屬心火之一言為治痘之要領殊不知痘瘡與諸瘡相隔天壤諸瘡之證未成形可解毒可內消已成形可攻破即破可生肌如痘不可解毒也不可內消也不可攻破也自發熱三日之後始見痘苗放苗之後又三日而出齊出齊之後次第長漿上由面部次及身上再則脹及腳下務期稠膿充滿徐徐回水結痂大約於一十二日之中收其成功自發熱造端即以熱之輕重報痘之緩急便知痘之疏密看報痘之部位便知痘之吉凶看痘粒之形色便知痘之虛實至於起脹灌漿計時限日觀形察色分別虛實寒熱用藥調治以為灌漿之計失此不治竟不成漿雖有妙劑仙丹不能保其不死久吾聶氏曰痘之生死判於漿之有無有漿毒從外散故生無漿毒留內攻故死膿漿既成結痂又厚色又蒼蠟此順證也總之痘瘡不與諸瘡同治即屬心火之一言於痘原無干涉也前代劉河間錢仲陽立方俱以解毒為主多用寒涼少用溫補張潔古王海藏咸宗之揆其意俱本於屬心火之一言而以寒涼瀉火也逮至陳文中力矯其偏專主溫補宜於虛寒未必宜於實熱至朱丹溪立論又矯陳氏之偏而取錢氏之長主於解毒和中安表其失亦起於拘泥內經屬心火之一言也近如黃西邱著順險逆三圖順證不順用藥險證有藥治之若逆證雖勉強用藥斷不得活曾立逆證圖三十條余每看痘證逐年經見實有一十三圖果系不可活之證無再生之望雖細心極力變方設法亦不能出西邱範圍之外其餘一十七證亦曾用藥救活因以揭逆證一十三條分列於後以廣後學之見聞他如保赤全書舛謬甚多至於證治準繩系王肯堂先生居高位之暇念及斯世之男女大小身染沉疴不能起死回生延各大小方脈內外全科校訂方書取名證治準繩以備後學參考可謂詳悉大有功於世獨於痘科悖謬之極或假手於庸醫亦未可定他如金鏡録痘科正宗痘疹心要痘疹會編等書豈止數十家非無一節之長一論之是一方之妙然皆擇焉而不精語焉而不詳兼之各家痘書傳流年久不惟深山窮谷之中即各省名邦以及都城輦轂之下凡諸名醫不肯細心究竟辨別是非無不以昔年之痘書為今日之祕訣不知有清江久吾聶氏名尚恆者生於隆慶末年萬曆年間以鄉進士出知福建汀州府寧化縣事卓有政聲惜當時以儒宦顯不列名於醫林故其姓字不傳於今世岐黃之口即著有活幼心法一書亦不傳於今世岐黃之家要知天地氣化生聶氏於豫章之清江非為此一隅之幼兒女起見將令普天之下後世之人提撕驚覺救斯世之赤子而令安全於襁褓中也今余獨知久吾聶氏集痘疹之大成開幼科之法眼議論精辨證確用藥當不偏於寒涼亦不偏於溫補深得中和之理合宜之用無過不及之差嘏生也晚不獲親炙門牆恭承面諭幸得活幼心法而熟讀之沉潛玩味裘葛三更一旦恍然若有心領神會頓將前此之舊聞洗滌淨盡心胸之茅塞剪鋤豁開又恐天下之大萬方之衆不能周知歲久年深終成湮沒今特表而出之凡業幼科者必當熟讀活幼心法反復究竟自然得心應手痘疹定論又云易曰大哉乾元萬物資始又曰至哉坤元萬物資生夫乾為父資始者氣之始也坤為母資生者形之始也人之有生受氣於父成形於母是父精母血之毒已凝聚於陽施陰受之始是胎元之初成即胎毒之蘊蓄故名之曰胎毒夫所謂胎毒者不論富貴貧賤俱皆有之豈待成胎之後歸咎於欲火妄動飲食不節降生之頃咽其血而後有是毒耶雖然天地有非常之氣即有非常之令或於春而不溫和或於夏而不炎熱或於秋而不清涼或於冬而不凜冽四時之正氣失序兩間之雜氣交攻夫然後五臟之邪氣內侵命門之胎毒外透痘疹從此而發矣痘疹原於胎毒論又曰痘出五臟疹出六腑前哲言之不究其本後學傳之不窮其源以致以訛傳訛千有餘年習為成語誰知辨其非者今特表而出之非無徵而敢云然也人之有生受氣於父成形於母當陽施陰受之始二五之精妙會而凝乾道成男坤道成女在胎之內先有命門猶混沌未分先有太極命門人身之太極也自其凝而成形言之先有命門則父精母血之毒藏於命門真且確矣外形則先長鼻故今人稱始祖為鼻祖內如五臟六腑外如百骸九竅俱從此逐日逐月漸次生長故胎有十月之期而始生育惟命門凝成於有形之初則胎毒亦蓄蘊於有形之始命門即太極也兩腎兩儀也天一生水地六成之坎中之一陽命門也坎上下之兩陰列於兩旁兩腎也今人以右腎為命門不能致知格物也兩腎列於命門之兩旁是太極生兩儀也地二生火生心也天三生木生肝也地四生金生肺也天五生土生脾也然止能成物不能生物今曰地二生火地四生金似與坤作成物說不去矣然河圖一二三四五者五行之生數也六七八九十者五行之成數也生數五行之發端成數五行之結果故人生以十月為期得天地之成數也間有七個月八個月九個月而生者間亦養育成人婚配生育是六七八九十者五行之成數也明矣然地二生火地四生金天包羅於地之外其氣常行乎地之中非地之孤陰能生火與金也得天之氣貫於其中而生火生金實由天地絪縕陰陽配合而生此水火木金土也或問之曰子言胎毒藏於命門固言之有理而心肝脾肺腎可不必復言矣即應之曰是何言也命門體也五臟用也相須而生成也鼻之氣通乎肺如遇痘疹之氣鼻聞其氣則傳於肺金肺金傳腎水腎水傳肝木肝木傳心火心火傳脾土一晝一夜隨天運轉一周天次日早脾土復傳肺金肺再傳於腎腎再傳於肝肝再傳於心心再傳於脾一晝一夜隨天運又一周天次早又復傳於肺五日五夜將五臟傳遍痘疹之時氣自外而達內命門之胎毒從內而發外至六日而微熱至七日而身熱大作矣或又問曰子何知之詳且悉也答曰以種痘而得造化之機緘也自出之痘無形之氣傳染也種出之痘有形之痂引導也若夫自出之疹亦無形之氣傳染也胎毒蘊於命門其中有陰陽之辨別焉命門也人身之太極也太極所以動而陽靜而陰之本體也陰陽互藏於太極之中陽變陰合而生水火木金土胎毒蘊蓄於命門之中亦有所以動而陽靜而陰之本體也陰陽互藏於命門之內感痘之氣化而出痘感疹之氣化而出疹何也是陰為痘而陽為疹也統言之則為胎毒分言之胎毒之中又有陰陽之各別也當其陽施陰受之始成胎凝結先有命門莫可端倪無可想像命門也胎毒始藏之密處也體也五臟者迎接時氣之傳遞也用也胎毒發出而為痘則胎毒之靜而陰者盡矣一發不復再發矣若出正痘之後隔三五月或隔半年一載或隔七八年之久如感時氣出疹胎毒發出而為疹則胎毒之動而陽者亦盡矣所以一出亦不復再出矣或又問曰命門在何處答曰脊骨自上大椎數下二十一椎自尾閭尻骨望上數七椎之上上從下數一十四椎之下上下相接之界命門之所居也命門居脊骨之前兩腎列於兩旁脂膜護之為一身之主宰且出痘與疹而腰不痛者順也痘疹初發即云腰痛命門傷也未可以言吉也故曰一身之主宰也聶九吾曰痘疹之源有謂兒在胎時食母血穢而致也有謂父母欲火所致也欲火之說出於臆測固無明據然嘗見孕婦飲食清淡者生子出痘多稀少而平順恣食厚味者生子出痘多稠密而險危則其病源受毒於母胎血穢似有明驗蓋飲食淡則血氣清而胎毒輕飲食厚則氣血濁而胎毒重受毒輕故出痘少受毒重故出痘多若因諸痛癢瘡瘍皆屬心火謂火由欲生致毒因火結故其為害獨勝於諸瘡此其說亦未為全非而總之痘毒一胎毒耳惟其為胎毒則潛伏五臟有觸則發無觸則不發故其發有遲速當其未發時形氣俱泯無可端倪若未燧之火何處尋覓又何可解釋古立預解痘毒諸方若無故而逐寇於通都不近理也及其觸而發則勃然不可御蓋其毒氣發自五臟實動五臟真氣全賴血氣送毒氣而出之於外運化之而成漿收結之而成痂而後臟腑可安若血氣送毒氣不出則毒氣反攻臟腑如寇作于都城中主者不能操謀奪武逐之於外致令操戈內攻安得不危故用藥猶如用兵不可不透此理也論受病之源又曰治痘之家多矣劉河間悉用寒涼偏害不小至於錢仲陽立方亦以解毒為主而多用寒涼少用溫補張潔古王海藏咸宗之此其意俱本於內經諸瘡瘍屬心火之一言故以寒涼瀉火也厥後陳文中立方力矯其偏專主溫補凡痘瘡已出未出之間諸證悉用十一味木香散南木香大腹皮赤茯苓訶子肉人參青皮半夏前胡肉桂丁香甘草已出之間諸證悉用十二味異功散人參製半夏白朮茯苓當歸陳皮厚朴製附子木香丁香肉果官桂其意歸重於太陰一經蓋以手太陰肺主皮毛足太陰脾主肌肉肺金惡寒脾土惡濕故用木香官桂以治肺之寒用朮附半夏以治脾之濕二方用之得其當其效固大然不分寒熱虛實而一概用之則宜於虛寒不宜於實熱其偏害又可知也朱丹溪辨之是矣至丹溪立論矯陳氏之偏而取錢氏之長主於解毒和中安表似為的當舉世宗之數百年來無敢議其失者余則以為丹溪治他病多妙論獨於治痘則孟浪而未盡其妙倘亦千慮之失乎蓋其矯偏於陳氏而不敢輕用木香丁香桂附等熱劑似乎因噎而廢食懲羹而吹虀其取長於錢氏而必用芩連牛蒡連翹之類以監製參耆歸術等補劑似乎任將而中制用兵而外監也其失亦起於泥內經瘡瘍屬心火之言而未透其理也不知痘瘡雖屬心火卻與諸瘡不同諸瘡之毒當其初發而未成形可用藥解散內消而愈及其已形而未成膿又可用藥逐散未成膿而愈痘毒發自五臟必藉血氣送出於皮膚運化之而成膿收結之而成痂而後收全功也可內消而愈乎可未成膿而愈乎故諸瘡以解毒為主能解毒於早則輕不能解毒於早則重痘瘡以血氣為主血氣能送毒以灌膿結痂則生血氣不能送毒以灌膿結痂則死解毒之藥多損氣血不顧氣血之虧損而急於解毒是猶不慮我兵之羸弱而急於殺敵也故毒有不必解者又有不可解者若小兒稟賦強壯胃氣好飲食如常者其血氣自旺自能送毒氣以成功其痘自始至終多順證此不必解毒者也若其稟賦素弱脾胃又弱出痘時飲食又少或瀉或渴或腹脹或手足冷或氣短促或失聲痘或出不快或根窠不紅活或色白而頂陷或當灌膿不灌膿或當結痂不結痂皆由氣血不能送毒氣此不可解毒者也當速用溫補以扶胃氣而助血氣若用參耆歸術等而力不及即加入木香丁香桂附等佐之亦不為過又何可參入芩連蒡翹等涼品以監製溫補之力而損血氣乎所謂丹溪未盡其妙者此也丹溪又教人用犀角地黃湯以解痘毒後人沿其說失其初意相習用之以為奇妙而不知其害蓋心者血之主心之所以能主血者以其屬火也痘瘡屬心火正藉心火以運用一身之血而成功豈心火可瀉而去之乎蓋人身之血溫則流行寒則凝滯犀角地黃湯涼心經而瀉心火心經既涼心火既瀉則一身之血氣凝滯不行何以運化痘毒而成膿結痂乎則內攻之患作而竟以告斃者瀉心之藥實殺之而人竟不知也醫亦竟不悟也可慨也故豫謂痘已出之後未痂之前凡一切涼心之藥如犀角生地之類姑禁絶不用直待結痂後用之解餘毒可也或曰若然則未收結之前毒俱不可解乎曰奚為皆不可若其血氣與毒氣俱盛者脈必洪數痘或初出即帶紫黑或既出而稠密紅紫內證則煩悶燥渴小便赤澀大便祕結此則屬實熱宜速用清涼之劑以解毒如大便久祕者量入酒炒大黃微利之可也若其毒氣雖盛而血氣未旺者以解毒為主而兼活血養氣則參耆歸芍之類亦不可離也又曰近世痘方多宗黃西邱其書自始至終俱分順逆險而立三圖說其為順者不必服藥是也謂險者宜以保元湯加減調治猶近理也但謂逆者俱不可治治之徒勞無益是教人袖手待斃矣其言不仁之甚而貽害於世不小也此為俗醫圖利計則甚便而於救濟生靈之術則甚乖也蓋醫者仁術聖人以之贊化之不及所貴者扶危救困起死回生耳若治其易治者而棄其難治者則何以醫為惟俗醫意在圖利又恐壞名見證有不順者輒委棄之彼誠恐利未必得而徒冒不識證之名若仁人君子當為之死裡求生豈忍斷其必死而坐視不治故曰西邱之言便於俗醫而非所以濟世也且其所指逆證多端痘瘡稠密者多有之如初熱而驚悸吐瀉報痘而先發於印堂司空天庭等處初出而根窠無暈既出而色白灰陷或發水泡或癢塌或當行漿而不行漿或痂未落而寒戰咬牙等證皆其圖所謂逆而不治者豫每治之而得生者多矣奈何悉謂治之無益而戒人勿治乎惟初出形如蠶種既出而紫黑乾枯者難以灌漿多不可救耳然寧救之而不活不忍坐視而不救也折諸家之衷二條痘證與他證不同自初發以至於結痂限日限時救困扶危當用之藥宜及時而用如救焚拯溺不可緩也蓋痘毒發自五臟實動五臟之真氣其出痘多者真氣發泄亦多當此這時人之血氣幾絶岌岌乎殆哉如油盡之燈不速為之增油則燈焰熄如風中燭不速為之蔽風則燭光滅也時醫則不然輕視人命而重視財利其愚而不知用藥者姑無論已即稍知用藥者亦不肯及時用藥欲因禍大而顯功直待諸惡證出然後乘人父母之驚懼而要重利遲延至於血氣已絶不可復續雖有對證之藥緩不及事因而誤人性命者多矣嗟嗟天地鬼神昭布森列不可欺罔此輩以貪利而殺人心術不善豈無幽責豈無冥誅殃必及身必及子孫不可逃也此醫家之害而病家不可不知也又時醫識見淺陋未諳妙理執泥祖傳舊方不知通變遇痘證之輕者猶可動手調治而自以為功一遇危險重證便束手無策不能救療甚至治一家十人而不活者七八人則以為痘證原惡而不自咎其術之拙病家亦以為痘證本惡而不歸咎醫之拙殊不知痘瘡常數若無甚惡之證而調治得宜十可十全間有極惡之證必不可救療者十不過一二今治十人而死者七八何惡證之多也毋亦術之不精乎豫深憫之故不得不為之著論立方也闢時醫之謬凡治病必先辨虛實寒熱四證望聞問切無非辨此四者而已四者瞭然於胸中則用藥取效其應如響四者不能分辨而執成方以用藥鮮有不誤者即或中病而愈亦幸而偶中也至於痘瘡之虛實寒熱猶為緊要辨之不明用藥多致敗事何以成功奈何歷代治痘之家著論立方互相異同至於虛實寒熱多略而不辨或辨而不明致令檢方者漫無下手處竟不知某證屬虛屬實當用某方某證屬寒屬熱當用某方則雖有千百妙方千百妙論無益於用也無怪乎自古至今治痘者之多迷途而慈幼之術疏也且痘瘡之虛實寒熱與諸病之虛實寒熱其異同固自有辨諸病有虛者元氣自虛也宜補也痘瘡有表虛有裡虛亦元氣自虛也宜補也此其相同者也諸病有實者邪氣實也可瀉也痘瘡有表實有裡實此則元氣完固而毒氣不能為害不可瀉亦不必瀉也此其不同者也諸病有虛之甚者陰有餘陽不足則寒自虛生宜溫熱之劑補之也痘瘡有虛之甚者亦陰有餘陽不足而寒自虛生亦宜溫補之劑補之也此其相同者也諸病有寒自外入者外感是也當其在表宜發散之久而入里則鬱而為熱宜清解之痘出而風寒外襲宜溫而散之或外寒入內而為吐瀉諸證亦宜溫之而已外不可汗內不可清解也諸病有虛熱者元氣虛津液竭而火從虛中起補之而熱自除也不必解熱也痘瘡亦有虛熱者元氣虛而毒氣肆也當以補元氣為主而略兼解毒可也三者皆同而有不同者也諸病有實熱者血氣未虧而邪氣壅盛單用寒涼瀉之可也痘瘡亦有實熱者稟氣強血氣盛而毒氣亦盛亦單用清涼解之可也此又其相同者也今自發熱之初以至還元之後俱先辨證之虛實寒熱而遂立方於其後令人細心審證而後用藥庶不至於虛虛而實實乎不至於損不足而補有餘乎不至於以水益寒而以火益熱乎然痘之虛實寒熱較之他病猶顯明而易察蓋自見點以至結痂其形其色既昭然可睹若又聽其聲音觀其靜躁視其飲食之多少審其大小便之利澀三歲以上者診其脈之遲數洪微其辨虛實寒熱當如黑白之分明而用藥取效易易矣辨虛實寒熱之異又曰痘瘡全憑氣血成功而氣血之盈虧消長其理精微不可不透悟也蓋氣體天而親上血體地而親下痘之出也其高起之泡氣之位也上也氣宜充焉其四暈根腳血之位也下也血宜附焉泡尖而色白潤是氣充而居其親上之尊也四圍有暈而色紅活是血附而安其親下之分也氣居其尊血安其分氣血和順而載毒出外此最吉之痘可勿藥而愈也頂陷則氣反親下此氣虧而不能充也法當補氣四圍根腳無紅暈此血虧而不能附也法當補血此其理猶易明也其有通頂紅色成血泡者是血反親上也此證最險必不能成漿至八九日後癢塌而死然此非血之獨盈乃由氣虧而失居尊之常故血得以妄行而僭居其位也急宜大補其氣氣充則能統血血自不得泛溢妄行而泡轉白矣世人不識此理見其泡紅則謬認為血熱而用涼血行血之劑致令氣愈虧而斃愈速也不亦悲乎故氣血盈虧之理微妙而難識也至於調治痘瘡氣血其氣獨虛者固宜專補氣而不宜補血蓋陽不能從陰陰愈長則陽愈消也其有血虛者多由胃氣損傷元氣不足所致蓋陰必從陽陽生則陰長也黃汝言明醫雜著乃謂血虛而用耆以補氣則陽旺而陰愈消甚矣其不明於陰陽消長之理而謬立此言為世大害矣余每治便血之虛滑者婦人産後去血過多而大發熱者婦人血虛崩漏而下血不止者俱用參耆姜附為主而佐以血藥與升提藥皆獲奇效安在血病不可補氣乎若小兒痘瘡以胃氣為主則補血必先補氣明矣故氣血消長之理不可不深明也析氣血盈虧消長之理朱純嘏曰痘之為證始焉一點紅紅者血之色也血之為血雖賴氣以生之究其本則水也天一生水地六成之水乃北方之坎兩腎是也腎水充足而得木火土金之氣交相養互相長而成氣與血焉是血之源於水水之源於腎者明矣雖分屬於心生血肝藏血脾裹血藉令腎中水枯則必何自而生肝何自而藏脾何自而裹合之則五臟同一太極也陽動陰靜而生水火木金土也痘中之一點紅血也出齊之後次第起長充滿於痘之中者漿也漿者血氣之所化也化毒而為漿也漿既充足膿成而毒解也漸次轉褐色回水結痂之候也痂結蒼蠟色此一十二日之成功也何獨前此之高明不論陰陽五行之正理妄立名色且曰惟腎無候而又實之以耳冷骫冷以明腎家無候之證佐又曰痘之變黑始歸腎也此皆不經之談千有餘年誰其辨之豫不得已著五臟合一論以辨之辨五臟合一論喜泰順曰痘本胎毒號曰天瘡傳染由於外感輕重本乎內傷初起太陽壬水克乎丙丁後歸陽明血水化為膿漿勢若燃眉變如反掌欲知表裡虛實須明寒熱溫涼初發之時與傷寒相似或發熱煩躁臉唇紅赤身疼頭痛乍寒乍熱噴涕呵缺眼目困倦兩顴之間有紅紋見者預知其為痘也發熱三日當托裡解表使其易出四日五日清涼解毒使其易長六日七日溫補氣血使其易於灌漿八日九日清利收斂使痘易靨此治痘之常法也夫常者可必而變者不可必安可執一以治之哉苟痘未出而清涼則毒得寒而凝滯熱毒未解而過補則毒蘊蓄而不能化漿故治痘之法見機生情隨時應變至於靨後不過慎風寒節飲食而已此治痘之原論也又曰凡痘灰白不紅綻不起發出不快昏暗頂陷皆表寒而虛二便清嘔吐泄瀉手足口氣俱冷不渴少食唇白涕清飲食不化皆裡寒而虛此表裡虛寒之證急宜溫脾胃補氣血即參耆桂附在所宜施痘色紅紫結實高聳頂若塵鋪又兼火刺內夾斑疹此表熱而實二便祕赤乾嘔吐痰肚腹疼痛口沖臭氣煩渴腮紅譫語妄言此皆熱毒郁遏皆裡熱而實此表裡實熱之證急宜涼瀉解毒重加發散芩連犀柏石膏梔黃又所宜施此表裡虛實之證顯著於外醫者易明又有表虛里實者痘色淡白不紅綻出不快等證是表虛也而兼之內證頻加肚腹㽲痛煩躁熱渴白睛通紅二便祕結此裡實也表虛里實之證醫者先當發散不宜苦寒發散則毒得外泄而內熱自解苦寒則毒反冰伏而出愈難或於三四朝期斟酌下之先清其毒後補氣血得以成漿或有毒鬱氣虛不能充灌者宜參連湯治之此治表虛里實之大略也裡虛表實者最為難治痘瘡煩紅根不松活皮毛壯熱色赤焦紫此表實也而兼之嘔吐泄瀉唇白涕清飲食不化等證治宜活血松肌如紅花蛇蛻生地丹皮之類在所宜施俟色澤紅潤庶可補托不然則痘不特不能起發充灌必變紫豔乾枯倒靨空瘡勢如燃眉變若反掌醫者當臨證參詳不可拘於一定表裡虛實寒熱論又曰實熱之痘初起壯熱腮紅睛赤口渴譫語內證固重見點必凶煩紅瑣碎或三五一堆兩三成群如同蚊咬急當發散重下名曰雙解如蛇蛻荊防葛根石膏大黃等劑再用西河柳芫荽煎湯洗浴使毛竅通利痘方易出大用清涼如熱毒不解色澤不潤根腳不松名為血熱仍可下之再加連翹犀柏紫草紅花桃仁黃連涼血之劑再服豬尾膏無價散等劑方可奏效如是血熱壅遏之痘必須清涼解毒以至收靨之時方可清利收斂乃是要訣也實熱壅遏論面部先見報痘八卦方位圖說歌曰看痘先分部位乾宮出起定輕坎宮不美艮三分震上縱凶現定巽上先來必重離宮凶有十分坤宮七數兌四分此訣急言人聽邵慈庵先生祕訣歌乾上先放定見輕坎宮十分更見凶艮宮報知三分痘震上出起不須驚巽上九分離十分坤部先報旦夕行兌上發之吉中凶八卦之中利鈍分乾宮大腸若紫紅定知便實喜相逢大便非細則不通若還灰白色來至泄瀉如流斷是凶坎宮腎水若紫鮮腰背定是滾油煎若還灰白無膿血咬牙寒戰命歸天艮宮屬胃不宜紅一見黃白喜重重若還紫黑青紅色胃爛口臭一場空震屬肝經宜帶緑若還白色金剋木紫紅色見多煩怒命宮色正藥可服巽宮小腸若帶白一夜尿流三五塌塌者陷也紅赤梅花品字樣小便淋瀝是熱結離為心火色宜紅若還紫黑水來攻再加腳潤崩開去痘盤開張不束任是神仙枉用功坤宮祕訣屬命門死生一見在其中紫黑慘暗俱不好口傳心授妙無窮兌宮金兮色本白若還紅赤火來熾此證問君當如何嗆喉痰喘預明白中央戊己土疏黃無辛苦若還青黑色便是木來侮右云元微八卦妙入神傳於端人並和音時來得遇仙傳訣榮華富貴永無窮面部八卦圖訣一看面部八宮便知身上胸背四肢某處多某處少某處必癢踏某處必痘疔神妙之法當細心熟記之歌曰乾宮屬大腸稠密背受秧糞門多癢塌宜服保元湯坎宮屬腎水稠密陰疔起腎俞似火燒七日子時亡艮宮屬胃經梅花甚不仁若加紫黑色八日寅時陰震宮乃屬肝宜大不宜三如品如串樣十四午時喪巽宮屬小腸稀疏宜帶黃若還梅品赤淋祕還不妨離宮屬心火蟻形甚不可四肢無容針遍身無你我坤宮屬命門生死在其中稠密終不好疏朗決無凶兌宮屬肺金雖多我不驚若還無空地胸背反相因中央戊己土稠密兩腿苦若還倒塌去兩腳蓮花舞看面部八卦痘色相剋死期訣乾兌宮屬金如有經痘一粒紅痘屬火火來剋金丙申丁酉日死坎宮屬水如有焦黃痘一粒黃豆屬土土來剋水戊子己亥日死艮坤屬土如有青痘一粒青痘屬木木來剋土甲戌甲辰乙未乙丑日死震巽屬木如有白痘一粒白痘屬金金來剋木庚寅辛卯日死離宮屬火如有黑痘一粒黑痘屬水水來剋火王午癸巳日死八卦見標生死訣乾坎出痘最吉昌頭面數粒四肢荒荒者少也此痘九日漿完足十二收功不必防艮震出痘果是凶四肢面部最多蒙胸背均勻黑數個急用針挑尚有功巽坤出痘品達肢三粒相連此痘陰陽不分場顆粒不分八日大凶十救一遲過一日枉思量離兌出痘種如蠶紫黑焦枯點像癍六發狂來七作癢八日午時返泉鄉難過八朝先天八卦面部神斷訣乾宮出痘更兼紅心背口多四肢濃濃者多也尾閭三分痘一個若不針穿往瑤宮十日之內留不住辰午二時一場空坎宮痘夾疹相間委中定有痘疔穿若是乾宮帶黑色六朝醜亥上西天艮宮出痘不相連心窩沒有兩旁邊九日痂完十日滿此痘皆因氣血全震宮出痘有焦尖背上定有一團連胸腹只有三分痘四肢如蠶種一般九日南柯一夢去父母號啕一聲天巽宮痘密不分枝胸背皆然一霎齊湧出也十日縱捱十四盡寅申一夢赴瑤池離宮痘出呂連肢雙粒相串承山有個痘疔危急早挑去痘疔勿遲胸前痘疔三四粒錯過一日枉傷悲坤宮痘紅分地稀四肢不覺數多枚胸背皆然三二十心前空了始為奇兌宮如串出一連仔細思量實可憐癢塌之中九日故子亥二時准歸泉八卦之中總一般四肢如蠶地不寬密而多也肚腹咽喉毒在內隱在皮膚往裡鑽全閉也五日之內轉過吉起脹分顆八日分明十五行不轉至遲八朝難保頭面部圖訣訣曰痘疹祕訣要專門表裡虛實看分明先觀面上諸部位吉凶禍福預知聞左肝右肺宜斟酌年壽人中脾屬停印堂方廣心之主顴骨尻耳腎同均文武雙臺真妙訣左右兩耳珠上尋三臺只在準頭上再查八卦細留心看痘之法論五經五經穴道要分明分明仔細觀八卦八卦之中按五經心肝脾肺腎也心腎原來不相合脾肺出痘兩均平惟有肝腎出雜痘肺腎掐指兩三寧十有二三可保太陽發生難捉摸年壽之間有活生印堂初發帶紫色六日南柯一夢傾只有肝經無大變四者兼宜方可行五行相生並相剋莫教水火便相爭上呼下應方為主痘疔原來不順情我有心中祕法文合法用之轉回生回生祕訣心常用常用掌中掛在心用藥不順安巧計下手用藥如用兵一看天庭並太陽二看唇口舌尖方三看梁上並梁下四看喉額並太陽五看諸陽觀氣色再看周圍八卦位一要用力觀形色二要水火莫相侵三要氣色無枯地四要穀食可調勻五要痘極無頂陷六無雜證辨其真腎經一串到太陽六日有變沒商量若然山根有數粒九日方推十二傷肝經稠密內兼紅不怕天庭黑陷空九日作瀉無大害十一起從十二亡肝經出痘灰白色太陰太陽淡紅白七日挫喉九日癢健脾助胃正相當心經密密地無縫兩臉珍珠一片紅此痘八九防作癢正格之中難起漿肺經痘串震宮連只防八日有痰涎十一凶凶十三吉過此凶日無後殃肺經痘串到離關灰白茵塵內有霜熱沸爛開霜若見任君一見也悽惶密密細詳根下穴再看唇上可黃漿若還二處有生意還保一旦太平鄉世上傷心惟痘疹任是英雄也著慌風雷雲雨電圖訣訣曰風庭一粒一庭員心窠定有七粒全空得一場方得免若還不空枉徒然云庭一連到太陽四肢皆多地略荒胸前數粒荒地闊背中定有一千雙雷庭分枝到太陽四肢地闊喜洋洋胸膛果然只幾粒背中略有數多雙雨庭天庭並太陽痘若連串轉凶防大小不等三四樣周身皆密地無荒只有胸腹略分地挫喉咬牙定遭殃雷庭鋪氈起發難此痘多因毒內藏入門一見難下藥過此九朝十二傷印堂太陽先見痘十有九死歸泉路逆候治之總徒然勸君休望神明護痘出一日乾宮現勸君不必掛心念順證不治而自安若用湯藥反成患唇口稠密頭亦多六日作癢肚不和天庭鋪氈陰陽少八九日看渴嗽杳陰陽密密面腮稀八九唇乾泄瀉虛兩腮患毒陰陽陷八九內攻外剝皮面紫乾枯成黑陷七八大凶九日變面腮唇口水珠光癢塌無膿瘡易傷天庭陰陽一點水周身平塌微微起眼下一點就發大後來黑陷咬牙戰面瘡其中帶紫黑五六氣喘元喪絶發熱見標內藏針何必諸醫枉用心夾熱紅大內無焦逐日周身定然好訣曰風逆五粒若梅花手背品字定無差心窩七枚相連串知音用藥妙元佳云逆一連到太陽四肢皆多地略荒心胸數粒空闊地背上定有一千雙雷逆鋪氈起發難此痘多因毒內纏入門一見難下手九日將過十日亡雨逆痘連一串圓大小不等兩三般遍身稠密肚稀少挫喉聲啞不堪言電逆分枚過太陽四肢地闊妙非常肥肚若生三七點自然脫甲不須忙元亨利貞天五部位決吉凶元宮部位赤一條無齒之人淡紅高決然來日天心照二二連肢人識少亨宮誰子知事多旱而無雨急出顆處處旱魃若不退自然將來九毒磨利宮蒼黑色來侵頭大根細定然輕將來必至皮兒厚肚腹數枚可放心貞宮淡白色來多稠密始知甚惡窠決然五經齊聚會三五之期挖破皮天宮兩壁少人知黑色出邊甚多虧自然將來大限到十一十二往瑤池死在申酉二時五臟部位決吉凶肺肝兩經一齊攻港中拖黏根窩紅羊車羊里方知證不必憂疑但放寬靴干兩會一齊荒根窠紅活起帝黃此痘定然多吉慶治之不必掛心腸帶黑相隨一路行內中多有白根侵此痘若見多凶候施救之功決要明元宮筋紋白而多密密如蠶怎奈何再加白色兼青色總是神仙把手搓震坤二部紅活者決主癢塌抓破譫語狂亂不能灌漿或寒或熱定然八日亥子二時命絶風庭印堂不起漿決主咬牙寒戰艮兌二部痘如灰白決主初起泄瀉凶斷生死祕訣看手掌中則知痘後眼睛或傷一隻或傷二隻或發癰毒在於何處預先可知死期何以識全憑八卦推離宮如遇逆子日死何疑震巽甲日死兌絶午無移八卦之方位胸中治法奇祕傳元妙訣何用再三思八卦生克預知生死訣看腳掌部位則知虛實寒熱證候日前慣投其藥盡皆知之此法最服世人大趾裡面屬木小趾外面屬金腳趾頭為前屬火腳掌心湧泉屬土腳後跟為後屬水土剋水時黑耳水剋火如斑紫火剋金知悲喘金剋木即癰疽木剋土知脫齒離部痘紅紫腰間有黑疔巽坤有紫赤脅下有斑紋灰白漿難滿還該出一層白則多泄瀉寒戰咬牙生耳後筋紋淡淡輕輕細小一定無凶若逢紅赤粗大者不堪同例一般功耳後筋紋黑色腎經發者無疑將來必主黑陷神工妙藥難醫手中心歌手心宜少不宜多品定梅花兩眼疴若還二虎排行立任遇神仙損一個手上下歌上下均勻不消嫌天庭疏朗及湧泉四肢若無三四粒九日痂完十日全手左右歌左右無痘甚堪驚舌卷囊縮九日傾若還捱過十四日手腳心胸定發癰邵公曰人之有腳掌猶百木之有根人之有頭面如樹之有枝丫枝丫茂盛枝根亦該茂盛枝丫枯槁樹根亦該枯槁反此則上下不相應也如看人之面部痘色或青或紅或白或緑或黃而下部腳掌之色不相應者必是庸醫誤投藥餌所致一看便知誤於何藥其驗如神前腳指歌離宮正色紅下面亦相同若還紫赤色誤服熱藥攻誤在香附官桂附子之類後腳跟歌坎宮正色暗下面亦相同若還反帶黃誤吞發散藥誤在羌活防風升麻之類大指里歌震宮正色青下面該相應若還反帶白誤投耆與參誤在補氣太早小指外歌兌宮正色白下頭亦此色若還反慘暗誤在服涼藥誤在紫草生地芩連之類足底中歌中心正色黃湧泉該亦黃若還反帶青庸醫用大黃不當用大黃而用之驗痘出稠密吉凶訣梁上先痂紅活吉耳上先痂往西天要明八卦方有主識透部位即真仙看痘須知五經判斷吉凶心者南方丙火色紅者吉肝者東方甲木色青者吉脾者中央戊土色黃者良肺者西方庚金色白者實而圓亮者佳初見嫩白色者宜蘇葛湯腎者北方壬水如虛白如珠者凶宜四物湯四君子湯加減南棗為引邵先生看耳筋祕法見標之時一看輕重吉凶先知歌曰耳後筋紋淡淡紅疏疏磊磊決無凶若然紫黑青白色任是軒岐枉費功心經耳後紅筋赤一條又無枝葉上而高將來必主心經痘頭面稀少定然好肝經耳筋紫黑魚刺形紛紛都向裡邊行將來必主肝經痘滿身斑赤八朝冥脾經耳筋蒼蠟痘主稀頭大尾尖人不知將來必主脾經痘向外排行法更奇肺經耳筋淡白亂如麻紛紛俱向外邊爬將來必主肺經痘形如蠶種七朝嗟腎經耳筋亂髮紫黑青腰背定有黑痘疔將來必主腎經痘滿耳盈盈九日傾耳珠屬胃耳輪屬脾耳中輪屬心耳皮肉屬肺耳竅屬腎耳背王樓屬肝見標之時一看預定吉凶耳上屬心經之火貴乎鮮紅壯熱不宜黑白冰冷如見梅花品字樣或串字樣從耳皮上出者皆逆之兆也耳下屬腎經之水貴乎紅紫帶冷不宜淡黃壯熱如見梅花品字樣反是順證若如芝麻虼蚤咬之形皆凶兆也如見此痘腎俞二穴決有黑痘疔耳里屬肺經之金貴主淡白帶溫不宜鮮紅赤紫壯熱如見茱萸形或燈火燒烙之樣皆死兆也見此痘必然鼻乾口燥痰喘嗆喉務宜稀疏大粒淡白桃紅色方佳耳外屬肝經之木貴乎青緑溫熱不宜淡白冰冷如見稠密主凶稀疏數粒主吉中央屬脾經之土貴宜蒼黃溫和不宜緑壯熱稀疏如黃蠟色為吉若稠密如蟻色帶青者必凶歌曰耳上金木水火上醫家不識真個苦若知此法天下行能服富豪與官府凡耳後筋三條而枝葉多色淡紅者吉主心經發痘必吉頭面決主稀少凡耳後筋紫赤色者主肝經發痘必凶急出者不吉如不退潮熱將來必五毒九磨凡耳後筋蒼黃色者或筋頭大而根小者主脾經發痘頭面胸腹必主稀少凡耳後筋淡而白色者枝葉繁亂主肺經發痘齊出如蠶種必主癢塌極凶之兆不治之證三五日必癢塌抓破死凡耳後筋黑色枝葉多者主腎經發痘必主黑陷腰背俱有黑痘必然焦苗陷伏疔毒九朝十朝內必死凡發熱耳筋出現紫黑赤白皆凶耳上涼者為吉耳下涼者為凶吾今只喜淡淡紅此個法兒堪用聞聲知證候讝語熱相煎痘色多紅紫大便不閉堅聲戰寒必定大便泄幾番聲清見證不久自安聲啞喉必爛聲速毒氣煎飲食嗆喉外須臾下九泉大凡出痘必從腎傳心傳肺傳肝傳脾方愈也手上涼耳下涼者重手耳溫平主二三分痘面白主肺經有風寒痰喘主五分痘面青主泄瀉有四五分痘若初起瀉者急用四物湯加豆蔻丸紅糖米飲調服面紫赤主有八九分痘或作癢塌泄瀉或吐決然癢塌而死頰車起者決主胸腹背三處有毒口角內有痘者男子陽竅中有痘疔女子陰竅中有痘疔主第八日死兩太陽宮筋紋現者主眼中有痘急宜祛其眼毒急於陰陽見紋處以燈爆之即磨去眼中之痘湧泉穴下有紫泡紅紋現者主心中有痘疔耳後青脈起主瘛瘲兩耳後黑筋橫過髮際主臍下疼腎氣痛耳蒼鼻黑主小便不通鼻孔乾燥氣粗主齁鼻青色主吐乳印堂黑者主夜啼或胎中受冷之故人中青主不食大便難通鼻心紅主心中熱疽癤之毒或夜啼鼻乾燥主死如鼻赤尚有可生之道馮氏小兒面部見點吉凶之圖說凡發熱三日之後其痘先出於面之下部在兩頤者為上在兩頰者為中若額際先發者系毒參陽位為下下矣凡曉星報點稠密者雖各部稀疏難治如曉星報點稀疏光潤者雖各部稠密必有可治之機焉然五臟之精華皆上注於頭面故五臟之精華充足者則痘點雖多必能顆粒分明高聳潤澤雖多無害若精華不足則邪毒用事奔潰成片如㾦如麩而為不救之證矣三關兩煞五軸胸膛乳阜心之關臍封脾之關陽球腎之關白帝煞門座於氣窩右太陽青帝煞門座於眼眶左太陽顴阜胸乳心之軸左太陽左脅眼胞兩臀阜肝之軸右太陽右脅項頸氣突肺之軸腮頰中庭口角肚腹手足脾之軸地閣後頸耳窖背窬腰脊陽球腎之軸經穴部位諸痘所主囟會在頂上上星一寸可容寸許督脈所發毒生於此大凶方廣肺之部痘少則吉神庭肺之部在頭入髮際五分督脈足太陽陽明三脈之會不宜多出天庭肺之部見標先於此處而且多者則為毒參陽位凶穹窿五嶽高處是也痘若先見則為陽但多而細者凶風疳在腦之後不宜生疔印堂肺之部痘如成片云遮則主大凶絲竹肝之樞在眉頭陷中足太陽脈氣所發與商邱相應切忌多密天倉肺之部在太陽之上豐溢則五經無變證彩霞在兩眉梢之上明暢則美肺之部也繁霞在兩眉梢之上明暢則美肺之部也玄武上耳齊處腎之部也山林不宜結毒百會痘毒不宜生此髮際結毒則睛紅舌唺口枯而為凶睛明在目內眥淚孔手太陽陽明之會肝之部也陽池兩陽之地切忌先見稠密細小左太陽肝之殺門切忌稠密右太陽肺之殺門先見稠密大凶淚堂即是眼眶肝之殺門痘如椒實大凶魚尾肺之部在眼角之上痘如稠密大凶交骨腎之部在耳邊前一寸痘如遊蠶主凶聽會腎之部在耳珠前陷中上關穴下一寸動脈宛中手太陽脈氣所發不宜生毒耳孔腎之樞疔生於此即名豢虎宜速挑治玄壁即名瑞壁脾之部也痘宜稀朗則為吉兆井谷七竅之處為井谷痘若先見於此則為陰而主凶五嶽兩顴鼻額地閣是也痘宜疏朗美麗為吉顴阜心之軸痘如彩鈿為吉若似紫萍遊蠶為凶顴石心之部也上灌下囂視此乃系可治鼻準胃之部不宜生毒嵩嶽胃之部痘如石榴則四肢痘如夭桃而屬吉兆年壽胃之部也凡七朝而痘起紫泡於此者並若木硬而如錫片者大凶地閣腎之部也不宜先發鼻柱胃之部痘如桃花之美為吉如色灰煤大凶迎香在鼻孔傍五分斜縫中手足陽明之會不宜生毒食倉在兩鼻孔傍是也然近法令紋而在兩腮之次亦名食倉俱脾之部也痘如蟢窠主嘔吐而凶人中脾之部乃司命之堂不宜有痘兼痘而如車輪之形者主凶腮井脾之部痘毒不宜生此與足陋骨相應腮田脾之部不宜稠密頤池脾之部痘如梅花則脾土傷而瀉逆主凶承漿在頤前唇下五分宛中足陽明肺之所會毒生於此則凶氣樞肺之樞在頦下近喉處痘多則凶喉突在結喉一寸宛中陰維任脈之會肺之樞主生殺之職痘密於此則凶氣窩肺之殺門痘出於此大凶穴在突下窩中若三星垂照必死背座上灌下囂視此乃系難治項鎖痘如盤蛇則毒盛而難峻肺之部也乳盤心之樞也痘如交壘則煩躁卷床膻中又名胸阜在兩乳中間玉堂下一寸六分在脈氣所發心之樞也有痘則煩躁而主凶中脘在臍上四寸胃之膜手太陽少陽所主任脈所會脾之關轄也痘如蜂螫為凶臍封脾之關也不宜多痘否則脾家瀉逆而主凶臍麓脾之關也痘如旋珠必主瀉逆而為凶肺俞在背部三椎骨下兩旁各開一寸半足太陽脈氣所發然五俞之位俱不可多痘若並出於此名為懸鏡而主凶心俞在背部五椎骨下兩旁各開一寸半肝俞在背部九椎骨下兩旁各開一寸半脾俞在背部十一椎骨下兩旁各開一寸半胃俞在背部十二椎骨下兩旁各開一寸半腎俞在背部十四椎骨下兩旁各開一寸半不宜多痘肩俞癰毒結於此者可治傷門五關為傷門痘多則煩躁井田在臍之上丹田蓄毒則腸結便難玄門男之龜女之牝屬水而火不生若疔生此大凶豐邱五經高處為豐邱痘少則安寧順美曲池在手肘曲處宛中痘癰不宜患此最宜速治否則易成痼疾三里在膝傍牛犢下二寸痘癰結此命雖無妨但防潰筋之處臀阜肝之軸痘癰結此可治陽球腎之關有毒則凶商邱在足內踝前微陷中足太陰脾所經與絲竹相應公孫在足系足厥陰肝所經湧泉在足心宛中湧泉牢塊則毒透足難治太衝在足大指本節後二寸陷中太溪在足內踝動脈陷中太白在足陰陵在足委中在足膝曲處陋谷在足底與腮井相應疔毒生此決不可治五門八樞心為赤帝門附心包絡在顴臉肝為青龍門附膽在眼兩眶並左太陽脾為黃央門附胃在兩腮及兩頤肺為肅白門在額並右太陽腎為元武門在交骨耳垂兩顴為心樞兩眼眶為肝樞兩腮頤為脾樞喉突為肺樞兩耳垂為腎樞初見標面部八卦占斷吉凶法乾兌屬金肺之象受克於南離之心火得生於坤艮之脾土坎屬水腎之象受克於坤良之脾土得生於乾兌之肺金坤艮屬土脾之象受克於震巽之肝木得生於南離之心火震巽屬木肝之象受克於乾兌之肺金得生於坎之腎水離屬火心之象受克於坎之腎水得生於震巽之肝木夫乾兌屬金金能剋木木既受克則衰而不能生火故金不受其克以此斷為吉夫震巽本俱屬木何巽重而震輕也蓋巽近離火火生土土克腎水而元神竭矣故先見此部為凶如離宮先見標痘者則火亢水必害不害則火必反逆乘故為險證惟若痘見滋潤有神則水火交會雖凶為吉如離宮先出坎宮後出而坎宮痘反光澤離宮痘反慘暗者是南離心火為坎中腎水所勝而克矣然釜下而無火則物安能得熟耶故必不能成漿而死是以為凶其餘可仿類推宜再兼以各部位痘粒疏密顏色之如何以決之萬無不中者也馮氏總論痘要歌括預知瘡痘吉凶機氣色都於面部推年上山根猶緊要紅光可喜黯青疑痘疹傷寒疑似間古人分證可相參莫將汗劑先輕視發散惟圖表里安瘡疹為陽待熱成微微發熱始和平假如大熱身猶火解毒當叫小便清始終能食最為良平日其人脾胃強食少卻防中氣弱淹留引日變瘡瘍最宜安靜好平和表裡無邪志自寧煩擾忽來宜察審最嫌失志轉神昏陷伏須方實與虛實須清託大相宜如逢虛冷宜溫補幽谷春回慶有餘四時分治候須明暑濕風寒不可輕異氣莫教相觸犯致令翻變亂其真痘瘡脈候貴和平胃氣悠長最要清弦數浮洪為實候微沉短澀是虛因痘前十八犯錦囊第一犯猿猴跳鎮凡兒未患痘時先感冒風邪身如火烙頭疼自汗咳嗽不已或傷寒之後而痘隨出者則元氣囂清須急疏風解熱補血滋陰調元固表訣曰一犯傷寒勢欲危醫須斟酌痘無虧如將湯藥柴胡用嬰魄含花死可悲第二犯觀音拂座凡兒飲食不克撙節暑濕不能護養是以脾胃損傷頻多泄瀉飲食懶飧肢體羸瘦方愈未久而痘隨出者則脾虛津耗元氣衰微治宜溫養脾元補益中氣則痘可起脹成膿結實矣訣曰瀉後俄然痘證臨脾虛元耗勢沉沉急宜培土將元益冷藥毫釐不可侵第三犯馬馳劍道凡兒飲食寒暑不能撙節是以瘧疾纏身寒熱消灼肌肉漸瘦其愈未幾而痘隨出者凡常山草果斷不可用惟宜參苓白朮以扶正氣訣曰嬰兒瘧後痘相臨元氣囂漓不可聞草果柴胡宜悉去滋陰補衛效通神第四犯一葦航海凡兒元體薄劣身發火熱乾渴惡嗽疹出未幾其痘隨出者此與尋常先疹後痘者不同凡先痘後疹者謂之逆先疹後痘者謂之順然此身弱發熱惡嗽乾渴繼又出疹而痘隨後則勢頗危須急補陰清肺養胃扶脾若黃耆補肺之劑切宜禁絶訣曰小兒疹出大陰虛痘疹隨形毒客脾急宜清金與培土黃耆若用嗽來催第五犯三仙入洞凡兒平時患成疳積肚大青筋四肢羸瘦變為丁奚倏然而痘隨出者且治痘為主訣曰丁奚疳積肚交關且把花來發透全切禁消磨並冷藥檳榔厚朴及川連第六犯倒掛銀瓶凡兒風熱腠理時發火熱自頭達身丹瘤遍起其愈未幾或尚未愈而痘隨形者宜犀角地黃丹皮之類以清肝心二經訣曰丹瘤未愈痘形身又屬肝心是二經最怕梟紅根座繞解炎祛毒痘方明第七犯霜橋印跡凡兒火烙臉赤眼睛直豎手足掣搐驚厥屢次口燥譫語其愈不數日而痘隨形者此與循常先驚後痘者不同蓋因痘而起者是痘從心經故不過時微驚惕即甚亦不過臨痘時也此則其驚已甚治宜且與治痘為主凡鎮心涼臟之劑皆不可投訣曰驚厥新痊痘證隨硃砂金石莫相追若還既見驚無歇只管升花更與培第八犯藕池滲水凡兒身熱自汗口中咯血或鼻衄溺血其愈不數日而痘見形者此心官失守致血妄行治宜清心抑火切不可妄用寒涼訣曰諸血皆由熱犯心清心抑火自歸營切休輕用寒涼劑花蔞花欄悔實深第九犯石鼓陰鳴凡兒未痘之前身發火熱飲食懶飧肚腹膨脹眼胞浮腫睡臥不安未數日而痘見者治宜補脾理氣訣曰腹中膨脹不思飧氣陰脾虛痘必難宜速補脾調氣血更加升表自然安第十犯赤澤栽蓮凡兒身發惡熱自汗不止眼睛昏花呵缺啼叫其證才愈而痘隨形者治宜斂汗而用黃耆熬人乳頻頻飲之更助以調榮益衛之劑訣曰汗流惡熱已亡元痘犯心肝十不全急補心肝並斂汗痘如鼎灌自然痊第十一犯岩頭走馬凡兒跌撲損傷不數日而痘即見者治宜補血活血兼以扶脾可也訣曰跌撲驚傷未愈時箇中透出好花枝安經活血調脾脈自得群花朵朵奇第十二犯逐鹿亡羊凡兒往來潮熱腹生痞塊日積月纍身體羸弱面黃力弱而痘隨出者不宜治痞訣曰病痞花開宜補元扶脾益胃莫遲延尤須治痘培根本何怕花兒命不全第十三犯推車陷雪凡兒稟父母胎毒身患楊梅廣瘡不時寒熱其證未愈而痘隨形者將何所治訣曰惡瘡未愈出天花當用升麻藥不差莫假連翹諸敗毒誤將熏點浪塗搓第十四犯霜逐梧桐凡兒身如火烙不時嘔吐不能飲食投諸理氣而痘隨見者將何所治訣曰嘔吐驚惶胃不和忽看花痘又相磨應須安胃兼升表自得成功患可無第十五犯倦龍行雨凡兒飲食不節致傷脾胃四肢不收發熱惡寒而痘隨見者將何所治訣曰兒傷飲食正逢災痘又陽明胃裡來宜略內消兼補胃更加升表自花開第十六犯秋蟬泣露凡兒未痘之前因感濕熱之氣乃患赤白痢疾其證未愈而痘隨見者將何所治訣曰痢痘治宜清濕熱更加培土和氣血還須表痘復滋花根本調維災自滅第十七犯凍鱗出谷凡兒因誤持刀刃致傷手足是以寒熱往來而痘隨形者將何所治訣曰金瘡未愈痘來呈活血還兼開滯凝更要升花期表暴扶持鼎峻自安寧第十八犯浪里魚舟凡兒每發驚厥或患風癇未久而見痘者將何以治訣曰風癇復苦痘來催只把花欄著意培灌得漿來花朵朵不愁風雨更顛危各書所載名目不同總痘前十八犯專意培花為主若痘後犯十八條則又以專補元氣為要耳異痘須知錦囊天根痘凡諸痘不起壯而天庭或曉星起灌者乃精氣外生故曰天根是十有九生天空痘諸痘起壯而天庭或曉星不壯者乃血不灌頂也故曰天空十無一生明朗痘諸痘不起太陰太陽獨起者是如日月之為明乃屬吉者也明蝕痘諸痘起壯太陰太陽不起者如日月被蝕而為凶海溢痘諸痘不起而耳後方圓一寸獨起者名曰星宿海溢是腎經旺也可治海枯痘諸痘俱起而耳後方圓一寸獨不起名曰星宿海枯是腎經敗也不治有根痘凡痘遍身頭面稠密十分危險若得地閣方圓數粒如珠者十有十生蓋腎為人之根本此痘腎旺故曰有根或曰足下有痘為有根無根痘諸痘俱好地閣方圓陷伏乾枯或灰白不起者是腎水絶也不治繞膝痘膝臏之間髓會於此腎所屬焉故若紅活起脹為吉若色焦紫須防成疔抱鼻痘面部俱稀而鼻梁左右密如蠶種者此毒聚於脾胃也名曰抱鼻痘其證危矣然此若得形色不乖餘部俱順亦見無恙單鎖口面部俱稀嘴角有一粒黑痘獨大者此名單鎖口若唇上下一圈成串者此名螣蛇鎖口皆惡疾也雙鎖口兩嘴角俱有一粒者此名雙鎖口又名曰白虎鬚瘡尤惡疾也鎖項托頤痘一名盤蛇一名托腮一名纏喉其痘遍身稀疏惟項下到頤稠密一片者是也乃系凶證也結頸痘凡痘喉頸窩太多者是也急服元參桔梗生地甘草牛蒡山豆根之類遲則其毒結喉而死聚痘其痘中間多有兩頭少者甚至絶無者是也乃系大凶之證多有其毒內攻損傷心肺而死兩頭痘一名兩截痘又名春水斷橋其痘初標時自胸以上自臍以下俱已見標而中間一段全無者是也此因毒氣壅盛氣血相離不能交會陽參於上故頭面最多陰滯於下兩腿足稠密故胸腹絶少為陰陽相離故也如痘紅活而根窠圓暈者急宜大補氣血接續元氣須於七日之內速救為妙至七日之後則難救矣惟正氣充足者無妨若頭面太多肩背密甚者死豈可概以心胸稀少而忽之逆痘其痘上身少而下身多者是也此無大害或曰從下先見而後上者為是或以弟樣兄女樣男者為逆痘鴉翎痘此天元足而壬癸充腎經獨發之痘名曰鯨罩云衢從見標起脹俱黑圓錠光潤圈圓頂峻行漿漸黃有神此主後大富貴之痘也狀元圖中俱載之鬼捏痘此痘遍身全無點粒其斑成片卻如打傷之痕此名鬼捏決為不治鬼痘其痘見標既完遍體俱多頭面全無者是也又名無頭痘五日之內尚可救活五日之外則難救矣因氣血下行不能上升故耳宜急用川芎升麻甘桔防風當歸殭蠶之類如不急治則曲池生毒一月見骨而死賊痘其痘初出大紅如緑豆大過一日便如黃豆大再日再大先起先脹至後則又變白根窠與頂全無血色或如金黃形雖起脹按之虛軟宜急挑破否則四五日上下出血而死更有深紅焮赤摸過皮軟不礙手者亦是因盜周身之氣血而盡附之故易長易膿故名賊痘是比諸痘獨大其大甚速者是也若過三日則必變成水泡甚或紫泡黑泡矣若形大而黑摸甚堅硬或如圓殼色者此為痘疔宜急用銀簪刺破口含清水吸去穢血用紫草膏或油胭脂加血餘炭珍珠末填入瘡內則諸痘自然起發矣蛇皮痘其痘頭面遍身並無空地平塌而色白者是也必乾枯不能作漿至十一二日而死藥患痘初標紅潤至四五日忽變陷伏不起將至裡虛者此名藥患痘也治宜急扶表裡為主九焦痘凡痘而當正額地閣顴骨胸背耳後手足皆有一二個黑陷者名曰九焦乃不治之證也伏陰痘其痘不灌膿而內瀉膿血故名伏陰宜急溫里水晶痘其豆色似蘆花乃系氣血兩虛之候宜急大補然皮薄甚者雖大補無益空倉痘其痘雖似肥滿而內無膿血裡實乾枯全無血水者是也決死之道半邊痘其痘或出於左或出於右歪斜頭偏盤暈散漫者是也此證雖飲食聲音二便如故總難過七日也石臼痘其痘中間有凹四弦凸起光亮好看內實漿板不化以手摸之其硬如石形如石臼故名之必死茱萸痘其痘不甚起其中亦凹而四弦皆有皺紋以形似茱萸故名之若根窠紅活者宜以內托散加減服之蟲痘凡痘夏月患者恆多生蟲蓋熱勝則肉腐腐則生蟲也有不止夏月痘中生蟲其瘡甚癢者有云此由毒留皮膚熱腐而化既腐於外則毒亦外解自無內伏等患故曰吉兆或云草腐生螢木朽生蟲故為凶候宜兼察形證何如以定吉凶宜以銀簪挑去或用柳條鋪下蛆自出矣血痘其痘初出紅紫平如硃筆點於遍身者是也內根已腐外苗必萎六日之中決死不治火里痘其痘自見點以至結痂發熱不退而起脹貫膿如期應候及至落痂則身涼矣故名之血疱痘此血協熱毒而自漿也凡刺疱血黑者不治如血紅者急與犀角地黃湯加白芍以制血解毒血靨痘凡痘出稀少而四五日胖如豌豆六七日血靨痂干色似丹砂九日而痂落者是也此是毒少而氣血充足隨出隨痂不及釀膿也是以為之最佳懸磐痘其痘玉枕之間團聚成塊若紫赤灰陷者最為極危蓋此係腦戶穴而宗脈所聚也鵝口痘鵝口者痘正起發時唇口痘先黃熟而帶漿是也此處發於脾漸至嘔吐不救白漿痘凡初起發其瘡頭便帶白漿者此疫癘痘也凡痘有此主七日死破黃痘其痘人中一粒比衆痘獨大痘雖稀朗至六七日或十二日傳經時必然發瀉不止蓋脾已腐敗也四圍痘其痘初起而根窠起發之際四畔旋出小痘攢簇本瘡或發似粟米者必不待養漿即加搔癢而死漏瘡痘有於膿漿成熟之際瘡頭有孔膿水漏出堆聚乾結成痂色如天泡瘡者此為漏瘡之美者也更有不待養膿忽爾自破漏去清水遂乾黑者皆由癘氣所為傳染相似未有能治者也蛀痘凡起脹時痘上有小孔不黑不白者此名蛀痘是表虛而腠里不密大泄元氣宜急服保元湯加丁桂其孔一密而痘自起矣如僅數顆孔甚黑色者則為疔矣攀肩痘其痘肩頂之上稠密是也如色又不佳者凶隱血斑其痘形如痘殼而色灰白全無血色及至擦破而後血出亦無膿漿者是也不治赤萍瘡凡痘出如赤浮萍微微高起者是也若爬破有血者急以解毒升發之藥救之如成爛痘則無妨矣氣血兩敗痘近看猶如水蓼花遠望胭脂紫可誇臨漿清水不成膿古聖神農無治法紫萍瘡凡痘出齊紫色不起兼不灌漿如紫浮萍貼在肉上者不治白萍瘡凡痘出齊白色不起兼不灌漿如白浮萍貼在肉上者不治燕窩痘其痘在於後頸之間風門大椎兩穴之處繁粒稠密是也若色又焦紫者必危垂珠痘兩耳屬腎腎本伏毒之處不宜受痘今痘出耳輪之上連綿如貫珠此毒氣傷腎之甚萬無一生草尾珠其痘遍身俱陷惟骫骨一團飽滿如珠者是也此證尚可急治而用補托灌漿之劑或有生者黑痘多屬血熱者陷況系天癸奪權本最惡證但形狀多端有血活而猶可救者有色異而後主貴者須細辨之惟血不活者不可治矣贈痘贈者增出之謂自起膿灌膿結痂皆有之凡頭面已破又復灌漿於無痘處復出一層是也又名補空痘此因正氣得補而復邪毒逐外也故最易長易膿若服補托藥後不出贈痘破處不復腫貫者不治木痘此痘中心微微凹陷硬如干腐無膿無血是也此因小兒肌膚多痰結聚成毒耳九日決死瘟痘訣曰口不語眼不睜飲食不知討終日困沉沉重者似牛狂手足齊牽並早晨見好花午後花落盡便是狀員郎到此門闌釘此是瘟痘證識得才療定佛頂珠其痘天庭之間稀少而形色潤美者是也乃系最吉五種痘錦囊望痘一名報痘每見熱微氣爽精旺神強忽起點子自一點以至十餘點外其盤與頂甚佳貫膿亦足世每稱上乘者矣或有結痂之後一發熱而周身密布者亦有將結痂而復潰爛深潭方乃周身才起者毒伏於內人不先察幸其自起得以全生故遇極少之痘必須細詳耳後紅紋再閲周身紋路以及面部氣血如非報痘則數點可云全吉若猶未也必須銀針挑破初點胭脂封貼則毒不內攻後痘起發亦得鮮少也赤痘一名九焦其痘勢尖圓易長易貫根腳赤甚似乎血熱然先後不齊三朝漿至隨貫隨回以其九日之內必焦故名九焦是系腑證乃輕證也水痘其發熱起脹貫膿形色壯貌皆同所以異者惟出時頂色白亮根腳散大漿色淺白頂無痘眼是亦腑證可無生死之慮但升表太過後必變瘡而潰爛殊久耗人元氣耳石痘此正痘中之第一儔也按之如石易起易貫易靨嘻笑如故飲食如常三朝漿至七日漿回十日功成矣木痘其發熱見紋俱以痘狀但出之時忽然見點不一而足至一二朝漸覺粗肥至二三朝反細而隱有形無漿者是也是亦腑證不必他虞然此五種凡值痘證時行偏多此類相混故宜細辨異痘諸名錦囊紫雲灌頂其痘遍身俱好但頭頂紫干陷伏不起者是也不治彤雲繞頂其痘遍身俱好但頭頂一片紅赤者此乃熱毒聚於膀胱也須清利之督元至欄氣會足心之下名湧泉穴若於此中見痘則痘已全而獲最美一云凡於此處先紅先灌者大非佳兆宜急保元烏紗覆頂其痘必咽喉啞塞喘促氣粗是血衰氣敗而元陽脫也不治梨花漫頂此因氣血虛寒不能振發光澤耳急用保元湯加天雄猶或可救云掩天庭一名覆釜一名矇頭其痘遍身磊落光澤惟額上一片血泡如雲者是也此乃心家客熱識甚耳宜急用犀角之類服之紫萍鋪額其證則熱甚咽痛而悶亂髮狂治宜急用清利解毒為主烏紗落額其證額上一片黑氣罩定是元陽氣血並絶也不治灰撲印堂此證是心家少血也若兼腹脹嗌乾之候者宜補氣血為主而兼托裡宜保元湯加芎桂紅花主之如至於鼻者則又名中流砥柱又名毒滯迎香是又屬於肺也紅紗拂面此宜涼血解毒為主如痘多而連肉紅者不治楊花撲面此宜內托散加天雄主之赤珠繞唇此乃脾經極熱也宜急清火解毒烏飯沾唇此證必聲啞神昏目睛不轉四肢厥冷三朝七日乃死霞錦穿胸此因火毒識盛不治之證也紫雲布胸此乃血凝氣滯毒來攻胸也其證必咬牙戰掉口唇焦裂甚或頃刻而死黑棋排胸此心火亢極其臟色見三朝決死火性迅速也柳絮飛胸此乃血氣枯弱也宜保元湯加芎歸桂附主之桃花映背其痘遍身紅活光綻圓滿但背上深紅稠密治宜清火涼心解毒為主紫萍浮背其痘背上稠密紅紫連片者是也不治毒擁三倉一名縵胸其痘胸前成片此五臟之募系焉氣會聚焉心胞絡注焉決無生理花鈿斜堆其痘兩鬢獨多若至紫赤者尤宜清熱化毒黑砂落背此證尤為不治梟炎蔽聰一名鎖音其痘在耳獨多者是也耳為腎竅忌先見先靨如耳熱黑色防變黑歸腎為凶雪鋪魚背此五臟血已枯盡也不治赤鱗穿腹此乃胃家熱甚故大便祕堅小便淋澀治宜和解三陰湊毒足大拇是太衝穴屬厥陰足心是湧泉穴屬少陰足股傍是商邱穴屬太陰若毒湊者凶白梨墮腹此係氣血皆敗也半月之間必發驚而死葡萄落地其痘臀尻間紅紫一片若葡萄者不治爛粟居臀其痘遍身俱好惟臀上一片如粟殼臭爛者是也宜急為補托下元或有可生榴花散野凡諸痘俱好惟四肢紅赤唇口崩裂者是心脾肺三經熱甚也治宜涼血清火解毒為主荷錢透水一名托腮其痘獨兩腮稠密是也若至焦紫神黯者凶楊花墮枝其痘獨四肢灰白者是也此因氣凝血滯耳宜八珍湯加附子主之梟聚兩頤一名胭脂撲面一名橘殼臉其痘兩臉紫赤獨多者是也此因肝肺熱甚宜急清熱解毒九不識錦囊懸鏡痘此痘背馳三陰毒湊五俞形似發背乃一不識也其候必煩躁譫語惡渴嘔吐身如火熱蠍子痘此痘經於肝道梟毒總聚左脅其大如豆四沿小者如珠乃二不識也其候必乾渴煩躁嘔吐不食覆釜痘此痘總會諸陽旋繞連澤而下部俱無其候嘔吐頭痛形似禿瘡乃三不識也鎖井痘此痘毒湊脾絡群聚口沿旋繞無數乃四不識也其候必舔舌難咽睡臥不寧盤蛇痘此痘毒郁肺絡頸項圍繞形如瘰癧乃五不識也其候痰涎緊並眼赤惡渴豢虎痘此痘毒湊脾胃臍輪左右梟淫盤結乃六不識也其候肚腹如紋泄瀉吐逆肢冷惡寒玄丘痘此痘經心達腎毒湊陽物壯似梅瘡乃七不識也其候小腹悶脹便澀而赤口渴身熱掩月痘此痘經於陽明毒湊兩腋中窩圈鎖十五六顆手臂垂痛其候口吐涎沫惡熱臉赤乃八不識也卷阿痘此痘經於脾毒湊陽明兩掌心痘四五顆連聚此乃九不識也其候吐瀉煩躁五禁瘡錦囊五禁瘡者最惡證也此痘一出諸痘不能宣發成漿矣一曰胃禁二曰火禁三曰水禁四曰風禁五曰寒禁胃禁者因毒火炙胃不能發達於外是以脾胃潰爛其外出之痘在於唇口之間而四五點相連諸痘未漿此痘先已黃熟是熱毒內攻胃已腐爛諸痘不能成漿也故凡唇口一見此痘如見繁紅氣粗熱甚口臭異常者是其候也不治火禁者因初發之際身發寒熱就火溫熱太過致使皮膚乾燥又兼氣虛不能拘逐故毒停滯於皮膚之內發泄不出細看皮中覺有紅色點子無頭無腳獨於四肢或面方廣之處見一二點者則諸痘皆從此痘發泄為孽隱隱不起之痘終不能快出者是也宜外以水楊荊芥煎湯浴之內用升麻和解散主之則諸痘自可起發矣水禁者有因初熱之際毒氣方熾誤食生冷則毒伏於皮膚之間隱隱見有紅點或於方廣兩脅手足頭面之際發有水泡者是也然冷氣在內故內必腹痛肚脹外必發熱惡寒宜以丁桂茯苓升麻大腹之類逐之風禁者因發熱之初失於避風是以肌表固密痘不能出皮膚麻木不知痛癢或皮毛乾燥膚癢欲搔甚則狂煩譫語者此風與火相搏也治宜以乾葛羌活蟬蛻之類逐之寒禁者發熱之初誤經冷水沐浴或睡臥於鐵漆寒冷之處或衣被單薄感冒風寒是以寒凝肌表痘毒不能宣發手足麻木冷痛之處不出痘子惟在委曲避風之處或頭面髮際之上痘如癮疹者是也宜內芎藭桂枝獨羌以逐之外用重衣厚帛以溫之邵公看痘分五色歌桃花紅桃花之紅淡淡紅一見此色喜相逢倘若八朝漿不滿略投起頂妙無窮紫花紅紫花之紅帶紫色毒凝血滯是祕訣急投退紫轉紅湯服下片時通滯血蠟燭紅蠟燭之紅紅豔豔一日六時有三變此證分明氣有餘血隨氣行如放電丹砂紅丹砂之紅鶴頂樣果然豔根鮮明亮倘若慘暗不歸根退紫轉紅湯可放雞冠紅雞冠紅亮赤如丹皎潔鮮明玳瑁斑恰似龍含珠映水滿江春色照人間朱氏辨別七暈痘出而根腳有暈其名有七焉辨之不可不早也痘粒之尖圓者氣充也實也痘粒之平塌者氣弱也虛也若以暈言之老紅也紅紫也紅紫乾枯也淡紅也焦紅也鋪紅也淡白也此七暈分順險逆老紅暈色紅而老不嬌嬈也不閃爍也不乍紅而乍淡也亦不帶紫色此老紅之暈必發熱三日而始見痘苗也身體必平和不甚熱也必能飲食也二便必調也精神必精爽也此順證也痘出必稀疏即多有百十粒亦順紅紫痘色深紅而帶紫色必發熱二日即見痘苗也身必熱微煩躁也當以敗毒和中散主之看其出齊即用清毒活血湯催其長漿漿足亦歸於順紅紫乾枯初見痘苗即見如此暈腳其證多系逆證必發熱一日即見痘苗報痘必稠密必大熱蒸蒸煩躁昏沉不省人事唇焦口渴此危證也其證多不可救若大便結燥二三日不解小水短澀又黃此毒火內盛急宜下之以清其毒火仍宜用敗毒和中散加熟大黃以利之毒火必從此而少減看其出齊急以清毒活血湯催其長漿向之所謂紅紫乾枯者今轉根腳紅活漿再汛起此尚可救若仍復乾枯不見起長不見泛漿加之身熱蒸蒸煩躁頓悶譫語昏沉不省人事不思飲食痘仍平塌中有黑臍此必不可救矣淡紅暈腳四圍淡紅有嬌妖之色以紙燈照之若有紅色若紅色不定將來必變淡白色此乃氣血俱虛若初見痘苗之時見此淡紅暈腳寒涼之藥切不可投倘或身不退熱微有煩躁宜用敗毒和中散去芩連紫草茸加羌活蘇葉白芷以托其苗俟其出齊以千金內托散催其長漿漿足仍歸於順若先誤用寒涼暈轉淡白急用參歸鹿茸湯以救之緩則成陷矣此淡紅之暈易於變淡白不可不知焦紅初見痘苗頂乃先焦根腳紅紫有芒角不見滋潤暈腳不圓且又帶紅紫乾枯此乃毒火內盛若初見痘苗急用敗毒和中散倍加芩連紫草茸以托之俟其出齊熱不減不能食兼之神昏不省人事煩躁悶頓水漿不入則不可救矣倘或熱稍減神氣稍清能食不甚煩躁急以清毒活血湯催其長漿若漿足仍可歸順此在神而明之存乎其人耳鋪紅痘無紅暈痘粒淡白通身皮肉盡紅故名曰鋪紅良由毒火內盛氣不能統血散漫於皮膚之間也若神清能食痘稀疏者可治若人事昏沉則不可救矣淡白痘之根腳四圍無一絲紅色止見有淡白之痘而亦不見其有暈也蓋因氣血兩虛或因久病之後或因吐瀉之後或因生母有病以致缺乳或因內有積患或因生大毒膿血出多元氣傷泄之後故出此淡白之痘初見痘苗宜用加味參蘇飲以托之使其出齊即用千金內托散催其長漿如或漿不足即用參歸鹿茸湯以催之今日不足來日再催余曾治此氣血兩虛之證竟至十一二朝漿始足者今之庸醫見八九日漿不滿而平塌者盡委而棄之皆因內無實學知識平常未見聶氏活幼心法之書親敬高明廣其知識臨此等七暈之證內有一定之主意外用合宜之藥品舉斯世之幼稚咸出險途而躋壽域豈非仁人君子仁心仁術參天地贊化育乎驗苗訣初出痘苗尖聳雖多緩出莫愁齊出焦頭枯槁終須雖久難留又看顏色氣血榮枯初出見點察色可知窠紅成片潤活可醫黑如煤炭血死無疑邵公邵公看痘分五形訣珍珠形珍珠之形恰似珠頂白根紅可看書磊落均勻光皎潔七日漿行九日舒茱萸形茱萸之形血有餘解毒湯投預可除頂陷帶黑兼慘暗逢斯可讀邵公書棋子形棋子之形平頂樣厚皮慘暗不明亮只因氣滯元陽弱調養湯頭還可望緑豆形緑豆之形硬頂緑氣血俱隆漿滿足只恐收期難得收口傳祕方不肯録白豆形白豆之形皮最薄清水漿行又軟弱此痘皆因氣血虧調氣養血漿可足上達之士見此形色目力精全智意兼會舉一隅以知三聞一事而知十十人中可回生八九邵公看痘分惡五色歌烏鴉斑烏鴉斑生證惡多昏昏隱隱亂如梭中心黑陷四邊紫六日之間一夢柯紫沙斑紫沙斑患決不輕其苗頂子似麻形氣虛毒盛宜時解清地湯投用則靈雲頭斑雲頭斑形浮萍好一似螺絲靨樣同解毒破血不得法死在六朝旦夕中虼蚤斑虼蚤斑形出遍身卻如蚊咬一般形氣虛血滯如何療調養湯中去茯苓點脂斑點脂斑形在皮上猶如胭脂點肉樣雖然血熱氣有餘略投解毒便無恙邵公看痘分惡五形訣干皮形干皮瘡形微帶紅又兼枯黑熱來攻氣少血枯瘡伏內清地湯投急用功紫萍形紫萍斑形似紫荷出時血色隱無窠只因火毒連瘡熾七日之間五毒磨白萍形白萍瘡形殼脆皮無膿灰色血多虧調氣養血俱當用免教嬰孩九日危赤萍形赤萍瘡形出已齊形如桃花貼肉生手爬血出如淋瀝去毒涼心敗藥宜蓮肉形蓮肉紅形痘已齊出齊五日腫其皮倒塌無膿難下手九日黃泉一夢回形色之惡猶宜謹慎臨證之時不可草率十人之中尚可保全二三若下愚之流執一之輩非乘機先講謝儀往返耽延時刻即慮設使難救治之損名棄而不救此等不堪幼科即得此許多祕訣用之斷不應手余此等祕法天下司幼科者百無一知因余對天立願好利之人不傳下愚之人不傳悸義之人不傳三不傳者恐知此法乘人之危順證亦加恐嚇使其父母莫知所知不得不典衣當衫嗑頭禮拜求其救治彼持此祕法只知謀利全無保赤之心所以不獨用之無功必遭天譴慎之邵公看痘祕訣熱日湧出痘難當宜查部位再推詳若是利方先見點不須憂慮少慌張初出放點滿頭紅再查部位用其功果然報痘方不利七日之後一場空初出血點帶紫鮮雷庭磊落可回天急宜早早求清地湯名免得爹娘枉叫冤未出腰痛甚可憐腮顴年壽不須嫌若在逆部痘先報牽牛丸方可結緣初出頭面痘形好遍身如麻不均勻若還方法不得訣連燒十日見閻君已出頭面卻如麻遍身痘色莫須誇風池兩背若先腫不遇明醫枉費嗟初出胭脂一片紅只因血滯氣難攻羌活散中加減用莫待臨時枉用功初出哭泣啞音聲色如明潤可回生若如紫黑髮斑疹一夢南柯十一行痘放標時手足先臉多腦少背多纏四肢果然多密地斯時看法又玄玄頭面灰白黑兼多果然周身紅活窠心窩兩旁無空地腎腧夾臍黑穿梭痘標出放在天庭胸背稀密不均勻四肢略分疏地闊心窩空地二三分痘瘡先放在太陽面上稀疏四肢濃胸膛背脊無空地九日之內往泉鄉痘標初放在司空顴骨腮少密離宮胸腹四肢大分地背心上下密重重方廣出標大可嫌面多胸少背多纏此痘定然三四樣醫人用藥要心專印堂出痘見形來太陽方廣磊如堆心窩鋪氈無空地一交九日己時亡山根年壽痘形先面胸稀少背相穿四肢略有二三十喉嚨尚痛要清咽兩腮放痘見形來面少胸背四肢排嬰孩若遇此等痘不必憂心且放懷風池三臺一點形其痘原來蛔出行嘔惡不寧清白糞急宜用藥救回生三臺放痘要先知上吐下瀉不須疑喉嚨又疼難得過甘橘湯中仔細推承漿出痘不須疑其毒原來痘必稀此痘定燒三日外退涼身靜再無窮又訣六日七朝見痘瘡滿面稠密地無荒細看陰陽梁上穴內中略有水珠藏此乃心肝肺痘出心窩略有幾數行二日見標無大害十一十二防作癢作癢之中防作瀉十五十六太平鄉七八九日見痘瘡滿面鋪氈紫色樣飲食挫喉真可忌肝腎二經出不祥二日見標火中出十一午時枉思量五六七朝見痘瘡渾身發痘地疏荒此乃肝經瘡發出胸心略有似紅珊三日見標連火出急用疏痘涼地湯服過之後聽調理在後不必用他方六七八日見痘瘡滿面紅滑水珠樣此乃肝脾出痘疹二日見標可推詳胸中空空有數個逢人一見喜揚揚細詳不可一斷論此痘在後有傳方九日方來定作癢作癢之中又作渴作渴之中又作瀉寒戰咬牙甚難當捱過十三十四日過此凶日定無妨七八九朝見痘瘡陰陽兩腮甚難當灰白略帶淡紅色肝肺二經發根詳八九天門見痘瘡坎離二穴平塌樣心腎二經紫黑色水中發出火中殃十一二日定作癢內攻外剝見閻王九日十朝見痘瘡黑陷焦枯不上漿陰陽二處不起發肺腎二經不灌漿胸背稀疏黑數個日半見標莫思量十二咬牙並氣喘十四午刻返陰鄉五日六日見痘瘡痘出皮肉一連舟斑點陰陽不分地胸肚紫泡氣難當日半見之真可惡九日之內往泉鄉三日四朝見痘瘡紅斑紫泡地先胖腫也眼目陰陽俱無縫斑點六日一場空十八九朝見痘瘡渾身收完皮肉紅原痘不曾先灌頂邵公一見喜相逢十二咬牙並寒戰十四子午赴泉鄉八日九日見痘瘡滿面稠密一片難仔細觀其陰陽穴陰陽天庭略上漿邵公問醫無答者勉而猶豫始知難急推土心行八卦此證訣後有奇方藥施用當反如掌危者能生有主張五日六日見痘瘡頭臉肢體灰白光邵公至囑再至囑急用良劑保安康此痘氣血相和助健脾行氣正相當八日九日見痘瘡陰陽唇口痘紅藏肝肺二經痘淡白心窩稀少四肢均三日見標真可羡十一起頂十二藏又訣痘之熱證湯水飲多申日必泄亥日寒戰咬牙惡證死期辰午申日多歸乙亥丁丑之期己卯或靈辛巳常驗甲申極准仙數難逃證值吉凶從訣可斷且如凶現堪斷幾朝用意推詳再加且力究其精奧僅可稱神謹密仙機幸毋亂泄邵公定痘有可治不可治訣痘殃一證難言也有發熱而死者有未發熱不知痘證而死者有發熱三朝並不起發不分顆粒枯黑痧夾痘痘夾麻而死者有五朝忽然漿陷肌膚忽瘦而死者有七朝大小便不通眼開氣泄死者有十二朝忽死者有一月後死者種種不一此言其已知出痘之險惡者更有一種腸痛腰疼數日並不發熱並無報痘忽喊數聲死者又何能知其為痘之險惡耶先驚後痘吉一片臘黃吉唇內有水者吉大便出蛔無妨黑陷有膿無妨抓破出血無妨痘後聲啞無妨初出紫血有法治稠密頂陷有法治略有紫泡有法治如紫黑色者不治鼻出蛔蟲有法治飲食堆喉有法治灰白色有法治渴瀉不止有法治寒戰咬牙有法治初起寒戰不治十四朝寒戰可治初起咬牙不治七八朝咬牙可治疤瘡口臭俱有法治手摸礙手者有法治手摸嫩者有法治手熱不退有法治鼻血不止有法治犀角地黃湯主之泄不止者有法治吐瀉者有法治遍身痛者有法治如八九日作痛者乃氣血過盛宜涼膈散語言不正有法治二便不通有法治打厄者有法治舌上白者有法治唇乾者有法治黑頂陷者有法治初熱悶亂者有法治唇裂者有法治初痘起驚者有法治癢塌抓破血水有法治白頂陷者有法治滿口齒落者有法治口鼻出血有法治遍身臭膿有法治牙關閉者有法治暴躁不定者有法治面部不起有法治陰毒陷陽有法治陽毒陷陰有法治收後黑糞有法治收後咬牙不止有法治銅鑼頂者有法治室女行經有法治孕婦胎下有法治十指冷者有法治用煮雞法初起氣急無妨八九日氣急者凶初起咳嗽無妨八九日咳嗽者凶吐蛔一條無妨若吐蛔兩條者死如發熱三日見標吐蛔者乃腎中真病不治之證十四朝腰痛無妨初起腰痛者凶初起目閉無妨十四朝目閉者死痘七八日口渴無妨乃氣血不足四物湯治之初起聲啞無妨先凶後吉牙痛無妨大便出血無妨黃連解毒湯主之口吐鮮血無妨吐赤血者不治口吐黃水無妨平胃散主之肚痛無妨平胃散主之膿涕者不好手搖者不治眼中出血不治耳中出血不治未出聲啞不治一出氣急不治一出青斑不治一出如珍珠不治滿頭連肉紅不治面臉痘不腫不治痱子形無縫不治腰痛不止不治打嚏不止不治先痘後驚不治出如蠶種不治咳嗽聲啞不治腹脹悶亂不治哭泣無聲不治二便漏下見腸不治瘡嫩易破不治挑破紫黑血不治舌卷囊縮不治癢塌不止不治遍身成堆不治皮肉紅腫不治眼無神色不治白薄大泡不治白無色者不治如白色大小不等者不治遍身作癢不治狂悶者不治身與四肢顫抖咬牙口噤者不治飲食吐者不治舌上黑者不治收後疤白不治目閉無視不治水珠不變色不治遍身俱陷不治口出活蛔蟲不治氣血俱虛不治凡痘初出如麻子不礙手者不到第三日反隱入或變水泡聲啞挫喉則七朝辰午二時死凡痘出如黑痣者九日死凡痘不起眼胞先腫者九日死面先腫者十日死凡痘兩額角多抓破者十日死焦枯陷伏者十四日死吐膿痰者無妨消痰飲治之吐臭膿痰肺癰不治泄瀉清糞無妨理中湯治之泄瀉白糞乃系寒證可治理中湯治之天庭稠密如蠶種似針苗之狀頂陷黑者不治泄瀉黑糞者不治目疼者可治手心疼者無妨益元散治之泄瀉紅糞者不治十指疼者不治牙後作疼者可治茯苓湯治之一服即止背心疼者可治宜羌退散治之曲天疼者不治胸心疼者不治舌尖紅五心有火可治麥冬散治之喉中疼者難治七八日喉中疼者可治初起喉中疼者不治又訣毒厭中宮咽喉啞嘔吐咬牙命難假心煩躁悶喘難當瀉膿出血難主下睡臥瞑瞑又不食默默沉沉南柯差痘若初出見青黑除是回生真妙訣半隱肌膚色不見用藥不對如刀劍若有明醫識諸證千代兒孫富且顯一看咽喉時時啞次看咽喉聲轉大喘痰頭上有汗珠腹中飽悶氣虛滑醫家若還見此證六日南柯一夢傾再變寒戰終有惡或重或輕心中熱黑陷動動如泄瀉黑血下流陰氣絶吐舌身搖頸動翻面青紫黑命難存口中氣冷如何治除是乘槎閬苑人痘出五日聲啞者不治痘未壯遍身抓破無氣血者不治舊有瘡瘍不愈者不治痰壅盛氣急者不治未出神昏者不治未出氣促者不治腹脹瀉膿血者不治一出全不起發密如蠶種平片花塔者不治收靨前後內有紅紫泡者不治肌膚黧黑如秕破者不治漿水米粒不入口者不治一出晦暗焦黑者不治眼內黑米起者不治浮油混眼者不治除此之外縱有雜證及痘雖稠密略有潤澤學問精明眼力又到胸中誠確所見不錯病家不惑彼此俱是誠心加意調治必可保全十之六七又訣初出頂陷蓮肉紅捱過九日一場空又無血點帶紅紫斑證死在六日中發斑黑者在朝夕斑青頃刻去匆匆無膿癢塌十二日不要疼痛及挺胸報痘如痱似雞皮舌卷囊縮命必亡刺胞刺出黑血者飲食嗆喉諸證凶難療面腫瘡不腫青色黑陷及無膿二便流水下腹垢更有吐瀉及蛔蟲頭溫足冷好飲水痘先驚後藥難攻氣促泄瀉渴不止若無漿者命難供失音聲啞叫與哭痘色縱好也難終但凡氣急亦難治如灌膿時忽傷風見此宜服參蘇飲餘證推詳須用功天庭痘成串不起此乃氣血俱虛須補氣血為主不然後必空倉癢塌虛白作瀉寒戰而死婦女出痘經水不止者凶墮胎血者凶不墮胎而血不止者凶收靨時顫搖不止者皆身弱之故另有治法靨後目睛無神慢驚頭面青色者不治收靨時喉痛不止者凶凡痘腰下現紅點而腰上不現出者不治醫家斜視痘兒之臉形如橘皮不分肉地者死此即不分顆粒肉腫瘡不腫也喜泰順曰初出紅點帶紅紫發斑之證五日死初出滿項連肉紅七八九日氣絶耳斑如錦紋六日終斑青頃刻入陰中痘出如痱無縫者摸不礙手勿治也若如湯泡及火燒十日癢塌死難饒痘出腰腹痛不已煩躁紫黑口臭死頭面一片如胭脂六日後死何必疑肉面腫浮瘡不腫胸高耳突不治重痘白麵光根不紅久後抓破死無膿無膿癢塌十二期有膿血者不死矣如麻無縫痘不好聲啞氣急命皆危二證貫膿痘色光乃傷風寒參蘇當若是哭泣咳嗽啞痘色光明也不妨痘色不好聲音啞斷他必死無或假舌卷囊縮目無神飲食滯喉必難存紫泡刺破出黑血便中腸垢不治論吐瀉若還甚不止蛔蟲出者死難聞已未出痘聲音變先痘後驚活不寧三日痘窠全不起紅腫如瓜君莫治頂陷有眼似針穿紫黑色者死決然貫膿乾枯無血水此名空倉痘乃篤泄瀉不止二便血乳食不化痘爛死貫時二便全不通目閉口啞證亦凶腹中脹滿肌肉黑若還醫治必無功當靨癢塌無膿血皮如血殼肝即絶寒戰咬牙痘後驚靨若竹衣便膿血此皆死證不須醫縱遇神仙難作力邵公痘科始終要訣邵公曰自初發熱便知吉凶重則痘密輕則痘稀日半出齊靈丹莫療緩延三日續敷可生初出之苗根潤頂尖必易起壯頭焦腳滯終難行漿肉裡藏隱紅斑再察天離苗勢此位粗肥有潤用藥退轉為輕大抵微熱三天身涼見標斯為上吉若日半兩日帶熱見點此是至凶初熱為始至六日滿方齊若二三四五日內見苗熱未退者悉用退火解毒直待分地清白七日之後方可補托助漿九日之期順者飽滿充實逆者黏肉乾枯險者離巽起窠無漿腳潤十日漸長十二三日頭面俱滿於中或有變證用藥調治可保無虞痘若起脹行漿再看舌喉背耳舌如黑者必死背無漿者定亡耳上乾枯必敗喉間堆鎖定傷膿若稠堅靨自厚實漿嫌清少疕必黑焦腳潤漿堅何患諸變氣虧血缺立恐災殃八日之前食少無害十日已後少食宜防出際通紅莫嫌壯期泄水可惡聲清為喜聲啞難扶假如咬牙當辨寒熱如逢戰栗驗漿有無熱戰咬牙托熱涼散寒戰噤齒補帶溫攻凶逆詳察其兩端治止主持於一定有能知此者則不患名譽之不彰財利之不廣也又曰觀其耳便知痘出證輕證重聆其聲則知何部痘密痘稀惟見瘡善識心思觀面知身上災殃又如身熱唇焦便知作渴痘苗紅紫必發狂言痘若稀疏先須頭痛形如蠶種初主腰痛面帶白黃曾經吐瀉身如災火必定尿黃蛇蛻一般因熱日半一齊湧出茱萸一樣連燒二日陸續敷陽痘若潤澤稀疏定熱三日身涼見點苗若干枯略密未滿三日帶熱敷瘡頭面痘紅肚脅上必生斑點顴腮痘陷腰背間多有陷塘白色漿清再出一層小痘瘡平頂陷中有幾個賊瘡漿不滿充猶恐唇舌齦疳落齒疕如易落切防肢節癰毒流膿靨後眼封毒入肝經生臀收期復脹邪留腸胃二經此乃祕訣發之必中宗吾法者超乎俗類驗初發熱時吉凶斷訣發熱自寅卯時起者是肝經痘也主痘紅潤帶緑頭面六分背上五分手上四分腳上三分肚上一分半輕之證發熱起於巳午時者心經痘也主痘腳紅頂尖面上四分背上三分手足上各二分肚上半分為上吉發熱起於辰戌丑未時者脾經痘也面上不過數粒尖圓飽滿黃潤背上只有十多粒手足各有七八粒肚上心窩全無此極妙者也發熱起於申酉時者肺經痘也主痘灰白色面上八九分背上七八分手足七分肚上三分險中逆也發熱起於亥子時者腎經痘也主痘黑陷面上十分背上九分手足八分肚上四分逆也發熱半朝見點必然先放雷逆就如蠶種相連頭面四肢俱密胸肚地略疏通痘子不能發出唇翻面腫毒攻又逢口舌屎血神仙妙藥無功發熱一朝見點必然先放雨宮痘色頭焦腳赤肚脅斑塊血紅先必腰疼肚痛狂言煩躁交攻自然生痰作喘挫喉聲啞將終學者宗吾治法保全嬰壽無窮發熱朝半見點猶嫌先見風宮五粒梅花之樣手背品字相同腳上連三串四心胸七八成叢腰間毒疔二七陰囊黑色無膿勿以此為順證莫斷此證全凶再費精神飲食隨機用藥成功發熱兩朝見點必然云部現蹤頭面七分之數手足五分之膿背上四分之象胸肚二分之功所喜尖圓潤活猶嫌枯黑暗紅二朝半來見點定然發電便逆見標身頭壯熱和中安表助功痘出自然潤活面部稀少地空必要調元固里以防變壞於中凡小兒發熱呵缺鼻流清涕咳嗽痰涎臉紅唇赤睡中驚撮目澀鼻尖紅手足尖冷耳後有紅筋現者是真出痘也凡心脾兩臟並出者主頂帶紫黑色根窠紅半輕半重之證放心勿慮凡肺肝腎三臟並出者主頂帶黑根窠白乃凶極之兆不治之證凡痘半日出熱不退主紫黑譫語如見鬼神此宜下生津譫語者承氣湯治之如不急治則三五日子時必死凡痘二日未退熱見標者略有紫紅色則宜前藥宣之或不紫紅宜十解散去其內毒後加四物湯為主治之如不服藥則五七日午時必死凡痘日半未退熱就見標形如蠶種隱在肌膚之內須要托出如托不出七日九日辰卯時死凡痘一日半未退熱見標者如大紅色宜宣之不可亂用下藥如若不治則九日十二日午時死凡痘三日未退熱見標者紫黑焦陷者須用五味十解散治之或用芩連紫草之類如若不治十三日咬牙寒戰而死凡痘三日以前出者是實熱或承氣湯十解散或柴葛湯亦可凡痘三日以後見標者大抵俱虛而實者少也須要看痘下藥或帶灰白或紅點稠密者宜宣可也凡痘一見須分表裡虛實不可妄以下藥治之如紫紅乾枯飲水如蜜飲茶不止渾身熱不退者急以清涼解毒之劑如治之不退則成陷伏倒塌不治如身微熱痘色淡白小便清利口氣又冷宜投大補湯一貼若痘均作二三次出則吉凡痘一熱一齊出稠密內中無黑陷或天庭一片如雲兩臉略分明一日灌起服藥見效不咳嗽放心治之若有黑陷焦枯及不退熱不滋潤者不治第一看口唇舌尖第二看痘粒圓活紅潤地步分明雖多有吉第三看心窩額上稀乃是吉證第四看痘無陷頂白如蠟色外黃潤如油色吉第五看痘出來頂不焦不紫者吉碎金賦田萬密齊此乃痘證之捷徑初學宜熟讀痘本胎毒俗曰天瘡雖厲氣之傳染實殺機之顯彰變遷莫測酷惡難當肌肉潰脫兮若蛇蛻皮龍蛻骨精神困頓兮如蚓在灰蟺在湯瘡有疏密兮疏者輕而密者重毒有微甚兮微則祥而甚則殃笑彼拘於日數者未達遲速之變悲夫惑於鬼神者不求醫藥之良乾坤妙合震巽分張受氣於父兮得陽精而凝結成形於母兮賴陰血以培養民多嗜欲氣匪淳龐淫火熾於衽席食穢蓄於膏粱精血稟其毒氣兮甚於射罔形體負其殺氣兮險於鋒芒或謂去其口血兮不過脫空之語或謂解其胎毒兮未見抵聖之方五運統於南北兮有大有少六氣分於主客兮曰陰曰陽變化各正勝復靡常得其序而氣治兮國無疪癘失其序而氣亂兮民有疹瘍應至而不至兮其氣徐貴迎之以奪其勢未應至而至者其氣暴姑持之以避其強不知此而妄作兮違時者敗能審此而慎動兮順天者昌春令溫和而升生夏令暑熱而浮長秋令清涼而降收冬令寒冽而沉藏是得四時之正不為萬物之傷冬反燠暖兮勾萌早發春反栗烈兮蟄蟲且藏夏反清肅兮涼風襲肉秋反蒸溽兮暑汗沾裳若此逆氣兮染之者即成疫癘又有虛風兮中之者必致夭傷受父母之穢毒兮隱於黝僻觸天地之癘氣兮發其伏藏自內而出兮布於四體自外而散兮根於五臟肝主淚而為水泡肺主涕而作膿囊心則斑而且赤脾則疹而又黃腎乃封藏之本變則黑陷之象可喜者苗而秀秀而實如鳥之脫距所惡者枯而陷陷而伏如虎之負岡東赤南白西黃北黑各分布而有定春生夏長秋收冬藏自流行而無疆初出血點兮紅鮮得生之氣次化水液兮白瑩漸長之狀膿成而色黃兮欲收之候痂結而色黑兮已藏之象謂腎無證者似去冬不能成歲謂黑為逆者如廢北何以調陽方其發生兮春夏為順而秋冬非吉及其收斂兮秋冬為順而春夏不藏應發生而反收斂者謂之陷伏應收斂而反發生者謂之瀾洋順者不必治兮待其平復逆者不可治兮避其怨謗若逢險證必在奇方治不乖兮險變順而春回幽谷藥不對病兮險變逆而火烈昆岡病似順而反逆兮認之要慣病似逆而反順兮察之貴詳似粟堆聚堅硬兮孰若磊落而稠密如丹豔赤嬌嫩兮不如淡白而老蒼初出現而函水乍起發而戴漿膿主成而乾黑囊未滿而萎黃早發先萎兮如園林之花蕊暴長遽消兮似溝澗之潦潢是謂奪命之證休誇折肱之良輕或變重兮誤服藥而或犯禁忌重或變輕兮得遇醫而且善調養蚊跡蚤斑兮不旋踵而告變蛇皮蠶殼兮惟束手以待亡夾癍夾疹兮癍疹消而足喜頂平頂陷兮平陷起而莫惶切戒臨病揮霍最宜用藥審詳病有標本兮視急緩以立不法藥有補瀉兮因虛實而立方噫嘻兮醫無定法迷亂者藥無定方大率賤攻而貴補故多喜溫而惡涼設若病遇虛寒兮溫補有效假如證屬實熱兮辛香敢嘗辛熱下咽陽之盛者必困苦寒入胃陰之盛者乃戕戒汗下於首尾兮惡攻之說補脾土以制腎水兮喜補之常不識補者之短奚論攻者之長形尖圓而光壯兮氣之充拓色鮮明而潤澤兮血之涵養可以勿藥是謂無恙灰白平陷兮氣血虛而補之以溫紅豔焮腫兮氣血熱而瀉之以涼氣至而血不足兮雖起發而根窠不肥血至而氣不足兮雖明潤而郛郭不長泥章句以舉一隅者守株安可得兔馳辨說而執兩端者多岐必然亡羊脾為水穀之本固不可以不補腎為津液之源尤不可以不將土雖為水之防水不能制火之亢腎主骨髓兮倒陷入於骨髓者莫救腎司閉藏兮變黑至於閉藏者可防是皆歸腎之害豈可謂腎之強毒之燔灼兮腎水且涸營氣敗壞兮脾土亦傷故補脾不如救腎而養陰所以濟陽炅則氣血淖澤而不斂寒則氣血凝澀而不彰氣血失養痘疹受傷或受於熱兮為煩躁為赤為痛或受於寒兮為振慓為白為癢順時令之寒暄禁人畜之來往勿動溷廁之臭勿燒蘭麝之香恐乘虛而易入反助毒以為殃痘雖吉而犯多凶屢經怪變證雖惡而調治善終見安康若夫瘡疹之熱相似內外之傷邪火煊赫兮玉石俱焚真水靜順兮波浪不揚噴嚏咳嗽兮肺金流爍項急頓悶兮肝木被創呵缺驚悸兮心雖君主而不寧吐瀉昏睡兮脾則倉廩而不藏各臟各證惟腎無象不受穢毒之火獨見耳骫之涼熱微兮毒少熱甚兮火旺大熱安靜兮毒隨熱出而無慮小熱煩躁兮毒與熱伏而可防凶災莫測兮又熱又渴輕疏可許兮乍熱乍涼吐瀉勿止兮使毒得越而無遏驚悸不定兮恐毒深入而反藏血妄泄於空竅兮死期速於彈指語妄涉於鬼神兮變候易於反掌形證定其疏密部位決其存亡如痘紛布兮且顆粒而其疏已定如麻堆聚兮更模糊而其密堪傷挨頰繞口兮庚戊陽明之位顴間額上兮王丙太陽之鄉頭為元首之尊最怕矇頭項乃關津之要偏嫌項鎖鼻準初出兮淫毒犯於天根耳輪先現兮邪火侵乎玉堂漸次出兮吉兆齊湧出兮凶狀痘將出而熱減兮藥勿妄服痘正出而熱劇兮醫宜早防解其火毒兮恐郁遏而乾枯養其氣血兮欲流行而舒暢遠寒熱之犯兮損之益之而必欲和平助春夏之令兮達之發之而必使長旺治其未亂兮徹桑土於逮雨知其必漸兮戒堅冰於履霜出欲盡而不留發欲透而齊長苗漸成窠兮氣之所煦血漸化水兮血之所養疏而毒少兮頭面不腫而休怕密而毒多兮氣血不充而莫慌時日既足兮自翹翹而雜起表裡無邪兮勿汲汲以作湯此謂良將用兵善攻不如善守又曰上農治田勿助生於勿忘咽喉忽痛兮勿違時而早治頭面預腫兮但引日以必亡小便欲清兮大便卻欲其堅實淡味可食兮厚味不可以啖嘗茹淡者胃氣不損養厚者火邪益亢或見黑黯兮點之速以胭脂或遇乾枯兮浴之貴以水楊瘙癢忽生兮取茵陳以熏燎爬搔不寧兮雖盧扁而倣徨痘長滿水毒化成漿愛其稠膿兮惡其清淡取其滿足兮舍其虛洋欲知透與不透兮於手足而細察欲知足與不足兮於輔頰以端詳設四末之未透取脾胃而服藥如一方之未足視經絡以求方譬如為山兮勿功虧於簣土又如執熱兮寧濯先於探湯面頰最嫌破頂肩背尤怕焦囊腫忽消兮氣脫語忽妄兮神亡食谷則嘔兮胃爛飲水則嗆兮咽傷咬牙兮肝火熾而腎敗寒戰兮陽氣弱而陰強膿反干兮倒陷膿不成兮伏藏叫哭不止兮毒攻腸胃悶亂不寧兮火烈膏肓倉廩不藏兮魂魄歸於溟漠水泉不止兮姻親泣於北邙膿血已化收靨相當兆自唇吻兮漿吐結如珠粒斷自人中兮部分默以意量令行秋冬兮依先後而不亂氣應陰陽兮循上下而有常顴上乎輕兮慮乎倒靨顴間先收兮謂之不祥痂不著而壅腫兮由榮血之淖溢瘡盡裂而皺揭兮此衛氣之殘傷當靨不靨當藏不藏便祕不通兮裡氣熱而涼導便溏不實兮中氣虛而溫養熱傷皮毛兮怪肺金不收餘氣濕傷肌肉兮責脾土不燥殘漿頭瘡堆膿不平兮孤陽似鰥而不生足瘡包水不幹兮純陰如寡而不長飲食減少兮迤邐引日而斃煩躁增劇兮倏忽絶命而亡若問痂皮之不脫其間病氣之相妨痘若敗壞兮補空痘勿疑番次瘡如潰爛兮成潰膿莫靨膿漿遍身浸淫兮黏被席而最苦正面腫灌兮息腥臭而再妨利多水液兮此畜水之病也水去盡而自止便多膿血兮此倒靨之證也膿去盡而可祥瘢痕凹凸兮陷者虛而突者實皮痂嫩薄兮里則困而外則瘍邪氣盡而正復痂皮脫而身康苟幼軀之多病即餘毒之有藏出或未盡兮無空痘須防卒暴發或未透兮無潰膿必發疽瘍不及期兮早收毒火陷而可怕或過期兮不靨邪氣留而堪悵身熱審其虛羸咽啞觀乎嘔嗆勿灑淅而肌熱兮知風寒之外感暴吐瀉而腹痛兮必飲食之內傷病有苦而眩運兮凶多吉少之占身無邪而昏瞀兮否去泰來之象聲音不出兮求諸肺腎之經斑疹復現兮責其心脾之藏疳蝕出血者難治洞泄完穀者莫醫勿謂痘收而縱弛勿謂毒去而逮遑正氣浸長而未復邪氣方消而未央特犯禁忌兮今即生變恣食肥甘兮後必有殃疥癩腐潰兮一面䵟瘢而似鬼癰疽流注兮四肢殘廢而如尫目腫亦痛兮冷痘入而成翳齒黑爛兮熱毒浸而潰床雖曰餘毒之為害抑皆定數之莫防形容頓改兮令人駭愕調治悔遲兮空自惆悵謂人不能勝天兮何以立乎醫藥謂醫不如用巫兮安能格乎窮蒼但逢出痘之歲多求解毒之方重者必輕兮輕者不出凶者變吉兮吉者何妨其方則有其效未常與其先事而輕妄孰若臥時以精詳審歲氣之災祥兮必解其鬱視形氣之勇怯兮各平其臟欲避癘氣傳染兮必先擇地之善欲仗藥力調護兮尤要識醫之良惺惺參蘇乃發散之妙劑惺惺散參蘇散人參通聖誠疫癘之奇方人參敗毒散防風通聖散熱而驚悸兮導赤瀉青兮用導赤散瀉青丸熱而焦渴兮柴胡葛根作湯小柴胡湯升麻葛根湯自利兮黃芩黃芩芍藥湯不便兮清涼四順清涼飲腹痛毒攻兮勻氣散再加枳實腰痛病劇兮敗毒散更入木香調元可補兮表裡實者勿飲調元飲承氣可攻兮脾胃弱者莫嘗小承氣湯養正兮黃耆人參甘草解毒兮連翹山豆牛蒡咽喉苦痛兮甘橘湯中加大力斑疹夾出兮防風散內去硝黃防風通聖散小便赤澀兮連翹導赤連翹飲導赤湯大便滑泄兮豆蔻木香豆蔻丸木香散瘡若干枯兮四物合乎涼膈四物湯東垣涼膈散痘如黑陷兮奪命助以水楊奪命丹水楊浴法赤豔焮腫兮解毒入生黃歸芍黃連解毒湯灰白平塌兮異功用桂枝耆防異功散氣虛而毒盛者無價四君枳實無價散四君子湯血虛而毒盛者無價四物牛蒡四物湯氣血兩虛兮十全無價十全大補湯便溺俱阻兮八正三黃八正散三黃丸再用膽瀉之法以瀉毒氣之藏黑陷審其虛實虛者大補而實者涼膈十全大補湯河間涼膈散癢塌分其急緩急者異功而緩者調陽陳氏異功散調陽即謂元湯昏悶譫妄兮龍腦膏孰知其妙虛煩迷亂兮抱龍丸莫及其良滿面燥痛兮百花調水百花膏遍身潰爛兮敗草鋪床敗草散蟬蛻去目中之膚翳蟬蛻散苦參治身上之淫瘡苦參丸虛熱多汗兮調元湯引用浮麥食積常痛兮脾積丸飲以原湯飢不喜飧兮異功宜久錢氏異功散渴欲飲水兮白朮可常白朮散敗毒通聖允矣沖陳之先鋒人參敗毒散防風通聖散調元異功信乎殿後之大員調元湯錢氏異功散大抵醫要識證藥不執方專行溫補者則宗乎文宗喜用涼瀉者則師乎仲陽不解其書兮似瞽冥行於溪徑不察其神兮如矮仰望於宮牆嘆吾年之耋兮欲深造而力不足懼斯道之晦兮特發明而言不章嘔盡心肺兮非欲立異勞費頰舌兮豈敢恃長幸取正於具眼徒見笑於大方
