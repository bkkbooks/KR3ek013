body:
  text: 卷十三正面耳頦部自耳起至下頦髭鬚止凡一切癰疽疔毒皆匯於此部中以便檢閲參治耳癰門主論王肯堂曰耳癰寒熱間作內外紅腫疼痛日增準繩馮魯瞻曰火壅上焦或作大痛或膿流於外或膿塞脹痛有因縱怒縱酒濕熱相乘耳腫作痛者所主宜平肝除熱疏風錦囊澄曰耳癰之證癰者壅也與膿耳初起有間非醇酒炙煿即怒火遏郁更有色欲過甚真陰耗竭相火亢盛或肝膽火逆是以耳竅壅腫耳根焮熱脹痛初起俱宜梔子清肝湯加味逍遙散如內膿已成用四妙湯去黃耆加白芷丹皮已潰出膿者用八珍湯去川芎加銀花膿盡換用地黃湯加麥冬牛膝自愈外治內已有膿用紅升丹少少提之耳門不可貼膏藥遮擋閉竅耳畔紅腫用黃敷藥敷之自消耳發疽門主論王肯堂曰耳發疽生耳輪屬手少陽三焦經風熱所致六七日漸腫如桃或如蜂房之狀或赤或紫熱如火痛徹心是也十日刺出黃白膿者生刺之無膿時出鮮血飲食不下神昏狂躁者死準繩申鬥垣曰耳發疽乃足少陽膽經其經多氣少血其疽發於鬢下耳旁近臉懸釐主客二穴上不五六日漸長蜂窩皮紫焰熱如火灼痛十日內剌之有膿者生無膿出血精神恍惚二十四朝必死不可救也啓玄心法曰耳發疽生耳折間連耳輪通腫甚則膿竄耳竅耳後疽門主論心法曰耳後疽生耳上稍之後角孫穴開口有空陷下之處者是耳疔門主論王肯堂曰耳疔寒熱大作痛楚難禁者是也準繩竇漢卿曰耳疔以燒酒滴疔根上方得脫隨用苦茶洗解去酒毒陳實功曰黑疔生於耳竅之內黑硬腐爛破流血水疼連腮顴宜針刺之照疔瘡門治法正宗耳疳門主論王肯堂曰耳疳生瘡臭穢乃足少陰手少陽二經風熱上壅而成準繩馮魯瞻曰耳內疳臭謂之沍耳乃腎氣有餘積熱上衝或因風水起錦囊李東垣曰小兒耳後生瘡名腎疳耳疳門主方耳生疳瘡黃連去毛須蜜炙數次兒茶各等分輕粉半匙冰片麝香各少許共乳細搽耳後生瘡名腎疳地骨皮研末粗者煎湯洗耳細者香油調搽耳疳出膿核桃仁研爛取油一錢入冰片三分每用少許滴入聤耳門主論王肯堂曰聤耳又曰耳濕常出黃膿準繩又曰乃足少陰手少陽二經風熱上壅而成馮魯瞻曰實熱者即腎氣有餘積熱上衝津液壅結故成聤耳聤耳之名更有五般常出黃膿者謂之聤耳常出紅膿者謂之膿耳耳內疳臭者謂之沍耳白膿出者謂之纏耳耳內虛鳴時出青膿謂之囊耳其名雖異總由積熱上壅或風水入耳所致若不速治久則成聾治宜清火養血或去濕化毒其患自愈錦囊聤耳門主方千金不換丹祕方水龍骨一錢硼砂五分研末吹入耳竅又綿塞之二次除根聤耳不論已未出膿神效方周鶴仙頭髮在新瓦上燒灰存性為細末羅過每灰一錢加真冰片七釐研勻吹少許入耳內極驗驗方胭脂燒灰為末加冰片少許吹之驗方醬茄子擠汁滴耳內即愈震耳門主論王肯堂曰耳內虛鳴常出清膿名曰震耳乃足少陰手少陽二經風熱上壅而成準繩馮魯瞻曰耳內虛鳴常出青膿名曰囊耳乃腎氣有餘積熱上壅或風水入耳所致法宜清火養血或去濕化毒錦囊纏耳門主論王肯堂曰耳中常出白膿名曰纏耳乃足少陰手少陽二經風熱上壅而成準繩馮魯瞻曰白膿出者名曰纏耳仍腎氣有餘積熱上衝或風水入耳所致錦囊膿耳門主論陳實功曰耳病乃三焦肝風妄動而成大人有虛火實火之分小兒有胎熱胎風之別虛火者耳內蟬鳴出水作癢外無焮腫實火者耳根耳竅俱腫甚則寒熱交作疼痛無時正宗又曰初生小兒胎熱或洗浴水灌竅中亦令耳竅作痛生膿切記不可吹藥若治早項內生腫莫若候毒儘自愈如一月不瘥以紅綿散治之自安馮魯瞻曰耳者宗脈之所聚腎氣之所通也有小兒腎經氣實其熱上衝於耳遂使使津液壅而為膿或為清汁然則厥陰之與足陽明手少陰之與足太陽為證尤甚推其所致之由其原有七有實熱有陰虛有因痰有因火有氣閉有肝風有胎元所發而為病也證有五為鳴痛腫聾聤是也當分其所因而治之錦囊又曰常出紅膿謂之膿耳又曰胎元而成者是因父母不謹故先天火毒攻衝膿臭流處成瘡四傍腫赤時發時愈所主宜化毒滋腎陳遠公曰人有雙耳忽腫痛內流清水久則變膿血身發寒熱耳內如沸湯響或如蟬鳴此少陽膽氣不舒而風邪乘之火不得散故生此病法宜舒發膽氣佐以散風瀉火之味則愈矣然有不效者何也蓋膽受風火之邪燥干膽汁徒用祛風瀉火則膽汁益干膽火益熾風藉火威愈焚灼也病益甚矣潤腸湯主之當歸白芍玄參各一兩黑梔子二錢柴胡一錢花粉三錢石菖蒲八分水煎服一劑疼輕二劑腫消三劑膿血止四劑寒熱除十劑全可也此方歸芍不但入膽且入肝也膽病肝亦必病平肝則膽亦平也柴梔亦舒肝膽之味舒肝正所以舒膽也肝舒則血必旺而膽汁有不濡潤者乎膽汁既濡邪風邪火已有不治自散之機加天花粉逐痰則風火無黨以石菖蒲通耳中之竅玄參退浮游之焰自然風火漸祛上焦清涼耳病隨痊也冰鑑汪省之曰虛火治以四物湯加牡丹皮石菖蒲腎氣丸主之實火治以柴胡清肝湯主之理例膿耳門主方紅棉散耳內生瘡流膿乃肝經鬱火所結枯白礬三錢胭脂一錢煅存性如能用干油胭脂更佳研勻先用棉杖子攪去膿水另以柳杖子蘸藥摻入耳底自干若聤耳加麝香五釐耳底流膿枯礬黃丹龍骨海螵蛸麝香干胭脂研細吹之又方青黛人中白枯礬雄黃冰片黃柏各等分研細吹又方橄欖核煅存性研細加冰片少許吹又方大紅千葉石榴花瓣研細吹又方枯礬入人乳內放炭火上頓滾變黑色研細吹又方蘆柴梗葉籜煅存性加冰片水許研細吹又方陳皮煅灰一錢加麝香少許吹又方白鯗牙二個煅加冰片研細吹又方水龍骨即船底陳油石灰一兩硼砂二錢五分共研極細每用少許吹又方黃丹水飛二錢龍骨煅枯礬胭脂各一錢海螵蛸五分麝香少許研細以棉杖子搌去膿水用少許吹耳內每日吹一次勿令風入煎方蔓荊子升麻前胡桑白皮甘草麥門冬赤茯苓赤芍耳內腫痛出膿出水金絲荷葉即虎耳草揉汁灌入耳內自愈此味乃治耳病之妙藥如有膿可加枯礬少許又方頭髮燒存性研細每用少許吹入又方五倍子一個略挖破入生明礬於內紙包浸濕火內燒存性研細每用少許吹入又方鮮白果搗爛用棉裹絞汁入耳膿血自止又方蛇蛻卷條插入耳內其膿吸盡自愈又方紅棗一枚去核入雄黃三分燒乾研末用管吹入耳內又方柿蒂不拘多少煅存性研細吹耳風毒門主論王肯堂曰耳風毒耳中常出紅膿此足少陰手少陽二經風熱上壅而成準繩胡公弼曰耳風毒即耳門毒青囊又曰耳之上下前後皆屬少陽最不可破如毒一有潰破便要仔細詳審不可輕忽竇漢卿曰耳風毒受在心腎氣不流行壅在心經致傷於耳耳菌耳痔門主論王肯堂曰耳菌耳痔則不作膿亦不作寒熱外無壅腫但耳塞不通纏綿不已令人耳聾準繩陳實功曰又有耳挺結於竅內氣脈不通疼痛不止當用白降丹點之化盡乃愈正宗竇漢卿曰耳痔耳菌先用針刺破用紅玉膏點之耳脹痛用虎耳草汁滴入耳內痛即止汪省之曰耳挺治以梔子清肝湯外以白降丹或線蘸藥插入挺肉縫內化儘自愈理例耳痛門主論易說卦坎為耳痛王肯堂曰腦裡虛瘍虛瘍者即無名腫毒之謂耳中疼痛不可當者準繩馮氏曰耳痛耳鳴耳癢耳膿耳瘡亦當從少陰正竅分寒熱虛實而治之不可專作火與外邪凡耳鳴以手按之而不鳴或少減者真虛也手按之而愈鳴者火實也昔王萬里時患耳痛魏文靖公勸以服青鹽鹿茸煎雄附為劑且言此藥非為君虛損服之曷不觀易之坎為耳痛坎水藏在腎開竅於耳在志為恐恐則傷腎故耳痛氣陽運動常顯血陰流行常幽血在形如水在天地之間故坎為血卦是經中已著病證矣竟餌之而愈錦囊耳痛門主方立效散耳內忽作大痛如有蟲在內奔走殊痛或出血或出水或干痛不可忍者蛇退火燒存性研末鵝管吹入立止一方加冰片用蛇退者取蛇之善脫以解鬱火也耳痛不可忍者磨刀鐵漿滴入耳中即愈又方番大鱉子去殼磨冰麝油滴入耳中自止耳癢門主論後漢律曆志春分晷長七尺二寸四分當至不至多病耳癢岐天師曰有耳中作癢以木刺之尚不足以安其癢必以鐵刀刺其底錚錚有聲始則快然否則癢極欲死此腎肝之火結成鐵底於耳中非湯藥可救宜救癢丹主之愈後服六味地黃丸三十斤可也耳癢門主方耳癢並治耳中有核或耳屎凝結難取胡桃肉煨熱塞耳內食頃即通耳癢或耳屎結於耳底火酒滴入片時即止救癢丹岐天師龍骨一錢冰片三分皂角刺一條燒灰存性先將藥研細用雄鼠膽一枚水調勻加人乳再調如厚糊盡抹入耳孔內必然癢不可當必須人執其兩手癢定則自愈矣耳爛門主方耳輪赤爛桑棗槐柳桃嫩枝摘來煎湯日洗三次又方貝母輕粉研勻乾摻耳衄門主論馮魯瞻曰耳中出血少陰火動所致錦囊李東垣曰耳中無故出血名曰耳衄乃肝腎相火上逆迫血而衄耳衄門主方驗方白龍骨研細吹耳內又方人牙煅存性出火毒麝香少許研細每用少許吹耳內即干又治小兒痘瘡出現而靨者酒調一字服之即出黃耳類傷寒門主論凡耳中策策痛者是風入腎經也不治則變惡寒發熱脊強背直如痓之狀曰黃耳傷寒此不可作正傷寒治宜小續命湯去附子加殭蠶天麻羌獨次用荊防敗毒散加細辛白芷蟬蛻黃芩赤芍紫荊皮耳聾門主論馮魯瞻曰耳聾因於火者或暴怒之乍乘或情欲之自肆或因有餘之火或因不足之火故耳聾及痛者所主宜芩連歸芍之類錦囊又曰耳聾因於氣閉者有因怒傷及肝痰因於火或一時卒中或久病氣虛故耳聾及鳴者所主宜舒郁調血用導引宣通之法又曰更有風入於腦停滯於手太陽之脈則令氣塞耳聾又曰若大病後而耳聾者是血枯而氣弱也當服地黃丸然在病後則氣血俱虛必診兩手之脈孰勝而為之治若脈大無力或右手細小沉弱者陽氣大虛也宜甘溫之劑仿陽生陰長之義少加血藥佐之若純視為陰虛而用滋陰降火之劑則陽氣愈弱非惟耳聾不痊反增噁心胸滿泄瀉之患矣又曰耳聾皆屬於熱左耳聾者少陽火也龍薈丸主之右耳聾者太陽火也六味丸主之左右耳俱聾者陽明之火也通聖散滾痰丸主之凡有所忿怒過度則動少陽膽火從左起故使左耳聾也有所色欲過度則動太陽膀胱相火從右起故使右耳聾也有所醇酒厚味過度則動陽明胃火從中起故使左右耳俱聾也婦人多左耳聾者以其多忿怒也男子多右耳聾者以其多色欲也膏梁之家多左右耳聾者以其多肥甘也又曰經云耳聾少氣嗌乾者肺也又云頭痛耳鳴九竅不利腸胃之所生也腸胃不足故氣弱不充傷寒及大病之後多有此證以補中益氣湯治之耳聾多恐者肝虛也經云肝虛則目䀮䀮無所見耳無所聞善恐治法用四物湯加羌活防風柴胡茯神菖蒲主之又曰新聾多熱少陽陽明火多故也舊聾多虛腎常不足故也一宜清風散熱一宜滋腎通竅如大病後又宜補陰降火陳遠公曰人有耳中如針之觸痛者並無水出止有水沸人以為火邪作祟殊不知乃腎水耗也夫腎開竅於耳腎氣不足則耳閉耳閉之前必非安然即閉也必先痛而後閉何也腎火沖之也火衝不出則火路塞不通是火不再走於耳而成聾也此症宜速治否則成聾難治矣用益水平火湯主之熟地生地麥冬玄參各一兩菖蒲一錢水煎服一劑疼止二劑響息三劑全愈此良法也此方補水之劑又能於水中瀉火且不損腎氣腎水既足則腎火自降未成之聾不可不治也此方治已聾者尚有奇功況治未聾之耳有不取效之捷哉又曰人有耳聾不聞雷聲又並不疼此大病後或年老之人則有之乃腎火閃閉而氣塞也最難取效法當內外兼治必大補心腎雖耳屬腎而非心氣相通則心腎不交反致阻塞故必補腎使腎液滋心即用補心之劑使心氣降於腎火腎氣交自然上升通於耳矣用啓竅丹主之熟地二兩山萸肉麥冬各一兩遠志茯神柏子仁熟棗仁各三錢北五味二錢石菖蒲一錢水煎服四劑耳中必作響此欲開聾之兆也又服十劑外用龍骨一分雄鼠膽汁一枚麝香一釐冰片三釐研末為三丸綿裹塞耳中勿取出一晝夜即通矣神效之至再用前方服一日後用六味丸為善後之計否則恐不能久也經曰耳者腎之竅也腎主藏精者也故精脫者則頰黑而耳聾耳者宗脈之所聚也以竅言之水也以聲言之金也以經言之手足少陽俱會其中也有從內不能聽者主也有從外而不能入者經也腎和則能聞五音矣又曰有氣逆而聾者所屬有二凡手太陽氣厥而耳聾者其候聾而耳內氣滿也手少陽氣厥而耳聾者其候耳內渾渾焞焞此皆氣逆而聾也治法宜四物湯加降火通氣之藥然臟氣逆而為厥聾必有眩昏之證風聾必有頭痛之證勞役傷其氣血色欲耗其精元昏昏憒憒是謂勞聾必有虛損之證其聲嘈嘈眼見黑花此乃虛聾證也又曰凡耳聾因濕熱痰及氣實者並宜檳榔丸或神芎丸下之又曰耳者雖足少陰之所主然人身十二經絡除足太陽手厥陰其餘十經絡皆入於耳惟腎開竅於耳故治耳者以腎為主然心亦開竅於耳何也蓋心竅本在舌以舌無孔竅因寄於耳腎為耳竅之主心為耳竅之客腎治內之陰心治外之陽清淨精明之氣上走空竅而聽斯聰矣若二經不調陰陽不和皆令暴聾然五臟開於五部分陰陽言之在腎肝居陰故耳目二竅陰精主者在心脾肺居陽故口鼻舌三竅陽精主之是以五臟不和則七竅不通凡一經一絡有虛實之氣入於耳者皆足以亂其聰明此言暴病者也若夫久聾者於腎亦有虛實之異左腎為陰主精右腎為陽主氣精不足氣有餘則聾為虛若瘦而色黑筋骨健壯此精氣俱有餘固藏閉塞是聾為實乃高壽之兆二者皆稟受所致也若耳聾頰黑者為脫精腎憊用安腎八味蓯蓉等丸選而用之若腎經虛火面赤口乾痰盛內熱者六味丸主之此論陰虛者也至於陽虛者亦有耳聾經曰清陽出上竅胃氣者清氣元氣春升之氣同出而異名也今人飲食勞倦脾胃之氣一虛不能上升而下流於腎肝故陽氣閉塞地氣冒昧邪害空竅令人耳目不明此陽虛耳聾須用東垣補中益氣湯主之有因心氣虛實不調虛則不能治其陽下與陰交實則恃陽強而與陰絶經曰至陰虛天氣絶是也宜以補心丸加減主之更有地氣冒昧者或憂愁不解陰氣閉塞不與陽通或內外濕飲痞隔其氣不得升降而耳中亦渾渾淳淳者宜以升陽除濕之劑主之然以陰精陽氣而論則耳目二竅陰精主者陰精主者貴清涼而惡煩熱陽氣主者貴溫暖而惡寒涼潔古老人嘗有是論信乎耳目之不可以溫補也仁齊直指云腎通於耳所主者精精氣調和腎氣充足則耳得聽斯聰矣故能調養得所氣血和平則其聾漸輕若不知自節日就煩勞不禁欲不戒性不戒酒及煿炙厚味雖服藥無效也耳聾門主方驗方鼠膽一枚龍齒硃砂冰片麝香各一分乳香潮腦各五釐研細人乳和丸桐子大外用絲綿包裹塞入耳底塞三日又方全蠍去毒為末酒調滴耳中聞水聲即聰又方小蛇皮要頭尾全一條煅灰冰片麝香各三釐共乳細鵝毛管吹耳內即通加味地黃丸六味地黃湯料加枸杞子當歸身麥門冬各三兩甘菊花白芍藥各二兩柴胡五錢北五味三錢煉蜜丸每早淡鹽湯送下三錢通耳神丹岐天師鼠膽一枚但鼠膽最難得須覓一大鼠先以竹籠養之後以紙為匣子引其藏身內用果品令其自食久之忽然用棒槌擊死立時取膽則膽在肝中否則再不可得乾者可用只消用水調化入藥末中則一樣也龍齒冰片麝香硃砂各一分潮腦乳香各五釐各研絶細末以人乳為丸如桐子大外用絲綿裹之不可太大塞入耳之深處至不可受而止塞三日取出即耳聰永不再聾不必三丸實耳聾亦用此方神效又方孫真人珍珠一粒外用龍骨細末一分蜜調裹在珠外又以辰砂為衣綿裹塞耳中一月後取出再服六味地黃丸一料不再聾耳聾耳鳴黃柏鹽水炒褐色知母去毛酒浸各四兩肉桂二錢煉蜜為丸空心淡鹽湯送下三錢耳聾狗耳根骨一副陰陽瓦焙研當門子一分共乳細末每用分許裝入蔥管尖內有藥一頭用絲綿裹好插入耳竅內但鼻中聞見蔥味其耳即聰耳卒聾閉硫黃雄黃各等分研勻綿裹塞耳數日即聞又方龜尿滴入耳中即聞又方大棗十五枚去核萆麻子一百粒去殼同搗入汁和作鋌每用一鋌塞之覺耳中熱為度一日一易二十日愈耳鳴而聾松香五錢熬化巴豆二十粒去殼研勻蔥汁為丸蓮子大絲綿裹好右聾塞左耳左聾塞右耳如兩耳聾次第塞一日一易效如神一方加椒目又方川黃柏去皮八兩乳拌曬乾再用鹽水炒褐色磨細末水和丸桐子大每服百丸空心鹽湯下氣道閉塞兩耳聾甘遂削成棗核大綿裹塞耳即以甘草含口中咽汁數次即通耳聾沈四明白蒺藜炒搗去刺為末蜜丸空心白湯送下三錢耳聾灸法蒼朮一塊長七寸將一頭削平一頭削尖以尖頭插入耳內在平頭上安箸頭大艾炷灸之輕者七壯重者倍之覺耳中有熱氣為效治腎虛耳聾十年者兩服可愈小蠍四十九個生薑如蠍大四十九片同炒姜干為度揀去生薑將蠍研末溫酒調服至一二更時再進一服至醉不妨次日耳中如笙簧聲即效或用全蠍去毒單研末酒服亦效耳聾生蔥白塞兩耳內頻換又方生麻油日滴三五次候耳中塞出即愈耳聾諸藥不效惟靜坐閉氣一口捏住鼻頭若早晚如此一月氣行即通又方葉天士生甘草三分連翹牛蒡子桔梗羚羊角鎊苦丁茶廣産梗如荷梗有絲滑石飛各一錢乾荷葉去心用邊要當年者二錢作一劑水煎食後服固本聰耳丸治心腎不足諸虛耳聾熟地焙四兩柏子仁焙去油人參焙白茯神人乳拌遠志肉甘草制各一兩五味子七錢山藥炒黃二兩石菖蒲蜜酒拌焙五錢為末蜜丸早晚食前食遠白湯送下各服三錢通氣散治暴怒氣閉腫脹茴香石菖蒲人參延胡索陳皮廣木香各一錢羌活白殭蠶川芎蟬蛻各五錢甘草一錢五分穿山甲二錢為末酒調服二錢耳聾青麻扎好做枕頭睡久而自聰又方藤枕或竹枕放烏龜一個於內夜間枕之久而即聰耳鳴門主論馮魯瞻曰陰虛耳鳴其候手足心熱口渴腸燥兩尺脈大時或作癢耳聾及鳴治當滋陰疏肝為主錦囊又曰因痰耳鳴其候氣壅口燥不痛耳癢體重脈弦耳鳴聤耳者是也所主在二陳竹瀝之類陳實功曰心腎不交心勞則火上炎氣結則不下降蓋腎開竅於耳故心火乘之遂有耳鳴耳閉之患矣正宗岐天師曰耳中聞螞蟻戰鬥之聲音此非祟症乃腎水耗盡又加怒氣傷肝所致宜止喧丹主之方中純是補腎平肝之聖藥飲之數日其戰鬥之聲漸遠服一月即愈此乃奇病而以伯道之方治之也祕録經曰腎開竅於耳夫腎之為臟水臟也天一生水故有生之初先生二腎而一陰藏焉又有相火存乎命門之中每挾君火之勢而侮所不勝經所謂一水不能勝二火也況又嗜欲無節勞役過度或中年之後大病之餘腎水枯涸陰火上炎故耳癢耳鳴無日不作也經曰陽氣萬物盛上而躍故耳作鳴也是以鳴甚如蟬或左或右或時閉塞然有作為虛治而不效者何也此有痰火上升鬱於耳中故為鳴郁甚則壅閉矣凡遇此疾若平昔飲酒厚味上焦素有痰火者只作清痰降火治之多因先有痰火在上又感惱怒而得怒則氣上少陽之火生於耳也若是腎虛而鳴者亦是膀胱相火上升故鳴必不甚其人必多欲當兼見勞怯之症馮氏曰人身有九竅陽竅七耳目口鼻是也陰竅二前後二陰是也陽氣走上竅若下入陰位則有瀉泄腹鳴之候陰氣走下竅若上入陽位則有窒塞耳鳴之候高年之人腎水已竭真火易露故腎水之氣易出難收浮越上竅竅內有聲如蛙鼓蟻聲是以外入之聲與內聲相混聽之不清至年邁無氣內竭不能上通而聽斯失聰矣非若少壯之人濁陰遮蔽其竅外聲不得內入故用麝香菖蒲開氣導達為事也故治高年逆上之氣全以磁石為主取其重能達下性主下吸兼用地黃龜膠群陰之藥佐之更助五味子山萸之酸收之令陰氣自旺於本宮而不上觸於陽竅由是空曠無礙耳之受聲猶谷之受響故耳之妙用全在虛而能受也經曰耳黑枯燥者是腎憊錦囊陳遠公曰人有耳疼雖愈而耳鳴如故者人以為風火也仍用祛風散火而鳴益甚以手按耳則鳴少息此陽虛氣塞也法宜補陽為主兼理肝腎之虛用發陽通陰湯以治之人參白朮當歸白芥子各二錢茯苓黃耆白芍各三錢熟地五錢柴胡一錢肉桂甘草各五分黑荊芥一錢水煎服一劑輕二劑愈十全大補也冰鑑又曰人有平居無事忽耳聞風雨鼓角之響人以為腎火盛也誰知心火亢極乎凡人心腎交始能下上清寧以司視聽心腎不交皆能使聽聞之亂然腎欲交心心必能受心欲交腎腎必能受始相安也倘腎火大旺心必畏腎之炎不敢下交於腎矣均能使兩耳之鳴但心不交於腎者耳鳴輕腎不交於心者耳鳴重今聞風雨鼓角耳鳴之重也治法欲腎氣之歸於心必使心氣仍歸於腎用兩歸湯主之麥冬熟地各一兩丹參茯神各三錢生棗仁五錢黃連二錢水煎服二劑鳴止四劑不發也此涼心之劑心涼則腎不畏心之熱藥與來歸不必兩相引而合也全是益心滋腎之品不但心無過燥之虞而腎且有大潤之藥如夫婦之同心有魚水之歡又何有乖離之戚也哉申鬥垣曰蟬鳴乃肝膽之火也宜龍膽瀉肝湯主之啓玄耳鳴門主方耳鳴通氣法猴薑汁八錢地黃汁五錢白薑汁三匙和勻隔湯煮滾四朝服完又方黃柏半斤乳浸曬乾炒褐色研細酒糊丸桐子大每早晚白湯送下三錢止喧丹岐天師熟地生芍藥山茱萸各三兩柴胡黑山梔白芥子各三錢麥門冬去心一兩水煎服耳閉石斛五錢荔枝三十個連殼肉核水煎服又方新荷葉為末裝枕枕之又方甘遂為末包塞耳內口含甘草靜臥自通又方生地黃水煮四兩遠志肉甘草湯泡焙石菖蒲焙各八錢菟絲子揀淨炒生白芍白茯神炒各二兩益智仁鹽水拌炒五錢酸棗仁炒三兩當歸身酒炒二兩乾薑炭江西者三錢研細末煉蜜丸清晨淡鹽湯送下三錢氣壅頭目不清耳常重聽白殭蠶炒廣木香各五分荊芥穗防風各五錢黃連炒片黃芩酒炒各三錢川芎羌活各一錢干菊花木通各七分石菖蒲甘草各一錢五分上為末每服二錢食後茶清調服耳根毒門主論王肯堂曰耳根毒在耳根結核狀如痰核按之不動而微痛屬足少陽膽經兼三焦風熱所致準繩胡公弼曰耳根毒受在心腎怒氣傷心流滯肝經風熱壅聚而成也青囊馮魯瞻曰耳根及牙床腫痛者屬上焦風熱陽明少陽二經受病也當用清胃辛涼而散之實熱甚者酒蒸大黃微利之錦囊心法曰耳根毒生耳垂後偏上縫中首疽門主論申鬥垣曰首疽生於耳傍瘈脈翳風二穴乃手少陽三焦經多氣少血憎寒壯熱發渴七八日可刺膿水黃白色可治如黑稀水發渴及兩左右雙疽者死此毒之甚者也啓玄杼疽門主論鬼遺方曰杼疽發發中須內及兩耳不穴十五日死可刺其膿色黑如豆豉或見血者死王肯堂曰杼疽生頸上兩耳後初不甚腫但痛癢不時而出清水漸漸長大如玳瑁斑點者是也亦名化骨瘡若過時潰爛日久出骨者大惡之證此證多生於積鬱之人七惡多見犯禁者不治準繩申鬥垣曰杼疽乃手少陽三焦經多氣少血生於耳下天牖翳風二穴之旁六七日可刺若對臍有瘡初出不腫俱有燎漿泡漸長大蝕肉潰膿先從腳後跟如玳瑁斑點名曰羡瘡又名化骨瘡有骨出乃肺敗也甚惡啓玄月蝕疳瘡門主論王肯堂曰月蝕疳瘡生小兒耳竅之旁雖曰指月而生恐未必然大抵風濕熱毒成疳耳準繩馮魯瞻曰若風濕相搏則生耳瘡更有以手指月遂使兩耳之後生瘡者名曰月蝕瘡及凍耳蟲傷撥損之類外因者並從外治錦囊周文採曰月蝕瘡生於兩耳鼻面爛及下部諸竅浸入筋絡月中則瘡盛月末則瘡衰以其隨月盈虧故名集驗心法曰月蝕瘡又名旋耳瘡生於耳後縫間延及耳折上下如刀裂之狀色紅時流津黃水由膽脾濕熱所致月蝕疳瘡門主方耳朵後生瘡名曰月蝕瘡黃連枯礬胡粉蛇床子各等分研細乾摻又方啓玄黃丹煅赤枯礬真粉各一錢冰片五釐研細乾摻或唾調搽又方黃連枯礬研細乾摻或油調搽耳內外惡瘡及頭瘡口邊肥瘡干馬齒莧一兩黃柏五錢共為細末每用小豆大許綿裹塞耳中外仍敷之耳邊生瘡黃丹一錢松香八分研勻香油調搽月蝕瘡輕粉隔紙炒穿山甲炙黃丹鉛粉各等分研細香油調搽髭鬚門主論馮魯瞻曰須屬腎稟水氣故下生陰虛陽盛則須白而有光發屬心稟火氣故上生勞心過度則火上炎而血耗故發白而早落所屬雖殊然烏須黑髮無出乎滋補精血二者而已錦囊靈樞曰足陽明之脈血氣盛髯美長血少氣多則髯短氣少血多則髯少血氣皆少則無髯也又曰衝脈任脈皆起於胞中為經絡之海別而絡於口血氣盛則充膚熱肉血獨盛則淡滲皮膚生毫毛婦人有餘於氣不足於血以其數脫血也故衝任之脈不榮口唇而須不生宦者去其宗筋則傷其衝脈血瀉不復皮膚內結唇口不榮故須不生其有天宦者天生陽氣不舉不能御婦未嘗被傷不脫於血然其須不生何也曰此天之所不足也其任沖不盛宗筋不成有氣無血唇口不榮故須亦不生由此觀之唇口不獨脾胃也髭鬚門主方黑鬚散烏鬚髮官粉真蛤粉黃丹密陀僧石灰各等分研勻水調搽上俟干水洗去藥用核桃油潤之烏須神方好京墨三錢研末麝香三分生漆一斤去渣雌雄蟹一對重八兩霜降後者佳對臍扎好先將京墨麝香入瓷瓶內次將蟹投入又將生膝傾入瓶內封固入人行處土中深理尺許七七四十九日取起麻布去渣取貯瓷瓶中凡用筆塗上將指頭套魚胞捏勻恐染指上難褪又方枯白礬訶子皮硇砂細辛各三分五倍子焙黑色青綿布包裹腳跟踏成餅子三錢紅銅末銀罐內煅成灰六分各為細末對和一處次用石榴皮一個烏梅肉三個細茶一撮水二盞煎七分去渣用磁盞盛將前藥末汁納放鍋內重湯煮藥至皺面起為度晚間用抿子蘸藥刷上次早溫水洗淨鬚髮如漆七仙丹乃補心腎駐容顏黑髭鬚之聖藥天門冬去心麥門冬去心人參去蘆熟地黃酒洗生地黃酒洗小茴炒黃色秋冬用白茯苓去皮春夏用各二兩何首烏甜瓜瓣者九蒸九曬四兩為細末蜜丸彈子大每服一丸嚼爛好黃酒送下或鹽湯下或丸如桐子大每服五十丸空心酒送下忌三白蔥蒜蘿蔔是也房事合時忌犯鐵器烏須一月兩烏永不見白五倍子炒過一兩青鹽炒膽礬明礬各一錢銅青二錢飛面五分上用粗六安茶煎濃調稠重湯燉至起泡刷須上干則洗去烏須汗巾蓽澄茄三兩大黃四兩旱蓮草二兩遼細辛沒石子黑蜀葵花陰乾各一兩黑鉛半斤化開投水銀一兩待冷定用白綾三尺將前藥並包一處好米醋五斤入砂鍋內煮乾為度取出用青布包綾陰乾做成汗巾或二三條常放袖中要占人氣方妙不拘時擦須半年一換其須永不白所煮之鉛打成小梳梳須甚妙或用後方亦效五倍子不拘多少為末入銅鍋內炒青煙盡白煙起用潮濕青布一塊鋪地上將炒倍子傾入包住以腳踹成餅復研細每用末五錢銅末入銅鍋炒紅醋淬三次一錢八分白芨六分沒石子青鹽白礬食鹽各九分同合一處研細量須多少用燒酒調塗又方桑椹子人家園內或空地上者佳如墳上栽者不可用蛤蟆子桑椹十個蛤蟆子亦用十個彼此相等共入缸中埋土地下百日俱化為水入好京墨浸化搽須擦牙烏須青鹽破故紙炒槐角子熟地酒浸三日炒地骨皮各一兩百藥煎沒石子各一錢北細辛二錢共研細每早擦牙咽下不可一日間斷每月擦時摘去白鬚再生必黑永不再白烏須蛤蟆烏不拘多少洗淨入小瓶內加麝香一分扎頭埋淨地下四十九日取出以手蘸水捻鬚梢其黑自上又方上好墨以龜尿磨濃用小抿子將須掀起緩緩塗之不可近肉亦不可用手搽搽則墨色入骨難褪龍泉疽虎鬚毒門主論正宗曰龍泉疽生人中之中虎鬚毒生地角之上此二毒乃腎督二脈分合行布驟被外邪所搏而成初起疙瘩次生腫痛漸發寒熱甚者噁心乾嘔吐項俱腫又曰此證多生於元氣壯實者故多不必服藥自愈又曰初起宜線針挑破患頂以蟾酥餅貼膏蓋使毒有門而泄四邊焮腫如意金黃散敷之又曰此穴忌灸鬼遺方云鼻下一處人中兩處為發髭此患多因摘髭外風侵入而結攻作不常寒熱並作此亦害人王肯堂曰髭毒癰生於地角屬足陽明風熱所致若撼之有根肌肉不仁或麻或癢寒熱大作煩悶嘔逆者髭疔也準繩申鬥垣曰髭毒乃風邪積熱脾經受證須毒髯毒皆屬手陽明大腸經受證啓玄心法曰龍泉疽生水溝穴即人中虎鬚毒一名虎髭毒亦名頦癰腫痛焮赤速潰易治又名承漿疽堅硬腫痛遲潰難治皆由過食炙煿以至胃腎二經積熱上攻任脈而成羊須疔門主論申鬥垣曰羊須疔乃怒氣交感流注經絡心經受證初起根深形如粟米小豆三四日面目浮腫五六日寒熱交作七八日體倦頭痛如添嘔逆神昏氣喘十無一活生於下頦須中是也初起同疔瘡門施治啓玄獨骨瘡門主論申鬥垣曰大人小兒頤頦生瘡津淫不止名曰獨骨瘡宜百合散治之啓玄獨骨瘡門主方百合散啓玄百合黃柏各一兩白芨三分輕粉五分萆麻仁五十粒共為細末搽之如干用朴硝水和作餅貼之頦癰門主論王肯堂曰頦癰又名承漿癰生地角下屬足陽明胃經積熱所致準繩竇漢卿曰頦上癰不為風頦下癰要成漏不可輕視全書頰車癰門主論申鬥垣曰頰車穴在耳下三分下頦軸動之處便是其生癰也乃怒傷於心停滯於肝風熱壅盛聚於頰車而生久多成漏啓玄又曰頦毒癰生於頰之下乃心腎經絡怒氣傷於心流滯血分風熱壅盛結聚而成頦上屬風熱頦下防成漏瘡不可輕忽竇漢卿曰頰疽皆出於附骨亦名附骨疽若不速治漸銼其骨久則成漏難愈全書
