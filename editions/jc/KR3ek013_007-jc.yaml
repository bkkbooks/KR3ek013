body:
  text: 卷七論初起腫瘍澄曰初起腫瘍者乃癰疽惡毒始發壅腫七日之內未成膿者目曰腫瘍施治之早僅可內消十之六七縱不能全消亦可移深居淺轉重就輕但不可驟用寒涼敷藥冰凝肌肉更勿輕投苦寒丸劑凝滯氣血遏郁毒氣便難消散若已八九朝內膿已成治無消法若勉強消之不獨不能消散反致氣血受虧根腳散漫內膿不能外泄膿汁清稀所以消腫瘍之法貴乎早也論內消法王肯堂曰癰疽之證發無定處欲令內消於初起紅腫結聚之際施行氣活血解毒消腫之藥是也當審淺深大小經絡處所形脈虛實如發於腦背腰項臀腨者乃太陽經也宜黃連羌活背連脅處為近少陽宜柴胡並宜敗毒散仙方活命飲形實脈實者宜漏蘆湯內疏黃連湯追毒丸疏利之氣虛者參耆為主血虛者歸芎為主佐以消毒之藥隨分野以引經藥行至病所六經分野上有癰疽其五經各隨本經標本寒溫氣血多少以行補瀉惟少陽一經雖曰氣多血少而氣血皆不足也治與氣虛血虛同法凡栝蔞射干穿山甲金銀花夏枯草蟾酥連翹地丁鼠黏子木鱉子之類為內消之藥仙方活命飲內消丸柞木飲子牛膠飲子車轍散返魂丹消毒飲為內消之方眾皆知之殊不知補瀉虛實平治寒溫使氣血各得其常則可內消也其外用紫葛湯淋洗及用散塗膏貼者亦使氣血和平而腫消熱退也李東垣曰夫癰疽丹腫之生皆由陰陽不調營衛凝澀氣血不流之所生也古人有言曰陽滯於陰則生瘡陰滯於陽則生疽瘡疽之生有內有外內生於臟腑胸腹之中外生於膚肉筋骨之表發無定處夫鬱滯之本則因氣血不流蒸氣不能外達留滯而成內熱瘡疽所生焉若初覺氣血鬱滯皮肉結聚腫而不潰時可疏滌風熱通利臟腑一二行後徐次用諸湯溻漬即得內消矣不然則治之稍慢毒熱不散反攻其內致令膿血之聚也內經謂治病必求於本蓋瘡疽本乎中熱之鬱結不通也其風邪寒氣所聚也治之宜溫熱之劑和血令內消也辨之有法須認風寒則腫硬色白熱毒則焮腫色赤以為異也如有氣已結聚不可用內消之法宜用排膿托毒之藥此皆先後之次也又曰消者滅也滅其形證也經曰諸痛癢瘡瘍皆屬心火火者離卦也離者外陽而內陰內陰壅滯必然外攻治當內消使絕其源而清其內不令外發故云內消乃初起微覺之時即以湯液丸散內服外敷疏其源絕其毒即時消散如形證已成不用此法也程山齡曰內消者腫毒初起即用藥消散也凡病癰疽發背對口疔毒其初起憎寒壯熱有似傷寒而痛偏著一處飲食如常者蓄積有膿也當初起時膿尚未成不過氣血乖違逆於肉理耳外敷遠志膏或金黃如意散鐵箍散或貼普救萬全膏內服銀花甘草湯或內消散即時消散若系疔瘡即宜刺破或艾灸腫處上搽蟾酥餅貼以萬全膏內服菊花甘草湯隨即平伏菊花連根帶葉皆治疔瘡之聖藥也其中亦有挾風寒而發者又宜先用荊防散或芎芷香蘇飲冬月萬靈丹以散之隨服銀花菊花等藥即可內消務須及早下手不可遲滯十法癰疽腫瘍門主方內消散正宗金銀花知母穿山甲半夏大貝母乳香去油天花粉白芨皂角針各一錢酒水同煎熱服取汗渣加秋芙蓉葉二兩搗敷患上留頂透氣立消散生地龍膽草柴胡防風荊芥穗槐花青木香各等分升麻上部加牛膝下部加酒水同煎熱服取汗輕可立消重者二劑如已成將潰禁服銀花甘草湯十法一切惡毒肺癰初起立消誠外科捷法鮮金銀花五兩甘草節一兩作一劑入砂鍋內水二碗煎一半加無灰酒一大碗略煎數沸分作三服一日夜服完重者二劑服至大小便利則藥力到矣如下部加牛膝外用生金銀花搗爛敷四圍中留一孔透氣沈內翰云金銀花乾者終不及鮮者力大而效速四妙湯即神效托裡散說約此瘍科首用捷法功效立奏增減活法醫者臨證酌用生黃耆五錢大當歸金銀花各一兩甘草節二錢水煎晝夜服盡自可移深居淺轉重作輕如已成氣血素虧不能穿潰者加白芷皂針山甲各二錢一伏時自潰如已潰後即宜刪去皂針山甲如初起焮痛口渴加天花粉此治癰疽發背腸癰之神方也澄自幼及今數十年來凡治一切癰疽皆賴此方遇大證金銀花每加至六兩四兩黃耆加至兩許當歸加至二兩甘草節加至三錢但見瘡色不起膿水清稀即加肉桂轉陰為陽化毒成膿如乳癰乳吹即加蒲公英一兩立消百發百中萬穩萬當大毒惡瘡初起即消已成自潰廣陳皮二錢五分白芷當歸尾乳香去油甘草節沒藥去油天花粉防風川貝母去心赤芍穿山甲皂針各一錢連翹肉桂各八分酒水同煎熱服取汗忌犯鐵器孕婦忌服槐花酒彭辛菴用此方三十年無不見效初起大毒焮腫服之內消槐花四兩入砂鍋內炒黃乘熱入酒二碗煎十餘沸濾去渣熱服取汗如未消再服取效活血調氣湯專主消毒散瘀荊芥天花粉防風赤芍陳皮各一錢二分甘草節八分川貝母去心金銀花白芷當歸尾各二錢水煎服背上及冬月加羌活內熱及夏月加連翹山梔消腫加牛蒡子穿山甲痛甚加乳香沒藥小便澀加木通泄瀉加蒼朮消無名大毒陳琉璃砥炙黃存性研極細輕者三錢重者五錢無灰酒沖服取汗忌風神援衛生湯正宗解毒消腫清熱活血止痛白芷天花粉連翹各八分牛蒡子荊芥甘草節各一錢乳香去油沒藥去油防風各五分金銀花三錢當歸尾川貝母各一錢五分水煎服若大便秘結熱甚者加大黃酒炒一二錢芎芷香蘇散十法凡毒初起多有挾風寒而發者宜先用此藥川芎紫蘇赤芍陳皮荊芥香附秦艽白芷甘草引加蔥頭二寸水煎服傷食加山楂肉麥芽蘿蔔子真人活命飲治初起癰疽發背一切腫毒疔瘡惡證金銀花白芷天花粉陳皮穿山甲防風甘草節當歸皂角刺赤芍川貝母各五錢其毒在背以皂角刺為君加紫花地丁其毒在胸加栝蔞仁三錢其毒在腹以白芷為君其毒在四肢以金銀花為君如疔瘡加草紫河車上㕮咀每服用無灰酒十茶盅如毒小各減半用有嘴瓶裝厚紙蓋口勿令泄氣煎至五盅去渣作三五服接連頻服渣再煎此藥宜無灰酒不可用酸薄酒莫犯鐵器服後側臥睡一覺定有回生之意神功浩大之至內消大毒蘇木槌碎煎酒服內消槐花一兩炒深黑核桃十個連殼燒黑去殼取肉研細和酒服取汗自消消毒聖神湯岐天師金銀花四兩天花粉五錢蒲公英當歸生甘草各三錢水煎服一劑即消二劑全愈不必三劑蓋金銀花專能內消瘡毒然非多用則力輕難以成功生甘草一味已足解毒況又用之於金銀花內亦足以散邪而衛正蒲公英陽明經藥也且能散結逐邪天花粉消痰聖藥當歸活血是以專功血不活所以生癰今血活而癰自愈此方之所以奇而肆也孫真人初起立消金銀花三兩白礬一兩水煎服一劑即消發背亦然雷公消癰疽當歸一兩天花粉三錢附子一片生甘草元參各五錢金銀花三兩白礬一錢水煎服初起一劑即消腫者二劑必消華佗真君消癰疽金銀花三兩當歸一兩天花粉五錢蒲公英生甘草各三錢水煎服孫真人統治諸癰金銀花一兩蒲公英五錢天花粉三錢甘草一錢水煎服一劑輕二劑全愈此方消毒實有奇功內消方金銀花四兩甘草二兩蒲公英一兩元參五錢當歸一兩水煎服一劑即消華真君消頭面瘡疽當歸一兩金銀花二兩黃芩一錢蒲公英桔梗各三錢生甘草川芎各五錢水煎服一劑輕二劑全消不必三劑華真君消癰萬全湯治身上手足之瘡疽金銀花三兩當歸一兩牛蒡子二錢蒲公英生甘草各三錢天花粉五錢芙蓉葉七片無葉時用梗三錢水煎服一劑即消二劑全愈岐天師消癰消中部癰疽當歸金銀花白芍元參各一兩甘草五錢荊芥梔子各三錢白芥子白礬連翹各二錢水煎服一服知二劑全消破潰者四劑愈如陰疽去梔子加肉桂一錢張仲景統治癰疽當歸蒲公英甘草各一兩金銀花二兩乳香去油黃芩各一錢水五碗煎一碗調乳香末服之化癰湯雷真君金銀花五兩元參三兩當歸二兩荊芥白芥子各三錢肉桂三分水煎服雷真君消癰方癰疽發背或生於頭項或生於胸腹或生於手足臂腿腰臍之間前陰糞門之際肺癰大小腸癰毋論陰毒陽毒初起一服立消已潰者即斂金銀花四兩當歸二兩蒲公英元參各一兩水五碗煎八分飢服一劑盡化為無有矣切勿嫌其藥料之重減去分兩則功亦減半矣此方既善攻散諸毒又不耗損真氣可多服久服俱無礙岐天師消癰湯金銀花當歸蒲公英各一兩荊芥連翹各一錢生甘草各一兩水煎服一劑輕二劑消三劑愈天下第一消發背方紫花地丁金銀花川連酒製黃花地丁槐花各一兩分四劑水煎服隨用溫水洗四肢取微汗後毒氣下行四肢生小瘡而發背自消威靈仙散消初起腫毒惡瘡貝母威靈仙知母炒各一兩蟾酥五釐研細酒調空心服三錢每日二服以消為度二仙丹消初起發背穿山甲七片牛皮膠四兩同放新瓦上燒存性研細好酒調下任量飲醉出汗為度初起腫毒錢青掄全當歸八錢生黃耆金銀花各五錢甘草節一錢八分水煎服立消上部加白芷中部加杜仲下部加牛膝各一錢八分乳癰加橘葉五十片消壯盛人腫毒李飛霄穿山甲土炒研何首烏切各二兩牛膝一兩作一劑酒水同煎服立消癰疽發背歌訣古方真人妙訣世間稀一切癰疽皆可醫化血就如湯潑雪消膿立效肉生肌任他發背臁瘡毒那怕疔瘡瘰癧兒假饒疥癩並風癬乳疽五背盡消除金銀花在四肢倍加白芷在腹脅倍加甘草節防風沒藥去油赤芍陳皮各三錢當歸一錢五分乳香去油川貝母沉香各一錢廣木香八分穿山甲蛤粉炒黃去粉皂角刺挫碎鉛粉八錢同炒黃去粉各五錢上藥將乳香穿山甲另研細末分作四包其餘藥分四劑河水二盅煎七分加好酒半盅調乳香穿山甲末上部飽服下部空心服消大毒周鶴仙金銀花二兩廣膠一兩全當歸一枚要一兩重者木通五錢甘草節二錢用無灰酒不拘多少鍋內煎上部飽服下部空心服服後儘量飲醉蓋暖取汗即消神速無比初起立消周鶴仙大栝蔞一個頂上切去一片將子挖盡裝入婦人梳下油膩亂髮一大團再入明礬三錢以滿為度仍將切下一片蓋口周身將黃泥封裹新瓦上微火煅過去泥將存性栝蔞研為細末作一服黃酒調服未潰者必消將潰即出膿收口重者三服必驗內消蟹殼患小用一殼患大用二殼瓦上炙脆研細臨睡時黃酒沖服立馬消劉秘川斑蝥大者是川產者佳去翅足糯米拌炒全蠍尾各一百五十個蜈蚣三十條乳香去油沒藥去油各四錢真蟾酥三錢酒浸研膏冰片麝香各二錢上為細末用麻黃四兩熬膏為丸如桐子大硃砂為衣略曬乾瓷瓶密貯凡遇發背癰疽腫毒每用一丸如勢大者用二三丸乳細摻於太乙膏如瘡未破貼上以熱手摸百餘下次日即消如瘡已破先以薄棉紙蓋瘡上再貼奏功蒼龍丸劉秘消諸般大毒蒼龍三百條硃砂明礬明雄各三錢蟾酥酒化硼砂各一錢乳細麵糊丸如桐子大每服七丸九丸十一丸酒水任下取汗自消追毒丸方汝聖青竹蛇防風穿山甲炮羌活豬牙皂各三錢全蠍二對當門子蟾酥各三分瓜兒竭乳香去油孩兒茶沒藥去油明雄黃白砒肉制大硃砂茜草雷公藤各五分甘草當歸尾各八分蜈蚣三條金銀花五錢共乳極細末凡一切癰疽大毒大人每服三分至五分止小兒一分至二三分止無灰酒調服令醉自消消癰疽癤毒並天疱楊梅等瘡香油一斤入水半盅熬至油耗白煙起住火以瓷瓶收貯每早晚用熟油一盅將無灰酒一盅和勻溫服七日除根消毒湯一名紫花地丁散甘草一錢金銀花紫花地丁去蘆大黃酒浸炒當歸黃耆赤芍各五錢一方加升麻為末作二劑