苦膏貼癰疽初起即消已成即潰已潰即斂實有消腫定痛之效須擇吉期虔誠修合生薑大蒜頭槐枝向陽者各一斤蔥白半斤花椒去目二兩黃丹水飛淨二斤麻油四斤文武火熬枯濾去渣再熱以桃柳枝不住手攪至滴水成珠再下飛丹攪勻候冷取起攤貼紅膏藥貼左癱右瘓筋骨疼痛漏肩風跌打損傷松香五斤童便內浸三個月取出曬乾如不能三個月可將松香熔化傾入童便內取出又熔化傾童便內如此九次再換水煮過用之第一次用蔥十斤取汁三碗入鍋內將松香化開入麻油四兩攪勻傾入水盆內以手扯拔取起第二次用生薑十斤取汁三碗入鍋內將松香化開入麻油二兩攪勻傾入水盆內以手扯拔取起第三次用綠豆一升煮汁三碗入鍋內將松香化開入麻油二兩攪勻傾入水盆內以手扯拔取起第四次用火酒一斤入鍋內將松香化開入麻油二兩攪勻傾入水盆內以手扯拔取起第五次用好醋一斤入鍋內將松香化開入麻油二兩攪勻傾入水盆內以手扯拔取起第六次用蒼朮鬧羊花川烏草烏光烏天南星半夏各二兩水二十碗煎汁五六碗入鍋內將松香化開入麻油四兩攪勻傾入水盆內以手扯拔取起第七次復將松香入淨鍋內熔化候各汁收干為度然後下自煅礬紅細末四兩攪勻成膏入缽封固攤貼千槌膏貼癰疽疔毒初起即消如治瘰癧連根拔出小兒鱔拱頭臁瘡久不收口嫩松香四兩巴豆仁五粒萆麻仁七錢杏仁去皮乳香去油沒藥去油銅綠各一錢共入石臼內搗二千餘下即成膏矣取起浸清水中用時隨瘡大小用手捻成薄片貼瘡上以絹蓋之紫金膏貼寒濕氣漏肩風諸般疼痛立止白芷六錢鬧羊花三奈大茴香青皮草烏川烏威靈仙甘松小茴香大黃獨活各七錢乾蟾一個亂頭髮三兩麻油四十兩同藥入鍋熬至發化滴水成珠再下密陀僧研細十一兩收成膏再下松香蔥汁薑汁鳳仙花汁各煮一次研細五兩入膏化盡攪勻傾在缽內重湯燉化再下潮腦七錢青黛桂皮各六錢丁香雄黃各五錢輕粉四錢血竭乳香去油沒藥去油兒茶各三錢三分滑石三錢龍骨二錢五分麝香冰片各五分攪入和勻收貯攤宜攤厚些貼立刻止痛瘡腫風濕筋痛膏藥濟生桐油八兩嫩松香白者一斤西朱上好者研黃丹飛炒各四兩蔥汁薑汁各一茶盅乳香去油研沒藥去油研各一兩百草霜一升五合篩先煎桐油四五滾下松香又十數滾下蔥薑汁再三五滾下西朱再四五滾下黃丹離火再下乳沒再下百草霜攪勻收藏任攤貼萬應膏貼內外諸證好松香十斤蔥汁生薑汁各二斤黃柏生大黃甘草苦參各二兩蒼朮一兩同入鍋內熬至水氣升盡再入真麻油三斤熬至滴少許入水中約看凝片不散即是火候已到但須不時以竹片攪之免其巴底隨用麻布一方過入水中又用大缸一隻貯水大半缸臨傾膏時將缸周圍潑濕免得膏滋黏缸膏既入缸再取起捏去水頭復入淨鍋內熬化加乳香去油研沒藥去油研各六兩黃蠟八兩熬化撤去火再入百草霜篩細四五兩均勻篩入攪勻另用麻布一方濾入水內扯捏成團平日浸水內臨用時取起攤貼如火候太老量加麻油少許可也紅玉膏拔毒去膿蛇蛻蜈蚣各一條頭髮洗去油垢黃蠟各二兩香油四兩同熬濾清用黃丹收膏再下黃蠟熔化攤貼黃金膏拔毒生肌豬板油四兩乳香去油沒藥去油各二錢熬枯去渣加黃蠟白蠟各一兩熔化再下黃柏細末五錢攪勻候冷加冰片一錢成膏攤貼五枝膏貼瘡毒兼治瘋氣痛桃枝柳枝槐枝桑枝棗枝各十寸銀硃四兩麻油二十四兩將上藥熬枯濾清再熬至滴水成珠為度以黃丹收之攤貼患處如作癢起泡即可揭去凡已潰者切不可貼槐枝膏貼瘡癤槐枝取二三寸長三百六十段真麻油三斤入銅鍋內熬至枝枯黑為度用夏布濾去渣再入淨鍋內熬至滴水成珠入密陀僧細末半斤攪勻再入龍骨煅象皮砂炒成珠血餘乳香去油沒藥去油赤石脂各五錢研細攪勻務須老嫩得宜收貯攤貼阡張膏腫毒已潰者貼之長肉萆麻仁八錢大黃紅花白芷木鱉仁生地當歸各三錢黃柏甘草牡丹皮赤芍藥黃芩全蠍蟬蛻防風穿山甲白殭蠶獨活乳香去油沒藥去油肉桂川黃連元參各二錢共炒黑色用真麻油八兩浸三日入鍋內熬百沸用大阡張紙放油內提透鋪地上出火毒隨瘡大小剪貼如楊梅瘡加活蜈蚣二條同熬丹油膏畢勵廷真麻仁一斤桃枝柳枝各四尺九寸浸七日入鍋內熬至滴水成珠濾去渣兌入飛過血丹八兩收成膏貼一切瘡癤丹油膏桐油一斤放鍋內略滾片時不待白沫盡即下飛過炒黃丹五兩細細篩下候黑色即成膏矣貼一切瘡毒制黃丹法黃丹炒紫色傾入缸內用滾水一桶泡之再汲涼水滿缸浸一夜去水曬乾再炒如法再製一次務令曬乾研極細收貯留為熬一切膏藥之用
