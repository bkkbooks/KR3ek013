修合每服一丸生薑蜜水磨下並水浸研敷患之處飛龍奪命丹正宗治惡疽發背不痛或麻木或嘔吐昏憒蝸牛二十個另研蟾酥乳香去油銅綠輕粉膽礬沒藥去油血竭硃砂各一錢明礬雄黃各一錢冰片麝香各三分研細將研爛蝸牛和丸如綠豆大如丸不就入些酒糊丸每服七丸或九丸或十一丸用蔥白三五寸病人自嚼吐於男左女右掌中包藥在內用暖酒和蔥送下如人行五里汗出為度無汗再用蔥研爛裹藥服之此外科之聖藥也蟾酥丸諸惡瘡服之微汗即消雄黃乳香去油各一錢蟾酥一分用黃酒打麵糊丸綠豆大每服三丸用蔥白湯下不愈再一服忍冬圓集驗療渴疾即愈之後須防發癰疽此圓大能止渴消毒並治五痔癭瘤等證金銀花根莖花葉俱可用不拘多少入瓶內以無灰好酒浸用糠火煨一宿取出曬乾入甘草少許研為細末以所浸酒打麵糊丸如桐子大每服五十丸至百丸不拘時酒送下十寶丹濟生海蚌二十一個硃砂輕粉寒水石煅雄黃銅綠各二錢血竭蟾酥膽礬各一錢麝香五分研極細酒丸桐子大硃砂為衣大人服七丸小兒三丸先嚼蔥白頭三根吐男左女右手心包藥吞之黃酒送下盡醉被蓋出汗外用萬靈丹點之內服此丸諸毒無不內消此外科之至寶也救諸苦難尤為便捷有志者宜共珍之百效丸金茂存治一切大毒惡瘡無論已潰未潰草烏頭酒浸半日刮去皮切片炒馬前子切薄片炒黃色篩去毛淨全當歸切片酒拌曬乾炒麻黃去節不見火曬脆直殭蠶酒洗炒去絲穿山甲炒去沙各一兩大甘草不見火曬乾研五錢上研細蔥汁熬湯水法為丸如芥子大曬乾瓷瓶密貯高年者五六分中年者七八分少年者三分孕婦忌服凡服俱用蔥汁白湯送下務須避風取汗如出汗後必須次日辰巳時方可起床見風如不遵戒守汗出見風則手足堅硬凡犯此者即用甘草末酒調服即解神仙一醉忍冬湯銀花藤蒲公英各一兩沒藥去油乳香去油雄黃各二錢上藥用酒一瓶封固煮千餘沸再加白蜜四兩生蔥七根再煮數沸去蔥儘量飲醉以大蒜壓之取汗即愈五香追毒丸治一切無名腫毒初起有餘之證疔瘡去毒定痛內消妙法乳香去油血竭巴豆霜老君須母丁香連翹沒藥去油沉香廣木香苦丁香各一錢二分上為末煉蜜為丸如芡實大硃砂為衣每服一丸或二丸空心食前酒送下行二三次後用冷粥補之小蟾酥丸治一切疔瘡腫毒時毒初起發汗蟾酥一分明雄三分蜈蚣一條研細酒糊丸桐子大每服五丸蔥酒送下熱處發汗散之發背腫毒雄黃牛蹄殼洗淨火煅存性研細末酒調服五錢次日服四錢酒調下重者三服全愈輕者或三四錢神效九流疽陰毒仙方蜘蛛一個用銀罐化存性川貝母五錢去心共乳細末分作二三服甜酒調服少刻周身作戰次日依前再服一次其疽毒盡消人若虛弱其藥分三日服恐擔不起初起發背無名腫毒疔瘡桃芽三月採陰乾桑芽三月採陰乾各二錢鐵鏽雄黃蟾酥酒浸化各一錢研細搗丸如紅豆大每用一丸入五寸長蔥頭內濕紙包煨香細嚼熱酒送下出汗自消舌化丹治疔瘡無名腫毒辰砂血竭硼砂乳香去油沒藥去油雄黃蟾酥人乳浸化輕粉冰片麝香各等分共乳細末於淨室中至誠修合勿令婦人雞犬見用頭生乳搗和丸如小麥大每用三丸含舌下噙化嚥下出汗自消如無汗以熱酒催之冷水金丹腫毒惡瘡兼治痰痞老痰翻胃噎食傷寒發汗海浮石飛羅面各三兩乳香去油沒藥去油牛蒡子各一兩冰片麝香各一錢用蟾酥三錢七分五釐酒浸化為丸綠豆大以飛過辰砂五錢為衣輕者冷水送下一丸重者三丸牙痛只用一丸忌雞魚小米一日戒怒郁憂悶氣惱費心力神化丹一名醉消散癰疽疔毒一切無名腫毒初起服之立消雙解表裡疏通經絡以毒攻毒削堅導滯如神黑醜頭末母丁香檳榔何首烏荊芥荊三稜醋炒熟地蓬莪朮醋炒巴豆五靈脂大黃白豆蔻去殼桂枝穿山甲當歸赤芍藥川烏小茴香草烏杏仁炒全蠍去足連翹麻黃甘草桔梗斑蝥雄黃硃砂各三錢乳香去油沒藥去油各二錢麝香五分大蜈蚣一條各乳細末稱准和勻水法為丸如蘿蔔子大硃砂為衣每服三分熱酒吞下盡醉為度被蓋出汗孕婦忌服體虛禁用梅花點舌丹臨濟超真大和尚白梅花陰乾一錢二分冰片犀牛黃蟾酥熊膽各一錢珍珠麝香各六分硃砂硼砂葶藶乳香去油沒藥去油沉香血竭雄黃各二錢上乳細將入乳浸蟾酥熊膽為丸每重三四釐水飛金箔為衣曬二日瓷瓶收貯修合時預為齋戒三日忌雞犬婦人見聞此丹專治對口癰疽發背疔瘡瘰癧乳癤一切無名腫毒每用一丸含於舌底隨舌運動不可停止舌下化去一半時用白酒儘量飲醉出汗如重者先用酒送下二丸再噙化一丸如七歲小兒用酒化服一丸患處不用敷藥膏藥自能生肌長肉收口全愈孕婦忌服一方減硼砂珍珠葶藶血竭熊膽加輕粉蝸牛膽礬銅綠秘授萬靈一粒九轉還丹臨濟超字輩寶聚和尚治一切危急等證真鴉片三兩冬研夏燉看鴉片真偽法真者成塊視之如鴉毛片之色研開加黃泥嗅之如青草味而帶香嚼之如黃連苦此為真者偽者亦成塊綠色或黑色研開亦黑色並不香雖賤無用犀牛黃真麝香各一錢二分去毛百草霜九錢上為細末研勻然後將白米飯二兩四錢研如糊再下前四味再研勻為丸每丸重三釐丸完用硃砂為衣衣完入大封筒內封固放在翻轉腳爐蓋內將包紮好草紙蓋好微微炭火烘三柱香每炷香搖動爐蓋三次三三見九名曰九轉還丹香完移過爐蓋待冷拆封入瓷瓶內聽用凡用此丹大人每服一丸小兒八九歲一丸作二次服四五六七歲一丸作三次服三歲未周一丸作四次服無論大人小兒倘誤多服以濃茶飲之即解孕婦忌服修合時務必三日前齋戒忌婦女雞犬見之湯引開後一傷寒頭痛發