body:
  text: 卷二十胸膺臍腹部自胸膺起至乳房臍腹脅肋止凡一切癰疽疔毒皆匯於此部中以便檢閱參治甘疽門主論靈樞云甘疽發於膺膺胸兩旁高起亦謂之臆色青其狀如谷實瓜藪常苦寒熱急治之去其寒熱不急治十日死死後出膿心法曰此疽生於乳上肉高聳處屬肺經中府穴之下無論左右皆由憂思氣結而成胸發門主論申鬥垣曰胸發發於玉堂穴在紫宮下一寸六分又名玉英膻中一名元兒穴在玉堂下一寸六分兩乳間中庭穴有膻中下一寸六分鳩尾穴在蔽骨之端言其骨垂下如鳩形故名臆前蔽骨下五分人無蔽骨者從岐骨之際下行一寸是也等穴皆任脈之絡名陰脈之海乃人身之子午也急早內托防毒歸心傷膜者死啟玄汪省之曰中庭疽在乳之中央任脈之經理例薛立齋曰胸發生於正胸堂去結喉三寸與心窩不遠乃手足六經交會之所其患最凶喪人性命宜速治若三四日失治則皮開肉裂甚可畏也若使長大百不救一宜用牛黃熊膽研細香油調塗四邊弦上以免開花如痛用乳香沒藥為末鋪粗紙內外以青布片卷好蘸清油點著在瘡四圍照之痛自止矣內服清熱護心祛毒鎮心湯劑若開花穿穴神仙莫救肺疽門主論申鬥垣曰肺疽即天火瘡乃任脈之經當胸而生在紫宮玉堂之穴十日可刺膿水黃白色者可治如無膿漸大旁攻上硬下虛自破流水不絕咳唾引痛者死啟玄膻中疽門主論王肯堂曰膻中疽生心窩上兩乳中間屬任脈經膻中穴蓋膻中為氣之海氣所居焉能分布陰陽若臟腑陰陽不和七情不平則發此證稍遲則潰爛惡證多者難治準繩井疽門主論靈樞云發於胸名曰井疽其狀大如豆三四日起不治下入腹不治七日死矣王肯堂曰心窩生疽初起如黃豆肉色不變名曰井疽又名穿心冷瘻若冷氣攻心精神恍惚嘔吐冷痰惡聞食臭毒氣內陷腹脹滿者不治若心燥如火肌熱如焚不時盜汗唇焦舌乾黃色渴飲冷水者是正候也準繩申鬥垣曰井疽又名心漏疽又名穿心毒最為難治有經年不愈者乃多食生冷死厭之物惡毒積久內犯心包絡故外發於心掩也乃心胃兩經受證治同癰疽法啟玄汪省之曰井疽乃任脈之經在鳩尾穴狀如大豆三四日間若不早治十日必死外發者生內陷者死理例心漏門主論陳遠公曰有胸間生瘡因不慎酒色致成漏竅生數頭流血久則形神困憊腰痛難伸行同傴僂人以為心漏也誰知乃腎虛成漏乎夫心腎本相通也心氣必得腎氣以相生腎氣必得心氣以相閉心漏之成成於腎氣之泄也安可不急治腎氣之衰乎然治腎而心氣不閉則補腎無益蓋有出氣而無止氣耳或云漏瘡多成於濕熱今補腎而不閉心竅則漏不愈閉心竅而不去濕熱只治心腎漏亦不能愈也然漏亦不同漏在他處者可泄其濕熱在胸間者不可泄濕熱也蓋漏既成於腎虛腎虛則寒而非熱也腎虛者腎水虛而非邪火盛也補真陰而邪水自消溫腎寒而濕熱自退耳用溫腎丹鹿茸二具酥炙附子二枚人參青鹽各二兩瓦松二枝紅棗四兩煮棗搗丸每空心酒下三十丸服半月腰疼少減服月餘而漏愈矣冰鑑此方奇在鹿茸既能益腎中之水火更能補心中之缺陷加以附子之辛熱則無經不達引鹿茸直入心腎以填其空竅青鹽者咸以軟堅也漏多孔竅流血必多血得鹽則止也瓦松者消濕熱於無形心漏雖非濕熱然未可少有留存則孔竅難塞故兼用之以防其變又恐氣虛不能運化加參以生氣於心腎之間助茸附之力通達上下尤易成功也馮魯瞻曰胸前有一孔常出血水名曰心漏用嫩鹿茸去毛酥炙附子炮去皮臍鹽化共為細末棗肉為丸每服三十丸空心酒下兼治腎虛腰痛如神錦囊赤膈類傷寒門主論凡胸膈赤腫疼痛頭疼身痛發熱惡寒此名赤膈傷寒宜荊防敗毒散加栝蔞子黃連黃芩紫荊皮元參赤芍升麻白芷如證有表復有里胸膈赤腫疼痛者防風通聖散加黃連栝蔞子紫荊皮如表證已退大便燥實胸膈腫痛者涼膈解毒如栝蔞子枳殼桔梗紫荊皮赤芍又宜稜針刺腫毒出血如半表半裡胸膈腫痛者柴胡枳桔湯加栝蔞子紫荊皮赤芍小兒龜胸門主論龜胸者胸高脹滿形如復掌多因乳母酒面五辛無度所傷或夏月煩躁熱乳宿乳與兒蓋肺氣最清為諸臟華蓋水氣泛溢肺為之浮日久痰滯則生風熱一觸諸辛肺氣昏亂是以唇紅面赤咳嗽喘促溏瀉蒸熱由此而成疳由疳而成龜背矣如藥後而復作傳變目睛直視痰涎壅上或發搐者難治脾發疽門主論王肯堂曰脾發疽生心窩下兩旁屬脾經食竇穴無論左右皆生由多食煎煿醉飽入房以致毒聚脾經而成稍遲則潰傷脾膜膿如蟹沫者死服藥而嘔飲食不進者死準繩心法曰此疽因過飲辛熱藥酒積火成毒亦生胸前蜂窠發門主論申鬥垣曰蜂窠發在胸乳間或左或右或雙發在彧中穴在俞府下一寸六分陷中神藏穴在彧中下一寸六分靈墟穴在神藏下一寸七分三穴乃足少陰腎經所立心熱甚急宜內托疏心火其證心懸若飢飢不能食舌乾咽腫歸心則死啟玄枯筋箭門主論陳實功曰枯筋箭乃憂鬱傷肝肝無榮養以致筋氣外發初起如赤豆大枯點微高日久破裂攢出筋頭蓬鬆枯槁多生胸乳間者是也宜用藥絲線齊根系緊七日後其患自落再換珍珠散其疤自收兼戒口味正宗乳癰門主論陳遠公曰有乳上生癰先疼後腫尋常發熱變成瘍癰此證男婦皆有之而女人居多蓋女人乳兒之時偶爾貪睡兒以口氣吹之使乳內之氣閉塞不通以至作痛即以解散藥治之隨手而愈若因循失治而乳癰成矣唯男子則不然乃胃火熾盛不上升於口舌而中壅於乳房乃生此證故乳癰乃陽證也不比他癰有陰有陽治法不必分陰陽但分先後為虛實耳蓋乳癰初起為實邪久經潰爛為正虛然邪之有餘仍是正之不足於補中散邪乃萬全之道不必先攻而後補也用和乳湯貝母花粉各三錢當歸蒲公英各一兩生甘草二錢川山甲一片土炒為末水煎服一劑乳房通腫消不二劑也此方以貝母花粉消胃中壅痰痰壅而乳房不通今化其痰則胃火失勢後以公英山甲解熱毒利其關竅不攻自散恐藥過於迅逐加歸甘草補正和解正既無傷火毒不致變為乳岩也冰鑑陳實功曰婦人平日不善調養以致胃汁濁而壅滯為膿名曰乳癰正宗又曰亦有憂鬱傷肝肝氣滯而結腫成癰者宜逍遙散加橘葉散之又曰亦有暴怒傷肝肝火妄動結腫者橘皮湯散之馮魯瞻曰婦人之乳男子之腎皆性命之根也人之氣血周行無間寅時始於手太陰肺經出於雲門穴穴有乳上丑時歸於足厥陰肝經入期門穴穴在於乳下出於上入於下肺領氣肝藏血乳正居於其間也其足陽明之脈自缺盆下於乳又衝脈者起於氣街並足陽明夾臍上行至胸中而散故乳房屬足陽明胃經乳頭屬足厥陰肝經婦人不知調養有傷衝任且忿怒所逆鬱悶所遏厚味所釀以致厥陰之氣不行陽明之血熱甚或為風邪所客則氣壅不散結聚乳間或硬或腫疼痛有核乳汁不出名曰妒乳漸至皮膚焮腫寒熱往來謂之乳癰風多則硬腫色白熱多則焮腫色赤不治則血凝氣為壅滯而與乳內津液相搏腐化為膿治之之法凡初起寒熱焮痛即發表散邪疏肝清胃速下乳汁導其壅塞則病可愈若不散則易成膿宜用托裡若潰後肌肉不生膿水清稀宜補脾胃若膿出反痛惡寒發熱宜調榮衛若晡熱焮腫作痛宜補陰血若食少作嘔宜補胃氣切戒清涼解毒反傷脾胃也錦囊又曰有因婦人所乳之子膈有滯痰口氣焮熱含乳而睡熱氣吹入乳房凝滯不散遂生結核若初起時忍痛揉軟吮去乳汁即可消散失此不治必成癰腫亦有因小兒斷乳後不能回乳或婦人乳多嬰兒少飲積滯凝結又或經候不調逆行失道又有邪氣內郁結成癰腫初起時切勿用涼藥蓋乳本血化不能漏泄遂結實腫乳性清寒又加涼藥則陰爛宜也惟涼藥用之既破之後則佳如初發時宜用南星薑汁敷之可以內消更加草烏一味能破惡血逐塊遇冷即消遇熱即潰更加乳香沒藥以定痛內則用栝蔞十宣散通氣散間服之然年四十已下者治之多瘥以氣血旺故也五十以上慎勿治之多死以天癸絕也不治自能終其天年若欲加治惟調氣血為主又曰若鬱怒肝火熾盛為腫為痛者自當疏肝散郁兼以養血和血則肝陽不強而腫自退若鬱結彌甚血滯不舒更由乳汁壅積潰而成膿則為乳癰矣氣血大傷尤宜重為滋補少佐疏肝解毒若專事清解則潰者難膿而膿者難長矣胡公弼曰婦人乳有十二穰始生乳癰只患一穰膿血出盡又患一穰逐穰輪流傷至七穰即傳次乳次乳患遍則危而不救者多矣初起每早服元壽丹可保余穰不受傳毒青囊又曰憂怒傷肝肝氣滯而結腫者初起必煩渴嘔吐寒熱交作腫痛疼甚者牛蒡子湯主之厚味飲食暴怒肝火結腫者橘葉湯主之又曰男子乳頭屬肝乳房屬腎女子乳頭屬肝乳房屬胃又曰不乳兒婦人患乳名曰害干奶子陳實功曰乳房屬陽明胃經所司乳頭屬厥陰肝經所主多血少氣有乳之婦名曰外吹懷孕之婦名曰內吹正宗汪省之曰如懷孕八九個月患內吹乳雖膿出腐脫肌生必待分娩而後始能收口理例申鬥垣曰胎氣旺而上衝致陽明乳房作腫名曰內吹又名里吹奶啟玄馮魯瞻曰乳癰者俗呼曰吹乳吹者風也風熱結泊於乳房之間血脈凝泣焮痛脹潰稠膿湧出此屬膽胃熱毒氣血壅滯又名乳癰為易治用青皮疏厥陰之滯石膏清陽明之熱甘草節解毒而行汙濁之血荊防散風而兼助藥達表瓜蔞沒藥青橘葉皂刺銀花土貝母當歸及酒佐之無非疏肝和血解毒而已加艾隔蒜灸二三十壯於痛處最效切忌刀針傷筋潰脈為害不小錦囊澄曰更有寡婦並無兒女吮乳而乳房或腫焮痛者此為席風呵奶當同干奶治法陳自明曰懷孕患乳曰內吹乃胎氣旺而上衝致陽明乳房作腫宜石膏散清之亦可消散遲則遷延日久將產出膿乳鬥亦從膿竅流出其口難完精要心法曰內吹者懷胎六七月胸滿氣上乳房結腫疼痛若色紅者因熱盛也如色不紅者既因氣鬱且兼胎旺也外吹者乳母肝胃氣濁更兼兒吮乳睡熟鼻孔涼氣襲入乳房與熱乳凝結腫痛令人寒熱煩躁口渴又有內未懷胎外無哺乳而生腫痛者系皮肉為患未傷乳房此肝胃濕熱凝結也乳癰門主方鹿角散治乳癰初起結腫疼痛憎寒發熱但未成膿者鹿角尖三寸用炭火煅稍紅存性研末每服三錢食後熱酒一茶盅調服甚者再一服必消或以生鹿角尖銼細末生酒沖服三錢立消又方馬齒莧一把洗淨同皮硝搗爛敷上即刻止痛如無鮮者可於端午連根採收亦可灸乳腫妙方正宗治氣惱勞傷或寒熱不調乳內忽生腫痛用碗一隻內用粗燈草四根十字排勻碗內燈草頭各露出寸許再用平山粗紙裁成一寸五分闊紙條用水濕貼蓋碗內燈草上紙與碗口相齊將碗覆於腫乳上留燈草頭在外將艾大圓放碗足底內點火灸之艾盡再添灸至碗口流出水氣內痛覺方止住甚者次日再灸一次必消錦囊新定消乳癰神效方馮氏金銀花二兩蒲公英一兩甘草節三錢沒藥去油二錢當歸尾六錢水酒各三碗煎一碗食後服渣再煎絞汁服又方葛稚川人牙齒燒存性研極細酥調敷究原五物湯外科集驗乳癰癰疽發背立止疼痛栝蔞一枚研皂角刺燒帶生沒藥各五錢乳香甘草各二錢五分酒三斤煎取二斤時時飲之元壽丹張涵谷乳癰初起即消已潰可保余瓣無恙龜殼去牆版不用止用龜蓋火煅存性研細末熱酒調服三錢儘量飲醉即愈芙蓉膏治乳癰發背癰疽拔根止痛斂口芙蓉花搗如泥若無花取根用竹刀刮去粗皮只用內嫩白皮搗如泥入蜜少許調勻如未穿即敷四圍中留一孔透氣如已潰即填入瘡口其膿根自然湧出俟膿盡再上干膿散干膿散凡毒膿汁久出不已者用此摻之干膿斂口海螵蛸天竺黃飛血丹炒紫色輕粉二錢麝香二分五釐真降香老節三錢共乳極細乾摻瘡口不數日膿即干矣乳癰初起濟生活鯽魚背脊肉和蒸飯搗如泥敷上即散乳癰穿山甲炒二兩青皮三兩研細末用熱酒調服三錢另飲酒儘量被蓋取汗即消乳癰初起但未成膿者皆消用大碗盛醋半碗以白石蛋大一塊燒紅淬醋內二三次以醋熱為度即將患乳浸入醋內冷則再燒再淬再浸三次即消乳癰爛見心者貓腹下毛乾鍋內煅存性為末乾摻或清油調勻入輕粉少許搓之乳癰潰爛兩三指大者蔥汁半酒杯牛皮膠一兩切片隔水燉一伏時以膠老為度乘熱納入潰處以桑皮紙貼之如內膿未盡自然脫下乃如法乘熱納入倘黏緊不脫即不須又換聽其自落則肉已長足收口矣寶之神效栝蔞散外科集驗治乳癰乳疽奶勞川當歸酒洗去蘆焙切生甘草各五錢滴乳香去油另研一錢苦栝蔞子多者一個去皮焙為末如急用只須研爛明沒藥去油另研二錢五分無灰酒三升同藥入銀石器中慢火熬取一升清汁分為三服食後服之如奶勞便服此藥杜絕病根如毒氣已成能化膿為黃水如毒未成即消甚者再服以退為度治乳之方甚多獨此一方神驗萬無一失消乳癰神方大當歸一枝洗去泥蒲公英四兩金銀花四兩甘草節五錢酒水同煎三大碗渣再煎服以一日夜服儘自消歷試歷驗乳癰未成即散已成即潰立刻止痛神效無比名橘香散陳皮去白淨五錢麝香一分研細酒調服二錢被蓋出汗乳癰初起二三日立消天下第一仙方活鯽魚一尾頭骨生搗極爛香臘糟一小團再研勻敷上一日待消小即取下不消再貼如神乳癰周鶴仙方苦栝蔞兩個每個入酥炙穿山甲一錢人弱者用五分粉甘草六錢裝入瓜內用好酒二斤水二斤同煎至一大碗臨臥熱服渣搗爛再用酒水各一斤煎服將渣乘熱敷滿乳上用布捆住蓋被出汗無不立愈不論已破未破只用一服神效無比驗方陳原缺末無灰酒調服醉自消以渣敷之自消澤及湯澤蘭葉一兩白芨三錢水煎沖酒服取汁自消又方生半夏一個研細蔥白一寸連須搗丸如蓮子大絲綿包裹左乳塞右鼻孔右乳塞左鼻孔睡醒自消又方兔耳一支箭出徽州煎酒服自消又方鮮蒲公英搗汁沖熱酒服取汗渣加酒糟搗敷乳上自消又方舊芭蕉扇燒存性研末酒調自消又方生皂角子七粒熱酒吞下即消又方王峽如治乳汁不通閉塞併成乳癰栝蔞一個搗碎穿山甲炒歸尾酒炒乳香沒藥甘草節各一錢酒水各半服如成乳癰即以渣敷乳上用長布裹之經宿自消又方蒲公英五錢當歸王不留行陳皮甘草節生黃耆各二錢金銀花三錢防風川貝母白芷天花粉各一錢二分乳香沒藥各五分加香橙葉十片水煎沖酒盡醉取汗自消又方金銀花蒲公英各一兩酒水同煎服以渣乘熱敷腫上即思睡睡醒自消並治蛇頭疔神效又方用蔥一握連須搗爛作餅置患乳上以磁磬口茶杯盛熱灰覆蔥餅上覺熱氣入里汗出自消又方兩頭尖即雄老鼠屎七粒或十三粒研末沖酒服即消又方陳皮去白五錢甘草一錢酒水同煎凡痛極不可忍者服之即止又方白芥子一兩炒黃研末白酒沖服儘量飲自消又方海螵蛸細末三錢酒煎儘量飲出汗自消又方赤小豆三合用酒研爛去渣溫服留渣敷之自消又方生螃蟹腳尖陰陽瓦焙研三錢酒調儘量飲醉蓋被取汗自消又方金銀花當歸各二錢蒲公英三錢乾葛一錢五分酒水同煎食後服再以酒助取汗自消又方蒲公英金銀花鹿蔥花根洗淨防風各三錢酒水同煎空心服出汗自消又方生半夏乳香去油各等分研細左乳吹右鼻孔右乳吹左鼻孔自消又方羊角尖刀刮末每服一錢酒調服自消又方黃花菜金銀花各等分酒煎服自消又方青皮天花粉各五錢酒煎服自消又方皂莢刺燒灰海蛤粉各等分研勻熱酒調服以手揉乳自消此方只治外吹又方苦栝蔞一二枚連皮穰子切碎酒煎頻服自消又方鮮蒲公英連根帶葉二兩搗爛酒半斤同煎數沸熱服渣敷腫上蓋睡一時許再用連須蔥白煎湯一茶杯催之得微汗自散此方用之鄉村偏僻無藥之所極妙亦且簡便又方山楂核研末每服三錢無灰酒調服初起不過一二服成餅者四五服自消又方蒲公英三顆金銀花二兩酒水同煎熱服取微汗睡醒即消渣敷患上又方螃蟹去足燒灰存性研末每服二錢黃酒調服又方半枝蓮柔細茸草三月間生田埂上近水邊尋之可得開紅花儼然半邊蓮花四五月草深難覓此草解熱清火消腫散毒最為捷徑宜多多采取搗汁沖熱酒服渣敷患上神效乳吹已成栝蔞一個明乳香二錢酒煎服香附餅消乳吹並敷一切癰疽香附一兩麝香二分研末以蒲公英二兩酒煎濃汁調服又方玉簪花根加鹽少許共搗如泥初起敷上自消已成敷之除膿完口又方生白果八兩一半用酒研服一半研敷自消吹乳紅腫白芷一兩鬱金七錢研勻水調敷又方醋半杯頓滾入廣膠四錢熔化加銀硃二錢調敷乳硬痛當歸甘草沒藥去油各三錢水煎沖酒熱服山居婦人吹乳桑樹蛀屑飯搗成膏敷之乳吹結核不能消散腫痛者神效並治乳岩外科集驗百齒霜即梳齒上油垢圓如芡實大黃丹為衣每服一二圓熱酒吞下如不飲酒白湯吞之不可化開亦不可令病人知極有奇效又方外科集驗皂角刺燒帶生天南星生半夏各二兩白芷直殭蠶焙草烏各一兩研細蔥汁黃蜜調敷洗乳疼方竇氏牡蠣煅一兩五倍子五錢枯白礬一錢五分水二碗煎洗乳硬作痛嫩桑葉手採者研細米飲調攤紙上貼之吹乳好醋半杯熬滾入牛皮膠五錢熬化敷上自消吹乳瑞香花二十朵如無用葉二十一片同陳灶糖搗敷自消乳吹明礬研細一歲一釐用雞蛋一個開一孔將礬裝入蛋內飯上蒸熟去殼將蛋分作小塊無灰酒吞下自消乳吹鴨蛋一個去殼燒酒攪勻蒸熟食之自消又方韭菜地上蚯蚓糞二錢蔥子一錢研細醋調敷上干則易之三次未有不愈者又方兩頭尖老鼠糞十三粒用蔥白搗爛熱黃酒沖服蓋暖出汗即消已成膿將破者不效驗方小青皮一斤醋浸三次曬燥磨細末水法為丸每服三錢木瓜酒送下自消驗方馬桶垢陰陽瓦煅研細末蜜丸桐子大每服一錢木瓜酒送下雖多年乳核服半斤亦消又方葫蘆巴焙研每服三錢木瓜酒調即消驗方大樺皮一兩切片瓦上焙存性研細作一服用皂莢子七粒木瓜酒煎一杯調服自消敷方鮮水仙花根不拘多少同馬桶垢搗爛敷即消消乳吹程崙友皂角子七粒微焙研碎沖酒儘量飲醉出汗即消消內吹乳鯨魚鰾系雜貨店賣者其形兩頭尖切去尖用火煨爛搗化攤青布上貼之乳瘡腫痛芝麻炒焦研細燈盞油調敷又方野茄根搗汁沖調服乳癰劉涓子大黃伏龍肝各二錢小鯽魚一尾連鱗腸搗如泥醋調敷定痛消腫患乳立消法一切乳證初起之時先用連根青菜煎水洗乳再將蒸酥店內酵面茶盅大一塊置碗中隔水燉熱敷於浴過乳上再用糯米一合不用淘鍋內炒黃研細用無灰酒衝入與服被蓋取汗無論輕重立刻即消又方鮰魚肚子瓦上炙脆研細沖無灰酒調服即消又方鹿角尖磨汁敷之乳吹妒乳腫痛欲作膿者自消乳頭陷下門主方兩乳頭陷頂黃耆蜜炙三錢當歸身葛根升麻黃柏連翹各二錢牛蒡子研炙甘草各一錢上肉桂五分水二盅酒半盅煎一盅食後服乳頭破裂門主論心法曰乳頭屬足厥陰肝經如暴怒或抑鬱肝經怒火不能施泄是以乳頭破裂痛如刀刺或揩之出血或流黏水或結黃脂治當以加味逍遙散主之乳頭破裂門主方驗方取秋後冷露茄子裂開者陰乾燒存性研細水調敷又方胭脂蛤粉研細敷之乳衄門主論婦女乳房並不堅腫結核唯乳竅常流鮮血此名乳衄乃屬憂思過度肝脾受傷肝不藏血脾不統血肝火亢盛血失統藏所以成衄也治當平肝散郁養血扶脾為主澄論乳汁自流不禁門主論馮魯瞻曰其有乳汁自出者若胃氣虛而不能斂攝津液者宜補胃氣以斂之若氣血大虛氣不衛外血不榮里而為妄泄者宜調補榮衛以止之若未產而乳自出者謂之乳泣生子多不育若產婦勞役乳汁湧下此陽氣虛而厥也獨參湯主之錦囊乳汁自流不禁門主方十全大補湯人參於白朮甘草炙白茯苓當歸白芍藥川芎熟地黃肉桂黃耆蜜炙薑棗為引煎服乳疳門主論申鬥垣曰有養螟蛉之子為無乳強與吮之久而成瘡經年不愈或腐去半截似破蓮蓬樣苦楚難忍內中敗肉不去好肉不生乃陽明胃中濕熱而成名曰乳疳啟玄凡初生女孩必須於月子內大人以手擠其兩乳使乳頭長出若不知此長大其女必是一對瞎奶生育之後乳頭微露大半藏在乳房之內小兒吮乳每每吮破乳頭化去一半疼痛難忍若畏痛不與小兒吮食必腫脹成乳癰矣務令產婦忍痛令兒吮之外搓玉紅膏珍珠散自愈澄曾看一小兒初生吐乳血膜與乳相間細詢產婦始知產婦是瞎奶被小兒吮破潰爛所以小兒吐出之物系乳中吮出之血膜也只治產婦之乳小兒不藥而愈自識乳痞門主論陳遠公曰有左乳內忽大如桃又不疼色亦不赤身發熱體漸瘦損人以為痰氣鬱結也誰知肝氣不舒乎夫乳屬陽明乳腫宜責陽明矣而余獨謂之肝不起世人之疑乎夫陽明胃土最畏肝木肝氣亦不舒矣蓋胃見木之郁唯恐來克畏首畏尾伏而不揚乳又近兩脅兩脅肝之位也與肝相遠尚退縮不敢舒今與肝為鄰亦何敢吐氣哉氣不舒而腫滿之形成氣不敢舒而畏懼之色現不疼不赤正見畏懼也治法不必治胃但治肝而腫自消矣用加味逍遙散柴胡二錢白芍五錢陳皮五分當歸栝蔞半夏白朮茯神各三錢人參甘草川芎各一錢水煎服十劑內消矣去栝蔞又十劑不再發矣此方解肝之滯肝解而胃氣不解而自舒蓋以栝蔞半夏專治胸中積痰痰去腫尤易消也冰鑑陳實功曰乳癖乃乳中結核形如丸卵或墜重作痛或不痛皮色不變其核隨喜怒消長多由思慮傷脾怒惱傷肝鬱結而成也竇漢卿曰奶癧是十五六歲女子經脈將行或一月兩次或過月不行多生寡薄形體虛弱乳上只有一核可治若串成三四個難治宜調經開鬱治之多用夏枯草又曰乳癖乃五六十歲老人多生此疾不成膿不可用涼藥敷服逼令毒入臟腑則危馮魯瞻曰奶慄即乳慄又名乳癖破者少有生須用參耆歸芍大補兼解毒外以丁香末敷之錦囊申鬥垣曰如婦人年近五十以外氣血衰敗當時鬱悶乳中結核天陰作痛名曰乳核久之一年半載破而膿水淋漓日久不愈名曰乳漏啟玄岐天師曰男子乳房忽然壅腫如婦人之狀按之疼痛欲死經年累月不效者乃陽明之毒氣結於乳房之間也然此毒非瘡毒乃痰毒也若瘡毒何能經久必然外潰今經年累月壅腫如故非痰毒而何法當消其痰通其瘀自然奏功如響矣以化聖通滯湯主之此方妙在金銀花與蒲公英直入陽明之經又得清痰通滯之藥為佐附子引經單刀直入無堅不破又何患痰結之不消或疑附子大熱諸痛皆屬於火似不可用殊不知非附子不能入於至堅之內況又有梔子芍藥之酸寒雖附子大熱亦解其性之烈矣又何疑於過熱哉秘錄乳痞門主方軍門立效散甘草節半寸長九段川椒三十粒天花粉五錢皂角刺三錢酒水同煎臨服入去油乳香末一錢沖服又方生麻黃八分陳香櫞一枚甘草天花粉各八錢栝蔞一枚金銀花六錢黃芩三錢棉花核黑色者五錢生酒煎服出汗化聖通滯湯岐天師金銀花蒲公英各一兩天花粉白芥子各五錢白芍藥通草山梔仁炒白茯苓各三錢柴胡二錢熟附子木通各一錢水煎服消多年乳核煤炭研細生蜜和丸綠豆大每服五十丸蒲公英煎湯下消遠年近日乳核乳痞人中白煅四兩雄鼠糞九十九粒研細米湯為丸每服一錢無灰酒下以消為度乳岩門主論陳遠公曰有生乳癰已經收口因不慎色以至復爛變成乳岩現出無數小瘡口如管如孔如蜂窩狀肉向外生經年累月不愈服敗毒之劑身益狼狽瘡口更腐爛人以為毒深結於乳房也誰知氣血大虧乎凡人乳房內肉外長而筋束於乳頭故傷乳即傷筋也此處生癰原宜急散遲恐有筋弛難長之患況又泄精損傷元氣安得不變出非常乎當失精後即大用補精填髓之藥尚不至如此之橫今既陰虛而成岩又因岩而敗毒不亦益虛其虛乎治法必大補氣血以生其精不必泄毒以其無毒可泄耳用化岩湯人參黃耆忍冬藤當歸各一兩白朮二兩茜草白芥子各二錢茯苓三錢水煎服二劑生肉又二劑膿盡疼止又二劑漏管重長又二劑全愈再二劑不再發也此方全補氣血不去敗毒雖忍冬乃消毒之味其性亦補況入於補藥亦純於補矣惟是失精以變岩似宜補精今止補氣血何也蓋精不可速生而功又緩不若大補氣血反易生精且乳房屬陽明既生乳岩而陽明必無多氣多血矣今補氣血則陽明經旺自生精液以灌乳房又何必生精以牽制參耆之功乎所以不用填精之味也冰鑑陳實功曰乳岩乃憂鬱傷肝思慮傷脾積想在心所願不得志者以致經絡痞澀聚結成核初如豆大漸若棋子半年一年三載五載不疼不癢漸長漸大始生疼痛痛則無解日後腫如堆慄或如覆碗紫色氣穢漸漸潰爛深者如巖穴凸者如泛蓮疼痛連心出血則臭其時五臟俱衰四大不救名曰乳岩凡犯此者百人百死如能清心靜養無掛無礙不必勉治尚可苟延當以益氣養榮湯主之正宗又曰凡中年無夫之婦得此更易於死又曰男子患此名曰乳節與婦女微異女傷肝胃男損肝腎蓋怒火房欲過度由此肝虛血燥腎虛精怯氣脈不得上行肝經無以榮養遂結腫痛又曰治當八珍湯加山梔丹皮口乾作渴宜加減八味丸腎氣丸已潰十全大補湯則易於生肌完口也汪省之曰乳岩四十以下者可治五十以下者不治治之則死不治反得終其天年理例馮魯瞻曰婦人有憂怒抑鬱朝夕累積脾氣消阻肝氣橫逆氣血虧損筋失榮養鬱滯於痰結成隱核不赤不痛積之漸發數年漸大內潰深爛名曰乳岩以其瘡形似巖穴也慎不可治此乃七情所傷肝經血氣枯槁之證治法焮痛寒熱初起即發表散邪疏肝之中兼以補養氣血之藥如益氣養榮湯加味消遙散之類以風藥從其性氣藥行其滯參耆歸芍補氣血烏藥木通疏積利壅柴防蘇葉表散白芷腐膿通榮衛肉桂行血和脈輕者多服自愈重者尚可苟延若以清涼行氣破血是速其亡也錦囊竇漢卿曰女子已嫁未嫁俱生此候乃陰極陽衰虛陽與血相積無陽積安能散故此血滲入心經而成此疾也若未破可治已破即難治胡公弼曰乳岩乃性情每多疑忌或不得志於翁姑或不得意於夫子失於調理忿怒所釀憂鬱所積厚味釀成以致厥陰之氣不行陽明之血騰沸孔竅不通結成堅核形如棋子或五七年不發有十餘年不發者或因歲運流行或因大怒觸動一發起爛開如翻花石榴者名曰乳慄凡三十歲內血氣旺者可治四十以外氣血衰敗者難治青囊乳岩門主方內消乳岩乳癖奇方將壁上活壁蟢用針扦住乘活以竹紙包如小球食後白湯吞下每日服一次不過數日乳內即癢如蟢蛛走狀其核自消又方生蟹殼砂鍋內炒脆磨極細末熱酒調服二錢或打糊為丸每服三錢酒下不可間斷消盡為止乳吹乳痞乳岩並一切無名大毒黃牛大角內嫩角火煅存性一兩鹿角火焙黃色八錢枯白礬三錢和研極細末熱酒調服三錢乳中有小塊不消不痛不癢即名乳岩宜早治至六七年後潰爛不救錢青掄川貝母連翹栝蔞仁當歸炙甘草各二錢柴胡金銀花白芨何首烏白芷蒲公英半夏各一錢五分川黃連酒炒漏蘆各一錢金橘葉四十片半枝蓮搗碎二兩先將夏枯草半斤和酒水五碗煎至三碗去渣入前藥同煎就一大碗加去油乳香沒藥細末各七分不拘時服外用五倍子焙乾為末醋調服消乳岩丸方錢青掄夏枯草蒲公英各四兩金銀花漏蘆各二兩山茨菇雄鼠糞兩頭尖川貝母去心連翅金橘葉白芷甘菊花沒藥去油栝蔞仁乳香去油茜草根甘草廣陳皮紫花地丁各一兩五錢上為細末煉蜜為丸每早晚食後送下二三錢戒氣惱一方去栝蔞仁加天花粉桔梗廣膠用夏枯草熬膏為丸乳岩初起錢青掄青皮甘草各等分共研細末每服二錢用人參湯入生薑汁調細細呷之一日夜五六次至消乃已神驗年壯者不必用人參乳少門主論馮魯瞻曰乳汁不行有二有氣血盛而壅閉不行有氣血虛而燥澀不行虛者補之如十全八珍之類是也盛者疏之如麥門冬栝蔞仁葵子豬胰木通漏蘆豬蹄之類是也錦囊產婦衝任血旺脾胃氣壯飲食調勻則乳足而濃以生化之源旺也若脾胃氣弱飲食少進衝任素虧則乳少而薄所乳之子亦怯弱而多病其乳以濃白光彩入盞中上面瑩然如玉為上黃色清薄為下不可哺兒乳母宜擇肥瘦適中無病經調善食者佳太肥則多痰太瘦則多火兒飲其乳亦復如是如一兒昏睡竟日不醒舉家驚惶求醫投藥罔效一高醫診之曰此兒中酒得乳母曾痛飲乎詢之果然停藥而醒可見利害相關明矣然李時珍曰人乳無定性隨飲食性氣而變故飲食調攝乳母不可不慎也乳少門主方通脈湯治乳少或無乳生黃耆一兩當歸白芷各五錢七孔豬蹄一對煮湯吹去浮油煎藥一大碗服之覆面睡即有乳或未效再一服無不通矣如新產無乳者不用豬蹄只用酒水各一半煎服體壯者加好紅花三五分以消惡露乳少紅豆煮熟連湯吃乳如湧泉下乳天漿飲當歸白芍藥川芎麥門冬通草穿山甲炒漏蘆天花粉甘草白茯苓熟地王不留行各一錢白水煎又方通草煨豬前蹄連湯食之又方穿山甲王不留行各等分研細末熱酒調服三錢催乳穿山甲煅赤色五錢陳皮酒製三錢研細末分三服米泔水調下一日夜服完產後乳脈不行身體壯熱宜玉露散良方桔梗川芎白芷赤芍人參赤茯苓當歸甘草水煎服又方萵苣子糯米各一半細研水一碗攪勻入甘草末一錢煎頻頻呷服催乳當歸生黃耆通草各二錢木通一錢穿山甲炒研瞿麥各一錢五分王不留行一錢二分雄豬七星蹄酒煮連湯飲產後無乳穿山甲七片炒研王不留行三錢犍豬蹄七星者一隻同煮汁飲之其乳如泉乳少雄豬外腎一具陰陽瓦焙存性研末無灰酒沖服乳汁必多乳汁清稀產婦初生三日用炭灰少許和粥內食之乳汁自稠下乳萵苣五根煎湯服下乳穿山甲五錢燒存性研細末酒調服回乳門主論薛立齋曰婦人氣血方盛乳房作脹或斷乳脹痛牽引胸脅服之自消麥芽三兩炒熱水煎服立消麥芽取其消散精華以絕乳之源也麥芽耗散之力可見故本草謂其能消腎也回乳門主方回乳四物湯產婦無兒食乳以致乳汁腫脹堅硬疼痛難忍熟地當歸白芍藥川芎各二錢大麥芽二兩炒為粗末水二盅煎八分食遠服用裹腳布速緊兩乳以手揉按其腫自然消散甚者再用一服又方浮小麥煎濃汁服之自消乳汁閉塞脹痛門主方驗法用有嘴茶壺內貯滾湯半壺將腫乳塞住壺內使壺中熱氣熏乳再令一人口含壺嘴吸之其竅即通候水溫看水面所浮皆乳即其驗也又法用貓鬍子向乳竅內通之並不痛找出貓鬍子乳汁自通又法用大兒頻吮自通又法谷樹葉同糟鹽煨熱縛乳上自通斷乳門主方畫眉膏斷小兒乳梔子三個燒存性雄黃輕粉辰砂各少許為末香油調勻俟兒睡著濃沫兩眉醒來自不思乳未效再用腕疽門主論申鬥垣曰腕疽乃足三陰三陽之所發於腋下近脅乃手厥陰心包絡經多血少氣天池穴初起脅肋下及兩腿足生赤腫癢二十五日不潰者死九日刺膿赤者可治如內罨周圍赤干瘡口內見脂膜黑者不治此證多因捕打而生啟玄血胤瘡門主論申鬥垣曰血胤瘡乃足少陽膽經多氣少血生於淵腋脅肋旁赤色或有頭無頭如肥皂核大在肉中如針刺痛忽長大至胸兼足厥陰肝經多血少氣發於期門名曰腋癧女人患此走諸處二三年變名結癧三五年出黑水死啟玄傳心疽門主論申鬥垣曰傳心疽生於脅下京門帶脈二穴之次乃足少陽膽經多氣少血痛癢徹心如針刺之痛漸潰至臍者死啟玄脅痛門主論朱丹溪曰兩脅走痛是痰實者可用控涎丹左脅痛為肝經受邪宜柴胡疏肝湯右脅痛為肝經移病於肺宜推氣散食積痛凡痛有一條扛起者是也宜消積氣弱人脅痛脈細緊而弦多從勞役怒氣得者八物湯加木香青皮肥白人氣虛發寒熱而脅下痛用參耆補氣加柴胡木香青皮調氣瘦人發寒熱脅痛多怒者必有瘀血宜桃仁紅花柴胡青皮大黃滑石去滯氣必用青皮乃肝膽二經之藥若二經血不足者先當補血少加青皮痰飲停伏脅痛宜導痰湯脅下痛而大便秘結者木香檳榔丸虛寒脅痛者必用辛溫補劑加調氣藥解痛以琥珀膏貼之或白芥子研敷之或吳茱萸醋研敷之韭菜炒熨亦可澄曰人有房勞內傷脅下有一點痛者名干脅痛難愈當大補氣血以養肝大滋腎水以補母又曰左脅痛胃脘痛二證婦人多有之以其憂思忿怒之氣素蓄於中發則上衝被濕痰死血阻滯其氣而不得條達但清陽不升濁陰不降肝木之邪得以乘機侵侮而為病也故治婦人諸痛諸疾必以行氣開鬱為主破血散火兼之諺云香附縮砂婦人之至寶山藥蓯蓉男子之佳珍此之謂也脅痛門主方脅痛秘方小茴一兩炒枳殼五錢麩炒研末每服二錢鹽湯調服脅痛紅及半身甚發水泡者醫旨餘緒大栝蔞一個重一二兩連皮搗爛粉甘草二錢紅花五分一劑而愈真神方也脅疽門主論靈樞云發於脅名曰敗疪敗疪者女子之病也灸之其狀大癰膿其中乃有生肉大如赤小豆治之銼䔖翹草根各一升甲乙經銼䔖草赤松根各一升以水一斗六升煮之竭為取三升即強飲厚衣坐於釜上令汗至足已王肯堂曰脅疽屬手厥陰心包絡足厥陰肝火熱毒怒氣相併而作宜速治不然潰爛不斂多致危殆準繩陳實功曰脅癰多從鬱怒肝火而發虛怯人多有之肥胖內實者無此證初起宜梔子清肝湯解鬱瀉火已成四妙湯加香附青皮膿成者即針之勿傷內膜潰後八珍湯加山萸肉牡丹皮澤瀉兼滋腎水若虛勞而得者破流臭敗稀膿補托不應者俱死正宗汪省之曰脅癰即穿脅癰左為癰右為疽乃風濕入於骨間日久不散漸覺皮麻骨痛發於腰脅氣虛胃弱之人切不可過與補陽之藥恐內受熱劑則虛熱愈盛盛則透傷內膜切宜慎之理例又曰昔一人脅下生癰後成漏瘡狀如牛眼膿血不止治法以鹽少許納牛耳中然後取牛耳中垢敷漏上數次即瘥如不用鹽牛耳不癢垢亦難取故取垢必須鹽也胡公弼曰人之兩脅乃足厥陰肝經氣分出入之道路一有阻滯不得疏通鬱而為痛故血亦因之而凝聚矣是以脅之上下發毒皆屬肝經青囊王肯堂曰蜂窩兩脅雙發疽或發於左脅或發於右脅或兩脅雙發乃足厥陰肝經期門及章門穴是經多血少氣如上至淵液輒筋二穴屬足少陽膽經多氣少血因氣虛而得不可用熱劑恐傷骨膜準繩馮魯瞻曰脅癰者乃足厥陰少陽之經相火之司也苟或肝膽之氣不平則風火內搏榮逆血熱而鬱聚為膿矣錦囊心法曰脅疽生於軟肋肋有硬骨者為肋肋下軟肉處為季脅乃肝膽怒火凝結而成多生體虛之人初如梅李漸長如碗如盆脅疽門主方脅癰地榆金銀花各五錢川貝母當歸各二錢穿山甲炮赤芍各三錢皂角刺連翹白芷各一錢五分甘草節一錢夏枯草一兩先煎後入藥鼠黏子一錢五分紫花地丁一兩煎濾汁再入鮮菊花根一兩搗汁和服內發丹毒門主論王肯堂曰內發丹毒脅下至腰胯間腫痛赤色如霞治之稍緩毒攻於內嘔噦昏迷胸腹䐜脹者死二便不通遍身青紫者死急砭出惡血服防風通聖散去白朮甘草紫金丹勝金丹汗之服汗劑得汗則生無汗則死嘔吐不食譫語者死準繩心法曰內發丹毒由肝脾二經熱極生風所致生於肋骨延及腰胯色赤如霞遊走如雲痛如火燎急向紅腫周圍砭出紫黑血以瘦牛肉或羊肉片貼之其毒即可減去一半若嘔噦昏憒胸腹䐜脹遍身青紫者則為毒氣內攻屬逆俠熒疽門主論鬼遺方云俠熒疽腫起發肋及兩肩肘頭二十日不穴死九日可刺發赤白相間膿多可治赤白全無者不治又云兩肋起疽名為發肋初腫盛至數日不穴攻即腫大如杯碗高如鏊背痛徹內腸絞刺左邊患應右邊痛右邊患應左邊痛唯有此處多是內毒卻入攻而死者多人有斯患急以針刺出膿血則免內攻傷內矣心法曰肋疽即俠熒疽生於肋條骨間由肝火鬱怒結聚而成初如梅李漸大如碗色紫焮痛連及肩肘患在左痛牽右肋患在右痛牽左肋二十一日得稠膿為順屆期潰出清水者逆骨羨瘡門主論申鬥垣曰骨羨瘡乃足太陽膀胱經多血少氣生於神堂二穴乃隔關膈俞穴初發作癢不可忍如燎漿水疱抓破內見骨過十日遍身作癢不可治也啟玄黃瓜癰門主論申鬥垣曰黃瓜癰生脅前長尺余高起二寸上頭小者謂之逆毒難治下頭小者謂之順毒可治啟玄腰帶癰門主論汪省之曰腰帶癰生於脅下近腹束帶之處乃風熱留滯膀胱不能滲利壅於肌表而成也理例竇漢卿曰火腰帶毒乃心肝二經熱毒流滯於膀胱不行壅於皮膚此風毒也宜清肝為主忌外敷藥全書薛立齋曰火腰帶生繫帶之處初起如桃漸漸紅腫宜用斷毒截腰法敷之否則漸生五六小毒沿腰如索纏繞先赤腫後潰爛寒熱交作疼痛難忍其色紫惡腰帶癰門主方斷毒截腰法白芨雄黃各一兩研細末雞蛋清調敷四圍六七重干則易之敷五六日不再流則妙幽癰門主論心法曰幽癰生臍上七寸初起如粟漸增漫腫疼痛形如鵝卵甚則堅硬痛牽胸肋由過食膏粱厚味憂思氣結腸胃不通火鬱成毒自內而外發也中脘疽門主論心法曰中脘癰一名胃疽發於心胸之下臍上四寸屬任脈經中脘穴隱痛日久向外生疽堅硬漫腫皮色無紅無熱由過食炙煿以致胃腑火毒而成人迎脈盛是毒氣攻裡作嘔不食咳吐膿痰者逆赫癰門主論心法曰赫癰由七情鬱火凝結而成生膿上三寸屬任脈經建里穴初如粟米瘡癰相兼其腫迅速寒熱往來甚則嘔噦牽引臍痛初腫微紅頂尖根束漸透赤色時痛時止十四朝得膿為吉小兒臍汁不幹門主論馮魯瞻曰夫臍為根本風濕防護須嚴一有所失則臍腫不幹久而作搐入於經絡即成風癇並撮口臍風皆為惡候錦囊又曰若臍中不幹常出青黃水者此必初生有傷六腑耳宜藥摻之但此時僅如血塊不可用冰麝之膏貼之並忌大寒大熱之劑蓋肌肉未堅臟腑柔脆難以抵當耳小兒臍汁不幹門主方驗方雷公車前子炒焦為末敷之即干又方錦囊大紅羊絨燒灰為末單敷又方啟玄草紙灰加枯礬研細摻之用紙包裹勿令尿濕又方千金亂髮燒灰敷之又方黃柏末敷之又方千金枯礬五錢龍骨黃丹各一錢麝香少許研細敷之臍內潰爛出水不止垂危者張絅如屢驗方赤石脂研末敷上立愈又方白礬煅白龍骨煅各等分研細摻上又方棉花子煅灰敷之又方明礬枯礬各等分研敷秘方海螵蛸研細末乾摻小兒臍風門主論駱潛庵曰兒生七日之內肚脹腹硬臍圍浮腫口撮眉攢牙關不開名曰臍風撮口證蓋因臍帶剪短或包縛不緊以致水濕浸臍客風乘虛而入傳之於心蘊蓄其邪復傳脾絡舌強唇青手足微搐喉中痰響是其候也服延壽丹少許即愈如神脫氣冷者不治又曰口撮吐沫腹硬頭偏搐掣手捻拳臍翻哭無聲其源因剪臍受風小肚有一筋直上臍來此筋到臍無救法臍翻者不治若筋未到臍急須用燈火攔頭焠百會穴三下臍門上焠七下大指焠四下湧泉焠七下如能攔住直筋不到臍則可救如臍未翻在神門焠一下推拿秘書臍突門主論馮魯瞻曰凡小兒落胎之時視其臍軟者無臍風也如臍硬直者定有臍風須看上齶如有白泡點子須用銀針輕輕拭破若有血出者可愈然最危候十難一二能過一臘方愈尤宜察色觀容不可魯莽假如額赤知為心熱鼻紅知為肺熱左腮青知為肝有餘右腮白知為脾不足頰白知為腎虛錦囊又曰熱在胸膛伸引弩氣亦令臍腫雷公曰小兒肚臍突出半寸此氣旺不收也若不急安之往往變為角弓反張臍突門主方二豆散錦囊治臍突腫天南星去皮臍白蘞赤小豆淡豆豉各一錢研末用芭蕉自然汁調敷臍四旁得小便自下即愈又方雷公白茯苓車前子各一錢陳皮通草各三分甘草二錢水煎灌之一劑即安臍腫先用荊芥煎湯洗之隨以蔥葉火上炙過放地上出火氣以指甲刮薄搭放腫處次日即消又方普救枯礬黃柏研摻臍上爛臍門主論臍乃腎經部位濕熱積遏腎經故臍中作爛也亦由酒醉入房所致爛臍門主方龍骨散錦囊龍骨煅黃連各一錢白礬煅輕粉各五分研末乾摻臍中臍中生瘡東壁土敷臍中出血門主論臍中出血乃腎火外越也以六味地黃加骨碎補一錢飲之即愈六味湯滋其水則火自息焰矣骨碎補功能止竅補骨中之漏故加入相宜耳臍上疽門主論王肯堂曰臍上疽臍上寸許此名沖疽又名中發疽一名壅腎疽由心火熾盛流入腎經所致腫高膿稠色赤可治若平塌黑色膨脹噁心膿水清稀內腎疼痛渴甚瀉利無度譫語直視者死潰久不斂者死凡此危證只是虛耳如能大補不死也準繩心法曰沖疽生於任脈臍上二寸下腕穴色赤黃腫應在二十一日潰後膿稠受補者順若平塌紫黑膿水清稀七惡證見者逆臍癰門主論王肯堂曰臍癰當臍生由心經積熱流於大小腸二經所致臍為任脈神闕穴禁針之所早消散之免使見膿為上準繩竇漢卿曰臍癰生於臍中因食冷物油膩之物積聚於氣海之間聚結成癰若不速治即內潰臍內出膿四圍堅硬或出紫血水者即難治也無此則生宜多服臘礬丸胡公弼曰臍癰乃心經受證流於小腸經毒發於臍甚至臍中出糞青囊心法曰臍癰禁針腫大如瓜高突若鈴無紅無熱宜隔蒜灸之潰後得稠膿者吉時出汙水臭穢者逆臍漏門主論申鬥垣曰一老人年將六十妻少而不自悟得漏臍瘡年半臭不可近百治不效自分必死其老母哭拜求余且曰君能存吾子以繼香菸則母子沒齒不忘大德余以補劑治之外以艾灸臍上次日則不臭矣余更以膏藥貼之後用生肌散填滿臍口又以補中益氣湯半月而安又有一老翁年七十有五因氣惱忽患臍漏三月餘自分必死余照前治之不半月而愈後至八十三歲而卒噫神哉方乎啟玄肚皮青黑門主方肚皮忽然青黑不急治須臾即死胡粉酒調敷之肚癰門主論汪省之曰肚癰乃手陽明大腸手太陽小腸二經受證熱結之毒發出於表壅聚成癰也理例竇漢卿曰肚癰乃脾經之毒因食煎煿油膩酒醉太過入房以致毒不流通聚成此癰或生於內或生於外若不速治潰透脾膜則死全書心法曰腹皮癰生於腹皮裡膜外無論左右隱痛日久後發癰腫於皮外右關脈見沉數而腹痛甚者是其候也由膏粱火鬱而成不可過服克伐之藥若希圖消散過傷胃氣則腫不能潰潰不能斂立見危亡矣肚癰門主方肚癰神效方石楠樹嫩紅葉搗汁一茶盅沖酒緩緩服之渣敷癰上縛之五服全愈小腹癰門主論王肯堂曰小腹癰臍下一寸五分為散火祛風之藥乃補氣溫火之味耳蓋陰成陰毒乃寒虛之故寒因虛而不行毒因寒而凝結用熱藥以祛寒自能解寒散毒也闢寒救腹丹白朮三兩茯苓三錢肉桂三錢金銀花三兩附子二錢當歸二兩蛇床子五錢水煎一服內消矣已潰者三劑膿盡肉生四劑全愈此以白朮氣海二寸為丹田三寸為關元皆屬任脈由七情不和所致若潰而低陷膿水清稀或潰爛久不斂者死準繩鬼遺方曰小腹疽又名沖疽發小腹疼痛而振寒熱四日悁悁五日變色可刺不刺及導引出膿毒不治五十餘日死陳遠公曰有生癰小腹間者必無陽證以地屬陰部位也陰生陰毒似乎至重然純陰無陽一用陽藥立可成功無奈世人一見肚腹生癰多用陰藥消毒反成不救為可憫也然余所謂陽藥者非為君者以其專利腰臍之氣也腰臍利則下部盡利矣後以蛇床銀花祛毒氣易消又恐寒極不能直入故加附桂斬關而入惟是一派乾燥之味邪雖去除未免耗血故用當歸陽中之陰少制其橫則陰寒漸散又無陽旺之患所以奏功也冰鑑陳實功曰小腹癰生小腹漫腫堅硬肉色不變有熱漸紅者屬陽易治無熱不紅者屬陰難治此乃七情火鬱以致脾虛氣滯而成也正宗又曰初起七日以內者艾灸七壯膏蓋首尾內服壯脾胃養氣血行經補托之劑可保無虞如誤用克伐攻利涼藥敗證必出急用十全大補湯加參耆薑附救之如補托不應者終久縱愈成漏馮魯瞻曰腹癰者患於臍下或旁二寸許是屬脾經若近脅者是屬膽經是證多因脾家陰虛氣凝血滯傷脾所致錦囊胡公弼曰小腹癰又名丹毒癰乃飲食不調寒熱伏結於腸胃成毒多生於小腹之側青囊百效全書云腹癰生於皮裡膜外乃七情火鬱以致脾虛氣滯而成小兒乃驚積虧損而致但此證不問初起已潰未潰宜壯胃氣而佐以行經活血之劑若誤用克伐及下利寒涼則腫不能潰潰不能斂矣倘服下利降火破氣消瘀等藥急用大劑參耆薑附或十全大補湯救之如瘡勢漫腫堅硬肉色不變未有膿也四君子湯加川芎當歸白芷枳殼如焮腫痛甚隔蒜灸五七壯以殺其毒內用托裡之劑如腫起而軟色不赤者膿已成也膿成外不潰者臥針刺之以泄其毒不可直針以傷其膜內服托藥搽玉紅膏生肌收功心法曰小腹癰由七情火鬱而生每發於氣海穴在臍下一寸五分丹田穴在臍下二寸關元穴在臍下三寸皆屬任脈經此三穴或一穴發腫即為小腹癰高腫紅活疼痛牽背易潰膿稠者易治若漫腫堅硬綿潰腐爛膿稀如水者為疽難治緩疽門主論王肯堂曰緩疽生小腹之左數月堅硬如石寒熱間作飲食減少漸至尫羸屬足太陰經積熱所致準繩心法曰緩疽乃脾經氣滯寒積而成生於小腹之旁緊硬不紅不熱痛引腰腿數月不潰若兼食少羸瘦者終屬敗證
