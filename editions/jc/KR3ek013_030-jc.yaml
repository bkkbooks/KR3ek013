body:
  text: 卷三十幼科諸瘡部自初生起至胎毒瘡丹疔毒止皆匯於此部中以便檢閱參治小兒初生無皮門主論小兒初離產門遍身無皮有兩種一是父母蘊積楊梅淫毒遺於嬰兒是以無皮用早米粉伏龍肝撲之皆效一是船戶在船生產金木水火皆全所缺者土耳但將嬰兒放岸上土地睡臥得土氣其皮自生新增申鬥垣曰子在母腹中母食五辛或父母曾患梅瘡致令生子渾身無皮如湯熯去或頭面半體無皮名曰溻皮瘡宜玉粉散摻之玉粉散用桂府滑石水飛一兩甘草三錢冰片二分研細撲之勿用解毒藥啟玄小兒初生無皮門主方凡生下遍身無皮但是紅肉者錦囊速以白早米粉干撲候生皮方止又方竇漢卿伏龍肝研末雞蛋清調塗又方土塹泥研細塗之小兒初生遍身魚泡門主論凡生下遍身如魚泡碎則成水流滲者錦囊密陀僧研細乾摻仍服蘇合香丸小兒初生夢生門主論孩兒生下不能發聲謂之夢生多不知救殊為可憫切勿斷臍帶將火炙令暖氣入兒腹內更以熱湯蕩洗臍帶卻取貓一隻用青布袋包裹其頭足使伶俐婦女拿住此貓向兒耳邊以口著力咬破貓耳貓必大叫一聲兒即醒得生倘因難產或逆產生下或冒風寒舉之遲氣欲絕不能哭者以父母真氣度之亦活或先扎臍帶以大油紙捻燎之燒斷此又回生起死之要法也或以手鏡向兒頭敲鏡聲並呼其父乳名兒即啼矣駱潛庵曰嬰兒受母胎中熱毒心寒氣閉落地無聲名曰啞口速服延壽丹少許即愈或以暖水一器灌之須臾自啼或以蔥白徐徐鞭之即啼或令將前後門齊開者人在街上兩頭呼其父乳名從街上直呼至產婦房中兒即啼矣小兒初生黃腫門主論凡小兒初生遍身黃腫如膽眼閉呻吟腹脹者緣母懷胎之時服寒涼克削之藥太過也錦囊小兒初生鼻塞不通門主方小兒初生鼻塞不通乳不得下得救豬牙皂角草烏各等分研細用蔥涎調成膏塗囟門上即通又方紅糖蘄艾麝香共搗勻隔水燉熱敷囟門上以紙蓋之過宿即通又方用連須蔥一根放碗內沖滾水以盞蓋之將兒抱在床上放下帳子以碗對小兒鼻孔熏之額上汗出即通小兒鼻塞不能吃乳醍醐三合青木香零陵香各四分三味煎成膏取少許捻丸塞鼻中或以膏塗囟門氣通以溫水洗去又方通草北細辛各一兩研細末以綿纏如棗核大藥如豆大放綿頭上納入鼻孔內一日二次即通小兒初生穀道不通門主論小兒初生穀道不通有一種內有薄膜遮住胎糞不能屙下通之胎糞自利可生有一種肛門長皮並無竅眼者危有用金刀割開胎糞自利亦有生者必須知覺早方能有救若遲延胸腹脹突面色青白不能吮乳者不治新增曾有一兒肛門內有一隔膜大便瀉時尚不啼哭遇大便乾結時必啼哭喊叫面色紫漲掙下大便如刀劈開者三四歲時一醫以金刀割開隔膜出血時以黑藥止血不過焮腫數日全安新增簡便方曰所謂悶臍生者小兒初生糞門有一膜遮住兒氣故不能出聲拍之則膜破而能啼哭須用輕巧婦人以銀簪腳輕輕挑破甚便或不能挑急用暖衣緊包勿令散放以熱水浸其胞衣寒天則加火熱之久則熱氣內鼓其膜自破聲出而蘇矣小兒初生穀道不通門主方急救方用蔥頭一個去須留涎蘸麻油潤入肛門內胎糞自利一法以戥杆蘸油潤入肛門自通小兒初生小便不通門主方驗方人乳四合蔥白一寸同煎分為四服小便即通胎毒門主論馮魯瞻曰後天諸毒易辨先天所中難明輕則發而為瘡也起似風癮漸成細瘰一作搔癢即濕而起片如癬白頭遍體上下隨感而發其瘡有蟲故名蟲胞謂從胎胞而來也總是濕火相乘血熱毒盛腠理愈開淫毒益熾癢為氣虛楚屬血虛其證屬腑旋久而氣血兩虛則因熱而起又因熱乘虛而內攻矣治宜托裡解毒為主然愈時結聚於頂者六陽諸毒上衝火毒炎上之徵也若初起便發於頂者胎毒壅盛上參陽位也如發稀而有白屑至久不愈者即名禿瘡亦有年長而患腦疳白禿不生髮者蓋足少陰腎其華在發因疳熱血氣損少不能榮發耳有收在四肢者是日久脾虛濕熱感襲也其驚瘡者驚本無物因蹉其血氣在臟為積在腑流溢皮膚而為瘡也戀銀瘡者眉間生瘡是肺熱也風瘡者亦發遍身其形甚小俗呼謂疥也蟲窠瘡窠內有蟲如細蟣子者是也諸瘡治法若痛癢不可忍者及性急面黑而血熱者宜若寒如芩連苦參之類體胖之人宜祛風燥濕清火為主如久病之後濕蒸於外達者但宜補托切勿多浴塗遏致毒內攻然諸瘡雖屬心火當用寒涼但熱則行寒則凝凝則毒反滯而難痊故莫如透肌解毒和血養陰則風火息而燥癢除且氣血充固諸毒不能為患矣若痘疹之後生瘡者餘毒未盡也亦宜化毒和血若瘡前發驚與夫瘡後發驚者皆因瘡而致也並宜理瘡為主至於一切胎毒俱宜涼血清熱解毒發散於外切勿輕從外治以致熱毒內攻卒成不救小兒臟腑嬌嫩易入難出耳若致瘡色焦枯肚腹青黑者生瘡而無膿汁者或遍體皆瘡毒發於肋或在少腹或在頂門腫起者並皆不治錦囊陳實功曰小兒遺毒爛斑乃未生前在於胞胎稟受或因父母楊梅瘡後遺毒既生之後先發紅點次成爛斑甚者口角穀道眼眶鼻麵皮肉俱壞多妨乳哺啼叫不安初治宜早用土茯苓湯調人中黃末每日數次共飲四五分外用解毒紫金丹磨塗患上效者可保十之三四遲則爛斑遍身不乳百難治一二此根蒂受毒之深也正宗又曰胎毒瘡乃母食辛熱厚味遺毒於胎則生子生瘡治之當戒發物及母欲後乳子不然恐難除根又曰有等小兒初產背上有大孔窬一二個但內中有膜完護臟腑者得生如無膜露見臟腑者即死無救如有膜者以補中益氣湯與產母服之乳兒自能長完亦有雖活三五歲而死者有之陳遠公曰小兒生半歲或一二歲忽身上手足肚腹頭面臂上長成大瘡久變為毒百計治之不效此非兒毒乃父母之毒當日結胎或感楊梅毒氣坐胎之後或感淫氣火邪以至貽害小兒治不得法多半死亡吾遇異傳治此證已數十人矣吾不傳方則負異人之善念而小兒無方失救不猶吾殺之乎用金銀花二兩生甘草天花粉黃藥錦地羅各三錢人參二錢水煎服二劑毒全消倘外口不愈另有外治用蝸牛生甘草兒茶樟腦黃丹水粉枯礬各三錢冰片輕粉各一錢地龍糞五錢麝香三分為細末麻油調敷數日瘡內生肉瘡口外斂真神方也輕者用煎方不必外治重者內外合治無不速痊余從萬世起見將方傳世願人廣傳體余之心為心勿自試為私秘不傳以受天譴冰鑑汪省之曰小兒遺毒爛斑乃在胎胞稟受故既生之後熱湯洗浴烘燻衣物外熱觸動內毒始發理例錢青掄曰小兒胎中遺毒患赤剝楊梅瘡並無皮膿血淋漓瘡瘍名曰竹衣乖竟有胎胎皆然者幼科良方駱潛庵曰胎中受母熱毒致生胎毒病證三朝一七十日半月之日最難救治五六日猶難速服延壽丹豆大三粒即愈推拿秘書胎毒門主方胎毒兒茶五錢焙研犍豬膽汁調勻煎滾冷定將瘡用甘草湯洗淨敷之又方啟玄大楓肉十五枚白膠香三錢煙膠二錢輕粉一錢共研細用雞蛋黃熬油調搽如癢加枯礬五分又方鱉甲煅存性研細麻油調搽竹衣乖內服丸方幼科良方真犀黃三分硃砂雄黃各七分乳香去油沒藥去油各五分麝香一分山慈菇一錢上為末蜜丸重三分金銀花湯每日調服一丸即愈竹衣乖搽方白蘆甘石煅過淬入黃連汁內三次童便內四次一兩赤石脂煅紫甘蔗皮燒炭存性兒茶各五錢黃柏豬膽塗炙七次七錢真綠豆粉炒七分冰片五分共研細用麻油入雞蛋黃煎黑去渣候冷調搽即愈小兒胎熱眼腫赤肚熱啼哭及身上紅腫或頭頂瘡癤耳出膿汁此方神效赤水玄珠鬱金天花粉甘草乾葛桔梗薄荷葉各等分共為末白湯調下五分或一錢仍用艾葉煎湯浸足底引熱下行胎熱卷皮火奶癬戀眉神方人中黃三分川貝母去心研二錢金銀花二錢白水煎徐徐服服至痊愈而止或用金銀花八兩川貝母四兩熬膏入人中黃二兩成膏每早晚量兒大小白湯沖服一二匙更妙仙傳延壽丹駱潛庵治小兒胎毒啞口口噤臍風馬牙鵝口重舌木舌風熱脾熱積熱骨蒸壯熱夜啼火眼翳障一切火證如神錦紋大黃十斤上切片先用白酒或黃酒浸兩晝夜入沙鍋煮一枝大香取出鋪在板上曬極干二次三次亦如之到四制用藁本煎汁浸一晝夜煮曬如前五制用車前草摘來洗淨灑水搗汁浸煮曬如前六制用向東南側柏葉清晨採來水洗搗汁浸煮曬如前到後三制仍用酒浸煮透曬至九次止曬半乾便入石臼搗爛為丸或重一分三分一錢二錢三錢看兒大小火證輕重加減用之秘方鮮半枝蓮搗汁掃上以渣煎湯洗即效又方慎火草搗汁搓胎瘤門主論蔣示吉曰初生小兒頭上胸乳間腫起大如饅首小似李梅此乃胎中瘀血凝滯而成須候小兒滿月以外方可用針刺破內如赤豆汁乃安內服五福化毒丹說約心法曰胎瘤乃胎前孕婦積熱以致胞熱更兼血瘀結滯而成多生頭上及胸乳間初如李核漸大如饅色紫微硬漫腫不甚疼痛如嬰兒初生即有者候過滿月熟透方可針之放出赤豆汁或膿汁其腫即消若滿月後生者必待膿鼓熟透再針吳半千曰紅絲瘤一名胎瘤發無定處由小漸大嬰兒落草或一二歲之間患之瘤皮色紅中含血絲亦有自破者治法雖同胎瘤但此患由先天腎中伏火精有血絲以氣相傳生子故有此疾終為火證亦難收斂奶癬瘡門主論陳實功曰兒在胎中母食五辛喜飧炙煿遺熱與兒生後頭面遍身發為奶癬流脂成片睡臥不安搔癢不絕治以文蛤散正宗吳半千曰小兒初生奶癬類乎疥癩初起手足次延腹背纏綿不已用殭蠶不拘多少去嘴研末煎湯浴之或一日一次毒必發生然後用青黛散搓之心法曰此證初生頭頂或生眉端癢起白屑形如疥癬由胎中血熱落草受風纏綿此即干𤼏瘡有誤用湯火洗皮膚起粟搔癢無度黃水津淫延及遍身即成濕𤼏瘡乾用潤肌膏濕用黃柏頭末滑石和勻乾摻癢甚者用烏雲膏奶癬瘡門主方文蛤散文蛤四兩輕粉五錢點紅川椒二兩先將文蛤打成細塊鍋內炒黃色次下川椒同炒黑色煙起為度入罐內封口存性次日入輕粉研為細末罐收貯香油調搓乳母戒口為妙又方川貝母去心金銀花各等分共為末煉蜜為丸每重一錢白湯調下又方大楓肉黃柏各五錢蛇床子二錢五分枯礬雄黃各一錢輕粉一錢三分共為末臘豬油調搓小兒奶癬及滿頭遍身黃水瘡白麵不拘多少香油拌勻作𥹚火燒成性為末再用真香油調搓青黛散青黛黃柏枯礬雄黃百藥煎硫黃各等分共研細濕則乾摻干則香油調搓以愈為度又方如意草搗爛塗之烏雲膏松香二兩硫黃一兩研勻香油拌如糊攤南青布上半指厚捲成條線紮緊再用香油泡一日取出刮去余油以火點著一頭朝下用粗碗接之布灰陸續剪去將滴下油浸冷水中一宿出火毒搓之奶癬並卷皮火雞蛋七個煮老去白炒取油杭粉三錢調搽又方饊子滾水泡透去饊只以湯洗之又方雄黃一錢食鹽一分共研細麻油調搓奶癬多生耳後令伊母嚼白米成膏塗之羊胡瘡門主論申鬥垣曰下唇下巴骨生瘡故名乃任脈經濕熱所生也在承漿穴地角邊宜除濕清熱藥主之啟玄羊胡瘡門主方羊胡散申鬥垣煙膠五錢輕粉一錢羊鬍鬚一撮燒灰共研濕則乾擦干則油調搽之肥瘡門主論陳實功曰肥瘡由胎毒而成者少因飲食之後油手摩頭或枕頭不潔而成者多正宗申鬥垣曰此瘡宜槐條煎湯洗淨以煙膠枯礬輕粉研細熟油調搽啟玄馮魯瞻曰此瘡乃臟腑不和之氣上衝血熱之毒上注小兒陰氣未足陽火有餘故最多犯之宜內服連翹天花粉荊芥防風貝母元參赤芍藥生地黃牛蒡子清熱解毒涼血和血之劑俟毒氣少解方外用藥以塗之切不可驟加寒涼塗遏以致熱毒內攻不救蓋小兒臟腑嬌嫩易入難出也錦囊肥瘡門主方肥瘡胡黃連輕粉雄黃各三分膽礬二分枯礬一錢豬蹄鞋三個煅存性研細將瘡洗淨搽之又方肥皂子煅存性研末豬膽汁調搽又方松香血丹各等分研細豬板油搗汁青布卷條燒之取油搽又方東丹八分枯礬一錢真鉛粉松香各二錢入蔥管內飯上蒸化待冷去蔥用共研細末熱香油調搽又方黃花燒灰輕粉少許研勻干搽小兒頭上肥瘡黃水瘡梅花禿銅綠松香各三錢黃蠟二錢香油一兩五錢熬勻塗之頭上生瘡俗名黏瘡絕妙方集驗海螵蛸二錢白膠香輕粉各五分研勻清油潤瘡以藥乾擦肥瘡極凶者苦參何首烏當歸威靈仙甘草金銀花胡麻石菖蒲連翹生地蟬蛻酒水同煎又方鴻禧東房傳大楓肉五錢白信三分油核桃五個共搗勻作三丸夜間取一丸在心口用手擦至二更天藥氣散開仍聚胸膛仰面而臥次夕亦然間一夜再擦一丸七日後痊愈頭面肥瘡經驗輕粉飛血丹白礬雄黃各等分研細裝入蔥管內兩頭扎煨過加龜版灰少許研菜油調搓立效黃水瘡門主論申鬥垣曰黃水瘡又名滴膿瘡啟玄陳實功曰頭面耳項忽生黃泡破流脂水傾刻沿開多生痛癢此因日曬風吹暴感濕熱或內飧濕熱之物風動火生者有之治用蛤粉散或四味異功散搽之正宗馮魯瞻曰面上耳邊生瘡時出黃水浸淫不愈名曰香瓣瘡錦囊凡初起細瘡手少動之即破毒水流入何處即生大水泡瘡即為黃水瘡此熱毒鬱於皮毛也當以湯洗之秘錄黃水瘡門主方四味異功散松香煉老生礬枯礬銀粉各等分研細先將撏豬湯或米泔水熬洗去淨瘡靨拭乾穢水干則麻油調搓濕則乾摻面上黃水瘡酸棗荊芥羊胡各煅灰存性一錢鉛粉五錢研細先以槐條煎水洗淨將藥敷上其瘡自好洗法岐天師雄黃防風各五錢水十碗數滾去渣取汁洗瘡即愈又方鉛粉用菜油調塗磁碟內多捲紙卷點著合熏時時攪勻待遍黃聽用將靨剝去搓上立愈又方周氏抄方雄豬膽一個黃柏一兩浸焙乾為末摻之白蛇串門主論申鬥垣曰白蛇串即白蛇纏生於腰間兩頭如蛇形兩頭相合則必不能救矣按綱目剪春蘿條下治火帶瘡繞臍腰腹生者採花葉搗爛蜜和塗之即愈大法宜隔紙膏啟玄白蛇纏腰乃腰裡起一紅泡圈子若不早治被其纏到者不救纏腰者如袴腰樣也錢青掄竇漢卿曰白蛇串即白蛇纏又名蛇窠瘡全書朱丹溪曰此瘡因衣服被蛇遊行或飲食中受沾蛇毒入於皮毛致生瘡且痛可用艾灸之瘡頭上或以松針刺血取蜈蚣浸油搓之或酒調雄黃白芷搓之澄曰此患多起於腰間若不急治則瘡形灰爛首尾搭頭無救白蛇串門主方劈毒立消丹吳羹相治白蛇纏並蛇蠍蜈蚣瘋犬咬毒腫痛垂危者雄黃一錢五分麝香冰片各一分牙硝二錢上藥端午時虔誠修合遇證點男左女右眼大眥內痛一盞茶時即止其腫漸消其痛漸止三日痊愈隔紙膏曹羽文雄豬油去皮膜熬化冷定入劈毒立消丹再加麻油二茶匙飛丹三錢收用攤隔紙膏貼之神效又方鱔魚血調雄黃末敷上即焦神效又方秘本蛇殼一條煅灰存性坑廁板上浮泥刮下同研細用童便調敷數次一二日即愈又方白芨八錢水龍骨糞船者妙一兩共研細無根水調敷又方鍋臍灰研細臭淘米泔水腳子調敷又方用紫棉紙三張作三長條以火點著從初起瘡上照至瘡尾即將紫棉紙灰用燈盞油腳調勻搽之每日一次三日痊愈又方豬窠草燒灰麻油調搓禁法取蛇神紙馬如鋪中無此紙馬可用黃團花折成長條狀如蛇形頭寬尾細放蛇窠瘡上一面遊繞一面禱祝曰家蛇歸洞野蛇上大路再將各種蛇名隨意念幾遍叫他上大路如菜花蛇叫他上大路赤練蛇叫他上大路馬梢蛇叫他上大路水蛇叫他上大路禱祝畢即將蛇紙順擱患者家歇房門口門檻上蛇頭向外取艾團三個頭中尾安三處用火灸艾俟艾燒盡再將蛇紙艾火一同燒盡搽瘡上即止疼如未痊愈次日早晚仍照上法治之不過三日瘡頭乾枯神驗又方陳壁土頭髮灰各等分麻油調搽又方人發煅黑驢糞煅牆上青苔各等分共為末香油調搓不過三次愈又方側柏葉黃柏韭地蚯蚓糞生大黃各五錢赤小豆雄黃輕粉各三錢研細用新汲水或香油調搽又方鮮鱔血塗又方黃粟米焙研細麻油調搓又方干艾葉搓為紙捻燒煙燻至黃色即住神效又方灶心土乾研清油調塗白禿瘡門主論陳實功曰白禿瘡俗名瘌痢乃剃頭時腠理司開外風襲入結聚不散以致氣血不潮皮肉乾枯遂成白禿瘡久則發白脫落正宗申鬥垣曰禿瘡乃足太陽膀胱督脈二經受濕熱生蟲作癢瘡痂高堆是也風襲則起白屑熱甚則禿久則傷孔不生髮也治當消風除濕殺蟲止癢養血啟玄汪省之曰白禿瘡久則發落根無榮養如禿斑光澤不癢內血不潮以姜擦潤肌膏常擦其發漸生如禿斑乾枯作癢者內必有蟲宜用殺蟲之藥治之理例白禿瘡門主方驗方仙人垢即死人棺底垢膩也不拘多少用鯽魚一尾香油煎熟取油調塗一銅錢厚又方黑桑椹子入瓶曬二十一日化水洗之又方香油一斤入活蜈蚣十條浸一月曬二三日收藏鵝翎攪之又方干蜈蚣不拘多少入瓶內真麻油浸一七將頭剃淨用油搓之又方百草霜研細麻油調搽又方雞蛋一個麻油二兩煎枯取油用尖檳榔粗碗底磨化加硫黃花椒末各三分攪勻搓之又方厚朴四兩麻油半斤同煎待冷搓之或研末冰麝油調搓亦效又方百草霜一兩榆皮三錢窯內燒紅土四兩膽礬六錢輕粉一錢研細剃頭後豬膽汁調搽香薷煎馮氏治白禿不生髮燥痛陳香薷二兩胡粉一兩豬脂五錢水一大盞煎香薷取汁三分去滓入胡粉豬脂和勻日日頻塗之洗瘌頭蝸牛三十條水三碗煎湯洗之兩次痊愈禿頭生髮秦椒白芷川芎各一兩蔓荊子雲苓香附各五錢俱生用銼碎絹袋盛浸香油七日取油日三度擦無發處其發自生切勿令油滴白肉上禿瘡有蟲癢痛啟玄煙膠五錢水銀雄黃各一錢枯礬輕粉各五分研細用陳臘豬油或馬脂油調搓多年治不好的禿瘡啟玄輕粉一錢枯礬三分用番木鱉不拘多少以油煎枯去木鱉用油調搽梅花禿胎毒辣痢雄豬毛一具揀淨去油膩陰乾入陽城罐封固火打三炷香冷定取出為末每用五分調搽先用花椒蔥白煎湯洗透待乾搽藥二七痊愈發出便佳瘌痢瘡積德堂陸氏酒肉店內油透陳竹燈掛一個劈碎裝瓷瓶內口上用舊髻鐵絲覆瓶口上倒轉下再用瓶以此瓶合於下瓶口上用火煅之其汁溜下取之搽上神效又方積德堂石灰窯內燒過紅土塹流結上渣輕虛色赤者四兩百草霜雄黃各一兩膽礬六錢榆皮三錢輕粉一錢研細剃頭豬膽汁調搓又方周氏抄本黃連末豬骨髓調搓禿瘡鴿子糞新瓦焙存性研細麻油或菜油調勻聽用如瘡靨堆起可用清米泔水同蔥川椒煎湯洗去擦上三次無不愈者又方瀝青二兩銅綠一錢五分黃蠟麻油各一兩五錢火熬膏攤貼神效瘌痢白禿狗油煮馬前子浮起研細先用宰豬湯洗淨搓之氈帽包頭過三日一掃光小兒頭上白色圈圈白禿蒜瓣每清晨揩白禿上自愈瘌瘡松香明礬豬板油搗搓即愈小兒白禿鮮鱔魚一條搗爛敷又方生鵝油塗在頭上用舊鞋底洗淨烘熱擦之擦盡白皮一連數次不可洗去又方大紅棗一枚去核填砒霜入內令滿紮緊炭火燒焦存性研細米泔水洗淨後塗之又方生黃豆炒黃研末香油調搽肥油膏吳半千番木鱉六錢當歸藜蘆各五錢黃柏苦參杏仁狼毒白附子各三錢鯉魚膽三個用香油十兩熬至黑黃色去渣入黃臘一兩二錢熔化以布攄過收貯每用少許用藍布裹手蘸擦躑躅花油躑躅花根四兩搗爛用香油一碗熬枯去渣入黃蠟少許濾清候冷青布蘸搓日用三次氈帽戴之勿令見風又方驢油頻搓患上瘡愈發長連床散治瘌瘡及手足身上陰器膚囊抓爛淋漓黃連五錢蛇床子二錢五分五倍子一錢二分半輕粉二十五貼為細末先以荊芥蔥白煎湯洗拭候乾清油調敷赤遊丹門主論內經運氣丹熛皆屬火經曰少陽司天客勝則丹疹外發及為丹熛是也聖惠云夫一切丹毒者為人身體忽然變赤如丹之狀故謂之丹毒也或發手足或發腹上如手大皆風熱惡毒所為重者亦有疽之類也若不急治則痛不可忍久則壞爛出膿血數升若發於節間便令人四肢毒腫入於腹則殺人小兒得之最為急也戴復庵曰發丹色狀不一癢痛亦異大概因血熱肌虛氣邪所搏而發然色赤者多以赤故謂之丹有發而色白謂之冷瘼此病多緣肌肉疏為風邪所襲而成風熱則赤風冷則白今人但呼赤為丹白為瘼古方亦名為癮疹非特分寒熱亦兼備四氣近世方論呼白為婆瘼赤為血風朱丹溪曰內傷癍者胃氣極虛一身如火遊外所致宜補以降之劉涓子鬼遺方云丹者惡毒之瘡五色無痛為丹毒癢者為風丹陳實功曰赤遊丹又名火丹乃心火妄動三焦風熱乘之故發於肌膚之表有乾溼之不同紅白之各異乾者色紅形如雲片上起風粟作癢發熱此屬心肝二經之火治以涼心瀉肝化斑解毒湯主之濕者色多黃白大小不等流水作爛多痛此屬脾肺二經濕熱宜清肺瀉脾除濕胃苓湯主之腰脅生之肝火妄動又名纏腰丹柴胡清肝湯主之甚者急以細磁鋒砭血精豬肉片貼之正宗許學士曰飛灶丹從頭頂紅腫光起宜蔥白自然汁調白芨末塗吉灶丹乃膀胱經風熱從頭上向腦後紅腫宜赤小豆紫荊皮末用雞子清或酒調塗鬼火丹乃手足陽明經風熱從面上起紅腫宜蜜調製柏散或雞子清調伏龍肝末塗之天火丹乃腎經中熱毒膀胱風熱從脊背起赤腫宜一二年陳羊油熔化調羌活末塗之天灶丹從兩臂赤腫少黃色或一臂乃手陽明風熱宜柳枝燒灰水調塗之或沖和膏塗水激丹兩脅虛腫紅熱乃足少陽膽經風熱宜有孕母豬屎燒灰蠟水塗之胡吹丹從臍上起黃腫者是任脈中熱與濕宜醋調檳榔末塗或酒調沖和膏塗野火丹從兩腿上起赤腫如火燒乃足陽明經中風熱宜羊油調乳香末塗或搗火丹草和醋塗或水調白芨末塗之煙火丹從兩足背上起赤腫痛乃足三陽經風熱亦有足底心起是足少陰腎經大熱宜香油調豬石槽下土塗之或蜜調製柏散塗胡漏丹從陰上起或黃腫赤腫乃足厥陰肝經虛火發於外宜羊油調屋漏土塗之或調製柏散醋塗又曰此俱小兒受胎內之毒如三日不治攻入腸胃必死又曰凡小兒未滿百日發丹不拘是何丹必死竇漢卿曰遊丹發於頭者何以治之必須將患兒眠在床上以腳跟一頭加磚一二塊以墜毒氣於頭再用磁鋒砭之使毒氣毒血皆從頭頂而出若乳母抱立在身砭之則毒氣順下遂壅咽喉必難生矣近觀同道之友顛倒砭之不行其手法以害諸兒故不辭瑣瑣又申明之又曰凡丹入於腹中飽悶臍凸體若燔炭者死又曰內丹從脅下至腰下腫發赤色至腰則死申鬥垣曰內丹言赤色如塗朱映於肉裡故名內丹似板而微腫如發於淵腋金門等穴或右或左皆少陽膽經一二日者可治如連腰臍青紫及大痛或大小便不通皆不可治死之必矣啟玄又曰夾豆丹者赤也如塗赤朱於皮膚之上乃熱毒蘊蓄惡血命門相火合而發起與痘相兼而生如霞片浮而薄者易治厚而紫者難痊當順天時若暑熱以通聖辛涼之劑解之嚴寒以升麻葛根辛溫之劑解之痘瘡既發正合其宜又有失於調護受風熱則血沸騰感寒冷則血凝泣亦可用塗敷之法於外又曰丹從腹往四肢者生從四肢入腹者無救竇漢卿曰赤丹急用磁鋒砭去紫血自下而上則毒血流上不可逆砭急用乳香末雞子清調勻塗砭處時以芭蕉根汁塗之又曰又有一種爛皮火丹用蓮蓬煅麵粉伏龍肝黃柏末和勻乾摻李東垣曰丹毒者謂人身忽然赤如塗丹之狀故謂之丹毒世俗有云赤瘤或因有瘡誤而相觸四畔焮赤謂之瘡瘤凡丹毒之疾皆遊走不定狀如雲氣者是也小兒得之最忌百日之內謂之胎瘤以其氣血嫩弱臟腑柔脆難任鐮針所以忌也馮魯瞻曰赤紫丹瘤皆心火內鬱而發赤如丹砂故名曰丹因熱毒客於皮膚搏於氣血而風乘之陰滯於陽則發丹毒熱極生風片刻之間遊走遍體虛熱則癢實熱則痛自腹而達於四肢者易治自四肢而歸於腹者難療書雖有五色之分十丹之異總不出血熱而屬於心心火內熾客風外乘風勝則樹木皆搖故令遊走殊速名為丹者以心應火而色赤也色紅者生白者氣虛挾痰紫者毒盛色青如苔者死赤者名赤遊丹熱毒感之深也其狀赤腫片片如胭脂塗染或發於手足或發於頭面胸背令兒躁悶腹脹其熱如火痛不可忍遊走遍體流行甚速須急治之若一入腹入腎即不可救白者名曰白遊風感風濕之輕證也其候流塊作癢壯熱憎寒鼻塞腦悶咳嗽吐逆其治之法赤者清涼解毒甚則砭去惡血以藥塗之白者不過疏散滲濕而已火灼瘡者先天之熱毒也火走空竅故必於口鼻眼目陰囊糞門之處紅點如癬漸成紅泡逾日而穿赤色無皮如湯火煿炙之狀痛苦殊甚睡臥不安一二日間周身能腐若至囟門腫氣陰毒腫亮者不治及一切丹毒入臟臍突出漿面頰紫浮噎氣不乳手足拳禁大小便絕胸背血點舌生黑瘡心胸紫腫者皆為不治然小兒臟腑嬌嫩凡一切丹毒必先內服解毒方可外敷蓋毒易入難出肌肉受傷其害輕臟腑受傷其害速耳錦囊陳實功曰小兒赤遊丹乃受毒於未生前發病於有生後蓋身在胞胎皆賴父精母血藉以生養父母不能節其欲多致淫火猖熾胎必侵受既生之後熱湯洗浴烘燻衣物觸動內毒欲發之時先必發熱啼叫驚搐次生紅腫光亮發熱瞬息遊走無定發無定處先從頭額起者名天灶丹治以升麻葛根湯母子同服余皆起於腹背腹背流入四肢者輕起於四肢流入胸背者重有此總宜砭去惡血為要砭血之後先用豬精肉縫片貼之一時許以金黃散用水芭蕉根搗汁調敷如毒氣入里腹脹堅硬不乳者紫雪散下之三日後身漸徹涼砭血之處肉便軟活聲清腹軟乳哺如常者順反此為逆正宗錢青掄曰天火丹從背上起赤點疤桑白皮為末羊脂調塗水激丹從兩脅虛腫起生鐵銼末豬糞調塗之纏腰丹腰生一紅蕾兩邊生紅筋纏至臍必死金墨磨濃和雄黃末塗之冷丹白色塊者用姜皮一撮煎湯洗之熱丹紅色塊者紫背浮萍煎湯洗之丹瘤或生頦下如櫻桃突出色赤而光者是也宜以綿羊腦子同朴硝研爛貼患處立效丹疹遍身紅點如灑朱者是也用防己半兩朴硝犀角黃芩黃耆升麻各一錢加竹瀝煎服即愈火丹遍身紅腫是也用當歸赤芍甘草大黃各等分每服三錢水半盅煎三四分食後服亦效火丹發於足踝者用蕓薹菜搗敷隨手即消赤遊風丹忽然腫癢流行不止一處者是也此證至急救遲則死用雄黃五倍子各等分為末醋調塗之或用無名異為末蔥汁調塗立消或用鐵鏽水塗之即消或用新生荷葉搗爛入鹽少許塗之即消赤遊丹門主方升麻葛根湯治丹毒身體發熱面紅氣急啼叫驚搐等證升麻葛根白芍柴胡黃芩黑山梔各一錢木通甘草各五分水煎不拘時母子同服大連翹飲治小兒丹毒發熱痰涎壅盛一切諸瘡痧疹頸項生核或傷風寒時行發熱等證連翹生石膏防風荊芥生甘草滑石黑山梔當歸瞿麥車前子木通牛蒡子赤芍藥柴胡炒黃芩蟬蛻各五分燈心二十根白水煎母子同服消毒犀牛飲小兒丹毒身熱氣粗啼叫驚搐不寧等證犀角防風各一錢甘草五分川黃連三分燈心二十根同煎徐徐服之紫雪散治小兒赤遊丹毒甚者毒氣入里肚腹膨脹氣急不乳即宜此藥救之又治傷寒熱躁發狂及外科一切蓄毒在內煩躁口乾恍惚不寧等證升麻羚羊角石膏寒水石犀角各一兩廣木香沉香各五錢生甘草八錢元參二兩水五碗同藥煎至一碗濾清再煎滾投提淨朴硝三兩六錢微火慢煎水氣將盡欲凝結之時傾入碗內下硃砂冰片各二錢金箔一百張各預乳細和勻碗頓水內候冷凝成雪也大人每用一錢小兒二分十歲者五分徐徐咽之即救病重者加至一錢亦可或用淡竹葉燈心煎湯化服俱可荊防散赤丹遊走荊芥牡丹皮防風金銀花牛蒡子炒杵橘紅生甘草羌活連翹天花粉元參赤芍藥各等分水煎服化斑解毒湯治三焦風熱上攻致生火丹延及遍身癢痛者元參人中黃知母生甘草石膏牛蒡子升麻川黃連連翹各等分淡竹葉二十片水煎不拘時服針砭法小兒赤遊丹毒紅赤焮腫遊走不定須急砭之用披針鋒尖向患上以烏木重箸在針面擊之密砭出血多者為妙血紅者輕紫者重黑者死砭畢溫湯洗淨用干精豬肉縫大片貼砭處一時許方換如意金黃散以水芭蕉根搗汁調敷搽藥方石膏密陀僧雄黃生大黃各等分研細芭蕉根汁調敷又方臘月羊油熬搓並治凍坼又方浮萍草搗汁搓又方芭蕉根搗汁搓又方鼠黏根搗汁搓綠袍散綠豆五錢生大黃二兩生薄荷搗汁入蜜調塗柏葉散治三焦火甚致生火丹作痛作癢延及遍身側柏葉炒黃大黃蚯蚓糞韭菜田內者佳黃柏各五錢赤小豆輕粉各三錢共為細末新汲水調搓當歸膏赤遊丹鵝掌風當歸生地黃各一兩木鱉子去殼大楓子去殼麻黃防風玄參紫草黃柏各五錢用麻油半斤同藥熬枯濾去渣再將油復入淨鍋內熬至滴水成珠再下黃蠟二兩試水中不散為度候稍冷傾入蓋碗內坐水中出火毒三日聽搓奇方湯氏灶馬即俗呼樟木蟲在灶內尋出活的去頭以白漿擦赤遊丹上不過數次即愈小兒赤遊丹胎毒呂爾青千腳泥一兩曬乾或烘加珍珠三分同研細菜油調敷腫處又方金雲章穿山甲炒炙血餘煅即頭髮灰各等分研末每服五分輕者三分黑糖拌滾湯調下又方芝麻炒研油調敷大人小兒火丹俱神效火丹遍身生遍形如水泡者單方用小兒胞衣瓶內水將雞毛掃上隨手即愈犀角解毒飲錢青掄治赤遊丹紅腫遊走遍體壯熱不安防風荊芥穗黃芩各一錢犀角磅甘草各五分牛蒡子微炒四錢水煎頻服神效又方灶心土不拘多少雞子清調敷又方船底青苔為末雞子清調敷丹瘤修真秘旨萆麻子五粒去皮研入面一匙水調塗甚效香瓣瘡門主論申鬥垣曰香瓣瘡又名浸淫瘡初生甚小先瘡後痛汁出浸淫濕爛肌肉延及遍身多生面上耳邊啟玄香瓣瘡門主方面上耳邊香瓣瘡羖羊須荊芥干棗去核各煅存性二錢研細入鉛粉五分每用少許油調先以溫湯洗淨拭乾塗上即愈煉銀瘡門主論李東垣曰煉銀瘡即面洇瘡是母受胎之日喜食酸辣及邪味過度多生此瘡精義洇尻瘡門主論申鬥垣曰初生小兒繃縛手足頤下頰肢窩腿丫內濕熱之氣蘊積洇爛成瘡此乃乳母看顧不到所致不可用他藥只用伏龍肝一味不拘多少研細乾摻以紙隔之啟玄面上熱毒惡瘡門主方面上生瘡胡粉輕粉松香各等分研細雞蛋黃煎油調搽面上熱毒惡瘡馮氏胡粉黃柏炙黃連各等分研細豬油調敷面上毒瘡初起急尋水蜒蚰一二條用醬少許共搗塗紙上留一小孔透氣貼上暑痘門主論胡公弼曰暑痘者乃暑熱襲於皮毛其形如痘圓淨根紅脹痛故有痘名青囊澄謂小兒因暑月烈日中戲嬉或坐日曬磚石或襁褓中受母暑熱相感皆能頭面叢生名曰暑痘施治之法內宜清暑利熱揀要害處敷消數枚切不可遍敷若一概敷消則所感暑熱無從外解必致深入瘧痢勢所難免不可因其小而惑之暑痘門主方驗方初起用飛羅面放掌心內以旋汲井華水調稀滴暑痘上自消又方石蟹水磨敷自消癤子門主論蔣示吉曰此乃暑邪血熱所致初起不發寒熱高腫於皮膚之間淺而小最大不過一二寸者名曰癤俗呼癤子說約李東垣曰有因微熱外攻而發於皮膚之上高腫熱痛此熱癤也精義癤子門主方驗方精義大黃朴硝各等分為末醋調敷熱癤五月五日午時取獨蒜切片貼眉心至夏不發熱癤菊花根搗汁無灰酒沖服癤在上身空心服癤在下身飽服自消採二蠶桑葉滴下之水點上愈頑癤不潰人乳調白麵敷之不久即潰癤久不斂白朮槿花煅存性研末搓之熱癤神效膏麻油四兩熬成珠再入松香末四兩炒黃丹二兩攪成膏攤貼初起熱癤枯礬研細香油調敷頑癤久不出頭生巴豆仁半粒同飯搗成餅貼癤上明日即出膿軟膿癤門主論軟膿癤乃暑伏三陽因循延漫所致軟膿癤門主方翠玉膏軟膿癤膿水逗流愈而復發明松香四兩銅綠二兩猔豬膽三個麻油三錢先將松香熔化入油令沸再下膽汁銅綠攪勻入水中以手扯拔去火毒瓷盒收貯用緋光絹量瘡大小攤貼不必更換聽其自落又方萆麻仁松香各等分搗膏貼之發可復生爛癤久不愈者青石灰鑄銅杓罐子各等分研細菜油調搽又方川銅綠一兩研末柏油熬膏攤布上貼之即消又方紅柿子皮貼之自干軟癤大芋頭搗爛敷又方陳明瓦天窗上者煅研清油調搓痱瘡門主論痱子乃暑氣傷熱而生也痱瘡門主方痱瘡痛癢綠豆粉微炒四兩滑石五錢研勻樸之又方雪水洗之隨洗隨減又方黃瓜即王瓜切片擦之即愈又方石粉撲之良痱子摩破成瘡生肌止痛集驗赤石脂黃柏去粗皮臘茶各五錢白麵二兩冰片五分共研細棉蘸撲之燕窩瘡門主論申鬥垣曰腦窩項後生瘡名燕窩瘡此足太陽膀胱經濕熱所生也啟玄燕窩瘡門主方燕土丹申鬥垣煙膠一兩燕窩土三錢輕粉一錢枯礬五分共研細清油調搓患上神效蓐瘡門主論錢青掄曰凡小兒百日內生瘡名曰蓐瘡由胎毒所致從身漸延至頭齊眉癩遍則愈若從頭漸至腹者難治宜內服犀角丸以化其毒幼科良方蓐瘡門主方犀角丸錢青掄治胎毒蓐瘡天竺黃防風羚羊角全蠍酒洗白殭蠶羌活明天麻京墨煅微煙為度川黃連犀角膽南星麻黃犀牛黃各等分為細末蒸餅打糊為丸芡實大硃砂金箔為衣每服一丸薄荷湯下
