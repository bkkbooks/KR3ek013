body:
  text: 卷二十九癩癬部自蛇蝨烏癩癬疹起至濕痰流注止皆匯於此部中以便檢閲參治蛇蝨門主論王肯堂曰蛇蝨遍身起如風疹疥丹之狀其色白不痛但癢搔抓之起白疕柏葉一味煎水洗內服蠟礬丸金銀皂角丸準繩心法曰白疕俗名蛇蝨生於皮膚形如疹疥色白而癢搔起白皮由風邪客於皮膚血燥不能榮養所致用豬油苦杏仁等分搗勻絹包擦烏白癩門主論王肯堂曰夫癩疾皆是惡風及犯觸忌害所得初覺皮毛變黑或淫淫苦癢如蟲行或眼前見物如垂絲言語無定心常驚恐皮肉之中或如桃李癮疹亦黑手足頑麻針刺不覺痛腳下頑痛不得踏地凡食之時開口出氣而鳴語亦如是身體生瘡痛癢而時如蟲行或兩肘如繩縛此名烏癩又有黑癩凡二癩之證大同小異故不別録也準繩又曰白癩者其語聲嘶嗄目視不明四肢頑痛身體大熱心中懊惱手足緩縱背膂拘急內如針刺或生癮疹而起往往正白在皮肉鼻有息肉目生白珠擋於瞳子視無所見名曰白癩也陳實功曰癩風乃陽明濕熱沸騰於肌表或受風寒侵襲而成其患初起水泡作癢成瘡破流脂水癢至徹骨久則成片延及遍身好浴熱湯形如風癩上體者汗解外毒下體者疏瀉內毒為主正宗陳遠公曰人一身發癩皮厚生瘡血出如疥或痛或癢或濕或干似蟲非蟲人以為濕熱留於皮膚誰知乃氣血不能周到滋潤乎世多以苦參煎湯或豨蘞白芷外治不能奏效正成於氣血虛也夫氣血足則經絡無閉塞之虞氣血旺則毛竅無枯乾之患且氣足血旺則熱散濕消何至瘀滯不通結於皮膚之外哉治法以補氣血為主佐以消濕散熱雖十載沉疴尚可奏功矧目前近癩乎用掃癩丹黃耆三兩當歸金銀花各二兩白朮茯苓麥冬白芍熟地元參各一兩山萸川芎各五錢生甘草荊芥花粉各三錢防風二錢水煎服皮色即潤二劑乾燥解十劑痊愈冰鑑此方大補氣血無異枯涸之田逢甘霖之滂沛生機勃勃水滿平疇而蝗蝻之類自消於無形矣沈紫亮十四種癩證歌訣心經火癩蟋蟀連肝經木癩風厲偏脾經上狗癩並屬肺經金癩面白兼腎經水癩兩烏共胃經酒麻癩總言夫癩之為害較之風證稍輕然其致害之患一也但癩愈而形可復瘋愈則元氣難復癩死者少瘋死者多然皆非善證耳醫學要則辨六經癩形心經火癩如灼之瘡大小不一或形如癬裂斷皮膚愈而復發乃心臟受毒病深七年方盛其蟋蟀癩亦乃心經毒也肝經木癩初起似蝕癬狀大小不同形色不一或遍身高低不定俗呼為棉花癬脾經土癩或先發熱嘔吐身發黃腫即現癗塊大如雞卵小如彈丸或麻木不仁穿即成瘡膿氣臭穢難聞肺經金癩初發如楊梅瘡上無殼內泛碎肉凸起紫赤潰爛真如楊梅毒入肺經眉睫毛落二年鼻梁崩倒眼塌唇翻乃金癩之驗若蠹魚生肺腑致生面白細蟲舉體艾白斑駁周身如癬儼然泥壁風之狀外用熏洗則能取效白癩乃風寒暑濕之氣邪毒湊聚彌滿肺竅久則蟲蠹食肺管所致腎經水癩必先得水病而停蓄又為風濕觸激或生在陰莖蝕於陰囊兩旁發腫塊橫痃寒熱交作腫痛難忍漸大而潰變成爛瘡一年病劇眉發墜落水癩之毒在腎濕久生蟲流注遍身則生青黑赤紫斑駁以致陰莖痿癩皮穿肉爛膿血臭穢烏癩乃邪毒入腎蟲食精髓下虛不救若在胸肋脅腿臂肋之間生核如桃李之狀穿爛臭惡或似漏瘡或如𤺋疹手足頑痹針刺不知此種之證宜大補氣血胃經酒癩因醉臥汗出迎風邪入於胃所致似赤非赤似白非白大者如錢小者如豆此證最為難治麻癩由酒毒留滯胃腑遍發瘡毒狀如疥癬痛癢難忍或手足發黑白頑痹形如雁來鵝掌風之狀或發內痔頭硬而碎形如蟺頭遍體皆然觸之則大痛冷汗一時即愈瘋與癩大同小異但癩輕而瘋重治癩之法可於瘋證門中諸方酌用㾦癗門主論王肯堂曰夫人陽氣外虛則多汗汗出當風風氣搏於肌肉與熱氣並則生㾦癗狀如麻豆甚者漸大搔之則成瘡也準繩心法曰㾦癗俗名鬼飯疙瘩由汗出受風或露臥乘涼風邪多中表虛之人初起皮膚作癢次發扁疙瘩形如豆瓣堆纍成片日間癢甚者宜秦艽牛蒡湯夜間癢甚者宜當歸飲子外用燒酒浸百部以藍布蘸酒搓之謹避風涼癬門主論陳實功曰癬乃風熱濕蟲四者而成風宜散熱宜清濕宜滲蟲宜殺總由血燥風毒克於脾肺二經耳正宗又曰風癬如雲朵皮膚嬌嫩抓之則起白屑不知痛癢又曰濕癬如蟲形搔之則有汁出又曰頑癬抓之全不知痛又曰牛皮癬頑硬且堅抓之如朽木又曰馬皮癬微癢白點相連又曰狗皮癬白斑相簇時作微癢周文採曰乾癬搔之則出白屑索然雕枯集驗又曰刀癬則輪廓全無縱橫不定申鬥垣曰白殼瘡即癬也啓玄王肯堂曰面上風癬初起㾦癗或漸成細瘡時作痛癢發於春月名曰花癬女人多生之此皆肺經蘊積風熱陽氣上升發於面部或生眉目之間久而不愈恐成風疾準繩蔣示吉曰上半身為頑癬治之易多屬風熱說約又曰陰癬生在下半身治之最難多屬寒濕總之血分受病以致皮膚不和也癬門主方浮萍散治風癬疥癩當歸川芎荊芥赤芍藥甘草浮萍七月十五日採取陰乾各一錢五分麻黃七分五釐夏月只用三分加蔥白二根豆豉五六十粒水煎熱服取汁手臂加桂枝背加羌活膝加牛膝薄桂遍身風癬防風金銀花片芩山梔仁生地黃木通川黃連當歸苦參各一錢飛滑石升麻各三分荊芥穗香白芷各七分桔梗生甘草各五分蟬蛻皂針牛蒡子各八分生薑一片穿山甲四片水二盅煎八分食遠服未服藥先一日用茄子藤連根葉煎水熏洗將癬擦透次日服藥三劑除根濕熱生癬干浮萍一兩蒼耳子蒼朮苦參各一兩五錢黃芩五錢香附米二錢五分酒糊丸上身多食後服下身多食前服白湯送下三錢癬土槿皮一兩斑蝥二個雞心檳榔三個番木鱉四個火酒半斤浸一伏時蘸搓癬上忌大蒜火酒又方硫黃輕粉各等分研勻蜜調搽又方大棗一枚去核入白砒三分泥裹煨透冷定去泥研細香油調搽又方蜜陀僧五倍子各等分研細蜜調搽又方土槿皮研細醋調敷以紙蓋之又方商陸根蘸蜜擦之又方土槿皮研細粗夏布包扎浸火酒一伏時擦之又方禿菜根蘸人乳擦之又方白降丹三分輕粉七分醋調擦之又方土大黃鳳仙花梗枯白礬水飛共搗麻布包扎蘸醋擦之又方白砒硫黃罐口各等分入杓內化開將地下挖一孔將藥傾入冷定取出米醋磨敷又方硫黃三錢枯礬一分白芷三分斑蝥三個去翅足研末抓破擦之又方樹上經露水的蜂房一個以生礬填滿房孔置罐底以細火煅令礬化為度取出研細抓破擦之又方牛舌草即土大黃白薇楝樹皮各一兩冰片甘草各一錢輕粉蝸牛各三錢焙乾如無活的殼亦可用共研細用荔枝核將癬抓破真麻油調搽又方皂礬炒研豬膽汁調搽又方鮮土大黃搗爛加川椒白糖鹽各少許用布包入醋內浸半日取起擦癬又方生天南星生草烏各等分研細用土大黃汁調搽又方豬蹄殼內填生白礬瓦上煅存性搽之又方蛇床子藁本尖檳榔硫黃枯礬白膠香五倍子各等分研細乾癬香油調擦濕癬乾擦頑癬醋調搽又方土槿皮三兩明雄黃水銀各二錢潮腦一錢檳榔七分麝香一分大楓子斑蝥木鱉子各七枚研細入火酒斤半封一七蘸搓百部膏治牛皮癬百部白鮮皮鶴蝨萆麻仁生地黃黃柏全當歸各一兩麻油半斤入藥熬枯去渣復熬至滴水成珠再下黃蠟二兩試水不散為度拿起鍋入雄黃末和勻稍冷傾入磁鉢中收貯退火氣聽用三五十年頑癬鐵線粉出廣西要對換海金砂冰片麝香末各等分生薑醋擦又方枯白礬七分血丹三分研勻土大黃根同搗搽又方土槿皮三兩公檳榔一兩不見火曬乾磨細用好滴醋調如薄糊隔水蒸一炷香取出敷患處棉紙蓋上二三次即愈又方生白朮三兩土槿皮一兩五錢不見火曬乾為末滴醋調搓三次必愈又方先用生薑汁搓再用柏油搽頑癬陰癬土槿皮二兩斑蝥十四枚明雄黃硼砂各六錢火酒二斤浸三日搽之項上耳旁濕癬蘆薈一兩甘草五錢研極細先將癬以溫水洗淨拭乾搽之厚牛皮癬全蠍七個巴豆二十粒斑蝥十枚麻油一兩黃蠟一錢先將巴蠍斑蝥入油熬焦黃色去藥取油如油少可加麻油煉滾投蠟熔化收貯擦之又方土地黃根搗爛和蜜擦癬頑癬大公蝦一個取蝦大爪抓破癬見血路為度即以蝦腦塗之二次即消陰癬生明礬熟明礬各一錢輕粉二錢銀硝三分研細用土地黃根搗爛布包蘸藥末擦之頭項以上癬用傾過銀子的銀罐子大小二個盛硫黃一兩於大罐內以小罐覆住文武火煅俟火焰高罐上一寸約一盅茶時取出冷定取上覆罐研為細末用柏油豬骨髓調勻將癬用刀剃破搓上一伏時愈又方旱浮萍草生擦癬覺疼起泡挑破再擦三日不見水結疤永不再發又方硫黃細末拌生豬油熬熟將癬抓破搓擦自愈治癬碧玉散銅緑硼砂白礬各等分研勻香油調搓岐天師神方祕録楝樹皮大楓子潮腦各三錢水銀硫黃花椒炒木鱉子明雄黃蟬蛻木通各二錢全蠍二個土槿皮四兩斑蝥公檳榔各七個皮硝五錢用火酒三四斤浸十日擦之又方蘆薈輕粉雄黃各一錢大黃蛇床子土槿皮各三錢檳榔二錢研末先將癬刮破以米醋調搓頭面荷葉癬川槿皮研細醋調湯頓如膠將癬抓破搓之白礬散遍身生癬日久不愈延至頭面獨莖羊蹄根搗細白礬研細以極酸米醋調抓破搓癬隔日再搓不過兩次即愈又方紫蘇潮腦蒼耳草浮萍煎湯洗癬牛皮血癬舊銀罐一個露蜂房煅灰五錢枯礬二錢研細香油調搓年久陰癬數日除根土槿皮五錢露水鏡面燒酒各四兩同浸七日抓破癬皮用新羊毛筆塗之每日數次千金方孫真人以日午時立日光下人影有癬處著艾灸之點艾時念咒咒曰癬中蟲毛絨絨若欲治待日中一氣念三遍俟艾火過添火再念再灸如此三遍三炷即愈癬瘡延蔓東坡家藏決明子研細水銀輕粉各少許再和研不見水銀星為度刮破上藥立瘥又方銅青雄黃斑蝥各等分研勻無根水調敷起泡刺破柏燭油搓潔淨不發又方杜黃連即羊蹄根一握洗淨搗濾汁白梅數枚去核同汁搗爛用穿山甲刮破搓數次即愈荷葉癬古方田螺一個開靨入信石二分待肉化水搽上即愈牛皮癬及多年頑癬紅粉霜五分即紅升丹明礬杏仁去油皮川槿皮各一錢密陀僧三錢共研細津調搽一日三次三日痊愈又方牛皮燒灰油調搽牛皮血癬古仙方硫黃九分白砒一分巴豆三粒去油研細茶油調搓頑癬祕方白砒一分硫黃九分白硝三分明礬四分冰片五釐研末津調擦之楊梅癬枯白礬硫黃各一兩八錢雄黃膽礬輕粉各一錢川椒三錢研細用生豬板油去皮入藥擦破數次其效如神楊梅癬硃砂雄黃沒藥去油乳香去油兒茶各一錢杏仁四十粒大楓肉二十粒搗爛絹包擦之鵝掌瘋癬祕録川烏草烏何首烏花粉赤芍藥防風荊芥蒼朮地丁各一兩艾葉四兩煎湯先熏後洗層層起皮痛癢自愈圈子癬集驗谷樹皮剪如癬樣大小以毛背一面用唾貼癬上以手不時撲之即愈癬方硫黃木炭灰各等分共為極細末將癬用穿山甲刮破擦上數次愈又方馬蹄決明子一兩為末入水銀輕粉少許研不見水銀星為度將癬刮破擦上立愈又方馬蜂窩一個仰放瓦上以枯礬填滿孔內炭火炙焦研末用蠟醋腳調塗即愈陰癬鮮旱蓮草揉成團用穿山甲將癬刮破擦癬上奇驗渾身癬羊蹄根搗汁入墨盆內將白芨磨濃汁搓之又方鉛一斤煎水日洗數次即愈川槿皮錠劉長隨治一切癬如神烏梅肉半斤用羊蹄根汁浸一夜次日重湯燉一炷香又放飯鍋上蒸軟透取出搗如泥加番打麻研細一兩海螵蛸研細五錢入烏梅肉又搗勻稱過每一兩加白降丹八分白砒七分再搗勻入白芨細末一錢又搗勻做成二三錢重的錠子陰乾收貯凡用以羊蹄根同醋磨濃搓之癬方胡繡溪土荊皮三兩尖檳榔斑蝥去頭足糯米炒大楓子木鱉子各七個巴豆仁五個雄黃潮腦川烏白鮮皮草烏各二錢麝香三分火酒二斤半同入小口瓶內封口浸七日將癬刮破擦之頑癬黑鉛一錢熔化離火入水銀一錢研為極細末加真輕粉潮腦各一錢和勻再研細取牛舌草根去土淨搗自然汁和勻再用穿山甲將癬刮破敷上出盡血水為度癢時則頻頻搓之搓時微痛勿懼頑癬臁瘡及湯火傷盛惟章真川鉛粉銀硃各五分麝香三分上為末用鵝油捶和如泥用油紙一長條將半段用針刺孔攤膏合轉來將光面貼癬絹帛縛緊二三日一換夏月早晚換牛皮癬穿舊牛皮靴底上皮陰陽瓦煅存性研細將癬刮破擦之癬雞蛋一個開一小孔去白存黃入硫黃川椒末各三錢將濕紙封固灰火內煨熟為末先以麻線將癬刮破用谷樹漿或羊蹄根汁調搽又方多年竹燈掛一個火上烤出汁如膠者另將五倍子去蟲炒為末和勻用陳醋在火上溫熱調搓頑癬硫黃一兩火硝白砒各一錢先將硫黃入銀罐內化開再入硝砒末攪勻傾入土內埋七日搓三五次癬雷公藤五分大楓肉防風各一錢五分土槿皮蚯蚓糞牛舌草根各三錢共為末陳醋調搽牛皮癬桃樹根同膽礬搗爛敷癬生臉上如錢大抓之有白屑者緑豆捶碎以紙繃糊碗口上針戳多孔以碎豆鋪紙上放紅炭一塊架蓋上俟豆灼盡紙將焦去豆揭紙碗中有水取搽三五次老癬輕粉雄黃黃丹銀硃各等分研細用米醋浸大黃夏布包蘸藥擦之陰癬鹽內皂角擦之燥癬水銀胡粉研蛋清調搓又方雄雞冠血塗又方胡粉炒黃赤色醋調塗又方搗桃樹白皮醋和塗濕癬石硫黃研用三年陳醋調敷又方蛇床子黃柏黃連胡粉各一兩研細入水銀一棗子大和豬油研勻塗之又方用粗碗一隻以皮紙用針戳眼糊碗口上以水潮紙上令濕將杉木屑堆潮紙碗上用火點著俟杉木屑燒盡輕輕去屑灰揭開紙看碗中杉木油取搓癬上必效癍疹門主論孫真人論曰素問云風邪客於肌中則肌虛真氣發散又被寒搏皮膚外發腠理開毫毛淫氣妄行則為癢也所以有風疹瘙癢皆由於此又有赤疹者忽然起如蚊蟲咬煩癢極者重抓疹起瘙之逐手起又有白疹者發冷亦有赤疹蓋赤疹者發熱王肯堂曰夫風癮疹者由邪氣客於皮膚復遇風寒相搏則為癮疹若赤疹者由冷濕搏於肌中風熱結成赤疹也遇熱則極若冷則瘥也白疹者由於風氣搏於肌中風冷結為白疹也遇冷則極或風中亦極得晴明則瘥著厚暖衣亦瘥也其脈浮而洪浮則為風洪則為氣風氣相搏則為癮疹致身體為癢也準繩朱丹溪曰疹屬熱與痰在肺宜清肺火降痰或解散出汗亦有可下者心法方論皆謂緣肌中有濕若涼熱之氣所折熱結不散則成赤疹若因風邪所折風熱相搏則成白疹赤疹得熱則劇得冷則減蓋熱氣鬱於內故惡熱宜冷白疹得陰雨則甚得晴則消蓋熱氣散釋於外故惡冷宜熱熱搏於血分其邪因併發於表則赤若風濕搏於氣分則氣脈不行因邪併發於表則白夫如是然後於治法相應邪熱者故惡熱而喜涼邪濕者故惡雨而喜晴矣方論中又有風㾦癗者即內經所謂汗出見濕乃生痤痱又曰勞汗當風寒薄為郁乃痤痱即癮疹屬也故㾦癗類也此皆謂外邪郁肌肉玄府之熱者矣然則與內經言少陽少陰而君相二火客熱之勝為丹疹外發者方論中則無有也故人氣君相二火鬱發而變者宜乎未之及耳若此條是人氣所變之一者也故二火鬱發出血氣之表與外邪所郁無異更有小兒發痘瘡之外必有出疹二次亦是君相二火發出未盡之胎毒也又曰癮疹入腹亦能殺人宜用蠶砂煎濃湯洗之又曰癮疹熱多則色赤風多則色白甚者癢痛搔之則成瘡也林氏曰或問斑疹因何而生屬陰屬陽屬虛屬實屬表屬裡可得聞有詳乎答曰斑疹之發有外感風熱者有胃腑實熱為病者有傷寒失下者有傷寒陽明經證失汗發衄不衄則發頤不生頤則發斑疹者總屬陽明胃與大腸之風熱亢盛已極內不得疏泄外不得透達怫鬱於皮毛腠理之間輕則為疹重則為斑一如火乘金位金受火克之故此乃陽毒屬表屬實之斑疹也有陰虛血熱者有陽虛血熱者有氣血兩虛而虛熱鬱盛者此三焦無根之火乘氣血之虛而空發於上怫鬱於皮毛血脈之中內不得清外不得散遂發斑疹乃陰虛屬裡之證也活人録又曰或問何以為斑何以為疹陰陽既別何者為重何者為輕答曰斑者成片不分顆粒一如雲朵拱起淡紅者輕紫紅者重黑者凶輕者癢而重者痛疹者如痱㾦或類蚊跡蚤蝨痕而不盛一日之中起伏隱現不常隱隱見於肌膚之間不大起發者是大約陽證斑疹易看而易治陰證斑疹挾虛而發難看而難治苟不細審則陰證誤以為陽立至危殆可不慎歟又曰身熱無汗煩渴躁悶或痛或癢如雲若錦腹痛胸滿二便祕結六脈浮洪有力或浮數有力者系手陽明大腸足陽明胃二經風熱為病所謂陽斑也若內熱自汗渴不欲飲心煩身躁胃弱脾泄喜濕惡熱色白而不紅但癢而不痛六脈遲緩微弱或虛數無力者手太陰肺足太陰脾手少陰心足少陰腎經之陰火內亢為病所謂陰斑也疹形雖與斑異而致病之因受病之臟腑及所現之脈與形證無不同蓋斑有陰陽則疹亦有陰陽自在醫者審其證之陰陽虛實脈之無力有力可也又曰兩陽合明其火自盛兼有食積致生積熱故斑疹之因必歸過於胃與大腸也火盛則血熱而金爍蓋心為火臟主血脈肺為金臟主皮毛火聚胸中肺受熏蒸心火愈熾或熱極反兼風化或客風鼓動內火其病發於心肺二經所謂陽斑陽疹必先清散風熱於表疏導積熱於內表裡和解以救炎炎之熱如二便祕結急宜利之若脾腎之陰虛火盛不能歸經固藏發越於上而心肺受其熏灼而病亦有因風致火或因熱極生風而發所謂陰斑陰疹初則亦宜清解使其透發寬其胸膈解其煩躁次則察脈之大小虛實脾胃之實與不實大便之結與不結或清補或溫補又曰雖陰陽俱有斑疹而陽證發斑者多且多發於熱病之末陰證則發疹者多發於病之始蓋斑由積熱發之稍緩疹兼風火發之猶速發之速者禍輕發之緩者其禍反深則又天下事理必然之勢也至於時氣發疹由風熱之邪乘於肺經必兼鼻塞氣粗痰嗽餘熱不清遺於陽明大腸並其糟粕蘊積而為濕熱更成積滯自利其至熱鬱化火火性急迫隨氣滯下而後重不舒者宜用辛涼升散之劑清其邪熱使郁陷之氣透達外解不惟斑疹自消而濕熱亦散矣若痰嗽不清加以清火清痰之藥積滯有餘濕熱下迫加以分清利濁健運化導之劑如木香黃連山楂神麯車前澤瀉之類更用枳殼寬胸開鬱升提郁陷之邪風濕鬱於腸胃風熱逆於肌表傷於血分則憎寒壯熱胸中嘈雜肚腹疼痛發為赤疹傷於氣分發為白疹俱令瘙癢無度一日三現三隱俗名風綹疹即此是也第一宜忌香油煅鮮麵食並戒酸鹹倘不知禁戒輕則成瘡甚則不時舉發致成終身之纍治當疏風散熱托疹為主癍疹門主方通治陽證斑疹主方活人録生地三錢防風荊芥各一錢五分川黃連犀角屑牡丹皮各五分黃芩桔梗各一錢甘草三分水煎不拘時服血中伏火必先涼血故以生地為君而丹皮佐之芩連瀉心肺之火佐桔梗以開鬱結犀角清心家之熱毒而甘草佐之荊防用以解散內外之風邪外感重者加羌活一錢川芎薄荷各五分暫去芩連生地如陽明胃家熱毒煩躁熱渴無汗背寒斑疹黑紫色者速加石膏一兩連翹一錢五分元參一錢犀角五分去防風桔梗傷寒邪熱入胃舌胎黃黑有刺二便不通譫語狂熱者加大黃五錢芒硝三錢枳實二錢去生地防風丹皮傷寒陽明失表煩渴外熱半表半裡大便不去無下症者加乾葛三錢牛蒡子二錢元參一錢五分薄荷一錢去生地丹皮黃連犀角通治陰證斑疹主方白朮二錢白茯苓一錢五分人參炮姜各一錢陳皮炙甘草防風各五分肉桂三分水煎早晚空心服上方乃治陽虛血熱及氣熱血熱凡惡寒喜熱二便清利口不幹而反欲熱飲六脈沉微細數或虛數無神者宜之此氣虛不能統運血脈致血久郁生熱而有風熱之變也腎水不足龍火無制陡發越於上心肺受其熏逼而成斑疹者八味地黃湯導火歸原兼服腎氣丸治陰虛血熱熱鬱血中而生斑疹時發時止或痛久遠不愈者以此涼血清熱滋肝息風兼服濟陰丸生地三錢制首烏二錢當歸乾葛各一錢五分秦艽丹皮甘菊荊芥各一錢薄荷五分甘草三分水煎午後臨睡服遍身風疹作癢生芝麻研碎擦之又方過年貼過掛絡擦之又方鹽蒲包煎湯洗之風疹不時舉發真麻油燒酒各半酒杯和勻燉熱發時服之再不發矣葡萄疫門主論陳實功曰葡萄疫乃小兒感受四時不正之氣鬱於皮膚不散結成大小青紫斑點色若葡萄發在遍體頭面乃為腑證自無表裡如邪毒傳胃牙根出血久則虛人斑方漸退初起宜服羚羊角湯清熱涼血久當滋益其內又有牙根腐爛者人中白散主之正宗心法曰此證惟腿脛居多葡萄疫門主方羚羊角散正宗羚羊角防風麥門冬玄參知母牛蒡子黃芩各八分生甘草二分淡竹葉十片水二盅煎六分食遠服胃脾湯正宗北五味五分白朮遠志肉陳皮沙參麥門冬茯神生甘草五分水二盅煎六分食遠服如虛弱自汗者去沙參加人參黃耆各五分非疳散治葡萄疫攻牙腐爛五倍子炒茶褐色人中白煅各一兩冰片四分研細用米泔水漱淨吹濕痰流注門主論陳實功曰流者行也注者住也由其瘀壅其形漫腫無頭皮色不變所發毋論穴道隨處可生皆緣榮氣不從逆於肉裡如風寒相中表證發散未盡者散之房欲之後陰虛外寒所侵者溫之惱怒傷肝鬱結傷脾者歸脾湯加青皮香附散之跌撲損傷瘀血凝滯者和血湯逐之産後惡露未盡流注經絡而成者木香流氣飲導之如不得內消者法當大養氣血培助脾胃溫暖經絡通行關節十全大補湯加熟附子香附主之如膿已成宜急開之正宗王肯堂曰不串流者俗曰馬𤷍串流者名曰走散流注俗曰瓜藤馬𤷍遍身骨節內疼痛不能起坐無堆作熱不退者名曰嗍骨馬𤷍若脊骨及髀骨上起堆或一二個或三五個名曰過脊馬𤷍若尾骶骨上起堆作熱者名曰殺臀馬𤷍若髀骨下痛甚無堆但腫者名曰鎖腳馬𤷍若骨相交接之處疼痛無堆微腫名曰接骨馬𤷍此證因風熱走散四肢治當疏風散熱初起不可用火針烙之腫勢盛者只宜刺以稜針久熟者可火針烙之流注入股者死準繩又曰禁用寒涼克伐內消等劑汪省之曰夫流者行也乃氣血之壯自無停息之機注者住也因氣血之衰有凝滯之患故行者由其自然住者由於瘀壅凡得此者多生於體虛之人勤勞之輩不慎調燮夏秋露臥縱意取涼熱體當風或中風邪發散未盡或欲後陰虛外寒所侵又或惱怒傷肝鬱結傷脾榮氣不從逆於肉裡又或跌打損傷瘀血凝滯或産後惡露未盡流縮經絡皆成斯疾也初起外以琥珀膏敷貼內服行氣活血之劑其中十可消其五六如不得內消者法當大養其氣血培助脾胃溫暖經絡通行關節如木香流氣飲十全大補湯俱加熟附子香附培助根本庶未成自淌已潰自斂不致殘敗破漏不斂之證且如有膿宜急開之忌用寒涼克伐內消等藥犯此終致不救者多矣理例朱丹溪曰凡人身上中下有塊者是痰然痰在皮裡膜外則遍體遊行腫而色白滯而不痛宜導達疏利如痰因火動而走則體多小塊色紅痛甚流走無定宜解毒清火為主又曰痰在皮裡膜外非薑汁竹瀝不能通痰在脅下非白芥子不能達白芥子亦能散皮裡膜外之痰氣竹瀝滑痰非薑汁不能行經絡痰在四肢非竹瀝不開申鬥垣曰三陽經傷寒發汗不透則必痛痛久則腫腫久則必為熱熱久則破壞此名陽濕痰破瘡如三陰經失汗汗郁成痰則痛痛久則皮色不變而腫至夜痛反甚其痛處冰冷脈亦沉細日久氣血凝注則肌死肌死則破壞腐臭名曰陰濕痰破瘡均宜艾灸啓玄又曰冷流注多附骨硬不消骨寒而痛筋縮不能伸屈庸俗誤用刀針又無膿血止有如屋漏汁或瘀黑血宜用回陽玉龍膏如稍緩再加軍薑肉桂白芷草烏等分熱酒調敷則骨寒除而痛自止氣溫和而筋自伸肉亦軟而腫自消亦不可無石菖蒲以其性能破堅散腫最妙亦不可多多則解群藥性也又曰流注首尾敷沖和膏最穩加乳香沒藥治流注筋不能伸敷之極效又曰走散流注發因受寒凍凝滯血脈而成一名流注傷寒又名瓜藤發背患生於背遍身皆有之經云傷寒流注尚猶可流注傷寒急如火醫者當察其寒熱虛實治之胡公弼曰流注又曰走注狀似鱉形毒因風盛而生熱氣因熱盛而走散午前宜四君子湯加芎歸午後宜四物湯加參耆麥冬北五味斷不可用滲利流氣等藥青囊又曰治流注大法郁者開之怒者平之閃撲及産後瘀血者散之傷寒餘邪者調解之大要以固元氣為主佐以現證之藥又曰流注一個要表汗一次如流注三個須表汗三次毒自消矣設治之不早深為大害又曰如破潰成膿者先用降藥降去敗肉腐盡生肌可也醫林集要云白虎飛尸留連周期或展轉數歲冷毒朽骨出盡自愈若附骨腐者可痊正骨腐者則為終身廢疾矣又曰又有結核在項腋或兩乳傍或兩胯軟肉處名為𤷍癧癰屬冷證也又有小兒宿痰失導致結核於頸項臀膊胸背之處亦冷證也並宜熱藥敷貼王西圃曰流痰胸腹流於四肢者可治四肢流入胸腹者難治心法曰流注新發漫腫無頭皮色不變凝結日久微熱漸痛透紅一點方是膿熟即宜用針開破若濕痰化成者膿色黏白若瘀血化成者膿色金黃黏水若風濕化成者膿色白稀如豆汁若汗後餘邪化成者膿色或黃或黑稀膿臭穢以上四證發於肉厚處可愈發於骨結及骨空處難愈若淫欲受寒化成者膿色稀白而腥其水中有豬脂水油之狀此為敗漿膿也諸書雖有治法終成敗證馮魯瞻曰按臟腑津液受病為痰隨氣升降理之常也若在皮裡膜外及四肢關節曲折之地而臟腑之痰何能流注其所此即本處津液遇冷遇熱即凝結成痰而為病斷非別部之津液受病成痰舍其本位而移於他部者況氣本無形故能無微不達而液隨氣運亦可藉氣周流若至津液受病成痰則變為有形而凝滯焉能隨氣流通於至微至密之所耶試痰法用海蜇皮貼上外以膏貼之如痰次日膏藥揭得下海蜇皮揭不下即是害痰濕痰流注門主方香附餅正宗治風寒流注襲於經絡結成腫痛香附為末酒和量瘡大小做餅覆患處熱尉斗尉藥餅上未成者自消已成者自潰風寒濕毒宜薑汁作餅尉之醒脾湯正宗治懷抱鬱結思慮傷脾以致脾氣不行逆於肉裡乃生壅腫疼痛不眠心煩不安神氣不清人參白茯神白朮嫩黃耆蜜炙酸棗仁炒研遠志肉各一錢地骨皮七分桔梗柴胡川黃連廣木香炙甘草香附各五分圓眼肉七枚姜三片棗二枚水二盅煎八分不拘時服琥珀膏正宗治一切皮色不變漫腫無頭氣血凝滯結成流毒毋論身體上下年月新久但未成膿者並效生大黃二兩鬱金白芷天南星各一兩共為細末用大蒜去殼搗爛上入藥再搗略入酒一二匙調勻遍敷腫上紙蓋隨有熱痛又有不痛俱待藥干便效次日又有起泡又有不起泡者如有泡起挑去泡中黃水以膏貼之自效調中大成湯治流注潰後膿水清稀飲食減少不能生肌收斂人參二錢白朮嫩黃耆炙陳皮當歸身山藥白茯苓白芍藥酒炒牡丹皮各一錢遠志肉砂仁藿香炙甘草各五分熟附子上肉桂各八分煨姜三片黑棗二枚煎食遠服黃耆六一湯治流注潰後膿水出多口乾作渴煩躁不寧嫩黃耆六錢生用蜜炙各半粉甘草一錢五分生炙各半人參一錢水煎食遠服木香餅治一切氣滯結腫成核或痛或酸閃肭風寒所致生地黃搗膏廣木香減半研末和勻量患處大小作餅置腫上以熱尉斗尉之堅硬木痛者間日尉之自效流痰渾身作痛當歸栝蔞仁獨活大川芎白茯苓白芷白芍藥連翹防己穿山甲炒防風生地黃金銀花牛膝天花粉黃芩陳皮川貝母甘草各五錢分作六劑酒水同煎若上半身痛食後服下半身痛食前服如遍身痛只用酒煎神效火龍膏治風寒暑濕毒襲經絡筋攣骨痛或肢節煩痛濕痰流注作痛不能行步鶴膝風骨節風疼痛其效猶速生薑半斤取汁牛皮膠二兩入鍋內化開入乳香沒藥末各五錢麝香一錢調勻待溫攤貼患處濕痰流注奇方趙若豫木瓜一個當歸五錢甘草三錢細酒一斤同煎減半再加研細乳香沒藥各一錢露一宿空心熱服未潰自消已潰自斂濕痰內消方宣木瓜五錢紫花地丁一兩五錢臘酒二斤煎好露一宿看證上下分食前後服內消濕痰流注神方吉祥草根洗淨搗汁半酒杯和酒沖服取汗即消且不生瘡毒錦囊祕授神效觀音救苦丹馮魯瞻神治一切風寒濕氣流注作痛手足蜷攣小兒偏搐口眼喎斜婦人心腹痞塊攻疼不問年深月久將藥置患處以燈火點著候至火滅連灰罨於肉上立見痊愈重者用藥米粒大輕者用藥粞粒大只須一壯不必復灸若患處闊大連排數壯一齊灸之且灸時不甚熱痛灸後並不潰膿一茶之頃痼疾如失屢試屢驗真神方也固思濟之一方不若利之天下惠之一時不若澤之後世特附於錦囊之中以廣厥傳願後賢以為半積半養之珍幸勿專為嗜利之具麝香一錢硃砂二錢硫黃三錢各研細末先將硫黃化開次入朱麝同化傾入瓷器內候乾再研末隔火化開候切作如粞米大貯瓷瓶內慎勿出氣珍藏聽用一切腫塊濕痰流注鮮山藥天麻各五錢酒水各一盅煎服三劑全消敷痰賈頌周大蒜頭十數枚去皮入皂礬三錢搗爛聽用用香一炷點起將藥敷患上以一炷香盡為度如是痰即現青紅色如只紅色則非痰也如其是痰隔日敷之三次自消又方天南星大黃白芨各等分研細薑汁和醋調敷又方白蘿蔔葉扁柏葉向北者乾麵各等分研細醋調敷日易一次自消敷濕痰腫痛癰疽發背無名腫毒五倍子瓦焙黃色生半夏生南星各等分共研細同滴醋熬數沸加蔥薑汁調敷痛處留頭如藥乾用醋不時潤之至重毒證不過三四次即消敷痰法生山藥一段洋糖飛面共搗爛塗敷自消摩腰紫金丹活人録風寒濕三氣而兼痰飲留滯於經絡血脈中閉塞不通而痛並治腰痛附子尖烏頭尖天南星各二錢五分雄黃樟腦丁香各一錢五分吳茱萸肉桂硃砂乾薑各一錢麝香二分蜜熬蔥汁和丸如雞頭子大每丸以薑汁化開敷塗患處上貼萬靈膏或蠲痛膏蠲痛五汁膏寒濕氣襲於經絡血脈之中為痛痛於兩臂兩股腰背環跳之間鳳仙梗搗汁老薑汁蒜汁韭汁各等分熬至滴水成珠用萆麻子油同黃蠟收起每以此膏烘熱貼上追出濕氣水液自愈消痰方芫花研末一錢棗肉搗勻為丸在上食後服在下食前服白湯送下即便出穢痰其腫立消但此法宜施於壯實初起之人須忌甘草又方乳香去油沒藥去油各一錢川貝母去心研二錢連翹八錢萬年青三片煎服自消雷火針風寒濕氣痰滯於經絡血脈之中閉塞不通而痛蘄艾一兩硃砂二錢穿山甲土炙桃皮草烏川烏乳香雄黃沒藥硫黃各一錢麝香五分共為細末以蘄艾鋪粗紙上入藥末三錢捲成筒如爆竹式擇吉日將藥筒入瓶內以箬葉油紙封口埋屋下地中四十九日取出任用此針能針百病可於患處用青布或紅布折二十四層將針燈上點著吹息隔布針之患內暖極即止不過三次即愈治因風鬱痰生於頸項皮膚腫硬白色不甚疼痛說約天南星半夏研末薑汁調敷或南星半夏末薑汁和餅隔蒜灸更妙消痰神方新鮮針線包即蘆州上蘆柴上纏繞之物形如鳥首緑色內有白漿秋深冬月白漿枯乾裂開便如毛絮者是也不拘多少搗爛敷上自消痰注臂痛湯仁齊天仙藤白朮羌活白芷各三錢薑黃六錢製半夏每服五錢姜五片水煎服濕痰腫痛經年不能行者單方水紅花花椒蘿蔔英甘草槐花金銀花蒼朮白鳳仙花水龍骨各等分豨蘞草煎熏患處水稍溫即洗之神仙外應膏祕方川烏一斤為末用陳醋入砂鍋內慢火熬如醬色敷患處如病一年敷後一日發癢二年二日發癢癢時令人將手拍癢處拍至不癢為度先用升麻皮硝生薑煎水洗然後敷藥不可見風濕痰流注初起腫痛無頭皮色不變久而不治則發熱作膿知覺早者於未破時急服此方十餘劑即能內消最稱靈驗橘紅防風秦艽木通各一錢真膽星二錢川貝母殭蠶炒桃仁炒五倍子金銀花各三錢防己八分白甘遂刮去皮末七分皂角子鮮者敲碎九個肥皂子鮮者敲碎十個土茯苓磁鋒刮皮打碎四兩虛弱人加石斛薏仁各一錢痰在頭頂胸者加夏枯草一錢痰在背脊者加羌活五分痰在脅肋者加柴胡五分痰在肚腹者加赤芍澤瀉各一錢痰在臂者加獨活五分痰在腿腳者加木瓜一錢牛膝一錢五分上用河水九碗砂鍋內煎三碗每日早中晚各熱服一碗如痰在心之上者食後服痰在心之下者食前服如虛弱人分二劑極虛者分三劑小兒分四劑忌食鹽醬茶醋豬肉鮮魚雞鴨鵝一切發物煎炒姜椒烟酒生冷但藥內有甘遂與甘草相反恐別樣丸散內有甘草者切不可服已破頭者止服四五劑使氣血調和不至又流他處隨服十全大補湯加川貝母二錢五分石斛二錢滴乳香去油四分須服數十劑方能痊愈若系多火之人十全大補湯內減去肉桂願體集治流注抄本石膏一兩官硼三錢飛面作十丸將丸穿一孔貫以鐵線炭火煅紅取酒一碗投入令又燒紅入酒內以丸盡為度待酒熱即服一日二服自消又方金銀花紅花各三錢地榆苦參各二兩酒水各半煎服近者三劑遠者七劑即消神驗方周鶴仙用薑黃母子是大薑黃身上小釘子是也研末將小紅棗去核藥末入內填平用絲棉扎緊塞入鼻孔內隨量飲醉蓋暖出汗已潰者自然痊愈未潰者內消神效之極鼻孔照男左女右塞之藥不可經婦人手又方野花椒山茱萸各半斤用酒浸煮三炷香冷定將酒儘量飲醉發汗一身其毒自散神效又方金銀花帶葉和酒糟研爛用淨瓦罐盛藥火中煨熱敷患處立愈濕痰初起一劑消蘊公和尚歸尾大貝母黃芩川牛膝木瓜白茯苓檳榔陳皮各一錢牡蠣金銀花土木鱉白殭蠶各一錢五分熟大黃三錢一方去大黃用揚州産紅芽大戟加五分加至一錢八分止取效更速用無灰酒一斤煎一半空心熱服取汗行二三次渣用酒半斤煎四兩再服立消渾身上下濕痰並消一切無名腫毒穿山甲大片者土炒七錢鬧羊花一兩豬牙皂炒一錢羌活四錢共研細末每服一分八釐加洋糖三錢熱酒調下消痰神方楊驚愚無論流痰腋痰腋核如已經貼有膏藥敷藥內膿已成者務將膏藥揭去敷藥洗淨然後服藥一服十消五六至重者不過三服穿山甲炒生大黃生明礬各四兩杏仁去皮二兩上四味俱用碾槽研極細末切不可磨若磨則不效每服三錢痰在上部食後服痰在下部食前服俱用木瓜酒調下孕婦忌服流痰紫花地丁一兩五錢宣木瓜五錢蠟酒二斤煎一斤露一宿痰在上身食後熱服痰在下身食前服之每日一劑三日後自消修服時忌經婦人手敷流痰王西圃生大黃天南星白芨各等分共研細末生薑汁江醋調敷敷流痰張漁山白蘿蔔葉搗朝北扁柏葉搗飛面和杵敷上一日一換即消敷上宜蓋暖出汗敷痰徐聲士土子漆匠熬桐油的生半夏川烏生南星草烏各等分研細末桐油調敷敷痰石灰當歸尾皮硝穿山甲川烏薄荷葉草烏各五錢生大黃一兩研細末鹽滷打糊調敷濕痰流注蔥汁一飯碗鳳仙花一棵搗汁如無鮮者即用乾者一棵研末先將二汁熬稠入廣膠二錢熔化再加人中白細末二錢和勻攤膏貼又方蒜瓣三十瓣皂礬三錢共搗爛敷一炷線香時即洗去次日再敷起泡無妨又方乳香去油沒藥去油雄黃各三錢麝香三分大蜈蚣一條研細末用黃蠟三錢熔化為丸每服三錢陳酒送下隨量飲醉出汗自消濕熱流注杜祕連翹心八錢乳香去油沒藥去油廣木香各五錢引加萬年青葉七片開口花椒四十九粒水煎服後飲木瓜酒體壯人加黑白醜一錢消痰吳天序甘草三錢金銀花羌活天花粉各一兩蒲公英紫花地丁各二兩白水煎加無灰酒儘量服出汗如糊一劑即消消痰胡學海豬牙皂一錢五分蜈蚣三條全蠍五個乳香去油川貝母穿山甲明雄沒藥去油各三錢麝香五分共研細黃臘熔化為丸每服三錢木瓜酒下消三十六種痰塊仙方劉介華九頭獅子草川貝母甜味者佳各一斤共磨細末無灰酒為丸大人每服三錢小兒減半木瓜酒送下或開水亦可不過三服必消孕婦忌服消痰神方黑棗八兩去皮核老鼠花買三文錢研細同棗肉為丸如核桃大每服一丸白湯嚼下如是痰服後必腹痛吐的也是痰屙的也是痰候行過數次用溫粥一盞吃之即止其痰即消如未消盡明日再服消盡為度痠痛門主論風寒氣鬱於皮毛致血不榮於肌表皮槁多痛手足似無皮之狀是酸苦生焉先將蔥湯洗淨潤肌膏擦之就暖勿見風冷自愈如每逢冬即發者須三伏時曬搗爛大蒜間擦三次不再發經云寒因熱治其理甚明傷寒瘥後發腫門主論傷寒愈後浮腫若因水氣者宜利之若胃虛食少者宜五苓散加蒼朮陳皮木香砂仁之類胃不虛者以商陸一味煮粥食之亦妙傷寒大病瘥後腫者不妨但節飲食戒酒色胃氣強腫自消也傷寒身癢門主論凡陽明反無汗皮中如蟲行者胃主肌肉陽明久虛也宜朮附湯黃耆建中湯主之如風熱盛身癢發熱無汗口燥舌乾大小便祕澀者宜防風通聖散加羌活主之如風證身癢者宜小續命去附子加白附子主之如血虛身癢者宜四物湯加浮萍蒺藜防風主之身上虛癢者是血不榮於腠理也用四物湯加黃芩煎調浮萍末服之腫塊門主論虛怯人氣血乖違肢體患腫塊或痛或不痛或風襲於經絡肢體疼痛或四肢筋攣骨痛宜用蔥尉法其腫自消此外補陽氣而運散壅滯之法也腫塊門主方蔥尉法蔥頭切細搗爛炒熱尉患處冷則易之再尉腫處自已即跌打損傷腫痛亦用此法凡有腫塊處糯米一二合炊飯或粽子煮熟乘熱入鹽少許加切碎蔥數根白酒麴一小丸同搗極爛如膏烘熱貼患處油紙及布包縛住自消又方白酒麴一二丸為末炒枯熱酒調敷即可內消消塊止痛丹冰鑑人參半夏白朮各三錢黃耆薏苡仁白茯苓各五錢羌活防風各一錢桂枝五分水煎服二劑輕四劑止二十劑消盡汗斑門主論張仲景曰汗斑乃暑熱之時人不知而用日曬之手巾揩其身上之汗便成此病最無害而難愈宜內服蒼耳丸主之汗斑門主方驗方硫黃鉛粉各等分共研細用生薑切片蘸擦初則變黑次則轉紅紅退則愈又方密陀僧鉛粉各等分研勻生薑蘸擦又方用厚布一尺以白砒研極細末雞蛋清和勻漿於布上拍勻曬乾不時擦之數日即愈兼治一切頑癬如神汗斑肥皂硫黃雄黃白砒明礬密陀僧各一兩肥皂去筋弦膜淨六兩共搗為大圓擦汗斑上停一頓飯時洗去將手巾另用清水搓過切不可擦臉恐有氣息攻目汗斑錢懷谷先將生薑切片擦汗斑上再以薑汁調川貝母細末搓上過宿洗去汗斑粗夏布一塊用瓦上青苔不是瓦上長瓦松將井水洗淨搗汁浸布曬乾用白芷一兩硫黃五錢同炒研細以雞蛋清調勻漿在布上曬乾以布擦斑上自愈又方密陀僧硫黃各一錢冰片一分研細燒酒調搓又方白硼砂研細擦之即愈汗斑楊驚愚北細辛白芷各二錢硫黃一錢共研極細末用花紅蓮蒂切一片蘸擦除根赤白汗斑劉進士雄黃硫黃全蠍白殭蠶白附子密陀僧各五分麝香共為末蘸生薑於患處擦之五日除根
