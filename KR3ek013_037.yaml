body:
  text: 卷三十七急救部自刑杖湯火起至自刎縊溺魘魅等證皆匯於此部中以便檢閲參治三木門主論世多情不由已事出不虞受害一身重刑難免遭此極刑何求不得每致冤抑難伸足脛多成痼疾特立此門救諸慘痛惟鐵布衫一方功效非輕新增三木門主方祕方生牛肉剁爛作餅四個每個納胡椒十四粒貼夾傷處新棉裹緊一夜即能步履矣鐵布衫丸臨審預服受刑不痛亦且保命自然銅煅紅醋淬七次蘇木無名異洗去浮土當歸酒洗搗膏沒藥去油地龍去土曬乾乳香去油木鱉子香油搽在殼上灰焙用肉各等分研細煉蜜丸如芡實大每服三丸預用白湯化服縱受非刑辱拷可保無虞又方狗油飛面各四兩川烏草烏各五錢萆麻仁三錢皂角刺十個麝香一錢肥皂二十個煮爛去筋皮弦子二烏皂刺和飛面研細入上藥共搗爛作四餅先一日貼受刑處忌鐵器冷水或加猴腦或猴頭同搗更妙預服免痛自然銅煅紅醋淬七次蚯蚓白頸者乳香去油番木鱉沒藥去油無名異各等分研細煉蜜為丸每重二錢臨時酒下受刑後獨核肥皂一斤䕵米一升同煮成飯去飯用肥皂搗敷又方黃牛肉一斤銼碎入紅銅末四兩搗勻敷又方生獨核肥皂砂糖真麝香搗如泥蒸熟作餅貼夾傷上棉花包好夾棍傷一出衙門即用熱童便一盆將足浸之如便冷燒紅磚兩塊淬入即熱直浸至童便面上浮起白沫其傷盡出矣不𭼊不㿉再用肥皂搗如泥用雞蛋清和勻罨傷處用草紙包裹腳縛緊三日不可動即效內服末藥方人中白煅一兩木耳燒灰存性五錢乳香沒藥俱用箬炙去油懷牛膝各三錢自然銅煅五錢共研細末再用牛膝酒煎調服三五錢如無末藥即用當歸尾川芎乳香獨活鱉蝨胡麻骨碎補紅花五加皮各一錢生白酒一壺煎數沸縱量飲避風寒厚蓋出汗立愈如骨傷加土鱉蟲一枚夾棍傷神驗膏周鶴仙大黃白蠟各四兩敗龜版當歸各三兩松香乳香各二兩骨碎補沒藥各一兩川續斷五錢麝香二錢以上各為細末豬板油三兩將白蠟松香乳香置在銅鍋內同豬油化開將前藥末入油調勻為膏貼於夾傷處第二日即可行走夾棍軟骨神方江仍度川烏炒存性草烏炒存性豬牙皂炒存性萆麻子去殼炒各一兩飛面六兩狗油半斤熬化共搗勻作四餅每餅中間包真麝香二分五釐貼用刑處先用威靈仙四兩煎湯足脛浴透然後以藥餅貼上修合時忌犯鐵器如不用刑以半夏生薑飛面各等分做四餅貼上即解夾棍神方肥皂子水浸透去外黑皮用里白肉並仁搗如泥如明日用刑今晚用此藥上至腳廉脡一節下至腳底板心並指甲內處處敷勻不可有一毫空隙以油紙包好外用裹腳纏定其藥與皮肉一樣顏色不變用刑時一些不礙毫無傷損用刑後以豆漿溫洗之其豆漿須預先一日將黃豆泡爛磨漿候用之玉紅夾紙膏專治杖瘡及夾棍大刑並跌打損傷如神乳香去油紅血竭沒藥去油白兒茶潮腦各一兩銀硃八錢銅緑三錢嫩松香四兩研細末萆麻仁肥大者去皮膜四百四十粒入乳鉢內乳之以成膏為度和上藥再乳成膏如杖瘡用夾連油紙一張用木尺裁九寸五分長一尺一寸寬折過來一面用針戳孔一面攤膏於上合蓋夾膏於內以有孔者著肉貼之外用桑皮紙包好再用裹腳纏緊為妙貼一伏時揭下用後開洗藥洗拭乾淨再將膏拭淨仍用原膏貼之至重者不過三次全愈如受大刑亦用夾連油紙雙摺四方塊共四塊亦如前法碎刺孔眼一面攤膏貼上用新棉花包裹再用裹腳纏好或五六日一換此膏旋攤旋貼其膏用蓋碗收貯勿泄氣如干難攤以滾水燉開攤忌鐵器忌見火洗刑杖法白朮威靈仙秦艽五加皮當歸漢防己紅花川牛膝羌活甘草劉寄奴宣木瓜獨活廣三七白芷防風各二錢煎湯洗後再貼玉紅夾紙膏夾棍方如真遇冤枉者可送此藥救之功德無量生肥皂六兩真猴骨一兩銼細末活鯽魚大者一尾小者二尾沒藥去油乳香去油生半夏各五錢老生薑四錢麝香三分生蔥二兩共研勻做成四餅貼於兩足孤拐上一夜天明即去如不受刑用甘草四兩煎濃水趁熱洗一二次即解杖瘡門主論東醫寶鑑云杖傷大概通滯血皆以酒引蓋血滯則氣壅瘀氣壅瘀則經絡滿急經絡滿急故腫且痛凡打僕著肌肉必腫痛者以經絡傷氣血不行故如此申鬥垣曰叫號傷氣忍痛傷血亦有血奔心而死者宜熱尿灌之啓玄種杏云凡杖畢即用童便好酒各一盅合而溫服免血攻心甚妙仍用蔥白搗爛炒熱溻杖處冷則易止痛散血如神馮魯瞻曰宜用紫荊皮乳香沒藥生地大黃黃柏之類錦囊朱丹溪曰黃柏生地紫荊皮皆敷杖瘡之要藥也若血熱作痛宜涼血去瘀血為先加血竭紅花更佳心法入門云凡杖瘡忽乾黑陷毒氣攻心恍惚煩悶嘔吐者死陳實功曰杖瘡已破肉者以清涼膏敷之疼腫即消未破瘀血內攻者用針放出內蓄瘀血再以大成湯下之便通自愈如傷處瘀腐已作痛疼者玉紅膏搽之自然腐化生新而愈至於辱刑重刑難受之時宜預服鐵布衫丸方得保全身命也正宗陳遠公曰腿受官刑皮肉腐爛死血未散疼痛呼號是宜用膏藥末藥外治為佳受刑深重不急內消專恃外治則消遙膜外安能衛心使惡血不相犯乎故內治宜速也世人外治之方多有神奇而內治之方絶無應驗往往多一時心亂而死者雖犯法遭刑其中情真罪當者固多而受冤遭陷者更復不少冤氣在心則肝葉開張肝氣填急尤善引血入心使無辜之人一旦輕死固非醫人之罪而治之無法是誰之愆與余得異方凡受官刑即時煎服服後用膏藥末藥內外兼治瘡口易愈必無性命之憂矣衛心仙丹大黃紅花丹皮木耳各三錢白芥子二錢當歸生地各一兩桃仁三十粒水煎一服惡血散矣不必二劑再以膏貼之名護心仙丹大黃白蠟敗龜版當歸各一兩三七根乳香沒藥各三錢骨碎補松香各五錢麝香五分為末先用豬油一兩同白蠟松香入銅鍋化開再下各藥拌為膏貼傷處外用油紙包裹以布扎住輕者一張重者兩張足矣如夾棍重傷不須四張即可行步二方至神至奇內方使惡血盡散外方使死肉速生合而用之何至損命嘆醫治之無術耳冰鑑杖瘡門主方杖瘡珍珠散兼治一切刀傷斧砍敷上立即止血斂口腫毒久不收口者掃上立即生肌收口珍珠入豆腐內煮至豆腐起蜂窩時取出研之乳香去油海螵蛸水飛琥珀象皮炒黃沒藥去油龍骨火煅紅兒茶輕粉各一錢瓜兒竭二錢研細瓷瓶密貯毋泄其味制油紙法槐枝一寸長四十九段麻油四兩熬至枝枯撈起再入黃蠟四兩熔化乘熱即裁厚綿紙長闊四五寸或厚皮紙拖油取起出火氣聽用凡杖後用刷杆挑敷前制末藥於杖處將油紙貼上再用尋常油紙蓋之外以新布裹定一日一換藥紙每次只用藥五六分不過數日設若杖瘡已經見水過須倍費時日也用此藥必須制油紙否則收口過速恐留餘毒也散腫止痛膏嫩松香燉化濾清六兩萆麻仁搗化四兩潮腦一兩磦珠飛過五錢銅緑水飛二錢先將松香用重湯燉化再入四味調勻用陳油紙甘草湯煮過陰乾攤貼杖瘡不可見水貼上扎緊又方生大黃末紅糖調敷候乾溫湯洗去又敷數次大有散血止痛之功又方凡杖後即用童便和酒一杯飲之以免血氣攻心外用熱豆腐鋪在杖傷處其氣如蒸腐色變紫後易之候紫血散盡轉淡紅色為愈又方韭菜搗爛敷之又方陳石灰為末水調鵝翎掃上又方鳳仙花連梗葉搗敷又方豆腐煮透拌黃柏細末搗敷又方細磁片擂極細末麻油調敷立時止疼又方劉寄奴六錢馬鞭草四錢研細蜜調搽潰者乾摻棒瘡皮破闢麝草葉搗爛敷上扎住即愈散瘀拈痛膏正宗凡杖後皮肉損破紅紫青斑焮腫疼痛墜重者用如意金黃散一兩加樟冰三錢研勻以白石灰一升用水二碗和勻候一時許用灰上清水傾入碗內加麻油一半和勻用竹箸百轉自成稠膏調前藥稀稠得所聽用杖後帶血不用湯洗將藥通遍敷之紙蓋布扎夏月一日冬月二日方用蔥湯淋洗乾淨仍再敷之痛止腫消青紫即退傷重者另搽玉紅膏完口又方臘豬油一兩七錢黃臘三錢潮腦二錢五分白蠟輕粉鉛粉各五錢沒藥去油二錢冰片一分乳香一錢去油先將豬油二蠟化開再入各末攪勻攤貼油紙用甘草湯煮熟揉軟熱湯燉化攤貼凡棒瘡破爛至重疼痛者一日換一張三日全愈一方豬油二兩潮腦一兩白蠟黃蠟各七錢五分輕粉一錢麝香冰片各三分無乳香沒藥鉛粉杖瘡爛下肉至重者都門內官傳木耳水泡搗爛敷在爛處止痛生肌鬼代丹受杖不痛故名無名異木鱉子去殼油炙自然銅火煅醋淬七次地龍去土乳香去油沒藥去油草烏各等分地上挖一小土坑用炭火燒紅澆醋在坑內入草烏蒸軟一方無草烏為末蜜丸彈子大每服一丸溫酒化下凡用此丸可先用出過蛾的蠶繭子燒灰二錢為末酒調下再服此丸不曾遇責可用牛膝甘草煎湯服之即解乳香散杖瘡神效全當歸自然銅醋淬七次各五錢茴香四錢滴乳香去油真沒藥去油各三錢研細每服五錢溫酒調下寄杖散醫鑑未打之先取白蠟一兩細切入碗內滾酒泡服則雖打著不痛杖傷公門祕方久爛中有四五分深潭不能收口者血竭一錢朱丹輕粉各二錢白蠟五錢共為細末摻上一日夜其肉四圍生起兩日即平又方杖後腫痛雄黃一兩密陀僧五錢研細水調敷極妙杖後白芨研細每日米飲調下三錢數日即愈仙傳膏杖後重傷死血鬱結厄逆不食並夾傷內爛貼之可以起死回生輕粉血竭各三錢樟腦二錢冰片三分麝香一分沒藥去油乳香去油各一錢五分共研極細用豬板油一兩二錢黃蠟一兩同化調藥成膏攤貼患處晝夜流水即時蘇醒又方滑石大黃赤石脂各等分研細蜜調敷又方梧桐樹根曬燥炒黃研細重者一錢輕者五分好酒沖服湯潑火傷門主論申鬥垣曰火之為用性最猛烈萬物傾刻成灰何況人之皮肉經此灼燔皮焦肉卷苦痛難熬輕則成瘡重則致死百計千方難免其苦特選奇方以救湯火中傷之苦啓玄又曰滾湯沸油熱粥失誤常遭其害令人皮溻肉爛又曰每見貧苦烤火禦寒熾令火氣入肉成瘡作痛出汁宜制柏散加蘇荷末摻之陳實功曰但凡水火之氣當分其勢而利導之切不可驟用冷汁淋漓涼藥塗敷熱毒得冷更深入骨難瘥設令寒涼一逼火毒歸心殺人更速正宗又曰此患原無內證皆從外來也有湯火熱極逼毒內攻又有外傷寒涼激毒入極外皮損爛者用清涼膏等藥塗之如毒氣入內煩躁口乾二便祕澀者下之疱破珍珠散搽之正宗錢青掄曰湯火傷飲冷水者必死浸冷水生必爛至骨丹方澄曰凡被火傷悶絶者急用輪回酒或童便灌之或溫水和蜜灌之甚則用酒燙熱入浴缸內令被傷人浸酒中極重不死若發熱作渴小便赤澀用四物湯加連翹梔子甘草滋陰養血以消其毒若傷處死肉而不作痛者用四君子湯加當歸川芎連翹健其脾胃以消其毒若傷處死肉不潰用八珍湯加白芷補氣排膿如不應加肉桂如不斂用四君子湯加當歸川芎黃耆健脾養胃生肌不應加炮姜若小兒被傷目睫頭搖用四君子湯加當歸川芎山梔健脾胃清肝火若食後被傷腹脹作痛用四君子湯加山梔神麯山楂壯脾胃以消之此乃規矩準繩不可更張至誤也醫鑑曰凡被回祿煙燻至死者白蘿蔔搗汁灌之即蘇以其辛能散氣也澄曰凡被火傷之人宜用羌活一兩煎服俾火毒得汗外泄庶免內攻湯潑火傷門主方雷真君逐火丹祕録治無意之中忽為湯火所傷遍身潰爛與鬼為鄰服之可以變死而生當歸四兩白茯苓黃耆各三兩大黃制生甘草各五錢荊芥穗炒黑黃芩防風各三錢水煎服一劑痛減半兩劑痛全減三劑瘡口全愈此至聖至神之方也又方哈蜊殼火煅研細麻油調如稀糊以鵝翎掃上如冰至重者二三遍全好疤痕全無忌酒如吃酒必作癢抓破有痕又方用煮熟雞蛋黃炒出油來調竹蛀蟲屑搽之火瘡疼不可忍生大黃黃連黃柏黃芩白芨各等分研細末麻油調搽又方先用好酒洗之再以鹽敷則護肉不壞如皮塌者以酒熬牛皮膠敷之如遍體傷者用好酒滿浸溫則易之可保火燒不死又方菜油一碗浸一刻即不疼兩三日便褪皮如不便浸頻頻塗之又方先以糯米漿雞翎掃上後用劉寄奴研末搽上不痛且無疤痕又方陳年白螺螄殼煅研入輕粉和研濕則乾摻不破清油調搽又方白芝麻殼燒存性研細敷之若患處乾燥則用麻油調搽又方丹參半斤羊油二斤煎三五沸濾清塗之又方緑豆粉榆皮面輕粉各等分研細麻油調搽濕則乾摻又方先用蠟酒冷洗以拔其毒再用煮熟雞蛋十餘枚去白取黃炒焦黑取油一盞調生大黃細末二兩搽之又方當歸炒生大黃炒各等分研細用麻油或蠟燭油調搽之又方白蠟三兩藤黃一兩五錢用瓷碗一個生薑擦過黃土和泥塗之碗不能碎放火上將蠟溶化藤黃捶如豆大同熬如炭形為度將藤黃揀去蠟熬如鵝黃色然後加麻油三斤煎勻收貯搽之麻黃膏雄豬油四兩斑蝥三個萆麻子去殼研極爛一百粒麻黃五錢大楓子去殼研一百粒先將豬油化開下斑蝥煎數沸隨去斑蝥再下麻黃煎枯濾去渣將大楓子萆麻子和勻聽搽又方大黃朴硝各等分菜油調搽取肉得咸則堅實且解熱毒也湯火傷已發泡者解熱毒為主蛤蜊殼煅蚌殼灰生石膏大黃各等分研細香油調搽取其寒勝熱也湯泡火傷並治牲口燒傷敷上須臾水出流水則吉反此為凶榆樹根白皮研細一兩飛丹二錢和勻井華水調敷或冷水敷之又方細茶小麥各等分共炒黑色存性研細末濕則乾摻干則用麻油調搽又方風化石灰入水攪勻澄清加麻油約油三灰水七為率攪勻雞翎掃上黃柏散黃柏一大塊用生豬胰炙酥為末麻油調搽火燒悶絶並治狼煙煤炭毒輕則白蘿蔔汁灌之重則用熱尿灌之火傷併火藥傷煤炭燒紅搗末醋調塗湯火傷未起泡者醬敷又方麵糊塗良又方鹽汁浸湯火傷泡已破者當收濕解毒生肌為主榆樹皮根研細麻油調敷又方石膏研細桐油調敷痛即止熱即退又方熟石膏東丹研勻摻之又方銀杏研末摻之又方西瓜皮入瓷壇內埋土內化水搽之又方冷燒酒淋洗止痛又方線香嚼碎敷之又方秋葵花浸麻油塗又方地榆研細麻油調塗或榆白皮末豬油調塗又方醃菜葉貼之或鹹菜滷浸之又方石膏生桐油調搽又方鹽酒浸之又方生大黃末雞蛋清或砂糖桐油蜜醋俱可調敷又方風化石灰雪水調搽又方白頸蚯蚓糞煅存性麻油調搽又方撏豬毛煅灰香油調搽又方扁柏葉焙研麻油調搽又方豬板油加乾麵搗搽又方泥漿加鹽醋塗之又方柏子樹皮研末麻油調搽又方鹽搽又方生大黃研細麻油調搽立刻止痛不起泡又方絲瓜葉搗爛敷上一日即好又方糯米粉炒黑酒調敷熱酒熯傷神效或菜油調又方陳麵糊敷滾油潑傷神效又方大麥炒黑研細用粥沫調搽即刻止痛麻油調亦可又方麩皮炒黑研末敷又方臘月豬膽汁塗黃柏炙乾為末敷之又方螃蟹殼燒灰麻油調搽又方取雄雞宰熱血淋瘡上隨淋隨效又方生大黃切片浸麻油搽愈陳愈效又方扁柏葉同冷濃茶搗爛敷保生救苦丹治火燒油熯及一切狗齧損傷生寒水石不拘多少研細油調塗之其痛立止滾粥熯傷錫箔遍貼神效如受傷重者可吃溫香油一盅湯火傷槐花炒研末油調搽立時止痛又方爛茶葉敷湯火傷爛見骨者丹方百草霜三錢輕粉一錢五分乳香麻油調搽玄妙飲川黃連天花粉玄參各二錢桔梗陳皮黑山梔各一錢五分淡竹葉二十片水煎服如藥不便只用好酒溫洗拔其熱毒內服童便以護其心使火毒不內攻隨取大黃末桐油調敷即垂危者皆保無恙祕方劉寄奴研為細末桐油或菜油調敷其泡立消其痛立止傾刻結靨神驗又方圓眼殼燒灰為末真桐油調塗數次即愈又方生蘿蔔搗爛敷之甚效火燒爛神方周鶴仙狗骨煅成灰為細末麻油調敷神效無比燒爛神方鐵鏽花磨水塗之神效又方大黃二兩貫仲黃柏各一兩共研細末用煮熟雞蛋黃數枚入鍋內炒出油調敷三五日全好無疤湯潑老松皮去外粗皮去里青皮生大黃各等分研細末生桐油調如稀糊掃上即出熱氣隨手其泡自消湯火傷狗油熬老敷患上隨干隨敷又方胭脂濕冷水貼患處貼後水乾即用涼水滴胭脂上立即止痛不起泡火燒人糞瓦上焙枯黑為末香油調搽火燒滾湯起泡陳喬麥面打糊裱上立止疼痛結靨火燒湯潑粥燙油燙奇方程懷書平日泡過茶的茶葉剩下的茶腳不拘甚的粗細茶葉用瓦壇一個放朝北地上日逐裝在壇內聚之已滿用大磚一塊蓋好須得一年用之方妙愈陳愈好凡遇上證不問已潰未潰搽上即定痛結疤第一驗方湯火所灼暖灰水和敷並用灰汁洗又方黍米炒黑六曲炒黑各等分研末雞蛋白和塗又方柳樹白皮切細同豬油熬塗又方柏樹白皮切細同豬油熬塗又方小便漬洗又方苦酒和雄黃塗湯火灼已成瘡白蜜塗上取竹膜貼之又方雞蛋白塗又方豆醬汁塗又方柳樹皮燒灰敷又方豬油和米粉敷又方狗皮碎剪煬皮膠和之遍封傷上結痂自落又方新熱牛糞塗又方石膏細末搽之又方白蘞末搽又方陳石灰水和敷干則換敷滾湯煎膏所傷潰爛丹參切細羊油熬膏敷又方搗生芝麻如泥厚敷又方地榆末同雞蛋清調搽又方新牛糞和雞蛋清塗止痛不爛湯火傷生梨搗碎敷又方豬油生大黃頭髮同熬濾清候冷塗上又方絲瓜葉陰乾為末麻油或菜油調搽湯火燙汪樹峰云余幼時誤墜烈火中半體皆傷諸治不效後得此方始愈以厚酬始獲此方平時收老黃瓜不拘多少覓厚實瓷瓶收貯藏暗濕處自爛為水塗傷處立時止痛即不起泡又方狗血塗又方油饊子燒成性研極細末入真香油在乳鉢內研糊塗爆竹炸傷急取鮮柏枝搗和香油調敷湯火傷王御臣傷時人皆倉惶無主切不可用冷水澆洗如一時敷藥不便先飲童便一碗或生蘿蔔汁一碗後用雞蛋數個每個打一孔瀝取蛋清入碗內用箸調成清水用雞毛蘸掃傷處每次掃六回每日掃六次止痛消腫退熱生肌無痕又方陳石灰新者亦可不拘多少泡水中候灰澄清取水和小磨麻油攪勻似蛋清一樣以雞翎掃患處外用兔毛貼上若干後沾實則不必揭動如不沾再掃貼又方熟雞蛋黃置銀石器中熬油調胡粉搽又方楊梅樹皮及根燒存性香油調敷又方冬月收頭一次雪水至夏月拾西瓜皮泡雪水內封貯臨用頻洗傷處其效猶速又方梨切片貼止痛不爛火燒龜甲燒灰香油調搽又方西瓜皮焙為末雞蛋清調搽神仙一把抓治湯火燒傷並杖瘡黃丹一兩潮腦五錢為末以蜜調勻塗患處立刻止疼好後無痕金瘡門主論陳實功曰大凡金瘡血出不止若素怯弱者當補氣若素有熱者當補血若因怒當平肝若煩渴昏憒當補脾氣若筋攣搐搦當養肝血若投藥不應當用地黃湯以滋腎水忌見風及服止血傷筋等味其人若渴務要忍著宜進乾燥並肥膩等物以止渴切不可食鹹過飲漿水稀粥凡犯之則血動溢出殺人如喜怒憂愁大言狂笑思想房勞暴躁勞碌酸鹹糟油熱羹一概禁忌雖愈仍忌可服黃耆六一散八味地黃丸可保無慮正宗程山齡曰刃刀或磁鋒割損淺者皮破血流而已深者筋斷血飛不住皮破者福緣散摻之止血定痛筋斷者天下第一金瘡藥敷之筋骨俱斷其人面色必黃外避風寒內忌冷物如失血過多者獨參湯八珍湯補之此外別無他法十法脈經云金瘡血出太多其脈虛細者生數實大者死金瘡出血脈沉小者生浮大者死斫瘡出血一兩石脈來大者二十日死斫刺血出不止者其脈止脈來大者七日死滑細者生如脈病不相應故死病源云金瘡腸斷者視病淺深各有生死腸一頭見者不可連也若腹痛短氣不得飲食者大腸一日半死小腸三日死腸兩頭見者可速續之先以針線如法連續斷腸便取雞冠血塗其際勿令氣泄即推內之腸但出不斷者作大麥粥取汁洗腸以漬納之且作粥清稍稍飲之二十餘日乃吃糜粥百日後乃可進粥靈惠云金瘡失血其人當苦渴然須忍之常令乾食可與肥脂之物以止其渴又不得令飲粥則血溢出殺人也又忌嗔怒及大言笑動作勞力及食鹹酸熱酒熱羹輩皆使瘡痛沖發甚則即死聖惠云凡金瘡傷天窗穴名眉角腦後臂里跳脈體內陰股兩乳上下心鳩尾小腸及五臟六腑俞皆死處又破腦出髓而不能語戴眼直視喉中沸聲口中唾出兩手妄舉者俱不可治得效云金瘡出血虛細則宜實大則傾又云傷雖淺命脈虛促可慮傷至重命脈和緩永無慮也血出甚者脈不要洪大只要平正重實又云肚破腸出在外若腸全斷難醫不斷者可治腸及肚皮破者麻縷為線或桑白皮尖茸為線以花蕊石散敷線上從里縫之腸子則以清油捻活放入肚內乃縫肚皮不可縫外重皮留皮開用藥糝待生肉又云傷破肚皮腸與脂膏俱出先用湯藥如活血散佛手散與服用手擘去膏不妨此是閒肉放心去之然後推腸入內用線縫之仍用通利藥勿令二便祕澀正傳云大凡金瘡及折傷墜墮內損者必有瘀血停積先宜逐去瘀血若亡血過多則調養氣血為主花蕊石散奪命散雞鳴散導滯散破血消痛湯復元活血湯皆可選用金瘡門主方天下第一金瘡藥程山齡治刀斧傷損並跌僕打碎敷上立時止血定痛更不作膿勝於他藥多矣雄豬油一斤四兩黃蠟松香各六兩乳香箬烘去油血竭兒茶各一兩銀粉炒篩四兩樟冰三兩研極細末冰片麝香各六分沒藥箬烘去油以上藥研極細先將豬油松香黃蠟三味熬化濾去渣待冷再入藥末攪勻瓷器收貯不可泄氣又方徐元升老松香不拘多少將淡河水滿鍋滾透煮之撈起扯拔浸冷換水又煮又扯如此九遍煮去苦水復用銅鍋溶化傾入冷水中不必扯拔待冷又化如此三次揀淨松香十兩加去淨油乳香沒藥各一兩研細和勻敷傷處用絹帛縛緊能止血止痛續筋生肌不膿不潰跌打損破亦效忌生酒鮮魚豆腐糟菜又方魚膠洗淨用麻布包煮爛隔布絞出乘熱加乳香沒藥去淨油各二錢銀粉六分共搗勻取青布一幅用針釘在新板上將竹刀刮藥攤在布上候乾收貯量傷處大小將藥布入滾水泡軟移攤於青絹上貼上傷處止血止痛如將愈之際有一眼仍以前藥泡軟納瘡眼中即斂口矣金瘡並陽證腫毒用大粉草入去青竹管中油灰塞竹管孔立冬日放糞缸內立春先一日取起豎立陰乾破竹取甘草研細金瘡乾者水調敷濕則乾摻熱毒疫毒內服均妙即人中黃也又方白松香研細將傷口用手擠合厚厚敷之布扎緊不怕風不怕水旬日即瘥又方鉛粉乳香去油風化石灰沒藥去油各一兩枯礬三錢研細摻之又方圓眼核剝去外面黑漆皮陰陽瓦焙研細末乾摻奇驗又方蘇木煎湯童便沖服又方茜草根煎湯童便沖服又方澤蘭葉煎湯童便沖服又方紅花煎汁童便沖服又方真白龍骨研細摻之血即止又方海螵蛸研細摻之血立止又方金毛狗脊毛罨傷上又方不拘新舊蠶綿絲綢以及舊氈帽俱可燒灰搽之又方晚蠶砂為末摻之外以絹條束緊止血生肌又方多年戴油舊氈帽邊煅灰摻之或搽亦可又方白芍藥一兩炒黃研細末酒調服二錢止痛又方白蠟研末填滿傷處布帛裹定二三日即愈又方寒水石研末敷之止痛最速又方生五倍子為末乾摻血出不止者神效又方桑樹皮中白汁塗傷處止血又方蘆子嚼爛敷上其血立止且無他患跌破更效又方干蓮蓬焙末搽又方烏木筷研末搽又方獨殼大栗研乾末摻又方紅絨煅灰摻之又方花蕊石研末摻又方青石研為末摻又方半夏研末摻又方天南星研末摻又方小麥面乾摻又方陳舊氈帽煅灰同香灰研勻摻又方陳石灰同韭菜搗爛陰乾研末摻又方百草霜研細摻又方初生小鼠同石灰搗勻陰乾摻又方聖惠血竭末摻之止血生肌又方聖惠原蠶娥炒研末敷又方半夏鬱金風化石灰各等分研末摻血立止又方古礦石灰研末摻又方黃丹白礬末摻之血立止又方桑葉陰乾研末敷如急用焙乾亦可又方劉寄奴研為末摻之並治箭傷又方驢屎煅存性研末搽之血立止如不及煅即用潮的亦妙又方降香節五倍子各五錢廣三七二錢五分研極細摻之止血定痛箭傷亦妙又方臘月牛膽入風化石灰懸掛風頭避陰處候乾去膽皮將石灰研細敷又方五倍子炒枯降香節銼屑炒黑色各等分研勻摻於傷處扎定刀傷斷指臂者俱可接整降香燒末過者六兩荔枝核炒四兩先將傷斷處接端正取絶細末香油調敷數日後骨肉完全如故金瘡並磕損折傷血出疼痛不止者蔥白砂糖各等分研勻封之其痛立止更無疤痕刀傷折傷蔥尉法先飲童便酒後用蔥炒搗爛乘熱包縛傷上冷則易之金瘡毒刺疼不可忍蔥一大把水三升煮數沸漬洗傷上即止金瘡久不收口出過雞的蛋殼內嫩皮連血陰陽瓦焙黃研末麻油調搽濕則乾摻金瘡跌打瘀血內攻腹脹劉寄奴延胡索骨碎補去毛淨各三錢水煎加童便沖服刀斧砍斷筋金錢花葉莖根去土淨搗自然汁滴瘡口中以渣敷上不過半月斷筋自連刀斧斫傷以及跌破頭顱者霜降後三日取雞冠花葉洗淨入滾水內掇過撈起青布包過夜次早用線穿掛無煙熏日色之處陰乾刷去灰塵研末加冰片少許密貯乾摻五金所傷並竹木刺誤犯人神所在之處流血不止上身被傷血流不止急用銀一錠燒紅烙傷處如下身被傷流血不止者急以鐵一塊燒紅烙傷處其血立止此急救之良方也刀斧傷甚真降香磁鋒刮下研極細末摻上次日結靨如鐵又方藤黃研碎五錢白蠟一兩入麻油化膏冷定搽之又方多年陳石灰一斤大黃一兩炒黃色除去大黃只用石灰研細摻傷上布扎自效又方啓玄真廣三七煎湯洗之其血立止又方聖惠白膠香白芷老松皮血竭研細末敷之又方聖惠黃丹滑石研末敷之夏月以薄荷葉貼之一日一次以藥水湯洗自效金瘡傷至重者得效海味中咸白鰾成片鋪在傷處用帛扎定血立止下蠶室瘡不合入門取所割勢火煅為末酒調服昔有人自割其勢瘡久不合用此方不數日而愈金瘡及諸傷重痛悶欲死入門取牛一隻剖腹納其人於牛腹浸熱血中可蘇如傷腹用血竭末醋湯調飲出血而愈或戰陳炮矢所傷血流滿體氣貫胸膈悶絶者亦蘇傷重暈絶不省人丹心熱尿多灌即蘇童尿猶妙活血散入門治刀槍傷腹裂腸出者當歸川芎黃耆白芷續斷赤芍鹿茸細辛黃芩附子各等分研末每三錢酒調服日三立驗花蕊石散治一切金刀砍傷及打撲損傷牛馬咬踢或至死者急於傷處摻藥其血化為黃水再服藥便活更不疼痛如臟腑有瘀血內損煩悶欲死服此藥則化為黃水或吐出或下泄出花蕊石四兩硫黃一兩為末入瓦罐內鹽泥固濟曬乾安四方磚上以炭火從巳午時煅至經宿候冷取出研細每服一匙童便入酒煎熱調服奪命散得效治金刀所傷及從高墜落木石壓損瘀血瘀積心腹疼痛二便不通水蛭石灰拌炒焦五錢大黃黑牽牛頭末各二兩上為末每服二錢熱酒調下過數時無效再用一服下惡血導滯湯聖惠治金刀跌撲大便不通壅鬱欲死大黃一兩當歸二錢五分麝香少許為末每服三錢酒調服金傷散鄉藥治一切金瘡重午日早朝使四人各出四方採草木莖葉各半把至午時入石灰一斤同搗極爛鑿大桑木三兩株作孔納藥實鞏用桑皮蔽之油調石灰密塗之勿令泄氣更以桑皮填固至九月九日午時取出陰乾百日搗羅為末如遇傷摻之神效刀傷銅匠銼下黃銅細末再入乳鉢內乳細摻之立合金瘡出血採醫書龍骨煅二錢乳香去油沒藥去油各三錢白礬半生半枯無名異各一兩五倍子半生半焙二兩共為末乾摻不作膿不怕風立時止血住痛生肌金瘡神方周鶴仙松香去油如油不盡反疼用新磚兩塊火內燒極熱上下多襯紙將松香入在中間壓兩三次則油盡如門霜矣生半夏各等分研極細末搽之有力者宜預合濟世神驗無比又方真降香切片火上炙去油荔枝核血竭各等分為極細末敷患處即刻止痛作癢不三日全愈雖斷指亦能續也神驗又方荔枝核燒灰存性為細末填傷口一夜即平復又方揀淨剃下黑髮數斤洗淨油膩攄干將鮮竹筒取一段打空一節將發裝入築極緊用木塞口黃泥封放於微火灰內煅一夜存性打開發成粉矣收貯瓷瓶之內遇刀傷敷之神驗之極又方端午午時採苧麻葉陰乾揉成絨罨上即定痛止血刀斫斧傷肉落人指甲陰陽瓦焙研細末密貯凡遇斫傷將末摻上以肉合上急用扇子急力扇之即合若傷口深大又不宜扇風恐成破傷風些小刀瘡此方頗驗刀傷琥珀末摻之又方一人因劈裂爪甲指拇索金瘡藥裹之其痛不止即取蔥白入糠火煨熱剝皮劈開其中有涎如涕取搽損處仍多煨取接續易搽凡三易之血止痛消並不潰良方也刀傷湯火跌打斷筋損骨麻油熬老冬月用油七兩五錢夏月用油五兩一錢入白蠟一兩藤黃五錢不住手攪成餅塗搽刀傷熊膽和水調搽傷處立刻止血定痛不作膿小兒刀破手鍋蓋屑刮下搽刀傷圖書店滑石末摻之又方生大黃炒黑研細摻又方堅實細炭老松香各等分研細用韭菜汁拌陰乾再研細摻之如急用則不用韭菜汁拌亦效夾剪斷指蟢蛛窩纏指上包暖即好刀斧傷並跌打流血不止何首烏研細擦上使血歸經金瘡跌打止血定痛乾荷葉研末擦即能生肌刀傷雖數日作膿亦效老松香川大黃各一錢共研細末乾摻弓箭鳥槍傷門主方弓傷全睛突出並治打傷眼珠腫痛急以手揉入勿見風取精豬肉切薄片攤在熱鉢上候肉熱急貼傷處冷則更換箭頭入肉蜣螂十個去殼去白肉土狗三個婦人發煅灰少許同研如泥厚塗之以兩手蹙之箭頭自出箭傷三七根三錢好酒煎露一宿服之即愈中毒箭急飲麻油數碗其毒自解中毒箭藍汁一升飲之並淋傷上若無藍汁以青布清水絞汁飲並淋傷上針刀箭鏃折在肉裡象牙屑和水敷之針刀箭鏃折在肉裡栝蔞根搗爛敷之每日三易箭頭入肉推糞蜣螂一個搗如泥煎湯頻洗傷處自出箭頭入肉陳臘肉去皮骨搗爛人指甲象牙各二錢研細入蠟肉內搗勻敷於四圍即出鉛子入肉水銀灌傷處其鉛即化從傷處隨水銀流出箭傷劉寄奴研末摻之箭鏃及金刃中骨脈不出入門白蘞半夏各等分上為末每用淡薑湯調服一錢日三至二十日即出又方聖惠螻蛄取汁塗其上自出又方聖惠鼠腦塗其自出又方聖惠好磁石著其上自出又方搗鼠肝或鼠腦塗之即出鉛子入肉吳天序用面和成作圈圍受傷處以白莧菜搗爛納圍內不過三四次鉛子即出或用蜂蜜沖酒飲醉亦出毒箭煮藕汁飲又方搗生葛根汁飲之又方雄黃研敷箭穿耳並割耳熱馬糞敷上止痛又方婦人月經或月經布塗於傷處針入肉門主方驗方搗推屎蜣螂敷之自出又方螻蛄腦子同硫黃研細調敷以綿紙貼定如覺癢時其針自出內服棗仁末三錢白湯調下又方象牙末水調敷即出又方煮臘肉熱皮貼上其針即出針誤入肉無眼者不動有眼者隨氣血遊走若走向心窩胸膛者險急用烏鴉翎數莖炙焦黃色研細末酒調服一二錢俱可如聖膏治針入肉車脂輦油不拘多少研如膏調磁石細末攤紙上如錢許貼之每日換兩次醫家用針將針折在病人肉內鼠腦研如膏塗之即出竹木刺門主方竹木刺入肉收晚蠶蛾入竹管內塞之凡遇竹木刺戳入肉內即取蠶蛾研細和津唾調塗即出又方刮指甲末同紅棗肉搗爛塗之又方象牙末磨濃汁滴之良久自出又方螻蛄搗爛塗之自出如刺已出肉痛甚者亦效又方白茅根搗敷立出又方嚼牛膝根敷之自出又方烏羊糞搗爛水調厚敷之自出又方頭垢敷之即出花蕊石散治刺入內日久血瘀腫脹花蕊石八兩硫黃四兩研極勻瓦罐盛之封口鹽泥固濟曬乾安風爐內上下著火煉二柱香為度候冷打開研細收貯此乃散瘀血之神藥也凡竹木刺咽喉中舊象牙梳取屑研細水調服蘆葦刺入肉生栗子細嚼爛敷之又方鹿骨煅存性水調敷雖日久不過兩次即出又方羊糞燥者燒灰和脂塗之刺若未出再敷之又方搗烏梅水和塗刺上立出又方莧菜搗爛敷患處外以布裹定即化又方牛膝根莖合搗以敷之即出縱瘡合口其刺猶出又方煮瞿麥汁飲之日三立出又方溫小便漬之又方酸棗核燒研服之瘥又方白茅根燒為末以膏和塗之亦主諸瘡因風發腫狐刺瘡門主論申鬥垣曰狐刺瘡是竹木刺簽傷皮肉或手足而成痛不可忍有雌雄兩種當分治之雄者只生一個雌者生有五七個瘡內皆有亂絲瘡外必然有刺者是也啓玄大成書名狐貍刺蓋螳螂又名野狐鼻涕故名外臺總録二書名狐尿刺心法曰狐尿刺由螳螂盛暑交媾精汁染於竹木諸物於久有毒人手足誤觸之則成此患初起紅紫斑點肌膚乾燥悶熱焮痛不眠十日後腐開瘡口自寬宜服黃連解毒湯外以蒲公英連根濃煎溫洗之若有鮮者搗汁厚塗患處更佳狐刺瘡門主方驗方啓玄桑柴灰輕粉等分研勻干罨患上以米醋澆之頻換立愈鐵棘竹木諸刺在肉內不出並蛇骨刺人毒痛死老鼠煅研敷之傷水瘡門主方凡竹木刺破皮膚或魚刺諸骨傷損之後誤犯生水疼痛潰爛名傷水瘡五倍子蛤粉黃丹各等分同炒變色研乾摻救自刎門主論斷食顙者可治斷氣顙者難治全要知覺早急急將頭扶住乘其氣未絶額未冷用絲線縫合刀口將活雄雞一二隻扯下熱雞皮冷則無用周圍纏護刀口用軟綿帛並棉花扎之外將女人舊裹腳周圍再纏五六轉勿使泄氣其中自然合而為一令刎者仰臥以高枕枕住腦後使刀口不開須要避風衣被蓋暖若氣從口鼻通出用白米一盒入人參一錢生薑三片同煎粥湯飲之接補元氣再請明醫診視凡自刎喉管不斷者不可見水急用麻線縫之外以血竭細末罨之隨用天下第一金瘡藥厚塗之綿紙蓋定然後用狹裹腳布纏住用棉扎之間日加敷藥頭不可搖動十日全愈程山齡自刎者乃迅速之變須救在早遲則額冷氣絶必難救矣初刎時氣未絶身未冷急用絲線縫合刀口摻上桃花散多摻為要急以棉紙四五層蓋刀口藥上以女人舊布裹腳將頭抬起周圍纏繞五六轉扎之患者仰臥以高枕枕在腦後使項鬱而不直刀口不開冬夏避風衣被覆暖待患者氣從口鼻通出以姜五片人參二錢川米一合煎湯或稀粥每日隨便食下接補元氣三日後急手解去前藥用桃花散摻刀口上仍急纏扎扎二日急用濃蔥湯軟絹蘸洗傷處挹干用抿腳挑玉紅膏放手心上捺化搽於傷口處再用舊棉花薄片蓋之外用長黑膏裹周圍交扎不脫近喉刀口兩旁再用黑膏長四寸闊二寸豎在膏上兩頭貼黏好肉庶不脫落外再用絹條圍裹三轉針線縫頭冬月三日夏月二日每用蔥湯洗挹換藥自然再不疼痛其肉漸從兩頭長合內服八珍湯調理月餘如大便結燥用豬膽導法不可用利藥利之雙顙俱斷者百日單顙斷者四十日必收功完口此法曾治強盜郭忠皂隸沙萬家人顧興俱雙顙齊斷將危者用之全活單顙傷斷者十餘人治之俱保無虞矣又曰降香末或松香末摻之神效救自縊門主論急用衣物緊塞穀道前後抱起解繩安放平正揪髮向上揉其項痕捻圓喉管腳踹兩肩以兩管吹氣入耳內或刺雞冠熱血滴口中男用雌女用雄鼻即氣轉再屈伸其手足將手摩之使氣血得流通再用皂角末吹鼻切不可割斷繩索雖早至暮身冷猶活一法抱下徐解繩索用好肉桂三錢煎湯灌之雷真君活人録云岐天師救五絶神法五絶者乃縊死跌死魘死淹死壓死是也世人禍存倉猝往往不救然此等之死五臟未絶是因外來之禍而枉死者也其魂魄守於尸傍相去未遠苟以神術招之魂魄即附體可生也神符一道先書黃紙上焚化在熱黃酒內撬開牙關灌入喉中後再用救絶仙丹黃酒調勻以人口含藥水用蔥管送於死人喉內少頃即活無咒但書符時一心對雷真君天醫使者有書之自然靈應無比救絶仙丹方人參半夏各三錢山羊血石菖蒲制蘇葉各二錢紅花麝香皂角刺各一錢共為末蜜丸如龍眼核大酒化開用修合時宜端午日妙如臨時旋合不必如許之多十分之一可也此方神奇之極間時修合一料大可救人若臨時緩不濟事此方不特救五絶凡有邪祟昏迷一時卒倒者皆可灌之以起死回生也祕録縊死切忌刀剪斷繩令抱住以膝頂住陰戶穀道解下雞冠血滴鼻中筆管吹耳即活一切暴死用生半夏研為細末吹鼻中即活王今樵曰凡繫有人縊死其宅內縊死之處往往有相從而縊及縊之非一人者俗謂之討替身謂已死之鬼迷以自代此種渺茫幻妄惑世誣民之談豈君子所樂聞哉然書謂子不語怪夫怪僅曰不語則是怪亦所嘗有非云世絶無怪也吾鄉有張姓其家僅足自食夫先臥婦則仍女紅偷兒乘夜逾垣往竊未敢竟入伺於窗外見床側一鬼婦向本婦先嘻後泣拜跪再三本婦睨視數次忽長嘆潛然淚下偷兒心驚專心伺之婦急自理絹帛仍有不忍即行之狀鬼婦更復再拜祈求本婦方行自縊偷兒急甚大聲疾呼其夫鼾呼若不聞偷兒無法以救適檐下有竹竿取從窗櫺中攛擊鬼婦其夫方覺偷兒呼令急為開門相助解救在此婦固不自解覓死為何事其夫亦不問呼門為何人而偷兒亦自忘乎為偷兒矣事後各道其詳因發床側之壁視之其中梁畔實有先年自縊繩頭尚存雖云朽爛非真而其形其跡則仍宛然由此以觀則世俗所傳亦未盡無根之談荒唐之論矣據故老所示闢除祕法不知出自何典頗有行之而驗者法於自縊之人尚在懸掛未解時急於所懸身下暗為記明白方行解下時或即用鐵器或即用大石鎮而壓之然後於所鎮四面深為挖取將所鎮土中層層爬視或三五寸或尺許或二三尺其中定有如雞骨及如各骨之物在內取而或棄或焚則可闢除將來不致有再縊之事實為屢試屢驗其理殊不可解但及時即挖則得之淺而易遲則深而難然亦不出八九尺外也雖云幻妄無稽不知何以行之實有可據得毋如聖哲所云天地之大何所不有心知理之所必無安知非情之所必有其殆是歟愚故從而筆之即或行之未驗聊以解愚夫愚婦之疑亦未必非拯救自縊之一預道也虞初新志心法曰若繩痕深者最稱難治又曰旦而至暮者可治夜到天明者則為難治澄曰凡救縊傷須急令人抱住將結解開切勿割斷繩索用手揉其項痕捻圓氣管並安摩胸腹或用手捫其口鼻或口對著口接氣再令一人用腳踏其兩肩手挽其發常令扯急不可使頭低下又令一人用膝頭或手厚裹衣服緊緊頂穀道若婦女並抵住陰戶勿令泄氣若手腳已經僵直必須盤曲如僧打坐之狀急用兩管吹其兩耳再研生半夏末吹鼻孔用針刺鼻下人中穴艾灸腳心湧泉穴男左女右各三壯男刺雌雞冠女刺雄雞冠血滴口中以安心神再用薑湯化蘇合丸灌之如無蘇合丸用濃薑湯灌之其一切救法必待氣從口出呼吸眼開方可散手蘇醒後只用少飲粥湯潤其咽喉不可驟與飯食依此拯救再無不活之理又曰針刺艾灸及雞冠血滴於口中三法雖澄遍採方書而得之者亦曾用之有驗但必須心口尚溫大便未下舌未伸出彼家的系無故自縊並須有親人在傍協同拯救並無威逼磨折情節方可針刺艾灸滴血若事涉嫌疑萬一難救反起訟端又不得不慮及此也幸高明酌用真野山羊心血二三釐研極細酒灌下即活普救救溺水門主論急倒提出水用牛一頭令橫臥以腹臥牛脊上牽牛緩行令吐出腹中之水用老薑擦牙即活口噤者撬開橫一箸於牙間使水得出如無牛用鍋覆地將溺人臍對鍋臍俯臥腳後稍高用手托其頭水出即活或是皂角末用綿紙捲成條通其穀道其水自出大約倒提出水時人硬可救如已綿軟是回過水不能救用搐鼻通天散吹鼻中得嚏即蘇搐鼻通天散豬牙皂角去皮弦一兩北細辛去葉半夏各五錢共研細末每用一二分吹鼻中溺水及服金屑者用鴨血灌之錢青掄曰溺死切忌倒提出水火烘無救用鍋子合地急將死者臍對著鍋臍覆上用人扶牢徐徐推鍋轉移走箸夾口中出腹中之水其人即活澄曰凡水溺之人夏天可救冬天難救撈起時切勿倒控急急將口撬開橫銜箸一隻使可出水用竹管吹其兩耳研生半夏末吹其鼻孔用皂角末置管中吹其穀道如系夏月用牛一隻將溺人肚皮橫覆牛背之上兩旁令人扶住牽牛緩緩行走腹中之水自然從口中大小便流出再用蘇合丸化開灌之或生薑汁灌之若無牛以活人仰臥令溺人如前將肚皮橫覆活人身上活人將身子微微動搖水亦可出若一時無牛活人不肯為即用栲栲一隻將溺人覆其上亦可又曰如系冬月急將濕衣解去一面炒鹽用布包尉臍一面厚鋪被褥取灶內暖草灰多多鋪於被褥之上令溺者覆臥其上肚下墊以棉枕一個仍用草灰將遍身覆蓋灰上再加厚被不可把灰眯於眼內即撬口銜箸灌蘇合丸生薑湯吹耳鼻穀道等法冬夏一般急救醒後宜少飲溫酒夏天只與清粥飲之蓋灰性暖而能拔水凡蠅溺水而死者以灰埋之少頃即活以其明驗也又曰溺水死者鴨血灌之立活救凍死門主論切忌熱水火烘急用大鍋炒灰盛布袋內放在心口並尉臍腹之間袋須作數個冷則更換灌以溫酒薑湯用厚被褥蓋暖保血脈和通如身上漸溫即活祕要云凍死一日猶可活過此即不療又云若不先溫心便持火炙其身體冷氣與火相摶則死又曰用厚棉被將凍人捲住睡臥令兩人推來轉去使血脈相通身上漸溫即活如無棉被新草荐亦可救熱死中暑昏悶門主論切忌飲冷水不可令臥冷地當急移陰處用大蒜搗爛加路上熱土和水去渣灌之再掬路上熱土擁擠臍間作窩令衆人尿滿暖氣透臍即蘇又法急以薑湯或童便乘熱灌下外用布蘸熱湯尉臍下三寸穴立醒醒後忌飲冷水飲之立死又曰暑月曬衣不可便入箱匱之中恐冬月服之有中暑者若吹透再收便無此患救魘死門主論原有燈即存燈勿熄如無燈不可點燈但痛咬腳跟並咬大拇指而頻唾其面再灌以薑湯或用皂角末或半夏生研或雄黃末吹入鼻中得嚏即醒諸卒死及魘死急於人中及兩腳大拇指內離爪一韭菜許灸七壯即活綱目凡魘死並中惡切忌火照驚慌烏骨雞血滴口中立活扁鵲曰五絶死者一曰自縊二曰牆壁所磕三曰溺水四曰魘魅五曰産乳皆用生半夏一兩搗篩吹一大豆許於鼻孔中即活亦有用生半夏末水和丸如小豆大塞鼻中並吹末於耳內心下溫一日者尚可救奈人不曉的皆因見其氣絶多不救耳惜哉救中惡門主論或登廁或出郊外野地或遊冷室或行人所罕到之處突然眼見鬼物口鼻吸著惡氣驀然倒地四肢逆冷兩手拳握口鼻出血性命逡巡不救此名中惡大約此證同尸厥證同但腹中不鳴心腹俱暖為異凡遇此證即刻衆人圍繞不可移動衆人打鼓燒火或焚麝香蘇合香安息香之類直候至醒知人事方可移動用犀角一錢硃砂麝香各五分研細水調服或用石菖蒲搗汁灌口鼻中又法用鮮菖蒲根搗汁灌入鼻中或口內自活卒被鬼擊如中箭用桃皮一片安痛上取一匙頭安桃皮上用艾胡桃大安匙上灸之即瘥入門或往死喪墳廟來家即死急斷豬尾取血灌之並縛豚枕之立活凡卒死得紫金錠磨汁灌之立蘇書曰中惡者乃遇尸喪邪病古廟墳冢空房冷寓廢署荒園鬼神壇場祈禱祠社池沼苔蘚蘊濕藤蘿樹木陰鬱一經感觸卒然昏迷名曰中惡急將病人移於宅內東方以醋炭熏之用薑湯化蘇合丸灌之或藿香正氣散亦妙再用蔥尖刺入病人耳內出血即活如無血者不治若大吐大瀉口鼻流血者不治救嚇死門主論急抱定用溫酒徐徐灌下即活如九竅出血用大薊一握絞汁和好酒半杯頓服如無鮮大薊即干大薊研末滾水灌服三錢清晨汲頭一吊桶水噀面即效書曰嚇煞即驚怖死也救五竅出血門主論耳目口鼻竅中一齊出血藥不及煎死在旦夕俄頃用冷水當面噀幾口即分開頭髮用粗紙數層蘸醋令透搭在囟門血即止次用當歸一兩煎湯磨沉香降香各五錢加童便服之血自歸經然後以四物湯加人參黃耆北五味麥門冬為丸服之可收萬全之功救神箭鬼箭打門主方神箭不可針刺狗骨燒灰三錢山梔七個研飛白麵陳糟各一兩醋調敷鬼箭打鐵屑細末二兩核桃肉一斤桃仁八兩同入瓷器內加好酒四斤隔湯煮蓋上以糯米置之米熟為度每日不拘時隨量暖服蓋被髮汗服時痛稍甚服完漸愈勿以服藥時痛而中止也又方山梔炒飛面桃頭七個杵餅貼次日作七丸投炭火中燒響即愈除妖魅鬼魘門主論妖魅鬼魘不肯明言者鹿角銼細末酒調服即知人事矣夢與鬼交者以鹿角末清酒調服即出鬼精婦女夢與邪物交通獨言獨笑心神恍惚者用明雄細末一兩松香二兩熔化投下明雄以虎爪攪之丸如彈子大夜焚於焙籠中令女坐其上以被蓋之露頭在外不過二三次即愈內用菖蒲棗仁遠志硃砂茯神等味為末服之慣多夢魘者用通明大硃砂縫袋盛之藏發內睡之是夜即無邪夢也祟證門主方平祟散祕録硼砂三分黃連甘草各二分冰片一分乳極細人乳調點兩眼角立消
