body:
  text: 卷十九腋臂指掌部自腋臂臑肘手指手背癰疽疔毒俱匯於此部中以便檢閲參治腋癰門主論王肯堂曰腋癰即夾肢癰生肩膊下隙內屬手少陰心經手厥陰心包絡經風熱所致宜服內托黃耆柴胡湯準繩靈樞曰發於腋下赤堅者名曰米疽治之以砭石欲細而長疏砭之塗以豕膏六日已勿裹之陳實功曰腋癰又名夾癰此起腋下皮色不變漫腫無頭日久方痛乃生寒熱此乃肝經血滯脾經氣凝共結為腫此患難消終必作膿未破者柴胡清肝湯已破十全大補湯去肉桂加香附陳皮急者開之首尾溫補切忌寒涼正宗馮魯瞻曰腋癰者乃足少陽手少陰手厥陰三經也此多得之於先天或肝火熾甚耳錦囊心法曰腋疽一名米疽又名內疚疽發於胳肢窩正中初起之時其形如核由脾肝二經憂思恚怒氣凝血滯而成腋癰又名夾肢癰發於腋際屬肝脾血熱兼忿怒而成腋癰門主方驗方葫蘆巴焙研三錢木瓜酒調服體氣門主論陳實功曰體氣一名胡氣俗稱狐騷氣又呼狐騷臭此因父母有所傳染者又有胡胎而受者故不脫本來氣質凡有此者腋下多有棕紋數孔出此氣味當以五香散擦之以解其味正宗澄曰凡治腋臭用藥後必須穿新衣如穿舊衣務於日中將所著衣用灰水洗淨又泡去衣袖中臭味皆無氣味若洗不淨氣味枉用其藥大概藥無不驗多是衣服再作氣息所以不能斷根耳體氣門主方狐臭不可近身大蜘蛛一枚用黃泥少加赤石脂並鹽杵熟作窩放蜘蛛於內先以小火煨乾漸加猛火煅紅候冷取出蜘蛛加輕粉一分研細和米醋調膏臨臥時先將腋洗淨以膏搽之次早洗下黑汁惡物為效即將此汁埋棄僻靜之所勿令染人萬不可穿舊時衣慎之慎之又方大田螺一個以水養之伺其靨開以巴豆仁一粒用針挑放螺內將螺拭乾仰放盞內俟螺化水取擦腋下無價散水銀密陀僧各二錢枯礬四錢共研千下以不見水銀星為度津唾調搽又方硇砂密陀僧銅青白附子辰砂白明礬各等分研細先以皂角水洗二三次後敷上不過二次全好又方水銀黃丹硇砂密陀僧銅青辰砂明礬白附子白梅肉共搗為丸擦之腋臭鴉臭陰汗不能與人同行者白礬密陀僧黃丹各一錢五分麝香五分共乳如灰塵以醋在手心內調藥擦腋下經宿兩時辰許再以香白芷煎湯洗之一日用一次又方枯礬二兩密陀僧四兩輕分三錢共乳細擦兩腋擦至數月見效半年全愈又方熱蒸餅一個劈作兩半摻密陀僧末一錢急挾在腋下略臥片時候冷棄之如一腋有病只用一個內疚疽門主論鬼遺方曰內疚疽發兩腋及臂並兩手掌中振寒熱而嗌乾飲多即嘔煩心悁悁脈盛六七八日診如此可汗不汗死缺盆疽門主論王肯堂曰缺盆疽又名鎖骨疽生肩前陷中寒熱大作飲食少進肩背拘急小水不利胸腹膨脹屬足陽明胃經手少陽三焦經宜隔蒜灸若治之稍緩必致潰爛是經少血多氣瘡口不合危篤者多矣準繩心法曰此疽又名蠹疽屬膽胃二經積熱而成臑癰門主論王肯堂曰臑癰俗名病藕包臑臂表裡俱腫赤色惟肘節處差小故名藕包以內外分陰陽準繩陳實功曰臑癰生於膊上連肩通腫長而堅硬者是也正宗薛氏曰臑癰在肩之下肘之上周匝漫腫色赤裡廉外廉左右皆同由風溫或風火凝結而成初起狀如粟米一撮亦有起一粒僵疙瘩者漸次焮腫紅熱臖膿痛甚紅腫之外無暈者順有二暈者險三四暈者逆又曰藕包毒腫發臑內或臑外結腫一枚如桃如鵝鴨卵者是也臑內屬手三陰經臑外屬手三陽經宜加引經藥必效脾癰門主論申鬥垣曰脾癰生肩貞臑俞二穴乃手太陽小腸經多血少氣及脾受膏粱厚味所生也宜汗之經云汗之則瘡已啓玄李東垣曰脾癰又名髎疽在肩之後下腋之後外層岐骨縫間左右同屬小腸經肩貞穴由風火凝結而成又曰如生在肩前下腋前外之上骨縫開合空凹陷中左右相同初起如椒子漸腫堅硬大如鵝卵按之疼痛入骨屬心包絡經名曰樂疽乃血熱氣鬱而成臂癰門主論玄機云在臂外為癰在臂內為魚肚發在臂上節腫連肩髃為臂風毒王肯堂曰兩臂肘起至接骨下引手至小骨之上發癰癤此處雖實奈連大小筋骨舉動不便垂手多墜疼如膿深沉徹骨即傷筋脈拳縮不舒搐搦宜急用緩慢筋脈藥餌治之準繩申鬥垣曰臂癰毒乃心腎二經通於五指毒氣流走成串漏啓玄心法曰魚肚發生於臑部之後垂肉處焮腫赤色屬心經青靈穴由火毒凝結而成陳遠公曰人臂上忽然生瘡變成癰疽者亦陰癰也雖比頭面對口肩背稍輕然治不得法亦能殺人故須辨陰陽治之大約痛者陽證癢者陰證如陽證用三星湯一二劑便可立消若陰證此方又不可用必大補氣血佐以消痰化毒始可奏功勿以手足非心腹之疾不須補虛也夫陰主靜而手則至動者也至動生陰癰則動變靜矣反常之道也可不畏乎況動變靜又趨陰之道也陽趨於陰非生近於死乎欲陽返陰易欲陰返陽難誰謂手癰而小視之哉消癰還陽丹人參花粉生甘草各三錢白朮生黃耆各一兩肉桂乳香末各一錢金銀花二兩當歸五錢水煎服一劑癢變為痛矣二劑疼止三劑全消冰鑑按此方與七聖湯相同而意氣與所主各異也七聖湯治已潰之劑此湯乃治未潰之方蓋已潰者以生肉為先未潰者以護肌為主所以七聖湯中無乳香末天花粉二味此方用乳香末天花粉攻中有擁衛之功耳胡公弼曰臂癰有因遠行涉水途路或冒風雨寒濕飲食不節亦能患此所受稍輕治以防風除濕丸主之青囊馮魯瞻曰臂癰者前臁屬手陽明經後臁屬手太陽經外臁屬手少陽經內臁屬手厥陰經內之前臁屬手太陰經內之後臁屬手少陰經總緣經絡熱鬱風邪外干氣血有乖而生也當分經絡以用本經之藥為引行其氣血自愈錦囊李東垣曰臂自肘至腕曰臂外側屬三陽臂里屬三陰俱由營衛不周感受風邪逆於肉裡而成也已潰若拳縮而不能舒疼痛徹骨者乃潰深傷脈也屬逆李東垣曰臂痛有六道各加引經藥乃驗以兩手伸直垂下大指居前小指居後而定之前臁痛者屬陽明以升麻乾葛白芷行之後臁痛者屬太陽以藁本羌活行之外臁痛者屬少陽以柴胡行之內臁痛者屬厥陰以柴胡青皮行之內前臁痛者屬太陰升麻白芷行之內後臁痛者屬少陰細辛獨活行之骨螻疽門主論王肯堂曰骨螻疽生手臂陽明經分生瘰初如粟米漸大如赤豆痛不可忍旬日大如胡桃枯紫色若毒遊遍身拘急發搐嘔噦不食冷汗自出滑泄煩躁脈亂者死犯房勞怒氣者死此證乃七情不和積怒積憂積熱所致真元虛敗不能勝邪發之暴死之速乃陰虛極而火獨亢之故治當滋化源勿以揚湯止沸之法誤之準繩薛立齋曰骨螻疽生臂外前臁大骨之後屬手陽明大腸經由憂鬱暴怒凝結而成初如粟豆旬日大如桃李腫硬疼痛若紫暈開大腐爛斑點串通肌肉搐搦拘急多見七惡者逆垂臂發門主論鬼遺方云垂臂發生於垂臂兩處發接骨下臂鵝上起如雞鴨卵大皆由榮衛不調所致也喜患實處而不透內亦宜急消或發穴早療鷀癰門主論竇漢卿曰生於臂撑上者名鷀癰紅腫作痛初起宜灸若潰之必損命不可輕忽石榴疽門主論陳實功曰石榴疽生在肘尖上一寸是也此乃少陽相火與濕熱並搏而成初起一點黃粟小泡根便開大色紅堅硬腫如覆碗皮破泛出疊如榴子令人寒戰儼同瘧疾初起即灸九壯內服蟾酥丸發汗頂上以蟾酥餅貼之膏蓋腫處以金黃散敷之九日後得膿為吉反此為凶均如癰疽調治正宗又曰此乃少陽相火與外濕煎搏而成也薛立齋曰石榴疽生肘尖上一寸余屬三焦天井穴初起黃粟小泡根腳便覺開大色紅焮腫堅硬疼痛腫如覆碗破翻如榴寒熱如瘧由三焦相火與外濕相搏而成破後用菊花蕊煎湯洗之次以菊花燒灰存性加輕粉少許兌勻敷之神效冬瓜串門主論王肯堂曰冬瓜串生兩臂膊間長二三寸紅赤高腫疼痛而無處覓頭者是也照癰疽門施治準繩冬瓜串門主方驗方綱目萆麻子搗膏貼之一夜自愈又方準繩羊糞不拘多少麻油同研敷陳肝瘡門主論申鬥垣曰陳肝瘡乃手少陽三焦經生於左右臂上三五處如癤腫痛不可忍不可挨擦如有頭二七可刺無頭身熱虛硬麵赤者二八日死又名蚤疽徹手生瘡變生於手三陰三陽經三年而死癢甚者一月而死啓玄螻蛄串門主論陳實功曰此證得於思慮傷脾脾氣鬱結而成其患多生於兩手初起骨中作疼漸生漫腫堅硬不熱不紅手背及內關前後連腫數塊不能轉側日久出如豆腐漿汁串通諸竅日夜淋漓腫痛仍在患者必面黃肌瘦飲食減少惟調和氣血扶助脾胃其中可生者十有二三如治之不善妄投寒涼克伐損傷脾胃則活者鮮矣施治之法首尾宜用益氣養榮湯加味逍遙散主之正宗又曰是疾多生於氣血澆薄者蓋四肢屬脾土所以多生兩手李東垣曰螻蛄串所謂螻蛄者蟲名也形似蜻蜒翅短而尾長善近風喜水故患此者不破則易已如潰不斷其膿水勢必貫串上延肩井下串臂肘一串二二則串三失治則膿血侵蝕筋骨慘痛此緣五臟受濕六腑蓄熱故外傷皮膚遂成斯毒朱丹溪曰螻蛄串生於臂內中廉屬包絡經由思慮傷脾脾傷則運化遲故生濁液流於肌肉脾氣鬱滯不舒凝結而成初起筋骨如中流矢疼痛漸增漫腫堅硬不紅不熱連腫數塊臂膊不能轉動日久其腫塊漸次潰破孔孔時流白漿內潰串通諸孔外勢腫破不消膿血淋瀝如漏虛證來添如面黃食少削瘦甚則午後寒熱交作而成敗證也初宜逍遙散次用人參養榮湯調和氣血扶助脾胃十中可保三四肘後毒門主論胡公弼曰肘後毒乃風毒流走氣血凝滯脈通五指結成肘毒青囊肘癰門主論心法曰肘癰生於肘之圍繞由心肺風火凝結而成形小為癤形大為癰手足魚臍瘡門主論申鬥垣魚臍瘡形似魚臍生於肘肚者是手少陰心經多氣少血少海靈道上是也生於小腿肚者是足少陽膀胱經多血少氣承山飛揚二穴上下是也啓玄腕癰門主論王肯堂曰腕癰生於手屈之處俗名手牛押屈此手三陰經風熱聚毒之所致也準繩李東垣曰腕癰生於手腕背而屬手三陽由風火凝結而成乃皮肉澆薄之處若遷延日久不潰或漫腫平塌既潰腐爛露骨者逆難於收功兌疽門主論陳實功曰兌疽生於手之動脈處腫痛寒熱痛徹手膊舉動不便者是朱丹溪曰兌疽生手腕裡面橫紋後前稍動脈之間左右同乃肺經門戶若發疽或潰深則肺氣大泄最為險候瘑瘡門主論王肯堂曰瘑瘡生於手足間相對如新茱萸癢痛折裂搔破則黃水淋漓有孔如瘑久而生蟲準繩心法曰瘑瘡生於指掌之中形似茱萸兩手相對而生亦有成攢者初起黃白膿泡癢痛無時破流黃汁時好時發極其疲頑由風濕客於膚腠而成宜以潤肌膏搽之若日久內必生蟲用藜蘆膏擦之兼戒口味瘑瘡門主方藜蘆膏苦參藜蘆各一兩豬油八兩熬枯去渣入松香一兩化開離火加枯礬雄黃一兩攪勻候溫塗之筋疽門主論竇漢卿曰筋疽生臂之動脈間筋寄之上臂膊不能屈伸若不速治潰爛筋脈必成廢疾脈骨疔門主論申鬥垣曰脈骨疔又名魚臍疔生於掌後橫紋陷中根行甚急亦有生肘臂間者紅者為疽黑者為疔有紅絲者是也宜用針先針斷紅絲後服追疔丸劑外敷絲瓜葉膏啓玄王肯堂曰又名穿骨疽生於間使穴在掌後橫紋上三寸兩筋陷中屬包絡經蘊熱凝結而成又曰如潰穿骨縫從臂外側出膿者險脈骨疔門主方絲瓜葉膏絲瓜葉韭菜葉連須蔥各等分同入石臼內研如泥以熱酒中和去渣服以渣病在左手敷左腋病在右手敷右腋脅下亦敷在左足敷左胯病在右足敷右胯病在中敷心臍並用布縛候紅絲皆白為安如有潮熱亦用此法令人抱住不可放手恐毒氣顛倒難救病人發顫跌倒亦難救五指所屬臟腑穴道圖説大拇指屬脾土脾氣通於口絡聯於大指通背右筋天樞穴手列缺穴足三里穴二拇指名曰食指屬肝肝氣通於目絡聯於食指通於小天心穴足太溪穴中拇指名曰將指屬心心氣通於舌絡聯於將指通背左筋心俞穴手中衝穴足湧泉穴四拇指名曰無名指屬肺肺氣通於鼻絡聯於無名指通胸前膻中穴背後風門穴小拇指屬腎腎氣通於耳絡聯於小指通目瞳人手合谷穴足大敦穴大腸筋在食指邊絡聯於虎口直到食指側巔小腸筋在小指外邊絡聯於神門直至小指側巔穴在陽掌者內牢穴在手心正中大橫紋在手掌下一道橫紋離宮在將指根下屬心火浮心穴在大橫紋左邊坎宮緊與離宮對在小天心之上屬腎小天心在坎宮下中門陽池穴陰池穴在小天心兩旁板門穴在大指下一塊其肉如板屬腎腎經穴在大橫紋右邊二人上馬穴在小指旁二指橫紋及掌乾宮旁水底穴在小指旁從指尖到乾宮外邊皆是屬腎虎口穴在大指食指丫處筋通三關處四橫紋在食將無名小指中三道小橫紋除去大指故名四穴在指尖者少商穴在大拇指尖商陽穴在食指尖指根下一節橫紋是風關從掌上巽宮來二橫紋是氣關三橫紋是命關中衝穴在中將指尖關衝穴在無名指尖少衝穴在小拇指尖大腸穴在食指外邊小腸穴在小拇指外邊穴在陽膊者總筋穴在大橫紋下指之脈絡皆總於此中四指脈總於此內間使穴在總筋下寸許一名內關候天河穴在內間使下自總筋直往曲池曲池穴在肘彎處一名洪池經渠穴在浮心一邊內間使旁列缺穴在經渠下天河旁魚脊穴陽池旁邊一小窩處乃大指散脈處三關穴在手膊上旁邊六腑穴在手膊下旁邊穴在陰掌者外牢宮在手背正中合谷穴在手背大拇食指兩骨丫叉相合之間威靈穴在外牢宮右邊骨縫處精靈穴在外牢宮左邊骨縫處一扇門在食將二指下夾縫處威靈穴之上二扇門在無名小指根兩夾縫中大陵位穴在外牢下手背骨節處穴在陰膊者一窩風在大陵位下手膊上與陽膊總筋下相對陽池穴在外間使下外間使穴在一窩風下與內間使相對一名外關候肩井穴在肩膊眼窩內鬥肘穴在手肘曲外高起圓骨處鏇指疳門主論申鬥垣曰脾主四肢脾有濕熱則手足指腐爛成疳是也如長夏六月間濕熱盛而諸物腐焉啓玄又曰宜服清脾胃利濕熱之劑澄曰此證指頂如泡貫膿之後破爛流水當用燥濕生肌散乾摻自效鏇指疳門主方驗方啓玄兒茶五錢雄黃一錢冰片二分研細米泔水洗淨搽之代指門主論王肯堂曰代指者先腫焮熱痛色不黯緣爪甲邊結膿劇者爪皆脫落但得一物冷藥汁溻漬之佳爪者筋之餘筋賴血養血熱甚注於指端故手指腫熱結聚成膿甚則爪甲脫落此證類於指疽然無蘊毒故色不黯雖久亦不殺人準繩陳實功曰手指忽腫痛者名為代指正宗薛立齋曰代指生指甲身之內三四日後甲面上透一點黃色初起先腫焮熱疼痛應心宜用甘草朴硝各五錢熬水浸洗即瘥如甲面透黃即系內膿已成但無門得泄急用錢針在指甲身就膿近處挑一小孔膿方得出隨後輕手擠盡余膿用黃連膏貼之易愈若失治或敷涼藥以致肌肉冰凝膿毒浸淫好肉爪甲潰空必然脫落宜用琥珀膏貼之一兩月收功代指門主方驗方烏梅入醋浸研塗患處立瘥又方芒硝煎湯淋洗自潰天蛇毒門主論王肯堂曰天蛇毒即天蛇頭不拘何指焮赤結毒腫痛有膿裂開有口唇如蛇頭狀是以名焉又名髮指屬手厥陰心包絡經積熱所致雖黑色頑麻潰爛脫指者亦不死準繩陳實功曰天蛇毒即蛇頭疔乃心火妄動攻注而成其指頭腫若蛇頭赤腫焮痛疼極連心甚者寒熱交作腫痛炎上初起宜灸蟾酥餅膏蓋正宗馮魯瞻曰天蛇頭者手指毒瘡各隨經絡而生疼痛殊甚宜審其經絡投以解毒和血加以引經之藥治之錦囊竇漢卿曰此證如膿未熟不可刀開針撥不然則胬肉起發難醫胡公弼曰天蛇頭患久有出骨者如初起紫黑者必死須割去其指方可醫治治同脫疽青囊汪省之曰手三陰三陽經亦有氣血多少不同生於手之十指名敦疽四五日潰膿可刺者生如不潰無膿黑色過節者死不可治也理例王肯堂曰五指頭生疽名曰敦疽系臟腑積熱治不可緩準繩又曰手大指疽髮指頭小點如粟漸大如豆或如桃李或青或紫乍黃乍白乍黑或癢或麻木不痛或大痛徹心此名調疽屬手太陰肺經積毒毒盛者宜截去了四日刺得血膿者生得黑白者死毒氣攻心嘔吐不食膨脹者死齒縫出血者死準繩朱丹溪曰蛇頭疔在手指頂堅硬有頭十指同自筋骨發出根深毒重初起小泡色紫疼痛堅硬如疔者是王肯堂曰天蛇毒在手指頂悶腫無頭十指同自肌肉發出其毒稍輕夫手指雖各有專經然俱兼脾經火發而成但手指系皮肉澆薄之處不宜艾灸亦不宜開早若誤灸開早以致皮裂肉胬翻出疼痛倍增不能速愈慎之又曰調疽生於手大指由肺經積熱而成初如粟豆漸腫如李青紫麻木痛癢徹心六日刺破出稠膿鮮血者吉出黑血者險若黑腐延蔓不痛者名斷指屬逆當如足部脫疽治法澄曰凡手指患天蛇毒如內膿已成脹痛者用針挑放務須從下往上挑破切不可從上向下挑否則毒傳下節潰爛俗謂戳了蛇頭蛇頭往下縮也又曰凡指頭潰後切忌用力拿重如操作用力則胬肉必出難以速愈足指潰後俱忌行走否則亦然又曰凡慵工操作之人指皮粗厚每每膿已脹急不能穿潰常見通手化膿凡遇此等人須用針向指尖上挑砭出膿不可向下砭如誤向下砭每每毒流下節遂有脫指之患不可不知又曰凡潰後須將老皮剪去免藏毒水浸傷良肉又曰每見當砭不砭膿已脹過以致甲脫肉無惟存筋骨用玉紅膏搽上生肌只有指尖難以長皮復原如舊須以生肌散內加珍珠末摻上其皮即長合矣腳尖不長皮亦照此法澄治手指足指潰後形如蟬蛻者須用利剪剪去死皮方可上藥不然皮中蓄有膿水難乾雖用珍珠散冀其收功何異隔靴抓癢決難速愈天蛇毒門主方蛇頭疔輕粉銀粉銅緑各等分研細灌入豬膽內調勻將指套入膽內用線輕輕扎定三日一換重者二次又方生栗去殼去衣搗爛敷之又方黑黃牛糞做餅曬乾入罐內燒酒熏之極效又方白果葉入燈窩油內浸透貼之腐盡肌生又方黑豆天南星研細滴醋調敷又方人糞雄黃同搗裹在患處即愈又方生雞蛋一個一頭打洞入雄黃細末五錢將患指套入浸之拔去毒立止痛又方生雞蛋三個一頭打一洞每個入雄黃細末一錢和勻將痛指插入待熱換之立刻止痛苦瓜膏陳伯迪苦瓜即癩葡萄不拘多少搗爛以鹽滷浸收不可太稀愈久愈好凡遇蛇頭毒取一匙敷患上外以絹縛過一夜痛止即愈水蛇套明醫集治天蛇毒痛不可言取活水蛇一條取中段去骨以蛇皮肉如指長裹患指上外用紙包頓覺半身涼快痛止腫消即愈數日後去皮指上蛇形宛然雄黃散治蛇頭疔初起紅腫發熱疼痛徹心者宜用明雄二錢輕粉五分蟾酥微焙二分冰片一分共為末新汲水調塗紙蓋日用三次極效蜈蚣散大蜈蚣一條全蠍七個雄黃三錢共為末用雞子清調敷患處外以豬膽皮套上即愈一方無全蠍又方濟生雄黃一錢蟾酥一分研細用蝣蜒一條共搗如泥敷患處空頂立愈又方全集蜈蚣雄黃各五分研細裝入豬膽內套指上扎緊立愈又方白蘿蔔一段挖空入雄黃末三分蒸半熟套指上愈又方雄黃研細豬膽汁調塗又方生鴨蛋二個蜈蚣一條焙研分裝兩蛋內攪勻套指上候熱再換一個即消雄黃散蛇頭疔明雄二錢輕粉五分蟾酥二分冰片一分研細新汲水調濃重湯燉溫敷上薄紙蓋之雄蠣散天蛇毒牡蠣煅四錢明雄二錢研細蜜水調濃重燉溫塗患上止痛日用五六次蛇頭疔麻油腳一錢酒麴血竭各一錢百草霜少許和勻敷上以布護好蛇節疔門主論王肯堂曰手指節間結腫焮赤又名病繭又名蛇節疔又名釘節天蛇又名病蛇節治與天蛇頭同準繩李東垣曰蛇節疔生手指中節骨節又名蛀節疔繞指俱腫其色或黃或紫由火毒凝結而成蛇眼疔門主論朱丹溪曰蛇眼疔生於指甲旁夾角間形似豆粒色紫半含半露硬似鐵釘乃火毒凝結而成蛇背疔門主論王肯堂曰蛇背疔生指甲根後形如半棗色赤胖腫乃火毒凝結而成蜣螂蛀門主論陳實功曰體弱之人手指節中不紅不熱腫如蟬腹日久方痛痛久方腐腫仍不消此乃手少陰痰氣凝滯而成用蟾酥餅膏貼漸作稀膿近者一載遠者三年內服補劑免變癆瘵之證正宗鰍肚疔門主論王肯堂曰鰍肚疔即中節疔生中指節絶骨之處由辛熱風濕之毒上干心經故發此毒乃心經受證也但中指通連五指疔色紫黑者其毒必惡易於攻心指節裡面色青黃心一受毒其人昏迷必死其指必落務用護心丹時時呷之以護其心再服蠟礬丸護膜追疔奪命丹追疔為主準繩李東垣曰泥鰍疽生在手指一指通腫色紫形如泥鰍焮熱痛連肘臂由火毒凝結而成又曰蛇腹疔生十指中節裡面形如魚肚色赤疼痛乃火毒凝結而成衝要節門主論小指節近掌處腫痛焮赤名曰衝要節正宗紅繭疔門主論王肯堂曰紅繭疔因心火太盛傳於脾經故毒發於四末若水珠若水泡與血𧆐音鹼皮起也無異多生手足胸背之間今人不識偽稱火丹或認斑瘡養成大患初起紅色宜用針針去惡血內服清心敗毒黃連丸之類如紫色則危灰黑必死根行甚速宜針惡血以緩毒勢治同疔法準繩瘭疽門主論王肯堂曰瘭疽者肉中忽生點子如豆粒小者如黍粟大者如梅李或赤或白或青或黑其狀不定有根不浮腫痛傷之應心根深至肌經久便四面悉腫泡黯熟紫黑色能爛筋骨若毒散逐脈入臟殺人南人名為拓著毒厚肉處即割去之亦燒鐵烙之令焦如炭或灸百壯其病喜著十指故與代指相似人不識之呼為代指不急治之亦逐脈上入臟殺人南方人得之皆斬去其指初指頭先作黯泡後始腫赤黑黯慘痛入心是也準繩陳實功曰瘭疽又名蛇瘴凡川廣煙瘴地方多有之初出先作紅點次變黑色腐爛筋骨小者如粟如豆大者如梅如李發無定處初起蟾酥餅膏蓋紅腫遊走不定用真君妙貼散加雄黃敷之自然截住破後如脾胃虛弱補托不應惟出清水穢汁者俱為不治正宗馮魯瞻曰瘭疽者其發有數種小者如粟如豆大者如梅如李青黑赤白變易不常或臂或腎或口齒或肚臍發無定處然大概多見於手指之間根深入肌走臂遊腫毒血流注貫串筋脈爛肉見骨出血極多若至狂言煩躁悶亂者皆毒氣攻心之候也不治錦囊澄曰瘭疽隨處可生川廣煙瘴地方多有之疼痛徹心不止腐爛筋骨潰破膿如豆汁今日拭乾次日膿汁復滿愈而復發瘭疽門主方準繩祕方射干甘草枳實升麻乾地黃黃芩各二兩犀角六分前胡三分水五升煎三分入大黃一錢一沸去滓入麝香二分分三服瘥止不限劑數神效手指怪證門主論浙有士人指忽隱痛不可忍其中指甲間生一珊瑚高二寸血色氣縷成海市人士戰馬城廓戈矛人與自己皆見嗜飲燒酒醫謂火所吐幻景服以大黃稍減久服遂絶火何得成此異者異識資諧丫癰門主論王肯堂曰五指丫處結毒焮腫者俗名鴉叉又名病蟹叉準繩申鬥垣曰手丫毒俱是手經手背丫是手三陽經手掌心丫是手三陰經受證當分何經加引經藥治之啓玄汪省之曰手三陰三陽經亦有氣血多少不同生於指丫當分經絡治之理例朱丹溪曰手丫發生於手丫岐骨縫間除大指合谷穴名合谷疽其餘指丫生毒皆名手丫發初起如粟色紅漸大如豆焮熱潰後疼痛不止者俟膿塞提出其痛方止虎丫毒門主論王肯堂曰虎口疽一名虎丫毒又名合谷疽又名丫刺毒又名臂蟹毒又名手丫發又名病蟹叉此手陽明大腸經風熱積毒之所致也準繩陳實功曰合谷疔俗名虎口百丫是也此患多系疙瘩泡起亦有紅絲走上故有疔名此足陽明胃經濕毒攻注作癢初起挑破蟾酥餅膏蓋金黃散敷之必須內外消托為主正宗胡公弼曰虎口毒即丫刺毒最能爛手毒歸肝脾亦能殺人青囊又曰赤焮熱痛更有虎口脹裂者薛氏曰此患多生大指次指連界處忽生腫毒痛不可忍若不早治必爛人手名曰拍蟹毒朱丹溪曰虎口疽生合谷穴在手大指次指岐骨間屬大腸經濕熱凝結而成一名丫叉毒初起如豆漫腫色青木痛堅硬若初起黃粟小泡癢熱焮痛根深有紅線上攻腋內即名合谷疔虎丫毒門主方初起鮮蟹搗爛敷之其毒可散手心毒門主論王肯堂曰手心毒焮赤腫痛俗名病穿掌又曰穿窟天蛇又名貧子盂若偏於掌邊者名穿邊天蛇又名穿埂天蛇亦名鷀癰此手厥陰心包經勞宮穴乃積熱所致準繩李氏曰手心毒一名擎珠毒陳遠公曰有手心中忽紅腫高突變成一疽疼痛非常日夜無間世所謂擎疽也此證多是冤家相尋內外治療往往不能收功有流血至死者似乎不必治也然有證無方安見吾道之大乎苟能懺悔怨艾安在不可救此疽雖是冤孽亦因病人有火熱之毒乘機竊發消火熱之毒何不可奏功耶但火熱非起於一旦而解毒難於小劑蓋毒成於熱熱起於火火之有餘終是水之不足不大料以滋水惟小劑以滅火安得取勝乎必大用補水之劑少佐解毒之味則自愈耳釋擎湯元參一兩金銀花二兩生地一兩當歸一兩紫花地丁五錢貝母二錢水煎二劑疼止已潰者又服四劑未潰者又服一劑無不全愈愈後仍須懺悔則無後患否則恐變生他證非方之過也此方滋水以治火補正以解毒自居於無過之地又何擬議哉冰鑑陳實功曰手心毒一名穿板疔又名擎珠又名瘭疽乃心火熱毒也是於五心痛不可忍其瘡如泡色如血赤外形雖小內有熱毒發於心窠者難治發於手足心者可療如在手掌心敷藥當從手腕敷起如在足心須從腳脛骨四圍敷住以截血路免毒上攻正宗胡公弼曰右手心毒乃太陽陽明二經受證氣流足厥陰經左手心毒乃少陰太陽二經受證氣流足太陰陽明經或因七情內傷氣血凝滯亦能患此青囊鵝掌風門主論陳實功曰鵝掌風乃手陽明胃經火熱血燥外受寒涼所凝以致皮膚枯稿初起紫斑白點久則手心皮膚枯厚破裂不已正宗又曰時瘡餘毒未盡亦能致此申鬥垣曰楊梅瘡食鵝肉亦生啓玄心法曰此證手掌及指上層層剝皮血肉外露鵝掌風門主方二礬湯正宗白礬皂礬各四兩孩兒茶五錢柏葉八兩用水十碗同上藥煎數滾候用先以桐油搽抹患上用桐油紙捻點著以煙焰向患上熏片時方將前湯乘滾貯淨桶內手架上以布蓋得湯氣熏之勿令泄氣待微熱傾入盆內蘸洗良久一次可愈七日手忌下湯水永不再發此方越重越效如輕者不可用又方祕録川烏何首烏蒼朮赤芍藥草烏地丁花防風天花粉荊芥各一兩陳蘄艾四兩煎湯熏洗膏藥濟生治鵝掌風指甲變厚及風癩頑癬死肌麻痹鳳仙花連根花葉露曬乾蒼耳葉嫩頭各四兩血餘三兩鹿角屑生刮絡石虎骨百部茜草剪草各二兩人指甲五錢穿山甲羌活龍骨麻黃蘄艾威靈仙各一兩上用麻油一斤同熬至滴水不散絞去渣離火再下鉛粉四兩銀珠四兩黃蠟二兩乳香二兩和勻瓷器收貯臨用隔湯燉化攤貼又方先以油核桃擦手足患處爐內焚常山熏之上用青布蓋好熏常山一斤七日手不下水褪去老皮永不再發又方灰條草搗汁擦十數次又方茄花帶露水摘下擦數次又方五倍子研末桐油調搽用炭火烘之二三次又方瓦花頭髮搗爛用手搓之又方鳳仙花一棵豨蘞草一兩蟬蛻三錢煎洗熏洗又方白豌豆一升同楝樹子煎湯早中晚熏洗一七全愈又方鮮核桃外面青皮同鴿子屎煎水頻洗又方鮮嫩芭蕉葉煎洗十餘次又方硃砂明雄黃各一錢輕粉五分共研細同桐油調塗患處以微火烘一炷香為度年遠者五七次年近者二三次即愈屢試屢驗又方蘄艾四五兩水煎入大口瓶內上用麻布蓋之以手心放瓶口熏之冷則換熱再熏數次即愈又方鉛彈子如胡桃大一個每日在手內搓弄搓熱將鉛彈子握緊晝夜不歇如此十餘日即愈但不能除根鵝掌風並治四彎風劉方祕方土木鱉淨肉苦參各一兩白附子五錢輕粉三錢各研細和勻生桐油調聽用先用馬齒莧煎濃湯先熏後洗仍將馬齒莧擦一二次隨用樟木屑絲瓜藤大蒜秸大皂莢燒灰熏之熏過用紅升丹川貝母末各一錢以筆管幔小篩羅裝藥然後以桐油掃患處不可過多潤過即將小篩羅內藥篩在患處即將前桐油調藥敷上約一銅錢厚仍以前樟木屑等煙燻之令熱如太熱則遠些熏藥將干過一夜次日洗去不過二次無不全愈鵝掌風鄧重光大麥芒燒煙燻手掌七日不可見水即愈又方牡蠣煅密陀僧各二錢共研細桐油調搽炭火灸之又方豆腐沫熱洗又方生桐油搽以松毛燒煙薰又方川烏白附子草烏殭蠶銅緑密陀僧輕粉膽礬各一錢麝香三分共研細末先用生附子切厚片於鵝掌風上以艾圓灸之再用蔥汁調敷又方豬胰一具去油勿經水花椒三錢用溫酒同浸二三日取胰不時擦手微火烘之又方白砒三錢打如豆粒用麻油一兩熬砒至黑去砒用油擦手微火烘之不過二三次即愈又方蔥五六根搗破花椒一把同入瓦罐內入醋一碗再用滾水衝入熏洗數次即愈又方谷樹葉煎湯溫洗以火烘乾隨用柏油擦之用火烘乾又洗又烘如此日行三次不過五六日自愈又方大黃鱔一條去頭尾腸切一寸長以香油一兩入鍋內將鱔魚堅起熬至魚枯取油放磁盞內用穿山甲燒存性研末少許調搽患上以炭火炙至手癢而痛又搽又炙三次自愈馬蟻窩門主論澄曰馬蟻窩乃無意腳踹馬蟻而成或風濕結成多生手足形似蟻窩儼如針眼奇癢入心破流脂水宜用穿山甲外敷亦有手背手腕生者馬蟻窩門主方錫灰膏陳楚陽治馬蟻窩血瘋臁瘡癢極不可忍者鍚灰篩取細者二錢五分輕粉一錢五分蔥白一根同生犍豬油去皮膜搗膏用刷子腳搽瘡上外以三退紙封之三日全愈三退紙蟬蛻鳳凰衣各三錢密陀僧六錢桐油八兩熬成膏以刷蘸膏於連四紙上陰乾用時照瘡大小剪貼三日一換換三次全愈如癢極搽錫灰膏收功又方密陀僧三錢百草霜風化石灰各五錢黴酒麴一兩五錢共為末先以松毛須搗爛煎湯先透再用松毛須燒煙燻之任其流水拭乾再以桐油調敷頻用桐油潤之每日一換七日除根又方大黃研末桐油調敷又方桐油簍蓋包患處數夜即效馬蟻窩並癢極成片之瘡吳越千輕粉二錢穿山甲一兩新瓦上炙剪成豆大再用土炒成珠共研細以甘草湯洗淨用熟雞蛋黃炒出油調搽指縫搔癢成瘡有竅出血不止多年糞桶篾箍燒灰敷之痠痛門主論陳實功曰痠痛乃風寒氣鬱於皮毛致血不榮於肌表謂皮稿則多痛手足似無皮之狀是酸苦生焉可將蔥湯浸洗良久隨以潤肌膏擦之就暖勿見風冷自愈如每逢冬時即發者須預於三伏時曬搗爛大蒜間擦三次永不再發經曰寒因熱用其理甚明正宗王肯堂曰痠痛因暴寒侵襲肌膚之中寒鬱不行偶觸衣物或以手捺疼痛連心儼如無皮之狀是也痠痛門主方潤肌膏當歸身一兩五錢粉甘草一兩白芷八錢血竭六錢紫草茸五錢白蠟切片二兩真麻油八兩先將當歸身白芷甘草熬深黃色濾去渣再入血竭熬化又濾淨再入紫草白蠟片略沸十數滾即起火濾去紫草渣其色即鮮明可愛若熬過則紫黑矣驗方胡椒四錢燒酒四兩共入磁碗內重湯燉煮以軟綿蘸酒溫溻患處即愈手足破裂門主論陳實功曰手足破裂乃乾枯之象氣血不能榮養故也此因熱體驟被風寒所逼凝滯血脈以致皮膚漸枯漸稿乃生破裂日襲於風風熱相乘故多作痛以玉肌散潤肌膏潤之內服當歸飲子正宗手足破裂門主方手背破裂大楓子肉搗泥塗之手發背門主論王肯堂曰手發背初生如水刺無頭腦頑然滿手背腫滿後聚毒成瘡深入至骨是也準繩鬼遺方曰俗名蜘蛛背李氏曰手背腫毒乃三陽經風熱鬱滯而發十書申鬥垣曰手發背即手背毒乃心肝兩經風熱相乘氣血壅聚而成初起憎寒惡熱昏悶疼痛嘔逆先宜發表解毒啓玄胡公弼曰大抵此證多由惱怒七情皆能動火各經之火不同當分別治之青囊又曰如潰後出血發熱譫語宜清心流氣飲不應乃熱入血室宜加減小柴胡湯血止而熱亦解矣汪省之曰手發背發於手背中渚液門二穴乃手少陽三焦經多氣少血初起寒熱或作嘔或作癢痛理例朱丹溪曰手發背由風火與濕凝滯而成初起形如芒刺漸覺疼痛高腫紅活焮熱潰速為膿者順若漫腫堅硬無紅無熱潰遲為疽其證形勢大小但潰深露筋骨者難全王杏庵曰病蝦生於手背屬手三陽經積熱毒盛而成形勢如蝦高埂赤腫疼痛初宜黃連消毒飲外用食鹽酒糟香油同炒令香淬以滾湯淋洗患處即消手發背門主方紫桐散李常山專敷手足發背止痛消腫梧桐葉鮮的搗爛或初秋採取陰乾紫花地丁各等分研細砂糖調敷手發背呂氏祕方生甘草炙甘草大貝母各五錢皂角刺土炒穿山甲炒黑知母各二錢五分半夏一錢五分薑引酒水同煎二劑全愈
