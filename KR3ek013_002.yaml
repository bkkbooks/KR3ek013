body:
  text: 卷二論診候入式法夫醫者人之司命也脈者醫之大業也蓋醫家苟不明脈則如冥行索途動致顛覆矣夫大方脈婦人小兒風科必先診脈後對證處藥獨瘡科之流多有不診其脈候專於治外或有證候疑難別召方脈診察於瘡科之輩甘當淺陋之名噫其小哉如是寸表手太陽小腸經里足少陰心經關表足少陽膽經里足厥陰肝經尺表足太陽膀胱經里足少陰腎經尺半表半裡手厥陰心包絡經里命門關表足陽明胃經里足太陰脾經寸表手陽明大腸經裡手太陰肺經原夫瘡腫之生皆由陰陽不和氣血凝滯若不診候何以知陰陽勇怯血氣聚散耶由是觀之則須信療瘡腫於診候之道不可闕也歷觀古人治療瘡腫方書甚多其間診候之法略而未詳皆夫諸科甚有滅裂愚雖不才輒取黃帝素問難經靈樞甲乙以及叔和仲景扁鵲華他千金外臺聖濟總録古今名醫諸家方論之中診候瘡腫之説簡編類次貫成篇帙首載診候入式之法次論血氣色脈參應之原後明脈之名脈所主證候及瘡腫逆從之方庶使為瘡腫科者覽此則判然可曉了無疑滯於胸次一朝臨疾診候至此則察逆從決成敗若黑白之易分耳論持手訣消息法夫診候之脈法常以平旦為紀陰氣未散陽氣未動飲食未進血氣未亂經脈未隆絡脈調勻故乃可診有疾之脈若遇倉卒病患不拘此論內經所謂持脈有道以虛靜為寶但可澄神靜慮調息凝心視精明察五色聽聲音問所苦方始按尺寸別浮沉以此參照決死生之分矣復觀患人身形長短肥瘦老少男女性情緩急例各不同故曰形氣相得者生三五不調者病謂如室女尼冠脈當濡而弱嬰兒孺子之脈細而疾三四歲者呼吸之間脈當七八至為平比夫常人特不同耳大抵男子先診左手女子先診右手男子左脈大則順女子右脈大則順大凡診脈先以中指揣按掌後高骨骨下為關得其關位然後齊下兩左右二指若臂長人疏排其指若臂短人密排其指三指停穩先診上指曰寸口浮按消息之中按消息之重按消息之上竟消息之下竟消息之推而外之消息之推而內之消息之然後先關後尺消息之亦類此若診得三部之中浮沉滑澀遲疾不調何病所主外觀形色內察脈候參詳處治以忠告之不可輕言談笑亂説是非左右瞻望舉止忽略此庸醫也皇極經云人之四肢各有脈也一脈三部一部三候以應天數也一脈三部寸關尺也一部三候浮中沉也所以應之九數也可謂脈之理亦微矣人有四時之正脈有平生之常脈有內傷之變脈有外感之邪脈有重陰之脈有重陽之脈有陽虛而陰乘之脈有陰虛而陽乘之脈有陽極而陰生之脈有陰極而陽生之脈有獨見之脈有兼見之脈有初病之脈有將愈之脈有可治之脈有不治之脈有左右上下表裡之間有餘不足惟在乎分別陰陽能分別陰陽斯可以識脈之體劉復真曰昔王叔和以七表八里脈決人之生死然又文理浩繁莫若撮其樞要以浮沉遲數四脈為宗知風氣冷熱主病且浮而有力者為風浮而無力為虛沉而有力為積沉而無力為氣遲而有力為痛遲而無力為冷數而有力為熱數而無力為瘡更分三部在何部得之若在寸部主上焦頭面胸隔之疾關部主中焦肚腹脾胃之疾尺部主下焦小腹腰足之疾診其五臟何髒得之六腑亦然學者又當以意會而加精別庶不致按寸握尺之誚云論榮衛色脈參應之法夫天地之道曰陰與陽陰陽在人曰血與氣蓋血者榮也氣者衛也榮者榮於中衛者衛於外所以榮行脈中衛行脈外脈者血氣之先也血非脈則焉能榮於中氣非脈則焉能衛於外二者相資而行內則通於五臟六腑十二經絡外則濡於九竅四肢百節萬毛晝夜循行如環無端以成其度會於寸口變見於脈故氣血者人之神也脈者氣血之神也所以治病之始五決為紀蓋五決者五臟之色脈也脈應於內色應於外其色之與脈當相參應故曰能合色脈可以萬全也凡為醫先須調明色脈況為瘡科若於此不精雖聰慧辨博亦不足委也黃韞兮先生脈確脈理作為歌便誦習也其以浮沉至數辨及不以浮沉至數辨者各從其類欲其易分別也浮沉等脈即用浮沉等字之韻欲其不混淆也脈之應病以內經為主內經未詳者以脈經補之脈經未詳者以歷代名醫之説補之欲其簡而賅也有是脈即有主是病之由復逐句箋釋於其下欲其明且暢也較前人脈賦脈詩頗有勝處有志醫學者由此入門雖曰捷徑實為正路矣脈以輕取辨者曰浮輕手便得如木浮水上其以浮辨者曰洪浮大來有力去無力曰虛浮大按之無力曰芤浮大無力按之中央空兩邊實曰散浮大無力至數不齊渙漫不收曰微浮細無力按之如欲絶若有若無凡六脈浮內經謂之毛浮脈輕手得如木水中浮浮秋脈也春夏冬見之則病脈也然在秋輕虛以浮來急去散則為平脈若中央堅兩邊虛此謂太過細而微此謂不及亦病脈也有力表邪清涕嗽惡寒發熱令人愁風邪自皮毛入皮毛合肺肺開竅於鼻肺受寒金寒則生水故鼻流清涕風邪迫肺則氣逆故嗽肺主衛風邪入則皮毛閉固衛氣不能溫外故惡寒肺與心皆在上肺邪傳心則心火鬱心主營營行血脈故一身發熱仲景謂冬月寒傷營則發熱惡寒無汗風傷衛則發熱惡風有汗此固然矣然四時感冒者亦發熱惡寒必用表藥而愈蓋表藥其昧皆辛辛開毛孔散火鬱毛孔開則衛氣外達火鬱散則營血內安營衛調和則汗出而寒熱解矣寸主頭疼關腹滿尺司癃閉好推求自胸至頭寸主之諸陽經起於頭風邪自皮毛深入則歸經故頭痛肝脾與腎其脈常沉今脈浮乃陽亡乘陰也陽盛則熱木之性寒則凋熱則旺肝木旺則克脾土脾虛則不欲食而腹滿腎竅於二陰其性惡燥熱盛則血燥而大腸不潤故閉氣燥而膀胱不化故癃癃者小便不利也浮緊傷寒浮虛暑寒傷營營行脈中寒氣徑急故脈緊暑傷氣故脈虛浮緩風濕自宜搜濕氣濡滯故脈緩凡頭重身重腿膝痛浮腫大便泄小便黃者風濕證也浮滑風痰浮數熱滑主痰帶浮則為風痰數主熱帶浮則為風熱無力須將血弱謀陽盛故脈浮陰虛故無力遇此等脈不宜輕用表藥洪內經謂之鉤又謂之大應指雖浮大來盛去衰便曰洪洪夏脈也春秋冬見之則病脈也然在夏來盛去衰如鉤則為平脈若來盛去亦盛此為太過來不盛去反盛此為不及亦病脈也如鉤者浮候之來盛下垂曲如鉤狀去衰則又柔和矣故為平脈真陰不足邪氣相攻人之正氣陰陽相配者也陰陽和則無病陰不足則陽盛陽盛則生火火者偏勝之氣也偏勝之氣為邪氣邪氣即邪火寸洪身熱兼膚痛咳唾煩心亦可窮陽盛故生熱火不得泄故膚痛火傷肺故咳唾心惡熱故煩嘔與脹察關中胃喜清涼而惡熱嘔者火上炎也火鬱而不散也尺虛宜壯水泄痢不宜逢尺脈洪相火旺也宜壯水以制陽光若泄痢尺脈洪者難治李瀕湖謂洪脈非夏升陽散火宜愚按新病身強及洪見寸關者升陽散火可也若久病身弱及洪見兩尺者又宜以滋陰降火為是虛瀕湖引內經云氣來虛微為不及病在內愚按虛脈浮大無力微脈浮細無力大中不能見細則虛不可兼言微矣今考內經謂氣來不實而微為不及不實者細無力之謂也故可言微瀕湖便以不實改作虛字誤虛來浮大軟無力夏月逢之暑病居暑病發熱有汗脈虛者宜清暑益氣若發熱惡寒無汗脈浮數而不虛者宜清暑解表寸虛自汗多驚悸虛脈主氣血虛正氣虛則邪氣實邪氣實便是火火愈甚則表虛汗者心之液也血所化表既虛則營亦不固血隨火化外泄於表自為汗心藏神血虛則神失所養故多驚火氣衝心故跳動而多悸關主中宮脹不舒血虛肝鬱則脹脾胃虛中氣不足亦脹潮熱骨蒸痿候尺陽氣終巳陰氣始午陰虛則交午時陰分而陽氣並之陽勝則外越為肌膚熱內爍為骨髓熱熱在骨謂之骨蒸曰如潮水之應時而至謂之潮熱骨枯髓竭足不任身謂之骨痿卻憐久病定亡軀芤革芤而弦曰革主陰虛失血與芤同今附於此脈經謂芤脈浮大而軟按之中央空兩邊實舊謂前後為兩邊固非矣李士材以浮沉為兩邊亦不是有力謂之實浮中沉相去無幾豈有浮候實沉候實而中候獨見其空者乎據內經論浮脈云其氣來毛中央堅兩旁虛此謂太過由是推之則兩邊指兩旁也蓋芤脈浮大而軟按之兩旁實而中央獨陷下此血不充之象故主失血諸證輕手取之浮大軟重按中空邊實芤芤草名中空如蔥血行脈中失血者其脈中空故以芤比之寸關吐衄腸癰病尺部崩淋便血流吐血衄血腸癰血崩血淋大便下血等證皆陽盛陰虛也惟陽盛故其脈浮大惟陰虛故其脈中空散有表無里大而散至數不齊楊花無定空中泛左寸怔忡右寸自汗散主氣實血虛心主血血虛則心神恍愧不寧曰怔忡氣實邪氣實也邪氣實則熱熱則氣泄故自汗左關溢飲兮陰虛生內熱胃熱則津液耗而發渴渴多飲滲入肌膚腸胃之外謂之溢飲右關食痹胻腫亦堪斷胃熱則不和不和則不消穀因而痞悶曰食痹胻足脛也陽明胃經下循脛外廉胃熱故胻腫尺為血大虛兩足如斯終壽算經以腎脈散為血少戴同父曰腎脈散諸病脈代散皆不可治也微重手按之如欲絶若有若無極其微微屬陰陽虛弱候惟陰陽皆虛故其脈見若有若無之象而名之曰微惡寒發熱汗霏霏陽虛則生寒陰虛則生熱陽不外固陰不內守則多汗寸微衄血驚兼喘關主中寒拘急危氣血虛則中寒寒則心下拘急拘急不寬暢也尺中厥逆元陽損陽火生於陰精陰精虛則陽火弱陽火熱則手足寒而為厥陰陽不交氣上衝而為逆也女子崩中帶下虧脈以重取辨者曰沉重按始得其以沉辨者曰伏重按之著骨乃得凡二脈沉內經謂之石又謂之營牢牢即沉脈長大弦而有力者主寒主痛與沉同今削於此按始有則為沉沉冬脈也春夏秋見之則病脈也然在冬其氣來沉以搏則為平脈若來如彈石者此謂太過其去如數者此為不及亦病脈也寸沉胸脅痛水氣膈間停若居關與尺腹背及腰痛沉主陰陰盛則克伐元氣故三部得沉者皆主痛宜溫之有水氣者宜利之沉緩寒濕沉數熱沉滑當知痰食真沉如無力氣虛甚明沉有力為實邪故主寒主積沉無力則氣虛也崔紫虛四言舉要云沉牢痼冷沉實熱極愚按牢脈沉而長大有力實脈沉取亦長大有力同一沉取長大有力何以辨其為痼冷熱極乎伏何以謂之伏推筋按至骨傷寒欲汗陽邪解厥逆臍疼溫藥服瀕湖曰傷寒一手伏曰單伏兩手伏曰雙伏不可以陽證見陰為診及火邪內郁不得發越陽極似陰故脈伏必有大汗而解不可發表又有夾陰傷寒先有伏陰在內外復感寒陰盛陽衰四肢厥逆六脈俱伏須投薑附及灸關元脈乃復出若太溪衝陽皆無脈者必死寸司嘔吐關思痛尺部疝瘕利水穀霍亂嘔吐腹痛男子疝女子瘕聚痛甚者其脈多伏暴泄者脈亦多伏脈以浮沉合辨者曰實大而長浮沉皆得凡一脈實實脈大而長浮沉皆有力風熱蘊蓄深譫語發狂疾邪氣盛則實浮有力表實也沉有力裡實也所以然者由風邪深入鬱而變熱熱甚則喪其神守故譫語更甚則發狂所謂重陽者狂也左於脈實者宜發之右手脈實腹滿者宜下之寸實嘔吐頻心胸苦氣逆積聚腹痛候在關大便不通候在尺瀕湖曰脈訣言尺實小便不禁與脈經尺實小腹痛小便難之説何反潔古不知其謬藥用薑附愈謬矣愚按脈訣所言亦出脈經脈經云尺脈實小腹痛小便不禁宜服當歸湯加大黃一兩據用大黃則脈經以尺實為熱明矣潔古用薑附可謂大誤但虛寒不足之證火不能攝水則小便不禁此係實熱而脈經何以亦有小便不禁之言意者熱渴飲多大便祕塞水獨歸膀胱則小便數小便數則不及溺之即自出亦謂之小便不禁耶脈以至數辨者曰遲一息三至曰緩一息四至曰數一息六至曰結緩時一至曰促數時一至曰代止有常數還入脈中良久方來凡六脈遲一息三至號之曰遲浮遲寒在表沉遲作里醫有力無力皆寒證抑陰扶陽不用疑寸遲心痛吐酸水寒氣攻心故痛胃虛而寒氣客之則水入於胃不輸於脾停於胃脘水得寒氣熏蒸變而為酸此是寒證故脈經治以附子湯茱萸湯然此證亦有熱者肝移熱於胃土受木製不能勝水水得木味蘊而成酸經所謂諸嘔吐酸皆屬於熱是也當清熱燥濕此以脈之滑數辨之關尺寒疼厥可知陰氣盛則從足五指至膝上寒謂之寒厥遲澀癥結遲滑則血虛寒血虛寒則凝滯不行漸成癥結遲滑脹宜滑主氣虛主食積氣虛則寒寒則氣收故脹寒飲食積於腸胃亦作脹緩緩脈均均來四至貴無偏勝軟而和緩主脾胃又主風濕在四季之月不大不小浮沉同等軟而和者平也若三部不齊則為偏勝或又兼他脈者病脈也不在四季之月他脈中帶緩者胃氣也若獨見緩者病脈也肌肉不仁緩在寸風氣之傷人多在上寸部心肺也心主血脈肺主皮毛風邪入客血脈故肌肉之間不知痛癢曰不仁關知脾胃食難磨風氣通肝肝氣移之於脾胃脾胃實故不欲食實者邪實也尺為腳弱下身腫濕氣之傷人多在下濕濡筋故腳弱濕滲肌膚故下腫小便難而餘瀝多濕積下焦蘊而成熱濕熱壅滯則膀胱之氣不化故小便難有餘瀝也浮緩為風沉緩濕若逢緩滑熱為疴經以緩而滑為熱中李士材以緩滑為濕痰誤緩澀營虛緩細痹風寒濕三氣皆能為痹風勝為行痹寒盛為痛痹濕盛為著痹脈緩細主風濕痹推詳三部自無訛數一息六至稱為數只有兒童獨安樂兒童以六至為平脈外此皆為火浮沉實數散且清浮數有力為實火在表宜散沉數有力為實火在裡宜清無力為虛宜補藥數而無力虛火也宜補氣或益火之元寸為喉舌疼嘔吐嗽煩渴胃口當心亦寸主之胃有火故嘔吐火迫肺故為嗽為煩肺金燥故渴關中消穀易於飢胃有火則消穀善飢尺部惡寒氣淋作脈經謂尺脈數惡寒小便黃赤又曰少陰脈數男子氣淋蓋腎為陰屬水陰虛而陽湊之凶熱故外惡寒火伏水中故小便黃赤甚則膀胱之氣不化小便不利痛而為淋結脈經載扁鵲之言曰脈有表無里者死經名曰結何謂結脈在指下如麻子動搖按如麻子動搖者輕取之則散亂無紀重按之則不可得故有表無里乃腎絶也與緩時一止之結不同緩時止謂之結陰盛陽衰凝氣血氣溫血行血者也氣虛不能溫血則血寒氣虛不能行血則血滯血寒而滯則結血結氣亦結矣浮為痛積在外攻沉為痛積內相迫促數時一至何其促陽有餘陰不足痰火煎熬或為喘嗽或斑毒肉上紫紅成片者斑也黑斑難治癰疽皆毒也代動而中止不能還止有常數斯名代不是傷寒心悸多即有腹疼泄痢害久病固為凶扁鵲曰脈五至一止不復增減或七來一止不復增減者經名曰代死平人亦臟敗靈樞曰一日一夜五十營以營五臟之精所謂五十營者持其脈口數其至也五十動而不一代者五臟皆受氣四十動一代者一臟無氣三十動一代者二臟無氣二十動一代者三臟無氣十動一代者五臟無氣豫之短期據脈經謂四十動一止四歲死三十動一止三歲死二十動一止二歲死十動一止歲內死五動一止五日死此亦概言之也不必泥女胎三月餘見之不為礙舊謂胎三月其脈代按胎脈有五月七月亦代者當於兩尺候之如脈來或九至或十至一止良久方來又九至或十至一止良久方來此所謂有常數也再來或九至或十至不止又於十二至或十五至一止但又常數皆是代脈代之止有常數乃信也土主信此脾胃之氣至也土為萬物之生氣脾胃乃五臟之生氣生氣至故有胎也且天一生水次生火木金土而五行備胎之初結乃天一之水也次生火木金土而五行備胎之初結乃天一之水也次生火木金土而五臟之氣全五臟之氣全故脈代也代又何以為死脈以生數論五臟之氣全應天五生土之數故其脈代以成數論有形之後則營衛之氣與天地之晝夜周流而無一息之止者也五臟無氣獨胃氣尚存故其脈亦代然此胃氣乃油盡之燈故亦久必死脈不以浮沉至數辨而以形辨者曰弦直而長如按弓弦曰緊往來有力左右彈人手如轉索無常曰長迢迢自若如揭長竿末梢曰短不能滿部兩頭縮縮曰細直而軟應指如絲線曰澀細長往來難應指如輕刀刮竹曰滑往來前卻流利如珠曰動大如豆厥厥搖動凡八脈弦脈經謂弦脈舉之無有按瘧脈有浮弦者未嘗舉之無有也經曰瘧皆生於風惟生於風故脈浮弦且頭痛如破也即脈經傷寒條中亦有陽明中風脈弦浮之語則所謂弦舉之無有疑其誤也挺然在指下端直似弓弦弦春脈也夏秋冬見之則病脈也然在春軟弱而滑平脈也若實而強此謂太過不實而微此謂不及亦病脈也夏秋則主瘧相纏風寒暑濕之氣皆為瘧其脈皆弦惟夏秋患瘧者甚多冬春亦間有之弦數熱弦遲寒寸弦頭痛膈多痰弦主痰痰隨厥氣上升故頭痛關苦癥瘕胃氣逆血凝氣滯久而堅硬在臍旁曰癥瘕胃中寒氣衝塞心下曰逆尺當㿗疝腳拘攣㿗疝者睪丸腫痛上連小腹也蓋肝脈絡陰器主㿗疝或寒或濕或熱或虛或氣分或血分臨證以脈之遲數強弱辨之肝主筋腎主骨筋束骨者也寒則筋急故拘攣拘攣者屈伸不利也緊內經謂之急左右彈手其力強狀如轉索名為緊緊主寒浮緊表寒沉緊裡寒人迎主傷寒還把風癇診左手寸關之間曰人迎人迎緊主傷寒頭痛惡寒發熱風氣通肝木得風則動搖故身瘛瘲肝火鼓動心火火炎神越故卒不知人吐涎沫曰風癇氣口主傷食喘嗽亦宜審右手寸關之間曰氣口氣口緊主傷食心下苦滿肺惡寒寒則氣逆故曰喘與咳脈經曰緊為實以上皆實邪故其脈緊關尺見緊時痹疝極其準經謂青脈之至也長而左右彈人手有積氣在心下支胠名曰肝痹得之寒濕與疝長迢迢自若指間長倘帶搏堅便失常長脈在春乃肝脈也軟弱如揭長竿末梢曰肝平實而滑如循長竿曰肝病按長則氣治若應指搏堅而不軟弱則氣不治矣傷寒傳變陽明可詳傷寒二三日脈長目痛鼻乾不得眠陽明病也左寸足疼舌捲縮經曰寸口脈長曰足脛痛按左寸心為陽主血脈長主有餘之病上有餘則下不及血脈不通故足脛痛腎脈挾舌本舌為心苗心火盛則水急水急則舌本縮而舌卷不能言矣右寸分明唾血傷腎主唾其脈入肺中循喉嚨血隨火升故唾血關中少氣髀如折長本肝脈木邪剋土故脾虛中氣不足股內曰髀胃脈之所下胃虛故髀痛如折又脾有邪其氣亦留於兩髀尺則腰痛不可當火盛則水衰腰為腎府腎虛則腰痛短本位不能及縮縮其形短短則氣病若秋時肺脈短澀乃平脈也滑短酒傷浮短嗽寸主頭疼尺腹滿短主不及之病酒傷與嗽則氣不及也上不及則頭痛下不及則腹滿也細內經謂之小濡同軟弱脈經以浮細為軟沉細為弱豈細脈無浮沉二候獨於不浮不沉候之乎而內經何以有沉細之説也且經曰脈弱以滑是有胃氣滑者流利如珠之謂若以沉細為弱則沉細如絲之中不能見滑矣且經脈既以沉細為弱而論肺痿何以又有浮弱之言乎今據內經以弦脈軟弱為肝之平脈則所謂軟弱者無力之謂不得以浮細為軟沉細為弱矣況軟弱所主之病大概與細同今附於此直軟如絲細勞傷損血氣細主氣血兩虛身汗來心慌至浮細屬陰虛多盜汗沉細屬陽虛多自汗汗多心虛故慌寸須嘔吐關須脹脾胃虛寒上則嘔吐下則腹滿尺屬骨蒸痢與痹骨蒸久痢皆屬腎虛故脈細痹為寒濕之陰邪故脈亦細澀往來難細短澀細刀刮竹形容切血少氣有餘寸澀心疼神亦怯胃屬陽明多血多氣其上口當心血虛則氣湊之氣血攻衝則當心而痛陽明又主驚驚氣歸心故神怯關中脅脹胃虛嘔肝藏血屬厥陰其脈布脅肋血少氣騰故脅肋脹胃為水穀之海血少則燥氣騰則逆燥則血枯逆則氣上故不納水穀而嘔吐也尺部腸枯五心熱血虛則腸枯澀血虛而相火動則肝熱肝熱下移之於母則腎熱下移之於子則心熱腎之脈起於足心心之脈入於手心故手足心熱婦人當為經不通或為胎病宜區別血養胎故脈澀崔紫虛謂澀主自汗瀕湖士材皆宗之愚按內經云澀者陰有餘也陰氣有餘則為身熱無汗當以經言為是滑流利如珠便是滑多汗陰有餘風痰更可察經曰滑者陰氣有餘也陰氣有餘為多汗身寒滑脈主風不主痰寸滑吞酸咳嗽嘔滑又主熱胃中濕氣與熱氣熏蒸蘊而成酸停在胃脘故吞酸濕熱生痰故咳嗽及嘔吐當關積熱掌中發食積胃胃生熱胃熱上熏則包絡與心肺皆熱包絡之脈入掌中肺脈行其前心脈行其後故掌中亦熱經所謂掌中熱者腹中熱是也痢疾㿉癃尺部看滑又主宿食食積成痢㿉者睪丸腫大病連小腹也癃者小便不通脈經謂尺滑當溺血也女子或為經閉煞脈經謂尺脈滑女子經脈不利按滑為血有餘若滑而結及浮滑遲滑者蓄血也不然則是胎脈動仲景傷寒論曰數脈見於關上上下無頭尾如豆大厥厥動搖者名曰動愚按兩上字其一乃後人誤添也當是數脈見於關上下經曰女子手少陰脈動甚者妊子也手少陰屬心是寸有動脈矣又曰陰虛陽搏謂之崩腎之陰虛陽搏之故見崩證是尺有動脈矣王叔和著脈經不知兩上字其一乃衍字因曰動脈見於關上遂令後之論脈者皆曰動脈只見於關與經不合矣動脈如豆形數而厥厥動陰動出汗兮驚痛堪憂成無己曰陰陽相搏則虛者動按陰搏陽則陽虛陽虛故出汗經謂肝主驚陽明主驚按膽附於肝肝氣強者膽大肝氣弱者膽小膽小嘗有畏懼之心故易驚此驚之生於內者也陽明屬土土性靜故聞木聲惕然而驚此驚之生於外者也由是觀之則自驚者屬肝物觸而驚者屬陽明然而驚則皆歸於心也陰陽相搏陰邪勝故痛陰動發熱兮血崩為重陽搏陰則陰虛陰虛故發熱陽邪勝迫血妄行故崩胎脈尺脈滑疾心脈動來三部浮沉脈相等五十不止確為胎疾而按散兮其胎三月但疾不散兮五月可猜沉則為男浮則女陰陽推測貫三才女子以血脈為本尺脈嘗滑然滑屬血陰也疾屬氣陽也滑而疾是陽之交陰也女子心脈嘗沉今陰陽相搏而其脈動是陰之交陽也陰陽相交而三部之脈無偏浮偏沉五十不止無或結或促其為胎也明矣三月之胎其形未實故其脈按之而散五月之胎其形漸實故其脈按之不散而其疾如故者蓋疾為陽氣萬物得天地之陽氣以生成胎必得母之陽氣以長養也沉陰脈何以反為男浮陽脈何以反為女蓋男胎得陽氣多胎得陽氣多則母之陽不足陰有餘矣陰有餘陽不足故其脈沉女胎得陰氣多胎得陰氣多則母之陰不足陽有餘矣陽有餘陰不足故其脈浮亦猶坎為男陰多於陽且陰外而陽內也離為女陽多於陰且陽外而陰內也疾與滑何以不主病蓋疾而不滑則為陰虛火盛滑而疾則非病矣尺既滑而疾則寸之動亦非病矣脈經辨男女法左手沉實為男右手浮大為女左右手俱沉實生二男俱浮大生二女又左尺脈偏大為男右尺脈偏大為女左右俱大生二子論三部脈所主雜病法訣夫三部之中俱見一脈所主雜病略而言之脈經曰陽邪來見浮洪陰邪來見微細水穀之邪來見實堅寒澼之邪來見弦小又曰浮而滑者宿食也短而滑者酒病也遲而滑者脈滿也洪而大者傷寒也浮而數者傷風也浮而急者飲食不消脾不磨也沉而弦者寒氣結而陰痛也浮而緩者皮膚不仁也滑而散者癱瘓也遲而緩者寒症也浮而澀者霍亂也弱而澀者反胃也緊而滑者吐逆也短而數者心痛也弦而數者為瘧也緊而急者尸遁也實小而堅者病在內而冷也浮滑而緊者病在外而熱也短而急者病在上也長而緩者病在下也長而弦者病在肝也滑而洪者病在心也微而軟者病在脾也浮而澀者病在肺也沉而緊者病在腎也又訣曰諸浮為風或為虛也諸緊為痛或為積也諸澀為痹諸弦為飲諸數為熱諸遲為寒芤則為失血軟則為虛若脈沉沉澤澤四肢不仁者亡祟也或大而愵愵社祟也若脈來乍大乍小乍短乍長者鬼祟也寸部主上焦頭面之疾凡診脈按之骨而見者謂之有力按至骨而無者謂之無力余皆仿此浮而有力主風無力主虛主頭面眼目虛浮體重風寒齒痛口眼喎斜沉而有力主積無力主氣主胸膈痞滿咳嗽氣急膈氣反胃胸滿不食遲而有力主痛無力主冷主嘔吐痞滿不入水穀虛汗拘急疼痛不已數而有力主熱無力主瘡主上焦煩躁口苦嗌乾客熱煩渴頭痛口瘡關部主中焦胸腹之疾浮而有力主風無力主虛主兩脅拘攣不能舉運背脊筋疼身體麻木沉而有力主積無力主氣主膨脹虛鳴心腹疼痛上下關格不思飲食遲而有力主積無力主冷主痃癖腹痛遊走不定上下攻刺反胃吐食數而有力主熱無力主瘡主口熱作渴嘔吐霍亂怔忡煩躁寒熱交爭尺部主下焦腰足之疾浮而有力主風無力主虛主寒邪腰痛腿膝麻木陰莖腫痛二便不利沉而有力主積無力主氣主臍下腫痛腳膝痠痛下虛盜汗小便頻數遲而有力主痛無力主冷主小腹急痛外腎偏墜小便頻數大便泄瀉數而有力主熱無力主瘡主小便不通大便閉塞或作腎癰煩渴不止五臟見浮脈主風虛之病心脈浮主心虛觸事易驚神不守舍舌強不語語言錯亂肝脈浮主中風癱瘓筋脈攣搐面腫牙疼腸風下血脾脈浮主脾虛作膨飲食不進上氣喘急嘔逆泄瀉肺脈浮主咳嗽氣急大便風祕面浮面瘡吐血唾膿腎脈浮主腰疼牙痛小腹氣痛腿足生瘡足膝無力五臟見沉脈主積氣之病心脈沉主小便淋瀝咯血尿血小便不通寤而不寐心驚肝脈沉主怒氣傷肝脅痛肥氣眼目昏痛肚腹脹滿脾脈沉主中滿不食痞氣色黃手足不仁嘔吐泄瀉貪睡肺脈沉主咳嗽多痰上氣喘急嘔血失音息賁肺癰腎脈沉主風滯腰痛小便小利陰㿗作脹奔豚腹滿五臟見遲脈主冷痛之病心脈遲主小便頻數心疼嘔水怔忡多悸伏梁臍痛肝脈遲主筋攣骨痛目昏多淚觸事易驚轉筋麻木脾脈遲主咳嗽泄瀉腹中有蟲痰涎多壅飲食不化肺脈遲主寒嗽喘滿大便溏瀉皮膚燥澀夢涉大水腎脈遲主小便頻數滑精不禁膝脛痠疼陰濕盜汗五臟見數脈主瘡熱之病心脈數主煩躁狂言舌上生瘡小便赤澀眼目昏花肝脈數主眼痛翳膜目昏多淚頭風眩暈婦人血熱骨蒸及中風脾脈數主口臭胃翻齒痛牙宣多食不飽四肢不舉肺脈數主咳嗽唾血喉腥目赤大便閉結面赤痱痤腎脈數主消渴不止小便血淋下疰生瘡陰囊濕癢龔雲林論七表八里總歸四脈浮脈屬陰主表舉指輕按而得之曰浮浮而有力為洪浮而無力為芤浮而長大為實沉脈屬陰主裡舉指重按而得之曰沉沉而有力為滑沉而無力為弱沉而似有似無為微沉而至骨為伏遲脈屬陰在臟舉指半重按之在內再按乃見一息三至曰遲遲而有力為澀遲而無力為濡遲而似有似無為緩數脈屬陽在腑舉指輕按而極急一息六至曰數數而有力為弦數而無力為緊論五臟見四脈應病詩左寸心部浮數頭痛熱夢驚浮遲腹冷胃虛真沉數狂言並舌強沉遲氣短力難成主氣不相接續左關肝部浮數患風筋脈抽浮遲冷眼淚難收沉數背瘡常怒氣沉遲不睡損雙眸左尺腎部浮數勞熱小便赤浮遲陰腫濁來侵沉數腰疼生赤濁沉遲白濁耳虛鳴右寸肺部浮數中風喉熱閉浮遲冷氣瀉難禁沉數風痰並氣喘沉遲氣弱冷涎停右關脾部浮數齦宣並盜汗浮遲胃冷氣虛膨沉數熱多兼口臭沉遲腹滿脹堅生右尺命門浮數世精三焦熱浮遲冷氣濁時淋沉數渴來小便數沉遲虛冷小便頻論三因脈證歌內因脈喜怒憂思悲恐驚內應氣口喜怒傷心脈必虛思傷脾脈結中居因憂傷肺脈必澀怒氣傷肝脈更濡恐傷於腎脈沉是緣驚傷膽動相須脈緊因悲傷胞絡七情氣口內因之外因脈風寒暑濕燥火內應人迎緊則傷寒腎不移虛因傷暑向胞推澀緣傷燥須觀肺細緩傷濕要觀脾浮則傷風肝部應弱為傷火察心知六邪合脈須當審免使將寒作熱醫不內不外因脈勞神役慮定傷心虛澀之中仔細尋勞役陰陽傷腎部忽然緊脈必相侵房帷任意傷心絡微澀之中宜忖度疲極筋力更傷肝指下尋之脈弦弱飲食飢飽定傷脾未可輕將一例推飢則緩弦當別議若然滑實飽無疑叫呼損氣因傷氣燥弱脈中宜熟記能推不內外中因生死吉凶都在是論脈證名狀二十六種所主病證夫脈之大體二十六種此診候之紀綱也細而論之毫釐少差舉治必遠總而言之逆從虛實陰陽而已兩者議之以要其中謹於諸家脈法中撮其機要刪去繁蕪載其精義浮脈之診浮於指下按之不足舉之有餘再再尋之狀如太過瞥瞥然見於皮毛間其主表證或為風或為虛浮而大散者心也浮而短澀者肺也浮而數者熱也浮數之脈應發熱其不發熱而反惡寒者瘡疽之謂也洪脈之診似浮而大按舉之則泛泛然滿三部其狀如水之洪流波之湧起其主血實積熱瘡腫論曰脈洪大者瘡疽之病進也如瘡疽結膿未成者宜下之膿潰之後脈見洪大則難治若自利者不可救治也滑脈之診實大相兼往來流利如珠按之則纍纍然滑也其主或為熱或為虛此陽脈也瘡疽之病膿未潰者宜內消也膿潰之後宜托裡也所謂始為熱而繼為虛也數脈之診按之則呼吸之間動及六至其狀似滑而數也若浮而數則表熱也沉而數即裡熱也又曰諸數為熱仲景曰脈數不時見則生惡瘡也又曰肺脈洪數則生瘡也診諸瘡洪數者里欲有膿結也散脈之診似浮而數按之則散而欲去舉之則大而無力其主氣實而血虛有表有里瘡腫膿潰之後而煩痛尚未痊退者診其脈洪滑粗散難治也以其正氣虛而邪氣實也又曰肌體沉重肺脈大而斃謂浮散者也芤脈之診似浮而軟按之中央空兩邊實其主血虛或為失血瘡腫之病診得芤脈膿潰後易治以其脈病相應也長脈之診按之得洪大而長出於本位其主陽氣有餘也傷寒得之欲汗出自解也長而緩者胃脈也百病皆愈謂之長則氣治也牢脈之診按之則實大而弦且沉且浮而有牢堅之意若瘰癧結腫診得牢脈者不可內消也實脈之診按舉有力而類結曰實經曰邪氣甚則實久病則虛人得此最忌瘡疽之人得此宜急下之以其邪氣與臟腑俱實故也弦脈之診按之則緊而弦其似緊者為弦如按弦而不移緊如內繩而轉動以此為異春脈浮弦而平不時見則為飲為痛主寒主虛瘡疽論曰弦洪相搏外緊內熱欲發瘡疽也緊脈之診似弦而緊按之如切繩而轉動其主切痛積癖也瘡腫得之氣血沉澀也亦主痛也澀脈之診按之則散而復來舉之則細而不足脈澀則氣澀也亦主血虛瘡腫潰後得之無妨也短脈之診按舉則不及本位內經曰短則氣病以其無胃氣也諸病脈短皆難治也瘡腫脈短真氣短也細脈之診按之則縈縈如蜘蛛之絲而欲絶舉之如無而似有細而微其主亡陽瘡腫之病脈來細而沉時直者裡虛而欲變證也微脈之診按之則軟小而極微其主虛也真氣復者生邪氣勝者危瘡腫之病潰後脈微而勻舉自差也遲脈之診按舉來遲呼吸定息方得三至其狀似緩而稍遲痼疾得之則善新疾得之則正氣虛憊瘡腫得之潰後自痊緩脈之診按舉似遲而稍疾於遲仲景曰陽脈浮大而濡陰脈浮大而澀陰陽同等謂之緩脈見長緩百疾自瘳凡諸瘡腫潰後其脈澀遲緩者皆易愈以其脈候相應是有胃氣也沉脈之診舉之不足按之方見如爛綿其主邪氣在臟也水氣得之則逆此陰脈也瘡腫得之邪氣深也伏脈之診比沉而伏舉之則無按之至骨方得與沉相類而邪氣益深矣虛脈之診按之不足遲大而軟輕舉指下豁然而空經曰脈虛則血虛血虛生寒陽氣不足也瘡腫脈虛宜托裡和氣養血也軟脈之診按之如帛在水中極軟而細亦謂之濡其主胃氣弱瘡腫得之補虛排膿托裡弱脈之診似軟而極微來遲而似有仲景曰微弱之脈綿綿如瀉漆之絶其主血氣俱虛形精不足大抵瘡家沉遲濡弱皆宜托裡促脈之診按之則去數來時一止而復來仲景曰陽盛則促主熱蓄於裡也下之則和瘡腫脈促亦急下之結脈之診按之則往來遲緩時一止而復來仲景曰陰盛則結經曰促結則生代則死代脈之診按之則往來動則中止不能自還因而復動者曰代脈也因其止有常數而不忒如十動一止雖數十次皆見於十動之後如二十動一止雖數十次皆見於二十動之後代者氣衰也諸病見之不祥大凡瘡腫之病脈促結者難治而況是代脈乎動脈之診見於關上無頭尾如豆大厥厥然而動搖者是也脈經曰陰陽相搏故謂之動動於陽則陽氣虛而發厥動於陰則陰氣虛而發熱是陽生於尺而動於寸陰生於寸而動於尺不可不辨也脈訣曰氣血沉澀脈來緊身有痛處即發瘡疽之兆身應發熱脈浮數人反惡寒即為瘡疽之萌張仲景曰脈數不時見則生惡瘡又曰肺脈俱數則生瘡又曰脈實大洪大初起為病進已潰為邪氣未退又曰脈沉實沉伏初起主邪氣深伏難痊潰為餘毒又曰脈芤澀遲緩潰後為脈證相應無妨若短細則將變證此六脈宜於潰後不利於初起又曰脈浮大浮數初起為邪正相搏有餘若促結則非吉兆此六脈宜於初起不利於潰後朱丹溪曰脈數熱也多兼實陽證之所由生若兼虛後必陷為陰脈遲寒也多兼陰證之所由生若兼實後必返為陽王肯堂曰脈沉實發熱煩躁外無焮赤痛其邪深在裡宜先疏通以絶其源浮大數焮腫在外當先托裡恐邪入內脈不沉不浮內外證無知其在經當和營衛脈數身無熱內有癰膿脈數應當發熱而反惡寒若有痛處當發癰若數脈不時見當生惡瘡浮腫瘍為虛為風潰瘍為虛宜補洪腫瘍為虛為熱盛宜宣熱拔毒年壯形實宜下潰瘍為邪氣盛服藥久不退者難治滑腫瘍為熱潰瘍為熱為虛為邪氣未退數腫瘍為病退為熱數而洪者欲膿潰瘍為難愈數甚者難治散腫瘍為氣不收斂潰瘍為痛未退洪滑大散難治芤腫瘍為血虛潰瘍為脈病相應長腫瘍宜消退之法潰瘍為易愈謂長則氣治也牢腫瘍為邪盛為欲膿潰瘍為邪氣不退實腫瘍為邪氣太盛潰瘍為邪不退為實緩豁大者為虛弦腫瘍為痛為欲膿弦洪相搏外緊內熱為疽發也潰瘍為血虛為痛緊腫瘍浮而緊發熱惡寒或有痛處是為癰疽潰瘍主氣血沉澀為痛為有外寒澀腫瘍為氣實為氣滯潰瘍為血虛為脈病相應短腫瘍為元氣不足潰瘍為大虛宜補微腫瘍為虛服藥漸充者佳潰瘍為虛若微而勻者為脈病相應遲腫瘍為寒為虛尺遲為血少潰瘍為虛為氣血不能滋榮於瘡為有外寒緩腫瘍為可治大而緩為虛潰瘍緩而澀者愈以其病脈相應及胃氣充也沉腫瘍為邪氣深潰瘍為遺毒在內寸沉為胸有痰伏腫瘍為陰中伏陽邪潰瘍為陽伏陰中為內蝕為流注浸淫難治虛腫瘍便宜補而內托潰瘍膿既泄宜大補血氣弱腫瘍為元氣不足宜內補托裡結腫瘍為邪氣結潰瘍漸勻則愈不調則危促腫瘍為熱為病進潰瘍為熱不減漸進則死漸退則生代腫瘍為氣血敗壞元氣損傷潰瘍為元氣竭絶薛立齋曰謹按脈者人身之造化病機之外見醫家之準繩不可不精究而熟察至於太溪衝陽又為診法之要生死之機也故十二經脈皆繫於生氣氣乃人之根本寸口脈平而死者生氣獨絶於內也難經云上部有脈下部無脈其人當吐不吐者死上部無脈下部有脈難困無能為害是脈有根本人有元氣也夫人受氣於谷乃傳於臟腑清者為榮濁者為衛榮行脈中衛行脈外陰陽相貫如環無端周流一身晝夜各有常度其不相應者病也病至於甚脈道乃乖抑嘗治雀啄屋漏之類若因藥餌克伐所致急用參耆歸術薑附之劑多有復生者不可遂棄而不治也又曰癰疽未潰而脈先弱者何以收斂論三部脈所主證候夫寸關尺者脈之位也浮沉滑澀者脈之體也奠位分體指文語證者診脈之要道也脈經曰大凡診候兩手三部脈滑而遲不浮不沉不長不短去來齊等者無病也寸口脈浮者傷風也緊者傷寒也弦者傷食也浮而緩者中風也浮而數者頭痛也浮而緊者膈上寒脅下飲冷也沉而緊者心下寒而積痛也沉而弱者虛損也緩而遲者虛寒也微弱者血氣俱虛也弦者頭痛心下有水也雙弦者兩脅下痛也偏絶者不遂也草滋草滋如羹上肥者陽氣微也連連如蜘蛛絲者陽氣衰也關主中焦胸腹中事去來徐而緩者無病也浮者腹滿而不欲食胃虛脹也滑者客熱在內也數者熱結中焦也沉伏者中焦水氣或嘔逆而吞酸也弱者胃氣虛也雖有虛熱不可大攻須防熱去則生寒也牢而實者腹滿向向噎塞而不通或腹大痛澀者氣逆也芤則瀉血澀堅大實按之不減而有力者中焦實有結伏在胃也微浮者積熱不消蛔動心悸也尺主下焦腰腎膝脛足中事也尺脈浮者風熱小便難也沉者腰背痛而神氣不足數者臍下熱痛小便赤色而惡寒也遲者下焦寒而陰虛也緊者臍下小腹急痛也緩者腳弱下腫而痿痹也弱者下冷而腎氣衰也軟者腳不收而風痹小便難也伏者小腹痛而疝瘕穀不化也細者溏泄而下冷也芤者小便澀血而下虛也牢而小者足膝寒痹腳下隱隱疼痛也細而急者筋攣不能行也來而斷絶者男子小腹有滯氣也婦人月水不利也論三部所主臟腑病夫診候之道醫者之難精也若非燈下辛苦勤於記誦參師訪友晝夜不遑造次顛沛寤寐俯仰存心於此安能知聖神之妙哉古人曰按其脈知其疾命曰神以悟其探賾索隱之妙又曰切其脈治其病謂之巧以明其指別之功也蓋三指相去毫釐之近主病若千里之遠觀夫指別之功世人固以為難命曰神豈容易可至哉常考於經脈有三部寸關尺也從魚際至高骨卻行一寸曰寸從寸上一分曰魚際從寸至尺曰尺澤寸後尺前為關關前為陽即寸口也關後為陰即尺脈也陽出陰入以關為界寸主上焦頭手皮毛關主中焦腹及腰尺主下焦小腹及足此三部所主大略也又有左右兩手三部為之六脈也又有人迎氣口神門所主又各不同蓋左手關前曰人迎右手關前曰氣口兩關之後一分即曰神門故脈法贊曰肝心主左肺脾主右腎為命門俱出尺部魂魄穀神皆見寸口所謂左手關前心之部也其經手少陰與手太陽為表裡小腸合為腑左手關上肝之部也其經足厥陰與足少陽為表裡膽合為腑左手關後腎之部也其經足少陰與足太陽為表裡膀胱合為腑右手關前肺之部也其經手太陰與手陽明為表裡大腸合為腑右手關上脾之部也其經足太陰與足陽明為表裡胃合為腑右手關後命門之部也其經手厥陰與手少陽為表裡三焦合為腑此謂六部所主臟腑十二經之義也又脈要精微論曰尺內兩旁則季脅也尺外以候腎尺裡以候腹中附上左外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者小腹腰股膝脛足中事也粗大者陰不足陽有餘為熱中也來疾去徐上實下虛為厥顛疾來徐去疾上虛下實為惡風也故中風者陽氣受也有脈俱沉細數者少陰厥也沉細數散者寒熱也浮而散者為眗僕諸浮而數者皆在陽為熱其有躁者在手諸細而沉者皆在陰則為骨痛其有靜者在足數動一代者病在陽之脈也泄及便膿血諸過者切之澀者陽氣有餘也滑者陰氣有餘也陽氣有餘為身熱無汗陰氣有餘為多汗身寒陰陽有餘則無汗身寒推而外之內而不外者有心腹積也推而內之外而不內者身有熱也推而上之上而不下者腰足痛也推而下之下而不上者頭項痛也按之至骨脈氣少者腰脊痛而身有痹也以上諸疾若非指明心了焉可得而妙也又平人氣象論曰一呼脈再動一吸脈亦再動呼吸定息脈行五動為以大息不大不小不長不短不滑不澀不浮不沉不遲不數命曰平人平人者不病也蓋平人之常氣稟乎胃胃氣者平人之常氣也所以人常稟氣於胃故脈以胃氣為本也正理論曰谷入於胃脈道乃行合靈樞經曰胃為水穀之海也又曰脈應四時曰平四時之脈皆以胃氣為本謂春弦夏洪秋毛冬石春之胃脈微弦曰平余皆仿此逆四時則病矣若診婦人之脈妊身則慎勿亂投湯散其婦人之脈診得少陰脈動甚則有子也又曰陰搏陽則有子也又曰身汗而無脈者即有妊也蓋重身者問其月事觀其體貌然主治不可忽也又經曰察色按脈先別陰陽蓋陰陽者天地之道也是以治病者必求其本本於陰陽寒暑四時五臟之根也以脈言之則浮沉也以部言之則尺寸也故經云脈者陰陽之法以應五臟是謂呼出心與肺吸入腎與肝呼吸之間脾受穀味其味在中也以浮沉論之則曰浮者陽也沉者陰也應在臟腑則浮而大散者心浮而短澀者肺也所以心肺俱浮也牢而長者肝也按之而大舉指來實者腎也所以肝腎俱沉也遲緩而長者脾也脾為中州所以脈在中也仲景曰大浮數動滑皆陽也沉澀弱弦微皆陰也陽者熱也陰者寒也所以寒則脈來沉而遲熱則脈來浮而數故曰諸數為熱諸遲為寒無如此驗也脈經曰諸浮為風諸緊為痛諸伏為聚諸弦為飲芤者失血長則氣治短則氣病澀則煩心大則病進浮為在表沉為在裡遲為在臟數為在腑又形壯脈細少氣不足以息者危形瘦脈大胸中氣多者斃形氣相得者生三五不調者死三部九候皆相失者死此先聖診脈之大法也故曰凡治病則察其形氣色澤治之無候其時也所以形氣相得者生色澤以浮者病易已脈從四時者可治脈弱似滑者是有胃氣此皆易治也若形氣相失或色夭不澤及脈逆四時或脈益堅皆不可治經所謂必察四難而明告之又若病熱脈靜泄而脈大脫血脈實汗後脈躁此皆難治也若瘡疽之人膿血大泄脈滑數者難治也凡瘻膿多或如清泔脈滑大散寒熱發渴者治之無功也若患肺瘡也咳嗽膿血脈見洪滑治之難痊矣大凡診脈見浮數應當發熱而反惡寒雖頭項拘急四肢煩痛或復戰栗渴甚者但有痛處欲發瘡腫也五臟六腑脈病虛實例肝臟脈病虛實肝象木王於春其脈弦其神魂其候目其華在爪其充在筋其聲呼其臭臊其味酸其液泣其色青其藏血足厥陰其經也與膽合為腑而主表肝為臟而主裡肝氣盛為血有餘則病目赤兩脅下痛引小腹善怒氣逆則頭眩耳聾不聰額腫是肝氣之實也則宜瀉之肝氣不足則病目不明兩脅拘急筋攣不得太息爪甲枯而青善怒恐如人將捕之是肝氣之虛也則宜補之禁當風肝部在左手關上是也關部脈來綽綽如按琴瑟之弦如揭長竿春以胃氣為本春肝木旺其脈弦細而長是平脈也反得微澀而短者是肺之乘肝金之剋木謂之賊也大逆不治反得浮大而洪者是心乘肝子之乘母為實邪雖病當愈反得沉濡而滑者是腎乘肝母之克子為虛邪雖病當愈反得緩而大者是脾之乘肝是土之凌木為微邪雖病不死肝脈來盈實而滑如循長竿曰平病肝脈來急益徑如新張弓弦曰肝死真肝脈至中外急如循刀刃責責然如新張弓弦色青白不澤毛折乃死心臟脈病虛實心象火王於夏其脈如鉤而洪大其候舌其聲言其臭焦其味苦其液汗其養血其色赤其藏神手少陰其經也與小腸為腑而主表心氣盛主神有餘則病胸內痛脅支滿脅下痛膺背膊髀間痛兩臂內痛喜笑不休是心氣之實也則宜瀉之心氣不足則胸腹大脅下與腰背相引痛驚悸恍惚少顏色舌本強善憂悲是心氣之虛也則宜補之禁溫衣熱食心部在左手寸口是也寸口脈來纍纍如連珠如循琅玕曰平心以胃氣為本夏心火旺其脈浮洪大而散名曰平脈也反得沉濡而滑者腎之乘心水之剋火大逆不治反得弦而長是肝乘心母之克子雖病當愈反得緩而大是脾乘心子之乘母雖病當愈反得微澀而短是肺之乘心金之凌火為微邪雖病不死心脈來湍湍連屬冥中微曲曰心病死心脈前曲後倨如操帶鉤曰心死真心脈至牢而搏如循薏苡纍纍然其色赤黑不澤毛折乃死脾臟脈病虛實脾象土旺於長夏其脈緩其候口其聲歌其臭香其味甘其液涎其養形肉其色黃其藏意足太陰其經也與胃合為腑主表脾為臟主裡脾氣盛為形有餘則病腹脹溲不利身重若飢足痿不收行善瘈腳下痛是為脾氣之實也則宜瀉之脾氣不足則四肢不用後泄食不化嘔逆腹脹腸鳴是為脾氣之虛也則宜補之禁溫食飽食濕地濡衣脾部在右手關上是也六月脾土旺其脈大阿阿而緩名曰平脈也長夏以胃氣為本反得弦而急是肝之乘脾木之剋土為大逆不治反得微澀而短是肺之乘脾子之乘母不治而愈反得浮而洪者是心之乘脾母之歸子當瘥不死反得沉濡而滑者是腎之克脾水之凌土為微邪當瘥脾長而弱來疏去數再至曰平三至曰離經四至曰奪精五至曰命盡六至曰死病脾脈來實而盛如雞舉足曰脾病死脾脈來堅鋭如鳥之啄如鳥之距如屋之漏如水之溜曰脾絶真脾脈弱而乍數疏然其色不澤毛折乃死肺臟脈病虛實肺象金王於秋其脈如毛而浮其候鼻其聲哭其臭腥其味辛其液涕其養皮毛其藏氣其色白其神魄手太陰其經也與大腸合大腸為腑主表肺為臟主裡肺氣盛為氣有餘則病喘咳上氣肩背痛汗出尻陰股膝腨脛足皆痛是為肺氣之實也則宜瀉之肺氣不足則少氣不能報息耳聾嗌乾是為肺氣之虛也則宜補之禁寒飲食寒衣肺欲收急食酸以收之用辛瀉之肺部在右手關前寸口是也肺脈微短澀如毛名曰平脈秋以胃氣為本脈來上下如循雞羽曰病肺脈其色白身體但寒無熱時時欲咳其脈微遲為可治秋金肺王其脈浮澀而短是曰平脈也反得浮大而洪者是心之乘肺火之剋金為大逆不治反得沉濡而滑者是腎之乘肺子之乘母不治而愈反得緩大而長阿阿者是脾之乘肺母之歸子雖病當愈反得弦而長者是肝之乘肺木之凌金為微邪雖病當愈肺脈來泛泛而輕如微風吹鳥背上毛再至曰平三至曰離經四至曰奪精五至曰死六至曰命盡肺脈來如物之浮如風吹毛曰肺死秋胃微毛曰平胃氣少毛多曰肺病但如毛無胃氣曰死毛有弦曰春病弦甚曰金病真肺脈至大而虛如毛羽中人膚然其色青白不澤毛折乃死腎臟脈病虛實腎象水王於冬其脈如石而沉其候耳其聲呻其臭腐其味鹹其液唾其養骨其色黑其神志足少陰其經也與膀胱合膀胱為腑主表腎為臟主裡腎氣盛為腎有餘則病腹脹飧泄體腫喘咳汗出憎風面目黑小便黃是為腎氣實也則宜瀉之腎氣不足則厥腰背冷胸內痛耳鳴苦聾是為腎氣之虛也則宜補之毋犯塵垢毋衣炙衣腎欲堅急食苦以堅之咸以泄之苦以補之腎部在左手關後尺中是也腎脈來如引葛按之益堅曰腎病腎屬水其脈大緊身無痛形不瘦不能食善驚悸以心萎者死冬腎水王其脈沉濡而滑名曰平脈也反得浮大而緩者是脾之乘腎土之剋水為大逆不治反得浮澀而短者是肺之乘腎母之歸子為虛邪雖病可治反得弦細而長者是肝之乘腎子之乘母為實邪雖病自愈反得浮大而洪者是心之乘腎火之淩水雖病不死腎死脈來發而奪索辟辟如彈石曰腎死冬胃微石曰平胃少石多曰腎病但石無胃氣者死石而有鉤曰夏病鉤甚曰今病臟真下於腎藏骨髓之氣真腎脈至搏而絶如彈石辟辟然其色黃黑不澤毛死諸真臟見者皆不治膽經虛實病候膽象木王於春足少陽其經也肝之腑也謀慮出焉諸腑臟皆取決斷於膽其氣盛為有餘則病腹內冒冒不安身軀習習是為膽氣之實也則宜瀉之膽氣不足其氣上嗌而口苦善太息嘔宿汁心下淡淡如人將捕之嗌中介介數唾是為膽氣之虛也則宜補之小腸虛實病候小腸象火王於夏手太陽其經也心之腑也水液之下行為溲便也流於小腸其氣盛為有餘則病小腸熱焦竭乾澀小腹䐜脹是為小腸之氣實也則宜瀉之小腸不足則寒氣客之腸病驚跳不言乍來乍去是為小腸氣之虛也則宜補之胃經虛實病候胃象土王於長夏足陽明其經也脾之腑也為水穀之海諸臟腑皆受水穀之氣於胃胃氣盛為有餘則病腹䐜脹氣滿是為胃氣之實也則宜瀉之胃虛不足則飢而不受水穀飧泄嘔逆是為胃氣虛也則宜補之胃脈實則脹虛則泄關脈沉胃中有寒脈滑為實氣滿不欲食關脈浮積熱在胃內大腸虛實病候大腸象金王於秋手陽明其經也肺之腑也為傳道之官變化糟粕出焉氣盛為有餘則病腸內切痛如錐刀刺無休息腰背寒痹攣急是為大腸之氣實也則宜瀉之大腸氣不足則寒氣客之善泄是大腸之氣虛也則宜補之診其右手寸口脈手陽明經也脈浮則為陽陽實者大腸實也膀胱經虛實病候膀胱象水王於冬足太陽其經也腎之腑也五穀五味之津液悉歸於膀胱氣化分入血脈以成骨髓也而津液之餘者入胞則為小便其氣盛為有餘則病熱胞澀小便不通小便偏腫痛是為膀胱氣之實也則宜瀉之膀胱氣不足則寒氣客之胞滑小便數而多也面色黑是膀胱之氣虛也則宜補之三焦虛實病候三焦者上焦中焦下焦是也上焦之氣出於上口並咽以貫膈布胸內走腋循太陰之分而行上至舌下至足陽明當與榮衛俱行主納而不出也中焦之氣亦並於胃口出於上焦之後此受氣者泌糟粕承津液化為精微上注於肺脈乃化而為血主不上不下也下焦之氣別回腸注於膀胱而滲入焉主出而不納故水穀常並居於胃成糟粕而俱下於大腸也謂此三氣焦乾水穀分別清濁故名三焦三焦為水穀之道路氣之所終始也三焦氣盛為有餘則脹氣滿於皮膚內輕輕然而不牢或小便澀或大便難是為三焦之實也則宜瀉之三焦之氣不足則寒氣客之病遺尿或瀉利或胸滿或食不消是三焦之氣虛也則宜補之診其寸口脈遲上焦有寒尺脈遲下焦有寒尺脈浮者客陽在下焦論定死脈形候歌指下如湯沸湧時旦占夕死定無疑尾掉搖搖頭不動魚翔腎絶亦如期去疾來遲勢劈劈命絶脈來如彈石三陽谷氣久虛空胃氣分明屋漏滴散亂還同解索形髓竭骨枯見兩尺蝦遊狀如蛤蟆遊魂去行尸定生憂雀啄連連來數急脾無穀氣定難留欲知心絶並榮絶如刀壓刀細推求更有肺枯並胃乏如麻戚促至無休指下渾然如轉豆三光正氣已漂流洞虛子曰蝦遊雀啄代止之脈故名死證須知痰氣關格者時復有之若非諳練數歷未免依經斷病不無貽笑大方也蓋病勢消爍殆盡者其氣不能相續如蝦遊水動屋漏滴點而無至者死脈也其或痰凝氣滯關格不通則其脈固有不動者有三兩路亂動時有時無者或尺寸一有一無者有關脈絶骨不見者或時動而大小不常者有平居之人忽然而然者有素稟痰病而不時而然者有僵仆卒中而然者皆非死脈也學者當細心參探論診雜病生死脈歌五十不止身無病數內有止皆知定止猶代脈也脈來五十動而不見一止者無病也五十配天地造化之數易繫辭曰大衍之數五十五十乃備一乃數之始十乃數之極人之脈息晝夜循環五臟脈一動循環一臟五動循環五臟遍五十動是十次五數循環遍則數皆極處而不見止者五臟皆平故無病也四十一止一臟絶卻後四年多沒命三十一止即三年二十一止二年應十五一止一年殂已下有止看暴病四十動而見一止者是一臟欠動脈之極數故知一臟絶也先絶腎經所以言之夫天一生水腎屬水生成之一數也人之五臟所生先生乎腎腎水生肝木木生心火命門火生脾土土生肺金所以先絶腎期應四年而死三十動而見止者兩臟欠動脈之極數是知腎與肝二經無氣期應三年而死二十動而止者三臟欠動脈之極數是腎肝心三臟無氣期應二年而死十五動而一止者知腎肝心脾四臟皆無氣期一年而絶也新注云上言脈之動止未知診切何部而取據謹按素問難經云每於平旦寅時日未出飲食未進血氣未亂醫者可以存神定意心無外馳診於指下右手寸口默數脈息至止以決之夫寸口者右手氣口也內經曰氣口何以獨為五臟主岐伯曰胃者水穀之海六腑之大源也五味入口藏於胃變現於氣口又曰脈會大淵寸口是太淵穴也是知寸口為脈大會之處故能決斷五臟六腑生死吉凶矣論診暴病脈歌兩動一止或三四三動一止六七死四動一止即八朝以此推排但依次池氏曰暴病者喜怒驚恐其氣暴逆致風寒暑濕所侵病生之暴損動胃氣而絶即死不過十日也脈兩動而一止乃胃氣將絶猶得三四日方死三動一止而胃氣將盡猶得六七日方死穀氣絶盡方死仿此而推若至十五動而二止乃死期在於一年矣又歌曰寸平無病何謂死尺澤原來脈不存君知此理是何物猶如草木已無根人之有尺猶樹之有根枝葉雖枯稿根本將自生病人兩尺有根雖病不死若診得兩尺無根有病必死無病之人亦主暴亡論五臟六腑氣絶證候病人肝絶八日死何以知之面青但欲伏眠目視而不見人汗一作泣出如水不止一曰二日死病人膽絶七日死何以知之眉為之傾病人筋絶九日死何以知之手足爪甲青呼罵不休一曰八日死病人心絶一日死何以知之肩息回視立死一曰口亭亭二日死病人腸絶一曰小腸絶六日死何以知之髮直如干麻不得屈伸自汗不止病人脾絶十一日死何以知之口冷足腫腹熱臚脹泄利不覺出無時度一曰五日死病人胃絶五日死何以知之脊痛腰中重不可反覆一曰脬腸平九日死病人肉絶六日死何以知之干舌皆腫溺血大便赤泄一曰足腫九日死病人肺絶三日死何以知之口張但氣出而不收一曰鼻口虛張短氣病人大腸絶不治何以知之泄利無度利絶則死病人腎絶四日死何以知之齒為暴枯面為正黑自中黃色腰中欲折自汗出如流水一曰人中平七日死病人骨絶齒黃落十日死諸浮脈無根者皆死已上五臟六腑為根也扁鵲華陀察聽辨色祕訣病人五臟已奪神明失守聲嘶者死病人陰陽俱絶掣衣撮空妄言者死病人陰陽俱絶失音不能言者三日半死病人面黃目青者不死青如草滋者死病人面黃目白者不死白如枯骨者死病人面目俱等者不死病人面青目白者死病人兩目眥有黃色起者其病方愈病人面赤目黃者不死赤如衃者死病人面黃目黑者不死黑如煤者死病人面黑目青者不死病人面赤目青者六日死病人面黃目青者九日必死此謂亂經飲酒當風邪入胃經膽氣妄泄目則為青雖有天赦不可復生病人面赤目白者十日死憂恚思慮心氣內索面色反好急求棺槨病人面白目黑者死此謂榮華已去血脈空索病人面黑目白者八日死腎氣內傷病因留積病人面青目黃者五日死病人循衣縫譫語者不可治病人妄語錯亂及不能語者不治熱病者可治病人著床心痛氣短脾竭內傷百病難愈能起傍徨因坐於地其立倚床能治此者可謂神良病人面無精彩若土氣不受飲食者四日死又目無精光及牙齒黑色者不治病人口張者三日死病人耳目及顴頰赤者死在五日中病人黑色出於額上髮際下直鼻脊兩顴上者死在五日中病人及健人黑色若白色起入目及口鼻者死在三日中病人及健人面忽如馬肝色望之如青近之如黑者死病人面黑目直視惡風者死病人面黑唇青者死病人面青唇黑者死病人面黑兩脅下滿不能自轉反者死病人目不回直視肩息者一日死病人陰結陽絶目精脫恍惚者死病人陰陽竭絶目眶陷者死病人眉系傾者七日死病人口如魚口不能復閉而氣出多不反者死病人耳目口鼻有黑色起入於口者必死病人唇青人中反者三日死病人唇反人中滿者死病人唇口忽乾者不治病人唇腫齒焦者死病人齒忽變黑者十三日死病人舌卷卵縮者必死病人汗出不流舌卷黑者死病人髮直者十五日死病人發如干麻善怒者死病人發與眉衝起者死病人爪甲青者死病人爪甲白者不治病人手足爪甲內肉黑者八日死病人榮衛竭絶面浮腫者死病人卒腫其面蒼黑者死病人手掌腫無紋者死病人臍腫反出者死病人陰囊莖俱腫者死病人脈絶口張足腫者五日死病人足趺腫嘔吐頭重者死病人足趺上腫兩膝大如斗者十日死病人臥床遺尿不覺者死病人口臭者不可治心病目黑腎之日壬癸死肝病皮白肺之日庚辛死脾病唇青肝之日甲乙死肺病頰赤目腫心之日丙丁死腎病面腫唇黃脾之日戊己死青欲如蒼璧之澤不欲藍赤欲如帛裹朱不欲赭白欲如鵝羽不欲如鹽黑欲如重漆不欲如炭黃欲如羅裹雄黃不欲如黃土
