body:
  text: 卷十五舌部凡一切舌疽瘡痹皆匯於此部中以便檢閲參治察舌苔辨證法舌為心苗應南方火邪在表則未生苔邪入里津液搏結則生苔而滑苔白者丹田有熱胸中有寒邪在半表半裡也熱入漸深則燥而澀熱聚於胃矣宜承氣白虎若熱病口乾舌黑乃腎水刑于心火熱益深而病篤矣然有苔黑屬寒者必舌無芒刺口有津液也即小便之赤白口中之潤燥舌苔之滑澀亦皆因乎津液之榮枯未足憑以遽斷寒熱也故尤宜以脈之有力無力細辨之總之醫家治病須隨機應變活潑潑地不可膠執一方不可泥滯一藥不必以藥治病惟以藥治脈可也古今氣運不同舊方新病何能符合只可讀其書廣其義考其方得其理潛心默究自得其神即羅氏譬之拆舊料而改新房務必工穩耳白苔是熱聚丹田寒留胸膈濕氣薰蒸所致治宜燥濕和中滑白色者邪未入腑半表半裡也宜和解之熱入漸深則燥而澀矣黃苔者胃腑有邪熱也宜下之舌上有黑苔生芒刺者其因有二非水來剋火為寒極即火極似水為熱極以脈遲數無力有力辨之一宜大承氣一宜理中湯然十有九死之證也舌上黑苔生芒刺刮不去易生者死舌卷囊縮爪甲青黑不知人事面青作搐者肝絶也舌出不入門主論岐天師曰人舌吐出不肯收進乃陽火盛強之故祕録竇漢卿曰傷寒舌出寸余連日不收用梅花冰片五錢摻舌上即收全書張仲景曰傷寒舌出者死舌出不入門主方舌出口數寸冰片為末敷人舌吐出不能收進乃陽火盛強之故冰片點過服黃連人參白芍藥各三錢柴胡石菖蒲各一錢水煎服二劑愈又方萆麻子為末裝紙條內燒煙燻之鼻孔有涎流出即愈舌縮不出門主論岐天師曰人舌縮入喉嚨不能語言者乃寒氣結於胸腹之故祕録澄曰舌乃心苗氣虛與心脾積熱俱能令人舌短不僅寒凝胸腹當詳辨之舌縮不出門主方神方治舌忽縮入喉嚨不能言語乃寒氣結於胸腹人參三錢白朮五錢肉桂乾薑熟附子各一錢水煎服其舌自舒矣氣虛舌短人參煎湯服心脾積熱舌短黃連石膏或只用一味或兼用煎湯服弄舌舒舌門主論經曰舌乃心苗又曰心開竅於舌心火亢盛腎陰不能上制所以舌往外舒肝火助焰風主動搖胃熱相煽舌難存放舌如蛇舔左右上下伸縮動搖謂之弄舌當清心胃之火則肝風自息矣馮魯瞻曰弄舌者是脾臟小熱舌絡微緊時時舒舌治之勿過用涼藥即有飲水者亦脾虛津液不足耳若於大病之來而弄舌者凶又曰凡出長而收緩者名曰舒微露即收舌乾腫澀者名曰弄舌駱潛庵曰舌忽舒長舌忽捲縮舌忽腫滿皆屬風熱盛而妨乳食也宜延壽丹弄舌舒舌門主方清胃散防風天花粉黃芩熟石膏厚朴薑製枳殼黃連陳皮甘草水煎服又方以西牛黃一釐塗舌上即止舌喑門主論馮魯瞻曰舌喑者中風而舌不轉運舌強不能言是也經曰喉嚨者氣之所以上下會厭者聲音之戶舌者聲音之機唇者聲音之扇橫骨者神氣所使主發舌者也然心之本脈繫於舌根脾之絡脈繫於舌傍肝脈循陰器絡於舌本少陰之脈之喉嚨系舌本足四經之脈皆上於舌邪中其經則痰涎閉其脈道舌不能轉運而為之喑矣有喉喑者勞嗽失音即喉嚨啞是也故喉喑者喉中之聲嘶而舌本能言舌喑者舌本不能言而喉中之聲如故中風而舌喑者舌與喉俱病而音聲不能發於會厭也然有外感內傷之因外感者風寒火熱之邪也經曰諸熱暴喑皆屬於火內傷者心肺腎三經致病亦多由痰火壅塞上竅氣血兩虛不能上榮則舌機不轉也有腎虛而氣不歸源內奪而胞絡內絶不能上接清陽之氣者有元氣不足肺無所資者有血衰而心失所養者蓋心為聲音之主肺為聲音之戶腎為聲音之根經曰三焦之氣通於喉嚨氣弱則不能上通矣治者能於根本用力則丹田清陽之氣自能宣揚振作故古人每以獨參湯地黃飲子取效也然中風不語之證有六有失音不語者有舌強不語者有神昏不語者有口噤不語者有舌縱語澀不語者有舌麻語謇不語者可不詳歟重舌門主論陳實功曰重舌乃心火妄動發之舌下又有一舌也當以線針點刺患上令出惡血內服黃連瀉心湯外用冰硼散搽之正宗馮魯瞻曰重舌者心脾有熱也蓋心候舌而主血然脾脈絡於舌下火土又子母也有熱即與血氣俱盛其狀附舌下而近舌根生形如舌而微短小色異亦宜針刺錦囊竇漢卿曰重舌乃舌下生一小舌其舌鮮紅其外證頦下浮腫有硬核此心經受熱毒氣出於舌下先用紫雪摻之流出熱涎急服甘桔湯加薑燈心煎服全書又曰蓮花重舌乃蘊熱乘風而發心火炎上之義又曰蓮花舌乃舌下生三小舌其狀如蓮花之形但舌乃心之苗心火上炎或思慮太過或火氣所傷或酒後當風取涼以致風痰相搏而成此候急用清涼解毒湯加減服之再吹如腫不散須用小刀針出紫血為妙又曰舌下生小舌名曰重舌蓋舌乃心苗心火上炎故生之用小刀點紫黑處吹冰片散服甘桔湯加山梔連翹之屬又曰咽喉有腫復生重舌此兩經受病俱有邪也心邪發於舌下胃邪出於喉嚨蓋因喉間之邪觸起於心經之邪則其病俱發外證頭疼項強身發潮熱者是也探痰法同前再用紫雪冰片散治之汪省之曰重舌大小男女俱生乃心火妄動當以線針點刺患上理例駱潛庵曰脾之脈絡系舌傍肝之脈絡系舌本心之脈絡系舌根三經受胎毒而上攻舌下又像有一舌也名曰重舌宜延壽丹推拿祕書澄曰重舌蓮花重舌有男婦心緒遏郁憂思過度之人每生此證因循日久以致潰爛腐穢舌頭一爛外殼雖存其中如爛魚腸相似斷不可用升煉藥吹搽一用即血出如泉穿腮腐齦百不一生澄見數證俱因庸工妄治而亡不可不慎重舌門主方重舌涎出水漿不入聖惠方玄精石二兩牛黃硃砂冰片各一分研末以針舌上去血鹽湯漱摻末咽津效驗如神重舌木舌紫舌黃連連翹山梔黃芩木通荊芥薄荷各一錢牛蒡子一錢甘草五分燈心十根煎服當歸連翹湯治心脾有熱重舌木舌當歸尾連翹各三錢川白芷二錢大黃甘草各一錢水煎服消毒犀角飲治內蘊熱邪咽膈不利重舌木舌一切熱毒鼠黏子微炒四錢荊芥黃芩甘草各一錢防風犀角各五錢水煎服木舌門主論陳實功曰木舌紫舌亦由心火而發用飛鹽加冰片少許勤搽出涎自愈正宗馮魯瞻曰木舌者因臟腑壅熱心脾積熱其氣上衝是以舌腫尖大塞滿口中若不急治則致害人更不可用手去按按則舌根乃損長成語言不正如至啼叫無聲面色頻變而驚疼者不治然舌固屬心脾但肝脈亦絡舌本故傷寒邪傳厥陰則舌卷囊縮概可見矣錦囊張憲伯曰舌忽脹大硬腫塞滿即時氣絶名曰翣舌閒抄竇漢卿曰木舌症硬如穿山甲見人舌做一拳外證憎寒壯熱語言謇澀此心經受熱心者舌之本因心而病治法以小刀點紫黑處煎藥內多加山梔山梔乃瀉火之要品也全書又曰木舌乳娥此證為因心經熱毒或因酒後溫床厚被以致熱氣攻於心經故生單娥及舌脹而紫吐出風痰急用三稜針刺舌下金津玉液二穴及刺乳娥俱破出血痰即用膽硝丹吹入喉中仍服荊防敗毒散又曰一婦人木舌脹滿口諸藥罔效以䤵針砭之五七次腫減三日方平血出盈斗服藥同前又曰舌上有白苔結硬必作木舌用前法治之又曰凡舌證白苔堅硬藥味不得入者揩拭潔淨用竹刀刮舌然後用藥又曰舌卷大不得吞咽皆由熱毒衝上急用紫雪加冰麝摻舌上再用冰片散吹之汪省之曰舌脹色紫如肝名曰紫舌凡舌轉掉不仁名曰木舌此乃因心火而發理例奎光曰木舌者舌腫大如煮熟豬肝不能轉動又有一腫生舌根下狀如白棗有青紫筋不能速愈初起不疼不發寒熱漸漸腫大速治可愈遲則難痊皆由憂鬱所致又曰治口舌證吹藥後如舌上無涎或如干橘核者不治又曰凡遇口舌糜爛無血出者不治又曰凡舌腫大用生石膏加冰片敷如出血者石膏炒用又曰舌腫脹滿口吐舌在外難以納藥者用殭蠶牙皂制過為極細末用少許吹鼻中口自開痰涎自出用箸繞絲綿蘸甘草湯潤其舌用四味口疳藥多加冰片頻吹又曰木舌初則金丹碧丹同用方載咽喉門後則單用金丹內服煎藥張仲景曰傷寒舌腫者難治駱潛庵曰舌腫如木名曰木舌乃風熱盛也宜延壽丹木舌門主方治木舌口舌俱硬有衣不能開祕方薄荷細茶各等分共煎露一宿青絹裹箸上蘸藥徐徐抹上自消重舌木舌黃連蜜炙二錢白殭蠶一錢共乳細摻舌上涎出即好又方生薑切片蘸硼砂末擦之重舌木舌紫舌及咽喉口齒新久腫痛並久嗽痰火咽喉作痛玄明粉硼砂各五錢硃砂六分冰片三片共乳細每日吹五六次舌脹門主論奎光曰紫舌脹屬心火內必煩躁悶亂宜吹碧丹方載咽喉門內服加減犀角地黃湯醫統曰七情所郁及心經熱壅則舌腫滿不得息心熱則舌裂而瘡肝熱則舌木而硬脾熱則舌澀而苔肺熱則舌強熱甚則舌燥如鋸舌卷囊縮者不治厥陰絶也心法曰舌忽腫出口外是受蜈蚣毒宜用雄雞血一小杯浸之即縮入舌脹門主方翣舌破棺而治無不立效並治重舌木舌皂礬不拘多少新瓦上火煅變紅色放地上候冷研細將病人用鐵鉗撬開牙關用此擦舌立愈又方真蒲黃篩細末頻刷舌上其腫自退若能咽藥以黃連酒煎細細咽之瀉去心火尤妙又方舌腫脹不能開萆麻仁研爛綿紙取油捻作紙捻燈上點著吹滅將煙燻之良久自消舌腫黃柏以竹瀝浸一宿研末敷舌上舌腫脹出口外冬青葉煎濃汁浸之舌腫塞喉朴硝白礬等分研細搽之立消舌腫脹百草霜海鹽各等分研末井花水調下舌痹門主論舌痹者強而麻也乃心緒煩擾憂思暴怒氣凝痰火而成舌痹門主方驗方荊芥穗雄黃各等分研末木通煎湯調下一錢痰壅舌麻生礬研末摻之又方皂角末摻之舌黃門主論奎光曰舌黃乃舌上生黃腫痛亦屬心火舌菌門主論奎光曰舌菌屬心火多因氣鬱而生舌上或如木耳或如菌狀其色紅紫舌癰門主論奎光曰舌癰初起舌紅而腫大心經火盛地角亦紅腫初起用金丹碧丹吹舌根方載咽喉門煎藥內加黃連山梔犀角舌瘡門主論經曰心開竅於舌陳實功曰心火盛則口舌生瘡正宗岐天師曰舌乃心苗心火鬱熱故舌先見證祕録馮魯瞻曰經曰舌乃心之苗又曰中央黃色入通於脾開竅於口藏精於脾故病在舌又曰心脈系舌本脾脈絡舌旁系舌下故發為病或生瘡或重舌木舌諸證皆二經之所致也然肝脈亦絡舌本故風寒則捲縮而不言七情所鬱則腫滿而不消心熱則裂而瘡脾熱則滑而苔脾寒則白苔如雪肝壅熱則血上壅若人無故舌痹者不可作風熱治蓋由心血不足血虛火爍耳理中湯合四物湯治之錦囊又曰昔有人舌上生瘡久蝕成穴服涼藥不效此下元虛寒虛火不降投養正丹遂愈岐天師曰倘人口中忽生瘡於舌上吐出在外寸余上結成黃靨難以食物人以為病在心也心熱故生此瘡此亦近理之談而不知非也亦有祟以憑之也方用冰片一分納入蚌口內立化為水乃以鵝翎敷掃其上立刻收入其舌便可飲食矣蚌乃至陰之物以至陰之物攻至陰之邪則邪自退走況又加以冰片之辛溫逐邪不遺餘力自然手到成功也竇漢卿曰熱毒攻於舌則舌生瘡客風吹乾津液則舌硬也王叔和云三部俱數心家熱舌上生瘡唇破裂治法宜涼心清熱全書又曰咽喉有腫兼舌上生瘡此心經受熱也邪熱存心日久則為喉閉餘毒在心則舌生瘡也須用冰片散元參升麻湯加減治之竇夢麟曰口舌生瘡如黃粟外證怯寒而口張先用蚌水或田螺水或茶漱淨然後搽藥李時珍曰舌下有四竅兩竅通心氣兩竅通腎液心氣流於舌下為神水腎液流於舌下為靈液道家謂之金漿玉醴溢為醴泉聚為華池散為津液降為甘露所以灌溉臟腑潤澤肢體是以修養家咽津納氣謂之清水灌靈根人能終日不唾則精氣常留顏色不槁若久唾則損精氣成肺病皮膚枯涸故曰遠唾不如近唾近唾不如不唾人若有病則心腎不交腎水不上故津液干而真氣耗也難經曰腎主玉液入肝為淚入肺為涕入脾為涎入心為汗自入為唾也舌瘡門主方舌瘡吳茱萸研末酒調塗兩足心口舌生瘡祕録黃柏白殭蠶各一錢枳殼燒灰山豆根蘇薄荷甘草各五分冰片三釐共為末一日摻三次第一日稍快次日全愈又方黃連二錢菖蒲一錢水煎服小兒舌瘡不能飲乳幼科良方白礬和雞蛋置醋中塗兒足底二七日愈舌證主方奎光黃連黑山梔木通犀角連翹生地牡丹皮甘草麥門冬赤芍水煎服如兼口唇必加熟石膏少瀉脾火如有肺火兼有痰加川貝母便祕加玄明粉大黃枳殼小兒口舌生瘡桑樹皮中白汁塗之即效舌瘡鵝口重舌青黛朴硝各一錢龍腦一字為末鵝翎搽上少許舌疳門主論心法曰舌疳者由心脾毒火所致其證最惡初如豆次加菌頭大蒂小又名舌菌疼痛紅爛無皮朝輕暮重急用北庭丹點之自然消縮而愈若失於調治以致焮腫突如泛蓮或有狀如雞冠舌本短縮不能伸舒妨礙飲食言語時流臭涎再因怒氣上衝忽然崩裂出血不止久久延及項頷腫如結核堅硬臖痛皮色如常頂軟一點色黯木紅破後時流臭水腐如爛綿其證雖破堅硬腫痛仍前不退此為綿潰甚至透舌穿腮湯水漏出是以又名瘰癧風也蓋舌本屬心舌邊屬脾因心緒煩擾則生火思慮傷脾則氣鬱郁甚而成斯疾其證外勢頗類喉風但喉風則咽喉常腫湯水不能下咽此證咽喉不腫可以下咽湯水胃中亦思飲食因舌不能轉運迭送飲食故每食不能充足致令胃中空虛而怯證悉添日漸衰敗頷下腫核初起宜用導赤湯加黃連外用錦地羅蘸醋磨敷虛者歸脾湯便溏者歸芍異功湯自古治法雖多然此一證百無一生縱施藥餌不過苟延歲月而已舌疳門主方祕傳北庭丹清溪番硇人中白各五分瓦上青苔溏雞糞瓦松各一錢上用傾銀罐子兩個將藥裝在罐內將口封固外用鹽泥固濟以炭火煅紅俟三柱香為度候冷開罐將藥取出入冰片麝香各一分共研細末用磁針刺破舌菌用丹少許點上再以蒲黃蓋之連珠疳門主論奎光曰連珠疳口風自舌下起一小泡初起一個漸至五六個連珠而起舌衄門主論馮魯瞻曰舌上出血名曰舌衄乃心脾熱證也錦囊又曰舌衄者舌上無故出血如線不止或如簪孔者是也宜香薷汁一升日三服外以槐花炒研細末乾摻之岐天師曰人舌出血如泉者乃心火旺極血不藏經也祕録陳實功曰舌上無故出血如線是心胃火邪熾甚逼血妄行此名舌衄正宗舌衄門主方舌上無故出血槐花炒黃色研細擦之舌上出血如泉者乃心火旺極血不藏經也六味黃湯加槐花三錢煎服立愈舌上忽出血如簪孔赤小豆一升杵碎水三碗和搗取汁每服一盞不拘時服外用槐花末摻上又方大小薊搗汁和酒飲白膜裹舌門主論初生小兒舌上白膜裹住若不刮去則發驚不可不知保生碎事白膜裹舌門主方驗方保生碎事先將舌上白膜刮出血以白礬少許搽之舌疔門主論心法曰舌疔者乃心脾火毒舌生紫泡其形如豆堅硬寒熱疼痛應心而起宜用蟾酥丸含放舌下隨化隨咽或再服三丸以解內毒甚者刺之服黃連解毒湯兼搽紫雪徐徐咽之舌上痰核門主論陳實功曰舌上痰核乃痰氣結於舌上成核作痛硬強者用線針點破出血冰硼散搽之正宗舌上重齶門主論竇漢卿曰舌上生一瘡其形如楊梅故謂之重齶外證無寒熱但作事煩心先以甘桔湯多加山梔後服黃連解毒湯再吹藥不宜用刀全書心法曰心脾熱極上齶生瘡形如梅子外無寒熱內時作煩名曰重齶宜黃連解毒湯加桔梗常以紫雪噙化馮魯瞻曰其證生於頰裡及上齶者即名重齶舌上重齶門主方天南星散治重齶重齦天南星生去皮臍研極細末用醋調塗男左女右腳心厚皮紙貼如干再用醋潤舌下痰包門主論陳實功曰舌下痰包者乃痰飲乘火流行凝注舌下結成瓠腫綿軟不硬有妨言語作痛不安治當用利剪當包剪出黃痰若雞蛋清稠黏難斷捺盡以冰硼散搽之內服二陳湯加芩連薄荷正宗馮魯瞻曰小兒産下舌下有膜如石榴子樣連於舌根令兒言語不發不轉可以指甲摘破令血出即活用燒礬研細敷半緑豆許若血出無害不止燒發灰摻之或用豬脂塗之錦囊伍氏曰若不摘去其孩必啞舌斷門主論岐天師曰人有被人咬落舌尖或連根咬斷者或一日或二日或半月俱可接之速用狗舌一條觀其人舌之大小切正如人舌光景將病人舌根伸出病人坐在椅上仰面頭放在椅背上以自己手拿住喉嚨則舌自伸出急將狗舌蘸接舌金丹藥末一接住永不落矣祕録或問曰說咬落舌頭者以醋漱之可以重長師曰亂道肉逢酸則縮豈有反伸出之理要重生必用生舌金丹舌斷門主方接舌金丹岐天師生地人參透明者龍齒透明者各三錢象皮一錢冰片三分土狗去頭翅三個地蝨二十個先將人參各項俱研細後用土狗地蝨搗爛入前藥末內搗勻佩身上三日干為末盛在瓶內遇有此等病醫治可也此藥接骨最奇服下神效骨斷者服一錢即愈生舌仙丹岐天師人參麥門冬各一錢龍齒三分土狗一個火焙冰片二分地蝨十個火焙血竭三分各研細末放在地上一刻出火氣聽用先用人參一兩煎湯含漱半日以參湯漱完即以自己用舌蘸藥末令遍不可將舌縮入務須伸在外面至不可忍然後縮入如此三次則舌自伸長矣補舌唇法鮮螃蟹燒灰每二錢加去油乳香沒藥各二分五釐塗之即生肉生舌法活螃蟹一個炙乾為末收貯如遇舌斷敷上口合即止
