body:
  text: 卷五論五運六氣太極肇分而有天地陰陽陰陽不測謂之神天有陰陽地亦有陰陽天以陽生陰長地以陽殺陰藏人在氣交之中所以具五臟六腑以應五運六氣之數也五運者金木水火土也六氣者風寒暑濕燥火也天干取運地支取氣天干有十配合則為五運地支十二對衝則為六氣天氣始於甲地氣始於子天地相合則為甲子天氣終於癸地氣終於亥天地相合則為癸亥陰陽相間剛柔相須是以甲子之後乙丑繼之壬戌之後癸亥繼之三十年為一紀六十年為一周有主運焉有客運焉有主氣焉有客氣焉主運主氣萬古而不易客運客氣每歲而迭遷自天地兄弟次序而言之甲乙東方木也丙丁南方火也戊己中央土也庚辛西方金也壬癸北方水也詩曰大寒木運始行初清明前三火運居芒種後三土運是立秋後六金運推立冬後九水運伏周而復始萬年如此主運也自其夫婦配合而言之甲與己合而化土乙與庚合而化金丙與辛合而化水丁與壬合而化火此客運也甲己之歲正月建丙寅丙火生土故土運統之乙庚之歲正月建戊寅戊土生金故金運統之丙辛之歲正月建庚寅庚金生水故水運統之丁壬之歲正月建壬寅壬水生木故木運統之戊癸之歲正月建甲寅甲木生火故火運統之甲己之年甲為土運初之運即土也土生金二之運即金也五行仿此相生每一運各主七十二日零五刻此天干在上為陽所以主乎運也又以地支循環次序而言之寅卯屬春木也巳午屬夏火也辰戌丑未屬四季土也申酉屬秋金也亥子屬冬水也木化風主於春故風為初之氣火化熱主於夏初春末故火為二之氣相火化暑主於炎夏故暑為三之氣炎暑大行金化清燥土居中焉主乎四季之末故濕為四之氣金為丙婦帶火之氣所以燥也主乎秋故燥為五之氣水化寒嚴冽乃行主於冬故寒為六之氣此主氣也自其對衝定位而言之子午少陰君火天陽明燥金應在泉丑未太陰濕土上太陽寒水雨連綿寅午申少陽相火旺厥陰風木地相聯卯酉卻與子午反辰戌巳亥亦皆然子午二年乃少陰君火司天陽明燥金在泉司天主上半年六個月在泉主下半年六個月余仿此子午二年初氣太陽二氣厥陰三氣少陰四氣太陰五氣少陽六氣陽明此客氣定局也主氣每歲俱從厥陰風木起丑未二年乃太陰濕土司天太陽寒水在泉初氣厥陰二氣少陰三氣太陰四氣少陽五氣陽明六氣太陽寅申二年乃少陽相火司天厥陰風木在泉初氣少陰二氣太陰三氣少陽四氣陽明五氣太陽六氣厥陰卯酉二年乃陽明燥金司天少陰君火在泉初氣太陰二氣少陽三氣陽明四氣太陽五氣厥陰六氣少陰辰戌二年乃太陽寒水司天太陰濕土在泉初氣少陽二氣陽明三氣太陽四氣厥陰五氣少陰六氣太陰巳亥二年乃厥陰風木司天少陽相火在泉初氣陽明二氣太陽三氣厥陰四氣少陰五氣太陰六氣少陽前圖乃客氣也每一氣主旺六十日八十七刻半有奇此地支在下為陰所以主乎氣也然客運之流行也有太過焉有不及焉太過之年甲丙戊庚壬五陽干也不及之年乙丁己辛癸五陰乾也太過其至先大寒前十三日交名曰先天不及其至後大寒後十三日交名曰後天平氣之年正大寒日交名曰齊天客氣之升降也有正化焉可對化焉正化之歲謂午未寅酉辰亥之年也對化之歲謂子醜申卯戌巳之年也正化者令之實從本其數生對化者令之虛從標其數庶一期之中主運以位而相次於下客運以氣而周流於上此客氣加於主運之上主氣臨於客氣之下天時所以不齊民病之所由生也辰戌年初之客氣少陽相火加主氣厥陰風木二之客氣陽明燥金加主氣少陰君火三之客氣太陽寒水加主氣少陽相火四之客氣厥陰風木加主氣太陰濕土五之客氣少陰君火加主氣陽明燥金六之客氣太陰濕土加主氣太陽寒水已上皆客氣加於主運之上舉此二年為例也抑論主氣春溫夏暑秋涼冬寒風以動之火以溫之暑以蒸之濕以潤之燥以干之寒以堅之皆天地正氣之運行惟客加於主乃有逆從淫勝然後春有悽風夏有伏陰秋有苦雨冬有愆陽所以氣候不齊而厲疾時降已上皆主氣臨於客氣之下也六甲之年土運太過則雨濕流行濕病乃生腎水受邪治當除濕以補腎六己之年土運不及則木氣乘旺反見風化風病乃行治當益脾以平木六丙之年水運太過則寒氣大行寒病乃生心火受邪治當逐寒以補心六辛之年水運不及則土氣乘旺反見濕化濕病乃行治當補腎以除濕六戊之年火運太過則熱氣大行熱病乃生肺金受邪治當降火以補肺六癸之年火運不及則水氣乘旺反見寒化寒病乃行治當補心以逐寒六庚之年金運太過則燥氣流行燥病乃生肝木受邪治當清燥以補肝六乙之年金運不及則火氣乘旺反見熱化熱病乃行治當平木以補脾六壬之年木運太過則風氣大行風病乃生脾土受邪治當平木以補脾六丁之年水運不及則金氣乘旺反見燥化燥病乃行治當補肝以清燥此客運之治法也太陽寒水治以辛熱陽明燥金治以溫苦少陽相火治以鹹寒太陰濕土治以苦熱少陰君火治以苦寒厥陰風木治以辛涼此六氣之治法也然運氣之所以有變者以相得則和不相得則病又有相得而病者以下臨上位不當也五行相生為相得相剋為不相得上臨下為順下臨上為逆運氣相同名曰天符司天者司之為言直也直行天令上之位也歲運者運之為言動也主天地之間人物化生之氣中之位也在泉者生地之化行乎地中下之位也當年之中司天之氣與中氣運相同者中氣運指歲運而言曰天符戊子戊午戊寅戊申四年皆火丙辰丙戌皆水己丑己未皆土乙卯乙酉皆金丁巳丁亥皆木六十年中有此十二年天符也天氣生運曰順化如甲子年正月建丙寅丙火生土子當一陽初復亦帶火意俱能生土五行相生仿此六十年中有此十二年順化也天氣克運曰天刑如庚子年正月建戊寅戊土生金不為君火火下剋金五行相剋仿此六十年中有此十二年天刑也運生天氣曰小逆如壬子年正月建壬寅壬水生木子為君火是木上生火在於理論如子臨父位未當也六十年中有此十二年小逆也運克天氣曰不和如丙子年正月建庚寅庚金生水子又水位丙火少故水上乘旺而來剋火六十年中有此十二年不和也運臨本氣之位曰歲會當年十干建運與年辰十二律律者支也五行相會曰歲會丙子戊午丁卯乙酉水火木金之運臨之土無定位寄旺於四季之末各旺十八日有奇甲辰甲戌己丑己未是也土運臨之已上八年乃云歲會外又有四年壬寅皆木庚申皆金是二陽年癸巳皆火辛亥皆水是二陰年亦是運與年辰相會而不為歲會者謂不當四年正中月之故也除二陽年則二陰年雖不名歲會亦在上下五行相佐皆為平氣之歲天符歲會相合名曰太乙天符如戊午年正月建申寅甲木生火午居離位而少陰司天豈非天符與歲會相合乎六十年中歲會居八年太乙有四年太過之運加地氣曰同天符庚子庚午年運同司地燥金壬寅壬申年運同司地風木甲辰甲戌年運同司地濕土六十年中有此六年同天符陽也不及之運加地氣曰同歲會辛丑辛未年運同司地寒水癸卯癸酉年運同司地君火癸巳癸亥年運同司地相火六十年中有此六年同歲會陰也經曰先立其年以明其氣每年先立氣運審其太過不及然後以地之主氣為本天之客氣加臨於上為標以求六化之變如氣之勝也微者隨之甚者制之氣之復也和者平之暴者奪之皆隨勝氣安其屈伏以平為期明堂詩曰甲膽乙肝丙小腸丁心戊胃己脾鄉庚屬大腸辛屬肺壬屬膀胱癸腎臟三焦亦向壬宮寄胞絡同歸入癸方此言人秉天干之氣而生也又曰肺寅大卯胃辰宮脾巳心午小未中申膀酉腎心胞戌亥三子膽醜肝通此言地支通注氣血以時也觀此三詩則天地之氣無時不流通於人身矣故一氣不通不能生化天有六氣人以三陰三陽而上奉之地有五行人以五臟六腑而下應之臟為陰而其數奇以應五運蓋五行質具於地而氣則行於天也腑為陽而其數偶以應六氣蓋六淫雖降於天而勢必充於地也子午為天地之中正君火位焉手少陰心經午宮足少陰腎經子宮居之辰戌為七政之魁罡寒水位焉手太陽小腸經戌宮足太陽膀胱經辰宮居之然火從水化水隨腎至故少陰為臟位與太陽隔而氣相合為腑也丑未為歸臟之標本濕土位焉手太陰肺經醜宮足太陰脾經未宮居之卯酉為日月之道路燥金位焉手陽明大腸經卯宮足陽明胃經酉宮居之然子隨母居土旺金盛故太陰為臟位與陽明隔而氣相合為腑也巳亥為天地之門戶風木位焉卯雖木之正分為陽明燥金所居然木生在亥而對化於巳也手厥陰心胞絡經巳宮足厥陰肝經亥宮居之寅申握生化之始終相火位焉足少陽膽經寅宮手少陽三焦經申宮居之然相火寄於肝腎膽者肝之腑心胞絡者腎之配故厥陰為臟位與少陽隔而氣相合為腑也南政三陰司天則皆寸不應三陰在泉則皆尺不應北政三陰司天則皆尺不應三陰在泉則皆寸不應不應者則皆沉脈也凡脈之司天在泉不應者皆以少陰而論之故北政之歲人氣面北而寸北尺南地左間之氣在右寸地右間之氣在左寸天左間之氣在右尺天右間之氣在左尺要訣云每年退二支便是客鄉如子年司天後二支是戌太陽寒水為初氣亥厥陰風木為二氣子少陰君火為三氣醜太陰濕土為四氣寅少陽相火為五氣卯陽明燥金為六氣此言六氣以君火為尊五行以濕土為重也經曰必先歲氣毋伐天和又曰不知年之所加氣之盛衰不可以為工學者合而觀之更精於脈證乃自得之噫儒之道博約而已醫之道運氣而已學者豈可忽忽而不精究歟太極圖説易有太極是生兩儀周子懼人之不明而製為太極圖無極而太極無極者未分之太極也太極者已分之陰陽也一中分太極中字之象形正太極之形也一即伏羲之奇一而圖之即是無極既曰先天太極天尚未生盡屬無形何為伏羲畫一奇周子畫一圈又涉形迹矣曰此不得已而開示後學之意也人受天地之中以生亦具有太極之形在人身之中可不究心哉兩腎俱屬水左為陰水右為陽水以右為命門非也命門在兩腎中間兩腎在人身中合成一太極命門左邊小黑圈是真水之穴命門右邊小白圈是相火之穴此一水一火俱無形日夜潛行不息陽水陰水相火真水命門圖説命門在人身之中對臍附脊骨自上數下則為十四椎自下數上則為七椎內經曰七節之旁有小心此處兩腎所寄左邊一腎屬陰水右邊一腎屬陽水各開一寸五分中間是命門所居之宮即太極圖中之白圈也其右旁一小白竅即相火也其左旁之小黑竅即天一之真水也此一水一火俱屬無形之氣相火稟命於命門真水又隨相火自寅至申行陽二十五度自酉至醜行陰二十五度日夜周流於五臟六腑之間滯則病息則死矣人生男女交媾之時先有火會而後精聚故曰火在水之先人生先生命門火此褚齋賢發前人之所未發世謂父精母血非也男女俱以火為先男女俱有精但男子陽中有陰以火為主女子陰中有陽以精為主謂陰精陽氣則可男女合此氣交聚然後成形成形俱屬後天矣後天百骸俱備若無一點先天火氣盡屬死灰矣然元陽君主之所以為應事接物之用者皆從心上起經綸故以心為主至於棲真養息而為生生化化之根者獨藏於兩腎之中故尤重於腎其實非腎亦非心也馮氏李時珍曰命門為藏精系胞之物其體非脂非肉白膜裹之在脊骨第七節兩腎中央系著於脊下通二腎上通心肺貫腦為生命之原相火之主精氣之府人物皆有之生人生物皆由此出男女媾精皆稟此命火以結胎人之窮通壽夭皆根於此治法指南經曰汗之則瘡已高腫者毒在表故汗之則瘡已若誤下之則誅戕無過反傷元氣李東垣曰夫癰疽之病治療多方總而論之各有所宜補瀉淋屁及敷掃貼熁針鐮炙烙用之不同蓋知其道也與治必效昧於理者利害不無嘗見以寒療熱以熱療寒古今之通論也又有檢方療病妄制加減以意裁之自以為可殊不知病有逆從治有緩急法有正權方有奇偶用有輕重夫醫者意也得其意然後能變通也達其變通者悟其道而省其理也則左右逢其源矣愚雖不才略陳萬一嘗見以寒治熱而寒彌甚治熱以寒而熱彌熾者何也蓋不知五臟有陰陽之性其可因其類而取之也假如心實生熱者當益其腎腎水滋熱將自除腎水虛生寒當補心心火既降寒當自除此所謂寒之而熱者取之陰熱之而寒者取之陽也又寒因熱用熱因寒用要通其理類而已又聞微者逆之甚者從之何謂也蓋治寒以熱必涼而行之治熱以寒必溫而行之此亦欲其調和也其間有正有權者何也蓋病有微有甚微者逆治理之正也甚者從治理之權也然為瘡科於補瀉汗下標本逆從正權之理烏可闕而不知也大凡治療瘡疽之要法曰初覺熱毒發熱鬱結而作瘡疽一二日宜蕩滌邪氣疏通臟腑令內消也古今湯法謂切銼㕮咀如麻豆大以猛火急煎無令過熟欲其速利也次用丸散宣導血脈漸次消磨令緩散也助以淋溻調和榮衛行經絡也更當膏潤溫養兼磨敷四畔貼熁之藥順其陰陽也追蝕托裡汗下調補臨時制宜深淺緩急自有等差如男女貴賤亦當別論晉尚書褚澄曰寡婦尼僧異於妻妾雖無房室之勞而有憂思之苦此深達其情者也又仲景云物性剛柔餐居亦異治之不同也所以黃帝與四方之間岐伯舉四治之能況病之新舊形志樂苦豈可執方無權以求其愈疾哉亦有瘡疽腫痛初生一二日便覺脈沉細煩悶臟腑弱而皮寒邪毒猛暴恍惚不寧外證深沉者亦宜即當用托裡溫熱之劑以從治之十書又曰夫瘡疽丹腫結核瘰癧初覺有之即用內消之法經久不除氣血漸衰肌寒肉冷膿汁清稀毒不出瘡口不合或聚腫不赤結核無膿外證不明者並宜托裡膿未成者使膿早成膿已潰者使新肉早生氣血虛者托裡補之陰陽不和托裡調之大抵托裡之治使瘡無變壞之證凡為瘡醫不可一日無托裡之藥然而寒熱溫涼煩渴利嘔臨證宜審其緩急耳又曰夫癰疽膿潰腫毒侵里證候危惡者須辨虛實況夫虛者難補實者易瀉補瀉之法不可輕用若或少差利害甚大然而虛實證端不可不辨有瘡之虛實有臟腑氣血上下真邪各有虛實故不同也分而言之則腫起堅硬膿稠者瘡疽之實也腫下軟慢膿稀者瘡疽之虛也瀉痢腸鳴飲食不入嘔吐無時手足並冷脈弱皮寒小便自利或小便時難大便滑利聲音不出精神不爽者悉臟腑之虛也大便硬小便澀飲食如故腸滿膨脹胸膈痞悶肢節疼痛口苦嗌乾煩躁多渴身熱脈大精神昏塞者悉臟腑之實也凡諸瘡疽膿水清稀瘡口不合聚腫不赤肌寒肉冷自汗色脫者氣血之虛也腫起色赤寒熱疼痛皮膚壯熱膿水稠黏頭目昏重者氣血之實也頭痛鼻塞目赤心驚咽喉不利口舌生瘡煩躁飲冷睡語咬牙者上實也精滑不固大便自利腰腳沉重睡臥而不寧者下虛也肩項不便四肢沉重目視不正睛不了了食不知味音嘶色敗四肢浮腫者真氣之虛也腫焮尤甚痛不可近積日不潰寒熱往來大便祕澀小便如淋心神煩悶恍惚不寧者邪氣之實也又曰真氣奪則虛邪氣勝則實又曰諸痛為實癢為虛也又曰診其脈洪大而數者實也微細而軟者虛也虛則補之和其氣托裡也實則瀉之疏利而自導其氣內經謂血實則決之氣虛則掣引之又曰治瘡瘍治表不云發汗而曰托裡治里不云攻下而曰疏通治經絡不云疏通而曰和榮衛蓋欲保全元氣為主而不專於攻瘡也今之醫者以速愈為高汗下峻攻溫毒漫治毒或速散不知元氣傷而天年夭矣可不慎哉又曰古人用藥因病制宜治不執方隨病增損療積聚補益可用丸藥以從舊不改方增損蓋瘡瘍危要之際證候多種安有執方之論固可臨時加減以從其法只如發背腦疽惡疔腫膿潰前後虛而頭痛者於托裡藥內加五味子恍惚不寧加人參茯苓虛而發熱者加地黃栝蔞往來寒熱者潮熱者加地骨柴胡渴不止加知母赤小豆大便不通者加木通燈草虛煩者加枸杞子天門冬自利者加厚朴四肢厥逆者加附子生薑嘔逆者加藿香丁香多痰者加半夏陳皮膿多者加當歸川芎甚痛者加芍藥乳香肌肉遲生者加白蘞官桂有風邪者加獨活防風心驚怯者加丹砂口目瞤動者加羌活細辛愚雖不才自幼及老凡治瘡疽常依此法加減用藥取效如神後之學者宜細詳焉又曰九竅不利皆不可下瘡瘍鬱冒俗呼昏迷是不可下汗之則愈又曰癰疽之發其受之有內外之別治之有寒溫之異受之外者法當托裡以溫劑反用寒藥則是皮毛始受之邪引入骨髓受之內者法當疏利以寒劑反用溫劑托裡則是骨髓之病上徹皮毛表裡通潰共為一瘡助邪為毒苦楚百倍輕則危殆重則死矣豫聞潔古云瘡瘍之生也表裡不同或攻或發少有差舛變證隨能殺人甚於傷寒也針灸施治各隨其宜所用之藥又當明入五臟君臣是其法也又曰大抵癰腫之證不可專泥於火為患況稟有虛實及老弱不同豈可概用寒涼之藥設若毒始聚勢不盛者庶可消散尤當推其病因別其虛實若概用涼藥必致誤事如膿將成邪盛氣實者用消毒之劑先殺其毒雖作膿不為大苦潰亦不甚若就用托裡必益其勢如膿將成不成及不潰者方用托裡膿成勢盛者針之膿一出諸證悉退又曰瘡熱奮然高起結硬而痛色赫赤微帶黯色其邪在血脈之上皮膚之間急發其汗則毒隨汗散矣大法宜荊防敗毒散冬月萬靈丹脈虛者四妙湯內托復煎湯張仲景云瘡家雖身疼痛不可發汗汗之則痙發汗為大汗出非謂托裡之藥輕輕表散也薛立齋云夫瘡瘍之作皆膏粱厚味醇酒炙煿房勞過度七情鬱火陰虛陽湊精虛氣節命門火衰不能生土榮衛虛弱外邪所襲氣血受傷而為患當審其經絡受證標本緩急以治之若病急而元氣實者先治其標病緩而元虛者先治其本或病急而元氣又虛者必先於治本而兼以治標大要腫高焮痛膿水稠黏者元氣未損也治之則易漫腫微痛膿水清稀者元氣虛弱也治之則難不腫不痛或漫腫黯黑不潰者元氣虛甚治之尤難者也主治之法若腫高焮痛者先用仙方活命飲解之後用托裡消毒散漫腫微痛者用托裡散如不應加薑桂若膿出而反痛氣血虛也八珍湯不作膿不腐潰陽氣虛也四君加當耆肉桂不生肌不收斂脾氣虛也四君加芍藥木香惡寒憎熱陽氣虛也十全大補加薑桂晡熱內熱陰血虛也四物加參朮欲嘔作嘔胃氣虛也六君加炮薑自汗盜汗五臟虛也六味丸料加五味子食少體倦脾氣虛也補中益氣加茯苓半夏喘促咳嗽脾肺虛也前湯加麥冬五味欲嘔少食脾胃虛也人參理中湯脾痛泄瀉脾胃虛寒也附子理中湯小腹痞足脛腫脾腎虛也十全大補湯加山藥山萸肉桂泄瀉足冷脾腎虛寒也前藥加桂附熱渴淋祕腎虛陰火也加減八味丸咳嗽淋祕肺腎虛火也補中益氣湯加減八味丸大凡怯弱之人不必分其腫瘍惟當先補胃氣或疑參耆滿中間有用者又加發散敗毒所補不償所損又有泥於氣質素實或有痰不服補劑者多致有誤殊不知瘡瘍之作緣陰陽虧損其膿既泄氣血愈虛豈有不宜補者哉故丹溪云但見腫痛參之脈證虛弱便與滋補氣血無虧可保終吉又曰大抵膿血大泄當大補氣血為先雖有他證以末治之瘡口雖合尤當補益又曰按張仲景先生治傷寒有汗吐下三法東垣先生治瘡瘍有疏通托裡和榮衛三法用之得宜厥疾瘳矣假如瘡瘍腫硬木悶煩熱便祕脈沉而實其邪在內當先疏其內以下之焮腫作痛便利調和脈浮而洪其邪在表當先托其里以汗之元戎云榮衛充滿抑遏而為癰者當泄之以奪盛熱之氣榮衛虛弱壅滯而為癰者當補之以接虛怯之氣又東垣先生云瘡瘍雖面赤伏熱不得攻裡裡虛則下利仲景先生云瘡家雖身體疼痛不可發汗汗之則發痙苟不詳審妄為汗下以致血氣虧損反延陷少壯者難以潰斂老弱者多致不救朱丹溪曰癰疽因積毒在臟腑非一朝一夕今發於外宜以標本為治當先助氣壯胃使根本堅固而以行經活血為佐參以經絡時令使毒氣外發此正仲景解表用麻黃桂枝之意施治之早可以內消此乃內托之本意也又曰山梔黃芩苦參犀角佐輔人參固可解食毒之熱若寒月與虛人寧無加減乎內經謂膏粱之變足生大疔此言瘡疽之因也禁戒厚味恐其引出宿火之熱此誠富貴豢養口腹者所當謹若素貧者大不然也豫治一人背癰徑尺穴深而黑家貧得此急作參耆歸術膏多肉餛飩與之而安多肉餛飩補氣之有益者也朱丹溪曰排膿內補十宣散若用之於些小癰疽與冬月儘可助內托之功若於冬月腫瘍用之亦可轉重就輕移深為淺若潰瘍與夏月用之其桂朴之溫散佐以防風白芷吾恐雖有參耆難為倚仗比見世人用此方者不分癰疽冬夏無經絡無先後如盲人騎瞎馬半夜臨深池危哉又曰內補十宣散瀉衛燥血藥太多止可用於輕小證候虛之甚者恐難倚仗又曰精要云大黃治癰疽之要藥以其宣熱拔毒又云瘡始作皆須以大黃等湯極轉利之且排日不廢繼又自言患癰疽者每有泄瀉皆是惡候此是不能無疑者也藉曰前用大黃恐因病體實而大便祕結有積熱沉痼之積者發也止可破結導滯推令轉動而已豈可謂極轉利之而且排日不廢乎若下利之後又與利藥恐非防微杜漸之意瘡之始作即周禮腫瘍之時也腫在肌肉若非大滿大實大堅之證自當行仲景發表之法借五香湯為例散之於外何必遽以峻下之藥以奪其里自取其禍乎又曰內托散即護心丹此散緑豆解丹毒又治石毒味甘入陽明胃性寒能補為君乳香去惡腫入少陰性溫善竄為佐甘草性緩解五金八石及百藥毒為使此方專為服丹石而發疽者設若不因丹石而發疽者恐非必用之劑又曰獨勝散即香附去毛淨以薑汁浸一宿焙研治氣鬱血滯而諸瘡愈後常服半年尤妙此皆施於體實氣鬱之人每思香附經不言有補惟不老湯一方乃言於老人有益用片子薑黃香附甘草三味而以不老為名且引鐵翁先生與劉君為證夫豈無其故哉蓋於行氣中有補之之理耳天之所以為天者健而有常也因其不息所以生生無窮正如茺蔚子活血行氣有補陰之妙故名益母胎前産後所恃者氣血耳胎前無滯産後無虛以其行中有補也夏枯草治瘰癧亦然精要云大凡癰疽不可舍五香湯此又不能無言者也開卷便於第一論中詳言之吾不知良甫之時有許多大腑堅祕病氣鬱塞若是之頑厚可以驟散而大下者若果有之亦當開陳時之先後證之可否庶乎後人不敢孟浪殺人也或曰癰疽用大黃走泄以去毒自孫真人行千金方已言之矣良甫祖述其説何吾子病之深也曰大黃除諸實熱而性峻急孫以盛行奇術於公卿間時在晚宋民不知兵交遊於富貴之家肉食之輩固皆捷效今良甫不分貧富苦樂勞逸一概用之寧無孟浪之患乎況有房勞而虛者憂怒而虛者極意貪求而虛者強力動勞而虛者大醉過飽而虛者皆因氣弱而澀血少而濁生疽固是難治之病者大腑祕而稍安穀食肯守戒律甘心淡味者猶為可治但費補工夫耳苟因旬日半月大便祕實不知其氣不降也便以為實而行大黃些少寒熱不知其氣血不和也便以為有外感而行表散如此害人甚速精要云內托散一日至三日之內近十數服治毒氣攻衝臟腑名護心散此方專為丹石而發疽者若不因丹石而發恐非必用之劑若夫年老者病深者證憊者體重者緑豆雖補將有不勝重任之患矣機要云治瘡大要須明惟有托裡疏通和榮衛三法毒邪在內則痛深脈必沉實外證發熱煩躁大便祕瘡腫木痛不焮赤宜用內疏黃連湯疏通臟腑毒邪在皮膚則痛淺脈必浮數外證焮腫作痛二便調勻或寒熱拘急頭痛恐邪氣外極而內行必先托裡之劑以散之毒邪在經絡中外無焮惡之氣內亦二便調和食如常口知味不惡風寒止於熱燥其脈不浮不沉乃邪在經絡中也宜調和榮衛元戎云素問寒癰疽例經云腎移寒於脾發為癰腫少氣脾移寒於肝發為癰腫拘攣又云諸寒癰腫此皆安生岐伯曰生於八風之所變也又云地之濕氣感則害人皮肉筋脈聖濟云衣服過厚表易著寒所得之源大抵如此或發不變色或堅硬如石或捻之不痛久則然後變色疼痛漸軟而成膿如泔而稀久不能差瘡口不合變為疳漏敗壞肌肉侵損骨髓以致痿痹宜以骨碎補丸主之此方用骨碎補補骨脂熟地當歸川續斷石楠葉黃耆石斛牛膝杜仲萆薢各二兩附子一兩白芍川芎菟絲餅沙參羌活防風獨活天麻各一兩五錢蜜丸空心鹽湯下心法曰凡瘡口不合膿水清稀氣血俱虛也飲食少而難化脾胃虛寒也肌體瘦弱皮色痿黃膽氣不行也非參耆歸術之類不能補非附子不能助其功今飲食進少且難消化屬脾胃虛寒蓋脾胃屬土乃命門火虛不能生土而然不宜直補脾胃當服八味丸補火以生土也又曰氣無補法俗論也以其為病痞滿壅塞似難於補不知正氣虛而不能運行則邪氣滯而為病經云壯者氣行則愈怯者弱者則著而為病苟不用其補氣何由而行乎王肯堂曰瘡漏不合遽合結毒實蟲所為準繩張景嶽曰瘡瘍之治有宜瀉者有宜補者有宜發散者有宜調榮解毒者因證用藥各有所主經曰形氣有餘病氣有餘當瀉不當補形氣不足病氣不足當補不當瀉此其大綱也故凡察病之法若其脈見滑實洪數而焮腫痛甚煩熱痞結內外俱壅者方是大實之證此其毒在臟腑非用硝黃猛峻等劑蕩而逐之則毒終不解故不得不下然非有真實真滯者不可下此下之不可輕用也其有脈見微細血氣素弱或腫而不潰潰而不斂或飲食不加精神疲倦或嘔吐泄瀉手足常冷膿水清稀是皆大虛之候此當全用溫補固無疑矣然不獨此也即凡見脈無洪數外無煩熱內無壅滯而毒有可慮者此雖非大虛之證然察其但無實邪便當托裡養榮預顧元氣何也蓋恐困苦日久或膿潰之後不待損而自虛矣及其危敗臨期能及哉故丹溪云癰疽因積毒在臟腑宜先助胃壯氣以固其本夫然則氣血凝結者自散膿瘀已成者自潰肌肉欲死者自生肌肉已死者自腐肌肉已潰者自斂若獨攻其瘡則脾胃一虛七惡蜂起其不死者幸矣即此謂也其有脈見緊數發熱憎寒或頭痛或身痛或四肢拘急無汗是必時氣之不正外閉皮毛風熱壅盛而為癰腫此表邪之宜散者也如無表證則不宜妄用發散以致亡陽損衛故仲景曰瘡家不可汗此之謂也其有榮衛失調氣血留滯而偶生癰腫但元氣無損飲食如常脈無凶候證無七惡此其在腑不在臟在表不在裡有熱者清其熱有毒者解其毒有滯者行其氣所當調榮和衛而從平治者也大都瘡瘍一證得陽證而病氣形氣俱有餘者輕得陰證而形氣病氣俱不足者重若正氣不足而邪毒有餘補之不可攻之又不可者危若毒雖盡去而脾腎已敗血氣難復者總皆不治之證故臨證者當詳察虛實審邪正辨表裡明權衡淌舉措略乖必遺人大害斯任非輕不可苟也又曰槐花治濕退熱之功最為神速大抵腫毒非用蒜灸及槐花酒先去其勢雖用托裡諸藥其效未必甚速惟胃寒之人不可過用又曰忍冬酒治癰疽發背初發時便當服此不問疽發何處或婦人乳癰皆有奇效如或處鄉落貧家服此亦便且效仍兼以麥飯石膏及神異膏貼之甚效又曰愚意前論腫瘍有云忌補宜下者有云禁用大黃者此其為説若異而亦以證有不同耳蓋忌補者忌邪之實也畏攻者畏氣之虛也即如腫瘍多實潰瘍多虛此其常也然腫瘍亦有不足則有宜補不宜瀉者潰瘍亦或有餘則有宜瀉不宜補者此其變也或宜補或宜瀉總在虛實二字最多疑似貴有定見如火盛者宜清者也氣滯者宜行者也既熱且壅宜下者也無滯無壅則不宜妄用攻下此用攻之宜禁者也至若用補之法亦但察此二者凡氣道壅滯者不宜補火邪熾盛者不宜溫若氣道無滯火邪不甚或飲食二便清利如常而患有危險可畏者此雖未見虛證或腫瘍未潰亦宜即從托補何也蓋恐困苦日久無損自虛若能預固元氣則膿必易化膿必易潰口必易斂即大羸大潰猶可望生者必待虛證疊出或既潰不能收斂而後勉力支持則輕者必重重者必危能無晚乎此腫瘍之有不足也所繫非細不可不察又曰潰瘍有餘之證其辨有四蓋一以元氣本強火邪本盛雖膿潰之後而內熱猶未盡除或大便堅實而能食脈滑者此其形氣病氣俱有餘乃宜清利不宜溫補火退自愈亦善證也一以真陰內虧水不制火膿既泄而熱反甚脈反躁者欲清之則正氣已虛欲補之則邪氣愈甚此正不勝邪窮敗之證不可治也一以毒深而潰淺者其肌腠之膿已潰而根盤之毒未動此乃假頭非真潰也不得遽認為潰瘍而概施托補若誤用之則反增其害當詳辨之又有一種元氣已虛極似宜補然其稟質滯濁肌肉堅厚色黑而氣道多壅者略施培補反加滯悶若此輩者真虛既不可補假實又不可攻最難調理極易招怨是亦不治之證也總之潰瘍有餘者十之一二故潰瘍宜清者少腫瘍不足者十常四五故腫瘍宜補者多此亦以癰疽之危險有關生死者為言故貴防其未然也至若經絡浮淺之毒不過腫則必潰潰則必收又何必卷卷以補瀉為辨也觀者審之張潔古曰有里者下之蔣示吉曰司命者用藥但有一可補之機則補之有不可不攻之勢則攻之庶幾得古人好生之意者哉又曰夫瘡瘍既潰肉腐膿流血散氣消其虛之必補也宜矣用十全大補湯為潰後諸證之總司又曰誤服克戕之劑或膿血大泄或因吐瀉或誤入房或勞損元氣或夢遺泄精或外邪感觸以致發熱頭痛小便淋漓或滑數便血脈濡煩喘氣短頭暈體倦熱渴意欲投水身熱惡衣揚手擲足腰背反張此陽氣脫陷之假熱證也又有畏寒頭痛咳逆嘔吐耳瞶目蒙小便自遺瀉痢腸鳴裡急腹痛陰莖短縮牙齒浮痛肢體麻痹或厥冷身痛或咬牙齧唇此陽氣脫陷之真寒證也如遇以上假熱真寒勿論其脈勿論其證若見一二急以十全大補湯加附子補溫之藥庶有復生之理又曰凡肉黯陽虛屬寒十全湯加附子肉赤血虛兼熱四物湯加梔子又曰凡死不潰是脾虛十全倍參朮肉白肉不斂為陽孤十全加薑附又曰凡寒涼非生肌所喜發散非潰後所宜又曰七日以前火毒方熾辛熱溫劑休嘗七日以後膿血將成寒涼敷藥莫遏又曰精為陰人之水也氣為陽人之火也水中不可無火無火則陰勝而寒病生火中不可無水無水則陽勝而熱病起水虧者大補真陰火虛者大補元陽又曰凡真陽之衰敗必由於真陰之虧損又曰藥能治病補虛不能移情易性病人素性乖張最難調治又曰膿流毒泄氣血俱虧又曰金匱腎氣丸治命門火衰以致脾土虛寒不能消遺收斂或飲食少思不化臍腹痛夜溺多口乾喜熱飲腎水虛而上泛為痰脾虛不能攝涎而為痰非此不救誠為引火歸原回陽返本之妙劑也又曰初起之瘍皮肉未破一團實邪熱毒甚熾不可輕投辛熱之藥潰後之證膿血出多正氣已虧元氣未復不可擅用寒涼之劑又曰據東垣之意瘡瘍面赤雖伏火熱鬱不得攻裡為陽氣怫鬱邪氣在經宜發表以去之雖大便數日不見亦宜多攻其表發散陽氣少加潤燥藥以潤之薛立齋云腫瘍內外皆壅宜以托裡表散為主如用大黃寧無孟浪之非若此則大黃之難用也明矣而丹溪又曰大黃治癰症之要藥豈諸名家亦相矛盾乎蓋癰疽初起有六經表證者大便如常者脈緊浮數者邪氣在表斷不可下若表證不現大便燥結口渴引飲脈浮沉實沉數瘡頭堅硬不起若不用大黃何以宣通臟腑耶初虞世云癰疽初作須以大黃等藥急轉利之勿以困苦為念此亦一偏之説在辨表裡胡可為訓總之真知其實而瀉利真知其虛而補益浮露而淺者則外消藏伏而深者則內托庶無弊也又曰按仲景云瘡家雖身疼體痛不可發汗汗之則發痙此為瘡家潰後復傷寒者説也若瘡初起七日之內惡寒發熱頭痛身疼瘡高腫身無汗二便如常脈來浮緊浮數表證俱多非汗不愈若汗藥誤投之於已潰之後或表邪俱去之時其禍亦不止發痙而已也又曰凡癰七日以後瘡頭見黃色竟以白降丹點上升頭拔毒上以膏藥蓋之以防風邪外入每日用蔥艾湯洗淨再換膏藥大約在十一朝前後膿出痛定是陽瘡之順候也人服四妙湯托之若八九日痛而不潰瘡勢已定毒氣已聚尚未成膿須用神燈照法又曰潰後遍身作癢乃外風乘虛而入宜內托解之又曰膿少色赤不斂乃血虛也若穢氣觸而亦然當以乳香沒藥之類和之又曰餘毒未盡四妙湯加白芷防風花粉連翹又曰寒邪凝滯十全湯加防風桂枝外用蔥艾湯洗又曰陽虛則惡寒陰虛則生熱又曰午前熱主於補氣午後熱主於補血又曰潰後痛疼膿色敗臭者胃虛有火十全湯加麥冬五味子又曰喘粗氣短恍惚嗜臥者脾肺弱也補中益氣湯加麥冬五味子又曰脾腎已損則肩背不便而沉重補中益氣湯加山萸肉山藥北五味子又曰脾肺氣脫肢體腫面色敗而聲嘶唇鼻青赤面目俱浮者六君子湯加炮薑不應十全湯加炮薑熟附子又曰寒氣內淫腹痛吐瀉手足冷而人昏憒或咳嗽厄逆腹鳴不食陽氣虛之惡證宜托裡溫中湯後用六君子湯汪省之曰潰後血氣耗散內外皆虛便宜參耆接補元氣用寒涼固非所宜用香燥亦蹈虛虛之禍可不慎歟理例陳文治曰脈沉實發熱煩躁外不焮腫赤痛乃邪氣深伏在裡宜先疏通宜衛生湯熱結甚者內疏黃連湯陳實功曰大便祕燥通利相宜馮魯瞻曰人動輒疑人參熟地泥膈填中殊不知脾能健運腎能閉藏則祖氣有根而不拔元氣深藏而有源何有為脹為滿之患哉又曰內外證最忌標實而本虛瀉之不可補之無功極為危險全在防微杜漸標本得宜使脾腎之元陽生髮而陰邪之凝滯釋然矣又曰肺氣既虛不可復行其氣腎水已衰不可重利其水又曰內經塞因塞用之法少用則滋壅於上多服則峻補於下蓋中州虛乏壅滯必賴大補而流通其氣故參朮宜多用也又曰治不足之法治有餘則可治有餘之法治不足則不可又曰寒之不寒是無水也熱之不熱是無火也無水者壯水之主以鎮陽光無火者益火之原以消陰翳此達至理於繩墨之外也又曰金匱腎氣丸補而不滯通而不泄誠治腫之神丹又曰標證雖似有餘本證實由不足當以脈辨之又曰凡癰疽瘡癤輕重緩急大有不同治之之法總宜察其虛實冷熱或重或輕對證發藥無失先後次序治法當分初中末異初宜散熱解毒通經為主以圖消去中宜排托為主以圖散去餘毒末宜補宜托宜溫以圖易於收功此大法也又曰一癰疽初作便宜灼艾及用藥外塗四圍中留口出毒如瘡小通敷之既潰以膏貼之以手探腫上熱者有膿不熱者無膿也又曰凡肌肉傷而瘡口不斂者用六君子湯以補脾胃為主若氣虛惡寒而瘡口不斂者用補中益氣湯以補脾肺若血虛發熱而瘡口不斂者用四物參耆以滋肝脾若膿多而瘡口不斂者用八珍湯十全大補湯以養血氣經曰脾主肌肉如前藥未應但用四君歸耆以補脾胃若更不應乃下元陽虛用八味丸以壯火生土若脈數發渴者難治此真氣虛而邪氣實也又曰按一切癰疽初起則邪毒未曾達表臟腑壅熱一毫熱藥不可用若既出膿後則毒氣外泄氣血皆虛胃氣自弱一毫涼藥不可用比古人之成法也然亦有氣血虛寒初起毒陷陰分者非陽和托裡何能升達在表既潰而陰血乾枯若非滋陰充暢何能接續膿漿外則瘡毒枯焦內則口乾煩躁故全在以脈消息蓋氣主煦之血主濡之氣以成形血以華色故諸癰疽平塌不易高聳者乃陽氣虛弱不能逐毒以出陰分即為陰毒也根紅散漫者亦氣虛不能拘血緊附也紅活光潤者氣血拘毒出外也外紅里黑者毒滯於內也紫黯不明者氣血不充不能化毒成膿也膿色濃厚者氣血旺也膿色清淡者氣血衰也未出膿前或有有餘之熱既出膿後盡從不足之治但毒氣一分未盡不可姑縱容留以致蔓延便成大患猶之養虎久必噬人氣虛不能逐毒者溫補兼托陽和一轉陰分凝泣之滯自能冰解血虛不能化毒者尤宜滋補排膿故當潰膿毒氣未盡之時其托裡之功刻不可緩一容一縱毒即逗留一解一清毒即冰伏托裡不兼滋補氣血虛者何以成膿猶無米而使之炊飯也滋補不兼托裡僅可調和氣血何能直達潰所成功且毒氣盛者則反受其助猶裹粟以資盜糧矣滋補不兼溫暖則血凝氣滯孰作釀膿之具猶之造酒不暖何以成漿造飯無火何以得熟世人但知以毒為火清火以解毒殊不知毒即火毒化而火亦清毒凝而火愈郁然毒之化必由膿膿之來必由氣血氣血之化必由火也火可清乎況清涼之法僅可施於瘡疥小癤耳若忽遇通經達絡之疽攻托尚虞不暇豈可復行清解反傷胃氣以致陽氣不振難潰難長甚則內攻臟腑可不畏歟逮至毒既去盡肉瞤肌生則和平補養氣血之中乃可佐以銀花國老以解有餘不盡之毒至如連翹花粉亦能解毒傷胃氣便當禁用程山齡曰凡癰疽服藥宜照顧脾胃為主不得已而用清涼但期中病切勿過劑初起時設有挾風寒者宜先用芎芷香蘇散一劑或萬靈丹蟾酥丸以散之散後而腫未消隨用銀花甘草湯四妙湯以和解之若腫勢焮痛大便閉結內熱極盛者則清藥中須兼補托之劑透膿散主之若膿水已潰必須托補元氣為主參耆內托散主之如元氣虛寒則補托藥中須加辛熱以佐之脾虛者理中湯參耆白朮散氣虛下陷者補中益氣湯胃經受寒飲食停滯者藿香正氣散氣血兩虛者十全大補湯加附子鹿茸間亦有虛而挾熱者即去附子肉桂加麥冬銀花丹皮以收功不可不知也大抵有陽毒有半陰半陽宜細辨之陽毒者瘡勢紅腫瘡頂尖聳根腳不散飲食如常口渴便結五心煩熱脈洪數陰毒者瘡勢灰白平塌頑麻少痛根腳走散食少便溏手足厥冷口鼻氣冷脈沉遲半陰半陽者瘡雖紅腫不甚尖聳飲食差減大便不結寒熱往來微渴喜熱脈虛軟此三者必須細辨俾用藥寒溫得宜方為合法治陽者清涼解毒治陰者溫中回陽半陰半陽之法清不傷胃溫不助邪如斯而已矣十法胡公弼曰癰疽最忌發汗恐表虛不能成膿後必難治無愧青囊又曰敗膿不出者用白芷不可用白朮蓋白朮能化毒生膿經曰無陽則陰無以生無陰則陽無以化張景嶽曰陰根於陽陽根於陰凡病有不可正治者當從陽以引陰從陰以引陽各求其屬而衰之如求汗於血生氣於精從陽引陰也又如引火歸原納氣歸腎從陰引陽也此即水中取火火中取水之義又曰陰之病也來亦緩而去亦緩陽之病也來亦速而去亦速陽生於熱熱則舒緩陰生於寒寒則拳急又曰寒邪中於下熱邪中於上飲食之邪中於中又曰考之中藏經曰陽病則旦靜陰病則夜寧陽虛則暮亂陰虛則朝爭蓋陽虛喜陽助所以朝輕而暮重陰虛喜陰動所以朝重而暮輕此言陰陽之虛也若實邪之候則與此相反凡陽邪盛者必朝重暮輕陰邪盛者必朝輕暮重此陽逢陽王陰得陰強也其有或晝或夜時作時止不時而動者以正氣不能主持則陰陽勝負交相錯亂當以培養正氣為主則陰陽將自和矣但或水或火宜因虛實以求之又曰病有六變者表裡寒熱虛實也是即醫中之關鍵明此六者萬病皆指諸掌矣以表言之則風寒暑濕火燥感於外者是也以裡言之則七情勞欲飲食傷於內者是也寒者陰之類也或為內寒或為外寒寒者多虛熱者陽之類也或為內熱或為外熱熱者多實虛者正氣不足也內出之病多不足實者邪氣有餘也外入之病多有餘又曰病必自表而入者方得為之表證若由內以及外便非表證矣經曰從內之外者調其內從外之內者治其外從內之外而盛於外者先治其內而後治其外從外之內而盛於內者先治其外而後調其內此內外先後之不可不知也又曰熱在表者為發熱頭痛為丹腫斑黃為揭去衣被為諸痛瘡瘍熱在裡者為瞀悶脹滿為煩渴喘結或氣急叫吼或躁擾狂越熱在上者為頭痛目赤為喉瘡牙痛為諸逆衝上為喜冷舌黑熱在下者為腰足腫痛為二便祕澀或熱痛遺精或溲渾便赤又曰寒在表者為憎寒為身冷為浮腫為容顏青慘為四肢寒厥寒在裡者為冷咽腸鳴為噁心嘔吐為心腹疼痛為惡寒喜熱寒在上者為吞酸為膈噎為飲食不化為噯腐脹噦寒在下者為清濁不分為鶩溏痛泄為陽痿為遺尿為膝寒足冷又曰真寒之脈必遲弱無神真熱之脈必滑實有力又曰陽臟之人多熱陰臟之人多寒陽臟者必平生喜冷畏熱即朝夕食冷一無所病此其陽之有餘也陰臟者一犯寒涼則脾腎必傷此其陽之不足也第陽強者少十惟二三陽弱者多十常五六然恃強者多反病畏弱者多安寧又曰假寒誤服熱藥假熱誤服寒藥等證但以冷水少試之假熱者必不喜水即有喜者或服後見嘔便當以溫熱藥解之假寒者必多喜水或服反快而無所逆者便當以寒涼藥解之又曰今人病虛證者極多非補不可但用補之法不宜造次欲察其可補不可補之機則全在先察胸腹之寬否何如然後以漸而進如未及病再為放膽用之庶無所礙此用補之大法也又曰凡勢在危急難容少緩亦必先問其胸寬者乃可驟進若元氣真虛而胸腹又脹是必虛不受補之證若強進補劑非惟無益適足以招謗耳又曰制方用藥氣味有陰陽陰者降陽者升陰者靜陽者動陰者柔陽者剛陰者怯陽者勇陰主精陽主氣其於善惡喜惡皆有妙用又曰氣味之升降升者浮而散降者沉而利宜升者勿降宜降者勿升又曰氣味之動靜靜者守而動者走走者可行守者可安又曰氣味剛柔柔者純而緩剛者躁而急純者可和躁者可卻非剛不足以去暴非柔不足以濟剛又曰氣味之勇怯勇者直達病所可賴出奇怯者用以周全籍其平妥又曰氣味之主氣者有能為精之母主精者有能為氣之根或陰中之陽者能動血中之氣或陽中之陰者能顧氣中之精又曰氣味有善惡善者賦性馴良盡堪擇用惡者氣味殘狠何必近之又曰氣味有善惡有素性之喜惡有一時之喜惡者相宜取效尤易惡者見忌不必強投又曰治病用藥本貴精專尤宜勇敢凡久遠之病則當要其終始治從乎緩此宜然也若新暴之病虛實既得其真即當以峻劑直攻其本拔之甚易若逗留畏縮養成深固之勢則死生系之誰其罪也故凡真見裡實則以涼膈承氣真見裡虛則以理中十全表虛則耆朮建中表實則麻黃柴桂之類但用一味為君二三味為佐使大劑進之多多益善夫用多之道何在在乎必賴其力而料無害者即放膽用之性緩者可用數兩而性急者亦可數錢若三五七分之説亦不過點名具數兒戲而已解紛治劇之才舉動固如是乎又曰治病之則當知邪正當權重輕凡治實者譬如耘禾禾中生稗禾之賊也有一去一有二去二耘之善者也若有一去二傷一禾矣有二去四傷二禾矣若識禾不的俱認為稗而計圖盡之則無禾矣此用攻之法貴乎察得其真不可過也凡治虛者譬之給餉一人一升十人一斗日餉足矣若百人一斗千人一斛而三軍之衆又豈擔石之糧所能活哉一餉不繼將並前餉而棄之而況於從中克減乎此用補之法貴乎輕重有度難從簡也又曰虛實之治大抵實能受寒虛能受熱所以補必兼溫瀉必兼涼者蓋涼為秋氣陰主殺也萬物逢之便無生長欲補元氣故非所宜涼且不利於補寒者益可知矣即有火盛氣虛宜補以涼者亦不過因火暫用火去即止終非治虛之法也又或有以苦寒之物謂其能補陰者則內經有曰形不足者溫之以氣精不足者補之以味夫氣味之相宜於人者謂之曰補可也未聞以味苦氣劣而不相宜於人者亦可謂之補也雖內經有曰水位之主其瀉以咸其補以苦等論然此特以五行歲氣之味據理而言耳矧其又云麥羊肉杏薤皆苦之類是則苦而補者也豈若大黃黃柏之類氣味苦劣若此而謂之能補無是理也嘗聞之王應震曰一點真陽寄坎宮固根鬚用味甘溫甘溫有益寒無補堪笑庸醫錯用功此一言蔽之也不可不察又曰補瀉之法補亦治病瀉亦治病但當知其要也如以新暴之病而少壯者乃可攻之瀉之攻但可用於暫未有衰久之病可屢攻可以無害者故攻不可以收緩功延久之病而虛弱者理宜溫之補之補乃可於常未有根本既傷而舍補可以復元者故補不可以求速效然猶有其要則凡臨證治病不必論其有虛證無虛證但無實證可據而為病者便當兼補以調榮衛精血之氣亦不必論其有火證無火證但無熱證可據而為病者便當兼溫以培命門脾胃之氣此補瀉要領苟不知此未有不至決裂敗事者又曰治法有逆從以寒熱有假真也此內經之旨也經曰逆者正治從者反治夫以寒治熱以熱治寒此正治也正即逆也以熱治熱以寒治寒此反治也反即從也如以熱藥治寒病而寒不去者是無火也當治命門以參薑桂附之類此王太僕所謂益火之源以消陰翳是亦正治之法也又如熱藥治寒病而寒不退反用寒涼而愈者此正假寒之病以寒從治之法也又如以寒藥治熱病而熱不除者是無水也治當在腎以六味丸之類此王太僕所謂壯水之主以鎮陽光是亦正治之法也又有寒藥治熱病而熱不愈反用參薑桂附八味丸之屬而愈者此即假熱之病以熱從治之法也亦所謂甘溫除大熱也第今人之虛者多實者少故真寒假熱之病為極多而真熱假寒之病則僅見耳又曰探病之法不可不知如當局臨證或虛實有難明寒熱有難辨病在疑似之間補瀉之意未定者即當先用此法若疑其為虛意欲用補而未決則以輕淺消導之劑純用數味先以探之消而不投即知為真虛矣疑其為實意欲用攻而未決則以甘溫純補之劑輕用數味先以探之補而覺滯即知有實邪也假寒者略溫之必見躁煩假熱者略寒之必加嘔惡探得其情意自定矣經曰有者求之無者求之又曰假者反之此之謂也但用探之法極宜精簡不可雜亂精簡則真偽立辨雜亂則是非難憑此疑似中之活法必不得已而用之可也華元化曰大凡治療脈不緊數則勿發其汗脈不實數不可以下心胸不閉尺脈微弱不可以吐關節不急營衛不壅不可以針陰氣不盛陽氣不衰勿灸內無客邪勿導引外無淫氣勿按摩皮膚不痹勿蒸尉肌肉不寒勿暖洗神不凝迷勿愈悅氣不奔急勿和緩順此者生逆此者死耳論曰汗家不可發汗陽虛不得重發汗萬靈丹發汗藥不可妄投癰疽論生氣通天論曰膏粱之變足生大疔受如持虛癰疽篇黃帝曰血氣已調形氣乃持余已知血氣之平與不平未知癰疽之所從生成敗之時死生之期或有遠近何以度之可得聞乎岐伯曰經脈流行不止與天同度與地合紀故天宿失度日月薄蝕地經失紀水道流溢草䝁不成五穀不殖徑路不通民不往來巷聚邑居則別離異處血氣猶然請言其故夫血脈營衛周流不休上應星宿下應經數寒邪客於經絡之中則血泣血泣則不通不通則衛氣歸之不得復反故癰腫寒氣化為熱熱勝則腐肉肉腐則為膿膿不瀉則爛筋筋爛則傷骨骨傷則髓消不當骨空不得泄瀉血枯空虛則筋骨肌肉不相榮經脈敗漏熏於五臟臟傷故死矣黃帝曰願盡聞癰疽之形與忌日名岐伯曰癰發於嗌中名曰猛疽猛疽不治化為膿膿不瀉塞咽半日死其化為膿者瀉則合豕膏無冷食三日已發於頸名曰夭疽其癰大以赤黑不急治則熱氣下入淵腋前傷任脈內熏肝肺熏肝肺十餘日而死矣陽氣大發消腦留項名曰腦爍其色不樂項痛而如刺以針煩心者死不可治發於肩及臑名曰疵癰其狀赤黑急治之此令人汗出至足不害五臟癰發四五日逞焫之發於腋下赤堅者名曰米疽治之以砭石欲細而長疏砭之塗以豕膏六日已勿裹之其癰堅而不潰者為馬刀挾纓急治之發於胸名曰井疽其狀如大豆三四日起不早治下入腹不治七日死矣發於膺名曰甘疽色青其狀如谷實䒷𧁾常苦寒熱急治之去其寒熱不治十歲死死後出膿發於脅名曰敗疵敗疵者女子之病也灸之其病大癰膿治之其中乃生肉大如赤小豆治之銼菱翹草根各一升以水一斗六升煮之竭取三升則強飲厚衣坐於釜上令汗出至足已發於股脛名曰股脛疽其狀不甚變而癰膿搏骨不急治三十日死矣發於尻名曰鋭疽其狀赤堅大急治之不治三十日死矣發於股陰名曰赤施不急治六十日死在兩月之內不治十日而當死發於膝名曰疵癰其狀大癰色不變寒熱如堅石勿石石之者死須其柔乃石之生諸癰疽之發於節而相應者不可治也發於陽者百日死發於陰者三十日死發於脛名曰兔齧其狀赤至骨急治之不治害人也發於內踝名曰走緩其狀癰也色不變數石其輸而止其寒熱不死發於足上下名曰四淫其狀大癰急治之百日死發於足旁名曰厲癰其狀不大初如小指發急治之去其黑者不消輒益不治百日死發於足指名脫癰其狀赤黑死不治不赤黑不死不衰急斬之不則死矣玉版篇黃帝曰病之生時有喜怒不測飲食不節陰氣不足陽氣有餘營氣不行乃發為癰疽陰陽不通兩熱相搏乃化為膿小針能取之乎岐伯曰以小治小者其功小以大治大者多害故其已成膿血者其唯砭石鈹鋒之所取也黃帝曰多害者其不可全乎岐伯曰其在逆順焉以為傷者其白眼青黑眼小是一逆也內藥而嘔者是二逆也腹痛渴甚是三逆也肩項中不便是四逆也音嘶色脫是五逆也除此五者為順矣寒熱病篇曰五臟身有五部伏兔一腓二腓者腨也背三五臟之俞在背俞四項五此五部有癰疽者死凡刺之害中而不去則精泄不中而去則致氣精泄則病甚而恇致氣則生為癰疽也生氣通天論曰汗出見濕乃生痤痱陷脈為瘻留連肉腠因而飽食筋脈橫解腸澼為痔陰陽別論曰三陽為病發寒熱下為癰腫氣穴論曰肉之大會為谷肉之小會為溪肉分之間溪谷之會以行榮衛以會大氣邪溢氣壅脈熱肉敗榮衛不行必將為膿內消骨髓外破大膕留於節湊必將為敗積寒留舍榮衛不居卷肉縮筋脅肘不得伸內為骨痹外為不仁命曰不足大寒留於溪谷也刺節真邪論曰虛邪之中人也灑淅動形起毫毛而發腠理其入深內搏於骨則為骨痹搏於筋則為筋攣搏於脈中則為血閉不通則為癰虛邪之入於身也深寒與筋攣搏久留而內著寒勝其熱則骨疼內枯熱勝其寒則爛肉腐肌為膿內傷骨內傷骨為骨蝕有所疾前筋筋屈而不得伸邪氣居其間而不反發為筋溜有所結氣歸之衛氣留之不得反津液久留合而為腸溜久者數歲乃成以手按之柔已有所結氣歸之津液留之邪氣中之凝結日以易甚連以聚居為昔瘤以手按之堅有所結深中骨氣因於骨骨與氣並日以益大則為骨疽有所結中於肉宗氣歸之邪留不去有熱則化為膿無熱則為肉疽凡此數氣者其發無常處而有常名也氣交變大論曰歲火太過民病身熱骨痛而為浸淫歲金太過民病兩脅下少腹痛目赤痛眥瘍耳無所聞歲木不及復則炎暑流火濕性燥病寒熱瘡瘍痱疹癰痤歲金不及復為寒雨暴至民病口瘡歲水不及民病寒瘍流水五常政大論篇曰委和之紀其病支廢癰腫瘡瘍卑監之紀其動瘍湧分潰癰腫赫羲之紀其病笑瘧瘡瘍堅成之紀其動暴折瘍疰少陽司天火氣下臨鼻窒瘡瘍太陽司天寒氣下臨甚則胕腫身後癰少陰司天熱氣下臨甚則瘡瘍地有高下氣有溫涼高者氣寒下者氣熱故適寒涼者脹適溫熱者瘡下之則脹已汗之則瘡已經曰諸痛癢瘡瘍皆屬心火經曰諸癰腫筋攣管痛者此寒氣之腫八風之變也經曰邪之所湊其正必虛著而不去其病為實又曰榮氣不從逆於肉裡乃生癰腫營逆則血鬱氣鬱則熱聚為膿故為癰腫也熱之所過則亦癰腫熱勝則陽氣內郁故浮腫暴作榮氣亦逆於肉裡聚為癰膿之腫矣又曰寒傷形熱傷氣氣傷痛形傷腫熱之陽氣則熱結於肉分而故痛寒之傷形則寒薄於皮腠所以堅凝而腫斯作也先痛而後腫者氣先受傷而形亦受傷也先腫而後痛者形先受傷而氣亦受傷也故有形不痛者陽傷無形有痛者陰傷更有汗方發泄寒水浴之以致熱鬱皮里濕邪凝結甚為痤癤輕為痱瘡亦有陽氣不固邪氣入於陷脈陷脈者謂寒邪陷缺其脈積寒於中經血稽凝久瘀內攻積於肉裡發為鼠瘻又曰膏粱之變足生於大疔又曰五臟不和九竅不通六腑不和留結為癰凡瘡腫高而軟者發於血脈下而堅者發於筋脈肉色不變者發於骨髓故分氣血虛實熱毒深淺為要切不可一見其腫便謂熱毒實熱輒投下劑意謂毒從瀉出殊不知陽者紅腫焮起陰者青白而陷疽者附筋骨而生皆賴血氣為主經所謂氣主煦之血主濡之倘元氣受傷而不能煦濡則下陷不膿能禁其不內攻乎經曰天空西北左寒而右涼地不滿東南右溫而左濕東南方陽也陽精降於下故右熱而左濕西北方陰也陰精奉於上故左寒而右涼適寒涼者脹而濕熱者瘡下之則脹已汗之則瘡已夫東南二方在人則丙小腸熱甲膽風皆俱下性炎上其瘡外有六經形證內無便溺阻隔飲食如故小便自調知不在裡非疽也癰癤小為癤大為癰其邪受風濕地氣自外而來侵內經云榮氣不從逆於肉理乃生癰腫諸瘡痛癢皆屬心火此瘡自外而入是丙小腸左遷入膽作痛而非癢此二方皆主血為病為痛此元氣不足榮氣逆行其初出未有傳變在於肌肉之上皮膚之間只於風熱六經所行經絡地分出也宜瀉風濕熱醫者只知陰復其陽則宜汗此宜汗者乃濕熱鬱手足少陽致血脈凝逆榮衛不能周身元氣消弱也其風濕熱滯於下故面赤腫微黯風水惟上衝顏色多怒其瘡色腫微黯瘡熱高起結硬作痛其脈止在左手左屬表左寸外洪緩而陰是客邪在血脈之上皮膚之間宜急發汗通榮衛則邪去矣宜內托榮衛湯經曰脈細皮寒瀉痢前後飲食不進此為五虛瘡瘍最忌張仲景曰癰疽最難治外尚未現真形內已先潰大穴古人云外大如豆內大如拳外大如拳內大如盤信不爽也劉河間曰人近火者微熱則癢熱甚則痛附近則灼而為瘡皆火之用也或癢痛如針輕刺者猶飛迸火星灼之然也或疑瘡瘍皆屬火熱而反腐出膿水者何也猶穀肉果菜熱極則腐爛而潰為汙水大熱過極反兼水化也李東垣曰疽初生如黍米大癢痛有異誤觸破之即焮展四畔赤腫沉悶牽引脅肋疼痛數日之後漸覺肌膚壯熱惡寒煩渴腫暈侵展燷漿汁出積日不潰抑之則流血者謂之發背疽也發於腦者為腦疽發於鬢眉髯者以類呼也又有其狀無頭腫闊三四寸如覺注悶疼痛因循數日皮光微軟者甚則亦令人惡寒發熱頭痛煩渴者謂之發背癰也又有初生一頭色浮赤而無根腫見於皮膚之間大小一二寸者癤也三者惟疽最重此疾皆因滋味與厚衣衣服厚暖則表易招寒滋味過多則五臟生熱臟腑積熱則血脈不流而毒氣凝滯邪氣伏留熱摶於血血聚則肉潰成瘡淺則為癤實則為癰深則為疽矣亦有因服金石發動而成亦有平生不服金石藥而患者乃由父母曾服餌者其毒氣流傳子孫此病初起認是疽則宜速療之十書又曰夫瘡腫之患莫大乎癰疽然而癰疽何以別之經所謂榮衛稽留於筋脈之中則澀不行血脈不行則陽氣鬱遏而不通故生寒熱穢毒之氣騰出於外蓄結為癰久而不散熱氣乘之腐化為膿然而骨髓不焦枯臟腑不傷敗可治而愈也何為疽五臟風毒積熱毒熱熾甚下陷肌膚骨髓將枯血氣涸竭其腫色夭堅如牛領之皮故命曰疽癰者其腫皮薄以澤此其候也癰疽之生有內有外內生胸腹臟腑之中外生膚肉筋骨之表凡此二毒發無定處而有常名夫鬱滯之本始於喜怒哀樂不時飲食居處不節或金石草藥之發動寒暑燥濕之不調使陰陽之不平而蘊結於外使榮衛凝澀而腐潰輕者起於六腑浮達而為癰氣行經絡而浮也重者發於五臟沉澀而為疽氣行經絡而沉也明乎二者腫毒丹疹可以類推矣又曰夫瘡候多端欲辨深淺直須得法若不素知方論而妄生穿鑿者如大匠舍其繩墨以意度量安能中於規矩哉嘗聞古人有言曰多則惑少則得簡而論之則瘡疽概舉有三種高而軟者發於血脈腫下而堅者發於筋骨肉皮色不相辨者發於骨髓又曰凡療瘡疽以手按搖瘡腫根牢而大者深也根小而浮者淺也又驗其人初生瘡之時便覺壯熱惡寒拘急頭痛精神不寧煩躁飲冷者其患瘡疽必深也若人雖患瘡疽起居和平飲食如常其疾浮淺也惡瘡初生其頭如米粟微似有痛癢誤觸破之即焮展覺有深意速服犀角湯及漏蘆湯通氣丸等取通利疏暢兼用浴毒湯塌浸之類若浮淺者紝貼膏亦瘥以此推之淺深之辨始終之次者也又曰夫熱發於皮毛之間是以浮腫根小至大不過二三寸者癤也六腑積熱騰出於外肌肉之間其發暴甚腫皮光軟侵展廣大者癰也五臟風積熱攻焮於肌骨風毒猛暴初生一頭如㾦癗白焦枯觸之應心者疽也蓋癰發於六腑若燎原之火外潰膚肉疽生五臟沉澀難療若陶室之燧內銷骨髓癰則易療惟難將息而遲瘥疽則難療易得痊復夫癤與瘡初生並宜灸之謂其氣本淫達以導其熱令速暢也疽則烙不宜灸謂其根本深沉須達其原也凡瘡生於外皆由熱毒蘊於內明乎三者其餘可以類推矣蓋皮膚微高起而肌厚或痛或癢移走無常者謂之腫有因風而得之者有因風熱相搏而得之者久久而不消熱勝於風若不即治血不流通與氣乘之以成膿也又曰風多則癢熱多則痛此為驗也又曰夫患癰疽之人慎勿著惱若觸著多致膿成敗潰朱丹溪曰癰疽乃陰陽相滯而生氣陽也血陰也血行脈中氣行脈外相併周流寒與濕相搏則凝滯行遲為不及熱與火摶之則沸騰行速為太過氣得邪而鬱津液稠黏為痰為飲積久滲入脈中血為之濁此陰滯於陽也血得邪而鬱隧道阻滯或溢或結積久滲出脈外氣為之亂此陽滯於陰也百病皆由於此不止癰疽而已故癰腫初起便焮痛腫大者可治不痛熱腫大而陷者不治也又曰衣厚仍寒孤陰無濟衣薄仍熱孤陽獨存陽虛極宜補陽陰虛極當益腎又曰腰背反張頸項強直為變痓之兆口噤作冷寒戰咬牙斯絶命之期竇太師曰發背之生積毒於臟腑正氣盛淹留停緩元氣虛則朝輕夕重如發弓矢外小內大內托則生敗毒則斃治法以參耆為主一定之論也百世不易凡癰發於背廣一尺深可一寸雖潰至骨不穿膜不死經驗全書孫思邈曰瘡之要害處近虛處怯薄處當細心醫治也喻嘉言曰夫瘡毒已潰治當大補氣血又曰膿出反痛虛之過膿多不斂弱之因王肯堂曰方書敘癰疽之源有五一天行時氣二七情內郁三體虛外感四身熱搏於風冷五食炙煿飲法酒服丹石等熱毒總之不出於三因也外因者運氣癰疽有四一火熱助心為瘡經云少陰所至為瘡疹又云少陰司天熱氣下臨肺氣上從甚則瘡瘍又云少陰司天之政初之氣寒乃始陽氣鬱炎暑將起中外瘡瘍又云少陽所至為瘡瘍又云少陽司天之政風熱參布太陰橫流寒乃時至民病寒中外發瘡瘍初之氣候乃大溫其病膚腠中瘡二之氣火反郁其病熱鬱於上瘡發於中三之氣炎暑至民病膿瘡又云太陽司天之政初之氣氣乃大溫肌腠瘡瘍此皆常化病之淺也又云少陰司天熱淫所勝甚則瘡瘍又云少陰司天客勝甚則瘡瘍又曰少陰之復病痱疹瘡疽癰痤痔又云火太過曰赫羲其病瘡疽血流又云火鬱之發民病瘡瘍癰腫此是邪變病之甚也二曰寒邪傷心為瘡瘍經曰太陽司天之政三之氣寒氣民病寒反熱中癰疽注下又云太陽司天寒淫所勝血變於中發為癰瘍病本於心又云陽明司天之政四之氣寒雨降民病癰腫瘡瘍是也三曰燥邪傷肝為瘡瘍經曰木不及曰委和上商與正商同其病支發癰腫瘡瘍邪傷肝也又云陽明司天燥淫所勝民病瘍瘡痤癰病本於肝是也四曰濕邪瘡瘍經云太陰司天濕氣變物甚則身後癰又云太陰之勝火氣內郁瘡瘍於中流散於外是也此四條所謂天行時氣者也素問脈要精微論帝曰諸癰腫筋攣骨痛此皆安生岐伯曰此寒氣之腫八風之變也帝曰治之奈何岐伯曰此四時之病以其勝治之愈也靈樞癰疽篇云血脈榮衛周流不休上應星宿下應經數寒邪客於經絡之中則血泣血泣則不通不通則衛氣歸之不得復反故癰腫寒氣化為熱熱甚則腐肉腐肉則為膿膿不泄則爛筋筋爛則傷骨骨傷則髓消不當骨空不得泄瀉血枯空虛則筋骨肌肉不相榮經脈敗漏熏於五臟臟傷故死矣生氣通天論云勞汗當風寒薄為齇郁乃痤又云陽氣者開闔不得寒氣從之乃生大僂榮氣不從逆於肉裡乃生癰腫是亦邪從勞汗之隙及陽氣開闔不得其理之隙久客之為癰腫也所謂體虛外感及身熱搏於風冷者也治法則精要十宣散五香湯潔古蒼朮復煎散等發表之劑是也內因者陳無擇云癰疽瘰癧不問虛實寒熱皆由氣鬱而成經云氣宿於經絡與血俱澀而不行壅結為癰疽不言熱之所作而後成癰者此乃喜怒憂思有所鬱而成也治之以遠志酒獨勝散兼以五志相勝之理如怒勝思之類是也不內外因者經所謂膏粱之變足生大疔受如持虛又東方之域委鹽之地其民食委嗜咸安其處美其食委熱中咸勝血故其民黑色疏理其病為癰疽又有服丹石法酒而致者亦膏粱之類也李東垣曰膏粱之變亦是滋味過度榮氣不從逆於肉裡榮氣者胃氣也飲食入胃先輸於脾而朝於肺肺朝百脈次及皮毛先行陽道下歸五臟六腑而氣口成寸矣今富貴之人不知其節法酒肥羊雜以厚味積久太過其氣味俱厚之物乃陽中之陽不能走空竅而先行陽道乃反行陰道則濕氣大勝子令母實火乃大旺熱濕既盛必來克腎若不慎房事損其真水水乏則從濕氣之化而上行其瘡多出背上及腦此為大疔之最重者若毒氣出肺或脾胃之部分毒之次也若出於他經又其次也濕熱之毒所止處無不潰爛故經言膏粱之變足生大疔受如持虛者如持虛器以受物則無不受矣治大疔之法必當瀉其榮氣以標本言之先受病為本非苦寒之劑為主為君不能除其苦楚痛疼也如東垣治元好問丹溪治老婦腦疽皆因好酒故以三黃大黃酒製治之又如排膿散當歸散之類是也又有盡力房室精虛氣節之所致者亦屬不內外因當以補虛內托為主亦忌用五香之藥耗真陰而助邪熱治之之藥如內固黃耆湯神效托裡散之類也經云五臟菀熱癰發六腑又云六腑不和留結為癰又云諸痛癢瘡皆屬於心肺乘肝則為癰腎移寒於肝癰腫少氣脾移寒於肝癰腫筋攣此皆臟腑之變亦屬內因者也東垣曰生氣通天論云榮氣不從逆於肉理乃生癰腫又云膏粱之變足生大疔受如持虛陰陽應象論云地之濕氣感則害人皮肉筋脈是言濕氣外傷則榮氣不行榮衛者皆榮氣之所經營也營氣者胃氣也運氣也榮氣為本本逆不行為濕氣所壞而為瘡瘍也膏粱之變亦是言厚滋味過度而使榮氣逆行凝於經絡為瘡瘍也此邪不在表亦不在裡唯在其經中道病也以上內經所説俱言因榮氣逆而作也遍看諸瘡瘍論中多言二熱相搏熱化為膿者有隻言熱化為膿者有言濕氣生瘡寒化為熱而為膿者此皆癰疽之源也宜於所見部分用引經藥併兼見證中分陰證陽證先瀉榮氣是其本本逆助火濕熱相合敗壞肌肉而為膿血者此治次也宜遠取諸物以比一歲之中大熱無過夏當是時諸物皆不壞爛壞爛者交秋濕令大行之際也近取諸身熱病在身止顯熱而不敗壞肌肉此理明矣標本不得邪氣不服言一而知百者可以為上工矣瘍醫準繩又曰靈樞經云榮衛稽留於經脈之中則血泣而不行不行則衛氣從之而不通壅遏而不得行故熱大熱不止熱勝則肉腐肉腐則為膿然不能陷肌膚骨髓不為焦枯五臟不為傷故名曰癰熱氣淳盛下陷肌膚筋髓枯內連五臟血氣竭當其癰下筋骨良肉皆無餘故命曰疽疽者上之皮夭以堅上如牛領之皮癰者其皮上薄以澤此其候也鬼遺方云癰之痛只在皮膚之上其發如火焚茅初如黍米大三兩日如掌面大五七日如碗麵大即易治如腫冷發渴發逆治之難愈疽發或如小癤觸則徹心痛四邊微起如橘皮孔色紅赤不全變膿水不甚出至七八日疼悶喘急不止若始發腫高五七日忽平陷者此內攻之候也又云癰疽有三等毒氣浮淺屬腑毒氣深沉屬臟毒氣猛烈而行經絡或淺或深無定五臟六腑皆受之毒難為調理唯宜急切於癰發諸處不問虛實高腫起盛光澤疼痛只在皮膚之上熱急脹滿或有癢疼別無惡候初用溫藥平氣次用排膿發穴治癰所謂平氣者犀角飲之類其方用犀角連翹漏蘆甘草當歸肉桂皆發表之藥也所謂發穴者乃棘針之類用皂角刺為君甘草川芎乳香為佐使亦托裡之藥也然不若潔古東垣諸方發表托裡為穩當又曰疽發諸處不拘大小惟起在背廣一尺二尺三尺皮厚而紫黑高腫不常內疼如錐刺攻擊滿悶應四肢重疼前心亦痛余處發猶可唯虛處及近筋骨處若膿毒未潰即傷爛筋骨肉損為疽者屬五臟毒氣深沉多氣伏硬堅實而不宜緩慢治之須內實五臟外透皮膚令軟勻和即膿透宜用內托實臟氣之藥排膿勻氣乃可不比癰之毒氣浮淺也毋作一類治之又曰凡一切瘡腫始覺患起高腫五七日忽平陷者此是內攻之候也急以內托散及內補湯藥補填臟腑令實最怕透膜膜穿十無一生矣婁全善曰癰之邪淺其稽留壅遏獨在經絡之中而專攻於外故初發時自表便發熱患處便如碗如盆高腫而痛甚者縱欲下陷得正氣內固不肯受故或便祕或發渴發逆以拒之是以骨髓終不焦枯五臟終不傷也疽之邪深其稽留壅遏內連五臟而不專攻於外故身體無熱患處或不腫痛甚者聲嘶氣脫眼黑眼小十指腫黑如墨多死也治之之法癰之初發當以潔古法為主表者散之里者下之火以灸之藥以敷之膿未成者必消膿已成者速潰也疽之初發當以鬼遺方為主補填臟腑令實勿令下陷之邪蔓延外以火灸引邪透出使有穴歸著而不亂則可轉死回生變凶為吉今世外科不分癰疽一例宣熱拔毒外以五香耗其氣內以大黃竭其血終不能自悟其用藥之非惜哉潔古云瘡瘍者火之屬須分內外若其脈沉實當先疏其內絶其源也其脈浮大當先托裡恐邪氣入內也有內外之中者邪氣至甚遏絶經絡故發癰腫經曰榮氣不從逆於肉裡乃生癰腫此因失托裡及失疏通又失和榮衛也治瘡之大要須明托裡疏通行榮衛三法托裡者治其外之內疏通者治其內之外行榮衛者治其中也內之外者其脈沉實發熱煩躁外無焮赤痛甚邪氣深於內也故先疏通臟腑以絶其源內疏黃連湯外之內者其脈浮數焮腫在外形證外顯恐邪氣極而內行故先托裡以防其干也內托復煎散內外之中者外無焮惡之氣內亦臟腑宣通知其在經當和榮衛也當歸黃耆湯用此三法之後雖未瘥必無變證亦可使邪氣峻減而易痊也三因云癰疽瘰癧不問虛實寒熱皆由氣鬱而成經曰氣宿於經絡與血俱澀而不行壅結為癰疽不言熱之所作而後成癰者此乃因喜怒憂思有所鬱而成也精要云癰疽憤郁不遂志欲之人多犯此疾張景嶽曰凡瘡瘍之患所因雖多其要惟內外二字證候雖多其要惟陰陽二字知此四者則盡之矣然內有由臟者有由腑者外有在皮膚者有在筋骨者此又其淺深之辨也至其為病則無非血氣壅滯榮衛稽留之所致蓋凡以鬱怒憂思或淫欲丹毒之逆者其逆在肝脾肺腎此出於臟而為內病之最甚者也凡以飲食厚味醇酒炙煿之壅者其壅在胃此出於腑而為內病之稍次者也又如以六氣之外襲寒暑之不調侵入經絡傷人榮衛則凡寒滯之毒其來徐來徐者其入深多犯於筋骨之間此表病之深者也風熱之毒其來暴來暴者其入淺多犯於皮肉之間此表病之淺者也何也蓋在臟在骨者多陰毒陰毒其甚也在腑在膚者多陽毒陽毒其淺也所以凡察瘡瘍者當識癰疽之辨癰者熱壅於外陽毒之氣也其腫高其色赤其痛甚其皮薄而澤其膿易化其口易斂其來速者其愈亦速此與臟腑無涉故易治而易愈也疽者結陷於內陰毒之氣也其腫不高其痛不甚其色沉黑或如牛領之皮其來不驟其愈最難或全不知痛癢甚有瘡毒未形而精神先困七惡疊見者此其毒將發而內先敗大危之候也知其陰陽內外則癰瘍之概可類見矣然此以外見者言之但癰瘍之發原無定所或在經絡或在臟腑無不有陰陽之辨若元氣強則正勝邪正勝邪則毒在腑在腑者便是陽毒故易發易收而易治元氣弱則邪勝正邪勝正則毒在臟在臟者便是陰毒故難起難收而難治此之難易全在虛實實者易而虛者難也速者易而遲者難也所以凡察癰疽者當先察元氣以辨吉凶故無論腫瘍潰瘍但覺元氣不足必當先慮其何以收局而不得不預為之地萬一見病治病且顧目前則鮮不致害也其有元氣本虧而邪盛不能容補者是必逆敗之證其有邪毒熾甚而脈證俱實者但當直攻其毒則不得誤補助邪所當詳辨也全書馬益卿癰疽論曰人有四肢五臟一覺一寐呼吸吐納精氣往來流而為營衛暢而為氣色發而為聲音陽用其形陰用其精此人之常數所同也至其失也蒸則生熱否則生寒結則為瘤贅陷則為癰疽伍氏曰癰疽之疾有三十餘證曰熛發痼發石發岩發蜂窠發蓮子發椒眼發連珠發竟體發腸癰內發腦發背發眉發腮頷發肺癰瓜瓠發大率隨病淺深內外施治不可遲緩初發如傷寒脈浮而緊是其候也又曰五臟六腑俞穴皆在背凡患瘡證有傷臟膜者多致不救腑氣浮行於表故癰腫浮高為易治臟血沉寒主裡故疽腫內陷為難治又曰癤者節也癰者壅也疽者沮也一寸至二寸為癤三寸至五寸為癰一尺為疽一尺至二尺為竟體疽若脈洪數者難治脈微澀者易治初覺宜清熱拔毒已潰則排膿止痛膿盡則長肌敷癡當酌輕重順逆而審治之發揮曰大抵發背腦疽脫疽腫痛色赤者乃水衰火旺之色可治若黑若紫則火極似水之象乃其腎水已竭精氣枯涸也決不治又骨髓不枯臟腑不敗者可治若老弱患此瘡頭不起或腫硬色夭堅如牛領之皮脈更澀此精氣已絶矣不可治或不待潰而死有潰後氣血不能培養者亦死後漢律曆志驚蟄晷長八尺二寸未當至而至多病癰疽脛腫蔣示吉曰夫虛極傳變驚悸怔忡牙關緊閉而臥不寧或發熱惡寒作渴自汗盜汗手撒身熱脈洪大按之如無俱惡證也説約又曰根腳赤暈口不收此餘毒未盡之故又曰膿少肉白肉不長此停住寒邪之過又曰破傷風皆因風襲破傷濕亦為濕侵又曰初起宜腫不宜癢潰後作癢是長肉潰後宜癢不宜痛初起不痛是純陰又曰不痛大痛非佳兆或麻或癢最難醫又曰飲食不化脾虛飲食不思胃弱陳實功曰夫癰者壅也為陽屬六腑毒騰於外其發暴而所患浮淺因病原於陽分中蓋陽氣輕清浮而高起故易腫易膿易腐易斂誠為不傷筋骨易治之證疽者沮也為陰屬五臟毒攻於內其發緩而所患深沉因病原稟於陰分中蓋陰血重濁性質多沉故為傷筋蝕骨難治之證也凡年壯氣血勝毒則順年老毒勝氣血則險七情六欲發則為疽為痰核癭瘤之類七情者喜傷心怒傷肝憂傷肺思傷脾悲傷於魂魄恐傷腎驚傷膽六欲者耳聰聲音眼觀物色鼻聞香氣舌貪滋味心帷天地意握萬方諸病諸瘡皆由於此等之情欲也六淫之氣發則為癰為風癬疥癩之類六淫者風為四時不正浩蕩肅殺之氣發而最能中人寒乃節候不調疾風暴雨冰雪嚴寒所傷或口貪生冷之物暑因亢晹酷日爍火流金濕熱熏蒸而中濕從坐臥久陰卑濕之地或身驟臨風雨潮氣所侵燥為陰虛內熱消爍津液不能滋潤臟腑以致皮膚枯稿便乾為燥火生於心緒煩擾醇酒膏粱房欲不間所動邪氣客於臟腑經絡關節之內積襲日久或待內傷或因外感邪氣觸而發之也又有膏粱厚味醇酒肥鮮炙煿爽口快心不顧銷陰爍臟興陽澀精取之快意於一時不覺陰銷平日大瘡惡毒多起於膏粱不生於黎藿但凡患癰疽未有不先傷五臟而後發之者當辨陰陽順逆治之總之瘡瘍漫腫難治焮腫易愈漫腫者肉腫瘡不腫焮腫者瘡腫肉不腫順證根腳鮮明險證四圍平塌經曰氣盛兮頂自高而突起血盛兮根腳束而無疑此之謂也正宗馮魯瞻曰癰疽之疾多生膏粱炙煿嗜欲之人虛邪熱毒煎熬氣血而成癰者壅也壅滯於陽絡也大而高起屬於陽其脈浮數故多由於六腑疽者沮也沮伏於陰經也平而內發屬於陰其脈沉數故多由於五臟癤者如錯癤之結著也瘡者毒之總名也經曰諸痛癢瘡皆屬心火夫諸瘡之中即惟背疽疔瘡最為急證次莫如腦疽腸癰喉癰亦其急者也錦囊又曰夫人之瘡腫因內熱外虛為風濕之所乘蓋肺主皮毛脾主肌肉氣虛則膚腠開而風濕所乘且脾虛而內熱即生瘡也腫者由寒熱之毒氣客於經絡使血澀而不通壅結成腫風邪內作者無頭無根氣血相搏者有頭有根壅結盛而熱勝血則為膿矣其毒小者氣血自然能潰能收不必憂治大而重者血氣恐難任之必假藥力佐助氣血以為運行逐毒之本又曰夫癰疽皆由膏粱之家濕熱氣逆所結且多犯肥白之人氣居於表中氣必虛者初起即以涼血活血散結解毒大劑連進內外夾攻務使消散即勢大毒盛一時不能散盡亦必十消七八以免後來口舌生瘡內攻之患縱使潰膿保無大害若失於救治則熱毒內陷其膜必壞多致凶危然書云五發癰疽者謂發背發腦髮鬢發眉發頤是也但人之一身血氣稍有壅聚莫不隨所而至豈特此五者而已發背者乃五臟風熱六腑邪毒貫於筋骨之間發於經絡之內外雖如錢里可著拳慎勿忽略若初起紅腫高起者則易陰塌平陷者則難至於發腦發眉髮鬢發頤地位不同總因伏陽結滯邪毒上壅隨其經絡而發氣血旺者受毒則輕氣血衰者每因致危然云毒者即氣血不和偏勝壅滯之謂也治者必須憑脈以救陰陽氣血之偏則毒滯自散而危者可安若誤認毒為有迹之物寒涼攻削則陰滯之毒是必愈致其危即陽盛之毒亦必難潰難長蓋由氣血不和而致病豈可更令氣血不調而增病乎又曰夫癰疽之生始於喜怒哀樂之不時飲食起居之不節或金石草藥之發動寒暑燥濕之不調陰陽不平而蘊結榮衛凝澀而腐潰輕者起於六腑浮達而為癰重者發於五臟沉澀而為疽淺者為癤實者為癰深則為疽也發於外者為背癰腦疽鬢眉等疽發於內者為肝癰肺癰腸臍等癰外證易識內證難明太陽經虛從背而出少陽經虛從鬢而出陽明經虛從髭而出督脈經虛從腦而出齊德之曰大凡生疽皆只如黍粟粒許大其狀至微人多不以為急此蘊大患宜速辨之不可自忽若能防止於未形理之於未成或朝覺而夕治求治於良醫則必無危困矣若因循慢忽詢於庸醫致令膿血結聚委之於命束手待斃不已去道遠乎以致筋骨敗遺穿通臟腑死者十有八九矣可不慎與蓋瘡疽之人託命庸醫任意措置危殆立至若用良醫則可保痊愈不可不擇辨之何難若能飽讀經書久諳證候湯藥熟嫺洞明色脈性情仁善孝義忠信臨事不惑處治有決方為良醫委用勿疑然後要在病人自克不可恚怒悲憂叫呼忿恨驕恣性情信任口腹馳騁勞役惟宜清靜恬淡耐煩為宜精義又曰腦疽頭項咽喉生疽古法多為不治濕熱上壅者十之二三陰火上炎者十之八九調治得當庶可保全岐天師曰人有背生癰疽或生於胸腹之間或生於頭面之上或生於手足之際皆是五日之內猶當內散五日之外必須動刀五日之內以消毒聖神丹一劑即消二劑全愈不必三劑倘五日之內不曾服過消毒聖神丹其瘡必致成膿奔潰外口必小而內宅自大譬如賊居深山關隘必窄而其中巢穴自必修廣若不直搗其堅則延蔓無已是必民化為盜故須用金刃去其口邊腐肉使內毒之氣不藏用三寸長刀闊止三分兩邊俱利其鋒厚半分少尖一邊手執定眼看定心注定一刀橫畫一刀直畫人必少厥不必驚慌少頃自定後以末藥敷上膏藥貼之大約一個膏藥敷末藥二錢貼上即止痛敗膿盡出一連三日即消盡矣內服托裡聖神丹二劑可以不須多服此治陽證瘡瘍之法也陽證瘡瘍必然突起寸余其色紅腫發光疼痛呼號者是若陰證癰疽內消之法與陽證同治至於破潰之治法絶不相同大約陰證癰疽其色必黑暗痛亦不甚但覺沉沉身重昏悶其瘡口必不突起或現無數小瘡口以欺世人急用散寒救陰至聖丹總之陰證宜用溫熱散之不可用寒涼解之也外用膏藥加生肌末藥五錢貼之一日兩換始可蓋陰證癰疽多生於富貴膏粱之客功名失志之人心腎不交陰陽俱耗又加憂愁抑鬱拂怒號呼其氣不散乃結成大毒無論在背在頭在腹在脅在手在足俱是危證若服吾藥又用吾陰陽至聖膏無不生全蓋陽證可以涼解而陰證必須溫散也祕録雷真君曰血燥肺干而又生癰疽者多不可救恐無血以濟之也此等病多得之膏粱之人縱情房幃精血大耗又忍精而戰精不化而變為膿血乃陰毒非陽毒也若以治陽毒法治之則死矣當以化癰湯主之一劑而陰變為陽矣二劑而未潰者全消已潰者生肉三劑即愈四劑收功神效之極倘瘡口大潰大爛已成壞證者肯服此方亦斷無性命之憂堅守長服斷必收功蓋此方消毒而不散氣尚補而不尚攻治陰毒之癰疽實有鬼神莫測之妙祕録華真君曰夫癰疽之作皆五臟六腑蓄毒不流氣血壅滯而成病其發也有處其生也有歸假令發於喉舌者心之毒發於皮毛者肺之毒發於肌肉者脾之毒發於筋脈者肝之毒發於骨髓者腎之毒發於內者五臟之毒發於外者六腑之毒故在外曰潰在內曰壞在上曰從在下曰逆發於上得之速發於下得之緩感於六腑則易治受於五臟則難療凡癰疽之近骨者多冷近膚者多熱近骨者久不愈則化血為蟲近膚者久不愈則傳氣成漏成蟲者則多癢少痛成漏者則多痛少癢內虛外實者則痛多而癢少外虛內實者毒易腫而易消血出不止者內多死膿膿清不厚者元陽不足瘡潰而嘔吐無度飲食少進者皆癰疽毒熾使然腫候證之多端務宜詳察施治祕録汪省之曰瘡瘍雖火之屬須分內外以治其本經曰膏粱之變足生大疔其源在裡發於表也受如持虛言內結而發於外皆是從虛而出也假如太陽經虛從鬢而出陽明經虛從髭而發督脈經虛從腦而發治當疏通以絶其源經曰地之濕氣感則害人皮肉筋脈其源在外感則內行也治當托裡以防邪氣內侵經曰營氣不從逆於肉裡乃生癰腫此邪氣至盛遏絶經絡故發癰腫是內外之中者治當和營衛為主理例又曰凡發背腦疽脫疽腫痛赤色乃水衰火旺之色尚可治若黑或紫火極似水為腎水已竭精氣已涸決不治竇夢麟曰發背內攻平塌用手按之如牛頸之皮上有黃泡出腥水乃毒入於肺若不速治即死經驗全書周文採曰凡人年四十以上頂項鬢頤背膂腰脅或筋骨之上所視不見之處稍有瘡癤便不可輕易待之若視之怠慢以為常疾每見至微至著喪命者多矣便宜急治之庶幾得救譬之救火初起則易救至於燎原之勢不可撲滅耳集驗又曰夫五發癰疽者謂發背發腦髮鬢發眉發頤是也人之一生血氣周流而無間稍有壅聚莫不隨所至而發焉又豈特五者哉俗以癌痼瘭附於癰疽之列以是為五發豈知瘭與痼癌不過壅疽之一物古書僅有所謂瘭疽則瘭亦同出而異名也若癌與痼前所未聞合是為五發其可乎夫發背者乃五臟風熱六腑邪毒灌於筋骨之間發於經絡之內榮衛虛損氣血衰殘所致也其初發如粟米大最不可輕忽後必大發也若初起紅腫高起者後必不為害故曰外形如粟中可容谷外貌如錢里可著拳如惡毒深管寸長深滿膿血交黏用藥可痊若膿臭穢無絲此血敗氣衰陽絶陰盛必難療理羅曰頭面赤腫耳前後尤甚脈浮緊按之洪緩此寒覆皮毛郁遏經絡熱不得升聚而赤腫經云天寒地凍則水冰人氣在中皮膚致腠理閉汗不出血氣強肉堅澀當是之善行水者不能注冰善穿地者不能鑿凍善用針者亦不能取四厥必待天溫冰釋凍解而水可行地可穿人脈亦猶是也又曰冬月閉藏水冰地坼故用藥多而少針石也宜用苦溫之劑溫經散寒則已所謂寒微腠理以苦發之以辛散之也宜以托裡溫經湯麻黃苦溫發之者也防風辛溫散之者也升麻苦平葛根甘平解肌專治陽明經中之邪故以為臣血流而不行者則痛以香白芷當歸身辛溫以破血散滯濕熱則腫蒼朮苦甘溫體輕浮力雖壯能泄皮膚腠間濕熱人參甘草甘溫白芍藥酸微寒調中益氣使托其里也故以為佐各銼如麻豆大用稱水煮餌之以薄衣覆其手以厚被覆其身且臥於暖處則經血溫腠理開寒乃散陽氣伸大汗出腫減八九再服去麻黃防風加連翹牛蒡子痛腫悉去經言汗出則瘡已信哉薛立齋曰瘡瘍之作皆由膏粱厚味醇酒炙煿房勞過度七情鬱火陰虛陽湊精虛氣節命門火衰不能生土營衛虛弱外邪所襲氣血受傷而為患當審其經絡受證標本緩急以治之陳良甫曰外面如麻里可如瓜外小如錢內可容拳陳自明曰病有甚而致生有微而致死病證難辨死生何從決乎答曰發背潰透內膜者死未潰內陷面赤唇黑便汙者死煩悶者不治潰喉者不治陰患入腹者不治入囊者不治鬢深寸許者不治頤後一寸三分名鋭毒亦不治無此者生流注雖多療之必愈集驗云癰疽之名雖有二十餘證而其要有二陰陽而已發於陽者為癰為熱為實發於陰者為疽為冷為虛故陽發則皮薄色赤腫高多有椒眼數十而痛陰發則皮厚色淡腫硬狀如牛領之皮而不痛又有陽中之陰似熱而非熱雖腫而實虛若赤而不燥欲痛而無膿既浮而後消外盛而內腐陰中之陽似冷而非冷不腫而實赤微而燥有膿而痛外雖不盛而內實煩悶陽中之陰其人多肥肉緊而內虛陰中之陽其人多瘦肉緩而內實又有陽變為陰者草醫涼劑之過也陰變而為陽者大方熱藥之驟也然陽變陰者其證多猶可返於陽故多生陰變為陽者其證少不能復為陰矣故多死然間有生者此醫偶合於法百中得一耳觀此則癰與疽但有陰陽深淺內外虛實之分而無大小之別精要乃謂二寸至五寸為癰五寸至一尺為疽者謬也胡公弼曰凡癰疽發深而不知痛者乃胃氣大虛必死之證為肉死而不知痛也青囊蔣示吉曰六腑積熱發於肌膚之間高腫而痛如碗如盆曰癰五臟積熱攻注肌膚初發如粟或如豆許與肉俱平而不高腫或作赤色時作癢痛曰疽説約心法曰已潰未潰忽咬牙寒戰系氣虛不能勝毒毒隱攻裡之兆又曰潰後膿水忽多忽少瘡口如蟹吐沫者系內膜已透是為逆證又曰腫瘍時若無正氣衝托則瘡頂不能高腫焮痛潰瘍時若無真陰相滋則瘡根不能收束紅活收斂凡視瘡之頂高根活不論老少定知氣血有餘龔子才曰癰疽者皆由氣血不和喜怒不時飲食不節寒暑不調使五臟六腑之氣怫鬱於內以致陰陽乖錯氣血凝滯而發也亦有久服丹石燥熱之藥熱毒結深而發也但此疾多生於膏粱富貴之人以其平昔所食肥膩炙煿安坐不勞嗜欲無節以致虛邪熱毒內攻煎熬氣血而成也經曰諸痛癢瘡皆屬心火者蓋心主血而行氣若氣血凝滯夾心火之熱而主癰疽之類也然所感有淺深故所發有輕重大小之不同也六腑積熱騰出於外肌肉之間其發暴甚皮腫光軟侵展廣大者癰也五臟風毒積熱攻注於肌肉其發猛惡初生一頭如新㾦癗白色焦枯觸之而痛應心者疽也熱於皮膚之間是以浮腫根小不過二三寸者癤也夫癰生於六腑若燎原之火外潰肌肉疽生於五臟沉澀難療若陶室之燧內潰骨髓癰則易療惟難將息而遲瘥疽則難療而易痊復諸瘡之中惟背疽疔瘡最為急證其外莫如腦疽腸癰喉癰之類亦其急者也治癰疽之證須要察其是實是虛是冷是熱或重或輕對證用藥無失先後次序凡人年四十已上頭頂鬢頤背膂腰脅或筋骨之上所視不見之處但稍有瘡癤便不可輕易待之若視之怠慢以為常疾每見從微至險喪命者多矣便宜速急治之庶幾得救譬之救火初起則易救至於燎原之勢不可撲滅矣凡瘡未破毒攻臟腑一毫熱藥斷不可用若已破潰臟腑既虧飲食不進一毫冷藥亦不可用此是先後次第之要訣也論病有六不治扁鵲論醫病有六不治驕恣不論於理一不治也輕身重財二不治也衣食不能適三不治也陰陽並臟氣不定四不治也形羸不能服藥五不治也信巫不信醫六不治也雲林子曰越人之論一三四五六是矣二則於豫心有未適然者何也輕者彼輕也重者彼重也彼輕而我重之則彼之生可活矣不然彼以一吝而喪生固病者之不智豫以一吝而不治亦醫者之不仁噫古之神醫如此意猶存則世醫可知矣功過格無名氏輯醫士貧富一體細心審察定方療一輕疾不取酬一功療一關係性命重疾雖取酬準十功不取酬者準百功若待極貧人並能施藥不吝照錢數記功雖一劑藥不滿十文亦準一功倡募刻一濟人善書隨緣樂助易倡首勸募難故特記五十功助者以施之多寡記功為師就一人學業品行兼全準百功遇貧人危疾助醫藥錢米百錢準一功貧人偶為之者雖十錢五錢與百錢同論疫癘設局施藥施醫百錢準一功普施應病丸散膏藥百錢準一功刻施經驗良方百錢準一功祕一經驗方二十過誤一門人五十過醫家不弗錢功德山左邢尚卿諱朝耀輯診脈不輕率用藥極慎重雖貴藥勿減分兩遇急病請到即行不因錢少銀低遲滯不因飲酒宴樂推辭不因嚴寒暑雨憚於遠赴不因錯認病證曲自回護認病不真實必令邀醫會議細心詢問病由不可以病試藥不用霸道藥求其速效不用相反藥遲其痊愈疾本易治故意延之以圖厚謝外科尤甚造惡莫大焉不因重病險瘡背勒厚謝不與同道水火誤及病人上二條醫家尤多犯此弊最宜痛戒不妄驚病家不哄用假藥丸散尤戒不輕忽貧賤病人肯捐藥救治貧病施效驗方禁打胎藥不先待藥資到手然後發藥不定乘車轎費人財物不圖省便將藥同器浸製不因行得高抬聲價難人不方祕不傳假方與人
