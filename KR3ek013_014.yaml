body:
  text: 卷十四唇口部凡一切唇口上齶風疽瘡毒皆匯於此部中以便檢閲參治唇口望色辨證法唇口焦紅者吉唇紅者主煩躁渴飲也唇燥裂者是脾熱唇口俱腫赤者是熱極唇口俱青黑者是寒極唇白者主吐涎嘔逆諸失血證也唇黃者主脾受積熱也唇青者主血虛脾寒也唇紅紫者主蟲齧積痛也唇口舌胎有斷紋者難治唇口焦黑者凶唇青舌卷者死唇吻色青者死環口黧黑者死口張氣直出者死黑色自人中入口者死人中平滿者為唇反唇反者肉先死上唇生瘡蟲食其臟下唇生瘡蟲食其肛此傷寒狐惑證辨口味察證法口甜是肝熱脾濕胃有痰滯口淡是胃熱口乾口燥是胃家熱極口咸是腎水上泛腎熱口酸是肝熱口乾是脾熱口辛是肺熱口臭是胃熱口苦是心熱或膽熱更有因謀慮不決肝移熱於膽而口苦者蓋肝主謀慮膽主決斷倘事或膽不決則恚怒膽汁上溢而口苦口酸有脾胃氣弱木乘土位而酸者口糜有膀胱移熱於小腸而口糜潰爛者唇病門主論折衷云脾臟應腎通口氣脾胃為合足陽明胃之經其脈挾口環唇故脾胃受邪則唇為之病風則動寒則緊燥則干熱則裂氣鬱則生瘡血少則澀而無血色然六腑之華亦在唇經云脾胃大腸小腸三焦膀胱者倉廩之本營之居也其華在唇且肝脈督脈衝脈任脈皆絡於唇一有受邪則唇為病又曰喘而唇縮者死又曰小兒唇紅如丹即發渴候紅甚焦黑則危馮魯瞻曰唇本脾之外候然足陽明脈亦起鼻而環於唇故凡停滯傷脾必氣粗唇堅而發腫名曰唇腫至有傷寒或發驚候是以眉稜骨痛厥熱眩悶氣穢頤浮或舌苔或齒擊或狂逆則又色白腫甚名曰繭唇若至胃傷極而唇爛壯熱穢甚見痘者名曰胃爛唇梟十救一二如憂愁勞極滿唇破裂者亦名曰口糜如風寒乍乘唇青帶白者宜溫胃驅風如吐後而唇白者治宜養胃調氣如怒氣上衝唇青者治宜順氣平肝和胃更有唇口蠕動者脾虛不能收攝也唇緊門主論馮魯瞻曰唇口緊小不能開飲食不得入者名曰唇緊錦囊折衷云脾胃受邪則唇為之病得寒則緊也竇漢卿曰口緊一名月闕瘡雁來風蟲蝕瘡此證急用馬齒莧搗汁洗緊唇仍用黃薺汁灌去風痰冰片散吹之如毒氣歸心胸前脹滿上氣頻促下部洞泄不止必死難治胡景周曰唇緊濕爛乍好乍發經年纍月又名唇瀋音滲汁也乃脾家濕熱也唇緊門主方口唇燥裂橄欖泡湯服核中仁研爛敷患處又方胭脂敷唇緊濕爛經年纍月乍好乍發葵根燒灰豬脂和塗唇緊口小不能開鱉甲鱉頭燒為末敷之又方馬齒莧煎汁洗之乾者亦可唇緊難開灸法承漿穴在頤前唇下陷中足陽明之會一名天池灸三壯合谷穴在大指歧骨間一名虎口男左女右灸三壯冬月唇乾血出桃仁研爛豬油調塗唇瞤門主論竇漢卿曰脾胃受風則唇瞤動裙揭矣馮魯瞻曰如唇口蠕動者脾虛不能收攝也誤治為痰則津液愈枯筋脈失養抽掣諸證作矣錦囊唇瞤門主方唇口瞤動薏苡仁赤小豆防己甘草水煎服唇風門主論陳實功曰陽明胃火上攻其患下唇發癢作腫破裂流水不疼難愈宜銅粉丸泡洗內服地黃丸自愈正宗胡景周曰凡下唇腫痛或生瘡名驢嘴風上唇腫痛生瘡名魚口風以井華水常潤之乃可搽藥以芒硝塗之唇疔門主論申鬥垣曰唇疔初起如粟或不痛或癢甚其形甚微其毒極深其色或赤或白若唇口上下紫黑色者根行甚急不一日間頭面腫大三四日內即死不救醫者於初起時即用快刀割去此毒唇缺亦所難顧再從容補唇誠為救命之捷徑也啓玄陳遠公曰有唇上生疔者或口角旁或上下唇不論大小大約皆脾胃火毒也宜早散之否則毒氣熾炎必且艱於飲食往往有腐爛死者疔毒以愈小而愈橫也治法急泄其火毒不可損傷脾胃之氣毒易散矣救唇湯金銀花一兩紫花地丁一兩白果二十個桔梗三錢生甘草三錢知母一錢水煎服一劑疼止二劑疔消三劑痊愈已爛者又二劑此方治頭面疔瘡亦效此以白果桔梗引銀花地丁至生疔之處而盡去其毒也冰鑑心法曰唇生疔毒細看腿彎中紫黑筋用長針刺破血出即愈唇瘡門主論折衷云脾氣鬱則唇生瘡馮魯瞻曰有胃傷極而唇糜壯熱穢甚見痘者名曰胃爛唇梟十救二三錦囊唇瘡門主方唇瘡準繩甑上滴下汗敷之神效唇生瘡連年不瘥千金八月藍葉一斤搗汁洗之不過三日唇瘡準繩白荷花瓣貼之神效開裂出血者即止嘴唇破石蟹磨水搽之又方東壁土研細搽又方輕粉敷又方頭垢敷唇瘡痛癢黃柏末用野薔薇根取汁調塗唇口疽門主論蔣示吉曰又有脫疽生手足或生口面命難存說約胡公弼曰唇口疽即脫疽初起如粟其色如褐或如棗皮漸黑漸開漸大不知痛癢臭穢難聞小兒多從積熱之毒大人多因過服辛溫燥劑古人雖有割法大約六七日多死唇奇病門主論岐天師曰有人唇上生瘡久則瘡口長牙齒於唇上者此乃七情憂鬱火動生齒奇病也祕録唇奇病門主方煎方岐天師生地當歸白芍柴胡各三錢天花粉二錢黃連黃芩川芎各一錢白果十枚煎服摻藥岐天師冰片直殭蠶各一分黃柏炒三錢研細末摻之齒自消矣繭唇門主論陳實功曰繭唇乃因過飧煎炒炙煿又兼思慮暴急痰隨火行留注於唇此陽明胃經之證初起結如豆粒漸大如蠶繭突腫堅硬甚則作痛飲食妨礙或破流血久則變為消渴消中難治之證正宗竇漢卿曰此證生於嘴唇經云脾氣通於口又云唇本脾之外候又云脾之榮在唇故燥則干熱則裂風則瞤寒則揭若腫起白皮皺如蠶繭故命名曰繭唇也始起一小瘤如豆大或再生之漸漸腫大合而為一約有寸厚或翻花如楊梅如疙瘩如靈芝如菌形狀不一皆由六氣七情相感而成或心思太過憂慮過深則心火焦熾傳受脾經或食醇酒厚味積熱傷脾而腎水枯竭以致之須審其病證之因惟補腎水生脾血則燥自潤火自除風自息腫自消矣此亦異證所生者少人亦難曉若久不愈急用金銀烙鐵在艾火內燒紅燙之內服歸脾養榮湯庶易愈也若外用追蝕惡毒線結之法反為所傷慎哉慎哉若婦人患此陰血衰少故也宜四物逍遙散主之不拘金銀打成烙鐵每用艾火燃燒通紅乘熱燙患上再燃再燙一日止可五六次恐傷元氣須要擇上吉日不犯尻神燙畢用藥搓之庶不再生矣馮魯瞻曰驚證後齒擊狂逆唇白腫甚亦名繭唇錦囊汪省之曰繭唇初起已成無內證者用麻子大艾炷灸三壯蟾酥餅蓋日久漸消內證作渴者早服加減八味丸午服清涼甘露飲以滋化源如日久流血不止形體瘦弱虛熱痰生面色黧黑腮顴紅現口乾渴甚俱為不治也理例奎光曰繭唇癰屬陽明胃經痰火流注於唇而成結如豆大若蠶繭然突起堅硬甚者作痛飲食妨礙或破流血久則難治繭唇門主方繭唇烙後敷藥方竇漢卿莧菜陰乾燒灰三錢雞內金銅青兒茶枯礬各二錢輕粉雄黃各一錢麝香二分上為細末麻油調搽明日再用甘草湯洗淨再烙如前以平為度後用生肌散生肌散花蕊石醋煅兒茶雞內金血竭各二錢大紅絨煅灰黃連飛丹煅乳香各一錢共為細末加冰片一分乾摻甘露飲犀角生甘草生地銀柴胡枳殼麥門冬知母枇杷葉黃芩叉石斛茵陳各一錢引用淡竹葉七片燈心十根煎服狐惑瘡門主論馮魯瞻曰傷寒狐惑上唇生瘡蟲食其臟下唇生瘡蟲食其肛若蝕肛透內者不治錦囊又曰又有久嗽不已飢則胸中大痛須視上唇有白點如粞者此蟲齧其肺也用百部膏一味加烏梅檳榔與服下其蟲則愈肺蟲其形如繭令人咳嗽聲嘶也又曰凡腹中熱腸胃虛蟲行求食上唇有瘡曰惑蟲食其臟下唇有瘡曰狐蟲食其肛得此疾者十無一生又曰若腸頭作癢者多因大腸濕熱生蟲而蝕肛門久則齒根無色舌上盡白四肢倦怠唾血如粟心內懊憹而成危證初起宜服化慝丸心法曰小兒肛門作癢由蟲蝕也視其下唇內必有小白瘡或耳之前後結小核如串珠者是也宜內服蘆薈丸外用雄黃銅緑等分研細摻之狐惑瘡門主方蟲食下部肛盡腸牽者長股青背蛤蟆一枚雞骨一錢燒灰和勻吹入下部令深入屢效又方生艾川楝根煎湯熏洗補缺唇法法用孩兒骨一根放瓦鉢內將糠火煅過再研極細末止用一分松香研極細五分狗脊背上毛不拘多少瓦上焙存性研極細末止用一錢象皮一錢擂軟用熱酒泡浸瓦上焙研極細枯礬三分和勻再研極細末先將麻藥塗缺唇上後以小鋒刀刺唇缺處皮以磁碟貯流出之血調前藥即以繡花針穿絲釘住兩邊缺皮然後搽上血調之藥三五日內不可哭泣及大笑又怕冒風打嚏每日只吃稀粥俟肌生肉滿去其絲即合成一唇矣口眼喎斜門主論夫口眼喎斜皆血脈受病有筋病脈病之分多屬胃土也經曰足陽明與手太陽筋急則目為僻眥急不能正視是胃土之筋病喎斜也又曰足陽明之脈挾口環唇是胃土之筋病歪斜也以口目常動故風生焉耳鼻常靜故風息焉然筋者血所養脈者血之府經云脈勿榮則筋急兼之邪乘虛襲中於寒則筋急引頰口喎目歪中於風熱則筋脈縱緩或燥槁牽引皆令喎僻然氣血無病則雖熱未必緩雖寒未必急其寒其熱多由氣血之虛所致故不必以偏於左者為左寒右熱偏於右者為右寒左熱凡拘急之所即氣血所虧之處總之寒者病也熱者氣也氣所不及之處即為寒矣病矣豈有一經而寒熱之邪並中一病而寒熱之氣兩殊者耶明乎此則凡百病之客乎一人也雖有證候錯雜究其原則在一也靈樞言足陽明之筋頰筋有寒則急引有熱則筋弛縱故左寒右熱則左急而右緩右寒左熱則右急而左緩陽氣不得宣行故也經曰邪之所湊其氣必虛偏枯喎僻或左或右血脈不周而氣不勻也治宜補正氣行正氣疏風氣使氣勻則風順矣口眼喎斜門主方卒中風口喎燒酒一斤入小口瓶內燙熱入巴豆仁三粒口向左歪將病人右手掌捺在酒瓶口上看病人口一端正即不必熏矣如口向右歪則以病人左手捺瓶口上又方葦管長五寸以一頭插耳竅中四畔以面調塞密一頭納大豆一顆大艾圓燒之令燃灸七壯即瘥患左灸右患右灸左口眼歪斜萆麻子去殼研爛歪左塗右手心歪右塗左手心仍以熱水一盂安向手心須臾即正急洗去藥又方巴豆仁七粒去皮研爛歪左塗右手心歪右塗左手心仍以熱水一盂安手心須臾即正並頻以手抽掣中指又方石灰水調歪左塗右邊歪右塗左邊正即洗去又方皂莢去皮弦研末陳醋和塗歪左塗右邊歪右塗左邊干則更塗之以正為止又方鱔魚一條裝入竹管內以針將尾上深刺出血攤軟絹上左歪貼右右歪貼左即正亦有以雙綿錢染鱔魚血乘熱左歪以血線搭右嘴角內沿腮直牽至耳朵上系之右歪即搭左嘴角內即正又方酒煮肉桂濃汁以故布溻之口噤門主論口噤者足陽明之病頰車穴主之蓋陽明經絡挾口環唇循頰車而諸陽筋脈皆上於頭三陽之筋並絡頷頰夾於口風寒乘虛而客其經則筋攣急牙關緊而口噤又有風熱太甚痰涎滯膈風喜傷肝復能燥物是以筋燥徑迫而口噤此皆實邪之為病而中風之閉證也若在脫證則諸陽之氣脫去形骸管束無主故口開舌縱不收矣駱潛庵曰兒生三日不哭不乳是云口噤此胎受火毒攻心傳肺故乳食不進啼哭無聲連服延壽丹少許即愈推拿祕書小兒口水門主論小兒心胃火盛廉泉穴開則口中流水不絶又曰因大人與小兒嘻戲捏其腮頰則令小人淌口水俗云孕婦思食酸甜不得則嬰兒多淌口水小兒口水門主方驗方急救用熱水一盆入白礬一勺將兒兩足頻頻洗之立瘥又方鮎魚在小兒嘴上揩之口瘡門主論醫論選要曰夫口者脾之竅諸經多有會於口者蓋五味入口藏於脾胃為之運化津液以養五氣節宣微爽五臟之氣偏勝由是諸疾生焉故口瘡者乃脾氣凝滯加之風熱治當清胃瀉火馮魯瞻曰口瘡者心脾蘊熱也小兒陰氣未生陽氣偏盛又因將養過溫心脾積熱熏蒸於上而成瘡治宜瀉心化毒清涼為主若月內諸病而口無涎沫者凶又曰凡口舌生瘡初起不可便用涼藥敷摻恐寒凝不散內潰奔走久而難愈必先用辛輕升散而後清涼使鬱火達外再視其所因而治之更有中氣不足脾胃虛衰不能斂納下焦陰火被逼上炎以致虛陽口瘡丹溪所謂勞役過度虛火上炎遊行無制舌破口瘡又當從理中湯加附子治之若作實熱誤投涼藥則害又不止口瘡矣又曰口瘡者上焦實熱中焦虛寒下焦陰火各經傳變所致當分別治之如發熱作渴飲冷實火也輕則用補中益氣重則用六君子湯飲食少思大便不實中氣虛也用人參理中湯手足逆冷肚腹作痛中氣虛寒用附子理中湯晡熱內熱不時而熱血虛也用八物加丹皮五味麥冬發熱作渴吐痰小便頻數腎水虛也用八味丸日晡發熱或熱從小腹起陰虛也用四物參朮五味麥冬不應則用加減八味丸若熱來復去晝見夜伏夜見晝伏不時而動或無定處或從腳起乃無根之火也亦用前丸及十全大補加麥冬五味更以附子末唾津調抹湧泉穴若概用寒涼損傷生氣為害匪淺或問虛寒何以生口瘡而反用附子理中耶蓋因胃虛谷少則所勝者腎也水氣之逆而乘之反為中寒脾胃衰微之火被迫炎上作為口瘡經曰歲金不及炎火乃行復則寒雨暴至陰厥乃格陽反上行民病口瘡是也故用參朮甘草補其土薑附散其寒火得所助則接引退舍矣口瘡門主方口瘡砂仁火煅存性為末摻上即愈又方硼砂一錢五分寒水石一錢黃柏硃砂各七分冰片五釐研細先用苦茶漱淨再吹小兒口瘡不能吮乳蔡醫傳密陀僧末醋調塗足心瘡愈洗去又方小兒臥時以醋調湯瓶內鹼末書十字兩足心一切口瘡心法雞內金燒灰敷之立效又方湯液黃柏蜜炙赤一兩青黛一分研末頻摻口瘡並治喉癬喉癰閉塞鳳凰衣即哺雞蛋殼內衣微火焙黃橄欖核瓦上焙存性孩兒茶各等分共乳細每藥一錢加冰片五釐口瘡口疳搽患處喉證吹入即能進飲食白口瘡生明礬一錢硃砂二分共研末搽之口瘡連年不愈者乃虛火也天門冬去心麥門冬去心玄參各等分為末煉蜜丸彈子大每用一丸噙咽大人小兒口瘡久治不效附子為末醋調男左女右貼腳心小兒口瘡不能乳食白礬湯浸腳上半日頓寬或以礬末水調攤紙上貼腳心再以水濕之或用白礬如雞蛋大置好醋一盞中頻塗兒足千金方口舌一切諸瘡升麻射干各三兩柏葉一升苦竹葉五合大黃二兩生蘆根薔薇根白皮各五兩水四升同藥煎至一升去滓入生元參汁三合再煎再入生地黃汁五合再煎兩沸下蜜煎濃安舌上細咽口疳門主論申鬥垣曰口疳是濕熱在於胃口蓋口乃脾之竅若不早治恐蝕其口唇腮頰則凶啓玄奎光曰糜疳令人滿口糜爛與小兒口疳同治又曰口疳宜用絲綿攪洗忌用布口疳門主方驗方錦囊人中白煅二兩銅青三錢五分冰片二分麝香一分上研極細冷濃茶淨口吹少許候痰涎流盡再吹一二次即愈甚者加西牛黃一分更好又方啓玄橄欖核一兩兒茶五錢冰片二分研細搽之三次痊愈口疳簡便甘蔗皮燒研搽甚效腮腫及口疳難痊急救半夏香附各等分用雞子清共搗如泥左病貼右湧泉穴右病貼左湧泉穴貼之即瘳口疳紅棗十枚燒存性冰片二分研吹患處又方縮砂仁殼煅研擦之又方活幼新書雞肫皮燒存性敷之立效小兒口疳大人疳瘡好兒茶一兩五倍子炒黃四分黃柏蜜炙五分冰片二分研細吹搽口糜門主論馮魯瞻曰滿口生瘡者名曰口糜若白細點子生於上齶者名曰七星瘡也總不外乎心肺胃三經之蘊熱隨所經而清利之間有泄瀉脾元衰弱不能按納下焦陰火是以上乘為口瘡糜爛者不可誤投涼劑宜用六君子理中湯之類錦囊又曰口者五臟六腑所貫通也為脾之竅臟腑之氣皆由此出入若門戶也臟腑有偏勝之邪則口有偏勝之證陳實功曰口破虛火色淡而白斑細點甚者陷露龜紋脈虛不渴此因思煩太甚多醒少睡治以知柏四物湯加丹皮肉桂實火者色紅而滿口爛斑甚者腮舌俱腫脈實口乾此乃膏粱厚味醇酒炙煿心火妄動治以涼膈散正宗又曰如口舌生瘡舌乾黃硬作渴者加減八味丸又曰宜吹赴筵散吐涎則愈俱禁水漱奎光曰凡腮口腫爛用筋縛絲綿蘸水輕攪如覺痛易治不然系死肉多難治也又曰傷寒口糜者因心脾受熱鬱火熏蒸治宜理心脾其脈則洪大有力而為實熱者也更有脾元中氣不足不能按納下焦陰火以致口糜生瘡宜服附子理中湯者不可不知口糜門主方柳花散正宗黃柏一兩肉桂一錢青黛三錢冰片二分研極細每用少許吹之赴筵散正宗黃連黃柏黃芩北細辛山梔子乾薑各等分研細吹之口瘡糜爛得效生硫黃研末水調塗手足心效即洗去又方衛生細辛末醋調貼臍上又方集簡鐵鏽末水調敷患處又方簡便荸薺燒存性研末摻之又方普濟釜底墨研細搽又方肘後黃葵花燒末敷之又方聖惠葵根燒研敷效口破集驗滑石一錢辰砂三錢冰片二分研末擦患處口爛喉腫舌乾馬錢子一兩麻油煎黑色取起去毛研細吹入喉中即涼妙甚口臭門主論昔有人年二十餘歲口臭如登廁醫者曰肺金本主腥金為火所乘火主臭而然也久則成腐腐者腎也亢極則反兼水化其病在上宜湧之如法果愈錦囊醫論選要曰口臭者乃臟腑臊腐之氣蘊積於胸臆之間而生熱沖發於口也竇漢卿曰病人瘥後口中臭腹中絞痛者皆因熱毒積於脾家急用蘇子降氣湯服之全書馮魯瞻曰蓋齒屬腎腎氣一虛則虛火壅於上焦故乃口臭名曰臭息口臭門主方驗方朱丹溪香薷治口臭如神煎濃湯含之又方內府連翹為末糊丸如食韭蒜後用茶吞二三錢口中濁氣即化為清氣神效口臭穢及䘌齒腫痛北細辛一兩煎濃汁熱嗽冷即吐去又方川芎泡湯日漱五七次半月愈口氣熱臭干甜瓜子去殼研細蜜少許調丸如棗核大食後含化敷牙齒上剪口瘡門主論心法曰脾胃積熱口角生瘡俗云小兒誤用剪刀剪飲食瓜果食之即生剪口瘡胡公弼曰小兒口角生瘡名夾口瘡又名燕口瘡澄曰剪口瘡又名夾口瘡脾熱者多患此亦有父母遺毒小兒口角色白生瘡久而不愈又當以真蟾酥磨汁調白降丹塗之自愈否則必發瘡毒又當分別不可只以脾熱治之剪口瘡門主方口角爛瘡亂頭髮洗淨煅存性研細豬油調搽又方蒸籠上或鍋蓋上氣汗水塗之小兒燕口瘡青布燒灰塗之或用蜜調亦可燕口瘡頭髮燒灰存性米飲調服並敷鵝口瘡門主論陳實功曰鵝口瘡乃心脾二經胎熱上攻所致其證滿口皆生白斑雪片甚則咽間疊疊腫起致難乳哺哺時必多啼叫急用青紗一條裹箸頭上蘸新汲水揩去白苔以淨為度重手出血不妨隨以冰硼散搽之正宗馮魯瞻曰鵝口者乃胎熱蘊蓄心脾上蒸於口舌上遍生白屑如鵝之口錦囊湯氏曰初生口內白屑滿舌上不能吮乳謂之鵝口急以亂髮纏指頭蘸薄荷汁或井華水拭淨如不脫用四寶丹摻之若初生百日內口中生白點無數拭之則去少刻復有口角流涎日夜啼哭不乳又名鵝口白屑皆由胎熱或母貪嗜酒面遺熱於兒用甘草黃連各一錢煎濃以帛裹手指口中拭去再不復發赤水玄珠奎光曰鵝口一名雪口先須攪去白衣用口疳藥方載咽喉門吹頻攪頻吹內服犀角汁或犀角解毒丸駱潛庵曰小兒胎火攻心上齶有白點狀如粟米名曰乳鵝或口內白沫滿口上齶戴礙狀如鵝口開而不合語聲不出服食多艱皆由熱毒上攻也宜延壽丹推拿祕書鵝口瘡門主方青液散錦囊治鵝口瘡及舌瘡舌菌重舌青黛朴硝各一錢龍腦一字研細鵝翎挑少許掃上又方正傳白楊樹枝燒取瀝塗之神效四寶丹湯氏雄黃三錢硼砂二錢甘草一錢冰片三分五釐上為末蜜水調塗或乾摻又方黃丹研細竹瀝調塗口中洗之其白點即落一日塗三次再用辰砂益元散燈心湯調下神效驅腐丹奎光祕方五倍子去蛀打碎炒黑色硼砂各二錢共研細末凡口糜鵝口略吹少許不可過多小兒心有客熱滿口生瘡天南星末米醋調敷腳心又方吳茱萸末米醋調塗足心又方鵝糞泡湯拭洗口內即愈口內肉球門主論竇漢卿曰口內生肉球有根線長五寸余吐球出方可飲食以手輕捻痛徹至心服涼血疏風瀉火煎藥再用麝香二錢分二次水調服吹麝香散根化而愈全書口內肉球門主方麝香散竇氏直麝香一錢梅花片三分真川連一錢研極細蘆管吹入一日夜五六次三日其根自化而愈口中飛瘍門主論竇漢卿曰口中卒然有腫轉脹轉大此名飛瘍也漸至殺人用小刀點出血鼠黏子解毒湯加紅花丹皮噁心腹脹滿者難生全書重齶門主論馮魯瞻曰重齶者初生上齶有物脹起宛如懸癰者是也是脾胃挾熱氣血不能收斂治法速宜綿纏長針露鋒刺腫之處去其惡血則消若再生再刺否則有妨乳食總緣小兒出胎之後血氣收斂成血則口內舌上喉頰皆淨若血氣不斂胎毒上攻則乃成矣錦囊又曰兒初生次日即看口中上齶如有白泡子即以銀挖耳輕輕刮破其泡子須刮出勿令落入喉中仍以京墨搽之此泡一老非惟難刮且兒不乳變生撮口諸證初生下地即不啼哭不能吞乳奄奄如死者急看喉間懸癰前齶上有一泡用指摘破以帛拭去惡血勿令咽下即能通聲吞乳保生碎事上齶生瘡門主論竇夢麟曰上齶生瘡如黃粟口中腥臭外證手怕冷腳怯寒此脾經積熱也上齶屬脾脾氣通於口故脾經受熱則上齶生瘡也先用蚌水布蘸絞淨患處宜服清脾降火湯再吹冰片散無不效矣宜戒酒色全書附取蚌水法用蚌洗淨打碎取水另用濕棉布濾清若夏布孔遇水即疏滑倘蚌中螞蝗蟲竟濾在水碗中矣偶入口中將何處之其棉布孔遇水即緊密則螞蝗蟲不能下故用之口喉之證屬太陽之火然蚌乃河中之物屬太陰之精故借水以濟火事又曰上齶生瘡其因乃上焦積熱脾之氣凝也然上齶屬脾故脾經受熱則上齶生瘡也務須服清上膈去風痰之藥上齶癰門主論王肯堂曰上齶癰狀如紫葡萄又名懸癰屬手太陰手厥陰心包絡令人寒熱大作舌不能伸縮口不能開闔惟欲仰面而臥鼻中時出紅涕乃手足少陰經及三焦積熱所致過時不治飲食不下神昏脈亂者死準繩陳實功曰上齶紅腫脹痛成膿為癰膿出自愈其病雖凶卻是標病無妨膿脹痛者開之損而痛者益之其患自安正宗經曰不放膿非法也馮魯瞻曰上齶癰即垂癰宛如蘆籜盛水之狀治宜刺之令泄去青黃赤血鹽湯洗拭蜜調一字散少許敷之再生再刺可也錦囊醫論選要曰懸癰生於上齶雖不關於咽喉所以暴腫者亦熱氣使然也不急療則殺人竇漢卿曰懸癰生於上齶形如紫李墜下抵舌其人口不能言舌不能伸頭不能低仰面而立鼻中時出紅涕若不速治毒入於腦即死用銅箸排開口竹披針破癰頭用鹽湯攪淨血出盡用冰片散吹入患處閉口以待藥化自然咽下連吹三五次全書奎光曰懸癰生口內上齶紫泡如豆大者是也上齶癰門主方上齶癰日久腫硬下垂不潰者食鹽煅枯礬各等分研細湯調以箸頭蘸點患上含腮瘡門主論申鬥垣曰小兒初生時腮內如米豆大一小瘡次日漸大蝕破腮頰故名含腮瘡若不早治破透難療宜二金散啓玄含腮瘡門主方二金散啓玄雞內金鬱金各等分研細先用鹽湯洗淨吹之呵缺門主論呵缺者脾胃中氣不足精神勞倦所致也經曰足陽明之脈是動則病振寒善伸數缺缺者陽引而上陰引而下乃精與神不相依而陰與陽不相守也
