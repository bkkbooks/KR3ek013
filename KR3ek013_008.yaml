body:
  text: 卷八論神燈照法程山齡曰凡腫在頭面以上者不宜艾灸恐引火氣上攻宜用神燈照法神乎其神用火照散安紙捻中以麻油浸點每用神火三枝離毒半寸許照之自外而內俾藥氣透入皮色紫滯者立轉紅活瘡勢平塌者立轉高聳仍須不時照之則毒氣頓解轉陰為陽以收全功且此法不止施於頭面即如發背等毒亦宜用之此癰疽門之寶筏宜互相參考以神其用也十法火照門主方火照散即神燈照法正宗硃砂血竭沒藥各三錢麝香五分明雄三錢共為細末用綿紙條長寸許每條裹藥三分真麻油浸點自外而內周圍照之瘡毒隨藥氣解散自不內侵臟腑初用三條漸加至五七條瘡勢漸平又漸減之熏罷隨上紅升丹貼上膏藥若腫勢漫延周圍用藥敷之如再熏須洗去末藥其貼膏藥處藥油可不必洗熏發背對口神方盛旦明此二種瘡初起先用絲瓜葉煎水洗之如無熱水洗之後用兒茶血竭乳香去油沒藥去油各一錢研勻捲入草紙內成條浸在麻油內浸透點著照瘡頭熏之一點露水相似其毒自散如知覺遲已腫不可當亦要熏過最效論艾灸法李東垣曰夫疽則宜灸不宜烙癰則宜烙不宜灸丹瘤腫毒宜溻漬之腫皮光軟則針開之以泄其毒治瘡之手法殆不過此而各有所宜故聖惠方論曰認是疽瘡便宜灸之一二百壯如緑豆許火灸後覺似焮痛經一宿乃是火氣下徹腫內熱氣被火導之隨火而出所以然也若其瘡癢宜隔豉餅子灸之其餅須以椒薑鹽蔥相和搗爛捏作餅子厚薄如疊三錢為率當瘡頭豉餅子上灸之若覺太熱即抬起又安其上餅子若干更換新者尤佳若其瘡痛即須急灸壯數多為妙若其膿已成者慎不可灸即便針開之即得瘥也若諸瘡經久不瘥變成漏者宜用硫黃灸法灸之其法硫黃一塊看瘡大小口上安之別取硫黃少許放火上燒用叉尖挑起點硫黃令著三五遍取膿水乾差為度若發背初生即宜上餅灸法灸之初覺背上有瘡疼癢頗異認是發背即取淨土水和捻作餅子徑一寸厚二分貼著瘡上以艾炷灸之一炷一易餅子其瘡粟米大時可灸七七壯其瘡如錢許大日夜不住灸以差為度已上數方並依本方一一親驗所以載之愚謂瘡醫自幼至老凡所經驗必須寫之嘗記疳瘻惡瘡諸醫不驗者取蠐螬剪去兩頭安瘡口上以艾灸之七壯一易不過一枚無不效者又法用乞火婆蟲灸之同前法纍驗之神效人皆祕之往往父子不傳又法赤皮蒜搗爛捏作餅子一如豆豉餅子灸法灸之彌佳十書精義蔣示吉曰凡瘡初起不論陰陽俱用灸火灸之是開門逐賊法也説約又曰試瘡頭在何處好於瘡頂灸法先以濕紙覆瘡上立視其紙先干處乃瘡結頭處也又曰初起一二日灸可立愈三四日十愈六七若過七日之關內膿將成則不可灸矣程山齡曰隔蒜艾灸灸法勝於刀針書云不痛灸至痛痛灸不痛時凡治癰疽疔毒流注及一切無名腫毒以大蒜切片安瘡頂上用陳艾炷安蒜上香點灸之其艾炷大小看瘡毒大小取裁若癰疽之大者以蒜搗餅敷上必須不痛者灸至大痛而止疼痛者灸至不知痛而後止若灸不透反能為害若內已有膿則不須灸矣十法陳實功曰癰疽發背怎生醫不論陰陽先灸之不痛灸至痛痛灸不痛時正宗又曰考之方書凡頭上瘡面疔毒腎俞發俱禁艾火以頭為諸陽之首又乃純陽無陰之位生瘡俱是亢陽熱極如再加艾火使毒氣熾甚隨後必加大腫最能引動內痰發之必死又有面瘡為陽毒腎俞發多因房勞素虧腎水枯竭真陰銷爍其源必致內外乾涸多成黑陷昏悶而死又有病人元氣素虛肢體倦怠精神昏憒瘡形平塌脈來微散空虛及素畏艾火者俱不可灸灸之恐生昏暈且無真氣抵擋火力有損無益誠至言也又曰如陰瘡數多者艾炷不及其事以蒜搗爛鋪於瘡上再以艾又鋪蒜上點火灸之必知痛甚為效此為火氣方得入里知痛深處方是好肉蓋艾火撥引郁毒透通瘡竅使內毒有路而外發誠為瘡科首節第一法也貴在早灸為佳陳文治曰疔毒藥力不能速到非艾火不解惟艾火功效甚捷周文採曰初起陰塌不起便可用艾多灸或隔蒜灸之如痛灸至癢如癢灸至痛此最妙法也若疽瘡已成亦可用火針烙開瘡口則易治也集驗又曰癰疽初發小點一二日間急以大蒜頭橫切如錢放頂上頓小艾炷灸之五壯而止若形狀稍大以黃棉紙蘸酒全貼腫上先於干處為筋腳於先干處灸之或兩處先干皆灸但五七壯而止又法屈指從四圍按之過痛處是根就是重按深入自覺輕快即此灸之更於別處灸若或大腫即搗蒜為餅焙乾蘸醋灸熱更換頻罨或以尉斗火於蒜餅上尉之更換熱餅頻尉如覺患處走散即以綿帛蓋覆勿令氣泄俟少間敷藥凡癰疽展大如龜之形且看頭向上下先灸其前兩腳次灸其尾或紅筋走緊而長從盡處灸之須留頭並後兩腳勿灸若盡灸之不惟火氣壅聚使毒無從解散又攻入里也若辨認不明以香白芷三分漢椒桑白皮各一分連葉蔥白十根新水煎湯入酸醋半盞淋洗少頃其筋自現可以辨驗頭尾朱丹溪曰頭面患毒如純陰平塌頑麻非艾灸無功但艾炷宜小如麥粒樣式以神其用也竇漢卿曰凡灸於患上頭聚處切蒜片如錢厚放患處置艾壯於上以火燃之若蒜皮枯焦再易之待將畢三五壯著貼肉上灸為佳至少者以二十一壯為期頭頂上五壯七壯為期艾炷只可如豆大但面心為陽中之陽禁灸其陽證不可灸者何恐火氣內侵勢益昌大以火濟火故戒之惟陰證可灸鬱氣濕熱積毒借火以拔之然以火濟水自有相生之妙臨灸畢用口吹火致滅其火功借氣得以入內其瘡易散設或灸不能即散者灸遲之故也雖不能全散大能解毒易潰膿易斂口功難盡述惟臟毒坐馬癰以蚯蚓泥作餅代蒜片艾灸之以熱為度易之如前共十四壯為期若附骨疽癰毒入骨髓擇天氣晴朗和暖尻神不犯吉日午時灸至申時止徐問病者骨中熱否若果骨中熱方效凡灸不拘壯數忽然爆起者是病根脫矣即止之凡灸須飲食半飽並飲好酒以通經絡以和氣血再令善笑談者以亂其痛亦妙方也體虛者禁灸經驗全書薛立齋曰余按瘡瘍之證有諸內必形諸外在外者引而拔之在內者疏而下之苟或毒氣鬱結瘀血凝滯輕者藥可解散重者藥無全功是以灼艾之功為大凡灸法未潰則拔引郁毒已潰則補接陽氣每治四肢患瘡氣血無虧者灸之皆愈頭乃諸陽之首及腎俞一穴在於兩腰脊旁並弱甚之人內無真氣抵擋火氣數證禁灸當慎察之王肯堂曰灸乃從治之意惟頭為諸陽所聚艾炷宜小而少若少陽分野尤不可灸灸之多至不救亦有因灸而死者蓋虛甚孤陽將絶其脈必浮數而大且鼓精神必短而昏無以抵擋火氣宜其危也汪省之曰夫瘡有膿水惡物漸漬根深者用面硫黃蒜三物一處搗爛看瘡大小捻作餅子厚三分安瘡上用艾炷灸二十一壯一壯一易矣後四五日用翠霞錠子紝入瘡內使歹肉盡去好肉長平然後貼收斂之藥內服補接之劑調理則瘥矣元戎曰瘡瘍自外而入者不宜灸自內而出者宜灸外入者托之而不內內出者接之而令外故經云陷者灸之灸而不痛痛而後止其灸灸而不痛者先及其潰所以不痛其灸而痛者先及其未潰所以痛而次及將潰所以不痛也精要曰腦為諸陽所會頸項近咽喉腎俞皆致命之所俱不可灼艾劉河間灸刺法謂凡瘡瘍須分經絡部分血氣多少腧穴遠近從背出者當從太陽五穴選用至陰在足小指外鍘去爪甲角如韭葉大通谷在足小指外側本節前陷中束骨在足小指外側本節後陷中崑崙在足外踝後跟骨上陷中委中在膕中央約紋中動脈從鬢出者當從少陽五穴選用竅陰在足小指次指端去爪甲如韭葉俠溪在足小指次指歧骨間本節前陷中臨泣在足小指次指本節後間陷中陽輔在外踝上四寸輔骨前絶骨端如前三分陽陵泉在膝下一寸外廉陷中從髭出者當從陽明五穴選用厲兌在足大指次指去爪甲如韭葉內庭在足大指次指外間陷中陷谷在足大指次指間本節後陷中衝陽在足趺上五寸骨間動脈去陷骨三寸解谷在衝陽後一寸五分腕上陷中從腦出者則唯絶骨一穴在外踝上三寸動脈中詳見癰疽灸經劉宗厚曰此謂癰疽初發宜灸之也然諸瘡患久成漏者常有膿水不絶其膿不臭內無歹肉尤宜用附子浸透切作大片厚兩三分於瘡上著艾灸之仍服內托之藥隔二三日再灸之不五七次自然肌肉長滿矣至有膿水惡物漸漬根深者郭氏治用白麵硫黃大蒜三物一處搗爛看瘡大小捻作餅子厚約三分於瘡上用艾炷灸二十一粒一灸一易後隔四五日方用翠霞錠子並信效錠子互換用之插入瘡內歹肉盡去好肉長平然後貼收斂之藥內服應病之劑調理即瘥矣蓋不止宜灸於瘡之始發也大抵始發宜灸要汗下補養之藥對證至灸冷瘡亦須內托之藥切當設反逆不唯不愈恐致轉生他病之患也經曰肉之大會為谷肉之小會為溪肉分之間溪谷之會以行營衛以會大氣邪溢氣壅脈熱肉敗營衛不行必將為膿內鎖骨髓外破大䐃留於節腠必將為敗積寒留舍營衛不養肉縮筋肋肘不得伸內為骨痹外為不仁命曰大寒留於溪谷也此用附子灸者蓋此義也灸漏瘡論李氏云治疽之法灼艾之功勝於用藥蓋使毒氣外泄譬諸盜入人家當開門逐之不然則入室為害矣凡瘡初發一二日須用大顆獨蒜切片三分厚貼疽頂以艾隔蒜灸之每三壯一易蒜瘡潰則貼神異膏如此則瘡不開大肉不壞瘡口易斂一舉三得此法之妙人所罕知若頭頂見疽則不可用此法五府極觀碑載伍氏曰凡用蒜餅灸者蓋蒜味辛溫有毒主散癰疽假火勢以行藥力也有隻用艾柱灸者此可施於頑疽痼發之類凡赤腫紫黑毒甚者須以蒜艾同灸為妙張景嶽曰癰疽為患無非血氣壅滯留結不行之所致凡大結大滯者最不宜散必欲散之非藉火力不能速也所以極宜用灸然又有孫道人神仙熏照方其法尤精尤妙若毒邪稍緩邪深經遠而氣有不達灸之為良若毒邪熾盛其勢猛急而垂危者則宜用熏照方更勝於灸也馮魯瞻曰瘡毒潰後風寒侵襲作腫痛者用韭菜杵爛炙熱敷患上冷則易之或搗成餅放患上艾圓灸之使熱氣入內錦囊張仲景曰凡人一見背有瘡口外現者不可小視之急用蒜切片一分厚貼在瘡口上用艾火燒之痛者燒之不痛不痛者燒之知痛而止且不可不痛而止也此法最妙世人不識而我特表而出之以治發背之初起者蓋一經灸之則毒雖火化以火攻火又何疑焉願世醫留意心法云灸乃開結破硬之法倘有一點白粒如粟米起四圍微腫如錢便當於米粒上著艾火十四五壯三日內灸者只灸成瘡而散三日外者其腫漸少宜多灸之或灸火著處則結熱可伸灸處先潰則毒勢分減庶免展開不致下陷及壞筋骨傷氣血也所謂灸至不痛者謂著皮肉未壞處則痛火至著毒處則不痛必令火氣至著毒處方止所謂灸至痛者謂初著毒處不痛至好肉則痛必令火氣至好肉方止畏灸者或用獨蒜瓣或豆豉餅或椒薑鹽搗爛捏作餅子如當三錢厚鋪艾灸之熱則易新餅亦可散也艾灸門主方陳艾圓此法因瘡毒純陰平塌頑麻非艾灸無功每歲端午日蓄蘄艾一二斤愈久愈良用時取葉為炷或加麝香末木香末雄黃末搓成圓安蒜上灸之灸一切無名大毒胡桃劈開去仁取殼用極幹人糞填滿合腫處以艾火灸之殼穿則易已成即流稠黃水未成即消散也艾火灸成瘡春用柳絮夏用竹膜冬用壁喜窩秋用新棉貼之制艾法胡公弼須在伏天取真正蘄艾不拘多少撿淨以篩子中揉擦再將細篩又揉篩眼中漏下者方成艾茸或以粗布包搓亦可再於烈日中曬極干收貯灸瘡最妙騎竹馬灸法準繩治一切瘡瘍無有不愈令病人以肘憑几伸臂腕要直用蔑一條自臂腕中曲處橫紋男左女右貼肉量起直至中指尖盡處截斷為則不量指甲卻用竹槓一條令病人脫衣正身騎定前後用兩人扛起令病者腳不著地又令兩人扶之勿令傴僂卻將前所量臂篾從竹槓坐處尾骶骨盡處直貼脊背量至篾盡處為則用墨筆點定此只是取中非灸穴也卻用薄篾作則子量病人中指節相去兩橫紋為則男左女右截為一則就前所點記處兩邊各量一則盡處即是灸穴兩穴各灸五七壯疽發於左則灸右疽發於右則灸左甚者左右皆灸蓋此二穴心脈所過之處凡癰疽皆心火留滯之毒灸此則心火流通而毒散矣起死回生之功屢試屢驗豆豉餅理例此法專灸一切癰疽對口頑瘡惡毒腫硬不潰及潰而不斂用江西豆豉為末唾津和作餅如錢大厚如三文錢覆患處以艾鋪餅上灸之以患者寬快為度未成者即消已成者雖不全消其毒頓減大有奇功桃殼灸法畢驛承集大核桃劈開去肉殼背鑽一孔內填溏雞屎令滿將有屎一面合毒頂上孔外以艾灸之不論壯數惟取患者寬快殼熱另換一殼如法灸之其毒立好真奇方也蠟灸法祕方集驗凡患發背對口一切無名腫毒及久近臁瘡先看所患腫處用生面水調作圈依腫處大小圍之圈高寸余實貼皮上勿令滲泄圈外密施布帛數重防火氣侵余肉患者安身勿動圈內鋪極好黃蠟片屑上以炭火灸至黃蠟溶化毒淺者皮上覺熱痛不受灸便止毒深者全不覺熱痛再下蠟隨化隨添至圈滿仍前熱火灸至蠟沸初覺癢後覺痛久之不要忍乃去火以少水微澆滾蠟上俟冷揭去蠟近皮者俱帶青黑色此毒隨蠟拔去淺者一二灸便內消深者三四灸亦膿去腫消立愈灸畢外搽生肌玉紅膏此百治百驗法也灸身上諸毒獨蒜一個加雄黃不拘多少共搗成餅貼上將艾放餅上灸一壯即愈論針烙法李東垣曰夫瘡疽之候證候不一針烙之法實非小端蓋有淺有深有遲有速宜與不宜不可不辨蓋疽腫皮厚口小腫多膿水出不快者宜用針烙癤皮薄惟用針以決其膿血不可烙也如有未成膿以前不可以諸藥貼熁溻漬救療以待自消久久不消內潰成膿即當棄藥從其針烙當用火針如似火筋磨令頭尖如棗核樣圓滿用燈焰燒須臾作炬數溫油燒令赤於瘡頭近下烙之一烙不透即須再烙令透要在膿水易出不假按抑近代良醫倉卒之際但以金銀鐵錠其樣如針者可通用之實在泄其毒也或只以木炭熟火猛燒通赤蘸油烙之尤妙烙後實者捻發為紝虛者以紙為紝上蘸藥紝之上以帛攤溫熱軟黏膏藥貼之常令滋潤勿令燥也夫瘡疽既作毒熱聚攻蝕其膏膜肌肉腐爛若不針烙毒氣無從而解膿瘀無從而泄過時不烙反攻其內內即消散欲望其生豈可得乎嗟乎此疾針烙取差實為當理然忌太早亦忌稍遲嘗見粗工不審其證淺深妄施針烙之法或瘡深針淺烙毒氣不得泄以致內潰或瘡淺烙深誤傷良肉筋骨腐爛或抑擦掀動益加煩痛或針之不當別處作頭或即時無膿經灸方潰遂使痛中加痛真氣轉傷詳其所由不遇良醫也以此推之凡用醫者不可不擇縱常醫療之得痊者幸矣十書蔣示吉曰又有烙法膿已成而皮厚肉深難潰若不用針烙使腐肉挾毒熱之氣久留肉腠間將好肉亦化為膿血此烙法所以有功於潰瘍也若根淺而皮薄者又何必假此以賣弄乎由此觀之皮薄者用白降丹皮稍厚者則用針皮極厚而毒附骨者非烙不可其法看瘡頭最大者即是膿竅用熟鐵五六寸長大針下半截用竹箸劈開夾針在內以意消息用半寸即露針尖半寸於外用一寸即露針尖一寸於外以線扎緊庶深淺不致有誤也將針於麻油燈火上燒令紅透量瘡深淺及所生之處深淺虛實插入一寸或至二三寸若未有膿暫時以紙捻紝入候次日取出膿色黃白即愈赤黑防出鮮血若在虛處及筋骨節縫處不得亂行針烙針烙入肉猶宜稍斜恐透內膜也烙遲固為不佳太早亦生變證膿深針淺內膿不出外血反泄瘡淺針深內膿雖出好肉受傷此用針烙之難也説約申鬥垣曰頑癤瘡瘤妒其膿半載醫治不得愈者當用烙法烙之易愈也周文採曰夫頑癤瘡瘤妒其膿半載整年不得愈者何也蓋於男婦不慎房欲故多有之小兒亦因吮其欲乳更是一理也亦有因跌撞妒其膿血未及將愈又跌之故此成其頑癤不能得愈百藥不效當用銀錢銀匙燒赤於癤上烙之不數日而痊先勿令知之此真良法也如無銀錢以銅錢代之亦可胡公弼曰凡火烙針圓如箸大如葦挺頭圓平長六七寸一樣二枚蘸香油於炭火中燒紅看瘡頭形處烙之宜斜入向軟處一烙不透再烙必得膿非其時所出皆生血當其時所出黃膿瘀肉不假按抑仍以紙捻紝之勿令口合又曰凡瘡毒發在虛處及筋脈骨節之處斷不可亂行針烙即用針烙法宜稍斜防透膜也論刀針砭石法素問曰夫癰氣之息者宜以針開除去之夫氣盛血聚者宜石而瀉之此所謂同病異治也通評虛實論曰所謂少針石者非癰疽之謂也癰疽不得頃時回靈樞曰鈹針者末如劍鋒以取大膿李東垣曰夫上古制砭石大小者隨病所宜也內經謂針石砭石鑱針其實一也今時用鐮者從聖濟總録丹毒論曰法用鐮割出血明不可緩也合扁鵲云病在血脈者治之以砭石此舉素問血實宜決之又氣血形志論曰形樂志樂病生於內治之以砭石蓋砭石者亦東方來為其東方之民其病多瘡瘍其法宜砭石砭石之用自有證候非止丹瘤也但見腫起色赤遊走不定宜急鐮之先以生油塗赤上以鐮鐮之要在決泄其毒然而此法不可輕用忌其太深內經所刺皮無傷肉以其九針之用而各有所宜也砭鐮之法雖治瘡疽不可輕用也砭鐮論周文採曰如針砭傷其經絡白膿赤汁逗流不止宜服內托黃耆圓生黃耆去蘆焙銼八兩當歸洗焙三兩木香沉香肉桂去粗皮不見火乳香別研各一兩諸香忌見火共為細末用緑豆粉四兩生薑自然汁煮糊為丸桐子大不拘時溫湯送下四五十丸集驗又曰古人用砭石鑱針刀鐮乃決瘡毒之器械也所謂瘡毒之宜出血可急去之意不可延緩恐毒勢變走內經云病在血脈決之於針石也岐伯五治論云砭針乃磁石鋒芒利快決毒甚便乃東方之民善於此用於瘡癤丹瘤塗生油於赤腫之上砭之出血妙在合宜亦不可過之耳薛立齋曰若元氣虛弱誤服克伐患處不痛或肉將死急溫補脾胃亦有生者後須純補之藥庶可收斂若妄用刀針刺肉出血則氣無所依附氣血愈虛元氣愈傷矣何以生肌收斂乎陳實功曰凡瘡十日以後自當腐潰為膿如期不作膿腐仍然堅硬者此屬陰陽相半之證瘡根必多深固若不將針當頭點入寸許開竅發泄使毒氣無門而出必致內攻也倘內有膿又便易出此為開戶逐賊之意如十日外瘡雖不腐潰形尚紅活焮熱腫痛此雖膿遲後必有出此又不必針之蓋由元氣不能充足或失用補托藥又誤用寒涼或蓋覆未暖多致膿遲有此證者宜用補中健脾大托補藥以得膿為效又以十五日至二十一日為期過此外者縱有稀膿但元氣被毒相拒日久必致耗散誠難歸結也正宗又曰如瘡半月後仍不腐潰不作膿者毒必內陷急用鈹針品字樣當原頂寸許點開三孔隨瘡之深淺一寸二寸皆可入之入之不痛再深入不妨隨將藥筒預先煮熱對孔竅合之良久候溫取下如拔出之物血要紅而微紫膿要黃而帶鮮此為血氣營運活瘡如拔出瘀血紫黑色敗氣穢稀水無膿者此為氣血內敗死瘡程山齡曰凡毒有脹痛緊急膿已成熟無暇待灼艾火照者即宜用刀法開之但刀法須在的確膿熟之時又須要深淺合度以左手按腫處先看膿之成否如按下軟而不痛隨手起者膿已成也按下硬而痛或凹陷不起者膿未成也已成膿者宜刺未成膿者宜姑待之若脾虛氣弱者宜托補之又須看其膿之深淺以手指按下軟肉深者其膿必深軟肉淺者其膿必淺若膿淺刀深恐傷好肉膿深刀淺恐毒不出而內敗最宜斟酌更有伏骨之疽膿腐於內皮色不變宜以刀刺入深處放出瘀膿或灸開大口放出之不得姑息因循俾毒氣越爛越深也其下刀須利刃勿令病者見恐驚彼耳砭法施於頭面及耳之前後因其漫腫無頭急用此法以瀉其毒取上細磁鋒用竹箸夾定緊扎放出鋒約半分許對患處另以箸敲之偏刺腫處俾紫血多出者為善刺畢以精肉貼片時再用雞蛋清調乳香末潤之蓋此地不宜成膿因頭內中空耳前後更多曲折提膿拔毒恆多未便故砭法斷宜早施十法薛立齋曰若患於背髀之間凡人背近脊處並髀皮里有筋一層患此處者外皮雖破其筋難潰以致內膿不出令人脹痛苦楚氣血轉虛變證百出若待自潰多致不救必須開之引之兼以托裡常治此證以利刀剪之尚不能去似此堅物待其自潰不反甚乎此非氣血壯實者未見其能自潰也又曰瘡瘍膿成而及時針之不數日即愈矣常見患者皆畏針痛而不肯用又有恐傷肉而不肯用殊不知瘡雖發於肉薄之所若其膿成必腫高寸余瘡皮又厚分許用針深不過二分若發於背必腫高二三寸入針止寸許況患處肉既已壞何痛之有何傷之慮凡怯弱之人或患附骨等疽待膿自通以致大潰不能收斂氣血瀝盡而已者多矣又曰凡瘡既成膿皮膚不得疏泄昧者待其自穿殊不知少壯而充實者或能自解若老弱之人氣血枯稿或兼攻伐太過不行針刺膿毒乘虛內攻穿腸腐膜鮮不誤事若毒結四肢砭刺少緩則腐潰深大亦難收斂毒結頰項胸腹緊要之處不問壯弱急宜針刺否則難治大抵瘡瘍之證感有輕重發有深淺淺者腫高而軟發於血脈深者腫下而堅發於筋骨然又有發於骨髓者則皮肉不變故古人制法淺宜砭而深宜刺使瘀血去於毒聚之始則易消若膿成之時氣血壯實者自出怯弱者不行針刺鮮有不誤凡瘡瘍透膜十無一生雖以大補藥治之亦不能救此可為待膿自出之戒也心法曰上古有砭石之制內經有九針之別制雖不同而去病之意則一也其瘡瘍一科用針為貴用針之際雖雲量其潰之淺深尤當隨其肉之厚薄若皮薄針深則反傷良肉益增其潰肉厚針淺則膿毒不出反益其痛用針者可不慎哉至於附骨疽氣毒流注及有經久不消內潰不痛者宜燔針開之若治咽喉之患當用三稜針若丹瘤及癰毒四畔焮赤疼痛如灼宜用砭石去血以泄其毒則重者減輕者消如洪氏室患腹癰膿脹悶瞀以臥針刺出膿即蘇一人患囊癰膿熟腫脹小便不利幾殆急針之膿水大泄氣通而愈大抵用針之法迎而奪之順而取之所謂不治已成治未成正此意也今之患者或畏針而不用醫者又徇患者之意而不針遂至膿已成而不得潰或得潰而所傷已深矣卒之夭亡者十常八九亦可悲矣張景嶽曰經云天溫日明則人血淖溢而衛氣浮故血易瀉氣易行天寒日陰則人血凝澀而衛氣沉是以因天時而調血脈也故凡遇天寒水冰或陰氣凝滯之時欲行針刺則先當溫衣覆蓋或以艾葉炒熱或熱鹽熱衣類先尉其處務令血脈溫和而後刺之則血瀉氣行其病立已若血寒脈澀遽爾用針則邪毒不瀉徒傷良肉反以益其病也薛立齋曰凡元氣虛弱者必當補助脾胃禁用刀針若妄用之而去肉去血使陽隨陰散是速其危也孫真人曰針灸血出不止用人屎燒灰敷上立止神農所置九宮尻神坤外踝震牙口巽頭口乳中宮肩尻乾背面目兌手膊艮腰項離膝肋坎肚腳肘一歲起坤二歲震三歲巽四歲中宮五歲乾六歲兌七歲艮八歲離九歲坎十歲又是坤逐年順行周而復始如患人行年到處則忌針灸慎勿泛用免變他病四季人神春左脅夏在臍秋右脅冬在腰九部人神一歲為始起於臍一年行一位周而復始臍一心二肘三咽四口五頭六脊七腰八足九十二部人神一歲為始起於心一年行一位周而復始心一喉二頭三肩四背五腰六腹七項八足九膝十陰十一股十二十干日忌用針灸甲頭乙耳喉丙肩丁背心戊腹脾己腹脾庚腰肺辛膝壬腎足脛癸手足十二支日人神所在忌針灸子目醜腰耳寅胸卯脾鼻辰腰膝巳手午心未頭手申頭脊酉背戌面頭亥頭項逐月血忌日正月醜二月未三月寅四月申五月卯六月酉七月辰八月戌九月巳十月亥十一月午十二月子逐日人神所犯忌用針灸初一十一二十一日大拇指鼻柱手小拇指初二十二二十二日外踝髮際初三十三二十三股內牙齒足股肘初四十四二十四日腰間胃氣手陽明初五十五二十五日口舌遍身足陽明初六十六二十六日手掌胸前初七十七二十七日內踝氣衝膝初八十八二十八日手腕股內陰初九十九二十九日尻足膝脛初十二十三十日腰背內踝足趺人神所犯十二時辰忌用針灸子踝醜腰寅目卯面辰頭巳手午胸未腹申心酉背戌頭亥股男忌日壬辰甲辰乙巳丙午丁未辛未除日女忌日甲寅乙卯乙酉乙巳丁巳辛未破日男女忌日白虎黑道血支血忌月厭月殺月害月刑獨火針灸吉日丁亥丁卯丁丑甲辰甲申甲戌丙子丙午丙申丙辰壬子壬戌壬午庚午辛巳戊戌戊申己亥己未針灸凶日每月初八十五十八草三草四草八草九論瘡瘍用針灸勿忌尻神薛立齋曰夫針灸之法有太乙人神周身血忌逐年尻神逐日人神而其穴有禁針禁灸之論犯之者其病難瘳理固然也但瘡瘍氣血已傷肌肉已壞宜迎而奪之順而取之非平人可比之此何忌之有外科精義云瘡瘍之證毒氣無從而解膿瘀無從而泄反攻於內內既消敗欲望其生豈可得乎危惡之發於致命之所禍在反掌腹癰囊癰二便不通胸腹脹悶唇疔喉痹咽喉腫塞其禍尤速患者審之論敷藥法李東垣曰夫瘡腫生於外者由熱毒之氣蘊結於內也蓋腫於外有生頭者有漫腫者有皮厚者有皮薄者有毒氣深者有毒氣淺者有宜用溫藥貼熁者有用涼藥貼熁者有可以干換其藥者有可以濕換其藥者深淺不同用藥有異是以不可不辨也若瘡腫初生似有頭者即當貼溫藥引出其熱毒乃火就燥之義也於四畔赤焮處搗生寒藥貼熁之折伏其熱勢驅逐其邪惡撲火之義也夫生寒藥勢氣之精全性味雄健或有療者不本物理皆用藥草膏之類有勢力微欲使尫瘠者敵其勇夫不亦難乎又有粗工不審逆從便用寒藥敷貼趁逐邪毒復入於內歸於心肝十死八九矣大抵敷貼之法欲消腫散每血脈疏通寒氣逆從斷其去就焉慎不可執方無權安能散其鬱結不成膿乎其腫皮厚者以軟布或以棉花紙塗藥貼熁之待其藥干換腫皮薄者即用疏紗或薄紙塗藥貼熁之其藥未乾即當換之若至膿潰之後即貼溫肌生肉膏藥要在逐臭腐排惡汁取死肌生良肉全藉溫熱膏劑之力也切勿用寒涼之藥水調貼之夫血脈喜溫而惡寒若著冷氣透里即血滯難瘥矣十書貼熁法朱丹溪曰夫外施敷貼正與發表之意同經曰發表不遠熱大凡氣得熱則散冷則斂不可不知又曰敷藥之藥此可應酬輕小熱證若不辨陰陽之所由分妄敷涼藥其禍不小此誠不易之論戴院使曰有不敷藥時大痛敷即不痛有不敷藥不痛敷之則痛蓋寒熱風濕並憂怒等氣積而內攻則痛不禁敷藥拔出之故不痛也死血陰毒在中愈伏愈深愈不覺痛藥發之於外故反痛也汪省之曰外施敷藥正是發表之意經曰發表不遠熱大凡氣得熱則散得冷則凝庸工敷貼冷藥豈理也哉周文採曰敷者化也散也乃化散其毒不令壅滯也然瘡之緩急毒之冷熱則用藥亦有寒熱之異如赤腫焮甚者當用寒性藥敷之肉色不變而腫勢深暗者當用溫性藥敷之如不熱不涼者當以沖和膏敷之根腳走散者當用鐵箍鐵桶等膏敷之庶毒不走易於消散膿亦易熟也蔣示吉曰敷藥止可圍瘡之四旁中空瘡頭用白降丹點上以拔其毒自無倒陷之誤説約又曰潰後若根腳漸大紅腫不散惡證也宜用鐵箍膏箍之膿潰猶痛必有筋隔住內膿不得出用針挑引出之癰疽膿熟勢盈欲溢用白降丹點上半日自潰又曰制敷圍之藥第一要研的極細敷之則不痛調敷藥之法必須用抿腳攪至千餘下敷之方不脫臨敷之時敷藥必隔水頓溫庶藥力易達敷時中留一孔透氣使毒氣易泄不可不知此法又曰寒涼敷藥如芙蓉散大黃膏其患最大氣脈得寒則不行瘀血得寒則不散瘀肉得寒則不潰新肉得寒則不生竇漢卿曰凡制圍藥宜絶細則不痛和圍藥多加工夫攪千餘下其藥自稠則用輕手圍之留孔須如鵝卵形狀敷藥之外須用薄紙貼之務要扯碎貼上免崩裂疼痛之苦待圍藥略干再用調藥余汁潤之以助藥力況藥幹不能入肌肉借濕以通竅耳宜深詳之齊馬嗣明治楊遵彥發背取白麥飯石即粗理黃石堪作碓碾即磨刀粗石用釅醋淬猛火煅赤淬之令屑落醋中者良為末醋熬為糊厚塗立愈本草曰大凡石類多主癰疽此石治發背神良程山齡曰書云用膏藥貼頂敷藥四邊圍凡腫毒之大者將已成膿用白降丹或烏金膏貼瘡頭上然後用萬全膏蓋之四旁以鐵箍鐵桶芙蓉等膏敷之貼膏處取其出膿敷藥處取其消散並能箍束根腳不令展開共作三層敷圍法第一層用白降丹或烏金膏貼瘡正頂若漫腫無頭以濕紙貼上先干處是頭也第二層萬全膏貼之第三層以敷藥圍之桑皮紙扯碎蓋上如蜜調敷藥則頻以蜜水潤之如醋調敷藥則頻以醋汁潤之不特添助藥力亦且敷藥不致干憔然豫嘗用萬全膏遍覆腫處連根腳一齊箍住其中消處自消潰時自潰竟收全功可見此膏之妙也集驗云癰疽無頭起者用神豸膏靈龜膏拔毒膏鐵箍散貼即令消退潰膿者用靈龜膏貼之或用追毒膏去膿或用筒子吸膿有頭疽瘡每於洗後視赤暈闊狹用涼水調大鐵箍散成膏隆冬用溫水調如人肉溫貼之腫赤盛用生地黃自然汁調圍貼之法從四畔紅暈處圍貼用桑皮紙掩上瘡有旋生白粒散漫如米如豆者用銀簪腳撥去瘡眼用老皮散敷之再換新藥敷上凡熱多則赤焮腫散漫熱甚則紫黑外寒鬱亦紫血虛兼寒則青白大鐵箍散正鐵箍散乃常用之藥或因風寒熱及穢氣厭觸等證四時寒熱不同又宜從權設法熱者宜三黃散熱甚宜三消散有風者加羌活防風氣滯者加木香寒鬱者加桂穢氣觸者宜加香藥熏之腫處脆嫩者去白芨去敷藥時看毛下竅中當有汗珠此則血脈疏通熱毒消散赤暈漸縮膿潰痛止變逆為順皮毛潤活要作良肉但疽頂有些少腐開不用刀剪如藥下不生汗珠腐敗必闊必多也膿後圍貼則收散漫遺毒盡隨膿出瘡口貼拔毒膏藥如膿出不順用追毒膏惡肉不去用金寶膏敗肉去後圍貼則氣血易活新肉易長瘡口用長肉膏敷貼之藥與淋洗並行同功郭氏法云如是有頭瘡疽就便用硃砂備急膏一丸如黃豆大安於瘡頭上卻用軟黏膏藥蓋護之其瘡必破如瘡暈紫黑色外用宣毒散周圍敷住毒氣如瘡暈赤紅色用水澄膏敷之次日用堅峻碧雲錠子開了瘡口次用緊緩碧霞錠子去其歹肉稍淨卻用緩慢碧玉錠子生肌總名青金錠子不拘日數直待歹肉去淨單用膏藥貼之候膿水盡肌肉平方許貼生肌斂口之藥若依此法免教人受刀剪針烙之苦如是無頭癰腫待膿成用針刺破方以法收功也癰疽敷藥門主方鐵箍散吳丹垣陽瘡腫瘍根腳散漫五倍子一兩微炒生大黃四錢秋芙蓉葉六錢醋一盅入杓內熬滾投藥末攪勻敷患上留頂以紙蓋之干則以醋掃之一方照原方加寒食麵五錢陰疽以及皮色不變漫腫無頭者不可敷如意金黃散正宗癰疽發背諸般疔腫跌撲損傷濕痰流注大頭時腫漆瘡火丹風熱天泡肌膚赤腫乾溼腳氣婦女乳癰小兒丹毒凡外科一切諸般頑惡腫毒隨手用之無不應效誠為瘡家良便方也天花粉上白十斤黃柏色深者大黃薑黃白芷各五斤陳皮天南星蒼朮紫厚朴甘草各二斤共為咀片曬極乾燥用大驢磨連磨三次方用密絹羅篩出瓷器收貯勿令泄氣凡遇紅赤腫痛發熱未成膿者及夏月火令時俱用茶湯同蜜調敷如微熱微腫及大瘡已成欲作膿者俱用蔥汁同蜜調敷如漫腫無頭皮色不變濕痰流毒附骨癰疽鶴膝風等病俱用蔥酒調敷如風熱惡毒所生患必皮膚亢熱紅色光亮形狀遊走不定俱用蜜水調敷如天泡火丹赤遊丹黃水漆瘡惡血攻注等證俱用大藍根葉或水芭蕉根葉搗汁調敷加蜜亦可湯潑火燒皮膚破爛麻油調敷具此諸引理取寒熱溫涼制之又在臨用之際順合天時洞窺病勢使引為當也四虎散正宗天南星草烏半夏生用狼毒等分上為細末豬腦同搗遍覆瘡上留正頂出氣凡癰疽腫硬厚如牛領之皮不作膿腐者宜用鐵桶膏正宗發發背將潰已潰時根腳走散不收束者五倍子微炒一兩明礬四錢膽礬三錢銅緑白芨各五錢輕粉鬱金各二錢麝香三分上為極細末用陳米醋一碗杓內慢火熬至一小杯候起金色黃泡為度待溫用上藥一錢攪入膏內每用頓溫以新筆塗膏瘡根上以綿紙蓋其瘡根自生皺紋漸收漸小再不開大為效凡敷藥宜極細若粗則作痛不可不知一切根腳走散不能收束者用之收根束毒功效非輕治對口腦疽不必洗去舊藥逐日添藥恐動瘡口惹風也芙蓉膏陽瘡紅焮收根束毒芙蓉葉秋採六錢榆面二兩生大黃五錢皮硝一兩研細蔥汁童便調敷留頂初起敷之可消不特收束根腳敷大毒二法茅廁垢厚敷四圍中空出氣自消或用赤小豆紫蘇同研敷上立消敷一切大毒消腫吸毒法川貝母研末同白檳榔汁敷之有病之處即起白泡無病之處則起紅點如瘡遠志膏程山齡凡一切癰疽腫毒初起之時隨用遠志肉二三兩去心清油煮搗爛如泥敷患處用油紙隔布扎越一宿其毒自消屢試屢驗其效如神芙蓉菊花膏赤小豆芙蓉葉香附白芨菊花葉各四兩研細每末一兩加麝香一分米醋調塗圍住根腳或雞子清調亦可敷藥方紫花地丁去筋揉碎一兩白糖一撮秈米飯一團搗爛敷四圍留頂又方鮮鯽魚一尾山藥一段明礬一錢搗爛敷留頭片時發癢癢定自消一方無明礬又方乳香沒藥麝香各三分大蚰蜒二條搗敷患上留頭自消又方當歸黃柏皮羌活研細以生金銀花汁調敷四圍空中又方生大黃一兩白芨三錢穿山甲三錢麝香一分醋調敷露頂或黃蜜蔥汁敷之更妙此藥敷上便能立時止痛又方正宗車前草連根葉豨蘞草五龍草金銀花各等分上四味鮮草一處搗爛加三年陳米粉即常用糨衣小粉漿初起仍加飛鹽末二三分共打為稠糊遍敷瘡上中留一頂以膏蓋貼避風自然拔出膿毒若冬月草無鮮者預採蓄下陰乾為末用陳米醋調敷亦如前法並效今恐前敷藥內用五龍草隨地或有缺少不便合用預常熏後頂以膏蓋周圍腫上以如意金黃散代敷之又方蕎麥麵硫黃末各二兩研末井花水和作餅曬乾每用一餅水磨敷之痛令不痛不痛自痛又方用活泥鰍以手捉定頭尾放焮赤癰疽根盤上大則以數條圍之其鰍即吸緊拔其毒氣又方木香乳香去油榆皮面各等分滴醋熬稠調敷真君妙貼散正宗治癰疽諸毒及異形異類頑硬大惡歹瘡走散不作膿者宜用此藥不痛者即痛痛甚者即止蕎麥麵白麵各五斤明淨硫黃十斤研細共一處用清水微拌乾溼得宜木箱內曬成面片單紙包裹風中陰乾收用臨時再研極細用新汲水調敷如皮破血流濕爛疼痛等證麻油調搽天泡火丹肺風酒刺染布青汁調搽並效回陽玉龍膏正宗背疽陰病不腫高不焮痛不發熱不作膿及寒濕流注鼓風久損冷痛痹風諸濕腳氣手足頑麻筋骨疼痛及一切皮色不變漫腫無頭鶴膝風但無皮紅肌熱者用之俱有功效此方乃救陰疽之外施良法草烏炒軍薑煨各三兩赤芍炒天南星煨白芷各一兩肉桂五錢制畢共為細末熱酒調敷此藥軍薑肉桂熱血生血既生既熱恐不能散而為害故有草烏南星可以破惡氣祛風毒活死肌除骨痛消結塊回陽氣又有赤芍白芷足以散滯血住痛苦加以酒行藥性功通氣血雖十分冷證未有不愈誠為寒灰之焰枯木之春大抵病冷則肌肉陰爛不知痛癢其有痛者又多附骨之痛設若不除則寒根透髓尋常之藥固莫能及矣沖和膏正宗癰疽發背陰陽不和冷熱不明紫荊皮即紅內消炒五兩獨活炒三兩赤芍藥炒二兩白芷一兩石菖蒲即望見消又名陽春雪又名木蠟一兩五錢上為細末蔥湯熱酒俱可調敷藥中紫荊皮乃木之精能破氣逐血消腫獨活乃土之精能動蕩凝滯血脈散骨中冷痛去麻痹濕石菖蒲乃水之精善破堅硬生血止痛去風消腫白芷乃金之精能去風生肌定痛赤芍藥乃火之精能生血活血散瘀除痛蓋血生則肌肉不死血動則經絡流通故肌活不致潰爛經通不致壅腫此為散風行氣活血消腫去冷軟堅之良藥也其中五行相配用者再無不效之理如流毒骨疽冷證用之尤效故云風消血自散氣通硬自除本方加乳香沒藥治流注筋不能伸神應丹説約治氣血不和壅遏為瘡高腫赤痛兼痰兼郁兼寒兼濕並效小雄鯽魚七尾鮮山藥四兩連須大蔥頭草一個共搗爛加千年陳石灰半斤天南星半夏白芨赤芍藥研末各一兩和勻陰乾再研細末臨用以蜜調敷四圍外以皮紙蓋之敷瘡頭凹者蕎麥麵炒黃研細水和敷之化腐紫霞膏正宗癰疽發背瘀肉不腐並不作膿者又諸惡瘡內有膿而外肉不穿潰者萆麻仁研輕粉各三錢巴豆仁五錢螺螄肉潮腦各一錢金頂砒煅五分血竭二錢共為末瓷瓶收貯臨時用麻油調搽頑硬肉上至頑者不過兩次即軟祕傳敷毒法獨核肥皂去核一個萆麻仁二十九粒搗爛敷留頂透氣已成自潰初起自消鐵箍散敷諸般腫毒草烏知母天花粉半夏天南星五倍子炒芙蓉葉各等分上為末蜜醋頓熱調敷四圍中留一孔透氣烏龍膏敷一切腫毒入小粉漿炒黑研細用滴醋調敷或加生大黃天南星更炒倍子散敷一切腫毒並乳癰初起五倍子不拘多少打碎炒黑為末醋調敷或井水調敷亦可立消散雄黃二錢二分穿山甲三錢生大黃錦紋者良芙蓉葉倍子炒各五錢共研極細末滴醋調敷中留一孔透氣如干又搽不過十次自消清涼膏山東東昌府聊城縣南普陀寺僧神授方敷癰疽發背腫毒先用白麵調成圍圈患外蔥根搗泥平鋪瘡上用豬膽汁一枚黃蜜二兩傾瓷器內和勻茶匙挑膽汁於內一時即消敷毒大五倍子蜜炙九次研末醋調敷敷毒老桑蟲屎研末醋調敷留頂三四次即消毒瘡未出膿敷此即有頭牙皂京墨煅過乾薑各等分研末醋調敷敷藥神功散川烏炮黃柏炙各等分研細滴醋調無頭漫敷有頭敷四圍留頂周氏曰用唾津調成膏敷如干用米泔水潤濕聽其流膿不可手擠敷發背松香半斤將水煮一炷香蔥五十根連根鬚研如泥量瘡大小紅絹攤貼敷毒並敷痘毒紫花地丁草搗敷神效回生丹敷癰疽發背諸毒一切惡瘡等證敷之消散起死回生神方五倍子整個大者去一角入上好銀硃不拘多少再用銀箔糊住角口放銅勺內微火慢慢焙之煙絶為度研細末放地下出火氣用雄雞蛋尖頭者是取蛋清調末務要多摟勻濃其藥稍干即以雞翎或硬筆蘸藥敷瘡自腫處由外往裡周圍敷之留瘡口一連三四次住痛消腫如神破後敷之亦效敷發背如神熟鐵鏽刮為細末雞蛋清調濃用新筆圈紅暈腫處自外向內漸漸圈盡一日三次其瘡自然收小代針散凡惡瘡腫毒日久不出頭用此即穿木鱉子川烏水磨以鵝翎掃刷瘡上留豆大一處出膿如藥水干再刷上不過一時即穿敷一切腫毒疔瘡豬牙皂火煨再炒羌活大黃防風白芷天南星白芨白蘞連翹各一錢乳香去油五分沒藥去油五分貝母三分上研細用蛋清同蜜調敷患處未成形者即消已成出頭者其效亦速敷一切大毒疔瘡五倍子微火焙白芷各四兩陳小粉十年者佳慢火炒黑黃色一斤川烏黃柏草烏狼毒天南星半夏粉甘草各一兩研細未破者用滴醋調敷四圍已潰者用蜜調敷俱放滾水內頓勻敷奇驗金箍散錦囊五倍子白芨白蘞各四錢生大黃六錢芙蓉葉白花者良陰乾不經霜者佳二兩研細用蛋清些少同醋調敷如干以蔥頭酒潤之已有頭者露出頭敷四圍消毒圍藥白糯米炒焦色研細末醋調敷患處無膿即消有膿即潰敷癰疽發背奇方鎮江招隱寺浣塵和尚先用陳金墨磨濃塗四圍紅暈處再以豬膽汁生薑自然汁各等分不得多寡和勻有頂露頂無頂一概用雞翎掃上干則又掃未成即消已成即潰百發百中麥飯石膏一名鹿角膏醫燈續焰白麥飯石此石顏色黃白類麥飯糰生粒點若無此石當以舊磨面磨子近齒處石代用取其有麥性故也屢試得效此石醫家有時無處買今欲用之但於溪中尋有白石粒如豆如米大者即是也但其石大小不同或如拳如鵝卵如碗大略如握聚一團麥飯焉用炭火煅紅以好米醋淬之如此煅煉十次研令極細二兩研得不極細塗之極痛若細而嫩大能止痛排膿收口白蘞研細二兩鹿角不用自脫者必取生帶腦骨者去腦骨燒灰截二三寸長炭火煅令煙盡研細四兩凡用時量藥末多寡用經年好米醋入銀石器內煎令魚眼沸卻旋旋入前三味藥末內用竹篦子不住手攪熬一二時久令稀稠合宜取出瓷盆內候冷以紙蓋固勿令著塵灰每用時先以豬蹄湯洗去癰疽膿血至淨以舊綿挹干用鵝翎掃敷四圍凡有赤處盡塗之但留中心一口如錢大以出膿血使熱毒之氣隨出如瘡未潰能令內消如已潰則排膿如淌水則逐日見瘡收斂如患瘡久肌肉腐爛筋骨出露用舊布片塗藥以貼瘡上如內膜才穿亦能取安洗瘡勿以手觸動嫩肉仍不可以口氣吹著瘡更忌有腋氣之人及行經婦女或有孕人見合藥亦宜禁忌外取好米醋一大碗收瓷器候逐日用藥於瘡上久則其藥干常用鵝翎蘸醋掃上可令其藥常潤也初用一日一洗一換藥十日後兩日一換藥水澄膏集驗敷熱毒腫痛紅赤神效皮膚白色者勿用大黃黃柏鬱金白芨朴硝天南星黃蜀葵花各一兩研細末每用新汲水一盞半稱藥末二錢攪調勻候澄底者去浮水敷於腫焮處貼之如干燥唾津潤之烏龍膏集驗敷腫毒癰疽收赤暈木鱉子去殼半夏各二兩小粉漿四兩草烏五錢共入鐵銚內慢火炒焦研細出火毒再研細用水調敷四圍中留頂出毒氣或用醋調宣毒散敷初起及灸後腫消暈聚露蜂房炒焦三兩天南星赤小豆各一兩小米一合生草烏一錢生白礬五分研細末淡醋調塗四畔干即再上清涼膏啓玄敷癰腫焮痛生大黃研末醋調敷金蟾膏啓玄敷發背疔毒活蛤蟆一個去骨搗如膏敷患上留頭如無頭都敷上大有神效一二日揭去不過換敷二個全好火龍膏啓玄敷陰發背出黑水不知痛新火薑六月六日曬乾研末瓷瓶收貯每用以鮮豬膽汁調敷周圍皮紙遮蓋干則熱水潤之知痛時黑水自出為妙如不知痛雖出黑水難治隔皮取膿散竇太師驢蹄細末五倍子各一兩白鹽五錢草烏去皮四錢蕎麥麵炒二兩共研水調作餅慢火炙黃去火毒研細醋調成膏攤貼其腫漸退鐵箍散青囊芙蓉葉生大黃牛蒡子白芨雄黃各等分共研細看瘡勢大小或稱三錢或五錢以雞翎攪入雞蛋清內調敷四圍束毒不致走散開大神草膏專敷發背對口一切無名腫毒立時消散蜈蚣節草一大把入鹽少許搗爛如膏敷患上胡公弼曰按蜈蚣節草乃柔草也其色青白節節生細葉沿漫田墁如蜈蚣形二三月採取陰乾備用恐夏時草深難尋寸金散患癰疽腫毒天花粉三兩赤芍白芷薑黃白芨芙蓉葉各一兩上研細每用薑汁三分涼茶七分未破敷頭已破敷四傍留頂經驗神效黃蓉散胡言爵敷手足腫毒已成未成並效生大黃五錢芙蓉葉一兩研細苦茶調敷蝸牛涎敷癰疽解毒止痛蝸牛一百個納瓶內入新汲水一盞浸之封至次早將蝸牛放去其水如涎入蛤粉調稀雞翎掃瘡上日十餘次乳香止痛散一切癰疽焮痛搽之立止乳香去油沒藥去油各二錢寒水石煅滑石各四錢冰片五釐上為末以蔥汁調搽其痛立即止矣烏龍膏臭小粉五倍子各等分同炒黑研細醋調敷干則以醋調潤之消毒甚效止痛麻藥川烏尖草烏尖生南星生半夏蓽茇胡椒各五錢蟾酥一錢五分上為末用魚膠煬化入藥拌勻陰乾臨用水磨塗於肉上藥力麻住刀割不痛赤小豆散治一切無名大毒敷之初起即消已成立潰赤小豆一斗略焙磨細用黃蜜調敷或蔥汁好醋酒菊花根葉搗汁靛汁俱可調敷中留一孔透氣敷一切無名大毒孫真君生豬腦攤紙上貼之一日三換癰疽提膿孫真君飛面以人乳調敷一宿膿出發背初起孫真君新鹿角燒灰研細醋調敷之一日四五次以消為度癰疽久不收口孫真君老鼠皮燒灰敷口上即收敷腫毒劉祕鼻涕蟲同銀硃搗敷留頂立消一切白色陰毒以及對口初起者錢青掄活鯽魚一尾生山藥一段與魚一般長白洋糖二錢同搗極爛敷上立消即去更治瘰癧如神如婦人乳癰初起用蠟糟同搗敷上立散冬瓜癰及四肢癰毒腫滿新石灰先以水一潤即用醋一碗化開敷上再加醋調敷上立消惟身上腫毒忌用發背初起未成醫林集效用活蟾一隻繫於瘡上半日必昏憒置水中救其命再易一隻必踉蹌再易其蟾如舊則毒散矣屢試極效又方靈祕丹藥凡患癰疽瘡毒者用土中大蛤蟆一個剝全身癩皮蓋貼瘡口於蟆皮上以針將皮刺數孔以出毒氣自覺安靜且能抓住瘡口不令長大又可免蜈蚣聞膿味來侵神妙癰疽初起申一齋乾薑一兩泡炒紫色研末醋調敷四圍留頭愈腫毒抄本凡毒初起及經十日以上熱腫疼痛用雞蛋一個打開入新狗糞如蛋大攪勻微火熬令稀稠得所捻作餅子於腫頭上貼之以帛包抹時時看視覺餅熱則易勿令轉動及歇氣經一宿自愈如日多者一日一易至瘥乃止一切諸方皆不及此鐵箍散醫方解一切初起腫毒敷之立消已成毒不走散未潰有膿即潰已潰膿即追出九月九日取芙蓉葉陰乾五倍子白芨白蘞薑黃各五錢大黃一兩陳小粉炒黑二兩蟹殼五個研細末醋調敷腫毒及指上癰腫衛生備要獨蒜一顆百合數瓣臘糟同搗爛敷定痛散單方山藥一兩白糖霜大黃各四錢搗爛敷上即止疼或手搭發背破爛者只用糖霜山藥搗爛塞入毒內不臭爛肉自去新肉自生初時日換三次三日後每日換一次換時以甘草煎湯或豬蹄湯洗用軟鵝毛數根扎之洗去再敷待肉長滿方止消毒神方周惠南凡初起一切腫毒用杏核半邊入幹人糞填滿合瘡頂上扎之如毒盛其核即炸碎另換一核填糞合上至重不過易二三核自消敷方天南星生大黃各等分研細燒酒調塗露頂即消又方尿缸底刮下研細濃敷四圍露頂干則再敷再潤即消極效又方芙蓉葉或根皮或花或生搗或乾研和白蜜調敷四圍中留一孔透氣干則頻易初起者消已成者膿出易斂加赤小豆末其效更速又方連須蔥同白蜜搗極爛敷之露頂如重換敷二三次即消如已有膿將破不可用此法又方芥菜子研末同扁柏葉搗敷即消一筆描周鶴仙治一切腫毒神效四月間于田中收取蝌蚪數升濾乾水裝入瓦罐內加入冰片三四分緊封罐口再用泥糊勿令泄氣埋於不見天日土內六十四天取出盡成水矣凡遇無名腫毒之人以筆蘸水在於患處畫一大圈圍之逐漸收小中間留頭其毒即散神驗敷腫毒一切惡瘡黃洞陽糯米稷米秈米各二升五月五日上午時將米入於壇內用滾水衝入要透過米浸至次年六月六日磨成漿再將原水和入曬乾收貯臨用時取粉一兩加明雄末二錢和勻醋調如稀糊樣周圍敷掃中留一孔透氣如干以醋潤之每用藥不過一錢二三分為率劉氏敷藥祕方人中黃煅乃多年糞坑內者是人中黃馬桶內者亦是土子即無名異生大黃白芨五倍子生研榆皮面各四兩上磨細用雞蛋清或蔥汁黃蜜醋調敷俱可金箍散丁振宇膽礬硼砂水銀明雄黑鉛各二錢端午日修合敷一切大毒研為細末火酒調敷如不黏加飛面六錢敷一切毒五爪龍藤熬稠膏敷之又方吳魯南香肥皂一圓毒大用三圓同生山藥搗化敷上中留一孔透氣未成即消已成自潰治發背癰疽不問已潰未潰並杖瘡諸蛇傷白鳳仙花連根莖葉搗爛聽用先以陳米醋洗淨然後敷上一日一換如冬月無鮮的秋間採取陰乾為末水調敷之立消止痛如神瘡將好用桑葉醋煮一滾即撈起貼瘡上便能生肌收口水云膏闡傳治發背皂角炙去皮弦五倍子炒川芎乾薑各一兩乳香兒茶沒藥各三錢枯礬槐花各一錢上研細末犍豬膽汁調塗神效敷癰疽五倍子醋炙為末瘡在左用豬左腦瘡在右用豬右腦同搗勻敷芙蓉膏張秀峰發背癰疽痛如錐挖不可忍者立時止痛芙蓉葉黃荊子各等分研細末雞子清調搽四圍留頂中間如煙霧起立效用於未潰之先將潰之際並效消腫止痛散芙蓉葉一兩陳小粉一兩五錢五倍子生南星生半夏生草烏各三錢共研末醋調敷腫毒皮色不變敷上即時紅腫陳小粉四兩蔥白一兩同炒黑研末醋調敷龍虎膏敷一切無名癰疽大毒陳小粉一斤土木鱉連殼整炒二兩川草烏乾薑白芨花椒各五錢共研細末凡瘡未成者漫頭敷已成者中留一孔已潰爛者敷於四圍俱以醋調燉溫敷上外用綿紙貼干則溫醋雞毛掃上鐵箍丹何龍泉敷一切腫毒五倍子炒枯黑四兩陳小粉炒黃赤小豆炒各二兩乳香五錢研細末醋調敷四圍神仙驅毒一掃丹專治大小男婦一切癰疽發背無名腫毒赤紫丹瘤纏喉風證初起掃之即消已潰掃之即愈雄黃硃砂各二錢牛黃麝香各二分共研極細用豬膽汁調敷毒上其毒自散疼痛即止外用桐油紙捻點著近毒處照之須令冷氣透出毒外自愈神仙敷毒失笑餅初起一切癰疽大毒黃泥一大塊煨熟連須蔥一大把蜂蜜一盅雄黃三分共杵爛作一餅乘熱敷毒上如干了再敷一二次自愈鐵箍散癰疽發背疔毒初起雄黃熊膽硃砂各二錢京墨五錢麝香三分共研細醋調敷已成只用京墨磨汁調敷四圍金箍散吳近宸敷一切火毒及無名腫毒癰疽初起者即消已成者即輕生大黃三奈生南星薑黃生半夏各四兩白芨人中白白芷天花粉各三兩草河車一兩共為細末用黃蜜調敷如紅白色者用米醋調敷白敷藥吳近宸敷一切流痰濕痰寒痰喉痰腮癰腋癰及婦人乳癰乳疽乳吹瘰癧等證如神陳小粉白蘞生半夏白芷生南星白芨五倍子三親人中白各三兩共為細末瓷瓶密貯火痰用黃蜜調流痰濕痰用雞蛋清調瘰癧腮癰腋癰喉痰用米醋調惟乳證用活鯽魚一尾搗爛去骨和藥末搗敷敷發背車前草豨蘞草巴山虎草金銀花各等分共研細末陳小粉漿打糊調敷鐵箍散芙蓉葉陰乾薑黃五倍子炒去蟲白蘞白芨蟹殼各五錢生大黃陳小粉各一兩共研細末用熱米醋調如稀糊敷圍中留一孔透氣麻藥此藥敷於毒上麻木任割不痛川烏尖草烏尖生半夏生南星各五錢胡椒一兩蟾酥四錢研細末燒酒調敷一方加蓽茇五錢一方加細辛一兩瘡口冷難收口乾薑研末摻之患處攪熱如烘生肌最速消腫毒土三七根搗爛醋調敷留頂出氣敷之立消如膿已熟敷之立潰一筆勾蚰蜒蟲三四十條冰片四分同入罐內即化為水入麻油半斤封口收藏勿令泄氣初起用筆圈塗毒外四圍頻頻圈之即消已成敷滿留頂透氣敷腫毒未成即消已成即潰黃狗下頦一具煅白蘞蠶豆各一兩研細末醋調敷留頂透氣消對口白牽牛莖葉一把生薑三片同搗敷留頂透氣敷諸腫毒並瘰癧棒瘡川倍子八兩炒黑色取末四兩川貝母去心五錢海粉要緑色者四兩炒黑色約有二兩重生半夏川烏甘草煮過生南星草烏各一錢各研極細末和為一處凡用以熟蜜茶汁和勻貼患上油紙護之瘰癧初起以熟蜜茶汁調敷如久成硬核者單用陳米醋調敷亦消論瘡瘍忌圍寒涼之藥薛立齋曰內經云五臟不和九竅不通六腑不和留結為癰又云形傷痛氣傷腫此則臟腑不和瘡發於外也明矣塗貼寒涼豈能調和臟腑宣通氣血耶設使腫痛熱渴脈滑數而有力屬純陽宜內用濟陰丹外用益陽散則熱毒自解瘀滯自散若似腫而非腫似痛而非痛似潰不潰似赤非赤脈洪數而無力屬半陽半陰宜內用沖和丸外用陰陽散則氣血自和瘀滯自消若微腫微痛或色黯不痛或堅硬不潰脈洪大按之微細軟弱屬純陰宜內服回陽湯外敷抑陰散則脾胃自健陽氣自回丹溪云敷貼之劑應酬小熱證耳若不辨其陰證陽證之所由分而妄敷寒涼之劑迷塞腠理凝滯氣血毒反內攻而肉反死矣況運氣得寒而不健瘀血得寒而不散瘀肉得寒而不潰新肉得寒而不生治者審焉李世英曰疽不熱不痛屬陰切不可用冷藥敷貼恐逼毒氣入內澄曰冬月不拘蔥汁黃蜜酒醋敷藥必須隔湯燉熱然後敷圍不可冷敷若冷敷俟肌肉溫暖一時何能且冰伏毒氣內攻之害不可草率誤事論溻漬法王肯堂曰腫瘍宜紫葛湯一日五七次洗之每洗後拭乾視瘡頂上有白粒如米大者以五灰膏點破之瘡眼敷老皮散次用水調大鐵箍散圍貼四邊紅腫處用正鐵箍散水調貼瘡口再洗則先去舊藥每一次洗換新藥如前潰瘍用豬蹄湯一日一二次洗之仍用大鐵箍散如前圍貼瘡口上用追毒拔毒等膏貼之敗肉去後間二三日一洗之可換長肉膏貼之淋洗之功癰疽初發洗之則宜拔邪氣可使消退已成洗之則疏導腠理調和血脈深引熱毒從內達外易深為淺縮大為小紅腫蔓延洗之則收斂紫黯黑洗之則紅活逐惡風祛風邪除舊生新如瘡口冷滯不收者濃煎北艾湯洗燒松香兔毛熏之淋洗之藥可與鐵箍散並行同功李東垣曰夫溻法者宣通行表發散邪氣使瘡內消也蓋湯水有蕩滌之功古人有論瘡腫初生一二日不退即須用湯水淋射之其在四肢者溻漬之其在腰背者淋射之其在下部委曲者浴漬之此謂疏導腠理通調血脈使之無凝滯也且如藥二兩用水二升為則煎取一升半以淨帛或新綿蘸藥水稍熱溻其患處漸漸喜溻淋浴之稍涼則急令再換慎勿冷用夫血氣得寒則凝澀得熱則淖澤日用五七次痛甚者日夜不住或十數次腫消痛止為驗此治瘡腫神良之法也十書又曰凡治瘡腫初起一二日間宜藥煎湯洗浴熏蒸不過取其開通腠理血脈調和使無凝滯之意免其痛苦亦消毒耳如已潰洗之令瘡淨而無膿隔畔疙疤作痛之意也杖瘡亦然近時楊梅瘡生於穀道各治不愈以五根煎湯入婦人淨桶內先熏後洗不數次而愈諸瘡更妙何但於梅毒乎蔣示吉曰瘡毒初生古人用藥湯淋射蓋氣血凝滯則為癰腫得熱則腠理通經絡暢誠至理也其法以藥煎濃湯瘡在四肢者則溻漬之在腰腹者則淋射之下部者則浴漬之仍以淨布蘸水溻其患處水涼再換必數易而熱始透也溻漬門主方木香溻腫湯治癰疽始發腫焮憎寒熱痛地黃汁五合如無用生地黃五兩以代之犀角木香升麻射干梔子仁大黃黃柏黃芩黃連白蘞炙甘草朴硝紫檀羚羊角各一兩切碎和勻每用藥五兩水一斗煎七升入麝香五分淨帛蘸藥熱溻腫上日兩三度冷即更換升麻溻腫湯升麻黃耆防風生地黃川芎細辛各等分㕮咀用藥二兩水二升煎十沸稍熱淋溻內消如神溻腫升麻湯總録升麻漏蘆梔子仁蒴藋芒硝黃芩各等分每用二兩水三升煎十沸帛蘸藥溻潰腫處豬蹄湯聖惠方升麻甘草芍藥蒴藋各等分每用四兩水一斗豬蹄一對煮蹄軟取出次下藥再煎十沸帛蘸淋之溻腫湯木香犀角升麻大黃黃芩黃連射干黃柏白蘞甘草朴硝檀香山梔生地羚羊角各等分每用五兩以水一斗煎七升入麝香一錢淨綿蘸藥熱溻腫上一日兩三度冷則再換論熏消法澄曰癰疽發背初起已成有用熏法可令未成即消已成自潰潰而易斂祕而不傳留心訪求始獲其方用之頗驗癰疽門熏藥主方千金神草熏藥方袁聖伯發背對口已成腫痛勢甚或未潰已潰千金草一握按千金草六月間高二三尺葉似桃葉頂上開紫花一叢如紫瑞香花一般搗爛入小口砂鍋內熬滾將病人仰臥於有洞板門上毒露洞中以砂鍋對洞熏之少傾瘡口毒水如涎流出病人快意為度即將搽敷患處縛住次日另熬又熏三次毒水流盡自愈神驗熏藥方吳羹相如意草即犁頭草金銀花各五錢桑葉三錢三角峰又名爬壁蜈蚣系楓樹上藤其藤系三個葉兒一兩上入大砂鍋內入水煎滾紙封罐口以棉花將病人好肉包蓋再取門板量毒大小上下開一洞對毒熏之藥氣直透毒內自有惡水流出必多如此三熏毒散自愈如未愈再熏一次如已潰爛亦宜此法熏之若攻出數頭以蔥頭煎洗有腐肉或瘡口燥用豬蹄湯洗之以膏蓋之此乃奇效之法祕之
