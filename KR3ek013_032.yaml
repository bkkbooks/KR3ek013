body:
  text: 卷三十二痘疹部中自痘疹發熱報痘起脹灌漿結靨諸證祕法皆匯於此部中以便檢閲參治論發熱三朝生死訣聶九吾曰發熱之初若身熱和緩或熱或退神清氣爽飲食如常則不必用藥發汗但或戒暈禁風調護而已蓋痘有順而不必治者不輕治即所以調治之也其或憎寒壯熱頭痛發熱頭痛咳嗽鼻流清涕者多因於外感不可不發散也當視兒強弱而用藥發汗兒體氣素壯實者加味升麻葛根湯汗之白葛根升麻赤芍甘草桔梗防風蘇葉小川芎山楂淨肉牛蒡子煎服此方即是傷感而非痘疹服之發汗亦無妨體氣素怯弱者用加味參蘇飲汗之人參蘇葉桔梗前胡小川芎山楂肉粉葛陳皮製半夏牛蒡子甘草煎服然皆不可出汗太多恐發虛其表後難起脹灌漿也既經發汗而身熱漸緩兒頗安靜者其痘出必稀少此為順候且勿服藥以待之亦有發熱和緩後痘多者血氣虛也發汗之後或身熱不退而煩躁者且勿峻攻故少待之其或煩悶躁渴而妄語者用敗毒和中散清之連翹陳枳殼防風升麻前胡小川芎麥門冬桔梗蟬蛻牛蒡子荊芥木通甘草紫草茸酒炒黃連大便祕澀者加酒炒大黃一錢二分微利之不祕者勿加入服此覺煩悶少解即止勿服聽其痘出外則中自安也或有腹痛腰痛而煩悶者此其毒氣誠重然只當用敗毒和中散主之大便祕則加酒炒大黃微利之聽其痘毒出外則內痛自止然後看其痘或稠密或紅紫帶黑又議解毒可也切不可純用寒涼以阻遏其毒出之勢立致內攻告變涼藥要制過則性純而有效世人不知此理多純用寒涼解毒或用硝黃峻下因而速斃而卒不悟者多矣當時令衆姓出痘時小兒或有發熱稍緩其熱或作或止其紅點或未見或微見而未明或是出痘或非出痘正在疑似之間當此之時不如且勿服藥以待其自定但禁風寒葷調護之而已所謂不輕治之所以深治之者此也有等富貴之家珍愛太過見其如此屢投以清涼解毒之劑不知若是痘證則其毒氣發動於五臟勃勃欲出外其勢決不可阻遏屢用清涼阻遏其勢即所以迫之內攻而禍速矣故犯此者多有報痘數日即煩悶驚搐而死此解毒之劑殺之也正如寇在宮牆之內不逐之外出反遏其出路圍而攻之宮中之人有不遭殘害者乎然醫曰吾用解毒藥何至於殺人既不自任其咎病家亦曰彼用解毒藥何至於殺吾人亦不歸咎於醫殺人於冥冥之中而已不悟也人不知也噫亦可悲也已豫故表而出之以戒世之愛而反害者語曰久臘者毒必厚痘毒稟於胎元伏於五臟其輕者無論已其重者深藏久蓄不為不厚矣一旦觸發於倏然忽然之頃其勢猛鋭欲出斷不可御是以必藉氣血載毒出外成漿結痂然後毒散而功成此病機亦化機也豈其若諸瘡之毒可以驟然而解散者故解之於既出之後是順其欲散之勢猶為近理解之於未出之先是遏其猛鋭欲出之勢其禍甚速如初決之堤水勢排山而欲捧土塞之有是理乎奈何自古治痘之家其卑者固不足道其高者亦未深悟其理每每於痘瘡發熱之初欲出未出之際輒以解毒為主且日服某藥則毒可解而痘必出稀不知痘之稀由其初受毒之輕耳豈將出之時所能驟解乎致啓後之庸醫訛以承訛見痘瘡欲出未出之間毒氣熾盛則多用寒涼以解之或妄下以解之彼自以為對證之妙劑而不知反致內攻之奇禍至於殺人而終不悟前覆而後不鑑其禍又無窮也豫睹近時庸醫治痘多犯此失以致童幼數日而死者甚多則皆茫然委於證惡難救而舉世莫覺其致死之由殊可矜惻也故不得不再三發明其理以救將來發熱之際有偶感風寒飲食停滯而腹痛者用升消平胃散小川芎香附蒼朮紫蘇陳皮麥芽砂仁炒厚朴楂肉白芷炙草藿香姜引煎服一劑其痛立止然飲食作腹痛與毒氣作腹痛其證不同停食痛者其痛多急疾而啼叫必甚多在臍以上痛面必青白唇淡手足冷毒氣痛者痛稍延緩而有作有止多在臍以下或連腰而痛面或紅色而唇紫手足不冷此兩者必然分辨明白方可用藥也發熱之際有嘔吐者有泄瀉者有吐瀉交作者全要辨虛實寒熱而用藥如吐瀉交作而胸腹痛甚者此感寒而停食也仍用升消平胃散主之一服立效如胃氣弱而有寒嘔吐不思飲食或食下即吐其吐多順快而無聲面青白唇淡精神倦怠宜用參砂和胃散主之人參砂仁半夏白朮茯苓藿香陳皮炙草去皮煨姜三片煎服如脾氣虛弱飲食不化而泄瀉者其泄滑利而色帶白宜用術苓調脾散主之白朮白茯苓白芍神麯炙草扁豆砂仁香附厚朴或加人參煨薑大棗同煎服如有毒氣作吐瀉者其吐必酸刺而有聲神氣不甚困倦其泄必黃色臭穢雖或吐泄交作胸腹多不痛此則毒氣由吐泄而發泄所謂吐泄為順候而不必止者惟此一證耳若虛寒吐泄與此迥異者亦多矣張潔古等乃一概謂痘前吐瀉慎勿亂治而多吉並不分虛實寒熱何其孟浪之甚耶身熱至二三日後痘欲出不出或煩悶驚搐或狂言譫語切不可驚惶失措惟詳審虛實寒熱而治之要知此等證皆由毒氣在內不得宣發於外而作然毒氣不得宣發證有不同不可不辨如毒氣壅盛於內不能驟發於外而驚搐狂躁者宜用清解散以宣之防風荊芥蟬蛻桔梗前胡葛根升麻黃芩黃連紫草木通牛蒡連翹甘草楂肉川芎煎服如內毒本盛外為風邪所束鬱滯不得出而驚搐狂躁宜蘇解散發之清解散內去芩連加紫蘇白芷羌活乘熱服又有血氣虛弱送毒氣不出而驚搐狂躁者宜用溫中益氣湯托之人參白朮生耆歸身白茯苓炙草川芎白芷防風南木香官桂楂肉薑棗引服中病即止凡辨驚狂諸證最宜精詳觀形察色審聲聞證又參之以脈然後可以分別察痘影紅紫面赤唇紫聲音亮口氣粗手足熱脈洪數此毒氣壅盛者也或形色多同但聲重鼻塞或鼻涕脈浮數者此毒盛而為風寒所束者也然此證多在寒涼之月或不謹避風寒者然後有之察其痘影淡淡在皮下不見紅活唇淡面白或帶青脈又遲緩雖煩躁驚狂譫語亦是血氣虛而送毒氣不出者也三者分別用藥當一劑之後痘出而驚狂定矣昔人謂痘未出之前驚搐為順豈其然乎幼兒初出痘有發熱二三日全無痘點形影而忽然驚搐狀與急驚風一樣者此亦痘氣壅盛不能宣發所致宜用清解散以宣之痘出即驚定矣若醫者不知是痘而誤作急驚施治或單以寒涼投之或以驅痰藥峻下之其兒必死何者阻遏其毒使不得出而內攻也故未痘之兒若遇此等證即當經疑恐是出痘不可作急驚治又有發熱稍輕至三四日而痘仍隱隱不出者最要詳察不可一概認為毒輕痘少而漫不加意若發熱和緩精神清爽飲食如常出痘少而點數明頭粒尖漸漸長大紅活此為毒輕痘少無疑矣若身熱雖輕至三四日而倦怠嗜臥不思飲食所出之痘影影淡白點粒不明此非痘毒輕少亦是血氣虛弱送毒氣不出也急宜用溫中益氣湯以托之甚者即連服二三劑痘始出齊其痘必多若因其安靜袖手玩視而不急托痘出外延至五六日後毒氣內攻須臾告變不可救療甚是畏也昔人熱輕則痘輕之說可盡信乎而六日之前痘未出齊勿用溫補之說可盡拘乎自有方書治病以來其時不啻二千年其人不啻數百家然皆詳於已出之後略於未出之前深言出速而稠密之害不言留中而不出之禍不知已出之毒外寇也未出之毒內寇也出速而稠密者外攻也留中而不出者內攻也內寇與外寇孰急內攻與外攻禍孰烈故痘已出而死者多在旬日之外痘不出而死者多在六日之內徒知御外寇而不知逐內寇自古以來諸賢之為計疏也然其失計安在惟在痘未出而急於解毒緩於逐毒也不知未出之毒不可解但當汲汲逐之出外也豫深悟其理而明鑑其失故長顧卻慮為未出以前諸證設法惟明辨其虛實寒熱以施治實熱者宜發其壅滯以逐毒出外虛寒者補助其氣血以逐毒出外至於急用寒涼遏毒內攻等弊則諄諄致戒不厭再三一以救前哲之失一以開後人之迷雖岐黃復起不易吾言矣喜泰順曰初發悠悠身熱氣息和平二便如常面容不改睡臥安寧便見痘來順候肌色青而㿠白精神少而倦怠此證斷作虛看痘出決然不振再見便溏嘔乳只須補益為先若還熱甚而氣粗煩躁而不寧譫語妄言均為內熱如加喘滿膨脹便祕須知熱壅肌膚燥而毛色焦口氣熱而身燔灼此則蓄熱鬱遏內證固重而外邪尤烈腹脹口張而喘息啼聲不倦而啞嗄五竅不通須防出血點來隱隱只恐復留吐乳更兼眼倦而青又見搖跳狂亂不寧發驚先兆是故熱盛者先宜清涼發散不宜驟用苦寒發散則毒得外出而熱自解苦寒則毒反冰伏而出愈難故發散之劑輕則如升麻葛根以疏其熱而煩躁壯盛者非此何以定其標重則用麻黃以開其壅而喘急腹脹者非此何以救其危未萌先瀉有熱證莫作虛看無熱證便為虛論止熱瀉次清涼重加發散治虛溏以溫補仍用開提是以內虛誤用寒涼不特助伊作瀉實熱如投溫補只恐轉增劇煩安靜而能食勿謂便實而可下泄瀉而煩熱莫言熱證以投涼又曰初發壯熱毛直皮焦睡臥不寧腮紅睛赤躁煩熱渴腹脹啼喘大小便祕兼之腰疼膝痛口中臭氣衝人此毒火鬱遏大為險逆之途醫者當表下之俟見之後再看點粒色澤如何邵氏曰發熱一日遍身只出紅點猶如蠶種摸之並不扛手者死發熱時腸肚大痛腰如被杖臨起痘時痘又幹燥腸肚痛又不能止更兼紅點並不堅硬者三日者後死先腸肚痛後止者宜用助血藥救之發熱時身無大熱腹無疼痛三日後緩緩現出紅點堅硬扛手者吉發熱時頭面通紅儼如塗胭脂於滿面者五日後死發熱時聲音忽變喉腫者清涼飲消之可生發熱時用紅紙捻蘸麻油點著照頂心皮肉裡如一塊紅身上成紅塊者八九日後死發熱時飲食不吃並大小便不通者二日後死發熱時口出亂語身現紅紫者四日後死發熱時或從風寒停食起風寒不散驚悸不散食滯不消結成一塊者一晝夜必死發熱遍身緩緩外現不時驚搐者必是心經痘出也用藥治之可愈發熱時父母不可亂求醫生看聽彼胡言有損性命發熱時舉家男婦不祥言語均宜禁忌發熱時與家上下人等淫欲之事須戒半月以及孝服尼僧行經婦女不可觸惡好痘變成壞痘爛漿枯陷發熱時或吐瀉而神氣不減者無妨雖有大熱內解但不宜久久則恐神氣耗散耳發熱之始聲音遂變者重可用清肺飲甘桔湯加元參治之出痘之初凡里有熱當利小便雖不用涼藥然裡熱必令從小便泄去小便乃導引熱邪之道可用導赤散治之若里有小熱則不可滲利小便只宜內解其毒若滲利小便恐損其真氣宜用犀角地黃湯解毒散凡發熱或頭溫足冷昏悶如癡渴飲者凶論報痘三朝生死訣聶九吾曰發熱至三四日報痘形如粟米口鼻腮耳年壽之間先發數點淡紅潤澤者最吉不必服藥若身熱一二日即出痘先發與天庭司空印堂等處者或一齊出而稠密者或乾枯而紫黑者或成片不分顆粒者皆血氣凝滯而毒氣肆行最為可憂急宜活血養氣而送毒用調元化毒湯生綿黃耆人參白芍當歸牛蒡子連翹黃芩黃連防風荊芥桔梗前胡木通紫草茸紅花生地甘草蟬衣楂肉煎服腹痛者去參耆加炒枳殼大便久祕者去參耆加酒炒大黃微利之大便通仍除之若氣血與毒氣俱旺而脈洪數者歸芍減三分之一去參耆此方以參耆養氣歸芍紅花生地活血翹蒡芩連荊防前桔紫蟬通草解毒加枳楂疏氣若痘出不快者其證不同最宜分別痘色紅紫乾枯或密如蠶種或一片不分顆粒身熱大便祕而出不快者此毒氣鬱滯血氣不流行也用調元化毒湯去參耆加小川芎清之痘色淡白飲食減少身涼手足冷小便清大便滑而出不快者此氣血怯弱不能載毒出外也用溫中益氣湯以托之有鼻塞聲重咳嗽惡寒而出不快者風寒蔽之也宜加減參蘇飲發散之蘇葉人參陳皮小川芎羌活防風荊芥桔梗白芷甘草冬加麻黃五分煎帶熱服但不可出汗或因邪穢所觸伏陷而出不快者其痘必癢宜用平和湯解之人參當歸桔梗白芍紫蘇黃耆防風白芷甘草官桂沉香檀香乳香藿香溫服痘正出時有忽然傳風眼直視牙關緊者此調護不謹而為風邪所襲也且勿輕用驅風峻藥宜姜附湯白附子老生薑各二錢煎濃湯灌下一二酒杯出微汗即愈痘正出時身微溫而不熱不寒者為佳或熱輕和緩亦無妨惟大熱者可憂若出齊發熱尤可憂其痘必稠密必紅紫必乾枯仍用調元化毒湯去參耆看痘出齊與否以腳心為驗腳心有痘則出齊矣若痘稀少者不必拘此以身不熱為出齊肉食不可太早必待痘出齊而身不熱方可食豬肉若熱未退而食肉以助火邪必成大患雞肉首尾俱不可食惟起脹時怯弱者可食以助行漿壯盛者亦忌之諸魚皆腥牛羊皆膻痘家最忌並宜禁絶報痘時頭面稀少頂尖礙手根窠紅潤前心後心皆無其色如水珠光澤者上吉報痘先花後果花如硃砂梅之色是其花也痘如嫩黃色後成老黃色頂尖小小紅點者是順證也不可一概而論此正是知花大法也先花後痘六日紅是其花也九日成功亦是此種順痘也報痘煩躁不寧腰腹痛不止口氣大臭出紫點者死報痘色白皮薄而光根窠全無紅色或帶一線紅三五日即長如緑豆大此痘不能貫漿久後即是一包清水擦破即死不可因好看妄與藥治切記報痘全然不起頂如湯包抑或如燈草燒者十日後癢塌而死報痘起紅斑如錦紋者六日死報痘遍身如蛇皮者死報痘遍身起黑斑如痣狀肌肉成黑色塊者指日而死報痘過暖毒氣收入心經者半日死報痘形不現過涼涼極則里不能外發必閉五日死天時嚴寒或驗發痘證將薄被單同宜保護以免外寒襲侵而報痘時切不可輕投苦寒冰凝氣血不能外發其害非淺報痘不分根窠其色如灰其痘又如魚子之小者又癢又痛八日死報痘有父母平日不謹慎遺火毒於嬰兒臨時先一發其色黃頭如瘡後焦枯頭面身忽然全無如平日好時者內歸五經串到即死也報痘嬰兒先天本不足後天又不足先後二天大虧父母又不滋補嬰兒任其尫羸出痘臨時無藥治矣不在痘之多少俱因氣血虧損不能載毒外出耳報痘夾麻痧者萬難收功也報痘喉痘阻閉者氣不流行飲食不下者三日死報痘證出五臟之上外而皮肉並無者一刻死此痘孰能知是肚內五臟上而出痘師曰有此證得小兒無病忽然肢體發寒又有汗頭項發上有水珠其色紫脹欲破者是破則無救以此辨之則知內臟發痘矣報痘凡小嬰兒平日不可過與酒糖煎炒等味若平時過與到報痘時邪入合邪正氣微弱就難以勝肝脾二火腎水縱有些又何能制二經之火此時相剋晝夜必死為父母者須防之於未萌不可不知報痘之時如四圍淡白色如枯澀屬血虛如痘頂白色俱收暈而頂陷者屬氣虛急宜芎歸肉桂木香之類加人乳和好酒服之諸痘未出之先有大痘一粒如金黃色又一黑痘如黃痘大者黃者名曰賊痘黑者名曰痘疔一起之時急用銀針刺破以口含清滾湯吸出穢血用紫草膏或油胭脂加血餘灰珍珠末調敷瘡口諸痘自然起發也報痘初出之時多有咽喉腫痛聲啞之證乃內毒壅塞氣道而起可用甘桔湯加元參牛蒡子治之也喜泰順曰夫痘瘡之發也身熱和緩達於外者必輕悶亂煩躁彰於外者必重勢之所必然也故顏色貴潤澤而嫌昏暗顆粒貴圓淨而嫌破碎痘貴高聳而嫌平塌皮貴結實而嫌虛薄粒貴稀疏而嫌稠密根窠收緊痘分陰陽見點活動更忌浮腫出要參差血宜歸附耳後頭項心胸少於他處為佳眉稜兩太陽額前光澤不滯為妙若一發便出盡者重也痘夾疹者半輕半重也裡外微紅者輕也外紅里黑者重也瘡上黑點如針孔者熱極也青乾紫陷煩紅焦黑昏睡汗出腹脹喘啼大小便祕者困也善治者於其形色而辨之於其輕重而分之則輕者可以高枕獲安而重者亦可以扶危而奏績矣又曰熱緩神清痘大兮根窠紅活出參差四肢溫暖無寒熱乳食如常渴瀉除更兼腰項當心少但宜調治不須醫又曰初熱一日即便出稠密焮紅減飲食泄瀉煩渴頭面多紅斑夾疹二便塞平塌灰白缺光明疔毒膿瘡水流濕若此重證須預防莫待臨期嘆疏失又曰先看面上諸經絡生死吉凶自靈通左臉肝兮右臉肺脾為年壽及人中心屬印堂方廣額腎為顴骨耳尻風此是陰陽部位屬痘嫌枯滯及鮮紅假如年壽部先發人中腮腳亦相同淡紅磊落如朱潤過期七日自然安若越印堂方廣出心家熱毒解方頤顴骨耳目似麻子重極須知命必終又曰發熱三日氣體如常見點紅活無分部位出來遂覺粗肥稀疏可必初出如還瑣碎稠密堪知帶熱敷瘡陸續出來尖圓高聳顏色光潤雖甚密猶為可救一齊擁出焮紅皮薄即稀疏未必全生細細白頭如痱乾枯定作內攻形緋緋紅點如丹焦萎定成悴憔勢粗肥光頂點子不肥終白陷頭尖嫩薄茱萸紋起定空漿肌嫩則皮薄嬌紅黃瘦則痘成褐色人黑皮粗瘡色必然慘暗是故嬰兒之肌肉不同未可一例而斷只要錠凸有神不喜煩紅乾燥色澤神安見點如珠如粟毛焦皮燥敷瘡或紫或焦是故帶熱齊出既恐密似針頭縱然陸續出來尤忌形如蠶種如麩如痱如疹如疥根窠不立腳地俱無犯此數端皆云莫救夾斑如同蚊咬惡裂甚似蛇傷乃或螺螄云電差為可救未熱先敷數點俗名報痘若還熱久而不敷便作疔看先發塊而後發瘡塊名癡毒而必生先發瘡而後發塊塊名鬼腫以難醫避痘避於隱僻眼泡唇口必多凶悶痘悶於要害舌喉肩背而不吉順不憎多逆嫌一粒冷疔先見諸痘不敢彰形賊痘若生諸痘不能灌汁辨認若真急宜挑破是以里證未平痘雖出而毒猶在內透肌發散尤宜解毒為良便調人靜身雖熱而毒已在表補兼發散仍以安表為先設使內外證平此後不須混治再看精神勇怯詳審表補如何又曰三日四日痘出當齊點至足心勢方安定猶有陸續不出之狀或隱隱於皮膚之間不見不起者古名不快若非壅遏之因必有氣血不振之過是以四日以前痘毒方出身表宜涼四日後毒已出定身表宜溫涼則氣血和平痘色必然潤澤溫則腠理開通其毒易於成漿至此而身不微熱雖未至於冰伏而痘瘡斷乎弗長醫者當審其故而投之以藥或為風寒吹襲或為嘔吐泄瀉或為穢濁觸犯故身不熱而痘不起已成冰硬之形赤色若還不起變敗可期紅潤依然如故若見氣急而腹脹黃泉在邇失聲而悽悽陽數無多愈天池曰痘未見點預卜其為吉為凶惟於神情證象而求之脈理而參之然非極美極惡者未見鏡其將來也放點則有形可察有色可詳順險逆三途昭然而睹矣蓋形成於氣色根乎血氣正則拘領其毒毒有所拘痘雖密而得定其位不模糊不細碎顆粒分明而腳必周淨毒有所領毒易於達外痘雖密頂綻突而蒼老此氣得其正而形其無間也血正則榮載其毒毒有所載痘雖密而能安其位根有盤助囊厚其藏而饒涵泳毒受其榮痘不燥澀形雖密淡而不白紅而不嬌此血得其正色無咎也反此則氣血反受毒制可知有表裡俱虛而出不快者有表裡俱實而毒壅滯者有氣血虛餒皮薄而色白者有毒火熾盛而形惡色惡者千形萬態總由此出放點於發熱三日之後身涼神爽顆粒分明淡紅蒼老其餘可知為順不必服藥放點一日烈熱干泡帶火而出不論稀密色一紫豔或焮紅其他可知此梟毒烈火及早圖之不致日後內潰急以攻毒清火帶清肌透發不可以初見而玩忽之放點有身不見熱神情困倦偶因四傍痘氣相感而出見痘色淡皮薄此腠理不密肌肉不固不能約束而然也不宜疏散防日後有癢塌之患以調中湯主之放點有先因吐瀉困倦頭溫足冷適感時行而出色淡囊薄而淹滯不起者此氣虛不振不能透發宜以升發中即兼治本免日後有倒陷之患放點有熱如火熾紫豔焮紅神情躁亂纍日不松而不起者急宜攻毒涼血清火疏肌以透之放點有僅數粒色不甚紅亦不甚白身體溫和神情清爽不暗者目之為順其囊窠纍日不見粗壯痘色不見光肥浮沉其間名為等伴痘先見數點者報痘也四五日後身必忽然大熱神即昏潰大隊梟毒一時湧出其痘稠密紫暗大都不起明者即與挑破吮松其毒以藥胭脂貼之內服豬尾膏通天散活血疏透來勢猖狂必蕩滌庶可救也放點有毒火雄烈氣血不能約束一齊湧出火熱如焚急宜解毒涼血清火放點熱如火灼乾燥如煙神情躁亂不論稀密宜攻毒涼血清肌散火緩則毒即內攻無及矣放點痘色干滯礬紅身宜壯熱而反涼者以毒火遏鬱於內非真涼也急宜散火疏肌活血透發俟火透而後清涼不宜遽與清火放點痘甚稀疏卻間蚤斑或間紫黯有若紫背浮萍或犯貫珠神情悉悶及諸般痛楚之類多因惡毒盤居於內表裡故不相符不可因其稀而致忽也即當攻其伏毒松肌活血放點有唇裂焮腫甚有焦黑如煤或口中穢氣不堪或舌起芒刺此毒火犯胃急宜重以清火涼血解毒重必攻之放點皮毛刺痛衣衾苦動此毒壅於肺急宜重以攻毒松肌透發失治至行漿時膿根不起必致躁癢以斃放點筋抽脈惕叫喊而已此伏毒於肝宜疏肝毒重必宜攻有咬牙者亦如之放點譫語狂煩如見鬼祟此毒火迷心宜涼血清火兼之身熱如烙或諸般痛楚者尤宜攻毒放點骨節煩痛更有腰如被杖此毒在於腎大都不起攻毒刻不容緩放點拳毛倒豎目胞下有血絲如線絆於其處或腹痛不已身熱如火肢冷如冰此毒伏於脾急宜攻毒清肌透發放點小水有如醃魚汁如鮮血如紅花膏此毒火下注小腸急宜攻毒涼血鼻衄成流者亦然放點大便欲解或解時疾首蹙額所解如漆如膠有若瘀血有若羊糞者此毒注於大腸急宜攻毒因勢而利導之放點大便暴注如傾有純解清水而躁亂者此火擾大腸宜分利涼大腸五臟伏火伏毒惟下利者稍輕以腸為傳送之地也雖壅滯艱塞終得因勢利導放點顆粒稀疏囊窠飽滿而色有礬紅有紫豔有晦色此毒火在於血分也宜解血分之毒清血中之火放點有歸附甚厚而囊窠不松或平或陷此血至而氣不至也宜寬氣道松肌疏透兼他證凶暴者必下之放點有孔殼圓滿而盤助干滯此氣至而血不至也宜清營活血兼他證猖狂者必攻之放點有外感未愈或風或寒或風熱或輕或重有纍日不起有起而不快此為表實審其邪而疏解之令毒有出路放點有飲食未消中宮阻塞口中噯腐酸臭腹內飽悶痘出不快者是為裡實急宜消化令得宣暢放點各證治之大略由此而推之其餘可概矣起脹三朝生死訣聶九吾曰報痘三日後痘已出齊身體溫和精神清爽顆粒尖圓潤澤根腳紅活胸背稀疏飲食如常二便不澀此順候也不必服藥但節飲食避風寒防穢氣痘出齊後三日內其時十分緊要其形色證候最宜精察蓋好痘全要膿漿灌滿其次亦要六七分膿漿方可保無虞痘一出齊形色顯然其膿之成與不成足與不足皆可逆睹矣除以上順候自然膿足不必服藥其有不順者後必無膿或膿少而清急於此三日內察其形色分別寒熱虛實用藥調治以為灌膿計猶可及也失此不治多有緩不及事而竟不成膿者痘之生死判於膿之有無有膿則毒從外散故生無膿則毒留內攻故死是以膿灌滿而痂厚者上也膿未滿而痂薄者次也其下者遍身俱水疱然水疱七八分而間有二三分膿疱者猶可生也其最下者密不成顆串為一片而其皮下有膿漿又或疱密而潰膿水濕漬猶可望生也惟乾枯無膿漿或薄漿不滿二三分者必癢塌而死無生意矣是以出齊而調治灌膿如拯溺救焚不可緩也氣血流暢則毒化為膿膿之不成其病有二毒氣熾盛則血燥而凝故不能運化而成膿元氣虛弱則血寒而縮亦不能運化而成膿故痘色紅紫乾枯或帶焦黑者毒熾而血凝者也必不成膿急宜清毒活血湯治紫陷一二劑其痘立轉灌膿時六七日不大便亦此方起脹時並用當歸紫草茸前胡牛蒡子木通生地生白芍連翹桔梗黃連黃芩甘草楂肉人參生黃耆煎服煩渴者去參耆加麥冬天花粉痘色淡白疱不尖圓根無紅暈者氣虛而血縮者也必不成膿急宜用參歸鹿茸湯治白陷灰陷痘不光溜疱虛漿清行膿二三日尚不充滿皆可服以托痘鹿茸密炙嫩綿黃耆歸身炙甘草人參元眼肉三個同煎入好酒一杯溫服兒有能飲酒者濃煎藥汁與酒相半和服亦好虛弱未甚者服此一二劑其痘即轉紅活行漿困倦手足冷飲食少者加木香丁香官桂寒戰咬牙者再加官桂附子泄瀉者去當歸加麵炒白朮酒炒白芍白茯苓木香丁香官桂另用參朮散止瀉托膿之劑莫妙與此方以鹿茸補血力峻與草木諸補藥不同然恐鹿茸未必得故又録千金內托散倍用人參歸身蜜炙黃耆白芍川穹官桂炙草山楂肉南木香防風白芷厚朴龍眼肉三個同煎入好酒和服隨證加減法同上有用人乳和藥服者雖與灌膿有理但人乳性涼脾胃弱而大便滑者忌之泄瀉者尤忌之出齊後當治不治則漿不行而五陷之證作矣五陷者白陷灰陷紫陷黑陷血陷也痘稠密紅紫而頂陷者紫陷也甚則轉而為黑陷也此毒熱熾盛蔽其氣凝其血而陷也仍用清毒活血湯治之其隨證加減法亦如之然當其紫陷時不過一二劑而痘立起其效如神及至黑陷則受毒已深雖用此方救治而不活者十嘗八九矣痘雖稠密其色淡白根無紅暈而頂陷者白陷也甚則轉而為灰陷也此氣血虛寒不能運化毒氣以成漿故陷也宜參歸鹿茸湯或千金內托散治之其隨證加減法亦如之又有一種痘瘡頭粒通紅成血疱而不成漿者此氣虛不能統血而血溢妄居氣位也宜用參耆湯大補其氣人參炙黃耆炙甘草官桂煎溫服服此疱即轉白而成漿血疱失治則氣愈虛而為血陷然治之亦不外此方血陷與紫陷相類但血陷雖紅然淡而不紫也紫陷屬熱氣粗身熱血陷屬虛氣少身涼不可不辨身熱身涼虛實顯然何西邱論五陷說理朦朧不明管蕣論之尤舛錯可惡痘出齊二三日後毒熱化為膿漿漸漸充滿起頂光滑時潤身體溫和飲食能進小便清利大便二三日一次此順侯也不必服藥但節飲食護風寒避穢氣而已犯五陷者治之見前其或雖不陷頂而痘不光潤或疱虛而漿不過三四分或雖有漿而清薄或行膿至二三日尚不充滿皆難以收靨宜用參歸鹿茸湯催足其漿無根窠不能灌漿漿不足不能結靨此時看漿為主邵氏曰痘出三日應當逐漸起脹根窠紅綻頂紅光潤澤者生起脹遍身頭皮俱陷下其中有眼如針孔紫黑者死起脹時如腰腹或痛或止根窠如蚊蚤所咬全無起色者死起脹頂陷者可用助血氣藥救之起脹如渴不止者用退火回生丹救之起脹痘復陷黑悶躁不寧神昏氣促而死起脹小便下血頂尖紫色而乾燥全然不起發者死起脹大小便俱下血瀉久氣泄痘枯者死起脹腹肚膨脹飲食不下者死如略進飲食速以消膨脹藥治之如痘初出一小點漸大如緑豆飽滿者是起脹之後灌膿起脹是將灌未灌之時也如起脹灌漿之時乃痘發大其氣道窄狹以致喉痛不治自愈起脹時色如白飲者死若遇此證斷不可作虛寒治之乃毒盛氣滯之故耳起脹時先有六七粒細而成塊於中有一粒扁闊歪斜者死起脹時痘上有一孔不黑不白名曰蛀痘此乃腠理不密而有是痘泄喪元氣失治則凶用保元湯加丁香肉桂其孔自密而痘自起矣喜泰順曰五六日來血包以成痘當肥大而粗頂宜放光而白故根紅而頂白者已俱行漿之勢若還赤色過頭雖見嬌紅可愛延綿六日依然空殼虛花皮薄而光亮如燈內含是水頂尖而根腳不紅行漿弗實是以熱毒未解則為紫為黑痘壅不起則為陷為塌色滯而不榮則為干為枯為青為灰形怯而不振則為不快為停漿或有肉先腫脹而痘反不起者漿則滯而不行面已虛浮而痘反退伏者毒則遏而不進是以辨明用劑分虛實寒熱之證表裡輕重之形補瀉溫涼使氣血交會氣充於上則頂尖圓血附於下則根紅固頂尖根固庶可全功至於氣血交會之期頭尖皮薄光亮如燈根無紅暈至後來必成皮薄漿清之患八九日必然發癢咬牙抓破無膿臨期十二命厄歸泉若見頂陷不起頭有火刺之形其根必紫而散塌此氣血為毒火凝滯故不光潤內證參詳必渴欲飲水譫語妄言咬牙寒戰諸等實熱顯著於外治法當清涼解毒斟酌下之大用涼心破血之劑連連進之氣血分明方有活路又有灰白形怯不振之證書曰灰白是虛務必兼詳外證如面青㿠白肌體瘦弱便溏嘔乳只須補益為先大用參耆木香丁桂之劑庶可挽回於十一以上諸證俱要分明虛實寒熱方可投藥不然則魚目可以混珠美石可以同玉矣灌漿三朝生死訣聶九吾曰痘出五六日內至八九日若膿漿不行亦當參歸鹿茸湯托之黃耆生用不必加減若膿漿不起則無生意矣若有四五分膿猶可望生膿漿不滿雞冠酒亦可用用三五年以上大雄雞先將好酒一杯頓溫次刺雞冠血滴入和勻仍頓溫服之服後或燥痛一時無妨其雞不可殺又有一種出痘稠密毒火既盛然元氣虛血氣弱津液枯竭不能制火以致虛火炎蒸或煩或渴或咽喉痛或鼻時出血難在溫補痘必不能成漿結痂大凡年長之男女嗜欲久開血氣既耗者多有此證最為難治時醫見其多熱候率用清涼如犀角地黃湯之類不知原因血氣不能勝毒氣而致有此證今又純用寒涼則血氣愈虧損矣而毒氣愈肆行豈復有可生之理是以此等痘證時醫治之十無一生殊可哀憐今特製參麥清補湯以調之人參麥門冬白花粉生黃耆前胡牛蒡炙草生甘草炒白芍當歸紅花大川芎生地桔梗山楂肉元眼肉三個同煎溫服遇此證者此藥須當頻頻服起發灌膿時有吐泄者證各不同吐有兩端吐而酸苦有聲吐訖反快者毒光上騰也梔連二陳湯止之此痘色必紫紅去白陳皮炙甘草白茯苓製半夏薑汁炒黃連薑汁炒梔子煎緩緩服吐止即勿服苓半恐燥陽明也吐而有物無聲不酸不苦吐訖困倦不思飲食者胃氣虛也參砂和胃散主之痘色必淡泄有兩端泄而糞黃臭穢小便赤澀者毒氣奔越也痘色必紅紫加味四苓散主之治熱泄豬苓木通澤瀉赤苓車前子黃連黃芩牛蒡燈心一團食前服泄而糞青白滑利者虛寒也痘色必淡白參朮散主之止瀉良方專治虛寒白朮人參白茯苓砂仁炙甘草薏仁蓮肉神麯楂肉肉豆蔻柯子陳皮南木香為細末每用二錢清米湯調食前溫服兒有不肯服者入稀粥內和服亦可如虛滑不止兼用七味豆蔻丸肉豆蔻柯子砂仁南木香白龍骨赤石脂枯白礬麵糊為丸如緑豆大每用清水飲下三十丸或研碎入粥服此等丸散治痘之家必須預製以防虛滑泄瀉若痘起脹或收結時驟然泄瀉不止危在旦夕矣然止瀉用湯藥多不效有服至異功散而不止者惟此丸散可以立止惟毒熱作瀉加味四苓散可止起脹灌膿時或有六七日不大便而塞悶作痛者毒盛而祕也用清毒活血湯去參耆加懷牛膝二錢紫草當歸各加至二錢煎藥熟去渣入生蜜半酒杯服之如又不通用前藥加酒炒大黃三錢微利之若仍不通用豬膽汁滴入穀道中即通終不可用硝黃大下恐下後變他證則危矣身涼而汗不止者歸耆湯主之當歸身炙黃耆酸棗仁水煎服有痰用白附子熟水磨服切不可用二陳湯恐燥陽明孤陽無陰不能施化也至收靨時用之無妨邵氏曰灌膿先嫩黃色一日半後老䗶黃色一日半二便如常飲食照舊者吉灌膿時乳母可服參藥補之自有好乳哺兒以助後天之元氣無虧也灌漿時切不可讓兒亂塌亂抓若任其抓破泄其正氣無救灌漿時枯焦忽轉紅黃者必是陰騭而來也灌漿時先黃色甚好後頭焦白麵澆薄漸成平頭者死灌漿時根粒如清水泡而軟者七日死灌漿時先漿膿礙手漸破者死灌漿時先泡如紅黃色者可愛忽然爛破氣敗者死灌漿時臭膿臭氣燻人又癢又疼者當用清解湯救之灌漿時又熱又寒閉塞二便不通目自開者六日後死灌漿時手足二心並前後心各有一粒黑陷無膿又兼腰亦是一粒黑子者死灌漿時痛不止者氣滯也保元湯加木香山楂以行滯氣灌漿時癢塌不止者血盛也血味本咸淹淅皮肉所以作癢保元湯倍加黃耆芍藥以制血氣盛漿足時作癢不妨灌膿時成片作爛膿水不幹內宜大補氣血外用敗草散敷之如頂平腳闊漿水不滿足用十全大補湯加木香乾薑治之灌膿時色白如水晶內無膿者宜內托散加丁香乾薑木香散加糯米人乳酒服歌曰痘色虛明似水晶莫將此痘看為輕十一二日防癢塌十四五日命須傾喜泰順曰六七日之期須候漿行半足虛瘡方見分明毒重而壅遏者乾枯退縮紫豔黑陷氣盛而起發者飽滿榮光血虛而不附者根窠不緊不華氣虛而不會者頂陷不尖而軟頭面行漿而四肢未起見之切莫慌張腿臁發泡而臉額焦枯見之且休歡喜既已懼其發嗆且又慮其喘急發嗆愁其失聲喘急恐其腹脹飲食不多或至臟虛而內陷水漿頻進恐來泄瀉而發顛調理失宜倒戈反掌熱甚煩渴到此休以實論再加溏泄此時斷作虛看大用參苓薑蠶木香等劑熱甚煩渴亦有熱瀉何可概為虛論但熱毒郁遏身必壯熱點必紅紫結實礙手唇必焦裂糞必惡氣沖人宜用大黃石膏川連等藥以清其毒若是無分皮肉一般紅腫頭大如瓜音啞作嗆寒戰咬牙譫語妄言手尋衣領食不下咽此死候也結靨三朝生死訣聶九吾曰痘出八九日膿漿充滿顏色蒼蠟者上也若無他證勿藥可也然痘出稠密而膿不甚滿者至此時飲食多減痰涎多盛宜用養胃開痰湯人參白朮白茯苓炙甘草蓮肉陳皮半夏山藥桔梗楂肉煎溫服灌膿時忌用朮苓半夏恐其乾燥津液膿漿不行也至此時漿靨時可用矣渴者去半夏加麥冬北五味吐逆加藿香砂仁結靨其色蠟黃一二日從頭至兩腿皆靨由胸腹至腳背和額上一齊皆靨落而愈者吉結靨時寒戰或手足顫掉氣敗者死急用補助氣血養脾胃藥救之結靨時遍身皆臭爛如臭餅臭不能近目中無神者死結靨時遍身發癢抓破無膿皮卷如豆殼者死痘疤應落不落者乃火盛也宜柴苓湯加辰砂六一散用蜜水調服外用滑石末敷之痘靨不脫不渴寒戰咬牙者屬虛寒也宜木香散作癢者白芷當歸蟬蛻治之痘瘡灌漿已滿熱毒已解至收靨時有數日不焦者只看痘色如初無妨用八珍湯加牛蒡子木通補脾利水自安痘後疤痕雪白並無血色者亦急用補助氣血養脾胃庶幾可治此時有咳逆者欲呼厄逆胃氣上越也取真黃土鼻邊聞之立止此時漿滿或為寒所薄一時痘俱紫黑如紫葡萄色必驚恐急以上好肉桂磨湯或煎服立見如舊有寒戰咬牙者此真氣外發而內虛寒也宜建中湯大補之人參蜜炙黃耆白朮歸身川芎附子炮薑肉桂炙草丁香生薑一併同煎溫服一服立止甚者不過二服收靨後寒戰咬牙者同此方調治或謂寒戰咬牙之證有熱有寒如痘色紅紫齊湧掀發身熱煩躁作渴大便祕小便赤澀脈來洪數者熱也蓋胃熱則咬牙肺熱則寒戰也如痘色淡白皮薄頂陷身涼惡寒大小便利脈來沉遲者寒也蓋胃寒則咬牙肺寒則寒戰也此說當矣然此證屬寒者十九屬熱者十一見於七八日之前尤間有熱屬者見於七八日之後其熱屬者寡矣是以不為熱者立方九日十日間膿漿足而色蒼蠟者必且發熱熏蒸此回水之候也蓋真陽運化其水自然消爍而收靨矣此虛寒證也必身涼而手足冷須大補氣血而助之收結宜用溫表調中湯人參白朮白茯苓官桂蜜炙黃耆川芎歸身炙甘草炮薑防風白芷丁香附子生薑一片同煎溫服其有發熱蒸蒸而當靨不靨者毒氣未解也退其熱則痘自收宜用清表散毒湯地骨皮麥冬花粉牛蒡連翹當歸豬苓澤瀉黃芩木通生甘草水煎溫服或用砂糖半酒杯百沸湯調作一碗溫服謂之甘露回天飲能令熱退痘亦收好但毒盛者未必效調治吐瀉分別寒熱用藥俱同前痘靨時有外潰而膿水淋漓者謂之水靨宜用新瓦為末篩令極細用絹袋包撲患處若干痂堆積不落內又窨膿即以瓦粉用鴨蛋調敷立收而落此漿滿熱極而潰也當靨時或忽然腹痛者其痛著在中脘此熱毒凝滯瘀血作痛也用消毒散血湯牛蒡生白芍桃仁大黃紅花沒藥乳香水煎一服立止又有中惡忽然腹痛者死結痂厚實無他證者不必服藥結痂後發熱或煩渴者當辨其虛實寒熱調治發熱壯盛胸腹手足頭面俱熱大便祕澀小便赤澀者餘毒盛也即當解毒大連翹飲主之若解毒遲則痂落後必發癰毒連翹牛蒡柴胡當歸赤芍防風木通車前子荊芥黃芩滑石山梔甘草蟬蛻同煎大便祕者加酒炒大黃若其發熱稍緩頭熱面不甚熱手心腳心熱手背腳背不熱精神困倦大小便利者虛熱也宜補中益氣湯人參黃耆白朮歸身柴胡升麻川芎炙甘草陳皮渴者加麥冬五味子同煎服痂落還元后或痂落一半後忽然遍身大熱者餘毒欲發癰也或手足四肢頭項胸背有一二處熱甚者即癰之所在也此在漿膿不滿而結痂浮薄者速收速落者多有之急宜用大連翹飲以退其熱大便祕者加酒炒大黃微利之如熱不退須連服幾劑必須熱退身涼癰毒方可內消此時又有忽然頭頂大痛者餘毒上攻也或因多服熱藥所致若不急治其毒必注於兩目而目病大作矣宜用大連翹飲去木通車前滑石加升麻桔梗川芎薄荷服數劑以解上攻之毒庶可免目患痂落後有精神困倦飲食減少胸腹頭頂手足心發熱而煩渴者內虛也仍用補中益氣湯主之或有雖不發熱而倦怠嗜臥不思飲食或手足冷或津液少而渴或瘢白不紅血虛危證皆內虛之候也亦宜補中益氣湯調治不然恐生他證須知出痘多者收結之時還元之後五臟真氣發泄已多一身血氣耗散已盡雖或毒氣未淨而其正氣極虛是以用涼藥解毒必須用酒炒制其體氣弱者或時加人參耆歸芎之類以救血氣切不可因其有熱證而遽投以生三黃生梔子生大黃生石膏之類此時正氣微弱驟用寒涼峻攻多有一投而輒斃者戒之戒之治痘之家既謹其始又必謹其終蓋痘之危險不測者有二一曰毒甚一曰體虛當其未出之時或三五日而速斃者皆因毒盛也及其結痂還元之時或誤投一藥誤進一飲一食而輒斃者皆因體虛也然毒盛欲出不出者能順其勢以導之出而不妄施解毒以阻遏拂逆之則未必致斃故前論再三戒諭深為謹始者慮也體虛者能察其虛而補養之又防其虛而不峻攻之則可保無虞惟玩其收結還元而忽易不加謹者多致誤事故又深為謹終者警也喜泰順曰痘至八九日來已結乾紅痂疕如或少有不順至此方起膿窠行漿既已飽滿收痂次第而行若遇身重發熱停漿不易收成此則陽亢陰虛引以清涼收斂漿足氣促或因痰壅而然忽而發驚或乃小便祕結再見氣虛而陷塌倒靨而黑焦一則溫補可興一則攻發可活泄瀉安寧大虛少毒肺寒則下膿黏臟毒必然便血挫喉聲啞漿行飽滿塌癢咬牙便實聲清尤可活靨來痂硬變證終無痂脫如麩須愁餘毒攻發或致太過潰爛難行收拾身熱若見燎人泡發燎漿可畏空遺痘殼不能成痂則為漿清熱重腹脹喘呼而塌靨皆因毒入內攻出來不貫黃漿痂疕猶如血赤若能解毒於先此證斷之終美胃氣絶則口唇腫硬肝熱甚則目睛吊白喘急發於瀉後總是氣虛而斷便瀉致以煩渴豈為實熱而然泄瀉而煩渴不止理必升提好飲而發渴愈甚熱難援救氣虛寒戰痘瘡無恙即溫病漿足難收便實熱蒸須解利進清涼以助結枷用補法而防過益斟酌咸宜庶無後悔又曰痘成痂疕雖云生意已成餘毒變遷尤未得為可喜是故眼合腹脹猶蹈危機虛浮不退尚罹凶咎痂或成而反致失聲前疕恐為黑靨腫未消而眼已先開眼開疑是內攻陽氣極而狂叫喘呼腸胃傷而啼哭不寧以致風寒入胃則痢下膿黏熱滲膀胱則小便尿血熱毒逗留不化結痂而壯熱憎寒經絡各遺餘毒日晡而潮熱往來發在午前為實證煩渴腮紅申過方作是陰虛便調減食他如撮唇弄舌心經熱甚何疑扶肚抬胸肺胃毒沖有準身熱燎人便祕恐成暴急驚風悠悠潮熱便溏久變慢脾風搐驗喪明於眼合羞明辨口疳於唇焦齦黑實熱下注大腸必有祕結之禍虛寒客留臟內乃成泄瀉之疴喘渴須分虛實驗證切勿差訛欲觀痂落之餘再審瘢根之色桃紅光潤榮衛俱安紫黑乾枯尚留熱毒粉白為氣血之虛周過也應身逝牙疳狀走風之凶月餘亦見長驅遍體赤斑乃是失於解利渾身青紫恐為感冒風寒餘毒未消不時為癰為癤見風太早猶防復發瘡痍此是先腎之祕訣匪人切勿以胡傳邵公治痘祕訣一日發熱蘇發散二日還宜依本方三日見苗方解毒四日紫黑花斑湯五日夾疹大中出若有內熱紫葛湯六日齊兼看顏色托裡散法正相當若還內中有陷痘本方加減實為良七日正當痘上漿虛者俱用大補湯痘瘡起從八日來依法調治甚奇哉心中活法皆要用錯過一日枉思量九日漿兒正當出只恐氣血不周全四物湯中兼八物仔細觀察定陰陽十日期來專留意霍亂之中莫放空逐日工夫十一來四物湯方莫放開猶恐咬牙並氣咳本方數劑兩和諧十二漿完未灌頂作瀉虛寒生戰來異功散方真穩當依方調理定無差痘瘡已滿十二安心上工夫活法看一看疤色定除熱散毒方中皆要訣逐日工夫逐日用虛實加減始為良氣虛理氣為之主無血生血理之常藥不執方因活用祕傳心法活工夫若還不遵諸祕訣徒勞心力損嬰兒凡發熱三日內有痘疹痘面痛甚或作寒熱或發驚搐咬牙目白睛紅皮膚緊急或無汗此是痘毒在內毒之盛也痘出不輕用十解散以遏其勢凡初出無諸毒只吐瀉不止不能飲食宜用和中湯凡初發熱不能閣眼狂躁大渴身體壯熱或舌尖熱此毒根在內也或血從口出或從二便出此乃心經證也宜用大解散發之緩一日則難療矣或二三日口上稠密或疔毒郁斑點在肌膚之中欲出不出者以紫草透肌湯笑逢散治之本日即出如不用此二方則變陷焦枯而死凡痘出七八日未遍漿未滿乃毒之不行也用七真湯加穿山甲三片助其成漿如其不睡不痛是毒不收宜牙托散收之如過日期則難治矣如有黑陷者宜拔疔丹挑破點之凡痘初發熱因胃氣虛弱因泄瀉發腫而毒陷者以大劑散或四君子湯加肉豆蔻再用實腸散瀉止仍用保元湯加芎歸以助氣血凡痘三次灌漿頂陷不起須仔細看年壽上可起發如不起發可憂如手上痘不起發是毒在內急用升天散一服如再不起發看天庭上可起發若起發再用半劑升天散可收全功庸醫不識痘色只看周身光亮即為順證殊不知全以年壽天庭耳後漿足為主凡痘九日內如天庭印堂離宮坎宮不起發用升天散治之此藥服過一時不起再進一服若不起發乃斷不能救決死之證凡痘收後唇口不起皮急用清血退心湯治之如若不治定變走馬牙疳難治之證凡痘收後殼薄灰燥氣血盡矣急用大力解毒湯一劑後用四君子湯治之凡痘後殼薄剝落挫喉譫語急用獨活消痰飲治之凡痘寒戰咬牙急用香蘇散去其邪氣倘若痘毒攻心則難治矣凡痘後不能飲食只能吃湯此乃心經之證也倘毒攻喉須服開關散切勿太過只略退心經之熱凡痘後只能飲食又兼瀉者此係陰陽不和內有餘毒須服補陰湯以解其毒凡痘後久痢不止者此係陰陽有毒脾胃不和可用消積散可以轉愁生笑不然用止痢湯治之凡痘後有癰者此乃餘毒發於外也急用敗毒散涼其血氣連服三五劑自消凡痘出兩臉或胸膛天堂印堂生串毒形如蠶種不分顆粒隱在皮膚最難起發或舌上有紫黑色或痘疔或一點或二點如呂字或三點如品字四點如器字五點如梅花或頭面四肢發紫紅大泡渾身痘如大紅此等形狀皆不能治者如初月急宜用換痘方換之如應手後用十解散治之凡痘發熱作嘔腰疼熱一日兩臉點如針苗次日才起飲食如常此為吉證若以腰痛為凶但見作嘔為吉一日兼標者多也只要起頂黃潤為吉治表熱裡寒裡熱表寒訣痘紫乾紅熱盛皮燥二便清溏飲食短少表熱裡寒此理顯耀能明此理藥無不效裡熱表寒痘色灰白糞結尿黃咬牙寒戰辨明施治功超太皇表裡俱熱狂言煩躁痘子乾紅乾燥又渴二便不通早下奇方表裡俱寒痘色灰白陷頂不紅二便清溏頭溫足冷清漿作癢寒戰咬牙溫補回祥又曰無汗表實有汗表虛諸痛為實諸癢為虛紅則為熱白則為寒熱應足溫白赤寒熱五經治法初熱三日在腎經熱盛而不知用疏散或遍身痛或出黑斑或出之後見此乃臟腑臭爛必死此腎經之變證也見點三日在心經若痘焦赤色狂言煩躁如不知用解毒藥以致紅黑斑生或口臭尿血心經變證也起壯三日在肺經以前調治不清不知用疏毒藥或痰喘咳嗽挫喉聲啞或大便瀉此肺經變證也收斂三日在肝經已前失治而不知疏毒涼血散邪助氣以致少漿黑陷空收或寒戰咬牙或目翳此肝經變證也收靨三日在脾經如以前失治或發癰疽牙齒脫落唇焦眼腫此脾經變證也故重在先散腎毒二涼心三平肺氣三臟既平然後斂血歸肝調理脾胃自無變生之患初熱三朝腎經主事宜發散前胡半夏蘇葉葛根桔梗茯苓陳皮枳殼火盛加知母黃柏出痘三朝心經主事宜清解歸尾紅花桔梗灌漿三朝肺經主事宜溫補桔梗白芷收靨三朝肝經主事宜斂血地黃白芍桔梗靨畢三朝脾經主事宜固脾茯苓白朮薏仁蓮肉山藥痘初發熱三朝治法痘疹之發有類傷寒憎寒壯熱身體疼痛鼻流清涕者宜參蘇飲若壯熱不退譫語昏迷者宜人參羌活散若泄瀉寒熱小便黃赤口渴用四苓散加木通若干嘔加薑汁炒黃連渴加麥門冬若水瀉小便清可用理中湯加附子或人參官桂可用痘見點三朝治法發熱一朝出者凶也發熱二日出者次之發熱三四日出者皆輕若熱盛急用人參羌活散加紫草牛蒡子之類服數劑不妨若紫紅色者可與化痰湯加酒炒黃芩黃連若吐衄者可與犀角地黃湯熱極者加黃芩若痘夾疹可用麻黃甘葛湯主之其疹自退若痘夾斑可與升麻葛根湯多磨犀角水在內服之仍加紫草蟬蛻煎服若作渴照前分冷熱治之熱用四苓散冷用理中湯灌漿三朝治法灌漿三朝務須飽滿如根窠色紅是順紅疔無膿為逆可用托裡散加黃耆人參肉桂發之若內虛泄瀉可與異功散治之痘瘡起脹三朝治法痘瘡起脹俗名大胖三朝肥滿光澤根窠紅活飲食如常不須服藥必順若頂陷白色屬氣虛可與四君子湯加黃耆官桂川芎山楂人參茯苓若紫紅色者乃熱毒未解可用四聖湯加紫草酒炒黃芩黃連紅花之類治熱者四苓散寒者理中湯送下豆蔻丸痘至十日當靨治法痘瘡十日當回癢塌寒戰咬牙泄瀉腹脹者急用異功散治之如飲食不進水米不化急與丁香陳皮白豆蔻附子之類後再解毒若無膿聲啞氣急即死不治以上痘疹治法諄切明白時時參悟要在隨證處方對證用藥加之眼力觀看以決生死無不驗也諸經傳於腎經夾熱見標而毒極盛必轉寒戰而死也痘當收不收宜均氣收漿湯再加人參四物湯治之痘十餘朝不能大便者用木通白朮散治之不然變寒戰而死痘癢塌無膿七真湯加何首烏麥冬治之痘後頭痛加川芎白芷升麻在霪羊均氣二湯內服痘後聲啞用七真湯或升天散霪羊均氣湯內加訶子桔梗其功甚大痘後灰白泄瀉用升天散加人參訶子白豆蔻治之痘後腹脹用霪羊均氣二湯內加茯苓香附神麯治之痘便青糞用均氣湯加白朮附子川芎治之室女出痘行經用四物湯仍加炒赤芍治之痘出完泄瀉發腫乃毒復入內急用托裡千金散治之如不早治內攻必死如天庭有地而成者如緑豆潤澤其痘必有風寒略為疏散皮膚去其風寒助氣乃上吉之痘也如天庭痘密而黃色根窠紅者雖有後變灰色須扶表裡免成陷伏之證如天庭痘稀者各部甚多不必服藥而自愈也此痘要氣血補足如大意因循後必變為癢塌泄瀉而亡宜用麝靈丹小兒天靈蓋一具米泔水洗淨將真麝香少許塗上炙令黃色研細薑湯調下聶九吾曰大凡調治痘瘡自發熱之初見點之時即須思及如何起發如何灌漿如何收結一動手用藥便要顧首顧尾慎其初以善其後然後次第調治可保萬全也痘有夾斑而出者有紅赤點而無頭粒多隨出而隨沒又有夾丹而出者紅赤成片如雲頭而突起此皆毒火浮游散漫於皮膚之間也遇此者不必驚慌但用元參升麻湯一二劑散其遊火其癍丹自退元參升麻甘草防風牛蒡子荊芥煎溫服有夾麻疹而出者用前方加桔梗黃芩令其麻疹先退痘瘡自當起發也痘瘡初見一二日細小四五日漸大頂平至六七日腳漸闊頂愈平陷其色金白形如豆殼者名曰倒靨此氣血大虛而漿不行也宜用參歸鹿茸湯加官桂白朮川芎南木香大便溏泄者兼用參朮散痘癢者表虛也此為危證宜參耆實表湯蜜炙黃耆人參官桂炙草防風白芷當歸厚朴南木香川芎桔梗煎溫服一方外治痘癢用荊芥穗為末紙裹扎緊糊黏紙頭令不散仍烘乾燈上燃之卻於桌上舂去灰指定癢痘用荊芥火點癢處一下患者自以為妙每癢痘悉點之立止痘癢必定屬虛管蕣乃謂氣盛血熱而癢者此無稽謬說也又有謂因血上行氣分血味本咸醃螫皮肉作癢似為近理然灰白之痘不為氣虛而血虛亦甚矣豈能上行而醃皮肉癢塌最甚則此說亦未必然也有穢氣觸犯而癢者急燒蒼朮紅棗或黃茶葉以闢之甚者內服平和湯表虛之痘膿漿不滿多有癢者其在幼兒或兒雖長而神氣困者必不能禁其手搔須令其著就舊軟絹衣袖長者用絹條縛其袖口令不得爪搔為妙如無絹衣或作軟絹袋裹兒手亦可有一六歲女孩其痘不正膿漿淋漓而癢甚曾用此法得不搔破其後頭面亦無疤痕若不用此法而抓破已多縱性命能保惡疤決難免也痘痛為實此為吉兆用生白芍為細末酒調下一錢五分立止甚者不過二服痘出齊後有頭目腫脹而痘不脹者此血虛氣弱不能抱攝毒氣以成膿故其毒散漫妄行肉分也此為危候急宜大補氣血以收攝其毒則痘灌膿而腫脹自消矣參歸大補湯人參當歸身炙黃耆川芎桔梗楂肉炙甘草防風白芷厚朴紫草茸木香同煎溫服痘瘡原多潰爛收結後或手足等處仍作熱臭爛出膿水不止者生肌散摻地骨皮黃連黃柏五倍子生甘草等分研細乾摻之即退熱結痂而愈其有仍作熱作膿而不即愈者內毒未淨也仍用大連翹飲解之又有餘毒流注各處出清水者綿繭散摻也蛾繭不拘多少用生明礬末填在內燒令汁盡成灰為末乾摻之痘有鼻中衄血者毒氣上衝於肺也此其毒氣外泄亦非惡候不必驚惶只用發灰散用少壯無病人亂髮不拘男女肥皂洗淨油垢氣又用溫湯洗淨肥皂氣焙乾量發多少用新瓦罐一個將發填入內令滿淨瓦片蓋口鹽和泥封之又全封瓦罐曬乾用炭火圍罐一半煅一炷香久取出候冷其灰成塊研令極細末每用二錢童便七分酒三分調服立止輕者用灰吹鼻亦止此方極妙不惟可用於痘瘡凡諸血證皆可用或清肺湯治之花粉麥冬天冬甘草桔梗當歸生白芍片芩丹皮知母同煎一二服或入發灰一錢調服尤妙切不可峻用寒涼如犀角生地山梔生三黃之類冰伏其血必為大害世人不諸此理一遇痘瘡有衄血咽喉口舌等證即認為實熱遽投以寒涼冰凝血脈以致痘瘡不得成膿而變為壞證者多矣是治而未妨其本昧之甚者也痘有水泡無膿者血少不能化膿也急宜參歸鹿茸湯峻補其血若膿疱與水疱相半者無大妨害如十分中有二三分膿疱者猶有生意惟渾身水疱全無膿漿則危矣然胃氣好而飲食如常者亦可望生但其毒氣未散須防發癰耳其或兒小痘多則氣血有限不能盡成膿漿而水疱與膿疱相間此常理也若無他證不必施治痘有口舌生瘡者或是熱毒或是虛火當以痘色辨之切不可概認為實熱而純用寒涼解毒如痘色紅紫湧盛者熱毒也用清上飲主之薄荷防風甘草葛根牛蒡連翹桔梗黃芩黃連花粉麥冬同煎溫服如痘色淡白者虛火也用參麥清肺湯主之外用赴筵散薄荷黃柏各等分入青苔少許和勻搓如口舌生瘡而腫礙者痘靨自愈不必治治不效痘有咽喉腫痛者首尾俱用利咽解毒湯山豆根麥冬元參桔梗牛蒡防風甘草煎食後良久分三二起緩服外用王鎖匙搽硼砂朴硝殭蠶冰片研細竹管吹之痘有音啞者當細辨痘色以分順逆若痘色紅者行漿而音啞者此氣喉有痘也是以外痘行漿時內痘亦行漿也窒礙氣道而音不亮也待外痘靨則內痘亦消而音自亮矣此不必別加調治也若痘色虛陷灰白而音啞者乃血氣虛弱送毒不出毒留於肺肺氣受傷以致失音此則危矣宜參麥清肺湯主之兼用千金內托散痘有咽喉嗆水者順逆不同須當分辨若痘灌膿漿時嗆水者喉中有痘也外痘成漿則內痘亦成漿壅於會厭門而嗆也蓋是門乃飲食所進之處既有所壅則飲水必溢入氣喉而發嗆若食物有渣自能咽下不犯氣道故不嗆也待外痘靨則內自痊不藥而愈矣然此雖嗆水其喉不甚痛也若痘未行漿而喉先嗆水此則毒氣壅塞其喉必痛宜用利咽解毒湯痘有小便赤澀者宜導赤湯木通赤茯苓麥冬車前子生地甘草人參燈心同煎飢時服之如不應宜八正湯赤茯苓瞿麥萹蓄車前子山梔木通各八分滑石末二錢甘草四分燈心同煎服熱甚大便亦祕加大黃一錢順險逆三法說痘有順險逆三者治痘之不可不知也順者吉之象也逆者凶之象也險者悔吝之象也吉則不必治治之反凶凶不勞治治則無益至於險者則宜治矣夫痘之不齊由氣血之不均也凡氣血充盛則毒易解而為順矣此不治而自痊者也如氣血損則毒難愈而為逆矣此即雖治而無益者也惟氣血少弱其毒不能頓解而生意不固乎中故必加以補益扶持之功耳所謂得助者昌失助者亡且痘疏而毒少者則邪不勝正其氣自和其勢自順不須服藥若痘密而毒多者則邪正相持其氣乃病其勢乃險此宜抑邪扶正使邪氣亟奪而不為正氣之賊若痘稠密無縫而毒甚者則正不勝邪其氣自乖其勢自逆即雖善治者束手待斃而已故順者勿治險者貴治逆者不治其理於此可見矣榮衛論夫榮行脈中衛行脈外內外衛護互為滋養得天地生生之道而無咎矣然榮衛根於元氣元氣固則榮衛於脈之內外陰陽相濟而無間斷自能拘血附位而功成矣若氣在內而外不及則血載毒出為外剝氣在外而內不續則血載毒入為內攻陽道虛陰往從之陰道虛陽往從之義也是以榮衛者氣血之德也氣血者痘毒之廬也痘毒者氣血之賊也榮衛德盛則力戰其賊而廬舍全榮衛德衰則賊肆其虐而廬舍剝血不能載則塌氣不能拘則陷故痘宜調補氣血血生則內固氣益則外旺榮血得以隨氣之情培根於內衛氣得以順血之情保障於外矣夫人之一身本乎榮衛衛者陽氣所以開闔橐籥運動樞機者也榮者陰血所以充溢臟腑灌溉肢體者也故氣虛則神機息血虛則化源絶然二者又不可偏勝也夫痘瘡之毒本於五臟之液各隨經絡部位直犯榮衛而出因即氣血從之故觀其里來堅厚窠囊充長者氣之足也根芽紅活形色潤澤者血之足也氣血既足則痘易發易靨不須施治以蹈實實之戒如平陷嫩薄者氣之病也乾枯紫黑者血之病也此宜責而治之不可因循以貽後悔然脾胃者氣血之父也心腎者氣血之母也肝肺者氣血之舍也脾納水穀其悍氣注於腎而為氣腎舍於肺而為衛以溫肉分充皮毛肥腠理司開闔也若衛氣虛則瘡不起發其毒乘氣之虛而入於肺肺受之而為陷伏而歸於腎矣抑脾納水穀其精氣注於心而為血心舍於肝而為榮以走九竅注六經朝百脈也若榮血虛則瘡不光澤其毒乘血之虛而入於肝肝受之則為癢塌而歸於心矣故凡治此者氣病治氣血病治血寒則溫之熱則清之虛則補之實則瀉之仍以脾胃為主而不可犯之凡寒涼解毒傷胃瀉心之藥不可輕用也夫血之榮如水之溶周流灌溉造化潛孚無時止息氣之衛如域之堅範圍充固浩然剛大直養無害痘之一證始末俱賴於榮衛淫毒之攻侮非血氣不足以表暴形色之呈見非血氣不能以鼎峻囊廓之布列非血氣不能以充貫是以氣血不可相離陰陽不可相犯而有偏勝也血陰宜下氣陽宜上理之然也若痘以陰犯陽則氣失其平而有焦紫疔癍之患以陽凌陰則血逐於邪而致灰煤塌陷之危偏勝於陽陽為熱熱傷氣氣虛則為陷為伏偏勝於陰陰為寒寒則氣血凝滯不能生長矣故痘之出最宜氣血調和是以發熱之時色將放標欲其熱緩氣平二便如常兩類不甚赤六脈不甚洪見點纍纍根肥頂尖色甚紅活者此氣血調和之候也自一日至二三日口無穢氣色澤光亮以手按之堅纍可數日長一日身無斑點根腳不散者是雖有咳嗽噴嚏呵缺驚悸之候亦氣血沖和之證也自四日至六日勢如桃朵著露綻然可愛肌不甚腫飲食如常者此氣血充潤之候也自七日至九十日光潤如珠漿充神旺頂足盤紅身雖熱而不煩口雖渴而不瀉者此氣血安詳之侯也自十日至十二日依部結痂蠟色有神二便調實者此氣血堅凝之候也自十三至十六日身朗目開痂毒盡脫熱亦漸退者此氣血還原之候也如宜起脹之日而平陷嫩薄乾枯紫黑吐瀉不時驚搐煩悶或癍或泡如將充灌之日而漿清頂陷根腳散漫飲食少進熱極神昏灰白無膿或焦枯肉腫如將收靨之日而不結痂瀉利頻作聲啞陽氣促咳嗽不食者此皆氣血為病榮衛不周陰陽失序致毒內攻而臟腑絶故氣血實關乎痘豈可忽哉若以諸瘡皆屬心火而以寒涼瀉心為事致血凝毒滯心為君主何能運一身之血以成功耶馮氏誠求心法六脈為臟腑虛實之據氣血強弱之徵水火盛衰之驗故治百病必憑脈用藥而無誤痘瘡尤為據脈施治而有功蓋痘瘡之出全賴正氣以充托達表也痘瘡之膿全賴氣以煦之血以濡之者不獨氣血為用更有真水真火以為血之根而後煦濡有力克成氣血之德也痘瘡之收既賴土德化毒之功復寓歸藏之理故氣血尚為標而水火土乃其本也且諸瘡腫毒非氣血不和所致即暴受客熱而成並無傳經定限故可遷延歲月或調和氣血而形腫內消或解毒清涼而膿血勿潰至於痘瘡得於生身之始根於腎發於心傳於肝肺脾剋期定限十四日之中自頭面以漸而下見點起脹貫漿收靨而後已寧有內消者乎寧有不成膿者乎故必調理氣血送毒出表充托成膿則毒化於外還元於中雖有客邪外犯無足慮也是以治痘者須於七日以前如花之始蕾而發其勢日盛氣高於上之時則助氣血以令頭面貫漿氣交於中之時則助氣血以令胸背貫漿氣交於下之時則助氣血以令腿足貫漿借毒火之運行而充貫成漿自易矣有此藥力以代氣血充貫之用則膿成之後氣血無傷精神如故也若不調補氣血妄行解毒清涼延緩時日一至七日之後如花之氣斂而欲謝矣其氣日衰而降復欲升提氣血以達頭面行漿不亦晚乎況氣血日衰而充貫自難毒火無從消化重則內攻臟腑輕則變生諸證上古嬰兒天稟有餘故古方惟為疏表清理以圖易出易解蓋因氣血充足不必為之瞻顧也奈近世嬰孩受質澆漓雖名純陽之子熟知陰既不足而稟陽亦虛當此行天之證發露而陰陽兩虧者甚多難出難膿若始也徒從疏表為事則表虛者不能約束任其一湧而出則氣血充貫不周定有難漿難靨之患裡虛者中氣愈餒無力載毒成形昧者重用毒藥迅攻實同無米炊飯之象非轉虛而成內潰即奔潰而如蠶種蛇皮至於膿也而惟圖清解為事則陽虛者冰伏於中陰虛者枯涸於表水火不行無形之化氣血難成有質之功況稟薄之芽兒不耐疾病一經發熱數日元氣已傷於中再加疏表故托氣血輾轉潛耗痘之少者雖虛而無傷乎性命痘之密者愈損而絶其生機故張痛求至理凡遇六脈洪大有力者則從古法以解肌若六脈沉微無力者則微溫中以托裡使中氣不餒而氣血鼓舞則逐毒而有力起脹灌漿不謀而至也若六脈弦數無力者則惟於壯水之中仍佐補火之藥使噓濡有力而自出也蓋可見痘瘡為標氣血為本書曰認得標只取本治千人無一損此之謂也論時日氣血循行略人身血氣晝行陽夜行陰自平旦寅時從中焦注手太陰肺經卯時注手陽明大腸經辰時注足陽明胃經巳時注足太陰脾經午時注手少陰心經未時注手太陽小腸經申時注足太陽膀胱經酉時注足少陰腎經戌時注手厥陰心胞經亥時注手少陽三焦經子時注足少陽膽經丑時注足厥陰肝經血氣循行不可太過不可不及候氣失時炎眚立見且人之手足各有三陰三陽手之三陰從臟走至手手之三陽從手走至頭足之三陽從頭下走至足足之三陰從足上走入腹共合十二經絡更有曰凡子午卯酉日陰交於陽氣不足其痘多攻寅申巳亥日陽會於陰血不足其痘多剝辰日陽氣行下血留不進其痘補血戌日陰氣行上氣留不足其痘補氣丑未日氣血均行其痘多吉此以陰陽立說也然人身氣血虛實一覽可知且性稟陰陽各異豈可拘一定之時候以概不一之性稟哉七日五傳一日二日胎毒自腎而發至骨髓之分二日三日傳心血脈之分三日四日傳脾胃肌肉之分四日五日傳至肝筋之分五日六日傳肺皮毛之表七日八日膿厚漸干而愈否則為倒靨或成癰腫矣五臟胎毒所發肝為水泡其色青小是即俗謂水痘也肺為膿泡稠濁色白而大是即俗謂痘子也心為癍而主血其色赤而小次於水泡是即俗謂瘄子也脾為疹其色淺黃而次於癍是即俗謂麻子也五善七惡痘有五善七惡治者宜熟諳也何謂五善一飲食如常二大小便調三色澤紅活堅實四脈靜身涼手足和暖五聲音響亮動止安寧五者不能華具若得二三自然清吉其七惡者何躁煩悶亂譫妄恍惚一也嘔噦泄瀉不能飲食二也青乾黑陷癢塌破爛三也頭面預腫鼻塞目閉唇裂四也寒戰咬牙聲啞色黯五也喉舌潰爛食入則嘔飲水則嗆六也腹脹喘促四肢逆冷七也七惡之中但見一證即勢不可為七惡之外復有渾身血泡心腹刺痛伏陷不出癍疔肉硬便溺皆血尋衣捏空是又速亡之侯矣論痘不可妄汗妄下及宜微汗微下證夫汗下二舉乃不得已於之所投也如少誤焉貽毒不淺如痘證本稀原無閉塞表熱不快之證而妄用重藥以發之則在後必成斑爛音啞皮薄癢塌或為虛脫者有矣如氣血本和原無便閉熱毒紫黑之證而妄用重藥以下之則在後必成陷伏不起胃弱灰白或變虛羸腹脹者有矣此皆妄汗妄下之過也可不慎歟然痘亦有當微汗微下者言微者恐其過也如方熱方熾紅點未見之先影色不出煩躁腮紅起不活動者則用輕揚之劑微開腠理使痘易出況火鬱則升之以減其盛勢也其劑如升麻葛根湯參蘇飲之類若既見紅點則忌葛根恐疏表太過遂致成虛根窠易塌表實者用亦無妨更有當下之證而不下則在後必成紫黑而壅毒熱結血枯者又為失下之患矣是以痘未出時脈數洪大小便赤澀大便閉結氣粗腹脹唇燥煩渴者此是熱毒壅盛而不得泄宜微下之使內無阻滯榮衛升降則痘自順矣然痘瘡首尾無急證慎勿輕為汗下恐元氣一耗則漿無自而成後必為患矣論元氣不可形質拘世有一等孩童生得體質魁肥似血氣有餘也何患痘瘡則囊房空虛不至灌漿成膿八九日而死者何歟蓋天元不可以形拘氣血寧堪以質定彼形體雖瘦小而元氣充溢則痘自然起灌成功如形體魁大而元氣薄劣則痘必至枯澀難長故治痘看人元氣不可擬以形體況痘有經絡部位之不同多寡大小之不一氣運時令之不齊調攝愛養之得失豈可以形體論哉故痘之經絡既正顆粒稀朗氣運淑順調攝合宜梟毒原淺則瘦小而元氣實者固不為害即瘦小而原氣弱者亦有生矣如痘之經絡錯犯點數密且時令乖逆調理戾常梟毒稟盛則肥胖而氣血衰者固罹其厄即肥胖而氣血盛者亦有死者矣況瘠黑者骨堅肉硬且氣固於中骨勝肉也出痘多吉肥白者骨脆肉鬆且氣居於表肉勝骨也出痘多凶蓋腎主骨痘為腎毒耳論虛實夫不知虛實者不可以為工經曰毋實實毋虛虛故虛實之分不可不知也經曰必先度其形之肥瘦以調其氣之虛實此以形體別虛實也又曰谷盛氣盛谷虛氣虛此以飲食別虛實也又曰脈實血實脈虛血虛此以脈別虛實也又曰邪氣盛則實精氣奪則虛此以邪正別虛實也大抵實者邪氣實虛者正氣虛經曰邪之所湊其氣必虛留而不去其病則實是也又云五實死者謂邪氣之實也五虛死者謂正氣之虛也凡痘瘡之證其人形體肥健飲食能多六脈洪實素無疾病大便如常瘡色紅潤者此表裡正氣俱實也不須服藥若形體羸瘦素多疾病飲食減少六脈微弱吐利頻頻瘡色淡嫩者此表裡正氣俱虛也治宜溫補之法如瘡勢太盛焮腫痛脹大熱不退煩渴昏睡大小便祕者此表裡邪氣俱實也治宜涼瀉之法如瘡本稠密焮發紅活而吐利不食者此表實裡虛也宜於補湯中而加解毒之藥如瘡色淡白發不透滿大小便祕浩飲大嚼者此裡實表虛也宜於解利中而加升發之藥如諸痛為實然瘡痛者邪氣實也當活血以開其鬱至若痛如刀割悶亂大叫者勿治諸癢為虛然瘡癢者正氣虛也當補氣以燥其濕至若爬搔不定破爛皮脫者勿治灰白者氣虛也參耆之功為大乾燥者血虛也歸芎之功宜多虛則補之實則瀉之中病則已無過其制此治之權衡也若本實而反補之是皆補之過也如本虛而反瀉之則正氣益虛或為吐利或為厥逆是皆瀉之過也經曰毋致邪毋失正絶人長命此之謂歟禁忌夫稟氣實者夏不畏熱冬不畏寒稟氣怯者天寒陰雨感寒濕而濡瀉天氣炎熱則伏熱而中暍陽盛人耐冬而不耐夏陰盛人耐夏不耐冬此又稟受之不同也故自立夏則氣變純陽治藥者用熱遠熱如自立冬則氣合純陰治藥者用寒遠寒兼天氣大寒則蓋覆宜暖勿使毒氣為寒所觸而不得出如天氣大熱卻宜清涼不可重為蓋覆以至客熱與毒相併乃至煩躁而瘡潰爛至於時有迅雷烈風之變則宜謹幃帳節蓋覆多燒闢穢之物以闢一時不正之氣臥處最要無風又要通明忌暗時常親人看守夜中燈火莫離以便供奉飲食防禦搔破痘瘡及宜切避穢氣否則未出者不出已出者斑爛甚或瘡黑陷伏臭爛惡痛如刀剜悶亂而死並不可少使飢餒寒冷即在乳母皆所當然蓋痘賴穀氣乳哺以助其內避風寒以護其外苟穀氣一虧風寒乘襲為害殊甚但勿過為飽暖及啖煎煿五辛否則熱毒熏膈眼目必傷至於既愈則肌肉重新洗澡固禁太早風寒尤切謹防勿視為淺淡之言實衛生之大要也雜證勿治痘之為證五臟百骸無不振動血氣無不虛弱故有雜證相仍最宜戒其峻治蓋雜證痊日無定痘瘡靨日有期若治雜證一寸則痘疹落後一丈雜證未痊而痘已先斃矣故治痘不可違限而急治其標緩治其本痘之毒不解則一病不去痘之毒一解則百病自痊正在乎本上用力固何在乎一標哉但有緊要雜證則痘證亦為其所害醫者知其本末輕重以為治之緩急斯得之矣痘證重而雜證輕則雜證之藥加於痘證藥內是緩則治其本也雜證重者先逐雜證而後調其痘證是急則治其標也然用藥固其宜當調理尤善為良若酷暑而不加以涼嚴冬不施以暖則潰爛者潰爛冰伏者冰伏矣故凡用劑及諸調理並宜順四時得天和令其和暖如春使氣血調暢而毒自釋矣至於久雨陰濕天之氣厄塞人之氣亦厄塞者久晴旱暵天之氣散逸人之氣亦散逸者久雨亢陽久旱亢陰而氣血自病並須因時制宜也忌食毒物凡氣血弱者則自無所乘載其毒而痘難形此氣血之本咎也奈何不悟其理強以蟲魚腥膻牛蝨人牙等毒投之發動中氣嗟乎以毒攻毒理難並勝兼痘又因時氣感觸故固藉此而出矣殊不知毒藥損人元氣元氣既閥則毒氣愈熾氣無逐毒之能血失運毒之力一任毒藥攻擊逼出腠理之間一倍化為數倍一瘡變作十瘡不成顆粒如疥如疹少頃中氣歸復氣血不外旺藥氣如少歇則酷烈之毒其勢轉烈反為內攻矣況初起而欲表暴則雞冠血雞頭雞腦羊頭羊腦可用也貫膿而欲補托則嫩羊肉汁油炒公雞可食也常食物中自有最宜之味既有切於病情復有補於血氣何必仗諸惡劣之物哉論避穢氣凡臟腑之情遇香則榮衛通行遇臭則榮衛凝塞痘瘡全賴榮衛和暢而成功凝則熱毒無由以舒泄矣然汙穢惡臭固宜遠避而蘭麝諸香皆能走泄元氣豈其宜哉所不禁者如棗子燒煙之法一可闢其不正之氣更可助其榮衛之情且能開胃進食如被房事經水生産之穢所犯者俱以大棗燒煙解之若防發癢者則以樺皮和大棗燒煙解之若被酒厭者則以葛根茵陳燒煙解之被五辛厭者則以生薑燒煙解之被死尸之氣及癘氣所犯者則以大黃蒼朮燒煙解之為狐臭犬羊厭者則燒楓球解之若遇風雨時者則燒蒼朮楓球避之若血少而漿難之痘則忌燒蒼朮蓋恐愈燥而漿愈難耳若遇諸惡氣則通以乳香燒煙燻之以胡荽酒噴之然俗有煮醋熏痘者以醋能活血殊不知酸能收斂大非所宜也總之痘瘡一出則臟腑空虛飲食宜節勿飢勿飽衣服宜調勿冷勿熱一有不得災禍立見故諸禁忌悉宜遵戒痘初起宜食筍尖羊頭雞腦雞冠血飯內煮肉桑蟲酒釀至釀膿時宜食鵝尾肉雄雞頭煮爛蓮肉棗子年深醃肉圓眼油炒雞蛋白黏米粥肉圓嫩羊肉汁頂大桑蟲及至收靨惟宜清涼忌食毒物痘始終忌食落蘇蔥蒜韭薤栗子螃蟹鮮魚蜜餞椒辣時果圓蛤鮮豬肉一切心腎血髓肝腸酒糟物件荔枝橘子小米麥面火酒生冷發熱發氣性寒等物痘時睡中切不可驚動否則易成痘前驚痘後驚在灌漿時則易於停漿痘時如值嚴冬房中多置炭火有回天之能盛暑多列水冰得清心之喜務須四時和暖如春令氣血和暢為妙一忌對梳頭一忌六淫不正之氣一忌生人往來一忌僧道尼師巫入房一忌對搔癢一忌過冷過熱一忌對掃地一忌過飢過飽一忌驚觸一忌雞犬牛羊一忌對謊言一忌飲冷餐冰一忌飲食歌樂一忌詈罵呼怒一忌懷孕婦人一忌對哭泣一忌煎炒油鹽魚腥氣一忌房中淫液氣一忌婦人經候氣一忌麝香臊穢氣一忌腋下狐臭氣一忌溝糞惡濁氣一忌熏抹瘡藥氣一忌牛羊蠟燭氣一忌硫黃蚊煙氣一忌五辛氣一忌諸瘡腥臭氣一忌吃煙煤燼氣一忌遠行勞汗氣一忌吹滅燭氣一忌誤燒頭髮氣一忌柴煙魚骨諸毛氣一忌蔥蒜韭薤氣一忌死人尸厭氣一忌諸腥臊氣一忌醉酒葷腥氣一點燈宜用真菜油切不可用棉油雜油一宜遠避油車蓋聞香即變如悉照前戒重視謹慎則重證可以變輕如不避禁忌輕視忽略則輕證可以變重慎之慎之治痘觸變歌痘觸變紫黑倏時喘急至急覓絲瓜皮須要未生筋時取來焙乾臨用只取皮蒂為末取末蜜調置甘草地黃湯一服痘更起若加煩讝時犀角磨湯水此是四五朝治觸當如此期若至七八空殼觸必死漿半犯觸證按驗若糊指痘觸變灰白梟癢忍不得附子綿黃耆愈多功愈益盤紅根暈斂用此可效力如無根縷繞死證可言必痘正洶洶才翕漿適為月水正臨場不知潔淨相防護致使花爛倏變常月月紅花花一種不分枝葉取煎湯煎嫩杪湯投酒服根枝煎沸浴花郎不消時刻還歸正任汝經紅觸滿床麝香一觸癢難當點點花心帶黑焦急把升麻蒼耳草濃煎慢浴轉明嬌內應托裡扶元氣生地防風蟬蛻遭歸芍參耆赤豆共紅花及與桔甘交死尸觸變目翻斜痘必沉潛吐沫加速把芫荽並棗艾為筒燒避正靈家外取芫荽和姜醴唇砂再入略須佳共將煮就時時呷自得康寧掃去邪客忤相侵似若驚啼號不歇面渾青絲瓜細結含花者露摘蒸來焙粉成見證蜜調隨與服量兒大小進多輕此時莫說絲瓜賤一寸絲瓜一寸金五六朝來漿正行忽為貓犬獸驚停古人特設烏龍散遠志菖蒲各等分再加蟬蛻酒煮透去卻菖蒲遠志門蟬蛻獨留研細末砂糖調服酒含噙樣痘辨樣痘者如一家兄弟姊妹數人或兄患痘瘡沿及於弟而身出數顆此非已之正證即所謂樣痘也若痘有先標者此乃自己經位傳出又非可與沿得者同視世作樣痘者謬矣然凡兄樣於弟叔樣於侄姊樣於妹男樣於女則其起樣者正而不戾反是則逆樣痘者可不辨耶論痘疹癍子膿泡先後順逆凡瘡疹只出一般者縱有並形尤宜詳焉如先發膿泡後發疹者是脾肺相生也順也先疹後癍者是心脾相生也順也先發水泡後發疹者是肝克脾也逆也先發膿泡後發癍子者是心克肺也逆也先發膿泡後發水泡少者是金木兩得而難殺也順者多也金來剋木或木乘金衰矣逆也先發水泡後發癍子者多是火乘木衰矣逆也少者子衰母旺也順也且春膿泡夏黑隱秋癍子冬疹子是皆逆也然瘡疹既出而有逆順者三有時之順逆也春夏陽氣生髮瘡疹為順秋冬陽氣伏藏瘡疹為逆有虛實之順逆者如大便閉而能食者是為實為順也如二便利而不能食者是為虛為逆也有出入之順逆者瘡疹出者為順倒靨伏陷者為逆此其略也然凡先見疹子而夾出如水痘者定是痘證因疹子耗去榮血故白如水痘但與發散疹子繼養榮血則疹散而痘自成不可認為水痘蓋疹子從不夾水痘者耳賊痘門主論喜泰順曰痘名賊者多發於行漿之際或四五日之期或六七朝之期氣血未曾交會根窠未分陰陽諸痘未曾灌汁或於頭面之上或於腰背之間三五六粒一二三粒獨貫充足黃而出色此賊痘也賊痘一生則諸痘不能貫汁急以銀針挑破毒雖出而毒猶在內透肌發散尤加解毒為良悶痘門主論喜泰順曰祕悶之痘多發於腎發熱之時即行腰痛腹疼或兩腿痠麻不能豎立眼開譫語口臭沖人飲沸湯而不知熱飲冰水而不知寒神氣昏憒點如蚊跡紅而帶紫並無暈腳隱隱皮膚至二三日來遍身發斑或紅或紫重則青藍大斑經曰胃爛發斑臟腑虧損何由而出縱然出來形如蠶種如麩如痱如針如芥無論皮肉一樣通紅此名悶痘斷不可醫痘瘡夾癍門主論喜泰順曰夫癍者乃血之餘也有點而無頭粒與蚊跡相似又同硃砂跡點一般雜夾其中形如錦紋多發於血熱之證書云紅癍易退紫癍難消青藍之癍成大點大塊狀如蛇傷流入陰中不可治矣如見細點紅癍即以黃連紫草犀角石膏等劑頻頻進之方可挽回於十一不然先紅後紫痘必乾枯倒陷變證頻加無藥可治痘瘡發泡門主論喜泰順曰夫泡者乃氣之餘也書曰氣過則泡血過則癍多見於發起之期又見於皮薄之證而上痘不起發而遍身間必有水泡大而且亮如湯潑火燒之狀或紫或黑刺破出水有出紫血者見此俱不能生大抵皆屬肝木肝火重則激成水泡藥宜瀉肝行氣之劑泡消痘起人事安寧飲食漸進方得全生若見氣急腹脹黃泉在邇失聲悽悽陽數無幾痘證音啞作嗆門主論喜泰順曰夫人之聲出於肺清則聲清實則聲啞肺屬金又曰金空則鳴金實則啞喉之竅虛聲出而清惟痘瘡之法或因熱毒壅遏而不得發散或因氣血虛弱而外感風邪則痰塞肺竅不能流通是以音啞又有痘滿咽喉飲水則嗆是水能犯氣道故也飲食有渣滓自能入其門故嗆水而不嗆食也咳嗽則嗆嗆久則啞必然之理也是故嗆水音啞之證必兼瘡色而定吉凶若是啼哭咳嗽音啞痘色光明卻不妨是證急宜清肺解毒大用牛蒡子元參桔梗甘草麥冬等劑乃是良方痘證寒戰咬牙門主論喜泰順曰痘瘡始末何故寒戰咬牙有發熱而見此證者有起發而見此證者有行漿而見此證者有收靨而見此證者名曰寒戰其病寒也無疑矣有先戰而後寒者有先寒而後戰者書云七日以前而見此證者屬熱而凶七日以後而見此證者屬虛而亦有可治吾深歷其境是寒戰咬牙其屬火也多矣凡痘色紅紫乾枯多有是證其寒也熱極生寒其戰也火甚則戰石膏大黃在所宜施凡痘灰白不紅綻不起發昏暗頂陷肌體㿠白泄瀉眼開其寒也先必毛竅豎立形如雞皮微微而寒微微而戰是寒也乃氣虛則寒是戰也乃血虛則戰大用參耆木香丁桂之藥以助真元七日以前咬牙者乃陽明胃經主之陽明主肌肉其經走上下齒齦邪並陽明故咬牙也又主胃熱宜清之七日以後咬牙者乃陽明陷於陰陰分虛則陽入血道而咬牙也主血虛宜補之是咬牙有虛實之分有輕重之論大抵必兼痘色而定其虛實方為的確假若七日以後根紅不緊而且紫豔頂陷火剌口唇破裂渴欲飲水煩躁悶亂而見此證者亦為七日後便屬虛乎是以咬牙又當聞其聲其聲薨薨如咬索者如嚼豆者屬熱其聲蠅蠅如哺綿者屬虛大抵聲響而硬熱無疑矣聲低而軟虛無惑焉總之見證參詳論痘施治再無失矣痘瘡驚搐門主論喜泰順曰諸風掉眩皆屬肝木惟痘瘡之發毒犯於肝尋竅而出故先驚搐手足厥冷目睛上竄如風之證醫者當辨痘疹驚搐不可遽投涼心之劑苟不審而概以驚藥治之則心寒而肌斂毒氣內陷痘何由而出也然痘先驚者多吉痘後驚者多凶先驚則毒得外泄而熱自解後驚則氣血虛而毒反凝滯恐後日之漿膿不附故凶醫者當謹辨之痘瘡癢痛門主論喜泰順曰諸痛為實諸癢為虛痛為佳兆癢為惡徵經曰實者邪氣實也虛者正氣虛也又瘡證為火火盛則痛火微則癢如痘瘡結實高聳而作癢者是火溢於皮膚之間遊移往來故爾作癢法宜清涼解毒外以茵陳芫荽等藥熏之其癢自止若七八日之期皮薄漿清而有是證者是血不能附氣化漿所以作癢其癢萬不能禁以致頭面抓破如有鮮血淋漓急以敗草散牛糞灰敷之內用清涼攻毒之劑以待變臭發毒雖然惡候尚在可醫若是抓破並無膿血痘必乾枯音啞作嗆種種變證勢必頻加臨期十日命厄歸泉痘瘡倒靨門主論喜泰順曰痘至八九日來漿行半足根暈未收忽而一齊紫黑古人名為倒靨請君莫認結痂攻發若得其宜此證猶堪復活旁生血點再行漿危證還當又治若見氣急腹脹煩躁喘渴此毒氣內攻重歸臟腑總為惡候定是難醫痘瘡外靨門主論喜泰順曰痘瘡順證點粒稀疏根窠紅活至八九日來漿行滿足色漸蠟黃根暈盡化從人中上下靨至兩腿此正收正靨若遇險證及五六日氣來化血成漿頭面必腫眼鼻封塞如蒸籠透物氣不走泄而酵發也八九日來必串成一塊皮薄易破膿血齊流急以松花粉搓之內用清涼攻毒之劑至十朝前後必潰爛變臭雖為惡候尚屬可治只要聲音響亮飲食如常臭而不惡外靨之蓋如雞糞堆此外靨之正候也如膿漿潰爛濕流不幹臭如尸惡飲食不進此為爛痘聲音短促或失聲或音啞眼開腫消不特無蓋形如剝兔此外靨之死候也大抵抓破之時有膿血淋漓者為外靨之候庶幾可治純是清水不流膿血不能結痂者實為難治紙捻照法用紙捻飽蘸麻油即用烘乾臨時欲用再蘸其油於燈上往來略炙令油無泡方點照之則免熱油爆傷皮肉其照時須將門窗盡閉至令黑暗欲視其左火移於右欲視其右火移於左上下同此法照之則痘之多少色之如何預知矣麻疹則浮於皮外而肉內無根痘瘡則肉內有根而極深者也故有以手摸之者亦以其痘有根核而驗之耳若以目光觀之則不見矣故不若火之為可預知也凡以火照而兒驚搐大叫者亦痘候也因心火太盛而與外火相搏耳治宜微利以導心火否則驚搐踵作矣論服藥法並禁解毒寒涼小兒多不肯服藥強之亦不能多進然病勢猖獗非藥力不能驅逐痘屬虛寒者尚可延綿數日屬實熱者火性急速藥不可緩故惟宜重劑膿煎上用頭服則藥力方能勝病至於乳母亦宜服大劑使乳汁亦有藥力但解毒寒涼之藥不可痘初輕服蓋痘本於胎元伏於腎臟感觸而出毒莫可御也非若諸瘡之出初發可以解毒內消而愈已成可用解毒逐散而愈蓋臟毒屬陰而最深必藉氣血送出於皮膚運化於窠囊收結成痂還元而後已寧有內消者乎寧有不成膿者乎故諸瘡可以解毒為主而痘瘡必賴氣血以送毒為主也況解毒之藥多傷胃氣多損氣血且毒有不必解者有不可解者如稟賦強旺氣血充足胃強能食自能運毒以成功此不必解毒者也如稟賦怯弱氣血衰微胃虛少食則雖調補氣血尚虞不能送毒成功此不可解毒者也至於解毒之方若投之於將出之際則寒涼抑遏毒滯於中非徒無益而反害之惟結痂之後有餘不盡之毒假藥力以解散之免其流滯為癰則可耳看水痘法水花兒即是水痘遍身扛手其色白而淡且無紅是水花兒莫作正痘看
