body:
  text: 卷十六齦齒部凡一切風火蟲牙牙癰牙疳槽風皆匯於此部中以便檢閱參治牙齒望色辨證法齒燥無津液者是陽明熱極齒如熱者病難治前板齒燥兼脈虛者是中暑牙關緊急門主論經曰陽明之脈循頰車入齒縫風寒中之輕則戰慄鼓頷重則口噤不開又曰凡卒中昏倒牙關緊急者此中風痰也又曰風入頷頰之間則口喎而牙緊又曰卒暴中風牙關緊急藥不得下用通關散細辛薄荷豬牙皂雄黃各二錢研細每用少許吹入鼻中俟噴嚏後然後進藥如不嚏者不治牙關緊甚前藥中加麝香少許或用烏梅或白梅去核用藥擦牙蓋酸先入筋使牙關痠軟即開亦木能剋土之義因牙齦屬陽明胃土也又曰骨槽風頰車疽風熱太甚痰涎滯膈風喜傷肝復能燥物是以筋燥勁迫而牙關拘緊此實邪耳馮魯瞻曰口噤者足陽明之病頰車穴主之蓋陽明經絡挾口環唇循頰車而諸陽筋脈皆上於頭三陽之筋並絡頷頰夾於口風寒乘虛而客其經則筋攣急牙關緊而口噤牙關緊急門主方中風牙關緊急烏梅肉揩牙即開小兒牙關不開天南星煨熟乘熱紙裹不要透氣將紙剪芡實大一竅透氣塞於兒鼻孔中牙關即開凡患喉齒口不能張豬牙皂青黛北細辛殭蠶各一錢山豆根元參各五分共研細末吹男左女右鼻中即開牙齒門主論上四門牙屬心一云上二門牙下二門牙屬心包絡門牙旁左右上下四牙屬肝再左右上下四牙屬胃再左右上下四牙屬脾再左右上下四牙屬肺再左右上下之牙皆屬腎凡人齒多者貴治病不論多少以前數分治之多效下四門牙屬腎上二側牙屬胃下二側牙屬脾上左盡牙屬膽下左盡牙屬肝上右盡牙屬肺下右盡牙屬大腸又有牙齦腫高軟者此名牙癰內必有膿當以針刺出膿自愈如出血不止用草紙冷水浸貼二三次自止正宗風牙痛者遇風發作浮腫隨後生痛火牙痛者齒根必牽扯腮顴陣陣作痛時發時止濕熱牙痛者乃足陽明胃經其患腮顴浮腫甚則牽引太陽疼連頰項口中熱氣大便結燥蟲牙痛者因喜食甘香濕熱化蟲攻痛頻痛齲齒者乃風熱相搏忿怒勞頓牙根腫痛是手陽明足太陽之脈繫於齒名齲齒錦囊又曰如牙痛不可忍牽引入腦喜寒惡熱脈洪數有力者涼膈散倍加酒蒸大黃瀉之又曰如驟發大痛者多屬龍火如疾風暴雷焚灼草木最速最烈必用從治之法熱藥冷飲則火得其源而歸之矣竇漢卿曰牙邊生癰如豆大此脾胃二經火也宜用小刀點破之搽以冰片散再服清胃湯甘桔湯無不愈矣王海藏曰牙齒等齲臭穢不可近數年不愈當作陽明蓄血治好飲酒者多有此證桃仁承氣湯為末蜜丸服之甚效又曰牙得清涼而痛甚者為寒口吸涼風而痛止者為熱馮魯瞻曰齒黑碎片名曰崩砂久而穢甚牙根俱落名曰腐齦若跌撲所傷者或急疳所墜者則久落難生矣錦囊陳遠公曰牙齒疼甚不可忍每至呼號淚涕交出者此臟腑火旺上行齒牙作痛也若不瀉火何能取效之捷然火有虛實實火起於腑虛火動於臟而實火之中有胃火心包火虛火之中肝脾肺腎諸經之火當分經以別之予有統治之法用治牙仙丹元參生地各一兩水煎服之如察知為心包火加黃連五分脾火加白朮一錢肺火加黃芩一錢肝火加丹皮一錢腎火加熟地一兩二劑火散四劑全愈冰鑑按火有虛實何以一方均治不知火之有餘無非水之不足我滋其陰則陰陽之火無不相戢矣況元參尤能瀉浮游之火生地止無根之焰又瀉中有補故虛實咸宜此治之巧而得其要者也又能辨各經之火加入各經之味有不取效盡神乎又曰貪食肥甘齒牙破損作痛如行來行去者乃蟲積也夫齒乃骨何以藏蟲乎不知過食肥甘則熱氣在胃胃火上衝口齒濕氣乘之則濕氣相搏而不散則生蟲於牙矣初則只生一二蟲久則蕃衍於是蝕損牙齒遂致墮落一齒既朽又蝕余齒往往有終身之苦者此證必須外治若用內治未必殺蟲而臟腑先傷用五靈至聖散白薇五靈脂各三錢細辛骨碎補各五分研細末先以滾水漱牙至淨後以藥末五分滾水調如稀糊漱牙半日至氣急吐出如是者三疼止蟲死矣斷不再發蓋齒因蟲痛靈脂白薇殺蟲於無形細辛散火碎補透骨引藥入骨則無可藏蟲蟲盡則痛自止又曰牙疼日久牙床腐爛飲食不能用日夜呼號此胃火獨盛上升於牙也身中之火惟胃最烈火在何處即於所在之處受病火原易升而難降也火升於齒牙齒牙非藏火之地於是焚燒兩頰牙床紅腫久則腐爛矣似可用治牙仙丹加石膏治之然其火蘊結可用前方以消彌於無形今既潰爛則前方又不可用以有形難於補救也宜加減竹葉石膏湯竹葉三百片石膏青蒿各五錢知母半夏各二錢麥冬茯苓葛根各三錢水煎服四劑火退腫消後用治牙仙丹以收功也又曰牙疼至夜而甚呻吟不臥者此腎火上衝也然此乃虛火非實火人作火盛治之多不效即作虛火治亦時有不效者何故蓋火盛當作有餘火衰當作不足乃下是虛寒上現假熱也人腎中不寒則龍雷之火下安腎宮惟下寒甚而水又無多則腎火無可藏於是上衝咽喉而牙受之齒乃骨之餘同氣相招留戀不去夜分尤腎主事水不能養火火自遊於外乃至齒作祟矣急大補腎水益以補火之味引火歸源火自得水養不上越矣八味地黃湯加骨碎補服一劑痛止二劑不發也六味補水附桂引火歸於命門何又加骨碎補不知補水引火之味必先入齒則痛根始除用之以透於齒骨之中而後直入命門此拔本塞源妙法也又曰牙疼難忍閉口稍輕開口更重人以為陽明胃火也誰知乃風閉於陽明太陽乎此得之飲酒後開口向風而臥風入牙中不出初小疼而後大痛也論理去風自愈而風藥必耗元氣因虛入風又耗其氣其氣益虛風邪欺正氣之怯而不肯出疼難止也古人用灸法甚神灸肩尖近骨後縫中小舉臂取之當骨解陷中灸五壯即瘥但灸後必大痛良久乃定永不發也有畏灸者可用散風湯生地麥冬各五錢當歸三錢石膏花粉各二錢胡桐淚乾葛細辛各一錢白芷升麻各三分水煎服二劑愈矣此方補重於散正風得補而易散也又曰牙痛甚吸涼水暫止開口復作人以為陽明火盛也誰知濕熱壅於上下之齒不散乎夫濕在下易散在上難怯蓋治濕不外利小便也水濕下行其勢順上行其勢逆且濕從下受易於行上感難於散故濕熱感於牙間散之尤難以飲食之水皆必齒牙經過不亦重甚濕乎濕重不散火且更重矣所以經年月不止也治法必上祛其濕熱又不可單利小便也佐以風藥則濕得風而燥熱得風而涼濕熱解牙疼自愈矣醫論選要曰外板則為牙內床則為齒汪省之曰蟲牙乃胃經風濕所致薰法甚捷理例經曰男子八歲腎氣實而齒更三八真牙生五八則齒槁八八而齒去矣女子亦然以七為數蓋腎主骨齒者骨之標髓之所養也凡齒屬腎上下齦屬陽明上齦痛喜寒飲而惡熱飲取足陽明胃下齦痛喜熱飲而惡寒飲取手陽明大腸故病有惡寒惡熱之不同也凡動搖疼痛出血或不出血齒縫疏豁全具欲落之狀者皆屬腎也經曰腎熱者色黑而齒槁又曰少陰經病者面黑齒長而垢其蟲疳齦腫不動而潰爛痛穢者皆屬陽明或諸經錯雜之邪與外因為患俱分虛實而治腎經虛寒者安腎丸還少丹重則八味丸其冬月大寒犯腦連頭痛齒牙動搖疼痛者此太陽並少陰傷寒也仲景用麻黃附子細辛湯凡腎虛者多有之如齒痛搖動肢體倦怠飲食少思者脾腎虧損之證安腎丸補中益氣並服如喜寒惡熱者胃血傷也清胃湯惡寒喜熱者胃氣傷也補中益氣湯又曰齒者骨之餘腎之標寄於齦養於氣血上齦屬足陽明胃下齦屬手陽明大腸然齒者骨也本乎乾元以資始齦者肉也本乎坤元以資生譬之木生於土籍土以為養也故齒之為病手陽明足陽明足少陰三經之所致蓋上下齦屬陽明金也齒屬少陰木也故陽明實則榮蔭其齒而堅牢陽明虛則齒失所養而浮豁故凡動搖脫落牙脆剝下齒縫漸稀畏冷畏熱浮豁不堅隱隱而痛乃腎之本虛以致標亦虛焉至於生蟲浮腫牙宣出血臭穢腐爛者乃腸胃濕熱壅盛所謂熱勝則肉腐也虛者補之濕熱者瀉之胃火壅者清之風寒外束者散之外以末藥擦之甚而齦爛齒落者猶土崩而木倒也其治在齦齦堅則齒自固矣又曰牙床腫痛齒痛動搖或黑爛脫落者此屬陽明濕熱蓋齒雖屬腎而生於牙床上下乃屬陽明大腸與胃猶木生於土也腸胃傷於美酒厚味以致濕熱上攻則牙床不清為腫為痛或出血或生蟲由是齒不得而安如地土不堅而樹木為之搖動矣此宜瀉陽明之濕熱則牙床清寧齒自安固如調理不退落齒一二個者多死不治又曰凡齒痛遇勞即發及午後甚者或口渴面黧及遺精者皆脾腎虛熱用補中益氣及六味丸或十全大補湯海藏云牙痛證有因傷胃而素有濕熱故上浮於牙齦之間遇風寒或冷飲所郁則濕熱不得外達故作痛也其病情有標本之分用藥有溫涼之異當以寒為標故外擦漱之藥宜用蓽茇細辛之類辛溫以散開鬱兼可拔散鬱熱也以熱為本故內服之藥宜用生地丹皮連翹薄荷之類辛涼以散熱清中如此內外交攻標本俱得豈有不愈者乎若驟聚大痛者多屬龍火如疾風暴雷焚灼草木最速最烈必用從治之法熱藥冷飲則火得其源而歸之矣若投正治妄用寒涼益增其病至若痛不可忍牽引入腦喜寒惡熱脈洪數有力者涼膈散倍加酒蒸大黃瀉之夷門廣牘曰齒乃血之餘耳乃腎之餘頂乃髓之餘爪乃筋之餘語乃氣之餘筆談云沈存中苦腰重不能行有將佐曰此乃病齒數年用苦參擦齒其氣味入腎傷腎所致也後太常少卿舒昭亮亦用苦參擦齒歲久亦病腰痛自後不用之疾皆愈此方書所不載者牙齒門主方葛根湯葛根二錢赤芍藥一錢五分赤苓五分甘草五分風勝加荊芥防風薄荷葉火盛加連翹生地丹皮牛蒡子煎服止痛散程山齡牙硝硼砂各三錢明雄二錢冰片一分五釐麝香五釐乳細擦牙出涎立愈煎方荊芥穗防風牡丹皮生地各七分牛蒡子青皮生石膏甘草各三分上四門牙屬心加川黃連三分麥門冬五分下四門牙屬腎加黃柏六分知母六分上兩側牙屬胃加白芷五分川芎三分下兩側牙屬脾加炒白朮六分炒白芍六分上左盡牙屬膽加龍膽草三分羌活七分下左盡牙屬肝加柴胡六分梔子五分上右盡牙屬大腸加黃芩六分桔梗六分下右盡牙屬肺加黃芩六分桔梗六分牙痛加蒲公英八分金銀花六分貝母六分牙床腫加連翹八分漱方蘇薄荷射干牛膝夏枯草山豆根陳茶葉煎漱並治咽喉腫痛又方蒼耳子北細辛花椒各五錢小麥浮者一撮好醋一碗煎半碗漱之又方山豆根切三分長以滴醋浸一時噙於口中將苦汁嚥下久而又換一塊連換數次自愈又方火硝五錢草果一兩咀片鹽水浸一時炒乾研細擦之風火蟲牙巴豆一粒燈上燒去殼花椒三粒搗丸口含患處立止又方白芷北細辛鶴蝨干茄子各等分研細一擦即止又方樟冰雄黃各等分研細擦又方火硝三錢明雄七分冰片一分研細搽麝香散真麝香二錢黃連一錢冰片三分研勻每一伏時勻擦五六次虛火牙痛清晨以小便頻漱立止牙痛黃豆五粒巴豆三粒捶研丸豆子大用一丸含牙痛處出涎盡以溫水漱四五次又方乳香去油香白芷沒藥去油雄黃川芎各二錢火硝五錢各研另裝瓶內臨時旋合令患者含水一口將藥吹鼻孔內吐水即愈又方真輕粉杭粉各一錢研勻用大蒜搗勻填入白果殼內合魚際穴上用絹帛縛之痛止即去遲則起泡又方牛膝炒大黃炒杜仲青鹽各等分研細擦痛處即止蟲牙川烏草烏胡椒各等分研細鋪草紙內作捻蘸麻油點著吹熄以煙噙患處熏之取牙法白馬牙火煅存性川烏煅存性紫玉簪花根竹刀切片陰陽瓦焙各等分研勻每用少許點牙齦上其牙自落牙痛不可忍者北細辛高良薑草烏白芷蓽茇各等分研勻每用少許搽之立止風火蟲牙黃蠟一兩瓷器重湯燉化離火將凝入有紋龍骨生用不必炮製杭粉各二錢五分麝香二分五釐研細攪勻做成大小粗細錠子如有牙痛取紙條在暖壺上熨熱攤藥紙上臨臥時剪一塊貼在痛牙上次早取下如墨染黑一般諸毒盡出其效如神又方明雄玄明粉各等分研細搽上立止又方五倍子防風青鹽各等分研末火煅存性擦之後以醋或鹽水漱去涎蟲牙五倍子胡椒研末為丸塞蟲蝕孔中即止風火蟲牙鮮生薑切片噙在疼處流涎則住痛又方三年陳醬茄蒂陰陽瓦焙存性加硼砂二釐冰片一釐為末擦之立止又方陳茄子燒存性枇杷葉炙脆各等分為末加冰片少許擦上立止又方先以熱醋漱口再用海螵硝末擦牙四寶湯當歸生地黃升麻赤芍藥各三錢水二盅煎一盅服一半留一半漱口吐去牙痛立止又方蘄艾一兩大蜂窩一個同好醋煎濃漱口一日愈又方牛蒡子生研綿裹塞痛處流出苦水即愈又方荔枝殼裝青鹽燒存性擦牙痛處極驗錦囊新定頰腫齒疾神方治尺脈無力虛火上攻寒束內熱頰腫齒痛羌活二錢製附子一錢北細辛八分石膏煅三錢水三盅煎一盅食前服牙痛不可忍腮頰牙齦皆腫者荔枝七枚鑿一孔去肉入醋於內放燈頭上燒滾漱之其腫立消其痛立止貼牙去毒至老不痛濟生山梔煎濃汁黃柏煎濃汁各五錢真麝香五分杭粉五錢龍骨五錢打如豆大塊子入梔柏汁內煮乾研極細用明淨黃臘一兩熔化入前藥和勻捏成錠攤絹上剪作細條臨臥時貼牙上明晨取下凡黑處俱有毒是作痛處也又方生半夏兒茶各五釐冰片三釐上研細末用壁上蟢蛛窠包藥少許捻在細柳枝上蘸油點著即吹滅熱刺痛處至重者三四次即愈牙齦腫痛集效山慈菇根莖煎湯漱吐牙齦腫痛備急山豆根一片含於牙齦腫痛處牙齦腫痛摘玄瓦松白礬各等分水煎漱立效食蟹齦腫永類朴硝敷之立消食蟹齦腫肉努出者普濟生地黃汁一碗以豬牙皂角蘸炙汁盡為末敷之風熱牙痛集要香白芷一錢硃砂五分研末蜜丸芡實大頻用擦牙絕勝他藥又方集要白芷吳茱萸各等分浸水漱涎又方經驗槐枝煎濃湯二碗入鹽二斤煮乾炒研日用揩牙以漱水洗或用青鹽更佳又方普濟蒼朮鹽水浸過燒存性為末擦牙又方聖惠荊芥根烏桕根蔥根各等分煎湯頻含漱吐又方普濟荔枝連殼燒存性研末擦牙即止乃治諸藥不效仙方也又方聖濟百藥煎泡湯噙漱又方肘後獨活煮酒熱漱又方普濟千年石灰細辛各等分研搽即止又方集玄旱蓮草入鹽少許於掌心揉擦即止紫金散家藏治風熱積壅一切牙痛兼蠲口氣大有奇效好大黃瓶內燒存性為末早晚擦漱又方秘錄薏苡根四兩水煎含漱又方本事馬齒莧一把嚼汁漬之即日腫消又方聖惠生絲瓜一條擦鹽火燒存性研末頻擦涎盡即愈腮腫以水調敷之即便可消惟蛀牙不效又方集效大荔枝一個開一孔填鹽滿殼煅研搽之牙腫痛連頭面俱腫十便露蜂房燒存性研以酒少許調漱又方百一高良薑二寸全蠍焙一枚研末摻之吐漱以鹽湯漱口又方濟生香附炒存性三兩青鹽生薑各五錢為末日擦能烏須止牙宣風熱毒攻頭面齒齦腫痛不可忍聖惠牛蒡根一斤入鹽花一錢銀器中熬成膏每用塗齒齦下重者不過三度又方聖濟鵝不食草綿裹懷干為末含水一口隨左右㗜鼻亦可挼塞之又方濟世薄荷二錢羌活三錢大黃一錢水二盅煎一盅去滓溫漱吐去又方濟世老薑川黃連防風各等分研末擦之又方濟世北細辛豬牙皂白芷各一錢防風五分研末用柳枝煎湯漱過擦之又方普濟零陵香梗葉煎水含漱風蟲牙痛三半百年陳石灰為末四兩蜂蜜三兩拌勻鹽泥固濟火煅一日研末擦之又方攝生肥皂一個去瓤入山奈甘松各三分花椒食鹽不拘多少填滿麵包煅紅取研日擦漱去又方普濟芭蕉根自然汁一碗煎熱含漱又方摘玄楊梅根皮韭菜根廚案上油泥等分搗勻貼於兩腮上半時辰其蟲從眼角出也屢效又方衛生針刺桃仁燈上燒煙出吹滅安痛齒上咬之不過五六次愈杏仁亦可又方易簡胡椒蓽茇各等分研末蠟丸麻子大每用一丸塞蛀孔又方聖惠乳香枯礬各等分研末蠟丸塞之又方集簡刮松樹上脂滾水泡化一漱即愈又方袖珍草蜂房一枚鹽實孔內燒過研末擦之鹽湯漱去或取一塊咬之又方類要雄黃末和棗肉丸塞孔中又方普濟礦灰沙糖和塞孔中又方集簡蛇床子煎湯熱漱數次立止又方濟急蓽茇末擦之煎蒼耳湯漱去涎又方延年鼠黏子炒煎水含漱吐去又方普濟附子一兩燒灰枯礬一分研末擦之又方集簡使君子煎湯漱口金針丸聖濟骨碎補乳香各等分研末糊丸塞孔中又方急救燒酒浸花椒頻頻漱之又方摘玄黃茄種燒灰擦之又方集驗松脂紝塞蛀孔須臾蟲從脂出又方普濟潮腦硃砂等分擦之又方仁存茄蒂燒灰摻之或加細辛末等分日擦又方集驗乳香川椒各等分研末蠟丸塞孔又方普濟露蜂房醋煎熱漱或加細辛或加乳香水煎漱之又方仁存山楂為末鋪紙上卷作筒燒燈吹滅乘熱和藥吹入鼻內即止痛又方普濟化蠟少許攤紙上鋪艾以箸捲成筒燒煙隨左右熏鼻吸令滿口呵氣即止又方救急瓦片煅紅安韭子百粒清油數點待煙起以筒吸引熏患處良久溫水漱吐有小蟲出盡為度痛連頭腦傳信補骨脂炒五錢乳香二錢五分為末擦之或為丸塞孔內齦常出血漸至崩落口臭極效本事大黃米泔浸軟生地黃各旋切一片合定貼上一夜未愈再貼忌說話恐引風又方簡便魚腥草花椒菜子油等分搗勻入泥少許作小丸如豆大隨牙左右塞耳內兩邊輪換不可齊塞恐耳氣一日夜取看有細蟲為效又方海上露蜂房煎湯洗漱過以陳茄秸燒灰敷之或茄根搗汁頻塗之又方食寮鹽五錢皂莢兩挺同燒赤研夜用擦牙一月即瘥又方永類薏苡仁桔梗各等分生研為末水調服大小兒並治又方經驗川烏頭生研川附子生研麵糊丸小豆大每綿包一丸咬之腎虛牙腫火痛濟世杜仲青鹽大黃炒牛膝炒上為細末擦之又方經驗甘松硫黃等分為末泡湯漱之吐去神效又方靈苑骨碎補二兩銅刀細銼瓦鍋慢火炒黑為末擦牙良久吐之嚥下亦可極能堅骨固齒去毒止疼又方奇效仙靈脾為粗末煎湯頻漱大效胃火牙痛腫痛保壽堂好軟石膏一兩火煅入淡酒內淬過為末加防風荊芥細辛白芷各五分共研細日用擦牙又方集效升麻煎湯漱咽之解毒或加生地黃諸般牙痛普濟香附艾葉煎湯漱之又將香附炒黑為末擦去涎又方通變川椒四兩煎汁拌青鹽二兩白鹽四兩炒乾擦牙洗目甚妙又方普濟皂莢濃漿同朴硝煎化淋於石上待成霜擦之又方聖濟木香末入麝香少許擦牙鹽湯漱之又方直道縮砂常嚼良又方集驗地松曬乾為末用一捻湯泡少時以手蘸湯挹痛處即定又方濟急青蒿一握煎水漱之又方千金牛膝研末或燒灰擦漱又方海上隔年糟茄燒灰頻頻乾擦立效又方高鹽鶴蝨煎米醋漱口或同防風煎水噙漱仍研鶴蝨草塞之又方節齋三葉酸漿草一把洗淨川椒四十九粒去目同搗爛絹片裹定如箸大切成豆粒許每以一塊塞痛處立止又方急救黑豆煮酒頻漱又方集簡蘿葡子十四粒生研以人乳和之左疼點右鼻右疼點左鼻又方普濟老生薑瓦焙入枯礬末同擦有人日夜呻吟用之即愈又方御院乾薑炮川椒等分為末摻之又方普濟木耳荊芥等分煎湯頻漱又方海上秋茄花旋燒研塗立止又方孟詵吳茱萸煎酒含漱又方聖惠枳殼浸酒含漱又方集簡梅花冰片硃砂各少許為末擦之立止又方經驗青荷葉剪取錢蒂七個以濃米醋一盞煎半盞去渣熬成膏頻頻抹之又方普濟白殭蠶直者生薑同炒赤黃色去姜為末以皂角水調擦立止又方急救五靈脂一粒咬痛處一熱茶時涼水漱吐又方急救當歸五靈脂細辛各等分水煎漱齒搖動及打傷御院白蒺藜去角生研五錢淡漿水半碗入鹽調溫漱甚效或以根燒灰貼牙即牢固也牙動欲脫千金生地黃綿裹咂令汁漬牙齦並咽日五六次又方急救五倍子取一孔以白礬填滿煅過為細末擦之能烏須固齒動搖將落者即堅牢神效不能盡述香鹽散急救香附炒黑四兩青鹽一兩為末每日擦牙治一切牙證齒挺長出分許備急常咋生地黃良齒黃時珍糯糠燒白灰擦之痛牙欲取鮑氏茄科馬尿浸三日曬炒為末每用點牙即落神妙牙痛奇方鮮菖蒲根搗汁左牙痛滴在左耳內右牙痛滴右耳中左右牙痛兩耳俱滴屢驗又方巴豆半粒塞牙縫立止又方防風川椒甘草浮麥煎湯漱又方粗碗一隻川椒鋪底潮腦蓋面覆碗一隻於上鹽泥封固慢火煅一夜次早研細每用一釐擦牙根又方五倍子一個開一孔用鹽填滿炭火煅存性略出火氣研末以手指蘸擦牙漱津片時吐出數次即止取痛牙法白馬尾燒灰存性點上即落但須認定痛牙點之不可亂點恐好齒沾著亦落取痛牙法馬歧山白龍骨三錢研用大蒜一瓣搗爛入末一二分拌勻貼痛處半枝香時即落牙痛明雄牙硝硼砂銀硃各一錢冰片三分共乳勻搽牙齦內外上下任其流涎自愈又方五倍子研細每用三錢火酒半飯碗和勻重湯燉一炷香漱患處立時定疼永遠不發又方北細辛川萆蘚各等分滾水沖漱之立愈失笑散江仍度治牙疼如神蓽茇八分北細辛淨葉一錢大冰片二分五釐共研極細擦牙痛處伏於桌邊流涎任其挖去片時見效便能飲食取痛牙法白砒江子各五錢共研細末以竹筒盛之封固埋於白馬糞內藏著春三夏四秋七冬十日取出懸於淨室中將患牙用涼水漱過將藥點在患牙根上咳嗽一聲其牙即落並不疼痛風火蟲牙升麻一錢甘草五分石膏春夏四錢秋冬二錢作一劑春夏用竹葉三十片為引秋冬用細茶葉二錢為引如臉腫加川芎牙疼不可忍者花椒焙胡椒食鹽炒枯礬明礬各五分共研細每用少許擦吐涎取牙白馬尿浸白茄根日曬夜露三日研細末每用少許點放牙齦即落風火牙粗碗一隻入潮腦一兩於碗底內上加蘇薄荷葉五錢以水將薄荷葉潤透蓋潮腦上用綿紙糊碗口放灰火上煅兩炷香開看紙上升的潮腦每用少許擦牙牙疼北細辛蓽茇豬牙皂荊芥食鹽各一錢三柰麵裹煨熟二錢川椒五分研細擦牙良久以水漱去蟲牙山西大同鹼少許新絲棉裹作小球塞痛牙內候化出咸汁即止奎光牙證主方治一切牙風牙疳牙癰牙咬等證玄參地骨皮白芍牡丹皮黃柏甘草梢知母黑山梔生地車前子水煎服如熱甚加熟石膏為君炒黑升麻為佐如有風加荊芥穗如虛加熟地枸杞子如欲解毒加黃連連翹若穿牙疔毒則用消腫解毒之藥加紫花地丁甘菊花牙痛杉木皮煎湯漱牙痛蟾酥五靈脂麝香各一分研勻用絹稱一分重包藥紮緊咬牙痛處即止風火蟲牙雄黃五錢元明粉潮腦硼砂各二錢蓽茇川烏各一錢共研細末擦三香散丁香川椒取紅如無用蓽茇代各等分冰片少許上為末敷牙根腫痛立止二辛煎陽明胃火牙齦口舌腫痛不可當先用此湯漱之後擦三香散或仍服清胃等劑北細辛三錢生石膏一兩水二碗煎一碗乘熱頻漱定痛羌活湯治風熱攻注牙根腫痛羌活防風川芎生地各一錢升麻一錢二分細辛四分荊芥獨活薄荷各六分石膏二錢甘草五錢水煎食後服如濕熱甚者加黃連山梔惡熱飲者加龍膽草石膏湯治胃有實熱牙痛或上牙腫痛升麻知母各一錢石膏一錢五分大黃酒蒸二錢山梔薄荷赤茯苓連翹各八分朴硝六分甘草五分水煎食遠頻頻口咽即愈牙痛防風羌活青鹽蓽茇細辛川椒各等分研細擦噙又方用清涼藥轉痛者用從治之藥治之蓽茇川椒薄荷荊芥細辛樟腦青鹽上為末擦牙拔出熱涎驗方素心蠟梅花一朵煎湯漱齒其痛立止但不可嚥下牙癰門主論奎光曰牙癰一名牙蜞風初起一小塊生於牙齦肉上或上或下或內或外其狀高腫紅焮寒熱疼痛者是也牙癰牙齦紅腫但口能開合若牙咬則牙關緊閉口不能開以此為辨如牙癰腫痛齦肉突出先用金丹碧丹方載咽喉門吹入牙齦外用黃熟香削成鑿子樣從容放進牙關墊住則牙關漸開即將金丹吹入患處又曰牙癰專用口疳藥最穩方載咽喉門心法曰牙癰久不收口如過服寒涼者必生多骨候骨尖刺出搖則離動始可取出其口方斂牙疔門主論陳實功曰牙疔生於牙縫之中頂高突起痛連腮項破則流血先宜針刺照疔瘡門施治正宗牙广八彖門方論奎光曰牙广八彖屬胃火發於牙齦如豆大或內或外發無定處治宜先用金丹碧丹吹牙消散後用口疳藥方俱載咽喉門加薄荷冰片吹之煎藥內加石膏連翹牙咬門主論奎光曰牙咬證生於牙齒盡齦中牙不能開牙關緊閉此證初起勢甚至夜尤甚形狀雖凶尚在可治宜先用金丹碧丹吹入牙齦外用黃熟香削塊墊牙俟齒開時再吹金丹方載咽喉門牙菌門主論奎光曰牙菌生於牙齦其形狀紫黑色高低如菌此屬火盛血熱而兼氣鬱而生宜吹口疳藥方載咽喉門並服煎劑牙漏門主論澄曰牙漏之患多起於心胃火鬱腎陰消涸或心事郁遏多起於上門牙齦上或下門牙齦上初則高腫作痛久則上現黃泡破後出膿漸安雖然出膿其口難完細如針孔但遇操勞或心緒煩擾或煎炒菸酒過度發則腫痛時出穢膿更有串至左右齒根遂成牙漏雖不致命頗亦為累初起治宜升陽散火久則當用六味地黃湯加元參釵斛多服久服自可全愈初治切不可妄用苦寒之藥內服外搽致令心胃之火鬱而又郁反使火毒根株愈深亦不可早用斂藥亦能使火毒內斂便有腐蝕脫齦落齒之害吹藥在牙疳口瘡門中選用又曰潰後飲食後必須漱洗庶不致飲食塞其膿竅反令脹痛又曰遠年近日牙漏穿蝕久不收功用鮮竹一顆鋸成一頭留節一頭無節數段將食鹽裝結實了放炭火上煅紅取出冷定去竹將鹽研細每日擦漏齒上久則收功經驗多人牙宣門主論岐天師曰牙宣又名齒衄齒乃骨之餘腎之所主也腎火外越故齒出血以六味地黃湯加骨碎補一錢治之秘錄陳實功曰牙齦血出如線或鮮血時從外溢名曰牙宣此乃心腎火邪逼血妄行之故治當涼心滋腎為主如血出如線其湧如泉者危正宗馮魯瞻曰小兒二三歲後乳食互進或醉後房勞乳兒致成腎疳啼時滿口皆血名曰宣露錦囊又曰凡血從齒縫中或齒根出者謂之齒衄有風壅有腎虛風壅者清風散外以祛風擦牙散腎虛者以腎主骨齒者骨之餘虛火上炎服涼藥而愈甚者此屬腎虛上盛下虛宜鹽湯下安腎丸仍用青鹽炒香附黑色為末擦之然少陰氣多血少故其血必點滴而出齒亦隱隱而痛多欲者犯之亦有胃熱而齒斷出血者陽明氣血俱多火旺則血如潮湧善飲者多犯此宜清其熱清胃散主之又曰齒縫出血者以大劑六味地黃湯加骨碎補一劑即瘥間有不瘥者腎中火衰也再加五味子肉桂而愈竇漢卿曰牙宣謂脾胃中熱湧而宣露也亦名齦宣此候牙齒縫中出血上屬脾下屬腎吐血痰至鬥為難療者急宜速治遲則難生先用蚌水灌淨然後吹藥全書汪省之曰牙宣乃陽明胃經實火上攻故血從牙縫中出也血出不止者殺人理例又曰胃虛火動腐爛牙齦亦能有此但常常滲流淡血不止非同實火鮮血直出也實火以清胃石膏湯為主虛火宜歸芍地黃湯為主如齒齦腐爛血出不止者犀角地黃湯人中白散主之奎光曰牙宣乃齒縫出血上屬脾下屬胃實火上攻所致亦有胃虛火動腐爛牙齦以致淡血滲漏不止內服扶脾清火之劑外用珍珠散吹牙宣門主方加味地黃湯大熟地四錢山萸肉山藥各二錢骨碎補三錢澤瀉牡丹皮白茯苓各一錢六分水煎服止血四生湯生荷葉生柏葉生地黃生艾葉各三錢水二盅煎一盅加童便一小杯和服齒齦出血蘭室寶鑑麥門冬煎湯漱又方人中白煅研細擦之又方陳糟茄子煅灰擦之又方香附米煅石膏煅各一兩側柏葉火焙黃五錢青鹽煅三錢研細清晨擦牙漱口齒衄馬糞燒灰存性研細擦之立止竇氏秘方治牙宣並穿腮腫毒鹿角灰二錢牛黃玄明粉黃柏蜜炙褐色雞內金煅珍珠人中白煅靛花白硼砂大紅絨燒灰各一錢黃連一錢五分冰片五倍子各三分雄黃五分麝香二分各另研細和勻吹患處齒衄固齒擦牙散上好食鹽成塊者煅骨碎補生軟石膏各四兩新鮮槐花二兩搗爛為團曬乾再磨末擦牙甚妙且能固齒一方多寒水石沒食子酒煮火烘齒根邊津流血不止苦竹茹四兩醋煮含嗽吐之齒血醫旨緒餘三製大黃研末三錢用枳殼煎湯加童便調下即止珍珠散奎光治牙宣烏賊骨去殼象皮炙脆降香節忌鐵器龍骨煅珍珠各一錢兒茶沒藥乳香硃砂各五分廣三七二錢冰片一分五釐共研細末取棉花如指大捻成團蘸水再捺成扁式方蘸藥塞患處以指按之勿動二三次即愈牙齦出血草決明煎湯噙之即止齒衄出血吃食不得白龍骨黃連牙硝各一兩冰片一錢白礬一分共研細末每用少許敷牙齦下滿口齒出血枸杞子為末煎湯漱之然後吞下立止馬牙門主論馮魯瞻曰小兒生下啼哭不乳宜看牙齦之上有白點如粞大者名為馬牙急以銀針挑去即血出不妨磨京墨濃搽間日再看再生再挑即安否則脾元中氣敗絕面青口撮而死錦囊慈幼外編云凡兒生下每日夜將清湯或苦茶蘸軟絹攪兒口內如齒邊有白點即以指甲或細針挑破便無驚風撮口之患保生碎事云初生七日內面赤喘急啼聲不出即名撮口臍風看齒齦上有小泡如粟米狀急以溫水蘸青軟帛裹指擦破即愈大約撮口證必先大便熱須用生犀角及真羚羊角磨汁和蜜飲之有效急用大黃甘草各二錢煎服奎光曰馬牙者用初生小兒胎內受熱毒見風而生但看牙齦上有白色如脆骨即是此證欲發矣出胎即發噴嚏含乳或吞或吐而不吮其病已深苦不急治入腹即死切莫認作黃疸之類出胎便要看日日要挑破至三四日病即成真五六日堅硬難治甚者有發而又發大約要滿月後方免此患先用青水以絹繞在竹箸上撥開牙關將銀簪挑破出血吹口疳藥方載咽喉門駱潛庵曰初生小兒月內打嚏即是馬牙蓋因氣血薄弱不能伏制其毒以致心火上炎牙齦遍生白色用針刺破毛青布蘸水擄洗後用金墨搽不復長宜服延壽丹少許即愈推拿秘書馬牙門主方馬牙驗方慈幼外編取桑樹內汁濾清塗之又方保生碎事白殭蠶四枚炒研末蜜調敷唇內即好走馬牙疳門主論心法曰走馬疳惟癖積攻牙成疳者愈後易發皆由積火時時上攻也惟在調理飲食得宜為要如山藥栗子鵝蟹甜辣等物俱當禁忌若稍有疏忽必致復發李東垣曰走馬疳者熱毒上攻虛臟所受腎臟主骨齒為骨余上奔而潰勢如走馬故名之奎光曰走馬牙疳或因胎毒或因痧痘後發毒攻蝕齒齦腐爛成疳殺人最速鼻梁上發紅點者不治色如干醬一日腐一分二日腐一寸故名走馬以喻其速也有齒者落盡而死小兒走馬疳大人牙糟風俱防齒落訣曰凡看走馬疳無分老幼但上面左邊門牙為牙中之主此牙一落則余齒盡落此牙不落余牙雖落俱還可治又曰崩砂疳口疳自舌下牙齦上腫赤口內作痛如湯潑牙齦漸爛亦防齒落為虞又曰走馬疳宜吹口疳藥方載咽喉門加牛黃倍珍珠龍骨痧痘後不用龍骨加牛黃珍珠無不立效陳實功曰牙疳必起於痧痘之後餘毒未盡或病後內熱熾盛而成所患浮腫破爛流涎正宗又曰凡穢氣衝人者死下蝕咽喉上蝕鼻梁者死齒落無血者死涎向內流者死大肉已脫者死口臭涎穢者死黑腐不脫者死用藥不效者死穿腮透唇者死鼻梁黑黯者死飲食不進者死馮魯瞻曰走馬牙疳者多因氣虛受寒熱鬱在內或食甜酸鹹滯之物積滯日久蘊熱上衝齒焦黑爛間出清血血聚成膿膿臭成蟲侵入口齒甚則腮頰穿破乳食難進氣喘熱作而危矣治法宜內服清解先去積熱外用溫鹽水洗吹以去涎拔熱之藥切不可純以寒涼斂遏以致鬱熱無從發泄厥潰更深矣以走馬名之者蓋齒屬腎腎氣一虛則虛火邪熱直奔上焦勢如走馬耳錦囊又曰小兒腦熱肚痛寒熱往來滑泄頻頻口臭乾渴耳內瘡膿外則身體壯熱足冷如冰面黧爪黑瘡癢肌削齒斷口瘡俗名走馬虛火壅於上焦故乃口臭名曰臭息繼此齒黑名曰崩砂更若齦爛名曰潰槽如熱血逆出名曰宣露甚至牙為脫落名曰腐根其根既腐病縱得痊齒不可再此乃急疳之候急疳者腎疳也一名骨疳乃腎臟久受傷損所致甚至飲水好鹹小便如乳牙焦牙黑骨枯者死走馬牙疳門主方人中白散治小兒走馬牙疳口疳以及牙齦腐爛臭黑者並搽痔瘡膿耳男婦腿上傷手臁瘡神效人中白溺壺者佳煅紅二兩兒茶一兩冰片五分黃柏白硼砂蘇薄荷真青黛各六錢川連五錢共研極細先用陳松蘿茶洗淨日吹五七次吹後涎從外流為吉毒涎入里為凶痔瘡用麻油調搽膿耳吹耳內傷手瘡乾摻走馬牙疳洗藥章壽祥黑山梔連翹金銀花淨黃芩白芷梢黃柏玄參各五錢生石膏三錢胡黃連桑白皮桔梗射干銀柴胡各一錢二分當歸尾牡丹皮茜草赤芍各一錢二分燈心二十根煎湯頻洗又方紅棗浸桐油內陰乾又浸如此三遍煅存性加冰片少許吹之又方啟玄人中白婦人淨桶內鹼煅一錢銅綠水飛三分麝香一分五釐研細吹之或加冰片又方馬前一兩入去核膠棗內火煅煙盡存性為末吹之又方多年白螺螄殼煅研加兒茶少許乳細吹之又方紫貝即海巴煅研吹之又方人中白煅銅綠各二錢冰片牛黃各一分麝香一分五釐研細吹之又方箬葉二十一片煅研加冰片少許吹之又方野地白狗糞放瓦上煅令煙盡加冰片研細吹又方人中白煅川黃連五倍子黃丹飛淨炒雄黃血竭各一錢青黛澄清硼砂各三分冰片麝香牛黃各一分研細洗淨吹之又方川黃連三錢硼砂一兩牛黃冰片各一錢研細吹之又方舊氈子煅灰加冰片少許吹之又方取蛔一條洗淨陰陽瓦焙加冰片二分研細搽一塊好一塊又方明雄雌黃各三錢入黑棗內紙包煨透同棗研吹又方鵝糞去兩頭留中段浸水澄清用絹蓋以新筆蘸水洗疳上神授丹枯礬五分冰片麝香各一分白氈灰三分研細吹之玉液丹五倍子揀明淨者敲作小塊去淨蟲網蛀屑用好六安茶泡汁待溫浸洗濾去茶汁再用糟坊白藥丸研篩拌勻放瓷器內棉花覆緊放於暖處候生白毛為度用篩盛放風日中曬令極干篩淨白毛如篩不盡可用布將毛拭淨每五倍子十兩淨末加兒茶生甘草各二兩蘇薄荷葉烏梅肉各一兩研極細末梨汁為丸如元眼核大晾乾收貯每用一丸清茶調勻青絹蘸敷患上又方五倍子大者一個棗核十個白砒三四釐將棗核白砒裝在五倍子內火煅至煙盡為度研極細吹牙齦患處又方人中白煅一兩兒茶二錢銅青麝香冰片各少許研細吹上又方青黛白硼砂各三錢黃柏川黃連黃芩各一錢研細用米泔水漱淨搽之何氏濟生方白硼砂五錢蒲黃青黛黃柏人中白煅馬屁勃兒茶各一錢白殭蠶五分甘草節八分麝香冰片各少許合研如塵凡走馬牙疳齒落喉爛臭不可近者漱淨吹數次即愈清香散何氏濟生紅氈子煅存性兒茶乳香去油沒藥去油海巴煅存性象皮炙珍珠輕粉各等分研極細吹之立刻生肌