貼如無牛肉當頂刺破用罐拔法亦可牛黃青黛散西牛黃青黛各五分硼砂二錢硃砂人中白龍骨各一錢冰片二分研細末用甘草湯漱淨吹洗法煮馬肉湯洗又方割羊肝片貼黑處又方芥菜子搗細燒酒調敷鑽齒疳門主論陳實功曰鑽齒疳乃小兒牙根尖穿出齒根肉外芒刺嘴唇作痛用披針挑破牙傍好肉以手取出本牙出血不止以涼水濕紙換貼二三次其血自止必兼戒厚味其牙復生如舊正宗齒踞門主論申鬥垣曰齒齦上長出如雞足踞長一二寸不痛誤觸之則痛連心乃足陽明胃經之毒當用芫花線系之二日自落如齦下是手陽明大腸經亦用芫花線系用藥則當分經泄毒啟玄齒窟瘡門主論申鬥垣曰凡人年老齒落其根最深其窟最大氣血虛衰不能長合忽被硬物砑破其痛切骨至心及腦飲食不便瘡口最難合名曰齒窟瘡用生肌散二三分舊棉花托入窟內或飯搗和塞之過夜亦妙啟玄骨槽風門主論王肯堂曰骨槽風又名穿腮毒牙齦腫痛寒熱大作腐爛不已由憂愁思慮驚恐悲傷所致初起生於耳下及頸項間隱隱皮膚之內略有小核漸大如胡桃日增紅腫或上或下或左或右牙關緊急不能進食先用鵝翎探吐風痰切不可用刀針準繩竇漢卿曰骨槽風一名穿珠一名附骨一名穿喉一名牙槽風一名穿腮此乃憂思驚慮太陽受證結於大腸之間邪毒交生灌於經絡之內初起生於耳下及項間隱隱皮膚之內略有小核漸長如李子之狀便覺紅腫或上或下或左或右牙關緊急口噤不開急用鵝毛攪出風痰即服煎劑陳實功曰骨槽風初起生於耳前連及腮項痛引筋骨久則漸漸漫腫寒熱如瘧牙關緊閉不能進食此得於鬱怒傷肝致筋骨緊急思慮傷脾致肌肉腐爛膏梁厚味致腫多臭穢初則堅硬難消久則瘡口難合初宜艾灸腫項及耳垂下五分各七壯膏貼以泄內毒牙關內腫以線針刺去惡血冰硼散搽之使內外毒氣得解內服降火化痰清熱消腫之劑潰後補托藥中加麥冬五味如外腐不脫虛熱不退堅腫不消形焦體削者死正宗蔣示吉曰治此必使水升火降脾健金清乃愈說約又曰牙槽風久而不愈齒縫中出白膿極難調治甚則齒落如上左邊門牙落者不治治用口疳藥方載咽喉門加牛黃倍珍珠兒茶初起五日用之紫色退至白色再五日長肉再五日自愈又曰牙槽風久而不愈即名牙漏吹同牙槽風法兼服滋陰降火之劑戒酒色發物心法曰骨槽風一名牙匕發又名穿腮發乃手少陽三焦足陽明胃二經風火也起於耳前連及腮頰筋骨隱痛日久腐潰腮之裡外筋骨仍然漫腫硬痛牙關拘急皆由邪風深襲筋骨故也此證屬在筋骨陰分故初起腫硬難消潰後瘡口難合多致不救亦有過服寒涼以致肌肉堅凝腐臭非理中湯佐以附子不能回陽非殭蠶不能搜風如法治之諸證俱減惟牙關拘急不開宜用生薑片墊灸頰車穴穴在耳垂下五分隱中二七壯每日灸之兼用針刺口內牙盡處出血其牙關即開若寒熱不退形焦體削痰盛不食或口內腐爛甚則穿腮落齒者俱為逆證當腐爛之初治法同牙疳施救亦不過稍盡人事耳骨槽風門主方骨槽風牙疳奇方古廟屋上多年干貓屎白色者取來陰陽瓦焙存性每一錢加冰片二分研細收貯每用濃松蘿茶洗淨然後吹之蝕爛處自生肌收口重齦門主論馮魯瞻曰重齦者初生貼著齒齦有物脹起者是也此候乃脾胃挾熱氣血不能收斂治法速宜綿纏長針露鋒刺腫之處去其惡血則消若再生再刺否則有妨乳食總緣小兒出胎之後血氣收斂成血則口內舌上喉頰皆淨若血氣不斂胎毒上攻則乃成矣錦囊齒遲門主論馮魯瞻曰男子八月而生齒八歲而齕女子七月而生齒七歲而齕有齒遲者乃稟受腎氣不足而髓不強齒為骨余骨之所絡而為髓髓不足故不能上充於齒而遲也若能調氣血固本復元則齒自生而骨力堅凝矣錦囊長齒門主方長齒法岐天師雄鼠脊骨全副余骨不用尾亦不用頭亦不用肉亦不用新瓦上焙於不用燒焦留其生氣也熟地黃須親身用竹片挖取生地黃用瓦器煮熟身懷令乾為末三錢如市賣地黃經鐵針穿孔者即不效矣北細辛榆樹皮各三分青鹽二錢杜仲當歸各一錢忌犯鐵器共研細末用一瓷瓶盛之每日五更時不可出聲將此藥輕擦在無牙之處三十六擦藥任其嚥下不可用水漱口一月如是日間午間擦之更佳亦如前數但經鐵器便不效矣齒痛落去復生法膽礬研細人乳和搽孔中日三四次俱用新汲水漱淨久之其齒復生固齒門主方擦牙散藿香北細辛沉香白芷青鹽廣木香破故紙各三錢石膏煅一斤研細早晚擦又方香附一斤去毛用青鹽四兩煮乾炒黃色饅首四兩煅生石膏熟石膏各八兩三柰甘松各二兩研細擦又方青果煅存性四兩旱蓮草一斤青鹽四兩用淺水浸煮曬乾研細擦又方臘肉骨煅灰石膏煅扁柏葉焙香附枯白礬青鹽各等分研細擦又方干槐枝端午向東南方取嫩枝風乾鮮槐枝嫩者白芷皂角刺猴姜去皮搗碎青鹽各等分先將鹽入鍋內水一盞化開入藥焙黑色磨細擦又方熟地酒浸破故紙青鹽地骨皮槐角各一兩軟石膏百藥煎側柏葉臘肉骨煅各五錢香附細辛各二錢沒食子一錢研細擦固齒法岐天師雄鼠脊骨一副熟地骨碎補榆樹皮面各三錢杜仲三錢當歸細辛青鹽各一錢共為末裹棉紙內成條咬在牙床上以味盡為度用一條永不齒落矣然亦不可犯鐵器犯則不效一方有沒石子少杜仲骨碎補至寶丹馮氏秘方雄鼠骨一副其鼠要八兩以上者越大越好理毛用草紙包七層再用稻草包緊黃泥封固用稻糠煨熟去肉揀出全骨酥油炙黃研為細末入後藥北細辛洗淨土曬真沉香各一錢五分破故紙青鹽水炒白石膏青鹽水炒骨碎補去淨毛蜜水炒全當歸酒炒旱蓮草酒炒各五錢香白芷青鹽水炒懷生地酒炒各三錢綠升麻焙二錢沒石子雌雄一對酒煮火烘上為細末同鼠骨末合在一處拌勻用銀盒或鉛盒盛之每早擦牙漱咽久而不斷牙齒動搖者仍可堅固不動者永保不動甚之少年有去牙一二在三年以內者竟可復生頗小而白久則如故妙不可言又方保元早蓮草陰乾切碎半斤香附米四兩入砂鍋共炒黑存性為末擦牙固齒烏須又方急救柳椹陰乾為末日用擦牙去風明目烏須固齒久用不徹可咀金石齒疏陷物集玄蘆甘石煅寒水石各等分為末每用少許擦之忌用刷牙久則自密擦牙永不疼痛周鶴仙方青鹽三兩硼砂三錢膽礬三分皂角鹽內者一錢共為細末撿大個五倍子七枚將藥末勻裝五倍子內用火紙每個包過七次又共包七次將黃泥包裹炭火煨煉去綠煙為止取出研細收貯每早晨擦牙一次其功甚大此曉園驗方也又方肥皂肉搗爛擦牙又方生石膏生明礬各等分共研細末擦牙固齒如神又法凡大小便時將牙齒咬緊久久行持此法牙齒到老不落不痛牙齒搖動及外物所傷諸藥不效欲落者川五倍乾地龍去土微炒各等分研細用生薑揩牙齦後以藥末敷之五日內不得咬硬物如齒初折落時乘熱將齒放齒槽中安好敷藥齒之內外即牢如故固齒將軍散治牙痛牙傷胃火糜腫久用牢牙固齒青鹽四兩杜仲炒半黑錦文大黃炒微焦各十兩為末清晨擦牙漱口火盛者咽之亦可
