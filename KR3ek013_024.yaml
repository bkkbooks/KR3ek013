body:
  text: 卷二十四前陰部自外腎起至前陰囊止一切癰疽疝痃疳蝕等證皆匯於此部中以便檢閱參治龜頭腫痛門主論澄曰龜頭腫痛有因肝經濕熱下注其腫紅脹宜龍膽瀉肝湯主之外搽介靈丹有因塗搽春藥交接違理其腫滲痛宜用松蘿茶洗外搽玉紅膏有因嫖妓孌童沾染穢毒其腫紫黯上有黃衣溺管必痛小便淋瀝否則莖皮收緊包住龜頭即成袖口疳瘡亦有龜頭之下紅胞如瘤堅硬亦有所患之胞如水光亮即為雞嗉疳瘡治之大法以大黃下之撤毒為主亦有新婚損傷龜頭腫者以濃甘草湯洗之搽玉紅膏龜頭腫痛門主方龜頭腫大硬痛沈員嶠用雞蛋三個去黃留蛋清將龜頭插入一炷禪香時拔出再以捫青布燒灰存性碾末一錢加冰片一分搽上過夜其腫即消龜頭腫痛蛤蟆二隻炭火炙去皮肉將骨炙酥為極細末每一分加冰片一分碾勻細細摻上又方鬼饅頭嫩枝即木蓮蓬三四兩煎湯熏洗止痛消腫又方蝸牛焙乾枯礬各等分碾細濕則乾摻干則香油調搽陰頭癰門主論王肯堂曰陰頭癰生於陰頭準繩陰頭癰門主方驗方鱉甲為末雞蛋清調敷魚口便毒橫痃門主論陳實功曰左為魚口右為便毒兩腿合縫之上名曰橫痃正宗鬼遺方云腿䏶兩處起為便毒王肯堂曰便毒生於小腹下兩腿合縫之間其毒初發寒熱交作腿間腫起疼痛是也夫腎為作強之官所藏者精與智也男女大欲不能直遂其志故敗精搏血留聚經隧乃結為便毒矣蓋腿與小腹合縫之間精氣所出之道路也或觸景而動心或夢寐而不泄既不得偶合陰陽又不能忘情息念故精與血交滯而成腫結也初起切不可用寒涼之藥恐氣血愈滯不得宣通反成大患惟當開鬱散氣清利熱毒使精血宣暢則自然愈矣準繩孫曰商賈中野合不潔淫妓便構此證或疳瘡或楊梅者皆由欲火淫熾一旦交合不潔為淫火衝動膚腠開通是以受毒初發之時慎不宜以敗毒之藥瀉之何也毒邪非虛不入若復虛胃氣與毒邪下陷治之非彌年累月不愈也捷法只宜發汗其次利小便膚腠所感之邪汗易散也陰莖腿縫皆肝經絡肝腎主下焦又肝主小便使毒邪從小便中出所治皆順也故治之不旬日便可奏功若曾發汗利小便體厚邪固而不得宣通者乃以破毒活血調氣之劑攻之俟毒氣宣通隨以補劑托之亦不失先後著也陳實功曰左為魚口右為便毒總由精血交錯生於兩胯合縫之間結腫是也魚口生於左腿兩胯合縫之間便毒生於右腿兩胯合縫之間生於小腹之下進之陰毛之傍結腫名曰橫痃又名外疝是也此三證得之於奔走勞役濕熱下注者少得之於入房忍精強固不泄或欲念已萌停而不遂以致精血交錯凝滯結而為腫淫毒內攻者多然其毒從便而入亦當從便而出治當散滯行瘀通利大小二便初起宜通水丹逐之不應用九龍丹山甲內消散七日已後根本堅固恐其作膿宜用火針法刺之亦妙已出膿者十全大補湯服之庶易收斂遲則恐生別證難愈謹戒房事正宗又曰因奔走勞役而得者即用四妙湯補而消之甚驗馮魯瞻曰便毒生於小腹下兩腿合縫之間小兒是肝火肝疳總屬肝經熱毒治宜瀉肝再視血分毒氣為之斟酌若大人犯此者多因欲火不能直遂其志故敗精搏血留聚經隧乃結為毒治宜散郁散氣清利熱毒使精血宣暢則自然愈矣間有因交合不潔為淫火衝動是以受毒所致者治宜先為發汗次利小便可也錦囊又曰婦人橫痃或肝經濕熱下注或鬱怒傷損肝脾其候兩腿小腹腫痛或玉門焮腫作痛憎寒壯熱小便澀滯腹內急痛或小腹痞悶上攻兩脅者肝火血虛也加味消遙散若概投散血攻毒之劑則誤矣周文採曰便毒初發寒熱交作兩腿合縫之間腫起疼痛是也夫腎為作強之官所藏者精與志也男女大欲不能直遂其志故敗精搏血留聚中途而結為便毒矣夫人腳腿與小腹合縫之間乃精血所出之道路或觸景而動心或夢寐而不泄既不得偶合陰陽又不能忘情息念故精與血交滯而成腫結也初起慎不可用寒涼之藥恐氣血愈結不得宣散反成大患惟當發散寒氣清利熱毒使精血宣暢則自然愈矣集驗申鬥垣曰勇疽即俗名魚口生衝門穴啟玄薛立齋曰魚口者言其形如魚口張而不合也潰後慎勿行動伸縮恐難斂口此證有公有母之分公者小而形長易治母者大而形圓公則只一個母則三四個若母魚口只用艾炷炙初起者則余者自消心法曰橫痃疽在左腿夾縫折紋中形長如蛤陰疽在右腿夾縫折紋中形長如蛤屬三陰經由七情鬱滯凝結而成漫腫堅硬時痛甚則痛牽睪丸上及少腹形長如蛤一兩月方能潰破其膿深可知破後膿稠可愈敗漿最難斂口久必成漏又曰若膿水淋漓日久有生蟲形類蛔蟲亦系膿深郁久之所化也屬逆心法曰便毒又名血疝又名便癰無論男女皆可以生發於少腹之下腿根之上折紋縫中屬肝腎二經由強力房勞忍精不泄或欲念不遂以致精搏血留聚於中途壅遏而成或因暴怒傷肝氣滯血凝而發魚口因生於折紋縫中其瘡口潰大身立則口必合身曲則口必張形如魚口開合之狀故名之也魚口便毒橫痃門主方九龍丹魚口便毒騎馬癰橫痃初起未成膿者穿山甲炒沒藥青木香血竭滴乳香兒茶各一錢共為末用當歸尾三兩紅花三兩酒煎膏丸如桐子大每服二錢熱酒送下數服自消魚口不見水豬腰子一個剖開入雄黃三錢貼於患上山甲內消散魚口便毒騎馬癰橫痃初起未成膿者歸尾甘草節大黃各三錢白殭蠶一錢穿山甲炒三片黑醜打碎一錢土木鱉去殼三個酒水同煎渣再煎服大便行三四次吃淡粥補住避風為妙魚口便毒初起生明礬三錢或五錢碾粗末用生酒吞下欲吐忍之出汗即愈一半次日全消胡桃散大胡桃一個剖開去肉將全蠍二枚裝入燒存性研末熱酒調服綠鳳散魚口便毒瘰癧痰核初起雞蛋一個入瓦罐煮三四滾取起用銀簪扦三四十孔再入罐內加芫花末一錢同煮一二十滾去藥食蛋通水丹治下部諸瘡魚口便毒橫痃腹癰初起人壯氣實小便淋瀝者芫花不拘多少揀淨曬極干研為極細末瓷瓶收貯每用五分將大棗二三枚去核夾在藥內空心嚼下冷茶過口便毒白殭蠶炒當歸生大黃各三錢甘草穿山甲各一錢五分研細空心酒調服三四錢魚口穿山甲炙白殭蠶左顧牡蠣煅七次各五分大黃一錢五分研細酒調服魚口便毒芙蓉葉大黃金銀花桔梗天花粉陳皮皂角刺穿山甲各等分研細為丸如桐子大每服三十丸白湯送下又方魚膠切碎蛤粉拌炒研細每服五錢空心酒調下蓋被出汗連服十次外用胡椒一兩研碎燒酒調敷患處即消又方大蛤蟆一個剝去皮入蔥五錢連腸搗爛敷患處再以皮覆其上半日消散且無留毒之患如毒盛未消再如法敷一次又方肥皂一枚去核鹽一合醋半斤煮如泥搗敷患處婦人魚口川貝母三錢甘草一錢無灰酒煎服孕婦忌服消魚口便毒橫痃奇方範令聞九頭獅子草一錢貝母三錢白水煎服瀉一二次自消重者不過三劑必消橫痃長興莫氏青殼雞蛋一個刺蒺藜一合好酒同煮蛋熟剝去殼再煎連蛋服立消立消便毒陳古公廣膠穿山甲炒連翹各二兩當歸一兩荊芥防風紅花各二錢斑蝥七個去頭足炒金銀花八錢車前大黃各五錢若弱人只可用三錢蔥三根好酒二三斤煎好空心服之儘量飲醉出汗或下即消便毒油核桃淨肉七個瓜兒血竭一兩二味捶勻丸如蛋大以鹽泥固濟火煅煙盡安泥地中上以碗蓋熄去泥研為細末無灰酒調下儘量飲醉即消便毒槐花一兩防風穿山甲炙連翹殭蠶荊芥各三錢金銀花五錢甘草節八分酒水同煎不效加乳香沒藥俱去油各一錢立消魚口獨子肥皂泥封煅赤去泥將肥皂研細每服二錢酒調服取汗立消魚口便毒橫痃將成膿者小粉漿同小活鯽魚搗爛敷上即消便毒魚口已潰不能長肉收口狗肉二三斤煨爛取湯洗瘡口淨將狗肉漸漸推入瘡口內令滿外用絹袱扎定不可行走安息數日瘡肉漸生狗肉漸出狗肉出盡瘡口長平魚口初起三五日五倍子炒黃研末百草霜和勻醋調敷一日夜全消魚口便毒一日至七日未潰紅腫寒熱黑醜研白醜研殭蠶炒去絲當歸尾甘草節金銀花各二錢土木鱉五個去殼切片大黃五錢穿山甲二片炙豬牙皂二條朴硝一錢上作一劑酒水各一碗煎空心服行三四次溫粥補之輕者一服重者兩服消孕婦忌服虛人減半便毒初起李岳皂角子二十一粒洗淨空心好酒吞下儘量飲醉一覺即消便毒生大黃六錢全蠍去頭足炒去毒穿山甲各三錢白芷四錢水煎服外用千年石灰一兩明礬三錢鹽少許米湯調敷即消魚口便毒橫痃初起立消用雞蛋煮熟劈開去黃將蛋連殼合在腫上以艾圓如豆大灸三五壯如未能全消隔日再灸之魚口白魚膠五錢銼銅鍋炒黑色略帶黃些研細末用老酒調成團空心時以匙挑放舌上須多用酒吞下其藥直達患處如瘡大可再製五錢服之即消如已潰亦效陰腫如斗門主方男子陰腫如斗其色紅赤不能治者馬鞭草搗爛敷之或煎洗亦效陰腫大如斗核痛白礬二兩雄黃一兩甘草五錢水煎先熏後洗神效囊腫秘方錦囊川椒麥芽炒焦地膚子各一兩蔥白頭連須者二十一根去土淨不必洗煎湯淋洗囊上良久次日再洗以消為度小兒風熱外腎焮赤腫痛日夜啼哭不數日退皮如雞卵殼狀回春老杉木燒灰入膩粉清油調敷之神效陰㿉腫大不消硼砂水研塗之大有效小兒坐地多時或風邪或蟲蟻吹呵陰囊腫硬蟬蛻五錢水一大碗煎洗不過三次腫消痛止更服五苓散加燈心煎服又方蔥園中蚯蚓屎研細以甘草湯調敷小兒外腎赤腫老杉木煨存性宮粉各等分研細清油調搽並治大人繡球風腎囊睪丸腫大棉花子仁一兩煎湯常洗自消氣卵胞老絲瓜皮老生薑皮共入鍋中炒沖生白酒熱服得汗即消下疳門主論王肯堂曰下疳瘡生竅口準繩又曰小腹到陰之下玉莖之根癢極沸湯沃之稍止而復作有三四竅黃水淋漓若幼時曾患惡瘡後來亦有此證作結毒治之陳實功曰下疳者乃淫欲邪火鬱滯而成其來有三一由男子欲念萌動陽物興舉淫火猖狂而未經發泄以致敗精濁血流滯中途結而為腫初起必先小便淋瀝溺痛次流黃濁敗精陽物漸漸破損甚則腫痛腐爛治當疏利肝腎邪火為主用清肝導滯湯主之一由婦人陰器瘀精濁氣未淨接與交媾以致淫水毒精傳襲而成初起必先皮腫光亮甚如水晶皮破流水腫痛日生麻癢時發治當解毒消風為主如龍膽瀉肝湯合平胃散主之一由房術熱藥塗抹玉莖洗搽陰器興助陽火煽動陰精僥倖不衰久戰不泄多致精阻火鬱未發而成皆由蘊毒所致初起陽物癢痛堅硬紫脹疙瘩漸生腐爛漸作膿水淋漓不時興舉治當瀉火解毒為主如黃連解毒湯蘆薈丸主之正宗蔣示吉曰又有先發時瘡誤用熏條擦藥收斂結毒於此者最重必成蠟燭卸矣說約又曰如肝經濕熱下注者不過澀淋黃濁莖中作痛不紅不腫者輕又曰濕熱下注者輕淫火毒發者重又曰下疳又名曰鬥精瘡其潰爛日甚者名蠟燭卸又曰若小便淋瀝漸爛漸開色紫無膿疼如針刺者難治馮魯瞻曰下疳者玉莖生瘡甚至蝕透而久不愈宜內服燥濕解毒外用熏摻可也多系肝經濕熱故尤宜清肝除濕錦囊李東垣曰妒精瘡因壯年人精氣盈滿久曠房室陰上生瘡赤腫作害妨悶癢痛者是也精義申鬥垣曰龜頭及莖上有瘡腫焮於內而外則皮裹不見其瘡如袖口之包手故名曰袖口疳最為難治何也蓋藥不能搽至疳上治法用眼藥加冰片膏子入雞蛋殼內套龜頭上浸之內服清肝腎濕熱藥啟玄又曰玉莖有瘡癢而痛赤窠窠中有水此乃交媾不潔肝經濕熱所致肝性主臊故瘡亦臊名曰臊疳宜用兒茶敷之又曰妒精瘡用地骨皮泔水洗過取室女首經布燒灰搽之立效竇漢卿曰玉莖內生瘡名內蛀稈玉莖外生瘡名外蛀稈胡公弼曰妒精瘡乃陰頭潰爛成膿或癢或痛蓋緣後生未娶精氣溢盛陽物興起當泄不泄強泄脹裂龜頭嫩皮日久潰爛腐肉成膿間有害其生命者治之當戒房事外以黃柏皮散煎洗拭乾再摻訶子灰散或銀粉神丹青囊陳遠公曰龜頭生疳瘡服敗毒藥毒盡從二便而出倘大腸燥結則敗毒藥不能走大腸勢必趨小便而出小便口細毒難盡泄於是毒不留於腸中而單結於外勢毒盛必發安得不腐爛哉往往連龜身爛盡人多以藥外敷雖外藥亦不可少然不先消火毒遽用外遏不啻如石之壓草也故必先內治之用散毒神丹茯苓一兩黃柏生甘草黑梔仁各三錢肉桂一錢水煎服四劑火毒盛盡從小便而出疼亦少止後用生勢丹敷之炒黃柏三兩兒茶生甘草各一兩大黃三錢丹砂勿見火乳香沒藥各一錢冰片麝香各三分為末摻之疼即止數日膿血乾筋肉再長一月痊愈但不能長龜頭也愈後服十全大補湯一二月則外勢仍能伸縮尚可種子若多服敗毒泄火之劑無論命門寒冷而外勢亦且冰冷安得陽和之驟復哉此治法之次序也冰鑑心法曰下疳統名疳瘡又名妒精瘡生於前陰經云前陰者宗筋之所主督脈經絡循陰器合篡間又云腎開竅於二陰是瘡生於此屬肝督腎三經也其名異而形殊生於馬口者名下疳生玉莖上者名蛀疳莖上生瘡外皮腫脹包裹者名袖口疳龜頭外腫如瘤者名雞嗉疳疳久而偏潰者名蠟燭疳痛引睪丸陰囊腫墜者名雞肫疳痛而多癢潰而不深形如剝皮爛杏者名瘙疳生馬口旁有孔如棕眼眼內作癢捻之有微膿出者名鏇根疳生楊梅瘡時或誤用熏搽等藥以致腐爛如臼者名楊梅疳又生楊梅時服輕粉水銀打成劫藥以致便溺尿管內刺痛者名楊梅內疳澄曰凡治下疳第一戒患者吃咸若肯飲食吃淡一月收功只消半月下疳門主方九味蘆薈丸當歸胡黃連川芎蕪荑白芍各一兩龍膽草酒浸炒焦七錢真蘆薈五錢廣木香甘草各三錢上為末米粥搗丸麻子大每服一錢或一錢五分白湯送下若虛者佐以加味歸脾湯加味消遙散治之珍珠散下疳皮損腐爛痛極難忍及諸瘡新肉已滿不能生皮又治新婚玉莖損傷新娶陰戶傷痛搽之極效並治湯潑火傷皮損肉爛疼痛不止新白珍珠一錢入豆腐內煮數滾研極細以研至無聲為度上好花青即青黛五分真輕粉一兩三味共研千轉細如飛面瓷瓶收貯初起搽之即愈若腐爛疼痛甘草湯洗淨豬脊髓調搽又治婦人蝕瘡極效湯潑火傷痛者以玉紅膏調搽滑石沒藥去油龍骨各等分上研極細乘瘡膿汁未乾摻之不可見水自結痂矣又方張化儉紅棗去核將銅綠整塊者包在棗內放炭火上煅存性研極細末加大尼冰片再研瓷瓶密貯先將瘡上用陳松蘿茶洗淨軟絹拭乾將藥摻上雖龜頭爛半者無不奇效又方螳螂子火煅白殭蠶火煅兒茶輕粉各等分研極細用甘草湯洗淨搽之又方玉莖疳瘡或漸至蝕透有爛去一半者服此而愈萹蓄四兩黃連二兩甘草一兩水煎內服外洗又方甘蔗頭煅灰一錢兒茶三分冰片一分疳瘡簡便方用戴舊油透羅緞帽沿燒灰杭粉瓦上煅黃色各等分共研極細瓷瓶中收貯先用紅棗十五個甘草三錢煎湯溫洗患上挹干搽之又方蟢蛛窩拭淨貼之又方安慶僧授白螺螄要叮在岸上的四十九枚陰陽瓦煅枯如叮在水底者無用研細用生酒調服蓋被取汗外用大田螺二個將靨挑開入冰片三分伺螺化水雞翎擋上如未痊可如法再製服又方蟹殼煅研加冰片少許搽之又方鉛粉一錢冰片一分研細外以銀花蘄艾花椒煎湯洗淨乾摻又方血竭兒茶乳香去油龍骨研細末沒藥去油各三分研細摻之又方旱田螺煅灰麝香輕粉冰片各等分研細香油調搽又方燈草灰入輕粉麝香少許乾摻又方防風煎湯洗下疳妒精瘡七月七日採鳳眼草燒灰淋水洗之金螺散大田螺數枚水養吐盡泥沙俟靨開入研細冰片末伺螺化水以鉛粉填滿仍用靨合上放新瓦上煅令紅赤去殼研細又填入第二螺內又煅如此三次研細密貯任用二靈丹下疳初起流膿兒茶一錢冰片三分研勻將瘡先用冷茶或甘草湯洗淨挹干以雞翎將藥掃上龜頭爛半竹蛀蟲糞銀粉臘肉骨髓松香各等分研細和勻用燒酒將瘡洗淨以搽之內單服土茯苓湯當茶七寶檳榔散玉莖疳瘡或漸至蝕透久不愈者檳榔密陀僧牛黃輕粉黃連黃柏朴硝各等分研末先將蔥白漿水洗淨軟帛拭乾如瘡濕乾摻瘡干油調搽聖粉散下蛀疳瘡蝕臭腐爛痛不可忍密陀僧黃丹黃柏蜜灸孩兒茶乳香各三錢輕粉一錢五分研極細用蔥湯洗瘡濕則干搽干則用香油調搽兼治小兒疳瘡玉莖生疳爛去大半吧嗒杏二錢研細紙包壓去油取淨白霜一錢加冰片三分再乳絕細聽用先以甘草煎湯洗淨挹乾摻上下疳疼不可忍竇氏黑羊角煅穿山甲煅各二錢乳香去油沒藥去油各一錢研細酒調服下疳大爛黃蠟八錢白蠟麵粉各一兩冰片一錢麻油三兩先將油與二蠟熬化隨下面粉次下冰片和勻作隔紙膏貼之五日後痛自止肉即生矣銀粉散胡公弼治下疳毋論新久腐爛作痛及楊梅瘡熏後結毒玉莖腐爛或陽物爛半者好錫六錢化開入硃砂末二錢攪炒炒枯去硃砂留錫再化開入水銀一兩和勻傾出聽用又將杭粉一兩鋪夾紙上捲成一條以一頭點火燃至紙盡吹去紙灰單用粉同前錫末加輕粉一兩共研極細末收貯凡遇前證先用甘草煎湯淋洗拭乾以此藥摻上即能止痛生肌收斂妒精瘡玉莖爛一二寸者兼用柯子灰散神方周鶴仙黃柏荊芥甘草馬鞭草蔥同煎洗取膿靨柯子灰散黃柏炒存性柯子灰各二錢麝香少許共研極細摻患處令睡睡醒服冷水兩三口切勿令陽道興起脹斷瘡靨二七即愈一方無黃柏銀粉神丹曹振先專治玉莖蟲蝕生長如初止少元頭者或舌頭被人咬去抹上此丹亦能長全大有神功黑鉛五錢寒水石三錢五分輕粉二錢五分水銀二錢五分硼砂珍珠各一錢先將黑鉛化開投水銀研不見星共為細末收貯遇前證先用蔥艾花椒煎湯洗淨若怕洗畏痛須先熏止了痛再洗拭乾上藥若舌頭咬去先用乳香沒藥煎水口噙之止痛後上藥自然生長全愈兒茶散下疳蛀稈銅綠不拘多少煅紅放地上冷定又煅又冷定乳細加兒茶等分和勻後將下疳洗淨摻之下疳久不愈海藏橡斗子二枚合盛黃丹令滿以亂髮厚纏定燒煙盡為度同研為細末先以蔥白熱漿水洗瘡膿淨再上藥甚者不過三次如神陰頭生瘡孫真人蜜煎甘草末頻頻塗之竹節霜百效龜頭因熱毒馬口結蕊或粗衣搶擦損取新竹節上霜刮下一摻即愈下疳蝕爛白果樹葉包裹下疳抄本蘆甘石乳香血竭川黃連各一錢輕粉五分冰片一分研末用米泔水洗淨摻上立見效又方蝸牛焙乾枯礬各一錢研末濕則乾摻干則以香油調塗疳瘡蛀稈靈秘丹藥二蠶繭出過蛾者燒存性輕粉二錢枯礬五分紅絹方圓三寸二塊燒灰兒茶一錢五倍子一個研為末酸漿水蔥白川椒煎湯洗淨搽之奇效無比疳瘡蛀稈銀硃水飛兒茶各一錢輕粉五分黃柏灰老茶葉各二分研末用黃蠟二錢熔化為丸卻作二十粒每用一丸好酒空心送下神效無敵下疳陰瘡邵真人蘆甘石一兩火煅醋淬五次加兒茶三錢研末麻油調敷蠟燭卸周鶴仙紅羓子燒灰每一錢加梅花冰片五釐麻油調搽下疳圓厚五倍子一個去頂以砂仁三顆搗碎入於內仍以頂合好用濕紙包裹火內煨極黑取出為末摻患處即愈又方五倍子燒灰存性一錢真冰片少許研極細末摻上立效疳瘡周小庵鳳凰衣焙橄欖仁去油人參各五分兒茶煅紅存性二錢珍珠一分金箔十張共乳細末摻上立刻定痛生肌此方加南北鉛製白霜一錢紅升丹三分乳勻摻上更妙疳瘡舌爛鼻爛龜頭爛黑鉛一兩裝入黑狗腦內以鹽泥封固入金粟火煅紅取出冷定去泥研細每用法制鉛末一錢五分加乳香去油沒藥去油鉛霜各三分硼砂二分五釐雄黃一分金箔十張寒水石生用四分輕粉二分共乳細末瓷瓶密貯舌斷者用米泔水蔥茶煎湯溫漱拭乾上藥待長時洗去藥又漸漸搽之龜頭爛者又以蔥湯熏洗過搽藥疳瘡常立庚龍膽草山梔生用當歸尾木通黃芩柴胡澤瀉生甘草白水煎痛加荊芥防風白芷梢紅腫加川連大黃蛀稈疳爛去半段者先用苦茶洗淨用黃連末搽三四日待腐肉去盡取雄犬陽莖連肉在火上炙黃煅干存性為末每用少許加入黃連末內摻之犬莖末只可逐日漸加不可驟用太多則收口速而反裂破矣至多亦不過與黃連末等分為率下疳輕粉黃柏各一錢共研細末先用麥門冬煎湯澆洗摻之下疳紅腫熱痛鯉魚膽汁敷大豆甘草湯黑豆一合生甘草一兩赤皮蔥三根槐條六十寸煎洗一切疳瘡二子消毒散肥皂子杏仁炒蟬蛻殭蠶皂角子各七枚土茯苓八兩豬牙皂一條荊芥防風牛膝各一錢金銀花三錢豬板油二兩水八碗煎三碗早午晚分三次服如結毒服二十一日痊愈袖口疳加黃柏一錢肥皂子加倍楊梅瘡加綠豆側柏葉糯米各三錢薏苡仁皂角刺各二錢內疳加海金砂白醜五加皮各一錢五分鳳衣散抱雞卵淨殼煅黃丹各一錢冰片二分輕粉四分研極細乾摻或鴨蛋清調搽旱螺散冰片麝香各三分白田螺殼煅三錢輕粉一錢研極細以香油調搽之白玉膏貼疳瘡一切瘡白芷蘆甘石煅甘松當歸尾乳香去油五靈脂三奈北細辛樟冰各五錢沒藥去油象皮白蠟各三錢松香冰片麝香各一錢鉛粉十三兩先將麻油二斤熬至煙起離火入白蠟松香又熬不住手攪看有大泡便將鉛粉陸續下但滾即取起稍停又入火如此數次見有菊花紋小泡便入前諸藥末仍取起滴水成珠入冰麝攪勻待凝定時傾水二三盞入罐收貯聽攤貼鳳凰散治男女下疳腫爛疼痛難堪並一切皮破腫爛諸瘡即時消腫定痛拔毒生肌抱雞蛋殼連衣殼焙乳細末每一錢加冰片二分密貯用時或乾摻或豬膽汁或麻油調搽黑香散治男女下疳癢不可當者並一切極癢諸瘡橄欖核燒灰存性研極細末每一錢加冰片二分密貯或乾摻或麻油豬膽汁俱可調搽蠟燭卸下疳抱過雞蛋殼焙存性黃連輕粉各等分乳細香油調搽立時止痛結靨下疳陳氈灰橄欖核煅灰兒茶輕粉各三錢冰片一錢研極細末搽上用雞蛋軟皮黃連湯煮過貼之初婚玉莖傷損門主論陳實功曰凡初婚玉莖擠夾傷損出血疼痛者先以蔥湯洗淨隨用珍珠散加冰片摻之腐皮漸干痛自漸止矣正宗傷寒瘥後內外瘡門主論馮魯瞻曰傷寒瘥後若小便澀有血者亦是餘熱毒也名曰內外瘡亦皆有靨若不出膿者死宜用黃連解毒湯加生地當歸尾連翹木通滑石牛膝萹蓄琥珀甘草梢之類錦囊囊癰門主論王肯堂曰囊癰乃足厥陰肝經所主乃濕熱流入肝經而成治當清肝家濕熱佐以養陰固腎又曰腎陰毒即陰囊疽乃坐臥濕地久著汗濕衣袴寒濕下攻陰注經絡久而不散遂生此證初起陰囊紅腫疼痛者是也朱丹溪曰囊癰即外腎癰也此癰生陰囊之上其證最酷陰道多虧濕熱相聚致生此毒若不速治則囊裂睪丸外懸可用青荷葉包之或紫蘇葉洗去毛包之或單油紙煮過包之陳遠公曰有陰囊左右生癰者名曰便毒生於囊之下糞門之前名曰囊癰三處相較便毒易治囊癰最難治以囊之下為懸癰其皮肉與他處不同在他處皮肉或橫生直生俱易合口而囊下橫中有直直中有橫不易收功此皆少年貪於酒色忍精而戰耐飢而交或苟合有毒之婦或鬥精有瘡之妓所謂欲泄不泄化為膿血是也治必大補其虛佐以化毒之味以毒因虛而成不治虛得乎逐邪至神丹金銀花四兩蒲公英二兩人參一兩當歸二兩生甘草一兩大黃五錢天花粉二錢水煎二服痊愈潰者三劑收功此方用金銀花公英佐以參歸大黃之大料未免霸氣然大虛之證又用大黃祛逐似乎不宜誰知毒盛乘初起之時正氣未甚衰大補瀉火之為得乎倘因循不敢治及至流膿出血正氣蕭索始用參耆補氣往往用至數斤尚未能復元何若早用於化毒之中正又無傷毒又易散此因勢利導之法不可不知也冰鑑又曰有飲火酒入房精不得泄至半夜寒熱煩渴小便淋赤痰涎湧盛次日囊腫焮痛又次日囊處盡腐玉莖下貼囊者亦腐人以為酒毒也誰知肝火得酒毒濕而肆瘧乎夫酒何至作腐蓋火酒大熱之物也人過飲火酒多致醉死死後身體腐爛以火酒乃氣酒遇熱自焚人身五臟六腑原自有火以火引火安得不炎燒耶飲火酒入房鼓動精房之火宜是命門之火非肝火也然木能生火肝本生相火理之常也入房借火酒之力火勢必猛火動無根復能久乎必精泄而火解矣無奈精欲泄而阻抑之火無泄路又無可依火酒又無可解於是火入於肝將依母自歸也惟是相火內火也可附肝以為家而酒火外火也反得木而焚體囊與玉莖乃筋之火也筋屬肝因入房而聚陰器之際故火發而囊腫囊腫極而莖亦腐矣治法解酒之毒益以補氣血之品則濕熱解而腐肉長矣用救腐湯人參一兩當歸二兩黃耆二兩白朮一兩茯苓五錢黃柏三錢炒梔子三錢苡仁五錢澤瀉三錢白芍一兩葛根三錢水煎服四劑腐肉去而新肉生又四劑囊莖悉平復矣酒毒成於拂抑平肝泄火利濕解毒宜也何以用參耆歸術大補氣血耶大凡氣血盛者力能勝酒縱酣飲無礙服火酒而腐必成於火酒之毒亦其氣血之衰力難勝酒所以兩火相合遂至焚身外腐苟不急補氣血則酒毒難消腐肉又何以速長哉陳實功曰夫囊癰者乃陰虛濕熱流注於囊結而為腫至潰後睪丸懸掛者猶不傷人以其毒從外發治當補陰清利濕熱取效者十有八九時人誤用疝家熱藥多致熱甚為膿必難收斂初宜龍膽瀉肝湯稍久滋陰外敷金黃散如腫痛日久內膿已成脹痛者即針之內服十全大補湯加山萸肉丹皮澤瀉治之間以六味地黃丸服之自安正宗馮魯瞻曰書曰癰疽入囊者死是屬肝經濕熱初起腫痛小便赤澀治宜清利解毒為主若膿已成而小便不利者是毒氣未散也當針泄之若膿既出而反痛者是氣血虛也當補益之倘元氣未虧而陰囊悉潰睪丸懸露者亦不為害錦囊又曰若小兒患此而由乳母多怒者宜子母並服清肝之藥又曰陰囊潰爛睪丸脫露名曰脫囊用紫蘇葉莖為細末如濕干敷如未破用香油調塗將青荷葉包上內服芩連甘草木通當歸之類多得保全患者勿懼竇漢卿曰囊癰倘膿熟開刀須待膿熱用油頭繩扎住腎子以小刀開海底穴其膿血即流盡矣李東垣曰經謂癰入囊者死將以為屬腎耶余治數人悉以濕熱入肝經施治而以補陰藥佐之雖膿潰皮脫睪丸懸外亦不致死但未知下虛人老者何如耳精要汪省之曰囊癰乃濕熱下注濁氣順下流入膀胱陰道有虧濕熱不利有作膿者故滋陰除濕之藥斷不可缺膿盡則自安耳理例胡公弼曰又有因腹腫脹漸流入囊腫甚而囊自裂開睪丸懸掛在外水出不止用杉木炭末敷上外以紫蘇葉厚厚包裹令患人仰臥養息內以龍膽瀉肝湯加滋陰藥服之自愈青囊囊癰門主方驗方新都醫案栝蔞甘草節金銀花各五錢連翹柴胡青皮各二錢水煎服囊癰潰後蚌殼煅黃連青黛各等分研細搽之囊癰囊漏皮硬厚而出水者皆能治蒼朮吳茱萸炒川芎當歸身各一錢白朮天花粉官桂木通各八分青木香一錢五分生黃耆二錢龍膽草五分蛇盤果二錢如無即以草代之上銼一劑白酒一碗煎空心服囊癰渾身發熱口苦嗌乾囊上紅腫疼腫是也杜仲鹽水拌炒斷絲磨為細末用篩揉去絲淨末一兩生酒一斤煎半斤服之取汗即消腫定痛如未愈再用一服即愈如外敷用明雄黃一兩百草霜一錢研勻蜜水調敷如干以雞翎蘸水潤之愈後再用除根藥用生南星蘇木紫蘇葉各五錢陳香櫞一個共為細末取未曾下水的犍豬尿胞一個以酒煮爛搗化同藥末搗勻做餅曬乾烘脆再磨為細末蒸餅打糊為丸空心燒鹽湯送下八九十丸服此一料永遠除根不發囊癰海螵蛸蛤粉兒茶各等分研極細摻之又方乾荷葉焙紫蘇葉各等分焙研極細酒調厚敷赤肉上外用油紙包紮腎囊風門主論王肯堂曰腎臟風即腎囊風瘡生於隱處瘙癢成瘡挾有耳鳴耳癢鼻赤齒浮指甲縫白等證是也準繩戴院使曰㿗風俗名腎臟風瘡因精水調外為風濕所襲從陰囊濕汗作癢起流注四肢手子白色悉生瘡瘍蛇床子吳茱萸或甘草節煎洗外用莧菜根莖葉燒存性乾摻並治陰汗生瘡陳實功曰腎囊風乃肝經風濕而成其患作癢喜浴熱濕其形腎囊疙瘩頑麻破流脂水者是正宗腎囊風門主方繡球風老杉木一段燒存性研細用熟雞蛋黃炒枯取油調搽又方苦參蛇床子各二兩吳茱萸一兩水四大碗煎一半候溫洗之帶濕撲上後藥寒水石硫黃各等分研細摻上絹帛包緊又方豆殼煎水洗又方磨古鏡水搽又方落蘇葉煎湯洗並燒灰搽又方韭菜煎水洗又方苦參二兩白蒺藜五錢甘草四錢楊柳葉煎湯乘熱熏洗後用蚯蚓屎焙燥研摻三四次愈陰球開花單方狗橘子七個煎湯入罐內將陰球掛罐口離湯一二寸俟熏待溫傾盆內洗之如此者三日痊愈腎囊癢荷葉吳茱萸蒼朮各一兩水煎滾臨洗加皮硝一兩洗之繡球風五倍子一個錐一眼入銀珠一錢用陰陽瓦焙研細末麻油調搽洗方威靈仙蛇床子土大黃苦參各五錢砂仁殼三錢老蔥頭七個煎湯熏洗腎囊風山萸肉的核子煎湯溫洗又方蛇床子艾葉吳茱萸各一兩水煎百沸放盆內加芒硝五錢化盡頻洗又方紫蘇明礬菖蒲臭樹花浮萍花椒共煎湯熏洗數次除根又方乾荷葉煎湯熏洗二三次又方絲瓜子仁酒煎臨臥服之出汗即愈又方姚伯玉繡球花煎洗又方牆頭上醬板豆草或鮮或陰乾煎洗囊風癢痛黃水不幹者蚯蚓泥鉛粉井水調敷腎囊生瘡門主方卵袋生瘡抓之流水陳紫蘇大紅椒煎湯熏洗三次外腎生瘡蚯蚓屎二兩綠豆粉一兩水研塗干又敷濕陰瘡門主論李東垣曰濕陰瘡由腎經虛弱風濕相搏邪氣乘之瘙癢成瘡浸淫汗出狀如疥癬者是也精義胞漏瘡門主論申鬥垣曰肝經濕熱外胞囊上起窠子作癢甚則滴水濕透中衣名曰胞漏瘡啟玄又曰又有楊梅瘡毒結於此以致腎囊破裂漏水腥臭久治不痊宜土茯苓湯加人參等補藥治之陰囊出汗門主方陰囊出水銀粉蠟茶五倍子研細同蔥椒湯洗淨以香油調搽陰囊濕癢飛鹽皂角苦參川椒蛇床子蒼朮煎湯熏洗數次除根陰囊夜癢抓之流水及婦人下部陰濕集驗牡蠣蛇床子乾荷葉破故紙官桂紫梢花各等分加蔥白數莖煎湯去渣熏洗兩許藥洗一次沐浴長春散錦囊男子下元陰濕久冷陰囊搔癢疼痛成瘡流水及婦人陰濕子宮久冷牡蠣蛇床子官桂紫梢花破故紙乾荷葉各等分每用一兩五錢水一小鍋入蔥白數莖煎八分先熏後洗換搽津調散卵胞出水全蠍一錢酒洗焙玄胡索五錢如出水日久腰痛加杜仲一錢共為細末作一服空心無灰酒調下定痛消腫止水三服痊愈或糊丸亦可屢用屢驗腎囊濕爛並婦女陰蝕濕爛生瘡抱雞卵連殼焙一錢冰片五釐兒茶一分燒灰存性共乳細搽之疝氣偏墜門主論夫疝者是陰氣積於內復為寒氣所襲而發故素問以下論疝皆以為寒然不可單論曰寒蓋雖為寒鬱而作亦由醉飽無度內蒸濕熱痰積流於厥陰木性急速又為寒束是以痛甚症雖見於腎病實本乎肝厥陰肝脈絡於陰器耳可見內積濕熱鬱於中外被寒邪郁束於外且有痰飲食積死血鬱結為病故謂專主肝經而與腎絕無相干也其候睪丸牽引少腹或無形無聲或有形如瓜有聲如蛙激搏而痛無有定處不堪忍也其證有七寒水狐血氣狐筋是也馮氏錦囊寒疝者厥陰經中受寒故筋攣卵縮其狀囊冷結硬如石陰莖不舉或控睪丸而痛此必得之於久坐濕地寒氣鬱於外也水疝者囊腫痛而狀如水晶陰汗時出癢瘙而出黃水小腹按之而作水聲此必得之於醉酒房勞汗出遇風濕熱乘虛流結囊中二便脹秘不通也㿗疝者陰囊腫大如斗升不癢不痛此因感受濕氣是以陰核氣結亦有灼痛者血疝者狀如黃瓜在於小腹兩旁橫骨兩端俗名便癰此乃得之重感春夏大燠勞動使內氣血流溢滲入脬囊結成癰腫也氣疝者上連腎區下及陰囊是或號哭忿怒氣鬱急迫而脹痛此必因父精怯陰痿強力入房成胎乃胎病也狐疝者其狀如瓦臥則入腹行則乃出腹入囊似狐之晝出穴而溺夜入穴而不溺故名狐疝也蓋環陰器上抵少腹者乃肝經之部分是受疝之處也一切疝氣非肝木受邪即肝木自病此乃肝經自病也筋疝者陰莖腫脹或潰膿而痛裡急筋縮或莖中痛痛極作癢或陰不收白物如精而隨溺出此得於房勞或邪術所致也更有木腎者蓋心火下行腎水自溫真陽下降腎氣自和既溫且和焉有木強者哉此因嗜欲內戕腎虛以致陰陽水火不接乃沉寒脹大而痛硬也睪丸所絡之筋非盡由厥陰而太陰陽明之筋亦入絡也故患左丸者痛多腫少患右丸者痛少腫多也又有身體發熱耳後忽生痄腮紅腫脹痛腮腫將退而睪丸忽脹一丸極大一丸極小似乎偏墜而實非蓋耳旁乃少陽膽經之分與肝經相為表裡少陽感受風熱而遺發於肝經也婦人小腹旁逼近陰處並結脹痛或皮里頂起如鵝子大乃寒氣聚於厥陰所致小腹受寒其病即發是謂陰疝女子血涸不月足躄嗌乾癃秘小腹有塊前陰突出後陰痔核皆女子之疝也但女子不名疝而名瘕古方以烏頭梔子等分加鹽酒煎服之名梔附湯其效亦速後因此方隨症加減無有不應須分濕熱多少而治之丹溪曰烏頭治外束之寒梔子治內郁之熱則內熱外寒之理昭然矣況二物皆下集之藥梔子為烏頭所引則勢下急速不容少緩於胃中矣若按之痛止者尤屬虛寒須加肉桂以薑汁丸服若速欲定痛用枳核山楂核荔枝核川楝子吳茱萸各炒為末白湯調服小兒偏墜多因食積不消脾濕下行流入肝部又有陰莖全縮不見而陰囊光腫不痛此因肝氣虛損而不能舒達也宜溫補之陳實功曰水疝腎囊皮色光亮無熱無紅腫痛有時內有聚水宜用針從便處引出水氣自安如腫痛日久內膿已成脹痛者可即針之內服十全大補湯加山萸肉丹皮澤瀉正宗林慕莪曰或問氣以疝稱其義何居答曰積土成山積氣成疝疝者山也其氣日積月累聚而不散而成疝猶之積土成山自小至大由卑至高之義但氣本無形因虛而凝聚不散隨其所聚之處為痛故五臟遂皆有疝蓋即五臟之元氣失其溫養生髮之性營運轉輸之常虛則滯寒則凝自無而有自微而著自閉塞以至於不通而痛矣活人書又曰或問既由無形之氣積久成疝為痛自應痛無已時緣何亦有不痛之日以為散而不痛則能散似無成疝之法以為不散則疝從何歸可以不痛或有時止時發甚至終身不愈者亦由此氣時聚時散之所致耶抑此氣暫時隱伏耶答曰若氣能散能聚何由成疝惟其積而不散遂成為痛為硬之勢但元氣之虛有輕重不同為病亦有新久深淺之異大約痛之緩急止發亦存乎其人之氣血虛實而五臟有病有不病也又曰或問今之所為疝者必責之寒濕之氣但寒本足太陽膀胱寒水受病濕乃足太陰脾經濕土用事緣何又言足厥陰肝家之病既曰肝病則當責之濕熱復與寒濕無干矣寧無說乎答曰五臟有疝出於內經何得獨系之肝況寒濕二氣郁久皆能化熱大凡五行六氣傳變自有不同學者當擴充其義焉又曰或問男子固有睪丸大小及小腸膀胱崑崙諸氣為疝者矣據云五臟皆疝則婦人亦當病疝疝將何法以驗之而愈之耶答曰男婦一體五臟俱各有疝外腎雖無而少陰厥陰之絡脈畢具治法必依五臟男婦豈有別乎但礙於俗不敢直言耳又曰或問疝為積氣所成五臟概有積氣所成為病何獨此積又以疝稱也哉答曰聚而不散之為積積久而成高大之形為疝前後似是而實非蓋五積由乎本經之氣各因七情六鬱而成積而此證不獨本經因虛自病且有感觸而發虛實傳變而盛者也若正言疝已具七種之名已見醫統準繩指掌諸書可以不贅今以五臟之疝詳列於後以詔後學肺疝者或為風寒深入肺俞冷飲寒氣直達肺竅本經元氣素虧復為寒邪所襲初由聚而不散漸至積而成疝蓋肺證有三一曰肺痹痹者閉也閉而不通似喘非喘咽嗌不利者痹也非疝也二曰息賁乃肺氣膹滿不能下降日久月深胸中似有物礙氣道不利語言因之塞澀者息賁也非疝也三曰肺疝疝則較前二證不同鼻息粗暴呼吸短促胸膈與雲門中府之間梗塞為痛者疝也其名有三為病亦不相遠惟氣口脈弦急有力者當以疝治心疝者心氣久郁不舒積而成疝正氣日衰結聚日盛稍有感觸窘迫而痛如割如裂痛則四肢厥冷汗出如浴左寸關沉而弦急者虛寒之疝也弦澀而數心煩嘈雜而痛者陰虛內熱而氣鬱復兼火化也脾疝者其濁氣自下逆上連噯不寬脹滿作痛痛則嘔吐清水或苦水痰涎之類其脈兩關弦急者為實沉滑者為虛肝疝者陰囊赤腫堅硬而痛痛連兩胯小腹之間以厥陰之絡絡於陰器也右關尺弦急而數兼有寒熱外證此濕熱之氣無由疏泄傳為囊癰也若婦人則有小腹脹痛兩胯間大筋偏墜及痛連腰胯者其有肝氣下陷戶中陰挺突出為痛者濕熱下陷傳為陰戶焮腫發癢甚則生蟲臊臭凡此皆肝家積氣所化猶男子之疝者也其脈左關尺亦有沉弦而數或弦急而數者腎疝者大多縱欲房勞之人裡氣先虧寒濕之氣行以乘之積久成疝其痛自腰腎下連陰莖小便兼之淋濁艱澀其脈微而澀或沉細而濡軟肺疝以辛散之以苦順之所為分清也心疝寒者治以溫散之劑熱者兼補兼清脾疝專於溫散若濕熱甚者必先化濕理痰肝疝必須升清利濁分消濕熱之氣腎疝當於溫補之中佐以分消之藥更當以古人之七疝參酌為治猶為詳盡無疑又曰或問丹溪纂要一書為世首推獨云疝主肝病與腎無涉況肝無補法故前人之治疝者多用苦辛之味以破氣散堅為主今子主以參朮歸苓治疝已為背謬而又立腎疝一門豈不與丹溪故為矛盾耶答曰肝腎之有疝不獨本於內經即今之患者瞭然有二蓋厥陰肝經之絡循環乎陰器上連小腹左右之旁以至乎脅下系外腎二子之根故肝疝有子脹偏墜痛連小腹之證若腎者開竅於前陰絡脈於兩腰其疝則痛自陰莖上連腰腎者是也然而肝為腎之子子能令母虛故肝病無有不補腎者母能令子實腎實則肝病無有不愈者況世之患疝由腎虛而致者尤多故治肝必兼顧腎治腎必兼顧肝又治疝之捷要不可不知也余所以治肝疝之有餘者原不出乎疏泄溫散以肝家之客邪有餘不得不由疏導而去之耳若病久肝家之正氣自虛或有挾虛而發其脈不甚沉急甚則空豁無力面青肢厥者苟非參朮補益而兼用桂附溫補豈能獲效此正所謂補其母而子自實之義也世俗苦執肝無補法之說但逢疝症不分肝腎不論虛實過用克伐豈知肝虛復盜母氣以自益而腎氣亦因之虧損故有肝病未已而腎家虛寒之氣上衝心胃而危急者也此正所謂子能令母虛也昔仲景治寒疝腹中痛及脅痛裡急者用當歸生薑羊肉湯無不愈者豈非補肝之驗而王肯堂繆仲醇治疝氣上攻心腹窘迫者用八味地黃丸投之立應者又非補腎之一證乎甚有疝證大便不通者當利大便如許叔微羅謙甫皆用芫花是已小便不通者當利小便如許叔微治宋荀甫以五苓散是已若據纂要於腎經無涉則五苓不當用又言疝無下法則芫花不當用所列之藥及諸書所用七疝之方無非辛苦破氣寒熱雜收既不能補肝腎之真陰又不能通利二竅使邪有所泄而徒耗其氣於冥冥之中豈不悖哉昔有久疝不愈只於每日空心以淡飛鹽滾湯漱口嚥下無遺不半年而愈永久不發蓋齒乃骨之餘夜臥口閉精氣聚於齒間而成垢以垢補腎正補之以屬也又補腎之一徵也醫論選要曰夫疝氣者睪丸連小腹急痛也有七疝一曰厥疝謂厥逆心痛足寒飲食吐逆不下二曰徵疝腹中氣乍滿心下盡痛氣積如臂三曰寒疝因寒飲食積脅下腹中盡痛四曰盤疝腹中氣痛盤結臍傍五曰氣疝腹中乍滿乍減而痛六曰附疝腹中臍下有積聚七曰狼疝小腹與陰相引而痛大便難此七疝之形證也又有所謂心疝飢疝疝癖小腸氣膀胱氣奔豚氣橫弦豎弦偏墜木腎腎余陰腫其名不同皆疝之類也原其所由未有不因七情四氣之所幹也夫任脈為病男子內結七疝女子帶下症聚河間以為聚寒丹溪以為濕熱無擇以為有寒有熱子和以為專屬厥陰肝經觀內經所論則五臟皆有疝而太陽小腸膀胱與厥陰肝經為疝之主其氣相通連而外腎繫於睪丸此三經乃相連相會者也蓋肝者筋之合也聚於陰器凡疝之發其部分故曰疝本肝經治法當以疏導為主或溫之或散之要在隨其各經之證施治則無不愈矣古人用五苓散內加行氣之藥蓋豬苓澤瀉分理陰陽以和心與小腸之氣白朮既滲腰臍間濕與死血又助中氣以佐運行藥力茯苓淡滲而利膀胱水桂能伐肝邪而溫散通行茴香治小腸之氣金鈴子橘核去膀胱之滯檳榔下氣開導少加木通以導小腸之火立方之工穩極矣蓋疝證未有不因內虛外襲然必先疏泄其氣所謂通則不痛若驟加補益攻心入腹變成危證凡陰囊大而陰莖反縮於內小便淋漓行履滯礙乃膀胱氣也蓋腎與膀胱為表裡腎不能藏為邪所客遺於膀胱小便滲入腎囊耳宜滲利之有陰莖全縮不見而陰囊光腫不痛此因肝氣虛損不能舒達也宜溫補之回回俗善何養者無他法惟護外腎使不著寒見南人著夏布褲甚以為非恐涼傷外腎也又云夜臥當以手握之令暖謂此乃生人性命之根本不可以不保護也觚不觚錄疝氣偏墜門主方茴香丸治疝神效白朮白茯苓八角炒吳茱萸荔枝核山楂核各一兩橘核三兩枳實八錢研細煉蜜為丸重一錢五分空心細嚼一丸薑湯送下橘核消腎丸濟生治一切疝氣海藻川楝肉海帶昆布酒洗淡橘核桃仁各四兩廣木香白茯苓白朮各二兩人參木通當歸肉桂玄胡索各一兩仙靈脾五錢酒糊丸桐子大每服六十丸空心用鹽湯或鹽酒送下消疝丸橘核鹽炒藿香各一兩大茴荔枝核炒青皮醋炒陳皮各五錢沉香二錢硫黃三錢火酒煮為末酒糊丸每服七十丸空心溫酒鹽湯送下崑崙丸內消疝氣橘核鹽炒川楝肉鹽炒香附童便浸炒各二兩茅蒼朮炒青皮吳茱萸鹽酒泡七次去苦水檳榔各一兩玄胡索枳實小茴鹽水炒廣陳皮山楂各一兩五錢真川椒去目焙木香各五錢肉桂去粗皮二錢五分上為極細末醋煮米糊為丸每服六七十丸空心用淡鹽湯下海藻散堅丸治木腎大如斗硬如石海藻洗川楝肉鹽水炒昆布洗吳茱萸鹽湯泡七次壓去苦辣水橘核炒海帶洗桃仁麵炒各一兩木通七錢荔枝核打碎炒青皮醋炒玄胡索炒小茴鹽水炒廣木香肉桂各五錢研細酒糊為丸如桐子大每服六七十丸空心用淡鹽湯溫酒送下疝氣核桃七個放燒餅爐上炙極脆連殼研極細末無灰酒調服又方烏藥六錢天門冬五錢以水煎服陰腫或偏墜腎子大小疼痛欲死者木鱉子一斤取肉淡醋煮黃柏芙蓉葉各二兩研細醋調敷之立刻止痛木腎用艾葉不拘多少用瓦罐一個以好酒浸約淺罐口半寸紗扎罐口凹下以糯米放在紗上文火煎滾之時俟米熟成飯為度去飯埋土中三日去火毒取起每用艾酒一茶甌沖白酒一茶甌頓服即效陰丸腫大痛不可忍川楝肉小茴各二錢沉香木香大茴香炒食鹽青鹽各一錢荔枝核新者佳十四枚燒存性研細末每服三錢空心熱酒調服偏墜大茴葫蘆巴山楂吳茱萸官桂橘核仁小茴香青木香枳實荔枝核各等分研細末每服二錢溫酒調服消疝丹治小腸疝氣白朮荔枝核炒山楂小茴香炒研檳榔木通豬苓崗橘子昆布白茯苓海藻官桂澤瀉川楝子各等分水二盅煎一盅食前洗浴溫服如房勞腎虛者加人參五分椒目丸真川椒目不拘多少略焙為極細末糊丸如梧子大每服二錢空心酒服初服時有微汗久服諸疝皆消葵花湯膀胱有熱腹脹陰囊腫脹而痛小便不通豬苓葵子滑石赤茯苓枳實瞿麥木通各二錢車前子一錢黃芩酒炒七分炙甘草六分姜三片煎空心服穿腸疝氣立刻住痛灸方用手掐大敦穴有一炷香之久即止如不止者須灸三五壯大敦穴在足大指端去爪甲如韭偏墜不拘左右川楝肉鹽炒蒼朮石菖蒲大茴廣木香各等分上為末水法疊丸鹽豆大每服三錢空心淡鹽蔥薑湯送下安補片時必得微汗者立止疝疾重墜如斗張師正倦遊錄薏苡仁東壁土炒過水煮為膏服數次即能消斗大疝氣孫真人臭梧桐嫩枝葉酒拌九蒸九曬為末每服三錢空心暖酒調下數日全消其皮垂下再用皮硝明礬各等分煎水洗之即上偏墜疝氣淩氏葫蘆巴半斤炒香研細每服三錢白湯調服安臥片時數服即愈通治五疝主方活人錄半夏三錢陳皮二錢延胡索一錢五分川楝子紫蘇葉豬苓各一錢生薑三片水煎空心午前服蓋人身營衛二氣與三焦之氣出入升降晝夜循環無一息之停合於常度則何病之有苟失其常致血脈稽留經絡閉塞因而臟腑不和三焦不利變證無窮此六味固為治疝平劑其中具有營運升降出入之用後復詳以對證加減之法肺疝加桑皮杏仁各一錢五分枳殼一錢去延胡川楝如氣虛久病者加紫菀蘇子茯苓各一錢五分人參車前各一錢減半夏二錢去延胡蘇葉川楝豬苓實則定肺膏青金丹神秘丹沉香滾痰丸虛則瓊玉膏金匱腎氣丸和中益氣丸心疝加丹參二錢石菖蒲當歸各一錢益智仁五分去蘇葉豬苓減半夏二錢病久氣血虛弱加當歸二錢茯神一錢五分人參二錢遠志益智菖蒲各五分去蘇葉豬苓川楝減半夏二錢陳皮延胡各五分服寧志丸脾疝加山楂肉二錢蒼朮一錢服香砂健脾丸中氣久虛加白朮二錢茯苓一錢五分砂仁一錢減延胡川楝陳皮各五分服沖和資生丸三因沖和丸肝疝加山楂肉三錢柴胡一錢五分青皮一錢木香五分吳茱萸三分去紫蘇減半夏一錢五分或病初得或人壯實者服沉香化氣丸如病久氣血虛或挾虛而發者其脈空弦澀弱或虛豁無力加當歸三錢白朮二錢人參茯苓各一錢五分柴胡一錢減半夏二錢陳皮一錢延胡川楝各五分去紫蘇豬苓服雙補分消丸婦人治法相同惟陰挺陰癢陰蝨諸證凡氣實火盛二便秘結者服當歸龍薈丸清郁丸血虛氣滯鬱火下陷濕熱不清者服加減逍遙散腎疝加澤瀉一錢五分茴香川椒肉桂各五分去蘇葉半夏減陳皮一錢服分消丸如房勞不足腎家氣血兩虧者加當歸二錢人參澤瀉各一錢五分補骨脂肉桂各五分附子三分去延胡半夏蘇葉豬苓服益氣丸沉香腎氣丸雙補分消丸活人錄治肝腎之氣血兩虧以致沉寒不散濕熱不清睪丸冷脹陰囊腫大者此丸久服兼補兼消山梔仁香附川椒子山楂陳皮川楝子各一兩橘核茯苓當歸白朮各二兩陳米炒熟為末醋湯打糊為丸每早空心百