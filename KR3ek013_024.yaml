小腸而水道出焉則又屬手足太陽也腎主水則又屬足少陰也飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱則又屬手太陰也素問又謂前陰者宗筋之所聚太陽陽明之所合則又屬脾與腎矣癰瘡生其間須細心求而責之不可專主一厥陰肝經而惟清肝導濕之為事斯無誤矣靈樞云筋者聚於陰器而脈絡於舌本肝者筋之會也又屬督脈張仲景云少陰脈滑而數者陰中即生瘡陰中蝕爛者狼牙湯洗之用狼牙二兩以水四升煮至半升以綿纏箸如繭浸湯瀝陰中繭二遍岐天師曰大約暗疾婦人十居其九或生於兒門之外或生於兒門之中止可陳說然猶有羞愧而不肯盡言者止可意會而默思之也大約兒門之病非癢則痛當以默治湯主之此湯皆是平肝去濕之品毋論有火無火有風有濕俱奏奇功正不必問其若何癢若何腫若何痛若何爛也秘錄陳實功曰婦人陰瘡乃七情鬱火傷損肝脾濕熱下注為患形多不一總由邪火所化也正宗薛立齋曰陰戶毛際正中發毒名曰陰蓋毒紅腫疼痛此乃肝火鬱結而成治當清肝養血外用敷消如已成膿治同癰疽法又曰陰戶一邊結腫亦有兩邊結腫其形如繭名曰陰繭內膿成自潰頭得之於肝火濕熱或新婚傷損或交合不潔染毒均成此證又曰陰戶內子宮腫痛潰爛名廷孔毒肝火鬱結者重交合所傷者輕俱用海浮散油調灌入仰臥良久後換玉紅膏調海浮散以綿潤透插入自效陰瘡門主方陰戶潰爛竇氏兒茶雞內金各一錢輕粉五分冰片三分研細乾摻婦人陰瘡杏仁不拘多少燒存性麝香少許細細研勻如瘡口深用小絹袋盛藥系口炙熱納陰戶內津調散錦囊治妒精婦人陰濕瘡膿汁淋漓臭爛黃連款冬花各等分麝香少許研細末先用沐浴長春散煎洗軟絹拭乾津調搽之忌用生湯洗默治湯岐天師當歸一兩白茯苓白芍各五錢梔子三錢柴胡一錢楝樹根五分水煎服有痰加白芥子有火加黃芩有寒加肉桂余不必加化毒生肌散雷公治產門處生瘡久不愈兼治一切瘡毒神效黃柏炒白薇炒鉛粉炒兒茶蚯蚓屎炒潮腦各三錢乳香去油二錢麝香三分輕粉冰片各五分研細摻瘡口二日即愈陰䘌門主論陳實功曰婦人陰戶生蟲䘌如小蛆者乃心氣鬱而邪火所化正宗又曰又有婦人久居寡室淫火妄而又郁鬱而又妄邪火久注多致陰中作癢生蟲食人內臟陰中腐爛攻刺疼痛臭水淋漓口乾發熱形削不食咳嗽生痰有此證者非藥能愈終歸於死此又名失合證與癆瘵相似正宗又曰陰䘌瘡宜四物湯加黃連龍膽草木通石菖蒲以通散心竅鬱滯外以銀杏散納入陰中又曰陰器外生疙瘩內生細蟲作癢不可忍者此蟲食人臟腑即死令人多發寒熱與癆瘵相似畏羞不說因循日久面黃肌瘦咳嗽生痰往往不治者多矣急與逍遙散吞蘆薈丸外以銀杏散綿裹塞入殺蟲止癢半月漸愈又曰陰器內生紅蟲長者一寸短者五六分治法宜歸脾湯加山梔白朮牡丹皮甘草主之竇漢卿曰婦人之性多偏而多郁若有不遂則心肝腎三經之火勃然而起遂致陰內生瘡或生疳瘡或生翻花瘡陰中極癢名䘌瘡又名陰蝕瘡極痛極癢狀如蟲行淋漓膿汁皆由濕熱與心火相系而生李東垣曰婦人陰蝕瘡乃腎臟虛邪熱結下焦經絡痞澀氣血不行或房欲洗浴不潔以致生瘡而隱忍不醫焮腫尤甚因瘡在裡措手無方疼痛注悶或小便如淋或經十數日潰爛膿血肌肉侵蝕或血出不止以成下疳男子則陰丸腫潰十書張景岳曰陰蝕患於陰戶之中一癢則痠麻徹骨一痛則痛楚連心良由產後保護不慎以致風寒內逼臨經調攝失宜致延濕熱中生新產未曾滿月交接房勞經血不曾乾淨淫欲所傷或惹疳瘡或因肝鬱是以子宮生蟲作癢潰流穢水失治則子宮散而陰戶脫矣宜用雞肝散絲瓜散插之萆麻湯洗艾葉散熏陰䘌門主方產門內生蟲華真人用雞肝一副以針刺無數孔納入產門內則蟲俱鑽入雞肝之內矣三副痊愈不必添入藥味也只要刺孔甚多則蟲有入路矣三副後再服去濕化痰湯去濕化痰湯白朮白芍當歸各五錢白茯苓澤瀉黑山梔生甘草各三錢陳皮五分水煎服四劑再不發雞肝散蕪荑蛇床子硫黃川椒潮腦枯礬雄黃海螵蛸黃連各等分麝香少許共研細末取旋宰雞肝一具將藥末塗肝上乘癢時插入陰戶內絲瓜散蕪荑蛇床子硫黃潮腦枯礬川椒各等分共研細末用鮮絲瓜刮去皮一段將藥末厚塗絲瓜上推入陰戶之內艾葉湯艾葉苧麻葉槐葉柳葉白芨防風白芷升麻各等分上曬燥為粗末入麝香少許以器貯馬桶內點著令患者坐馬桶上遮緊勿走煙熏兩個時辰萆麻湯扁柏葉槐葉青蒿葉柳葉萆麻葉桃葉金銀花艾葉各等分煎湯熏洗陰戶生黃臭水甚痛蠶繭二三錢燒存性研細酒調以鴨毛掃上即效陰菌門主論陳實功曰陰菌形如雞冠四邊腫痛為肝鬱脾虛正宗竇漢卿曰陰中腫塊匾如蕈者名陰蕈陰菌如棗核者名陰茄皆由濕熱與心火相擊而生惟陰茄難治性氣和緩之婦胸次坦夷服藥易愈若性急悍妒之婦習與性成服藥百貼方愈必須忌口絕欲戒性為要治當補心養胃為主馮魯瞻曰陰中突出如菌四圍腫痛便數晡熱似癢似痛小便重墜此肝火濕熱而腫痛脾虛下陷而重墜也先以補中益氣湯加山梔茯苓青皮以清肝火升脾氣更以加味歸脾湯調理脾郁外以生豬油和藜蘆末塗之而收錦囊又曰或歸脾湯加山梔川芎茯神香附陳皮治之朱丹溪曰陰茄乃生產未曾滿月因取重物膀胱墜下若是紅茄紫茄可治白茄不治陰菌門主方雄黃藜蘆散婦人陰中突出如蛇或似雞冠菌樣者並治鱉頭煅黃色輕粉雄黃各一錢冰片二分蔥管藜蘆二錢研如細面以上各研細末和勻再研瓷瓶收貯先用芎歸湯熏洗隨後搽藥早晚二次其患漸收芎歸湯當歸龍膽草白芷川芎甘草各一錢煎湯浴洗患上隨後搽藥婦人陰中忽生雞冠肉並生瘰方龍膽草酒拌炒大黃澤瀉各一錢生地黑山梔車前子木通當歸甘草黃芩炒各五分水煎服陰茄硫黃五分海螵蛸二錢研細用鴨蛋清調搽陰挺門主論陳實功曰陰挺一條如蛇墜重流水溺澀為脾氣下陷肝火從之正宗馮魯瞻曰陰挺逼迫腫痛舉重房勞皆能發作清水續續小便淋瀝宜內服升補外以硫黃烏賊骨五味子為末敷之錦囊又曰陰中胬肉凸出如蛇頭數寸者名翻花瘡用硫黃末敷之即縮汪省之曰陰挺宜朝進補中益氣湯晚服龍膽瀉肝湯外塗雄黃藜蘆散其患漸收理例竇漢卿曰補心養胃為主朱丹溪曰子宮脫出名陰㿗俗名㿗葫蘆由氣血俱虛所致宜補中益氣湯去柴胡倍升麻加益母草服之外以萆麻子肉搗貼頂心以枳殼半斤煎湯熏洗又曰如思欲不遂肝氣鬱結而成者必先於小便時似有堵塞之意因而努掙久之子宮隨努而下速令穩婆扶正㿗葫蘆患婦仰臥以枕墊腰用嚏藥取嚏即收收入即緊閉陰戶隨以布帛將腿縛定服補中益氣湯薛氏曰陰挺下脫牽引腰腹膨痛者或因胞絡傷損或因子臟虛冷或犯非理房事或因分娩用力所致當以升補元氣為主若肝脾鬱結氣虛下陷補中湯若肝火濕熱小便赤澀龍膽湯陰挺門主方逍遙散林氏活人錄彙編加減法因脾血虛發熱或潮熱晡熱或自汗盜汗或頭痛目澀或怔忡不寧或目赤口乾或月經不調肚腹作痛或小腹重墜水道澀痛或陰挺突出為痛或陰戶焮腫發癢陰臭陰蝨或腫痛出膿內熱作渴等證當歸白芍白朮白茯苓柴胡各一錢粉丹皮山梔炙甘草各五分水煎午後臨睡服逍遙散者乃輕揚消散之義蓋肝脾血虛氣鬱以致熱鬱於內不得舒泄甚至郁陷於下焦積久而成發熱則照前方如脈虛數無力則加人參一錢生地一錢五分當歸五分減柴胡五分汗多乃包絡脾胃之火脈實可加黃連五分生地一錢五分麥冬一錢去柴胡虛則加人參一錢五分麥冬一錢五味子一分去柴胡頭痛目澀加當歸一錢熟地二錢川芎薄荷各一錢怔忡不寧實則加生地麥冬各一錢黃連五分虛則加棗仁二錢生地一錢五分人參麥冬各一錢當歸五分減柴胡五分目赤口乾則加生地一錢五分麥冬一錢白芍五分黃連五分乾葛粉一錢虛則加熟地三錢麥冬一錢五分人參一錢五味二分當歸白芍各五分減柴胡五分月經不調肚腹作痛實則加山楂三錢延胡二錢蘇梗當歸各一錢虛則加熟地三錢當歸川芎各一錢白芍五分人參延胡各一錢五分減柴胡五分去山梔小腹重墜水道澀痛實則加澤瀉豬苓車前各一錢生地麥冬各一錢五分黃連五分虛則加熟地二錢當歸白芍肉桂各五分人參黃耆各一錢升麻三分減柴胡五分去丹皮山梔陰挺突出乃肝經虛氣挾濕熱之氣下陷也即前方加人參一錢黃耆一錢五分白朮二錢防風當歸白芍茯苓丹皮各五分升麻三分其餘焮腫至作渴等證皆濕熱有餘隨氣下陷之故加防風車前杜仲各一錢金銀花三錢黃連當歸白芍茯苓白朮丹皮山梔各五分陰癢門主論陳實功曰產後交骨未合驟為風所侵作癢正宗又曰陰戶作癢四邊黃泡乃風濕下滲用苦參金銀花甘草白芷蛇床子煎湯熏洗又曰有抓之血出不痛者澄曰婦人陰戶作癢乃肝脾風濕流注亦有肝火鬱結而成馮魯瞻曰陰癢陰瘡多屬蟲蝕所為始因濕熱故生三蟲在腸胃間因臟虛乃動其蟲侵蝕陰中精華故時作癢甚則痛癢不已潰爛成瘡在室女寡婦尼姑多犯之因積想不遂以致精血凝滯釀成濕熱久而不散遂成三蟲癢不可忍深入臟腑即死令人發熱惡寒與癆相似亦有房室過傷以致熱壅腫癢內痛外為便毒莫不由欲事傷損肝腎腎陰虧而肝火旺木鬱思達肝經鬱滯之火走空竅下注為癢為蟲當用龍膽瀉肝湯逍遙散以主其內外用蛇床子煎湯熏洗再以桃仁研膏和雄黃末雞肝研餅納陰中以制其蟲若肢體倦怠陰中悶癢小便赤澀者歸脾湯加山梔白朮甘草丹皮若徒以濕熱為事燥濕清熱則氣血日衰所害不止陰癢矣陰癢門主方陰戶作癢取淨桶內置瓦一片以破布燒煙燻之銀杏散婦人濕熱下注陰中作癢或內外生瘡杏仁去皮尖水銀鉛製輕粉雄黃各等分研細和勻每用五分棗肉一枚和丸用絲綿包裹留下綿條捻線在外先用塌癢湯煎洗將藥球納入陰戶留線在外如小便取出再入一日一換重者用四五枚痊愈仍宜兼服煎藥塌癢湯鶴蝨草一兩苦參威靈仙歸尾蛇床子狼毒各五錢用河水十碗煎數滾濾清貯盆內乘熱先熏後洗臨洗和入公豬膽汁二三枚同洗更妙陰癢生瘡紫梢花一兩胡椒五錢煎湯溫洗數次陰癢三蟲作祟大黃微炒黃耆蜜炙黃芩各一兩山萸肉元參蛇床子丹參赤芍各五錢共為末每服二錢食遠溫酒調服陰戶癢極難忍用鹽塗之即止陰癢生瘡蛇床子三錢杏仁炒研白礬各五錢煎洗又方蛇床子一兩花椒白礬各三錢煎洗又方蛇床子一兩艾葉五倍子明礬杏仁各五錢川連三錢煎洗陰戶腫突門主論陳實功曰陰戶忽然腫突作痛乃勞傷血風濕火下流正宗又曰亦有陰戶半邊痛者又曰治當四物湯加丹皮澤瀉柴胡花粉朱丹溪曰陰戶忽然腫而作痛者名曰陰腫又名蚌疽由勞傷血分所致宜四物湯加牡丹皮澤瀉柴胡天花粉煎服外用艾葉一兩防風六錢大戟五錢煎湯熏馮魯瞻曰婦人陰腫有因胞絡虛損風冷客之與血氣相搏而腫者有因鬱怒傷損肝脾者有因房勞過度濕熱下流者有欲勝而熱甚生蟲以致腫癢並作者皆宜戒房室而速治之否則邪氣漸盛陰戶潰爛不收矣若氣血虛弱補中益氣湯舉而升之肝經濕熱龍膽瀉肝湯滲而清之肝脾鬱怒元氣下陷濕熱壅滯朝用歸脾湯加升柴解鬱結補脾氣夕用加味逍遙散清肝火生肝血除熱去濕陰戶腫突門主方陰戶疼痛鹽三合炒熱包熨之立止婦人陰中腫痛及生瘡濟生黃連酒炒二錢龍膽草酒洗小柴胡去蘆各一錢青皮三分水煎服之如腫甚加大黃一錢子宮大痛不可忍入門五倍子白礬各等分煎湯熏洗又為末摻之產後陰戶兩旁腫痛手足不能舒伸入門用四季蔥入乳香末同搗成餅安於陰戶兩旁良久即自愈產戶硬如石衣若撞著痛不可忍青魚膽七個或用鯽魚膽七個亦可絲綿三錢燒存性以膽汁調勻後用鴨毛掃上其硬不過半個時辰即軟陰戶腫痛大戟一兩防風二兩艾葉五錢煎湯熱洗避風外以鯽魚膽汁搽之陰脫門主論經曰前陰所過之脈有二一曰肝二曰督脈足厥陰之脈入毛中過陰器抵少腹是肝脈所過也督脈起於小腹以下骨中央女子系廷孔循陰器男子循莖下至纂與女子等是督脈所過也馮魯瞻曰產後陰脫者多由婦人生產用力太過致陰下脫宜內服升補為主錦囊丹心云陰戶脫出蓋因努力太過所致若脫肛狀逼迫腫痛清水續續小便淋瀝宜當歸黃耆飲陳實功曰陰脫乃陰戶開而不閉癢痛出水乃憂思太過所致宜逍遙散歸脾湯俱加柴胡山梔白芍牡丹皮外用荊芥枳殼訶子五倍子大劑煎洗正宗陰脫門主方當歸黃耆飲丹心治陰脫黃耆酒炒三錢當歸人參升麻各二錢甘草一錢水煎服外治丹心硫黃烏賊骨各五錢五倍子二錢五分研細敷患處即效產後生腸不收丹心八物湯加防風升麻須用酒炒黃耆為君煎服外以樗根白皮五錢荊芥升麻藿香各二錢煎湯熏洗患處即入又方丹心枳殼二兩煎湯溫浸良久自入又方良方取大紙捻蘸油點火吹滅以煙燻產母鼻即上產後陰戶突出入門用四物湯加龍骨或五倍子連服二貼外以香油和湯洗於患處硫黃湯正傳治產後玉門不斂硫黃四兩吳茱萸菟絲子各一兩五錢蛇床子一兩共研末每用五錢水一碗煎湯乘溫頻熏洗自斂又法丹心香油五斤煎熱盛盆坐其中一食頃以皂角末吹鼻作嚏即收產後用力太過陰門突出當歸川芎赤芍熟地水煎入龍骨末少許和勻連服二劑外用麻油和湯熏洗即收產婦陰戶傷損門主論澄曰凡產婦陰戶或一邊焮腫或兩邊均腫難以起坐更有陰戶兩牆爛破出膿痛引小腹兩股皆由分娩艱難或是息胎穩婆用手分理骨眼或用手伸入掐取胎胞粗手指甲抓損皮肉而成殊不知產戶皮嬌肉嫩何堪經此損傷再加瘀血淋漓愈淹愈爛況陰戶乃肝脾腎衝任脈絡之地既破之後所以牽引少陰腰股作痛也宜用洗藥煎洗破處用玉紅膏珍珠散搽之自愈產婦陰戶傷損門主方陰戶腫痛枳殼一兩煎洗陰戶腫潰當歸赤芍白芷甘草苦參各等分煎湯洗產婦陰戶腫痛蛇床子三錢白蘿蔔五個撲碎煎湯熏洗陰戶交接出血門主論陳實功曰婦人交接出血者乃肝虛有火不能藏血脾虛不能攝血當以補中益氣歸脾二湯主之正宗又曰或用四物湯加龍膽草柴胡山梔黃芩治之馮魯瞻曰凡交接出血者此肝火太旺而疏泄過度且肝虛不能藏血脾虛不能攝血也宜補中歸脾二法消息用之若六脈俱洪者此腎陰虛而不能閉藏也宜六味湯加麥冬五味主之錦囊陰戶開張門主論陳實功曰陰戶開而不閉者乃憂思過度正宗又曰治當逍遙散歸脾湯加柴胡山梔白芍藥牡丹皮間服女子新嫁陰戶痛門主論陳實功曰新嫁傷而腫痛者宜舒郁和血正宗馮魯瞻曰新嫁孔痛宜四物湯加香附紅花主之錦囊蔣示吉曰新交房事傷而腫痛者珍珠散豬脊髓調搽說約陰冷門主論馮魯瞻曰婦人陰冷因勞傷子臟風冷客之若小便澀滯小腹痞痛宜龍膽瀉肝湯若小便澄清飲食少思大便不實治以八味地黃丸八味丸治血弱不能榮養臟腑津液枯澀寒客子臟陰冷者甚效錦囊實女無竅門主方實女無竅以鉛作梃逐日紝之久久自開蓋鉛能入肉故也
