body:
  text: 卷四內景圖說下腎膀胱心包絡三焦腎經曰腎者作強之官伎巧出焉又曰腎者任也主骨而任周身之事故強弱系之甲乙經曰腎者引也能引氣通於骨髓卮言曰腎者神也妙萬物而言也經曰腎附於脊之十四椎下其合骨也其榮發也開竅於二陰難經曰腎有兩枚重一斤二兩藏精與志華元化曰腎者精神之舍性命之根腎有兩枚形如豇豆相併而曲附於脊之兩旁相去各一寸五分外有黃脂包裹各有帶兩條上條繫於心下條趨脊下大骨在脊骨之端如半手許中有兩穴是腎經帶過處上行脊髓至腦中連於髓海又曰命處於中兩腎左右開闔正如門中棖闑故曰命門一陽處二陰之間所以成坎也靜而闔涵養乎一陰之真水動而開鼓舞乎龍雷之相火靜為陽本陰為陽基也又曰足少陰經腎又曰是經常少血多氣又曰酉時氣血注於腎黃庭經人身神名曰腎神玄冥字育嬰靈樞曰耳者腎之官也腎病者顴與顏黑耳枯焦象川翁曰精生於穀然醴郁之味不能生精惟恬淡之味乃能補精生氣氣自生神經曰精不足者補之以味黃庭經曰急守精室勿妄泄閉而寶之可長活經曰腎者主水受五臟六腑之精而藏之原注腎為都會關司之所非腎一臟獨有精也真詮曰五臟各有藏精並無停泊於其所蓋人未交感精涵於血中未有形狀交感之後欲火動極而周身流行之血至命門而變為精以泄焉故以人所泄之精貯於器拌少鹽酒露一宿則復為血矣經曰腎者在天為寒在地為水在人為腎在時為冬在方為北在色為黑通竅於耳經曰北方水也萬物所以合藏也又曰臟真下於腎腎藏骨髓之氣也肺金為母肝木為子膀胱為腑剋火主骨若久立則傷骨司藏與志其類水其畜彘其卦坎其性智其華在發其谷豆其應四時上為辰星其病在骨其音羽羽者舒也陽氣將復萬物舒生也其數六其臭腐其聲呻其氣吹其液唾在變動為栗其味鹹其蟲鱗其果栗其菜藿下應腰腎而色黑然黑欲如重漆光澤不欲如炭靈樞曰腎應骨密理厚皮者三焦膀胱厚更腎主寒然寒則傷腎病主為疝痘主黑陷若淫欲過度則傷骨濕氣勝則病其病之候則面黑恐缺足寒逆氣腹痛飧泄而後重臍下動氣腎實則腹膨脹而體重少氣不言骨疼飧泄並小便少腎虛則欲墜下縮身面青㿠白顱囟開解下竄畏明心懸如飢胸痛引脊厥逆溲多而耳鳴腎絶則反目直視狂言遺尿腰折骨枯然腎絶者四日死平脈則冬旺七十二日而脈沉濡石石者沉濡而滑舉指來疾其賊則緩而大並面大黃皆逆其危脈則石如轉索去如彈石又曰腎又為氣之臟主納又曰其日壬癸北方生寒寒生水水生咸咸生腎腎為陰中之少陰通於冬氣入門曰腎主受水穀之精而至靜惟子時濁氣一動而已又曰腎與臍相對與腰相應腰者腎之外候又曰腹為陰陰中之陰腎也腎為牝者陰也又曰腰者腎之府轉搖不能腎將憊矣又曰骨者髓之府不能久立行則振掉骨將憊矣又曰諸寒收引皆屬於腎靈樞曰腎者主為外使之遠聽視耳好惡以知其性又曰黑色小理者腎小粗理者腎大耳高者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏高者腎偏傾也又曰腎小則臟安難傷腎大則善病腰痛易傷於邪腎高則苦背膂痛不可以俯仰腎下則腰尻痛或為狐疝腎堅則不病腰背痛腎脆則善病消疸腎端正則和利難傷腎偏傾則苦腰尻痛也又曰呼出心與肺吸入腎與肝汗出浴水則傷腎難經曰久坐濕地強力入水則傷腎又曰臟各有一腎獨有兩者何也然腎兩者非皆腎也其左為腎其右為命門命門者精神之所舍元氣之所繫也男子以藏精女子以系胞故知腎有二也入門曰命門非正臟三焦非正腑也靈樞曰邪在腎則病骨痛陰痹陰痹者按之而不得腹脹腰痛大便難肩背頸項痛時眩經曰腎熱者色黑而齒枯又曰脾傳之腎病名曰疝瘕少腹冤熱痛出白一名蠱注曰出白謂溲出白液也又曰大骨枯槁大肉陷下肩髓內消動作益衰真臟來見期一歲死見其真臟乃豫之期日注曰此腎之藏也期三百六十五日內死難經曰外證面黑善恐數缺內證臍下有動氣按之牢苦痛其病逆氣小腹急痛泄如下重足脛寒而逆靈樞曰腎氣虛則厥實則脹又曰腎實則腹大腔腫喘咳身重寢汗出憎風虛則胸中痛大腹小腹痛清厥意不樂入門曰腎虛則心懸如飢善恐太乙真人曰戒色欲養精氣咽津液養臟氣無名子曰天一生水在人曰精地二生火在人曰神經曰腎藏精與志志者專意而不移者也又曰臟氣絶則神見於外無錫遊氏子以酒色得疾常見兩女子衣服鮮麗冉冉至腰而沒醫者曰此腎神也腎絶則神不守舍故見於外也靈樞曰恐懼而不解則傷精精傷則骨痠疼厥精時自下經曰其精管自兩腎脊骨間發來繞大腸之右從溺管下同出前陰而泄精又曰水旺於冬相於秋廢於春囚於夏死於季夏其壬日壬癸王時人定夜半困日丙丁困時禺中死日戊己死時日昳昳乃日昃也又曰腎俞在十四椎旁募在京門腰間季脅又曰腎者主蟄封藏之本精之處也又曰北方黑色入通於腎開竅於二陰藏精於腎二陰前陰後陰又曰腎也者其榮在發發無潤澤者骨先死又曰兩氣通於腎又曰精氣並於腎則恐又曰腎惡燥又曰咸走血血病無多食鹹又曰久立傷骨勞於腎也又曰損其腎者益其精又曰腎色黑欲如重漆色不欲如地蒼又曰黑如烏羽者生如炲者死炲音苔又曰腎熱者頤先赤又曰腎熱病者先腰痛脛酸苦渴數飲身熱熱爭則項痛而強胻寒且酸足下熱不欲言其逆則項痛員員淡淡然員員謂似急也淡淡謂似欲不足也戊己甚壬癸大汗氣逆則戊己死刺足少陰太陽又曰腎開竅於二陰實則脹滿又曰腎著之病其人從腰以下冷腰重如帶五千錢又曰腎脹者腹滿引背央央然腰髀痛又曰腎水者腹大臍腫腰重痛不得溺陰下濕如牛鼻頭汗其人足逆寒大便反堅又曰腎病者色黑氣弱呼吸少氣兩耳若聾腰痛時時失精食減膝以下清其脈沉遲為可治宜補清冷也又曰腎瘧者令人灑灑腰脊痛宛轉大便難目眴眴然手足寒刺足太陽少陰眴音絢目動也又曰肺移寒於腎為湧水湧水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊裹漿治主於肺肺移熱於腎傳為柔痓痓音次惡也又曰精脫者耳聾仙經曰背後有三關腦後曰玉枕關夾脊曰轆轤關水火之際曰尾閭關皆精氣往來之道路也若得斗柄之機斡運則上下循環如天河之流轉也謙甫曰夫腎藏天一以慳為事志意內治則精全而澀若思想外淫房室太甚則固有淫佚不守輒隨溲尿而下然本於筋瘻者以宗筋弛縱也經曰其不御女漏者或聞淫事或見美色思想無窮所願不得或入房太甚宗筋弛縱發為筋痿而精自出者謂之白淫宜乎滲漏而不止也丹溪曰精滑專主濕熱宜知柏蠣蛤經曰思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫入門曰少時欲過腸脫而遺泄者宜金鎖正元丹又曰欲心一動精隨念去礙滯久則莖中疼痛常如欲小便然或小便而出或不從便出而自流者謂之遺精比之夢遺尤甚綱目曰一人虛而泄精脈弦大用五倍子一兩白茯苓二兩為丸服之良愈澀脫之功敏於龍蠣又曰不因夢而自泄者謂之精滑皆相火所動也東垣曰面色白而不澤悲愁欲哭脈按之空虛是為脫精脫神宜峻補肝腎收斂補氣補益元陽醫鑑曰童男陽盛情動於中志有所慕而不得遂成夜夢而遺精慎不可補宜清心定志張子和曰莖中作痛痛極則癢或陰莖挺縱不收或出白物如精隨溲而下得之於房室勞傷及邪術所使謂之白淫宜以降心火之劑下之真誥曰精者人之神明者身之寶勞多則精散營兢則明消經曰心火旺盛腎水不足心有所欲速於感動疾於施泄又曰腎在志為恐又曰胃為恐注曰胃熱則腎氣微弱故為恐又曰精氣並於腎則恐由心虛而腎氣並之故為恐靈樞曰足少陰之脈病善恐又曰恐懼而不解則傷精又曰恐懼者神蕩散而不收又曰恐則氣下注曰上焦固禁下焦氣還故氣不行矣子和曰肝藏血血不足則恐綱目曰恐與驚相似然驚者為自不知也恐者為自知也蓋驚者聞響乃驚恐者自知如人將捕之狀及不能獨自坐臥必須人為伴侶方不恐或夜必用燈燭亦恐懼者是也靈樞曰腎盛怒而不止則傷志志傷則善忘其前言經曰腎在志為恐恐傷腎思勝恐丹溪曰恐傷腎者以思勝之以憂解之經曰主閉藏者腎也司疏泄者肝也二臟皆有相火而其繫上屬於心心君火也為物所感則易動則相火亦動動則精自走相火翕然而起雖不交會亦暗流而疏泄矣所以聖人只是教人收心養心其旨微矣直指曰精之主宰在心精之臟制在腎氣虛不能管攝因小便而出者曰尿精因見聞而出者曰漏精入門曰初因君火不寧久則相火擅權精元一於走而不固甚則夜失連連日亦滑流不已宜坎離丸知柏用童便九蒸九曬九露地黃煎膏丸鹽湯下又曰夢遺不可作虛冷亦有經絡熱而得之脈經曰男子脈微弱而澀為無子精氣清冷也又曰澀脈為精血不足之候丈夫脈澀號傷精又曰澀為精竭血枯脈訣曰遺精血濁當驗與尺結芤動緊二證之的醫鑑曰微澀傷精戴氏曰夢遺精滑皆相火所動久則有虛而無寒也又曰夢遺日久氣下陷宜升提腎氣以歸原本事曰腎氣閉即泄精又曰腎藏精蓋腎能攝精氣以生育人倫者也或育或散皆主於腎今腎氣衰則一身之精氣無所管攝故妄行而出不時綱目曰夢遺屬鬱滯者居大半庸醫不知其鬱但用澀劑固脫殊不知愈澀愈郁其病反甚仲景曰失精家小腹弦急陰頭寒目眩發落脈極虛芤遲為清穀亡血失精男子失精女子夢交經曰腎氣通於耳腎和則能聞五音矣靈樞曰有所用力舉重若入房過度汗出浴水則傷腎經曰病在腎愈在春春不愈甚於長夏長夏不死持於秋起於冬又曰腎病者愈在甲乙甲乙不愈甚於戊己戊己不死持於庚辛起於壬癸又曰腎病夜半慧四季甚下晡靜又曰腎苦燥急食辛以潤之開腠理致津液通氣也腎欲堅急食苦以堅之用苦補之咸瀉之又曰腎病禁犯焠㶼熱食溫炙衣綱目曰腎本無實不可瀉錢氏曰只有補腎地黃丸無瀉腎之藥綱目曰左腎屬水水不足則陰虛宜六味地黃丸右腎屬火火不足則陽虛宜八味丸加減八味丸又曰六味地黃丸血虛陰衰熟地黃為君精滑山茱萸為君小便若多或少或赤或白茯苓為君小便淋澀澤瀉為君心氣不足丹皮為君皮膚乾澀山藥為君入門曰小便清利脈沉遲是冷氣歸腎小便赤澀脈沉數是熱氣歸命門是腎與命門脈同者謂其所受之病同歸於膀胱一府也經曰少陰終者面黑齒長而垢腹脹閉塞上下不通而終矣金匱真言論曰冬氣者病在四肢腎之應也靈樞曰足少陰氣絶則骨枯少陰者冬脈也伏行而濡骨髓者也故骨不濡則肉不能著也骨肉不相親則肉軟卻故齒長而垢發無澤發無澤者骨先死戊日篤己日死仲景曰溲便遺失狂言目反直視者此為腎絶也脈浮而洪身汗如雨喘而不休水漿不下形體不仁乍靜乍亂者此為命門絶也脈經曰腎絶四日死何以知之齒為暴枯面為正黑目中黃色腰中欲折自汗如流水一云人中平十日死夢與鬼交泄精名曰夢遺專主於熱又曰腎咳之狀則腰背相引而痛甚則咳涎咳音概氣逆也又曰腎風之狀多汗惡風面寵然浮腫龐音忙豐厚貌脊痛不能正立其色炲隱曲不利診在肌上其色黑又曰腎痹者善脹尻以代踵脊以代頭如人垂首向地尋物貌又曰腎氣盛則夢腰脊兩解不相屬虛則夢見舟船溺人厥氣客於腎則夢臨淵沒居水中又曰是動病則飢不欲食面黑如地色咳唾則有血喝喝而喘坐而欲起目䀮䀮如無所見心如懸病飢狀氣不足則善恐心惕惕如人將捕之是謂骨厥是主腎又曰所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸癖脊臀股內後廉痛痿厥嗜臥足下熱而痛盛者寸口大再倍於人迎虛者寸口反小於人迎也又曰腎主寒自病則足脛寒而逆人之五臟惟腎無實小兒痘瘡變黑陷是腎水克退心火多不治也又曰心乘腎微邪內熱不惡寒桂枝丸又曰肺乘腎虛邪喘嗽皮澀而寒百部丸又曰肝乘腎實邪拘急氣搐身寒理中丸又曰脾乘腎賊邪體重泄瀉身寒理中丸人鏡經曰五行之間惟腎之一臟母盛而子反受邪是物之性有不可一概論者肺腎是也何則肺屬金應乎皮毛所主者氣腎屬水主乎骨髓所藏者精氣之輕浮能上而不能下精之沉重能下而不能上此物性之自然今肺盛乃熱作也氣得熱而上蒸則肺不能下生於腎則腎受邪矣急以涼藥解之使臟氣溫和自能下生於腎病必先求之於肺若肺和而腎忽受病不過脾濕相刑所以有解肺熱去脾邪二藥若脾肺俱和而腎自病亦當察其本臟虛實而治之足少陰腎引經藥歌酉腎豬膚豬苓白茯苓牡丹皮澤瀉肉桂阿魏丁香山萸肉吳茱萸黃柏砂仁烏藥敗醬天門冬牡蠣停豆豉桔梗五味子元參並獨活益智仁檀香甘草地骨皮或朱砂行下行知母附地黃地榆蒼術右腎沉香黃耆益附稱難經曰冬脈石經曰勞而動血者屬腎又曰若喉中常有血腥一咯血即出或鮮或紫或細屑者為咯血或鮮紅隨唾而出為唾血唾中帶血咯出有血或血絲皆出於腎又曰腫脹水腫有十種之分腰痛足冷為腎水總而論之腎虛不能行水脾虛不能制水又曰諸髓者皆屬於腦又曰黑如烏羽者生黑如煤炭者死又曰實則夢腰脊解軟虛則夢涉水恐懼又曰聲喑不出寒厥不回二便閉不能泄不能禁者腎臟氣絶不治證又曰耳聾絶無聞骨痛之極者腎之經病危證補地黃山萸肉芡實山藥枸杞桑螵蛸牡蠣杜仲牛膝龍骨鎖陽虎骨龜版瀉知母黃柏溫附子鹿茸破故紙肉桂沉香膃肭臍涼知母黃柏牡丹皮地骨皮引經報使獨活肉桂膀胱經曰膀胱者州都之官津液藏焉氣化則能出矣又曰膀者言其橫於前陰之旁以通水也胱者言其質之薄而明也合而言之以其由虛而實旁通水道通身虛松可以蓄水漸漬而滲入胞中胞滿而溺出也又曰膀胱當十九椎居腎之下大腸之前有下口無上口當臍上一寸水分穴處為小腸下口乃膀胱上際水液由此別回腸隨氣泌滲而入其出其入皆由氣化入氣不化則水歸大腸而為泄瀉出氣不化則閉塞下竅而為癃腫後世諸書有言其有上口無下口有言上下俱有口者皆非難經曰膀胱重九兩二銖縱廣九寸盛溺九升九合口廣二寸半又曰足太陽經膀胱又曰是經多血少氣又曰申時氣血注於膀胱靈樞曰膀胱在小腹之內又曰鼻孔在外膀胱漏泄難經曰膀胱以虛受水為津液之腑有上口而無下口得氣海之氣施化則溲便注瀉氣海之氣不足則祕澀不通經曰水液自小腸泌別汁滲入膀胱之中胞氣化之而為尿以泄出也東垣曰膀胱雖為津液之腑至於受盛津液則又有胞而居膀胱之中類纂曰膀胱者胞之室也經曰水泉不止者膀胱不藏也得守者生失守者死甲乙經曰膀者橫也胱者廣也言其體橫廣而短也經曰膀胱脹者小腹滿而氣癃又曰厥氣客於膀胱則夢遊行又曰膀胱有熱則淋閉膀胱不約為遺溺溺音尿謂睡中遺尿也又曰膀胱津液之府水注由之然足三焦脈實約下焦而不通足三焦脈虛不約下焦則遺溺也膀胱又名足三焦也又曰是動病則沖頭痛目似脫項似拔脊病腰似折髀不可以曲膕如結腨如裂是為踝厥是主筋又曰所生病者痔瘧狂顛疾頭囟頂痛目黃淚出鼽衄項背腰尻膕腨腳背痛小指不用盛者人迎大再倍於寸口虛者人迎反小於寸口也足太陽膀胱引經藥歌申膀澤瀉滑石茵陳肉桂豬苓白茯苓羌活麻黃黃柏蔓荊子親行下大黃並白術澤藁本羌防己檗同因膀胱實熱小便赤澀虛寒小便數或漏精精冷厚稠如米泔靈樞曰腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄疏腠理者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結也又曰膀胱病者小腹偏腫而痛以手按之即欲小便而不得肩上熱若脈陷及足小指外廉脛踝後皆熱入門曰膀胱病者熱結下焦小腹苦滿胞轉小便不利令人發狂冷則濕痰上溢而為多唾小便淋漓或遺尿又曰膀胱虛則小便不禁宜既濟丸加減八味丸倍山萸加烏藥益智故紙實則小便不通宜益元散葵子湯葵子赤茯苓枳實木通黃芩甘草豬苓車前子瞿麥滑石姜引濟生五苓散膀胱主藥也內經曰膀胱不利為癃不約為遺尿又曰遺尿狂言目反直視為膀胱絶也又曰膀胱之脈為足太陽其終也戴眼反折瘛瘲其色白絶汗乃出絶汗出則死矣經曰太陽司天寒淫所勝則病心淡淡大動是寒傷心也又曰腫脹水腫有十種之分腹急肢瘦為膀胱水補橘核龍骨益智仁續斷菖蒲瀉芒硝澤瀉滑石車前子溫茴香烏藥涼生地甘草梢黃柏引經報使藁本羌活上行黃柏下行心包絡經曰包絡者護衛心主不使濁氣干之正猶君主有宮城也又曰心包絡一經難經言其無形滑伯仁曰心包絡一名手心主以臟象校之在心下橫膜之上豎膜之下其與橫膜相黏而黃脂裹者心也脂䐄之外有細筋膜如絲與心肺相連者心包也此說為是言無形者非又按靈蘭祕典論十二官獨少心包一官而多膻中者臣使之官喜樂出焉一段今考心包藏居膈上經始胸中正值膻中之所位居相火代君行事實臣使也此一官即心包無疑矣又曰手厥陰經心包絡又曰是經多血少氣又曰戌時血注於心包絡補地黃瀉枳殼烏藥溫肉桂涼梔子引經報使柴胡青皮川芎靈樞曰十二原以心包經大陵穴為心之原明真心不受邪故知手心主代君火也又曰是動病則手心熱臂肘攣急腋腫甚則胸脅支滿心中淡淡大動面赤喜笑不休目黃是主心包手厥陰心包絡引藥歌戌包敗醬柴胡白術牡丹皮熟地與沙參更有下行經絡藥青皮柴胡熟地可相親三焦經曰三焦者決瀆之官水道出焉中藏經曰三焦者人之三元之氣也主升降出入總領五臟六腑營衛經絡內外左右上下之氣三焦通則內外左右上下皆通其於周身灌體和內調外營左養右導上宣下號曰中清之府莫大於此也形色最赤總護諸陽非無狀空有名者也經曰手少陽經三焦又曰是經少血多氣又曰亥時氣血注於三焦靈樞曰上焦如霧中焦如漚下焦如瀆入門曰上焦主出陽氣溫於皮膚分肉之間若霧露之溉焉故曰上焦如霧中焦主變化水穀之味其精微上注於肺化而為血行於經隧以榮五臟周身故曰中焦如漚下焦主通利溲便以時傳下出而不納開通祕塞故曰下焦如瀆又曰心肺若無上焦何以宗主營衛脾胃若無中焦何以腐熟水穀肝腎若無下焦何以疏決津液無形而有用主持諸氣三焦者水穀之道路氣之所終始也正傳曰三焦指腔子而言包含乎腸胃之總司也胸中肓膜之上曰上焦肓膜之下臍之上曰中焦臍之下曰下焦總名曰三焦東垣曰上中下三焦通為一氣衛於身也三焦非正腑也無形而有用入門曰三焦為丙火之腑故其發也為無根之相火經曰下焦溢為水經曰手少陽三焦經與手厥陰為表裡三焦者水穀之道路氣之所終始也上焦者在心下下膈主內而不出其治在膻中直兩乳陷者是中焦者在胃中脘當臍上四寸不上不下主腐熟水穀其治在臍旁下焦者在臍下當膀胱際也主分別清濁出而不內以傳道也其治在臍下一寸焦原也三焦者三原之氣也內音納上焦主出陽氣溫於皮膚分肉之間若霧露之溉焉中焦主變化水穀之味為血以榮五臟六腑下焦主通利溲以時傳下故日出而不內溲音搜九墟云中焦亦並於胃中出上焦之後此腎受氣以別糟粕蒸津液化其精微上注於肺脈乃化而為血以奉生身故得獨行於經隧命曰榮氣故言中焦如漚也仲景曰下焦不和清便重下大便數難臍腹築痛故曰三焦者寄於胸中脈訣云三焦無狀空有名愚謂三焦者三原之氣也實非無形但不專主一臟耳既為原氣別使又為傳化之腑由十二經始於中焦常與衛氣俱行故扁鵲指為水穀之道路氣之所終始也上焦出於胃上口並咽以上貫膈布胸走腋而至太陰之分中焦亦並胃中出上焦之後下焦別回腸注於膀胱而滲入焉手厥陰心包乃其合也布絡三焦而三焦之經則又散絡心包苟無其形將何所憑而包絡從何所附以傳化焉三元參贊云其體有一脂膜如掌狀與膀胱相對有白脈自其中出夾脊而上貫腦竊謂如霧如漚喻其明之薄處如瀆云者則又指夫滲入膀胱處也一名外府一名虛臟信然晞範曰此三焦有名無形正臟腑有餘不盡之義苟止心肝脾肺腎而無三焦所寄之腑是人身與天地為二矣又曰臟腑俱五者謂手心主非臟三焦非腑也以臟腑俱六者合手心主與三焦也難經曰臟惟有五腑獨有六者何也所謂腑有六者謂三焦也有原氣之別焉主持諸氣有名而無形其經屬手少陽此外腑也故言腑有六又云十二經五臟六腑十一耳其一經者何等經也然一經者手少陰與心主別脈也心主與三焦為表裡俱有名而無形故言經有十二也緣不專主一臟故言有名無形正理論云三焦者有名無形上合於手心主下合於右腎遂有命門三焦表裡之說殊不知包絡相火附名右腎夫人之臟腑一陰一陽自有定偶豈得一經而兩配之理所謂上合於心主正言其為表裡下合右腎者正言其與包絡相火相合又以三焦為原氣之別使也知此則知命門與腎通三焦無兩配矣脈訣曰右尺脈浮則風邪客於下焦大便熱祕浮而虛元氣不足沉則水病腰腳痛沉細下痢臍寒痛逼遲則寒瀉小腹冷腰腳重數則小便赤大便祕浮數表熱沉數里熱滑則相火炎盛夢泄陰虛婦人和滑則為有孕澀則大便澀津液衰其餘診法與腎脈同又曰是動病則耳聾渾渾焞焞嗌腫喉痹是主氣手少陽三焦引經藥歌亥焦地骨皮川芎黃耆白術附子青皮柴胡熟地逢白虎細辛皆在內青柴下走共川芎又曰一切治法仿心經用海藏曰上焦如霧霧不散則為喘滿此出而不納也中焦如漚漚不利則為留飲留飲不散久為中滿此上不能納下不能出也下焦如瀆瀆不利則為腫滿此上納而下不出也靈樞曰鼻柱中央起三焦乃約又曰三焦病者腹氣滿小腹尤堅不得小便窘急溢則水留即為脹又曰小腹痛腫不得小便邪在三焦約也經曰三焦為上中下水穀之道路其病通利大小便為主補黃耆甘草益智瀉澤瀉溫附子涼石膏引經報使柴胡青皮川芎論臟腑經絡穴道部位始知瘡瘍何經受病凡視瘡瘍當知部位屬於何臟何腑然後醫治用藥自無錯誤矣謹照銅人腧穴針灸圖經繪圖詳注俾學者留心參考施治有當耳黃帝問曰余聞氣穴三百六十五以應一歲未知其所願卒聞之岐伯稽首再拜對曰窘乎哉問也其非聖帝孰能窮其道焉因請益意盡言其處雷公問曰禁服之言凡刺之理經脈為始願聞經脈之始生帝答曰經脈者所以決死生處百病調虛實不可不通矣臟腑經絡穴道部位銅人圖心經小腸經肝經膽經脾經胃經肺經大腸經腎經膀胱經心包經三焦經督脈經任脈經衝脈經帶脈陽蹺脈陰蹺脈陽維陰維脈手少陰心經歌曰手少陰屬心經少衝少府與神門陰郤通里近靈道少海青靈肘內尋極泉腋下筋間動九穴雙雙須認真手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心