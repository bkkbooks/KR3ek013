炭火上再用槐柳枝攪數百次又以粗布漉下水盆內扯拔如金絲為度風氣跌撲膏藥神方錦囊男發一大團萆麻子去殼二百粒豬脂熬油二斤八兩麻油八兩以上先熬至發化萆麻子焦枯再入後藥熟地威靈仙各三兩金銀花二兩川烏草烏各六錢肉桂去皮白芷各一兩獨活當歸身各一兩五錢以上熬至藥色焦枯去渣細絹濾過慢火再熬不住手攪入後藥收之乳香箬上炙去油研細沒藥箬上炙去油研細各一兩麝香二分真黃丹炒燥羅細八兩明松香水煮三次去水熔化入夏布濾過淨六兩以上先將松香黃丹下後煉至軟硬得所滴水成珠離火再下乳沒麝打勻藏瓷器中旋用旋攤打僕損傷及一切癰腫未破貼令內消本事生地黃研如泥廣木香研細末先以地黃膏隨腫大小攤於紙上摻木香末一層又再攤地黃膏貼腫上不過三五度即愈跌打青腫真三七嚼塗患處蚌霜散入門蚌霜百草霜各等分上為末每服二錢糯米飲調服乳香定痛散入門治諸傷損疼痛白芷當歸生地黃牡丹皮赤芍藥川芎乳香沒藥白朮甘草各等分上為末每二錢溫酒童便各半調勻服之乳香散得效治打撲傷損痛不可忍白朮當歸白芷乳香沒藥甘草各等分上為末每二錢酒調服尋痛元得效治諸傷止痛清心行氣活血如神草烏生用乳香沒藥五靈脂各三錢生麝香少許上為末酒糊丸如指頭大硃砂為衣每一丸薄荷湯薑汁磨化服補損當歸散局方治墜僕折傷疼痛叫號服此藥不復大痛三日筋骨相連川芎一兩五錢桂心川椒當歸甘草各七錢五分附子炮澤蘭各一錢五分上為末每二錢溫酒調服其效如神傷損腫痛瘀血流注紫黑或傷眼上青黑不散醫鑑大黃為末生薑汁調敷患處即消散被毆瘢痕亦治跌僕聖惠麻油清酒各一碗煎數沸服了臥火燒熱地上一夜痛止腫消草烏散得效凡骨節出臼用此麻藥麻之然後用手整頓皂角木鱉子紫荊皮白芷半夏烏藥當歸川芎川烏各一兩二錢五分草烏茴香坐拿草各二錢五分木香一錢並無煅制為末諸樣骨節出臼窠者每服二錢好紅酒調下麻到不識痛處然後或用刀割開或剪去骨鋒以手整頓骨節歸原用夾板夾定然後醫治治箭簇入骨不出亦用此藥麻後或鉗出或鑿開取出然後取鹽湯或鹽水服之立醒夾骨法得效小蛤蟆四五個皮硝三分生薑一兩酒糟一碗腫者加紅何首烏同搗敷折傷處治折傷名活血散入門綠豆粉炒紫色新汲水調成膏厚敷折傷處以桑皮夾定其效如神一方熱酒調敷接骨丹回春骨碎筋斷用此復斷如初古文錢三個火煅醋淬七次當歸七錢五分川芎骨碎補沒藥各五錢川烏煨四錢乳香二錢五分木香一錢松香六兩香油一兩五錢各為末和油成膏攤油紙貼患處二生膏醫鑑治傷筋損骨痛不可忍神效並治折傷手足生地黃一斤生薑四兩上搗爛入酒糟一斤炒熱布裹罨傷處熨之傷損臂臼脫出腫痛得救生地搗爛攤油紙上次摻木香末一層又攤地黃貼患處明日痛即止治折傷斷筋損骨種杏生地搗取汁好酒和服日二三次最效又搗爛蒸熱封傷處一月筋骨連續蓋地黃屬骨糯米膏綱目治僕傷筋斷骨折糯米一升皂角切碎半升銅錢百個同炒至焦黑去錢上為末酒調膏貼患處神效蔓荊散丹心治打落筋骨折傷瘀血結痛頑痛荊葉無則荊芥代之蔓荊子白芷細辛防風川芎桂枝丁香皮羌活各一兩上為粗末每一兩入鹽一匙連須蔥白五莖漿水五升煎七沸淋洗痛處冷則易遍身打傷申姜搗汁沖酒服或申薑切片酒煎不時服或申姜斤許搗碎酒五斤入壇隔水煮三炷香放地上一夜去火毒次日溫服外用申姜四兩生薑二兩敷干再換昔有一盜捶楚身無完膚服此數日無恙跌打閃挫神方家秘獨核肥皂去核同紅糖槌爛敷之接骨仙方骨斷粉碎者五加皮四兩雄雞一隻重六兩黑者更妙去毛連骨皮血與五加皮搗爛敷患處用布包好准貼一周時揭去切不可太過時內自完好神效無比再用五加皮五兩酒煎服儘量飲醉睡為妙八釐散江湖方姓授土鱉蟲焙乾乳香去油沒藥去油血竭各一錢生半夏大者當歸酒浸巴豆霜砂仁雄黃香甜瓜子各五分共為細末收貯聽用每服八釐好酒調下小兒三釐但能開口服下即得活矣上部損傷集效如頭破見髓或傷風於內羌治防風半夏升麻當歸赤芍陳皮生地甘草川芎白芷白茯苓天南星天花粉蔓荊子姜三片煎外加血餘硬落得打各一錢研末沖服中部損傷如手摺之類羌活防風當歸赤芍陳皮白芷甘草秦艽黃耆茯苓生地官桂破故紙天花粉姜三片煎外加血餘硬一錢研末沖服下部損傷如腿足傷當歸芍藥陳皮牛膝木瓜防己川芎茯苓羌活白芷白朮秦艽生地甘草姜三片煎外加血餘硬一錢研末沖服熨法回春生蔥連根切碎炒令汁干乘熱敷患處外用絹綿束之立刻定痛止血筋骨折傷赤水玄珠急取雄雞一隻刺血量受傷人酒量沖服痛立止神效無比跌壓瘀血積痛難忍集驗大黃酒蒸一兩當歸尾五錢桃仁去皮尖二十一粒酒煎雞鳴時服天明取下瘀血即愈跌打損傷懷德堂筆記九世還魂草鹿銜草落得打草麻皮頭上部此味加倍土鱉各等分下部加苧根內傷加白頸蚯蚓上五味為君隨便再加紅花蘇木等藥酒水煎服汗發即愈有一泥工沈姓者屋上跌下服此三日全愈接骨不知痛鳳仙花根酒磨服半寸最多一寸然後揉托入臼並不知痛但多服傷人以一寸為極不可多用跌打骨斷願濟堂刊施金櫻子兜即金櫻子根也去皮煎酒熱服渣敷患處立效墜車落馬筋骨痛不止集驗玄胡索研末酒服二錢日進二次即愈閃跌胡繡溪用魚螵切片熔化攤新棉花上乘熱貼傷處拔出青紫傷痕即愈跌僕損傷急救散周鶴仙當歸尾酒洗自然銅醋煅七次桃仁去皮尖紅花各七錢陳麻皮三錢地鱉蟲燒酒浸焙五錢骨碎補酒洗蒸大黃酒洗各二錢乳香去油沒藥去油胎兒骨血竭硃砂雄黃麝香各五分以上共為極細末收貯勿泄氣如遇跌死打死尚有微氣者用酒漿調二釐入口即活如骨折瘀血攻心用藥八釐酒調灌之其傷骨自上而愈神效之極接骨神方雄土鱉一個此蟲凡雄者用銅刀或竹刀切斷以碗復之半晌其蟲能接上不死者是雄的方可用是雌者不可用火煅存性生半夏一個自然銅醋煅七次三分乳香去油沒藥去油各五釐以上俱忌鐵器共為絕細末每服二釐黃酒調下不可多吃如多吃恐長出多骨服藥後須保養四十天覆舊此方神效無比有力之家宜修合濟世接骨神方半兩錢錢上只有半兩二字者以火煅成淬入醋內數次即脆研極細末七釐甜瓜子火焙乾為末七釐二味末和勻生酒服下即愈但不宜多服多則旁長一多骨也神驗跌打損傷膏藥劉長隨當歸三稜莪朮獨活白芷川芎羌活杜仲川牛膝防風肉桂紅花續斷防己五加皮骨碎補赤芍藥劉寄奴秦艽蔥頭土鱉蟲各三錢頭髮一握上藥用麻油十斤浸七日入鍋將藥熬枯濾去渣復入淨鍋內熬至滴水成珠入後細藥末龍骨乳香去油沒藥去油血竭各二兩麝香另收旋加如皮破骨損者麝香忌用入油熬化磁缽收貯每藥油四兩加制松香一斤同熬成膏傾水缸內扯拔出火毒收藏凡攤膏時燉化攤好放在地上一個時辰再貼得土氣則土鱉蟲有力易於接骨故也面目跌僕青紫生半夏磨汁塗消接骨李岳遠年屋上古舊瓦為細末好酒調服二三錢睡一覺即接上跌打生大黃肉桂各一兩研細紅糖調敷跌打筋骨神方許元植糯米揀去半粒者燒酒麴各三錢研細無灰熱酒調服厚蓋取汗跌打吳宇上牛皮膠用生薑汁熬化布攤貼黃金膏治跌打損傷筋骨斷落刀傷杖瘡湯火傷麻油半斤熬至滴水成珠離火入白蠟黃蠟各五錢攪化再入藤黃一兩攪勻收貯此藥愈陳愈妙如收久膏老加熬過麻油燉化攪勻冷透敷之惟刎頸者勿用因藤黃毒人耳跌打損傷松毛要尋孤松樹四圍無樹倚靠者十兩清水洗淨帶潮切碎石臼內槌爛紅梔子八十一個飛面八兩量加水共搗碎作餅先以蔥湯洗患處敷貼外以皮紙包裹至重者一日一換九日拔出青傷自愈跌打損傷臭椿樹皮旋揭一塊生薑二兩不拘公母雞絨毛一把同搗濃敷上用槿木皮遮護以一炷香為度自愈接骨仙方千里馬八雙燒灰存性沉香廣木香各三兩象皮瓦上焙琥珀燈心同研冰片各二兩骨碎補去毛血竭各一兩虎脛骨醋炙一對乳香去油沒藥去油各一兩五錢上各研細和勻瓷瓶收貯看傷之大小用藥錢許或八分先用好米醋一茶杯入銅杓內熬滾入藥再熬片時調敷患處不可太熱不可太冷敷上棉紙裹好新棉包緊十日或八日一換忌公雞鯉鱔不忌牛羊肉戒房事百日復舊如神跌打損傷地骨皮威靈仙骨碎補川續斷各六錢入瓷罐內酒二斤隔湯煮至斤半服取汗渣用酒一斤煎半斤服接骨大蛤蟆生搗如泥敷縛定其骨自合又方義雞草葉搗爛取汁熱酒和服數次即愈跌打之後凡大小便通利者廣三七二三錢酒煎飲跌打二便閉塞不通柞樹根去心皮二錢酒煎服木石打傷水龍骨煅研桐油調搽指甲爬破面皮生薑汁調輕粉敷好無痕跌打損傷時值暑天腐爛恐生蛆蟲外雖平滿為害不一宜用豬血切片引出蛆蟲再用白蒺藜白蘞貫仲為細末香油調敷其蟲即滅傷損愈後肌膚青腫聖惠用茄子種通黃極大者切一指厚放瓦上焙乾為末酒調二錢臨臥服一夜消盡無痕擦落耳鼻綱目用油發灰末乘急以所落耳鼻蘸發灰綴定以軟帛縛定神效自行顛撲穿斷舌心血出不止綱目取米醋以雞翎刷所斷處其血即止仍用蒲黃杏仁硼砂少許多末蜜調噙化而愈接指方入門蘇木為末敷斷指間接定外用蠶繭包縛完固數日如故傷破陰囊二丸脫落懸掛未斷痛苦無任醫鑑須教人慢慢托上多取壁錢敷貼傷處日漸就安其囊如故慈雲散畢峻功治癰疽疔腫大毒及跌打損傷初起即消已成即潰接骨回生功效如神番木鱉川烏土鱉蟲鹿角煅灰各二兩穿山甲一兩六錢明天麻草烏川芎升麻當歸尾鬧楊花生香附殭蠶各一兩蜈蚣斑蝥各四錢上各制畢研極細末重者用一錢輕者用六分或八分俱用無灰酒調服被蓋取汗不可見風必須汗乾然後出幃幙幕跌打昏暈不省人事蟹殼燒灰存性熱酒調服再將大甘草嚼爛敷之跌打青腫生山梔研同白麵熱水調敷打傷筋骨遍體青腫紫血不行疼痛難忍白芷一兩甘松三錢三奈一錢麝香三分共研細每服三錢或童便或酒沖開水調服接骨方乳香自然銅醋煅沒藥去油龍骨煅各一錢麝香三釐土鱉一個陰乾臨時研用共為細末每服三分服時再入土鱉末一個須先整定傷骨方可服用否則接挫落下頦拿法門主論落下頦者氣虛之故不能收束關竅也患者平身正坐以兩手托住下頦左右大指入口內納槽牙上端緊下頦用力往肩下捺開關竅向腦後送上即投關竅隨用絹條兜頦放頂上半時許去之即愈脫頦起於肺腎虛損元神不足或笑談高興忘倦一時元氣不能接續所致如法拿上須避風速服加味六君子湯不然風邪外受必致痰涎壅盛口眼喎斜而風中臟腑十無一瘳矣集驗落下頦拿法門主方加味六君子湯集驗人參白朮白茯苓半夏各一錢五分天麻火煨陳皮各一錢殭蠶酒炒去絲當歸各二錢附子滾湯泡去皮臍六分川芎八分甘草三分燈心四十根生薑三片水煎服落下頦口噙烏梅一二枚茶傾自上落下頦烏梅搗碎作餅塞滿牙盡頭處張口流涎隨手托上人咬門主論陳實功曰人咬為患良肉受傷但陽明胃經所屬者齒臟腑多火多熱凡食經此無不燖爛下咽又飲食炙煿之毒無不侵襲故傷人發腫其痛異常臭膿腐爛痛徹連心是感受牙齒之毒也初咬時一日內眾人撒熱尿浸傷處洗淨牙黃瘀血咬孔上蟾酥餅貼之膏蓋後出微膿漸愈如初咬時未有此法致腫痛發胖痛甚者亦與童便洗淨挹干用粗紙捻蘸麻油點火用煙焰熏腫痛上良久方住以解其毒仍以蟾酥條插入太乙膏蓋候腫消時換玉紅膏搓之長肉完口正宗人咬傷門主方驗方熱尿洗去牙黃瘀血以生栗子嚼極爛塗之如腫痛用麻油紙捻火焰熏之又方溏雞屎塗咬處立刻止痛不作膿又方幹人糞裝荔枝殼內安放咬處加艾圓灸之以不痛為度又方生栗子和飯嚼爛厚罨傷處又方綱目鱉殼或食蛇龜板燒灰敷或油調搽咬破手指痛不可忍久則爛脫手指手掌人尿入瓶將患指浸在內一宿自愈咬破手白蘿蔔葉嚼爛敷之被咬受牙黃毒老鼠屎兩頭尖者七粒荔枝肉一個紅糖搗勻敷上牙黃即拔在敷藥上七聖散胡學海治人咬傷破爛人糞燒存性三錢生大黃花蕊石蘆甘石各二錢輕粉一錢甘草一錢五分冰片五分共乳極細搓之救從高墜下門主論從高墜下瘀血攻心用淡豆豉一合煎湯飲之或生薑汁同麻油和勻溫服之再將淨土五升蒸熟以舊布重裹分為二包更換熨之痛止即已如氣絕沉重撬開口以熱尿灌之用半夏末吹鼻以艾灸臍將被傷人盤足坐住提起頭髮使氣從上升則可活矣陳遠公曰從高墜下昏死不蘇人以為惡血奔心誰知乃氣為血壅乎夫跌僕之傷多是瘀血攻心然跌僕出其不意未必心動也惟從高下墜失足時心必驚悸自知必死是先挾一必死之心不比一蹶而傷也心不及動也故氣血錯亂每每昏絕不救治法逐其瘀血佐以蘇氣之品則血易散而氣易開倘徒攻瘀血則氣閉不宣究何益乎蘇氣湯乳香末沒藥末大黃末各一錢山羊血末五分蘇葉荊芥丹皮各三錢當歸白芍羊躑躅各五錢桃仁十四粒水煎調服一劑氣蘇三劑血活全愈此方醒氣活血兼用之故奏效神速妙在用羊躑躅與蘇葉荊芥因其氣亂而亂之則血易活氣易醒矣陳實功曰從高墜下未經損破皮肉者必有瘀血流注臟腑人必昏沉不醒二便必難大成湯通利二便其人必醒不醒者獨參湯救之尋常墜墮輕者紅花活血湯調之正宗錢青掄曰從高墜下及落馬血沖欲死切忌飲冷水急用韭菜汁或熱小便灌之丹方摘要從高墜下用生半夏末吹入鼻中醒以生薑汁真麻油攪勻灌之再以乾荷葉燒灰熱小便調下三錢日進三服自愈附刊感應篇注證救從高墜下門主方雞鳴散三因金刃傷打撲傷血瘀凝積煩悶欲死大黃酒蒸五錢當歸尾三錢桃仁十四粒研上作一貼酒煎雞鳴時服次日下瘀血即愈治折傷亦妙破傷風門主論朱丹溪曰破傷風證多死最急證也始因出血過多或風從瘡口而入或瘡早閉合瘀血停滯於內血受病而屬陰始雖在表隨易傳臟故此風所傷必多難治其證身熱自汗口噤搐搦勢急非常藥可治非全蠍不開兼以防風風藥馮魯瞻曰凡破傷風邪初受在表者宜用發散同傷寒表證治法又曰破傷風四惡證不治一面目青黑二額上汗珠不流三眼小目瞪四身汗如油錦囊陳實功曰破傷風因皮肉損傷覆被外風襲入經絡漸傳入里其患寒熱交作口噤咬牙角弓反張口吐涎沫入陰則身涼自汗傷處反為平陷如故其毒內收矣當用萬靈丹發汗令風邪反出再以玉真散患上貼之得膿則吉如汗出前證不退者死正宗凡小兒或男婦頭顱額鬢生癤破後因其輕而忽之不肯貼膏藥每致外風水露侵入頭面發腫如破傷風候當用荊防白芷殭蠶蟬蛻內服取汗外用紅升丹提之膏蓋自安回春云凡鬥毆被打成破傷風頭面腫大發熱以九味羌活湯熱服取汗外用杏仁搗爛入白麵少許新汲水調敷瘡上腫即消陳實功曰破傷風證如汗出後口噤不開語聲不出諸證不退傷處不高漸醒漸昏時發時止死正宗破傷風門主方豆淋酒黑豆六七合炒香乘熱用麩曲酒一碗傾入即去豆取酒加羌活五錢煎一半熱服取汗避風如產後驚風去羌活加蘇葉五錢又方黑豆一撮鍋內炒熱沖無灰酒三四杯滾三五沸調辰砂末少許服灸法人耳中垢紙上焙乾為末和蘄艾作圓灸傷處又方核桃殼半個內填極幹人糞患上以槐白皮襯住加艾圓灸之候遍身汗透為度汗後其人必困一覺即愈治瘋犬咬並效破傷風諸藥不效事在危急兼治豬癲羊癇等風發之昏倒不知人事者鰾膠切斷微炒杭粉焙黃皂礬炒紅色各一兩硃砂另研水飛三錢上三味研和入硃砂再研每用二錢無灰酒調服取汗外面仍灸七壯知痛為吉豬羊等瘋須每服三錢連進二服破傷風口噤直強魚膠燒存性研加麝香少許每服二錢酒調下不飲酒者蘇木煎湯調服外用魚膠一錢煮化封瘡口或用膠如瘡大一片浸濕火熔化開貼之又方桑枝尺許長十數根火上灸取汁和酒服又方草屋上大蠐螬蟲此蟲糞堆內亦有倒捉俟涎流出滴入傷處滴後遍身麻木汗出即活神方天麻散荊芥穗三兩天麻生南星炮去皮臍防風各一兩共為細末每服五錢連須蔥白煎湯調下破傷風及產後驚風小兒急慢驚風至危篤者蛤蟆皮風乾陰陽瓦焙微黃色研細加當門子少許白酒調服被蓋取汗治破傷風血凝心針入肉三證如神錦囊烏鴉翎燒灰存性細研酒服一錢或白滾湯下破傷風出血不止當歸末敷之破傷風浮腫蟬蛻為末蔥涎調敷患上即時拔出惡水破傷風寒熱垂危丹方蟬蛻四兩燒末調服奪命散三因方治跌僕金刃傷及破傷風傷濕發痛強直如痙天南星炮防風各等分研細末水調敷傷處出水為妙仍以溫酒調服一錢已死心尚溫者熱童便調灌二錢倘鬥毆內傷墜壓者酒和童便連灌三服即蘇亦可煎灌玉真散集驗天南星防風白芷明天麻白附子各等分共研末敷患處如打傷欲死心頭微溫者熱酒童便灌下二錢連進二服立可回生破傷風牙關緊閉腰背反張甚則咬牙縮舌以童便調服三錢立愈破傷風證回生神方周鶴仙全斑蝥七釐小兒只用三釐糯米炒焦一分三釐共為末黃酒沖服即愈不可忽視又方蒼朮焙草烏薑汁製各一錢研末溫酒沖服汗出為度
