body:
  text: 卷三十六跌打部自跌打損傷以及人咬破傷風等證俱匯於本部中以便檢閱參治跌打損傷門主論陳遠公曰有跌傷骨折必用杉木或杉板將骨折湊合端正以繩縛定勿偏斜曲再以布扎切不可因疼痛心軟少致輕鬆反為害事後用內服藥如皮破血出須用外治藥但骨折而外邊之皮不傷即不必用外治藥然內外夾攻未嘗不更佳耳內治法宜活血祛瘀為先血不活則瘀不去瘀不去則骨不能接也續骨神丹當歸二兩大黃五錢生地敗龜版末白芍各一兩丹皮三錢桃仁三十個續斷牛膝乳香末沒藥末紅花各二錢羊躑躅一錢水煎服一劑瘀去新生骨即合也又二劑去大黃再服四劑全愈外治膏藥加末藥摻傷處為妙全體神膏當歸生地紅花各二兩牛膝續斷劉寄奴地榆茜草木瓜小薊人參川芎白朮黃耆各一兩甘草五錢桑木枝四兩杏仁皂角柴胡荊芥各三錢麻油三斤熬數沸以麻布濾去渣再煎滴水成珠加入水漂過黃丹一斤四兩收為膏勿太老再用自然銅醋浸燒七次海螵蛸乳香花蕊石各三錢沒藥二錢麒麟竭五錢白蠟一兩為末乘膏未冷投入膏中以桑木棍攪勻取起以瓦器盛之臨時以火燉攤大約每張重一兩攤畢再入勝金丹麝香花蕊石象皮各三錢血竭三兩乳香海螵蛸沒藥樟腦人參木耳灰三七根兒茶各一兩古石灰紫石英各二兩自然銅冰片乾地蝨干大糞琥珀各一錢生甘草五錢土狗十個研細和勻瓷瓶密貯每膏一張用末藥三錢摻膏上貼之凡接骨不須二個也重則二個此乃絕奇絕異之方倘骨未損傷只貼膏藥不必用勝金丹內外治法三方有不可形容之妙內外兼治旦夕奏功得此三方無折骨之不救也冰鑑丹心曰凡金瘡及折傷不可飲冷水血見寒則凝入心則死蔣示吉曰跌打損傷筋斷血流不止者獨勝散主之說約馮魯瞻曰胎前如有跌撲所傷須逐汙生新為主佛手散最妙腹痛加益母草服如痛止則母子俱安若胎已損則汙物並下再加童便制香附益母草陳皮煎濃汁飲之如從高墜下腹痛下血煩悶加生地黃耆補以安之如因跌撲腹痛下血加參朮陳皮白茯苓炙甘草砂仁末以保之如胎下而去血過多昏悶欲絕脈大無力用濃厚獨參湯沖童便服之小產本由氣血大虛今當產後益虛其虛矣故較正產尤宜調補素問云人有所墜墮惡血留內腹中滿脹不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡刺足內踝之下然骨之前血脈出血刺足跗上動脈不已刺三毛上各一痏見血則已左刺右右刺左善悲驚不樂刺如右方繆剌論靈樞云有所墜墮惡血留內有所大怒氣上而不行下積於脅下則傷肝又中風有所擊撲若醉入房汗出當風則傷脾又頭痛不可取於腧者有所擊墮惡血在內若肉傷痛未已可側刺不可遠取之也邪氣臟腑及厥陰篇靈樞曰身有所傷出血多反中風寒若有所墜墮四肢懈惰不收名曰體惰取小腹臍下之三結交陽明太陰也臍下三寸關元也三結交者即關元穴是也寒熱篇內經云肝脈搏堅而長色不青當病墮若搏因血在脅下令人嘔逆金匱云寸口脈浮微而澀然當亡血若汗出設不汗者其身有瘡被刀斧所傷亡血故也脈經云從高顛撲內有血腹脹滿其脈堅強者生小弱者死李東垣曰夫從高墜下惡血留於內不分十二經絡醫人俱作中風肝經留於脅下以中風療之血者皆肝之所生惡血必歸於肝不問何經之傷必留於脅下蓋肝主血故也痛甚則必有自汗但人人有汗出皆屬風證諸風皆屬於肝木況敗血凝泣逆其所屬入於肝也從高墜下逆其上行之血氣非肝而何非傷寒無汗既曰汗必自風化之也故以破血行經藥治之凡寒涼之劑不可輕用醫學發明論劉宗厚曰打撲金刃損傷是不因氣動而病生於外外受有形之物所傷乃血肉筋骨受病非如六淫七情為病有在氣在血之分也所以損傷一證專從血論但須分其有瘀血停滯而亡血過多之證蓋打僕墮墜皮不破而內損者必有瘀血若金刃傷皮出血或致亡血過多二者不可用同法而治有瘀血者宜攻利之若亡血者兼補而行之又察其所傷有上下輕重深淺之異經絡氣血多少之殊唯先逐瘀血通經絡和血止痛然後調氣養血補益胃氣無不效也脈經云金刃跌僕脈病不相應者死戴院使云撲踣不知曰顛兩手相搏曰撲其為損一也又曰大法固以血之瘀失分虛實之補瀉亦當看損傷之輕重輕者頓挫氣血凝滯作痛此當導氣行血而已重者傷筋折骨此當續筋接骨非調治三四月不得平復更甚者氣血內停沮塞真氣不得行者必死急瀉其血通其滯亦或有可治焉傷損論曰夫傷損必須求其源看其病之輕重審其損之淺深凡人一身之間自頂至足有斫傷打傷跌傷及諸刃傷者皆有之凡此數證各有其說有當先表裡而後服損藥者為醫者當循其理治之然醫者意也不知意者非良醫也或者稟性愚昧不能觀其證之輕重明其損之淺深未經表裡通利先服損藥誤人多矣有因此痰涎上攻有因此大小臟腑閉結差之毫釐謬以千里所謂醫不三世不服其藥信哉凡腦骨傷破不可見風著水恐成破傷風候凡腦骨傷碎在硬處可治若傷在太陽不可治如傷在髮際須剪剃去發看皮破不硬好用藥敷凡腦兩肩及後枕或兩眉有傷可治眼睛傷瞳仁不碎可治頭頂心有損則難治凡鼻兩孔傷凹者可治血出無妨齒破傷動者用蒺藜根燒存性為末常揩搓之即牢結喉傷重軟喉斷不可治以湯與之得入腸者可治若並出者不可治凡手腳骨只一邊斷則可治若兩手腳骨皆斷者不可治肚上被傷肚皮俱破腸出外只腸全斷難醫傷破而不斷者皆可治療凡腸出可令病人手搭在醫人肩隨其左右收起以麻油潤瘡口整入腹卻以通關散吹鼻打噴嚏令腸自入用桑白皮線同皮肉縫合後以封口藥塗傷處外以補肌散用雞子清調勻敷貼若腸上有小損孔以燈火照之腸中有氣射燈不可治凡傷損藥中不可缺少乳香沒藥此藥極能散血住痛不可不知凡傷損初次不可便用自然銅久後方可用之折骨者便宜用之若不折骨不碎骨則不可用修合諸損藥皆要去了如用自然銅必用火煅方可服之然新火者其火毒與金毒相煽挾香熱藥毒雖有接骨之功燥散之禍甚於刀劍戒之凡損傷妙在補氣血俗工不知惟要速效多用自然銅多成痼疾也初傷只用蘇木活血黃連降火白朮和中童便煎服在下者可下瘀血但先須補托在上者宜飲韭汁或和粥吃切不可飲冷水血見寒則凝但一絲血入心即死十不治證系顛撲損傷或被傷入於肺者縱未即死二七難過一左脅下傷透內者二腸傷斷一半可醫全斷者不可治三小腹下傷內者四證候繁多者五脈不實重者六老人左股壓碎者七傷破陰子者八血出盡者九肩內耳後傷透內者皆不必用藥得效馮魯瞻曰凡跌撲損傷踒折挫閃雖由外觸勢必內傷氣血凝滯紅腫或青痛不可忍故始須用甘辛溫散行氣破瘀則痛自退腫自消如獨活白芷荊芥防風川芎當歸沒藥古文錢鹿角灰蘇木赤芍紅花之類以水酒煎藥衝入童便尤妙及其外傷平復猶宜滋補氣血筋骨之藥調之錦囊又曰肢體全仗氣血傷損必加補養在上先消瘀血在下先為補養更審胃氣蓋去血過多脈微欲死獨參湯加童便接住元氣為急甚有肢冷脈微者參朮附子大劑挽之勢與產婦同也脈來和緩者生急疾芤者死宜虛細不宜數實切記避風陳實功曰跌撲者有已破未破之分亡血瘀血之別從高處墮未損皮肉者必有瘀血流注臟腑人必昏沉不醒二便必難當以大成湯通利二便其人自蘇不醒者獨參湯救之正宗損傷大綱固用藥不可差而整頓手法尤不可孟浪今以人之周身總三百六十五骨節開列於後人身總有三百六十五骨節以一百六十五字都關次之首自鈴骨之上為頭左右前後至轅骨以四十九字共關七十二骨巔中為都顱骨者一有勢微有髓及有液次顱為髏骨者一有勢微有髓髏前為頂威骨者一微有髓女人無此骨髏後為腦骨者一有勢微有髓腦左為枕骨者一有勢無液枕就之中附下為天蓋骨者一下為肺系之本蓋骨之後為天柱骨者一下屬脊窳有髓蓋前為言骨者一言上覆合於髏骨有勢無髓言下為舌本骨者左右各二有熱無髓髏前為囟骨者一無勢無髓囟下為伏委骨者一俚人訛為伏犀骨者是也無勢無髓伏委之下為俊骨者一附下即眉宇之分也無勢無髓眉上左為天賢骨者一無勢無髓眉上右為天貴骨者一眉上直目睛也無勢無髓左睛之上為智宮骨者一無勢無髓右睛之上命門骨者一無勢無髓兩睛之下中為鼻鼻之前為梁骨者一無勢無髓梁之左為顴骨者一有勢無髓梁之右為糺骨者一有勢無髓梁之端為嵩柱骨者一無勢無髓左耳為司正骨者一無勢無髓右耳為納邪骨者一無勢無髓正邪之後為完骨者左右共二無勢無髓正邪之上附內為嚏骨者一無勢少涎嚏後之上為通骨者左右前後共四有勢少液嚏上為䥱骨者一無勢多液其䥱後連屬為頷也左頷為乘骨者一有勢多液右頷為車骨者一有勢多液乘車之後為轅骨者左右共二有勢有液乘車上下出齒牙三十六事無勢無髓庸下就少則不滿其數復次鈴骨之下為膻中左右前後至蓧以四十字關九十七骨轅骨之下左右為鈴骨者二多液鈴中為會厭骨者一無勢無髓鈴骨之下為咽骨者左中及右共三無髓嚥下為喉骨者左中及右共三無髓喉下為嚨骨者環次共十事無髓嚨下之內為肺系骨者累累然共十二無勢無髓肺系之後為谷骨者一無髓谷下為㿠道骨者左右共二無髓嚨外次下為順骨者八少液順骨之端為順隱骨者八少液順下之左為洞骨者一女人無此順下之右為棚骨者一女人無此洞棚之下中央為𩩲骭骨者一無髓俚人呼為鳩尾𩩲骭直下為天樞骨者一無髓鈴下之左右為缺盆骨二有勢多液左缺盆之前為下厭骨者一無髓右缺盆前之下為分饍骨者一無髓厭善之後附下為倉骨者一無髓倉之下左右為髎骨者共八有勢無液髎之下左為胸骨者一男子此骨大者好勇髎之下右為蕩骨者一女人此骨大者則丈夫胸之下為烏骨者一男子此骨滿者發早白蕩之下為臆骨者一此骨高多訛妄鈴中之後為脊窳骨者共二十二上接天柱有髓脊窳次下為大動骨者一上通天柱共二十四椎大動之端為歸下骨者一道家謂之尾閭歸下之後為篡骨者一此骨能限精液歸下之前為蓧骨者一此處薄者多處貧下復次缺盆之下左右至襯骨以二十五字關六十骨此下只分兩手臂至十指之端眾骨支其缺盆之後為傴甲骨者左右共二有勢多液傴甲之端為甲隱骨者左右共二此骨長則至賢前支缺盆為飛動骨者左右共二此骨薄病痱緩次飛動之左為龍臑骨者一有勢無髓無液次飛動之右為虎沖骨者一有勢無髓無液龍臑之下為龍本骨者一有勢有髓虎沖之下為虎端骨者一有勢有髓本端之下為腕也龍本上內為進賢骨者一男人此骨隆為名臣虎端上內為及爵骨者一女人此骨高為命婦腕前左右為上力骨者共八有勢多液次上力為駐骨者左右共十有勢多液次駐骨為搦骨者左右共十有勢多液次搦骨為助勢骨者左右共十右助外為甲左助外為爪爪甲之下各有襯骨左右共十無勢無液復次𩩲骭之下左右前後至初步以五十一字關一百三十六骨此下至兩乳下分左右自兩足心眾骨所會處也𩩲骭之下為心蔽骨者一無髓𩩲骭之左名為脅骨者上下共十二居小腸之分也左脅之端各有脅隱骨者分次亦十二無髓脅骨之下為季脅骨者共二多液季脅之端為季隱骨者共二無髓𩩲骭之右為肘骨者共十二處大腸之分也肘骨之下為䏚肋骨者共二各無隱骨惟獸有之右肋之端為肘隱骨者共十二無髓蓧骨之前為大橫骨者一有勢少髓橫骨之前為白環骨者共二有勢有液白環之前為內輔骨者左右共二有勢有液內輔之後為骸關骨者左右共二有勢有液骸關之下為犍骨者左右共二有勢有液犍骨之下為髀樞骨者左右共二有勢多髓髀樞下端膝蓋骨者左右共二無勢多液膝蓋左右各有俠升骨者共二有勢多液髀樞之下為胻骨者左右共二有勢多髓胻骨之外為輔骨者左右共二有勢有液胻骨之下為立骨者左右共二有勢有液立骨左右各有內外踝骨者共四有勢少液踝骨之前各有下力骨者左右共十有勢多液踝骨之後各有京骨者左右共二有勢少液下力之前各有釋欹骨者共十有勢釋欹之前各有起僕骨者共十有勢起僕之前各有平助骨者左右各十有勢平助之前各有襯甲骨者左右各十無勢少液釋欹兩旁各有核骨者左右共二有勢多液起僕之下各有初步骨者左右共二有勢無髓有液女人則無此骨凡此三百六十五骨也天地相乘惟人至靈其女人則無頂威骨洞右棚及初步等五骨止有三百六十骨又男子女人一百九十骨或隱或襯或無髓勢餘二百五十六骨並有髓液以藏諸筋以會諸脈溪谷相需而成身形謂之四大此骨度之常也凡醫跌打損傷者忌用蔥若用蔥雖醫好遇天陰傷處必發損作痛梁偉士可法良規云凡傷損之證乃有形器物所傷為筋骨受病當從論蓋血得熱則妄行其害甚速須先伐肝火清運火砭患處和經絡則瘀血不致泛注肌肉不致遍潰次則壯脾胃進飲食生血氣降陰火則瘀血易於腐潰新肉易於收斂此要法也若用克伐之劑虛者益虛滯者益滯禍不旋踵矣論瘀血走注又云凡傷損之證若棍撲重者患處雖不破其肉則死矣蓋內肉糜爛與瘀血相和如皮囊盛糊然其輕者瘀血必深蓄於內宜急砭刺即投大補之劑否則大熱煩躁頭目脹痛牙關緊急殊類破傷風證此瘀穢內作而然也急刺之諸證悉退若刺破之後或有發熱惡寒口乾作渴怔忡驚悸寤寐不寧牙關緊急目赤頭痛自汗盜汗寒戰咬牙氣短喘促遺尿手撒身熱脈大按之如無身熱不欲近衣或欲投水或惡寒而脈浮大重按微細衣厚仍寒此氣血挾虛使然也皆宜參耆歸術之類急補之如不應速加附子緩則不救或手足逆冷肚腹疼痛瀉利腸鳴飲食不入呃逆嘔吐此寒氣乘虛而然也治法同前用藥如有汗而不惡寒或無汗而惡寒口噤足冷腰背反張頸項勁強乃血氣虛而發痙也治法亦同前用藥少佐見證之劑此痙證往往誤投風藥以致不起者多矣若果是破傷風證亦系元氣耗損外邪乘虛而致皆宜峻補先固其本為善妄投風藥禍如反掌治者不可不察論瘀穢內焮又云傷損之證若內積瘀血焮熱宜砭刺不知砭刺則外皮炙乾縮急堅硬已連好肉不能腐爛益加脹痛俗名丁痂皮是也以致瘀穢難出治者因將死肉盡行割去瘡口開張反難腐潰怯弱之人多成破傷風證以致不救若杖後刺去瘀穢塗以神效當歸膏投以參朮歸耆地黃之類諸證即退死肉即潰疔痂不結所潰亦淺生肌之際亦不結痂自免皺結之痛論疔痂皮又云凡損傷之證若皮膚已破出血過多而昏憒者氣血虛極也大補為主如不應急加附子若墜撲太重皮膚不破血未出而昏潰者瘀血在內也行散為主如不應速加酒炒大黃若下後而有變證者皆氣血虛極也用十全大補湯若因痛甚而自汗昏憒者風木熾甚也用清肝涼血之劑則痛自定汗自止潰自潰苟作外因風邪治之促其危也論亡血昏潰又云傷損之證若頭腦並致命處所損太重昏潰良久將致不起者急用蔥白細切杵爛炒熱罨患處稍冷更以熱者罨之多自醒矣醒而肢體作痛肌肉被傷宜調養氣血若腹中作痛手不可近者瘀血停滯也不可下宜用花蕊石散內化之卻以參耆歸術補托之又云凡損傷之證若有瘀血內凝致大小便不通若用硝黃苦寒之劑下之血愈凝而不下益加脹滿命在須臾急用木香肉桂末二三錢以熱酒灌之血下乃生不下即死如怯弱之人欲用硝黃加木香肉桂同煎益善蓋假其熱以行其寒也論瘀血便秘又云凡傷損之證若誤飲冷水瘀血凝滯氣道不通或血上逆多致不救若入於心即死急飲童便熱酒以和之若患重而瘀血不易散者更和以辛溫之劑睡臥要上身墊高不時喚醒勿令熟睡則血庶不上逆故患重之人多為逆血填塞胸間或閉塞氣道咽喉口鼻不得出入而死論瘀血氣閉上逆又云凡損傷之證大便秘結若是出血過多而秘結此大腸血虛火熾乾燥而不通耳不可輕用硝黃峻利之劑宜用潤腸丸以四物湯送下或豬膽導法為善論血虛便秘又云凡傷損之證胸脅肚腹作痛按之痛甚者瘀血在內也大承氣湯下之既下而腹痛不止按之亦痛者瘀尚未盡也四物湯加穿山甲牛膝補而行之若腹仍痛按之卻不痛者血虛也四物湯加參耆白朮補而和之若下後脾胃受傷而腹痛者補中益氣湯為主下後寒氣乘虛而腹痛者溫中益氣湯為主下後昏憒而出汗者虛極而變證也獨參湯補之未應急以大劑人參附子主之緩則不救下後嘔吐瀉泄手足厥冷或指甲青黑者虛寒之甚也附子理中湯主之緩亦不治若口噤手撒遺尿痰盛或唇青體冷汗出昏憒氣血虛極之壞證也非參附湯不能救誤作風治者必死論胸腹作痛又云凡傷損之證若脅脹痛脈數浮無力以手按之反不脹痛者此血虛而肝脹也宜四物湯加參苓青皮甘草治之若胸脅脹悶或作痛者按之亦然左關脈洪而有力者此怒氣傷肝之證也以小柴胡湯加芎歸青皮赤芍桔梗枳殼治之若胸脅作脹按之則愈痛者乃瘀血蓄肝之證也急以四物湯加桃仁紅花青皮治之蓋證不必論其受責之輕重問其患處去血之曾否但被人扭按甚重蹉跌撲地努力恚怒以傷其氣血瘀血歸肝多致前證甚則胸脅氣逆脹滿不通或血溢口鼻卒至不救蓋打撲墜墮惡血宜砭不宜留況十二經絡之血生於心藏於肝統於脾小腹與脅皆肝經部位惡血蓄而不行必生脹滿疼痛自汗法當破血生血清厥陰肝經則善論脅脹痛又云凡傷損之證多有患處作痛若出血過多而痛者血虛火盛也宜甘寒以降虛火甘溫以養脾氣若汗出多而痛者肝木火盛也宜辛涼以清肝火甘寒以生肝血若筋骨傷而作痛者正而治之肌肉傷而作痛者調而補之氣血逆而作痛者順而補之氣血虛而作痛者溫而補之熱而痛者清之寒而痛者溫之陰虛火痛者用補陰之劑脾氣虛而痛者用補脾之劑作膿而痛者托之膿焮而痛者開之切不可概用苦寒以致復傷脾胃也論患處作痛又云傷損之證如所傷之處痛至四五日不減者或至一二日方痛者皆作膿也不必用止痛之藥但宜托裡之劑以速其潰膿去則痛止若頭目所傷作膿焮赤作痛者膿出痛亦自止其或頭痛而時作時止者血虛而痛也非傷也若頭痛而兼眩者火也痰也氣虛也木旺也不可作寒治也又云凡傷損之證肉死而不潰或惡寒而不潰者宜補陽氣發熱而不潰者宜益陰血或因作痛或因峻劑而不潰者宜和養脾胃或因失血或因汗多而不潰者宜大補氣血其外面皮黑堅硬而不潰者內火蒸炙而然也內服益陰血制陽火之劑外塗當歸膏以潤之則自潰也大抵脾胃主肌肉腐潰生肌全在脾胃氣血兩旺倘治者不識病機失於補助故有死肉不能潰而死者有死肉已潰新肉不能生而死者有死肉潰新肉生瘡口久不能斂而死者此三者皆失於不預為補益耳論死肉不潰又云凡傷損之證若焮痛而肌肉不生者火盛也日晡作熱而不生者血虛也食少體倦而不生者脾胃虛也膿水清稀而不生者氣血虛也忌敷生肌長肉之藥恐反助其邪也若膿多而臭穢者邪火也脈洪大而作渴者其氣虛而邪氣實也斯為難治大抵傷損證候內無瘀血即當補脾脾氣得補則肉傷者自愈肉死者自潰新肉易生瘡口易合故云脾健則肉自生切不可偏用寒涼克伐之劑復傷元氣致不能生肌收斂雖行補益緩不濟事矣論新肉不生又云凡傷損之證若壅腫不退或色黯不消元氣虛也宜補之青腫脹痛按之復起膿瘀內滯也宜針之經曰氣主煦之血主濡之是也當以六君子湯加芎歸培養脾胃元氣則青腫益消瘀滯自散膿穢自出苟服克伐涼劑虛其氣血益腫益青益潰也若敷貼寒涼等藥則寒氣入里墜道自壅瘀血益凝運氣不至近死不遠雖壯實之人亦寒氣生熱肉腐深大氣血衰敗肌肉無由以生欲望其腫青退而潰處收斂抑難矣論青腫不消又云凡傷損之證若骨已接骱已入其腫不消者此元氣怯弱也怯弱即不能運散瘀滯益凝故也經云壯者氣行則愈怯者則著而為病惟補中益氣湯滋陰助陽內服十全大補湯外敷黑龍散或蔥熨之法則運氣健旺瘀血自救腫痛自消若投行氣破血之劑則元氣愈怯運氣愈滯患在骨骸及血氣罕到之處最難調治尤忌寒涼克伐之藥論腫痛不消又云凡傷損之證口鼻等竅或患處出血不止者因木火熾盛血熱錯經而妄行也宜清肝火養肝血若中氣虛弱血無所附而妄行者宜補中益氣使血各歸其經若陽氣內脫不能攝血歸經而血出不止者獨參湯加炮姜治之不應則急加附子若血蘊於胃而嘔血者四物湯加童便拌炒山梔薑汁治之若因怒氣傷肝而嘔血者亦治以前藥更加柴胡黃芩以清之如脈大發熱喉痛者參耆當歸生地荊芥蜜炙黃柏以主之凡出血脈大者難治凡見血證不可用寒涼之劑致脾胃受傷反不能攝血歸源也論出血嘔血便血又云凡傷損之證有出汗者當審其陰陽虛實而治之若陰虛陽往乘之則發熱自汗以甘寒之劑補其氣如補中益氣湯之屬是也若陽虛陰往乘之則發厥自汗以甘溫之劑助其陽如參附湯之屬是也亦有因痛楚而自汗者宜補氣生血為主若心孔一片汗出者養其心血自止論出汗一人年四十墜馬亡血出汗不止煩躁不安次日其汗遂止熱躁益甚口噤手顫此陰血虛陽火乘之而汗出為寒氣收斂腠理故汗不得出火不得泄拂鬱內甚而益增他證也若誤用祛風之藥愈損氣血促其危矣又云凡傷損之證有發熱者或出血過多或大潰之後而發熱者乃陰血耗散陽氣無所依附遂致浮散於肌表之間是為陰虛非實熱也當歸補血湯主之若發熱煩躁肉瞤筋惕等證乃亡血也聖愈湯主之如汗出不止乃血脫也急用獨參湯補之若血脫脈實汗後脈躁者難治細小者易痊其瘀血內停必肚腹作痛不在此例論發熱又云凡傷損之證若出血過多或大潰之後肌膚髮熱大渴引飲目赤面紅晝夜不息其脈洪大而虛重按全無此名陰虛發熱之病當歸補血湯主之誤認實熱反用寒涼必死若身體微熱煩躁面赤其脈沉而微此名陰盛發躁之病宜四君子湯加姜附治之外臺秘要云陰盛發躁欲坐井中用附子四逆湯加蔥白治之李東垣亦曰切忌寒涼之劑凡熱來復去不時而動乃無根虛火也用六君子湯加薑桂不應急加附子或八味地黃丸最善論發躁又云凡傷損之證有發熱者當分晝夜陰陽而治之東垣曰晝則發熱夜則安靜是陽氣自旺於陽分也晝則安靜夜則發熱煩躁是陽氣下陷入陰中也名曰熱入血室如晝夜俱發熱煩躁是重陽無陰也當急瀉其陽而峻補其陰夫熱入血室之證婦人經水適來或因損傷或因大勞或因大怒而發熱必致前證或有言語譫妄如見鬼神狀者猶宜小柴胡湯加生地主之重陽無陰血虛者亦用小柴胡湯合四物湯治之論熱分晝夜又云凡傷損之證有作渴者若出血而作渴者血脫也四物湯加白朮補之不應加人參黃耆以補氣倍當歸熟地以養血若潰後而作渴者大補氣血為主胃熱津液耗散作渴者用竹葉黃耆湯瘀血內停發熱作渴者用竹葉石膏湯若膿血大潰而作渴或小便赤澀或痛而不通死在反掌及癰疽潰爛後多有此證非六味地黃丸不能救論作渴又云凡傷損之證有作嘔者或因痛不止或因攻伐之劑而作嘔者皆胃氣傷也四君子湯加芎歸半夏藿香薑棗之類主之或兼忿怒損傷而致嘔者氣逆也小柴胡湯加山梔枳殼茯苓桔梗之類治之若胃中痰火盛而作嘔者二陳湯加黃連山梔生薑治之胃氣虛寒而作嘔者補中益氣湯加薑棗主之或出血過多或潰後而作嘔者宜大補氣血為主論作嘔又云凡傷損之證出血過多如面黑胸脹或膈痛發喘此肺氣虛瘀血入肺急以人參蘇木飲救之如咳血衄血乃火盛氣逆血蘊於肺宜用十味參蘇飲救之加山梔黃芩蘇木主之面黑作喘之證諸書未嘗論及治者不明患者必死惟產寶百問內云產婦瘀血入肺面黑作喘用參蘇飲救之其方乃人參一兩蘇木二兩作一劑煎服論面黑作喘又云凡傷損之證小便不利若因出血或平素陰虛火躁而滲泄之令不行者宜滋膀胱之陰若因疼痛或平素肺經氣虛不能生化腎水而小便短少者當補脾肺之氣滋其化源則小便自生若誤用分利之劑復損其陰禍在反掌經云氣化則小便出焉又云無陽則陰無以生無陰則陽無以化亦有汗出不止而小便短少者汗止便自利猶忌分利滲泄之劑論小便不利又云凡傷損之證出血太多或潰爛之際收斂之後如有寒熱作痛或自汗盜汗煩躁作渴或遍身疼痛肢體倦怠牙關緊急痰涎上壅等證是血氣虛極而作變證也當峻補元氣為主大凡傷損證有外邪乃乘虛而入猶當補助作外邪治之禍不旋踵矣論血氣內傷又云凡傷損之證筋糜肉爛膿血大泄陽亦隨陰而走元氣喪敗理勢必然氣血不虛者鮮矣智者審之論血氣必虛又云凡傷損之證膿血大潰血出過多兼之惡寒發熱焮痛口乾肝血自然不足況肝主筋血去則筋無以養筋無血養則燥遂不能束骨而屈伸自如故有拘攣之象宜聖愈湯加柴胡木瓜山梔麥冬五味子治之如作風證一治筋愈燥而血愈涸攣豈能伸乎論血虛筋攣又云凡傷損之證最忌骨氣虛憊腎主骨腎水足則肝氣充溢經脈強健雖有傷損氣血不虧而潰斂以時氣路不致於上逆痰涎何能而上壅使腎氣一虛水不能生木則肝氣奔騰而不下痰氣亦隨之以上升非風痰也乃水泛白羊也是水泛為痰之證也宜六味地黃丸或六味地黃湯加清肝之劑論腎虛氣逆又云凡傷損之證其患已愈而腿作痛乃受患太重膿血過多瘡雖愈而肝經血氣尚未充也故濕熱乘之因虛而襲以致作痛非風證也用八珍湯加牛膝木瓜蒼朮黃柏防己炙草以祛濕熱養陰血痛漸止後去防己黃柏服之遂瘳論濕熱乘肝又云凡傷損之證遍身作癢或搔破如瘡疥此血不營於肌腠當作血虛治之不應兼補其氣亦有愈後身起白屑落而又起或有如布帛一層隔於肌膚乃氣血俱虛不能營於腠理宜大補氣血為主若作風邪治之誤矣論遍身作癢又云凡傷損之證肢體麻木若口眼如故腰背如常而肢體麻木者氣虛也蓋血虛則氣虛故血虛之人肢體多麻木此是陰虛火動之變證實非風也當用升陽滋陰之劑若作風治凶在反掌論肢體作麻又云凡傷損之證如所傷之處不甚克伐之劑未用而四肢困倦精神短少懶於動作胸滿氣促肢體沉重氣高而喘身熱而煩心下痞滿不思飲食自汗體重其脈洪大而頭痛是內傷元氣之證以補中益氣湯主之如在夏令是暑熱內傷元氣之證用清暑益氣湯主之若遇秋令是濕熱內傷元氣之證以清燥湯主之論四肢倦怠又云凡傷損之證或其人素多濕痰或又服辛熱破血之劑則濕熱助痰流阻道路反致遍身作痛丹溪曰東南之人多因濕土生痰痰生熱熱生風證類中風惟宜清燥湯或二陳湯加羌防歸芍桔梗炒芩蒼朮治之論濕痰作痛又云凡傷損之證或手足生瘡在氣血罕到之地切不可用損元氣之藥若元氣虛怯邪氣滋盛潰爛延上必死不潰而色黯者亦死手足心背受病色黑者多死手足節髀損去者不死故傷損骨斷筋皮尚連者急剪去之若肉被傷欲去尚連者亦剪之不爾潰及好肉怯弱之人多致不救如手足與指損去一節可治不死惟去其半節留其半節或骨斷筋皮相連者最為難治論氣遏肉死又云凡傷損之證不可輕服烏附等味蓋其性味辛熱恐助火以益其患其平素有失血及血虛之人雖在冬令決不宜用緣滯血得火而益傷陰血得火而益耗運血得火而妄行患肉得火而益壞新肉得火而復潰疼痛得火而益甚若人平素虛寒或因病而陽氣脫陷者則用之不在此例論用辛熱之非又云凡傷損之證不宜敷貼硝黃之類然其性味鹹寒恐濟寒以益其傷若人平素虛弱患而作痛雖在夏令亦不宜用蓋胃氣得寒而不生運氣得寒而不健瘀血得寒而不行腐肉得寒而不潰新肉得寒而不生若內有瘀血停滯服以通之不在此例論用鹹寒之非又云凡傷損之證近用黑羊皮熱貼者蓋羊肉性熱而補氣彼受刑太重患處內肉已壞欲其腐潰者用之成膿固速若內非補劑壯其根本毒氣不能內侵外非砭刺泄其瘀穢良肉不無傷壞設受刑輕淺外皮破傷外用神效當歸膏敷貼則丁痂不結傷肉漸潰死肉自敗焮腫自退黯色自消內用四物湯加黃連柴胡山梔白朮茯苓清肝木健脾土自愈若專用黑羊皮罨貼反助其毒腐潰益深難於收斂智者審之論用黑羊皮之非又云凡傷損之證瘀血已去而肌肉糜爛不肯收斂屬氣血俱虛大補猶恐不及豈可復用行氣破血之劑又賊其元氣耶當時諸君多蹈此弊而怯弱者皆致不救論用行氣之非又云凡傷損之證遇杖墜跌撲患處如有瘀血止宜砭出服壯元氣之劑蓋其氣血已損切不可孟浪妄行妄下此肢末之地血氣難到再用行氣下血等藥復損脾胃元氣則運氣愈難營達於下而反為敗證怯弱者多致夭枉論下血之非又云或問寒涼能消腫止痛何以用之反致內潰不能生肌且有致死者答曰寒涼之劑敷於肌肉而不知痛者是一遇寒涼血因之以凝氣因之以滯氣血凝滯肌肉皆為死陰寧復有知其疼痛也哉故毒不出而內攻多致不救當知氣血得溫則行得寒則凝寒極生熱變化為膿腐潰益深氣血既敗肌肉無由而生欲望其不危也幾希論用寒藥之非又云凡傷損之證遇杖撲重者外皮不破而內肉糜爛與血相和甚者臀腿如皮囊盛糊然若不砭刺發泄為患匪輕故當時大理寺大獄諸君失於不砭以致不起者多矣是不知傷重而內有瘀穢者也須急去之即服補益之劑以固根本庶保無虞古人謂瘀穢惡於虎狼毒於蛇躉去之稍緩則戕性命非虛言也醫者三複之論不砭之非又云凡傷損之證貴乎大補氣血則腐肉易於潰爛瘡口易於生肌每見治者不知氣血虧損往往多用十宣散又以方內參耆芎歸為補益之劑嫌其中滿多用不過錢許以厚朴防己為清毒之藥因其行散動則倍加如此何益於氣血而欲責其速潰速斂速生肌乎無怪其煩躁作渴飲食益少因之不起者眾矣論不補益之非得效云凡墮壓死者急安好處以袖掩其口鼻上一食頃候眼開先與熱小便飲之若初覺氣絕急擘開口以熱小便灌之利去瘀血以下載東醫寶鑑又云凡跌打壓傷或從高墮落皆驚動四肢五臟必有惡血在內專怕噁心先用通二便藥和童便服之立效大小腸俱通利則自無煩悶攻心之患矣又云頭上有傷或打破或金刃傷用藥糊角縛緊不使傷風慎之又云如傷臟腑致命處一觀其脈虛促危綱目云卒墮顛壓倒打死心頭溫皆可救將本人如僧打坐令一人將其頭髮控放低以半夏或皂角末吹令入鼻中如活卻以薑汁香油打勻灌之入門云若取藥不及急撥開口以熱小便多灌之又云凡傷損專主血論肝主血不問何經所傷惡血必歸於肝流於脅鬱於腹而作腹痛實者下之又云凡出血已多而又嘔血不止者難治宜用蘇木煎湯調蚌霜散服之又云凡折傷外損筋骨者可治內損臟腑里膜及破陰子耳後者並不治醫鑑曰人為刀斧所傷或墮落險地或撲身體損傷筋骨皮肉皆出血不止或瘀血停積若去之不早則有入腹攻心之患又云打僕傷損去血過多脈當虛細若得急疾大數者死丹心云跌僕傷損須用蘇木活血黃連降火白朮和中以童便煎服如傷在上宜飲韭汁回春云凡鬥毆被打內有瘀血其脈堅強者生小弱者死脈經得效云凡腳手各有六出臼四折骨每手有三處出臼腳亦三處出臼手掌根出臼其骨交互相鎖或出臼則是挫出鎖骨之外須是搦骨於鎖骨下歸窠若出外則須搦入內若出內則須搦入外方入窠臼只有手拽斷難入窠十有八九成痼疾也又云骨節損折肘臂腰膝出臼蹉跌須用法整頓歸源先用麻藥與服使不知痛然後可用手法又云搦骨歸窠用竹一片生柳木板片尤佳夾定一邊一邊不用夾須存屈直處時時拽曲拽直不然則愈後曲直不得又云凡骨碎者須用麻藥即草烏散與服或刀割開甚者用剪剪去骨鋒使不沖肉或有粉碎者鐮去細骨免膿血之禍且以藥水一日一洗莫令臭穢又云凡骨碎者用接骨藥火上化開糊骨上然後夾定外用夾骨法活血散接骨丹二生膏糯米膏又云淋洗用蔓荊散跌打損傷門主方黎洞丸專治跌打損傷傷筋損骨斷夾棍刀傷斧砍等證兼治吐血癆瘵噤口傷寒小兒急慢驚風牙關緊閉婦人難產下部重傷惡血攻心胸悶發熱產後惡露不盡兒枕骨痛寒熱熱乾血癆血山崩血淋白帶一切危證服之護心散血解毒輕者三分重者五分陳酒化服一切無名腫毒對口疔瘡乳癰等證內服外敷毒蛇蜈蚣蠍螫草踏蟲傷俱系外敷真天竺黃生大黃明雄黃法制藤黃各三錢真胎骨瓜兒竭真廣三七阿魏各一錢五分梅片真西牛黃麝香各三分沒藥去油透明乳香去油各二錢五銖錢四個火煅紅醋淬七次制研細末稱准和勻用蜜三兩黃蠟六錢同煎化離火攪勻乘熱為丸作兩種一重三分一重五分看病人老幼壯弱病之重輕用陳酒頓化儘量飲醉蓋被取汗三黃寶蠟丸此方出自㠟洞軍中救活之人甚眾凡修合此藥最忌婦人並諸魘物治一切惡證刀箭槍棒毒蛇惡蟲咬傷跌打損傷破傷風傷力成癆死血凝滯遍身四肢麻木不仁婦人產後惡血不淨致生怪證瘀血攻心痰迷心竅危在頃刻每用一丸無灰酒服如受傷日久病勢重者連服數丸能令通身瘀血化為新血破頑痰保元氣祛邪毒活絡舒筋效難盡述真起死回生之聖藥也凡一切外傷量瘡之大小麻油少許化藥勿令見火將雞翎搓掃瘡上腐肉不須刀割數次自然生肌長肉凡軍中毒弩所傷死在頃刻用五分口內嚼下則毒氣不能封喉攻心其傷處仍將藥敷數日而愈若鳥槍打傷未曾死者亦用三分黃酒送下任量飲醉安眠片時其槍子即從傷處流出火燒麻油調敷專治跌打損傷惡刀箭毒毒瘡棒瘡毒蛇蠱毒瘋犬咬傷破傷風傷力成癆產後惡露不淨瘀血奔心痰迷心竅危在頃刻者只要口有微氣重者一錢輕則三分或六分無灰酒燙熱調化服之如受病日久連進數服服後隨飲熱酒數斤臥暖處出汗即愈如被鳥槍傷者鉛子即出再將上藥煎滾取起離火化藥少許以雞翎擋敷傷處痛即止法制藤黃四兩真天竺黃紅芽大戟洗淨劉寄奴酒洗血竭各三兩兒茶明雄黃各二兩當歸尾酒洗一兩二錢朴硝一兩水銀下鉛即息乳香去油沒藥去油水粉各三兩麝香五錢血珀二錢燈心同碾上研極細末小蜂黃蠟熔化撤腳以熱水頓之勿令凍冷候火氣和平入諸藥於內用手攪勻搓如手指條大同時以刀切薄片酒燉化服忌