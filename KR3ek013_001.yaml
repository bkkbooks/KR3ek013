body:
  text: 卷一內經纂要上古天真論篇上古天真篇曰上古之人其知道者法於陰陽和於術數知道謂知修養之道也夫陰陽者天地之常道術數者保生之大論故修養者必謹先之食飲有節起居有常不妄作勞食飲者充虛之滋味起居者動止之綱紀飲食自倍腸胃乃傷生氣通天論曰起居如驚神氣乃浮是惡妄動也廣成子曰必靜必清無勞汝形無搖汝精乃可以長生所以聖人先之也故能形與神俱而盡終其天年度百歲乃去形與神俱同臻壽分謹於修養以奉天真故盡得終其天年去謂去離形骸也靈樞經曰人生百歲五臟皆虛神氣皆去形骸獨居而終矣今時之人不然也離於道也以酒為漿溺於飲也以妄為常寡於信也醉以入房過於色也以欲竭其精以耗散其真樂色曰欲輕用曰耗不節則精竭輕用不止則真散是以聖人愛精重施髓滿骨堅不知持滿不時御神言輕用而縱欲也愛精保神如持盈滿之器不慎而動則傾竭天真吾形有神不時時御之務快其心逆於生樂快於心欲之用則逆養生之樂矣起居無節故半百而衰也離於道則壽不能終盡於天年矣上古聖人之教下也虛邪賊風避之有時恬淡虛無真氣從之精神內守病安從來邪乘虛入是謂虛邪最害中和謂之賊風靈樞曰邪氣不能獨傷人人虛乃邪勝之也恬淡虛無法道清靜精氣內持故其虛邪不能為害也是以志間而少欲心安而不懼形勞而不倦內機息故少欲外紛靜故心安起居皆適故不倦也氣從以順各從其欲皆得所願志不貪故所欲皆順心易足故所願必從不異求故無難得也老子曰知足不辱知止不殆可以長久是以嗜欲不能勞其目淫邪不能惑其心老子曰不見可欲使心不亂又曰聖人為腹不為目所以能年皆度百歲而動作不衰者以其德全不危也莊子曰執道者德全德全者形全形全者聖人之道也女子七歲腎氣盛齒更髮長老陽之數極於九少陽之數次於七女子為少陰之氣故以少陽數偶之明陰陽氣和乃能生成其形體故七歲腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下故有子癸謂壬癸北方水乾名也任脈衝脈皆奇經脈也腎氣全盛衝任流通經血漸盈應時而下天真之氣降與之從事故云天癸也然沖為血海任主胞胎二者相資故能有子謂之月事者平和之氣以三旬而一見也三七腎氣平均故真牙生而長極真牙謂牙之最後生者腎氣平而真牙生者表牙齒為骨之餘也四七筋骨堅髮長極身體盛壯女子天癸之數七七而終年居四七材力之半故身體盛壯長極於斯五七陽明脈衰面始焦發始墮陽明之脈氣營於面故其衰也發墮面焦六七三陽脈衰於上面皆焦發始白三陽之脈盡上於頭故三陽衰則面焦發白所以衰者婦人有餘於氣不足於血以其經月數泄脫之故七七任脈虛太衝脈衰少天癸竭地道不通故形壞而無子也經水絶止是為地道不通衝任衰微故形壞而無子丈夫八歲腎氣實髮長齒更老陰之數極於十少陰之數次於八男子為少陽之氣故以少陰數合之易繫辭曰天九地十則其數也二八腎氣盛天癸至精氣溢瀉陰陽和故能有子男女有陰陽之質不同天癸則精血之形亦異陰靜海滿而去血陽動應合而泄精二者通和故能有子易繫辭曰男女媾精萬物化生三八腎氣平均筋骨徑強故真牙生而長極四八筋骨隆盛肌肉壯滿丈夫天癸八八而終年居四八亦材力之半也五八腎氣衰發墮齒稿腎主骨齒為骨余腎氣既衰精無所養以故發墮齒稿六八陽氣衰竭於上面焦髮鬢頒白陽氣陽明之氣也足陽明脈起於鼻俠口環唇交承漿上耳前至額顱故衰於上則面焦髮鬢白也七八肝氣衰筋不能動天癸竭精少腎臟衰形體皆極肝氣養筋肝衰筋不能動腎氣養骨腎衰形體疲極天癸已竭故精少也八八則齒髮去陽氣竭精氣衰故齒髮不堅離形骸矣腎者主水受五臟六腑之精而藏之故五臟盛乃能瀉五臟六腑精氣淫溢而滲灌於腎腎乃受而藏之非腎一臟而獨有精故曰五臟盛乃能瀉今五臟皆衰筋骨解墮天癸盡矣髮鬢白身體重行步不正而無子耳物壯則老謂之天道也有其年已老而有子者此其天壽過度氣脈常通而腎氣有餘也稟天真之氣有餘也此雖有子男不過盡八八女不過盡七七而天地之精氣皆竭矣雖老而生子子壽亦不能過天癸之數四氣調神大論篇四氣調神大論曰春三月此謂發陳春陽上升氣潛發育庶物陳其姿容故曰發陳天地俱生萬物以榮天氣溫地氣發溫發相合萬物滋榮夜臥早起廣步於庭溫氣生寒氣散夜臥早起廣步於庭被髮緩形以使志生春氣發生於萬物之首故被髮緩形使志意發生也生而勿殺豫而勿奪賞而勿罰此春氣之應養生之道也春陽布發生之令養生者必謹奉天時也逆之則傷肝夏為寒變奉長者少逆謂反行秋令肝象木王於春行秋令則肝氣傷夏火王而木廢故病於夏春生夏長逆春傷肝故少氣以奉於夏長之令也夏三月此謂蕃秀陽自春生至夏洪盛物生以長故蕃秀也蕃茂盛也秀華美也天地氣交萬物華實夏至四十五日陰氣微上陽氣施化陰氣結成成化相合故萬物華實也夜臥早起無厭於日使志無怒使華英成秀使氣得泄若所愛在外緩陽氣則物化寬志意則氣泄物化則華英成秀氣泄則膚腠宣通時令發揚故所愛亦惟順陽而在外也此夏氣之應養長之道也逆之則傷心秋為痎瘧奉收者少冬至重病逆謂反行冬令痎痎瘦之瘧心象火王於夏行冬令則心氣傷秋金旺而火廢故病於秋秋收冬藏逆夏傷心故少氣以奉於秋收之令冬水則勝於火故重病於冬至之時也秋三月此謂容平萬物夏長華實已成容狀至秋平而定也天氣以急地氣以明天氣以急風聲切也地氣以明物色變也早臥早起與雞俱興懼中寒露故早臥欲使安寧故早起使志安寧以緩秋刑志躁不慎其動則助秋刑急順殺伐生使志安寧緩秋刑也收斂神氣使秋氣平神蕩則欲熾欲熾則傷和氣和氣既傷則秋氣不平調也故收斂神氣使秋氣平無外其志使肺氣清此順秋氣之收斂也此秋氣之應養收之道也逆之則傷肺冬為飧泄奉藏者少逆謂反行夏令則肺氣傷冬水旺而金廢故病發於冬逆秋傷肺故少氣以奉於冬藏之令也冬三月此謂閉藏草木凋蟄蟲去地戶閉塞陽氣伏藏水冰地坼無擾乎陽陽氣下沉水冰地坼故宜周密不欲煩擾也早臥晚起必待日光避於寒也使志若伏若匿若有私意若已有得謂不欲妄出於外觸冒寒氣也去寒就溫無泄皮膚使氣亟奪去寒就溫言居深室也冬日在骨蟄蟲周密君子居室無泄皮膚謂勿汗也汗則陽氣發泄為寒氣所迫奪也此冬氣之應養藏之道也逆之則傷腎春為痿厥奉生者少逆謂反行夏令腎象水王於冬行夏令則腎氣傷春木王而水廢故病發於春逆冬傷腎故少氣以奉於春生之令也天氣清靜光明者也言天明不竭以清靜致之人壽延長亦由順動而得此言天氣以示人也藏得不止故不下也四時成序七曜周行天不形言是藏德也德隱則應用不屈故不下也老子曰上德不德是以有德言天至尊高德猶見隱也況採全生之道而可不順天乎天明則日月不明邪害空竅天所以藏德者為其欲隱大明故大明見則小明滅故大明之德不可不藏天若自明則日月之明隱矣言人之真氣亦不可泄露當清淨法道以保天真苟離於道則虛邪入於空竅四時陰陽者萬物之根本也時序運行陰陽變化天地合氣生育萬物萬物之根悉歸於此聖人春夏養陽秋冬養陰以從其根陽氣根於陰陰氣根於陽無陰則陽無以生無陽則陰無以化全陰則陽氣不極全陽則有氣不窮滋苗者必先固其根伐下者必先枯其上故以斯調節從順其根故與萬物浮沉於生長之門聖人所以身無奇病生氣不竭者以順其根也逆其根則伐其本壞其真矣故陰陽四時者萬物之終始也死生之本也逆之則災害生從之則苛疾不起是謂得道苛者重也聖人不治已病治未病不治已亂治未亂此之謂也病已成而後藥之亂已成而後治之譬猶渴而穿井鬥而鑄兵不亦晚乎生氣通天論篇生氣通天論曰陽氣者若天與日失其所則折壽而不彰人之有陽若天之有日天失其所則日不明人失其所則陽不固人壽夭折故天運當以日光明是故陽因而上衛外者也此以明陽氣運行之部分輔衛人身之正用也陽氣者精則養神柔則養筋此又明陽氣之運養也然陽氣者內化精微養於神氣外為柔軟以固其筋故陽氣者一日而主外晝則陽氣在外周身行二十五度平旦人氣生日中而陽氣隆日西而陽氣已虛氣門乃閉隆高也盛也夫氣之有者皆自少而之壯積暖以成炎炎極又涼物之理也故陽氣平曉生日中盛日西而已減虛也氣門謂玄府也發泄經脈榮衛之氣故謂氣門是故暮而收拒無擾筋骨無見霧露反此三時形乃困薄皆所以順陽氣也陽出則出陽藏則藏暮陽氣衰內行陰分故宜收斂以拒虛邪擾筋骨則逆陽精耗見霧露則寒濕俱侵故順此三時乃天真久遠也陰者藏精而起亟也陽者衛外而為固也言在人之用也陰不勝其陽則脈流薄疾並乃狂薄疾謂極虛而急數也並謂盛實也狂謂狂走也陽並於四肢則狂四肢諸陽之本也陽盛則四肢實實則登高而歌熱盛於身故棄衣欲走也如是者皆為陰不勝其陽也陽不勝其陰則五臟氣爭九竅不通九竅者內屬於臟外設為官五臟氣爭則九竅不通是以聖人陳陰陽筋脈和同骨髓堅固氣血皆從如是則內外調和邪不能害耳目聰明氣立如故邪氣不克故真氣獨立而如常陽強不能密陰氣乃絶陽自強而不能閉密則陰泄瀉而精氣竭絶矣陰平陽祕精神乃治陰氣和平陽氣閉密則精神日益治也陰陽離決精氣乃絶陰不和平陽不閉密強用施瀉損耗天真則精氣不化乃絶流通也因於露風乃生寒熱因於露體觸冒風邪風氣外侵陽氣內拒風陽相薄故寒熱生是以春傷於風邪氣留連乃為洞泄風氣通肝春肝木王木勝脾土故洞瀉生也夏傷於暑秋為痎瘧夏熱已甚秋陽復收陽熱相攻則為痎瘧痎老也亦曰瘦也秋傷於濕上逆而咳秋濕既勝冬水復王水來乘肺故咳逆病生發為痿厥濕氣內攻則咳逆外散筋脈則痿弱冬傷於寒春必溫病冬寒且凝春陽氣發寒不為釋陽怫於中寒怫相持故為溫病四時之氣更傷五臟寒暑溫涼遞相勝負四時之氣更傷五臟之和金匱真言論篇金匱真言論曰春氣者病在頭肝之應也夏氣者病在臟心之應也秋氣者病在肩背肺之應也冬氣者病在四肢四肢氣少寒毒善傷隨所受邪則為病處夫精者身之本也故藏於精者春不病溫冬則精氣伏藏陽不妄升故春無溫病也平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也日中陽盛故曰陽中之陽黃昏陰盛故曰陽中之陰陽氣主晝故平旦至黃昏皆為天之陽而中復有陰陽之殊也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也雞鳴陽氣未出故曰天之陰平旦陽氣已升故曰陰中之陽故人亦應之夫言人之陰陽則外為陽內為陰言人身之陰陽則背為陽腹為陰言人身之臟腑中陰陽則臟者為陰腑者為陽臟謂五神臟腑謂六化腑肝心脾肺腎五臟皆為陰膽胃大腸小腸膀胱三焦六腑皆為陽故背為陽陽中之陽心也心為陽臟位處上焦以陽居陽故謂陽中之陽靈樞曰心為牡臟牡陽也背為陽陽中之陰肺也肺為陰臟位於上焦以陰居陽故謂陽中之陰靈樞曰肺為牝臟牝陰也腹為陰陰中之陰腎也腎為陰臟位於下焦以陰居陰故謂陰中之陰靈樞曰腎為牝臟牝陰也腹為陰陰中之陽肝也肝為陽臟位處中焦以陽居陰故謂陰中之陽靈樞曰肝為牡臟牡陽也腹為陰陰中之至陰脾也脾為陰臟位處中焦以太陰居陰故謂陰中之至陰靈樞曰脾為牝臟牝陰也此皆陰陽表裡內外雌雄相輸應也故以應天之陰陽也以其氣象參合故能上應於天陰陽應象大論篇陰陽應象大論曰陰陽者天地之道也謂變化生成之道也萬物之綱紀滋生之用也陽與之正氣以生陰為之主持以立故為萬物之綱紀也變化之父母異類之用也何者鷹化為鳩田鼠化為鴽腐草化為螢雀入大水為蛤雉入大水為蜃如此皆異類因變化而成物也生殺之本始寒暑之用也萬物假陽氣溫而生因陰氣寒而死故生殺本始是陰陽之所運為也神明之府也言所以生殺變化之多端者以神明居其中也治病必求於本陰陽與萬類生殺變化在於人身同相參合故治病之道必先求之故積陽為天積陰為地陰靜陽躁陽生陰長陽殺陰藏明前天地生殺之殊用也神農曰天以陽生陰長地以陽殺陰藏坤者陰也位西南隅時在六月七月之交萬物之所盛長也安謂陰無長之理乾者陽也位戌亥之分時在九月十月之交萬物之所收殺也孰謂陽無殺之理以是明之陰長陽殺之理可見矣陽化氣陰成形寒極生熱熱極生寒寒氣生濁熱氣生清清氣在下則生飧泄濁氣在上則生䐜脹此陰陽反作病之逆從也故清陽為天濁陰為地地氣上為云天氣下為雨雨出地氣云出天氣陰凝上結則合以成云陽散下流則注而為雨雨從云以施化故言雨出地云憑氣以交合故言云出天天地之理且然人身清濁亦如是也故清陽出上竅濁陰出下竅氣本乎天者親上氣本乎地者親下各從其類也上竅謂耳目鼻口下竅謂前陰後陰清陽發腠理濁陰走五臟腠理謂滲泄之門故清陽可以發散五臟為包藏之所故濁陰可以走之清陽實四肢濁陰歸六腑四肢外動故清陽實之六腑內化故濁陰歸之水為陰火為陽水寒而靜故為陰火熱而躁故為陽陽為氣陰為味氣惟散布故陽為之味日從形故陰為之味歸形形歸氣氣歸精精歸化形食味故味歸形氣養形故形歸氣精食氣故氣歸精化生精故精歸化精食氣形食味氣化則精生味和則形長故云食之也化生精氣生形精微之液惟血化而成形質之有資氣行營立故斯二者各奉生乎味傷形氣傷精過其節也精化為氣氣傷於味精承化養則食氣精若化生則不食氣精血內結郁為穢腐攻胃則五味倨然不得入也女人重身精化百日皆傷於味也陰味出下竅陽氣出上竅味有質故下流於便瀉之竅氣無形故上出於呼吸之門味厚者為陰薄為陰之陽氣厚者為陽薄為陽之陰陽為氣氣厚者為純陽陰為味味厚者為純陰故味薄者為陰中之陽氣薄者為陽中之陰味厚則泄薄則通氣薄則發泄厚則發熱陰氣潤下故味厚則泄利陽氣炎上故氣厚則發熱味薄為陰少故通泄薄為陽少故汗出發泄謂汗出也壯火之氣衰少火之氣壯火之壯者壯已必衰火之少者少已則壯壯火食氣氣食少火壯火散氣少火生氣氣生壯火故云壯火食氣少火滋氣故云氣食少火以壯火食氣故氣得壯火則耗散以少火益氣故氣得少火則生長陰勝則陽病陽勝則陰病勝則不病不勝則病陽勝則熱陰勝則寒重寒則熱重熱則寒物極則反猶壯火之氣衰少火之氣壯也寒傷形熱傷氣寒則衛氣不利故傷形熱則榮氣內消故傷氣氣傷痛形傷腫氣傷則熱結於肉分故痛形傷則寒薄於皮腠故腫故先痛而後腫者氣傷形也先腫而後痛者形傷氣也先氣證而病形故曰氣傷形先形證而病氣故曰形傷氣風勝則動風勝則庶物皆搖故曰動熱勝則腫熱勝則陽氣內結故浮腫暴作甚則榮氣逆於肉裡聚為癰膿之腫燥勝則乾燥勝則津液竭涸故皮膚乾燥寒勝則浮寒勝則陰氣結於玄府玄府閉密陽氣內攻故為浮濕勝則濡瀉濕勝則內攻於脾胃脾胃受濕則水穀不分故大腸傳道而注瀉也故喜怒傷氣寒暑傷形喜怒之所生皆生於氣故云喜怒傷氣寒暑之所勝皆勝於形故云寒暑傷形細而言之則熱傷於氣寒傷於形暴怒傷陰暴喜傷陽怒則氣上喜則氣下故暴卒氣上則傷陰暴卒氣下則傷陽厥氣上行滿脈去形厥氣逆也逆氣上行滿於經絡則神氣浮越故滿離形骸也喜怒不節寒暑過度生乃不固靈樞經曰智者之養生也必順四時而適寒暑和喜怒安居處若喜怒不常寒暑過度天真之氣何可久長也故重陰必陽重陽必陰言傷寒傷暑亦如是天地者萬物之上下也觀其覆載而萬物之上下可知矣陰陽者血氣之男女也陰主血陽主氣陰生女陽生男左右者陰陽之道路也陰陽間氣左右循環故左右為陰陽之道路也陰氣右行陽氣左行水火者陰陽之徵兆也觀水火之氣則陰陽徵兆可知矣陰陽者萬物之能始也故曰陰在內陽之守也陽在外陰之使也陰靜故為陽之鎮守陽動故為陰之役使年四十而陰氣自半也起居衰矣人年四十腠理始疏榮華稍落發斑白起居衰之次也年五十體重耳目不聰明矣衰之漸也年六十陽痿氣大衰九竅不利下虛上實涕泣俱出矣衰之甚也故曰知之則強不知則老知謂知七損八益全形保生之道也愚者不足智者有餘有餘則耳目聰明身體輕強老者復壯壯者益治是以聖人為無為之事樂恬淡之能從欲快志於虛無之守故壽命無窮與天地終此聖人之治身也聖人不為無益以害有益不為害性而順性故壽命長遠與天地終天不足西北故西北方陰也而人右耳目不如左明也在上故法天地不滿東南故東南方陽也而人左手足不如右強也在下故法地東方陽也陽者其精並於上並於上則上明而下虛故使耳目聰明而手足不便也西方陰也陰者其精並於下並於下則下盛而上虛故其耳目不聰明而手足便也俱感於邪其在上則右甚在下則左甚此天地陰陽所不能全也故邪居之陰陽之應天地猶水之在器器圓則水圓器曲則水曲人之血氣亦如是故隨不足則邪氣留居之故天有精地有形天有八紀地有五理陽為天降精氣以施化陰為地布和氣以成形五形為生育之井理八風為變化之綱紀八紀為八歲之紀五理謂五行化育之理故能為萬物之父母陽天化氣陰地成形五理運行八風鼓折收藏生長無替時宜故能為萬物變化之父母清陽上天濁陰歸地天地之動靜神明為之綱紀清陽上天濁陰歸地然其動靜蓋由神明之綱紀耳天氣通於肺以納至清之氣以象天地氣通於嗌以納水穀之濁以象地風氣通於肝風生木故雷氣通於心雷象火之有聲故穀氣通於脾谷空虛脾受納故雨氣通於腎腎注水故六經為川流注不息故腸胃為海以皆受納也九竅為水注之氣清明者象水之內明流注者象水之流注以天地為之陰陽以人事配象則近指天地以為陰陽陽之汗以天地之雨名之夫人汗泄於皮腠者是陽氣之發泄耳然其取類於天地之間則云騰雨降而相似也陽之氣以天地之疾風名之陽氣散發疾風飛揚故以應之暴風象雷逆氣象陽故治不法天之紀不用地之理則災害至矣背天之紀違地之理則六經反作五氣更傷真氣既傷災害之至可知矣故天之邪氣感則害人五臟八風發邪以為經風觸五臟邪氣發病故天之邪氣感則害人五臟水穀之寒熱感則害於六腑熱傷胃及膀胱寒傷腸及膽氣地之濕氣感則害皮肉筋脈濕氣勝則榮衛之脈不行故感則害於皮膚筋脈也故因其輕而揚之輕者發揚則邪去因其重而減之重者則減去之因其衰而彰之因病氣衰攻令邪去則真氣堅固血色彰明形不足者溫之以氣精不足者補之以味衛氣者所以溫分肉充皮膚肥腠理司開闔故衛氣溫則形分足矣腎者主水受五臟六腑之精而藏之故五臟盛乃能瀉由此則精不足者補五臟之味也其高者因而越之越謂越揚也其下者引而竭之引謂泄引也中滿者瀉之於內內謂腹內其有邪者漬形以為汗邪謂風邪之氣風中於表則汗而發之其在皮者汗而發之在外故汗發泄也其慓悍者按而收之慓疾也悍利也氣候疾利則按之以收斂其實者散而瀉之陽實則發散陰實則宣瀉審其陰陽以別柔剛陰曰柔陽曰剛陽病治陰陰病治陽所謂從陰引陽從陽引陰以右治左以左治右也定其血氣各守其鄉血實宜決之決謂決破其血氣虛宜掣引之掣讀為導導引也則氣行條暢陰陽離合論篇陰陽離合篇曰東方青色入通於肝開竅於目藏精於肝南方赤色入通於心開竅於耳藏精於心中央黃色入通於脾開竅於口藏精於脾西方白色入通於肺開竅於鼻藏精於肺北方黑色入通於腎開竅於二陰藏精於腎天覆地載萬物方生未出地者命曰陰處名曰陰中之陰處陰之中故曰陰處形未動出亦是為陰以陰居陰故曰陰中之陰則出地者命曰陰中之陽形動出者是則為陽以陽居陰故曰陰中之陽陽豫之正陰為之主陽施正氣萬物方生陰為主持群形乃立故生因春長因夏收因秋藏因冬失常則天地四塞失其常道則四時之氣閉塞陰陽之氣無所運行矣陰陽別論篇陰陽別論曰脈有陰陽知陽者知陰知陰者知陽深知謂備識其變易凡陽有五五五二十五陽凡陽經有五正以一腑之中包藏五腑之脈故五五有二十五陽由此推之則一臟之中包藏五臟之脈亦五五有二十五陰所謂陰者真臟也見則為敗則必死也所謂陰者五臟之真脈也真臟來現其臟已敗敗者必至於死也故曰真臟脈見者死所謂陽者胃院之陽也胃脘之陽謂人迎之氣也察其氣脈動靜大小與脈口應否也人迎在結喉兩旁脈動應手其脈之動常左小而右大左小常以候臟右大常以候腑蓋胃為五臟六腑之大主雖有五五二十五陽之異而實不外乎胃脈之見耳若吉者為有胃氣也若至於凶則無胃氣者也別於陽者知病處也別於陰者知死生之期陽者衛外而為固然外邪所中別於陽則知病處陰者藏神而內守若考真正成敗別於陰則知病者死生之期三陽在頭三陰在手所謂一也頭謂人迎手謂氣口兩者相應俱往俱來若引繩小大齊等者名曰平人故云所謂一也氣口在手魚際之後一寸人迎在結喉兩旁一寸五分皆可以候臟腑之氣所謂陰陽者去者為陰至者為陽靜者為陰動者為陽遲者為陰數者為陽此言脈體分陰陽脈有去來即去至而陰陽分脈有動靜即動靜而陰陽分脈有遲數即遲數而陰陽分所謂生陽死陰者肝之心謂之生陽得陽則生失陽則死故曰生陽死陰也自肝傳心以木生火得之生氣是謂生陽不過四日而愈心之肺謂之死陰心傳肺者為火剋金故謂死陰不過三日死肺之腎謂之重陰肺金腎水雖曰子母相傳而金水俱病則重陰而陽絶矣腎之脾謂之闢陰死不治土本制水而水反侮脾是謂闢陰闢陰者放僻也靈蘭祕典論篇靈蘭祕典論曰十二臟之相使貴賤何如心者君主之官也神明出焉任治於物故為君主之官清靜棲靈故曰神明出焉肺者相傅之官治節出焉位高非君故官為相傅主行營衛故治節由之肝者將軍之官謀慮出焉勇而能斷故曰將軍潛發未萌故謀慮出焉膽者中正之官決斷出焉剛正果決故官為中正直而不疑故決斷出焉膻中者臣使之官喜樂出焉膻中者在胸中兩乳間為氣之海心主為君以敷宣教令膻中主氣以氣布陰陽氣和志適則喜樂由此而生分布陰陽故官為臣使也脾胃者倉廩之官五味出焉包容五穀是為倉廩之官營養四旁故云五味出焉大腸者傳道之官變化出焉傳道謂傳不潔之道變化謂變化物之形故云傳道之官變化出焉小腸者受盛之官化物出焉承奉胃司受盛糟粕受已復化傳入大腸故云受盛之官化物出焉腎者作強之官伎巧出焉強於作用故曰作強造化形容故云伎巧在女則當其伎巧在男則正曰作強三焦者決瀆之官水道出焉引導陰陽開通閉塞故官司決瀆水道出焉膀胱者州都之官津液藏焉氣化則能出矣位當孤腑故謂都官居下而藏津液若得氣海之氣施化則溲便注泄故曰氣化則能出矣凡此十二官者不得相失也失則災害至故不得相失故主明則下安以此養生則壽主不明則十二官危使道閉塞而不通形乃大傷以此養生則殃六節臟象論篇六節臟象論曰天以六六之節以成一歲人以九九制會計人亦有三百六十五節以為天地久矣六六之節謂六竟於六甲之日以成一歲之節限九九制會謂九周於九野之數以制人形之會通也言人之三百六十五節以應天之六六之節久矣夫六六之節九九制會者所以正天之度氣之數也六六之節天之度也九九制會天之數也所謂氣數者生成之氣也周天之分凡三百六十五度四分度之一以十二節氣均之則氣有三百六十日而終兼之小月日又不足其數矣是以六十四氣而常置閏矣何者以其積差分故也天地之生育本址於陰陽人神之運為始終於九氣然九之為用豈不大哉律書曰黃鐘之律管長九寸冬至之日氣應灰飛由此則萬物之生咸因於九氣矣古之九寸即今之七寸三分大小不同以其先秬黍之制而有異也天度者所以制日月之行也氣數者所以紀化生之用也制謂準度紀謂綱紀準日月之行度者所以明日月之行遲速也紀化生之為用者所以彰氣至而斯應也氣應無差則生成之理不替遲速以度大小之月生焉故日異長短月移寒暑收藏生長無失時宜也天為陽地為陰日為陽月為陰行有分紀周有道理日行一度月行十三度而有奇故大小月三百六十五日而成歲積氣余而盈閏矣日行遲故晝夜行天之一度而三百六十五日一周天而猶有度之奇分矣月行速故晝夜行天之十三度余而二十九日一周天也言有奇者謂十三度外復行十九分度之七故云月行十三度而有奇也禮義及漢律曆志云二十八宿及諸星皆從東而循天西行日月及五星皆從西而循天東行今太史説云並循天而東行從東而西轉也諸歷家説月一日至四日月行最疾日夜行十四度余自五日至八日行次疾日夜行十三度余自九日至十九日其行遲日夜行十二度余二十日至二十三日行又小疾日夜行十三度余二十四日至晦日行又大疾日夜行十四度余今太史説月行之率不如此矣月行有十五日前疾十五日後遲者有十五日前遲有十五日後疾者大率一月四分之而皆有遲疾遲速之度固無常準矣雖爾終以二十七日月行一周天凡行三百六十一度二十九日日行二十九度月行二百八十七度少七度而不及日也至三十日日復遷計率至十三分日之八月方及日矣此大盡之月也大率其計率至十三分日之半者亦大盡法也其計率至十三分之五之六而及日小盡之月也故云大小月三百六十五日而成歲也正言之者三百六十五日四分日之一乃一歲法以奇不成者故舉六以言之若通以六小為法則一歲止有三百五十四日歲少十一日余矣取月所少之辰加歲外余之日故從閏後三十二日而盈閏焉尚書曰期三百有六旬有六日以閏月定四時以成歲則其義也積余盈閏者盡以月之大小不盡天度故也立端於始表正於中推余於終而天度畢矣立端於始言先王之正時也履端於始以冬至之日為歲首也表正於中舉中氣以正月推余於終月有餘日則歸之於終積而為之閏月故能令天度畢焉天以六六為節地以九九制會天有十日日六竟而周甲甲六復而終歲三百六十日法也十日謂甲乙丙丁戊己庚辛壬癸之日也十者天地之至數也易繫辭曰天九地十則其義也六十日而周甲子之數甲子六周而復始則終一歲之日是三百六十五日之歲法也夫自古通天者生之本本於陰陽其氣九州九竅皆通乎天氣元氣即天真也形假地生命惟天賦故奉生之氣通繫於天稟於陰陽而為根本也故曰人生於地懸命於天也天地合氣命之曰人地列九州人施九竅精神往復氣與參同故其生五其氣三形之所存假五行而運用徵其本始從三氣以生成故云其生五其氣三也三而成天三而成地三而成人非惟人獨由三氣以生天地之道亦如是矣故易乾坤諸卦皆必三矣三而三之合則為九九分為九野九野為九臟九野者應九臟而為邑也邑外為郊郊外為甸甸外為牧牧外為林林外為坰坰外為野此之謂九野也故形臟四神臟五合為九臟以應之也形臟四者一頭角二耳目三口齒四胸中也形合於外故以名焉神臟五者肝心脾肺腎也神藏於內故以名焉所謂神臟者肝魂心神脾意肺魄腎志也天食人以五氣地食人以五味五氣食人者臊氣湊肝焦氣湊心香氣湊脾腥氣湊肺腐氣湊腎也五味食人者酸味入肝苦味入心甘味入脾辛味入肺鹹味入腎也清陽化氣而上為天濁陰成味而下為地故天食人以氣地食人以味也五氣入鼻藏於心肺上使五色修明聲音能彰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生心榮面色肺主音聲故氣藏於心肺上使五色修潔分明音聲彰著氣為水母故味藏於腸胃內養五氣五氣合化津液方生津液與氣相副化成神氣乃能生而宣化也臟象何如象謂所見於外可閲者也心者生之本神之變也其華在面其充在血脈為陽中之太陽通於夏氣心者君主之官神明出焉萬物系之以興亡故曰心者生之本神之變也火氣炎上故華在面心養血其主脈故充在血脈心主於夏氣合太陽以太陽居夏火之中故曰陽中之太陽通於夏氣肺者氣之本魄之處也其華在毛其充在皮為陽中之太陰通於秋氣肺藏氣其神魄其養皮毛故曰肺者氣之本魄之處華在毛充在皮也肺臟為太陰之氣上主於秋晝日為陽氣所行位非陰處以太陰居於陽分故曰陽中之太陰通於秋氣腎者主蟄封藏之本精之處也其華在發其充在骨為陰中之少陰通於冬氣地戶封閉蟄蟲深藏腎又主水受五臟六腑之精而藏之故曰腎者主蟄封藏之本精之處也腦者髓之海腎主骨髓發者腦之所養故華在發充在骨也以盛陰居冬陰之分故曰陰中之少陰通於冬氣肝者罷極之本魂之居也其華在爪其充在筋以生血氣為陽中之少陽通於春氣夫人之運動者皆筋力之所為肝主筋其神魂故曰肝者罷極之本魂之居也爪者筋之餘筋者肝之養故華在爪充在筋東方為發生之始故以生血氣也以少陽居於陽位而王於春故曰陽中之少陽通於春氣脾胃大腸小腸三焦膀胱者倉廩之本營之居也名曰器能化糟粕轉味而入出者也皆可受盛而轉運不息故為倉廩之本名曰器營起於中焦中焦為脾胃之位故云營之居也然水穀滋味入於脾胃脾胃糟粕轉化其味出於三焦膀胱故曰轉味而入出者也其華在唇四白其充在肌此至陰之類通於土氣口為脾官脾主肌肉故曰華在唇四白充在肌也四白謂唇四際之白色肉也脾藏土氣上合至陰故曰至陰之類也通於土氣凡十一臟取決於膽也上從心臟下至於膽為十一也膽者中正剛斷無偏此明十一臟象總取決於膽也夫臟在內而形之於外者可閲斯之謂臟象也天之在我者德也地之在我者氣也德流氣薄而生者也故生之來謂之精兩精相搏謂之神隨神往來者謂之魂並精而出入者謂之魄所以任物者謂之心心有所憶謂之意意之所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智故人迎一盛病在少陽二盛病在太陽三盛病在陽明四盛已上為格陽陽脈法也少陽膽脈也太陽膀胱脈也陽明胃脈也靈樞經曰一盛而躁在手少陽二盛而躁在手太陽三盛而躁在手陽明手少陽三焦脈手太陽小腸脈手陽明大腸脈一盛者謂人迎之脈大於寸口一倍也余盛同法四倍以上陽盛之極故拒而食不得入也正理論曰格則吐也寸口一盛病在厥陰二盛病在少陰三盛病在太陰四盛已上為關陰陰脈法也厥陰肝脈也少陰腎脈也太陰脾脈也靈樞經曰一盛而躁在手厥陰二盛而躁在手少陰三盛而躁在手太陰手厥陰心包絡也手少陰心脈也手太陰肺脈也盛法同陽四倍已上陰盛之極故關閉而溲不得通也正理論曰閉則不得溺溲小便也人迎與寸口俱盛四倍已上為關格關格之脈羸羸當作盈不能極於天地之精氣則死矣俱盛謂俱大於平常四倍之脈也物不可以久盛極則衰敗故不能極於天地之精氣則死矣靈樞經曰陰陽俱盛不得相營故曰關格關格者不得盡期而死矣五臟生成篇五臟生成篇曰諸脈者皆屬於目脈者血之臟久視傷血明諸脈皆屬於目也諸髓者皆屬於腦腦為髓海故諸髓屬之諸筋者皆屬於節筋氣之堅結者皆絡於骨節之間也久行傷筋明諸筋皆屬於節也諸血者皆屬於心血居脈內屬於心也血氣者人之神然神者心之主由此故謂血皆屬於心也諸氣者皆屬於肺肺臟主氣故也故人臥血歸於肝肝藏血心行之人動則血運於諸經人靜則血歸於肝臟何者肝主血海故也肝受血而能視言其用也目為肝之官故肝受血而能視足受血而能步氣行乃血流故足受血而能行步也掌受血而能握以當把握之用指受血而能攝以當攝受之用也血氣者人之神故所以受血者皆能運用五臟別論篇五臟別論篇曰腦髓骨脈膽女子胞此六者地氣之所生也皆藏於陰而象於地故藏而不瀉名曰奇恆之腑腦髓骨脈雖名為腑不正與神臟為表裡膽與肝合而不同六腑之傳瀉胞雖出納納則受納精氣出則化出形容形容之出謂化極而生然出納之用有殊於六腑藏而不瀉其臟為奇有恆不變名曰奇恆之腑也夫胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之腑此不能久留輸瀉者也魄門亦為五臟使水穀不能久藏魄門者即肛門也以肺主魄通於大腸故名之謂五臟者藏精氣而不瀉也故滿而不能實精氣為滿水穀為實但藏精氣故滿而不能實六腑者傳化物而不藏故實而不能滿以其不藏精氣而受水穀故也所以然者水穀入口則胃實而腸虛以未下也食下則腸實而胃虛水穀下也故曰實而不能滿滿而不實也氣口何以獨為五臟主氣口則寸口也亦謂脈口以寸口可候氣之盛衰故云氣口可以切脈之動靜故云脈口胃者水穀之海六腑之大源也人有四海水穀之海則其一也受水穀營養四旁故以其當運化之源者所以為六腑之大源也五味入口藏於胃以養五臟氣氣口亦太陰也氣口之所候脈動者是手太陰脈氣所行故言氣口亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口故五氣入鼻藏於心肺心肺有病而鼻為之不利也此明氣口之脈獨為五臟主氣口者右手之寸口脈即手太陰經肺經太淵穴也靈樞名曰脈口皆以脈氣必會於此也名之曰寸口以此部即太淵穴去魚際僅一寸也其左手寸部則內經諸篇皆謂之人迎耳脈之動靜氣之盛衰人之生死雖見氣口而實本之於脾胃也胃者足陽明也脾者足太陰也足陽明為六腑之先足太陰為五臟之本胃主納受凡水穀以是為市為六腑之大源五味入口藏於胃而得脾以為之運化致五臟之氣無不籍之以資養則是脾者足太陰也肺者手太陰也其氣本相為流通谷入於胃氣傳於肺而肺氣行於氣口故云變見於氣口也玉機真臟論云五臟者皆稟氣於胃胃者五臟之本也臟氣者不能自致於手太陰必因於胃氣乃致於手太陰也蓋言胃而脾可知矣五味入口入於腑五氣入鼻入於五臟五臟惟心肺居於膈上受此五氣故心肺有病而鼻為之不利矣然則脾有病者安能辨其五味哉移精變氣論篇移精變氣論曰變化相移以觀其妙以知其要故欲知其要則色脈是矣言所以知四時五行之氣變化相移之要妙者何以色脈故也色以應日脈以應月常求其要則其要也言脈應月色應日者占候之期準也常求色脈之差忒則是平人之診要也粗工凶凶以為可攻故病未已新病復起謂粗工不料事宜非病妄治則其害反增矣治之要極無失色脈用之不惑治之大則惑謂惑亂則謂法則也言色脈之應昭然不欺但順用而不亂紀綱則治病極當之大法也得神者昌失神者亡此詳言治法以色脈為要之極而其要之一唯在於得神而已神者病者之神氣也湯液醪醴論篇湯液醪醴論曰精神不進志意不治故病不可愈動離於道耗散天真故耳精壞神去榮衛不可復收何者嗜欲無窮而憂患不止精神弛壞榮泣衛除故神去之而病不愈也精神者生之源榮衛者氣之主氣主不輔生源復消神不內居病何能愈其有不從毫毛生而五臟陽以竭也津液充郭其魄獨居孤精於內氣耗於外形不可與衣相保此四極急而動中是氣拒於內而形施於外治之奈何不從毫毛言生於內也陰氣內盛陽氣竭絶不得入於腹中故言五臟陽以竭也津液者水也充滿也郭皮也陰槒於中水氣脹滿上攻於肺肺氣孤危鼻者肺神腎為水害子不救母故云其魄獨居也夫陰精損削於內陽氣耗減於外則三焦閉溢水道不通水滿皮膚身體痞腫故云形不可與衣相保也凡此之類皆四肢脈數急而內鼓動於脈中也肺動者謂氣急而咳也言如是者皆水氣格拒於腹膜之內而浮腫施張於身形之外欲窮標本其可得乎四極言四末則四肢也平治於權衡去宛陳莝是以微動四極溫衣繆刺其處以復其形開鬼門潔淨腑精以時服五陽已布疏滌五臟故精自生形自盛骨肉相保巨氣乃平平治權衡察脈之輕重浮沉宛積也陳莝陳草也邪氣之在人身猶草莝之陳積五陽五臟皆有陽氣巨氣大氣也正氣也脈浮在表宜汗沉在裡宜泄如去宛積之陳草又微動四肢以導引入溫暖其衣以流通之繆刺其處以復其形體蓋經脈滿則絡脈溢繆刺之以調其經脈開鬼門以發其汗潔淨腑以利其水使五臟之精漸以時復五臟之陽漸以宣布疏滌五臟邪氣去而精自生形自盛骨肉相保巨氣乃平診要經終論篇診要經終論曰正月二月天氣始方地氣始發人氣在肝三月四月天氣正方地氣正發人氣在脾五月六月天氣盛地氣高人氣在頭七月八月陰氣始殺人氣在肺九月十月陰氣始水地氣始閉人氣在心十一月十二月水復地氣合人氣在腎此舉天氣地氣人氣而言之見人氣所在乃診家之至要也診視驗也診之為義所賅者廣有自診脈言者有自診病言者善診者察色按脈不止於脈而已方正也殺肅也正二月者寅卯月也月建屬木木治東方天氣始正地氣始發人氣在肝以肝屬東方木也三四月者辰巳月也月建屬土與火治東南方天氣正方地氣之發者已定人氣在脾以脾屬土而土又生火也五六月者午未月也月建屬火火治南方天氣已盛地氣已高人氣在頭頭屬南方火也七八月者申酉月也月建屬金金治西方天地之陽氣已下陰氣已上始皆肅殺人氣在肺以肺屬西方金也九月十月者戌亥月也月建屬水陰氣始冰地氣閉人氣在心陽氣入藏也十一十二月者子丑月也月建屬水水治北方水已復凝地氣已合人氣在腎以腎屬北方水也善診者常以是為法矣十二經脈之終奈何終謂盡也太陽之脈其終也戴眼反折瘛瘲其色白絶汗乃出出則死矣此先以太陽之終者言之也足太陽之脈起於目內眥上額交巔入絡腦還出別下項循肩膊內俠脊抵腰中其支別者下循足至小指外側手太陽之脈起於手小指之端循臂上肩入缺盆其支別者從缺盆循頸上頰至目外眥故太陽之終也戴眼謂睛不轉而仰視也反折瘛瘲謂手足身體反張而或急為瘛或緩為瘲其色則白足太陽之水主黑手太陽之火主赤其二色不見而色止白也絶汗乃出謂汗暴出如珠而不復滲入者也蓋至於絶汗一出而死矣少陽終者耳聾百節皆縱目環絶系絶系一日半死其死也色先青白乃死矣此舉少陽之終者言之也足少陽之脈起於目鋭眥上抵頭角下耳後其支別者從耳後入耳中出走耳前手少陽之脈其支別者從耳後入耳中出走耳前故終則耳聾少陽主筋故終則百節皆縱其目環之系則絶蓋至於系絶而一日半則死且其死也色必青白以金木相薄也陽明終者口目動作善驚妄言色黃其上下經盛不仁則終矣此舉陽明之終者言之也足陽明之脈起於鼻交額中下循鼻外上入齒中俠口環唇循頰車上耳前循髮際至額顱其支者從人迎前下人迎循喉嚨入缺盆下膈手陽明之脈起於手次指之端循臂至肩出於柱骨之會下循缺盆絡肺其去別者從缺盆上頸貫頰下入齒中還挾口交人中上俠鼻孔故終則口目動作胃病則惡人與火聞木音則惕然而驚詈罵不避親疏故善驚妄言也黃者土色也上謂手脈下言足脈經盛謂面目頸頷足跗腕脛皆躁盛而動也不仁謂不知痛癢也此皆氣極之徵故終也少陰終者面黑齒長而垢腹脹閉上下不通而終矣此舉少陰之終者言之也手少陰氣絶則血不流血不流則皮毛死故面色如漆而不赤足少陰氣絶則骨不軟骨不軟則齦上宣故齒長而積垢手少陰之脈起於心中出屬心系下鬲絡小腸也足少陰之脈從腎上貫肝鬲入肺中故其終則腹脹閉而上下不通也太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通不通則面黑皮毛焦而終矣此舉太陰之終者言之也足太陰之脈從股內前廉入腹屬脾絡胃上鬲手太陰之脈起於中焦下絡大腸還循胃口上鬲屬肺唯其從脾絡胃故腹脹閉不得息為噫為嘔且嘔則氣逆而上行故面色赤不嘔則不逆不逆則上下通下又復閉則上下不通心氣外燔故皮毛焦而終矣何者足太陰脈支別者從胃別上鬲注心中也厥陰終者中熱嗌乾善溺心煩甚則舌卷卵上縮而終矣此十二經之所敗也此舉厥陰之終者言之也足厥陰之脈循脛上睪結於莖其正經入毛中過陰器上抵少腹俠胃循喉嚨之後上入項顙手厥陰之脈起於胸中出屬心包故終則中熱嗌乾善溺心煩也靈樞云肝者筋之合筋者聚於陰器而脈絡於舌本甚則舌卷卵上縮而終也若此者十二經皆至於敗其死也宜矣脈要精微論篇脈要精微論曰診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂乃可診有過之脈榮衛之氣晝則行陽夜則行陰至平旦皆會於寸口故診脈以平旦為常陰氣正平而未動陽氣將盛而未散飲食未進虛實易明經脈未盛絡脈調勻氣血未因動作而擾亂乃可診有過之脈過者病也夫脈者血之府也府聚也言血之多少皆聚見於經脈之中故曰脈實血實脈虛血虛長則氣治短則氣病數則煩心大則病進夫脈長為氣和故治短為不足故病數急為熱故煩心大為邪盛故病進長脈者往來長短脈者往來短數脈者往來急速大脈者往來滿大上盛則氣高下盛則氣脹代則氣衰細則氣少澀則心痛上謂寸口下謂尺中盛謂盛滿代脈者動而中止不能自還細脈者動如莠蓬澀脈者往來時不利而蹇澀也渾渾革至如湧泉病進而色弊綿綿其去如弦絶死渾渾言脈氣濁亂也革至者謂脈來弦而大實而長也如湧泉者言脈汨汨但出而不返也綿綿言微微似有而不甚應手也如弦絶者言脈卒斷如弦之絶去也如此之脈皆必死也夫五臟者身之強也臟安則神守神守則身強故曰身之強也頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂俯筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣皆以所居所由而為之府也得強則生失強則死強謂中氣強固以鎮守也此言五臟為身之強而失強則死也是知陰盛則夢涉大水恐懼陰為水故夢涉水而恐懼陽盛則夢大火燔灼陽為火故夢大火而燔灼陰陽俱盛則夢相殺毀傷亦類交爭之象上盛則夢飛下盛則夢墮氣上則夢上故飛氣下則夢下故墜甚飽則夢豫內有餘故甚飢則夢取內不足故肝氣盛則夢怒肝在志為怒肺氣盛則夢哭肺聲哀故夢哭短蟲多則夢聚衆內多短蟲神夢應象長蟲多則夢相擊毀傷長蟲多則內不安神躁擾故夢是矣平人氣象論篇平人氣象論曰人一呼脈再動一吸脈亦再動呼吸定息脈五動閏以太息命曰平人平人者不病也經脈一周於身凡長十六丈二尺呼吸脈各再動定息脈又一動則五動也計二百七十定息氣行環周然盡五十營以一萬三千五百定息則氣都行八百一十丈如是則應天常數脈氣無不及太過氣象平調故曰平人常以不病調病人醫不病故為病人平息以調之為法此言一息五至之脈為無病也鼻中出氣曰呼入氣曰吸呼吸定息總為一息言醫人一呼而彼脈遂再動一吸而彼脈遂再動呼吸定吸脈遂五動猶歲之有閏是閏以太息之脈乃所謂一息五至也如此者名曰平人平人者不病也蓋醫人一息則無病之人亦一息所以知其脈之五動為不病也常以不病之人調彼有病之人緣醫者自己不病故因彼病人乃平自己之息以調候之耳所以此為診法也人身之脈總計一十六丈二尺一呼脈行三寸一吸脈行三寸一百三十五息脈行八丈一尺二百七十息行十六丈二尺為一周一晝一夜總計一萬三千五百息脈行八百一十丈為五十周即一十六丈二尺之脈積之如是也人一呼脈一動一吸脈一動曰少氣呼吸脈各一動候減平人之半計二百七十定息氣行八丈一尺以一萬三千五百定息都行四百五丈少氣之理從此可知此言一息二至之脈為少氣自平脈之不及者言之人一呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱脈滑曰病風脈澀曰痹呼吸脈各三動準過平人之半計二百七十息氣行凡三十四丈三尺病生之兆由斯著矣夫尺者陰分位也寸者陽分位也然陰陽俱熱是則為陰陽獨躁盛則風中陽也脈要精微論曰中惡風者陽氣受也滑為陽盛故病為風澀為無血故為病痹也此言一息六至之脈為諸病平脈太過者言之也平人之常氣稟於胃胃者平人之常氣也常平之氣胃海致之故曰谷入於胃脈道乃行人無胃氣曰逆逆者死脈以胃氣為本無胃氣曰逆逆者死春胃微弦曰平言微似弦不謂微而弦也鉤及軟弱毛石義並同夏胃微鉤曰平長夏胃微軟弱曰平秋胃微毛曰平冬胃微石曰平此承上文而言五臟皆以胃氣為本脈從陰陽病易已脈逆陰陽病難已脈病相應謂之從脈病相反謂之逆此言脈當與病相應而相順也脈得四時之順曰病無他脈反四時及不間臟曰難已春行秋脈夏得冬脈秋得夏脈冬得四季脈皆謂反四時氣不相應間臟者如肝病乘土當傳之於脾乃不傳之於脾而傳之於心則間其所勝之臟而傳之於所生之臟矣難經所謂間臟者生是也及無間臟之脈皆謂之難已耳此言脈當與時相應而相順也人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也所謂脈不得胃氣者肝不弦腎不石也不弦不石皆謂不微似也婦人手少陰脈動甚者任子也手少陰脈謂掌後陷者中當小指動而應手者也岐伯曰其外經病而臟不病故獨取其經於掌後鋭骨之端謂之此也動謂動脈也動脈者大如豆厥厥動搖也正理論曰脈陰陽相薄名曰動也玉機真臟論篇玉機真臟論曰見真臟曰死何也岐伯曰五臟者皆稟氣於胃胃者五臟之本也胃為水穀之海故五臟稟焉臟氣者不能自致於手太陰必因於胃氣乃至於手太陰也人稟氣於胃臟氣者平人之常氣故臟氣因胃乃能致於手太陰也故五臟各以其時自為而至於手太陰也自為其狀至於手太陰也故邪氣勝者精氣衰也故病甚者胃氣不能與之俱至於手太陰故真臟之氣獨見獨見者病勝臟也故曰死是所謂脈無胃氣也形氣相得謂之可治氣盛形盛氣虛形虛是相得也色澤以浮謂相易已氣色浮潤血氣相營故易已脈從四時謂之可治脈春弦夏鉤秋浮冬營謂順四時從順也脈弱以滑是有胃氣命曰易治取之以時候可取之時而取之則萬舉萬全當以四時血氣所在而為療耳形氣相失謂之難已形盛氣虛氣盛形虛皆相失也色夭不澤謂之難已夭謂不明而晦不澤謂枯燥也脈實以堅謂之益勝脈實以堅是邪氣盛故益甚也脈逆四時謂不可治以氣逆故不治五實死五虛死五實謂五臟實五虛謂五臟虛脈盛皮熱腹脹前後不通悶瞀此謂五實實謂邪氣盛實脈盛心也皮熱肺也腹脹脾也前後不通腎也悶瞀肝也脈細皮寒氣少泄利前後飲食不入此謂五虛虛謂真氣不足也脈細心也皮寒肺也氣少肝也泄利前後腎也飲食不入脾也其時有生者何也漿粥入胃泄注止則虛者活身汗得後利則實者活此其候也飲粥得入於胃胃氣和調其利漸止胃氣得實虛者得活言實者得汗外通後得便利自然調平三部九候論篇三部九候論曰有下部有中部有上部部各有三候三候者有天有地有人也上部天兩額之動脈在額兩旁動應於手足少陽脈氣之所行也上部地兩頰之動脈在鼻孔下兩旁近於至髎之分動應於手足陽明脈氣之所行上部人耳前之動脈在耳前陷者中動應於手手少陽脈氣之所行也中部天手太陰也謂肺脈也在掌後寸口中是謂經渠動應於手中部地手陽明也大腸脈也在手大指次指岐骨間合谷之分動應於手也中部人手少陰也謂心脈也在掌後鋭骨之端神門之分動應於手下部天足厥陰也謂肝脈也在毛際外羊矢下一寸半陷中五里之分臥而取之動應於手也女子取太衝在足大指本節後二寸陷中是也下部地足少陰也謂腎脈也在足內踝後跟骨上陷中太溪之分動應於手也下部人足太陰也謂脾脈也在魚腹上越筋間直五里下箕門之分寬鞏足單衣沉取乃得之而動應於手也候胃氣者當取足跗之上衝陽之分穴中故下部之天以候肝足厥陰之脈行其中地以候腎足少陰脈行其中也人以候脾胃之氣足太陰脈行其中也中部之候奈何亦有天亦有地亦有人天以候肺手太陰脈當其處也地以候胸中之氣手陽明脈當其處也經云腸胃同候故以候胸中也人以候心手少陰脈當其處也上部以何候之亦有天亦有地亦有人天以候頭角之氣位在頭角之分故以候頭角之氣也地以候口齒之氣位近口齒故以候之人以候耳目之氣以位當耳前脈抵於目外眥故以候之三部者各有天各有地各有人三而成天詳三而成天至合為九臟三而成地三而成人三而三分合則為九九分為九野九野為九臟以是故應天地之至數故神臟五形臟四合為九臟神臟者肝藏魂心藏神脾藏意肺藏魄腎藏志也以其皆神氣居之故云神臟五也形臟者如器外張虛而不屈合藏於物故云形臟也一頭角二耳目三口齒四胸中也五臟已敗其色必夭夭必死矣夭謂死色異常之候也色者神之旗臟者神之舍故神去則臟敗矣臟敗則見異常之色者死候也形盛脈細少氣不足以息者危形氣相得謂之可治今脈氣不足形盛有餘證不相扶故危者也形瘦脈大胸中多氣者死是則形氣不足脈氣有餘形瘦脈大胸中氣多形臟已傷故死也凡如是類皆形氣不相得也形氣相得者生參伍不調者病參謂參校伍謂類伍參校類伍而有不調謂不率其常則病也三部九候皆相失者死失謂氣候不相類也相失之候診凡有七七診之狀如下文云上下左右之脈相應如參舂者病甚上下左右相失不可數者死三部九候上下左右凡十八診也參春者謂大數而鼓如參舂杵之上下也大則病進故病甚也不可數也謂一息十至已上了死中部之候雖獨調與衆臟相失者死中部之候相減者死中部左右凡六診也上部下部已不相應中部獨調故非其久減於上下是亦氣衰皆死者也減謂偏少也目內陷者死太陽之脈起於目內眥目內陷者太陽絶也故死所以言太陽者太陽主諸陽之氣故獨言之形肉已脫九候雖調猶死亦謂形氣不相得也經云脈氣有餘形氣不足生蓋不足未至脫也脫則大肉去盡脾主肌肉肉脫者脾絶矣九候雖平調猶必死也察九候獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病相失之候診凡有七者此也然脈見七診謂參伍不調隨其獨異以言其病耳此言九候之中有七診之法也脫肉身不去者死穀氣外衰則肉脫盡天真內竭故身不能行真谷並衰死之至矣去猶行去也九候之脈皆沉細懸絶者為陰主冬故以夜半死盛躁喘數者為陽主夏故以日中死位無常居物極則反也乾坤之義陰極則龍戰於野陽極則亢龍有悔是以陰陽極脈死於夜半日中也寒熱病者以平旦死亦物極則變也平曉木王木氣為風故木王之時寒熱病死熱中及熱病者以日中死陽之極也病風者以日夕死卯酉沖也病水者以夜半死水王故也其脈乍疏乍數乍遲乍疾者日乘四季死辰戌丑未土寄王之脾氣內絶故脈無定則日乘四季而死也此詳言諸病死期也矣經脈別論篇經脈別論曰人之居處動靜勇怯脈亦為之變乎凡人之驚恐恚勞動靜皆為變也變謂變易常候是以夜行則喘出於腎腎主於交氣合幽冥故夜行則喘息內從腎出也淫氣病肺夜行腎勞因而喘息氣淫不次則病肺也有所墮恐喘出於肝恐生於肝墮損筋血因而奔喘故出於肝也淫氣害脾肝木妄淫害脾土也有所驚恐喘出於肺驚則心無所依神無所歸氣亂胸中故喘出於肺也淫氣傷心驚則神越故氣淫反傷心也度水跌僕喘出於腎與骨濕氣通腎骨腎主之故度水跌僕喘出腎骨矣跌謂足跌僕謂身倒也當是之時勇者氣行則已怯者則著而為病氣有強弱神有壯懦故殊狀也故曰診病之道觀人勇怯骨肉皮膚能知其情以為診法也通達性懷得其情狀乃為深識診契物宜也飲食飽甚汗出於胃飽甚胃滿故汗出於胃驚而奪精汗出於心驚奪心精神氣浮越陽內薄之故其汗出於心也持重遠行汗出於腎骨勞氣越腎復過疲故持重遠行汗出於腎疾走恐懼汗出於肝暴役於筋肝氣罷極故疾走恐懼汗出於肝搖體勞苦汗出於脾搖體勞苦謂動作施力非疾走遠行也動作用力則穀精四布脾化水穀故汗出於脾食氣入胃散精於肝淫氣於筋肝養筋故胃散穀精之氣入於肝則浸淫滋養於筋絡矣食氣入胃濁氣歸心淫精於脈濁氣穀氣也心居胃上故穀氣歸心淫溢精微入於脈也何者心主脈故脈氣流經經氣歸於肺肺朝百脈輸精於皮毛脈氣流運乃為大經經氣歸宗上朝於肺肺為華蓋位復居高治節由之故受百脈朝會乃布化精氣輸於皮毛也毛脈合精行氣於腑腑謂氣之所聚處也是調氣海在兩乳間名曰膻中也腑精神明留於四臟氣歸於權衡膻中之布氣者分為三隧其下者走於氣街上者走於息道宗氣留於海積於胸中命曰氣海也如是分化乃四臟安定三焦平均中外上下各得其所權衡以平氣口成寸以決死生三世脈法皆以三寸為關尺之分故中外高下氣緒均平則氣口之脈而成寸也氣口者脈之大要會也百脈盡朝故以其分決死生也飲入於胃遊溢精氣上輸於脾水飲流下至於中焦水化精微上為雲霧雲霧散變乃注於脾也上焦如霧中焦如漚是也脾氣散精上歸於肺通調水道下輸膀胱水土合化上滋肺金金氣通腎故調水道轉注下焦膀胱稟化乃為溲矣下焦如瀆此之謂也水精四布五經並行合於四時五臟陰陽揆度以為常也水精布經氣行筋骨成血氣順配合四時寒暑證符五臟陰陽揆度盈虛用為常道臟氣法時論篇臟氣法時論曰夫邪氣之客於身也以勝相加邪者不正之目風寒暑濕飢飽勞逸是也至其所生而愈謂至己所生也至其所不勝而甚謂至克己之氣也至於所生而持謂至生己之氣也自得其位而起居所主處謂自得其位也肝病者兩脅下痛引少腹令人善怒肝厥陰脈自足而上環陰器抵少腹又上貫肝鬲布於脅肋故兩脅下痛引少腹其氣實則善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之肝厥陰脈自脅肋循喉嚨入頏顙連目系膽少陽脈其支者從耳後耳中出走耳前至目鋭眥後故病如是也恐謂恐懼魂不安也心病者胸中痛脅支滿脅下痛膺背肩甲間痛兩臂內痛心少陰脈支別者循胸出脅又手心主厥陰之脈起於胸中其支別者亦循胸出脅下腋三寸上抵腋下下循臑內行太陰少陰之間入肘中下循臂行兩筋之間又心少陰之脈直行者復從心系卻上肺上出腋下下循臑內後廉行太陰心主之後下肘內循臂後內廉抵掌後鋭骨之端又小腸太陽之脈自臂臑上繞肩甲交肩上故病如是虛則胸腹大脅下與腰相引而痛手心主厥陰之脈從胸中出屬心包下鬲歷絡三焦其支別者循胸出脅心少陰之脈自心系下鬲絡小腸故病如是脾病者身重善肌肉痿足不收行善瘈腳下痛瘈小兒病脾象土而主肉故身重肉痿也脾太陰之脈起於足大指之端循指內側上內踝前廉上腨內腎少陰之脈起於足小指之下斜趨足心上腨內出膕內廉故病如是則足不收行善瘈腳下痛也虛則腹滿腸鳴飧泄食不化脾太陰脈從股內前廉入腹屬脾絡胃故病如是靈樞經曰中氣不足則腹為之善滿腸為之善鳴肺病者喘咳逆氣肩背痛汗出尻陰股膝髀腨胻足皆痛肺藏氣而主喘息在變動為咳故病則喘咳逆氣也背為胸中之府肩接近之故肩背痛也肺養皮毛邪盛則心液外泄故汗出也腎少陰之脈從足下上循腨內出膕內廉上股內後廉貫脊屬腎絡膀胱今肺病則腎脈受邪故尻陰股膝髀腨胻足皆痛虛則少氣不能報息耳聾嗌乾氣虛少故不足以報息也肺太陰之絡會於耳中故聾也腎少陰之脈從腎上貫肝鬲入肺中循喉嚨俠舌本今肺虛則腎氣不足不能上潤於咽故以嗌乾也腎病者腹大脛腫喘咳身重寢汗出憎風腎少陰脈起於足面上循腨復從橫骨中俠臍循腹裡上行而入肺故腹大脛腫而喘咳也腎病則骨不能用故身重也腎邪攻肺心氣內微心液為汗故寢汗出也脛既腫矣汗復津泄陰凝玄府陽灼上焦內熱外寒故汗出憎風也虛則胸中痛大腹小腹痛清厥意不樂腎少陰脈從肺出絡心注胸中腎氣既虛心無所制心氣灼肺故痛聚胸中也足太陽脈從項下行而至足腎虛則太陽之氣不能盛行於足故足冷而氣逆也清謂氣冷厥謂氣逆也以清冷氣逆故大腹小腹痛志不足則神躁擾故不樂也宣明五氣論篇宣明五氣論曰五氣所病心為噫象火炎上煙隨焰出心不受穢故噫出之肺為咳象金堅徑扣之有聲邪擊於肺故為咳也肝為語象木枝條而形支別語宣委曲故出於肝脾為吞象土包容物歸於內翕如皆受故為吞也腎為欠為嚏象水下流上生雲霧氣鬱於胃故欠生焉太陽之氣和利而滿於心出於鼻則生嚏胃為氣逆為噦為恐胃為水穀之海腎與為關關門不利則氣逆而上行也以包容水穀性喜受寒寒谷相薄故為噦也寒盛則噦起熱盛則恐生何者胃熱則腎氣微弱故為恐也大腸小腸為泄下焦溢為水大腸為傳導之腑小腸為受盛之腑受盛之氣既虛傳道之司不禁故為泄利也下焦為分注之所氣窒而不瀉則溢而為水矣膀胱不利為癃不約為遺溺膀胱為津液之府水注由之然足三焦脈實約下焦而不通則不得小便足三焦脈虛不約下焦則遺溺也膽為怒中正決斷無私無偏其性剛決故為怒也是為五病五精所並精氣並於心則喜精氣謂火之精氣也肺虛而心精並之則為喜靈樞經曰喜樂無極則傷魄魄為肺神明心火併於肺金也並於肺則悲肝虛而肺氣並之則為悲靈樞曰悲哀動中則傷魂魂為肝神明肺金並於肝木也並於肝則憂脾虛而肝氣並之則為憂靈樞曰愁憂不解則傷意意為脾神明肝木並於脾土也並於脾則畏腎虛而脾氣並之則為畏靈樞曰恐懼不解則傷精精為腎之神明脾土並於腎水也並於腎則恐心虛而腎氣並之則為恐靈樞曰怵惕思慮則傷神神為心主明腎水並於心火也怵惕驚懼也此皆由於正氣不足而勝氣並之也是為五並虛而相併者也五臟所惡心惡熱熱則脈潰濁肺惡寒寒則氣留滯肝惡風風則筋燥急脾惡濕濕則肉痿腫腎惡燥燥則精竭涸是謂五惡五味所禁辛走氣氣病無多食辛咸走血血病無多食鹹咸先入腎此云走血者腎合三焦血脈雖屬肝心實為中焦之道故鹹入而走血也苦走骨骨病無多食苦苦走心此云走骨者水火相濟骨氣通於心也甘走肉肉病無多食甘酸走筋筋病無多食酸是謂五禁五病所發陰病發於骨陽病發於血陰病發於肉骨肉陰靜故陽氣從之血脈陽動故陰氣乘之陽病發於冬陰病發於夏夏陽氣盛故陰病發於夏冬陰氣盛故陽病發於冬各隨其少也是謂五發五邪所亂邪入於陽則狂邪入於陰則痹邪居於陽脈之中則四支熱盛故為狂邪入於陰脈之內則六經凝澀不通故為痹搏陽則為顛疾邪內搏於陽則脈流薄疾故為上顛之疾搏陰則為喑邪內搏於陰則脈不流故令喑不能言陽入之陰則靜陰出之陽則怒隨所之而為疾也之往也是謂五亂五勞所傷久視傷血勞於心也久臥傷氣勞於肺也久坐傷肉勞於脾也久立傷骨勞於腎也久行傷筋勞於肝也是謂五勞所傷寶命全形論篇寶命全形論曰夫鹽之味鹹者其氣令器津泄夫咸為苦而生咸從水而有水也潤下而苦泄故能令器中生津液潤滲泄焉弦絶者其音嘶敗弦絶者其音嘶嗄敗易舊聲音木敷者其葉發木陳者葉必脫病深者其聲噦噦謂聲濁惡也人有此三者是謂壞腑三者謂弦絶葉發聲噦也毒藥無治短針無取此皆絶皮傷肉血氣爭黑病遺於內故毒藥無治短針無取皮肉血氣交爭傷絶故當血見色黑也言欲知病徵者須知其候鹽之在於器中津液泄於外見津液而知鹽之有咸也聲嘶知琴瑟之弦將絶葉落者知陳木之已盡舉此三物衰壞之徵以比聲嘶識病深之候故針藥不能取以其皮肉血氣各不相得故也八正神明論篇八正神明論曰是故天溫日明則人血淖液而衛氣浮故血易瀉氣易行天寒日陰則人血凝泣而衛氣沉泣謂如水中居雪也月始生則血氣始精衛氣始行月郭滿則血氣實肌肉堅月郭空則肌肉減經絡虛衛氣去形獨居是以因天時而調血氣也是以天寒無刺血凝泣而衛氣沉也天溫無凝月生無瀉月滿無補月郭空無治言刺法必法天時也八正者所以候八風之虛邪以時至者也八正謂八節之正氣也八風者東方嬰兒風南方大弱風西方剛風北方大剛風東北方凶風東南方弱風西南方謀風西北方折風也虛邪謂乘之虛而為病者也以時至者謂之天應太一移居以八節之前後風朝中宮而至焉者也四時者所以分春秋冬夏之氣所在以時調之也八正之虛邪而避之勿犯也四時之氣所在者謂春氣在經脈夏氣在孫絡秋氣在皮膚冬氣在骨髓也感冒虛邪動傷真氣避而勿犯乃不病焉聖人避邪如避矢石以其能傷真氣也以身之虛而逢天之虛兩虛相感其氣至骨入則傷五臟以虛感虛同氣而相應也工候救之弗能傷也候知而止故弗能傷之故曰天忌不可不知也人忌於天故云天忌犯之則病故不可不知也虛邪者八正之虛邪氣也八正之虛邪謂八節之虛邪也以從虛之鄉來襲虛而入為病故謂之八正虛邪正邪者身形若用力汗出腠理開逢虛風其中人也微故莫知其情莫見其形正邪者不從虛之鄉來以人中微故莫知其情意莫見其形狀上工救其萌芽必先三部九候之氣盡調不敗而救之故曰上工下工救其已成救其已敗救其已成者言不知三部九候之相失因病而敗之也故養神者必知形之肥瘦榮衛血氣之盛衰血氣者人之神不可不謹養神安則壽延神去則形弊故不可不謹養也此俱解針經之義也離合真邪論篇離合真邪論曰天地溫和則經水安靜天寒地凍則經水凝泣天暑地熱則經水沸溢卒風暴起則經水波湧而隴起夫邪之入於脈也寒則血凝泣暑則氣淖澤虛邪因而入客亦如經水之得風也誅罰無過命曰大惑反亂大經真不可復用實為虛以邪為真用針無義反為氣賊奪人正氣以從為逆榮衛散亂真氣已失邪獨內著絶人長命豫人夭歿不知三部九候故不能久長識非精辨學未該明且亂大經又為氣賊動為殘害安可久乎因不知合之四時五行因加相勝釋邪攻正絶人長命非惟昧三部九候之為弊若不知四時五行之氣序亦足殞絶其生靈也邪之新客來也未有定處推之則前引之則止逢而瀉之其病立已此亦解針經補瀉法也通評虛實論篇通評虛實論曰何謂虛實邪氣盛則實精氣奪則虛奪謂精氣減少如奪去也乳子而病熱脈懸小者何如懸謂如懸物之動也手足溫則生寒則死乳子中風熱喘鳴肩息者脈何如喘鳴肩息者脈實大也緩則生急則死此言乳子脈與病反者復有他證可驗病證俱甚者復有脈體可據而決其死生也乳子而熱病陽證也脈則懸小是陽證見陰脈也然手足溫和正氣猶存脈雖懸小特未大耳故可以得生否則手足寒而死矣又乳子中風發熱喘鳴肩息者陽證也脈當實大唯實大中而緩則邪氣漸退可以得生若實大中而急則邪氣愈增其病當死矣腸澼便血何如身熱則死寒則生熱為血敗故死寒為榮氣在故生腸澼下白沫何如脈沉則生脈浮則死陰病而見陽脈與證相反故死腸澼下膿血何如脈懸絶則死滑大則生腸澼之屬身不熱脈不懸絶何如滑大者曰生懸澀者曰死以臟期之肝見庚辛死心見壬癸死肺見丙丁死腎見戊己死脾見甲乙死是謂以臟期之此言腸澼之屬有便血者有下白沫者有下膿血者隨證隨脈而可以決其死生者癲疾何如脈搏大滑久自已脈小堅急死不治脈小堅急為陰陽病而陰脈故死不治癲疾之脈虛實何如虛則可治實則死言癲疾之脈得陽脈虛脈而生也癲疾者陽證也故搏大滑則陽證得陽脈所以病久自已若脈小堅急則得陰脈故死不治然癲疾之脈當有取於虛也必搏大滑中帶虛可治若帶實則邪氣有餘乃死候也消疸虛實何如脈實大病久可治脈懸小堅病久不可治久病血氣衰脈不宜實大故不可治黃疸暴痛癲疾厥狂久逆之所生也五臟不平六腑閉塞之所生也頭痛耳鳴九竅不利腸胃之所生也此言病有所由生者皆從內起也太陰陽明論篇太陰陽明論曰太陰陽明為表裡脾胃脈也生病而異者何也岐伯對曰陰陽異位更虛更實更逆更從或從內或從外所從不同故病異名也脾臟為陰胃腑為陽陽脈下行陰脈上行陽脈從外陰脈從內故言所以不同病異名也春夏陽明為實太陰為虛秋冬太陰為實陽明為虛即更實更虛也春夏太陰為逆陽明為從秋冬陽明為逆太陰為從即更逆更從也陽者天氣也主外陰者地氣也主內是所謂陰陽異位也故陽道實陰道虛是所謂更實更虛也犯賊風虛邪者陽受之食飲不節起居不時者陰受之是所謂或從內或從外也陽受之則入六腑陰受之則入五臟入六腑則身熱不時臥上為喘呼入五臟則䐜滿閉塞下為飧泄久為腸澼是所謂所從不同病異名也故喉主天氣咽生地氣故陽受風氣陰受濕氣同氣相求耳故陰氣從足上行至頭而下行循臂至指端陽氣從手上行至頭而下行至足是所謂更逆更從也靈樞曰手之三陰從臟走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹所行而異故更逆更從也故曰陽病者上行極而下陰病者下行極而上故傷於風者上先受之傷於濕者下先受之脾不主時何也肝主春心主夏肺主秋腎主冬四臟皆有正應而脾無正主也脾者土也治中央常以四時長四臟各十八日寄治不得獨主於時也脾臟者常著胃土之精也土者生萬物而法天地故上下至頭足足太陰者三陰也故太陰為之行氣於三陰陽明者表也五臟六腑之海也亦為之行氣於三陽臟腑各因其經而受氣於陽明陽明脈解篇陽明脈解篇曰足陽明之脈病惡人與火聞木音則惕然而驚胃熱內郁故惡人惡火胃屬土故聞木音而驚病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上之處皆非其素所能也病反能者何也四支者諸陽之本也陽盛則四支實實則能登高也陽受氣於四支故四支為諸陽之本熱盛於身故棄衣欲走也陽盛則使人妄言罵詈不避親疏而不欲食故妄走也言胃病所以能登高而歌棄衣而走妄言而罵者皆以其邪氣之盛也邪盛故熱盛熱盛故陽盛陽盛則三者之證由於此矣評熱病論篇評熱病論曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何岐伯曰病名陰陽交交者死也交謂交合陰陽之氣不分別也人所以汗出者皆生於穀穀生於精言穀氣化為精精氣勝乃為汗今邪氣交爭於骨肉而得汗者是邪卻而精勝也言初汗也精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也不能食者精無俾也無俾言無可使為汗也穀不化則精不生精不化流故無可使病而留者其壽可立而傾也如是者其人壽命立致傾危也汗出而脈尚躁盛者死汗後脈當遲靜而反躁急以盛滿者是真氣竭而邪盛故知必死也今脈不與汗相應此不勝其病也其死明矣脈不靜而躁盛是不相應狂言者是失志失志者死志舍於精今精無可使是志無所居志不留居則失志也今見三死不見一生雖愈必死也汗出脈躁盛一死不勝其病二死狂言失志者三死也逆調論篇逆調論曰陰氣少而陽氣勝故熱而煩滿也言病有熱而煩滿者陰氣少而陽氣多也陽氣少陰氣多故身寒如從水中出言病有寒從中生者陽氣少而陰氣多也不得臥而息有音者是陽明之逆也足三陽者下行今逆而上行故息有音也陽明者胃脈也六腑之海即水穀之海其氣亦下行陽明逆不得從其道故不得臥也胃不和則臥不安此之謂也夫起居如故而息有音者此肺之絡脈逆也絡脈不得隨經上下故留經而不行絡脈之病人也微故起居如故而息有音也夫不得臥臥則喘者是水氣之客也夫水者循津液而流也腎者水臟主津液主臥與喘也舉痛論篇舉痛論曰百病生於氣也氣之為用虛實逆順緩急皆能為病故發此問怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結九氣不同何病之生怒則氣逆甚則嘔血及飧泄故氣上矣怒則陽氣逆上肝氣乘脾故甚則嘔血及飧泄也喜則氣和志達榮衛通利故氣緩矣氣脈和調故志達暢榮衛通利故氣徐緩悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故氣消矣悲則損於心心系急則動於肺肺氣系諸經逆則肺布而葉舉恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣恐則陽精卻上而不下流故卻則上焦閉也上焦既閉氣不行流下焦陰氣亦還回不散而聚為脹然上焦固禁下焦氣還各守一處故氣不行也寒則腠理閉氣不行故氣收矣身寒則衛氣沉故皮膚文理及滲泄之處皆閉密而氣不流行衛氣收斂於中而不發散也炅則腠理開榮衛通汗大泄故氣泄矣熱則膚腠開發榮衛大通津液外滲而汗大泄驚則心無所倚神無所歸慮無所定故氣亂矣氣奔越故不詞理勞則喘且汗出外內皆越故氣耗矣疲力役則氣奔速故喘息氣奔速則陽外發故汗出喘且汗出內外皆逾越於常紀故氣耗損也思則心有所存神有所歸正氣留而不行故氣結矣繫心不散故氣亦停留以九氣為問而言之也腹中論篇腹中論曰何以知懷子之且生也岐伯曰身有病而無邪脈也言懷子之將生者身雖經閉而脈則無病也身有病者經閉也無邪脈者尺中之脈和勻也凡婦人懷妊三月則陰陽之精尚未變化三月則精氣正變其氣熏蒸沖胃而為惡阻三四月則惡阻少止脈甚滑疾蓋男女正成形質其氣未定也五六月以後則形質已定男女已分及八九十月其脈平和如無娠然非醫工深明脈理病家肯明言者難以診而知也脈訣云滑疾不散胎三月但疾而散五月至六月已後則疾速亦無矣然亦有始終洪數不變者其氣甚盛不可以一例拘也痹論篇痹論篇曰痹其時有死者或疼久者或易已者其故何也岐伯曰其入臟者死其留連筋骨間者疼久其留皮膚間者易已入臟者死以神去也筋骨疼久以其定也皮膚易已以浮淺也由斯深淺故有不同榮者水穀之精氣也和調於五臟灑陳於六腑乃能入於脈也正理論曰谷入於胃脈道乃行水入於經其血乃成故循脈上下貫五臟絡六腑也榮行脈內故無所不至衛者水穀之悍氣也其氣慓疾滑利不能入於脈也悍氣謂浮盛之氣也以其浮盛之氣故慓疾滑利不能入於脈中也故循皮膚之中分肉之間熏於肓膜散於胸腹皮膚之中分肉之間謂脈外也肓膜謂五臟之間鬲中膜也以其浮盛故能布散於胸腹之中空虛之處熏其肓膜令氣宣通也逆其氣則病從其氣則愈不與風寒濕氣合故不為痹夫榮衛之所行者如此必逆榮衛之氣則病而順榮衛之氣則愈則此榮衛者乃氣也非筋骨肌皮脈與五臟六腑之有形者也不與風寒濕三氣相合者也故榮衛在人不為痹也痹或痛或不痛或不仁或寒或熱或燥或濕其故何也痛者寒氣多也有寒故痛也其不痛不仁者病久入深榮衛之行澀經絡時疏故不通皮膚不營故為不仁不仁者皮頑不知有無也其寒者陽氣少陰氣多與病相益故寒也病本生於風寒濕氣故陰氣益之也其熱者陽氣多陰氣少病氣勝陽遭陰故為痹熱陰氣不勝故為熱其多汗而濡者此其逢濕甚也陽氣少陰氣盛兩氣相感故汗出而濡也言痹之所以痛者以其寒氣多也有寒故痛也故曰其寒氣勝者為痛痹也痹之所以不痛者以病久則邪氣日深榮衛之行澀經絡之脈有時而疏故亦不為痛也痹之所以不仁者以其皮膚之中少氣血以為之營運故皮頑不動而為不仁也痹之所以體寒者以衛氣少營氣多惟營氣多則與病相益故寒冷也痹之所以體熱者以衛氣多營氣少故邪氣勝則風氣為陽陽與營氣相遭而陰氣不能勝之故為痹熱也痹之所以濕者以其遇濕甚也衛氣少營氣多兩陰相感故汗出而濕也痹之所以燥者雖未之言而即濕者以反觀之則衛氣多營氣少遇熱太甚兩陽相感則可以知其為燥矣夫痹之為病不痛何也痹在於骨則重在於脈則血凝而不流在於筋則屈不伸在於肉則不仁在皮則寒故具此五者則不痛也凡痹之類逢寒則蟲逢熱則縱蟲謂皮中如蟲行縱謂縱緩不相就痿論篇痿論曰五臟使人痿何也痿謂痿弱無力以運動肺主身之皮毛心主身之血脈肝主身之筋膜膜者皮下肉上筋膜也脾主身之肌肉腎主身之骨髓所主不同痿生亦各歸其主故肺熱葉焦則皮毛虛弱急薄著則生痿躄也躄謂攣躄足不得伸以行也肺熱則腎受熱氣故耳心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地也心熱盛則火獨光炎上腎之脈常下行令火盛上炎用事故腎脈亦隨火炎灼而逆上行也陰氣厥逆火復內燔陰上隔陽下不守位心氣通脈故生脈痿腎氣主足故膝樞紐如折脛筋縱緩而行不能任地也肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿膽約肝葉而汁味至苦肝熱則膽液滲泄故口苦也肝主筋膜熱則筋膜乾而攣急發為筋痿脾氣熱則胃干而渴肌肉不仁發為肉痿脾與胃以膜相連脾氣熱則胃液滲泄故干而渴脾主肌肉熱搏於內故肌肉不仁發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿腰為腎府又腎脈上股內貫脊屬腎故腎氣熱則腰脊不舉腎主骨髓熱則骨枯而髓減故發為骨痿治痿者獨取陽明何也陽明者五臟六腑之海陽明胃脈也為水穀之海主潤宗筋宗筋主束骨而利機關也宗筋謂陰毛中橫骨上下之堅筋也上絡胸腹下貫髖尻又經於背腹上頭頂故云宗筋主束骨而利機關然腰者身之大關節所以司屈伸故曰機關衝脈者經脈之海也靈樞曰衝脈者十二經之海主滲灌溪谷與陽明合於宗筋尋此則橫骨上下臍兩旁堅筋正宗筋也衝脈循腹俠臍旁各同身寸之五分而上陽明脈亦俠臍旁各同身寸之一寸五分而上宗筋脈於中故曰與陽明合於宗筋也以為十二經海故主滲灌溪谷也肉之大會為谷小會為溪陰陽總宗筋之會會於氣街而陽明為之長皆屬於帶脈而絡於督脈宗筋聚會會於橫骨之中從上而下故云陰陽總宗筋之會也宗筋俠臍下合於橫骨陽明輔其外衝脈居其中故云會於氣街而陽明為之長氣街陰毛兩旁脈動處也帶脈者起於季脅回身一周而絡於督脈也督脈者起於關元上下循腹故云皆屬於帶脈而絡於督脈也督脈任脈衝脈三者同起而異行故經文或參差引之故陽明虛則宗筋縱帶脈不引故足痿不用也陽明之脈從缺盆下乳內廉下俠臍至氣街中其支別者起胃下口循腹裡下至氣街中而合以下髀抵伏兔下入膝臏中下循胻外廉下足跗入中指內間其支別者下膝三寸而別以下入中指外間故陽明虛則宗筋縱帶脈不引而足痿不用也厥論篇厥論篇曰厥之寒熱者何也陽氣衰於下則為寒厥陰氣衰於下則為熱厥陽謂足之三陽脈陰謂足之三陰脈下謂足也此言厥病之分寒熱者以足之陰陽六經其氣有偏勝也熱厥之為熱也必起於足下者何也陽主外而厥在內故問之陽氣起於足五指之表陰脈者集於足下而聚於足心故陽氣勝則足下熱也足太陽脈出於足小指之端外側足少陽脈出於足小指次指之端足陽明脈出於足中指及大指之端並循足陽而上肝脾腎脈集於足下聚於足心陰弱所以足下熱也此言熱厥之熱在於陰分者以其陽勝陰也寒厥之為寒也必從五指而上於膝者何也陰主內而厥在外故問之陰氣起於五指之裡集於膝下而聚於膝上故陰氣勝則從五指至膝上寒其寒也不從外皆從內也足太陰脈起於足大指之端內側足厥陰脈起於足大指之端三毛中足少陰脈起於足小指之下斜趣足心並循足陰而上循股陰入腹故云集於膝下而聚於膝之上也此言寒厥之厥上於膝以其陰勝陽也厥或令人腹滿或令人暴不知人或至半日遠至一日乃知人者何也陰氣盛於上則下虛下虛則腹脹滿陽氣盛於上則下氣重上而邪氣逆逆則陽氣亂陽氣亂則不知人也陰氣盛於上則腹脹滿者乃寒厥陽氣盛於上則不知人者乃熱厥耳病能論篇病能論曰人有臥而有所不安者何也岐伯曰臟有所傷及精有所之寄則安故人不能懸其病也言有臥而不安者以臟氣傷而精氣耗也蓋五臟為陰各藏其精臟有所傷而精耗也臥不安也必精有所寄各在本臟而無失則臥斯安矣寄者藏也如肝藏魂肺藏魄之類凡臥有不安者血不歸肝衛氣不能入於陰此人之所以不能懸其病者也懸者絶也人之不得偃臥者何也謂不得仰臥也肺者臟之蓋也居高布葉四臟下之故言肺者臟之蓋也肺氣盛則脈大脈大則不得偃臥肺之邪氣盛滿則氣促喘奔故不得偃臥有病怒狂者此病安生生於陽也怒不慮禍故謂之狂陽氣者因暴折而難決故善怒也病名曰陽厥言陽氣被折郁不散或曾因暴折而心不舒暢者皆陽逆躁極所生病名陽厥治之奈何奪其食即已夫食入於陰長氣於陽故奪其食即已食少則氣衰故節去其食即病自已使之服以生鐵落為飲夫生鐵落者下氣疾也取金平肝也奇病論篇奇病論曰人有重身九月而喑此為何也重身謂身中有身則懷妊者也喑謂不言語也妊娠九月足少陰脈養胎胞之絡脈絶也絶謂脈斷絶不流通而不能言非天真之氣斷絶也胞絡者繫於腎少陰之脈貫腎系舌本故不能言少陰腎脈也氣不營養故舌不能言無治也當十月復十月胎去胞絡復通腎脈上營故復舊而言也無損不足益有餘以成其疹疹謂久病反法而治則胎死不去遂成久固之疹病人有病頭痛以數歲不已此安得之名為何病頭痛之病不當逾月數年不愈故怪而問之當有所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛腦為髓主齒是骨余腦逆犯寒骨亦寒故令頭痛齒亦痛病名曰厥逆人先生腦有腦則有骨髓齒者骨之本也有病口甘者病名為何何以得之此五氣之溢也名曰脾疸疸熱也脾熱則四臟同稟故五臟上溢也甘因脾熱故曰脾疸夫五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也脾熱內滲津液在脾胃谷化余精氣隨溢口通脾氣故口甘津液在脾是脾之濕此肥美之所發也此人必數食甘美而多肥也肥者令人內熱甘者令人中滿故其氣上溢轉為消渴食肥則腠理密陽氣不得外泄故肥令人內熱甘者性氣和緩而發散逆故令人中滿然內熱則陽氣炎上炎上則欲飲而嗌乾中滿則陳氣有餘有餘則脾氣上溢故曰其氣上溢則轉為消渴也治之以蘭除陳氣也蘭蘭草也言蘭除陳久甘肥不化之氣者以辛能發散也有病口苦取陽陵泉口苦者病名為何何以得之病名曰膽疸亦謂熱也膽汁味苦故口苦夫肝者中之將也取決於膽咽為之使肝者將軍之官謀慮出焉膽者中正之官決斷出焉肝與膽合氣性相通故諸謀慮取決於膽咽膽相應故咽為使焉此人者數謀慮不決故膽虛氣上溢而口為之苦治之以膽募俞胸腹曰募背脊曰俞膽募在乳下二肋外期門下同身寸之五分俞在脊第十椎下兩旁相去各同身寸之一寸半有癃者一日數十溲此不足也身熱如炭頸膺如格人迎躁盛喘息氣逆此有餘也是陽氣太盛於外陰氣不足故有餘也太陰脈細微如發者此不足也其病安在名為何病癃小便不得也溲小便也頸膺如格言頸與胸膺如相格拒不順應也人迎躁盛謂結喉兩旁脈動盛滿急數非常躁速也胃脈也太陰脈細縷如發者謂手大指後同身寸之一寸骨高脈動處脈則肺脈也此正手太陰脈氣之所流可以候於五臟也病在太陰其盛在胃頗在肺病名曰厥死不治病癃數溲身熱如炭頸膺如格息氣逆者皆手太陰脈當洪大而數今太陰脈反微細如髮者是病與脈相反也何以致之肺氣逆陵於胃上使人迎躁盛故曰病在太陰其盛在胃也以喘息氣逆故云頗亦在肺也病因氣逆證不相應故病名曰厥死不治也此所謂得五有餘二不足也所謂五有餘者五病之氣有餘也二不足者亦病氣之不足也今外得五有餘內得二不足此其身不表不里亦正死明矣外有五餘者一身熱如炭二頸膺如格三人迎躁盛四喘息五氣逆也內二不足者一病癃日數十溲二太陰脈微細如髮在表則內有二不足在裡則外得五有餘表裡既不足憑補瀉固難為法故曰此其身不表不里亦正死明矣人生而有病顛疾者病名曰何安所得之百病皆生於風雨寒暑陰陽喜怒然始生未犯邪氣已有顛疾豈邪氣素傷巔謂上巔則頭首也病名為胎病此得之在母腹中時其母有所大驚氣上而不下精氣並居故令子發為巔疾也精氣謂陽之精氣也言人初生有頂巔之疾者胎中之病也在腹之時母有大驚氣上而不下精氣並居於上令子發為巔疾刺禁論篇刺禁論曰臟有要害不可不察肝生於左肝象木王於春春陽發生故生於左肺藏於右肺象金王於秋秋陰收殺故藏於右肝為少陽陽長之始故曰生肺為少陰陰藏之初故曰臟心部於表陽氣主外心象火也腎治於裡陰氣主內腎象水也心為五臟部主故稱部腎間動氣內治五臟故曰治脾為之使營動不已糟粕水穀故使者也胃為之市水穀所歸五味皆入如市故為市也鬲肓之上中有父母鬲肓之上氣海居中氣者生之原生者命之主故氣海為人之父母也又云心下鬲上為肓心為陽父也肺為陰母也肺主於氣心主於血其榮衛於身故為父母七節之旁中有小心小心謂真心神靈之宮室脊有三七二十一節腎在下七節之旁腎神曰志五臟之靈皆名為神神之所以得名為志者為心之神也從之有福逆之有咎八者人之所以生形之所以成順之則福延逆之則咎至此陳禁刺臟腑之有定次也無刺大醉令人氣亂無刺大怒令人氣逆無刺大勞人經氣越也無刺新飽人氣盛滿也無刺大飢人氣不足也無刺大渴人血脈干也無刺大驚人神蕩越也此舉不可輕刺之人刺禁之大義也刺志論篇刺志論曰氣實形實氣虛形虛此其常也反此者病形歸氣故虛實同焉形氣相反故病生氣脈氣形身形谷盛氣盛谷虛氣虛此其常也反此者病營氣之道內谷為實谷入於胃氣傳於肺精者上行經隧故穀氣虛實占必同焉候不相應則為病也脈實血實脈虛血虛此其常也反此者病脈者血之府故虛實同焉反不相應則為病也如何而反氣虛身熱此謂反也氣虛為陽氣不足陽氣不足當身寒反身熱者脈氣當盛脈不盛而身熱證不相符故謂反也甲乙經云氣盛身寒氣虛身熱此謂反也谷入多而氣少此謂反也谷入於胃脈道乃行今谷入多而氣少者是胃氣不散故反也谷不入而氣多此謂反也胃氣外散肺並之也脈盛血少此謂反也脈少血多此謂反也經脈行氣絡脈受血經氣入絡絡受經氣候不相合故皆反常氣盛身寒得之傷寒氣虛身熱得之傷暑傷謂感冒也寒傷形故氣盛身寒熱傷氣故氣虛身熱皮部論篇皮部論曰百病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於腑廩於腸胃廩積也聚也邪之始入於皮也沂然起毫毛開腠理沂然惡寒也起謂毛起豎也腠理謂皮空及文理也其入於絡也則絡脈盛色變盛謂盛滿變謂易其常也其入客於經也則感虛乃陷下經虛邪入故曰感虛脈虛氣少故陷下也其留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉爍䐃破毛直而敗攣急也弛緩也消爍也寒則筋急熱則筋緩寒勝為痛熱勝為氣消䐃者肉之標故肉消則䐃破毛直而敗也骨空論篇骨空論曰任脈者起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目言任脈之所起所止也任脈奇經八脈之一也中極者臍下四寸起於中極之下始於會陰穴也兩陰間任由會陰而行腹督由會陰而行背從會陰以上曲骨之毛際橫骨上中極下一寸陷中動脈應手復循腹裡之中極上關元氣海下脘中脘上脘巨闕膻中至廉前承漿以上咽喉中其脈至上頤循面以入於目也衝脈者起於氣街並少陰之經俠臍上行至胸中而散言衝脈之所起所止也衝脈亦奇經八脈之一也任脈當臍中而上行衝脈挾臍兩旁而上行起於氣街並足少陰腎經挾臍上行至胸中而散也氣街者穴名也在毛際兩旁鼠鼷上同身寸之一寸也而衝脈起於氣街者亦從少腹之內與任脈並行而至於是乃循腹也又曰衝脈任脈者皆起於胞中上循脊裡為經絡之海其浮而外者循腹各行會於咽喉別而絡唇口由此言之則任脈衝脈從少腹之內上行並由中極之下氣街之內明矣任脈為病男子內結七疝女子帶下瘕聚言任脈之為病也內者腹也腹之中行乃任脈所行之脈路則宜其為病若是男子為七疝女子為瘕聚七疝者按內經各篇有狐疝風疝肺疝脾風疝心風疝心疝腎風疝肝風疝有婦人㿗疝有男子㿗疝厥疝㿉疝疝氣且嘗總計其數乃五臟疝及狐疝㿗疝也其大義俱見各篇後丹溪七疝寒水筋血氣狐㿗袖珍方七疝厥癥寒氣盤附狼似丹溪合於經旨雖名色各異豈出內經範圍耶然世但知病在下部者為疝豈知五臟皆有疝又但知男子有疝豈知婦人亦有疝蓋皆不考內經故耳瘕聚者即積聚也大奇論曰三陽急為瘕後世有八瘕者亦因七疝之名而遂有八瘕名色也即蛇瘕脂瘕青瘕黃瘕燥瘕血瘕狐瘕鱉瘕是也內經則無之衝脈為病逆氣裡急言衝脈之為病也衝脈起於氣街並足少陰俠臍上行至胸中而散則里者其所行之脈絡也病則氣逆而不能上何以至胸中而散也氣聚腹中而不能散何以免在裡之急也督脈為病脊強反折督脈亦奇經也任脈衝脈督脈者本一源而三歧故經或謂衝脈為督脈也何以明之今甲乙及古經脈流注圖經以任脈循背者謂之督脈自少腹直上者謂之任脈亦謂之督脈是則背腹陰陽別為名目任脈自胞中過帶脈貫臍而上故男子為病內結七疝女子為病則帶下瘕聚衝脈挾臍而上並少陰之經上至胸中故衝脈為病則逆氣裡急也以督脈上循脊裡故督脈為病則脊強而反折也督脈者起於少腹以下骨中央女子入系廷孔亦猶任脈衝脈起於胞中也其實乃起於腎下至於少腹則下行於腰橫骨圍之中央也系廷孔者謂窈漏近所謂前陰穴也以其陰廷系屬於中故名之其孔溺孔之端也孔則窈漏也窈漏之中其上有溺孔焉端謂陰廷在此溺孔之上端也而督脈自骨圍中央則至於是其絡循陰器合篡後繞篡後督脈別絡自溺孔之端分而各行下循陰器乃合篡間也所謂間者謂前陰後陰之兩間也自兩間之後復分而行繞篡之後也別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎別謂別絡分而各行之也足少陰之絡者自股內後廉貫脊屬腎足太陽絡之外行者循髀樞絡股陽而下其中行者下貫臀至膕中與外行絡合故言少陰與巨陽中絡合少陰上股內後廉貫脊屬腎也與太陽起於目內眥上額交巔上入絡腦還出別下項循肩膊內俠脊抵腰中入循膂絡腎接繞臀而上行也其男子循莖下至篡與女子等其少腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之下中央自與太陽起於目內眥下至女子等並督脈之別絡也其直行者自尻上循脊裡而至於人中也自其少腹直上至兩目之下中央並任脈之行而云是督脈所繫由此言之則任脈督脈衝脈名異而同一體也此生病從少腹上衝心而痛不得前後為沖疝尋此生病正是任脈經云為沖疝者正明督脈以別主而異目也其女子不孕癃痔遺溺咽乾亦以衝脈任脈並自少腹上至於咽喉又以督脈循陰器合篡間繞篡後別繞臀故不孕癃痔遺溺嗌乾也謂之任脈者女子得之以任養也故經云此病女子不孕也謂之衝脈者以其氣上衝也故經云此生病從少腹上衝心而痛也謂之督脈者以其督領經脈之海也由此三用經或通呼然任督沖三脈一源而三歧督由會陰而行背任由會陰而行腹沖由氣衝而行足少陰惟督脈由會陰而起而會陰在少腹之下橫骨之中央女子入系廷孔循陰器合篡間又自兩間之後又別絡者分而行之繞其臀肉內廉貫脊屬腎彼足太陽膀胱經之絡從外行者循髀樞絡股陽而下其中行者下貫臀至膕中與外行絡合足少陰腎經自股內後廉貫脊屬腎又與足太陽起於目內眥上額交巔上入絡腦還出別下項循肩膊內俠脊抵腰中入循膂絡腎一如足太陽經脈之所行也然而督脈任脈名色雖異而氣脈不殊其督脈所行者一如任脈之行故自少腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之中央其督脈為病者又如任脈之病從少腹上衝心而痛不得前後為沖疝其女子所生之病一如任沖之病故其脈相交引病亦互名耳水熱穴論篇水熱穴論曰少陰何以主腎腎何以主水腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其末在肺皆積水也陰者謂寒也冬月至寒腎氣合應故云腎者至陰也水旺於冬故云至陰者盛水也腎少陰脈從腎上貫肝鬲入肺中故云其本在腎其末在肺也腎氣上逆則水氣客於肺中故云皆積水也腎何以能聚水而生病腎者胃之關也關閉不利故聚水而從其類也關者所以司出入也腎主下焦膀胱為府主其分注關竅二陰故腎氣化則二陰通二陰閉則胃䐜滿故云腎者胃之關也關閉則水積水積則氣停水積氣溢氣水同類故云關閉不利聚水而從其類也上下溢於皮膚故為胕腫胕腫者聚水而生病也上謂肺下謂腎肺腎俱溢故聚水於腹中而生病也帝曰諸水皆生於腎乎伯曰腎者牝臟也牝陰也主陰位故曰牝臟地氣上者屬於腎而生水液也故曰至陰勇而勞甚則腎汗出腎汗出逢於風內不得入於臟腑外不得越於皮膚客於玄府行於皮里傳於胕腫本之於腎名曰風水勇而勞甚謂力房也勞勇汗出則玄府開汗出逢風則玄府復閉閉則余汗未出內伏皮膚專化為水從風而水故名風水所謂玄府者汗空也汗液色玄從空而出以汗聚於裡故謂之玄府此言風水之病本之於腎傳之於肺也水俞五十七處者是何主也腎俞五十七穴積陰之所聚也水所從出入也尻上五行行五者此腎俞背部之俞凡有五行當其中者督脈氣所發次兩旁四行皆太陽脈氣也故水病下為跗腫大腹上為喘呼水下居於腎則腹至足而跗腫若上入於肺則喘息賁急而大呼也不得臥者標本俱病標本者肺為標腎為本是肺腎俱水為病也分為相輸俱受者水氣之所留也分其居處以名之則是氣相輸應本其俱受病氣則皆水所留也伏兔上各二行行五者此腎之街也街謂道也腹部正俞凡有五行俠臍兩旁則腎臟足少陰脈及衝脈氣所發次兩旁則胃府足陽明脈氣所發此四行穴則伏兔之上也三陰之所交結於腳也踝上各一行行六者此腎脈之下行也名曰太衝凡五十七穴者皆臟之陰絡水之所客也經所謂五十七者尻上計有五行每行計有五穴此腎之俞也其中行系督脈一經旁四行系足太陽膀胱經以腎與膀胱為表裡也伏兔上各二行每行有五穴者此腎脈所通之街謂夾中行任脈兩旁衝脈也且足經三陰之所交者必結於腳內踝上三寸有穴名三陰交腎肝脾三經之所交也其踝上各一行每行六穴者此腎脈之所行名曰太衝以腎與衝脈並皆下行於足合而盛大故曰太衝其穴在內踝之上凡此五十七穴者皆陰臟之陰絡水之所客處也故治水者治此諸穴耳標本病傳論篇標本病傳論曰有其在標而求之於標有其在本而求之於本有其在本而求之於標有其在標而求之於本故治有取標而得者有取本而得者有逆取而得者有從取而得者得病之情知治大體則逆從皆可施必中焉故知逆與從正行無問知標本者萬舉萬當道不疑惑識既深明則無問於人正行皆當不知標本是謂妄行識猶偏淺道未高深舉且見違故行多妄夫陰陽逆從標本之為道也小而大言一而知百病之害別陰陽知順逆法明著見精微則小尋其所利則大以斯明著故言一而知百病之害小而多淺而博可以言一而知百也言少可以貫多舉淺可以料大者可以言一而知百病也以淺而知深察近而知遠言標與本易而勿及雖事極玄人非咫尺略以淺近而悉貫之然而標本之道雖易可為言而世人識見無能及者病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本本而標之謂有先病復有後病也以其有餘故先治其本後治其標也標而本之謂先發輕微緩者後發重大急者以其不足故所以先治其標而後治其本也謹察間甚以意調之間謂多也甚謂少也多謂多形證而輕易少謂少形證而重難審量標本不足有餘以意調之也間者並行甚者獨行先小大不利而後生病者治其本並謂他脈共受邪而合病也獨謂一經受病而無異氣相參也並甚則相傳傳急則亦死此論病有標本刺有逆從也天元紀大論篇天元紀大論曰天有五行御五位以生寒暑燥濕風人有五臟化五氣以生喜怒思憂恐御猶臨御化謂生化也天真之氣無所不周氣象雖殊參應一也論言五運相襲而皆治之終期之日周而復始已知之矣其與三陰三陽之候奈何合之論謂六節藏象論也運謂五行應天之五運各周三百六十五日而為紀者也故曰終期之日周而復始也以六合五數未參同故問之也對曰五運陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也可不通乎道謂化生之道綱紀謂生長化成收藏之綱紀也父母謂萬物形之先也本始謂生殺皆因而有之也夫有形稟氣而不為五運陰陽之所攝者未之有也凡所以造化不極能為萬物生化之原始者以其是其神明之育故也故物生謂之化物極謂之變陰陽不測謂之神神用無方謂之聖謂變化神聖之道也化施化也變散易也神無期也聖無思也氣之施化故曰生氣之散易故曰極無期稟候故曰神無思測量故曰聖由化與變也故萬物無能逃五運陰陽由聖與神故衆妙無能出幽玄之理矣夫變化之為用也在天為玄玄遠也天道玄遠變化無窮在人為道道妙用之道也經術政化非道不成在地為化化生化也生萬物者地土氣孕育則形質乃成化生五味金石草木根葉華實酸苦甘淡辛鹹皆化氣所生隨時而有道生智智通妙用惟道所生玄生神玄遠幽深故生神也神之為用觸遇玄通契物化成無不應也神在天為風風者教之始天之使也天之號令也在地為木東方之化在天為熱應火為用在地為火南方之化在天為濕應土為用在地為土中央之化在天為燥應金為用在地為金西方之化在天為寒應水為用在地為水北方之化神之為用如上五化木為風所生火為熱所熾金為燥所發水為寒所資土為濕所全蓋初因而成立也雖初因之以化成卒因之以敗散耳豈五行之獨有是哉凡因所因而成立者悉因所因而散落耳故在天為氣在地成形氣謂風熱濕燥寒形謂木火土金水形氣相感而化生萬物矣此造化生成之大紀然天地者萬物之上下也天覆地載上下相臨萬物化生無遺略也故萬物自生自長自化自成自盈自虛自復自變也夫變者何謂生之氣極本而更始化也左右者陰陽之道路也天有六氣御下地有五行奉上當歲者為上主司天承歲者為下主司地不當歲者二氣居右北行轉之二氣居左南行轉之金木水火運北而正之常左為右右為左則左者南行右者北行而反之也水火者陰陽之徵兆也徵信也兆先也以水火之寒熱彰信陰陽之先兆也金木者生成之終始也木主發生應春春為生化之始金主收斂應秋秋為成實之終終始不息其化常行故萬物生長化成收藏自久氣有多少形有盛衰上下相召而損益彰矣氣有多少謂天之陰陽三等多少不同秩也形有盛衰謂五運之氣有太過不及也由是多少盛衰天地相召而陰陽損益昭然彰著也帝曰願聞五運之主時也鬼臾區曰五氣運行各終期日非獨主時也一運之日終三百六十五日四分度之一乃易之非主王時也此言五運治政令於內合於六氣之治政令於外者也五行者金木水火土也在天則為天干之五行如甲乙屬木之類在運則為氣化之五行如甲己化土之類在中運則為甲己太宮少宮之類在地則為地支之五行如子醜寅卯之類在歲氣則為子午屬少陰君火之類故天有五行生六氣天之六氣又生在地有形之五行無非五行之妙也五位者東西南北中央也寒暑燥濕風火者即六氣也五臟者心肝脾肺腎也五氣者五臟之氣也喜怒思憂恐者五志也三陰者少陰太陰厥陰也三陽者少陽太陽陽明也天地初分之時天分五氣地列五行五行定位布政於四方五氣分流散支於十干當是時黃氣橫於甲己白氣橫於乙庚黑氣橫於丙辛青氣橫於丁壬赤氣橫於戊癸故甲己應土運乙庚應金運丙辛應水運丁壬應木運戊癸應火運天有此五行之氣以御於東西南北中央之五位而寒暑燥濕風火所由以生正謂之六氣也在人則有心肝脾肺腎之五臟以化五臟之氣而喜怒思憂恐之五志所由以生也六節臟象論云五日謂之候言五日即有一候如立春初五日東風解凍之類三候謂之氣言半月有三候則為一氣如立春正月節為一氣之類六氣謂之時然六氣則有三月而為一時如立春雨水驚蟄春分清明穀雨而為春自立夏小滿芒種夏至小暑大暑而為夏之類四時則合春夏秋冬而為一歲皆各從其所旺之時而主治之木而火火而土土而金金而水水而木五運之氣相為承襲而皆治之每終一歲之日周而復始今歲之候如此明歲之候亦然帝言已知五運相襲而皆治之終期之日周而復始但五運者地之木火土金水治政令於內者也三陰三陽者天之風熱濕燥寒治政令於外者也故五運相襲而治者其於三陰三陽外治之候如何合之區言太極分為陰陽陰陽分為五行故五行一陰陽陰陽一太極彼五運乃天地初分之氣而列之於五方者也陰陽者雖有三陰三陽之分而天氣運氣地氣舉不能外之也天干主於降地支主於升而五運則主於升降行於天地之間乃謂之中運是謂天地之道也萬物以之為綱紀變化以之為父母生殺以之為本始真有神明為之府也蓋萬物初生謂之化物之已極謂之變陰陽莫測謂之聖神用無方謂之神由化與變故萬物無能逃五運陰陽由聖與神故衆妙無能出幽玄之理物之生從於化物之極由乎變變化之相薄茂敗之所由也又五常政論云氣始而生化氣散而有形氣布而蕃育氣終而象變其致一也在天為玄其理玄遠而玄之所生者為神在人為道其性咸備而道之所生者為智在地為化孕育萬物而化之所生者為五味惟玄生神而為風為熱為濕為燥為寒此乃三陰三陽之氣也故風之氣為木熱之氣為火濕之氣為土燥之氣為金寒之氣為水而成五運之形由是在天之氣與在地之形相感而化生萬物也然天地者萬物之上下五運行大論曰所謂上下者歲上下見陰陽之所在也左右者陰陽之道路五運行大論曰左右者俱上見厥陰左少陰右太陽見少陰左太陰右厥陰見太陰左少陽右少陰見少陽左陽明右太陰見陽明左太陽右少陽見太陽左厥陰右陽明所謂面北而命其位言其見也帝曰何謂下岐伯曰厥陰在上則少陽在下左陽明右太陰少陰在上則陽明在下左太陽右少陽太陰在上則太陽在下左厥陰右陽明少陽在上則厥陰在下左少陰右太陽陽明在上則少陰在下左太陰右厥陰太陽在上則太陰在下左少陽右少陰所謂面南而命其位言其見也王注云面北者面向北而言之也上南也下北也左西也右東也主歲者位在南故面北而言其左右在下者位在北故面南而言其左右也上天位也下地位也面南左東也右西也上下異而左右殊也此在天三陰三陽之氣右旋於外以加地也水火者陰陽之徵兆金木者生成之終始此在地五運之形左轉於內以臨天也天上之氣有多少地下之形有盛衰故天上多少之氣與地下盛衰之形相召而損益彰以為物極之變也其氣之多與形之盛相召者益益為變之盛也氣之少與形之衰相召者損損為變之虛也蓋物生之化者天地之常氣在五運曰平氣在六氣曰常化也物極之變者天地之變氣在五運曰太過不及在六氣曰淫勝反勝相勝也其變之盛者則五運之太過六氣之淫勝也其變之虛者則五運之不及六氣之反勝相勝也凡此五運六氣所謂變化盛虛本經後篇千言萬語皆所以發明此四者學者當清心以究之也五運氣行各終期日非獨主時者言木火土金水治政各終一歲之期日不獨治歲內六步之時令也帝曰何謂氣有多少形有盛衰區曰陰陽之氣各有多少故曰三陰三陽也由氣有多少故隨其升降分為二別也陰陽之三也何謂太陰為正陰太陽為正陽次少者為少陰次少者為少陽又次為陽明又次為厥陰形有盛衰謂五行之治各有太過不及也氣至不足太過迎之氣至太過不足隨之天地之氣虧盈如此故云形有盛衰也故其始也有餘而往不足隨之不足而往有餘從之知迎知隨氣可與期言虧盈無常互有勝負耳應天為天符承歲為歲直三合為治應天謂木運之歲上見厥陰火運之歲上見少陽少陰土運之歲上見太陰金運之歲上見陽明水運之歲上見太陽此五者天氣下降如合符運故曰應天為天符也承歲謂木運之歲歲當亥卯火運之歲歲當寅午土運之歲歲當辰戌丑未金運之歲歲當巳酉水運之歲歲當申子此五者歲之所直故曰承歲為歲直也三合謂水運之歲上見少陰年辰臨午土運之歲上見太陰年辰臨丑未金運之歲上見陽明年辰臨酉此三者天氣運氣與年辰俱會故云三合為治也歲直亦曰歲位三合亦為天符六微旨大論曰天符歲會曰太一天符謂天運與歲俱會也此承上文而明氣有多少形有盛衰之義不外乎天氣地氣運氣而已陰陽之氣合有多少者謂三陰三陽之氣各分多少陰多者為太陰正陰次少者為少陰而又次者為厥陰也陽多者為太陽正陽次少者為少陽而又次者為陽明也形有盛衰謂五行之治各有太過不及者也五運之形各有盛衰土有太少宮金有太少商水有太少羽木有太少角火有太少徵而太者太過少者不及也始謂甲子歲也六微旨大論曰天氣始於甲地氣始於子子甲相合命曰歲立運氣全書曰運有盛衰氣有虛實更相迎隨以司歲也陽盛陰衰如土運甲陽而己陰陰虛陽實如六氣子實而醜虛迎隨如六十甲子一陽一陰盛衰虛實遞相接送以司歲次而推之以終六甲故有餘已則不足隨不足已則有餘從亦有歲運非有餘非不足者蓋以同天地之化也若余已復余少已復少則天地之道變常而災害苛疾至矣知其來而迎之知其往而隨之則歲氣自可與期也寒暑燥濕風火天之陰陽也三陰三陽上奉之太陽為寒少陽為暑陽明為燥太陰為濕厥陰為風少陰為火皆其元在天故曰天之陰陽也木火土金水火地之陰陽也生長化收藏下應之木初氣也火二氣也相火三氣也土四氣也金五氣也水終氣也以其在地應天故云下應也氣在地故曰地之陰陽也天以陽生陰長地以陽殺陰藏生長者天之道藏殺者地之道天陽主生故以陽生陰長地陰主殺故以陽殺陰藏天地雖高下不同而各有陰陽之運用也天有陰陽地亦有陰陽天有陰故能下降地有陽故能上騰是以各有陰陽也陰陽交泰故變化由之成也木火土金水火地之陰陽也生長化收藏故陽中有陰陰中有陽陰陽之氣極則過亢故各兼之陽中兼陰陰中兼陽易之卦離中虛坎中滿此其義象也所以欲知天地之陰陽者應天之氣動而不息故五歲而右遷應地之氣靜而守位故六期而環會天有六氣地有五位天以六氣臨地地以五位承天蓋以天氣不加君火故也以六加五則五歲而餘一氣故遷一位若以五承六則常六歲乃備盡天元之氣故六年而環會所謂周而復始也地氣左行往而不返天氣東轉常自火運數五歲已其次氣正當君火之上法不加臨則右遷君火氣上以臨相火之上故曰五歲而右遷也由斯動靜上下相臨而天地萬物之情變化之機可見矣動靜相召上下相臨陰陽相錯而變由生也天地之道變化之微其由是也孔子曰天地設位而易行乎其中此之謂也上下相遘寒暑相臨氣相得則和不相得則病又云上者右行下者左行左右周天余而復位是也天以六為節地以五為制周天氣者六期為一備終地紀者五歲為一周六節謂六氣之分五制謂五位之分位應一歲歲統一年故五歲為一周六年為一備備謂備歷天氣周謂周行地位所以地位六而言五者天氣不臨君火故也君火以名相火以位君火在相火之右但立名於君位不立歲氣故天之以氣不偶其氣以行君火之正守位而奉天之命以宣行火令耳以名奉天故曰君火以名守位稟命故曰相火以位五六相合而七百二十氣為一紀凡三十歲千四百四十氣凡六十歲而為一周不及太過斯皆見矣曆法一氣十五日因而乘之積七百二十氣即三十年積千四百四十氣即六十年也經曰有餘而往不足隨之不足而往有餘從之故六十年中不及太過斯皆見矣此承上文論上下相召之義而合之以周紀之數也上者天也下者地也上下相召天右旋之陰陽加於地下地左旋之陰陽臨於天上而相召以治歲治步也天之陰陽風熱燥濕寒又增火為六數者在天之熱分為暑火二氣故三陰三陽各上奉之也地之陰陽木火土金水亦增火為六數者在地之火分為君相二形故生長化收藏各下應之也生長者天之道藏殺者地之道天陽主生陽中有陰故以陽生陰長地陰主殺陰中有陽故以陽殺陰藏天地雖高下不同而各有陰陽之運用天惟有陰故能下降地惟有陽故能上升是以謂之各有陰陽也即如木火土金水火地之陰陽也生長化收藏故陽中有陰陰中有陽所以欲知天地之陰陽者天之陰陽下加地氣共治歲也則應天之氣動而不息蓋地之治歲君火不主運惟五運循環故天之六氣加之常五歲右餘一歲與地遷移一位而動不息也地之陰陽上臨天氣共治步也則應地之氣靜而守位蓋地之治步其木君相土金水無殊皆各主一步以終期故其上臨天之六氣共治也常六期齊周復於始治之步環會而靜守位也故治歲動者與治步靜者相召外旋上者與內運下者相臨則陰陽相錯而損益盈虛之變所由生也天以六為節地以五為制者上下相召之數也蓋天之六氣各治一歲故六期一備地之六位其君火以名相火以位故五歲一周五六相合凡三十歲為一紀六十歲為一周其間相錯之陰陽或氣類同多而益為太過之盛者或氣類異少而損為不及之虛者斯皆可見其變也五運行大論篇五運行大論曰臣覽太始天元册文丹天之氣經於牛女戊分黅天之氣經於心尾己分蒼天之氣經於危室柳鬼素天之氣經於亢氐昂畢玄天之氣經於張翼婁胃所謂戊己分者奎壁角軫則天地之門戶也戊土屬乾己土屬巽六戊為天門六己為地戶夫候之所始道之所生不可不通也其五天之象所經星宿分野獨當五運之干位不及六氣之支位者蓋干之與支即根本之與枝葉經言干則支在其中矣故其化皆干與支之同屬者運位齊化是根本與枝葉同化者也夫五氣之至各有五色經於分野氣太過則先天而至氣不及則後天而至賞以寅卯前候之自然可見故曰候之所始道之所生不可不通也所謂上下者歲上下見陰陽之所在也左右者諸上見厥陰左少陰右太陽見少陰左太陰右厥陰見太陰左少陽右少陰見少陽左陽明右太陰見陽明左太陽右少陽見太陽左厥陰右陽明所謂面北而命其位言其見也面向北而言之也上南也下北也左西也右東也何謂下厥陰在上則少陽在下左陽明右太陰少陰在上則陽明在下左太陽右少陽太陰在上則太陽在下左厥陰右陽明少陽在上則厥陰在下左少陰右太陽陽明在上則少陰在下左太陰右厥陰太陽在上則太陰在下左少陽右少陰所謂面南而命其位言其見也主歲者位在南故面北而言其左右在下者位在北故面南而言其左右也上天位也下地位也面南左東也右西也上下異而左右殊也上下相遘寒暑相臨氣相得則和不相得則病木火相臨金木相臨水木相臨火土相臨土金相臨為相得也木土相臨土水相臨水火相臨火金相臨金木相臨為不相得也上臨下為順下臨上為逆逆亦鬱抑而病生土臨相火君火之類者也氣相得而病者何也以下臨上不當位也六位相臨假令土臨火火臨木木臨水水臨金金臨土皆以為下臨上不當位也父子之義子為下父為上以子臨父不亦逆乎動靜何如言天地之行左右也上者右行下者左行左右周天余而復會也上天也下地也周天謂天周地五行之位也天垂六氣地布五行天順地而左回地承天而右轉木運之後天氣常余餘氣不加於君火卻退一步加臨相火之上是以每五歲已退一位而右遷故曰左右周天余而復會會遇也合也言天地之道常五歲畢則以餘氣遷加復與五行座位再相會合而為歲法也周天謂天周地位非周天之六氣也夫變化之用天垂象地成形七曜緯虛五行麗地地者所以載生成之形類也虛者所以列應天之精氣也形精之動猶根本之與枝葉也仰觀其象雖遠可知也觀五星之東轉則地體左行之理昭然可知地為人之下太虛之中者也言人之所居可謂下矣徵其至理則是太虛之中一物耳易曰坤厚載物德合無疆此之謂也大氣舉之也大氣謂造化之氣任持太虛者也所以太虛不屈地久天長者蓋由造化之氣任持之也氣化而變不任持之則太虛之器亦敗壞矣凡有形處地之上皆有生化之氣任持之也然器有大小不同壞有遲速之異及至氣不任持則大小之壞一也燥以干之暑以蒸之風以動之濕以潤之寒以堅之火以溫之故風寒在下燥熱在上濕氣在中火遊行其間寒暑六入故令虛而化生也地體之中凡有六入一曰燥二曰暑三曰風四曰濕五曰寒六曰火受燥故乾性生焉受暑故蒸性生焉受風故動性生焉受濕故潤性生焉受寒故堅性生焉受火故溫性生焉此則天之六氣也故燥勝則地干暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂火勝則地固矣六氣之用此言天右旋於外而寒暑六入以舉其地地受天六入以為五行左轉化生人物於天之中也天地萬物之上下左右陰陽之道路者天右旋六節之位也上下在上者司天之位在下者在泉之位左右謂在上之左右即司天左間右間之位在下之左右即在泉左間右間之位也故天之三陰三陽於其六位右旋如巳亥歲上見厥陰而左間少陰右間太陽至子午歲上見少陰而左間太陰右間厥陰逐歲自上旋降於右也面北命其位言其見者謂司天之位在南而面北命其左右則西南為左間之位東南為右間之位而言其所見之陰陽也面南命其位言其見者謂地之位在北而面南命其左右則東北為左間之位西北為右間之位而言其所見之陰陽也自天地萬物之上下至此獨論天右旋之氣也上下相遘寒暑相臨氣相得則和不相得則病者言天之右旋迭地方位而其氣與地方位氣相遘相臨其遘同類相生之氣則和不同類相制之氣則病也或氣相同類相得亦病者惟相火臨於君火為不當位故也君位臣順臣位君則逆逆則病近者速者是也動靜何知者帝謂天動能臨於地地靜不能臨天而難上下相遘寒暑相臨之語伯言上者右行下者左行則知天常於上自右降東南而旋回以臨地地常於下自左升東北而循顯明木君相土金水之位循環臨天而皆動也故左右臨動各皆周天遇則復相會也應地者靜天地之體動靜雖殊而其用之變化在地則五行麗地而載生成之形類運於內在天則七曜緯虛而列應天之精氣運於外其形類與精氣之相隨運動猶根本之與枝葉同乎一氣而不殊故但仰觀七曜之象周旋雖遠可知其動也天地之氣何以候之天地之氣勝復之作不形於診也脈法曰天地之變無以脈診此之謂也言天地平氣及勝復皆以形證觀察不以診知也間氣何如惟間氣偏治一位故可隨其所在期於尺寸左右也隨氣所在期於左右於左右尺寸四部分位承之以知應與不應過與不及也從其氣則和違其氣則病謂當沉不沉當浮不浮當澀不澀當鉤不鉤當弦不弦當大不大之類也不當其位者病見於他位也迭移其位者病謂左見右脈右見左脈失守其位者危已見於他鄉本宮見賊殺之氣故病危尺寸反者死子午卯酉四歲有之反謂歲當陰在寸而脈反見於尺歲當陽在尺而脈反見於寸尺寸俱乃謂反也若尺獨然或寸獨然是不應氣非反也陰陽交者死寅申亥巳丑未辰戌八年有之交謂歲當陰在右脈反見左歲當陽在左脈反見右左右交見是謂交若左獨然或右獨然是不應氣非交也先立其年以知其氣左右應見然後乃可以言死生之逆順此言天地之氣可隨其所在期之於尺寸左右也蓋五運以甲乙土運為尊六氣以少陰君火為尊故甲乙土運為南政乃南面而行令其餘四運為北政以臣事之則面北而受令者也又以少陰為君主凡脈之司天在泉而尺寸不應者皆以少陰而論之其脈主於沉也是以期之之法陽之所在其脈應不沉陰之所在其脈不應北政之歲人氣面北而寸北尺南地左間之氣在右寸右間之氣在左寸天左間之氣在左尺右間之氣在右尺所以少陰在泉則左間太陰右間厥陰而兩寸之脈俱不應厥陰在泉則左間少陰右間太陽而少陰在左其右寸之脈不應太陰在泉左間少陽右間少陰而少陰在右其左寸之脈不應故曰北政之歲三陰在下則寸不應者此也少陰司天則左間太陰右間厥陰而兩尺之脈俱不應厥陰司天則左間少陰右間太陽而少陰在左其左尺之脈不應太陰司天則左間少陽右間少陰而少陰在右其右尺之脈不應故曰北政之歲三陰在上則尺不應者此也南政之歲人氣面南而寸南尺北天左間之氣在右寸右間之氣在左寸地左間之氣在左尺右間之氣在右尺右尺所以少陰司天則左間太陰右間厥陰而兩寸之脈俱不應厥陰司天則左間少陰右間太陽而少陰在左其右寸之脈不應太陰司天則左間少陽右間少陰而少陰在右其左寸之脈不應故曰南政之歲三陰在天則寸不應者此也少陰在泉則左間太陰右間厥陰而兩尺之脈俱不應厥陰在泉則左間少陰右間太陽而少陰在左其左尺之脈不應太陰在泉則左間少陽右間少陰而少陰在右其右尺之脈不應也故曰南政之歲三陰在泉則尺不應者此也從其氣則和者陰陽各當尺寸本位也違其氣則病者即所謂陰陽或不當其位或迭移其位或失守其位或尺寸反或陰陽交也南北二政內行運法甲巳為南政餘四運為北政南政司天在泉皆行土運其餘北政皆以在泉行運如北政巳亥厥陰司天則行在泉少陽火運又如寅申少陽司天則行在泉厥陰木運余仿此惟有北政辰戌年太陽司天當行在泉太陰土運緣北政以臣不敢行君之令故行金運是土之子以足木火金水四運焉五常政大論篇五常政大論篇曰天不足西北左寒而右涼地不滿東南右熱而左溫其故何也面巽言也陰陽之氣高下之理大小之異也高下謂地形大小謂陰陽之氣盛衰之異中原地形西北方高東南方下西方涼北方寒東方溫南方熱東南方陽也陽者其精降於下故右熱而左溫陽精下降故地氣以溫而和之於下矣陽氣生於東而盛於南故東方溫南方熱此則氣之多少明矣西北方陰也陰者其精奉於上故左寒而右涼陰精奉上故地以寒而和之於上矣陰氣生於西而盛於北故西方涼而北方寒君面巽而言臣面乾而對也是以地有高下氣有溫涼高者氣寒下者氣熱六元正紀論云至高之地冬氣常在至下之地春氣常在陰精所奉其人壽陽精所降其人夭陰精所奉高之地也陽精所降下之地也陰方之地陽不妄泄寒氣外持邪不數中正氣堅守故壽延陽方之地陽氣耗散發泄無充風濕數中真氣傾竭故夭折今中原之地西北方人多壽東南人多夭中間猶各有微甚耳西北之氣散而寒之東南之氣收而溫之所謂同病異治也西方北方人皮膚閉腠理密人皆食熱故宜散宜寒東方南方之人皮膚疏腠理開人皆食冷故宜收宜溫散謂溫浴使中外條達收謂溫中不解表也根於中者命曰神機神去則機息根於外者命曰氣立氣止則化絶凡稟乎天者以神為主稟乎地者以氣為主諸有形之類根於中者生源系天其所動浮皆神氣為機發之主其所為也物莫之知是以神捨去則機發動用之道息矣又以其生氣之根本乃發自身形之中故曰根中也其根於外者生源系地故其所生長化收藏皆為造化之氣所成立其所出也物亦莫之知是以氣止息則生化結成之道絶滅矣其木火土金水燥濕液堅柔雖常性不易及乎外物去生氣離根化絶止則其常體性顏色皆必變移其舊也氣始而生化氣散而有形氣布而蕃育氣終而象變始動而生化流散而有形布化而成結終極而萬象皆變也氣反者病在上取之下病在下取之上病在中傍取之下取謂寒逆於下而熱攻於上不利於下氣盈於上則溫下以調之上取謂寒積於下溫之不去陽藏不足則補其陽也旁取謂氣並於左則藥尉其右氣並於右則藥尉其左以和之有毒無毒服有約乎病有久新方有大小有毒無毒固宜常制矣大毒治病十去其六下品藥毒毒之大也常毒治病十去其七中品藥毒次於小也小毒治病十去其八上品藥毒次於小也無毒治病十去其九上品中品下品無毒藥悉謂之平穀肉果菜食養盡之無使過之傷其正也大毒之性烈其為傷也多小毒之性和其為傷也少常毒之性減大毒之性一等加小毒之性一等所傷可知也故至約必止之故十去其或六或七或八而即已然無毒之藥性雖平和久而多之則氣有偏勝則有偏絶不可長也故十去其九而止服至約已則以五穀五肉五果五菜隨五臟宜者食養盡之不盡行復如法法謂前四約也余病不盡然再行之毒之大小至約而止必無過也必先歲氣無伐天和無盛盛無虛虛而遺人天殃不察虛實但思攻擊盛者轉盛虛者轉盛虛者轉虛萬端之病從茲而甚真氣日消病勢日侵則殃咎之來苦夭之興難可逃也無致邪無失正絶人長命所謂伐天和也攻虛謂實是則致邪不識臟之虛斯為失正正既失則為死之由矣夫經絡以通血氣以從復其不足與衆齊同養之和之靜以待時謹守其氣無使傾移其形乃彰生氣以長病去而瘠者其經絡已通血氣已順當復其不足之臟而與足者同必養之和之靜以待時形自彰而不瘠矣六元正紀大論篇六元正紀大論曰數之始起於上而絡於下歲半之前天氣主之歲半之後地氣主之歲半謂立秋之日也上下交互氣交主之歲紀畢矣上下交互則三四氣之際即天地之氣交主之此則一歲之紀畢矣春氣西行夏氣北行秋氣東行冬氣南行觀萬物生長收藏如斯言故春氣始於下秋氣始於上夏氣始於中冬氣始於標春氣始於左秋氣始於右冬氣始於後夏氣始於前此四時正化之常察物以明之可知也故至高之地冬氣常在至下之地春氣常在高山之顛盛夏冰雪汙下川澤嚴冬草生常在之義足明矣春夏之氣本主東南而其氣則降於西北秋冬之氣本主西北而其氣則升於東南故春氣者始於往年在下之氣所升秋氣者由於今年在上之氣所降夏氣者始於今年中氣所升必謹察之厥陰所至為裡急筋軟縮故急少陰所至為瘍疹身熱火氣生也太陰所至為積飲否隔土氣也少陽所至為嚏嘔為瘡瘍火氣生也陽明所至為浮虛浮虛薄腫按之復起也太陽所至為屈伸不利病之常也厥陰所至為支痛支柱妨也少陰所至為驚惑惡寒戰栗譫妄譫亂言也太陰所至為畜滿少陽所至為驚躁瞀昧暴病陽明所至為鼽尻陰股膝髀腨胻足病太陽所至為腰痛病之常也厥陰所至為軟戾少陰所至為悲妄衄蔑蔑汙血也太陰所至為中滿霍亂吐下少陽所至為喉痹耳鳴嘔湧湧謂溢食食不下也陽明所至為脅痛皴揭身皮麩象太陽所至為寢汗痙寢汗謂睡中汗發於胸嗌頸腋之間也俗呼為盜汗病之常也厥陰所至為脅痛嘔泄泄謂利也少陰所至為語笑太陰所至為重胕腫胕腫謂肉泥按之不起也少陽所至為暴注瞤瘛暴死陽明所至為鼽嚏太陽所至為流泄禁止病之常也凡此十二變者報德以德報化以化報政以政報令以令氣高則高氣下則下氣後則後氣前則前氣中則中氣外則外位之常也氣報德報化謂天地氣也高下前後中外謂生病所也手之陰陽其氣高足之陰陽其氣下足太陽氣在身後足陽明氣在身前足少陽太陰厥陰氣在身中足少陽氣在身側各隨所在言氣變生病象也凡正文厥陰少陰太陰等語俱主歲言而人病則合於歲也凡此十二變者言前德化政令病變十二節之候若不當歲步主客正位而至者則屬變氣而為勝復也凡勝復之候至其勝氣變德則報復以德變化則報復以化變政令則報復以政令而其氣之往復不能相移也所變之氣居高則報復亦高居下則報復亦下居後則報復亦後居前則報復亦前居中則報復亦中居外則報復亦外而其位之高下亦不能相移也由是言之則天下風寒暑濕燥火之變常不能同也故風勝則動不寧也熱勝則腫熱勝氣則為丹熛勝血則為癰腫勝骨肉則為胕腫按之不起燥勝則乾干於外則皮膚皴揭干於內則精血枯涸干於氣及津液則肉乾而皮著於骨寒勝則浮浮謂浮起按之處見也濕勝則濡泄甚則水閉胕腫濡泄水利也胕腫肉泥按之陷而不起也水閉則逸於皮中也隨氣所在以言其變耳天氣不足地氣隨之地氣不足天氣從之運居其中而常先也運謂木火土金水各主歲者也地氣勝則歲運上升天氣勝則歲運下降上升下降運氣常先遷降也惡所不勝歸所同和隨運歸從而生其病也非其位則變生變生則病作故上勝則天氣降而下下勝則地氣遷而上勝謂多也上多則自降下多則自遷多少相移氣之常也勝多少而差其分多則遷降多少則遷降少多少之應有微有甚之異也微者小差甚者大差甚則位易氣交易則大變生而病作矣大要曰甚紀五分微紀七分其差可見此之謂也以其五分七分之所以知天地陰陽過差矣熱無犯熱寒無犯寒奈何發表不遠熱攻裡不遠寒汗泄故用熱不遠熱下利故用寒不遠寒皆謂不獲己而用之也時必順之犯者治以勝也春宜涼夏宜寒秋宜溫冬宜熱此時之宜用不可不順然犯熱治以寒犯寒治以熱犯春宜用涼犯秋宜用溫是以勝也婦人重身毒之何如有故無殞亦無殞也謂有大堅癥瘕痛甚不堪則治以破積愈痛之藥是謂不救必乃盡死救之以存其大也上無殞者言毋必全亦無殞者言子亦不死者也大積大聚其可犯也衰其大半而止過者死衰其大半不足以害生故衰大半則止其藥若過禁待盡毒氣內余無病可攻以當毒藥則敗損中和故過則死木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之然調其氣達謂吐之令其條達也發謂汗之令其疏散也奪謂下之令無壅礙也泄謂滲泄解表利小便也折謂抑之制其沖逆也通是五法也乃氣可調後再觀其虛盛而調理之過者折之以其畏也所謂瀉之過太過也太過者以味瀉之咸瀉腎酸瀉肝辛瀉肺甘瀉脾苦瀉心過者畏瀉故謂瀉為畏也至真要大論篇至真要大論曰陰之所在寸口何如陰之所在脈沉不應視歲南北可知之矣北政之歲少陰在泉則寸口不應木火金水四運面北受氣凡氣之在泉者脈息不見惟其左右之氣脈可見之在泉之氣善則不見惡者可見病以氣及客主淫勝名之在天之氣其亦然矣厥陰在泉則右不應少陰在右故太陰在泉則左不應太陰在左故南政之歲少陰司天則寸口不應土運之歲面南行令故少陰司天則二手寸口不應也厥陰司天則右不應太陰司天則左不應亦左右義也諸不應者反其診則見矣不應皆謂脈沉脈沉下者抑手而沉復其手則沉為浮細為大也帝曰尺候何如伯曰北政之歲三陰在下則寸不應三陰在上則尺不應司天曰上在泉曰下南政之歲三陰在天則寸不應三陰在泉則尺不應左右同尺不應寸左右悉同此言南北二政之司天在泉其尺寸之脈各有所不應也天地之氣內淫而病如何歲厥陰在泉風淫所勝則地氣不明平野昧草乃早秀民病灑灑振寒善呻數欠心痛支滿兩脅裡急飲食不下鬲咽不通食則嘔腹脹善噫得後與氣則快然如衰身體皆重謂寅申歲也灑灑振寒善呻數欠為胃病食則嘔腹脹善噫得後與氣則快然如衰身體皆重為脾病飲食不下鬲咽不通邪在胃脘也蓋厥陰在泉之歲木王而克脾胃故病如是歲少陰在泉熱淫所勝則焰浮川澤陰處反明民病腹中常鳴氣上衝胸喘不能久立寒熱皮膚痛目瞑齒痛䪼腫惡寒發熱如瘧少腹中痛腹大蟄蟲不藏謂卯酉歲也齒痛䪼腫為大腸病腹中雷鳴氣上衝胸喘不能久立邪在大腸也蓋少陰在泉之歲火剋金故大腸病也歲太陰在泉草乃早榮濕淫所勝則埃昏岩谷黃反見黑至陰之交民病飲積心痛耳聾渾渾焞焞咽腫喉痹陰病血見少腹痛腫不得小便病沖頭痛目似脫項似拔腰擬折髀不可以回膕如結腨如別謂辰戌歲也太陰為土色見應黃於天中而反見於北方黑處也水土同見故曰至陰之交合其顏色也沖頭痛謂腦後眉間痛也膕謂膝後曲腳之中也腨胻後軟肉處也耳聾渾渾焞焞咽腫喉痹為三焦病病沖頭痛目似脫項似拔腰似折髀不可以回膕如結腨如別為膀胱足太陽病又少腹腫痛不得小便邪在三焦蓋太陰在泉之歲土王克太陽故病如是也歲少陽在泉火淫所勝則焰明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便少陰同候謂巳亥歲也處寒之時熱更其氣熱氣既往寒氣後來故云更至也余候與少陰在泉同歲陽明在泉燥淫所勝則霿霧清瞑民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌乾面塵身無膏澤足外反熱謂子午歲也霿霧謂霧暗不分似霧也清薄寒也言霧起瞀暗不分物形而薄寒也心脅痛謂心之傍脅中痛也面塵謂面上如有觸冒塵土之色也嘔有苦善太息心脅痛不能反側甚則面塵身無膏澤足外反熱為膽病嗌乾面塵為肝病陽明在泉之歲金王剋木故病如是歲太陽在泉寒淫所勝則凝肅慘栗民病少腹控睪引腰脊上衝心痛血見咽痛頷腫謂丑未歲也凝肅謂寒氣靄空凝而不動萬物靜肅其儀形也慘栗寒甚也控引也睪陰丸也頷頰車前牙之下也咽痛頷腫為小腸病又少腹控睪引腰上衝心肺邪在小腸也蓋太陽在泉之歲水剋火故病如是諸氣在泉風淫於內治以辛涼佐以苦甘以甘緩之以辛散之熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之火淫於內治以鹹冷佐以苦辛以酸收之以苦發之燥淫於內治以苦溫佐以甘辛以苦下之寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之此言六氣之在泉淫勝在病者各有治之之法也天氣之變何如厥陰司天風淫所勝則太虛埃昏雲物以擾寒生春氣流水不冰民病胃脘當心而痛上支兩脅鬲咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉蟄蟲不出病本於脾謂巳亥歲也是歲民病集於中也風自天行故太虛埃起風動飄蕩故云物擾也埃青塵也不分遠物是為埃昏土之為病其善泄利若病水則小便閉而不下若大泄利則經水亦多閉絶也舌本強食則嘔腹脹溏泄瘕水閉為脾病又胃病者腹脾脹胃脘當心痛上支兩脅鬲咽不通食飲不下蓋厥陰司天之歲木勝土故病如是衝陽絶死不治衝陽在足跗上動脈應手胃之氣也衝陽脈微則食飲減少絶則藥食不入亦下咽還出也攻之不入養之不生則邪氣日強真氣內絶故死少陰司天熱淫所勝怫熱至火行其政民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘大雨且至唾血血泄鼽衄嚏嘔溺色變甚則瘡瘍胕腫肩背臂臑及缺盆中痛心痛肺䐜腹大滿膨膨而喘咳病本於肺謂子午歲也怫熱至是火行其政乃爾是歲民病集於右蓋以小腸通心故也病自肺生故曰病本肺也蓋少陰司天之歲火剋金故病如是也尺澤絶死不治尺澤在肘內廉大紋中動脈應手肺之氣也火灼於金承天之命金氣內絶故必危亡太陰司天濕淫所勝則沉陰且布雨變枯稿胕腫骨痛陰痹陰痹者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本於腎謂丑未歲也沉久也腎氣受邪水不能潤下焦枯涸故大便難也飢不欲食咳唾則有血心懸如飢狀為腎病又邪在腎則骨痛陰痹陰痹者按之而不得腹脹腰痛大便難肩背頸項強痛時眩蓋太陰司天之歲土剋水故病如是太溪絶死不治太溪在足內踝後跟骨上動脈應手腎之氣也土邪勝水而腎氣內絶少陽司天火淫所勝則溫氣流行金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛色變黃赤傳而為水身面胕腫腹滿仰息泄注赤白瘡瘍咳唾血煩心胸中熱甚則鼽衄病本於肺謂寅申歲也火來用事則金氣受邪故曰金政不平也火炎於上金肺受邪客熱內灼水無能救蓋少陽司天之氣火剋金故病如是天府絶死不治天府在肘後內側上腋下同身寸之二寸動脈應手肺之氣也火勝而金肺絶故死陽明司天燥淫所勝則木乃晚榮草乃晚生筋骨內變民病左胠脅痛寒清於中感而瘧大涼革候咳腹中鳴注瀉鶩溏名木斂生菀於下草焦上首心脅暴痛不可反側嗌乾面塵腰痛丈夫㿗疝婦人少腹痛目眛眥瘍瘡痤癰蟄蟲來見病本於肝謂卯酉歲也金勝故草木晚榮也配於人身則筋骨內應而不用也大涼之氣變易時候則人寒清發於中內感寒氣則為痎瘧也大腸居右肺氣通之今肺氣內淫肝居下左故左胠脅痛如刺割也其歲民自注泄則無淫勝之疾也大涼次寒也大涼且甚陽氣不行故木容收斂草容悉晚生氣已升陽不布令故行積生氣而稸於下也在人之應則少腹之內痛氣居之瘡瘍痤癰腰痛不可以俯仰丈夫㿗疝婦人少腹痛甚則咽面塵胸滿洞泄為肝病又心脅痛不能反側目鋭眥痛缺盆中腫痛腋下腫馬刀振寒瘧為膽病蓋陽明司天之歲金剋木故病如是太衝絶死不治太衝在足大指本節後二寸脈動應手肝之氣也金來伐木肝氣內絶真不勝邪故死太陽司天寒淫所勝則寒氣反至水且冰血變於中發為癰瘍民病厥心痛嘔血血泄鼽衄善悲時眩僕運火炎烈雨暴乃雹胸腹滿手熱肘攣掖腫心淡淡大動胸脅胃脘不安面赤目黃善噫嗌乾甚則色炲渴而欲飲病本於心謂辰戌歲也太陽司天寒氣布化故水且冰而血凝皮膚之間衛氣結聚故為癰也若乘火運而火炎烈與水交戰故暴雨半珠形雹也是歲民病集於心脅之中也陽氣內郁溫氣下蒸故心厥痛而嘔血血泄鼽衄面赤目黃善噫手熱肘攣腋腫嗌乾甚則寒氣勝陽水行凌火火氣內郁故渴而欲飲也病始心生為陰凌犯故云病本於心也蓋太陽司天之歲水剋火故病如是神門絶死不治神門在手之掌後鋭骨之端動脈應手真心氣也水行勝火而心氣內絶神氣已亡不死何待所謂動氣知其臟也所以診視而知其死者何以皆是臟之經脈動氣知神臟之存亡耳司天之氣風淫所勝平以辛涼佐以苦甘以甘緩之以酸瀉之熱淫所勝平以鹹寒佐以苦甘以酸收之濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之濕上甚而熱治以苦溫佐以甘辛以汗為故而止火淫所勝平以酸冷佐以苦甘以酸收之以苦發之以酸復之熱淫同燥淫所勝平以苦溫佐以酸辛以苦下之寒淫所勝平以辛熱佐以苦甘以咸瀉之此言六氣之司天淫勝為病者各有治之之法也治諸勝復寒者熱之熱者寒之溫者清之清者溫之散者收之抑者散之燥者潤之急者緩之堅者軟之脆者堅之衰者補之強者瀉之各安其氣必清必靜則病氣衰去歸其所宗此治之大體也太陽氣寒少陰少陽氣熱厥陰氣溫陽明氣清太陰氣濕有勝復則各倍其氣調之也故可使平也宗屬也調不失理則余之氣自歸其所屬少之氣自安其所居勝復衰已則各補養而平定之必清必靜無妄撓之則六氣循環五神安泰若運氣之寒熱治之平之亦各歸司天地氣也此總結言治勝復之大體者也身半以上其氣三矣天之分也天氣主之身半以下其氣三矣地之分也地氣主之以名命氣以氣命處而言其病半謂天樞也身之半正謂臍中也或以腰為身半當伸臂指天舒足指地以繩量之中正當臍也故又曰半所謂天樞也司天者其氣三司地者其氣三故身半以上三氣身半以下三氣也以名言其氣以氣言其處以氣處寒熱而言其病之形證也欲知病診常隨氣所在以言之當陰之分冷病歸之當陽之分熱病歸之故勝復之作先言病生寒熱者必依此物理也六微旨大論云天樞之上天氣主之天樞之下地氣主之氣交之分人氣從之夫氣之勝也微者隨之甚者制之氣之復也和者平之暴者奪之皆隨勝氣安其屈伏無問其數以平為期此其道也隨謂隨之安之制謂止制平謂平謂奪謂奪其勝氣也治此者不以數之多少但以氣平和為準度耳此言復之所以反病而有治之之法也高者抑之下者舉之有餘者折之不足者補之佐以所利和以所宜必安其主客適其寒溫同者逆之異者從之高者抑之制其勝也下者舉之濟其弱也有餘者折之屈其鋭也不足者補之全其氣也雖制勝扶弱而客主須安一氣失所內淫外並而危敗之由作矣同謂寒熱溫清氣相比和者異謂水火木金土不比和者氣相得者則逆所勝之氣以治之不相得者則順所不勝氣以治之此其治主客之大體也氣有高下病有遠近證有中外治有輕重適其至所為故也臟位有高下腑氣有遠近病證有表裡藥用有輕重調其多少和其緊慢令藥氣至病所為故勿太過不及也大要曰君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君三臣六偶之制也奇謂古之單方偶謂古之復方單復一制皆有大小故奇方云君一臣二君二臣三偶方云君二臣四君三臣六也病有大小氣有遠近治有輕重所宜故云制者也故曰近者奇之遠者偶之汗者不以奇下者不以偶補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其至所此之謂也汗藥不以偶方氣不可以外發泄下藥不以奇制藥毒攻而致過治上補上方迅急則止不住而迫下治下補下方緩慢則濕道路而力又微制急方而氣味薄則力與緩等制緩方而氣味厚則勢與急同如是為緩不能緩急不能急厚而不厚薄而不薄大小非制輕重無度則虛實寒熱臟腑紛撓無由致理豈神靈而可望安哉近而奇偶制小其服也遠而奇偶制大其服也大則數少小則數多多則九之少則二之湯丸多少凡如此也近遠謂腑臟之位也心肺為近肝腎為遠脾胃居中三陽胞䐈膽亦有遠近身三分之上為近下為遠也或識見高遠權以合宜方奇而分兩偶方偶而分兩奇如是者近而偶制多數服之遠而奇制少數服之故曰小則數多大則數少也奇之不去則偶之是謂重方偶之不去則反佐以取之所謂寒熱溫涼反從其病也方與其重也寧輕與其毒也寧善與其大也寧小是以奇方不去偶方主之偶方病在則反其一佐以同病之氣而取之也夫熱與寒背寒與熱違微小之熱為寒所折微小之冷為熱所消甚大寒熱則必能與違性者爭雄能與異氣者相格聲不同不相應氣不同不相合如是則且憚而不敢攻之攻之則病氣與藥氣抗衡而自為寒熱以開閉固守矣是以聖人反其佐以同其氣令聲氣應合復令寒熱參合使其終異始同凌潤而敗堅剛強必折柔脆同消耳此言約方之法不越奇偶而必當曲盡其制也李東垣七方圖大君一臣三佐九制之大也遠而奇偶制大其服也大則數少少則二之腎肝位遠服湯散不厭頻而多小君一臣二制之小也近而奇偶制小其服也小則數多多則九之心肺位近服湯散不厭頻而少緩補上治上制以緩緩則氣味薄治主以緩緩則治其本急補下治下制以急急則氣味厚治客以急急則治其標奇君一臣二奇之制也君二臣三奇之制也陽數奇偶君二臣四偶之制也君二臣六偶之制也陰數偶復奇之不去則偶之是謂重方也是故百病之起有生於本者有生於標者有生於中氣者有取本而得者有取標而得者有取中氣而得者有取標本而得者有逆取而得者有從取而得者反佐取之是為逆取奇偶取之是為從取寒病治以寒熱病治以熱是為逆取從順也逆正順也若順逆也寒盛格陽治熱以熱熱盛拒陰治寒以寒之類皆時謂之逆外雖用逆中乃順也此逆乃正順也若寒格陽而治以寒熱拒寒而治以熱外則雖順中氣乃逆故方若順是逆也故曰知標與本用之不殆明知逆順正行無問不知是者不足以言診足以亂經粗工嘻嘻以為可知言熱未已寒病復殆同氣異形迷診亂經六氣之用粗之與工得其半也厥陰之化粗以為寒其乃是溫太陽之化粗以為熱其乃是寒由此參互用失其道故其學問識用不達工之道半矣夫一經之標本寒熱既殊言本當究其標論標合尋其本言氣不窮其標本論病未辨其陰陽心既迷正理治益亂其經呼曰粗工夫標本之道要而博小而大可以言一而知百病之害言標與本易而勿損察本與標氣可令調明知勝復為萬民式此言六氣各有所從之標本而百病皆當知標本也願聞病機何如諸風掉眩皆屬於肝風性動木氣同之諸寒收引皆屬於腎收謂斂也引謂急也寒物收縮水氣同也諸氣膹郁皆屬於肺高秋氣涼露氣煙集涼至則氣熱復甚則氣殫徵其物象屬可知矣膹謂膹滿郁謂奔迫也氣之為用金氣同之諸濕腫滿皆屬於脾土薄則水淺土厚則水深土平則干土高則濕濕氣之有土氣同之諸熱瞀瘛皆屬於火火象徵諸痛癢瘡皆屬於心心寂則病微心躁則痛甚百端之起皆自心生痛癢瘡瘍生於心也諸厥固泄皆屬於下下謂下焦肝腎氣也夫守司於下腎之氣也門戶束要肝之氣也故諸厥固泄皆屬下也厥為氣逆固謂禁固諸有氣逆上行及固不禁出入無度燥濕不恆皆由下焦之主守也諸痿喘嘔皆屬於上上謂上焦心肺氣也炎熱薄爍心之氣也承熱分化肺之氣也熱鬱化上故病屬上焦此皆五臟之疾病機由於內動者也諸禁鼓栗如喪神守皆屬於火熱之內作諸痙項強皆屬於濕太陽傷濕諸熱衝上皆屬於火炎上之性用也諸脹腹大皆屬於熱熱鬱於內肺脹所生諸躁狂越皆屬於火熱盛於胃及四末也諸暴強直皆屬於風陽內鬱而陰行於外諸病有聲鼓之如鼓皆屬於熱謂有聲也諸病胕腫疼酸驚駭皆屬於火諸氣多也諸轉反戾水液渾濁皆屬於熱反戾筋轉也水液水便也諸病水液澄徹清冷皆屬於寒上下所出及吐出溺出也諸嘔吐酸暴注下迫皆屬於熱酸酸水及沫也此皆十二經絡之邪病機由於外入者也故大要曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其血氣令其調達而致和平此之謂也深乎聖人之言有無求之虛盛責之如大寒而甚熱之不熱是無火也熱來復去晝見夜伏夜發晝止時節而動是無火也當助其火又如大熱而甚寒之不寒是無水也熱動復止倏忽往來時動時止是無水也當助其水內格嘔逆食不得入是有火也病嘔而吐食入反出是無火也夫寒之不寒責其無水熱之不熱責其無火熱之不久責心之虛寒之不久責腎之少有者瀉之無者補之虛者補之盛者瀉之令上下無礙血氣通調則寒熱自和陰陽調達矣此言病機計有十九而有善治之法也願言其制君一臣二制之小也君一臣三佐五制之中也君一臣三佐九制之大也寒者熱之熱者寒之微者逆之甚者從之夫病之微小者猶人火也遇草而焫得木而燔可以濕伏可以水滅故逆其性氣以折之攻之病之大甚者猶龍火也得濕而焰遇水而燔不知其性以水濕折之適足以光焰詣天物窮方止矣識其性者反常之理以火逐之則燔灼自消焰火撲滅夫逆之者謂以寒攻熱以熱攻寒從之者謂攻以寒熱從其性用是以下文曰逆者正治從者反治從少從多觀其事也堅者削之客者除之勞者溫之結者散之留者攻之燥者濡之急者緩之散者收之損者益之逸者行之驚者平之上之下之摩之浴之薄之劫之開之發之適事為故量病證候適事用之帝曰何謂逆從伯曰逆者正治從者反治從少從多觀其事也言逆者正治也從者反治也逆病氣而正治則以寒攻熱以熱攻寒雖從順病氣乃反治法也帝曰反治何謂伯曰熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已熱因寒用熱物冷服下咽之後冷體既消熱性便發寒因熱用冷物熱服也中滿下虛乃疏啓其中峻補於下少服則資壅多服則宣通由是而中滿自除下虛斯實此則塞因塞用也又大熱內結注泄不止熱宜寒療結復須除以寒下之結散利止此則通因通用也投寒以熱涼而行之投熱以寒溫而行之始同終異斯之謂也逆之從之逆而從之從而逆之疏氣令調則其道也逆謂逆病氣以正治從謂從病氣而反療逆其氣以正治使其從順從其病以反取令彼和調故曰逆從也下疏其氣令道路開通則氣感寒熱而為變病之中外何如從內之外者調其內從外之內者治其外各絶其源從內之外而盛於外者先調其內而後治其外從外之內而盛於內者先治其外而後調其內此謂先除其根屬後消其枝條中外不相及則治主病中外不相及自各一病也此方治表裡之病有三法有本標有先後有分主也治寒以熱治熱以寒而方士不能廢繩墨而更其道也有病熱者寒之而熱有病寒者熱之而寒二者皆在新病復起奈何治謂治之而病不退反因藥寒熱而隨生寒熱病之新者伯曰諸寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也言益火之源以消陰翳壯水之主以制陽光故曰求其屬也夫粗工偏淺以熱攻寒以寒療熱治熱未已而冷疾已生攻寒日深而熱更起熱起而中寒尚在寒生而外熱不除欲攻則懼熱不前欲療熱則思寒寒又止進退交戰危亟已臻豈知臟腑之源有寒熱溫涼之主哉夫取心者不必齊以熱取腎者不必齊心寒但益心之陽寒亦通行強腎之陰熱之猶可或治熱以熱治寒以寒萬舉萬全也帝曰服寒而反熱服熱而反寒其故何也伯曰治其王氣是以反也物體有寒熱氣性有陰陽觸王之氣則強其用也夫肝氣溫和心氣暑熱肺氣清涼腎氣寒冽脾氣兼併之故也春以清治肝而反溫夏以冷治心而反熱秋以溫治肺而反清冬以熱治腎而反寒蓋由補益王氣太甚也補王太甚則臟之寒熱氣自多矣夫五味入胃各歸所喜故酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常也氣增而久夭之由也夫入肝為溫入心為熱入肺為清入腎為寒入脾為至陰而四氣兼之皆為增其味而益其氣故各從本臟之氣用耳故久服黃連苦參而反熱者此其類也餘味皆然但人意疏忽不能精候耳故曰久而增氣物化之常也氣增不已臟氣偏勝臟有偏絶則有暴夭者故曰氣增而久夭之由也是以服餌百藥不具五味不借四氣而久服之雖且獲勝益久必致暴夭此之謂也絶粒服餌則不暴亡斯何由哉無五穀味資助故也復令食谷其亦夭焉調氣之方必別陰陽定其中外各守其鄉內者內治外者外治微者調之其次平之盛者奪之汗之下之寒熱溫涼衰之以屬隨其攸利病有中外治有表裡在內者以內治法和之在外者以外治法和之其次大者以平氣法平之盛甚不已則奪其氣令其衰也假如小寒之氣溫以和之大寒之氣熱以取之甚寒之氣則下奪之奪之不已則逆折之折之不盡則求其屬以衰之小熱之氣涼以和之大熱之氣寒以取之甚熱之氣則汗發之發之不盡則逆制之不盡則求其屬以衰之故曰汗之下之寒熱溫涼衰之以屬隨其攸利攸所也謹道如法萬舉萬全氣血正平長有天命守道以行舉無不中故能驅役草石召遣神靈血氣保平和之候則天真無耗竭之由也疏五過論篇疏五過論曰凡未診病者必問嘗貴後賤雖不中邪病從內生名曰脫營神屈故也貴之尊榮賤之屈辱心懷眷慕志結憂惶雖不中邪病從內生血脈虛減故曰脫營嘗富後貧名曰失精五氣留連病有所並富而從欲貧奪豐財內結憂煎外悲故物則心從想慕神隨往計營衛之道悶以遲留氣血不行而積併為病身體日減氣虛無精氣血相迫形肉消灼故身體日減氣歸精精食氣今氣虛不化精無所滋故也病深無氣灑灑然時驚病氣深穀氣盡陽氣內薄故惡寒而驚灑灑寒貌病深者以其外耗於衛內奪於榮血為憂煎氣隨悲減故外耗於衛內奪於榮病深者何以此耗奪故耳良工所失不知病情此亦治之一過也失謂失問其所始也凡欲診病者必問飲食居處飲食居處五方不同故問之也暴樂暴苦始樂後苦皆傷精氣精氣竭絶形體毀沮喜則氣緩悲則氣消悲哀動中者竭絶而失生故精氣竭絶形體殘毀心神沮喪矣愚醫治之不知補瀉不知病情精華日脫邪氣乃並此治之二過也不知喜怒哀樂之殊情概為補瀉而同貫則五臟精華之氣日脫邪氣薄蝕而乃並於真正之氣矣善為脈者必以比類奇恆從容知之為工而不知道此診之不足貴此治之三過也奇恆謂氣候奇異於恆常之侯也從容謂分別臟氣虛實脈見上下幾相似也示從容論曰脾虛浮似肺腎小浮似脾肝急沉散似腎此皆工之所時亂後容分別而得之矣診有三常必問貴賤封君敗傷及欲侯王貴則形樂志樂賤則形苦志苦音樂殊貫故先問也封君敗傷降君之位封公卿也及欲侯王謂情慕富貴而妄為不已也故貴脫勢雖不中邪精神內傷身必敗亡憂惶煎迫怫結所為始富後貧雖不傷邪皮焦筋屈痿躄為攣以五臟氣留連病有所並而為是也醫不能嚴不能動神外為柔弱亂至失常病不能移則醫事不行此治之四過也嚴謂戒所以禁非也所以令從命也外為柔弱言委隨而順從也然戒不足以禁非動不足以從令委隨任物亂失天常病且不移何醫之有凡診者必知終始有知餘緒切脈問名當合男女終始謂氣色也知外者終而始之明知五色氣象終而復始也餘緒謂病發端之餘緒也切謂以指按脈也問名謂問病診之名也男子陽氣多而左脈大為順女子陰氣多而右脈大為順故宜先合之也離絶莞結憂恐喜怒五臟空虛血氣離守工不能知何術之語離謂離間親愛絶謂絶念所懷莞謂莞結思慮結謂結固余怨間親愛者魂遊絶所懷者意喪積所慮者神勞結餘怨者志苦憂愁者閉塞而不行恐懼者蕩憚而失守盛怒者迷惑而不治喜樂者憚散而不藏由是八者故以五臟空虛血氣離守工不能思曉又何言哉此治之五過也徵四失論篇徵四失論曰診不知陰陽逆從之理此治之一失也受師不卒妄作雜術謬言為道更名自功妄用砭石後遺身咎此治之二失也不適貧富貴賤之居坐之薄厚形之寒溫不適飲食之宜不別人之勇怯不知比類足以自亂不足以自明此治之三失也診病不問其始憂患飲食之失節起居之過度或傷於毒不先言此卒持寸口何病能中妄言作名為粗所窮此治之四失也第一失者不知陰陽逆順之理也陰陽逆順之理非止一端左手人迎為陽春夏洪大為順沉細為逆右手氣口為陰秋冬沉細為順洪大為逆男子左手脈大為順陰脈為逆陰病見陽脈為順陰脈為逆內傷陽病見陽脈為順陰脈為逆陰病見陰脈為順陽脈為逆又色見上下左右各在其要上為逆下為從女子右為逆左為從男子左為逆右為從第二失者不受師術之正妄效雜術之邪以非為是苟用砭石也第三失者不適病人之情不明此類之義也第四失者不究始時致病之由妄持寸口之脈不中病情偽指病名也陰陽類論篇陰陽類論篇曰三陽為經二陽為維一陽為遊部此知五臟終始三陽為表二陽為里一陰至絶作朔晦卻具合以正其理此言六經為人身之表裡以太陽太陰為貴也三陽者足太陽膀胱經也從目內眥上頭分為四道下項並正別脈上下六道以行於背為人身之大經二陽者足陽明胃經也從鼻起下咽分為四道並正別脈六道上下行腹為人身之維繫一陽者足少陽膽經也起自外眥絡頭分為四道下缺盆並正別脈六道上下為人身之遊行諸部者也曰經曰維曰遊部此可以知五臟終始賴此三經以為之表也三陽為之表則二陰為之裡二陰者足少陰腎經也二陽為之表則三陰為之裡三陰者足太陰脾經也一陽為之表則一陰為之裡一陰者足厥陰肝經也太陰為正陰而次少為少陰又次為厥陰太陽為正陽而次少為少陽又次為陽明以其氣有多少異用故各有三者之分耳然少太之義易知而陽明厥陰之義難釋足之十二經合於十二月故寅者正月之生陽也主左足之少陽六月建未則為右足之少陽皆兩足第四指脈氣所行也二月建卯主左足之太陽五月建午則為右足之太陽皆足小指外側已上脈氣所行也三月建辰主左足之陽明四月建巳則為右足之陽明皆兩足次指已上脈氣所行也然正二五六月為少陽太陽而三四為辰巳月居於其中則彼兩陽合明於其前故曰陽明也七月建申主陰之生主右足之少陰而十二月建醜則為左足之少陰皆兩足心以上脈氣所行也八月建酉主右足之太陰而十二月建子則為左足之太陰皆兩足大指內側以上脈氣所行也九月建戌主右足之厥陰而十月建亥則為左足之厥陰皆兩足大指外側以上脈氣所行也然七八十一十二月為少陰太陰而九十為戌亥月則為兩足之陰已盡故曰厥陰也厥者盡也而應之者戌亥則一陰幾於絶矣豈知一陰至絶而有復作之理朔晦相生之妙卻具於其中蓋陰盡為晦陰生為朔氣盡為晦氣生為朔既見其晦又見其朔厥陰之絶而復作合當以彼晦朔之妙而正此厥陰之理也正者證也三陽為父二陽為衛一陽為紀三陰為母二陰為雌一陰為獨使三陽者即太陽也太陽為表之經覆庇群生尊猶父也二陽者即陽明也陽明為表之維捍衛諸部所以為衛也一陽者即少陽也少陽為表之遊部布絡諸經所以為紀也三陰者即太陰也太陰為里之經長養諸經尊猶母也二陰者即少陰也少陰為里之維生由此始所以為維也一陰者即厥陰也厥陰為里之遊部將軍謀慮所以為獨使也方盛衰論篇方盛衰論曰形弱氣虛死中外俱不足也形氣有餘脈氣不足死臟衰故脈不足也脈氣有餘形氣不足生臟盛故脈氣有餘是以診有大方坐起有常坐起有常則息力調適故診之方法必先用之出入有行以轉神明言所以貴坐起有常者何以出入行運皆神明隨轉也必清必靜上觀下觀司八正邪別五中部按脈動靜上觀謂氣色也下觀謂行氣也八正謂八節之正候五中謂五臟之部分然後按寸尺之動靜而定死生矣
