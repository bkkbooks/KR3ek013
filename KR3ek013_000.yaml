body:
  text: 凡例首重內經發明玄奧瘡瘍雖曰外證必先受於內然後發於外故不得不宣明靈素闡發機微況內經如奉行之律律有萬無可易之旨而張李劉朱以及歷朝諸家醫集有發前人所未發之論拯救呼吸危亡復生之案如今所引之例其中多死中得活之條所以司醫者平時宜多讀書則見識廣如臨萬難醫治之證色脈相參其證尚有一線可生之機便須竭其心力旁求可生之法救之庶不負上天好生之德與前賢立説之心是以內經列之於首論診候形狀以別表裡虛實以決順逆死生近來瘍科只仗膏丹不習脈理遇一大證便令病家另延內科服藥殊不知專司方脈兼諳外證者少每至內外兩科彼此相左當表散而反補當內托而反清當峻補而反瀉貽誤非輕茲編彙集脈法俾司瘍科者留心脈理若能內外一手則病者更受其益矣但脈理至微不特三部九候即浮沉遲數四脈情形憑何指示父不能傳之子師不能傳之徒其故何也所謂得之於心應之於手必須資質明敏臨證時心平氣和呼吸調勻時刻留心譬夫診視寒門診脈時細加體會原來表證見是脈半表半裡見是脈傳裡見是脈三陰見是脈臨診既多經歷漸久日夕精進始能得脈息之情形察虛實存亡之至理若漫不經心雖終身亦不知脈為何物得心應手豈易言哉脈經務須熟讀而後用心調息診之自得矣論五運六氣以明歲氣盛衰遵銅人圖經絡穴道針鋒較對便知所患部位屬於何經其經氣血多寡庶攻補不致妄施輯諸家癰疽明論字字可師輯諸家癰疽治法可為後學準繩論癰疽兼現寒熱煩渴祕結泄瀉諸證以別陰陽虛實不致攻補失當列癰疽初起內消敷圍針灸溻洗內托砭石刀針潰後托補生肌斂口三十八法列癰疽名目逐類分門上自巔頂下至湧泉每一證即繪一圖首標歷朝名醫確論續陳妄參末議補前人所未載續編簡之未備每證除以前代古方載入以為遵守規模繼入各家經驗奇方以備臨時採擇其中諸同志所贈良方刊入俱標姓氏不敢泯其所自澄世傳祕方今俱備入惟求濟世活人不敢私留隻字江左婦女腳氣非秦漢男婦五痹濕熱腳氣一類治法不同故特增入幼科痘疹古名天瘡澄家有邵氏祕書兒科罕見今特以清江聶九吾先生喜泰順先生痘科祕本朱純嘏先生痘疹定論四家彙輯增入瘡科保嬰壽世凡司痘疹者留心斯卷用意討尋則保全寰宇嬰孩性命其功博矣列凡水火金刃跌打急救五絶中毒等證經驗治法列一切虎犬蛇蠍蟲蟄咬傷治法載古今奇病治法以廣學識冬月傷寒最為酷烈六經不明每多混治差之毫釐失之千里攻表倒施危亡立待特附卷末誠乃寒門捷徑澄本布衣三指謀生家口既多負纍綦重黎明而起昏夜方眠應接之暇思欲編著一書誠非易事所幸平生從不敢粗心浮氣妄施攻補復不敢乘人之危誑人肥己因不負人故心地寧不妄求故魂夢安惟知守分安貧以仁為念專心採輯今始告成惟是一人所著見聞不廣遺漏必多全希諸同志先生鑑原更正為幸
