front:
  text: 汪序昔蘇文忠公云藥雖進於醫手方多傳於古人粵自軒岐而降代有傳人博覽群書方稱國手或謂望而知其病者謂之神聞而知之者謂之聖問而知之者謂之工至於診脈淺深呼吸至數而後能療治者得巧之道焉夫如是則臨證施治宣通補瀉豈徒按古人成方遂可畢乃事哉故神明變化運用之妙存乎一心而規矩準繩則又不能捨方書而私心自用也顧君練江鳩江儒士三世業醫今僑居廣陵四十餘年丹荔青芝起顛連而躋仁壽者指不勝屈因念張劉朱李諸書以及時賢立論著述咸於內證闡發無遺而外科亦間施治有方終未能得窺全豹不憚歲月殫精竭神搜括古今確論都成一集名曰瘍醫大全下問於余余披閲數過深嘆顧君之學問淵深而用心良厚也夫世之庸工不明臟腑不按經絡臨證制方滅裂古人之成法而私心自用則於外科為尤甚及偶得一經驗之方輒珍為己有祕不示人殊不知古聖賢創設成規筆之於書原示後人以規範徒以祕而不宣者煽巧矜能自詡為專家獨步何見之小耶顧君則不然首述內經次詳脈絡以及分門別類無一非先哲名言珍方祕旨悉皆臚載其底蘊淵深亦從可知矣夫良醫之後必有達人顧君是書一出將與杏林橘井媲美爭光吾願世之習是科者咸奉一册以為標準則於古人施濟之意庶幾得之余不敏樂援筆而為之序云乾隆癸巳仲冬長至前三日新安健堂汪立德撰自序澄生逢堯舜之世身為太平之民每念聖天子宵旰勤勞唯恐四海乃民有纖芥之苦御極之始即下詔徵方彙輯御纂醫宗金鑑頒發中外使穹鄉僻壤凡有疾痛皆得檢方施治沉疴立起而各省上憲又復仰體聖慈每歲自捐清俸開設藥局以濟貧病其愛民如子可謂至周極備矣澄本一介布衣賦性迂拙聖賢之書讀而未竟業醫自贍碌碌無聞因思身體髮膚受之父母安居樂業悉出皇仁而君父之恩無由報稱是以診視之暇不憚精神勞瘁搜括古今名醫確論首標內經義旨宣明脈法元微詳分經絡穴道彙集內景證形上自巔頂下至湧泉凡涉外證者繪圖立説按證立方諸如湯火刀傷刑杖跌僕獸傷蟲咬誤吞藥石毒物五絶解救之法自今古成方之外又益以先祖寧華公先父青岩公家藏經驗諸方別類分門計四十卷名之曰瘍醫大全俾患者咸知瘍必有名醫必有法按圖施治經絡分明初起期其必消已成必其易潰已潰速其易斂使人間無破漏之危更可免釀癰之患況所備諸方悉俱養正驗邪調衛和榮雖云小道利濟非輕斯書纂輯閲三十寒暑因囊槖空懸未獲授梓今緣兩淮同人慨為捐資始付棗梨以成此志爰述綴輯原委辨之簡端以見成之尤非偶然云乾隆二十五年歲次庚辰孟夏靜齋顧澄練江書喬序人之所病病疾多而醫之所病病道少操少道應多疾以愈為劇以生為死拙者失理恬而不怪故易曰勿藥有喜禮曰醫不三世不服其藥誠慎之也善乎銅鞮杜氏之言醫不專於藥而舍藥無以全醫藥不必於方而舍方無以為藥考漢書藝文志經方十一家秦始皇帝扁鵲俞拊方二十三卷始皇不聞善醫蓋敕集俞扁二家方以成書若聖惠方惠民和劑局方所由昉而太史公傳淳于意遂為後人醫案之祖範史因之以傳華元化餅人萍䩾亦充方藥惜其出書一卷自言此可活人吏不敢受至於索火燒之其術則神而其心抑已隘矣余嘗欲仿諸病源候論濟生拔萃方例採自元明以來方家醫案為發明其議證處方之故以證合乎黃帝扁鵲仲景東垣之書以與王氏準繩薛氏醫案張氏類經孫氏元珠相表裡一行作吏此事遂廢昨歲司藩豫省偶以一劑愈相國兆公宿疾今年春膺撫黔之命恭逢翠華南幸請訓行在仰承天語褒及知醫於時扈從諸巨公咸就診脈而蕪湖顧君練江出所著瘍醫大全四十卷請辨其端按周禮醫師之職統於天官冢宰而瘍醫所掌凡療瘍以五毒攻之以五氣養之以五藥療之以五味節之凡藥之酸養骨以辛養筋以咸養脈以苦養肉以滑養竅自非明乎炊湯脈神之術者其可易而為之哉且古之人診頭痛而決其將嘔膿脈面赤而知其為內疽兼能並擅方號名家顧君傳醫三世精通內外兩科其活人甚多其為書也自靈素診候運氣經絡以及癰疽明論治法元元本本縷析條分舉生平所得力父祖之祕方盡出而公之於世由頂至踵一證一圖幾於盡見五臟癥結其新增婦人腳氣門殆越人帶下醫之意歟至其寒門五法則又仲景之功臣也讀是書者不虞道少不患疾多矣近有以善醫蒙徵者所撰方案輒以摺片進呈御覽人以為榮今顧君術仁術心仁術圭璋特達余於是書乎卜之因題左方以為券云乾隆二十七年歲在元黓敦牂中呂月賜進士出身誥授資政大夫巡撫貴州提督川貴軍務兼兵部侍郎加四級記録十二次年家眷弟喬光烈拜撰
