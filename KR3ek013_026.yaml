body:
  text: 卷二十六腳氣部自男婦緩風腳氣起至揚州江甘儀婦女腳氣治各不同法則俱匯於此部中以便檢閲參治男婦緩風腳氣門主論太陰陽明論曰陽受風氣陰受濕氣傷於風者上先受之傷於濕者下先受之清濕襲虛則病起於下風雨襲虛則病起於上邪氣臟腑病形篇曰身半已上者邪中之也身半已下者濕中之也陰陽應象大論曰地之濕氣感則害人皮肉筋脈通評虛實論曰跖跛寒風濕之病也臟氣法時論曰脾苦濕急食苦以燥之禁濕地濡衣調經論曰寒濕之中人也皮膚不收肌肉堅緊營血泣衛氣去故曰虛虛者聶闢氣不足按之則氣足以溫之故快然而不痛五常政大論曰太陰司天濕氣下臨六元正紀大論曰太陽司天之政民病寒濕發肌肉萎足萎不收太陰司天之政民病寒濕腹滿身䐜憤胕腫太陰所致為重胕腫生氣通天論曰因於氣為腫四維相代陽氣乃竭經脈篇曰胃病則大腹水腫膝臏腫痛足陽明實則狂顛虛則足不收脛枯平人氣象論曰足脛腫曰水張景嶽曰腳氣之説古所無也自晉蘇敬始有此名然其腫痛麻頑即經之所謂痹也其縱緩不收即經之所謂痿也其甚而上衝即經之所謂厥逆也逮夫後世則有類傷寒四證而以腳氣居其一謂凡頭痛發熱身痛便閉而但見腳膝屈弱無力者便是腳氣此説太混豫不然之夫腳氣本水濕下壅之病而實非陽邪外感證也若諸證之兼見者則若有之若以外感之腳軟者便認作腳氣則淆亂意見大不通也又曰腳氣之證其初甚微飲食動作無不如故或無他疾而急得之或因病後而漸得之及其病也則自膝至足或見麻痹或見冷痛或見痿弱或見攣急或腫或不腫或日漸枯細或蒸蒸惡熱或灑灑惡寒或如冰冷或如火熱或到底能食或不能食或有物如指發自腨腓而氣上衝心是皆腳氣之正病也其有為發熱頭痛寒熱往來或腹內作痛或見飲食則嘔吐或惡聞食氣或不欲見明或語言錯亂精神昏憒是皆腳氣之兼證也大抵此證有緩急緩者其來漸或二三月而日甚其來速或一二日而即起治之若緩恐其氣上衝心亦能殺人又曰腳氣之因有二一則自外而感一則自內而致也自外而感者以陰寒水濕雨霧之氣或坐臥濕地致令濕邪襲人皮肉筋脈而凡清濕襲虛則病始於下致為腿足之病此外因也自內而致者以肥甘過度酒醴無節或多食乳酪濕熱等物致令熱壅下焦走注足脛而日漸漸腫痛或上連手節者此內因也然在古人謂南方卑濕病多外因北方嗜酒酪病多內因此固一説然北方亦有寒濕南方豈少酒濕此固不必分南北其或內或外凡受邪氣有病始於足而漸致他證者即腳氣之謂也必察其因而治之則自無失矣又曰方書以腫為濕腳氣不腫者為乾腳氣濕者宜除濕乾者宜行氣陳無擇曰腳氣不專主一氣亦不專在一經兼有雜生諸病未易分別須尋經絡之陰陽再察脈息之虛實以為治也凡自汗走注者為風勝無汗攣急制痛者為寒勝腫滿重著為濕勝煩渴燥熱為暑勝若四氣兼中者但察其多者為勝分其表裡以施治也張景嶽曰腳氣之病實三氣之所為也然亦有虛實之異又腳氣本為壅疾古云忌用補劑然必下元不足及陽明之氣有虧者而後邪氣得以犯之此其中亦有虛證總之凡治此者只因證施治則萬全但察其因於表者以發散為主因於里者以疏利為主外因者多寒濕宜用濕熱內因者多濕熱宜用清涼若元氣本虛及病久致虛者必當培補下元不得以忌補之説為拘也又曰腳氣初起無非濕滯如無他證兼見而身體重著者單宜治濕以分利為主凡腳膝中濕或腰腿痠痛重著腫痛者宜除濕湯不問久近乾溼並可用若腳膝痠軟重著而胃氣不清或見噫氣吞酸脹滿者平胃散若腳氣浮腫而兼泄瀉者宜五苓散或胃苓湯又曰寒濕外浸致成腳氣者十居六七其證疼痛拘攣惡寒清厥脈多弦細治宜以溫經除濕為主是以古人治此之法大抵熱藥多寒藥少故每用麻黃川烏桂附乾薑之屬內經曰濕淫於內治以苦熱正以烏附麻黃走而不守故能通行經絡乾薑官桂辛甘大熱故能助陽退陰清濕既除病無不愈凡感寒濕雨水或四氣流注致成腳氣腫痛不可忍者宜雞鳴散如神若寒濕內侵陽虛陰盛胃氣不強經氣不行頑木浮腫或疼痛不用者獨活湯若寒邪入腹喘急疼痛或筋急上衝悶亂危急欲絶者茱萸丸或茱萸木瓜湯若寒濕在經血脈不和腰腳筋骨痠軟無力或拘攣疼痛脈弱而澀者酒浸牛膝丸若寒濕壅腫氣滯不行或冷或痛者立效散若寒濕兼風者如五積散小續命湯皆宜用又曰濕熱內蒸致成腳氣者多因酒食不節其證必煩熱多渴脈見滑數二便或多不利治宜利濕清火為主若濕熱下壅足脛腫痛不消者防己飲加減治之或蒼朮黃柏丸或二妙散或加味二妙丸俱妙若濕熱氣壅上衝胸腹煩渴悶亂頭痛口乾者活人犀角散若濕熱流注經絡肢節煩疼脊背沉重手足遍身疼痛熱腫者當歸拈痛湯若感冒暑濕肢節疼痛身熱口渴小便赤澀氣虛氣促者清暑益氣湯若肝腎陰虛血熱腳脊疼痛行止艱難小水不利者續斷丸又曰腳氣壅滯氣逆者其證必喘滿氣急上攻心腹甚至危急可畏治宜行滯降氣為主凡腳氣上衝心腹喘急不得眠臥者紫蘇散檳榔湯或加減檳榔湯甚者四磨飲若腳氣喘急腹滿腳腫者桑白皮散或木通散若腳氣臍下氣升衝心煩悶者木香散或檳榔散若腳氣心胸壅悶嘔逆多痰不食者半夏散或紫蘇湯若浮腫心腹痞悶小水不利大腹皮散又曰風濕合邪而為腳氣者其證必兼外感而或為寒熱往來或為喘咳氣急或流走無常或筋骨疼痛治宜以散風除濕通行經絡為主若感四時風疫風濕或處陰濕之地致為腳氣痿弱筋骨疼痛或寒熱往來者敗毒散若寒熱如瘧赤腫疼痛者加味敗毒散若腳氣以風寒濕邪客於經絡而骨髓痠痛不可忍或遍身疼痛惡寒嘔逆者五積散一法加全蠍三個入酒煎服若腳氣以風濕留滯而陰寒外閉表邪不解或咳嗽喘滿寒熱者小青龍湯若風濕留滯肢節煩疼心神壅悶者大腹子散千金云若腳氣脈大而緩宜服小續命湯二劑立瘥活人云腳氣屬冷者以小續命湯煎成入生薑自然汁服之最快若腳氣風濕勝而兼發熱咳嗽肢體疼痛者芎芷香蘇散若腳氣風濕流注憎寒發熱無汗惡寒者麻黃左經湯又曰腳氣有虛證凡脾胃肝腎之脈皆出於足邪之易入多有乘虛故肝虛則筋病腎虛則骨病脾虛則肌肉病胃虛則宗筋病或以勞欲不節或以酒濕太過或以病後失調凡內有虧損而外有腳氣者無非虛證此當以調補為主而兼察四氣以治之若肝腎陰虛感觸四氣而癱瘓頑木半身不隨腳膝無力遍體疼痛者神應養真丹或三因四斤丸或虎骨酒或八味地黃湯若脾胃大虛陰寒在下陽氣不行而病腳氣者獨活湯附子八味湯若精血不足陰虛於下氣不歸精而腳氣上逆衝心者地黃湯若脾胃虛寒兼風濕外邪而成腳氣者用引獨活湯或追毒湯若腳氣以脾腎虛寒而兼咳嗽氣逆嘔吐者兼補厚朴湯又曰腳氣有實邪凡壅盛腫痛而或為閉結或為脹滿者治宜以疏導通利為主若風濕壅盛腳氣腫痛便結腹滿者羌活導滯湯或枳實大黃湯若四氣流注陽明風熱腰腳腫痛大小便祕喘滿腹痛者大黃左經湯若腳氣飲食不消心下痞悶腿腳腫痛者開結導飲丸又曰凡腳氣腫痛之甚者可用敷藥以散之或用椒艾囊以溫之或用香散之藥煎湯以洗之如百草煎及防風荊芥威靈仙艾葉蒼朮蛇床子當歸烏藥之類皆可用或單用紫蘇或忍冬藤煎湯淋洗俱妙觀活人等書云凡腳氣服補藥及用湯淋洗者皆醫之所禁也此亦一偏之説耳蓋補有宜禁者以邪壅氣實者也淋洗有宜禁者以水濕湯氣之宜避者也如果下部虛寒或以病後或以克伐太過而腳氣不愈者豈尚堪禁補乎又寒邪濕熱壅結不散而為腫為痛者最宜以辛香疏散之藥煎湯蒸洗則退邪極速豈禁洗乎惟是濕熱逆而上衝心腹者不可驟洗恐助濕氣上升也此必先降其氣俟其毒止在腳再行熏洗自無不利蓋補以補其弱也洗以逐其滯也夫何禁之有又曰有當禁於未發之先者如外臺祕要云第一忌嗔嗔則心煩煩則腳氣發又禁大語大語則傷氣氣傷病亦發又不得露足當風入水以冷水洗足兩足脛尤不宜冷雖暑月當著帛袴至冬寒加綿常令兩脛及腿溫暖微汗尤佳依此將息腳氣自消而無邪氣留連之患夏月腠理開不宜當風取涼涼處坐臥須得勞動關節令其氣暢此拒邪之法養生之要也每食後宜行三五百步疲倦便止則腳中惡氣隨即下散雖有浮腫氣亦不上也孫真人曰古人少有此疾自永嘉南渡衣冠之人多有之此皆濕鬱於內所致也故凡四時之中皆不得久坐久立濕冷之地亦不得因酒醉汗出脫衣洗足當風取涼皆成腳氣暑月久坐久立濕地則濕熱之氣蒸人經絡病發必熱而四肢痠痛煩悶胕腫寒熱此又山野農夫多有之以久濕傷於外也楊大受曰腳氣是壅疾當用宣通之劑使氣不能成壅也如羌活導滯湯之類所宜通用又如蒼白朮防己南星以去濕羌獨活木瓜檳榔行氣利關節以去壅佐木通牛膝以引經當歸生地以和血此必用之藥也又如東垣拈痛湯之類亦甚捷余因證之虛實寒熱而辨治之此即通變活法也又曰凡腳氣初覺即灸患處二三十壯或用雷火針以導引濕氣外出及飲醪醴以通經散邪其要法也若壅既成而邪盛者必腫痛熱甚一時藥餌難散宜砭去惡血以消熱腫砭刺之後以藥繼之古無腳氣內經名厥兩漢名緩風宋齊謂腳氣內經曰傷於濕者下先受之發於外者屬足少陰太陽發於內者屬足太陰陽明千金論曰此病初得即先從腳起因即脛腫時人號為腳氣經曰緩風濕痹深師云腳弱者即此義也得此病者多不令人即覺或會他病一度乃始發動或奄然大悶經二三日不起方乃覺之久而不瘥遍及四肢腰背頭項也始起甚微食飲嬉戲氣力如故惟卒起腳屈弱不能動有此為異耳或熱悶驚悸心煩嘔吐或覺臍下冷痞愊愊然不快兼小便淋漓不似生平皆其候也馮魯瞻曰經曰諸濕腫滿皆屬脾土又曰傷於濕者下先受之蓋脾主四肢足居於下而多受濕濕鬱成熱濕熱相搏其痛作矣古名為壅疾當用宣通之劑如羌活導滯湯當歸拈痛湯之類使氣不壅而痛自愈矣古無腳氣之説內經名厥兩漢間名緩風宋齊之後謂之腳氣凡腫者名濕腳氣者筋脈弛長而軟或浮腫是也治宜利濕疏風如不腫者名乾腳氣者干即熱也筋脈蜷縮攣痛枯細而不腫者是也治宜潤血清燥有從外感者有從內傷者其為濕熱則一而已北方高燥多飲𨣒酪肉食醇酒濕熱下流所致南方卑下多濕血氣虛弱之人或遇房勞負重遠行沖冒雨雪寒濕乘虛所致大抵風寒暑濕之氣中於諸陽則病在外其證多在足外踝及足背宜散之而愈中於諸陰則病在裡其證多在足內踝及臁內宜溫利之外證自汗走注為風勝無汗疼痛攣急為寒勝腫滿重著為濕勝煩渴熱頑為暑勝如四氣兼有但推其多者為勝麻者為風痛者為熱腫者為濕寒勝則蟲皮膚中如蟲行之狀熱勝則縱蓋足六經皆能致病惟手六經不與焉寒則溫之熱則寒之在表則散在裡則下若大虛氣乏間作補湯隨病冷熱而用之不可拘執其人黑瘦者易治胖大赤白者難愈黑人耐風濕赤白人不耐風寒瘦人肉硬肥人肉軟耳其用藥當分虛實寒熱表裡如黃柏蒼朮乃濕熱必用之藥也防己獨活治腰以下至足濕熱腫盛也木瓜取入肝走筋也赤苓木通滲利其濕也肉桂烏附散寒濕也木香檳榔香附烏藥宣行氣道之劑也紅花桃仁活血行凝之劑也牛膝杜仲萆薢虎骨壯筋骨之劑也參耆白朮歸芍地黃補養氣血之劑也合宜而用則或攻或補皆可奏功錦囊又曰腳氣初起甚微多不令人識也食飲嬉戲氣力如故惟卒起腳屈弱不能動為異耳南北所感雖有內外之殊然皆由腎虛婦人病此者亦由血海虛而得之與男子腎虛同也若入腹衝心嘔吐不止危在頃刻宜八味丸溫以逐之入腎則腰腳腫小便不通目額皆有黑氣沖胸喘而呻吟左尺脈絶者死蓋腎虛陽衰之人多犯此腎乘心水剋火也故腎氣腳氣當以金匱腎氣丸預為服之也又曰南方自外而入者止下脛腫痛北方自內而致者乃或致於手節也治法初用解散次必推蕩大便以導其邪氣經曰臥出汗而風吹之凝於膚者為痹凝於脈者為泣凝於足者為厥至真要大論云太陰之勝火氣內郁流散於外足脛胕腫飲發於中胕腫於下凡內傷酒食脾胃營運之氣有虧不能上升乃下流乘其肝腎之位注於足脛加之房事不節邪氣乘虛乃為腳氣久而不愈遂成痼疾堅硬如石謂之石疽肉色紫赤皮肉潰爛名為緩疽惟宜溫補又曰腳氣或見食嘔吐憎聞食氣腹痛作瀉或二便阻塞或精神昏憒或妄語錯亂或壯熱頭痛有類傷寒名腳氣攻心多死又曰其脈浮弦者風濡弱者濕洪數者熱遲者寒微者虛牢堅者實結則因氣散則因憂緊則因怒細則因悲又曰婦人腳十指如熱油煎者皆由榮衛氣虛濕毒之氣流滯經絡上攻心則心痛下攻腳則腳痛腳指如焚如腳氣之類經云熱厥是也醫論曰腳氣之疾皆由脾腎二經虛弱坐臥行動之間而為風寒暑濕之氣所幹流注而成此疾得病之始多不令人便覺必感他病乃始發動或奄然太悶經兩三日方覺之先從腳起或緩弱疼痹行起忽倒或脛腫滿或足膝枯細或心中忪悸或小腹不仁大小便祕澀或舉體轉筋骨節痠疼或惡聞食氣見食吐逆或胸滿氣急壯熱憎寒傳足六經外證與傷寒相似但卒然腳痛為異耳其為候不一若寒中三陽所患必冷暑中三陰所患必熱脈浮而弦者起於風濡而弱者起於濕洪而數者起於熱遲而澀者起於寒風者汗之濕者燥之熱者清之寒者溫之又當隨四時表裡虛實治之切不可用溫補及湯淋洗此醫家之大戒也蓋補則氣實多致不救淋洗則邪毒入內亦難治矣治之不早使毒氣入腹衝心攻築作痛喘滿上氣嘔吐異常此則漸致傾危其可忽耶林氏曰或問足跗腫痛明系濕熱如何謂之腳氣既以氣稱亦不失為濕熱如何又有外感內因之別乾溼寒熱之異甚至衝心嘔逆譫語神昏以致於死也答曰此一氣字自與平常濕熱不同蓋非一朝一夕所致此證雖由濕熱微邪然而沉伏於足三陰經既久不能發泄鬱蒸為熱瘀而紅腫腫而後痛且足三陰之脈從足之內踝而上至於大小腹更由腹而上溢手包絡咽嗌之間故腫痛必然牽引經絡而鬱蒸之氣又自下而上逆於心胸遂至寒熱似瘧噁心嘔逆所以有類傷寒之別名況病發之初未有不由外感內因或暴怒房勞所觸發於是內外兼證夾雜倉卒難辨初學臨證茫然昧於用藥倘使表裡虛實之不別補瀉寒熱之妄投未有不至於衝心危殆者也活人編又曰或問雖曰腳氣亦不過濕熱久鬱而成有何利害以至於死若果可以致人於死則其證更凶於傷寒何以又謂之類傷寒耶況曰類者亦正與傷寒相近故亦有七日而愈七日而死十四日而愈十四日而死據此豈不可謂之腳氣傷寒乎答曰腳氣與傷寒原屬二證難以溷淆只有寒熱嘔逆及三陰三陽傳變深淺與傷寒相似故曰類也若論致死之因凡風寒暑濕之邪無有不由於經絡而傳於六腑以至五臟自輕至重自重至危何獨腳氣為然而必與傷寒並論哉又曰脈與形證此證濕熱為本客邪觸發為標發時還從足胕紅腫微痛而起腫甚則痛愈甚而鬱蒸之氣由經絡入於足三陽之腑故有寒熱交作畏寒煩躁噁心嘔逆煩渴引飲喘急譫語惡食而復能食二便祕結不通其脈浮洪弦數有力者謂之乾腳氣乃三陽經受病也若二便通利汗多不渴噁心嘔逆湯飲不受肢厥戴陽神昏譫語六脈沉伏細軟無力者謂之濕腳氣乃三陰經受病也又曰腳氣治法乾腳氣初則疏散中則和解末則潤下濕腳氣初亦疏散中亦和解末則宜乎清補男婦腳氣門主方腳氣流火黃耆生地黃杜仲五加皮木瓜當歸牛膝漢防己秦艽酒煎服取汗腳氣痛不可忍者木瓜去子忌見鐵白茯苓蒸當歸酒蒸各三兩川萆薢鹽水拌炒牛膝酒蒸各二兩薏苡仁炒四兩為末米飲為丸如梧桐子大每早白湯送下三錢永不再發又方真威靈仙洗淨陰乾搗四兩牛膝酒浸視臟腑虛實而增減研末蜜丸或酒調服忌茶以槐角湯代茶威靈仙有五驗一味極苦二色深翠三折之脆而不紉四折之有微空如胡連狀五斷處有白暈謂之鴝鵒眼一切腳氣神奇濟世方穿山甲前二足燒存性研細入麝少許多少隨人斟酌要服此藥須去他事晚間忌進飲食至夜深腹空時調服坐臥隨意及雞鳴再一服痛立止過一二日便能走履如常松葉酒千金方治腳氣十二風痹不能行松葉六十斤銼細以水四擔煮取四斗九升以釀米五斗如常造酒法另煮松葉汁以漬米並饙飯共釀封七日後澄飲之取醉得此酒力者甚衆治腳氣屢試神效絶勝諸方白殭蠶炒二兩乳香另研沒藥另研各五錢丁香一錢麻黃三兩去根留節炒黃各研為末和勻每服一兩好酒調下取醉汗出至腳為度俟汗乾即愈後用桃柳梅槐桑五樣嫩枝煎湯先飲好酒三杯洗腳止痛為妙風腳氣痛不可忍用回陽玉龍膏加乳香沒藥末酒調敷最妙洗方白蘿蔔煎湯洗又方收秋天白蘿蔔莖陰乾凡有腳氣之人每年逢冬至數九日煎洗九個九每交九即煎洗共洗九次保一年不發下年又如法洗之自不再發矣又方孔叟叟豨蘞草蒼耳草各等分煎湯熏洗又方孔叟叟品條花葉即槿槿條搗爛煎湯洗又方地骨皮劉寄奴煎湯熏洗又方錦囊香紫蘇八兩忍冬花四兩木饅頭七個蘇木二兩為粗末以水煎數沸桶盛分三度添用只一次洗完永除病根手腳氣腐爛冰片海螵蛸黃柏輕粉兒茶各等分研細乾摻三陽腳氣主方活人編防風三錢乾葛羌活各一錢五分蒼朮枳殼各一錢木通檳榔各五分生薑二片水煎早晚空心服上方疏泄表裡之風寒暑濕兼利痰氣之要藥初起宜加蘇葉一錢麻黃五分去檳榔木通使濕熱之邪從汗解散也服疏解和中丸中則加半夏一錢五分橘紅大腹皮各一錢去防風檳榔末若二便不通則加大黃三錢黃連一錢去防風羌活蒼朮服潤下丸如煩渴發躁或無汗或有汗而惡熱昏倦脈雖浮洪弦數而無力者此暑邪所感也加香茹一錢五分乾葛黃連木瓜各一錢防己五分去防風羌活蒼朮檳榔服正氣丸濕痰甚者加陳皮半夏各一錢五分澤瀉一錢服橘半枳朮丸三陰腳氣主方薏苡仁三錢茯苓皮防風各一錢五分羌活澤瀉各一錢防己大腹皮各五分生薑一片水煎早晚空心服邪在三陰誤用重濁之藥則傷元氣上方輕清利導化濕清熱之平劑也初起加乾葛二錢去腹皮中則加木瓜一錢五分去羌活末則加車前木瓜各一錢去羌活腹皮血虛內熱者加木瓜一錢五分牛膝一錢丹皮五分去薏仁羌活腹皮氣虛者加人參白朮各一錢五分去羌活腹皮服千里水真陰不足命門之火不歸者常服金匱腎氣丸陽虛者加人參一錢白朮一錢五分附子肉桂各五分去茯苓皮腹皮羌活防風防己服和中益氣丸寒濕氣腿疼不可忍者王侍柏先於街上覓穿壞草鞋不拘只數放尿桶內浸透曬乾又浸又曬如此三次將曬乾草鞋置小盆內將火引著放淨圓桶內將腿足置桶上熏之再以棉被蓋住腿足俟熏出黏汁自覺輕爽一二次愈又方象糞曬乾燒煙燻之除根輕腳氣治腳氣當歸川萆薢鹽水煮乾川芎石楠葉檳榔薏苡仁蒼朮米泔浸鹽炒川續斷獨活五加皮杜仲薑汁炒北細辛枳殼宣木瓜羌活川牛膝各一兩麻黃去節威靈仙廣木香五靈脂海桐皮各七錢五分乳香去油沒藥去油各五錢上為末酒浸雪糕為丸桐子大每服五十丸食前木瓜湯下桑寄生丸治腳氣羌活桑寄生防風白朮各三兩杜仲川續斷赤芍藥薏苡仁當歸獨活白茯苓各二兩蒼朮四兩紅花五錢川芎八錢宣木瓜三兩六錢上為細末水疊為丸每服三錢白湯送下洗方威靈仙防風地骨皮荊芥當歸尾升麻赤芍藥各等分煎湯洗又方金銀花防風豬蹄殼荊芥車前草桃枝透骨草柳枝煎湯洗又方杉木橘葉煎湯洗腳氣衝心礬石煎湯浸腳新增江蘇揚州府江甘儀三邑婦女腳氣門主論江南揚州府江都甘泉儀徵三縣婦女腳氣始自康熙五十年間從前並無此證此乃得於陰陽錯謬之沴氣非上古男婦濕熱壅腫五痹之腳氣也其感受也皆由於富貴之家性情驕傲稍不如意恚怒易生安享太過飲食無節傷飢失飽喜飧生冷亦有女子婚姻愆期經事驟閉或配非其偶抑鬱不舒肝氣凝結脾氣鬱滯是以肝脾兩傷肝血日虧肝氣日增肝氣日增肝無血養筋脈拘攣脾氣日困胃陽不振脾失健運濕熱漸生肚口不寬加之飲食非時七情自戕初見證也月事不調肚口作痛嘔吐酸水緑水痰涎身體大腿作酸小腿漸痛臍下或左或右必有或長或圓氣塊作梗拍拍跳動由上而下覺肚口稍寬則疼痛至足脛趺口熱如火烙再則痛至足指指甲縫中痛如針刺日夜喊叫欲生不可欲死不能忽而足痛稍定則肚口依然脹悶甚則面色呈青目睛倒視胸前非重手按捺男子腳跟踹住則昏厥不省人事兩足非婦女替換揉搓不能少定痛楚更有四肢搐搦頭項動搖昏厥僵仆有一二時而蘇或半日而蘇者無論體之強弱但能清餓七日其痛漸定亦有十四朝二十一朝始能漸定者此又在醫之用藥善與不善及病家妄與粥湯吊住邪氣之所致也考腳氣之論古時有乾腳氣濕腳氣之稱乾腳氣其痛也足脛趺指乾瘦疼痛無汗濕腳氣其痛也足脛趺指紅腫疼痛有汗足指縫中流水今揚地俗呼亦有公母之稱公腳氣其痛也腫而色白治之縱愈不能望其生育因其血氣大虧經必過期而至慳澀無多母腳氣其痛也腫而色紅其熱如烙經多先期而至治之如法尚可望其生育大勢皆由肝脾素虧邪由虛召施治之法因風寒而發者但散風寒因暑濕而發者但清暑濕因飲食生冷而發者但溫中化滯因氣惱恚怒而發者但平肝散郁如法治之先分其勢其發必輕但病者當平時無病須作有病想服丸藥每早以養血調經寧神散郁為主如調經養血丸河車大造丸益母八珍丸香附女金丹益氣養榮丸之類蓋陰藥多滯每早服之取其陽中之陽易於消化每晚以健脾和胃為主如加味六君子丸加味異功散水疊資生丸和胃健脾丸之類擇而用之俱宜水法疊作小丸蓋水疊細丸入胃即化夜乃陰中之陰即胃脘新進飲食亦可藉以消化三年之內勿令間斷其患自可永除仍須病人改換性情節戒口味慎之又慎此治腳氣之大法也惜乎揚城婦女腳氣相延四五十年病家極受痛楚呼天搶地醫家惟知檢查歷朝各家五痹腳氣諸方施治無非防己木瓜秦艽萆薢威靈仙桂枝桑枝蒼朮厚朴烏藥檳榔黃柏千年健鑽地風豨蘞草五加皮海桐皮降香節肉桂附子乳香沒藥虎骨青皮等味一派損脾伐肝破氣傷陰之品舍此之外技已窮矣所以然者醫家認定濕熱先橫一腳氣上衝厥逆無救之害於胸中惟以趕其下趨為第一策罔顧病人之正氣殊不知其病始於肝脾兩虛厥氣上犯胸膈脹悶驟用攻伐峻利之藥逐其下行豈知正氣與邪氣俱陷譬夫盜賊入門自應開門逐賊今將盜賊趕入呆巷無門可遁其勢不得鑽牆挖壁奪徑而逃其如婦女十指甲中無縫可逃是以兩足十指脹痛有如針挖更有過投以上諸藥正氣大傷倉廩空虛正不敵邪邪氣得以肆橫下既無門可遁直衝而上鮮有不一沖而喪其生者至於體實者七日漸安體虛者十四日始寧更有極虛者二十一日始安其故何也斯證即如傷寒六日傳遍邪氣已衰七日天地之氣來復凝結之氣隨天地之氣來復而解自愈原非醫者追趕藥力能令七日自愈耳此又無怪乎醫者之誤當初此證初行之時醫家原無頭緒亦不知此為陰陽錯謬之沴亦不知婦女感受之由考諸方書五痹腳氣門中要不過以上諸藥投之不效只嫌病大藥輕惟有多加分兩別無他法執而不移任其痛楚七日自愈在病家延請群醫而用藥立方大概不過如此亦遂信而不疑竟至無救亦不過委之腳氣上衝本無可救之術揚城婦女四五十年罹此夭折死而不悟良可悲也是以有斯證服斯藥者初起尚輕再發即重三發愈危竟有數發而死者多矣豈知秦漢以來歷朝所著方書有曰緩風有曰弱腳有曰腳氣所立之方皆治普天下男婦風寒濕熱五痹腳氣之方並非治揚郡江甘儀三邑婦女感受陰陽錯謬之診氣而成腳痛之方也況古時男女朴實者多地土本厚今揚郡水土本薄知識易開稟受本弱兼之嬌養性成安逸太過情性乖張喜餐生冷非暴躁恚怒即沉默內郁肝脾氣鬱經事不調犯此弊端方成此病況古人雖有先見之明洞窺臟腑恐未能數千年前即逆料我朝揚郡江甘儀三邑婦女將來數千年後必有感此錯謬異氣而成此腳氣遂留諸方治之耶即使果有先見之神明何不標明某方治男婦五痹腳氣某方留治揚郡江甘儀三邑婦女腳氣耶且江甘儀三邑婦女腳氣現證情形不特蘇松常鎮江淮各郡並無此證即揚屬高郵寶應興化泰州鄰邑婦女亦未聞有此異證也至謂揚郡地處卑濕其濕熱鬱於肌表者瘡疥極多濕熱壅於腸胃者腫滿頗衆兼亦有男婦濕熱下注腿膝紅腫光亮破流脂水至晚下淋脛趺脹痛者然其初起決不由肚口作痛其紅腫脹痛亦不似此等熱如火烙痛如刀絞之慘若執古方施治何異抱薪救焚施治之法亦有用防己木瓜秦艽五加皮海桐皮海風藤川萆薢蒼朮黃柏厚朴等味而愈者此男婦脾土高阜膏粱麴櫱蘊結有餘之濕熱用之偶有效耳若以之治男婦脾土卑監飲食不運化為不足之濕熱用之則非徒無益而反有增劇之害也澄每嘆揚郡男婦飲食不調喜餐生冷脾胃潮濕精神如舊而胸膈不寬舌有潮胎不思飲食不飲茶湯竟有三四十日不進粥湯大便不行腹內腸鳴時或泄氣仍可應酬嬉戲者投以蒼朴香砂薑桂萸附等劑其病漸愈湯藥服之已多但能進食即止煎劑數月之後其病又作形證既同醫家照前蒼朴混投而病家因前功既建視蒼朴如參苓亦堅信而不疑殊不知脾為萬物之母胃為水穀之海初病脾土壅遏非蒼朴不足以平胃土胃土既平則萬物發生此至理也醫者病者未悉治農之理高者平之窪者培之土地既平之後必如農夫墾田調其灌溉滋之培之然後能發生五穀萬物資生今醫者病者第以平胃為治濕之金丹日事蒼朴平胃是將可耕之田平而又平漸平成一聚水之深塘但有水液痰涎未有不歸之脾胃虛虛之禍可無戒哉澄意治斯證者高阜自應平胃卑監惟宜健脾輕者消補兼施重者補火生土非薑附理中湯即桂附六君子病愈之後六君子丸加味異功丸金匱腎氣丸七味地黃丸歸芍六君子丸水疊資生丸按證施用自可永除脾胃濕熱之患矣澄因僑居揚郡診視既久婦女腳氣及男婦濕熱之證極多每見婦女腳氣悲痛號呼披頭散髮抽掣咬牙殊令人驚心慘目是以悉心審察病情探本尋源另開生面投之藥劑無不旋愈始知前醫未識病由妄投攻下以致病家戕其生者不可勝數今澄既已獲效於前不敢祕其法而不傳爰特增此門質諸高明君子凡我同道診視此等證候務循此法不至仍前錯誤則不但病者受福即司醫者亦可種德於無窮矣謹論腳氣之患多患於富貴之家而經紀小戶從無腳氣可見富貴之家奉養太過安逸過甚以日繼夜以夜繼日貪頑則當食不餐愛者則啖之無厭稍有怫鬱則恚怒頻生語言微犯則含蓄不釋是以肝脾受傷易於感召也至於經紀小戶婦女非勤於針工即勞於操作便得菜飯充腸一衫蔽體既無分外之求更無奢靡之想筋骨雖勞氣血反暢藜藿充飢脾無壅滯縱有濕熱相干輕則生瘡患疥甚則腿腳紅腫而已腳氣之邪未能幹犯也且婦女腳氣一染先從胸膈脹悶肚口作痛嘔吐痰涎緑水胸前有埂按之搏手漸則腰腿痠痛由上而下痛至足脛趺指則胸膈漸寬倏然腿腳疼痛稍減胸膈漸加脹悶或則上攻或則下注其患儼如竹夫人肚中球子滾上滾下胸膈稍寬腳下必痛腳下稍定胸膈必脹甚則混投粥飯油湯邪氣上衝一沖即厥屢厥必死所以腳氣上攻胸前要人重手緊按竟有要男子雙腳踹踏胸前乳側方免昏厥腳氣下注兩足必要二人揉搓摸撫晝夜不停更有遍身痠痛要人揉搓儼如和麵加之煎湯調藥需人豈知晝夜燈燭炭火延醫拯救一人有病十人服侍刻無寧晷且恐病人生氣多方先意承志要一奉十猶以為未足若非富貴之家焉得有如許之人服侍如許之錢措辦假使貧窮小戶一夫一婦翁姑年老子女幼小之家患此不特服侍無人日食尚且不敷憑何措此靡費再加昏厥翁姑夫壻何以堪此澄所謂陰陽錯謬之異氣者未嘗不因人而召之也所謂江甘儀三邑婦女腳氣乃陰陽錯謬之沴氣者凡患腳氣親戚婦女探視偶坐病人床沿即可傳染而成腳氣之異所以為異耳每見婆有腳氣其媳亦然母有腳氣其女亦然姊有腳氣其妹亦然妯有腳氣其娌亦然傳染者固多不傳染者亦復有之婦女腳氣有一種滴酒不可飲者有一種平時戒飲惟舉發時非酒不能稍定其痛竟有飲燒酒者想來酒能亂性昏神不過一醉神昏即不知錐痛矣凡患腳氣痛止忌人問其仍痛與否但遇有問之者痛必復作凡患腳氣最忌人談説他人腳氣但聞此語其病必發此乃肝虛膽怯所致耳凡患腳氣婦女清餓以痛止胸寬為率痛止只宜吃水煮飯湯漸漸吃湯飯不可先進粥湯糕湯庶免胸膈脹悶纏綿時日凡患腳氣平時當忌食物鰣魚黃魚魛魚蝦子蝦油螃蟹蛼𧑃鯉魚豬首公雞鵝鴨蛋鮮菌香菌磨菰黃瓜番瓜麵筋蒲菜芫荽茄子香瓜薺菜虀菜茨菰蠶豆黃豆糟菜腐乳醬瓜韭菜苣蒿鮮筍火酒雜酒黏食麵食變蛋蝦米苔干黃鯧豌豆頭豌豆芋子菱角御米蘿蔔石耳木耳鮮蟶河歪蛤蜊滴醋雞蛋湯圓羊肉驢肉芹菜菠菜團圓餅西瓜凡婦女腳氣舉發時忌聞香氣凡安息藝香蒼朮均不可焚燒凡婦女腳氣原不必限定七日始定但發於月經後者為日必多發於月經前者只要經水一通其邪隨經自解其痛易定可見是肝脾遏郁氣凝血滯凡婦女腳氣發後宜靜養調理須戒房事一月凡婦女有腳氣者將臨月事之前忌食生蘿蔔西瓜桃子杏子李子生藕荸薺柿子柿餅等物凡婦女腳氣嘔吐痰涎緑水不得食核桃叭嗒杏落花生松子此四物有油皆嘔家所忌凡婦女腳氣平時宜戒暴怒鬱悶必須自惜身命改換性情無病時作有病想方能不發雙鉤藤鉤祛風舒筋腳氣定痛聖藥宜多用新增江蘇揚州府江甘儀三邑婦女腳氣門主方獨活湯治婦女腳氣感風寒而發者遍身腰腿痠痛獨活防風荊芥赤芍陳皮半夏厚朴蘇葉白水煎或加鉤藤鉤加味二陳湯治婦女腳氣因飲食而發者胸膈脹悶噁心嘔吐痰涎緑水足膝痠痛廣皮半夏白茯苓厚朴炒山楂香附砂仁澤瀉蘇梗獨活白水煎胸膈不寬加枳殼痛加鉤藤鉤發熱加防風荊芥赤芍解鬱湯治婦女腳氣因氣惱恚怒而發者兩脅作脹腿腳痠痛蘇葉廣陳皮半夏當歸鬱金香附白芍遠志肉白茯苓青皮醋炒鉤藤鉤白水煎氣澀加煨木香鎮風湯治婦女腳氣肝風內鼓搐搦拘攣心中跳動腿腳錐痛面青厥逆橘紅半夏白茯神鉤藤鉤明天麻白芍當歸秦艽棗仁川續斷白水煎或加癩葡萄藤一錢或加赤金為引清暑湯治婦女腳氣因暑邪而發者葛根防風赤芍厚朴赤茯苓澤瀉麥門冬青蒿秦艽白水煎健脾異功丸治婦女脾胃失調飲食不運面目痿黃肌膚消瘦每晚服之人參去蘆一兩於白朮東壁土炒三兩白茯苓飯上蒸二兩粉甘草蜜炙五錢廣陳皮飯上蒸二兩製半夏薑汁炒二兩六神麯炒一兩五錢薏苡仁炒二兩陳枳殼麩炒一兩五錢澤瀉鹽水炒一兩五穀蟲新瓦焙二兩懷山藥炒黃二兩穀芽炒香一兩菟絲餅命火衰微始用雞肫皮新瓦焙二兩上制畢磨為細末水法疊丸如緑豆大每晚白湯送下二錢加味養榮丸治婦女腳氣心虛血少怔忡心悸肝脾不足調經養血非此不效當歸身酒洗焙三兩白茯神人乳蒸二兩肥玉竹焙二兩杭白芍酒炒二兩酸棗仁炒熟二兩丹參酒炒二兩遠志肉甘草湯焙二兩柏子仁二兩川續斷酒炒二兩橘紅飯上蒸一兩杜仲鹽水炒二兩秦艽酒炒一兩五錢女貞實蜜拌蒸二兩鉤藤鉤四兩同石斛熬鬱金二兩上制畢磨細末用金叉石斛一斤同鉤藤鉤四兩熬膏和丸如豌豆大每早白湯送下三錢醒脾和榮湯治婦女腳氣疼痛漸定者宜服橘紅茯神半曲當歸女貞子石斛丹參白芍棗仁澤瀉穀芽薏苡仁神麯麥芽香附山藥秦艽川續斷杜仲柏子仁蓮子肉熟地玉竹人參菟絲餅火微加益母草臨經加元胡索腹痛加桑枝益智仁涎唾加紅花經少加鬱金氣鬱加金橘葉白豆蔻胃不和加砂仁胃寒加煨木香氣痛加佛手半夏痰多加陳皮枳殼大便閉加香櫞車前子小便閉加北沙參鉤藤鉤麥冬以上諸藥按證摘用神而明之貴乎當也惟當忌之藥臚列於下司醫者萬勿輕投以免虛虛之禍不可大意防己檳榔木瓜桂枝穿山甲杉木節乾薑川萆薢五加皮海桐皮海風藤蘇子乳香沒藥威靈仙豨蘞草千年健鑽地風蒼朮烏藥黃柏虎骨菖蒲引邪入心虎骨膠降真香沉香川牛膝懷牛膝以上諸品均為大禁凡誤作有餘風寒濕痹輕投上藥必致輕變重而重變亡縱不即喪其生必罹愈發愈凶之患不可不慎腳氣奇方鮮癩葡萄連穰子放陰陽瓦焙乾存性研末每服一錢白湯或木瓜酒調服立可止痛又方癩葡萄藤切片浸酒每飲一小杯其味雖苦久久飲之可除此患此藤陰乾每用一二錢能定小兒驚風大小男婦暑驚又能治孕婦嘔吐不止兼治遍身筋痛又方翻白草洗淨浸酒每飲一杯立可止痛又方鮮鳳尾草朝北者洗淨煎湯服之止痛又方牛皮膠切片同麩炒成珠研細末每用酒調服一二錢止痛又方穿山甲二兩白芷三奈甘遂皂角刺羌活乳香去油沒藥去油甘松殭蠶各一兩共研細末摻腳帶上纏腳不發椒艾囊艾葉半斤揉川椒一斤草烏二兩研粗末三味和勻用興紅布做褥如綿褥狀包足底春夏時不用火烘秋冬宜微火烘使椒艾氣得行於足自然寒濕風毒諸氣皆能消散立可止痛平日仍要夜夜包好睡又方雞蛋清隔湯略燉溫掃上熱痛自止又方田中黃土曬燥研細代礬搽腳其根自除洗腳氣宣木瓜秦艽各二兩生薑連須蔥各八兩上熬湯待溫先熏後洗外用生薑汁調幹面敷又方干桑葉五錢平時三五日煎湯洗腳除根白芥子研細末酒調敷
