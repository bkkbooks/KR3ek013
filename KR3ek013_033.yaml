body:
  text: 卷三十三痘疹部下自痘疹主治諸方以及痘疔痘癰皆匯於此部中以便檢閱參治痘疹門主方夾熱見痘大小便紅血熱甚者邵公一百三方當歸白芍牛蒡子升麻黃連熟地枳殼山梔地骨皮木通水煎服痘上面收完足下收遲聲音不亮天花粉桔梗甘草訶子肉防風陳皮白茯苓葛根石膏燈心引煎痘滿面連肉一片紅者升麻少許陳皮紫草紅花枳殼甘草黃連炒黃芩炒生地木通蘇木水煎服痘頂陷稠密者人參桔梗川芎白茯苓白朮土炒甘草白芷生黃耆紫草防風穿山甲炮水煎服痘內中有大紫泡者紅花淫羊藿白朮白羊糞甘草水煎服痘口鼻中並出蛔蟲者防風當歸黃連直殭蠶木通熟地牡蠣牡丹皮水煎服痘飲食挫喉痰涎盛者桔梗熟地防風陳皮川貝母麥門冬栝蔞仁厚朴北五味杏仁牛蒡子天花粉水煎服外用山豆根磨水漱口痘灰白全無血色者人參白朮當歸甘草黃耆白芍熟地肉桂川芎穿山甲炮水酒各半煎服痘泄瀉不止者人參白朮廣木香訶子肉麥門冬肉豆蔻麵包煨去油烏梅棗引煎加人牙煅乳酒調服痘胸腹脹悶亂氣促者赤茯苓川芎當歸熟地山楂肉麥門冬檳榔枳實木通枳殼大腹皮澤瀉水煎服痘初出血點皮肉白者生地黃連炒枳殼牡丹皮陳皮紫草木通川芎甘草棗引煎半熟時加當歸痘黑陷成斑摸不礙手者升麻紫草陳皮牛蒡子熟地枳殼紅花穿山甲黃豆四十粒生地糯米引煎服痘自首至尾熱不除者地膚子連翹當歸柴胡地骨皮甘草牛蒡子前胡防風紫草黃芩生石膏水煎服痘遍身作癢者人參川芎生地何首烏白芍淫羊藿生黃耆穿山甲白茯苓薑棗引煎服如不止宜燒燈火痘後泄瀉不止者人參白茯苓白朮廣木香川芎白豆蔻肉桂訶子肉山藥香附薑棗引煎服痘狂亂語言不正者人參遠志肉茯神天門冬山楂石菖蒲燈心十四根用水煎服若還不愈用滑石辰砂各三分冰片五釐燈心湯服痘將收厭遍身黑陷膿臭濕爛者防風羌活桔梗荊芥柴胡黃柏木通甘草水煎服痘如十二三朝不能靨者人參何首烏黃耆各一錢水煎入象牙炒黃色一錢研調服痘初起吐瀉不止者陳皮半夏直殭蠶山楂白茯苓黃豆七粒薑棗引煎服痘初出大熱稠密半隱肌膚者牛蒡子防風升麻白朮白芍水煎服又方荷葉絲瓜穰麻黃肉桂甘草紫草蟬蛻水煎服神燈照解痘靨轉凶為吉歌痘不起兮怎奈何我有神燈通竅多照動乾坎方為主次照大處太陽窩一日三次周流照其痘中間定發窠此法上仙留下世醫家少會照沉疴紫草上白芷上沉香中北細辛中三奈中乳香中檀香中肉桂下共乳細末將藥擲入紙條內用麻油黃蠟各五錢熬化將藥捻拖之燃照痘兒面部周身一日數照以解其靨異功散治痘風寒滋氣血和陰陽救表裡人參廣木香陳皮肉豆蔻官桂白茯苓當歸熟附子厚朴母丁香半夏白朮薑棗引煎服若還用之不當只消一服即亡小異功散治痘喘嗽人參麥門冬杏仁北五味陳皮白朮水煎服溫中湯治痘三朝身涼不渴口氣冷痘淡白二便清利陳皮厚朴人參白茯苓黃耆官桂半夏當歸川芎熟地姜引煎服泄瀉加白朮澤瀉再不止加訶子肉肉豆蔻能保脾胃助氣血數劑必灌稠漿托裡湯人參黃耆當歸防風青皮生地水煎服痘不起速服莫待痘苗枯內托均氣散十二仙方治痘初熱蘇葉八分乾葛七分廣木香六分黃耆川芎甘草各五分桔梗四分白芍紫草各三分筍七片引煎服蘇發散治小兒感冒傷寒傷風咳嗽流涕蘇葉陳皮各一錢蒼朮甘草各七分厚朴枳殼各三分蔥引煎服灌膿起頂湯治痘不起發人參七分黃耆二錢白芷甘枸杞各一錢淫羊藿川芎甘草各五分黃豆七粒薑棗引煎服結靨散治痘不收作癢白芷一錢何首烏七分川芎甘草各五分木通蟬蛻各三分白朮荷葉各二分水煎服堅腸湯治痘泄瀉黃耆白朮肉豆蔻各一錢山楂肉七分川芎五分升麻三分棗引煎服鎮胃散治痘嘔吐不止藿香砂仁白朮薑棗糯米七粒引煎服利咽散治痘咽喉疼痛難進飲食山豆根一錢桔梗七分甘草一分元參一分五釐綠豆十粒水煎服通腸湯治痘大小便秘結如神黑芝麻三錢大黃滑石枳殼各一錢當歸五分綠豆七粒水煎服加牛膝一錢引經易下滑利散治痘小便不通木通三分茯苓七分澤瀉五錢燈心二十根水煎服定疼散治痘肚疼或冷氣神麯山楂當歸熟附子良薑甘草棗引煎服斬關散痘鼻血不止生地牡皮黃芩各五分茅根升麻各三錢藕節一錢綠豆五十粒引煎服之奪命丹治小兒風搐痰氣急慢二驚如神犀牛黃青黛甘草各一錢鬱金明天麻白殭蠶白附子全蠍去頭足茯神蟬蛻去頭足陳膽星各二錢鉤藤鉤桔梗硃砂各五分研細蜜丸芡實大金箔三十張為衣每服一丸金銀花煎湯調服神驗稀痘丹預服可免痘瘡絲瓜蒂燒存性五錢犀牛黃一錢辰砂七分蟬酥乳化二錢共為細末一歲一分砂糖湯調服大解散黃耆羌活各二錢赤芍藥桔梗各七分白芷黃連甘草各五分地膚子川芎各三分明天麻二分水煎服紫草透肌湯紫草二錢防風荊芥薄荷山楂肉梔子甘草各等分水煎服笑逢散山梔仁蟬蛻各等分水煎服七貞湯治痘二三日可服升麻六錢川芎五分甘草三錢薄荷八分淫羊藿一錢穿山甲土炒二片水煎服牙托散人牙人乳制過一個麝香二分研細生酒調服拔疔丹治痘疔雄黃硃砂白芷各等分乳細油胭脂調用銀針挑破搓之實腸湯治痘泄瀉白朮土炒一錢赤石脂五分甘草四分龍骨三分枯礬二分水煎服淫羊補漿湯治痘不灌漿淫羊藿人參白朮土炒穿山甲炮各二錢防風生地甘草川當歸黃豆炒各三錢官桂廣木香川芎白芷陳皮各一錢白茯苓黃耆各五分糯米五錢竹筍煎汁當水煎不拘時服益氣收漿湯治痘不收靨何首烏白芍黃耆桔梗各二錢人參七分白朮三錢陳皮砂仁甘草各一錢山楂肉一錢二分米泔水煎服昇天散杏仁防風甘草麻黃梔子乾葛乾薑各五分水煎服升麻劑升麻肉桂豬苓澤瀉白茯苓黃耆甘草各等分烏梅一個水煎服清血退心湯麻黃山梔官桂薑黃蒲黃木通連翹甘草各等分水煎服獨活消痰飲半夏天南星乾葛羌活木通甘草各等分水煎服解毒散黃芩梔子連翹烏梅蘇薄荷甘草各等分水煎服開關散直殭蠶炒去絲一錢陳膽星麝香各二分水煎服陰陽湯黃耆白茯苓白朮山楂肉甘草木通砂仁杏仁各等分水煎服化積止利湯神麯廣木香檳榔黃連砂仁麥芽水煎服敗毒清涼飲防風白芍白朮羌活黃耆獨活杏仁甘草梔子各等分水煎服水楊柳湯水楊柳春冬用根秋夏用枝葉五斤水一大鍋煎五六沸先用數杓於木盆內以手探試不可太熱慢慢添湯洗之拭乾然後以神燈照其周身如陷塌處有暈腳起系便是漿影也後必滿足倘若不滿又如前法洗之如虛弱者只洗頭面四肢若洗照不起發者則津液枯槁難治矣四味升葛湯治痘三日前後可用升麻葛根芍藥甘草水煎服和勸湯升麻葛根芍藥甘草人參川芎羌活防風各等分水煎服四配清中飲治痘七日前可用當歸芍藥甘草大黃水煎服解毒三賢飲治痘十四日前後可用鼠黏子荊芥甘草水煎服連翹飲治痘十四朝用連翹荊芥芍藥鼠黏子當歸木通防風滑石瞿麥車前子蟬蛻梔子黃芩柴胡甘草各等分水煎服參蘇飲人參紫蘇葉半夏陳皮甘草前胡桔梗枳殼乾葛各等分水煎服四苓湯止水瀉豬苓澤瀉白朮白茯苓水煎服白螺散治痘不收靨古土牆上白螺螄殼洗淨煅乳細末乾摻金華散治痘後肥瘡疳瘡疥癬能涼肌解毒收水黃丹黃柏黃耆黃連大黃輕粉麝香共乳細濕瘡乾摻燥瘡熬豬油調搓加味平胃散治小兒吐乳吐食泄瀉傷寒等證蒼朮八分芍藥一錢白朮神麯陳皮厚朴各五錢白芷甘草各三分上為細末人參湯調服吐瀉相兼用木香湯下飲食不思山楂湯下煩躁口渴麥冬湯下二便不利木通湯下夜間啼哭元胡青皮湯下諸般雜證米湯下肚痛不止芍藥花粉湯下四仙湯此為治痘之主宰而君臣佐使出入加減全在慧心淫羊藿陳皮天門冬甘草姜三片棗三枚水一盅煎七分服痘肚痛渴泄氣促加天花粉二分白茯苓三分痘身熱見紅糞加牡丹皮赤芍黃芩黃連甘草痘身熱大小便不利加木通燈草痘身熱暴躁心神不安加棗仁黃芩天冬各三錢痘根窠不紅加人參白朮黃芩入人牙為佐痘不紅潤加人參白朮當歸木香地黃痘前後吐瀉加白朮藿香白豆蔻痘泄瀉不止小便不利加白豆蔻陳皮訶子白芍痘飲食挫喉加桔梗貝母殭蠶上香痘咬牙寒戰加附子桂枝丁香少許痘口裂加生地天門冬枯芩白茯苓葛根痘初熱驚風加殭蠶天麻烏梅硃砂痘咬牙加人參丁香三粒痘頂陷加紫草蟬蛻去頭足糯米四十九粒痘頭足冷加附子二片廣木香二分痘手指冷加附子乾薑各三分痘鼻流清涕加蘇葉桔梗各一錢痘泄瀉加訶子肉桂麥冬痘痰壅嘔吐加藿香生薑各五分杏仁三分痘鼻中出血加犀角赤芍生地天門冬痘汗出不幹加黃耆一錢浮小麥四十粒痘初出遍身黑色者加丁香一粒陳皮白朮砂仁痘唇口相連者加麥冬梔子酒炒用痘前後舌疼者加麥冬石膏知母痘大小便結加木通燈心車前子痘手足拘痙加木瓜牛膝桑寄生量日期加減痘牙黑加黃連香白芷痘發疔毒加荊芥梔子牛蒡子痘後失音加訶子皮桔梗麥冬五味子痘後夜啼加麥冬青皮生地茯神硃砂痘後中風不語加天南星天麻辰砂春秋加麥冬五味子痘後腰痛加地膚子破故紙量日期加此二味痘吐蛔蟲加附子一片丁香一個人參二分再將蛔蟲燒灰共研細末和服孕婦痘加苧根砂仁各五分和中散白朮陳皮各一錢人參藿香白茯苓甘草各五分半夏八分姜引煎服托裡千金散人參當歸各一錢廣木香厚朴甘草香附各五分川芎白芍藥各七分白芷八分桔梗四分糯米四十九粒雞汁一盅筍二兩煎服熱痘未出者升麻紫草蘇葉白芍牛蒡子甘草山楂蔥白一根煎服如表之仍不出其痘勢重可加敗毒散一歲用一分稀痘湯看耳後紅筋枝葉者乃兩經齊發未出者升麻葛根芍藥甘草各等分水煎服如一經發者加牛蒡子罩胎法妊婦出痘先護其胎後再治痘人參白朮當歸枳殼赤茯苓甘草陳皮防風白芍條芩荊芥桔梗紫草赤芍白芷柴胡葛根阿膠砂仁懷山藥川芎糯米各等分乾柿蒂七個野苧根七寸甜瓜蒂一個金器一件為引入罐內以薄荷葉封口煎空心服如大熱加鬱金換痘法服之壞痘換為好痘即痘之狼狽時亦可服穿山甲先以紫草汁煮過再用甘草汁煮過焙乾研細每用一兩綠萼梅淨瓣六錢西牛黃麝香各少許共乳細末瓷瓶貯年長者每服八九分小者服五六分俱用綠豆赤豆黑豆蔥姜煎湯服救痘不灌漿一服即灌粉甘草不拘多少切片入青竹筒內上留一孔以竹針塞住外以荷葉油紙包紮數層冬至日放入糞坑內至春取起陰乾掛風頭每用三錢研細以參朮湯調下即發臭汗一身其漿即灌換痘法大田螺三兩去殼取肉入麝香三分牛蒡子九分搗爛用帛包裹數層放在痘兒臍上以熨斗熨臍待其藥紙俱干為度大便出如黑糖之狀後用湯藥一二服可也湯藥方乾葛白芍牛蒡子槐花檳榔甘草煎滾再投大黃服量人虛實如何再用紫草透肌湯治之換痘法煅山甲不拘多少入罐內以蠟固口放地上三日入微火炙七次取出研末每次服一分薑湯調服痘收氣將絕胎元人牙人乳制鹿牙人乳制雞蛋黃耆人參純陽草白朮陳皮甘草各等分共乳細末用人乳薑汁調灌即刻回生痘遊移之間初發熱之時用為主荔枝肉元眼肉大棗各七枚糯米七十粒姜引煎服其痘即發出化斑湯痘瘡夾癍黃連何首烏連翹馬