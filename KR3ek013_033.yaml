香叩齒日出時望東吸氣一口吹布藥上向太陽密咒一氣七遍咒曰神仙真藥體合自然嬰兒吞服天地齊年吾奉太上老君急急如律令勅代天宣化丸嘉靖甲午春痘毒流行病死者十八九乃一厄也時有預服三豆湯絲瓜辰砂散乃方書所載預解痘毒之法靡不用之未見其效予竊思痘疹疫癘之毒因歲運災眚之變難以藥解而人事未盡又不可委之天數也於是檢閱古方乃於韓氏醫通得五瘟丹以五運為主喜曰此解毒神藥也依方修合施售與人但服之者莫不輕疏人皆神之故名之甘草甲己年為君土黃芩乙庚年為君金黃柏丙辛年為君水黃連戊癸年為君火山梔丁壬年為君木連翹佐牛蒡子佐山豆根佐先視其年所屬者為君次四味為臣君藥倍用臣藥減半佐視臣又減半共為極細末於冬至日修合取雪水煮升麻汁打麵糊丸辰砂為衣竹葉煎湯下快斑湯治起發遲人參五分當歸防風木通各一錢甘草三分木香紫草蟬蛻各二分水煎服內托散治氣血虛損或風穢沖觸使瘡毒內陷伏而不出或出而不勻快此活血勻氣調胃補虛內托使之盡出易收易靨人參黃耆當歸各二錢川芎桔梗厚朴薑汁炒白芷生甘草各一錢木通肉桂各三分此方紅紫黑陷屬熱毒者去肉桂加紫草紅花黃芩若淡白陷黑陷伏屬虛寒者加丁香救里肉桂救表當貫而不貫者倍參耆當歸煎熟入人乳好酒溫服泄瀉加丁香乾薑肉豆蔻真人解毒湯治痘母忍冬花八兩甘草節一兩木通荊芥防風連翹各三錢分三劑水酒各半煎以腫消痘出為度紫草飲治痘瘡黑陷不起紫草芍藥麻黃當歸甘草各等分水煎服加味四聖散治痘黑陷倒陷紫草木通木香黃耆炙川芎甘草人參各等分蟬蛻十個糯米百粒水煎服元參地黃湯治痘疹衄血元參生地丹皮山梔甘草升麻各五分白芍一錢蒲黃炒五分水煎服神應膏敷護防痘入目黃柏一兩甘草四兩真綠豆粉一兩五錢紅花二兩研細末胭脂水同蜜調塗兩眶四畔痘上麻黃湯治痘初發熱而喘麻黃杏仁甘草各等分石膏加倍一方無石膏有桑白皮臘茶葉一錢煎服清金散火湯治痘疹初發熱而喘麻黃蘇葉桔梗牛蒡子炒甘草水煎服如腹脹加厚朴大腹皮大小便秘加炒葶藶梔子粉撲法治汗出太多不止黃連牡蠣粉刺貝母各五錢粳米粉一升為細末撲身上敗蒲散止汗故蒲扇燒灰每服三錢溫酒調下三匙秘傳復生散治痘瘡黑陷不起發珍珠琥珀雄黃硃砂穿山甲兩頭尖香附米各一錢真蟾酥五錢人乳浸化研細和勻一歲兒服八釐二三歲服一分二釐用熟蜜水調下安胎飲治娠婦痘疹必用之方實條芩沉水者二錢人參當歸身白朮白芍大腹皮黑豆汁浸酒洗陳皮川芎紫蘇葉各八分砂仁連殼炒研甘草各五分糯米一攝煎溫服辰砂益元散治痘熱毒太甚狂言燥渴欲飲水者飛滑石六兩甘草末一兩飛辰砂三錢合勻每服一錢燈心湯下大人加倍四順清涼飲治里證熱大便結當歸白芍大黃甘草水煎服胭脂塗法治黑痘良方先用升麻一味煎濃汁去渣將胭脂於湯內揉汁就以本綿蘸湯於痘上試之痘疔門主論喜泰順曰夫疔者乃毒火鬱結腠理秘密發熱之後先著其疔或三五粒或一兩點獨大色赤平扁而闊出來必貫黃漿次日即行收靨見必煩躁狂亂辨認得真即宜銀針挑破口含清水吸去惡血外以雞冠血點之或以拔毒散敷之大用清涼發表之劑痘方得出書云冷疔先見諸痘不敢彰形若不早刺則毒火鬱結久則走黃遍身發腫痘來隱隱不能出竅束手待斃悔無及矣醫者慎之陳實功曰痘毒升發未盡留毒心肝二經發為痘疔初生紫點次日變黑浮高而潤者毒淺深陷而焦者毒深其發多在七朝上下將靨之際生於臀腿手足身溫疤潤聲清者吉發在肚腹腰腎身熱色枯聾啞者凶凡遇此證急用針刺疔根插入蟾酥條候四邊裂縫疔搖者用刀割去搓玉紅膏收口如針刺無血插藥乾枯不變膿者終為不吉但此證屬有餘首尾但宜加減鼠黏子湯主之正宗痘疔門主方加減鼠黏子湯鼠黏子知母天花粉山梔荊芥各六分甘草三分竹葉燈心各二十四件水煎服拔毒散專治痘疔及賊痘等證如神透明雄黃不拘多少研細再將滾水泡棉胭脂取濃汁調點疔頭上四聖丹專點痘疔即刻回生牛黃一錢二分兒茶一錢七分硃砂八分珍珠二分乳細用口嚼胭脂調勻點之珍珠膏治痘不發必有痘疔黑而大臭者宜急點之珍珠五顆豌豆四十九粒發灰一錢乳細用胭脂汁調膏撥疔點之黑疔即變紅活矣痘疔甘蔗渣曬乾真香油點燈燒成灰以津唾調勻銀簪挑破點上立效又方珍珠研末油胭脂調搓神效痘癰門主論喜泰順曰痘瘡發毒多見於外靨之證膿漿潰爛何由而足雖云變臭生意已成必發癰毒方為穩兆發於四肢則傷手足發於頭頂硬處為佳內服消風化毒湯外用生黃豆嚼而敷之此險中得順百無一失也邵慈庵曰凡有遲延日久而起不圓潤而靨既平之際又發癰腫人固知其餘毒而不知為何經當辨之但氣高喘急胸滿肚壯者餘毒在肺也痰涎稠黏口咬嘎齒泄瀉不止口臭者餘毒在脾胃也盜汗熱不退而渴者餘毒在心也夢中多驚餘毒在肝也耳朵尚熱餘毒在腎也眼合不開身腫不消內熱不清鬱悶不樂者餘毒諸經皆有矣心法曰痘後餘毒發出小如李者為毒大如桃者為癰單生一個者毒在肌肉屬順易治連發數處者船小載重屬險若結於骨節之間或成對發出者其毒已盛潰破之後滲泄氣血不能斂已屬逆證陳實功曰痘癰即是痘毒緣溜漿不足毒流於脾肺二經致手腳胸背結成漫腫大如桃李此多發於收靨之後身涼不渴者吉初起嚼生黃豆敷之自消已成用太乙膏貼侯膿熟針之元氣虛弱者保元湯助脾健胃為主正宗胡公弼曰痘癰宜大連翹飲主之大便秘加酒炒大黃微利之如疹後風瘡加金銀花竇漢卿曰發於面項胸脅者難治生四肢者易治澄曰凡痘後發熱即是餘毒未盡不曾多服敗毒藥防發痘毒宜仔細脫衣看視乘早消除又曰發於關鍵要害處及氣血虧敗者險又曰痘毒切不可開刀痘癰門主方三豆丹扁鵲敷痘毒聖藥黃豆赤小豆綠豆各一合用醋浸搗研濃漿時時以鵝翎掃上紅腫退去其效如神三豆飲扁鵲凡遇時令不正宜預服此以疏解之黃豆赤小豆綠豆各一升甘草節二兩水煮熟食豆飲汁七日乃止永保無患保元湯痘癰出膿之後脾胃虛弱膿清不斂者服之人參白朮黃耆各一錢甘草三分姜一片棗二枚煎食遠服綿繭散痘後餘毒流注各處出清水者出蛾綿繭不拘多少用生明礬末填滿煅灰乾摻回毒即消丹岐天師人參二錢金銀花五錢甘草一錢元參三錢水二碗煎三分與小兒服之一劑即消大半二劑痊愈付符一道焚在藥中煎汁神效凡服藥不效焚符於藥中煎藥與小兒飲之十人十生符式咒曰小兒有病病魔作祟吾今施符治無不愈吾奉天師岐真君律令敕書符前唸咒一遍書畢又唸咒一遍焚於藥內又唸咒一遍此秘訣也歲久不愈神方岐天師黃耆二兩生甘草二錢白芥子三錢柴胡肉桂各五分人參白朮當歸金銀花各一兩薏苡仁三兩先將薏苡仁用水四碗煎汁二碗再煎前藥半碗飢服一劑後用黃耆薏苡仁金銀花各一兩白朮當歸各五錢生甘草白芥子各二錢陳皮三錢水三碗煎半碗四劑痊愈其服藥之時更須用藥洗之金銀花一兩甘草三錢生蔥三根水二碗煎洗之痘毒潰爛不愈干百合為細末摻之數次即愈痘毒鵝肉蒸熟淡吃其毒自消消痘毒瑞香花葉同冰糖搗敷中留一孔透氣自消消痘毒糯稻草燒灰入筲箕內以滾水淋三遍取稻草浸灰敷之自消消痘毒張絅如屢驗方大蚌一個只取肉用黃土四圍封固火煨至紅只取蚌肉存性研末油調敷立消豆癰潰爛不愈剝泥蛤蛥皮貼上即愈痘毒錢青掄新瓦磨光洗淨置羯羊糞於瓦上上下以瓦覆之文武炙燥煙盡存性取出為末麻油調敷神效痘後餘毒丹方全集人參白茯苓犀角金銀花各三錢甘草一錢五分羚羊角一錢珍珠八分研上為末蜜丸每日服一錢白湯下日日服神效解毒護童膏陰隲文注證金銀花一斤用水入銅器內煎至渣無苦味為度粉甘草四兩用水煎至無甜味為度去渣二汁和勻用文武火慢煎約十碗至三四碗入米白糖收成膏埋土內一日出火氣每早以百沸湯沖一盅與小兒吃一切痘瘡不生並可稀痘若初出痘後煎服此膏則遺毒皆盡勝多吃胡桃也痘毒久不收功奇方湯聘三干百合三錢血竭二錢冰片一分共研極細末乾摻即收功矣移痘毒大毒法凡毒發虛怯處骨節關鍵處出頭便難斂口可取池塘綠苔敷在腫上留一空處或上或下即移毒於所空之處出頭池塘綠苔夏月浮在水面上冬月在水底泥上取痘毒已潰早稻草根連土烘燥研極細摻之痘毒初起張太和苦丁草伏龍肝同蜜調敷痘後餘毒生綠豆末赤小豆末白蜜各五錢豬油三錢用馬齒莧汁一碗同藥淨鍋內熬成膏塗之消痘毒漱淨口將柿餅細嚼敷四圍即消痘毒久不收口多年頭油罐子放火上煅紅冷定乳細末搓上即愈消痘毒熱黃牛屎加蚯蚓搗敷即消痘毒久不收功有多骨者紅升丹同人中白煅各等分研細搓上膏蓋多骨自出收功痘毒久不收功鮮馬齒莧生搗爛取汁服之以渣敷痘毒上腫自消膿自干口自斂痘疳門主論痘疳乃痘後餘毒未盡正氣已虧邪走空竅是以口鼻眼耳前陰後陰皆可成疳治當敗毒調元痘疳門主方驗方牛糞尖燒灰存性雄黃各等分每錢加冰片二分乳細搓患處立愈痘風瘡門主論陳實功曰痘風瘡是痧痘後毒發未盡留熱肌膚後被外風侵入其患先從細瘡作癢次漸沿開成片脂水生痂搔之無度宜用麥餞散擦之正宗痘風瘡門主方麥餞散小兒痘風作癢疊疊成片甚則頑麻不知痛癢小麥一升炒枯黃色乘熱入缽內和硫黃四兩白砒一兩研細待冷取起加煙膠半斤川椒三兩生明礬枯礬各二兩共研細末臨用蔥湯洗淨以麻油調搓油紙蓋扎三日一換三次即愈並治白禿神效痘癢門主論申鬥垣曰痘出五七日後癢極動手抓破急用仙鶴翎在痘上掃一二次即止癢就不抓此神驗秘方也啟玄痘後瘢跡不退門主論申鬥垣曰痘已愈毒未全解痂雖落盡止有瘢痕尚在或黑或凸或凹或成瘡者用真白蜜一兩塗之其瘢自消啟玄胡公弼曰羊骨髓入輕粉研勻塗之滅瘢青囊痘後瘡水不幹門主論申鬥垣曰痘後瘡水不幹在肢體名曰痘疳用出過蛾的蠶繭不拘多少每個入生明礬令滿炭火煅研為末摻之即干啟玄又曰搔壞痘破爛者用多年屋上腐草不拘多少研極細鋪在席子上令兒臥其上自不黏痛或摻之亦妙出痘後細瘡如疥難愈論申鬥垣曰夫痘回痂落宜該清潔或誤食發物或勤抱風前致令復生細瘡似疥非疥最難得愈內宜用川蜂蜜一二兩同水煎滾時時呷之外用懷孕母豬的糞曬乾燒灰不拘多少加輕粉滑石各五分研細酒調勻鵝翎掃搓即愈啟玄精炮製用藥法聶九吾曰凡用寒涼藥品除陽證傷寒熱積痢證及諸實熱等證外其餘若用之降炎上之火用之清血分之火俱有寒因熱用之義須依酒炒酒製之法最為緊要同一寒藥也依法用之則取效不依法用之則為害若痘瘡中前後所用解毒諸寒藥皆因毒火燥血而用入血分以涼血活血者是以芩連梔柏花粉大黃等味必用酒拌濕炒燥牛蒡子必炒香研碎當歸生地白芍紅花紫草牡丹皮地骨皮之類必以酒臨時洗用此要法也而時醫苟簡粗率每每不依法炒制而生用寒涼不惟無益而反以致害者多矣此其失非小而人不知也不惟病家莫知之而醫家亦竟不悟也倘悟其失豈可省此微勞而貽此大害哉予故表而出之以訓將來也制之大概有熱者甘草黃耆白芍俱生用虛寒者甘草炙熟黃耆蜜炙白芍酒炒痧疹門四方疹名各別四方之方語不同其實皆疹也調治之法俱同避忌之說無異京師內外名曰溫疹河南名曰粰瘡山西陝西名曰糠瘡山東名曰疹子江南浙江名痧疹湖廣江西名曰麻疹又名艄子福建廣東廣西雲南貴州四川俱名曰疹子碎金賦羅田萬密齋疹屬君火氣本少陰傳於其子兮故為脾胃之證乘於其妻兮現乎皮毛之分亦胎毒之所發因疫癘而後成咳嗽噴嚏兮辛金煉於丁火頓悶泣出兮君主御乎將軍將軍肝也迎而奪之兮其鋒易挫隨而擊之兮其銳難勝如折勾萌兮斧斤不用苟待燎原兮玉石俱焚其色如斑兮摸之有跡其形似痘兮視之無津朝出暮收兮發之於陽暮出朝收兮發之於陰變化莫測出沒靡定大抵愛赤而惡黑治者喜涼而忌溫赤如點朱兮光明彰顯之象黑如灑墨兮火鬱曛昧之甚制以酸涼兮收炎光於麗澤投以辛熱兮縱赫曦於重明敗毒防風開發斬關之將人參敗毒散防風通聖散解毒連翹制伏降虜之兵黃連解毒湯連翹飲如錦爛熳兮服化斑而豔斂化斑湯似火熏蒸兮飲涼膈而熱清東垣涼膈散咽痛兮甘桔牛蒡止咳嗽更能潤肺甘桔湯溺澀兮導赤芍藥定驚悸又可涼心導赤散一名火府湯便秘兮承氣膽導調元承氣湯膽導法便泄兮黃芩豬苓黃芩芍藥湯豬苓湯大渴兮膈焦置栝蔞於白虎白虎湯苦煩兮裡熱加山梔於安神安神丸無伐天和兮使陰陽之適調勿犯胃氣兮雖攻補之不盡痘欲盡發而不留疹欲盡出而無病或邪氣之郁遏兮留而不去或正氣之損傷兮困而未伸毒歸五臟變有四證毒歸脾胃兮泄瀉不止而變痢毒歸心肝兮煩熱不退而發驚咳嗽久而血出兮毒歸於肺牙齒爛而疳蝕兮毒歸於腎輕者從制以向善平之有功重者拒敵而肆惡攻之不勝熱不除者調元湯加麥冬知母作搐兮兼以抱龍溫驚琥珀抱龍丸錢氏溫驚丸咳不止者阿膠散小阿膠散加杏仁枳實帶血兮專以補肺太平錢氏補肺阿膠散十藥神書太平丸注下兮異功豬苓澤瀉錢氏異功散虛滑者大作參苓參苓白朮散滯下兮異攻當歸芍藥休息者少與真人真人養臟湯惟有牙疳之病原呼走馬之名初息臭而腐肉漸血出而穿齦內服地黃丸制其火怪地黃丸外擦蚊蛤兮殺其䘌精蚊蛤散牙若脫落兮崩砂之狀可畏聲若啞嗄兮狐惑之證難明應出不出兮發之初惺惺次通聖奪命大發而有效惺惺散防風通聖散奪命丹應收不收兮解之初葛根次化癍涼膈大解而最靈升麻葛根湯化癍湯河間涼膈散色淡白兮為虛四物去川芎加紅花桂枝四物湯色紫黑兮血熱化癍去人參加元參燒糞化癍湯奪命發癍疹之聖奪命丹無價解疫癘之神無價散發不出而煩躁兮虞不能臘黑不變而譫妄兮食不及新熱蒸蒸兮色赤痢滴滴兮氣惺羸瘦骨肉之脫瘛瘲神識之昏喘急兮胸高聳疳爛兮漏腮缺唇休誇三世之妙手難留一息之遊魂豈不聞誤服湯丸兮不如勿藥又不見特犯禁忌兮可以自省愛吃鹹酸兮咳嗽連綿而不已喜啖辛燥兮火熱燔灼而不寧甘甜過而齒齲生冷多而糞清雞乃生風之畜魚則動火之鱗雞魚貪而亂食風火併而啟釁邪反滋甚兮為癍疹而不息毒反深入兮值疫癘而再經斯則疹之遺毒亦若痘之餘證欲決內傷須詳外證目常赤痛兮青童抱火鼻常鼽衄兮素女臥薪病牙齒以終身兮玄武困於湯鑊發癲癇而連年兮朱雀驚於燒林溲數短澀兮乃州都之遭火便溏垢蠱兮必倉廩之被焚哮喘炎上之象丹瘤赤瘭之形唇舌多瘡兮門戶殘煙未熄咽喉常腫兮管龠餘燼猶存苟求其故兮則一言之可盡欲拔其本兮豈一旦之能平噫此賦之作效蛙之鳴詞雖鄙俚兮積如累石法則疹秘兮故曰碎金聶氏痧疹論麻疹同痧疹形如沙痘疹形如豆皆象其形而名之也痧痘俱胎毒而痘出五臟臟屬陰陰主閉藏其毒深而難散痧出六腑腑屬陽陽主發散其毒淺而易散臟陰多虛寒故痘可溫補腑陽多實熱故痧宜解散然痧雖屬腑而其熱毒之氣上蒸於肺肺主皮毛實受其毒是以發熱之初雖似傷寒而肺家見證獨多咳嗽噴嚏鼻流清涕眼胞腫眼淚汪溢面腫腮赤是也身體微汗潮潤則出最輕若氣喘鼻乾作嘔驚狂者最重初見如疥如米尖再後成片紅色者輕紫色者險黑色者逆不可視為泛常不可用藥失序又不可過為攻表攻表太過則胃氣受傷毒氣不能達反令停毒攻肺務宜辨寒熱虛實察淺深而治之治之之法惟在宣發其毒以盡出之於外雖紅腫之甚狀如漆瘡亦不足慮以其既發於外即可免內攻不若痘家之必顧其收結也此證若調治得法十可十全而調治失宜則殺人亦如反掌大抵初發熱時必當發表見形即宜清涼其用藥最忌酸斂溫補燥熱古云痧要清涼痘要溫清涼者清肺熱也溫者溫補生漿也一種初起眼白赤色聲啞唇腫作渴腰疼腹脹人事不清口鼻出血煩亂狂叫不安此係閉塞不出名曰閉證最為難治服藥後若能現出者或可得生鼻內流血者毒重口內出血者毒尤重初起手足心如火熱非常者毒亦重若初時失於清解以致毒蘊於胃口鼻出氣腥臭則生牙疳身熱不退餘毒流入大腸則成痢證或過於發散後來元氣虛弱骨瘦不堪則成疳疾種種壞證不可不慎此證日出三次三日九次為順總宜出透毒氣得淨即無他患又有一種奶痧風疹此類感風熱而出乃皮膚小疾服藥疏風清熱即愈不在此痧證中論也正景痧疹有所大忌病家犯其所忌則至於殺人醫家犯其所忌亦至於殺人也其所忌不同皆忌閉塞其毒不得發泄也朱純嘏曰易曰大哉乾元萬物資始又曰至哉坤元萬物資生姿始者氣之始也資生者形之始也萬物者合天地中之物而統言之也即以人言之亦天地中之一物也但人為萬物之靈得天地陰陽五行之正氣以生成因以得其所賦之理以為健順五常之德人雖天地中之一物而不與萬物同其形而同其性也故三才之道合天地人而並言之也人之有生受氣於父成形於母二五之類妙合而凝乾道成男坤道成女在胎之中先有命門則父精母血之毒藏於命門真且確矣外形則先長鼻內如五臟六腑外如百骸九竅俱從逐日逐月漸次生長惟命門凝成於有形之初則胎毒亦蘊蓄於有形之始命門人身之太極也陰陽五行包裹於命門之中痘於疹胎毒之陰陽也胎毒藏於命門無聲臭之可覓必俟外感痘之氣發出而為痘外感疹之氣發出而為疹何世人不推本求源而乃隨聲附和曰痘出五臟疹出六腑歷今千百餘年誰辨其非予不得已特表而出之曰痘與疹俱出命門或曰痘出五臟疹出六腑前人著書立說極其詳悉歷今千百餘年無有議其非者今子一旦遽云痘與疹俱出命門豈不好奇涉怪藉此至微至隱之形指此至精至密之理無可端倪之臟腑莫可測度之命門而言前此之非是不亦私相悖謬乎誠恐今之議者烏知後人之不議今乎予應之曰天下之物莫不有理惟於理有未窮故其物雖有定名有定理而不知有不盡也予所云疹與痘俱出於命門非無徵而敢云然也夫未出痘之先疹出多次俱不作正疹之數必俟大痘既出之後或隔一兩月或隔半年一年或三五七年之久遇正疹之時氣感而發之一出則不復出矣或又問曰子言胎毒藏於命門言之固深切著明也當出痘之時胎毒固發出而為痘何不並發出而為疹乎必待隔一兩月或半年一年之久而始出疹是胎毒在命門之中止隨痘之氣而出痘不隨痘之氣而出疹乎予曰正在此分陰陽五行也天以陰陽五行變化痘疹生焉人居氣化之中感痘氣而出痘感疹氣而出疹一定不易之理決無痘與疹同出之事或又問曰子著定論前言痘有夾疹而出者今言痘與疹不同出何前後之紕繆若是乎予言痘至回水結痂之際復又身熱遍身上下通紅名蓋痘疹又名解毒疹今言出痘之後必俟隔一兩月或隔半年一年三五七年之久遇正疹之時氣感而發之一出則不復出是此回水結痂之際所出之疹作不得正疹乎予曰痘有夾疹之證當痘出之際發熱蒸蒸脾肺兩家風熱亦隨之而出現故不甚關利害止用黑參升麻湯一劑而疹自消散痘出亦輕若夫回水結痂之際復又發熱遍身上下通紅細看痘粒膿漿充足此乃蓋痘解毒之疹也曰蓋痘者痘之上蓋一層疹也曰解毒者此疹一出可以解痘後之毒也宜用大連翹飲加煅石膏花粉淡竹葉各一錢以清解其餘熱此等證候蓋因灌漿之時痘必稠密極力用藥催漿過於補劑熱滯脾肺故出此疹余歷年久見證多透徹造化之機緘究竟精微之奧妙不敢私之家傳用以公之於同志者又曰痘瘡形如痘麻疹形如麻皆象其形而名之也昔人皆曰胎毒言之誠是蓋以出一次則不復出其為胎毒可知然又曰痘出五臟疹出六腑以訛傳訛誰知有命門予於痘瘡論中言之極其詳矣夫所謂胎毒者人於胚胎之初受氣於父成形於母是父精母血之毒已凝聚於陽施陰受之始豈待成胎之後欲火不節厚味不忌降生之頃咽其血而後有是毒也若以胎毒言之不論富貴貧賤人人俱有然於中有輕清重濁之分是以出疹有順逆險三等之別揆其因由天地有非常之氣陰陽鼓舞即有非常之令鼻聞其氣傳入於肺肺復傳於各臟漸次傳入於命門夫然後五臟之邪氣內侵命門之胎毒外透正疹從此而發矣疹發而熱毒之氣上蒸於肺肺主皮毛實受其毒發熱之初雖似傷寒而肺家見證獨多咳嗽噴嚏鼻流清涕眼胞腫眼淚汪溢面腫腮赤口乾唇焦此所謂正疹由於胎毒者是也身有微汗滋滋潤潤氣不甚粗身不焦熱則疹出必輕若氣喘鼻乾更有鼻掀作嘔吐驚搐狂躁無汗者最重凡疹初未見標之時先必身熱頭疼咳嗽或作吐作瀉或鼻塞鼻流清涕噴嚏眼胞腫腮赤煩躁不寧細看兩耳根下頸項連耳之間以及背脊之下至腰間必有三五紅點此乃疹之報標若無紅點之證佐當以別證論此屢試屢驗者也如果有紅點與前證相同宜用宣毒發表湯加芫荽為引以托之外出不必拘泥吐瀉疹出而吐瀉自止蓋熱蒸胃則吐熱沖大腸則瀉此乃疹之常候不必憂其吐瀉之不止也昔人云疹出六腑或因有此證而云然也統而言之胎毒藏於命門體也五臟用也六腑又五臟之用也相須而生成也凡出疹見標之後形似麻粒大粒而尖稀疏磊落再後成片紅色滋潤者順若神清氣爽者更順若初出一時湧出不分顆粒深紫色者險黑色者逆不可視為泛常不可用藥失序不可過用攻表不可驟用寒涼調治之法避風忌葷兼忌穢汙惟在用藥宣發其毒以盡出之於外雖紅腫之甚狀如漆瘡亦不足慮以其出之於外即可免夫內攻此證若調治得法用藥合宜百不失一若調治失宜則殺人亦如反掌可不慎哉初發熱時必當發表見標之後發表而兼清涼通身上下通紅總成一片手足之末上下相同無有空處此為出透可用清涼解毒之劑不必兼用發表之藥一解即愈又有一種疹初出眼胞腫白夾赤色聲啞唇腫掀翻鼻乾鼻又掀氣喘口燥作渴腰疼腹脹人事昏沉口鼻出血煩亂狂叫二便出血此係毒氣鬱遏於內名曰閉證最為難治用宣毒發表湯內加酒炒黃芩七分麻黃五分若能托疹標出外漸次出現或可望生若不出現則無望矣但凡疹證鼻出血者毒重口出血者毒尤重二便出血者毒更重且又危矣初起手足心如火熱者毒重初起腳冷如冰者毒更重若初見疹標尚未出透失於清解誤用辛熱之劑以致毒蘊於胃口鼻出氣腥臭必生牙疳宜用化毒清肺湯加石膏二錢若已出透速收速散身熱不退餘毒流注大腸裡急後重紅白相兼已成痢證宜用清解導滯湯若其人素稟虛弱當出疹之際過於發散出透之後過於寒涼解毒以致虛弱之極骨瘦神疲面無紅色且又不能多食食多即吐急用香砂六君子湯去半夏加麥冬以補之種種壞證不可不慎疹之出也出三日而始盡每日出二次子時出者巳時散午時出者亥時散經三日而出六次出透稠密無縫方為吉兆昔人有云痘喜稀疏疹宜稠密雖如漆瘡通紅一片亦不足慮若夫甫生一月及至半歲一歲之間時值天氣炎熱或出奶疹痧疹風癮等疹不在正疹之列亦不由於胎毒而致可以不必用藥其疹自散此類感風熱而出及皮膚小疾常見出一次又出一次及有連出不已者無關利害倘若用藥微用疏風清熱之劑一服即愈凡出疹發熱三日見標者為順遲至五六日不見標者為逆神氣清爽者為順昏沉者為逆病家知禁忌者逆可以變順不知禁忌者順亦變逆業幼科者當熟思之當於出疹之家明言之亦可見仁人君子救人之心防於未然無所不至毋以此言為過當出疹之時必宜謹避風寒若不避忌風寒外來疹即收回要其再出甚為難矣不可不慎人之生兒育女當出疹之時各宜小心謹慎潔淨內外勿使穢汙氣息觸犯出疹要緊凡小兒乳疹以及癮疹痧疹風熱等證不在正疹之列亦不由於胎毒此類感風熱而出及皮膚小疾常見出一次又出一次及有連出不已者無大關利害倘身熱不退可用荊防發表湯以散之如身不熱不必用藥凡正疹由於胎毒其出也必在出痘之後或隔兩三年或隔半年一年之久甚至八九年之遠感正疹之氣而出次後再不復出矣有所謂溫疹者感於風熱由於胎毒又值時令疫癘之氣城市傳染迅速異常調治乖張立刻變證余每臨此證俱遵聶氏三方加減變化每獲奇效用是以告後學若先出過正疹再不出溫疹內廷訂方藥以十三味為式可少決不可多如滿十三味則將淡竹葉煅石膏入於藥引之內更覺妥當余每看疹相其時日聞氣聽聲觀形察色然後參之以脈始用宣毒發表湯表之繼以化毒清表湯清之遵此二方加減逐日變化未透則前葛荊防為必用之藥既透則前葛荊防為可去之劑氣喘除升麻不用便秘蒸大黃必需疹色乾焦生地歸尾要用若還紫黑紅花紫茸宜添咳嗽氣急清肺飲解除肺熱口瘡口臭敗毒散清胃得咽成方在此活法由人麻疹已出透用生犀角磨井水和藥同服大能解毒澄曰壬午年溫疹大行老少男婦傳疫死者盈萬余惟以宣毒發表湯化毒清表湯去黃連加西河柳治之竟無死者其所以然者蓋此次痧疹乃時行瘟疹外寒收束初現只宜宣毒發表原不可驟用苦寒無如咸熱痧喜清涼見面即用黃連冰伏所以悉成痧閉而亡縱相延時日傳為痧疳喪命者不少醫者固不知驟用苦寒之誤而病家亦只知痧疹本凶不察苦寒所誤深可悲也凡我同志遇此疫癘傳染痧疹均當宣毒發表俟痧疹已齊再為清表化毒庶不致成痧閉戕其性命也疹有四大忌一忌葷腥生冷風寒出痧疹時大忌食葷腥食生冷冒犯風寒皆能使皮膚閉塞毒氣抑鬱而內攻也疹初出時以至出盡之日俱忌食葷腥即素菜亦忌煎炒蓋葷腥煎炒能助胃火昔人云葷痘素疹誠哉是言也疹初出時以至透之日未免口渴煩躁想飲冷水不妨少飲些須以解其煩渴然不可多飲若欲再飲仍飲些須若土產有荸薺及有秋梨甜者並柿餅有霜者不妨間與食之雖生吃無妨切不可與粥及米湯糖餅糖飴麵食荔枝圓眼蜜錢之類食之恐助毒火倘或餓極煮成粥以開水半大盅煮飯粕小半盅和勻溫服俗云飽痧餓痘痧疹不知餓也當出疹之時必宜謹避風寒若不避忌風寒外束疹即收回要其再出甚為難矣慎之一忌驟用寒涼初發熱時最忌驟用寒涼以冰毒使毒氣抑遏不得出則成內攻之患而昔人謂天氣暄熱宜用辛涼發之如黃連解毒湯之類不知天時暑熱之氣豈寒涼之藥所能解今驟用寒涼恐不足以解外熱而適足以阻內熱使不得出也曾見一宦家艱子得一男甫一歲出痧發熱痧未見形而發搐醫誤為急驚而用涼藥攻之遂令痧毒隱隱在皮下不出後醫以滋陰為主而用四物等藥亦不能救煩悶聲啞至旬日而死此可以知涼藥冰毒之害矣今因天熱而驟用寒涼豈理也哉當疹初出之時雖有身熱煩躁口渴等證即以宣毒發表湯少加灑炒黃芩三五分以清之切不可遽投黃連黃柏梔仁等大寒之藥恐冰其毒而內伏疹不得外出矣後雖設法宣表而疹終不得出可不畏哉一忌誤用辛熱初發熱時最忌誤用辛熱以助毒如桂枝麻黃羌活蒼朮丁香肉桂砂仁之類能使毒壅蔽而不得出亦致內攻之患即有痧麻初起四肢逆冷乃火極似水之故不可妄投熱藥痧現自然漸和而昔人謂天氣大寒只宜置之燠室謹避風寒可也且天氣雖寒而人身之熱毒未必減而多用辛熱豈理也哉疹初出時或有嘔吐之證醫家必用蒼厚平胃丁香砂仁暖胃或手足梢冷必用桂枝肉桂溫其手足殊不知作嘔吐者火熱蒸於胃也今反以辛溫之味攻之是抱薪而救火至於手足梢作冷者熱極似寒之象俟疹出透而手足自溫醫不明此反以桂枝可達四肢之末肉桂可以溫經回陽誤之又誤陷人性命可不畏哉一忌用補澀痧出之時多有自利不止者其毒亦因利而散此殊無妨如泄利過甚則以加味四苓散與之切忌用參朮訶蔻補澀之藥以圖速止重則令腹脹喘滿而不可救輕則變為休息痢纏綿不已也如痧後瀉黃紅色乃由有伏熱加木通車前子黃芩可也記之記之痧疹多有利而不止者醫家全不細心參究而曰吾於清解藥中兼用些參朮訶蔻分兩又少何礙於事一服不見立效又曰分兩輕之故耳於是多加分兩再服而疹或變證矣可不慎乎若麻疹出盡之後瀉黃紅色乃內有伏熱仍宜加味四苓散可也蓋兼用補澀且不可專用補澀反可乎慎之聶氏曰痧疹痘瘡逆險等證初時難以現形出不快利如寒冬之月用芫荽又名秀草或紫蘇宜用砂器即將此種隔水煎煮室中取微微香氣能助發易現今愚俗不明即用煎水盈盆將小兒大洗大浴浴後仍加衣破不但無益亦且有損反致熱氣內攻多令小兒煩躁不安啞口難言況痧痘見形即不當下水知者慎之初起微微浴手足心或可取其內外通達之意耳朱氏曰芫荽乃透麻疹之聖藥也生取來連根帶葉搗爛約有三錢入於磁碗內用滾水半盅滾白酒半盅同入碗內泡少頃其味自出通口服之痧出更快若無芫荽苗葉用子研服亦可再加白芝麻同研服更妙窮鄉僻壤用此可當明醫屢試屢驗觀音柳一名西河柳乃小兒痧疹之聖藥也冬月用枝梗春夏取苗葉每用一錢煎湯服年力大者多服一次無妨能清脾解毒發表若在窮鄉僻壤醫藥不便煎服疹即出現聶氏曰小兒痧痘初起近來多服筍湯意圖發表不知止可少煎用使引透肌膚取其易出若過用失宜反令元氣受傷脾氣虧損不能消化毒氣以致乾嘔泄瀉出汗心煩灌漿時每有破爛濕癢口瘡等患藥內引用筍尖尤其所忌特指明為習弊用筍湯之戒朱氏曰冬筍尖南醫用以催痘長漿北醫習而不察俱於痘長漿時用作藥引殊不知冬筍非上林之筍也至春二三月自死於土中冬月人取為美饌今南人又不察物理更於表疹藥中又用筍尖作引若春筍雖生長上林在疹門亦不可用恐其氣味傷泄元氣冬筍乃死氣隨之安可用乎聶氏曰痧疹前後病眼赤紅者當用生地菊花決明子蒺藜歸尾柴胡紅花等味皆可隨證加減又曰痧後面色青白骨瘦不堪元氣損傷肝脾血少成痞眼懶睜畏明似害非害宜服健脾肥兒丸或服八珍湯六味地黃湯丸庶可漸愈如清火疏風一切治眼之藥萬不可妄投不但痧後如此凡小兒病後失調成疳疾痞眼者俱當如此醫治養血健脾為主倘大便泄瀉稀水白色者歸脾湯補中益氣湯皆對證要藥也澄曰凡服痧疹煎劑不論男婦小兒每一劑藥煎好可分二三次服之庶藥力輕徐不致升散過急一湧而出也痧疹門主方宣毒發表湯初發熱欲出未出時用升麻白粉葛防風去蘆桔梗各五分荊芥薄荷甘草各三分牛蒡子炒香研細連翹去心蒂研碎前胡枳殼炒木通淡竹葉各六分白水煎天氣大熱加黃芩炒八分大寒加麻黃蜜炒八分解毒快斑湯痧麻已見形一二日內宜服連翹荊芥各七分牛蒡子研破當歸尾防風各六分蟬蛻五個生地山楂肉各二錢黃芩酒炒桔梗乾葛紫草各八分川芎五分觀音柳二三分為引不可多用化毒清表湯痧疹已出而水腫大甚宜用牛蒡子連翹天花粉黃連地骨皮黃芩山梔炒知母乾葛元參各八分桔梗前胡木通各六分甘草薄荷防風各三分口渴加麥門冬去心一錢白石膏煅研三錢大便澀加大黃酒炒一錢二分朱氏加燈心五十寸生犀角三分清肺飲痧證四五六日回時尚有餘毒留於肺胃咳嗽氣粗外熱不退者石膏生地各二錢麥門冬元參各一錢桔梗黃芩當歸尾知母各八分柴胡陳皮各六分甘草五分殭蠶五條加竹葉三片煎調元健脾保肺湯痧麻後面色青白唇淡氣弱並治痧後瘦弱成疳疾人參白茯苓沙參牡丹皮陳皮熟黃耆白芍酒炒麥門冬當歸薏苡仁百合炙甘草如大便不實瀉白色者可加木香白朮訶子少許如瀉黃色加酒炒黃芩車前子清熱導滯湯痧疹毒氣流注而成痢者黃連條芩白芍枳殼炒山楂肉各一錢厚朴去皮薑汁炒青皮檳榔各六分當歸甘草牛蒡子連翹紅多者加紅花三分地榆五分秘澀甚者加酒炒大黃一錢二分清胃散毒湯治痧後口瘡牙疳等患牡丹皮桑皮金銀花甘草生地黃黃柏蜜水炒連翹心沙參白茯苓殭蠶如體虛加白朮救苦散治痧後口瘡牙疳人中白煅五錢白殭蠶一錢五分寒水石井水飛三錢青黛飛五錢冰片一分牛黃二分共為細末先以苦茶拭過隨搓患處二聖散痧疹咽喉腫痛不拘初起回後白殭蠶二錢苦參三錢乳細吹之和中湯有一種痧痘大吐大瀉而後見者甚輕與作惡心乾嘔者不同用藥微表和中安胃為主白朮米泔水浸炒乾葛各八分當歸身白茯苓桔梗各七分白芍酒炒甘草半夏柴胡防風各六分陳皮牡丹皮各五分生薑一片紅棗二枚為引加味消遙散有一種病後瘦弱唇白氣虛感時氣出痧疹或體虛痧出白色少紅活者白朮米泔水浸炒蘇薄荷陳皮白茯苓白芍酒炒麥門冬柴胡當歸身甘草牡丹皮乾葛白水煎犀角解毒化痰清火丸痧麻證咳嗽氣喘唇紅結熱在內煩躁不安或口鼻出血者生犀角紫草連翹心花粉牡丹皮薄荷甘草梢川貝母去心各一兩黃連牛蒡子各三錢生地黃二兩當歸尾八錢赤芍六錢共為細末煉蜜丸彈子大每服一丸竹葉湯服健脾肥兒丸痧疹後失調體瘦氣虛或成疳疾或泄瀉人參橘紅廣皮各五錢黃耆蜜炙白扁豆炒白朮米湯浸炒山藥白茯苓各一兩當歸百合各八錢白芍酒炒地骨皮甘草各六錢川黃連炒三錢山楂肉神麯炒各二兩磨細煉蜜丸彈子大每食遠白湯調服天真膏痧疹復咳嗽內熱不調心神慌亂夜臥不安脾虛或生瘡疥白朮米湯浸炒生地黃元參生黃耆知母麥門冬去心沙參生苡仁桑皮各四兩白茯苓當歸白茯神橘紅牡丹皮紫苑棗仁炒各二兩取長流水用砂鍋桑柴文武火煎成珠用上好白蜜收成盛淨器內每服三五茶匙白滾水調服防風發表湯初起發熱未見時二三日或四五日內或是奶痧見疹皆宜用此疏風清熱防風川芎甘草各五分山楂肉二錢乾葛桔梗各八分枳殼炒七分蘇梗荊芥當歸陳皮各六分紅花三分杏仁去皮尖炒一錢白水煎如冬月天寒加羌活或蜜炒麻黃引用細蔥白半寸朱氏曰可去陳皮加牛蒡子七分連翹五分夏月炎熱可加炒黃芩五分如小便黃澀可加木通七分孟氏介石募施治痧神方凡遇痧疹不拘四時皆可煎服藥味分兩萬勿增損石膏煅二兩當歸尾乾葛桑白皮各一兩荊芥地骨皮桔梗各八錢牛蒡子赤芍陳皮薄荷各五錢枳殼貝母甘草各四兩紅花三錢共為細末每次用末三五錢白水三盅煎湯濾去渣服輕者三五服重者六七服立愈照方施濟功德無竅大能起發透表解毒清熱不傷元氣是以功有神效並表藥性於下石膏味辛色白達表淡而利竅煅用即純痧證要藥清涼解毒用以為君陳皮枳殼桔梗疏氣消肺脹桑皮潤肺止喘清火化痰紅花歸尾赤芍味辛治肺經血熱血活則毒散牛蒡子解毒發癮疹乾葛味辛發表解渴透肌薄荷清肺胃間熱通氣舒毛孔地骨皮解肺毒消熱燥甘草解毒和藥荊芥散血分之風熱能開毛孔貝母味辛化痰解毒朱氏曰予見去桑皮不用可加前胡一兩防風八錢酒炒黃芩八錢連翹五錢
