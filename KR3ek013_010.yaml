body:
  text: 卷十正面頭面部自巔頂起至髮鬢額角眉目止凡一切癰疽疔毒皆匯於此部以便檢閲參治百會疽門主論王肯堂曰百會疽一名玉頂疽百會穴一名三陽五會在前庭後一寸五分頂中央旋毛中陷容豆督脈足太陽之交會初發如麥米頓增痛楚寒熱大作由陽虛浮泛宜鹽湯下八味丸引火歸源若元氣素厚六陽經受風邪風火相煽臟腑熱毒上攻而成者宜黃連消毒飲七日無膿者死準繩申鬥垣曰腦發生於巔頂之上泥丸宮穴乃足太陽膀胱經兼督脈相併而作多血少氣狀如火燎漿泡大如銅錢色如葡萄頭如米粒四圍堅硬赤色可治悶亂神不定者死如八日有膿可刺者生啓玄又曰前腦疽即腦癰俗云囟門蕩子發癰是也有生囟門有生腦前腦後腦側者皆由當風睡臥風寒入腦內氣血凝滯遂生此證四五日可治半月二旬以外毒氣深入腦內難治又有腎經虛熱壅於腦戶伏結成毒但潰久成穴腦髓外流者不治治與癰疽同胡公弼曰頂門乃三陽經脈聚會之所其穴名曰百會穴此處前後生毒最易傷犯腦髓腦髓一陷最不易治是陽經亢極熱氣不散氣血凝滯結聚巔頂而成此疽繫心經受證治之忌灸如有用灸者艾柱宜小壯數宜少若火氣太過會合陽經毒流頭面潰爛難治故曰不宜灸也青囊蔣示吉曰腦發疽生巔頂之上由督脈太陽經所主受病在心乃陰陽不調熱氣上壅聚而不散而成若不速治頂裂髓枯不可救矣心法曰百會疽生頭頂中央自側面觀之正對耳尖者是又曰已潰開瘡看視務宜密室中揭膏拭膿收拾切忌外風襲入以免漫腫抽搐之虞澄曰頭為諸陽之首巔乃腦髓之穴此處患毒非諸陽蘊熱亢極即心事勞攘火炎或素有蓄熱醇酒炙煿而成或過服升柴提動積熱而起初起如粟根腳堅硬不紅不焮痛疼徹腦頭如頂石破後無膿鼻流穢物者死如初起紅腫根腳分明潰後得膿者吉但不可輕敷涼藥逼毒入腦施治之法悉遵癰疽治法毋庸分門立方百會疽門主方立消散敷百會疽龍膽草藁本西牛黃白芷地骨皮雄黃金銀花藤各等分共研極細生酒調敷中留一孔透氣自消頂門疽門主論王肯堂曰頂門疽一名佛頂疽此屬太陽經風熱所致穴名上星在神庭後入髮際一寸由臟腑陰陽不調熱毒上壅而成脈大神昏二便閉結者不治準繩申鬥垣曰頂門疽又名佛頂疽乃心經受毒陰陽不和穢熱上壅入於腦中遂成此證如根腳穿過腦者不治啓玄蔣示吉曰頂疽生巔頂上乃任脈所主六腑不調熱壅上焦濕聚高巔而成説約澄曰頂門疽有堅硬不痛者為疽均照癰疽門施治故不另立方法若紅腫如桃似李或上有黃頭膿血相親小兒積暑熱癤多有類此者不可作頂門疽治之小兒囟腫門主論馮魯瞻曰囟腫者囟門腫起也脾主肌肉若乳哺不常飢飽無度或寒或熱乘於脾家致使臟腑不調其氣上充為之瞋脹囟突而高如物堆垛毛髮短黃骨蒸自汗者更有風熱傷肝木鬱思達所以令腫者更有肺熱生風肺主皮毛亦令囟腫毛焦者更有胎中受熱所致者然寒氣上衝而腫者色白堅硬熱氣上衝者柔軟紅色更有外因覆護過暖陽氣不得外出亦令赤腫寒者溫之熱者涼之外用封囟法可也錦囊澄曰小兒囟腫多由肝風脾熱上壅驚風慢脾之證多見之切不可輕用犀角磨塗涼藥外敷逼熱人腦多令危亡只宜疏風平肝導熱其腫自消小兒囟腫門主方全生湯感熱囟門忽腫遠志肉蟬蛻明天麻防風羌活各五分川芎桔梗各四分牛蒡子炒三分甘草一分燈心水煎服小兒囟陷門主論馮魯瞻曰囟陷者有因臟腑蓄熱渴飲水漿致成瀉痢久則血氣虛弱不能上充髓腦故下陷如坑此乃胃虛脾弱之極宜急扶元若與枕骨並陷百難救一亦有父精有損母血虛衰稟元不足是以形容枯瘦陰陽兩虧無時溫熱而囟陷者有因蓄熱不除漸至身羸發落腳縮手拳皮焦鶴膝血絶筋衰而囟陷者宜各隨證調治枕陷尤重於囟陷不獨小兒也蓋耳後方圓一寸皆屬於腎陷則腎元敗矣錦囊澄曰囟陷乃病後元氣不振所以陷也惟內服異功散扶脾保元此為良策小兒囟陷門主方嬰寧湯治吐瀉後感寒囟陷人參五分白茯苓木通各七分炙甘草一分川芎酸棗仁炒各四分升麻煨製附子各三分薑引烏附湯治囟陷生附子五錢雄黃綿川烏生用各二錢研末用連根葉生蔥搗成膏空心貼囟上小兒解顱門主論馮魯瞻曰解顱者頭縫開解而顱不合也書曰母虛羸瘦父虛解顱是由稟氣不足先天腎元大虧腎主腦髓腎虧則腦氣不足故顱解開然人無腦髓猶樹無根不過千日則成廢人有以父精不足則解顱眼白睛多為論者有以屬母之血虛熱多而論者其候多愁少喜目白睛多面㿠白色若成於病後者尤凶宜久服地黃丸外用封囟法可也亦有因懷胎五月忽被大風大雨雷電驚胎以致顱骨開解者然是證若至年長不合必至骨中蒸熱肉乾皮黑肢體柴瘦骨節皆露成鶴膝者大宜調補天元以圖萬一錦囊陸亭川曰六味地黃丸本滋肝養腎之仙丹用之於初生嬰孩其功更大凡小兒百日外每早白湯化服一丸此時小兒知識未開服之培補先天極有神功蓋肝主筋腎主骨自幼服之不但無解顱之患且強其筋骨膝蓋易滿行走亦快此發前人未發之論故標之於此以為保嬰之一助也但小兒服丸後隔一時再與乳吃如外感風暑內傷乳食即暫停愈後再服澄曰解顱乃先天稟受本虧乳食不調生而多病是以頭顱分解惟六味地黃加紫河車為丸服之自合用之屢效小兒解顱門主方調元散治稟受不足顱囟開解肌肉消瘦齒語行遲山藥一錢白茯神人參白茯苓黃耆蜜炙熟地黃白朮白芍藥各五分川芎炙甘草各六分石菖蒲四分薑棗煎人參地黃丸嬰孩顱囟開解此乃腎氣不成腎主骨髓腦為髓海腎氣不成所以腦髓不足故不合人參二錢熟地四錢鹿茸酒焙懷山藥白茯苓山萸肉去核牡丹皮各三錢為末蜜丸芡實大參湯調化食遠服神效治解顱莊氏山茵陳百合車前子各五錢研末烏牛乳汁調塗兩足心及頭縫開處帛裹三日一換封囟法驢頭骨不拘多少燒灰研細以清油調敷頭縫中又法狗頭骨炙黃為末雞子清調塗河車地黃丸紫河車一具熟地搗膏八兩懷山藥炒四兩丹皮白茯苓澤瀉鹽水炒各三兩山萸肉去核酒炒四兩上為末煉蜜為丸芡實大每早晚白湯調服一丸囟門不合頭瘡不幹敗龜版煅灰搽之鱔拱頭門主論陳實功曰鱔拱頭俗名腦豬患小而稟受悠遠此皆父精母血蓄毒而成生後受毒只發一次其患腫高破之又腫皆由稟受時原有衣膜相裹毒雖出而膜未除故愈而又發膿熟腫甚者用針刺破又有風襲外口患雖不腫而不收口者敗銅散主之正宗澄曰亦有小兒夜間以頭藏在乳母懷中睡覺熱氣熏蒸而成亦有小兒不避烈日暑毒而成者初起甘草熬膏敷之自消已成逐個須用圍住根腳庶不致相串難乾此不易之法也又曰凡患鱔拱頭收功後當戒鱔魚否則次年必發心法曰鱔拱頭又名螻蛄癤俗名貉㺁鱔拱頭門主方敗銅散鱔拱頭破後膿水不幹愈後又發久不收口化銅舊罐研細將毒洗淨香油調搽忌口久不愈者糞坑內磚上宿垢竹刀括下煅存性研麻油調搽又方蛇蛻一片唾沫潤貼瘡上即出膿收口又方烏梅肉搗爛和黃蜜再搗如膏量瘡大小攤貼惡肉即消並治諸瘡癤內突出胬肉又方蔥二兩生薑一兩松香四兩同煮松香老嫩得宜乘熱去蔥薑只用松香熱箍鱔拱頭外留頭出膿則不相通串矣貼膏上生肌藥收功神速又方用酵面敷住四圍以膏貼項上易於收功又方皮底舊鞋一隻去泥淨燒存性研末菜油調敷其膿自出屢試有效又方屋內倒挂煙塵豬膽汁調敷又方瓷器捶碎研如粉雞蛋清調敷又方百草霜研細菜油調四圍立效又方銅青一兩松香五錢萆麻子六十粒蔥三根搗爛成膏青布攤貼又方生紅柿皮貼患上自干白屑風門主論陳實功曰白屑風多生於頭面耳項發中初起微癢久則漸生白屑疊疊飛起脫之又生此皆起於熱體當風風熱所化治當消風散玉肌散次以當歸膏潤之發中作癢有脂水者宜楊梅瘡門中翠云錠搽之正宗澄曰白屑風用厚朴或桑葉煎湯洗之即愈白屑風門主方頭生白屑乃肝經風盛也山豆根浸油塗之或研細以乳汁調塗又方白芷零陵香各等分研末浸香油塗之候三五日篦去不過二三次永不再發祛風換肌丸正宗治白屑風及紫白癜瘋頑風頑癬濕熱瘡疥一切諸瘡搔癢無度日久不絶愈之又發者極宜之天花粉何首烏等分威靈仙苦參蒼朮牛膝大胡麻生甘草石菖蒲川芎當歸各減半上為末新安酒疊丸緑豆大每服二錢白湯送下忌牛肉火酒雞鵝羊等發物額疽門主論鬼遺方云左額右額髮赤疽不拘大小狀如桃李此屬足陽明胃積熱而成急宜用藥貼破見膿無害王肯堂曰右額角一處發毒疽及惡癤為近太陽穴如腫滿太陽即成虛損為近穴而難消不可破如破後外傷風水即能害人亦宜用藥潰膿後速斂瘡口如經冬月即成冷瘡緣此處近太陽穴上至額角都為險處如過時潰爛腦髓出者死準繩申鬥垣曰額髮在曲差穴下挾神庭旁一寸五分入髮際攢竹二穴一名圓柱一名始光一名光明在兩眉陷中俱足太陽膀胱經多血少氣初發頭痛憎寒項似拔腰如折赤腫宜汗之啓玄陳實功曰透腦疽生在額上髮際之間多發寒熱頭疼如斫不可忍耐先用萬靈丹發汗解散風邪次宜清托之正宗澄曰額疽之發乃骨多肉少之處潰後最忌襲風傷水雖貼膏藥亦須遮護庶無破傷風濕之患治法悉遵癰疽門治法加引經藥治之又曰凡額疽治法悉如癰疽治法無庸分門立方赤色疽門主論鬼遺方曰赤色疽發頭額及腦前並手掌中十日不穴者死七日可刺出血七日未有膿不可治也太陽疽門主論鬼遺方云左右太陽穴或發疽癤及癰五七日不潰毒氣流入眼眶攻眼眼合不開用藥貼破破後慎外風水侵入即損其睛損傷眼瞼而成大疾此名勇疽亦名腦發疽屬足陽明胃經如流清稀黑血及潰爛透腦者死澄曰治太陽疽法悉同癰疽治法不另立主方鬢疽門主論陳實功曰夫鬢疽者乃手少陽三焦相火妄動又兼腎水不能生木或外受風寒但此經多氣少血肌肉相薄最難腐潰此皆性情急暴房欲血虛火動肝氣凝結而成疽也初起寒熱交作頭眩痛徹太陽甚則耳目連鬢通腫治法不可妄用針灸如初見瘡時寒多熱少口乾作渴好飲熱湯六脈虛數無力又兼患上堅硬多不焮痛無潰無膿瘡根流散此乃真氣虛而邪氣實也托裡為主消毒佐之如初見瘡時多熱少寒頭眩作痛口燥舌乾渴欲飲冷二便祕澀六脈沉實有力瘡亦焮腫疼痛身體發熱易腐易膿根腳不開腫焮在外此乃正氣實而邪氣虛也消毒為主托裡佐之大抵正氣勝則邪氣虛正氣虛則邪氣實正氣勝則實邪氣勝則虛必然一勝則一負邪正不並立欲其虛而不待損而自虛矣正宗又曰又有未見瘡時先作渴證一年半載日久日重然後發為鬢疽其形色多紫黑瘡多平陷堅硬無膿毒流耳項又兼氣味不正形容不澤精神不振飲食不進者俱為不治胡公弼曰鬢乃足陽明經所行之處由肺胃積熱上壅發毒者多其見證也寒熱往來嘔逆噁心自痛鼻乾等證若疽深寸余者不治陳遠公曰有鬢中忽生疽紅腫高突頭面目鼻俱浮異於平常此陽毒也蓋兩鬢近太陽乃陽位也陰氣不能至故作陽證治之然往往有變為陰證者所以陽藥中加入陰分之味以防其變若已潰爛尤須陰藥多於陽藥也擬用理鬢湯治之冰鑑申鬥垣曰鬢疽乃足陽明胃經多氣多血生於頭維穴初如癤子後漸大硬如石皮似豬皮棕眼睡中譫語恍惚吐逆鮮血流入四肢者萬死一生啓玄澄曰鬢疽宜養肝血托裡成膿不可輕用寒涼潰後避風初起粟窠作癢不痛切勿抓破即用膏蓋若一經外風襲入漫腫頭目壅腫根腳必硬不可不慎鬢疽門主方理鬢湯辨證冰鑑治鬢疽已潰未潰無不收功川芎當歸各一兩金銀花三兩夏枯草三錢白芷二錢水煎服二劑即消已潰者四劑全愈此方以金銀花夏枯草更得祛逐之功又妙在芎歸補氣血陰陽雙益正氣足則邪自難變安得不愈哉柴胡清肝湯治鬢疽初起毋論陰陽表裡生地天花粉川芎牛蒡子白芍甘草節柴胡當歸防風連翹黃芩山梔各等分白水煎食遠服鼠黏子湯治鬢疽初起寒少熱多頭眩作痛口燥嗌乾渴欲飲冷二便祕澀六脈沉實有力煩悶疼痛者桔梗鼠黏子赤芍地骨皮當歸天花粉元參甘草梢木通防風連翹各一錢大黃炒二錢白水煎食遠服加味逍遙散治鬢疽七日以上根盤深硬色紫焮痛白朮天花粉柴胡牡丹皮貝母白茯苓當歸白芍陳皮山梔各八分羚羊角紅花甘草各五分淡竹葉二十片同煎食後服梔子清肝湯治少陽經虛肝火風熱上攻遂成鬢疽痛連頸項胸乳太陽等處或寒熱晡甚胸滿口苦舌乾柴胡川芎當歸牛蒡子白芍牡丹皮石膏山梔各一錢黃連甘草各二錢白水煎食後服清肝解鬱湯治暴怒傷肝憂思鬱結致肝火妄動發為鬢疽頭眩痛徹太陽胸膈痞連兩脅嘔吐酸水熟地當歸白芍白朮白茯苓貝母山梔各一錢人參半夏柴胡牡丹皮陳皮川芎香附各六分甘草四分薑三片煎食遠服參苓內托散治鬢疽已成堅而不潰潰而不斂氣血俱虛身涼脈細飲食少思口淡無味及形體消瘦人參白茯苓川芎當歸身熟地炙黃耆山藥白芍白朮陳皮各一錢牡丹皮肉桂地骨皮甘草熟附子各五分薑三片棗二枚同煎食遠服頭髮門主論馮魯瞻曰發乃血之餘焦枯者血不足也忽然脫落頭皮多癢鬚眉並落者乃血熱生風風木搖動之象也病後瘡後産後發落者精血耗損無以榮養所致也當滋補精血為主醫鑑云過服辛熱藥而眉發脫落者乃肝血受傷而火動非風也宜四物湯六味地黃丸以滋肝血生腎水經曰發乃血苗心相編云瘦人發黃主多貪姦殺男女發深必好色拳發好色犯刑發黃者下流頭髮門主方黑髮散烏鬚髮宮粉真蛤粉黃丹密陀僧石灰各等分研勻水調搽上俟干水洗去藥用核桃油潤之女人發易落而不潤者棐子三個胡桃肉二個側柏葉一兩搗浸雪水梳髮則潤而不落長頭髮法生薑切片擦落髮光皮上數日即長發落不長川椒四兩用白酒釀浸七日早晚潤禿處其發自生眉毛門主論靈樞曰足太陽之上血氣盛則美眉眉有毫毛馮魯瞻曰眉毛所生之地皆屬肝臟之精氣榮養若其臟之精氣虧損則其地之毫毛不榮矣澄曰眉毛自落乃肝虛血少無以榮養或風濕相搏眉毛漸落即如樹木枯稿枝葉凋零也治當養血滋肝為主心相編曰眉毛開花主運不通男人眉細主得陰人財帛眉生黑子招陰人口舌又生水厄眉毛門主方長眉法岐天師眉落用桑葉七片每日洗之一月重生如舊須落亦然發眉疽門主論鬼遺方云左右眉稜兩處發名為發眉不拘在頭在尾宜防未穴已前毒氣攻擊在眉頭即攻入眼損睛在眉尾即攻入太陽並宜留意慎重此疽從眉至頭生瘡黑色漸漸腫漫滿面瘡頭堅硬如石刺之無膿惟出黃水痛不可惡悶亂嘔逆是也由臟腑積熱風毒上攻而然準繩申鬥垣曰眉疽生於陽白二穴之分乃足少陽膽經多氣少血治之諸證漸減者生甚者死女人七日男子二十四日死啓玄又曰眉風毒乃肺經受證但覺寒熱往來筋骨痠痛或作嘔吐即眉風毒也竇漢卿曰從眉至頭髮疽色黑其腰漸漸腫氣浮滿面者死心法曰鳳眉毒一名眉發生於眉稜無論左右皆膀胱小腸肝膽四經積熱所致形長如爪疼痛引腦二目合腫堅硬色赤按之有根六日內刺之得膿則吉無膿則險甚則十四朝不潰煩悶嘔逆不食者凶李東垣曰眉疽生於兩眉之間燦爛如人眼目甚可畏也小兒患此必死大人患此十痊五六乃手足少陽經所主宜用海馬崩毒法救之不然膿血浸眼兩目先壞矣澄曰發眉其證極險類乎疔瘡第一提住瘡根不使根腳散漫內須托毒成膿勿投寒涼破氣傷脾之藥庶可保全性命發眉疽門主方海馬崩毒法凡三陽發背對口手搭眉疽乳發初起時用熱水自肘後洗至手六經起端處止日洗數十遍以泄熱毒務洗至指甲皮穰不可住手直洗至瘡勢已衰方可住洗蓋三陽經俱屬督脈所領洗至指甲皮穰者俾熱從根本而解也此係祕傳慎勿輕忽眉心疽門主論王肯堂曰眉心疽一名面風毒屬足太陽膀胱經風熱壅結陰陽相滯而生若黑色痛甚或麻或癢寒熱並作者疔也準繩陳實功曰鳳眉疽發在兩目之間形長皮赤痛引腦戶二目合縫光腫發熱正宗心法曰眉心疽一名印堂疽乃督脈經風熱蘊結氣滯而成初起色黯根平硬腫疼痛至二十一朝腐潰出稠膿者順無膿黑陷者逆如初起色赤浮腫焮痛此名面風毒瘍七日得膿易治若色黑不痛麻癢太過根硬如鐵釘之狀寒熱並作即眉心疔也戀眉瘡門主論申鬥垣曰兒在胎中母食五辛父飧炙煿遺熱與兒生後眉間如癬流脂成片搔癢不絶名曰戀眉瘡又名煉眉瘡啓玄戀眉瘡門主方戀眉瘡精義百藥煎五錢生白礬二錢研細麻油旋調搓之又方啓玄煙膠輕粉各一錢川椒五分豬骨髓熬熟調搓眉風癬門主論澄曰眉風癬乃肝血枯燥風濕外襲初起作癢搔之纍纍流脂延蔓額上眼胞者是也治當養血滋肝不得妄用斑蝥砒硇猛厲燥烈之藥搽擦只宜紫茸膏塗之自愈眉風癬門主方眉風癬黃連三錢研末以麻油調塗碗內用蘄艾燒煙燻黑入皂礬豆大一塊輕粉少許研勻塗之小兒胎毒疥癬兩眉生瘡或延及遍身瘙癢或膿水淋瀝經年不愈松香二兩真蛤粉五錢青黛二錢五分研細乾摻或陳蠟燭油調搽一方加輕粉枯礬各三錢紫茸膏紫草白芷各二錢歸身五錢甘草一錢麻油二兩同熬白芷黃色為度濾清加白蠟輕粉各二錢取膏塗之眉眶骨痛門主論馮魯瞻曰眉眶骨痛有二俱屬肝經風熱與痰或作風痰其治類痛風然腦為髓海而腎主骨多由腎陰不能養骨髓少以致腦虛火起於中寒束於外疼之所始也凡高骨之處及眉毛所生之地皆屬本臟之精氣榮養若其臟之精氣虧損則其地之毫毛骨肉不榮矣故靈樞曰足太陽之上血氣盛則美眉眉有毫毛由此觀之眉稜骨痛者此肝血既失其養而腎水亦不榮於骨矣故主三年之內有大風疾至明其根本既拔而外邪乘襲也治之者必宜滋補肝腎為主少佐風藥以使上達如不知此徒以辛熱發散為事則陰道愈虧益增其害矣錦囊眉眶骨痛門主方祛風清上湯治風熱上攻眉稜骨痛黃芩酒炒白芷各一錢五分防風柴胡羌活各一錢荊芥八分川芎一錢二分甘草五分白水煎服又方羌活二錢黃芩酒炒一錢五分白水煎服太陰發門主論正宗曰太陰發乃足少陽膽經多氣少血發於眼梢臉上瞳子穴在目外眥五分赤腫有膿知痛者生大渴悶亂血出不止及青黑色不痛作蛀孔血出盡則死矣眼胞菌毒門主論陳實功曰眼胞菌毒乃脾經蘊熱凝結而成也其患眼胞內生出如菌頭大蒂小漸長垂出甚者眼翻流淚亦致昏蒙治法用軟綿紙蘸水蔭之眼胞上少傾用左手大指甲墊於患根右手以披針尖頭齊根切下血出不妨隨用翠云錠磨濃塗之其血自止正宗又曰宜內服涼膈散清脾飲心法曰此證初如菌形頭大蒂小黃亮水疱亦有頭小蒂大者漸長垂出堅凝不痛有纏綿經年不愈者以致目病乃脾經素有濕熱思鬱氣結而成初起宜清涼圓洗即消眼胞菌毒門主方清涼圓當歸尾赤芍石菖蒲各二錢羌活五分地膚子川連生杏仁各一錢膽礬二分共研粗末以大紅綢包扎如纓桃大滾水浸泡乘熱蘸洗眼胞痰核門主論心法曰眼胞痰核結於上下眼胞皮里肉外其形大者如棗小者如豆推之移動皮色如常硬腫不疼由濕痰氣鬱而成外用生天南星蘸醋磨濃頻塗眼皮日數淺者即消日數深者雖不能即消常常塗之塗令皮薄微微剝損以手指甲擠出如白粉汁即消眼丹門主論陳實功曰眼丹乃脾經有風胃經多熱共結為腫風多者則浮腫易消熱甚者則堅腫難散宜如意金黃散敷之膿成即以針針之遲則眼頭自破此乃睛明穴內空難斂成漏者多以致變為漏睛瘡久則損明正宗申鬥垣曰眼胞屬脾胃謂之肉輪如赤腫甚不作膿者名曰眼丹啓玄胡公弼曰上下眼丹雖小兒脾胃部位其實心經受毒熱傳脾胃熱毒升上血氣凝聚而成丹毒也青囊李東垣曰凡眼丹赤腫作癢癢後作痛不治則成膿血初起宜酒炒甘菊花或炒鹽隔紙尉之心法曰眼丹若腫突下垂不能視物者偏於風盛也浮腫易消若焮紅色紫堅硬者偏於熱盛也腫硬難消眼丹門主方驗方水調銀硃敷之自消又方竇太師皂礬五錢大粉草二兩同熬濃膏加冰片少許用鴨毛蘸潤眼眶上又方精豬肉切片如指甲大用井水漂去其血貼患處不時易之漏睛瘡門主論竇漢卿曰夫漏睛瘡者肝臟毒氣小腸邪風外攻腎端灌於瞳人初生疼痛漸成膿水其色如泔日久睛昏氣敗肝絶難救之證外用當歸地骨皮黃連煎湯溫洗治方關要云惟補腎宣肝為主心法曰此證生於目大眥由肝熱風濕病發於足太陽膀胱經睛明穴其穴系藏淚之所初起如豆如棗紅腫疼痛瘡熱雖小根源甚深潰後出黏白膿者順出青黑膿者險若瘡口過出淚液以致目內乾澀者收斂更遲若潰斷眼邊弦者不治祕笈云此證皆因膀胱積熱深邪伏而不散積久必潰病始外見目內眥穴屬膀胱開竅如針按之則浸浸膿出視物微昏眊矂隱澀宜服神效黃耆湯久病不愈者用烏金膏以米糕和為條曬乾插入竅內每日換二次化去白管則肌肉自生膿自止矣隨以黃耆湯為丸服之漏睛瘡門主方烏金膏治諸般外障風癢血縷癍瘡胬肉攀睛雞冠蜆肉漏睛瘡晉礬即明礬一兩米醋自造紅香者佳一碗半共入銅鍋內文武火熬干如濕翻調焙乾取出去火氣研細末用時不拘多少再研至無聲入生蜜調勻盛瓷罐內塗點患處久閉或五日七日上下胞俱腫方可歇藥數日其紅腫盡消觀輕重再點如漏睛膿出用糕和勻作條曬乾量穴深淺插入化去瘀肉白管則新肉自生而膿自止矣眼睛祟證門主論岐天師曰有人眼內長肉二條長一寸如線香之粗觸出於眼外此乃祟證也雖是肝膽之火無祟則不能長此異肉法當外用去刺全目丹點之內服舒郁全睛湯主之此方妙在舒肝膽之氣而又瀉其火與痰則本源已探其驪珠又何愁怪肉之重長耶石室祕録眼睛祟證門主方去刺全目丹石室祕録治祟證黃連冰片甘草各一分硼砂五釐共研無聲為度用人乳調少許點肉尖上覺眼珠火炮出一時收入而愈舒郁全睛湯柴胡陳皮甘草各一錢黑山梔白朮白芥子白茯苓各三錢白芍五錢偷針眼門主論申鬥垣曰此心膽小腸之火壅盛也眼眥角上起窠作腫久則潰膿凡有此瘡其人胸背上必有小瘡窠纍但以針挑出血則眼角瘡不治自愈矣故名曰偷針俗名偷針窠啓玄章氏曰偷針眼初起令患人自用針尖對患上輕輕戳四十九下自消經驗王氏曰偷針眼初起翻過眼胞眥內有一細眼用頭髮一根刺入淚出自愈集效祕録曰偷針眼其人背上膏肓穴有紅點但以針挑破即愈東垣曰偷針眼又名挑針毒乃肝脾積熱所致初起用冷水以手拍腦後背膊百遍看有紅筋白泡起用小針刺破其泡其腫自消又曰偷針眼用糯稻七粒每粒在泡上輕輕撞之七粒七下自消心法曰偷針眼生於眼皮毛睫間由脾經風熱而成形如豆粒有尖初起輕者宜金黃散鹽湯沖洗膿未成即消矣如洗之不消候膿熟針之如破後冒風浮腫用芎皮散外用枯礬末雞蛋清調敷腫處雙目流血門主論澄曰雙目流血大人屬心肝二經火盛而成宜涼心清肝其血自止小兒乃胎火肝熱所致宜涼肝導赤兼與鯽魚煨湯喂之自效雙目流血門主方涼心清肝湯生地當歸白芍炒山梔丹皮丹參扁柏葉川連生甘草燈心十寸為引涼肝導赤湯生地丹皮澤瀉赤茯苓炒山梔人中黃赤芍木通燈心七寸為引瘀痘後兩目腫門主論申鬥垣曰夫痘後小兒兩目胞腫蓋下瞼上寸許熱淚相掩瞼爛成瘡久治不痊只須泄去陽明胃經濕熱則腫消淚止痛除宜黃連解毒湯三黃丸主之啓玄痘風眼門主論澄曰痘風眼乃痘後封眼火微開眼過早外風乘虛而襲作癢揉搓而成痘風眼門主方痘風眼生薑一塊上挖一洞將銅青填滿仍以挖下之薑合上外以粗紙打濕裹好慢火煨炙待紙干取出銅青研細瓷瓶密貯臨用以熱乳調點數次即愈又方初生小兒臍帶熱血乘熱點之又方白果肉鉛粉各一兩銅青五錢加入乳調勻塗瓦上用艾圓二十四個點著熏干刮下為丸如芡實大每用一丸人乳浸化沖水洗眼不過七丸即愈又方川連地骨皮白礬各一錢鮮槐條五段青銅五分川椒七粒用水一大碗煎滾取起少冷又煎如此三次去渣入瓷罐收貯埋土內七日取出用雞翎帚眼角忌風十四日迎風吊淚痘風眼年久者可治枯礬皂礬各一錢花椒五分每清晨用滾水衝於碗內上用綿紙隔著將銅錢一個壓於紙上待自來清水每日早午晚須緊閉雙目止溫洗眼皮每料可用三日洗的九次重者十料輕者三五料除根痘風眼蛔蟲揉爛取汁搽眼邊上永不再發痘毒攻目門主論陳實功曰痘毒攻目皆因長漿時不曾用藥攻漿致漿不充滿以致回水眼胞紅腫不能開放而毒火上炎攻注兩目此時宜急以清毒保目湯連服二三劑以解上攻之毒火不獨可免目患乃委而棄之曰眼中有痘非所能醫遂使毒火亢極翳膜遮蔽瞳人日夜啼叫痛苦異常雖性命苟延而雙目喪明不過成一廢人耳嗟嗟庸醫誤人莫此為甚善夫聶清江先生曰此非有形之痘乃無形之火也蓋有形之痘發於咽喉口舌者有之然外痘起脹內痘亦起脹外痘收靨內痘亦收靨惟入眼之毒必作於收靨之時此以知其非有形也明矣故患此者始宜用清毒保目湯解之於前看有翳膜遮蓋黑白珠或侵入瞳人徐徐用清毒撥翳湯治之於後或隔一日一劑二日一劑雖三四月之久尚保無虞切不可過用寒涼責效於數劑之間計功於旬日之內又不可聽庸偽眼藥磨點登時損壞更不可因本家吝嗇或貧乏遂推諉不治大傷陰德戒之戒之正宗祕笈云此緣痘疹之後餘熱未退毒氣上攻於目或因氣虛痘不起漿不來醫者服以參耆升托之劑痘雖得痊而熱毒遂攻目中致使睫閉不開淚出腫痛羞明怕日或生蟹睛翳膜等證先服消毒化癍湯黃連當歸連翹白朮紅花陳皮蘇木柴胡黃柏川芎防風生地升麻乾葛麻黃羌活黃芩藁本細辛蒼朮吳茱萸白水煎服此方即稀痘丹凡立春立夏立秋立冬前一日煎一劑露一宿如天雨可將藥放屋簷下露一宿次日隔湯燉熱初生者只服三五匙周歲以外服半劑三四歲者服一劑但能服過四次可保永不出痘縱出亦稀此乃神應之方也或清涼散大便如常去硝黃或用敗毒散加連翹牛蒡子醫者妄用去翳克伐之劑過多其翳反厚則難治矣若脾胃受傷肚腹不調者服補中益氣湯茯苓燥濕湯人參啓脾丸石斛夜光丸其患漸愈痘毒攻目門主方痘毒攻目神法每清晨用兔糞八粒清水蟬蛻去頭足二十四隻水二大碗入瓷罐內慢火熬滾令其性味俱出入公豬肝或黑羊肝七尖四兩切薄片於湯內一刻即熟先飲湯後食肝湯散兼治兩月之久翳膜可消去一半百日之久湯散奏效自可痊愈戒暴躁惱怒並戒煎炒辛熱等物凡遇此等險證必須細心研究斟酌用意不可忽略清毒保目湯痂落後忽然頭頂大痛者乃餘毒上攻兩目也急宜服此以解上攻之毒火可免目患柴胡一錢蟬蛻二十一個當歸桔梗各八分連翹防風牛蒡子川芎荊芥穗赤芍各七分升麻黃芩酒炒薄荷各五分山梔酒炒甘草各三分燈心五十寸同煎清毒撥翳湯痧痘翳膜神效生地黃一錢五分當歸一錢柴胡八分牛蒡子白蒺藜去土炒天花粉酒蒸白葛粉薄荷防風川芎密蒙花穀精草草決明甘菊花各七分梔子酒炒羌活木賊草各五分川連酒炒三分生薑一片煎食遠服若大便祕澀加酒炒大黃一錢五分通利仍除之切忌寒涼並眼科點藥痘瘡損目輕粉黃丹各等分研細左眼吹右耳右眼吹左耳痘後眼不能開竇氏鱔魚血滴入眼內或芭蕉根汁溫洗並效痘入眼白蒺藜炒去刺穀精草防風各等分共為末每日食後米泔水調下二錢五分痘瘡入目痛楚恐傷目者浮萍陰乾研末三錢羊肝半個竹刀切碎搗爛共汁和空心調下清茶過口傷目者數服自愈小兒減半痘入目或病後生障蟬蛻洗淨白菊花各等分研末每服二錢蜜湯調數服愈小兒痘後翳膜遮睛百日內者可治兔糞瓦焙鼓槌穀精草炒去土淨各一兩共為細末不拘茶酒菜飯內摻入服之一料全愈又方穀精草一兩生蛤粉二兩為末用獖豬肝一兩去淨筋膜竹刀切片和藥末一錢飯上蒸熟連肝食之小兒飛痘入眼外用吹耳法黃丹輕粉各五分共研勻左目吹右耳右目吹左耳每日吹釐許痘瘡癍疹入眼生翳障白菊花穀精草緑豆皮各等分共為末每用一錢以柿餅一個粟米泔一盞同煮候泔盡食柿日食三枚淺者五七日重者半月全愈又方鏇雞肫內黃皮焙末拌飯中或藥內與兒吃七日自愈痘疹入目眼生白翳橄欖核磨水加輕粉一二釐調勻搽眼胞上藥氣入里即落小兒血眼門主論馮魯瞻曰小兒百日內嗽名為乳嗽肺葉尤嬌最易傷損更須急治久則血脈貫瞳兩眶紫黑或眼白珠紅赤如血名曰血眼當用生地黑豆共研成膏掩於眼上則眶黑自消血隨淚出自愈
