body:
  text: 卷十八頸項部自頸項至結喉止凡一切癰疽癭瘤瘰癧馬刀皆匯於此部中以便檢閲參治頸項痛門主論邪客三陽則痛寒搏則筋急風搏則筋弛左多屬血右多屬痰丹溪治一人項強痛甚不可以回顧作痰客太陽經治之用二陳湯加酒芩羌活紅花服二劑而愈有挫閃及失枕而項強痛者皆由腎虛不能榮筋也六味地黃湯加秦艽夾疽門主論王肯堂曰夾疽生喉之兩旁屬手少陰心經足太陰脾經足厥陰肝火熱毒上攻而成內潰者難治虛火上升痰壅飲食不進者死準繩氣頸門主論汪省之曰氣頸乃七情抑鬱不伸肝脾氣鬱不舒結喉之間氣結如胞隨喜怒消長甚則飲食嗌礙治以四海舒郁丸主之理例氣頸門主方四海舒郁丸青木香五錢陳皮海蛤粉各三錢海帶海藻昆布海螵蛸各二兩俱用滾水泡去鹽共研細每服三錢不拘酒水日服三次渣沉在碗底內者敷氣頸上愈後用黃藥子四兩生酒三大壺煮三炷香窨一七去火毒早晚任飲數杯酒完永除根頸癰門主論王肯堂曰頸癰屬手少陽三焦經鬱火積憤驚惶所致初覺即隔蒜灸若潰後不斂煩躁脹滿小便如淋嘔吐者死準繩靈樞云發於頸者名曰夭疽其癰大而赤黑不急治則熱氣下入淵腋前傷任脈內熏肝肺熏肝肺十餘日而死矣申鬥垣曰頸左發為癰右發為疽皆由臟腑熱毒風氣伏結風府之間故毒發於頸之上下但內近咽喉飲食氣道呼吸所關其見證也寒熱往來喉嚨疼痛飲食妨礙亦惡候也啓玄奎光曰頸癰胸前紅腫形勢在外防其內攻甚則紅腫出膿環項發門主論王肯堂曰環項發發於項之周圍故名又名落頭癰先看何處腫起如從後天柱穴起是足太陽兼督脈啞門穴下作寒熱拘倦悶亂恐怖不食如連前項俱腫乃毒流入足少陽連耳腫是流入陽明當分經絡治之不應者死準繩頸蝗門主論汪省之曰頸蝗其毒不紅其形堅硬無膿一年半載長久如此不能穿潰兩尖鎖頸嗜人脂血食血一飽病人即將危矣毒發之初先服益氣養榮湯十餘劑即將兩患頭上用三稜針針住以艾炷針灸七壯或九壯次服神效栝蔞散方見乳證門自消理例風熱鎖喉毒門主論竇漢卿曰頸項間忽痛如失枕之狀名曰風熱鎖喉毒久則紅色繞於肩背堅硬難治全書無辜疳傷瘡門主論申鬥垣曰無辜疳傷瘡乃因小兒衣物洗濯曬晾誤被雌鳥糞及羽毛落於上有蟲入於皮毛間致令小兒腦後項邊有核如彈丸在肉內推之則動軟而不痛久則蟲化入於臟腑令兒羸瘦壯熱便膿血頭骨開縫肢體生瘡治宜消疳鱉甲丸主之啓玄馮魯瞻曰無辜疳者因浣衣夜露被無辜落羽所汙小兒服之令身體發熱日漸黃瘦便痢膿血是也心鑑曰腦後項邊有核如彈按之轉動軟而不痛其間有蟲如米粉如不速破而去之即蟲隨熱氣流散遍體生瘡一入臟腑便痢膿血須以銀針刺破貼以膏藥可也又曰更有疳蟲或如髮絲或如馬尾出於頭項腹背之間黃白芨赤者生紫黑青者死無辜疳傷瘡門主方鱉甲丸夜明砂淨微炒鱉甲醋煮令黃去肋枳殼黃連各二兩雄全蠍一個訶子生一枚熟一枚共為末入麝香少許蜜為丸如緑豆大每服五丸食後用米飯送下癭瘤門主論陳實功曰癭瘤非陰陽正氣結腫乃五臟瘀血濁氣痰滯而成也癭者陽也色紅而高突或蒂小而下垂瘤者陰也色白而漫腫亦無癢痛人所不覺正宗又曰筋骨呈露曰筋癭屬肝赤脈交結曰血癭屬心皮色不變曰肉癭屬脾憂喜消長曰氣癭屬肺堅硬不移曰石癭屬腎治宜消散自然縮小切不可輕用刀針掘破出血不止多致危亡久則膿血崩潰滲漏不已終致傷人正宗又曰筋瘤堅而色紫纍纍青筋盤曲甚則結若蚯蚓此乃肝統筋怒動肝火血燥筋攣而成也治當清肝解鬱養血舒筋為主清肝蘆薈丸主之又曰血瘤微紫微紅軟硬間雜皮膚隱隱纏若絲縷色紅擦破血流禁之不住此乃心主血暴急太甚火旺逼血沸騰覆被外邪所搏而成也治當養血涼血抑火滋陰安斂心神調和血脈為主芩連二母丸主之又曰肉瘤軟如綿硬似饅皮色不變不緊不寬終年只似覆肝此乃脾主肌肉鬱結傷脾肌肉消薄土氣不行逆於肉裡而為腫也治當理脾寬中疏通戊土開鬱行痰調理飲食為主加味歸脾湯主之又曰氣瘤軟而帶堅皮色如故或消或長無熱無寒此乃肺主氣勞傷元氣腠理不密外寒傳而為腫也治當清肺氣調經脈理勞傷和榮衛為主通氣散堅丸主之又曰骨瘤形色紫黑堅硬如石疙瘩高起推之不移昂昂堅貼於骨此乃腎主骨恣欲傷腎腎火鬱遏骨無榮養而為腫也治當滋補腎氣養血行瘀散腫破堅利竅為主調元腎氣丸主之又曰粉瘤紅粉色多生耳項前後亦有生於下體者全是痰氣凝結而成宜用披針破去脂粉以三品一條槍插入數次化盡內膜自愈又曰黑砂瘤多生臀腿腫突大小不一以手捏起內有黑色是也亦用披針刺內出黑砂有聲軟硬不一又曰發瘤多生耳後發下寸許軟小高突按之不痛針之粉發齊出又曰蛔蟲瘤生於脅下又曰蛆瘤生於肩膊又曰蝨瘤破之蝨出但諸瘤形狀之異皆由五臟濕熱邪火濁氣瘀血各感而成非正病耳又曰小兒胎瘤初生頭上胸乳間腫起大者如饅小似梅李此乃胎中瘀血凝滯而成須候小兒滿月以後方可用針刺破內如赤豆汁則安內服五福化毒丹即愈又曰治癭之法初起元氣實者海藻玉壺湯六軍丸久而元氣虛者琥珀黑龍丹十全流氣飲選而治之薛立齋曰癭瘤諸證只宜服藥消磨切不可輕用刀針掘破血出不止多致立危醫家病家均當慎之萬勿孟浪馮魯瞻曰癭則著於肩項瘤則隨氣凝結戒食厚味忌妄破掘五癭皆不可妄掘破惟胎癭破而去其脂粉則愈錦囊李東垣辨瘤法若發腫都軟而不痛者血瘤也發腫日漸增長而大不熱時時牽痛者氣瘤也氣結微腫久而不消後亦成膿此是寒熱所為也留積經久極陰生陽寒化為熱以此潰必多成瘻宜早服內塞散以排之諸癃瘤疣贅等至年衰皆自內潰理於壯年可無後憂十書百效全書曰夫癭瘤皆因氣血凝滯結而成之癭則喜怒所生多著於肩項皮寬不急垂垂而重者是也瘤則隨留所住初如梅李之狀皮嫩而光漸如杯卵者是也癭雖有五瘤則類多不痛不癢切不可抉破恐膿血崩潰滲漏無已必致殺人惟肉瘤更不可攻療如脂瘤氣瘤體氣充實者如海藻散堅丸東垣散腫潰堅湯多服亦可消散如虛弱者又宜斟酌不可純用化痰行氣破堅之藥靈樞曰虛邪之入於身也深寒與熱相搏久留而內著寒勝其熱則骨疼肉枯熱勝其寒則爛肉腐肌為膿內傷骨內傷骨為骨蝕有所疾前筋疾前二字衍文也筋當作結筋結不得伸邪氣居其間而不及發為筋瘤有所結氣歸之衛氣留之不得反津液久留合為腸瘤久者數歲乃成以手按之柔已有所結氣居為昔瘤以手按之堅有所結日以易甚連以聚歸之津液留之邪氣中之凝結深中骨氣固於骨骨與氣並日以益大則為骨疽有所結中於肉宗氣居之邪留而不去有熱則化而為膿無熱則為肉疽凡此數氣者其發無常處而有常名也刺節真邪篇此皆虛邪中人為病費去而久留著故積歲纍月而成疽瘤也三因云癭多著肩項瘤則隨氣凝結岐天師曰癭瘤不同癭者連肉而生根大而身亦大瘤者根小而身亦大也即瘤之中又各有不同有粉瘤有肉瘤有筋瘤有物瘤筋瘤不可治亦不必治終身十載不過大如核桃粉瘤則三年之後彼自然而破出粉如線香末出盡自愈亦不必治也肉瘤最易治用水銀硼砂各一錢血竭兒茶各三錢黃柏五錢冰片麝香各三分共為細末將此藥擦於瘤之根處隨擦隨落根小者無不落也物瘤則根大最難治不時而動無故而鳴或如蟲鳴或如鳥啼必須用刀破其中孔則物自難居必然突圍而出後用生肌神藥則瘤化為水平復如故矣祕録又曰物瘤乃不敬神鬼觸犯歲君而得病不可測非理可談故內經不言然世未嘗無此病也又曰癭固不同形亦各異然皆濕熱之病也由小而大由大而破由破而死矣初起之時即宜用小刀割破略出白水以生肌散敷之立愈倘若失治漸漸大來用藥一點點其陷處半日作疼出水其色白者易愈如黃者紅者皆難愈張仲景曰人有手臂生瘡變成大塊更有肚上生瘡結成頑塊終年不去者或如拳頭大者必須用刀割去人必暈絶不可學也止用小刀略破其皮一分後以化毒丹敷之即化為水此方神奇不可輕視如足上生瘤如斗大者不必破碎治之止用針輕輕刺一小針眼以化毒丹敷之必流水不止急用煎方治之方用人參黃耆各三兩生甘草薏苡仁各五兩白芥子三錢水煎服二劑即消盡其水而人絶無憊色此內外雙治之法然此方之妙乃補其本源之氣又利水而不走其氣刺其孔而出水未免大損元氣今補其氣又何懼水之盡出哉此方之所以奇也妙也岐天師曰人有喉患大腫又非癭瘤忽痛忽不痛外現五色之紋中按之半空半實此乃痰病結成似瘤非瘤似癭非癭也宜消痰湯主之此方乃消上焦之痰聖藥也又有海藻昆布以去癭瘤之外象消其五色之奇紋妙在消痰而仍不損氣則胃氣健而痰易化也一劑知二劑消大半三劑則全消四劑永不再發此方兼可治癭證神效祕録癭瘤門主方清疳蘆薈丸正宗治惱怒傷肝肝氣鬱結而為瘤堅硬色紫纍纍青筋結若蚯蚓遇喜則安遇怒則痛者服之生地黃酒煮搗膏當歸白芍藥川芎各二兩甘草節昆布川黃連青皮海蛤粉牙皂蘆薈各五錢共為細末神麯糊丸桐子大每服八十丸白湯量病上下食前後服之無不有效通氣散堅丸治憂鬱傷肺致氣濁而不清聚結為瘤色白不赤軟而不堅由陰陽失度隨喜怒消長者宜服黃芩酒炒石菖蒲當歸製半夏陳皮香附米川芎天花粉海藻白茯苓甘草陳枳殼桔梗川貝母人參膽南星各等分研細薄荷煎湯疊丸豌豆大每服一錢食遠服燈心二十根薑三片泡湯送下琥珀黑龍丹治五癭六瘤不論新久但未穿破者並效天南星薑汁拌炒京墨五靈脂炒海帶海藻各五錢血竭二兩琥珀一兩廣木香三錢麝香一錢各研細和勻煉蜜丸一錢重金箔為衣曬乾密貯每服一丸熱酒一杯量病上下食前後化服如患在下部服後用美物壓之破結散錦囊治五癭極佳丹溪曰癭氣先須斷厚味麥面四分松蘿半夏貝母海藻洗龍膽草海蛤通草昆布枯礬各三分研末酒服一錢日三忌鯽魚豬肉五辛生菜毒物二十日愈一方加青皮點瘤贅神驗方凡瘤有六骨瘤脂瘤肉瘤膿瘤血粉瘤膿瘤即膠瘤也惟粉瘤與膿瘤可決余瘤皆不可決潰肉瘤尤不治治則殺人桑柴灰棗木灰黃荊灰蕎麥灰桐殼灰各二升五合以沸湯淋汁三碗澄清入斑蝥四十個穿山甲五片乳香冰片不拘多少煎作兩碗以瓷器盛之臨用時入新石灰調成膏敷瘤上干則以清水潤之其效如神枯瘤方治瘤初起成形未崩者及根蒂小而不散者用之斑蝥二十個輕粉白砒硇砂硼砂雄黃黃丹沒藥去油乳香去油各一錢大田螺三個去殼切片曬乾共研極細糯米粥調勻捏作小棋子樣曬乾先灸瘤頂三壯以藥餅貼之上用黃柏末水調敷蓋藥餅候十日外其瘤自然枯落次用斂口藥斂之祕傳斂瘤膏癭瘤枯藥枯落後用此搽貼自然生肌收口血竭海螵蛸象皮乳香去油輕粉龍骨各一錢研極細用雞蛋十五枚煮熟去白將黃熬油一小杯將藥和勻每日早晚用甘草湯洗淨患上雞翎塗上膏藥蓋貼灸法先將瘤上用麵包好然後照其大小用杏核或桃核半個內填極幹人糞合瘤上以艾圓灸之知痛即止祕方用竹刺將瘤頂略略撥損油皮勿令見血入銅緑細末少許膏蓋自消又方極細生鐵屑醋拌放銅勺內煅干再拌再煅如此三度研極細再以醋調敷上便覺瘤上不甚適意過一宿剝去再敷以平為度瘤生面上初起鮮蒲公英摘斷以白漿點瘤上幹了又點數日全消丹瘤朱丹溪萆麻子去殼研入面一匙搽之甚效生肌神散岐天師治物瘤割破以此搽之石灰千年者佳三七根麒麟竭各三錢人參象皮乳香去油沒藥去油木香各一錢兒茶二錢輕粉五分各為絶細末研至無聲為度修合時須用端午日不可使一人見之點癭法岐天師用此點在癭之陷處半日作疼必然出水水銀鷹糞緑礬鵲糞皂礬輕粉硼砂各一錢潮腦冰片各五分麝香三分研為絶細末用針刺一小孔然後乘其出血之時將藥點上即黏連矣約用一分以人乳調之點上如雞頭子大一日點三次第二日必然流水流水之時不可再點點則過疼轉難收口矣三日後必水流盡而皮寬如袋後用煎方自然平復如故煎方黃耆薏苡仁各一兩人參山藥各三錢白芍白茯苓各五錢澤瀉二錢豬苓生甘草陳皮各一錢水煎服十劑全消如故但忌房事一月余無所忌若犯房事必破不能收口終身成漏消痰湯岐天師白茯苓五錢海藻半夏貝母白芥子天南星人參桔梗各三錢昆布生甘草各一錢附子一分水煎服化毒丹張仲景人參三錢甘草一錢硼砂冰片各一分輕粉五釐各為細末和勻摻上即化為水矣灰漿膏胡公弼消瘤神效天南星半夏各一兩草烏煅存性五錢三味煎濃汁去渣入木蓮蓬蒂上白漿一二兩採時以蛤蜊殼在蒂上刮取攪勻再用石灰以竹片撥炒俟竹片焦黑成炭為度徐徐投下調成不稀不厚膏子入瓷瓶收貯黃蠟封口用時如干以唾津潤開敷瘤上或木蓮蓬漿潤敷尤妙二三日即愈消瘤程葑門銀爐上飛灰一斗入水煎數十沸用棉布濾去渣取清汁入川大黃八兩煎好濾去大黃不用又用礦石灰一斤放鉢頭內將灰汁傾入鉢內再入蟾蜍生南星各三兩研為細末和入汁內收貯看瘤大小用羊毛筆蘸汁掃瘤上一日掃十二三次三日自枯其瘤落下如去皮石榴將白靈藥摻之三日消盡又用紅升藥摻上生肌長皮再上鑽白霜自然全愈消瘤法俟人家入殮時釘棺斧聲敲一下以手按瘤一下斧聲歇亦止其瘤自消頸上癭瘤不疼不痛俱是痰結川黃柏海藻各一兩研細收貯每用五分放手心上以舌餂之一日三五次即消消瘤硼砂阿魏各等分麝香少許研細末以大蒜搗爛看瘤大小敷之自消禁瘤法每年行此法一次其瘤即不長大凡遇死尸將死人手在瘤上一摸可保一年不長次年又行此法又保得一年不長終身行之則其瘤皆如初起時也若空一年不用死人手摸其瘤即大瘰癧門主論寒熱篇帝曰寒熱瘰癧在於頸腋者皆何氣使然岐伯曰此皆鼠瘻寒熱之毒氣也留於脈而不去者也鼠瘻之本皆在於臟其末上出於頸腋之間其浮於脈中而未內著於肌肉而外為膿血者易去也帝曰去之奈何岐伯曰請從其本引其末可使衰去而絶其寒熱按其道以豫之徐往徐來以去之其小如麥者一刺知三刺而已帝曰決其死生奈何岐伯曰反其目視之其中有赤脈上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死見赤脈不下貫瞳子可治也外臺祕要曰肝腎虛熱則生瘰癧病機云瘰癧不繫膏粱丹毒火熱之變總因虛勞氣鬱所致止宜以益氣養榮之藥調而治之其瘡自消不待汗之下之而已也朱丹溪曰瘰癧必起於足少陽一經不守禁忌延及足陽明經食味之厚鬱氣之久曰毒曰風曰熱此三端拓引變換須分虛實實者易治虛者可慮此經主決斷有相火且氣多血少婦人見此若月水不調寒熱變生稍久轉為潮熱自非斷欲食淡神醫不能療也又曰灸瘰癧法取肩尖肘尖骨縫交接處各一穴即手陽明經肩髃曲池二穴也各灸七壯在左灸左在右灸右左右俱病者俱灸之余常用之甚效薛氏以曲池云附髎似未的也薛立齋曰凡男子婦人若因恚怒傷肝氣血壅遏而不愈者宜灸此穴以疏通經絡如取此穴當以指甲掐兩肘兩肩四所患處覺有痠麻方是其穴此治瘰癧之祕法也戴復庵曰瘰癧之病皆氣血壅結根在臟腑多結於頸項之間纍纍大小無定發作寒熱膿血潰爛此沒而彼起王肯堂曰單窠癧者生一個也發於頸項最難治或發於囟骨亦難治用毒藥療之勿令浸漬日久準繩又曰蓮子癧一胞裹十數枚生於項之左右以手觸則能轉動尚可用藥治療如堅硬挨不動者乃不可生憎寒發熱躁渴凡遇此證至難治雖神聖亦無如之何也已又曰重臺癧生於頸項或左或右初則單窠結在上或在下重疊見之是名重臺癧此證藥不可療不可針灸若是毒行其腫痛發渴生痰百死一生害人極速初覺有之急用小犀角丸粉金散治之又曰燕窠癧形似燕窠不可治陳遠公曰有生痰塊於項堅硬如石久則變成瘰癧流膿流血一塊未消一塊復長未幾又潰或耳下或缺盆或肩上脅下有串走之狀故名鼠瘡又名串瘡如鼠之穿也人謂食鼠竊余以成此證而不盡然也蓋此證多起於痰痰塊之生多起於郁未有不鬱而生痰無痰而成瘰癧者也故治法必以開鬱為主然郁久氣血必耗況流膿血則氣血更虧消痰而不解鬱解鬱而不化痰皆虛其虛也消串丹白芍一兩白朮一兩柴胡二錢蒲公英三錢茯苓五錢陳皮一錢附子一片甘草一錢天花粉三錢紫貝天葵五錢水煎服八劑痰塊漸消又十劑盡化又一月全愈愈後服六君子湯為善後計不再發也此方妙在蒲英天葵為消串神品然非佐以柴芍則肝木不平非助以苓術則脾胃土不健又何能攻痰破塊哉惟其有攻有補又得附子之力引各味直搗中堅所以能除夙痰於旦夕耳冰鑑又曰有久生瘰癧頸間盡爛且及於胸膈無非痰塊以至身體發熱發寒肌肉消瘦不思飲食自汗盜汗驚悸恍惚此證原難醫治然治得法亦在可救也夫此證初起宜解鬱為先佐之補虛以消其毒倘執尋常治法以祛痰敗毒為事鮮不速之亡矣用轉敗丹人參二兩柴胡二錢白芍三錢金銀花三兩當歸二兩半夏五錢白朮一兩生甘草三錢水煎服四劑痰塊在胸者盡消又四劑頸上潰爛亦愈將方減半再服十劑瘡口漸平不再發也此方補多於消而開鬱寓於中化痰存於內從未有知此治法但一味攻毒所以愈壞也殺運無窮神方難信人見此方無不訕笑者誰知乃祛病之仙丹奪命之異藥哉余不勝掩卷嘆息也陳實功曰夫瘰癧者有風毒熱毒氣毒之異瘰癧痰癧筋癧之殊當察而治之風毒者乃外受風寒搏於經絡先寒後熱結核浮腫治當散其風除其濕熱毒者乃天時亢熱暑中三陽或內食膏粱厚味釀結而成色紅微熱結核堅硬治當清其脾瀉其熱氣毒者乃感冒四時殺厲之氣而成其患耳項胸腋驟成腫塊令人寒熱頭眩項強作痛治當調其血和其氣瘰癧者纍纍如貫珠連接三五枚其患先小後大不作寒熱初不覺疼日久漸痛堅硬如棋子大小如梅李繞頸延腋得之於誤食蟲蟻鼠殘之物又或汗液宿水陳茶混入而餐乃食毒鬱結之久病也最難消散治當散其堅和其血痰癧者初起如梅如李生乃遍身久則微紅後必潰破易於收斂此乃飲食冷熱不調飢飽喜怒不常多致脾氣不能傳運遂成痰核治當豁其痰行其氣筋癧者生於項側筋間形如棋子堅硬大小不一或陷或突久則虛羸多生寒熱勞怒則甚此乃憂愁思慮暴怒傷肝故令筋縮結蓄成核治當清其肝解其鬱正宗又曰如寡婦尼僧鰥夫庶妾志不得發思不得遂積想在心過傷精力此勞中所得者最難調治有此先養心血次開鬱結益腎安神疏肝快膈如歸脾湯益氣養榮湯俱加香附青皮山梔貝母木香之類是也又曰男子不宜太陽青筋潮熱咳嗽自汗盜汗女人忌眼內紅絲經閉骨蒸煩熱後必變為癆瘵忌用巴霜牽牛斑蝥大黃追蝕等藥往往克伐太過致其危亡者多矣切宜戒之慎之又曰蛇蟠癧繞項起核者是又曰耳項胸腋驟成腫核色紅微熱寒熱頭痛此乃風寒暑熱之暴病也此證易於消散宜用荊防敗毒散加貝母夏枯草不應再加軟堅開鬱之品又曰瓜藤癧自頸項延及胸腋者是馮魯瞻曰凡頸項眉頰結核久凝皆為氣血太虛切勿攻克錦囊又曰瘰癧者先賢名曰九漏是由其人陰虛火盛衝擊關津管束之處而又過食煿炙風痰熱毒相搏而結成頑核鬱滯不散久則內潰而為瘰癧治宜養陰和肝理脾舒郁化痰清利切勿徒事克伐以損真元若夫嬰兒産下因胎毒而即患者此稟母之肝膽二經火鬱氣滯亦宜平肝滋腎化毒為主蓋瘰癧之源雖由於肝實根於腎夫肝火之有餘乃腎陰之不足也故其本在臟其末上出頸腋之間若浮於脈中未著於肌肉而為膿血者易去也若反其目而視之赤脈貫於瞳人如見一脈即一歲死見一脈半即歲半死二脈三脈亦如之若赤脈不見庶可治也其始必發一枚次必連生大小十數纏繞項下先腫作膿穿破難乾故名漏項若在胸旁或兩脅者此名馬刀至若其口深黑內潰蝕爛穿透咽喉飲食不進目腫舌出耳出黃膿者不治更有無故寒熱身體頸項結核如癧及心胸腹背皆有堅核而不痛者此名為結風氣腫也審其是風是火或虛或實治之又曰瘰癧者手足少陽蘊熱結滯而致也二經多氣少血所以結核堅而不潰延蔓串通若陽明經則氣血多而潰矣即俗名爛癧惟少陽起者當從本治俗醫不知概以毒藥攻之如負薪救火為害更甚元氣弱者反成癆瘵矣又曰夏枯草能散結氣而有補養血脈之功能退寒熱虛者儘可用之若實者佐以行散之藥外施艾灸亦漸取效又曰凡結核或在項或在臂或在身或在耳後或在頂門如腫毒不紅不痛不作膿者皆是痰注氣滯不散不外乎曰痰曰氣曰熱三者久而不已則成瘰癧宜早治之大抵因七情之氣鬱結或因飲食之時觸犯惱怒遂成此疾婦人女子患此最多治宜開鬱順氣利膈化痰清肺然未有不由陰虛火旺而有癆瘵根腳者更宜兼乎補陰乃其治也周文採曰癧生於頭項上交接名蛇蟠癧宜早治之啓玄李東垣曰瘰癧結核寒熱發渴經久不消者其人面色痿黃潮熱上蒸已成膿也十書申鬥垣曰九漏癧名曰狼漏其根在肝因所欲不遂蓄怒而得曰鼠漏其根在胃因食鼠飧之物胃受毒而播於肝曰膿漏其根在膽因志不遂而得之曰螻蛄漏其根在大腸因食螻蛄及蠍虎所傷之物誤食之而得曰蜂漏其根在脾因食蜜物及蜂毒得之曰蜈蚣漏其根在肺因食蜈蚣所遊之物而得之曰蠐螬漏其根在心因喜之太過而得之曰瘰癧漏其根在腎因食血發及諸腎得之曰轉脈漏其根在小腸因驚恐失枕而得之故瘰癧古人稱為九漏此之謂也竇漢卿曰獨形者為結核續連結者為瘰癧此證原非膏粱之變乃虛勞氣鬱所致宜服益氣養榮之劑忌用金石暴悍之法徒傷氣血又曰潰後宜十全大補湯加貝母香附遠志汪省之曰瘰癧初起者用四稜鐵環按定針一孔以紙捻紝之勿令合口以絶其源功效甚速理例胡公弼曰夫瘰癧者乃頸項堅結之核也或在耳前或在耳後或在耳下皆屬手足少陽經多氣少血之患也初如豆粒相似不覺疼痛及後長如桃榴梅李之狀方見疼痛頭眩昏悶四肢作痛作脹寒熱往來如瘧書云有痰核有氣瘰有風癧有筋癧有血癧有串頸鼠尾癧頭未破時如彈丸相似或一枚或三五枚或多不計其數纍纍連連貫串沿漫血脹皮薄而自破出膿者有之浸淫潰爛者有之或醫家以刀針爛藥刺破者亦有之年深日久竟不能痊者亦有之殊不知此證原是七情傷於內血氣淫於外氣多血少痰多壅盛致傷於肝肝主筋故此毒結於胸膈上焦之處結於耳前及頤頦至缺盆者名曰瘰癧此手少陽三焦經證也凡看瘰癧不宜過心過心者必死只問推之動與不動不問大小枚數破與不破須察推之動者易治不動者難醫辨明五善七惡不可一例混治大法宜用火針針破其核將藥線插入六七次看瘡大小大則多換小則少換量核淺深務潰其根或爛斷血筋血流不止者速以百草霜摻之病人若血去多而暈治當補血外用敷藥敷癧四圍其核自脫脫後換用生肌藥長肉收功青囊劉河間曰結核者乃火氣熱甚則鬱結堅硬如果中核也不須潰發但熱氣散則自消朱丹溪曰結核或在項在頸在臂在身皮裡膜外不紅不腫不硬不痛多是痰注作核不散當問平日好食何物吐下後用藥散核又曰結核在頸項用白殭蠶炒大黃酒浸青黛膽南星各等分蜜丸噙化核在下頦用二陳湯加酒炒大黃柴胡桔梗連翹核在臂二陳湯加連翹防風川芎酒芩蒼朮皂角針白殭蠶麝香行太陰厥陰之積痰使結核自消甚捷風熱結核用大連翹飲加白殭蠶牛蒡子如風核以去風消核散常服消之又曰凡一切風核疼痛用大蕎麥根葫蘆根磨末半泔半醋暖塗之蔣示吉曰如瘰癧證男子骨蒸女人經閉已成壞證若專攻其癧是速其斃也理宜調理脾胃補養氣血使根本既固然後再理其瘡庶有可生之機也説約又曰瘰癧之作七情六欲痰飲鬱熱積久而成實非一朝一夕之故也故當以益氣養榮為主而佐以治瘰之品蓋恐榮衛一衰變證蜂起雖欲治癧而不可得矣又曰凡遇瘰癧等證須察虛實不得盡劑攻伐損傷元氣致成壞病者十有八九此非患者之命自出醫人之手不得不留心斟酌聖濟總録曰瘰癧在耳後頤項缺盆乃手少陽三焦經主之內經曰陷脈為瘻留連肉腠即此病也病機云瘰癧不詳脈證經絡受病之異者下之則犯經禁病禁虛虛之禍如指諸掌劉河間曰瘰癧生於耳後及項間一名九子包又名者鼠瘡其突起者瘰癧也多起厥陰少陽之二經以其多氣少血故也由嗜欲太甚飲酒太過食味太厚思想太窮所願不遂意淫於外內蘊七情中傷六欲或傳染或誤治種類不同為害則一男子患此潮熱頓生女子患此月經不調漸漸不治神仙難救神方於初起或二三核時耳後項下有連珠就於初起大核之上著艾炷灸之每核上各灸六七壯或十餘壯更於肩並風池肺俞缺盆穴上各灸三壯真起死回生之妙法可收全功今人不行艾灸之法而聽下工敷貼鉤割多取喪亡之咎治宜養血清神化痰散郁更宜清心養性淡味節食可保終吉此證生於富貴膏粱之人多費調理以味厚欲深故也生於藜藿之人可保無虞以味淡欲少故也古云膏藿不同治正此義也心法曰瘰癧小者為瘰大者為癧當分經絡如生項前屬陽明經名為痰瘰項後屬太陽經名為濕瘰項之左右兩側屬少陽經形軟遇怒即腫名曰氣癧堅硬筋縮者名為筋癧若連綿如貫珠者即為瘰癧或形長如蛤色赤而堅痛如火烙腫勢甚猛名曰馬刀瘰癧又有子母癧大小不一有重臺癧癧上堆纍三五枚盤疊成攢有繞項生者名蛇盤癧如黃豆結莢者又名鎖項癧生左耳根者名蜂窩癧生右耳根者名惠袋癧形小多癢者名風癧頷紅腫痛者名為燕窩癧近及胸腋者名瓜藤癧生乳旁軟肉等處者名𤷍瘍癧生於遍身漫腫而軟囊內含硬核者名流注癧獨生一個在囟門者名單窠癧一包生十數個者名蓮子癧堅硬如磚者名門閂癧形如荔枝者名石癧形如鼠形者名鼠癧又名鼠瘡以上諸癧推之移動為無根屬陽外治宜因證用針灸敷貼蝕腐等法推之不移動者為有根且深屬陰皆不治之證也切忌針砭及追蝕等藥如妄用之則難收斂瘰癧形名各異受病雖不外痰濕風熱氣毒結聚而成然未有不兼恚怒氣鬱幽滯謀慮不遂而成者也瘰癧門主方紫霞膏治瘰癧初起未成者貼之自消已成未潰者貼之自潰已潰核存者貼之自脫並治諸色頑瘡臁瘡濕痰濕氣新久棒瘡疼痛不已者並用之明淨松香淨末一斤銅緑淨末二兩用麻油四兩銅鍋內先熬數滾滴水不散方下松香熬化次下銅緑熬至白煙將盡其膏已成候片時傾入瓷罐凡用時湯內燉化旋攤旋貼瘰癧初起已潰未潰並治苦杏仁去皮尖三十粒萆麻仁去衣四十九粒松香研細末一兩先將杏仁搗至無白星為度再入萆麻仁搗如泥方下松香再搗千下攤貼千捶膏初起貼之自消將潰貼之毒從毛竅中出不致穿潰杏仁萆麻仁各四十九粒琥珀燈心同研冰片各三分珍珠豆腐包煮麒麟竭當門子乳香去油沒藥去油銅緑黃丹龍骨輕粉各六分水安息龍眼肉大三塊松香入鍋內小火化開用麻布濾去渣冷定用豆腐水煮數次再用緑豆湯煮三次又用蔥韭生薑汁各一盅煮乾研細末八錢先將杏仁萆麻搗如泥次將前藥細末逐漸加入捶千餘下用大紅緞攤貼忌見火若內覺有膿未熟恐穿潰難於收功可加木鱉子去殼七枚黑驢蹄研細五分於膏內即能隔皮取膿又方羌活獨活白芷細辛龜版亂髮防風當歸全蠍蜈蚣各三錢用麻油一斤浸一日煎時柳枝頻攪藥枯去渣再熬至滴水成珠然後下東丹水飛炒透半斤白蠟兒茶各二錢離火片時下麝香五分不可多用琥珀膏治瘰癧及腋下初如梅李結腫硬強漸若連珠不消不潰或潰膿水不絶經久不瘥漸成漏證琥珀一兩廣木香丁香各一錢桂心硃砂松香以上研細不入油熬當歸木通防風木鱉子淨肉萆麻仁白芷各五錢咀片麻油二斤二兩浸七日入鍋內慢火熬至焦黃為度絹濾淨油徐下黃丹飛炒四兩以柳枝不住手攪候至膏成滴入水中軟硬得中掇下鍋來以盆頓穩攪至煙盡方下群藥攪勻瓷器盛之臨用取少許攤貼蝣蜒丸蝣蜒蟲不拘多少焙乾研末紅棗去衣去核共搗為丸桐子大每清晨白湯送下三錢鼠癧馬刀丸凡服此丸宜先服六味地黃湯加益母草三劑再服此丸大枳殼七個切作十四片滾水泡軟去穰每兩片內納斑蝥一個大黃九分兩片合緊用線扎好入砂鍋內放半砂鍋水煮至水乾為度去斑蝥大黃只取枳殼曬乾研細煉蜜丸如緑豆大每日三服每服三分白湯下鼠癧土瓜丸吳渭採已潰未潰並效土瓜根白芨澤蘭葉漏蘆胡桃肉射干夏枯草沙參各三兩草連翹去心六兩磨細酒糊為丸桐子大每服三十丸小兒減半空心鹽酒下消癧丸此方奇效愈者不可勝計可刊方普送元參蒸川貝母去心蒸牡蠣火煅醋淬各四兩磨細煉蜜為丸每服三錢白湯下日二服神效消癧丸大熟地二兩澤瀉白茯苓山藥山萸肉各一兩玄胡索牡丹皮牡蠣各一兩二錢磨細煉蜜為丸桐子大每服三錢白湯送下一方用元參無玄胡索消癧丸夏枯草連翹萆麻仁各四兩磨細裝入豬大湯一段內兩頭扎緊酒浸蒸爛搗丸如桐子大每服五十丸酒下瘰癧未破者大五倍子一個挖一孔入南蜈蚣一條切作數段裝入倍子內以醋麵裹作一球用麩子半碗同炒以麩焦為度剝去外面面球取去內里蜈蚣只用倍子研細醋調敷已潰犍豬膽汁三個傾入銅勺內慢火熬至滴水成珠再加輕粉一錢冰片三分攪勻攤貼癧串初起豆腐店浸豆水濾清用砂銚慢火熬膏每早白湯沖服數匙癧上亦以此膏敷貼鼠癧初起紫花地丁四兩火酒一斤浸七日飲之自愈加味逍遙散治肝經鬱火致生瘰癧並胸脅脹痛或作寒熱甚至肝熱生風眩運振搖或咬牙發痙諸證經云木鬱達之是也柴胡薄荷葉白朮白茯苓當歸山梔仁甘草牡丹皮白芍水煎服瘰癧煎方初起自消大貝母一錢五分半夏當歸尾穿山甲炒白茯苓白附子連翹各一錢桔梗廣皮枳殼各八分白殭蠶一錢五分甘草節五分加燈心十根同煎服四劑換服海龍丸海龍丸海藻酒洗炒昆布酒洗炒白茯苓炒穿山甲炒各二兩全蠍一百個尾全者龍膽草酒洗炒一兩五錢當歸身炒一兩核桃五十個劈開去肉將全蠍嵌在核內合緊煅存性研細蕎麥麵打糊為丸桐子大每早晚白湯送下三錢酒下亦可治癧奇方全蠍七個桃殼六個每殼裝蠍一個五個殼裝去五個蠍子仍有一殼裝兩個全蠍以麵包煨熟研末作六包用黃酒調服每日服一次將兩個蠍子過一服作個記號留為末服服完隔兩三日如未全愈可照此方再製一兩料服之自必全愈矣服此藥每日須肉食滋養又方真牛黃二錢全蠍一百枚去淨頭尾腳用新瓦焙存性研細以核桃肉搗丸如桐子大每服二十丸空心白湯送下如患處破皮便將取下蠍頭尾腳焙研細末搽上再以膏貼二十一日即愈永不再發製藥須擇成開除日修合藥酒方摩羅藤夏日用鮮者二斤陳木瓜酒五斤燒酒五斤冬月用枯者四斤陳木瓜酒八斤燒酒二斤入小口瓦壇用濕麵糊壇口重湯煮一炷香為度每食後隨量飲之常服除根除癧方活鯽魚四五寸長者竹刀剖去鱗腸入獨核肥皂子七個以黃泥為匣入魚匣內上下用炭火燒煅無煙取出候冷研細每服三錢清晨木瓜酒下又方白亮松香研極細末以雄豬骨髓調搽即愈三五年各藥不效者用此方俱效只在研調敷之手法要緊用左手即用左手到底用右手即用右手到底研藥調藥敷藥俱要認定一支手忌陰人拿又方夏枯草乃生血補虛消毒之聖藥或煎湯飲或浸酒飲癧上單用夏枯草煎濃膏塗之益氣養榮湯治抑鬱勞傷思慮太過心神俱憊以致四肢頭項筋縮結成纍纍如貫珠或硬或軟或赤或白或痛或不痛日晡發熱及潰而不斂者並效人參白茯苓廣皮白芍藥熟地黃香附當歸身川芎白朮嫩黃耆貝母各二錢桔梗粉甘草炙各五分生薑三片大棗二枚煎服胸膈痞悶加枳殼木香飲食不甘暫加厚朴蒼朮寒熱往來加柴胡地骨皮膿多或清倍加當歸川芎膿潰作渴倍加人參黃耆白朮當歸脅下痞痛加青皮木香肌肉生遲加白蘞肉桂痰多加橘紅半夏干加麥冬北五味子發熱加柴胡黃芩渴不止加知母赤小豆膿不止加人參黃耆當歸潰後反痛加熟附子沉香虛煩不眠倍加人參熟地遠志棗仁桃蠍散治憂思鬱結痰留氣滯乃生瘰癧大全蠍二十一個劈開去肉將蠍裝入扎緊火煅存性每用一枚研末臨臥陳酒下孫真人治瘰癧初起並治潰爛久不收口壁虎一條裹泥中火煅存性去泥研末臨臥陳酒調下治火鬱結核不拘男婦俱效用交媾陰精塗搽如孀婦即以自己陰精塗之大紅膏治瘰癧痰核結塊不分新久但未穿破者並效石灰一兩用大黃三錢切片同炒石灰紅色去大黃滴乳香去油輕粉各二錢銀珠血竭潮腦硝石各三兩天南星二兩上為細末陳米醋熬稠調藥敷核上三日一換敷後皮嫩微損者另換紫霞膏貼之其核自消氣瘰癧北煤炭搗碎同生桐油腳調敷自消瘰癧驗方孫展鴻多年點燈竹燈挂一個用火點著下置瓷器盤使油滴入盤內放土地上出火氣三日以鵝翎掃患處不過數遍已潰者自斂初起者自消敷項下痰核癧塊內消法明醫集鮮山藥一兩萆麻仁四兩共搗成膏敷上即消冰螄散治瘰癧日久堅核不消及服消藥不效者用此點落癧核如馬刀根大面小及失榮等證忌用大田螺肉五枚日中線穿曬乾白砒一錢二分麵包煨熟真番硇砂二分冰片一分先將砒螺研細再將硇片研勻小罐密收凡用時先將艾炷灸核上七壯次後灸瘡起泡以小針挑破將前藥一二釐津唾調成餅貼灸頂上用綿紙以厚糊封貼核上勿動恐其泄氣七日後四邊裂縫再七日其核自落換搽玉紅膏內服補藥培助完口此藥又治癭瘤患大蒂小及諸般高突異形怪狀者並效火針法治瘰癧核生於項間初起堅硬或如梅李結聚不散宜用此法針之插藥易消也用縫衣大針兩條將竹箸頭劈開以針尖夾縫內相離一分許用線扎定先將桐油一盞用燈草六七根油內排勻點著將針燒紅用手指將核捏起用針當頂刺入四五分核大者再針數孔亦妙核內或痰或血隨即流出候盡以膏蓋之次日針孔必漸作膿輕者用黃藥插之核堅硬者