各二錢五分連翹黃芩各三錢廣膠土炒煬一兩雄黃另研七分蛇蛻焙五錢共為細末好米醋打糊為丸每丸重一錢二分入麝香五分在罐內養之收貯凡遇此證每用一丸研末溫酒調服未成內消已成催膿速效如神瘰病劉氏家祕斑蝥去頭足翅同糯米炒看糯米炒黃色即揀去糯米只用斑蝥黑牽牛半生半熟白朮郁李仁去皮尖甘草密陀僧檳榔防風各五錢共為細末麵糊為丸如梧桐子大每服二十丸清晨檳榔甘草湯送下腹內作痛小便下毒如魚目狀已破自斂未破自消如小便全無以燈心煎湯利之如小便痛以蔥茶煎湯解之服此丸宜夏枯草煎濃湯當茶未破瘰癧沉香芫花干月月紅花各三錢共為細末用大活鯽魚一尾放尿桶內浸死取魚剖肚去腸剖鱗以前藥入內用線縫好煮熟將好酒同食必要連藥吃下儘量飲醉服後聽瀉自止忌房事並鮮發之物數日即愈已破瘰癧珍珠一錢輕粉二錢陳白螄殼火煅四錢上乳極細末用豬脊髓調將瘡挑開出子一個將藥補滿自然收功不必驚惶再服煎劑十貼當歸川芎各八分白茯苓七分白芍四分獨活三分陳皮羌活赤芍甘草各五分食後服二仙丹治瘰癧枳殼一斤每個切兩開去穰入斑蝥去翅足七個仍將兩片合住以線十字扎緊用上好醋浸七天足再以醋煮五炷香必要多加好醋煮透冷定解去線揀去斑蝥只將枳殼切片陰乾紫背天葵一斤如無以九頭獅子草代之共磨細末將前煮枳殼多餘醋打糊為丸如梧桐子大每服五十丸酒水任下早晚各一服未出頭者自消已出頭者用膏貼之自愈瘰癧劉長隨當歸蛇盤草各二錢燈籠果七個白茯苓八分皂角刺苦參各七分昆布六分黑醜五分土茯苓一兩先煎湯藥入土茯苓湯內煎食後臨臥服之忌豬首鵝羊魚蝦子雞香菌蛋白果粟子醬醋茶煎炒一切動風動火等物房事愈後用火酒十斤金銀花半斤入壇內浸一七煮一炷香埋土內七日取出早晚飲之永除根矣瘰癧黃君尚壁虎不拘幾條捉來活放酒釀內浸至第二日將陰陽瓦炙乾又浸如此九次再乳為細末每用壁虎六錢透明雄黃四錢共成一兩每用三釐胖人五釐好酒調下即長石榴子忌鹽三七二十一天只用精豬肉煮熟以醋蘸吃外面用貼過舊膏藥貼之將收口用豬首上栗子肉燒灰敷上即收口矣此丹未破者內消已破者即收口愈後再將男左女右手腕處灸七壯永不再發瘰癧膏金線重樓金線吊蛤蟆萆麻仁商陸各四兩天南星半夏露蜂房防風蛇蛻各二兩大黃土木鱉穿山甲番木鱉射干川烏草烏枳殼當歸紅花白芷殭蠶紫花地丁紫背天葵各一兩活雄鼠大者乾蟾各一個芫花一兩五錢巴豆肉急性子各五錢鯽魚四尾用麻油三斤浸七日熬枯去渣復入淨鍋內熬至滴水成珠稱熟油一斤入銀硃八兩收之成膏再下淨黃蠟八兩再下乳香去油沒藥去油血竭兒茶各五錢麝香二錢潮腦二兩乳細下之攪勻收貯攤宜厚些速效如神消瘰癧方江仁度甘遂一兩熬膏甘草一兩熬膏先將甘遂膏塗癧上離一燈草遠將甘草膏箍之其核自縮洗去次日又用甘遂膏塗之仍離一燈草遠又以甘草膏箍之以消為度又方江仁度鐵砂四兩用舊鍋鐵研碎或在爆竹店買鐵砂研末用滴醋煎成餅復打碎又用醋煎成餅又打碎再用醋煎如此七次乘鐵砂潮熱之時敷瘰癧上以消平為度又方胡景周鼠屎三錢鹽水拌炒為末以一錢拌砂糖為穰以二錢和麵隨人大小多寡作餅七個包穰焙熟令一日吃盡隔兩日服一次不過三服愈如未除根再服瘰癧膏川倍子八兩炒黑研末只用四兩川烏甘草湯泡生南星草烏半夏各一錢川貝母去心五錢緑色海粉四兩炒黑只用二兩各研細末共一處煉蜜茶汁和成膠貼患處油紙護之地龍膏李養榮瘰癧未破者立消地龍糞雄黃小麥面各等分研細醋調塗專治瘰癧有核成瘡者皆能速愈花壁虎一條裝入雞蛋內封固放飯上蒸熟取起去殼將壁虎同蛋搗爛為丸如緑豆大陰乾分二十日空心茶湯或米飲皆可送下服完百日內忌發物及生薑椒蒜雞鵝羊肉遺精房事為要瘰癧蛇蛻一條白者佳鍋內炒脆研末臨臥食後酒調服在膈上取汗次早潰者膿少未潰者消其潰者一時難收口須用花椒湯洗再用黃連末摻之消瘰核吳近宸生半夏生香附各等分生附子少許研細熬滴醋調敷核上自消內消散任中嵩治瘰癧宜先服益氣養榮湯十多劑後再服硃砂血竭各一錢生斑蝥去翅足三分上為細末每服一分空心燒酒調服未破者三五日立消已破者內服此藥外用金頭蜈蚣一條研極細末用麻油一小盅浸兩晝夜搽患處其瘡即腫潰過一二日腫消可貼膏藥瘡勢大者二十日痊小者十餘日平復消瘰癧吳搢珽朝北虜虜藤陰乾煅存性研細米糊為丸桐子大每服三錢白湯送下未成即消已成即潰治瘰癧楊氏家藏荊芥白殭蠶炒去絲黑牽牛各二錢斑蝥二十八個去頭翅足同米炒上為末臨臥時先將飛滑石末一錢用米湯調服半夜時再將滑石調服一錢至五更時用溫酒量人之強弱調前藥末一錢或二三錢服之服後如小水內並無惡物行下次日早再用一服倘仍不通利第三日五更時先吃白糯米粥再服前藥一服更用燈心湯調琥珀末一錢服之以小水內利去惡物為效如尿管痛用青黛一錢以甘草梢煎湯調服其痛立止此方治誤食毒物致成瘰癧其功甚速內消瘰癧丸夏枯草八兩元參青鹽各五兩海藻川貝母薄荷葉天花粉海粉白蘞連翹去心熟大黃生甘草生地桔梗枳殼當歸硝石各一兩共磨細酒糊丸桐子大臨臥白湯送下三錢瘰癧痰核貓一隻煨熟數次食完自消又方如意草焙為末雞蛋清調敷消核黃漢升犍豬膽七個用銅鍋熬以朝北柳枝順手攪不可反手攪熬至滴水成珠為度傾瓷器內放朝北地上冷一伏時用緞子攤貼槐條膏治瘰癧如神並貼瘡毒嫩槐條要採一枝有七個頭者取四十九枝銼碎麻油一斤浸三日用小火熬枯去渣入炒鉛粉八兩收膏攤貼宜春夏熬收瘰癧串痰人信四錢九分黑棗七個去核每棗入信七分陰陽瓦焙盡煙為度埋土內一個月取出研細末柏油調搽以軟紙貼之如無膿血流出即不必換藥自然長肉結疤驗方糯米肥皂一斤去核水浸一宿去皮筋弦石臼搗爛加上好米醋一斤再搗以新布攪汁去渣入新砂銚內熬如米湯色用柳枝不住手攪再入白蠟一兩熔化成膏出火氣油紙攤貼如已潰者效更速熬時擇淨室婦女雞犬忌見瘰癧丸牡蠣煅元參炒各五兩土茯苓炒二兩五錢端午日共磨細用酒打麵糊為丸如緑豆大患在上身每清晨酒下二錢五分晚下二錢患在下身早服二錢晚服二錢五分自然漸消消氣核瘰癧巴祕全斑蝥二個白殭蠶二十個火酒二斤同浸每日飲少許即消瘰癧已潰未潰巴祕每歲用金頭蜈蚣一條陰陽瓦焙研取雞蛋一個打一孔將藥裝入糊好飯上蒸熟每日一個服至患者年歲若干為止未潰即消已潰自斂瘰癧蛇頭果子草四五月間生時採來焙乾浸酒飲之盡醉發汗如此三次以後只飲酒不必取汗未潰者消已潰者膏貼瘰癧潰爛繞頸垂危者用苦丁草十多斤洗淨熬膏攤貼初貼之時極痛必須忍耐貼三四日即不痛矣雖爛見咽喉胸脅者俱能全愈馬刀門主論靈樞云腋下其癰赤堅而不潰者為馬刀挾癭急治之汪省之曰馬刀專屬肝膽二經其形頗長堅硬如石或在耳下至缺盆或肩上沿至脅下甚至胸前纍纍經年纍月有作瘡而不破有破爛而膿血不止者其證幾危矣理例馮魯瞻曰若在胸旁或兩脅結長核者此名馬刀錦囊周文採曰馬刀瘡生於項腋之間有類瘰癧但初起其狀如馬刀赤色如火燒烙極痛此瘡甚猛宜急治之不然多成危殆也集驗胡公弼曰結於胸前及胸側連脅者名馬刀此足少陽膽經候也初生小後必大若疼痛破爛出膿膿孔受風決成漏證斷不易治惟年壯氣血盛者治之易痊青囊陳實功曰馬刀瘡形長如蛤者是生於項側耳下肩上缺盆腋下正宗蔣示吉曰馬刀結核其硬如石乃手足少陽經起若失而不治不守禁忌漸延至陽明頰下頰車俱到壯實者潰堅湯不足者滋陰散堅湯主之説約澄曰馬刀生於缺盆之上由胸腋而至脅本由痰核瘰癧時潮熱時作氣血已枯精神短少兼之醫治不善釀至膿血大潰腫勢日堅更有潰流血水毫無膿汁復有纍如巖穴脹而不痛外撑車頰內阻咽喉飲食妨礙筋脈拘攣收引疼痛腿足牽扯甚則怒火上衝迫血從毛竅溢出變而為馬刀矣馬刀名之者何義謂之馬其行疾謂之刀其器利既疾且利人將奚敵哉故靈樞經云馬刀挾癭宜急治之雖然人雖垂死猶有可生之法若坐視不救豈仁者之心哉外宜艾灸或可回生如肩井肺俞膻中風池百勞曲池穴各灸三壯內服益氣養榮湯開鬱清痰和氣消核之劑首尾肝脾兼固氣血雙扶灸後用萬靈膏調理一年恬淡靜養尚可保全性命若妄治追蝕於外攻伐於內則死亡立待矣𤷍癧癰門主論王肯堂曰𤷍癧癰生項腋兩乳旁結核或兩胯軟肉處腫塊屬手少陽三焦經其發緩慢是冷證非熱證也宜回陽玉龍膏敷貼準繩澄曰此證生於項脅形類結核髮長緩慢漸增焮腫色紅乃心包絡寒痰脾氣鬱結而成治宜溫和舒郁化堅蠹疽門主論申鬥垣曰蠹疽即發歷瘡乃足陽明胃經多氣多血生於缺盆二穴之分在肩下乳上如再生四五頭子母大小者又名歷瘡十日可刺如無膿者名曰石疽啓玄鈕扣風門主論陳實功曰鈕扣風乃風濕凝聚生瘡久則搔癢如癬不治則沿漫項背治以冰硫散搽正宗鈕扣風門主方冰硫散正宗樟冰明礬川椒各二兩硫黃三兩上為細末先用蘿蔔一個挖其內將藥填滿腹將原皮蓋之濕紙包三四層灰火內煨半時待冷取開用藥同熟豬油調搽患上自愈
