body:
  text: 卷三十四諸瘡部上凡疔瘡楊梅結毒俱匯於此部中以便檢閲參治疔瘡門主論華元化曰疔有五色屬五臟紅屬心發於舌根青屬肝發於目下黃屬脾發於口唇白屬肺發於右鼻黑屬腎發於耳前以種類言之孫真人千金方論疔瘡一十三種一曰麻子疔其狀肉起頭如黍米色稍黑四邊微赤多癢忌食麻子油衣麻衣入麻田中行二曰石疔其狀皮肉相連色如黑豆甚硬刺之不入肉微痛忌瓦礫磚石之屬三曰雄疔其狀疱起頭黑靨四畔仰疱將起有水出色黃大如錢孔形高者忌房室四曰雌疔其狀瘡稍黃向里壓亦似灸瘡四邊疱漿起心凹色赤如錢孔者忌房室五曰火疔其狀如湯火燒灼瘡頭黑靨四邊有煙漿又如赤粟米者忌火燒烙六曰爛疔其狀色稍黑有白斑瘡中有膿水流出瘡形大小如匙面者忌熱食爛物七曰三十六疔其狀頭黑浮起形如黑豆四畔起赤色今日生一明日生二及到十若滿三十六藥所不能治未滿三十六可治忌嗔怒蓄積愁恨八曰蛇眼疔其狀瘡頭黑皮浮生形如小豆狀似蛇眼大體硬忌惡眼人看並嫉妒人見忌毒瘡九曰鹽膚疔其狀大如匙面四邊皆赤有黑粟粒起大忌食鹽十曰水洗疔其狀大如錢形如錢孔頭白里黑靨汁出中硬忌飲漿水水洗渡河十一曰刃鐮疔其狀闊狹如薤菜大長一寸左側肉黑如燒烙忌刺及刀鐮切割鐵刃所傷可以藥治不可亂攻十二曰浮漚疔其狀瘡體圓曲少許不合長而狹如薤菜大肉黃外黑黑處刺之不痛黃處刺之痛十三曰牛狗疔其狀肉色疱起掐不破以上疔瘡十三種初起瘡心先癢後痛先寒後熱熱定則寒多四肢沉重心驚眼花若重者則嘔逆嘔逆則難治麻子疔一種始終惟癢以上忌禁者不得觸犯如觸犯者發作難治惟浮漚牛狗二疔無所禁忌縱不醫亦不害人其狀寒熱與諸疔不同故不殺人也凡疔起後背強瘡痛極甚不可忍者是觸犯禁忌以此為辨此條與外臺祕要神巧不全所論頗同王肯堂曰疔之四圍有赤腫名曰護場為可治疔之四圍無赤腫名曰不護場不可治準繩又曰瘡證急者有應如生一疔之外別處肉上再生一小瘡即是有應可用針挑破護場瘡四圍有赤腫生多瘡者謂之滿天星飲食如常頭痛身熱手足溫陳實功曰疔瘡有朝發夕死隨發隨死誠外科證中迅速之病也凡治此證貴在乎早如在頭面頭乃諸陽之首亢陽熱極所致其形雖小其惡甚大再加艾灸火益其勢逼毒內攻反為倒陷走黃之證作矣既作之後頭面耳項俱能發腫形如胖尸七惡頓起治雖有法百中難保一二不可不慎正宗又曰毒發於心經者生為火焰疔多生心臟之俞募井之端唇口手掌指節或手之小指初生一點紅黃小泡抓破痛癢非常左右肢體麻木心煩發躁言語昏憒又曰毒氣發於肝經者生為紫燕疔多生手足腰脅筋骨之間或足大指初生便是紫泡次日破流血水三日後串爛筋骨疼痛苦楚眼紅目暗指甲純青睡語驚惕又曰毒氣發於脾經者生為黃鼓疔初生黃泡光亮明潤四面紅色纏繞多生口角腮顴眼胞上下及太陽正面之處便作麻癢繃急硬強重則噁心嘔吐煩渴乾噦又曰毒氣發於肺經者生為白刃疔多生手大指初生白泡頂硬根突破流脂水癢痛驟然易腐易陷腮損咽焦毛聳肌熱咳吐膿痰鼻掀氣急又曰毒氣發於腎經者生為黑黶疔多生耳竅胸腹腰腎及足小指湧泉偏僻軟肉之間初生黑斑紫泡毒串皮膚漸至肌肉頑硬如釘痛沏骨髓重則手足青紫驚悸沉困軟陷孔深目睛透露又曰紅絲疔起於手足節間初起形似小瘡漸發紅絲上攻手膊或攻大腿令人寒熱噁心嘔吐遲者紅絲至心常能壞人急用針於紅絲盡處挑斷出血尋至疔上挑破插入蟾酥條膏蓋內服蟾酥丸發汗追出疔根得膿自愈又曰唇下疔又名馬口疔又曰手掌心疔又名擎珠疔又曰患疔經五六日不瘥目中見火光心神昏昧口乾心煩嘔吐不定皆屬疔毒內陷均須速治馮魯瞻曰疔者經曰膏梁之變蓋因膏梁之人皮肉厚密內多滯熱故變為疔然古方計有一十三種三十六疔之分總由臟腑積受熱毒邪氣搏於經絡以致血凝毒滯注於毛孔手足頭面各隨臟腑部位而發其形如粟米或痛或癢漸至遍身麻木頭眩寒熱時生嘔逆甚則四肢沉重心驚眼花經雖所載疔色有五以應五臟其實紫黑及黃泡者居多先癢後痛先寒後熱也宜內服發散解毒攻托之劑外敷拔毒菊花葉蒼耳草之類大概疔已成膿則毒已外泄可無他慮惟在初起最宜謹慎疔毒攻心禍如反掌蓋疔由心火蘊結故其疼痛異常為害甚速病人口嚼生豆不覺豆腥者即是也若於耳後方圓一寸發者尤甚蓋水枯火熾之極也不可妄動如抓破見風毒即內攻不救錦囊又曰紅絲疔者又名血絲疔發於兩手指而作紅絲漸漸行至關節勢必殺人可先以線扎住紅紋之處次將銀針砭去惡血以藥塗之上者血紅次者血紫下者血黑若一失治則稽留不散輕則爛傷墮指重則入腹而死又曰內經以白疔發於右鼻赤疔發於舌根黃疔發於口唇黑疔發於耳門青疔發於目下蓋取五色以應五臟各有所屬部們又有發於或肩或背或腰或足發無定處如在手足頭面骨節間者最急其餘猶可緩也李東垣曰疔上按之磣痛應心者是疔也秋冬寒毒久結皮膚中變作疔瘡不急治之日夜根長流入諸脈數道如箭入身顫掉不已若不慎口味房室死不旋踵精義申鬥垣曰夫疔瘡取治其法不一當先看其緩急如緩者一日瘡疱白色而小二日色白微大三日色微紫四日色真紫此候之緩也急者五日色青紫小六日色深青大緊七日色黑如火灸瘡之狀此最急之候假如身上生一瘡而他處又生一小瘡為之應候先用針挑破小瘡則泄其毒謂之可治若只有一疔他處無小瘡謂之無應候不可治疔無應候是毒氣之甚故不可治也大抵疔瘡四圍有紅赤焮腫者名曰有護場如疔瘡四圍不赤腫者即是不護場不可治也有護場方可治也疔之生者身熱頭疼手足溫暖飲食如常是常疔也疔之危者眼轉大渴而喘唇面青不進食五心腫無有脈四肢冷不起床不精神腹痛甚於常是有內疔也啓玄周文採曰凡療疔瘡皆宜刺瘡中心至痛處又刺四邊十餘下令血出去盡惡血敷藥藥力得入針孔中方佳若藥不達中藥力難達反致誤事又看口中頰邊舌上有赤黑如珠子者是疔也集驗養生篇曰人汗入肉食之則生疔瘡不可不慎竇漢卿曰凡疔瘡針刺患人手足中指不痛者難治又曰如疔在頭面手足骨節間者甚急又曰疔瘡頭陷碧緑色者不可用針刀出血又曰疔瘡日久潰爛者不可用針出血只可用刀割去腐肉又曰疔瘡生根入腹者便死用磨針刀鐵漿水一碗絲綿濾淨銀鍋內煎三四沸服之病者須臾腸鳴行得一二次蘇醒方妙又曰疔瘡不破則毒入腸胃惟蟬蛻極效用一兩為末蜜調下又曰疔發於太陽眼邊者名曰釘腦疔十死一生又曰疔瘡膿水出孔如蜂窠病易瘥也又曰凡人暴死多是疔毒急取燈遍照其身若是小瘡即是其毒宜急灸之並服飛龍奪命丹等藥亦有復蘇者全書竇夢麟曰嘴唇痘疔初生米大或粉刺擠破入湯火風氣即要變為疵瘡疵瘡即疔之別名也先用蔥白同飛龍奪命丹五粒和嚼爛熟酒半碗送下以衣覆患上略出汗為妙上午服藥下午即將絶利磁鋒劃破瘡口十字即摻飛龍奪命丹末在內而外用蟾舌研爛蟾肚底皮貼之內服追疔湯劑若發鬚髮者即剃去鬚髮如前法治之此法靜夜細思試而行之百發百中活人多矣焉敢自祕遂並梓行病人一個月內無色欲者患處平妥無胬肉乃其徵也全書陳遠公曰有生疔瘡者疼痛非常亦陽毒也初生之時人最難辨但以生黃豆令嚼之不知腥者便是其瘡頭必發黃泡中現紫黑之色細看泡中必有紅白一線通出泡外凡疔生足上紅線由足入臍疔生手上紅線由手走心如生唇面紅線由唇面至喉如見此紅線即於盡處以針刺出毒血則免毒攻心若現白絲不必刺也總以消毒瀉火為主世人戒用官料之藥此乃不知醫之語毒非藥安得除哉拔疔散治之紫花地丁甘菊花各一兩水煎服一劑紅線除二劑疔散三劑痊愈不必外治挑疔之多事也若已潰爛加當歸二兩治之不必四劑毒盡肉生也冰鑑胡公弼曰豬疔其形圓而小口內有油忌食豬油豬肉牛疔其形圓而小口內無油疱起掐之不破有寒熱忌食牛肉狗疔其形長而帶尖色赤有寒熱忌食狗肉羊疔其形長而帶白色有寒熱忌食羊肉瓜藤疔不計其數其形圓長如瓜形因食瓜毒而生忌食諸瓜豆腐疔其狀白泡三日內頂陷因食豆腐內有人汗而生忌食豆腐氣疔其形或大或小疱白如有氣在內因感恚怒而生忌氣惱鬼疔其形大小不一因中邪毒之氣而生異於諸疔比氣疔更甚令人言語如見鬼狀紅絲疔其形縷縷赤色如絲線周身纏繞宜松針刺去血忌熱物內疔言其於內臟腑上腔子裡面喉內口內與外疔更不同利害宜托裡追疔蘿葡疔其形黑兼紫如水晶故名之疱白黑血毒水宜去之宜托毒楊梅疔形黑紫如熏梅狀若遍身楊梅瘡內雜疔瘡一二個則令通身瘡不起發須針刺出毒服托裡土茯苓等藥魚臍疔如魚之肚臍多生胳膊肚小腿肚上乃手足陽明經分毒氣治宜加引經藥蜈蚣疔形長如蜈蚣亦有頭足發寒熱因飲食中被蜈蚣遊走遺毒於內而生宜加雄黃程山齡曰治療之法貴在乎早初起即治者十全十活稍遲者十全五六失治者十全一二內服莫妙於菊花甘草湯項之以上三陽受毒必用針刺挑斷疔根插藥膏蓋項之以下三陰受毒即當艾灸灸之不痛亦須針刺插藥自效十法疔瘡門主方菊花甘草湯十法治疔之聖藥也菊花四兩甘草四錢水煎頓服渣再煎服反唇疔擎珠疔經霜南瓜蒂煅灰加冰片少許研細麻油調搓馬口疔生唇下者是新鮮鰱魚血磨蟾酥塗之拔疔法巴豆去殼半粒磁石研末用蔥涎和蜜為膏敷疔上血疔出血不止者是真麻油一盅服下自止蟾酥餅兼治腦疽乳癰附骨疽臀癰一切惡證或不痛或大痛或麻木用此敷貼瘡頭潮腦硃砂各一錢真蟾酥酒化沒藥去油乳香去油明雄黃巴豆霜各二錢輕粉五分麝香三分以上各為細末五月五日午時在淨室中用蟾酥酒和丸如緑豆大每用一丸口涎調貼疔瘡上以膏蓋之此藥為丸為條為餅聽便使用一方去巴豆霜潮腦加寒水石煅枯礬膽礬各一錢蝸牛二十一個惡疔大毒金銀花當歸身各五錢天花紛甘草地丁各三錢皂角針二錢川椒九粒酒煎服疔毒惡瘡家菊花並葉共搗汁用酒沖服將渣加鹽少許敷上立愈冬月用根亦可又方紫梗菊花搗碎白酒煎服又方鰣魚鱗用荷花瓣夾好置書頁中遇疔貼上即愈大疔惡毒祕方火硝北煤系用過倒地上渣內撿出者各等分研細末瓷瓶收貯凡遇一切疔毒用陳窗糊紙水濕掩疔上再以此藥敷之疔根自出疔瘡神方蒼耳草根葉搗爛入童子小便絞汁冷服一盅日三次仍以根莖葉苗任取一束燒灰存性為末用醋泔藍靛和如泥先將瘡中心及四邊刺破令血淌出拭淨敷之不過十次根即拔出為諸方第一飛龍奪命丹正宗專治疔瘡及癰毒發背腦髮乳癰一切無名腫毒惡瘡及有頭不知痛癢者已成未成神效蟾酥酒化雄黃各三錢乳香去油沒藥去油銅緑各二錢膽礬硃砂血竭寒水石各一錢當門子冰片輕粉各五分蝸牛二十一個蜈蚣一條酒浸泡炙去頭足上俱為極細末用蝸牛連殼研如泥少加飛羅面和丸如緑豆大每用三丸用白蔥三個令病人嚼爛吐於男左女右手心將丸藥放在蔥內熱酒送下被蓋約人行五六里出汗為效無汗以熱酒助之重者再進一服病在上食遠服病在下食前服忌冷水瓜茄油膩豬雞魚面及一切發物孕婦忌服走馬回疔丹疔瘡初起針破用此一粒插入孔內膏蓋之次後追出膿血疔根為效硃砂雄黃各二錢蟾酥酒化硇砂白丁香輕粉各一錢蜈蚣一條炙金頂砒麝香各五分乳香六分上為細末糊和成如麥子大插瘡內以膏蓋之鉛粉散冷疔生於腳上初起紫白泡疼痛徹骨漸至腐爛深孔紫黑血水氣穢經久不瘥用此大效黑鉛四兩鐵杓內化開傾入水中取起再化如此百遍以鉛盡為度去水取澄下者三錢松脂一錢黃丹飛炒輕粉各五分麝香三分共研細先用蔥湯洗淨麻油調搽瘡口油紙蓋好束毒金箍散疔瘡針刺之後餘毒走散作腫宜此藥箍之生大黃鬱金蟬肚者白芨白蘞白芷各四兩黃柏二兩緑豆粉一兩輕粉五錢共為細末酸米漿調箍四邊夏熱甚用蜜水調消疔簡便方疔瘡及諸惡毒初起但未成膿者服之神效白礬研三錢蔥白七莖上二味同搗極爛分作七塊每塊用熱酒一杯送下服畢用厚被蓋之再進蔥白湯一盅少頃汗出如淋從容去其覆物其病如脫此雖味澀難服其效甚妙凡居鄉村之處遇有此證不及延醫只傳此方服之活人甚衆誠為良便方也敷疔銀硃三錢紅棗七個煮爛去皮核搗敷留頂疔甘松三奈各五錢雄黃研細一錢麝香一分酒水各半先煎甘松三奈煎好濾清調雄黃麝香服紅絲疔用銅錢捫頭處將木上舊釘起一根用棉花包裹蘸桐油點著令油滴錢眼內一滴即愈疔瘡生蔥和蜜搗敷患處過一飯時疔即拔出保生梃子疔瘡背疽瘰癘一切惡瘡巴豆四十九粒文武火炒研硇砂三錢輕粉半大匣金腳信雄黃各三錢麝香一錢為極細末用黃蠟五錢熔開將藥合成梃子冷水浸少時取出旋丸捏作餅子如錢眼大將瘡頭撥開安一餅於頂上次用膏貼蟾酥丹蟾酥不拘多少黃丹白麵等分為丸如麥粒大針破疔瘡以一粒納之膏蓋散疔膏磁石乳細以蔥頭十四根取汁入蜜少許調勻敷留一孔一敷即散妙不可言內服托裡藥拔疔蜣螂腹下有一白點者即心也先以針刺破疔頭再將針取出蜣螂心點疔頭上以膏蓋之半日間血出根拔而愈忌羊肉一切疔腫孫真人一色蒼耳草連梗葉燒灰以醋調搽干即再搽重者十餘次吃牛肉中毒生疔金線重樓即七葉一枝花不拘多少切碎研細和溏雞屎調勻搽上立效疔瘡怕動刀針巴豆仁一粒飯一粒研貼瘡上立時拔出疔根再尋癩蛤蟆取肝貼上神效諸疔菊花葉搗汁服一碗死可回生疔毒已篤者二服即愈潘霞山土蜂房一具蛇蛻一條黃泥固濟燒存性為末每空心好酒服一錢少刻大痛痛止其瘡已化為黃水爛頭疔白梅二個大蜒蚰二條白菊花根一把共搗爛加透明雄黃同敷如干再另敷一二遍無不愈者扎馬疔切不可食肉生白酒煎豨蘞草紫花地丁車前草服之追疔奪命湯赤水玄珠羌活甘草節蟬蛻川黃連獨活北細辛青皮金銀花防風澤蘭葉殭蠶金線重樓赤芍各等分有膿加何首烏白芷要通利加大黃牽牛青木香山梔毒在下加木瓜各等分每服五錢先將一貼加澤蘭葉金銀花各一兩薑十片煎熱服汗出為度病退再加大黃二錢煎熱服取利一二次去餘毒為妙此方取效如神百發百中若心煩嘔吐用甘草節緑豆粉各等分酸漿湯調下二錢如嘔逆噁心用乳香緑豆粉各等分甘草湯調下二錢小奪命散治疔瘡及腦疽惡毒其效如神槐花子地丁千頭子即掃帚子又名地膚子各等分水煎通口溫服加真蟾酥少許尤妙拔疔丹一名疔毒撤回畢峻功凡一切疔瘡無名腫毒初起磨敷已成已潰用一粒放瘡上膿血即拔出如遇陰疽對口大證可用十數粒鋪瘡上如神巴豆霜乳香去油沒藥去油真蟾酥酒化開乳成膏明雄各二錢樟冰露蜂房陰陽瓦焙存性劈硃砂各一錢真輕粉當門子各五分上各乳極細照分兩稱準和勻以蟾酥膏和杵為丸如藥珠大曬乾瓷瓶密貯任用此即蟾酥餅原方加露蜂房也疔瘡丸馬驥功得自盧成琰傳專消一切疔瘡兼治濕痰流注梅瘡初起巴豆仁去皮膜明雄生大黃各三錢共研細末加飛面醋打糊為丸如金鳳花子大每服二十三丸熱湯送下瀉三四次無妨弱人只服十九丸自消得嚏即愈髭疔紅絲疔面白疔腫脹至目與鼻俱隱入肉裡牙關緊急昔有一道人用患者耳垢齒垢刮手足指甲屑和勻如豆大放茶匙內燈火上炙少許取作丸將銀簪將疔頭挑開抹入用棉紙一層津濕覆之痛立止半日目可開腫已消半次日服活命飲二劑遂愈血疔或生肘下或生眼角疔有一竅如針眼淌鮮血不止真香油四兩無灰酒不拘多少和勻熱服其血立止隨用野菊花濃煎常服切忌茶湯萬靈奪命丹治一切疔毒入腹煩悶噁心兼治癰疽發背惡瘡硃砂水飛蟾酥人乳泡輕粉膽礬各五錢銅緑血竭各一兩雄黃枯礬各二兩共為細末麵糊丸芡實大每服一丸令病人先將蔥白三寸嚼爛吐在手心將丸包在蔥內熱湯吞下出汗疔生磁石一錢麝香一分研極細每用少許膏蓋又方胡椒二十五粒大獨蒜一個蔥白三根共搗爛油紙上作膏貼之神驗祕方用鐵釘放屋上受風露之氣日久上鏽以刀刮下乳極細加麝香少許瓷瓶密貯如遇疔瘡已破者摻少許即流黑水不過三次疔根自出如未破者以水調點疔上即可拔疔如神疔瘡不用刀針杜寶山萆麻仁七粒銀硃一分共研細如干加唾津少許疔頭讓出即周圍敷之兩三次即出小黃頭矣拔疔第一方徐峨峰萆麻仁四十九粒半杏仁去皮十七粒半松香二兩一錢五分荔枝肉三個半銀硃少許共搗成膏貼之拔疔吳韻清荔枝肉一個溏雞屎菊花根葉不拘多少共搗爛敷上立愈又方鰣魚鱗貼之水疔門主論凡人手足一時生出小瘡四圍紅赤中間一點漆烏堅硬如石痛不可忍者名曰水疔破後惟流血水啓玄水疔門主方治水疔土牛膝不拘多少搗爛入鹽少許和勻敷疔上半日即愈又方陳壁土食鹽各一錢雄黃三分共研細末津液調敷疔上其疔自落水疔五月五日午時採豨蘞草搗細末酒調服三錢取汗又方荔枝肉一個貼在疔上以生白酒飲醉取汗為度紅絲疔門主論胡公弼曰紅絲疔一名急疔生於手足肘脘之間初起如黃豆大色似緋袍此疔根行如箭日夜行一尺二寸狀如紅絲線一般皆因大喜大怒氣血逆行所致走入心腹令人悶亂不救凡遇此等急證尋見紅絲之處即用神針針斷其根針入四五分取去紫黑惡血急服追疔奪命丹隨飲浮萍酒立愈無愧青囊紅絲疔門主方浮萍酒陸伯迪治紅絲疔一服即愈浮萍不拘多少搗爛用好酒一斤或半斤煎滾沖浮萍內半時許通口服隨嚼浮萍草敷疔上楊梅瘡門主論陳實功曰楊梅瘡者又名時瘡俗名歹瘡因其形類楊梅耳總由濕熱邪火所化先從上部見之皮膚作癢筋骨不疼其形小而乾者是氣化傳染乃脾肺受毒毒在皮膚不曾傳裡為輕宜萬靈丹發汗自解先從下部見之筋骨多痛小水澀淋其形大而硬者是精化欲深乃肝腎受毒毒在骨髓未透肌膚為重宜九龍丹通利以瀉骨中之毒須內毒已解筋骨不疼瘡根淡白方可搽藥若求速效妄用藥熏擦必貽後患醫家病家均慎用之正宗馮魯瞻曰楊梅瘡者因形相似而名之也凡氣受之而得者堅實凸起又名棉花瘡若血受之而得者其形扁折而潰又名果子瘡皆類其像而俗呼之北方名曰天泡瘡雖名異而實同然治療須別凡自致者重傳染者輕自致者欲欲太妄以致陰處先見及縱口恣味三焦皆熱精竭血結遺滯諸經而成也傳染者中氣不足外染稍輕然患此者切不可用毒物發之亦不可用涼藥遏之並求速效須用煎藥解毒補益托散外用煎藥洗浴仍以膏藥搽貼拔毒出外方無後患錦囊申鬥垣曰陰楊梅瘡與陽楊梅瘡大不相同陰楊梅瘡色紅而不起不破乃血中受風熱之毒又云男子受婦人梅瘡毒穢起相感而生啓玄又曰翻花楊梅瘡是表虛毒氣猖獗而成又曰楊梅豆子是毒氣之微感之輕也又曰楊梅癬是患瘡時食了牛肉或洗浴當風抓癢有犯房欲致令渾身腥臭或干而起白屑或腥水淋漓治當分氣血身之上下多少又曰楊梅瘡食豬腸臟致令愈後復生楊梅圈子瘡也陳遠公曰有嫖妓戀爐酣戰覺馬口間如針刺痛此毒氣已過也未幾生魚口矣生疳瘡矣遍身生瘡矣黃膿泛濫臭腐不堪人以為毒盛多用敗毒之味不知日事敗毒而毒益盛瘡益多有腐爛而死者夫楊梅之毒中於泄精之時必元氣虧損故毒乘虛之入若元氣大旺毒難深入即有傳染不過輕微之毒可一瀉而愈遍身毒瘡乃大虛而毒深中也不補虛而瀉毒何能奏功乎若止服敗毒無異下石也二生湯生黃耆土茯苓各三兩生甘草三錢水煎服四劑瘡漸紅又四劑乾燥又四劑痊愈此方不去解毒只以黃耆補氣氣旺邪自難留得甘草之化毒土茯苓之引毒毒去而正氣無虧氣生而血又能養此治之巧無如人不知也可勝嘆息云辨證冰鑑胡公弼云楊梅瘡又名砂仁瘡其患皆因色欲過度染受穢汙之惡毒或先患下疳或先患橫痃然後始發此瘡此瘡將萌手掌心隱隱當見紅點治之者切不可苟圖財帛暗用輕粉等藥隱之梅瘡一服輕粉如油入面毒入筋骨而莫能解也不但終身骨中疼痛結毒潰爛上至五官頭顱下至玉莖元首蟲蝕無存噫輕粉之為害可勝道哉患此瘡者亦不畏人物議而求速效醫者當盡發其毒使之外出務使永無遺患無愧青囊又曰有患楊梅瘡遍身獨有一二個形色紫黑如熏梅疼痛特甚多令通身瘡不起發此乃楊梅疔也即如痘疔阻遏不能起發行漿無異須用針刺出血服托裡土茯苓等劑又曰楊梅瘡初起似肉泡其人起白皮層層揭去直揭至三四十層方能穿破宜服人參茯苓湯毒未穿不用膏藥如已破貼梅漏膏待肉平去膏藥蔣示吉曰總之楊梅瘡宜發不宜遏貴在除根莫求速愈得其旨矣説約廣筆記云有以水銀番硇搓擦五心醫楊梅瘡致令患者三日間舌爛齒脫喉潰穢氣滿室吐出腐肉如豬肝色二便不通湯水不入腹脹幾死證已危急矣醫斯證者須以手按病人之腹不痛者知雖脹未堅毒未及心其毒尚淺速治可效法用鉛二斤分百餘塊加大劑甘桔湯料銀花甘草各四兩水三十碗煎濃汁先服三四碗徐澆舌上任其自流澆灌一個時辰其舌即可轉動口內即可洗淨隨令飲汁數盞將前渣再煎連前剩汁攙和一處頻頻洗濯手足次日二便出黑水無數始安然後用吹口藥及內服敗毒內托之劑而痊澄曰楊梅瘡又名棉花瘡因其綿綿難絶也又名肘瘡乃時氣乖變邪氣湊襲形如楊梅或上或下綿綿不絶皆由入房不淨淫火鬱結之毒若瘡毒傳染氣化者輕先入脾肺其瘡先見於上部皮膚作癢筋骨不疼其形小而且干毒在皮膚未經入里治宜發散若淫女媾精精化欲染者重流於肝腎先發下疳次生魚口先從下部見之漸至遍身大而且硬筋骨多疼小水澀淋此證最重因其毒氣內入骨髓外達皮毛若非汗下兼行將何以洗濯其臟腑乎若瘡發已久血氣已虛毒猶未退宜解毒托散為主總以醫至筋骨俱已不痛瘡根淡白內毒已散方用點藥輕者半年重者一載方可痊愈若不遵此法欲其速愈妄用熏條擦藥哈吸等法往往致成後患者多矣楊梅瘡門主方首用第一煎方全當歸穿山甲切碎微炒甘草節沒藥去油柴胡乳香去油天花粉川貝母皂角刺赤芍各三錢防風連翹肉桂各二錢四分金銀花廣陳皮各七錢五分白芷二錢一分上各稱準分作三劑每日一劑用黃酒一斤水一斤煎至一斤為度宜砂罐煎之溫服取汗二次水酒減半照上溫服取汗戒口味不過三服即愈看何部位照後加味治之神效頭上加藁本面上加升麻白芷頂上加升麻桔梗羌活腹加白芷柴胡背加皂角刺胸加栝蔞腰加羌活獨活脅肘加柴胡青皮臂上加肉桂羌活耳後加升麻柴胡獨活桔梗四肢加肉桂金銀花肩膊加肉桂升麻腳底加肉桂牛膝瘡成加肉桂皂角刺以上引經藥各加一錢煮棗神方家祕何首烏半斤天花粉威靈仙鱉甲炙金銀花皂角刺川萆薢白殭蠶木通白芷麻黃蟬退當歸蒼朮川芎各二兩生大黃生地各四兩全蛇蛻一兩上藥用水一斗磁鍋內煎至五六升去渣淨揀大黑棗五斤入汁再煎收至藥汁干為度將棗曬乾不時食數枚毒漸消口自收落靨而愈消風敗毒散歸尾川芎生地赤芍黃芩乾葛升麻各一錢川黃連防風黃柏連翹各八分羌活金銀花蟬蛻甘草各五分水煎二三劑熱服初起必加大黃二錢芒硝一錢五分通利惡物去淨後即勿用草四味風勝飲説約毒發出時用防風荊芥白芷梢連翹苦參赤芍黃連地骨皮白鮮皮黃芩山梔子歸尾木瓜金銀花蟬蛻薏苡仁黃柏殭蠶五加皮甘草白蒺藜皂角刺各一兩土茯苓白實者三斤上部瘡多倍加川芎下部瘡多倍加木通瘡痛加羌活獨活體虛加人參茯苓去梔子分作五六十劑每日水煎二劑服忌牛肉燒酒豬肝腸鹽宜炒過食不炒恐生癬此方起死回生活人甚衆羊肉發藥説約梅瘡初起皮膚燥癢上部多者蟬蛻川芎當歸各三錢威靈仙一兩麻黃春用七錢夏用五錢秋用九錢冬用二兩二錢先用羊肉一斤水十碗煎七碗去羊肉入前藥於汁內煎至三碗去渣一日內早午晚分三次服完用羊肉好酒過口吃盡被蓋取汗或吐或瀉三四次以粥補住內毒日解外毒自發忌牛狗鵝雞火酒茶醋等物每早食仙棗三枚如病人不能飲酒或虛極者服胰子湯仙棗方大黑棗二十一枚去核入胡粉三分逐用線扎緊放小砂罐略放水煮熟露一宿空心吃三枚冷茶送下胰子湯説約楊梅人虛氣弱不能汗下用此解毒托散方能送毒外出薏苡米川芎金銀花牛膝木通胡黃連當歸川黃連防風各一錢甘草六分白殭蠶七條炒研土茯苓二斤米泔浸一二時打豆大勿犯鐵器井花水洗淨肥皂子七粒打去黑皮陳酒河水各二碗煎一半入前藥並胰子一付去油淨同煎一碗空心服取汗忌口如前虛弱甚者加人參豬肉茯苓湯説約梅毒下身先見遂及遍身筋骨痠痛二便澀滯牛膝蒼耳子甘草全當歸蛤粉金銀花紅花天花粉皂角刺各二錢蟬蛻二十一個土茯苓洗淨木槌打碎精豬肉各四兩穿山甲二十一片土炒研大黃大便結用一兩如常者用五錢自利者不用生白酒三碗煎一半空心服豬肉過口大便利三四次後以粥補住仙遺糧湯説約土茯苓即仙遺糧洗淨木槌打碎二兩皂角子五個切片微炒當歸白鮮皮川芎薏苡仁木通威靈仙防風金銀花木瓜茅蒼朮各一錢甘草五分人參瘡久氣分虛者加入水二碗煎八分看病上下食前後服腿腳之下加牛膝一錢病淺者一月可退病深者百日可痊此瘡欲發先發下疳預服此方能免發瘡也此治梅瘡初起筋骨疼痛數月延綿不已並治楊梅風毒誤服輕粉癱瘓不能動履之良方也食忌同前解毒天漿飲梅瘡不問新久遍身潰爛及筋骨作痛者土茯苓二兩防風當歸身蟬蛻防己白鮮皮連翹海風藤皂角針金銀花川芎木瓜苡仁各一錢天花粉二錢甘草五分下部加牛膝一錢水二盅煎八分臨服入酒一杯量病上下服之楊梅結毒王明宇天花粉二錢白殭蠶蟬蛻去兩眼珠腳尖杏仁肥皂子獨核者皂莢子以上各七個金銀花五錢土茯苓取牽連疙瘩長者名鑽筋透骨草四兩實者六兩忌見鐵器用井水六碗煎三碗任服忌醋鹽戒房事如無獨核肥皂子便用肥皂子七個打開看內有黑色黃色油膩味的俱不可用只揀青草色的方可用皂莢子如蟲蛀的便用十個如初生魚口渾身筋骨疼痛即宜服此便可不發梅瘡此方得之異傳活人千萬功效甚捷但服是藥日日須吃白水肉以免心嘈不可少也經驗梅瘡方錦囊麻黃穿山甲白芷威靈仙蟬蛻各二錢生黃耆一錢生羊肉一斤水五碗煎三碗將藥取起入藥在湯內煎至二碗熱服蓋被出汗為度楊梅瘡楊梅風方錦囊土茯苓四兩川當歸金銀花牛膝各二錢皂莢子甘草防風羌活川芎各一錢熟地三錢水煎三盅三次服又方錦囊土茯苓四兩金銀花皂角各五錢水煎湯另用大肥皂核燒存性為末每用三分調服梅瘡神方啓玄川黃連川芎胡黃連當歸各一錢土茯苓二兩豬胰子一個酒水各盅半煎一盅看瘡上下分食前後服二皂飲沈員嶠肥皂子獨核者二十粒皂角子三十粒苦參金銀花各一兩河水碗半井水碗半煎一碗露一宿次早空心熱服其毒自消又方土茯苓四兩蟬蛻皂角刺肥皂子殭蠶各一錢水三碗煎一碗服一七除根人參耆苓湯土茯苓四兩人參一分土黃耆三錢如無以黃耆代之水十五茶盅煎湯當茶只食淡肉忌咸楊梅瘡服此永無結毒之患濟生胡黃連三錢牛膝川黃連酒炒各一錢加新鮮土茯苓一斤洗淨木槌子打碎水八碗瓦罐內煎至四碗入豬胰子一個再煎至二碗再將豬胰子一個鏟碎入藥內同胰子一日服盡寶靈丹毋論梅瘡初起已潰服此神效並治結毒下疳串毒以及男女內外不可明言之處惡毒等證珍珠豆腐包煮透研滴乳香去油廣木香真血珀另研沒藥去油沉香冰片各一錢西牛黃五分辰砂水飛五錢真胎骨不拘多少沉香煎水制過滴乳石三錢用零陵香紫背天葵甘草茅香各三錢水煎一伏時收取研用上藥各味另研照分兩配合再研千餘下瓷瓶收貯每用丹三分加飛白麵二分和研極勻分作三服每服用新鮮土茯苓一斤刮去粗皮以木槌打碎入砂銚內加河水十碗煎至六碗每用二碗調服上丹一分七釐如患者中氣不足土茯苓只用十兩大便不通加百草霜五分調服膿水多加當歸白芷各一錢五分毒在上部加川芎桔梗各三錢在咽喉加玄參三錢在腰加杜仲三錢在脅加柴胡防風各三錢在下部加牛膝苡仁防己各三錢俱加入土茯苓湯中煎服服過如毒氣不行小便不利可於土茯苓湯中加利水等味服之自利一料除根琥珀牛黃丸治楊梅破爛並一切疽癰久潰膿水不幹者琥珀豬牙皂木香各一錢人中白煅輕粉雄黃硃砂乳香去油沒藥去油白芷各三錢當歸二錢西牛黃三分槐花炒一兩丁香春夏一錢五分秋冬三錢上為極細末酒糊為丸如蘿蔔子大初服五丸五日後服七丸又五日後服九丸又五日後仍服七丸又五日後只服五丸周而復始俱用土茯苓甘草煎湯下其毒消散如神又方芝麻槐角子各一升同炒研細每清晨白湯調服二合七日即愈又方陳琉璃陰陽瓦焙研極細土茯苓煎湯調服二錢又方白果肉紅棗肉肥皂子各四十九粒共搗為丸每早土茯苓湯送下三錢又方羊糞不拘多少陰陽瓦焙存性每服三錢好酒送下數服自愈又方紅棗肉核桃肉輕粉各三錢共研細作丸分九服每服三十丸硃砂為衣瘡上食後服瘡下空心服七日瘡愈換用花椒七粒泡湯送下梅瘡神效丸錦囊棉花核炒肥皂核炒黃廣膠麩皮拌炒槐花米炒馬料豆炒麻子炒各半升為末雄豬膽汁為丸每服五錢酒送下生在上身者加穿山甲土炒二兩又方錦囊硃砂二錢雄黃一錢五分苦參荊芥天麻麻黃麵粉牛蒡子槐角子各三錢上為末用糖心雞蛋為丸桐子大每服三十丸用雞湯或羊肉湯送下一日一服表出毒氣再不發忌一月房室神效楊梅瘡後腫塊方錦囊冷飯糰十五兩防風薏苡仁木通金銀花防己白鮮皮木瓜皂角刺茯苓各五錢白芥子四錢歸身七錢分二十服每用水煎空心午飯後晚飯前各一服忌雞魚生冷房事及煎炒茶酒十餘日立效虛弱人加人參五錢其妙不可盡述梅瘡遍身臭爛大蛤蟆一隻竹刀腹上割一小孔將大紅棗填滿再加蟾酥五分用線扎好麻油半斤入砂鍋內炙至黃色為度取出研細瓷瓶收貯每服三分無灰酒調服取汗五日痊愈忍冬湯金銀花一兩黑料豆二兩土茯苓四兩甘草三錢白水煎每日一劑酒助藥力金蟬脫甲酒梅瘡不拘新久輕重皆驗並治結毒筋骨疼痛諸藥不效者更妙好酒五斤大蛤蟆一個浸酒內封瓶口煮兩柱香取起待次日隨量之大小飲醉為度冬夏蓋被出汗為效所剩之酒次日只服量之一半酒盡瘡愈服酒後七日不見風要緊忌口味房事百日除根久不收口陳肥臘肉切薄片貼上日三易先以千里光煎水洗之神應散何首烏天花粉荊芥穗苦參防風各一兩肥皂核燒存性薄荷葉各五錢共為末分十服每日用新鮮白土茯苓八兩雄豬肉四兩入前藥一服用水七碗煮爛去渣其肉聽食其湯代茶飲之不過十日痊愈再無餘毒如善啖肉者可作大劑與之先天一氣酒治楊梅瘡筋骨疼痛鉛七斤打成片剪碎用上好堆花燒酒十五斤將鉛片浸酒內泥封壇口隔湯文武火煮一晝夜埋土中一七退火氣早晚任服一二杯待筋骨不痛然後服八寶丹收功蜒蝣槐花丸沈員嶠槐花揀淨炒研細用蜒蝣搗丸空心酒服三錢口上楊梅瘡先將豆腐渣焙熱將布囊盛之尉嘴俟作癢時以膽礬塗之即愈翠雲散銅緑膽礬各五錢熟石膏輕粉各一兩共研極細末瓷瓶收貯濕瘡乾摻干瘡公豬膽汁調點一日點三次自愈又方杏仁四十九粒泡去皮尖壓去油取霜研極細入輕粉三錢冰片五分再研勻豬脊髓調點若瘡一二個既大且硬可先用白降丹少許拔去毒氣後用此藥收功鵝黃散正宗梅瘡潰爛成片膿穢多而疼甚者宜之石膏煅黃柏炒輕粉各等分研為細末乾摻爛上即可生疤再爛再摻毒盡乃愈此解毒止痛收干之妙藥也梅瘡點藥啓玄白砒精豬肉各一兩紅棗肉五錢共搗如泥外用黃泥固好煅紅取出研細末用鵝膽調搽如神又不疼點藥啓玄真輕粉杏仁皮松花粉各一錢冰片一分用鵝膽汁調搽梅瘡靈藥啓玄水銀皂礬各一兩火硝明礬青鹽各一兩二錢五分共研入陽城罐內鹽泥固濟先文後武打三炷香取出冷定聽用點梅瘡神效一方多雄黃硃砂各三錢白粉霜點楊梅瘡水銀一兩食鹽明礬皂礬火硝各二兩雄黃硃砂各三錢除水銀不研將六味研末入陽城罐內中間放水銀上以鐵盞蓋好再用鐵線扎緊以牡蠣鹽泥封口曬乾裂縫補好照升藥法升打三蛀香為度冷定取開刮下盞內靈藥每用一二釐冷水調點三四次愈梅瘡膏藥豬油熬去渣一兩加香油三錢同熬離火稍冷加乳香沒藥各五錢兒茶七錢研細攪勻又入冰片麝香各一分輕粉五分臨用攤貼神效又膏方老松香一斤河井水煮九次先用麻油四兩煉滴水成珠入煮過鬆香膽礬銅緑二味只各用一兩研細攪勻收膏攤貼梅漏膏麻油半斤熬至滴水成珠入白蠟五錢熔盡入血竭兒茶乳香沒藥各五錢膽礬一錢再下飛丹二兩鉛粉五錢離火入冰片一分麝香二分攪勻成膏欲去汙肉加龍骨赤石脂各二錢五寶丹丁惠生杏仁五粒去皮乳霜輕粉五分銀珠三分冰片一分麝香五釐共研極細末破者乾摻未破者水調塗之隔日痂脫自愈洗梅瘡法黃連黃芩黃柏黃蠟白芨各五錢川椒三錢食鹽少許煎湯洗之又方用前湯入好醋少許加冬青葉三四十斤同煎取葉貼瘡上渣再煎湯洗又方土菖蒲煎湯洗瘡易於收口又方臭梧桐金銀花野菊花各等分煎湯入舊馬桶內熏之一日二次有痔漏加枸杞子通仙五寶散王範泉傳鍾乳粉三錢六分琥珀冰片各六分大丹砂二錢四分飛白麵炒一錢八分各稱足和勻分十二服每日用土茯苓一斤水煎十二碗清晨一碗入藥一服服其土茯苓湯須一日服盡不可別飲湯水並茶重者再服一料無不愈者忌雞鵝牛羊房事此方古今第一初起熏法祕本辰砂末一錢綿紙分作七條香油浸透每次熏二條熏時板凳坐著夏天用單被冬天用夾被蓋之不可出氣要口含水恐傷口皮熏完吐去不可咽下其效如神此方弱人不宜輕試搜風解毒湯泮霞仙祕録治梅瘡不犯輕粉重者月餘輕者半月餘土茯苓一兩薏苡仁金銀花防風白鮮皮木瓜各五分皂莢子四分氣虛加人參七分血虛加當歸七分白水煎日三服忌茶並毒物房事西聖復煎丸扶溝寶林僧傳已破危篤百方不效用此如神丁香焙乳香去油沒藥去油兒茶各一兩血竭阿魏白花蛇各四兩飛白麵一斤炒白蜜六兩香油四兩棗肉八兩研末搗丸彈子大每用一丸土茯苓四兩煎湯化服五寶霜懷德堂祕方水銀一兩硃砂雄黃各二錢五分白礬緑礬各二兩五錢研勻罐盛燈盞蓋定鹽泥固濟文武火煉升罐口掃收每以升藥三錢入乳香沒藥各五分研細末摻太乙膏貼之絶效楊梅結毒祕方皂莢五加皮當歸白鮮皮金銀花各二兩分八貼每貼加土茯苓四兩煎服楊梅瘡經驗方周鶴仙方牛角羊角穿山甲各二兩皂角刺三錢生大黃十二兩牛羊角穿山甲三味用濕紙裹煨焦取淨末如前數同皂角刺生大黃合為細末每服五錢陳酒調服出恭時宜於空地上解完即將土掩之恐惡氣害他人也間二日再服一服最重者不過三服神驗又方周鶴仙方土茯苓二斤用石打碎豬胰子一個去油水四升同熬成二升去渣再兌入好酒二斤金銀花生地桔梗當歸各五錢熬成二升溫服渣再煎減半四服痊愈此天下第一奇方也神方周鶴仙方生大黃麻黃黃耆蟬蛻陳皮各四兩豬肉一斤四兩為六塊作一劑酒六碗水六碗煎六碗每日食肉一塊湯一碗分作六日吃三天發汗三天長齊三天貫漿三天結靨共十二天痊愈並無回毒屢驗只用一劑不可以平易忽之又方周鶴仙方雄黃一錢五分輕粉一錢杏仁去皮尖三十粒共為末先將瘡洗淨用雄豬膽汁調搽二三日即愈百發百中天下第一方也小兒梅瘡起於口內延及身膚外科發揮土茯苓末乳汁調服月餘自愈楊梅瘡神方潘大章石膏飛滑石各一錢八分生甘草一錢硃砂生明礬血竭乳香去油沒藥去油各六分冰片一分麝香八釐上乳細末約重七錢分作七服每用土茯苓一斤打碎一半鋪瓦銚內將藥放土茯苓上又將這一半土茯苓蓋上水四碗以二碗分二次一日服完七日七服自效楊梅瘡初起先服三四劑升發毒氣川芎升麻連翹金銀花當歸尾甘草節黃芩羌活黃柏生地黃白葛根穿山甲白芷蟬蛻赤芍防風水酒同煎服後服此方三四劑痊愈人參五分川芎防風薏苡仁金銀花牛蒡子甘草牛膝蒼朮同陳皮炒去陳皮土茯苓皂角刺生地黃當歸羌活木通水酒同煎服梅瘡搓藥膽礬五錢研碎紙包麵裹煨熟取研細末一錢沒藥八分京墨調搓劉氏楊瘡祕方蟬蛻二兩五錢威靈仙白蒺藜炒去刺各二兩防風五錢麻黃頭一劑冬用一兩夏用三錢春秋只用五錢先用羊肉一斤煮爛將羊肉取起只用湯吹去湯上浮油患人每歲加胡椒一粒為引將藥入湯內煎成一大碗再將前煨湯的熟羊肉入醬油用酒飯任意吃之再服煎藥蓋被取大汗透次日必要洗浴連頭髮內都要洗透不然恐有落髮之患第二劑去麻黃加大黃年幼壯實者用五錢年紀大弱者用三錢藥用水煎不用羊肉湯藥煎好方下大黃一二十沸即服俟行過四五次即以溫粥補之即止第三劑去大黃加人參多寡聽用煎服渣再煎服第四劑去人參加土茯苓半斤犍豬肉四兩同煎服再服三劑共七劑痊愈老君丹祁道士門人張元履傳邵宗堯用之屢驗白粉霜一兩蜈蚣去足全蠍酒洗直殭蠶炒去絲穿山甲土炒硃砂水飛雄黃水飛廣三七蟾酥各五錢乳香去油沒藥去油防風荊芥各三錢牛黃三分或加竹青蛇末蒼龍末各五錢更妙各研細末稱準和勻老米糊為丸如緑豆大陰乾凡靈藥為丸之藥俱要陰乾不可烘曬烘則有毒曬則必吐宜知之此丹專治楊梅結毒一切無名腫毒癰疽疔毒對口痰核瘰癧濕痰流注每服一分或二三分黃酒送下看人壯弱病之重輕全在人之機變增減用之如神如治結毒常服不比暫用當每服數釐以免口齒之患升白粉霜法火硝明礬水銀食鹽各一兩如升藥法升三柱香取出靈藥以紗囊包扎好用犍豬蹄一隻入鍋內以水十五碗煮蹄半熟去蹄取湯加生甘草一兩同紗囊入湯內煮水乾為度將靈藥袋埋土中三日取出研細配前藥用點梅瘡丁郁文兼敷大毒癭瘤紅升丹五分輕粉一錢鉛粉煅紅一錢五分膽礬煅四分乳極細用人乳或鵝膽調以羊毛筆蘸掃二三次即愈透頂神功散水利道憲王治楊梅瘡魚口瘡惡瘡已出者七八日好未出者半月後手足心起一豆大泡即是毒從此出鹿茸蜜炙穿山甲炮各一錢五分大貝母知母白芷各四錢殭蠶三錢用河水二大碗煎一大碗將熟入生熟大黃各五錢略煎數十滾傾出露一宿再用乳香去油沒藥去油各一錢麝香一分研細末放碗內五更時將藥溫熱沖服蓋被出微汗行過次以溫粥止之忌豬肉三三丸孫北權楊梅等瘡兒茶一分輕粉五分砒八釐壯者用一分共研細麵糊丸如緑豆大分作九服一日三服水茶送下三日後無形迹楊梅瘡生大黃生地金銀花甘草各五錢豬胰一具河水煨服又方土茯苓八兩杜仲皂角末金銀花各五錢五加皮一錢甘草二錢水煎服至重者十劑痊愈又方川烏黃柏各五錢研細豬膽調搓茯苓糕治楊梅瘡土茯苓去粗皮為末白礬糯米粉各一斤和勻蒸糕食之常以土茯苓煎湯當茶宜忌茶楊梅下疳臭爛不堪者百草霜乃燒百草人家灶門口煙煤輕虛成片者以雞翎掃下箭頭砂各一錢共乳極細以桑皮紙鋪藥捻成三條每條作三次用每次點著以紙遮住眉目將煙燻入鼻中每日熏三次但此煙入鼻令人心內作攪可先煨爛肉湯不時呷之至重者不過三條即愈靈藥方梁育秀水銀一兩劈硃砂明雄黃各五錢硫黃三錢白礬一錢上研細末入陽城罐內用鐵盞合好鹽滷和泥封固以鐵絲扎緊用銀炭十斤先文後武火升三柱香為度取起冷定開看取鐵盞上藥重約二兩七錢如楊梅毒爛喉者用靈藥五分加人中白青黛各八分乳香沒藥各五分冰片二分麝香一分藥珠一分五釐共研細末吹入喉內日五六次三日即痊愈如爛嘴鼻再加龍骨象皮血竭兒茶各五錢琥珀二分研細摻之外以清涼拔毒膏貼之清涼拔毒膏麻油二斤入鍋內熬至滴水成珠再入杭粉一斤入廣鍋內炭火炒紅黃色為度篩下用桃柳棍攪成膏傾水中拔去火毒任攤用此膏諸瘡皆可用但靈藥不可用楊梅點藥番木鱉火炙成性輕粉各五分杏仁霜一錢共乳細豬膽調搽鶴頂紅點楊梅瘡杏仁輕粉銀硃各五分共乳細鵝膽汁調點並治雞冠痔痔干以唾津潤濕乾摻痔潮干搽楊梅初起麻油四兩入蜈蚣三條穿山甲三片熬至山甲浮起為度冷定加川烏草烏末各三分壯實人用五分次早將油頓熱服下蓋被出汗即愈愈後宜服防風通聖散以利其毒又方大鯽魚一尾半斤以上者用紫背浮萍二三斤包著鯽魚入甑內蒸極熟令患者先從魚嘴吃起並魚鱗肚腸吃至魚尾細細嚼爛好酒飲醉絮一條厚被蓋出汗自愈蓋過綿絮須於無人處以火熏透免毒貽害他人又方臭牡丹根皮乾研細末每服三錢好酒調服厚蓋取汗汗出透從頭撤被漸撤至足不可見風所用衣被一概換去方除後患又方生地白鮮皮熟地金銀花當歸大楓藤川芎薏苡仁羌活五加皮木瓜穿山甲藿香槐花防風荊芥各一兩土茯苓四兩木槌打碎水五碗煎三碗每日早晚服一碗十劑痊愈忌茶牛肉蛋鵝肝腸火酒又方乳香箬葉焙去油沒藥箬葉焙去油銀硃水銀兒茶各一錢冰片麝香各一分共研細末用紅棗二兩火煨去皮搗膏和丸作四圓如彈子大每日用木鬥一個內放碗一隻碗內置灶灰放炭火將藥一圓放火內燒煙將患者口含冷水以被圍住只將鼻孔聞藥味如口含之水一熱則吐去另換冷水含之四天熏完四圓第五日再將燒過四圓放在一處做一天熏之梅瘡輕者七八日愈重者半月痊愈忌雞鵝魚肝腸花椒發物外治楊梅吳榗珽血丹輕粉各等分研勻豬膽汁調搓楊梅祕方吳榗珽龜板醋炙研末明礬研先用龜板三兩明礬七兩米糊為丸每服五錢早晚二服服至五日即用龜板明礬各五兩為丸再服四五日即用龜板七兩明礬三兩為丸又服三四日即用龜板九兩明礬一兩為圓服至瘡已痊愈再以龜板為丸服數日前後總以每日服丸藥一兩為率忌豬首公雞鯉魚雞鴨鵝蛋緑豆等物戒房事護面散可保楊梅瘡不上臉女頭髮煅明雄各三分研勻用香油半酒盅調勻以滾酒沖服一日三次槐花蕊張景嶽凡棉花瘡毒及下疳初感或毒盛經久難愈者速用新槐蕊揀淨不必炒每早午晚食前清酒吞下三錢服至二三升則熱毒盡去可免終身餘毒之患亦無寒涼敗脾之慮此經驗神方也如不能飲即用滾水鹽湯但不及酒服之效捷也棉花瘡點藥杏仁取霜輕粉各等分研細敷上二三日即痂脫而落紫霞丹一切楊梅惡瘡龜板醋炙十五兩石決明炙四兩五錢硃砂飛三兩共為細末水疊為圓每服一錢土茯苓煎湯下楊梅瘡真水安息搽即愈又方汪玉亭普救楊梅瘡者皆由風流所致間有侵染觸犯而得者百無一二治之不得其法不但一身為害而且殃及妻兒甚有乏嗣悔之莫及然所治之法各有不同有遏抑其毒而不令其出者有重用行藥而行去其毒者有用升發之劑而發出其毒者有用解托之劑而敗去其毒者四者之中惟升發解托可用至於遏抑內收將來必致結毒若重用行藥必致大傷元氣豫有一方藥止數味即非行托更覺和平且無論新久不二十劑而收全功不獨永除後患更且無礙生育但恐收功之後視為容易又復姿情縱欲是誰之過歟相勸患者全愈之後當痛改前非力行善事免鬼神之鑑臨保父母之遺體蘇妻子之遺毒培子孫之福壽所得不更多乎何首烏忌鐵木棒打碎防風淨銀花各三錢荊芥二錢當歸五錢肥皂子九個打碎豬胰一付土茯苓磁鋒刮去皮木棒打碎四兩河水六碗砂銚內煎至三碗每日空心及午飯後晚飯前各溫服一碗忌醬鹽醋茶雞魚鵝鴨蝦蛋鮮物止宜土茯苓煨肉豆腐青菜其餘一切當忌用土茯苓湯代茶又方川芎威靈仙蟬蛻大黃各一錢麻黃六錢羊肉剔骨淨一斤切碎水八碗煮爛去肉煎藥三碗分三次服上身多飽服下身多飢服三劑痊愈楊梅癬門主方祕方治梅癬並多年頑癬真阿膠三錢入桐油四兩熬數沸去阿膠即下研細密陀僧二兩收成膏藥再入乳香沒藥血竭兒茶輕粉各淨末二錢離火和勻攤貼每張加紅升丹一二分摻上貼之百發百中楊梅瘡後遺癬毒一層又一層頑皮癢不可當牛油柏油香油黃蠟各一兩共熔化待冷入銀硃一錢五分官粉二錢麝香五分入油攪勻俟癬癢抓破擦之楊梅瘡愈後髮癬瘡及鵝掌瘋王中城牛油豬油各二兩香油黃蠟各一兩共熔化加鉛粉二錢銀硃一錢五分麝香五分研細攪勻成膏抹癬上火烤再擦再烤如掃楊梅瘡愈後紅黑疤不退門主方驗方生大黃白礬各等分同研擦之即消肉色如舊又方青果核磨汁搓上即褪結毒門主論陳實功曰結毒者瘡毒方熾未經發散或被藥火之熏蒸或因輕粉之內拔或經點藥之收斂以致毒沉骨髓積久外攻其始也先從筋骨疼痛漸漸腫起發無定處故有鼻崩唇缺咽塞喉疼手足拘攣等證治法初起者宜仙遺糧湯胰子湯經年纍月毒竄筋骨用五寶丹紫金丹選用頭痛欲破用吹鼻碧雲散主之正宗胡公弼曰凡服結毒靈藥俱以限十二日為準無愧青囊又曰結毒在腳底者名曰漏蹄風蔣示吉曰結毒者結無定位皆由梅瘡服藥不多內毒未盡以致毒氣鬱遏沉伏骨髓積久外攻先從筋骨疼痛漸漸腫起發無定處隨便可生發在關節則損筋傷骨縱愈曲直不便發於口鼻崩梁缺唇雖痊必破相更發於咽喉更變聲音發於手足防於行動入於巔頂頭痛欲破兩眼脹痛用碧雲散吹鼻中頭自不痛初起仙遺糧湯金蟬蛻甲酒虛弱者芎歸二陳湯年久者五寶丹不斂者十全大補湯加土茯苓煎服毋得再熏為禍傷人也説約澄曰每見其人並未患過梅瘡而有結毒於手足腰胯臀間者必是先患濕熱癰瘡膿毒未經提盡急求收功醫者遂用輕粉鉛粉收斂完功殊不知毒氣斂伏在內久而原疤之旁起泡疼痛潰爛穿筋蝕骨愈而復發此為濕熱結毒內宜補托外面須用紅升靈藥提盡毒氣待紅肉長平方可用生肌之法斂口劉惠田曰但凡曾患楊梅瘡下疳服藥而愈久後如患後開十數證者勿作他治皆結毒證也一初起狀如癤子後漸大而軟久則膿潰惡臭難當人不可近四圍紫而中黃白者此輕粉之結毒也切勿作癰疽治一初起渾身拘急筋骨疼痛肉皆麻木而或有一處如刀錐之刺痛皮膚不甚紅腫而紅色深隱肉裡此輕粉之結毒也切勿作貼骨癰治一遍身雲頭疙瘩筋骨痠痛或時作癢抓破有白膿流出此輕粉之結毒也切勿作大麻瘋治一頭面胸背並四肢有生硬片狀如牛皮初癢及抓則起白屑而麻痛此輕粉之結毒也切勿作癬治一手足掌上常生黃皮痛癢不時狀如鵝掌此輕粉之結毒也切勿作瘋治一遍身發紅狀如火毒口渴心煩筋骨如解此輕粉之結毒也切勿作赤遊丹治一遍身發紫赤紅斑痛癢不禁骨疼如杖此輕粉之結毒也切勿作發斑癮疹治一腹痛如絞腸痧牽引渾身骨節疼痛不可忍久則便下膿此輕粉之結毒也切勿作腸胃癰治一噁心嘔吐吐出皆白水而無痰四肢不舉飲食不下骨節痠痛此輕粉之結毒也切勿作翻胃隔食證治一喉嚨作痛忽然腫起周身骨節疼痛遂用針於腫處刺破惡血雖去久潰不能完口致爛潰通鼻竅或腐涎舌下痛不可忍臭不可聞此輕粉之結毒也切勿作喉疳治一頭痛或腦痛痛則皮腫耳聾目眩牽引周身骨節疼痛此輕粉之結毒也切勿作頭風腦風治一渾身不拘頭面腿腳忽生一瘡其瘡內皆豎頭肉長流黃水久不潰膿此乃楊梅之母必竟要生梅瘡即用治梅瘡等藥治之不治則渾身一齊擁出治則費手矣一父母曾患楊梅下疳而服輕粉其瘡雖愈己身不發後生嬰兒三五日後或七八日後九竅之傍現出紅點紫斑片片若經三四日後即成小瘡狀如蛇窠啼哭不止二便不通乳不能進身熱如烙腹硬如磚此父母所遺之結毒也切勿作胎毒奶癬治嗚呼服輕粉而中毒非小毒也輕則發之於自身損形壞質傷筋穿骨甚則遺毒流傳子孫微則殘其筋骨盛則夭其壽命如此大害良可悲也何愚夫之患楊梅而欲其速瘥求諸庸醫則暗投輕粉以及水銀升煉靈藥合成細丸與服只圖目前之速愈而不慮日後之毒發也其害人如此可不畏哉嗣後凡患楊梅瘡者斷不可服輕粉並升煉丸丹縱楊梅瘡一時不愈終有好時決不致有結毒之大害也萬勿輕聽庸醫篁口欺誑輕試輕粉之速效易愈以致貽害終身也以上十二條皆輕粉之毒切勿誤認他證見疑而用別藥治之不特治之不愈反增他劇也如此諸般形證雖異而病源則一惟用五寶丹服之不獨可愈其患亦能解余蘊之毒而免子孫之遺害也祁道人曰凡楊梅瘡俱從濕熱邪火化毒而成治之者慣用寒涼清熱之藥其毒雖解但不思寒則凝結熱則流通日久多成結毒純陰也故用砒硫靈藥治之是以熱攻其寒此治陰結毒之法也有患陰毒梅瘡濕熱邪火未化久而結成陽毒故用水銀升煉粉霜硃砂等丸治之之法見抄本又曰大概治楊梅結毒等證當指後人濟世主方用五寶丹八寶丹醫富貴人為上法若貧士另有捷徑之法治之方載於後擇而用之無不應手又曰凡楊梅瘡並結毒證煎劑丸藥內不可少海櫻桃即千年矮冬天結果子南京棲霞山石縫中極多半枝蓮亦不可少結毒門主方五寶丹治楊梅結毒筋骨疼痛口鼻腐爛諸藥不效血珀珍珠新白者佳冰片硃砂水飛滴乳石如乳頭下垂研之另碎明如水晶者佳各三錢各研極細稱準共合一處再研數百轉瓷罐封貯每用藥末二錢加飛羅面八錢再研和勻每日用土茯苓一斤洗極淨置石臼內木捶碎如骰子大用水十一碗煎至七碗去渣再用大竹筒一個絹繃作篩將藥五分置竹筒中細篩於土茯苓湯內隨手攪勻一日吃完看病上下食前後服逐日依服制服重者四十服輕者一二十服即愈忌食火酒豬首糟物海味茶醋薑椒蒜牛羊雞鵝豆腐麵筋鮮魚不忌者豬肉肝肺腰子鴨若毒結最重鼻舌腐爛加牛黃胎骨即能暗補其功最大陽物潰爛亦加胎骨入丹內若毒結在鼻上加辛夷三錢則土茯苓煎湯一方加肥皂一個同土茯苓煎湯一方硃砂三錢血珀一錢滴乳石二錢珍珠五分冰片三分一方五寶丹上部丹內加川貝母三錢赤茯苓牛膝各一錢中部丹內加赤茯苓三錢川貝母牛膝各一錢下部丹內加牛膝三錢川貝母赤茯苓各一錢邵道人祕傳五寶丹滴乳石明潤真者佳三錢琥珀能吸芥子者辰砂透明者各二錢大珍珠五分冰片二分共研為細末入飛白麵四兩乳勻每服三分用土茯苓一斤拭去泥土以木槌槌碎入砂鍋內用水十二碗煎至八碗濾去渣將藥篩下攪勻再煎二三沸取起陸續一日服完後開加減神驗法一鼻子爛盡臭穢難聞藥中每服加靈山柴煅鹿鼻血陰乾女子前三日經布煅存性研細各加三釐和勻煎服隨即生肌用此三服鼻長如故一陽物爛盡腐臭惡氣痛不可忍者藥中加靈山柴煅羊腎血陰乾女子前三日經布煅存性研細各加三釐煎服隨即生肌服完三服腎長如故一輕粉毒流注穿爛腦頂臉面口頰四肢肩背腿足惡臭連年不愈只用前藥煎服三次膿盡臭除肌生肉平如故如成漏而流清水者加當歸人參黃耆煎服一結毒四圍小瘡狀如小蜂窠當中有瘀肉敗膿流而不幹痛而不止者服此藥後瘡口膿水乾疼痛除肌肉長只須三服可以全好一人虛可加人參若瘡在上用桔梗半分浸水煎土茯苓在下用甘草半分浸水煎土茯苓一人虛極寒戰咬牙肢體如冰用炮附子三分入藥煎服以身溫戰止為率不可過服一結毒疼痛不可忍者前藥中加乳香沒藥去油盡各三釐煎服一筋骨疼痛不能搖動乃輕粉之毒深入骨髓可於本方中加珍珠一倍乳香沒藥各三釐於每服中煎之一噎氣乃輕粉之毒流於口內為害宜加沉香木香各五釐入煎藥中服之一服此藥後小便不利者乃藥將毒行於下故現滯結之象不須疑慮可用百草霜二錢擂井水清晨服之即解或緑豆湯亦可一有孕婦患此結毒凡煎土茯苓不可將臉對藥罐之口恐其氣味觸之作吐也土茯苓一斤水十二碗慢火煎之但有沫起便以物掠去煎至七碗去渣方下前末藥煎二三沸取起服之無孕者煎服照前一結毒在於手足彎曲之處服此藥患愈尚不能活動可再服一二劑其筋自舒自能活動矣一結毒服此藥患愈須要守其禁忌庶不再發亦無他苦若服生鼻長腎之藥俱已長完第一要戒勞碌房事惱怒雞鵝牛羊驢犬蟹鱉魚蝦蔥蒜韭薤芫荽蘿蔔辛辣咸酸肥甘油膩煎炒炙煿苦茶醇醲酪酥胡椒生薑一切毒物若犯房勞怒氣則皮膚傾陷血肉相戕所長之鼻腎從此又爛矣雖仍以前藥治之則不如前之效速也如若食物犯毒其患復作者尚在可治不致於十分頽壞也禁忌不但如此二者即梅瘡魚口下疳癰疽俱要禁戒調理節其飲食禁其房闈開其心胸滌其思慮適其寒溫慎其起居如此氣血調和臟腑安實正氣漸盛庶無變異之患也止痛生肌丸邵道人解輕粉結毒東丹用滾水飛七次槐花細末各一兩大冰片五釐上和勻麵糊為丸雄黃為衣每服一錢或八九分或茶或酒送下服至六七日瘡上流臭水十數日化腐生肌一月痊愈八寶丹邵道人鍾乳粉制五錢辰砂飛三錢熊膽珍珠琥珀犀牛黃冰片各一錢飛白麵炒研五錢共研細末瓷瓶收貯凡治楊梅瘡結毒每用一分土茯苓半斤煎湯調下如毒在下部加薏苡米五錢配用靈砂黑虎丹治楊梅瘡後頭如破裂之疼痛筋骨拘攣痛不可忍或起冷痰包膿水淋漓兼治陰結毒一切濕痰久頑陰寒久不收口之瘡凡結毒頑瘡先服五寶丹或八寶丹必用此藥收功永遠不發白砒三錢將砒用緑豆水煮過入罐內升五炷香取出以白蘿蔔同煮過入藥寒水石煅百草霜各三錢金頭蜈蚣二條焙大黑豆一百二十粒冰片麝香各一分上研極細和勻用小紅棗四兩煮熟去皮核同搗為丸如豌豆大每服二丸日服三次冷水或茶送下服是藥口眼胞腫則藥力到矣緩一日再服忌吃熱湯水宜吃大葷以免嘈雜其黑豆生用冷水泡軟去皮搗碎加紅棗肉丸得起便罷不必多或加犀黃三分更妙解毒丸邵道人治楊梅瘡楊梅漏服過靈藥久不愈者必內有輕粉毒為患黑鉛一斤打成片剪如豆大山中黃土一斤研細二物人鍋炒至鉛化去鉛不用只將黃土水疊為丸每服三錢酒送下十服即好結毒擦藥水銀一兩五錢生大黃大腹皮炒膽礬各一錢輕粉一錢二分甘草番打麻六分患重者加三分共為細末用真麻油作四十八丸每日早午晚共用十二丸擦手四彎腳四彎口含冷水熱則吐去又換冷水含之第六日如鼻中有惡氣味並有瘡用大楓子肉十五個麝香三分研為丸不時嗅之盡一日之用第七日用麥麩二升甘草四兩煎水洗浴第八日可出房門可吃雄豬肉至半個月諸物不忌只忌鹽醬醋酒辛辣之物房事斷要忌一百天第八日用生地當歸川芎白芍山楂枳殼牛蒡銀花水煎服服十劑後再服當歸川芎白芍熟地人參陳皮白茯苓炙甘草水煎服熏法祕方治楊梅結毒並梅瘡疳瘡破爛者即生肌完口患者不肯服藥者宜用此法祁陽炭即雞骨炭一兩五錢先將炭燒著透復燜熄先研細末麵粉五錢銀硃三錢共研極細末用棉紙入藥捲成九條先將房內板縫窗扇糊得不透風將香爐放桌上將條子點著坐於桌邊以鼻嗅其氣口中噙冷水熱則吐去又噙冷水以煙盡為度九枝條子分三日熏完如瘡在上食後嗅煙用川芎煎湯當茶吃每日三次如嘴腫痛即是毒從口出又停數日再嗅先放白硼砂在口再含水更妙如口臭腫痛以緑豆煎湯吃或蜜糖亦可用蘇薄煎湯漱口過七日後再用解毒煎劑楊梅結毒舌爛鼻爛龜頭爛祕方黑狗頭一個用黑鉛一兩裝入腦內用鹽泥封固入金粟米火煅紅取出冷定研為細末聽用乳香去油沒藥去油鉛霜各三分輕粉二分硼砂一分五釐明雄一分寒水石四分金箔十張制鉛一錢五分共乳極細末瓷瓶收貯凡舌斷米泔水蔥茶煎湯溫漱拭乾上藥待長一二時許洗去藥又漸漸搽上凡龜頭爛者以蔥湯熏洗搽藥待長又洗又搽碧雲散結毒入於巔頂以致頭疼眼痛如破者吹之鵝兒不食草川芎各一兩青黛一錢共為極細末令患者口噙涼水以蘆管吹藥於左右鼻中取嚏為效吹後吐去涼水若不噙水便要嗆喉並治風火時眼眵淚外障吹之亦效熏洗法蒼朮一兩點紅川椒三錢水五碗煎至四碗入罐內將患處對罐口以熱氣熏之俟半熱傾於盆內淋洗患上以潔淨布挹淨後用解毒紫金膏解毒紫金膏楊梅結毒腐爛作臭膿水淋漓諸藥不效者細塊礬紅明淨松香各一斤共研極細麻油調稠先用前湯洗淨拭乾搽上此藥油紙蓋好軟絹扎緊毋令血行三日一換如無前湯熏洗只煎蔥艾甘草等湯俱可洗換又治諸毒頑癬等瘡神效愈後忌食發物煎炒神仙碧玉膏結毒潰爛臭穢疼痛不斂以及血瘋臁瘡並效輕粉杭粉各一兩白臘五錢乳香沒藥各三錢樟冰二錢用公豬淨熟油五兩同白蠟熬化傾入碗內將上藥和勻水內頓一時取起臨用抿腳挑膏手心中捺化攤油紙上用蔥湯洗淨瘡上貼之結毒靈藥楊梅結毒腐爛作臭或咽喉唇鼻腐壞日甚硃砂硫黃雄黃各三兩水銀一兩共研極細入陽城罐內泥固鐵盞梁兜固封口點三炷香為度用水擦盞內火畢次日取出盞底靈藥約有一兩五六錢治尋常腐爛之證用靈藥五錢輕粉五錢和勻研細小瓶封貯紗封瓶口臨用甘草湯洗淨患上將瓶倒懸紗眼內篩藥患上用單油膏蓋一日一換自效男子婦人咽爛者用靈藥一錢人中白二分研細吹之日用三次內服不二散其疼即止隨可飲食硫黃不二散楊梅結毒發於咽內腐爛疼痛湯水難入者硫黃一錢靛花一分共乳細涼水一酒杯調服其痛即止可進飲食單油膏貼結毒摻靈藥麻油二斤熬滴水成珠續下杭粉十三兩攪勻成膏傾入水內片時取起任用十服神效湯胡公弼楊梅結毒流注筋骨疼痛不論已未破爛神效升麻皂角刺各四兩土茯苓一斤頭頂加白芷胸中喉面加桔梗胸前加白芍肩背加羌活下部加牛膝俱只加一錢共一劑水八碗煎四碗臨服入麻油三匙一日服一劑十劑痊愈此神方也結毒牛黃丸胡鳴岐專治楊梅結毒小兒胎毒下疳神效揀透明雄黃四兩研細取蘆柴截筒將雄黃末裝入面塞筒口將鍋內放水上用蘆柴作架取雄黃筒橫放架上離水二寸許蒸四炷香足火候方到次早取出雄黃每雄黃一兩入好牛黃四分不可少麝香五釐配定研勻老麵糊丸黍米大每早空心用豬胰子煎湯送下四分諸物不忌只忌蝦蛋二味服至四兩痊愈結毒久爛祕方土茯苓一斤生薑四兩共煎數碗服之不十日而愈其潰處以藥汁調麵糊之即愈曾有陽物爛完半年不愈服此得生楊梅疳毒臭爛不堪者周鶴仙橄欖核一個燒灰存性真冰片三釐共為細末用麻油調塗無比效方也滌空丹汪如忠治結毒楊梅頑臁瘰癧食鹽四錢明礬火硝皂礬水銀各一兩白砒三錢研細炒老黃色入陽城罐升三炷香冷定刮取靈藥一兩加明雄硃砂血竭乳香去油沒藥去油各六錢槐花米淨末穿山甲焙淨末各一兩和勻研細老米打糊為丸如蘿蔔子大每服一分一日三服用土茯苓四兩豬牙皂角一條照各部位再加引經藥煎湯送下楊梅結毒頭痛之極用之神效何首烏不犯鐵器天花粉苦參荊芥穗肥皂子防風各一兩共為細末每用七分五釐用土茯苓四兩豬油一兩五錢水三碗煎一碗半每食後片時用藥汁半碗調藥末服一日三服曾服輕粉筋骨疼痛當歸川椒細茶黑鉛甘草各四兩上銼劑分十服水煎服或後加麝香一分亦妙頭面結毒川椒出桃花洞者佳嚼半粒口不能言者真去目八錢蘄艾去筋膜一兩白茯苓二兩麻黃去節二錢豬頭天靈蓋火煅存性五錢研為細末蒸餅打糊丸如緑豆大飯後白湯送下服後二三日瘡口乾燥不臭是其效也服至瘡口平復方住患久者宜間服十全大補湯去川芎十數劑忌牛羊魚腥房欲火酒楊梅結毒方土茯苓五兩甘草六分天花粉蟬蛻去足麻黃根各一錢杏仁去尖肥皂子皂莢子各七粒白殭蠶全足者一錢上俱忌鐵器水三碗煎一碗毒在上飽食服毒在下空心服二十劑見效楊梅瘡十年者五十劑痊愈忌面胡椒犬肉房事發物燒酒蒜為妙奪命紫金丹治楊梅漏瘡並諸瘡毒破爛見骨經年不收口者或筋骨疼痛不止或遍身破爛出血起皮一層又起一層或鵝掌瘋赤白癜瘋諸般頑癬或骨爛牙疳口臭臁瘡惡毒並皆服之琥珀一錢甘草水煮一炷香以新青布裹之打碎再用糯米泔水浸透將磁盤盛糯米琥珀放米上飯鍋上蒸熟為度將琥珀利刀切片如紙薄研極細末鐘乳石二錢五分即滴乳石甘草水洗新瓦略焙用老薑切片鋪銀罐內乳石放薑上以鐵盞蓋之鐵絲扎緊用文武火煅一炷香冷定開看取出另研極細珍珠包豆腐內煮一炷香火不可太大冰片另研犀牛黃另研各一錢硃砂研細水飛五錢乳極細每服只稱五釐加飛籮麵炒過二分五釐合計三分為一服土茯苓湯調下每一小料用丹藥六分炒面三錢分作十二服土茯苓十兩水煎分十二碗去渣每早用湯一碗入藥一服攪勻服之不可別飲茶湯多煎土茯苓湯當茶十二服完病亦愈矣忌鵝雞羊肉房事楊梅結毒神方濟生滴乳石三錢五分琥珀人中白煅各二錢犀牛黃冰片各三分乳香二分石青頭上用五釐鼻上用三釐硃砂珍珠各五分蟾酥毒甚者加五分上為極細末每用六釐加飛面三分和勻聽用先用土茯苓一斤洗淨木槌打碎入河水十二碗瓦器內煎至八碗再將湯濾起將土茯苓先鋪一層在底上末藥放在土茯苓上周圍以土茯苓圍住再將土茯苓湯輕輕傾下再煎至三碗一日飲盡忌一切發物解毒至寶神丹馮氏治楊梅結毒一切熱毒久患骨蒸熱毒流注六脈俱數用之清熱毒神效人參三七微火焙二錢嫩滑石三錢珍珠生用真血琥珀各四分生甘草曬燥一錢各研極細和勻每服二分加至四分人小者一分加至二分萆薢三錢煎湯調服飛龍換骨還元水火仙丹專治遠年近日楊梅結毒誤服輕粉筋骨疼痛癰腫下疳陰蝕濕痰流注氣瘰發背喉舌潰爛目鼻破損遍身梅豆梅癬鶴膝血瘋臁瘡魚口便毒服二十日全好忌酒醋色欲發物初服四丸十日後服五丸二十日後服至七丸再不可多加其藥俱用老米打糊丸如黍米大每日服此丸俱用土茯苓四兩豬牙皂角一條為主不可缺此二味再照後開引經之藥同煎用河水井水各二碗煎成三碗每早以一碗送丸藥餘二碗留為午晚當茶吃但須看人虛實虛者服此必發寒熱頭痛喉疼口臭不必驚恐停止三兩日再服制粉霜真阿魏各五錢槐花三錢當歸尾白芷小丁香乳香不去油沒藥不去油雄黃硃砂各一錢牛黃五分冰片三分制砒霜一分修合為丸硃砂為衣瓷瓶密貯勿泄藥性升粉霜法水銀一兩五錢火硝一兩三錢白礬皂礬食鹽各一兩硼砂三錢共研勻入陽城罐內鹽泥封固升打文火四炷香武火三炷香候冷開看鐵盞上藥刮下聽用看人虛實毒之輕重久近至重者一料入粉霜七八錢再不可多用升白砒霜法白砒霜四兩打碎如指頭頂大塊聽用取緑豆一升煮汁二碗去緑豆不用將緑豆湯入甘草一兩同煎至一碗去甘草渣將汁一碗浸砒霜一日次早煎乾為度入陽城罐內鹽泥封固打文火二炷香武火一炷香候冷取出看鐵盞內有時如石榴子有時如灰樣此兩色始堪入藥若非二色不可用湯引開列於下一楊梅結毒生於頭頂或爛見骨至重者升粉霜只用三錢升砒霜只用一分五釐湯引內加川芎藁本各五錢煎湯送下一結毒生於眼上升粉霜只用一錢五分升砒霜只用一分湯引內加川芎白芷藁本殭蠶各二錢煎湯送下一結毒生於鼻上升粉霜只用二錢升砒霜一分湯引內加山梔川芎各二錢煎湯送下一結毒生於喉中升粉霜只用二錢升砒霜一分湯引內加天花粉石菖蒲川芎各二錢煎湯送下一結毒生於臂上升粉霜只用二錢升砒霜五釐湯引內加川芎柴胡各二錢煎湯送下一結毒生於臂膊上下兩脅升粉霜只用四錢重者五錢升砒霜只用二分天花粉末五錢為丸湯引內加杜仲懷牛膝各二錢煎湯送下一結毒生於陰囊上下玉莖上者升粉霜六錢重者用八錢升砒霜二分牡蠣煅紅冷定研極細末八錢人參五錢為丸湯引內加黃耆白朮天花粉懷牛膝各二錢煎湯送下一結毒生於腿上下升粉霜五錢升砒霜二分天花粉三錢防風五錢為丸湯引內加木瓜薏苡仁懷牛膝各二錢煎湯送下一結毒生於腳板底下升粉霜六錢升砒霜二分天花粉沉香各五錢為丸湯引內加木瓜懷牛膝各二錢煎湯送下一結毒生於婦女陰戶肉上染風毒年久不愈潰爛見骨或穿通肛門肉爛極臭手足不能伸縮或生陰戶上下兩邊者升粉霜八錢升砒霜六分天花粉三錢為丸湯引內加懷牛膝二錢煎湯送下外用豬肝切長條蒸熟乘溫插入陰戶內冷則換一條如此十餘條如陰戶內生濕瘡作疼不可忍者另用輕粉兒茶各三錢研細搽之倘瘡癢如蟲一般次早用枸杞根煎湯洗淨仍用豬肝插換摻藥數次即愈一結毒下疳用升粉霜三錢升砒霜一分湯引內加懷牛膝豬苓各二錢煎湯送下一魚口便毒用升粉霜二錢升砒霜一分湯引內加懷牛膝殭蠶各二錢煎湯送下一瘰癧穿爛日久用丹粉霜六錢升砒霜二分外用玳瑁銼碎綿帛包置婦女乳上一宿次早取下研為細末五錢為丸湯引內加夏枯草海藻滑石天花粉栝蔞仁各二錢煎湯送下湯引內俱用土茯苓四兩豬牙皂角一條同煎解毒仙草每年二三月金銀花未曾起花時嫩枝葉採取即放籃內蓋住不可見太陽攜回挂風頭陰乾用時以紙包置懷中俟燥研細每服一錢加黑鉛一錢土茯苓八兩打碎七碗水煎三碗每日早午晚各飲一碗輕者二三十服重者五六十服忌食瓜子花生茶醋公雞鯉魚豬首牛羊肉蝦子結毒棕根活蝌蚪曬乾各等分米糊為丸每服三錢白湯送下又方活鼠剝皮貼之結毒爛鼻冬青樹枝用童便內浸四十九日取出陰乾研末入鼻中結毒膏藥蔥頭七個麻油四兩熬去蔥渣入黃丹一兩攪勻又入黃蠟白蠟各五錢熔化再加去油乳香沒藥各二錢輕粉三錢犀牛黃一分珍珠二分攪和成膏攤貼二寶丹專治男婦楊梅結毒或在頭腦咽喉鼻中潰爛腐臭可限十二日完口痊愈永無餘毒雖後來生育毫無遺毒劈硃砂明透者二錢研細用清水揉洗漂去浮紅然後又乳再用清水飛過去腳曬乾只用淨末一錢五分好滑石刮去黃一兩研細入水揉洗去淨腐而黃色者曬乾又乳水飛數次至豆青色取起曬乾再乳細只用淨末二錢五分上二味共研極細重四錢足均為十二包每包三分三釐用土茯苓每日一斤以清水洗淨將磁瓦刮去外面黃皮用木槌打碎先將藥末三分三釐放於砂鍋底內再將土茯苓蓋上入河水四碗半做一制子於中驗其淺深再加井水四碗半共煎至四碗半為度去渣用新瓦壺盛之分為三次早晨午後晚間當茶溫服如此不可間斷連吃十二日即愈食忌最嚴如油鹽醬醋茶酒糖物毫不可犯只可食白水犍豬肉青菜梗煎時忌鐵器與陰人手如楊梅瘡初起之時必先用羊肉煨食托出毒來方食此藥洗瘡用菖蒲煎湯洗之補鼻還源法楊梅瘡結毒爛去鼻準或爛去陽物俱能生長如舊方用干元一錢制干元法取干元一個干元即頭胎男子胞衣竹刀刮去血新汲水洗淨炙乾再用大粉甘草半斤人參五錢煎水三碗再慢火熬至一碗半取起將干元放瓷器內以汁陸續澆灌汁盡為度入瓷罐內黃泥固濟炭火燒煅待冷取出如烏金紙色樣瓷罐收藏聽用硃砂四錢珍珠琥珀各二錢滴乳石煅三分冰片一分共研極細末和勻老米飯搗丸緑豆大每用土茯苓四兩煎湯送下初起服五分二次服三分後皆以三分為率服至一月鼻長如舊但未服藥時先到車匠店車成一端端正正鼻式外以黃蠟熔化澆木鼻上取下木鼻將蠟澆就鼻子用火烘黏在土星處待一月藥完取下蠟鼻看新長出鼻子歪正何如如不正速用蛾蠶繭一個煅存性為末黃蠟丸芥子大熱酒作一服送下如要速爛可用蠶繭二三個煅服次日漸爛三日後照舊爛平仍照前法用蠟鼻黏上服藥候一月服完其鼻又長全矣如陽物爛去亦照玉莖黃蠟澆成火烘黏在根上用土茯苓四兩天花粉五錢牛膝三錢煎湯服藥一月藥完莖如舊矣
