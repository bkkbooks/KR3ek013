body:
  text: 卷二十一內癰部五臟六腑內癰內疽癥瘕痞癖止皆匯於此部中以便檢閲參治內癰門主論凡人胸腹有十一募募者各臟腑陰會之所也靈樞云發內癰內疽者其本經募上肉必浮腫募中必時時隱痛浮腫為癰隱痛為疽此即內癰內疽之驗也但內癰有治法而內疽無治法何也蓋內癰內疽其病原無殊唯在根淺根深之別耳根淺者為癰根深者為疽若臨證用藥攻補得宜無不收效至募有十一而內癰僅九證者何也蓋膽府形如膜皮無出無納汁清氣潔不生內癰內疽若夫膀胱亦如膜皮中惟濁水故古今書籍並無講及內癰內疽者是以未敢詳載雖然中極穴即膀胱募也今人間有中極穴或浮腫或隱痛者所見證候竟同小腸癰相似則治法亦當按小腸癰治之可也俟後之學者留意焉驗內癰法凡遇生內癰疑似者但與生黃豆五粒令病人嚼之口中無豆腥味者是其候也書云凡內癰俱系膜內成患外皮不腐齊氏曰臟腑腸胃內癰內疽其疾隱而深藏目既不見手不能近所至難矣但以診脈辨之亦可知也若其脈洪數者膿已成也設脈遲緊雖膿未就已有瘀血也宜急治之不爾則邪氣內攻腐爛腸胃不可救也心癰門主論經曰巨闕隱隱痛者心疽其上肉微起者心癰巨闕穴在鳩尾下一寸心之募也王肯堂曰心癰始發巨闕穴必隱痛微腫令人寒熱身痛頭面色赤口渴隨飲隨干由心火熾盛更兼酷飲嗜熱而成宜服涼血飲如酒毒為病宜升麻葛根湯治之但此證甚屬罕有而治法不可不備心癰門主方涼血飲生地麥門冬連翹天花粉木通赤芍荊芥車前子瞿麥白芷甘草薄荷山梔各等分燈芯為引潮熱引加淡竹葉升麻葛根湯升麻柴胡黃芩白芍葛根木通山梔黃連甘草水煎服肝癰門主論經曰期門隱隱痛者肝疽其上肉微起者肝癰期門穴又名肝募在乳旁一寸半再直上一寸半素問曰肝癰兩胠滿臥則驚不得小便華真君曰肝癰不可用針刺須用內消內散祕録陳遠公曰人素多惱怒容易動氣一旦兩脅脹滿發寒發熱已而脅痛之至按之疼不可忍人以為肝火盛也誰知肝葉生瘡乎人但知肺生癰不知肝亦能生癰也且靈素諸書亦未詳言得毋創論以驚俗乎余聞異人云脅疼手不可按者肝葉生癰也靈素未詳者以肝癰世不常有所以略之也凡古今之氣運不同癰毒之生長不一肝能生癰烏可缺而不論乎況肝之生癰未嘗無理也肝一惱怒則葉開張肝氣即逆大怒之後肝葉空脹未易平復設使時加惱怒是肝葉竟不得安且怒後必然動火怒益多而火益盛盛必灼干肝血血乾則肝氣大燥無血養肝更易發怒欲不鬱結成癰烏可得乎然癰生於內何從而見然外可辨也肝癰生在左而不在右左脅之皮必見紅紫之色而舌必見青色也此而辨之斷斷無差治必以平肝為主佐以瀉火去毒切不可因循令其潰爛而不可救也化肝消毒湯白芍當歸各三兩金銀花五兩黑山梔五錢生甘草三錢水煎三劑疼止又減半服數服全愈冰鑑此方以歸芍入肝以滋肝血則肝血驟生易平肝血之燥又得甘草緩急梔子清火銀花解毒安得不效哉唯是火毒大盛肝血大虧不如此大劑亦自徒然倘執以肝火之旺非肝癰之證只用當芍治脅痛必不效也又曰有左脅大痛按之尤甚此肝癰耳非脅痛也肝癰多得之惱怒前條已論之矣然而憂鬱亦能生癰也惟惱怒得者其痛驟憂鬱得者其痛緩初痛之時逍遙散大劑煎飲痛立止矣何至成癰也因失於速治而肝中鬱氣若不能宣而血因之結矣血結不通遂化膿而成癰其勢似緩然肝性最急癰成而毒發甚驟也有脅疼數日而死者正因生癰毒敗而死非脅痛能死也可不急為治之乎宣郁化毒湯柴胡薄荷香附各二錢白芍當歸金銀花各一兩生甘草天花粉各三錢陳皮枳殼各一錢水煎服四劑全愈重則六劑後用四物湯大劑調治不再發也此證世不常有前論已悉然肝癰少見而脅痛世所常有余特發明憂鬱之能成癰又如此人知急治何至成癰哉朱丹溪曰肝癰始發期門穴必隱痛微腫令人兩腳脹滿脅痛側臥則驚便溺艱難由憤鬱氣逆而成初服復元通氣散次服柴胡清肝湯痛脹已止宜六味地黃丸脾虛食少佐以八珍湯滋腎補脾治之肝癰門主方救肝敗毒至聖丹岐天師治肝癰當歸白芍各三錢黑山梔生甘草各三錢金銀花十兩水十碗煎汁四碗聽用以金銀花汁二碗加水二碗同煎服渣又加水二碗同前存金銀花汁二碗煎一碗服二劑愈脾疽門主論經曰章門隱隱痛者脾疽其上肉微起者脾癰章門穴又名脾募在臍旁開六寸高上二寸王肯堂曰脾癰始發章門穴必隱痛微腫由過飧生冷兼濕熱或瘀血鬱滯脾經而成令人腹脹咽嗌乾燥小水短澀宜大黃湯赤豆苡仁湯二方合而用之腹脹全消宜六君子扶脾調理肺癰肺痿門主論經曰中府陷陷痛者肺疽其上肉微起者肺癰中府穴在雲門下一寸乳上三肋間動脈應指素問曰肝滿腎滿肺滿皆實即為腫王注云滿為脈氣滿實腫謂癰腫肺之癰喘而兩胠滿內經曰血熱則肉敗營衛不行必將為膿大凡肺瘡當咳嗽短氣胸滿時唾膿血久久如粳米粥者難治若嘔膿而不止者亦不可治其嘔膿而自止者將自愈其脈短而澀者自痊浮洪而大者難治其面色當白而反面赤者此火之剋金皆不可治全書千金曰咳唾膿血其脈數實為肺癰若口中咳即胸中隱痛脈反滑數此肺癰也張仲景曰肺癰吐膿如米粥咽燥振寒又曰上氣面浮腫肩息其脈浮大不治又加利尤甚問曰病者咳逆何以知其肺癰當以膿血吐之則死其脈何如曰寸脈微而數微為風數為熱微則汗出數則惡寒風中於衛呼氣不入熱逼於榮吸氣不出風傷皮毛熱傷血脈風舍於衛其人則咳口乾喘滿咽燥不渴多吐濁沫時時振寒熱之所過血為凝滯蓄結癰膿吐如米粥始萌可救膿成則死問曰振寒發熱寸脈滑數其人飲食起居如故此為癰腫醫反不知以傷寒治之不應何以知有膿膿之所在何以別知其處師曰假令膿在胸中者為肺癰其脈數咳吐有膿血設膿未成其脈自數緊但數為膿已成矣金匱方論曰熱在上焦者因咳為肺痿肺痿之病何從得之或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故寸口脈數其人咳口中反有濁唾涎沫者為肺痿之病若口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰咳唾膿血脈數虛者為肺痿數實者為肺癰王肯堂曰治吐膿血如肺癰狀口臭他方不應者宜消風散荊芥川芎羌活人參茯苓防風藿香蟬退各二錢厚朴陳皮各五錢為末是也入男子發灰研細入和之清米湯下可除根只兩服亦治吐血準繩又曰肺癰已破入風者不治精要曰勞傷血氣腠理虛而風邪乘之內盛於肺也則汗出惡風咳嗽短氣鼻塞項強胸脅脹滿久久不瘥已成肺痿也又曰起於肺癰者由食啖辛熱炙煿或酣飲熱酒燥熱傷肺所致治之宜早王氏曰患肺疽者項強蓋肺系在項肺傷則系傷故牽引不能轉側肺者氣之本其華在毛其充在皮故皮膚不澤張景嶽曰此證初起邪結在肺者惟桔梗杏仁煎為治此之第一方全書齊德之曰肺者五臟之華蓋也處於胸中主於氣候於皮毛勞傷血氣腠理虛而風邪乘之內感於肺也故汗出惡風咳嗽短氣鼻塞項強胸脅脹滿久久不瘥已成肺痿也又曰肺痿之候久嗽不已汗出過度重亡津液便如爛瓜下如豕膏小便數而不渴渴者自愈欲飲者將瘥此由肺多唾涎而無膿者肺痿也又曰肺瘡之候口乾喘滿咽燥而渴甚則四肢微腫咳唾膿血或腥臭濁沫胸中隱隱微痛者肺疽也始萌則可救膿成則多死馬益卿曰肺癰治法要略先以小青龍湯一貼以解其風寒邪氣然後以葶藶大棗瀉肺湯桔梗湯葦莖湯見金匱要略隨證用之以取膿此治腫瘍之例也終以內補黃耆湯以補里之陰氣此治潰瘍之例也薛立齋曰凡勞傷血氣腠理不密外邪所乘內感於肺或入房過度腎水虧損虛火上炎或醇酒炙煿辛辣厚味熏蒸於肺或咳唾痰涎汗下過度重亡津液皆能致之又曰大抵勞傷血氣則腠理不密風邪乘肺風熱相搏蘊結不散必致咳嗽者若誤用汗下過度則津液重亡遂成斯證又曰此證皆由脾土虧損不能生肺金肺金不能生腎水故始成則可救膿成則多死苟能補脾肺滋腎水庶有生者若專攻其瘡則脾胃益虛鮮有不誤者矣陳遠公曰人有胸膈間作痛咳嗽時更加痛手按之更增氣急人以為肺咳也誰知肺熱生癰乎夫肺為嬌臟藥食所不到者故治之甚難治法似宜瀉火以救肺藥既不入肺而肺為脾子脾經未嘗不愛藥也補脾土則土能生金平肝木則金不剋木清心火則火不刑金三經有益於肺無損於金則肺氣得養後以消毒之品解肺之邪何癰不散乎全肺湯元參三兩金銀花五兩麥冬二兩生甘草五錢花粉茯苓白芍各三錢水煎服二劑痛減內消矣冰鑑按癰疽證必須內消不可令其出毒內消之法總不外心肝脾三經而別無消癰之道也或曰肺之於腎也獨不可治腎以消乎然肺癰雖成於火灼肺金之液實因肺氣之自虛也補腎雖或能使肺不來生腎但肺腎相通補腎之水恐肺氣下降而火毒反不肯遽散不若止治三經使肺氣得養自化其毒不遺於腎為妙也又曰人有胸膈作痛咳嗽不止吐痰便覺疼甚按之痛不可忍喉間聞腥臭之氣隨吐膿血此肺癰不但已成而且已破矣未破者易消已破者難治以膿血未能遽盡耳然得法亦無難也夫肺之生癰者因肺火不散也然肺火之來因肺氣之虛也肺虛而後火留於肺火盛而肺結為癰不補虛以散火而未成形者何以消已成形者何以散即潰爛者又何以愈哉是虛宜補矣然補何臟乎若補肺虛而肺不能直補只補胃氣則肺氣自旺也今癰已破多吐膿血則肺氣尤虛雖毒氣尚存不可純瀉其毒於補氣之中而行攻散之法則毒易化而正氣無傷也完肺飲人參一兩元參金銀花各二兩蒲公英五錢花粉桔梗生甘草各三錢黃芩二錢水煎一服膿必多二劑漸少又三劑疼止膿血亦止六劑全愈此方補胃氣即瀉胃中之火旺胃氣而肺氣自不能衰瀉胃火而肺火自不能旺所以敗毒生肉也雖諸藥亦能入肺不單入胃然入胃者十之八入肺者十之二仍是治胃益肺之藥也或問肺癰已破病已入里似不宜升提肺氣南昌喻嘉言謂宜引之入腸而先生仍用桔梗開提肺氣恐不可以為訓嗟乎余所用藥無非治胃之藥藥入於胃有不下引入腸者乎然肺氣困頓肅清之令不行用桔梗以清肺上氣通而下行更速然則上之開提正下行之迅逐也又曰人有久嗽後肺受損傷皮膚黃瘦咽喉嘶啞自汗盜汗不得臥吐稠痰腥臭毛悴色焦嗽時必忍氣須臾輕輕吐痰始覺膈上不疼否則大痛氣息奄奄入以為肺癰也誰知肺痿生瘡乎本不可救然治之得法亦有生者夫肺癰與肺痿不同肺癰生於火毒治之宜速肺痿成於勞傷治之宜緩火毒宜補中用瀉勞傷宜補中帶清清與瀉不同而補則同也瀉中用補可用大劑清中用補只宜小劑勿伐勿助若有若無始奏功也養肺去痿湯金銀花麥冬各三錢生地百合各二錢紫菀百部各五分生甘草五錢款冬花貝母白薇各三分天冬一錢水煎服十劑膈疼少減便有生機矣又十劑更輕又十劑漸愈共六十劑始全愈也此方不寒不熱養肺氣於將危保肺葉於將痿實有奇功若圖效捷於一旦必致輕喪於須臾寧忍耐以全生勿欲速而送死又曰有膏粱子弟多食燔熬厚味美醴香醪以至舌乾喉燥吐痰吐血喘急膈疼不得安臥人以為肺經火熾誰知肺癰已成乎夫肺為五臟華蓋喜清氣暢達惡燥氣炎蒸今所食無非辛熱則五臟之中一團火氣火性炎上而肺獨受其害不能下生腎水腎水無源則益加燥勢必取資於肺肺金又病不益虛其虛而燥其燥乎況各經紛紛來逼火烈金刑肺間生癰必至之勢也治法化毒之中益以養肝降火之內濟之補腎庶有成者可痊未成者可散也扶桑清肺丹桑葉五錢紫苑二錢貝母生甘草百合阿膠人參各三錢犀角屑五分款冬花一錢杏仁七粒金銀花熟地各一兩水煎調犀末服數劑可收功也此方肺腎同治全不降火蓋五臟之火因飲食而旺乃虛火也故補水而金氣堅虛火息況補中帶散則非呆補火毒又易解也朱丹溪曰癰疽發於內者肺癰肝癰腎癰腸癰囊內癰附骨癰惟肺癰須先解表今特表而出之陳實功曰夫肺癰者金受火刑之證也蓋肺為五臟華蓋其位至高其氣至清內主乎氣中主聲音外司皮毛故肺金獨旺於秋者應其清輕之候也倘有所克其病自生先因感受風寒未經發越停留肺中初出其候毛聳惡風咳嗽聲重胸膈隱痛項強不能轉側者是其真候也久則鼻流清涕咳吐膿痰黃色腥穢其則胸脅脹滿呼吸不利飲食減少脈洪自汗法當清金甘桔湯主之麥冬清肺飲調之亦有七情飢飽勞役損傷脾肺者亦有勞力內傷迎風喊叫外寒侵入未經解散致生肺癰者脈必浮而微數胸熱氣粗寒熱往來咳嗽痰生通用金鯉湯蠟礬丸太乙膏相間服之亦效正宗又曰如手掌皮粗六脈洪數氣急顴紅汙膿白血嘔噦溺水鼻塌不飧飲食者俱為不治又曰如身涼脈細膿血交流痰色鮮明飲食知味膿血漸止者無妨反此則死又曰如久嗽勞傷咳吐痰血寒熱往來形體消削咯吐瘀膿聲啞咽痛其候傳為肺痿百死一生之候治宜知母茯苓湯主之人參五味湯調之岐伯曰凡人有病氣喘嘔咳者乃肺病也肺乃金臟又嬌臟也居於心之上瓣如蓮花色紅蒂紫咽管之下即是肺經司氣之出入不容食物咽之上有胃厭即小舌頭也胃厭遮住咽門飲食之類始能直入食管而下通於胃倘人飲食之時多言胃厭不及遍蔽咽門設有米食之類入於氣管則必咳不已可見氣管不容一物可知藥亦不能直入也治肺之法正治甚難轉治以脾脾氣有養則土自生金喘咳自已故五臟這中除肺一經之外俱可正治獨肺經不可正治然則肺經生癰瘍何以治之耶清金消毒湯主之祕録又曰蓋癰生胸腹之內無不生於火與邪若外用末藥調敷則相隔甚遙必須內消為得然癰勢甚大甚急一杯水何能救車薪之火故必大劑救肺消毒至聖丹煎飲而火邪自散而癰瘍自消倘日以敷藥調治於皮膚之外或以小劑而求散於湯餌之中吾見其必死而已矣張仲景曰瘡瘍之疾發於火邪之盛其由來非一日矣欲消其火邪豈是尋常細小之藥所能去乎故必多用重藥以劫治之然而散邪之藥俱耗真陰多用重用皆能取敗惟金銀花敗毒而又不傷氣去火而又能補陰故必須此品為君第此品性純而正乃正人君子也譬如正人君子必同郡攻擊於群小之中始不致僨事而召禍所以多至十兩或一斤始可取勝於眉睫然徒藉此一味又覺勢單力薄當以他藥相助成功各有妙理非泛然而用之者也或加麥冬以滋肺或加歸芍以潤肝或加地榆以涼大腸或加甘草以瀉火或加梔子以清熱或加薏苡仁以去濕惟在用者審之馮魯瞻曰肺癰者勞傷氣血內有積熱外受風寒胸中滿急隱隱作痛咽乾口燥時出濁唾腥臭若吐膿如米粥者死脈滑數或實大凡患者右脅按之必痛須用肺癰神湯未成即消已成即潰已潰即愈屢用屢驗者也錦囊又曰夫人一身之氣全關於肺肺清則氣行肺濁則氣壅肺熱則津不行而肌肉甲錯甲錯者肌不潤澤也多生肺癰癰者壅也肺氣鬱熱久壅而成也蓋咳久傷肺元氣漸虛其人有寒熱往來自汗濈濈口中有濁唾涎沫或咳嗽唾中有紅線膿血或多唾涎沫而無膿寸口脈數而虛澀或虛洪者名曰肺痿熱在上焦故也如口中辟辟燥咳即胸中隱隱痛咽燥喘渴四肢微腫先吐血而後吐膿胸中甲錯或遍熱烙手喜偏側於右睡而不能左臥左臥則喘急不安其痰似膿血腥臭以水驗之則沉而不浮其脈數而有力者名曰肺癰因勞傷血氣腠理開而受邪寒搏於血蘊結成癰積熱不散敗血為膿咳傷肺葉而成按其右脅必痛者是也若已破入風者不治吐膿如米粥者難治然痿為正氣虛癰為邪氣實其肺痿治法在乎養血養氣養神清金而治肺癰在於補養氣血而兼排膿也然肺痿亦有寒者必頭眩吐涎沫而不咳不渴而遺尿此為肺中冷而心中有濕液也古人用炙甘草乾薑治之以補虛勞也又曰古一婦人二十餘歲胸膺間一竅口中所咳膿血與竅相應而出以人參歸耆補氣血之劑加退熱排膿等藥而愈婁金善曰肺痿屬熱如咳久肺傷聲啞聲嘶咯血此屬陰虛火熱甚是本論治肺痿吐涎沫而不咳者其人不渴必遺尿小便數以上虛不能制下故也此為肺中冷必眩多涎唾用炙甘草乾薑此屬寒也肺痿吐涎多心中溫液者用炙甘草湯以補虛勞也亦與補陰虛火熱不同是皆宜分清之故肺痿又有寒熱之異也周文採曰其候應乳上下隱隱而痛者肺疽也若肉微起者肺癰也初起俱可救若日久唾膿臭敗者不可治也但診其脈微緊而數者未有膿也若緊甚而數者已有膿也若膿如粳米粥及嘔膿不止其脈浮大而面色赤者俱為難治若膿自止其脈短而澀面色黃白者皆可治何以言之蓋脈浮大面赤此心火克肺金也故難治若脈短澀及面白者此肺氣未損也故可治治法當補肺瀉火止嗽定喘為主集驗聖惠曰中府穴名在雲門下一寸六分乳肋間動脈應手陷中者是也隱隱而微痛者肺疽也上肉微起者肺癰也是以候始萌則可救膿成則多死若欲知有膿者但診其脈若微緊而數者未有膿也緊甚而數者已有膿也申鬥垣曰其證現於秋冬可救者何也肺旺於秋是也冬寒水旺子能救母子母相生故云可救為順是春夏木旺火勝之時肺金病再遇火旺之時爍石流金金受火克此為逆故難治也啓玄李東垣曰夫肺者五臟之華蓋處於胸中主於氣候於皮毛勞傷血氣腠理虛而風邪乘之內感於肺也則汗出惡風咳嗽短氣鼻塞項強胸脅脹滿久久不瘥已成肺痿也肺痿之候久嗽不已汗出過度重亡津液便如爛瓜下如豕脂小便數而不渴渴者自愈欲飲者將瘥此由肺多唾涎沫而無膿者肺痿也風中於衛呼氣不入熱至於榮則吸而不出所以風感皮毛熱傷血脈風熱相搏氣血稽留蘊結於肺變為肺疽診其脈候寸口脈數而虛者肺痿也數而實者肺疽也其肺瘡之候口乾喘滿咽燥而渴甚則四肢微腫咳嗽膿血或腥臭濁沫胸中隱隱微痛者肺疽也龔居中曰經曰肺傷善痿痿則火鬱邪壅致金燥烈肺虛氣不能升降以充百脈癰則金體受傷肺葉焦枯息亦不利則火邪無以泄郁遏熏蒸致咯咳嗽血血滲妄行必中府雲門隱痛咳則喉腥脈洪數而虛久則腐化而出遂成肺癰不治之證若膿血自止脈來短澀者不治自愈以脈經本部之脈在也馮魯瞻曰咳而膺乳痛即看痰色如何若濃濁如膿或黃或赤口中臭即從肺痿肺癰治以脈數而虛者為肺痿脈數而實者為肺癰又曰肺痿咳吐咽燥欲飲水者自愈張口短氣者死肺癰門主方金鯉湯正宗肺癰已成未成胸中隱痛咯吐膿血者金色活鯉魚一尾約四兩重川貝母一錢去心先將活鯉魚連鱗剖去肚腸勿經水氣以貝母末摻在魚肚內線扎之用上白童子小便半大碗將魚浸童便內重湯頓煮魚眼突出為度少頃取起去鱗骨取淨魚肉浸入童便內頓熱魚與童便作二三次一日食盡其功效甚捷排膿散肺癰口吐膿血之後宜服此藥排膿穢補肺氣人參黃耆白芷五味子等分上研細末每服三錢食後蜜湯調服又方金銀花八兩當歸麥門冬各二兩白芍山梔各三錢生甘草玄參各一兩水八碗煎一碗服渣用水四碗煎半碗服又方蒲公英當歸生甘草各一兩金銀花二兩乳香去油研細黃芩各一錢水五碗煎一碗再入乳香細末調和服下清金消毒湯祕録金銀花八兩當歸二兩玄參麥門冬生甘草各一兩水煎服岐天師曰此方數品中唯麥冬乃清肺火之品余俱入脾入肝入心之藥而用之者何也蓋入肝則平木而不必肺金用力而制之則肺金得養矣入心經則心火不凌肺金而肺金又得養矣入脾則脾土能生肺金而肺金又得養矣雖乃治脾治心治肝之藥似乎隔一隔二隔三治法其實乃正治肺金也雷公曰我意方中加白芍三錢平肝火使心火弱不來克肺也孫真君曰隔一隔二隔三之治其實原正治肺經此等議論大開聾聵凡肺病皆宜如此治之勿謂天師專治肺癰立論而不通於凡治肺病也救肺敗毒至聖丹岐天師金銀花十兩玄參麥門冬各三兩生甘草五錢水十碗煎四碗服肺癰神湯錦囊薏苡仁五錢黃耆蜜炙白芨金銀花桔梗各一錢川貝母一錢六分甜葶藶八分微炒陳皮甘草節各一錢二分薑水煎食後徐徐服新起加防風一錢去黃耆潰後加人參一錢久不斂加合歡皮一名夜合即槿樹皮一錢肺癰久不斂口者馮氏錦囊合歡樹皮白蘞煎服最佳桔梗湯治咳膿腥血肺癰桔梗炒貝母桑白皮炙枳殼黃耆炙當歸防己地骨皮各一錢甜葶藶炒栝蔞仁杏仁杵薏苡仁各五分百合炒五味子炒杵各一錢五分作三劑水煎服歷驗方陳芥菜滷服之埋地下三年者每早用數匙衝開水服或作醬油入菜吃一百二十天不可間斷又方陳芥菜煅灰白湯調下可許見效一半又方白芨研細末每服三錢入藕粉內調服不過三五兩即愈或燉蛋糕或和粥中服之並效又方扁柏葉搗取自然汁半杯入麥芽糖二兩隔水燉化清晨衝開水服之三次自愈韋廟獨行方治心胸甲錯為肺癰黃昏湯主之夜合皮夜合樹按本草即烏農樹也掌大一片水三升煮取二升分再服肺癰第一次服四劑錢青掄薏苡仁條芩苦絲瓜甘草各一錢川貝母赤芍栝蔞仁桔梗廣陳皮升麻牡丹皮各一錢二分引加黑棗二個生薑一片食後煎服如大便不通加火麻仁第二次服四劑川貝母赤芍天花粉甘草栝蔞仁杏仁連翹獨活知母桔梗百合各等分燈心十根白果肉七個食後煎服第三次服四劑川貝母甘草栝蔞仁獨活天花粉桔梗麥門冬赤芍知母百合各等分燈心十根白果肉七個照前服以後白鯗紅蘿蔔鴨蛋終身不可食食則後發不治大葷一年後方可吃茹齋更妙又方緑橘葉洗淨搗絞汁一盞服之吐出膿血即愈奇驗方周鶴仙凡人肺癰初起時咳兩胸脅即疼者是也即宜速服此方神效玄參八兩天門冬四兩桔梗二兩甘草一兩炙水十碗煎至二碗再入蒲公英金銀花各五錢再煎至一碗飯食後服之初起者即消日久者即生肉真奇方也又方洋糖二斤半牯豬肚一副杉木炭一分肉桂一分糯米七粒將豬肚洗淨以上項藥裝入肚內線縫好鍋煮一大塊每早割一塊水酒下葷只吃牯豬肉肚肺鯽魚余俱戒一百二十天全愈屢效每清早未洗面時用陳芥菜滷沖水飲一盅洗面後再吃制豬肚又方用日久齷齪竹燈挂子一個連宿油垢燒灰存性研末黃酒送下三錢即愈極奇神效方不可輕忽肺癰神方何繼充家寶曾救治多人真神方也懷生地酒炒二錢五分麥門冬二錢薏苡仁四錢當歸酒浸棗仁炒大貝母蘇子桔梗栝蔞仁百合各一錢牡丹皮桑白皮蜜炙各七分白芨八分炙甘草二分漢防己六分黃耆一錢二分白水煎加減法若睡不寧用棗仁睡既寧即去棗仁加北五味子七粒如咳嗽氣促去桔梗加款冬花一錢咳嗽作惡心加土炒白朮一錢滋陰清化丸何繼充天門冬去心甘枸杞麥門冬去心知母酒洗生地酒洗當歸酒洗熟地酒煮川貝母去心各二兩北五味七錢粉丹皮山萸肉玄參各一兩白茯苓懷山藥各一兩五錢上為末煉蜜為丸空心白湯送下三錢百合湯肺癰主方棗仁懷生地當歸黃耆漢防己蘇子栝蔞仁桑白皮川貝母百合薏苡仁牡丹皮甘草桔梗白水煎有嗽加款冬花肺癰神方真麻油浸三稜白果收藏浸二年者須服五六枚浸三四年者只服二枚即愈肺癰奇方石膏寒水石鵝管石井泉石龜背石火煅人乳內淬存性川貝母各一兩炙甘草三錢款冬花五錢焙上乳極細末聽用臨臥時用細芽漱口再將藥稱一分裝在蘆柴管內按在喉嚨口用氣慢慢吸進喉中仰臥片時再飲茶二三口吞下待至五更時又如此吸一服桔梗杏仁煎張景嶽治咳嗽吐膿痰中帶血或胸隔隱痛將成肺癰者此方為第一此桔梗湯之變方也桔梗杏仁甘草各一錢金銀花麥門冬夏枯草百合阿膠連翹各二錢紅藤貝母各三錢枳殼一錢五分水二盅煎八錢食遠服如火盛兼渴者加天花粉二錢皂莢丸治肺癰咳逆上氣時時唾濁但坐不眠皂莢刮去皮弦酥炙為末蜜丸以棗膏和湯服三丸喻嘉言曰火熱之毒結聚於肺表之理之溫之清之曾不少應堅而不可攻者令服此丸庶幾無堅不入聿成洗蕩之功不可以藥之微賤而少之也本方加蛤粉等分為末名皂蛤丸治婦人風邪客於乳房而成奶癰每服二錢酒下此藥能導其汗散其風邪汗出而病自愈矣救肺癰垂危仙方魚腥草煎湯打雞蛋吃不過數次即可回生腎癰門主論經曰京門隱隱痛者腎疽其上肉微起者腎癰京門穴又名腎募在身側腰中監骨下肋間素問曰腎癰腳下至小腹滿大奇論曰腳下當作胠下張仲景曰小腹痛而痞堅者腎癰也小便數而似淋者腸癰也王肯堂曰腎癰京門穴必隱痛微腫令人寒熱往來面白不渴少腹及肋下䐜脹塞滿由腎虛不足之人房勞太過身形受寒邪氣自外乘之初宜五積散加細辛寒盡痛止宜桂附地黃丸調理胃癰門主論經曰中脘隱隱痛者胃疽其上肉微起者胃癰中脘穴又名胃募在臍上四寸又曰胃脘癰人迎脈逆而盛素問帝曰人病胃脘癰者診當何如岐伯曰診此者當候胃脈其脈當沉細沉細者氣逆甲乙經沉細作沉澀逆者人迎甚盛甚盛則熱人迎者胃脈也逆而盛則熱聚於胃中而不行故胃脘為癰也病能篇聖濟録云胃脘癰由寒氣隔陽熱聚胃口寒熱不調故血肉腐壞以氣逆於胃故胃脈沉細以陽氣不得上升故人迎熱盛令人寒熱如瘧身皮甲錯或咳嗽或嘔膿唾血若脈洪數膿成也急排之脈遲緊瘀血也急下之否則其毒內攻腐爛腸胃矣李東垣曰臟腑腸胃內瘡內疽其疾隱而不見目既不見手不能近所為至難可以診其脈而辨之亦可知矣有胃脘癰者當候胃脈人迎者胃脈也其脈沉細者氣逆逆則甚甚則熱聚胃口而不行胃脘而為癰也若其脈洪數者膿已成也設脈遲緊雖膿未就已有瘀血也宜急治之不爾則邪氣內攻腐爛腸胃不可救也十書百效全書云胃脘居心穴之下其生癰也外證寒熱如瘧胃濁則肺金失養或咳或嘔或唾膿血皮膚錯縱多因飲食七情火鬱彼又外感寒氣使熱濁之氣填塞胃脘胃中清氣下陷故右關脈來沉細胃中又為寒氣所隔故人迎脈來緊盛有此二脈胃癰始成宜大射干湯如痰氣上壅甘桔湯大便不利太乙膏作丸服之小便赤澀腹滿不食三仁湯膿出食少補中益氣湯竇漢卿曰凡內癰余嘗以薏苡仁湯牡丹皮散太乙膏治之亦效若吐膿血飲食少思宜助胃壯氣為主而佐以前法不可專治其瘡全書朱丹溪曰內疽者因飲食之毒七情之火相鬱而發用射干湯主之馮魯瞻曰胃癰者胃為水穀之海多氣多血多熱若邪熱內泊則兩熱相合故結為癰而胃脈必沉細人迎必甚盛蓋胃脈見於右關本宜洪大而反沉細者足見胃氣之逆也人迎者胃經穴名在結喉兩旁亦有動脈應於其間見於左寸今若人迎甚盛而右關沉細則愈見熱壅聚於胃口而不行故不能充於脈耳人見人迎脈盛誤為傷寒禁其飲食則必死錦囊又曰胃脘癰者何以別之內經云人病胃脘癰者當論脈沉細沉細者氣逆逆者人迎反甚則熱聚於胃口而不行故胃脘為癰也治法與腸癰同初以疏利之藥導其滯次用排膿消毒托裡之藥調之此其大法也張仲景曰胃癰初起中脘穴必隱痛微腫寒熱如瘧身皮甲錯並無咳嗽咯吐膿血由飲食之毒七情之火熱聚胃口而成癰也脈來沉數者清胃射干湯下之若脈澀滯者瘀血也牡丹皮湯下之脈洪數者膿已成也赤豆苡仁湯排之體倦氣喘作渴小水頻數者肺氣虛也補中益氣湯加麥味補之胃癰門主方大射干湯治胃癰始成射干升麻白朮赤芍藥赤茯苓山梔仁水煎熟入蜜生地汁和服甘桔湯治胃癰痰氣上壅甘草桔梗麥門冬各一兩水煎服三仁湯治胃癰小便赤澀腹滿不食薏苡仁桃仁冬瓜子仁牡丹皮水煎服射干湯射干升麻犀角麥門冬元參大黃黃芩各一錢芒硝梔子竹葉各五錢水煎服赤豆苡仁湯赤小豆防己薏苡仁甘草各等分水煎食遠服大腸癰門主論經曰天樞隱隱痛者大腸疽其上肉微起者大腸癰天樞穴又名大腸募大腸募在臍旁開二寸陳遠公曰人腹中疼甚手不可按右足屈而不伸人以為腹中火盛而存食也誰知大腸生癰乎凡腹痛足不能伸者俱腸癰也而大腸癰足猶不能伸也但大腸生癰無不成於火火盛不散則結郁成癰矣然火之有餘本水之不足水衰則火旺火無水制乃養成其毒耳治法不必治火壯水以制火毒氣自消矣清腸飲金銀花三兩當歸二兩地榆麥冬元參各一兩苡仁五錢生甘草三錢黃芩二錢水煎服一次痛少止二劑足可伸又二劑毒盡此方活血解毒雖瀉火而實滋陰也相濟相成取效如神耳倘不益陰以潤腸唯攻毒以降火則大腸先損何能勝火毒凌灼哉無怪治之不效也冰鑑又曰大腸生癰右足不伸腹疼甚便出膿血肛門如刀割此已潰爛也能食者生不能食者死然不能食之中亦有非因火毒之熾而然者又不因其不能食而棄之也凡生癰疽俱以有胃氣為佳為胃氣無論陰毒陽毒多不可救故陰疽證必以扶胃氣為第一少加敗膿祛毒則正氣無傷火毒易散今大腸癰破而不思食則胃氣盡絶大危證也不急補胃而惟治癰必死之道矣開胃救亡湯人參山藥薏仁元參白朮各一兩金銀花二兩生甘草三錢山羊血一錢研水煎調服一劑胃開二劑膿少三劑疼止四劑全愈此方救胃而敗膿祛毒已在其中妙在銀花治毒仍是滋陰之品為瘡家奪命之將軍乃至仁至勇之帥又得參朮輔助其力則散毒猶神山羊血止血解渴且善通氣引各藥直入癰中以解散之合而治之調合有人撫綏有人攻剿有人安得不勝乎自然胃氣開化精微而轉輸於大腸也倘胃氣未傷服之尤效切勿疑而不用以枉人性命耳又曰大腸生癰小腹痛甚淋瀝不已精神衰少飲食無味面色痿黃四肢無力自汗盜汗夜不得臥人以為火盛生癰也誰知水衰不能潤腸耳夫大腸不能傳導者全賴腎水灌注今因醉飽房勞過傷精力大泄其精以致火動水涸又加生冷兼進以致氣血乖違濕動痰生腸胃痞塞運化不通氣血凝滯而成癰也然則生癰之先本腎水之不足茲癰潰之後又復流其水是虛其虛矣若作火毒治鮮不變為死證必須大補腎水並補脾胃之氣則脾胃化精生水更易枯涸也腸一旦得滂沱之潤自然沾足重蘇不治癰而癰已化氣血足而肌肉生也加味六味地黃湯以治之熟地二兩山藥山萸各八錢丹皮六錢澤瀉一錢白茯苓三錢人參麥冬各一兩黃耆五錢水煎服數劑疼止神健按六味補腎水加參耆麥冬補脾胃之土土旺而肺自旺肺與大腸相表裡又為腎之母母子相需表裡相顧故奏功如神也王肯堂曰大腸癰多大便墜腫初起發熱惡風自汗身皮甲錯按之腹內急痛小腸癰門主論經曰關元隱隱痛者小腸疽其上肉微起者小腸癰關元穴又名小腸募在臍下三寸千金曰腸癰之為病小腹腫強按則痛便數似淋厥論曰少陽厥逆機關不利機關不利者腰不可以行項不可以顧發腸癰不可治驚則死王肯堂曰千金謂妄治必殺人腸癰為病小腹重而強按之則痛便數似淋時時汗出復惡寒身皮甲錯腹皮急如腫狀其脈數者小腸有膿也準繩陳無擇曰腸癰為病身甲錯腹皮急按之濡如腫狀腹無聚積身無熱脈數此為腸內有膿久積陰冷所成也故金匱有用附子溫之其脈遲緊者膿未成可下之當有血洪數者膿已成不可下此以內結熱所成也故金匱有用大黃利之張仲景曰腸癰小腹痞堅蓋小腹痛而痞小便數而似淋者腸癰即肺癰肝癰之屬巢氏曰洪數者已有膿脈若遲緊者未有膿甚則腹脹大轉側有水聲或繞臍生瘡或膿自臍出或大便出膿血張景嶽曰經言腸癰為病不可驚驚則腸斷而死故患是者其坐臥轉側極宜徐緩時時少飲薄粥及八珍湯固其元氣靜養調理庶可保其有生全書薛立齋曰此證因七情飲食所致又曰若臍間出膿者不治孫真人曰腸癰小腹重強按之則痛小便如淋時時汗出復惡寒身皮甲錯腹皮急加腫甚者腹脹大轉側有水聲或繞臍生瘡膿從臍出或從大便下乃七情飲食所致脈遲緊者未有膿也大黃湯下之洪數者已有膿也薏苡湯排之小腹疼痛小便不利膿壅滯也牡丹皮散主之陳實功曰腸癰初起發熱惡寒脈芤而數皮毛錯縱腹急漸腫按之急痛大便墜重小便澀滯若淋甚者臍突腹脹轉側水聲皆由濕熱瘀血流入小腸而成癰也正宗又曰男子暴急奔走以致腸胃傳送不能舒利敗血濁氣壅遏而成婦人産後體虛多臥未經起坐而成婦人坐草艱難用力太過而成婦人分娩後失逐敗瘀以致敗血停積腸胃結滯而成飢飽勞傷擔負重物致傷腸胃而成醉飽房勞過傷精力或生冷並進以致氣血乖違濕動痰生多致腸胃痞塞運化不通氣血凝滯皆能致之又曰初起未成小腹殷殷作痛儼似奔豚小便淋瀝者當以大黃湯下之瘀血去儘自安體虛脈細不敢下者活血散瘀湯和利之又曰腹濡而痛小腹急脹時時下膿者毒未解也用牡丹皮湯治之又曰已成腹中疼痛脹滿不食便淋刺痛者薏苡仁湯主之又曰如膿從臍出腹脹不除飲食減少面白神疲此乃氣血兩虧宜用八珍湯加牡丹皮肉桂黃耆北五味斂而補之又曰如積襲日久因循不識此證誤作脹病治之以致毒攻內臟腸胃受傷或致陰器攻爛腐靨黑斑色敗無膿時流汙水腹連陰痛煩躁不止身熱口乾衾幃多臭臥房難進者俱為不治馮魯瞻曰小腸癰作痛者其身甲錯腹皮緊按之濡如腫狀腹常痛或繞臍生瘡急宜下之錦囊又曰一室女時患腹痛食少面黃肌瘦幼科治以退熱消積女科治以通經行血大方以虛而議補俱不效後有識者曰脈大而尺獨數肌膚甲錯甲錯不滑澤也此小腸有癰膿已成而將潰矣亟與葵根一兩金銀花三錢甘草節一錢皂角刺陳皮各二錢再劑而膿血大潰更以太乙膏同參耆治之一月始安又曰腸癰是膏粱積熱所致其候身皮甲錯腹皮急按之濡如腫狀繞臍生瘡小腹按之則痛溲數似淋腹脹惡寒身熱自汗如脈沉緊而未有膿須急解毒如脈洪數已有膿須急下膿若小腹痛而小便閉者是膿壅滯也然腸癰為病切不可驚驚則腸斷故坐臥轉側切宜徐緩並飲薄粥及八珍湯以固元氣靜養調理庶可保也李東垣曰腸癰繞臍生瘡膿從瘡出者有出臍中者惟大便下膿血者自愈也十書申鬥垣曰腸內生癰當驗證明白不可妄治妄則殺人其病小腹重按之痛小便如淋時時汗出惡寒身皮錯腹皮急繞臍生瘡或臍出膿或大便膿血如左腫甚者左寸洪數是小腸癰右腫甚者右寸洪數是大腸癰啓玄朱丹溪曰肌膚甲錯腹皮緊小腹痛小便以淋時時汗出或引大腹痛按之濡若腫狀腹無積聚身不發熱脈不弦數此腸中有癰久積陰冷所致宜用濁熱之劑以溫發之故金匱有用附子溫之者何氏曰凡腸癰男左女右腳曲不能伸者是若誤作陰疝與傷寒治之為禍不小濟生胡公弼曰按臍下一寸三分即腸之屈曲間大腸左盤小腸右曲其生癰也由冷毒積久腸厚而不能發越於外故生於內外視之無形重按之痛甚毒生於左側左足不能伸毒生於右側右足不能伸生毒之外肌膚微有皺紋細觀亦覺微腫此證當服牛膠酒吞太乙膏丸追膿解毒治一不善則難救矣青囊竇漢卿曰膀胱有熱蓄毒不流結成此候以致臍中堅硬結核小便疼痛日夜下利無度是也外宜用連須蔥十根搗爛罨臍上又曰婦人腸癰與男子不同乃心經毒流小腸經發在臍中堅硬如石此是惡候也宜內托又曰腸癰若大便或臍間出膿者不治內經曰腸癰為病不可驚驚則腸斷而死故患是者其坐臥轉側務宜徐緩時少飲薄粥及服八珍湯固其元氣靜養調理庶可保全其生全書千金方灸法曲兩肘正肘頭鋭骨灸百壯下膿血而安脈經問曰羽林婦病何以知腸有癰師曰脈滑而數滑則為實數則為熱滑則為榮數則為衛衛數下降榮滑上升榮衛相干為敗濁小腹痞堅小便或澀或自汗出或復惡寒膿為已成設脈遲緊則為瘀血血下即安陳遠公曰有腹疼口渴左足不伸伸則疼甚手按之猶不可忍人以為腸中生癰也然腸癰有大小腸之分屈右足者大腸生癰也屈左足者小腸生癰也今屈左足是小腸生癰矣但大腸癰易治小腸癰難醫以大腸可瀉小腸難瀉也然得法又何不可瀉哉蓋大腸瀉火從糟粕而出小腸瀉火從溲溺而泄也泄毒至神湯銀花三兩茯苓薏苡各一兩甘草車前子劉寄奴澤瀉各三錢肉桂一分水煎服一劑水如注二劑疼大減三劑全愈此方俱利水之味只金銀花消毒何神奇至此蓋小腸之毒必須內消內消之藥舍金銀花無他味可代以他味消毒皆損正氣而小腸決不可傷故以金銀花為君也但此物不能入小腸今同茯苡車澤之類引入小腸又少加肉桂引入膀胱從溲溺而化又恐火毒太旺各藥不能迅逐加入寄奴之速祛甘草之緩調既無留滯之患又無峻烈之害火毒自從膀胱小腸出也冰鑑又曰人有腹痛呼號卻在左腹按之疼不可忍人以為食積在大腸也誰知小腸生癰乎凡腸癰必屈足而今足不屈似非腸癰然癰生腸內者必屈其足在大腸內者屈右足而不伸在小腸內者屈左足而不伸若癰生腸外皆不屈足疼在左則小腸生癰疼在右則大腸生癰也至食積燥屎之痛時疼時止生癰之痛乃定而不移痛而不止也故疼在左乃小腸之外生癰也癰生二腸之內尚可破潰生於腸外不可使潰以腸外無可出之路皆死證也而小腸尤甚必早治之內化丹金銀花四兩車前子五錢白茯苓薏仁各一兩生甘草三錢水煎服三劑疼止四劑全愈此即前方之變也前方利水之中行其敗毒之法此方入當歸二兩利水之中補血敗毒之法也蓋癰破利水而毒隨水出易於祛除癰未破不補血以利水則水泄而血虛難於消化同中之異不可不知總宜早治否則癰雖愈而瘀血流於腸外必有終身腹痛之病也慎之又曰有腹疼驟甚小便流血左足不能伸人以為小腸癰也誰知小腸火盛乎夫小腸生癰必屈左足今足不伸明是生癰而曰火盛者何故不知生癰必有其徵未有一旦驟生而即流血者也癰日久而生膿膿欲盡而血出豈有不潰而先出血者然今足不伸何也蓋小腸與大腸不同小腸細而大腸寬寬者可以容邪細者難以容邪必然之理也小腸受火煎熬腸中逼迫腸不能舒而左足暫屈不若生癰者長屈而不伸也勿以足不伸即信是癰妄行解毒然何以辨之初病之時辨其小便中有血無血耳初痛而足屈小便無血乃是生癰初痛而足屈小便有血乃是火痛不可差也治法瀉其火邪不必化毒而痛止足伸矣小柴胡湯加味以治之柴胡半夏甘草各一錢人參二錢茯苓五錢黃芩三錢水煎服一劑足伸二劑血痛俱止按小柴胡湯非治小腸之方也何從應效如此之捷夫小腸火盛者起於肝膽之郁也木鬱則火生不敢犯心而犯小腸耳夫火性炎上今反下熾拂火之性矣所以小腸受而作痛也小便流血者乃小腸之血為火所逼血恐為火灼干越出小腸之外直走膀胱反使水道不行而流血也小柴胡舒肝之氣則火氣上炎其性既順又得茯苓清滲水氣水流而血自歸經此方之所以奇耳腸癰門主方救腸敗毒至聖丹岐天師金銀花八兩煎汁二碗當歸三兩地榆一兩薏苡仁五錢水十五碗煎二碗分作二服上午一服臨睡一服二劑愈初起宜服牡丹皮散千金牡丹皮五錢栝蔞仁去油三錢桃仁去皮尖研二十粒薏苡仁一兩白水煎服按金匱要略云牡丹皮散用冬瓜子仁非栝蔞仁蓋冬瓜子仁主解毒護膜厚腸生肌之功活腸散毒丹華真君治已成內必出毒用以助其潰膿當歸金銀花各二兩生甘草三錢地榆牛膝各一兩水煎取汁一碗調乳香沒藥末各一錢五分飲之渣水再煎一碗又調乳香沒藥末各一錢五分飲之大約早服頭煎晚服二煎二劑全好芭蕉散孫欽武芭蕉根切片焙乾為末將豬胰子煮爛蘸藥末食之二三次即愈腸內生癰千金瓜子三升搗碎以水三大碗煎至一大碗分三次服小腸癰濟生當歸尾白芥子炒研末尖檳榔小者栝蔞打碎蘇木各一錢枳殼紅花各八分薏苡仁炒二錢桃仁去皮尖打碎二錢白芍藥一錢五分水二盅煎一盅先將黑白牽牛頭末各等分以生蜜為丸虛人二錢實人三錢以煎湯送下腸癰祕方凡小腸堅硬如掌而熱按之則痛肉色如故或焮赤微腫小便頻數汗出憎寒脈緊實而有力服此神效大黃炒朴硝各一錢桃仁牡丹皮白芥子各二錢空心煎服肚癰大小腸癰冬瓜癰抄本白芷緑豆大黃各二錢乳香沒藥各一錢番木鱉二枚去毛當歸尾一錢五分研末每服二錢酒調服以平為度肚癰腸癰神效奇方木瓜白芷獨活甘草節連翹金銀花蒼朮各一錢川貝母牛膝生地各二錢當歸五錢好酒二碗煎一碗空心服至重者四五服必效忌發風動氣之物煎時忌見婦人雞犬並治一切無名腫毒一劑見效腸癰胃癰肺癰腹癰神方胡石臣黃耆酒炒黃芩各三錢連翹白芷各一錢穿山甲炙二錢露蜂房陳醋浸數次三個蜈蚣酒浸炙二十條上為細末用水或米粥疊丸如緑豆大曬乾收貯又用生大黃為末水疊丸如緑豆大曬乾另貯如有前證年壯者兩宗丸藥各三錢或酒或開水送下虛弱人前丸用三錢大黃丸或二錢或一錢五分服之其毒氣膿血皆從大腸而出矣亦有從口內出者腸癰祕方張景嶽凡腸癰生於小肚角微腫而小腹隱痛不止者是若毒氣不散漸大內攻而潰則成大患急宜以此藥治之先用紅藤一兩許以好酒二碗煎一碗午前一服醉臥之午後用紫花地丁一兩許亦如前煎服服後痛必漸止為效然後服後末藥除根大黃瓦龍蟬蛻殭蠶各二錢石蠟蚆此草藥也當歸各五錢老蜘蛛二個提放新瓦上以酒盅蓋定外用炭火煅干存性上為末每空心用酒調服一錢許日逐漸服自消三焦疽門主論經曰丹田隱隱痛者三焦疽其上肉微起者三焦癰王肯堂曰三焦癰石門穴又名三焦募在臍下二寸必隱痛微腫令人寒熱往來二便祕澀由濕熱遇寒凝結而成治法與大小腸癰同痞積癥瘕門主論書云積聚大小一轍但人大氣壯無積人小氣弱積多故積論偏重啞科夫不言痢瀉疳三者而僅言積治未病之源也更不言六聚而先言五積從其難者而言之也聚與積總因食物不化陰血凝聚源同而名異經曰積者五臟所生聚者六腑所成氣之所積名曰積氣之所聚名曰聚聚者陽氣也故陽浮而動其氣運轉不定遇滯即止發無本根痛無常處氣旺漸消不治自己積者陰氣也故陰沉而伏蓄積一處而不行發有常處其痛不離其部陰屬裡治之為難積有常所有形之血也聚無定部無形之氣也積塊者痰與食積死血也凡面黃浮腫腹脹虛鳴小便如油毛髮焦黃下痢赤白目珠黃赤遍體虛腫當腹倍熱遇食肚疼昏困多睡者皆是積候宜急治之若至面白喘急或面黑眼直乾嘔不食瀉住又瀉腹急如鼓項軟口噤手足俱細者併為不治然有五臟為積之名癥瘕痞癖四證之別食乳氣三積之分虛實驚諸積之異先舉五臟之積而詳之肝之積名曰肥氣在左脅下形如覆杯有頭有足如龜鱉狀心之積名曰伏梁起於臍上大如手臂上至心下脾之積名曰痞氣在於胃脘覆大如盤肺之積名曰息賁在右脅下覆如大杯腎之積名曰奔豚發於少腹上至心下如豚奔走之狀或上或下亦無定時此五積之候也癥者按之應手亦如五積之不移瘕者假物成形如魚鱉石瘕之類痃者皮厚也在肌肉之門而可見者也癖者僻也內結於隱僻外不可見也乳積者吐瀉兼作氣息酸臭因乳哺失調所致也食積者腹堅熱渴或瀉或嘔腸鳴腹痛因飲食過餐而得也氣積者腹痛啼叫痢如蟹渤因物觸忤兒或食母氣乳而得也虛積者乳食不化一身浮腫虛中受積也實積者肚熱糞硬身熱而渴嗜食善飢實熱蘊積也驚積者因驚時與食口穢而黃當腹疼痛也治之之法寒者溫之熱者清之實者行之虛者調之驚者和之治積惟有挨積磨積消積化積而無迅下之理丹溪曰凡積不可用下藥徒損真氣病亦不去況積之成也正氣不足而後邪氣踞之如小人在朝由君子之衰也正氣與邪勢不兩立一勝則一負邪氣日昌正氣日削不攻去之危亡從及然攻之太急正氣轉傷初中末之三法不可不明也初者病邪初起正氣尚強邪氣尚淺則任受攻中者受病漸久邪氣較深正氣較弱任受且攻且補末者病魔經久邪氣侵凌正氣消殘則任受補蓋積之為義匪朝伊夕所以去之亦當有漸攻之愈亟則傷正氣正傷則不能運化而邪愈固矣更宜審明何經受病受傷何物從其因以治之昔張子和動輒言下下之當也仲景三承氣湯審之詳密可下不可下急下何積何藥分毫不爽寒積巴豆感應丸熱積大黃承氣湯血積桃仁紅花下水牽牛甘遂水中之血虻蟲水蛭蟲積檳榔雷丸今人畏而不敢下者不明之罪無忌而妄用者殺人之罪消虛者當扶助正氣消息推蕩之慎勿孟浪戕人天年五積當從郁論難經所謂因受勝己之邪傳於己之所勝適當旺時拒而不受因留為積此皆抑鬱不伸而受其邪故五積六聚治同郁斷伏梁者心之郁肥氣者木之郁痞氣者土之郁息賁者金之郁奔豚者水之郁郁者氣不舒而抑鬱成積不獨聚可以氣言也故治積之法以理氣為先則津液流行積聚何由而成然更不可不兼以補也蓋壯者氣行則已怯者著而成病故積之為積本於氣虛血弱之人故曰壯人無積虛則有之善治積者不必問其何經何臟必先調其中氣使能飲食氣血即旺積滯自消即壯實而宜消者亦當以補血補氣之藥兼服經曰大積大聚其可犯也衰其半而已故消積及半純與甘溫調養使脾血健運則余積不攻自退所謂養正則邪自除猶滿座皆君子則一二小人自無容身之地若欲積盡而後止胃氣之存也無幾矣積聚痞塊之證皆內為喜怒憂思悲恐驚七情所致若以五臟傳克成積不亦求之太過乎蓋氣血榮衛一身上下周流無時少息一旦七情感動五志之火火性炎上有升無降以致氣液水穀不能順序稽留為積也必矣丹溪曰氣不能成塊成聚夫塊乃有形之物乃痰與食積死血而成凡在中為痰飲在右為食積在左為血塊何以明之夫左關肝膽之位藏血液右關脾胃之位藏飲食所以左邊有積則為血塊右邊有積則為食積而其中間則為水穀出入之道路五志之火熏蒸水穀而為痰飲所以中間有積則為痰飲也治法因所因從其類以治之大抵積之初多屬寒而積之久則為熱矣宜知新久之異以分辛溫辛平辛涼三者之宜然人之積塊疝氣心腹等痛本多屬熱而方中又多用桂附熱藥卻又不發藥毒者蓋因諸積諸痛喜溫而惡寒熱藥與病情相和況積久成鬱而火邪深矣若見寒愈逆見熱愈喜兩熱相從是即所謂亢則害承乃制從治法也世人見其投熱不為熱誤遂以是寒為屬沉寒痼冷恣投熱劑以致真氣被蝕陰血乾枯不可為矣抑嘗論之醫為病所困者惟陰虛之難補久積之難除故玉山自倒陰虛之謂也養虎遺患久積之謂也人之罹此二者須節欲以養性內觀以養神淡泊自如從容自得然後委之於醫方能為爾保也癥者是因飲食得之痛刺脅肋心胸煩悶飲食不下吐逆噁心日久不治漸成癥結又曰食結其證屬陰陰主靜故癥定於一處而不移瘕者是因傷血得之其狀胸膈煩悶痛引少腹時或攻築上搶心胸雖不阻食漸成瘕結又曰血結然此與癥總因榮衛俱虛風寒襲於外飲食滯於中久而不化則邪並於陰而為癥邪並於陽則為瘕瘕者假物象形動而不息去來無常或兩脅間有塊如石按之則痛不按則輕久而不已面黃肌瘦肚硬而脹腹現青筋晝涼夜熱食減飧泥成為疳積治宜調脾養胃磨積消疳非一日一夕可愈也痞者是因傷氣得之其候心腹膨脹肚大脅滿痛刺往來住在左肋面黃肌瘦倦怠無力久而不治漸成痞塊痞者寒也結者實也凡熱氣蘊於胸膈之間停飲聚於腹脅之內於是榮衛不得流行腑臟不得宣通而乃成結也不可迅下否則邪反堅結經所謂著而不去其病為實矣惟宜安胃理脾佐以順氣化滯若胸中氣不通泰而如痞者乃正氣不運所致不可作有形攻治蓋胸為受氣之所虛則受而不能行實非物也故曰痞者否也癖者是因積得之其證如腸癖之疾便利無度似痢非痢似蟲非蟲或下鮮血肚腹干痛心胸滿悶久久不治則頑結不散有類痞狀蓋由乳哺失調停滯為積久則血膜並聚脅旁結癖時時作痛或發潮熱又有食癖乳癖疳癖驚癖虛癖痰癖之分其傷氣血一也若至面色紫黑肚脹如鼓湊心刺痛忽瀉鮮血唇舌皆黑乾嘔氣促皮焦斑紫吐瀉出蟲腸鳴自利體虛發搐面青流涎手足心腫面黑瀉黑者並皆不治錢仲陽曰癖塊者僻於兩脅痞結者居於中脘此因乳哺失調飲食停滯邪氣相搏而成醫者多用克伐脾胃必虛久而不愈必先以固胃氣為主使養正則結自除若欲直攻其結不但不消抑亦損其脾土脾土虧損必變證百出矣宜朝服補中益氣湯夕服千金消癖丸間服治之獲效多矣幼科痞塊論酒積輕者葛根神麯黃連白豆蔻甚者甘遂牽牛氣積輕者木香枳殼厚朴橘紅甚者枳實牽牛蟹積紫蘇痰積輕者半夏栝蔞甚者滾痰丸老痰海石瓦楞子皮裡膜外芥子水積輕者五苓散甚者商陸甘遂芫花茶積輕者薑黃芝麻甚者茱萸椒薑谷積輕者麥芽神麯砂仁甚者雞內金肉積輕者山楂阿魏甚者硇砂硝石蛋積白豆蔻橘紅豆豉薑汁魚鱉積紫蘇橘紅木香薑汁白馬尿專治鱉瘕蟲積雄黃錫灰檳榔雷丸蕪荑棐子使君子川楝子狗肉積杏仁山楂血積輕者乾漆桃仁丹皮歸尾赤芍紅花甚者大黃虻蟲水蛭穿山甲花蕊石果積丁香肉桂麝香麥積蘿蔔子薑酒煎痞積癥瘕門主方化痞膏生大黃一兩半夏荊三稜蘇木穿山甲陳皮當歸尾全蠍番木鱉紅花陳枳殼厚朴蓬莪朮血餘大貝母川烏天南星香附赤芍藥草烏堅檳榔各三錢蜈蚣十條巴豆仁五十粒大鱉一個切四塊桃枝楊枝桑枝槐枝各十寸蔥十根水紅花子五錢白鳳仙根五根用麻油三斤同煎藥枯去渣再入東丹二十四兩收之成膏取起冷定篩入後藥攪勻阿魏蘇合油各五錢血竭真沒藥去油肉桂孩兒茶潮腦滴乳香去油虎骨煅青黛各三錢冰片麝香乾漆各二錢皮硝一兩瓦楞子煅三錢共乳極細末篩入膏內攪勻攤貼淨府湯治小兒一切癖塊發熱口乾等證柴胡山楂肉豬苓白茯苓澤瀉莪朮醋炒三稜醋炒各一錢黃芩白朮去蘆半夏薑汁炒人參各八分胡黃連甘草各三分薑棗為引煎服千金消癖丸蘆薈陳皮去白厚朴薑汁炒青黛廣木香檳榔各一錢麥芽炒神麯水紅花子各四錢使君子去殼胡黃連香附水浸莪朮醋炒三稜醋炒山楂肉白茯苓白朮去蘆人參去蘆甘草炙各一錢上為末將阿魏一錢水和麵打糊為丸緑豆大每服五十丸米飲下克堅膏回春專治小兒癖塊發熱羸瘦者木鱉子川烏穿山甲甘遂當歸甘草各八錢真香油一斤入藥熬成黑色濾去渣再慢火熬次下黃丹八兩熬至滴水成珠離火加硇砂三錢麝香一錢水紅花子皮硝硼砂阿魏蘆薈各五錢為末入內攪勻攤貼先用皮硝水洗皮膚方貼癖處二三日後覺肚內作痛四五日發癢糞後有膿血之物是其驗也抓癖膏李滄溪桃仁四兩白蠟四錢生豬腦子血餘香油桐油上俱下鍋內文武火熬至腦子盡濾去渣次下黃丹十四兩熬成膏待再溫下胡黃連白芷紅花蘇木三稜莪朮各三錢當歸尾硇砂各五錢麝香一錢五分各為細末入前膏內攪勻收貯勿令泄氣有塊先用皮硝煎洗癖處次用薑擦方用絹帛攤貼後用鞋底炙熱尉之五七十遍覺內熱方可癖即消縮如神消癖驗方懷德堂祕録每一歲用鱉甲一個醋炙全蠍三隻去頭足新瓦上焙乾用雄黃二分研細末用芝麻一撮略炒白糖霜拌五更時送下十歲服十服二十歲服二十服即愈又方抄本全蠍三個去頭足土鱉蟲二個去足大桑蟲二個同焙乾用干芝麻一撮銅杓內炒燥為末用上好建糖調五更服酒漿送下癥瘕痞塊無見和尚阿魏全蠍各二錢金頭蜈蚣全用一條大黃酒炒一兩皮硝三兩大人用五分小兒用三分裝入雞蛋內飯上蒸熟火酒送下每晚吃一個七晚吃七個不過十日半月改換顏色化痞膏劉長隨當歸尾紅花金銀花三稜白芥子莪朮葫蘆巴昆布生地黃桃仁亂頭髮大黃熟地黃鱉甲穿山甲各一兩海藻兩頭尖阿魏萆麻子川烏巴豆仁黃連天南星漏蘆大貝母半夏川萆薢大戟胡黃連甘遂鳳仙子芫花海浮石阿膠威靈仙檳榔直殭蠶全蠍瓜兒竭乳香去油粉甘草金線重樓沒藥去油各三錢土木鱉番木鱉獨蒜各三十個蜈蚣三十條水紅花子四兩鮮商陸八兩活鯽魚一個重半斤麻油三斤黃丹飛曬炒一斤半麝香一錢上藥除乳沒竭麝阿魏五味另研收貯臨攤摻膏藥上群藥同油熬膏法修合化痞丸劉長隨莪朮醋炒海浮石煅瓦楞子煅乾漆大茴香山楂穿山甲丁香五靈脂白芷陳皮玄胡索廣木香牡丹皮青皮枳殼桔梗胡椒神麯蒲黃香附桃仁紅花川芎當歸厚朴砂仁鱉甲醋炒朴硝各三錢阿魏五錢小茴香赤芍藥使君子淨肉桂皮鐵花粉各四兩水紅花子四兩上為末皂莢煎湯疊丸桐子大每服三十丸壯實人可加至四五十丸日三服俱酒下一料可治二人敷羸瘦不堪之痞塊不能用克伐藥者硃砂銀硃飛丹明雄阿魏各三錢硇砂一錢鴿糞炒五錢麝香五分皮硝明淨者研細一斤共研勻用豬尿胞一個留小口做一漏斗插口內將藥末徐徐裝入再用火酒一斤燉熱泡入胞內將尿胞頭折轉扎緊預將患處用皮硝四兩白酒一斤煎數滾洗患處再將尿胞扎上用布裹緊三日解去又換一個大建奇功屢驗阿魏保生膏專治痞塊積聚凡年高之人諸病不能服藥者但將此膏貼心口上即開胃進食功難盡述先用真麻油二十兩浸榆桑桃柳槐各二十一段熬枯再下萆麻仁巴豆各一百二十粒大風子淨肉土木鱉番木鱉各五十個穿山甲炙二十片白附子當歸白芷各五錢大黃二兩甘草三錢核桃肉一斤熬枯濾去渣復入淨鍋內熬至滴水成珠下飛淨血丹八兩成膏再下乳香去油沒藥去油兒茶血竭阿魏各五錢冰片一錢麝香三錢水紅花熬膏四兩攪勻老嫩得宜收貯勿泄氣每用狗皮攤貼諸證如神痞塊德宗和尚治黃總兵人參白朮阿魏石斛萊蔔子各五錢水紅花子一兩胡黃連蘆薈柴胡枳實臭蕪荑川芎各三錢川黃連使君子淨肉青黛青皮木香夜明砂龍膽草各三錢五分蛤蟆皮炒二張沉香二錢五分三稜醋拌炒莪朮醋拌炒檳榔蒼朮各五錢五分陳皮三錢五分麥芽五錢同巴豆肉三錢炒去巴豆不用共為細末用犍豬肝煮爛搗丸如桐子大每服三錢米湯送下化痞膏徐聲士活腳魚五斤莧菜十斤同入壇內蓋好俟腳魚莧菜化成臭水傾入淨鍋內加麻油五斤穿山甲四兩熬枯濾清復入淨鍋內熬至滴水成珠入密陀僧細末收之老嫩得宜收貯用紅布或緞攤貼賽金丹胡寧憲巴豆霜麝香各五分五靈脂去砂土淨廣木香各一兩生川烏重五六錢的一個母丁香二錢上研細末用大黑棗三十枚去皮核微曬搗膏和藥丸如指頂大每日臥睡時松蘿茶送下一丸服至四十日不可間斷輕者無影無形重者仍有微影自可除根不發每次日早膳勿食油膩午飯不忌唯麵食黏滯之物俱宜少進痞塊駱潛庵大荸薺一百個古錢二十個花頭海蜇一片炒皮硝四兩燒酒三斤共一處浸七日後每日早上吃荸薺四個逐加至十個止即消大紅丸治血塊血蟲一切大人小兒積痞真血竭乳香各一兩辰州箭頭硃砂五錢巴豆四錢研極細末初研散開研至自潤成塊瓷盒盛之看人大小虛實小兒麻子大三粒大人豆子大三粒俱溫水送下行熱水作痛倘積重多年者先用使君子生熟各三個上午食之下午方服前藥前晚不可夜飯置淨桶看藥與積俱下否如藥未出積亦未出將溫酒一杯催之七轉靈應丹治新舊諸積諸氣婦人血瘕小兒疳積一切心痛諸般蟲積白蕪荑五錢取末四錢牽牛五兩取頭末三兩檳榔五兩取淨末三兩大黃五兩取淨末三兩木香五錢取淨末三錢雷丸四兩取淨末三兩錫灰一兩取煨淨末三錢共取各淨末一處拌勻蔥白一斤煮沸湯露一宿為丸如黍米大每服三四錢老年幼弱減半俱用蔥白湯露一宿早晨空心冷下取出病根如欲大便須在內房不可見風日晚用溫粥補之忌生冷硬物葷腥一月後用四君加減補助胃氣一方有使君子一兩鶴蝨五錢一方治酒積面黃黑色腹脹不消甘遂一錢為末以豬槽頭肉一兩切細搗爛和末作一丸紙裹火煨令香熟取出臨臥細嚼酒咽取出病根消積丸廣皮三稜莪朮檳榔青皮枳實蘿蔔子麥芽草豆蔻各一兩厚朴山楂各一兩五錢神麯二兩廣木香七錢為末黑砂糖丸重一錢空心白湯調服清塊丸即千金方硝石大黃丸須度虛實用硝石六兩人參甘草各三兩大黃八兩為末以三年米醋三升置瓷器中火煎先納大黃不住手攪使微沸一刻乃下余藥又一刻微火熬攪可丸則取丸之如雞子中黃大每一丸米飲下服後當下如爛肉或米泔赤黑等色下後避風冷啖軟粥將息之男子痞塊婦人血塊極妙藥性不猛而效速阿魏一兩生漆濾去渣淨木耳為末各四兩黃蜜六兩錫罐一個盛藥封固放鍋內水煮三炷香取起冷定每服二茶匙燒酒送下日進三服忌油膩發氣物治血塊丸丹溪曰瓦櫳子能消血塊海粉醋煮三稜莪朮醋煮紅花五靈脂香附各等分石鹼減半共為丸白朮湯吞下三十丸脅間生毒如鱉形以鮮蝦羹食之即不痛者乃真鱉瘕白馬尿治之甚妙喜食香油者乃誤吞人發入胃血裹化為蟲雄黃五錢水煎服肥兒丸小兒脾疳痞積黃瘦肚大口臭飧泥消蟲進食神麯炒胡黃連麥芽炒各五錢檳榔去臍一個廣木香一錢使君子去殼肉豆蔻麵裹煨去油各二錢五分為末蒸餅丸黍米大米飲服三聖膏石灰十兩篩過極細炒紅好醋熬成膏入大黃末一兩官桂末五錢攪勻瓦器封貯紙攤烘暖貼患處
