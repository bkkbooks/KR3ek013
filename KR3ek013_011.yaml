各四十粒研共入壇內用燒滾河水井水各五斤衝入藥內重湯煮大半炷香將壇半段埋在土內蓋好每次用藥水一酒杯以軟絹蘸洗一日即愈火眼北細辛川牛膝龍膽草當歸尾各二錢作一劑白水煎服即愈洗時眼方千上山梔子十四個桑白皮二錢八分明礬七分黑棗七個河水一碗煎半碗洗之治風痰偏頭痛攻於眼目視物不明痛不可忍者陳膽星明天麻濕草紙包煨製半夏川貝母川羌活防風黃柏厚朴北細辛知母元參前胡痛甚加蔓荊子白水煎十劑見效三十劑全愈永忌豬肉要緊洗風熱眼痛癢並天行害眼及風淚赤眼皮硝六錢新汲涼水一甌煎七分入瓷器內入陰涼地上出毒候冷洗眼日三五次將目漸開少滲硝水入目用中指擦五遍眼紅瞳子內癢甚加明礬一二錢同泡效尤速風熱赤眼冬青子不拘多少搗汁熬膏淨瓶收固埋地中七日每日點眼又方自己小便除去兩頭者抹洗敷火眼痛眼風熱眼天南星赤小豆各等分研細生薑汁調敷太陽穴火眼紅腫如桃白川芎五錢川黃連鵝不食草陰乾各一兩共研細末瓷瓶密貯口中預含冷水取藥少許吹入鼻竅後待口中水熱吐出即消眼胞腫大痛不可忍母生薑連皮搗取淨汁枯白礬三錢調成膏塗眼胞上勿令入目立消一切風赤眼眼皮瘙癢赤爛久治不效臘月豬肉五錢先熬化漸入白蜜少許加入白臘三錢熔化入研細輕粉一錢冷定不時搽赤皮上洗風毒赤眼翳膜黃連赤芍藥當歸尾各等分煎水乘熱洗之日三五次風淚眼每出則淚流盈頰穀精草為君甘枸杞白蒺藜為佐共磨細末羊肝蒸熟搗和為丸不終劑而愈風淚不止蘆甘石煅研水飛一錢海螵蛸五分冰片少許共乳細點大眼眥角淚即收爛弦風眼冷淚癢澀有蟲母生薑一塊以銀簪插入即拔出點眼眥角洗眼大紅棗七八枚去核每個人皂礬少許於內縛住用陳米升半煮飯將棗放飯上蒸之約一時許棗熟收藏聽用每次用滾湯大半盅取棗一枚入湯泡化先閉眼用物指蘸抹五六回後開眼洗抹二十回一棗水可留洗五六日頓溫洗每日五六次但洗時稍痛卻有奇功風火眼白芷桑白皮銅緑各四兩皂礬八兩紅棗去皮核生的四兩煮熟的六兩搗膏上研細同棗膏和丸如龍眼核大每用一丸開水泡洗洗眼錢竹舲赤眼紅腫或疼或癢當歸一錢二分白芍八分杏仁或用蕤仁黃連各六分銅青三分共入鍋內煎一二滾入人乳一酒杯乘熱洗火眼川芎二錢豬牙皂二錢青黛一錢共乳極細末左眼患吹左鼻孔右眼吹右鼻孔兩眼吹兩鼻孔廣大重明湯洗眼癢防風北細辛甘草龍膽草菊花各等分水煎乘熱洗洗肝湯暴赤眼腫痛服一二劑後服清火藥當歸赤芍羌活生地防風各一錢川芎白芷各八分生大黃二錢薄荷七分水煎服産婦月內眼痛黃連研末水調搓足心或薑汁調白礬末搽足心或天南星四錢生大黃六錢研細以醋調稠左眼痛塗右足心右眼痛塗左足心以口中有藥味效洗風火時眼明礬銅緑各三錢研細用白果肉烏梅肉杏仁各三十個研爛和丸如芡實大用紗袋包裹線扎投滾水內泡出緑水青布洗眼眼藥蘆甘石傾銀罐內煅紅淬入童便內七次三錢白硼砂海螵蛸河水煮七次內外極淡為度各二錢冰片二分龍膽草二兩水洗淨入磁壺內水五盅煮至二盅濾過再熬成膏用膏調勻搓如線香樣外以宮粉為衣貯於鵝毛管內用時以骨簪蘸點碧玉丹治一切火眼並痘風赤爛弦風拳毛倒睫淚澀難開黃連杏仁霜秦皮蘇薄荷各一兩銅青三錢明礬一錢五分川椒五分官粉一錢共研細末用烏梅肉五錢入井水少許浸爛加白果肉三兩同搗如泥和前藥末為丸龍眼核大每用一丸入涼水五六匙浸化任點洗箍眼藥治遠年近日諸般赤腫眼疾火眼官粉四兩銅青五錢白靈藥四錢麝香冰片各三分共研極細用黃柏歸尾各四兩水七碗煎至半碗去渣入廣膠三錢化開入前藥做長條陰乾用清水磨塗上下四圍三次待乾洗去蕤仁膏張仁寰治赤腫火眼爛弦風眼並疼痛不忍一切等證蕤仁去殼去皮去油取淨霜一兩六錢硃砂硼砂黃丹各二錢麝香冰片各七分共研細用上好本地蜜入鍋內熬一滾去沫候溫入藥於乳鉢內共研成膏注瓷罐內任用火睛疼痛錢仲林生地黃不拘多少切薄片入火硝少許同白酒搗爛如泥丸如蛋大敷腦後枕骨風池處將帶子扎好片時即止爛弦風眼門主論祕笈云此證皆因脾胃壅熱兼受風濕更加勞役辛苦犯色衝風日積月纍外受風邪內伏積熱胞瞼之內變成風粟故上下眼弦潰爛赤痛淚出羞明用手拂拭不離無分四季宜勝風散加殭蠶蟬蛻或消風散川芎羌活防風陳皮甘草厚朴藿香荊芥殭蠶蟬蛻白茯苓先以碧玉丹洗之以琥珀散點之始可愈也爛弦風眼門主方驗方淨皮硝當歸杏仁銅青川黃連各六分上為末井水小半杯浸隔紙洗爛弦風眼一婦患此用覆盆子葉旋採以手揉軟入口中咀嚼而留汁聚於小竹筒內外用舊皂紗蒙在患人眼上用筆畫雙眸於紗上然後將藥汁滴漬眼下弦轉盼間蟲出紗外有蟲數十條狀如絲色赤而長復用前法滴上弦又出蟲數十條兼服清熱消風活血之劑而愈爛弦赤眼痘風火眼百發百中井水河水各半壇皂礬八兩銅青二兩埋地中用時取水洗之日久者尤效爛弦風及痘風眼杏仁三粒去皮尖研爛加銅緑黃豆大一塊為末和勻用新青生絹包此二味井水一酒杯浸片時待水中有緑色不時洗眼一日數次數日後即好風赤倒睫爛弦眼五倍子不拘多少為末蜜水調敷紅眼邊蛔蟲洗淨放磁盤內竹刀劈開取蛔蟲腹內水點眼邊又方鳳仙花洗淨晾乾搗爛臨臥敷眼胞上下不過數次即愈洗方蘆甘石川黃連各五分銅緑三分共槌碎清水泡露一宿頻洗三日愈爛弦迎風流淚川黃連明礬赤芍銅緑防風當歸各五分煎湯洗痘風爛弦流淚頭胎男子頭一次臍屎搽弦上又方防風山梔皮硝枯礬銅緑各五分用蠶繭五枚入藥在內仍用線縫好以井水大半碗浸之俟水現黃緑色將碗重湯燉熱洗三五次永不發又方鉛粉二錢銅緑一錢水調濃塗碗內外用碗一個盛艾團燒著以有藥之碗蓋上俟艾煙燒盡將藥刮下每服新汲水調濃臨臥時以新筆蘸塗弦上即愈治殘風爛眼膏愈陳久愈效皮硝潮腦蘇薄荷葉不研明礬各三錢將薄荷疊數層於碗內前細末鋪上以小碗蓋之用麵糊口將碗置炭火上升一炷香放地上冷透開看將碗內升藥刮下如前再升再刮以黃色不用為度加麝香冰片數釐蜜調成膏點或將此膏加蘆甘石少許以人乳浸黃連取汁調點亦妙拳毛倒睫門主論李東垣曰倒睫拳毛由皮鬆弦緊故拳毛倒入內刺睛珠砂澀難開眼胞赤爛癢而兼痛乃脾經積熱肝風合邪上壅所致祕笈云此證皆脾肺虧弱又受心與小腸二經火克肺屬金主一身之皮毛目之上下睫之外亦其屬也小腸屬火與心相為表裡分上下而目之睫亦其屬也陽火內盛致使上下眼皮內急外弛時常赤腫難開其睫毛皆倒向里睛珠受刺漸生翳膜羞明砂澀生眵流淚初服無比蔓荊子湯人參黃耆當歸黃連柴胡乾葛蔓荊子防風細辛黃耆防風丸人參黃耆防風乾葛細辛甘草蔓荊子煉蜜丸空心白湯送下點八寶散琥珀散兼碧玉丹洗之如久病不能去用灰膏點去拳毛後退翳膜但此膏極猛點必得法方妙若誤著睛珠必致傷損不可輕施慎之拳毛倒睫門主方驗方生木鱉子一個去殼研末絲綿裹好左眼塞右鼻孔右眼塞左鼻孔兩夜其毛自分上下又方袖珍石斛川芎各等分研末口中噙水隨左右眼吹鼻中日二次祕方捉大蝨子擠血點之即愈倒睫拳毛無名異研末捲紙作捻油潤點燈吹滅以煙薰之睫毛自起又方鱉膽塗之眼毛自順雀目眼門主論祕笈曰此證皆因腎水虧弱肝血不足乃憂思恐怒勞役飢飽過而不節皆傷脾胃脾胃受傷則陽氣下陷五臟不能相生陽衰不能抗陰故夜有燈月亦不能見也夫晝為陽夜為陰陽主氣而陰主血經曰目得血而能視今夜間血分當旺之時而反不能視何也難經曰血為榮氣為衛榮行脈中衛行脈外蓋言氣血相調無偏勝之理以偏為病今遇夜之陰氣盛陽氣衰則血雖旺而氣不足故陽氣不能上升而陰氣亦不能獨榮於目矣初起頭旋常見五色不定目中困倦時暗時明宜服沖和養胃湯四物補肝散後服豬肝散石斛夜光丸又曰高風內障此證皆因臟腑熱極氣血兩虧肝腎虛勞致使日夜不能見物先因肝虛雀目久則不睹三光謂之青盲不治之證也雀目眼門主方煮肝方石決明一個煅研蒼朮焙研一錢豬肝一斤和藥末炒熟伏鍋上先熏眼然後食肝連服三次自效又方石決明一個火煅研細黃蠟二兩熔化為丸用驢肝一葉或豬羊肝竹刀刮開將丸納肝內以線扎緊煮熟露一宿清晨燉熱食之大人小兒雀目石決明煅夜明砂洗各二錢研細用犍豬肝一兩羊肝更好竹刀剖開入藥線縛入砂鍋內米泔水煮熟臨臥時肝汁並服四物補肝湯當歸夏枯草各一錢熟地白芍香附各八分川芎七錢甘草三分白水煎食遠服豬肝散犍豬肝尖七個蒼朮三錢米泔水浸清晨至晚入罐內煮至水乾為度露一宿空心服三四次即愈熱錫爆竹湯火傷目門主方祕方治爆竹熱錫湯火傷目珠痛不可忍蘆甘石煅一錢冰片三分研細點上立刻止痛風絲入目門主論祕笈云凡因偶被飛絲沙塵入眼黏貼不出眼皮疼痛沙澀難開以致心躁火動重手揉擦遂令紅腫疼痛流淚羞明治法急磨金墨塗於眼內閉少刻翻轉眼皮以骨簪撥去塵灰風絲即愈若不諳此法日久加之七情鬱結愈增火矣若患胞瞼瘀血凝積磨擦烏珠漸生翳膜先服車前散人參桔梗元參茯苓細辛赤芍五味子大黃車前子勝風湯點琥珀散可鐮洗去瘀血風絲入目門主方驗方木梳垢為小丸放眼角邊其絲即出又方石菖蒲槌碎左目塞右鼻右目塞左鼻百發百中又方鮮薑汁少許點眼內飛絲自隨淚滾出腫即消又方桑樹漿點之即出又方新筆潤開眼內攪之即出沙塵入目門主方驗法凡沙塵入目但閉目連吐唾噦幾口自出又法徐氏抄録取活蜣螂一枚持其斧於眼上影之即出諸物入目淨水磨金墨以箸頭點入目中即出煙渣入目門主方驗方抄本凡小兒好吃煙者誤犯如將別湯洗目愈洗愈疼必至眼瞎而後止須將亂頭髮或綜纓緩揉之即愈麥芒入目門主方驗方大麥煎湯洗之即出目部望色辨證法目赤唇焦舌黑者屬陽毒目里黃色暗者屬濕毒目黃兼小便利大便黑小腹滿痛屬蓄血目瞑者將欲衄血目白睛黃不渴脈沉細者屬陰毒兩眥黃者病欲愈開目見人者屬陽閉目不欲見人者屬陰睛昏不識人目反上視睛小瞪目直視目邪視目睛正圓戴眼反折眼胞陷下此八證皆死目睛微定暫時稍轉動者屬痰目中不了了睛不和不明白者此因邪熱結實在內不了了者謂見一半目不見一半目是也眼眶黑者亦主內有痰直視喘滿下利者死黑氣在魚尾相牽入太陽者死
