body:
  text: 卷十一眼目部凡屬金針眼科內障外障風火時眼一切風絲塵沙入目皆匯於此部中以便檢閲參治內障門主論祕笈曰夫瞳仁輕膜裹水照徹四方乃先天精液肇始之元靈人身之至寶如日月麗天著明而不可掩者也鋭眥即小眥屬心與小腸上下胞屬脾胃名肉輪瞳人屬腎名水輪黑珠屬肝名風輪白珠屬肺名氣輪大眥屬心名血輪心經屬火大小眥赤脈侵睛癢澀眵如針刺痛諸般候心家虛熱急須知若還小便赤與淋內多蘊熱醫休遲胬肉侵睛無別證膀胱陽蹻邪在茲小眥有疾莫亂治三焦小腸二經同肝經屬木應烏珠淡紫色兮病全無黑乃本經受風克眼見飛花是肝虛昏暗酒色勞傷過紅多滯血客熱聚眼珠疼痛並黃色肝血不足補乃愈脾經屬土上下胞紅腫皆因風熱饒紫色滯血多凝結羞明怕日濕熱招兩胞浮腫緣何病皆因脾胃不調和內生斑瘡並蜆肉兩經積熱血難消眉骨眼眶酸與痛風痰作楚或房勞上胞腫澀難睜視色欲傷神為阿嬌拳毛倒睫無他故脾肺虧兮急早療肺經屬金應白珠純淨光潔則無虞若還紅腫過高起肺氣壅塞大便遲淡紅虛熱黃因濕鼻塞涕淚風受之腎經屬水應瞳仁黑如椒子光有神散大膽腎虧損致驚恐卒然有此因黃翳遮睛昏且淚腎虛時見黑花頻赤屬積熱暗酒色緊小精虧急養身足太陽膀胱見證頭痛兩邊最甚眼淚淋漓時流睛明穴潰膿病翳從內眥出來攀睛胬肉遮橫白睛積血凝滯赤脈多生眼中小便頻數不休癰疽陡起熱盛上胞內眥紅腫偷針諸候皆應足陽明胃經見證齒痛頭疼相併黃膜上衝睛瞳翳下而上遮定蜆肉時時嘔吐下胞紅腫為病足少陽膽經見證口苦時多重聽鋭眥赤脈翳生脅痛皆由膽病手太陽小腸見證鋭眥赤脈為病翳自抵過上生白睛血灌紅勝小便赤且澀兮急投湯散須慎手陽明大腸見證白睛腫赤為病眵多又兼流淚便結下之須迅手少陽三焦見證鋭眥赤脈牽定翳自客主斜下投劑宜清應病足太陽脾經見證九竅不通為病怠情嗜臥兼之羞明怕日相應上胞浮腫堪嗟睫閉不開若瞑癍瘡風粟面黃發熱吐瀉無定倒睫拳毛內生幾般醫者當認足厥陰肝經見證瞳仁散大多瞑腦脂直貫睛中時或眼跳無定黑珠突然高起不能正視珠痛淚出昏眩可嗟花陷皆由虛甚蟹眼或多雀盲黑花空中掩映目恙有一於此便是肝家之病昏如霧露見花飛瞳仁緊小腎精虧或亦有人病散大神水混色光漸微冷淚腦脂直流下頭痛足冷虛極推膜入水輪諸證候足少陰腎經所歸手厥陰經心包絡神水緊小急投藥赤環如帶口且干手心發熱病將作翳自抵過而下生赤脈如絲直貫睛健忘更爾多驚悸眊矂緊急不分明痛如針刺時或癢血灌瞳仁防目盲諸般證候因何起手少陰心經所成不疼不痛自昏蒙薄霧輕煙漸漸濃或見蠅頭飛亂出或如懸蟢在虛空此般病證如何得肝臟停留熱毒風大叫大啼驚與恐腦脂流下黑睛中初時一眼先昏暗次第相牽與一同萬般苦楚空憔悴只緣肝氣不相通日久雙眸全黑暗內障更深藥罔功內障上篇內障圓形草四般後學醫人貴得傳金針宜用與忌用認證糊塗怎得痊開針遠近須依法針形各異莫同焉病虛胎産兼懷孕遇此休針是要言不風不雨兼吉日清齊七日念須虔安心定氣耐煩守避風靜臥禁人喧冷熱調和虛共實寬懷忘慮色憂煎見血莫驚須下手裹封密室暖為先忽然撞起膜重上服藥三旬見朗然七日解封能視物花生水動莫疑猜還睛丸子常常服百日功完復舊元內障中篇內障金針下了時將息之方要備知嚴冬緊裹常溫暖夏日休將紈扇施頭眠軟枕須安穩仰臥三朝莫厭遲封后忽然微有痛腦風牽動莫他疑或針或撥依經法痛極仍將艾尉之嘔吐豉椒湯急服定神安胃在良醫起動勞神俱謹戒顛翻倒臥莫從伊七朝薄粥溫溫食振著牙關事不宜大小便時須緩緩毋令自去要扶持高聲喊叫兼因氣驚動睛輪見雪飛收心莫憶陰陽事夫婦恩情切斷離一月不須淋洗臉針痕濕著痛微微調養五七睛光復寡欲清心病自除內障下篇天有二曜人有兩目因酒色過度調攝失宜惱怒所傷肝氣衝動腦脂流下其目系繫於腦帶於肝腦中惡氣從目系而入於瞳人面前久而脂堅凝結成翳遮蔽瞳人故此失明俗呼為瞳人反背瞳人者非人之人乃仁德之仁也一名眸子無手足如日月之形前後俱有明光豈有反背之理惟是腦脂灌睛遮蔽瞳人名為內障用金針撥開腦脂瞳人浮上腦脂沉下如雲開風日頃刻明矣夫人之眼白睛如杏子烏珠如杏核瞳人如杏仁所謂眸子也白睛最堅屬肺金內臟護睛水如雞子清之稠濃瞳人托在正中窠內烏珠屬肝外結一層浮皮內含清氣包定瞳人在內一泓一點之微者乃先天元氣結而成者也是皆生生自然之道目乃肝之竅其形圓大上有一蒂一系繫於腦內連風府自夾脊而下貫通肝臟肝藏血血榮於目年少之人水火既濟陰陽升降故光明年老氣血虧損故昏暗瞳人根源論李東垣曰五臟六腑十二經脈三百六十五絡其氣血皆上於面而走於空竅清陽之氣上散於目而為睛走於耳而為聽因心煩事冗飲食失節勞役過度以致脾胃虧弱心火盛心火者君火也主人之神宜靜而安相火代君行令相火者心包絡也百脈皆榮於目既勞役運動勢乃妄行百脈沸騰邪害空竅瞳人中神水既無滋養反受火熾則漸漸昏耗而失明矣內障青菜色者不針白如粉牆者不針黃心內障者不針頭風內障者不針驚振內障者不針瞳人散大者不針瞳人緊小者不針內障陽看小陰看大者可針其障務宜收放方好若不收放者不針障翳白色者可針白帶微藍可針此二色多糙米色者可針藍色者可針其障嫩故也凡金針之柄以紫檀花梨或犀角為之長二寸八分如弓弦粗兩頭鑽眼深四分又用上好赤金子抽粗絲長一寸用乾麵調清漆嵌入眼中外餘六分略尖些不可太鋒利恐傷瞳仁平時以鵝毛管套之藏於匣內臨時供於佛前用之無有不驗者也此龍樹王菩薩神針式也凡針內障逢朔望日對神對佛通鄉貫姓名祝救用針者念咒七遍書一道符封針臨時必先齊戒設供香燭之類又書符一道取太陽神光接其眼光亦念咒大叫救苦救難南海觀世音菩薩其針自轉令針者心膽大開不驚先書後三光符下針宜用開成除收日並天氣睛明忌用子日咒清淨眼紫金燈酒酒水離黃沙滿藏經千眼千手千龍王文殊大士騎獅子普賢菩薩騎象王日神夜神云膜內障盡消除強中強吉中吉波羅會上有殊利眼中一切得光明清淨般若波羅蜜開鐵三光符畫符默念三句咒取日光接神光明目光若針後疼痛急取生艾或干艾同生蔥一把搗銅鍋內炒熱布袋盛尉太陽穴三五次即止用水法凡撥內障先汲井水以盆盛注於桌上令病者以面就盆用針之人側坐以手蘸水於眼上連眉骨淋洗使眼中腦脂得水乃凝以水洗透數十次為度然後用針庶幾隨手而下不黏滯矣撥內障手法醫者用金針撥眼必要知其八法然六法易傳而二法巧妙在於醫者手眼只可意會不能言傳所以難傳難授眼如隔垣取物手如探囊取物方能撥下翳來人之兩眼乃水之精如無二法難以用針治之凡用金針先令患者以冷水洗眼如冰使氣血不得流行為度先用左手大指次指按定眼珠勿令轉動次用右手持三稜針離黑珠米許針一穴白珠甚厚必要手准力完重針則破然後用金針斜回針首入穴內觀看針首至患處即止如過毫釐傷於心脈其人即嘔然後用手法將針輕輕推壓其翳自然抱針方許撥下送至白珠藏在護精水內盡處然後出針針不宜出早若出早其翳即復則前功盡廢矣一要用水洗灌得法二要知氣血凝與不凝三要知三稜針開鋒遠近四五要知進針手之輕重深淺六要知藏翳送至護精水底七法八法巧妙出於人心應乎手眼難以筆墨相傳針畢時依法封固調理得所自然痊矣封眼法預收芙蓉半老緑葉曬乾為末井水調勻以綿紙剪如茶盅口大圓塊先將敷藥敷眼眉稜上及下眶以紙一層封貼藥上又上藥一層蓋紙一層封定候將干以筆蘸水潤之日夜數次夏月倍之一日一換仰面而臥或將針眼向上就枕防脂泛上也凡起坐飯食及大小二便俱宜緩不可驚動三日內只用稀粥熟爛肴饌不可振動牙齒三日後開封視物服藥靜養為主分別大小圓翳內障論古人論內障有大圓翳小圓翳人秉父母胎元瞳人大小不一瞳人大者其翳大瞳人小者其翳小腦脂流下經年凝結而成翳也醫者用針自有淺深翳大針淺翳不能落翳小針深豈不損睛誤治者可不慎乎凡鐮洗查逐日人神所在其經忌用刀針翳障復起宜平肝順氣其障自落如不能落復針亦可凡針後忌用川芎恐行血作痛如痛用熟地當歸白芍之類瞳人清白珠紅用桑白皮防風柴胡赤芍瞳人內有油氣不清當平肝氣用柴胡枳殼若作惡心用藿香厚朴半夏淡豆豉頭痛太陽痛用防風白芷羌活石膏太陽痛甚用炒鹽尉之白珠赤用柴胡紅花赤芍歸尾桃仁桑白皮瞳人散大用白芍茯神人參麥冬當歸棗仁北五味凡受熱致瞳人小者用當歸川芎黃連麥冬茺蔚子柴胡山梔大圓翳按此證先由腎水虧損後由惱怒傷肝蓋眼屬臟腑而以肝腎為本腎為水之源眼為水之精色欲過度腎水衰弱不能生養肝木亦不能榮養眼珠加以七情暴怒心胸熱氣上衝入腦腦脂不固下注於目凝滯遮蓋於瞳人前結成內障起時眼前常見垂蟢飛蠅薄霧輕煙不疼不痛漸漸失明先從一眼久後相傳其脂青白色所稟父母胎元瞳人大者其翳即大故曰大圓翳陰看則大陽看則小初覺宜服沖和養胃湯柴胡當歸白芍甘草葛根人參黃耆白朮五味子羌活防風白茯苓口乾加黃連黃芩石斛夜光丸人參山藥牛膝菟絲子五味子麥門冬羚羊角肉蓯蓉川芎生地天門冬白蒺藜枸杞子青葙子草決明杏仁石斛枳殼犀角白茯苓甘草防風黃連年久宜用金針撥之小圓翳按此證與大圓翳受病相同俱因欲怒致傷肝腎熱氣上衝腦脂下注結成青白翳遮蓋瞳仁夫瞳仁神水通注於膽臟腑平和氣血循環膽汁通流於上則能鑑照萬物肝腎既傷熱氣上衝不散膽汁不能流通是以脂凝成障名曰小圓翳者所稟父母胎元瞳仁小者脂即小故也雖見三光不辨人物初起宜服沖和養胃湯石斛夜光丸年久宜鼠尾金針撥之浮翳內障按此證初起由色欲過度耗竭腎水水虧火旺攻翳於目視物即昏昧如霧露中全不疼痛漸因七情鬱結縱欲傷肝以致熱氣上衝於腦腦脂灌注睛內結成一塊光亮如銀箔色浮在瞳人上先從一眼久後相傳不見三光金針難撥初起宜補腎平肝治同上沉翳內障按此證皆因腎經虧損肝心火盛致目視昏昧眼前常見黑花腦中惡氣漸漸侵瞳二三年外凝結成翳青白色如沉水中若見三光宜針撥之治同上澀翳內障按此證皆因淫欲傷腎縱怒傷肝肝腎兩傷以失生化之源致令氣血虛弱不能榮養雙眸日久邪熱炎上腦脂下流結成一塊遮蓋瞳人黃色而大凝滯無收吸故曰澀翳初患同前治久後不宜針撥滑翳內障按此證皆因肝腎並虛致使腦脂灌注珠內形如水銀珠子流動吸收不定不疼不癢只因昏花而起日久相傳漸漸失明雖見三光不辨人物治同前如年久用蓮子金針撥之散翳內障按此證皆由五臟虛勞酒色過度加之憂思暴怒肝氣上衝腦中惡氣流下凝滯瞳人之前結而成翳或濃或淡厚薄不一其色黃白散大而無收吸雖見三光不宜針撥不能治也冰翳內障按此證皆因肝腎虧損風火上炎攻衝痰動以致頭旋連臉眉骨額骨偏痛眼中赤澀或黃白黑色不定或夜見煙火久則結成內障其脂如欲解之冰又如碎磁之狀故曰冰翳初起宜驅風痰服半夏白朮天麻湯人參白朮半夏天麻乾薑陳皮神麯澤瀉蒼朮麥冬黃耆黃柏黃芩神效補肝散夏枯草香附各二兩甘草四錢為末每服三錢茶下不宜針撥金星內障按此證初患頭痛臉覺微腫目中赤色常見黑花撩亂瞳人漸昏漸小內有腦脂如金箔色不宜針撥亦不能治皆因水衰火盛所致水本剋火水衰不能剋火反受火制故火愈熾而水愈竭矣初覺以養血涼血補腎清火為主大抵此證最為難治橫劍翳內障按此證皆因肝腎虧敗房勞不節以致昏暗不痛不癢先從一眼久後相傳兩目俱損如劍橫於瞳人之上雖見三光不宜針撥初起宜石斛夜光丸棗花翳內障按此證皆因肝腎不足水衰火盛頭痛腦旋見花飛黃黑不定瞳人周圍如鋸齒故曰棗花翳初起微覺昏暗皆能視物宜服沖和養胃湯石斛夜光丸俱去五味子加茺蔚子為君服之可保如久後內有一點藍星則不能治亦不能撥偃月翳內障按此證乃肝虧腎損虛火上炎致使腦脂流下遮蔽瞳人漸成白色如初十夜之月半薄半厚半明半偃先從一眼久後相傳瞳人俱損不宜針撥驚振翳內障按此證皆因肝腎二經虛勞偶遇打撞驚動腦脂流下漸漸昏朦成翳久則白色亦有自下而入肝經者亦有隨驚隨散者瞳人無收吸雖見三光不宜針撥治同圓翳雷頭風內障按此證初患頭痛足冷噁心嘔吐腦內如雷鳴致使瞳人散大漸漸失明不睹三光皆因暴怒傷肝體氣虛弱風寒之氣所侵逆於三焦攻衝於頭因頭為諸陽之所會邪正相傳伏而不散故發痛如雷鳴胃為寒氣所沖故噁心嘔吐瞳人神水乃氣之聚也氣為怒傷故散而不聚初起急服附子豬苓湯人參白芍白茯苓羌活熟地豬苓熟附子香芎散川芎石膏香附薄荷白芷川烏甘草為末每服二錢石斛夜光丸倍加五味子以收散大痛極不止用乳香定痛散吹鼻乳香沒藥雄黃石膏川芎各五錢焰硝一分五釐研細噙水吹少許入鼻內痛即止久則不治緑風內障按此證初患頭額痛急兼半邊頭痛鼻內如煙噁心嘔逆足冷眼內見紅黑皆因肝腎俱虛氣血虧損瞳人漸漸散大神水淡緑色大抵受病與雷頭風相同但因頭痛暴怒過極熱氣上衝腦中惡氣流於珠內與神水攪混而變成緑色故謂緑風內障久則不睹三光則不能治初起先止頭痛服附子豬苓湯候痛止服沖和湯加減夜光丸去肉蓯蓉俱倍加五味子黃風內障按此證初患之時頭痛乃是肝腎虧虛風毒相侵又兼脾肺壅熱白睛黃色先患緑風內障嘔吐傷胃久則變為黃色此乃不治之證也烏風內障按此證皆因色欲過度以傷元氣元氣一虛心火亢盛致眼前常見黑花眼眶鼻梁眉骨俱痠疼白睛高起數粒色青如豆瞳人漸漸緊小視物不明瞳人屬腎水水本剋火反受火制故昏暗緊小火克肺金白睛屬肺火克則護睛水滯結隱起高低不平飛花痠痛等證乃火氣拂鬱血虛挾風故也初起宜服神效補肝散選奇湯陳皮半夏甘草羌活白茯苓黃芩防己姜一片同煎散風補血後服補中益氣湯石斛夜光丸益氣滋陰不見三光不能治也黑風內障按此證皆因氣體虛弱肝腎不足兼以七情鬱結邪火上盛逆衝於頭目以致頭旋腦痛眼中昏澀常見黑花漸至瞳人散大失明瞳人實氣聚而成火盛氣散故失明矣此不治之證也五風變化內障按此證皆因氣血兩虛臟腑俱勞毒風上攻腦熱相侵頭旋腦痛嘔吐故此失明不可治也瞳人散大內障按此證皆因肝腎虧損況怒傷肝恐傷腎肝腎受傷則瞳人散大蓋瞳人屬腎乃氣之所聚也怒傷則氣散初起昏如霧露中行漸空中有黑花睹一成二久則不收遂為廢疾蓋神水漸散終至盡散初宜沖和湯夜光丸去肉蓯蓉倍加五味子收之俟少有光兼服千金磁朱丸先以磁石置火中醋粹七次曬乾另研極細末二兩辰砂細末二兩生神麯三兩外以一兩水調作餅煮浮為度搜入前藥和煉蜜為丸如桐子大每服十丸加至三十丸空心米湯吞下凡服此藥後俯視不見仰視漸睹三光此其效也空心服此午後服石斛夜光丸此乃虛證鎮墜之藥不宜服早恐墜元氣若氣為怒傷散而不聚者服益陰腎氣丸熟地山藥山萸肉生地白茯苓牡丹皮澤瀉五味子當歸柴胡煉蜜為丸辰砂為衣每服五七丸空心淡鹽湯徐送下此壯水之主以鎮陽光氣為怒傷散而不聚之故也然必兼磁朱丸服之庶幾為易效又為物擊神水遂散此不治之證也瞳人緊小內障按此證因腎水虧弱相火強盛水弱火盛則水受火制故瞳人漸漸緊小瞳人者腎水也初起無痛癢眵淚之證但覺羞澀眊矂瞳人毛缺肝水青黃宜服還陰救苦湯川芎甘草黃柏桔梗柴胡防風羌活黃連知母黃芩紅花生地龍膽草當歸尾連翹升麻細辛蒼朮藁本白水煎服御抑相火夜光丸補腎壯水去五味子加茺蔚子畏其酸有收之意若日久不節色欲不避勞苦忽加眉骨痠痛必致小如菜子內凝腦脂或黃或白永不能治小兒胎元內障按此證皆因母懷孕時有暴怒驚恐兼飲食乖違將息失度母食麵食五辛炙煿之物並服諸毒丹藥積熱在腹內攻小兒損目及生二三歲後不言不哭都無盼視父母始覺及長成方知內障內有翳青白色遮蓋瞳人若辨三光有用金針可撥者大抵小兒內障多難治療經曰目者五臟六腑之華榮衛魂魄之精常榮也又曰諸脈者皆屬於目目得血而能視故臟腑精氣皆上注於目而為之睛白睛屬肺黑睛屬肝瞳人屬腎上下胞屬脾兩眥屬心而內眥又屬膽與三焦上綱屬太陽膀胱小腸下綱屬陽明大腸五臟五色各有所司心主赤赤甚者心實熱也赤微者心虛熱肝主青青甚者肝熱也淡青者肝虛也脾主黃黃甚者脾熱也淡黃者脾虛也目無睛光及白睛多而黑睛少者肝腎俱不足也晝視通明夜視罔見者稟受陽氣衰弱遇夜陰盛則陽愈衰故不能視也赤脈從上而下者屬足太陽經從下而上者屬足陽明經若上眼皮而下出黑白翳者屬太陽寒水從外至內者屬少陽風熱從下至上而緑色者屬足陽明及肺腎合病然翳膜者風熱內蘊也邪氣未定謂之熱翳而浮於外邪氣既定謂之冰翳而沉於內邪氣若深謂之陷翳此宜升發以消之更有疳眼者因肝火濕熱上衝脾氣有虧不能上升清氣故生白翳睫閉不開眵淚糊久而膿流遂致損目雀目者上午能視臨晚失明此因肝氣衰弱也蓋木生於子旺於卯絶於申所以上午而能視至申西而失明況目得血而能視午後肝氣漸衰且陰虛則火必盛弱陰不能以勝強火故夜轉劇天明以陽用事陽主動濁陰暫消故稍明大要治肝養血兼理脾胃為主更有目閉而不能開者有因過服寒涼之劑致使陽氣下陷不能升舉而然有因胃氣虧損眼睫無力而然並宜升陽益胃更有暴赤腫痛風火熾盛者有因多淚羞明肝心積熱者一宜疏風散火一宜涼血清肝若風沿爛眼者是膈有熱也若時時作癢者是膿潰生蟲也若眼睫連扎者是肝經風熱也若初生目黃壯熱二便祕結面赤眼閉者此胎熱也更有痘後精血既虧餘毒上侵及斑瘡入眼者有視物不明不腫不痛但見黑花而無精光者此皆肝腎並虛也若外無翳膜內障如雲視物不見俗名青盲者若非腎水枯涸則必久病成疳脈洪大者養血為先脈沉細者補陽為主蓋天無日色雖有火鏡何能使晶光相射乎若吐瀉後而始生膜障不能開舉及無精光者此精滋瀉脫無神已亡也難治更有熱毒眼小積毒眼小者更有時氣流行而腫赤者然治法總忌寒涼及單行發散蓋寒則凝熱則散而風則燥耳況目病雖由火熱然多因初感風寒腠理閉密火熱不得外泄上走空竅而為病若散其外感則火熱泄而痛自止兼之養血涼血退翳諸劑必兼風藥始能上達頭目且火鬱則發之以減其盛勢若概用寒涼則邪愈凝滯亦不可發汗汗則津液耗而血亦燥燥則其疾愈甚矣更有目疾血瘀血熱而投以破血涼血之劑者或投以寒涼損脾之劑者皆為不可蓋脾為至陰歸明於目況目得血而能視血少則熱火愈動而目愈昏夫血者木之精脈也精光者木之華葉也脾胃者木之根本也故莫若以上病治下之法用引火藏源之方服於食前峻補其肝腎則濁陰降而上熱自除下陰足而目光自返陷翳自浮冰翳自化倘翳膜過厚者另以養榮藥中佐以消障疏風之味服於食後則標本俱得其功上下咸受其益矣錦囊張蘊山曰睜眼見黑花宜服人參固本丸主之眼科祕覽又曰眼目昏花視物不明皆由陰虛火旺宜用知柏地黃丸加甘菊花治之明目第一法節省酒色戒惱怒夜勿看書減思慮專內視簡外視晨興遲夜眠早少用辛燥物明目要訣夜臥睡醒開目轉睛四十九遍常常左右轉之永無目疾疾目勿藥自愈法夜臥小便時用力將眼睜開轉運瞳子左右各十數遍然後存想下邊不數日火即下如站起小便更妙平常如用此法能令火不上炎心法曰皮翻證由胃經血壅氣滯而成小兒多有之眼皮外翻加以舌餂唇之狀又曰患目昏者不拘時候靜坐閉歇以兩目輪左轉七遍右轉七遍緊閉少時忽大睜開久行勿間則鬱火濁陰運出清陽精氣獨光又曰治翳當辨其起自何經及翳形何色各加引經藥如東垣治一婦緑色自下而上知其陽明來也但緑非五臟正色殆肺腎相合而為病也乃就畫家以黑調膩粉合成色諦視之與翳同則肺腎為病無疑矣乃以瀉肺腎之邪為君以陽明藥為使服之甚效他日復病者三其所從來之經與醫色各異因思必經脈不調以致目病不已詢之果然遂以養血滋陰藥作丸服之而永不發觀此則辨色分經詎可忽哉又曰治眼有以三稜針刺血出而愈者即內經血實宜決之之義然必初起血盛而熱者宜之在太陽陽明二經方可蓋二經氣血俱多故耳他經出血其病轉劇故曰刺太陽陽明則目愈明刺少陽陽明則目愈昏東垣治一人因用豬肉煎餅與蒜同食復大醉而臥熱炕次日瞳子散大視物不真諸方不應乃以酒炒芩連瀉熱為君歸身生地養血涼血為臣五味子酸收瞳神散大人參二冬地骨皮生甘草枳殼苦甘補中抑氣為佐柴胡引經為使服之頓愈丹溪治一壯年人早起忽視物不見就睡片時略見而不明食減倦甚其脈緩大重則散而無力意其中濕所致詢之果臥濕地半月乃以白朮為君黃耆陳皮為臣附子十劑而愈皆治本之神見也海藏治一女及笄而病目三年而紅腫難開服散風清熱之藥反生翳從鋭眥遮瞳神右目之翳從下而上其脈短而實潔古曰短為有積經曰從內走外者少陽病從下上者陽明病乃少陽陽明有積滯於中抑遏臟腑以致清陽不升濁陰不降乃以去積之藥加黃連龍膽草每早化服一丸一日便下黑血塊如豆大而甚堅硬由是翳退目明矣馮魯瞻曰豫幼年讀書過勞而常目病今看書寫字略多便易於舉發發時惟以八味丸加牛膝五味子者每日食前各進五六錢一日共有一兩五六錢矣外用黃連錢余入銅青分許煎濃汁洗淨兩三次俟紅障少淡再入人參二三分於內溫和洗之則光還而能視物如故矣澄曰凡治時眼七日內切勿就用當歸菊花若用早便難速愈此專門眼科祕法也內障門主方退翳當歸身蒼朮蘇薄荷甘草川芎白蒺黎黃芩酒炒穀精草白芍藥紅花木賊草桔梗各等分水煎服又方柴胡木賊草防風黑山梔白蒺藜紅花穀精草荊芥菊花蘇薄荷赤芍藥各等分白水煎又方沙苑蒺藜白菊花穀精草各二兩真蘇薄荷一兩上為細末煉蜜為丸鹽湯送下三錢又方白菊花玩月砂草決明茺蔚子白蒺藜夜明砂各等分研細煉蜜為丸如彈子大白湯調服真陰虧乏眼目昏花或云翳遮睛甘枸杞一斤酒浸透分四處一川椒同炒一小茴同炒一芝麻同炒一川楝同炒白朮白茯苓熟地黃各一兩制畢研細煉蜜為丸鹽湯送下三錢翳障昏花懷生地半斤酒洗竹刀切片微火烘乾烏犀角鎊不見火一兩五錢白蒺藜炒去刺杭白芍酒炒杜仲鹽水炒去絲玩月砂微焙各四兩當歸身酒洗過焙乾叉石斛酒洗蒸一時焙乾白菊花去心蒂懷牛膝酒洗焙乾懷山藥微炒各三兩防風酒洗焙乾川芎各二兩蟬蛻去砂土頭翅足一兩上為末煉蜜丸早晚白湯送下三錢羊肝明目丸羚羊角白菊花去葉蒂北五味青葙子牡丹皮各一兩白蒺藜炒去刺密蒙花嫩黃耆蜜拌炒遠志肉甘草湯浸焙天門冬麥門冬去心白芍藥酒炒菟絲子各一兩五錢酸棗仁炒杜仲鹽水拌炒斷絲白茯苓乳拌三次於白朮東壁土炒懷山藥炒人參各二兩黑羊肝一具去淨膜澤瀉鹽水拌炒八錢當歸身酒洗二兩五錢生地黃用砂仁五錢同酒煮爛搗膏香附子童便浸一宿曬乾用醋拌炒各四兩黑羊肝用木木賊草二兩同酒煮爛去木賊草將肝同上藥磨細末煉蜜為丸每早白湯送下三錢每晚白酒送下二錢幼年腎虛眼花北五味打匾焙麥門冬焙各二兩甘枸杞黑芝麻同炒去芝麻白蒺藜隔紙炒叉石斛酒蒸焙各四兩魚膘一斤切蛤粉炒成珠研細蜜丸每早淡鹽湯送下三錢中年眼目昏花蔓荊子煮熟炒曬乾研去油草決明微炒各十二兩研細用沙苑蒺藜半斤熬膏杵丸食遠白湯送下二錢退翳障並治赤眼熊膽少許淨水略調開取去筋膜塵土入冰片一二分如癢淚加生薑汁少許以銅箸蘸點眼生外障視物昏黑豬膽一個傾入銀器中微火熬膏加冰片少許點又方豬膽外膜曬乾捻線煅灰加冰片研細點之眼珠上白星東丹一分輕粉麝香各五釐研極細左眼吹右鼻孔右眼吹左鼻孔眼目生星暫時得者可退白蒺藜三錢水煎洗之三日即無星外障翳膜昏爛眼藥宣黃連甘菊花當歸各一錢黑山梔黃芩連翹木賊草黃柏荊芥穗防風各五分大黃二錢共入砂鍋內加童便七碗煎濃汁去渣作七分以蘆甘石四兩研為細末入銅勺內炒熱入藥汁一分滾干又投汁一分滾干如次七次已畢研極細加硼砂燈心各一錢牛黃雄黃各三分珍珠五分同研千餘下再加熊膽五分冰片麝香各一分自然霜一錢又研無聲為度瓷瓶密貯挑少許點大眼角一日三次連點七日制自然霜法新磚一塊磨光以桑柴燒紅放於平處皮硝一升灑熱磚上待硝吃盡冷定用布一塊裹磚縫好投糞窖內三七日滿取出冷水洗淨用大棉紙包好放潔淨處候磚上生白霜以鵝翎掃收翳障人指甲刮末人乳調點病後生翳大人小兒皆宜救急方白菊花蟬蛻等分為末入蜜少許水煎服杏仁膏藥匾杏仁一粒去皮尖細瓷器內研細滴熱人乳二三滴浸片時絞去渣點眼角內數次翳即去矣鵝翎丹諸種目疾屢試神效兼治眼漏亦效粉蘆甘石三兩用川連二兩龍膽草二兩煎汁待甘石煅赤淬汁內以酥為度研如飛塵仍投前汁內曬乾官硼砂二錢新珍珠一錢真血珀片腦熊膽各五分上各味研至無聲即入前汁內搓成如線細條晾乾以鵝翎管貯用時取一條夾眼角內自化沁入一條可治數人點眼蕤仁去淨油一兩用秦皮煎湯灑濕安平底碗內用艾圓三枚各包川椒一粒捻著熏之再放瓦上熯干研極細入後藥硃砂飛一錢硼砂五錢麝香五分共研極細點之閉目一炷香為度點眼蘆甘石三錢新珠子硼砂口含吐去澀水琥珀各七分真蟾酥烘去油冰片各一分兒茶烘去油三分麝香二分硃砂磁粉煅紅淬入乳黃連汁內七次各五分上各乳至無聲為度和勻點之眼生蘿蔔花神方取極大白蘿蔔一枚剜空入雞子白一枚種土內待其開花結子後取起取出雞子白研細加蘆甘石煅過一錢熊膽五分冰片一分五釐研絶細末以蜜和點眼一日一次七日全好退翳駱肩山夜明砂無名異煅龍膽草青蛤粉穀精草各三錢蘆薈一錢各研末用牙豬肝一個不見水竹刀切開去筋絲將藥末散入肝內用線縫好放砂鍋內或蒸或煮以肝熟為度食之忌生冷蔥蒜椒薑發物清心明目丸濟生補心養血清神長智潤肺利竅聰耳明目生地酒洗遠志甘草湯泡焙石菖蒲川連當歸身酒洗甘菊麥冬甘草各一兩五錢甘枸杞二兩煉蜜丸如桐子大每服七八十丸臨臥燈心湯下地黃丸眼眶痛肝虛羞明生地叉石斛熟地元參各等分煉蜜丸茶清食遠服二錢明目奇方此方乃東郊省充二公合議而成治頭風之藥以之治目才能清上依方服之果獲神效至重者不過四十帖全好石膏一錢五分蔓荊子研羌活防風荊芥當歸各八分青葙子研雞冠子研草決明研連翹各七分龍膽草木賊草各六分桔梗白芷北細辛各五分藁本四分甘草三分白水煎食後服血虛下淚羞明怕日雙目昏花香附一兩夏枯草五錢研末淡茶調服三錢又方甘枸杞六兩甘菊花一兩煉蜜丸空心白湯送下三錢冷淚臘月不落桑葉煎水頻洗最效紅絲絆睛蘆甘石整塊者火煅紅淬車前草汁內九次淬黃連湯內九次淬童便內九次五制已結研細水飛曬乾又研棉紙篩熊膽硃砂梅片再研千轉以無聲為度瓷瓶密貯每用少許點兩眼角內或用烏羊膽汁調收亦妙七十二種眼證眼藥宣黃連家菊花各四兩當歸三兩豬肉湯洗用清水十碗煮濃汁濾去渣再入銅鍋入紋銀一兩藉氣熬至砂糖色冷定加蘆甘石制過二兩石燕磨汁半盞冰片四分麝香六釐白蜜一匙羊肝煅灰三錢鴉毛一根炭火上燒成珠調勻捻成條收貯勿令泄氣每用少許乾點眼角其藥自化不必水調病後兩目昏視物不見元眼核二枚剝去外面漆皮水磨濃汁塗兩眼胞神效疳疾眼生翳膜並肚大泄瀉面黃肌瘦神效周鶴仙肉果麵包煨二個使君子去殼五個胡黃連白蒺藜炒去刺蘆薈各一錢共為末雞肝一具酒漿少許同搗爛去渣入前藥末調勻蒸熟食之吃二三服立愈疳疾並出痘壞目神方青浦徐氏傳密蒙花酒洗淨穀精草蟬蛻去翅足望月砂各一兩共為末用雄豬肚一個竹刀剖開將藥末摻入水煮熟飲汁食肚盡一料全愈撥雲錠子劉長隨從都中盤山得來治一切眼疾又有開瞽復明神效蘆甘石將蘆甘石揀去隔石選潔白者先以紙包石用醋罈頭上泥入桶內以童便侵透煉熟少少糊在紙外又以火硝末滾在泥球上外再以厚泥包圓大約蘆甘石一斤可分作四五個球每一斤蘆甘石用火硝一兩研細滾之四五個球為度球成曬乾如有縫以泥補之另以磚砌一大爐架火將球放炭火上煉一天申刻火將完可將球取起翻轉入爐添火加炭過夜不必守之隨爐中炭火化完為度一爐可煉蘆甘石二三斤每蘆甘石四兩用川黃連龍膽草各五錢河水五碗浸一夜煎數沸去渣濾淨清將蘆甘石煅紅傾入藥汁內取起又煅又淬以汁盡為度藥水內落下蘆甘石再燉干藥水俱取入蘆甘石內為炒每料只用制蘆石三錢再加熊膽五分冰片二分五釐白硼砂三分麝香五釐硃砂水飛三分活烏鴉翎二寸二分煅上為細末用川芎當歸赤芍藥生地薄荷防風防己川黃連甘菊花龍膽草各五錢木賊草黃芩黃柏羌活大黃白芷各二錢河水六碗浸一日夜炭火熬出汁來去渣澄清瀝淨再用文火熬成膏和前藥末和勻搓成條子重二分用鵝毛管收藏黃蠟塞口凡點眼時以清水或人乳或津唾潤濕點眼閉目少刻神效臨臥點之更妙或用人乳化開塗眼胞上下揉入眼內多塗過夜即日見效羊肝退翳丸治雀盲眼一切昏花老眼懷生地熟地黃白茯神人乳拌蒸曬懷山藥炒各三兩甘枸杞夜明沙淘淨各四兩木賊草蜜水拌炒密蒙花蜜拌炒青葙子各二兩草決明二兩五錢捶碎用水浸拌炒川黃連八錢白酒浸一宿微炒黑羊肝一具蒸熟去外膜將前藥為粗末同羊肝搗勻再烘曬令乾再磨為細末用煉蜜為丸如桐子大每服二三錢空心淡鹽湯送下忌蘿蔔胡椒雞鴨蛋黑珠凹下蟹睛鱔魚血曬乾研細以筆蘸點三次全愈退翳鮮鵝不食草又名土芫荽揉軟塞鼻退翳最速如無鮮者陰乾揉塞亦可但初塞必噴涕不已不必疑懼赤眼翳膜葛仙翁大訶子一枚白蜜磨點小兒麩翳未堅者不可混點眼藥珊瑚研如粉每日少少點之自愈退翳羊肝丸張九皋夜明砂木賊草白蒺藜炒去刺蟬蛻當歸各二兩共為細末用蒸熟黑羊肝二兩切片曬燥為末水法疊丸每服三錢開水送下退翳神方木賊草火煅石決明火煅穀精草火煅各一兩黑羊肝一具用銅刀切片放蒸籠內蒸熟以麻線串掛陰乾不可經鐵器共為細末每早晚用紅糖湯送下眼藥蘆甘石煅淬黃連湯中七次珍珠各一錢白硼砂牛黃琥珀冰片雄黃熊膽各五分蘇薄荷葉硃砂各三分共乳極細點之其筋膜即下重者漸落眼藥海螵蛸洗淨泥沙刮去硬甲用黃連黃柏黃芩大黃各等分煎汁煮螵蛸取起曬乾研細加冰片點之清肝補腎羚羊丸陳尚書治少年老年眼目視物不明者羚羊角一枚鎊研紙包縛有乳婦人乳上一宿次日研一兩青鹽二兩煅犀角尖五錢制同羚羊角法百草霜飛細三錢犍豬肝一具煮熟搗萬下和丸每服二錢空心白湯送下老年眼昏何龍泉穀精草不拘多少切成段同黑羊肝一具切片入銅小鍋內每早老人自己炒之其味入鼻眼昏自亮琥珀膏點七十二眼證蕤仁去油膜二兩大珍珠琥珀象牙末硃砂水飛白硼砂各二錢元明粉二錢五分麝香冰片各一分共乳極細煉白蜜調膏點之珊瑚膏治二十年昏眼能見日光燈頭者可治蘆甘石火煅水淬七次黃丹水飛各一兩乳香沒藥海螵蛸水飛硼砂各一錢青鹽水飛五分冰片三分麝香二分煉白蜜和膏點之初起痘翳白水牛蝨子取血點翳上琥珀散治諸般外障紅赤羞明風熱火眼血縷癍瘡翳膜眼弦爛生眵流淚蘆甘石煅一兩琥珀細竹紙包捶研二錢冰片三分共乳極細點眼推雲散治諸般外障雲翳蟹睛血翳赤膜石蟹滾水泡去夾石並砂土用竹紙包捶碎再研至無聲為度黃連去須白丁香各一錢宮粉金錫堅重有金星研飛青鹽鍋內水化開澄去砂土火上煎乾赤石脂銅緑古錢上者刮下研細水飛曬乾各三分硼砂乳香透明者箬包四五層銅鍋內清水煮數沸換水煮去油沒藥制同上各四分熊膽去皮膜當門子枯礬冰片各一分共乳細用一祕方加蛛黃一錢竹蟣五十個黃連膏蘆甘石煅二兩石蟹二錢琥珀珍珠熊膽各一錢冰片二分麝香三分先將甘蔗二枝去皮切作薄片用清水四五碗煮二碗將渣搗汁濾清入川黃連二兩熬一碗去渣濾淨加川蜜二兩又熬至大半碗入前藥共一處研至無聲為度祕精菟絲丸治內障昏花翳障腎氣虛損目眩耳鳴四肢倦怠夜夢遺精懷山藥以七分打爛白茯苓石蓮肉各二兩菟絲子煮餅五兩上用山藥糊加蜜丸空心臨臥俱用鹽湯送下三錢明目夜光丸張中寰治眼奇方生地酒洗叉石斛當歸酒洗菟絲子酒煮搗爛青葙子枸杞子各二兩人參山萸肉去核懷牛膝酒洗粉丹皮元參各一兩白茯苓山藥各一兩五錢密蒙花菊花各五錢北五味七錢煉蜜丸空心開水送下三錢神效眼藥蕤仁上白者佳去淨油二錢冰片一分硼砂三錢真牛黃麝香各五釐共乳極細骨簪蘸點升靈藥法水銀一兩枯礬焰硝各一兩六錢先將硝礬共研細入兩耳小鐵鍋內鵝翎掃圓上以指按五指眼如梅花樣將水銀均分於內上以粗碗蓋之周圍以棉紙捻濕水封口再加研細軟石膏按緊於碗底上上以大鐵錘壓之於風火爐上微火煅二炷香但石膏有氣出即壓之再加武火一炷香取起冷定刮下研收升黃靈藥加宮粉一兩六錢升紫靈藥加陀僧一兩六錢火候宜小升白靈藥法生鉛水銀各一兩硼砂三錢先將鉛化開入水銀即取出為末再入硼砂共研聽用食鹽火硝枯礬各五錢先將鹽硝礬三味共研一處下鍋炒煉乾再研細分作二股取羊城罐將一股裝在下將汞鉛硼裝在中間再將一股裝在上面用鐵盞蓋罐口上以鐵梁壓住鐵線扎定軟石膏細末臘封口陰乾爐中用鐵釘三根為三足置罐於上先文後武煉三炷香取起冷定開看刮下研細用煅時若罐口有煙出用新筆蘸水塗之煅蘆甘石法取潔白輕而有聲的蘆甘石捶黃豆大用竹紙包四五層以線縛圓外用紫土入新綿捶勻包在內約一指厚為圓球陰三五日收淨處候乾將乾用線絡掛檐前曬極乾透擇吉日用鐵線縛數道平地上砌磚爐留門扇風爐中用大釘三根為足置炭火將球懸爐上炙一炷香方可下爐煅三炷香先取童便一小缸入黃連黃柏黃芩各六錢侵半日濾清將球徐徐入童便內浸一宿取出研細水飛再研聽用八寶散治諸般外障翳膜花陷癍瘡並風眼痼眼紅澀羞明眵淚蘆甘石煅一兩頭號藥三錢共研極細用靈光散治外障癍瘡攀睛胬肉蜆肉蟹睛俱宜點之蘆甘石煅一兩靈藥一錢重者或二三錢共研極細末必須調點患處少許將目久閉候痛止藥性散盡方可撥去用絹拭去令淨以熱水洗之凡病重者連點七日眼胞發腫方可歇藥避風調理七日看患處有病再點但此藥最痛若要除病須耐心方效癍瘡蜆肉重者點淨靈藥少許將目久閉性退之後化而為眵虛弱者不可點點翳方用蘿蔔子一粒研細去殼以燈草蘸唾津調點翳上不過一二次即落外障門主論天行赤眼外障按此證初患之時皆因天行時氣受之者兩目赤腫眊矂緊澀羞明頭痛淚出鼻塞眵多臟腑祕結宜芍藥清肝散荊芥防風柴胡薄荷川芎赤芍羌活炒梔知母甘草桔梗大黃黃芩滑石前胡石膏芒硝大便祕結者服羌活勝風湯羌活前胡荊芥枳殼防風白朮黃芩柴胡薄荷川芎桔梗大黃白芷調治赤眼生翳外障按此證皆因患赤眼之時不避辛苦外受風日內多房勞耗傷元氣以致纏延不愈時常赤腫或癢或痛淚出難睜風熱伏積不散上胞凝血磨擦睛珠漸生翳膜宜鐮洗去上胞瘀血暴風客熱外障按此證皆由肺火壅塞熱氣上衝以致白睛陡紅腫壅起烏珠內陷日夜腫脹疼痛淚出難睜宜服清金桑皮散桑皮元參赤芍防風菊花杏仁黃芩枳殼桔梗旋覆花升麻葶藶子又肺經火盛熱結白珠紅腫微覺脹疼近黑珠邊起一二小泡大便乾結者宜瀉肺湯黃芩羌活桔梗元參大黃芒硝地骨皮兩眥赤脈外障按此證皆因心與小腸膀胱經蘊熱或食五辛煎炒熱物致使亢陽上炎火氣熾盛故大小眥赤脈貫睛兼小便澀痛紅赤如淋服八正散瞿麥炒梔大黃甘草燈心萹蓄木通滑石車前子瞼生癍瘡外障按此證皆因脾胃二經停積風熱作癢流淚用手搓揉或誤服寒涼之劑致使眼胞內瘀血凝滯不散故生血縷後因勞役酒色過度漸成堅硬疙瘩形如花椒相似內有白漿磨擦瞳人即生翳膜治法定鐮洗去瘀血輕者羌活勝風湯重者防風散結湯防風羌活前胡柴胡蒼朮黃芩黃連獨活白芍防己紅花當歸尾甘草白茯苓蘇木此藥治上下胞內瘀血不散並鐮洗後系從權若多服則耗血慎之點烏金膏或靈光散俟病去大半服清熱消凝丸治淫熱反克風熱不散白睛如血貫有熱而血滯者川芎當歸荊芥薄荷羌活藁本菊花滑石石膏連翹山梔甘草黃芩白朮桔梗煉蜜為丸每丸重一錢三分臨臥時須清茶調服瞼生風粟外障按此證皆因脾經受風致使血壅熱積不散或為病已久腫澀難睜亦與癍瘡相類但只胞內生小窠如粟米堅硬白色磨擦睛珠淚出澀痛漸生翳膜治法先針刺出風粟白漿服勝風湯羚羊角散羚羊角犀角知母元參大黃芒硝黃芩桔梗防風白翳花陷外障按此證皆因七情五賊飢飽勞役損傷脾胃兼之肝血不足以致睛疼如刺刺應太陽眼睫無力常欲垂閉淚出羞明珠上即生白翳陷下如粟米魚鱗之狀先服柴胡復生湯珠痛者服當歸養榮湯熟地當歸白芍川芎羌活防風白芷癮澀難開服當歸活血湯當歸黃耆甘草升麻柴胡白芷防風蔓荊子元氣虛弱者服補中益氣湯花陷不起者亦可服蠅頭蟹睛外障按此證皆因肝腎俱勞火邪炎熱之極兼之七情鬱結以傷脾土脾土既病則失生生之職不能含血上榮於目故睛珠疼極淚出難睜或因暴怒烏珠上暴起藍黑翳如蠅頭蟹睛之狀離瞳人而起者名為離睛蟹眼當瞳人而起者名為蠅頭先服柴胡復生湯白芍川芎藁本柴胡蒼朮甘草白芷茯苓羌活黃芩蔓荊子薄荷獨活桔梗五味子痛不止服當歸養榮湯次服黃耆湯神效補肝散虛者沖和養胃湯後服石斛夜光丸俱加五味子以斂之點推雲散八寶散此證外點內服必要積以歲月其翳方能收復亦有不能去者黑翳如珠外障按此證皆因腎虛肝熱子母俱虧其病感受大抵與前證相仿睛珠疼痛淚出難睜羞明怕日烏珠上邊生黑翳突起如黑豆先服黃耆湯人參黃耆知母白茯苓遠志大黃防風地骨皮育神夜光丸人參生地熟地天門冬麥門冬叉斛牛膝當歸枳殼枸杞子地骨皮菟絲子菊花遠志煉蜜為丸白湯下血翳包睛外障按此證皆因脾受風熱更兼肝腎虛勞上胞有病磨擦睛珠內因積熱外感風邪遂使凝血不散漸生翳膜上有紅絲縱橫錯貫遮蔽瞳人難以視物治法先宜鐮洗去上胞瘀血先服勝風湯兼當歸散當歸生地熟地黃連山梔赤芍桑白皮防己龍膽草後服石斛夜光丸點烏金膏如有客熱風痰之證則宜育神夜光丸血灌瞳人外障按此證皆因肝心火盛載血上貫目中心者君主之官神之舍也屬火宜靜或因大驚傷心大怒傷肝心神散亂以致火性妄動載血錯經妄行灌注於目遮蔽瞳人紅色不分黑白疼痛難睜驚狂罵詈如見鬼神目乃五臟六腑之精華榮衛魂魄之所常營也亦神氣之所主也神亂則魂魄散故言語狂亂見矣治法宜急砭迎香穴在鼻孔內兩旁即愈初病一二日紅色即可砭若日久如圓眼核紫黃色則不治矣砭法取粗茶葉簍上箬葉二片以中間硬梗為脊剪針長一寸四五分如劍形頭尖身闊取其至鼻內小孔穴處即止不能往上也用時將針安放鼻內向穴處餘八九分在外用手突然往上一送出血數匙便勿再砭即令臥暖處不可驚動久睡自醒其妙如神後服川芎行經散加五靈脂數劑行其積血自愈雞冠蜆肉外障按此證屬脾胃二經熱積外受風邪致使血凝不散上胞內壅瘀血一塊軟而紫黑色即雞冠下胞內生瘀肉一條軟而淡紅色即蜆肉宜鐮去瘀血服抽風散元參黃芩桔梗防風細辛車前大黃芒硝點靈藥烏金膏胬肉攀睛外障按此證初患赤眼臨風不避辛苦延久而成或因熱足下於冷水或因站立行房致傷陽蹻經絡者其脈起於足上行至頭面屬目內眥此經既傷內眥即生赤脈如縷縷根生瘀肉瘀肉生黃赤脂脂則橫侵黑睛漸蝕神水或兼鋭眥而病者合於太陽經也治法如未蝕黑珠者服勝風湯加蔓荊子撥雲退翳丸川芎荊芥菊花甘草黃連蛇蛻當歸川椒蟬蛻密蒙花蔓荊子地骨皮白蒺藜木賊草桃仁薄荷天花粉煉蜜丸重八分每服一丸食遠清茶調下有翳米泔水調下睛昏當歸湯調下內障者用木香湯調下有熱兼服還陰救苦湯已蝕神水者另有割法詳載銀海撥萃白膜侵睛外障按此證皆因肺熱肝虛腎水虧弱腎水不能生肝木故肝受肺之邪熱所克烏珠周圍漸生白色如翳日久漸遮瞳人終有昏暗之患先服瀉肺湯以瀉肺經之實熱後服育神夜光丸加天冬麥冬滋陰補腎膜入水輪外障按此證皆由目病已久抑鬱不舒更兼調理失宜房勞太過以致肝腎虧虛漸生翳膜始而藍色若蠅翅日久則白厚矣宜沖和養胃湯石斛夜光丸黃膜上衝外障按此證皆因胃經邪熱凝滯氣血以致白睛下邊紅赤生翳黃色衝上黑珠澀痛淚出羞明難睜脾胃屬土土色黃胃傷則土之正色見也先服防風通聖散瀉去積熱後服通脾瀉胃湯天門冬麥門冬茺蔚子元參知母黃芩大黃點琥珀散赤膜下垂外障按此證皆因上胞脾經風熱血積成癍目珠被其磨擦腫痛淚出羞澀不睜熱壅不能疏泄血愈凝滯不行烏珠即生赤膜目上垂下紅色漸遮瞳人宜鐮洗去上胞瘀血散目中瘀血宜川芎行經散點八寶散推雲散逆順生翳外障按此證烏珠生翳自上而下者謂之順屬脾經從下而上者謂之逆屬胃經起自脾胃證見肝經日久漸遮神水皆因身體虛弱氣血不足以致諸經感受邪熱使血凝滯不行磨擦而生翳膜此翳最難去初宜服撥雲退翳丸兼育神夜光丸點八寶散推雲散若翳自下而上者服防風通聖散一二劑即去風吹出瞼外障按此證皆因脾胃二經感受風熱日積月纍壅滯胞瞼之間蓋瞼受風則皮緊脾受風則肉壅皮緊肉壅故眼皮或上或下翻轉在外上生瘀肉紅紫色眵淚如膿治法先宜鐮洗去瘀血服勝風湯點烏金膏靈光散久則不可也迎風流淚外障按此證皆因腎肝虧損蓋肝虛則淚不收淚者肝之液目乃肝之竅液之道也肝木生於腎水水衰不能生木母子兩虛邪火內燔於目外遇風吹肝木為其搖動是以液道開而淚不收初起無他證惟浸浸淚出拭去又流經冬病者多年久不分四季宜服四物補肝散育神夜光丸若不早治兩眼俱黑色昏暗不明者生地熟地川椒等分煉蜜丸每早晚淡鹽湯送下二三錢癢極難當外障按此證皆因心經火邪脾經風熱久伏不散攻衝目中忽遇風邪干觸遂作癢難禁用手揉擦亦不能止蓋癢非謂虛也乃火與風也風觸則火發風火相併故作癢耳久則兩瞼赤爛羞澀難開眵多若糊若胞內有瘀血宜鐮洗先服藁本疏風散川芎藁本羌活防風蟬蛻細辛點八寶散偏睛膿血外障按此證皆因肝火旺盛積熱壅毒烏珠內有膿自下灌上或珠高起如瘡樣流出膿水蓋肝臟生火藏血上榮烏珠火盛氣衝血脈凝滯不行陰陽相搏乃化為膿發時苦頭痛珠疼外寒內熱涕淚交流食眠不得四肢倦困昏悶俱火之象也宜撤膿撒火服黃耆湯候膿淨次服柴胡復生湯點琥珀散八寶散鶻眼凝睛外障按此證乃氣血不分混結而成初患無痛疼但上胞腫起如豆許漸漸長大內有紫癍大抵人身氣血不欲相混混則阻滯於皮膚之間遂成此病初治須擇人神所在不犯之日翻轉眼皮向外於紫斑處用眉尖刀刺破患處以大指捻出黃脂後服防風散結湯如初起略覺有礙用白酒煎消毒飲歸尾甘草白芷陳皮赤芍防風天花粉金銀花皂角刺數劑亦消夫名鶻眼凝睛者蓋鶻烏之眼凝視不運此病長大堅硬礙塞睛珠視物不能運動故以名之痛極憎寒外障按此證皆因房勞思慮以傷心腎陰血勞役飢飽以傷胃腑陽氣氣血兩傷水火不能升降皮膚間無陽衛外護為風寒之氣乘虛以侵攻衝於頭伏而不散頭為諸陽之會邪正相搏故頭痛不可忍目珠紅腫流淚火邪上逆不降則陰氣觸並於下故足膝逆冷身憎寒戰治法宜補陰降火服附子豬苓湯打撞傷損外障按此證皆因被物打撞手拳打著眼珠突出一二寸者登時急用手掌擦熱托定眼珠而珠系一得熱氣自然緊縮就上仍收眼眶中但不可洗去血外即用熟地黃搗膏攤薄絹封貼眼上日換三次服除風益損湯川芎白芍當歸熟地藁本前胡防風打撞積血外障按此證皆因被物打撞胞瞼凝血腫痛難開白睛紅如血灌服川芎行經散川芎羌活獨活荊芥薄荷防風白芷柴胡枳殼桔梗當歸茯苓紅花甘草蔓荊子打刺生翳外障按此證皆因被物打刺積血未散或刺痕未痊久則珠上生白翳遮睛有膿血者服川芎行經散血虛者服除風益損湯翳膜者用八寶散推雲散緩點之傷寒愈後外障按此證皆因大病後清陽之氣不升餘邪上熾不休而走空竅其病癮澀赤脹生翳羞明頭腦骨痛宜服勝風湯升發清陽又一證乃因用辛熱之劑發表太過以致氣虛身弱時病雖愈而瞳仁漸漸散大蓋辛主散熱則助火上乘於胸中故睛散經所謂壯火散氣耳先用勝風湯重加五味子以收耗散之氣數劑之後兼服沖和養胃湯後用石斛夜光丸倍加五味子自愈痛如針刺外障按此證皆因心經潛伏壅熱風毒上攻故病白珠淡紅流淚癮澀難開內眥時時痛如針刺宜服洗心散黃連黃芩桔梗大黃知母元參荊芥赤芍當歸點琥珀散瞳人幹缺外障按此證復因腎水虧損反受火制故瞳人小如芥子而且缺內有腦脂凝結或黃或白此係內障因頭痛而起故列於外障初病頭痛難忍坐臥不寧宜補腎清肝退火為主久則不見三光不治也停肉瘀血外障按此證皆因連患時眼未愈不避勞苦見風太早以致脾胃受風肝氣不和使瘀血凝滯胞瞼之間兩胞腫澀眵淚膠黏先用鐮洗服勝風湯點琥珀散若不愈點烏金膏靈光散羞明怕日外障按此證皆因病目久延不愈鬱火內炎邪風外客致使脾家感受積伏於胞瞼之間但胞瞼屬脾蓋脾統血邪氣既盛則血無所歸故見陽氣光明禁不能敵是以嚏淚交作眊矂羞明怕日難睜宜服瀉脾湯黃芩桔梗蒼朮桃仁大黃車前甘草勝風湯點琥珀散肝經積熱外障按此證皆因肝家勞苦蘊積風熱兼以七情之氣鬱結不散衝於腦攻於目致目赤色生翳或聚或散時發時好初覺頗輕年久漸重宜勝風湯點琥珀散八寶散熱毒癰疽外障按此證皆因過食五辛煎炒炙煿之物或熱水洗浴太過熱毒上攻蒸氣入腦致生癰疽其病自上胞內眥起紅腫疼痛即服消毒飲輕者可以內消重者可以外托或上胞或白睛出膿者可保無虞但肝經黑珠出膿者則損目失明若服消毒飲出膿之後身體虛弱者服補中益氣湯加減用之可也夜間珠痛外障按此證皆因肝經血不足肝氣壅塞兼以寒氣相乘以致血病不行夜間珠痛頭疼淚出不止筋脈俱痛蓋目為血脈之宗又為肝經之竅繫於腦帶於肝肝藏血氣順則血行循目繫上榮目中光彩而明氣逆而血病則目無所養邪並而痛況夜屬陰正寒氣旺盛之時肝氣既逆又遇寒陰乘之邪正相搏是以淚出疼痛治宜疏風活血服神效補肝散回回頭痛外障按此證乃回教之人以水洗浴從頭倒澆至足其濕發漬於頭上冷風侵入睛中以致頭痛目系凝滯瘀血眼弦緊急大抵頭為諸陽之會陽為火宜散而不宜伏目為氣血之宗宜暖而不宜寒既受冷濕所傷乃成凝痛之病宜洗輪散當歸白朮羌活山梔牛蒡甘草旋螺突起外障按此證皆因臟腑俱勞積伏熱毒以致攻衝於目睛珠忽然腫硬突出如癰如疽流膿流血俱已潰損不治之證只可消腫定痛而已轆轤轉關外障按此證皆因肝臟風熱邪毒兼以原患瘡毒餘毒未盡上攻於頭害走空竅目稟臟腑之精凝結而成毒攻其間不即發出自根底壅長瘀肉將珠托出眶外脹大如瘤掛於顴上睛珠不能轉動瞳人直視胞瞼還自啓閉雖無疼痛等證斷不能治日久加以七情鬱結毒邪攻急忽然痛腫破裂而已蓋直視者太陽經絶也不獨目不能治命亦隨之而傾胞肉凝脂外障按此證皆因脾胃二經感伏風熱淫邪凝血在內不散攻於上下胞紫黑浮腫閉不能開如膠黏膩先服祛風散黃耆當歸茯苓元參蒼朮白芷防風姜活菊花茺蔚子藁本甘草鐮洗瘀血服勝風散點烏金膏並靈光散婦女經水過多外障按此證皆因行經去血過多或血崩漏血産後下血過多以致肝脾虧損蓋肝藏血脾統血二經既傷則血少火盛遂有上炎之患攻衝頭目致令頭痛目暗珠疼淚流赤澀生翳如粟米魚鱗陷下先服芎歸補血湯當歸川芎生地天冬熟地白芍防風甘草白朮牛膝四制香附丸酒鹽童便醋四制香附當歸白芍熟地川芎人參黃柏白朮澤蘭葉益母草煉蜜丸每服三錢空心白湯送下一方少人參白朮點琥珀散八寶散婦女經血逆流外障按此證皆因心脾傷損凡室女童子積想在心不得遂志思慮過度多致勞損心神男子則神色敗女子則經水閉邪火上炎逼血錯經妄行逆注於目烏珠上下紅如血灌甚者烏睛周圍如胬肉生起若血翳包睛相似須服通經破血湯川芎生地黃連甘草連翹蘇木甘菊花歸尾赤芍黃芩羌活大黃紅花劉寄奴元明粉木賊草使翳膜自消而經血調順後點琥珀散並八寶散小兒疳眼外障按此證皆因過食生冷麵食兼之飢飽不均以致脾胃傷損日積月纍釀而成病腠理不密令目怕日羞明眵多流膿珠痛生翳或陷下或生蟹睛腮下瘰癧口疳好啼善飢肌肉消瘦身熱發黃肚腹疼痛治當理脾胃平肝木切忌寒涼通利之劑先服茯苓燥濕湯人參白朮蔓荊子羌活甘草白茯苓防風前胡枳殼獨活柴胡川芎蒼朮澤瀉蘇薄荷人參啓脾丸人參白朮茯苓山藥蓮肉陳皮澤瀉甘草山楂肉用荷葉煮老米糊丸如桐子大每服三五十丸清米飲送下九味蘆薈丸蘆薈蕪荑當歸川芎白芍甘草胡黃連廣木香龍膽草煉蜜丸重一錢臨臥清米湯送下若初起目瞪無神睛皺如蠶腹腹大下痢紅白乃不治之候不久當殞小兒胎元外障按此證皆因其母懷孕過食五辛熱毒之物或浴水過熱感受熱毒攻及小兒之目致生下時兒目即病或一二月而病或百日之外始病皆系胎毒未散其證疼痛淚出赤澀難睜羞明怕日烏睛生翳突起如黑豆甚則紅腫不開眵淚如糊宜服除熱飲甘菊花茺蔚子知母黃芩木賊草元參大黃防風竹葉十片為引燥濕湯亦有食乳母熱毒之乳而病者小兒斜視外障按此證皆因痘後痧後風邪入腦致令目繫帶轉故睛珠不能正視亦有驚振所傷者宜服消風散防風通聖散荊芥薄荷桔梗川芎白朮石膏甘草大黃防風連翹黃芩當歸白芍滑石山梔芒硝水煎食後服大便不實者減硝黃兼養血之劑外障門主方服礬法如遇每年常患火眼之人傳服此法奇驗每逢冬令交四九第一日起每早吞生明礬五七分如此九日可保一年不患火