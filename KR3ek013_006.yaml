積於胸中出於喉嚨以貫心肺而行呼吸焉營氣者泌其津液注之於脈化而為血以營四末內注五臟六腑以應刻數焉衛氣者出其悍氣之剽疾而行於四末分肉皮膚之間而不休者也又云中焦之所出亦並胃中出上焦之後此所受氣者泌糟粕蒸津液化為精微注於肺脈乃化而為血以奉生身莫貴於此聖人諄復其辭而不憚煩者仁天下後世之心亦惓惓矣故飲食失節寒溫不適脾胃乃傷此因喜怒憂恐損耗元氣資助心火火與元氣不兩立火勝則乘其土位所以病也調經篇云病生陰者得之飲食居處陰陽喜怒又云陰虛則內熱有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故為內熱脾胃一傷五亂互作初病遍身壯熱頭痛目眩肢體沉重四肢不收怠惰嗜臥為熱所傷元氣不能運用故四肢困怠如此聖人著之於經謂人以胃土為本成文演義互相發明不一而止粗工不解讀妄意施用本以活人反以害人今舉經中言病從脾胃所生及養生當實元氣者條陳之生氣通天論云蒼天之氣清淨則志意治順之則陽氣固雖有賊邪勿能害也此因時之序故聖人傳精神服天氣而通神明失之內閉九竅外壅肌肉衛氣散解此謂自傷氣之削也陽氣者煩勞則張精絶闢積於夏使人煎厥目盲耳閉憒憒乎若壞都故蒼天之氣貴清靜陽氣惡煩勞病從脾胃生者一也五常政大論云陰精所奉其人壽陽精所降其人夭陰精所奉謂脾胃即和穀氣上升春夏令行故其人壽陽精所降謂脾胃不和穀氣下流收藏令行故其人夭病從脾胃生者二也六節藏象論云脾胃大腸小腸三焦膀胱者倉廩之本營之居也名曰器能化糟粕轉味而出入者也其華在唇四白其充在肌其味甘其色黃此至陰之類通於土氣凡十一臟皆取決於膽也膽者少陽春生之氣春氣升則萬化安故膽氣春升則餘臟從之膽氣不升則飧泄腸澼不一而起矣病從脾胃生者三也經云天食人以五氣地食人以五味五氣入鼻藏於心肺上使五色修明聲音能彰五味入中藏於腸胃中味有所藏以養五氣氣和而生津液相成神乃自生謂之氣者上焦開發宣五穀味熏膚充身澤毛若霧露之溉氣或乖錯人何以生病從脾胃生者四也豈特四者天地之邪氣感則害人五臟六腑乃形氣俱虛乃受外邪不因脾胃虛弱賊邪不能獨傷人則病從脾胃而生者愈明矣聖人意旨重見疊出詳明如此且垂戒云法於陰陽和於術數飲食有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去由是言之則人之飲食起居之際可不慎哉論瘡瘍虛實夫瘡疽膿潰腫毒浸淫證候危惡者須辨虛實況夫虛者難補實者易瀉補瀉之法不可輕用若或少差利害甚大然而虛實多端有瘡之虛實有臟腑虛實有血氣虛實又有上實下虛真虛邪實者不可不辨也夫腫起堅硬膿稠者瘡疽之實也腫下軟漫膿稀者瘡疽之虛也瀉利腸鳴飲食不入嘔吐無時手足並冷脈弱皮寒小便自利或小便時難大便滑利聲音不出精神不爽者悉臟腑之虛也大便硬小便澀飲食如故腸滿膨脹胸膈痞悶肢節疼痛口苦嗌乾煩躁多渴身熱脈大精神昏塞者悉臟腑之實也如膿水清稀瘡口不合聚腫不赤肌寒肉冷自汗色脫者氣血之虛也腫起色赤寒熱疼痛皮膚壯熱膿水稠黏頭目昏重者氣血之實也頭痛鼻塞目赤心驚咽喉不利口舌生瘡煩渴飲冷睡語咬牙者上實也精滑不斂大便自利腰腳沉重睡臥不寧者下虛也肩項不便四肢沉重目視不正睛不了了食不知味音嘶聲敗四肢浮腫者真氣之虛也焮腫尤甚痛不可近積日不潰寒熱往來大便祕澀小便如淋心神煩悶恍惚不寧者邪氣之實也又曰真氣奪則虛邪氣盛則實又曰諸痛為實癢為虛也又曰診其脈洪大而數者實也微細而軟者虛也虛則補之和其氣托裡也實則瀉之疏利而自導其氣也內經謂血實則決之氣虛則掣引之元戎云若人氣血壅盛營衛充滿抑遏不行腐化而為癰者當泄之以奪盛熱之氣若人飲食少思精神衰弱營衛短澀寒搏而為癰者當補之以接虛怯之氣此治虛實之大法也瘡疽動息自寧飲食知味脈證俱緩緩則治本故可以王道和平之藥徐而治之亦無不愈若脈實焮腫煩躁寒熱脈證俱實非硝黃猛烈之劑不能除投以王道之劑則非也若瘡瘍聚腫不潰潰而膿水清稀或泄利腸鳴飲食不入嘔吐無時或手足並冷此脈證俱虛非大補之藥不能平投以硝黃攻伐之劑亦非也故治其證者當辨表裡虛實隨宜治之庶得萬全準繩論瘡瘍五善七惡救援法程山齡曰或問癰疽五善七惡何謂也答曰五善者飲食知味一也便溺調勻二也膿潰腫消膿水不臭三也神氣清爽動息自寧四也脈息有神不違時令五也七惡者大渴發熱泄瀉淋閉一也膿潰仍腫膿水臭穢二也目睛無神語聲不亮三也食少不化服藥作嘔四也恍惚嗜臥氣短乏力背如負石五也唇青鼻黑面目浮腫六也脈息無神或躁動不和七也古語云五善得三則吉七惡得四則凶不待四矣然而急救之法正不容以不講大抵熱渴淋閉喘急內熱皆真陰受傷宜用六味湯加麥冬五味如不應用八珍湯加麥冬五味更不應用十全大補湯兼服六味地黃丸此補陽生陰之説也若氣促倦怠昏憒乏力飲食不化乃陽虛之候宜用補中益氣湯若睡臥不寧宜用歸脾湯若飲食減少面目浮腫宜用香砂六君子湯若兼脾胃虛寒更用理中湯腎氣虛寒須用桂附八味丸兼用十全大補湯加附子此溫補回陽之法也若癰疽潰後膿血太多變為角弓反張手足搐搦肢體振搖而發癰者急宜用參耆歸朮附子等藥以救之如不應用十全大補湯間有可生者當此時勢性命急如懸縷司命者宜叮嚀反復熟思而審處之耳十法蔣示吉曰五善七惡方書俱載然亦不止於此也如膿成不自出失導引者死膿成不針烙反敷藥者死熱痛正甚失治則毒內攻者死毒內攻後不服藥反針烙者死潰而至於透內膜者死遺喉者死未潰而陷面青唇黑便汙者死陰入腹入囊者死高腫不託里反用下藥者死漫腫不內托反用寒涼攻利者死潰後誤用寒涼致瘡紫黑者死潰後誤用辛散發痓者死穿膜穿腮者死上蝕鼻梁下穿咽喉者死故治者不可不早亦不可不審也説約李東垣曰大抵證候瘡疽之後虛中見惡證者不可救也實證無惡候者自愈大凡膿潰之後而煩疼尚未痊者診其脈洪滑粗散者難療微澀遲緩者易痊此善惡之證於診候之中亦可知矣發背腦疽及諸惡瘡則有五逆之證者白睛青黑而眼小服藥而嘔傷痛渴甚膊項中不便音嘶色敗者是為五逆其餘熱渴痢嘔蓋毒氣入里臟腑之傷也當隨證以治之十書薛立齋曰夫瘡瘍之證有五善有七惡五善見三則瘥七惡見四則危夫善者動息自寧飲食知味二便調勻膿潰腫消膿鮮不臭神彩精明語聲清朗體氣和平是也此屬腑證病微邪淺更能慎起居節飲食勿藥自愈惡者乃五臟虧損之證多因元氣虛弱或因膿水出多氣血虧損或因汗下失宜營衛消爍或因寒涼克伐氣血不足或因峻厲之劑胃氣受傷以致真氣虛而邪氣實外似有餘而內實不足法當純補胃氣多有可生不可因其惡遂棄而不治若大渴發熱或泄瀉淋閉者邪火內淫一惡也竹葉黃耆湯氣血俱虛八珍湯加黃耆麥冬五味山萸如不應佐以加減八味丸煎服膿血既泄腫痛尤甚膿色敗臭者胃氣虛而火盛二惡也人參黃耆湯如不應用十全大補湯加麥冬五味目視不正黑睛緊小白睛青赤瞳子上視者肝腎陰虛而目系急三惡也六味丸料再加炒山梔麥冬五味如不應用八珍湯加炒山梔麥冬五味喘粗短氣恍惚嗜臥者脾肺虛火四惡也六君子湯加大棗生薑如不應用補中益氣湯加麥冬五味心火刑剋肺金人參平肺散陰火傷肺六味丸加五味煎服肩背不便四肢沉重者脾腎虧損五惡也補中益氣湯加山藥山萸五味如不應用十全大補湯加山茱萸山藥五味不能下食服藥而嘔食不知味者胃氣虛六惡也六君子湯加木香砂仁如不應急加附子聲嘶色敗唇鼻青赤面目四肢浮腫者脾胃俱虛七惡也補中益氣湯加大棗生薑如不應用六君子湯加炮薑更不應急加附子或用十全大補湯加附子炮薑腹痛泄瀉咳逆昏憒者陽氣虛寒氣內淫之惡證也急用托裡溫中湯後用六君子湯加附子或加薑桂溫補此七惡之治法也此外更有潰後發熱惡寒作渴或怔忡驚悸寤寐不寧牙關緊急或頭目赤痛自汗盜汗寒戰咬牙手撒身熱脈洪大按之如無或身熱惡衣欲投於水其脈浮大按之微細衣厚仍寒此氣血虛極傳變之惡證也若手足逆冷肚腹疼痛泄利腸鳴飲食不入厄逆嘔吐此陽氣虛寒氣所乘之惡證也若有汗而不惡寒或無汗而惡寒口禁足冷腰背反張頸項徑強此血氣虛極變痙之惡候也急用參耆歸朮附子救之間有可生者大抵虛中見惡證者難治實證無惡候者易治宋時齊院令雖嘗纂其狀而未具其因陶節庵雖各立一方亦簡而未悉余故補其缺云胡公弼曰癰有證合七惡皮緊急而知善氣足而血未附也疽有證合五善皮緩虛而知惡血附而氣未充也論瘡瘍發熱惡寒煩躁頭痛夫瘡瘍初起未潰膿時有發熱惡寒者乃營衛不行經絡阻塞瘡毒焮發之所為也如已潰之後膿血大泄未有不虛者也經曰陽微即惡寒陰弱還生熱是也丹溪曰惡寒非寒是衛氣虛衰不能溫分肌肉實於腠理而惡寒者又有上焦之邪鬲絶營衛不能升降出於表而惡寒者東垣曰夜則惡寒晝則安靜是陰血自旺於陰分也有日夜惡寒而不發熱者是重陰無陽也當泄其陰而峻補其陽也又夜則安靜晝則惡寒是陰盛而上溢於陽分也如晝則發熱夜則安靜是陽氣自旺於陽分也晝則安靜夜則發熱是陽氣下陷入陰分也名曰熱入血室如晝夜俱發熱煩躁是重陽而無陰也當亟泄其陽而峻補其陰王注云病熱而脈數按之不鼓動乃寒盛格陽而致之非熱也形證俱寒而脈鼓擊於手下者此為熱甚拒陰而生病非寒也如脈浮數而弱惡寒者陽氣虛也宜補氣如脈澀而熱者血虛也宜補血又午前發熱宜補氣午後發熱宜補血如脈浮數發熱而痛者邪在表宜散之脈沉數發熱而痛者邪在裡宜下之又法候之以手捫摸分輕重五法以輕手按之於皮毛間熱者肺熱也微重於肌肉間熱者脾熱也再微少重於血脈間熱者心熱也又重手按之於血脈之下筋骨之間者肝熱也又至重按之於骨分其熱蒸手如火其人骨蘇蘇如蟲食其骨困熱不任其身亦不能起於床者腎熱也又一法十二經候之於十二時中發熱形證可推亦隨證施治無不驗耳薛立齋曰夫瘡瘍發熱煩躁或出血過多潰膿大泄或汗多亡陽或下多亡陰以致陰血耗散陽無所依浮散於肌表之間而非火也若發熱無寐血虛也用聖愈湯兼汗不止氣虛也急用獨參湯發熱煩躁肉瞤筋惕氣血虛也用八珍湯大渴面赤脈洪大而虛陰虛發熱也用當歸補血湯肢體微熱煩躁面赤脈沉而微陰盛發躁也用四君子湯加薑附東垣曰晝發熱而夜安靜是陽氣自旺於陽分也晝安靜而夜發熱是陽氣下陷於陰中也如晝夜俱發熱者重陽無陰也當峻補其陰故王太僕云如大寒而甚寒之不寒是無水也熱動復止倏忽往來時動時止是無水也當助其腎是心盛則生熱腎盛則生寒腎虛則寒動於中心虛則熱收於內又熱不勝寒是無火也寒不勝熱是無水也夫寒之不寒責其無水熱之不熱責其無火熱之不久責心之虛寒之不久責腎之弱治者當深味之汪省之曰凡瘡瘍膿血大泄當大補氣血為先雖有他證當末治之故癰疽潰後發熱惡寒者皆屬氣血虛甚若左手脈不足補血藥當多於補氣藥右手脈不足者補氣藥當多於補血藥切不可發表以犯虛虛之禍故東垣曰七情皆能動火各經之熱不同宜分治之戴院使曰未潰之際憎寒壯熱狂言妄語如見鬼神膿去已多而大熱不休者似為難治蓋毒之得膿猶傷寒表證之得汗汗已而反大熱則為壞傷寒矣又云患癰毒人膿血已潰所去過多津液枯竭多病於渴縱有發熱躁擾等證不可妄治宜用益榮生津之劑若大熱不止者難治李東垣曰癰疽發熱惡熱大渴不止煩躁肌熱不欲近衣脈洪大按之無力或目痛鼻乾者非白虎湯證也此血虛發躁宜當歸補血湯主之張景嶽曰用手摸熱有三法以輕手捫之則熱重按之則不熱是熱在皮毛血脈也重按之至筋骨之分則熱蒸手極甚輕手則不熱是邪在筋骨之間也不輕不重按之而熱是熱在筋骨之上皮毛血脈之下乃熱在肌肉也張仲景曰脈虛則血虛血虛生寒陽氣不足也又曰寸口脈微為陽不足陰氣上入陽中則灑淅惡寒尺脈弱為陰不足陽氣下陷入陰中則發熱也又曰陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒又曰陽氣有餘為身熱無汗此言表邪之實也又曰陰氣有餘為多汗身寒此言陽氣之虛也又曰發熱惡寒者發於陽也無熱惡寒者發於陰也又曰極寒反汗出身必冷如冰此與經旨義相上下經曰陰勝則陽病陽勝則陰病陽勝則熱陰勝則寒張仲景曰寒邪在表者必身熱無汗以邪閉皮毛也又曰寒邪客於經絡必身體疼痛或拘急而酸者以邪氣亂營氣血脈不利也又曰寒邪在表而頭痛者有四經焉足太陽經脈最長挾於頭頂其痛居多足陽明脈上至頭維足少陽脈上行兩角三陰經無頭痛三陰至頸而還何得頭痛厥陰脈與督脈上會於巔頂都攝諸陽故有頭痛也惟太陰少陰皆無頭痛之證然厥陰頭痛亦不常見必嘔吐涎沫內無熱證乃直中也當溫之又曰寒邪在表多惡寒者蓋傷於此者必惡此所謂傷食惡食傷寒惡寒也又曰太陽經脈起自內眥上頂巔下項挾脊行腰膕故邪在太陽者必惡寒發熱而兼頭項痛腰脊強或膝臑痠痛也又曰陽明經脈起目下循面鼻行胸腹故邪在陽明者必發熱微惡寒而兼目痛鼻乾不眠也又曰少陽為半表半裡之經其脈繞耳前後由肩井下協肋故邪在少陽者必發熱而兼耳聾脅痛口苦而嘔或往來寒熱也又曰身雖微熱而濈濈汗出不止及無身體痠痛拘急而脈不緊數者此熱非在表也又曰證似外感不惡寒反惡熱而絶無表證者此熱盛於內也又曰表實者或為發熱或為身痛或為惡熱掀衣或為惡寒鼓栗寒束於表者無汗火盛於表者有瘍走注而紅痛者知營衛之有熱拘急而痠痛者知經絡之有寒又曰陽實者多熱惡熱陰實者為痛結而寒氣實者氣必喘粗而聲色壯厲血實者血必凝聚而且痛且堅又曰表虛者或為汗多或為肉戰或為怯寒或肢體多見麻木目暗羞明耳聾眩暈又曰陽虛者火虛也為神氣不足為眼黑頭眩或多寒而畏寒陰虛者水虧也為亡血失血為戴陽為骨蒸勞熱又曰病人身大熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也若內熱之甚者亦每多畏寒此當以脈證參合察之又曰陽邪在表則表熱陰邪在表則表寒陽邪在裡則裡熱陰邪在裡則裡寒邪在半表半裡之間而無定處則往來寒熱又曰邪氣在表發熱者表熱里不熱也宜溫散之邪氣在裡發熱者裡熱散而達於外也宜清之又曰陽不足則陰氣上入陽中而為惡寒陰勝則寒也宜溫之陰不足則陽氣陷入陰中而為發熱陽勝則熱也宜清之又曰寒熱往來者陰陽相爭陰勝則寒陽勝則熱也蓋熱為陽寒為陰表為陽里為陰邪之客於表者為寒邪與陽相爭則為寒栗邪之傳於裡者為熱邪與陰相爭則為熱躁其邪在半表半裡之間者外與陽爭則為寒內與陰爭則為熱或表或里或出或入是以寒熱往來也此半表半裡之證也故凡寒勝者必多寒熱勝者必多熱但審其寒熱之勢則可知邪氣之淺深也經曰陽微則惡寒陰弱則發熱仲景曰人身外為陽為表寒屬陰邪今表虛為寒所乘名曰陰盛陽虛蓋陽不能溫其膚衛於外致令空虛雖居密室亦引衣自蓋謂之惡寒陰盛陽虛汗之自愈故惡寒屬表假熱在肌膚必裸體煩躁是曰惡熱又焉得為惡寒若見惡寒知寒在肌膚急投甘辛之劑可也又曰寒鬱腠理則閉塞而發熱翕翕然烙手此熱止在皮膚而內無熱名曰表病里和內經諸證亦論凡風寒客人使人毫毛畢直皮膚閉而為熱當汗又云體若燔炭汗出而解又熱病論云人傷於寒則為熱病若大汗其熱解矣以上各條瘡瘍而兼外感者當以此辨之論瘡瘍痛癢麻木經曰諸痛癢瘡瘍者皆屬心火火之為物能消爍萬物殘敗百端故也蓋人之肌膚附近火灼則為瘡若肉近火則痛微遠則癢此火之用也或有癢痛如針尖輕刺者猶飛迸火星灼之然也然瘡瘍時炙之以火漬之以湯而癢轉甚者是微熱助之所使也有因而不癢者是熱令皮膚舒緩腠理開通陽氣得泄熱氣易散矣故不癢也有癢用冷水沃之暫時少退良久復大癢者乃寒主收斂陽氣鬱結不得散越沸熱內作故復癢轉甚也又癢得抓而解者抓主動動為陽陽屬火化故輕輕抓而能癢亦火之微也重重抓則癢去者是皮膚抓得辛辣而屬金化辛能散故金化見火力而解故不癢也經曰痛者為實癢者為虛非為虛寒之虛乃火熱微甚之意也又有瘡瘍麻木而不知痛癢者是氣虛而不運又兼瘡毒壅塞經絡不通致令麻木而不知有無也亦分輕重耳蓋麻者木之輕木者麻之重也假如人坐久之腿膝木而不知有無少頃舒伸良久復疏則麻乃壅之少氣通血復行之意也大抵未潰之先有麻木者毒塞輕重之分也已潰之後而有麻木者乃肌肉腐爛血氣已虧是虛之輕重也張景嶽曰凡癰毒焮腫赤痛之甚者雖內治之法已具於前然煎劑功緩而痛急難當者必須外用敷藥既欲其止痛必欲其敗毒則無如降癰散之神妙也又曰膿出反痛者虛也李東垣曰夫瘡疽之證候不同寒熱虛實皆能為痛止痛之法殊非一端世人皆謂乳沒珍寶之藥可住痛疼殊不知臨病制宜自有方法蓋熱毒之痛者以寒涼之劑折其熱則痛自止也寒邪之痛以溫熱之藥尉其寒則痛自除矣因風而有痛者除其風因濕而痛者導其濕燥而痛者潤之塞而痛者通之虛而痛者補之實而痛者瀉之因膿鬱而閉者開之惡肉侵潰者引之陰陽不和者調之經絡祕澀者利之臨機應變方為上醫不可執方而無權也十書澄曰癰疽疼痛有五種初起者氣凝血聚也宜活血行氣已成跳痛者此肉腐作膿也宜內托排膿將潰誤敷涼藥痛者宜用芳香之藥淋溻之已潰膿出反痛者虛也宜補氣血潰後穢氣所觸而痛者宜乳沒解之其痛自止論瘡瘍作渴竇漢卿曰夫瘡瘍作渴若焮痛發熱便利調和者上焦熱也用竹葉石膏湯腫痛發熱大便祕澀者內臟熱也用四順清涼飲焮腫痛甚者熱毒蘊結也用仙方活命飲漫腫微痛者氣血虛壅也用補中益氣湯若因胃火消爍而津液短少者用竹葉黃耆湯若因胃氣虛而不能生津液者用補中益氣湯若因胃氣傷而內亡津液者用七味白朮散若因腎水乾涸作渴或口舌乾燥者用加減八味丸最妙或先口乾作渴小便頻數而後患疽或疽愈後口渴飲水或舌黃乾硬小便數而疽生者尤其惡也苟能逆知其因預服加減八味丸補中益氣湯以滋化源可免是患疽安服此丸則渴止安而未渴者服此丸永不發渴或未疽而先渴者服此丸不惟渴止而疽亦不作朱丹溪曰夫瘡瘍作渴不言食味起火怒氣生火房勞激火吾恐渴亦未易言止也精要曰口渴與口乾不同不宜妄用丹藥鎮墜禍如反掌惟取桑枝同五味子煎湯飲之以救陰水甚妙馮魯瞻曰夫癰疽愈後忽發渴而不救者十有八九或先渴而患疽者尤為難治故宜多服八味丸非特杜絶渴疾抑亦大滋氣血生長肌肉申鬥垣曰夫渴者乃消爍津液因熱極生渴心火煎燔所致如瘡瘍未潰而作渴者是瘡毒熾盛其心肺脈必洪數實大者宜降火清金芩連內疏之劑如尺脈洪大而無力者宜滋陰降火大補氣血等藥或獨參湯如潰後氣血大虛而生渴證者十有八九宜用黃耆六一湯加減八味丸但癰疽已發已潰未潰加減八味丸治之均有大效如無癰疽而肺脈洪數甚作渴者必發癰疽此其候也伍氏云瘡作渴甚急與神仙追毒丸取下惡物如利後仍渴卻用生津藥津液生氣血充渴自止精要用嫩桑枝細切一升炒水煎日服五七劑更止大渴多服尤妙如治腎水枯涸口燥舌乾用五味子湯即耆草六一湯生脈湯合用其效如神張景嶽曰凡內熱之甚則大渴喜冷冰水不絶而腹堅便結脈實氣壯者此陽證也又曰凡口雖渴而喜熱不喜冷者此非火證中寒可知既非火證何以作渴乃水虧故也又曰凡病人問其渴否則曰口渴問其欲湯水否則曰不欲蓋其內無邪火所以不欲湯水真陰內虧所以口無津液此口乾也非口渴也不可以干作渴治又曰凡陽邪雖盛而真陰又虛者不可因其火盛喜冷便雲實熱蓋其內水不足欲得外水以濟水涸精虧真陰枯也必兼脈證細察之此而略差死生立判余嘗治垂危最重傷寒有如此者每以峻補之劑浸冷而服或以冰水人參熟附等劑相間迭進活人多矣常人見之咸以為奇不知理當如是何奇之有然必其乾渴燥結之甚者乃可以參附涼水並進若無實結不可與水如癰疽亦不可與涼水並進也又曰裡熱熏灼臟腑必口渴便閉或下利腸垢而小水短赤論瘡瘍欲嘔作嘔厄逆薛立齋曰夫瘡瘍作嘔不可泥於毒氣內攻而概用敗毒等藥如熱甚焮痛邪氣實也仙方活命飲解之作膿焮痛胃氣虛也托裡消毒散膿熟脹痛氣血虛也先用托裡散後用針以泄之焮痛便祕熱蘊於內也內疏黃連湯導之若因寒藥傷胃而嘔者托裡建中湯胃寒少食而嘔者托裡益中湯虛寒淫而嘔者托裡溫中湯肝木乘脾而嘔者托裡抑青湯胃脘停痰而嘔者托裡清中湯脾虛自病而嘔者托裡益黃湯鬱結傷脾而嘔者托裡越鞠湯若不得詳究其源而妄用攻毒之藥則腫者不能潰潰者不能斂矣丹溪雖曰腫瘍時嘔當作毒氣攻心治之潰瘍時嘔當作陰虛補之殊不知此大概之言耳即內經諸痛癢瘡皆屬心火之意況今之熱毒內攻而嘔者寡脾胃虛寒而嘔者多豈可執前聖之言而藥今人之病歟劉河間曰夫瘡瘍時嘔當作濕氣侵胃倍用白朮朱丹溪曰諸逆上衝嘔噦皆屬於火然治嘔須分先後腫瘍時當作毒氣上攻治之潰瘍後當作陰虛補之馮魯瞻曰夫癰疽嘔逆有二一因初起失於內托伏熱在心一因脾氣不正伏熱在脾在心者則心煩身熱焮腫作痛脾氣不正者則不煩熱但聞穢氣便嘔故治癰疽多用香藥者蓋氣血聞香則行聞臭則逆瘡瘍多因營氣不從逆於肉裡鬱結為膿得香則氣血流行凡瘡本腥穢又聞臭觸則愈甚若毒入胃則嘔噦古人用之可謂有理即如飲食亦須調令香美以益脾土養其真元可保無虞矣申鬥垣曰夫嘔者有聲無物謂之嘔是氣病也有物無聲謂之吐是血病也凡瘡瘍腫痛之時即有嘔聲或吐當診其脈如洪數實大或便祕不喜冷飲者宜降火清中黃連解毒湯如喜熱飲而惡寒者作嘔便利如常宜養胃調中湯如脈微細腸鳴腹痛作泄而嘔者托裡溫中湯二神丸再以香砂六君子湯治之飲食頓進十全大補湯亦可有患瘡瘍未潰而作嘔及噁心者乃瘡毒之甚內攻胃氣原虛故有此證宜六君子湯加香砂生薑治之如瘡瘍已潰而作嘔作惡心者或不食痞滿腸鳴腹痛大便利作嘔及噦聲不絶不得安眠昏憒時發宜托裡溫中湯治之內經曰寒淫於內治以辛溫佐以苦溫薑附能溫中外陽氣自里之表故為君羌活苦辛溫能透關節耳竇漢卿曰夫厄逆乃胃中虛冷之極宜香附丁沉丹溪曰內托散性涼治嘔有降火之理即護心丹精要云嘔逆有二證一證謂初發不曾服內托散伏熱在心宜內托一證謂氣虛脾氣不正宜嘉禾散朱丹溪曰治嘔須分先後腫瘍時當作毒氣上攻治之潰後當作陰虛治之若年老因疽潰後嘔逆不食者宜參耆白朮膏峻補取效薛立齋曰熱毒內攻而嘔者寡脾胃虛寒而嘔者多當脈證辨之楊氏曰鼻衄初愈不曾表汗毒在經絡則背發大疽自肩下連腰脅腫硬如石其色紫黑以涼藥投之終夜大嘔連進內托散嘔止李東垣曰嘔吐無時手足厥冷臟腑之虛也婁全善治一男子腫瘍嘔諸藥不止用獨參湯一服嘔即止薛立齋曰喜熱惡寒而嘔者宜溫養胃氣喜寒惡熱而嘔者宜降火南院使戴元禮曰如噁心者無聲無物欲吐不吐欲嘔不嘔雖曰噁心實非心經之病皆在胃口止宜用生薑蓋能開胃豁痰也張景嶽曰豫嘗飲食少思吞酸噯腐諸藥不應惟服理中湯及附子理中丸有效蓋此證皆因中氣虛寒不能運化鬱滯所致故用溫補之劑使中氣溫和自無此證矣胡公弼曰若氣血兩虛發嘔而舌尖乾燥者必死蔣示吉曰脾胃將傾則飲食作嘔宜六君子湯加木香砂仁不應加附子説約經曰諸吐嘔酸水及水液渾濁者皆屬熱諸嘔吐涎澄徹清冷者皆屬寒如天寒則水清天熱則水濁之義又有胃熱胃寒之分辨之以口渴與不渴耳論瘡瘍喘急王肯堂曰癰疽喘急恍惚嗜臥此心火刑肺金宜用人參平肺散面赤者不治準繩論瘡瘍大便瀉利夫瘡瘍大便泄瀉或因寒涼克伐脾氣虧損或因脾氣虛弱食不克化或因脾虛下陷不能升舉或因命門火衰不能生土或因腎經虛弱不能禁止或因脾腎虛寒不能司職所主之法若寒涼傷脾用六君子加木香砂仁送二神丸脾虛下陷用補中益氣送二神丸命門火衰用八味丸料送四神丸腎虛不禁用薑附湯加吳萸五味脾腎虛寒用參附湯送四神丸病機云脈沉而細身不動作睛不了了飲食不下鼻準氣息者薑附湯主之身重四肢不舉者參附湯主之仲景云下痢腸鳴當溫之脈遲緊痛未止當溫之大孔痛當溫之心痛當救里可與理中附子四逆輩精要云癰疽嘔瀉腎脈虛者不治此發內經之微旨也凡此實難治之證如按前法治之多有可生者論瘡瘍大便祕結東垣云瘡瘍熱毒深固嘔啘心逆發熱而煩脈沉而實腫硬木悶大便祕結此毒在臟宜疏通之故曰疏通其內以絶其源又曰瘡瘍及諸病面赤雖伏火熱不得妄攻其里而陽氣拂鬱邪氣在經宜發表以去之故曰火鬱則發之凡大便不通飲食雖多肚腹不脹切不可通若腹痞脹而不通者乃直腸乾涸也宜用豬膽導之若腸胃氣虛血涸而不通者宜用十全大補湯培養之若瘡證屬陰或因入房傷腎而不通者宜用前湯加薑附回陽多有得生者經云腎開竅於二陰藏精於腎津液潤則大便如常若潰瘍有此因氣血虧損腸胃乾涸當大補為善設若不審虛實而一於疏利者鮮有不誤又曰凡病人大腸乾燥當用蜜導法或膽導法聽其在床隨便出之不可扶起若大腸乾燥脹掙則瘡口鮮血突出此肝不藏血故也申鬥垣曰大凡瘡瘍皆由五臟不和六腑壅滯則令經絡不通而生焉瘡初起未潰之先腫焮大痛脈洪數實大欲作膿時大便祕結宜托裡倍加硝黃即發表攻裡之劑是也如已潰後脈微芤數澀者乃膿血出多氣血衰弱宜八珍湯聖愈湯內加桃仁火麻仁當歸少加熟地以潤之如弱甚以膽汁導之更妙切不可以巴豆牽牛驅逐峻厲之藥復傷元氣致生變證薛立齋曰若飲食雖多大便不通而肚腹不脹者此內火消爍切不可通之若肚腹痞脹而直腸乾涸不通者宜用豬膽汁導之若誤行疏利復傷元氣則不能潰斂張景嶽曰後陰乃大腸之門而其通與不通結與不結可察陽明之虛實凡大便熱結而腹中堅滿者方屬有餘通之可也若新近得解而不甚乾結或旬日不解而全無脹意者便非陽明實邪觀仲景曰大便先硬後溏者不可攻可見後溏者雖有先硬已非實熱矧夫純溏而連日得後者又可知也若非真有堅燥痞滿等證則原非實邪其不可攻也明矣又曰大便通水穀之海腸胃之門戶也小便通血氣之海衝任水道之門戶也二便皆主於腎本為元氣之關必真見實邪方可議通議下否則最宜詳慎不可誤攻使非真實而妄逐之導去元氣則邪之在表者反乘虛而深陷病因內困者必由泄而愈虧所以凡病不足慎勿強通最喜者小便得氣而自化大便彌固者彌良營衛既調自將通達即大腸祕結旬余何慮之有若滑泄不守乃非虛弱者所宜當首先為之防也導大便祕結法蜜導法用白蜜四兩火上煎熬四五沸其色黃取出干磁盆內待其凝急分四分每分手搓作棗子形狀長一寸其蜜導頭須要光滑恐傷肛門用油潤之徐徐塞入少頃再加一條旋增以去後為度膽導法用豬膽一枚膽口中放鵝毛管一根扎緊以一頭鵝毛管插入肛門逞勢一捻其膽汁衝入肛門大便即行矣又方生藥何首烏四兩石臼搗碎沖滾湯絞汁隔湯燉熱頓服即通治五六十日大便祕結不通用鮮蘆根一籮搗汁澄清煨多年老鴨吃湯即解論瘡瘍小便淋漓頻數不利竇漢卿曰夫瘡瘍小便淋漓或莖中澀者腎經虧損之惡證也宜用加減六味丸以補陰足脛逆冷者宜用八味丸以補陽若小便頻而黃者宜用四物湯加參朮麥冬五味以滋肺腎若小便短而少者宜用補中益氣加山藥麥冬五味以補脾肺若熱結膀胱而不利者宜用五淋散以清熱若脾氣燥而不能化者宜用黃芩清肺飲以滋陰若膀胱陽虛陰無以化者宜用滋腎丸腎虛之患多傳此證非滋化源不救若用黃柏知母反瀉其陽以速其危若老人陽痿思色元精內敗莖中作痛而不利者用加減八味丸加車前牛膝不應更加附子多有復生者若精已竭而復耗之大小便中牽痛愈痛則愈便愈便則愈牽痛以前藥加附子亦有復生者王太僕云無陰則陽無以化無陽則陰無以生當滋其化源苟專用淡滲復損真陰乃速其危也張景嶽曰傷寒而小水利者以太陽之氣未劇即吉兆也又曰凡小便人但見其黃便謂是火而不知人逢勞倦小水即黃焦思多慮小水亦黃瀉痢無期小水亦黃酒色傷陰小水亦黃但非有或淋或痛熱證相兼不可因黃便謂之火余見逼枯汁而斃人者多矣經曰中氣不足溲便為之變義可知也若小水清利者知里邪之未甚而病亦不在氣分以津液由於氣化氣病則小水不利也小水漸利則氣化可知最為吉兆論瘡瘍無寐肉瞤筋惕夫瘡瘍潰後無寐發熱煩躁血虛也聖愈湯自汗不止無寐氣虛也四君子加黃耆五味子發熱煩躁肉瞤筋惕血虛也八珍湯大渴面赤脈洪大而浮陰虛發熱也當歸補血湯肢體微熱煩躁面赤脈沉微陰盛發躁也四君子加薑附論瘡瘍出血夫瘡瘍出血因五臟之氣虧損虛火動而錯經妄行也當求其經審其因而治之若肝熱而血妄行者四物加炒梔丹皮苓術肝虛而不能藏血者六味地黃丸心虛而不能生血者四物加炒連丹皮苓術脾虛熱而不能統血者四君加炒梔丹皮若脾經鬱結用歸脾湯加五味子脾肺氣虛用補中益氣加五味子氣血俱虛用十全大補陰火動用六味丸加五味子大凡失血過多見煩熱發渴等證勿論其脈急用獨參湯以補氣經曰血生於氣苟非參耆歸術甘溫等劑以生心肝之血決不能愈若發熱脈大者不治凡患血證皆當以犀角地黃湯為主東垣曰形氣有餘病氣有餘當瀉不當補形氣不足病氣不足當補不當瀉論瘡瘍類破傷風大凡癰疽潰後筋糜肉爛膿血大泄陽隨陰散或筋脈拘急惡寒惕搦甚者舌強口噤項背反張痰涎壅盛便閉出汗不時發熱此氣血俱虛而傳變雖與破傷風相類而主治之法當大補氣血若果系風證亦須以大補氣血為本而兼以治風之藥若不審是非而妄藥之則誤矣澄曰男婦小兒但是額顱眉囟耳項無論是瘡是癤潰後俱要用膏封貼不可經風露若不慎頭面必發腫宜外用紅升丹膏蓋提之內服荊防殭蠶天麻白芷等味散之自愈論瘡瘍散走流注大凡氣血不調經絡不通復感六氣七情故毒氣乘風熱而走是也此證因風盛而生熱之證熱極氣盛氣因熱之極而走於四散急宜疏風定熱則風自息若元氣盛初發者速以艾灸七壯四圍敷藥內服流氣飲無不愈者若流注於腿腳者死無疑矣論瘡瘍攣急牽陰入腹圖經古方療惡瘡癰腫或連陰髀間疼痛急攣牽入小腹不可忍者一宿則殺人用茴香苗葉搗取汁一升服之日三四用其滓以貼上冬月根亦可用此海外方永嘉以來用之起死神效準繩論瘡瘍目斜視上王肯堂曰癰疽目斜視上黑睛緊小白睛青赤此肝挾火邪也準繩蔣示吉曰宜六味地黃丸料加山梔麥冬北五味子治之説約論瘡瘍發痙痙當作痓夫瘡瘍發痙因氣血虧損外邪所摶或內虛鬱火所致其證牙關緊閉四肢徑強或腰背反張肢體抽搐其有汗而不惡寒者曰柔痙風能散氣故有汗也其無汗而惡寒者曰剛痙寒能澀血故無汗也皆由亡血過多筋無所養故傷寒汗下過多與潰瘍産後多患之乃敗證也若大補氣血多有復生者若作風治速其危矣論瘡瘍四肢逆冷王肯堂曰四肢逆冷乃胃氣虛寒也準繩澄曰寒熱之厥辨在何處蓋寒厥四肢逆冷過乎肘膝指甲青脈沉細無力有寒證見於外若熱極而厥者火極似水雖厥而指甲尚溫不似寒厥過乎肘膝脈來沉實大而有力以此為辨寒厥瘡必灰白下陷熱厥瘡必紫暗乾枯論瘡瘍胸痞王肯堂曰忿怒胸痞肝氣滯也倦怠胸痞中氣虛也胸滿多痰脾氣虛也準繩書曰凡胸痞身上半屬陽身下半屬陰胸前乃清陽之分非物也若腹滿者是有物而非邪氣也但痞氣亦脹滿胸前何以別之曰痞氣因邪在表誤用硝黃巴豆牽牛下之以致胸脹必問其人曾經下否若經下過即是痞氣未經下而胸前脹滿者即半表半裡證論瘡瘍陽氣脫陷夫瘡瘍陽氣脫陷或因克伐之劑或因膿血大泄或因吐瀉之後或因誤而入房若發熱頭疼小便淋澀或滑數便血目赤煩喘自汗發熱氣短頭暈體倦熱渴意欲飲水投水惡寒憎寒身熱惡衣揚手擲足汗出如水腰背反張鄭聲不絶此無根虛火之假熱證或畏寒頭痛咳逆嘔吐耳聵目蒙小便遺難瀉利腸鳴裡急腹痛玉莖短縮冷汗時出齒牙浮腫肢體麻痹或厥冷身痛或咬牙齧唇舌根強硬此陽氣脫陷之真寒證皆勿論其脈勿論其瘡但見一二急用參附湯補之多有復生者大凡潰後勞碌元氣虧損或夢遺精脫或滑數便血或外邪乘之或誤用寒涼氣血脫陷而致斯證治以前藥亦有復生者論瘡瘍僵肉梅氏曰凡治背瘡肉長疾嫩皮不及裹見風即成僵肉速以寒水石燒研為細末傅瘡上再用銅緑細末上之肉即不作僵矣準繩論瘡瘍瘡口黑暈瘡內無血色凡瘡口黑暈而無血色者乃涼藥太過宜用沖和膏加肉桂當歸溫活死血則黑暈自退也如顏色未復原仍以沖和膏敷之論瘡瘍瘡毒入內罨夫瘡之始發肉色未辨經絡初滯之時宜表散以托裡之劑使經絡易通而毒氣亦散則毒氣引令外出為順內經云汗之則瘡已俾營衛通行妙在斯矣有等庸俗之人不知斯理而自高傲強自內疏不知脈浮在表之理反使邪毒內罨如傷寒證當汗而誤下之義同以致外如麻而里如瓜憎寒壯熱邪已內攻惟有急以蒜灸以接其陽引毒外出更以托裡大劑治之或有可生者常見有瘡疥之人熏燃捻子等藥亦令入內俱自取傷生之禍爾論瘡瘍面赤不得攻下夫瘡瘍面赤雖伏大熱禁不得攻裡為陽氣怫鬱邪氣在經宜發表以去之故曰火鬱則發之雖大便祕結只宜多發其表以發散陽火少加潤燥之藥若見風脈風證只可用發表風藥便可以通利也若只乾燥祕澀只宜潤之亦不可下論瘡瘍治法當分緩急凡患瘡瘍或泄瀉或出汗或不進飲食或夜不寐宜先治內證內證一愈則外證易痊此乃急則治標之法膏圍二藥仍照舊用之勿缺論瘡瘍補瀉不可倒施東垣云夫癰疽得之有內外之別治之有寒溫之異受之外者法當托裡以溫若反用寒藥則是以皮毛之邪引入骨髓矣受之內者法當疏利以寒若反用溫劑托裡則是以骨髓之病上徹皮毛矣是必表裡通潰共為一瘡助邪為毒苦楚百倍輕則令危重則死矣論瘡瘍輕證用重劑夫人身氣血有虛實瘡瘍所發有輕重治療之法有攻補元戎云若人氣血壅盛營衛充滿抑遏不行腐化而為癰者當泄之以奪盛熱之氣若人飲食少思精神衰弱營衛短澀寒摶而為癰者當補之以接虛怯之氣丹溪云腫瘍內外皆虛宜以補接行散為主大抵用藥之法如執權衡當察病勢輕重邪蓄表裡瘡毒腫潰元氣虛實若不詳究其因率爾投治實實虛虛七惡之禍不能免矣治者審之論瘡瘍寒熱逆從用藥法嘗見治寒以熱而寒彌甚治熱以寒而熱彌熾何也假如心實生熱者當益其腎腎水滋熱自除腎虛生寒者補益其心心火降寒自退此所謂寒之而熱者取之陰熱之而寒者取之陽也又寒因熱用熱因寒用要在通其理而已又聞微者逆之甚者從之蓋治寒以熱必涼藥以行之治熱以寒必溫藥以導之此亦欲其藥性之調和也其間有正有權者因病有微甚微者逆治理之正也甚者從治理之權也論瘡瘍用汗下藥仲景云治傷寒有汗吐下三法東垣云治瘡瘍有疏通托裡和營衛三法用之得宜厥疾瘳矣假如瘡瘍腫硬木悶煩熱便祕脈沉而實其邪在內當先疏其內以下之焮腫作痛便利調和脈浮而洪其邪在表當先托其里以汗之元戎云營衛充滿抑遏而為癰者當泄之以奪盛熱之氣營衛虛弱壅滯而為癰者當補之以接虛怯之氣東垣又云瘡瘍雖面赤伏熱不得攻裡裡虛則下利仲景又云瘡家雖身體疼痛不可發汗汗之則發痙苟不審詳妄為汗下以致血氣虛損毒反內陷少壯者難以潰斂老弱者多致不救論瘡瘍附子不可輕用夫附子味辛而甘氣溫大熱有大毒製法以童便煮而浸之再用文武火以烈其毒且可助下行之力入鹽尤捷此佐使之藥通行諸經其性善走而不守浮中沉無所不致陽中之陽故行而不止用之得宜有奪旗斬將之功用之不宜有殺身殞命之禍每人參一錢為君止可下附子一二分為使再加甘草以解其毒內外之證遇嚴寒時候瘡口沉塌四肢厥冷寒濕疼痛痿躄拘攣膝痛不能行步腰脊風寒伏陰傷寒方可下附子不審陰陽虛實一概用之使人服後火鬱中焦氣鬱下焦咆哮喘急頃刻而斃凡用附子者豈可不細審之乎又曰解附子毒令多吸新水連飲數碗遂大嘔泄方解其毒此又不可不知也論瘡瘍當舍時從證薛立齋曰經云諸痛癢瘡瘍皆屬心火若腫赤煩躁發熱飲冷便祕作渴脈洪數實是其常也雖在嚴寒之時必用大苦寒之劑以瀉熱者若脈細皮寒瀉利腸鳴飲食不入嘔吐無時手足逆冷是變常也雖在盛暑之時必用辛溫之劑以助陽氣內經云用寒遠寒用熱遠熱有假者反之雖違其時必從其證王肯堂曰如腫赤煩躁發熱引冷便祕作渴脈洪數實是為五實雖在嚴寒之時必用大苦寒之劑瀉其陽以救其陰若脈細皮寒瀉利腸鳴飲食不入嘔吐無時手足逆冷是為五虛雖在盛暑之時必用大辛熱之劑散其陰以回其陽若執泥常法則誤矣準繩張景嶽曰愚意羅先生以舍時從證之法垂訓後人誠百世不磨之要道也但時之遷變本所難知而證之幽顯尤不易識何也蓋常人之所謂時者春夏秋冬之時也歲歲時常之主氣也誰不得而知之而不知五六周環則長夏有寒淫之令三冬有炎暑之權此則雖若舍時而實以從時昧者固能知此乎又如察證之法則凡脈細皮寒泄瀉厥冷之類是皆已見之寒證也又誰不得而知之不知其來有源有甚有漸即諸證未見之前而本來已具此際便難錯認使必待焦頭爛額而後曲突徙薪則已晚矣此羅先生之所以明已然則余更為慮未然蓋恐人之見之遲而無及於事也雖然余常見今人之於已然者尚不能見而復欲其見未然誠哉過矣然余慨然之念則不能不道其詳而深望於知音者論瘡瘍用香散藥伍氏曰氣血聞香則行聞臭則逆大抵瘡瘍多因營氣不從逆於肉理故郁聚為膿得香散藥則氣流行故當多服五香連翹湯萬金散清心內固金粉散凡瘡本腥穢又聞臭觸則愈甚者若毒氣入胃則為咳逆古人用此可謂有理且如飲食調令香美則益脾土養真元保其無虞矣澄曰脾喜馨香藥品香燥固能行氣散郁若真陰不足虛火上炎素多痰火之人又所當禁又曰潰後瘡瘍生肌藥中務須少加冰麝蓋冰麝香竄多用則走泄真氣反令瘡口難斂又曰潰後忌房內焚燒安息沉香燒則瘡口燥癢又曰潰後忌佩香囊離宮錠等物不獨耗散真氣且恐引動相火遺泄論瘡瘍泥用止痛藥薛立齋曰夫瘡瘍之作由六淫七情所傷而痛也因氣血凝滯所致假如熱毒在內便祕而作痛者內疏黃連湯導之熱毒熾盛焮腫而作痛者黃連解毒散治之不應仙方活命飲解之瘀血凝滯而作痛者乳香定痛散和之作膿而痛者托裡消毒散排之膿脹而痛者針之膿潰而痛者補之若因氣虛而痛四君加歸耆血虛而痛四物加參耆腎虛而痛六味地黃丸口乾作渴小便頻數者加減八味丸此皆止痛之法也丹溪云膿出而反痛此為虛也宜補之穢氣所觸者和解之風寒所逼者溫散之若泥用乳沒斯執方矣李東垣曰夫瘡疽之證候不同寒熱虛實皆能為痛止痛之法殊非一端世人皆謂乳沒珍寶之藥可住疼痛殊不知臨病制宜自有方法蓋熱毒之痛者以寒涼之劑折其熱則痛自止也寒邪之痛者以溫熱之藥尉其寒則痛自除矣因風而有痛者除其風因濕而痛者導其濕燥而痛者潤之塞而痛者通之虛而痛者補之實而痛者瀉之因膿鬱而閉者開之惡肉浸潰者引之陰陽不和者調之經絡祕澀者利之臨機應變方為上醫不可執方而無權也十書論瘡瘍輕投十宣散等劑今人有瘡瘍不審元氣虛實病之表裡病者多喜內消而醫者即用十宣散及敗毒飲流氣飲之類殊不知十宣散雖有參耆然防風白芷厚朴桔梗皆足以耗氣況不分經絡時令氣血多少而概用之乎敗毒散乃發表之藥果有表證亦止宜一二服多則元氣反損其毒愈盛雖有人參莫能補也況非表證而用之乎流氣飲乃耗血之劑果氣結膈滿亦止宜二三服多則血氣愈傷夫血氣凝滯多由營衛氣弱不能運行豈可復用流氣飲以益其虛況諸經氣血多寡不同而流氣飲通行十二經則諸經皆為所損反為敗證雖有耆歸亦難倚仗若服之過度則氣虛血耗何以成膿苟不察其由而泛投克伐之劑能無危乎此三方者其不可輕用亦明矣河間云凡瘡止於一經或兼二經者止當求責其經不可干擾余經也論瘡瘍未潰不宜概用敗毒之藥夫瘡瘍之證當察經之傳受病之表裡人之虛實而攻補之假如腫痛熱渴大便祕結者邪在內也疏通之腫焮作痛寒熱頭痛者邪在表也發散之焮腫痛甚者邪在經絡也和解之微腫微痛而不作膿者氣血虛也補托之漫腫不痛或不作膿或膿成不潰者氣血虛甚也峻補之色黯而微腫痛或膿成不出或腐肉不潰者陽氣虛寒也溫補之若泥其未潰而概用敗毒復損脾胃不惟腫者不能成膿而潰者亦難收斂七惡之證蜂起多致不救丹溪云腫瘍內外皆壅宜以托裡表散為主如欲用大黃寧無孟浪之非潰瘍內外皆虛宜以托裡補接為主如欲用香散未免虛虛之失治者審之論煎藥必得其法凡煎藥必須擇親信誠謹老實之人洗淨新藥罐用新汲甜水為上慢火煎熬紗絹濾渣取清汁服之不可近燈火之下吃藥過口之物酸味過口則藥味甘甜甜物過口則藥味轉苦又不宜服冷藥脾喜熱冷則不能運行患在上不厭頻而少少服則滋榮於上患在下不厭頓而多多服則峻補於下病在頭面頸項臂膊者先食而後藥病在胸膈心下肚腹膀膝者先藥而後食病在四肢者陽中之陽須服藥於旦病在骨髓陰中之陰須服藥於夜論雜忌須知凡病時忌怒忌疑慮忌身體不潔人來看忌魚羊鵝肉燒酒麵食生冷瓜果醃臘等物瘡口斂百日後不作渴者方可入房凡一切癰疽瘡腫毒證將欲好之時如往有喪人家弔孝並拜望等項其瘡腫即復發切忌切忌凡癰疽大證雖有姬妾不得豔裝相見每見癰疽潰後大肉已生姬妾往來雖無交接之事而欲念一動精已離宮每致虛陷喘急而亡者數人病者當惜生命不可不為拒絶也論醫者宜避瘡毒侵襲凡視瘡瘍穢氣甚臭聞之則噁心難忍毒深者最能染人須先用綿紙塞鼻孔食薑蒜燒酒充飽之物以敵穢氣切不可空心視之吃蒜酒後不可口對瘡上恐穢氣觸瘡上令患者作痛論藏揩膿水穢紙法凡揩膿水垢紙必須入一竹籃中挂透風處但腐肉瘀膿皆人之氣血所變者日中曬之則瘡口痛放在濕處則膿水不幹待平愈之後用乾柴一束燒之
