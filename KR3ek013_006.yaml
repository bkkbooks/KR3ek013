body:
  text: 卷六論辨純陽瘡瘍法純陽初起必焮腫更兼身熱有微寒頂如尖字高凸起腫似彎弓根有盤七日之間多焮痛二七之期膿漸漫動息自寧食知味二便調勻無瀉干腫消膿潰精神爽腐脫新生氣血完五善自然臻並至七惡全無半點干痛隨膿減腫退肌寬此屬純陽俱易治百人百可保全安正宗初起頂高根活色赤發熱焮腫疼痛日漸高腫者順已成焮痛皮薄光亮飲食如常二便調和身溫者順已潰膿稠色鮮不臭腐肉自脫焮腫易消身輕者順潰後膿厚稠黃新肉易生瘡口易斂飲食漸進者順論辨純陰瘡瘍法純陰初起不知瘡粟米之形疙瘩僵不紅不腫不知痛少熱少焮少提防七朝之後身體倦瘡根平大喜洗湯頂不高兮根不活色不光兮腐不穰軟陷無膿空結聚脈浮數大細飛揚飲食不餐身戰戰嘗湯止許意茫茫瘡上生衣如脫甲孔中結子似含芳膿多臭穢身難便舉動愴惶韻不長瘡形成紫黑面色變青黃精神昏憒多鼾睡言語無人自發揚口乾多舌強痰喘定身亡此屬純陰俱不治百人百可到泉鄉正宗初起頂平根散色暗微腫不熱不疼身體倦怠者險已成腫堅色紫不作膿不腐潰惟口乾多煩躁者逆已潰皮爛肉堅不腐腫仍不減心煩者逆潰後膿水清稀腐肉雖脫新肉不生色敗臭穢者死論辨半陰半陽瘡瘍法陰陽之證二相交生死相兼事可昭微熱微寒微赤腫半昏半爽半平高脈來雖數多無力飲食雖餐便不調腫而不潰因脾弱潰而不斂為膿饒大便多溏小便數上身有汗下身焦五善雖兼有七惡未全逃口渴喜茶腸腹痛面浮厭飲足心高心煩不穩睡神亂怕音焦投方應命方為妙陰轉為陽漸可調逢之任是神仙手半死餘生定莫逃正宗澄曰癰疽之候純陽固多純陰原少惟半陽半陰之證最多全在醫者留心不可忽略蓋陰陽兼半之證若從辛溫之劑內服外敷則陰氣潛消轉為陽證若從清涼外敷或用冷蜜蛋清調藥塗敷內投苦寒敗毒之劑則陽氣冰伏變為純陰之證吉凶反掌醫家病家均宜警省論陽瘡毒似陰瘡經曰諸痛癢瘡瘍皆屬心火但亦有初起色紫赤而腫痛脈沉細數而惡寒喜暖非真寒也乃火極似水陽極生陰亢則害承乃制之理或平時富貴享用厚味服金石等藥致之故陽極似陰始熱終寒之變宜順其時而內服疏托瀉心等劑治之則愈矣澄曰假寒者火極似水也凡瘡瘍初起熱甚失於汗解以致陽邪亢極鬱伏於內則邪自陽經傳入陰分故為身熱發厥神氣昏沉或是畏寒狀若陰證凡真寒本畏寒而假寒亦畏寒此熱深厥亦深熱極反兼寒化也大抵此證必聲壯氣粗形強有力或唇焦舌黑口渴飲冷小便赤澀大便祕結或因多飲藥水以致下利純清水而其中仍有燥糞及失氣極臭者察其六脈必皆沉滑有力此陽證也若雜證也假寒者亦或為畏寒或為戰栗此以熱極於內而寒侵於外則寒熱之氣兩不相投因而寒栗此皆寒在皮膚熱在骨髓所謂惡寒非寒則是熱證但察其內證則或為喜冷或為便結或小水之熱澀或口臭而躁煩察其脈必滑實有力凡見此證即當以涼隔芩連之屬助其陰而清其火使內熱既除則外寒自伏所謂水流濕者亦此義也故凡身寒厥冷其脈滑數按之鼓擊於指下者此陽極似陰即非寒也論陰瘡毒似陽瘡夫瘡之始發於陰於陽豈有定規調護失宜致令陰陽偏勝即有變生之患如毒之初起筋攣骨痛之時經曰此寒氣之腫八風之變當以表散之使邪易散而毒易消不知治此再以內疏之劑敷以寒涼或食冷物使瘡毒內陷陰極而方生陽氣漸悶令人煩悶譫語微渴其脈沉細而數治宜補中益氣湯而加溫暖之藥治之斯為上工矣張景嶽曰陰極反能躁熱乃內寒而外熱即真寒假熱也假熱者水極似火也凡癰疽有因素稟虛寒偶感邪氣而然者有過於勞倦而致者有過於酒色而致者有過於七情而致者有原非火證因誤服寒涼而致者凡真熱本發熱而假熱亦發熱其證則亦面赤躁煩亦為大便不通小便赤澀或為氣促咽喉腫痛或為發熱脈見緊數等證昧者見之便以為熱妄投寒涼下咽必斃不知身雖有熱而裡寒格陽或虛陽不斂者多有此證但其內證而口雖乾渴必不喜冷即喜冷者飲亦不多或大便不實或先硬後溏或小水清頻或陰枯黃赤或氣短懶言或色黯神倦或起倒如狂而禁之則止自與登高罵詈者不同此虛狂也或斑如蚊迹而淺紅細碎自與紫赤熱極者不同此假斑也凡假熱之脈必沉細遲弱或雖浮大緊數而無力無神此乃熱在皮膚寒在臟腑所謂惡熱非熱實陰證也凡見此內頽內困等證而但知清涼攻邪敗毒則無有不死急當四逆八味回陽湯之類倍加附子填補真陽以引火歸原但使元氣漸復則熱必退藏而病自愈所謂火就燥者即此義也故凡見身熱脈數按之不鼓擊者此皆陰盛格陽即非熱也東垣曰面赤目赤煩躁引飲脈七八至按之則散者此無根之火也以薑附湯加人參主之仲景曰治少陰證面赤者以四逆湯加蔥白主之外臺祕要曰陰盛發躁名曰陰躁欲坐井中宜以熱藥治之論陰陽法凡診視癰疽施治必須先審陰陽乃為醫道之綱領陰陽無謬治焉有差醫道雖繁而可以一言蔽之者曰陰陽而已故證有陰陽脈有陰陽藥有陰陽以證而言則表為陽里為陰熱為陽寒為陰上為陽下為陰氣為陽血為陰動為陽靜為陰高聳為陽平塌為陰焮腫為陽灰白為陰收束為陽散漫為陰疼痛為陽麻木為陰有膿為陽無膿為陰多言者為陽無聲者為陰喜明者為陽欲暗者為陰陽微者不能呼陰微者不能吸陽病者不能俯陰病者不能仰以脈而言則浮大滑數之類皆陽也沉微細澀之類皆陰也以藥而言則升散者為陽斂降者為陰辛熱者為陽苦寒者為陰行氣分者為陽行血分者為陰性動而走者為陽性靜而守者為陰此皆醫中之大法至於陰中復有陽陽中復有陰疑似之間須辨的確此而不識極易差訛是又最為緊要然總不離於前之數者但兩氣相兼則此少彼多其中便有變化一皆以理測之自有顯然可見者若陽有餘而更施陽治則陽愈熾而陰愈消陽不足而更用陰方則陰愈盛而陽斯滅矣設能明徹陰陽則醫理雖玄思過半矣道産陰陽原同一氣火為水之主水即火之源水火原不相離也何以見之如水為陰火為陽象分冰炭何謂同原蓋火性本熱使火中無水其熱必極熱極則亡陰而萬物焦枯矣水性本寒使水中無火其寒必極寒極必亡陽而萬物寂滅矣此水火之氣果可呼吸相離乎其在人生是即元陰元陽所謂先天之元氣也欲得先天當思根柢命門為受生之竅為水火之家此即先天之北闕也舍此他求如涉海問津矣學者宜識之凡人之陰陽但知以氣血臟腑寒熱為言此特後天有形之陰陽耳至若先天無形之陰陽則陽曰元陽陰曰元陰元陽者即無形之火以生以化神機是也性命系之故亦曰元氣元陰者即無形之水以長以立天癸是也強弱系之故亦曰元精元精元氣者即化生精氣之元神也生氣通天惟賴於此經曰得神者昌失神者亡即此之謂今之人多以後天勞欲伐及先天今之醫只知有形邪氣不知無形元氣夫有形者迹也盛衰昭著體認無難無形者神也變幻倏忽挽回非易故經曰粗守形上守神嗟乎又安得有通神明而見無形者與之共談斯道哉天地陰陽之道本貴和平則氣令調而萬物生此造化生成之理也然陽為生之本陰實死之基故道家曰分陰未盡則不遷分陽未盡則不死華元化曰得其陽者生得其陰者死故凡欲保生重命者尤當愛惜陽氣此即以生以化之元神不可忽也曩自劉河間出以暑火立論專用寒涼戕此陽氣其害已甚賴東垣先生論脾胃之火必須溫養然尚未能盡斥一偏之謬而丹溪復出又立陰虛火動之論制補陰大補等丸俱以知柏為君寒涼之弊又復盛行夫先受其害者既去而不返後習而用者猶迷而不悟嗟乎法高一尺魔高一丈若二子者謂非軒岐之魔乎非敢誹謗先輩實冀夫盡洗積陋以蘇生民之厄耳論瘡瘍分五方治法不同經曰東西南北中五方人之土産厚薄居處高下風寒暑濕各地不同日用谷蘖頗異所以黃帝舉五方之問岐伯進五治之功針砭溻淋灸之法乃五方得宜之用兼之年力衰壯稟賦厚薄五土之別學者當詳察之不可不備也澄曰歷觀古人書集有專主辛溫者有專主寒涼者有專主施攻伐者有純用補益者豈各成一家耶皆緣五方風土不齊西北方苦寒故多主辛溫東南方炎熱多主寒涼地土強厚者堪以攻伐水土薄弱者固多補益是以聚覽群書必須體會各家著書義旨以廣其用故醫者經歷其地必先察其風土厚薄並須留心四時氣候如春當溫而反寒夏當熱而反涼秋當涼而反熱冬當寒而反溫皆為四時不正之氣必多遏鬱於中又當看天時久陰久亢及非時之雷霧乍寒乍熱有是氣必有是病臨病體察天時人事五方風土當溫當涼當攻當補自無不當矣論肥人瘡瘍夫肥人多濕多痰多氣虛形體外實者外雖多肉其實內虛凡體豐氣虛之人瘡瘍故多癰癰者壅也屬陽在表氣虛即表虛故多浮腫於外皮薄色赤宜內托之使邪毒不內陷則易潰而易斂丹溪云肥人宜二陳湯加參耆歸朮銀花連翹等類治之無出於此又曰大凡體肥則肉潭於氣加之斫喪則真氣不足以維持平日語言氣短行動喘急一遇膿血出多空火陡發精散神離每多暴脫論瘦人瘡瘍夫瘦人多火多血虛血虛即陰虛陰虛則火盛火盛則發熱筋骨瘦而不勝於寒蓋皮寬肉緩如生瘡瘍則多疽疽者沮也屬陰因榮血受邪凝注不從正是陰滯於陽血滯於氣則為疽也又云疽乃五臟之毒癰為六腑之毒故疽多附於骨肉色不變故難於潰潰而難斂治宜八珍湯中加金銀花連翹附子之類加減治之論嬰孩瘡瘍嬰孩之輩乃氣血未充筋骨未堅脾胃尚脆凡有癰疽多是胎毒或母不慎調護致令血氣壅滯多生瘡腫只宜內托內疏湯劑和緩之藥不可用大猛峻之劑有傷胃氣外有無辜疳毒不同大人治法只宜消疳大補之劑即安澄曰嬰孩皮肉嬌嫩不可輕用白降丹不但疼痛難經且易焮腫嚇人又曰小兒瘡毒切勿妄用水銀輕粉硫黃收斂毒氣每致殺人論痘後瘡瘍或問小兒痘已出盡胎毒已化復生瘡疽疔毒是何氣使然答曰胎毒雖化氣血已虧皆由失於調護致令陰陽壅塞經絡營氣不從逆於肉裡乃生癰腫疔毒變生異證亦皆有之何況瘡瘍乎故痘後不可不慎調護也澄曰每見小兒痘後月餘忽發癰疽咸謂痘漿不足餘毒為害殊不知痘後氣血未復脾胃失調所致若妄用敗毒清涼之品內服外敷則鮮有不危者必須培補氣血扶脾內托可消自消即潰亦易於斂口論妊娠瘡瘍大凡婦人有孕忽生瘡疽疔毒始發當已潰未潰之時須知雙身而用藥豈比常人如砒硇巴麝之類有犯於胎禁及硝黃大下之藥焉可混用止宜調氣養血安胎托裡之劑可保無虞此乃攸關生死之大要不可不知也澄曰凡看婦人瘡瘍須先問明月信如已懷孕不得妄用皂針山甲桃仁紅花冰麝大黃巴霜等味冀其消散設經水適至亦不得大發其汗論産後瘡瘍大凡婦人生産之後氣血大虧之際而感受七情六淫致令營衛不行逆於肉裡乃生癰腫況元氣不足豈可輕投巴硇慓悍之劑只宜大補氣血托裡八珍湯丸內少加溫暖藥使營衛通行毒氣消散無不安矣不然反致虛損瘡亦敗壞潰而不斂多致不救新産半月左右忽發癰腫於四肢胸腹者是敗血不盡流滯經絡或氣血虛弱營氣不從逆於肉裡也如敗血瘀滯者則焮腫赤痛而脈弦洪有力當補血行血之中佐以導瘀疏氣為主如氣血虛弱營澀衛逆者則平塌散漫而脈虛微無力當大補氣血為主如十全八珍之屬以固本元扶胃氣氣壯血和其毒自解若以毒治而用清涼解毒勢必不膿不潰變成壞證矣論師尼孀婦處女瘡瘍治法不同此輩雖云牝體豈異於妻妾乎雖無房室常有憂思之苦欲心蒙而不遂有失交歡氣血欠和陰陽乖戾凡有瘡瘍治法亦異雖內托補中必須調經舒郁安神之藥隨證治之為當澄曰此等人所患癰疽瘰癧失營乳痞陰𧈟等證生於厥陰少陽部位者居多皆緣抑鬱不舒所求不遂群火沸騰真陰銷爍施治之法專主養血舒郁寧神兼用托裡排膿之品庶可保無變證更有愆期處女鬱結於中而成瘡瘍者又當勸其父兄早為完配俾天地和而雨澤降夫婦和而家道成畢姻之後未潰者每多消散久不斂者亦易於收功矣論瘡瘍三因受病主治不同三因者內因外因不內外因此説從於先古其詞意尚有發而未盡者內因者皆起於七情蘊結於內又兼厚味膏粱熏蒸臟腑房欲勞傷虧損元氣乃五臟受之其病由此內發者但發之多在富貴人及肥胖者十有八九其見證瘡多堅硬根蒂深固二便不調飲食少進外軟內堅平陷無膿表實裡虛毒多難出得此者即病證之內傷也故曰內因外因者皆起於六淫體虛之人夏秋露臥當風取涼坐眠濕地以致風寒濕氣襲於經絡又有房事後得之其寒毒乘虛深入骨髓與氣血相凝者尤重或外感風寒發散未盡遂成腫痛此肌肉血脈筋骨受之其病由此外來者發之多在不善調攝澆薄勞碌人十有八九見證多寒熱交作筋骨疼痛步履艱辛濕痰流毒以及諸風癱瘓口眼歪斜半身不遂風濕風溫天行時毒等證得此者即疾病之外感也故曰外因又有不內外因內無七情干內外無六淫傷外何由來也其病得之於飢飽勞役喜怒不常飲食者冷熱不調動作者勤勞不惜以致臟腑不和營衛不順脾胃受傷經絡凝滯故為疾者外無六經形證內無便溺阻隔其病多生於膜外肉裡肌膚之間如瘰癧痰注氣痞癭瘤之屬治法不必發表攻裡只當養氣血調經脈健脾和中行痰開鬱治之法為最善此是三因理之盡矣論醫者膽大心小薛立齋曰大抵病有淺深效有遲速亦有陰虛陽實呼吸轉移醫者須要膽大心小膽欲大者有決斷之才識見之能當刺則刺當攻則攻不宜攻刺者止之則能知標本矣心欲小者有救義之心無苟取之念富者辭之傷廉貧者取之傷惠須要見利思義庶稱醫職澄曰膽欲大者非不辨虛實陰陽不察穴道虛怯妄施刀針溷投攻伐橫行放膽罔顧病人性命必須臨證時先看初起時病者元氣虛實次看瘡之陰陽險否然後用藥調治當攻即攻可補便補不可因循耽誤致令變態不虞認得真確膽量方可放大若臨證不多妄用刀針亂施攻補則誤事不淺矣論分經絡部位氣血多寡王肯堂曰人身之有經絡猶地理之有界分治病不知經絡猶捕賊不知界分其能無誅伐無過之咎乎況手足十二經絡有氣血多少之分如手少陽三焦足少陰腎足太陰脾多氣少血手厥陰心包絡手太陽小腸足太陽膀胱多血少氣手陽明大腸足陽明胃多氣少血此其大較也多血少氣者易愈多氣少血者難療氣多之經可行其氣血多之經可破其血不可執一也朱丹溪曰臀居小腹之後而又在其下此陰中之陰也其道遠其位僻雖曰太陰經多血少氣多血氣運不到氣既不到血亦罕來中年已後不可生癰才有痛腫參之脈證但見虛弱便與滋補血氣無虧可保終吉若用尋常驅熱拔毒舒氣之藥虛虛之禍如指諸掌可不慎歟心法又曰諸經惟少陽厥陰經瘡瘍務宜預防以其氣多血少也其血本少肌肉難長少陽更有相火遽用破毒之劑以伐陰血禍不旋踵劉厚宗曰凡瘡瘍不繫膏粱丹毒火熱之變只因虛勞氣鬱所致止宜補形氣調經脈其瘡當自消散蓋不待汗之下之而已也其不詳脈證經絡受病之異者下之先犯病禁經禁故致失手如此又曰且夫火熱為病亦有微甚所謂君火相火是也瘡瘍所發有癰疽癤癧輕重淺深不同或止發於一經或兼二經者止當求責於一二經不可干擾余經也若東垣處方用藥是已申鬥垣曰夫分經審位用藥當知氣血多少多則易愈少則難痊外科明此大理不致有犯禁忌頽敗壞逆之失也如手少陽三焦經手少陰心經手太陰肺經足少陽膽經足少陰腎經足太陰脾經此六經皆多氣少血凡有瘡瘍最難收口如手厥陰心包絡經手太陽小腸經足太陽膀胱經足厥陰肝經此四經皆多血少氣凡有瘡瘍宜托裡足陽明胃經手陽明大腸經此二經氣血俱多初宜內消收功易得故特表而明之不可一概而論治也啓玄決曰多血多氣君須記手經大腸足經胃多氣少血有六經三焦膽腎心脾肺多血少氣心包絡膀胱小腸肝無異記此則知氣血多少之異矣頭部巔足太陽厥陰督脈頭角直耳上中是少陽中行前直鼻上巔後直須中上巔督脈第二行足太陽一寸五分各開二傍為頭第三行足少陽面部額足少陽陽明鼻手陽明太陽足陽明督脈人中督脈手足陽明唇足陽明足太陰唇內足厥陰承漿足陽明任脈上齒足陽明下齒手陽明舌足太陰少陰目內眥手足陽明手足太陽目鋭眥手太陽手足少陽眉至額直鼻而上督脈直目內眥而上足太陽直目瞳子而上足少陽直鋭眥而上手足少陽頰直目內眥而下足陽明直目瞳子而下足陽明頰車足少陽陽明耳手足少陽手太陽目系手少陰足太陽頸項部項中間督脈拔項大筋中足太陽當完骨下手少陽項大筋之前耳之後也當耳下足少陽當曲頰下手太陽曲頰前一寸手陽明挾喉兩旁動脈足太陽陽明缺盆中任脈咽手太陰少陰足太陰喉嚨足少陰陽明喉嚨後足厥陰肩部前廉手陽明後廉手太陽上廉手足少陽背部中行督脈第二行足太陽第三行足太陽第四行足太陰膺腧部中行任脈第二行足少陰第三行足陽明第四行足太陰腹部中間行任脈第