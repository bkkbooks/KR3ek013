body:
  text: 卷二十八諸風部自油風痛風起至癜瘋麻瘋止皆匯於此部中以便檢閲參治油風門主論陳實功曰油風是血虛不能隨氣榮養肌膚故毛髮根枯脫落成片皮膚光亮癢如蟲行此皆風熱乘虛攻注而然治以海艾湯洗之正宗心法曰此證毛髮乾焦成片脫落皮紅光亮癢如蟲行俗名鬼剃頭由毛孔開張邪風乘虛襲入以致風盛生燥不能榮養毛髮如耽延年久宜針砭其光亮之處出去紫血毛髮庶可復生宜用神應養真丸以治其本外以海艾湯洗之以治其標油風門主方海艾湯油風血虛風熱所致皮膚光亮眉發脫落者海艾薄荷藁本蔓荊子藿香甘松菊花防風荊芥各二錢用水五六碗同藥煎數滾連渣共入敞口鉢內先將熱氣熏面候湯溫蘸洗之留藥照前再洗油風面上及身上俱有不知痛癢壯嶽亶當歸四兩蝨胡麻研碎大生地銅刀切片玉竹各三兩川芎五錢殭蠶炒研白蒺藜炒去刺石菖蒲牡丹皮荊芥防風白芷赤芍藥各一兩上銼片散藥入壇火酒五斤拌勻封壇口如飲時對陳無灰酒飲服此三料無不痊愈神應養真丸熟地酒蒸搗膏當歸天麻羌活宣木瓜川芎菟絲餅白芍蜜丸每服百丸鹽湯或酒服痛風門主論林氏曰或問痛風一證系血虛耶血熱耶熱極生風耶抑風邪客於經絡為痛耶其證與痛痹同耶異耶其痛流走不定者風耶火耶其痛多在經絡關節之間者筋病耶骨病耶死血為病耶痛甚於夜而減於晝者何也輕則三日一移動重則七日一移動者何也甚有痛久而傳為痿痹者又何也答曰痛者氣滯血凝經絡為之阻塞而不通也風者善行而數變乃流走不定之義也蓋風寒濕三氣客於經絡血脈之中未經疏散則鬱久生熱熱極化火而更兼風變其性流走不定伏行於周身經絡血脈之間是為病原自後或因營衛之氣血偶有阻滯於經絡關節之處則此風熱亦因之停阻欲行不行遂至浮腫而痛屈伸亦為之不利或兩三日或五七日此處氣血已通而別處復有稽留則痛亦移換至於衛氣晝則行於陽分之表而營氣亦易運故痛緩夜則衛氣歸陰營氣不行其血脈凝澀而痛甚故此證當責之肝家血少血熱木燥火炎而虛風復從火化也蓋肝藏血肝主筋凡關節皆經脈之總會血虛既不能滋養筋脈而風火反因之阻於脈絡於是浮腫面熱浮屬風熱屬火腫為氣血阻礙每逢濕熱盛行則發實非筋骨與死血為痛也若云筋骨死血其痛定在一處焉能三日七日移換哉此實肝經無形之風熱為病蓋風熱屬火所以善走若寒與濕則又當始終痛於一處矣雖云風熱每得暖氣而痛緩者則虛火之本固寒其性喜暖再則治病之法用甚寒甚熱之藥當以從治從治不已又當求其屬以衰之從與屬者正熱痹得暖而易散之義也若痛久則飲食起居必廢精神氣血亦必因病而虛所以筋骨無力關節不利而成痿痹也活人録又曰或問痛風形證與痹無異如何不附於痹證之末而又別立一門也答曰痛痹本乎寒痛風屬乎風血脈得暖則行得寒則凝寒留脈中久成痛痹況痹者閉也閉塞不通之義所以始終痛在一處非若風之善行而數變者也蓋風氣勝者為行痹故痛風者即痹門之行痹也然其義相似而實不同者乃受病有深淺相沿有新久而病之愈也亦有難易大約風痛每得之於暑濕盛行之時氣血沸騰之際或衣汗衣或臥濕地或汗出迎風或貪涼熟寢於漆器竹席石床之上致暑熱之氣得寒而凝因濕而著遇風而閉由是熱淫所勝反兼風化行於經絡血脈之中移動不定痛止非常非若痹證之為病深久而難愈也又曰形神如故飲食如常脈來洪滑浮弦急數有力而痛甚者實也形神萎弱飲食減少其脈虛弦澀數或微弱無神或虛搏空弦痠痛無力二便不調者虛也又曰治痛風當分別新久虛實及屬風屬火或有濕熱亦能流注經絡關節為痛新者營衛之氣血未虧當以治病為主若痛久而精神不足者以清補兼之濕熱甚者宜燥濕清熱風火甚者宜滋燥養血大補肝陰蓋治風先治血血行風自滅或過用風藥及寒燥之劑反有耗血遏火之患矣錢青掄曰痛風者遍身骨節走注疼痛也謂之白虎歷節風都是血氣風濕痰火皆令作痛或勞力寒水相搏或酒色醉臥當風取涼或臥卑濕之地或雨汗濕衣蒸體而成痛風在上者多屬風在下者多屬濕治當活血疏風消痰去濕羌活湯加減凡治痛風用蒼朮羌活酒芩三味散風行濕之妙藥耳經驗又曰一切痛風肢節痛者痛屬火腫屬濕不可食肉肉屬陽火能助火食則下遺遺溺內生痞塊雖油炒炙熱物魚面切宜戒之所以膏粱之人多食煎炒炙煿酒肉熱物蒸臟腑故患痛風惡毒癰疽者最多肥人多是濕痰瘦人多是痰火周鶴仙曰痛風風入骨中輕則隱隱骨內痛重則遍身骨皆痛也亦有走來走去在骨節間作痛不可忍者此等病雖邪入在骨髓而骨髓屬腎似宜治腎然不可徒治腎也必須治陽明始效陽明經胃經也大腸亦陽明經也論理去陽明之風宜用乾葛去陽明之火宜用石膏知母然邪終在骨髓必須用氣分藥提出氣分然後以補腎藥補其骨髓始能去病宜用黃耆湯主之經曰風寒濕三氣雜至合而為痹也風氣勝者為行痹行痹者行而不定也今稱為走注疼痛俗名流火及歷節風寒氣勝者為痛痹痛痹者疼痛苦楚關節浮腫世稱為痛風及白虎飛尸濕氣勝者為著痹著痹者留著其處而不移世稱為麻木不仁或痛著一處始終不移音是也凡風則陽受之故為痹行寒則陰受之濕則皮肉筋骨受之故為痹著而不去皮膚不仁是以痹從風寒濕之所生也經曰以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰遇此者為肌痹以秋遇此者為皮痹此以所遇之時所客之處命名以時令配五臟所合而言也至陰者六月也又曰其入臟者死其留筋骨間者疼久其留皮膚間者易已又曰痛者寒氣多也有寒故痛也其不痛不仁者痛久入深榮衛之行澀經絡時疏故不痛皮膚不營故為不仁蓋痹在於骨則重在於脈則血凝而不流在於筋則屈不伸在於肉則不仁在皮則寒故此五者則不痛也凡痹之類逢寒則急熱則縱皆由內虛為本可以風名不可以作風治也統旨曰風痹者遊行上下隨其虛邪與血氣相搏聚於關節筋脈弛縱而不收也寒痹者四肢攣痛關節浮腫濕痹者留而不移汗多四肢緩弱皮膚不仁精神昏塞熱痹者臟腑移熱復遇外邪客搏經絡留而不行陽遭其陰故𤸷痹熻然而悶肌肉熱極體上如鼠走之狀唇口反裂皮膚色變經言止有風寒濕三痹此更有熱者蓋郁久成熱熱在三氣之內變生者耳三氣合而為痹則皮膚頑厚或肌肉痠痛此為邪中周身搏於血脈積年不已則成癮疹風瘡搔之不痛頭髮脫落治宜疏風涼血總由榮衛舍虛外邪留居血氣凝結而成也大抵濕多則腫熱多則痛陰虛則脈弦數而重在夜陽虛則脈虛大而重在日馮魯瞻曰痹者閉也五臟六腑正氣為邪所閉則痹而不仁痹雖有五多由體虛之人腠理空疏為風寒濕三氣侵入於皮脈肌筋骨不能隨時驅散留滯於內久而為痹其為病也寒多則掣痛風多則引注濕多則重著然風寒濕三氣客於經絡為病不一或為痛或為癢或為麻痹不仁或為手足緩弱所以然者有新久輕重之分有濕痰死血之異耳治以攻補兼施而標本兼顧也薄桂味薄能橫行手臂領南星蒼朮群藥至痛處成功威靈仙治上體痛風漢防己治下體痛風然虛弱人並當以氣血藥兼之方能有力運行藥力又曰痛風者古名痛痹俗謂之白虎歷節風即四肢骨節走痛也夫氣行脈外血行脈內晝行陽夜行陰各二十五度得寒則行遲而不及得熱則行速而太過內傷外感則疾作矣彼痛風者因血受熱已自沸騰或再陟冷受濕取涼熱血得寒汙濁凝澀榮衛難行堅牢阻礙邪正交戰所以作痛夜痛甚者行於陰也治當以辛烈暴悍之劑流散寒濕開鬱行氣破瘀豁痰舒風和血開發腠理則怫鬱開而血行氣和自愈大約有餘則發散攻邪不足則補養氣血然亦有數種治法不能無異或因風熱或因痰或因風濕或因血虛若濕痰濁血流注為病在下焦而道路遠者非烏附氣壯者不能行故用為引經若以為主治非徒無益也總肢節腫痛因經絡感受風寒郁久成為濕熱流注肢節之內痛者火也腫者濕也其治宜疏風燥濕佐以調補氣血以助藥力運行終以滋養肝腎以壯筋骨堅強此其治也然痛要在勢如刀割尚屬邪正相爭之象若至全然不痛則邪正混為一家相安於無事矣內經論痹四時之令皆能為邪五臟之氣各能受病六氣之中風寒濕居其半所謂雜至與合則知非偏受一氣可以致痹又云風勝寒勝濕勝者則知但分邪有輕重耳皮肉筋骨脈各有五臟之合初病在外多而不去則各因其合而內舍於臟在外者祛之猶易入臟者攻之實難治外者散邪為亟治臟者養正為先治行痹者散風為主禦寒利濕仍不可廢大抵必參以補血之劑蓋治風先治血血行風自滅也治痛痹者散寒為主疏風燥濕仍不可缺大抵必參以補火之劑非大辛大溫不能釋其凝寒之害也治著痹者利濕為主祛風解寒亦不可缺大抵必參以補脾補氣之劑蓋土強可以勝濕而氣足自無頑麻也病退之後內節欲以保精髓慎寒冷以卻外邪戒酒面以杜濕熱服補養以生氣血則病不復發矣又曰痹之為證有筋攣不伸肌肉不仁與風證相似但風則陽受之痹則陰受之故多重著沉痛其三氣之中風氣者為行痹故走而不留不拘上下左右關節之間流走而痛或三日五日又移一處俗名流火又名白虎風言其往來而痛一如虎咬之狀日輕夜重也寒氣勝者為痛痹因血脈寒凝痛在一處而不移俗名白虎飛尸濕氣勝者為著痹上下脈理滯塞不通致令肌肉先麻而後木木而不知痛癢即所謂不仁經又以所遇之時所客筋骨皮肉脈之處而命名非行痛著之外另有骨筋之諸痹也崔紫虛曰風寒濕氣合而為痹浮緊兼澀三脈乃憊則緊澀之脈重痛沉著之證皆純陰也當助陽溫散之藥方為對證靈樞曰衛氣不行則為麻木丹溪曰麻是氣虛木是濕痰死血然則曰麻曰木者以不仁中分而為二也雖然亦有氣血俱虛但麻而不木者亦有虛而感濕麻木兼作者又有因虛而感風寒濕三氣乘之故周身掣痛麻木並作者古方謂之周痹治法宜先汗而後補也當以類而推治然麻木者不仁之漸也麻為木之微木乃麻之甚古方名為麻痹原病式曰麻者亦猶澀也由水液衰少而燥濕氣血壅滯而不得滑澤通行氣強攻衛而為麻也俗方治麻多用烏附者令氣行之暴甚衝開道路得以通利則中氣行而麻自愈矣然烏附止能溫行更必須兼以補養蓋麻木未有不由於氣血兩虛也或謂麻木為風雖三尺之童皆以為然然如久坐而起亦有麻木假如以繩縛緊釋之亦覺麻木久則自己者此非因風邪乃氣不行也故不須治風當補其肺中之氣則麻木自去亦有因陰火乘其陽分火動於中為麻木者當兼治陰火則愈不必去火補陰而火息也大抵諸脈有餘痹在表諸脈不足痹在裡又曰風者四時八方之氣從鼻而入乃天之氣也痰者五穀百物之味從口而入脾胃之濕所結乃地之氣也故風勝者先治其風痰勝者先治其痰風與痰相等則治風先治痰此定法也經云風之傷人也先從皮毛而入次傳肌肉次傳筋脈次傳骨髓故善治者先治皮毛次治肌肉由此觀之乃從右而漸入於左也皮毛者右肺主之肌肉者右胃主之筋脈者左肝主之骨髓者左腎主之從外入者轉入轉深故治皮毛治肌肉不使其深入也又曰濕之傷人也先從足始此則自下而之上無分左右者也從外入者以漸而驅之於外從下上者以漸而驅之於下此其治也十指麻木丹溪曰是乃胃中有濕痰死血宜二陳湯加蒼朮白朮桃仁紅花附子有或腿足或肩背一塊肌肉木者此陽氣不足不能周及以致陰寒凝泣也身上虛癢者是血不榮於腠理也用四物湯加黃芩煎調浮萍末服之痛風門主方通治痛風主方活人録當歸三錢秦艽二錢防風一錢五分川芎羌活各一錢車前子黃芩枳殼各五分水煎午後臨睡服治痛不外乎順氣治風必先於涼血氣順則血活而脈絡通血涼則火清而風息痛則不治而自治如重感風寒使內之濕火鬱而不散者加羌活桂枝各五分去黃芩車前服芎蘇散如外復感暑濕加蒼朮一錢五分白朮澤瀉黃柏各一錢去川芎黃芩枳殼服勝濕丹血脈凝閉不通而痛甚者加紅花一錢五分桃仁一錢桂枝五分去黃芩車前服祛風越婢酒及活絡丹病久血枯者加牛膝一錢五分制首烏二錢服活絡丹或加味史國公藥酒病久氣虛者加白朮三錢人參一錢五分減當歸一錢五分去黃芩枳殼服祛風越婢酒兼加味虎潛丸如勞倦內傷及房勞體虛之人加人參三錢知母一錢五分牛膝一錢去羌活黃芩服滋陰百補丸及滋陰百補酒或加味史國公藥酒如寒濕風濕之痰其脈濡軟而微滑者加白朮一錢五分半夏二錢陳皮蒼朮各一錢去當歸黃芩車前服祛風越婢酒或加味史國公藥酒及四妙散活絡丹豨蘞丸血虛血熱風熱內盛者服涼血省風藥酒若大便祕結淋利者服搜風順氣丸痛風藥酒方錢青掄昔竇中書方中年患此四肢不舉者五載纍醫罔效偶遇李讓有此祕方修合服之半月身輕自清病遂除因求此方江西淮王傳鱉甲七輪者醋炙甘菊花淨防風杜仲人參甘枸杞粉丹皮石菖蒲去蘆根秦艽虎骨酒炙川羌活油松節牛蒡子各一兩白朮黃耆遠志去心甘草汁煮山萸肉桔梗蒼耳子殭蠶白茯苓牛膝川萆薢石蟹天花粉熟地明天麻白芍白附子獨活天南星薑汁泡荊芥廣陳皮白芷茅蒼朮米泔浸炒川芎川當歸各五錢用無灰酒二斗浸之春夏二七秋冬三七封固無泄氣每日空心三次各飲一杯藥渣焙乾研細好酒和丸如梧桐子大每服七十丸空心好酒送下骨節風疼赤水玄珠大川烏三枚生用全蠍二十一個生用生黑豆二十一粒地龍去泥土酒洗淨五錢上為末入麝香一分糯米飯和丸緑豆大每服七丸夜臥酒下微出冷汗一二服便瘥五汁膏抄本白蘿蔔姜蔥韭各五斤搗汁菜子半斤取汁五汁煎成膏滴水成珠外加麻油東丹石灰收煉如汁多加多汁少加少做膏藥貼不拘久近立時見效左經丸赤水玄珠治手足不隨筋骨諸痛遍身風瘡大草烏去皮臍木鱉子去殼白膠香五靈脂各三兩五錢斑蝥五枚去頭足翅醋炒上磨細用生黑豆去皮為末一升醋和丸如芡實大每服一丸溫酒磨下治筋骨痛未經針刺者三五服見效此方曾醫一人軟癱風不能行不十日見效大為奇妙風氣痛肌膚不能近衣被者綱目生薑蔥各半斤搗汁熬稠加水膠三條切斷投下熔化攪勻敷痛處用桑皮紙大針戳眼扯碎貼上其痛即止又方老薑鳳仙葉川椒末香油共搗擦痛處或鳳仙子煎湯洗亦效又方魚膠四兩薑汁一碗同熬膏攤布上貼痛處即止痛風遍身骨節走痛油松節晚蠶砂浸酒煮飲每日常服風濕臂痛秦艽一錢全當歸防風各二錢豨蘞草木瓜海風藤白茄根各三錢麻黃五錢酒二斤砂鍋內煎四五滾在臂上熏洗每日二次不可忽略錢青掄云家慈嘗患此證視試立效後治他人無不響應又方白鳳仙花浸燒酒飲亦效周鶴仙黃耆湯嫩黃耆三兩白朮二兩生地黃元參各一兩甘菊花五錢水煎服服一劑少止痛二劑痛除三劑痊愈加防風一兩更妙風痰麻木風濕藥酒江仍度大生地十兩酸棗仁炒當歸身海桐皮羌活川萆薢風濕加此味各二兩地骨皮川牛膝各一兩五錢桂枝甘草各五錢火酒二十斤窨七日後即可服每飲二三小杯不宜過多久服壯筋骨健步履並治筋骨疼痛萬應膏江仍度淨松香十斤生大黃黃柏甘草苦參各二兩蒼朮一兩生薑汁蔥汁各二斤共入鍋內熬化升盡水氣濾清復入淨鍋內入真麻油三斤熬至滴水不散即火候已到用棍攪勻預將烠缸一隻貯水大半缸將水把缸周圍潑濕以免膏藥沾在缸上貯水已畢即將麻布一方將膏過入缸內略溫復取起以手捏去水頭再入鍋內化開加去油乳香沒藥各六兩黃蠟八兩熬化攪勻撤去火用篩加研細百草霜四五兩旋入旋攪又以麻布過入水內捏成團平日俱浸水中用若干只取若干頓化攤貼一切痛風濕痹麻木痛楚筋骨疼痛如神如膏老量加麻油化勻攤用可也除濕固本膏袁鼎臣賣三兩一張貼一切風濕筋骨疼痛立刻止痛人參另研大熟地黃耆五加皮去粗皮各五錢大附子去皮臍當歸川續斷川牛膝尺桂如無厚桂代各三錢杏仁去皮尖白芷去梢各一錢五分上藥同麻油一斤熬至藥枯濾清去渣將油復入淨鍋內入人參末文火熬至滴水成珠不散入炒鍋飛黃丹七兩收之傾入水內拔去火毒瓷罐密貯臨用攤貼臨河風氣藥酒當歸身一兩五錢白芍藥薏苡仁生地各一兩香附杜仲各八錢虎骨酥炙秦艽各六錢真川芎七錢川續斷羌活五加皮各五錢上用頭生酒三十斤封固煮三炷香放土地上退火氣一七每晚溫飲一杯紫金錠治周身風濕筋骨疼痛三服痊愈罌粟殼淨末六兩鬧陽花火酒拌曬乾麻黃去節炒各四兩自然銅煅一兩五錢寒水石煅一兩草烏黑豆同煮去豆乳香去油全蠍水洗焙乾川芎當歸白芷甘草各五錢上為細末瓷瓶密貯或用陳老米糊和搗為餅重二三錢陰乾密貯每用量人老弱壯實用酒磨化三四五分為率熱酒和服取汗避風要緊走注風毒疼痛小芥子研末和雞子清調敷諸般皮里痛何首烏末用生薑汁調成膏敷痛處以帛裹用火烘鞋底尉之太乙神針集驗治一切痛風寒濕筋骨疼痛人參麝香各四兩山羊血二兩廣三七八兩千年健肉桂乳香蒼朮小茴香鑽地風真川椒沒藥各一斤防風蘄艾各四斤穿山甲八兩共為細末用棉紙一層高方紙二層寬裁一尺二寸五分長裁一尺二寸將藥薄薄鋪勻在上一針約用藥七八錢緊卷如花爆式務要緊實兩頭用紙封固外用印花布包面亦要整齊好看用時將針以火焠著或按穴道或在痛處下襯以方寸新紅布數層將針按上若火旺布薄覺疼可加墊布數層但針必須三四枝點著一針焠熄又換一針連進七針無不立愈近日亦有用粗紙襯患上針者亦效但襯紙襯布俱要墊得平穩若墊得有皺摺便要走泄火氣至傷良肉起泡成灸瘡矣臍間少腹非多襯紅布不可輕試若襯得不厚怕灸瘡潰爛誤事太乙神針其功甚巨極有奇驗只恐施之不善適足誤事澄曾見用此針隔皮袍針左臂麻木者孰知持針重按而皮袍袖口摺疊火氣蒸傷臂肉成瘡為害六十餘日始愈此其小誤也又見一張姓婦年三十餘患腹痛服理中湯未愈一醫用太乙神針針臍下丹田一針其痛稍止次日又針而其腹痛更甚豈知婦女皮膚被藥針火氣走散灸瘡大作潰爛鐘口一塊洞腹透腸無法補救而死嗟乎腹痛未必即亡而醫之用針不善致戕其生豈可歸咎於太乙神針乎故不得不詳述其誤以誡後之用此針者留意焉癧瘍風門主論王肯堂曰癧瘍風乃風邪積熱居於肺腑久而不散流溢皮膚令人頸邊胸前腋下自然斑駁點點相連其色微白而圓亦有紫色者亦無痛癢凡此皆風之與熱伏於肌腠之間氣血不和乃生此疾也準繩紫白癜瘋門主論陳實功曰紫白癜瘋乃是一體而分兩種也紫因血滯白因氣滯總因熱體風濕所侵凝滯毛孔氣血不行所致此皆從外來而成者初起以萬靈丹發汗散之正宗紫白癜瘋門主方白癜瘋酒苦參五斤露蜂房五兩刺蝟皮一個上藥咀片水三斗煮一斗去渣用汁細酒麴五斤炊黍米三斗作飯拌曲同藥汁如釀酒法酒成榨去糟食前溫服一二杯三味黃耆丸張仲景黃耆三兩蒼耳子一兩防風三錢水法疊丸米飲送下三錢手上白癜瘋鳳仙花一棵帶泥入砂銚內煮滾洗之紫白癜風汗斑張仲景硫黃密陀僧各一錢白砒六分研細陳醋調擦又方白附子硫黃各等分研細薑汁調勻茄蒂蘸擦肥皂方白芷山奈皂角甘松各二錢白附子潮腦楮實子緑豆粉密陀僧各一錢研細用去淨皮弦肥皂一斤捶勻擦洗又方白砒二錢川貝母白芷各五分雄黃一錢白附子一錢五分研細烏雞蛋調搓白癜瘋孫真人硫黃明礬各等分研細末敷之癜風李時珍茄子蒂蘸硫黃末擦之取其能散血白癜用白茄蒂紫癜用紫茄蒂各從其類也紫雲瘋紫背浮萍陰乾一兩硫黃五分研細麻油調搓大麻瘋門主論陳實功曰大麻瘋乃天地間異證也總之驟被暴曬霧露風雨之氣所侵或房欲後體虛為風邪所襲或露臥當風久臥濕地總由風濕相乘氣血凝滯表裡不和臟腑痞塞陽火所變此其根蒂也其患先從麻木不仁次發紅斑久則破爛浮腫無膿治法初宜發汗久當培助氣血正宗又曰皮死麻木不仁肉死刀割不痛血死破爛流水筋死指節脫落骨死鼻梁崩塌此為五不治又曰心受之先損於目肝受之面發紫泡脾受之遍身如癬肺受之眉毛先脫腎受之足底先穿此為五敗證不治又曰治之當戒房事厚味動風等物脈訣曰脈洪大者生沉細者死汪省之曰大麻瘋有三因一曰風毒二曰濕毒三曰傳染理例訣云治風先治氣氣足風自除治風先治血血足風自減故當分氣血二治有養氣養血之別故治風之要莫穩於益氣活血為主蔣示吉曰眉落眼盲唇翻聲噎皆為難治所以然者由邪正交攻氣血沸騰而濕痰死血充滿於經絡之中熱勝則肉腐故生蟲生瘡痛癢麻木也治法內通臟腑外發經絡養榮益衛補正逐邪大劑峻補久服而蟲瘡痛癢麻木俱自愈矣說約馮魯瞻曰經文治法有發汗與刺血二法汗出以泄榮衛之怫熱刺腫以惡血之留蓄子和曰一汗抵千針蓋以刺血不如汗之周遍也尤宜助胃氣以固根本實衛氣養榮血以繼之蓋原其本皆由嗜欲勞動氣血不避邪風冷濕使濕氣與胃氣相干而致是正虛為本而濕熱是標也雖曰是風不可純作風治錦囊林氏曰或問何為癘風何經受病何故多死而少生答曰癘者厲也即陰陽乖戾之氣俗稱大麻風者是也此氣乃天地間陰霾濕熱賊風不正之氣若入肺家元氣先虧則鼻竅易於觸受而皮毛腠理因之不密倘然早起晏眠宵行露宿則毒氣先由鼻入而陽明獨受其邪蓋鼻為肺之竅而手足陽明經之絡起於鼻之交頞中故人在氣交之中而鼻為肺與腸胃出納升降之門戶一受風邪則鼻塞息粗打嚏流涕眉稜痠痛是其徵也所以毒厲之氣由鼻而直入陽明之絡先則眉癢而漸脫落兩顴紅潤浮腫而癢漸至兩臂皮粗毛落甚而通身肌膚淫淫作癢難忍其毒深入血脈之中則濕熱蘊積生蟲侵蝕臟腑治蛀肌肉久久精神枯涸諸蟲聚食傳為癆瘵而死活人録又曰或問雖為乖戾之氣潛伏脈絡之中若以清散疏解之藥治之自當速愈何至生蟲沿蛀皮膚臟腑敗壞腐爛而死也答曰經云大風苛毒虛邪賊風皆陰閉濕熱鬱蒸之氣所化其性本熱及至陽明又兩陽合明乃多氣多血之府由是氣溫血熱最易生蟲蟲多蔓延尤難緩治病者先失於不覺不知繼則誤於緩視而毒深再則不得其法而無效遂至於敗壞而死非厲風即可以殺人也患者慎之又曰此證須在一月之內速為清散可保無恙其精神氣血未衰六脈洪大而實或洪數有力者用汗吐下三法分表裡攻逐之使毒氣不得稽留而速化繼服清熱解毒涼血補血之劑禁用辛燥之藥及耗津精血液而助酷烈之勢但患者必須清心寡欲遠色忌口方為有益馮魯瞻曰大風病是受天地間殺物之風古人謂之癘風者以其酷裂暴悍耳須分在上在下在上者以醉仙散取臭涎惡血於齒縫中出在下者以通天再造散取惡物陳蟲於穀道中出所出雖有上下道路之殊然皆不外乎手足陽明二經蓋腸胃為市無物不受脾肺二經之腑脾主肌肉肺主皮毛乃腑病及於臟也治此病者須看其疙瘩與瘡若上先見在上體多者病在上也下先見在下體多者病在下也上下同得者在上覆在下也胃與大腸無物不受此風之入人也氣受之則在上多血受之則在下多氣血俱受者甚重是非醫者神手病者鐵心罕有得愈若從上或從下以漸而來者皆為可治但人易緩忽不能斷味絶色則難免再發再發則終不救矣又曰風起於八方應其時則物生違其時則物殺凡人中氣不足如持虛受物乃感受此殺物之氣鬱而成濕久而成熱氣濁血汙歷傳臟腑生蟲潰肌流行為害蟲食心則足底穿膝腫食肝則眉落食肺則鼻崩聲啞食腎則耳鳴啾啾耳弦生瘡或痹或痛如針刺狀食身則皮癢如蟲行自頭而來為順風自足心起者為逆風總由濕熱之毒流結而成也先以再造散下之稀粥調理勿妄動作勞後以醉仙散取臭涎惡血於齒縫中出或吐或利以泄越其邪面黑漸白而安又曰大風證者所因不一或色欲當風或醉臥濕地或乘熱脫衣或汗出入水或空心飢餓山行感山嵐瘴氣或勞役奔走途中冒寒雨陰露皆由內傷形體不知避忌外感風濕毒氣入於皮毛血脈肌肉筋骨之間當時失於驅散停積既久以致榮衛不行內外熏蒸內則生蟲外則生瘡臟腑經絡皆受患矣眉毛先落者毒在肺面發紫泡者毒在肝腳底先痛或穿者毒在腎遍身如癬者毒在脾目先損者毒在心此五臟受病之重者也古人謂大風疾三因五死三因者一曰風毒二曰濕毒三曰傳染五死者一曰皮死麻木不仁二曰脈死血潰成膿三曰肉死割切不痛四曰筋死手足緩縱五曰骨死鼻梁崩塌與夫眉落眼盲唇翻聲噎皆為難治所以然者由邪正交攻氣血沸騰而濕痰死血充滿於經絡之中熱勝則肉腐故生蟲生瘡痛癢麻木也治法內通臟腑外發經絡養榮益衛補正逐邪大劑峻服久服而蟲瘡痛癢麻木自愈亦須首尾斷酒戒色忌食發風動氣葷腥鹽醬炙煿生冷之物清心寡欲方保無虞又曰癘瘍所患非止一臟然其氣血無有弗傷兼證無有弗雜況積歲而發現於外須分經絡之上下病勢之虛實不可概施攻毒之藥當先助胃壯氣使根本堅固而後治其瘡蓋病有變有類之不同而治法有汗有下有砭刺攻補之不一兼證當審輕重變證當察後先類證當詳真僞而汗下砭刺攻補之法又當量其人之虛實究其病之源委而施治焉蓋虛者正氣虛也實者病氣實也再造散治其病在陰者用皂角刺直達病所出風毒於榮血中肝主血惡血留止屬肝也且蟲亦生於厥陰風木所化用此以治其臟氣殺蟲為主白醜者專入胃與大腸既走下焦血分復去氣中濕熱追蟲取積從大小便而利出之鬱金者因性輕揚善治郁遏氣血之凝滯因味苦辛善消陽毒積熱之亢炎以大黃引入腸胃榮血之分利出瘀血蟲物醉仙散治其病在陽者用鼠黏子解散陽明風毒遍身惡瘡胡麻逐諸風潤皮膚蒺藜散惡血而清胃通鼻氣而祛風防風為諸風之總司栝蔞根解煩熱之要領枸杞潤腎燥而祛風蔓荊散風淫而明目苦參專攻濕熱掃除潰瘍以祛赤癩落眉之毒八者祛風散毒上下內外周而至矣又曰風有三十六證而厲風為最酷感之難免於死者以其更多不守禁忌也經曰脈風盛為癘癘者惡也脈主血血熱而殺厲之氣襲之則血脈凝泣衛氣不行其氣不清鼻為呼吸之所要宗氣由之出入也今營運之氣不能上升為用故鼻柱腐壞肌肉潰瘍也又曰一貧婦因無膏粱厚味故服醉仙散外又服加減四物湯百餘劑半年之間月經行而風證亦愈故貴薄滋味也風論曰風氣與太陽俱入行諸俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍衛氣有所凝而不行故其肉有不行也癘者有營氣熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風或名曰寒熱長刺節論曰病大風骨節重鬚眉墮名曰大風刺肌肉為故汗出百日刺骨髓汗出百日凡二百日鬚眉生而止針癘風者素刺其腫上已刺以鋭針針其處按出其惡氣腫盡乃止常食方食無食他食脈要精微論曰脈風成為癘張景嶽曰癘風即大風也又謂之癩風俗又名為大麻風此病雖名為風而實非外感之風也實以天地間陰癘濁惡之邪或受風木之化而風熱化蟲或受濕毒於皮毛而後及營衛或犯不潔或因傳染皆得生蟲蓋蟲者厥陰主之厥陰為風木主生五蟲也蟲之生也初不為意而漸久漸多遂致不可解救誠最惡最危最醜證也又千金云自作不仁極惡之孽也所以最為難治觀孫真人云嘗治數百人終無一人免於死者蓋無一人能守禁忌故耳惟一婦人病愈後又服加減四物湯百餘劑半年之上方得經行十分痊愈又丹溪治五人亦惟一婦人得免以其貧甚且寡無物可吃也外三四人者越二三年皆復作而死由此觀之可見此證非得出奇祕方鮮能取效故豫逢此證不敢強以為知而妄施治療亦不敢強言治法以惑後人至若古人論治之法亦甚詳悉用之得宜雖病根未必可拔而延保餘年夭枉自亦可免由是求遍諸說則惟薛立齊癘瘍機要論列已全今擇其要並諸論之得理者以為證治綱領耆婆惡病論曰疾風有四百四種總而言之不出五種即是五風一曰黃風二曰青風三曰白風四曰赤風五曰黑風其風合五臟故曰五風五風生五蟲黃風生黃蟲青風生青蟲白風生白蟲赤風生赤蟲黑風生黑蟲食人五臟若食人脾語變聲散食人肝眉睫墮落食人心遍身生瘡食人肺鼻柱崩倒鼻生息肉食人腎耳鳴啾啾或如車行雷鼓之聲若食人皮皮膚頑痹食人筋肢節墮落五風合五臟蟲生致多入於骨髓往來無礙壞於人身名曰疾風疾風者是癘風之根本也病之初起或如針錐所刺名曰刺風或如蟲走名曰遊風遍身掣動名曰瞤風不覺痛癢名曰頑風肉起如桃李小棗核從頭面起者名曰順風從兩腳起者名曰逆風如連錢團圓赤白青烏斑駁名曰𤻪風或遍體生瘡或如魚鱗或如榆莢或癢或痛黃汁流出肢節壞爛為膿為血或不痛不癢或起或滅青黃赤白黑變易不定病起之由皆因冷熱不調流於五臟通徹骨髓用力過度飲食雜穢房室不節虛勞轉極汗流遍體因茲積熱於五臟致生多蟲食人五臟骨髓皮肉筋節久久敗壞名曰癘風惟見黑蟲者最為難治人得此疾速宜棄家室財物離妻妾入山靜養治無有不瘥徐東皋曰經云汗之則瘡已況癩之為風尤瘡之最惡者故曰癘風諸瘡熱久熱則生風且癘風尤染肅殺之氣而成者若非汗法何以去其風毒所以汗之一法乃治癘之最要者其餘諸方次第用之又曰凡患人身上癢甚蓋以風邪氣鬱血不榮敷而然宜四物湯加黃芩白芷調浮萍末服發汗自愈張子和曰一汗抵千針蓋砭血不如發汗之周遍也然發汗即出血出血即發汗二者一律沈紫亮曰夫人之生也稟天地之陰陽父精母血而成形體外毫竅內臟腑周身百骸十四經絡合於天地同參故曰天乃一大天人乃一小天然天有晴明昧晦風寒暑濕燥火之氣而人亦有氣血盛衰喜怒哀樂之情是故君子調飲食而慎房勞節喜怒而善攝養無七情之內傷避風寒畏暑濕忌燥火無六淫之外感則病無從而生是無夭折之患上古天真論曰上工治未病愚意非工之能乃人自治耳如稍不知節縱欲縱食任喜任怒致七情偏勝氣血不和六淫易入百病生焉即如大麻瘋一證大小輕重計有三十六種證最酷烈最為劇惡而感之者變形易質眉發脫而手足痿肌肉潰爛十指墮落膿穢淋漓臭惡難聞人皆怨而避之可不慎哉前之先哲論此證之由有五一曰風水陰陽所損二曰源流傳染所因三曰氣穢毒注所犯四曰保養失度所致五曰感冒積鬱所生此言其大略耳然麻瘋之始由各有不同有壯年而發者有十四五歲而發者有四五歲而發者所感有殊其壯年而發者因不能節欲致喪腎元精液枯涸腠理不密易感寒濕之邪積久不去況水衰不能生木則肝虛易動而風生且風數動易變與濕相搏遂化為熱又不能驅之補之則根堅蒂固日甚一日風引濕熱之毒攻之肌肉皮毛壅遏於肌肉經絡之間則氣血不行初或頭面手足有一點麻木不仁如病者之家明其為惡候即延醫而調治之明察其得病之淺深風濕之輕重刺制不得散漫速為順氣疏風燥濕舒筋健脾補血則氣血和而風濕去矣如病者因其所患甚微不以為意而醫者又不明其證之暴烈矇然不覺妄投補瀉致風濕之毒遍流身體遂致眼反唇翻眉脫髮落手足痿痹十指墮折肌肉潰爛斯時也雖有軒岐再世盧扁復生何能施其術哉可不痛乎其十四五歲而發者元陽未充天癸未至腎元何由而傷蓋此非壯年而論緣先天不足氣血俱虧膚腠虛疏為父母者不明其本源失於護育致感寒濕之邪入於筋骨復受虛風搏結而成其發之速其遍之易非壯年可比百不能全四五何也因其筋骨未堅肌肉脆嫩毒易攻耳其四五歲而發者尤甚於此蓋人稟父精母血得成一點真元然後生兩腎而腎生肝肝生心心生脾脾生肺五臟成而六腑就百骸備而皮肉生完形全體而後生育此證緣父母交媾之前先有濕證所懷之胎豈無是疾既生之後日積月纍遍溢周身復感風邪濕遇風而化熱熏蒸血脈肌肉遂發此證故一發即遍隨成壞證百不一救皆由父母之故也然麻瘋以前諸家各論只言其風不及其濕因不能明其病之本源亦非確論且風屬木肝也而肝主筋若無濕以兼之甚則成癱瘓半身不遂輕則為筋脈抽掣麻木攣痹不仁而麻瘋因風濕搏結於骨髓久而化熱其勢日甚風隨鼓動濕熱壅遏於肌肉之間皮毛之分初作麻木此風之病也逮後皮穿肉腐筋斷骨折非濕之為害焉能至此然濕久則生蟲內食臟腑外食肌肉損筋壞骨久則漫延無所不致矣但毒發於五臟亦有可驗之處如毒盛於心則喜怒不常面帶赤色言語不快眼生胬肉多發泡疹痛癢麻痹不常毒盛於肝善怒而色蒼嗌乾多忿上視面生小泡而浮腫毒盛於肺多汗惡風時嗽短氣渾身瘙癢晝靜夜劇甚則眉發落也毒盛於脾身體怠惰四肢不收身面黃而弱遍身紅癬或生癮疹毒盛於腎面目浮而腰脊痛不能正立色慘怡顏則腳底先穿夫麻瘋之證有五死五不治之說一曰皮死麻木不仁二曰肉死則割切不痛三曰血死則肌肉潰爛四曰筋死指甲脫落五曰骨死鼻梁崩塌眼斷唇翻五死既現故曰難治一曰不能戒忌者不治二曰酒色不戒者不治三曰不耐性而多怒者不治四曰思慮多者不治五曰大小不利者不治又曰男左腳起者難治女右腳起者難治此乃業醫者之效略不可不知也醫學要則二十六種瘋證歌訣心經大麻蛇皮瘋脫根邪昧魚鱗血肝經鵝掌鼓槌瘋血痹𩝐糕痛癲說脾經半肢軟癱瘋紫雲刺干癢瘋別肺經白癜蠔毛瘋歷節壁泥疹啞列腎經冷麻漏蹄瘋蛤蟆桃熱與水決胃經雁來疙瘩瘋螻蟈嚲曳蠱瘋捷心經大麻瘋乃腎虛受濕肝虛動風風濕相搏壅遏於血脈肌肉皮毛初覺或頭面手足一點麻木不知痛癢不即醫治漸發遍身久則眉落唇翻十指墮脫肌肉潰爛不能治矣宜麻瘋丸回生丸還真丹白花蛇丸清腎愈風湯蛇皮瘋兼腎經乃先發臀股間皮膚迸裂形如蛇腹之紋或痛或癢蔓延周身發極迅速若不速治則不救矣宜火龍丹兼大補之忌點刺熏蒸犯則即死宜火龍丹利瘋丹奇效丸脫根瘋此證腎經俱多初發起於腳根並兩胯下起水泡或破裂或生小瘡或生腫繭或痛或癢久則穿爛沿至足底俗呼草鞋瘋又名魚腮瘋同一類也宜奇效丸火龍丹大消風散魚鱗瘋此證兼肺經初發起於遍身乾白浮癢麻木漸生小瘡變成梅花片如刀刮魚靨之皮癢而搔之則痛或出黃水冷熱俱怕宜一粒金丹利瘋丹火龍丹大消瘋散邪昧瘋初發忽然悲哭如醉狂言驚怖喜笑不語夢昧多魘或與鬼交乍寒乍熱心胸飽悶聞氣不食古云氣注宜珍寶三生丹疏風散血瘋此證兼肝脾腎三經病緣醉飽行房縱欲或鬥狠裸體入水或忿怒飲食或忍飢戮力風濕內侵久久邪毒攻衝初起周身肌肉紅腫形如被杖遍身血泡邪乘於陽則旦甚暮平邪乘於陰則暮甚旦平或吐衄嘔咯等血或噦噫吞酸喜怒不常或生紅片麻木不仁腫處穿爛流水不止或血從大便中出面目浮腫頭痛腦裂手足攣痹皆由風濕之邪積久化熱而風逞濕熱之助濕熱仗風之威攻衝泛溢無所不至攻傷於心肺則致吐衄等血攻傷於肌肉皮毛則致紅腫麻木穿漏潰爛之殃而成不救之患可不恤哉初覺之時急用疏風散正陽丹調治尤可保勿死肝經鵝掌瘋此證兼肺經始發起於手心並腳踝拐生紫白癬麻癢頑皮搔之則起白屑痛癢不常或生足面稱為鞋帶瘋久則穿潰延及遍身宜大消瘋散二八濟陽丹小棗丹黑光湯鼓槌瘋此證系腎經而兼肝經初起時膝間痠痛怕見寒濕風冷行步艱難俗呼為寒濕腳氣久則肢脛虛弱骨節大痛大肉消去膝蓋踝骨漸大腳趾痠麻形如鼓槌宜神仙換骨丹棗靈丹獨聖散洗浴藥方血痹瘋此屬腎為重此因體虛而多勞苦皮腠虛疏易感風濕之邪侵入血分積蓄既久化熱成蟲蠹食肌肉初起疲倦汗出臥寐不時身體搖動如被風吹久則漸發紫塊痛極則癢癢極則痛遂致鼻塌攣跛而死宜正陽丹乳香搜風丸𩝐糕瘋此證兼脾腎二經此緣酒色過度不避風濕足三陰經受邪氣血凝滯久則化熱成毒熱盛沖激泛溢周身初發於眉稜骨上或面頰間結成㾦癗久變為瘡潰爛臭惡腥穢膿流黏著之處即變成瘡頭足乖張眼塌鼻倒指折唇翻遂成不救而死初發速用乳香搜風丸苦參丸大消風散並大補氣血再用藥湯洗浴可保無虞痛瘋初發四肢骨節抽掣疼痛晝夜不能屈伸臥難轉側久則遂成癱瘓不能起床宜乳香搜風丸大定風丸麻黃飲愈風湯芎術丹癲瘋此證兼脾腎二經凡多怒則傷肝多欲則傷腎飲食不節則傷脾然多怒則肝動肝動則風生腎多欲則陽虛陽既虛則陰寒盛矣脾緣飲食不節而致傷則不能運化留積而成濕不即調治則氣血乖張腠理不固而六淫之客邪入與主病相合乃成惡疾是以初起寒熱交作或嘔噦咳吐皮肉腫脹若不能驅邪輔正遂成狂妄叫號筋攣手振四肢牽引甚至歌舞笑罵毛瘁色敗變證百出而死初覺即宜奪命還真丹三生丹四磨丹驅邪安神丸脾經半肢瘋此證兼腎經是證或因先天不足而受寒濕之邪或因大醉行房而酒濕熱之氣乘虛入於筋骨外又復感風邪風木盛而土虛不能生金肺腎無根賊邪獨勝故成偏風或左或右骨節抽掣疼痛難忍手足不能屈伸營血凝滯不能行於經絡故筋攣而絡縱遂成癱瘓呼疼號痛日夜無休而死或曰偏風又曰痿痹其證一也宜乳香搜風丸寶珍丹正陽丹芎術散驅邪安神丸救苦再生丹軟癱瘋此證緣氣血俱虛肌肉疏緩膚腠不固致感風邪乘虛入骨久而化熱壅遏於經絡氣血不能運行筋無血養以致肢體日夜痠痛手足無力拘攣不能伸弛縱不能屈身軟如綿或骨節舉動有聲遂成癱瘓矣宜搜風順氣丸寶珍丹正陽丹神仙換骨丹芎術散紫雲瘋此證素因氣血虛而多火動徹則汗雨淋漓然氣虛則腠理疏而衣被之濕易侵皮膚隨又復感風邪風與濕搏凝滯於皮膚之間久則生蟲致起紫黑斑點延漫遍身似霞如雲非癬非疥時作痛癢久則高腫漸作麻木以致喪身害命者百有四五宜清風飲洗浴藥方干瘋此證屬肝腎二經此緣肺氣虛而感風邪然金虛不能生水腎之本源則津液枯涸以致肌膚乾燥且風邪入於皮膚既久變熱成濕故身無痛處漸生黑白斑點手足心底發熱如烙遍身發癢而成調治不痊之證宜復元丹並用藥湯洗浴避風取汗刺瘋此係營虛多熱熱盛則腠理不密易於汗出是以風邪乘虛而入然汗出多則血益虛且風之性動遂壅熱橫行於經絡之間如遇正爭氣逆而不行故致有刀錐所刺之狀待尋摸時而邪正已分行矣故痛無定處譬諸明末流賊如遇富饒之處盡情搶虜及至官軍知剿則又不知去向矣或肢節間如火燒尉痠痛難忍宜一粒金丹小棗丹癢瘋此證兼肺經此病緣衛氣素虛腠理不固風邪易入浮游於皮膚之間故渾身燥癢不息宜正陽丹大消風散肺經白癜瘋兼脾經此證因脾積熱不能生金肺虛受風燥其津液夫血賴脾攝而行今脾為邪熱所困不能統血而行肺受風邪壅滯於皮毛氣血不和運行失節風邪所壅之處漸變為白矣然四肢為脾之本皮毛乃肺之合故起於手足者居多宜棗靈丹神效追瘋丸玉樞丹蠔毛瘋兼心腎二經此由乘汗入水或腎虛而履霜堅冰致受寒濕久則化火成毒勢盛攻衝激動心火上炎克肺而濕熱之毒流注經絡故偶然搔觸悴然痛極如被蠔毛所螫之狀久則遍體走注轉側動搖如被刀針剜刺其體痛楚難忍如走注已遍不能救矣宜大消風散乳香搜風丸大定風丸利風丹救苦回生丹驅邪安神丸歷節瘋兼肝腎二經此證由縱欲傷腎大怒傳肝兼且不能節避下傷於濕外感於風而風濕之邪乘虛入於筋骨復又不明調治蘊蓄既久則化熱成毒有礙於營衛運行之道是以肘膝肩膊之間痠麻抽掣筋攣節大手足難以舉動遂成癱瘓矣宜驅邪安神丸救苦回生丹大定風丸壁泥瘋兼肝脾二經此證緣肝風氣盛克傷脾土復又好食生冷動濕之物致脾虛而不能運化濕滯於中積久化熱然脾土肌肉而風壅濕熱之毒遍行於肌肉之間氣血不運則肉不榮矣故肌膚變為灰白色如陳壁泥之狀因濕重風輕故無痛癢若延及遍身則不救矣宜乳香搜風丸芎術散疹瘋兼心脾二經此證因脾經積濕致土衰不能生金肺虛易感風邪蘊蓄既久變而為濕熱之毒蒸鬱於肌肉之間則蟲生矣故初起癮疹如麻豆疥癬之狀或麻癢而不疼或疼而不麻癢久則連片穿爛以成不救之證宜小棗丹玉樞丹啞瘋兼肝脾二經凡多怒則傷肝氣有餘便是火致木動而風生矣脾土受風木之傷艱於運化留滯而成濕且脾土既衰不能輸精於肺肺亦衰矣而肝木之邪乘勝己之臟衰反挾脾之濕邪上乘於肺然肺主聲金空則鳴今被肝脾濕熱之邪干竅塞而不通故初則聲嘶久則聲啞矣宜寶珍丹奪命還真丹腎經冷瘋兼脾經此緣腎虛而感風濕之邪然腎主骨腎既虛則骨髓不充而風濕之邪乘虛入於肢節之間日久邪甚盈溢於肌肉之內故初時為麻木不仁或時冷痛或肢節痠疼遇冬則伏床不起久則氣血不行發泡穿爛而死宜奇效丹正陽丹還真丹乳香搜風丸冷瘋方漏蹄瘋此證蓋因色欲太過腎經傷竭兼又不善趨避履霜蹈雪足底受寒濕之邪積久化熱成風氣血不行故初起先於湧泉穴麻癢不仁漸發水窠穿破則流黃水久則遊溢周身生蠹穢爛臭惡難聞為不治之證宜奇效丹火龍丹乳香搜風丸蛤蟆瘋兼肝經此緣肺虛而感風濕之邪蓄於皮膚久而不散化熱成毒營衛不行故渾身發塊似蛤蟆之狀破即成瘡流膿出血臭穢不堪宜還真丹正陽丹神效追風丸核桃瘋兼脾經此證緣脾經素有濕痰土衰不能生金氣虛則表不固風邪易感風入交煽積久之濕痰散漫於肌肉之間故初起遍身塊瘰大者似栗三五串連小者如豆顆粒成行其形色胡桃相似宜火龍丹棗靈丹又有一種手指攣擘或足腕股腿腹肋之間或項頰頭面之上發細黑小塊時值陰雨則發天氣晴明則不見或每日值陰分則發陽分則不見或晴明時其色鮮明陰雨時則變紫黑而痛者名曰蠹癡瘡此因風濕之邪郁久不散入於臟腑必祛風養血調氣清陽燥濕若不速治變成大瘋則難療矣熱瘋兼肺脾二經此證因陰虛而感濕肺感風邪風濕相煽而成熱邪氣上衝壅塞肺竅故鼻中常流臭黃濁涕咳吐稠涎然目屬陽今因氣虛邪得壅遏於陽道則氣血不行故目痛如脫時時惡風而寒戰若不速治則濕久生蟲內食五臟即鼻崩眼塌而死宜搜風順氣丸棗靈丹神效追風丸水瘋兼肺脾二經此證由肝家素有風熱木盛則土衰停飲留積而為濕兼之多欲則真元耗散不能制水洋汪泛溢反侮脾土壅遏於肌肉四肢而作腫脹氣悶如水蠱之形若止水濕不致潰爛此緣肝之風熱與腎之水濕互相搏結熏蒸於肌肉之間故漸發水泡穿即潰爛病至於此縱有神丹烏能救治也宜搜風順氣丸乳香搜風丸胃經雁來瘋兼肺腎二經此證緣脾經有濕肺感風邪風濕搏結而成然肺主皮毛脾主四肢故每至八月秋蕭索之時則手足乾燥乖癩麻癢形似蝕癬或頑厚如牛領之皮麻痹不仁破則血水頻流時常疼痛久則遊溢周身潰爛而莫能救矣宜奇效丹乳香搜風丸疙瘩瘋兼肝脾二經此證因肝風脾濕交煽而成痰流注經絡故初在於皮膚之內肌肉之間瘰瘰連枝五色癮疹遇熱則癢逢寒則痛寒熱交作搔之成瘡久則成斑爛若兼腎經而發於足趾足底連片紫白胻骨枯而腳軟者最為難治宜神效追風丸雞爪瘋兼肝經此證因怒氣傷肝氣化為火然火盛則風生況肝主筋而風火之邪遍溢於經絡阻其氣血之隧道筋無血養以致攣縮故身不動而自搖手不動而自抖不能持物舉動艱難久而不治則成癱瘓宜奪命丹大消風散乳香搜風丸螻蟈瘋此證與疙瘩瘋相似但此尤多腎濕故初起先於肋膝三五連串大小連枝漸成大串延長如土狗之狀寒熱不時或痛癢麻木頑痹不仁若不速治則遍身穿爛而死宜奪命丹斑龍八師丹嚲曳瘋兼肝脾二經此證因肝脾二經風痰蓄積心血虛而多火風痰上逆壅塞心竅故卒然撲倒昏迷不省手足牽掣拳攣伸縮口吐白沫然風痰之邪乘其虛而忽犯榮衛正氣必爭而驅之若邪盛正衰其人必致不省而死正勝邪衰故省覺有早晏也宜一粒金丹四磨丹兼以祛風去痰降火之劑可愈蟲瘋此證緣脾家之風濕積久化熱濕熱之毒壅聚於內臟故初起腹大肢瘦其形如鼓既久則邪毒上攻況眼之上胞屬脾而唇為脾之合故眼塌毒翻久則散溢周遍故渾身腫脹皮肉變黑毛髮脫落而死宜搜風順氣丸救苦回生丹有一種身面生瘡如貓兒眼放光流彩無膿無血久則自退名曰寒瘡亦怪證也此因多食雞魚蔥韭所致須用溫補散毒之劑藥熏可愈有一種渾身生泡形似棠梨破則水出內有石片如指甲大皮穿石出瘡愈其泡復生不已抽盡肌肉則死用三稜莪朮各五錢為末分三服溫水調服即愈有一種面上初起㾦癗似疥非疥似癬非癬多發於春夏之時或癢或痛或蒸熱漸成細瘡黃膿腥穢流注漫延名曰吹風癬婦人多患此乃受火炎鬱積風熱邪毒上升故發麵部久則變成瘋癩延入髮際則不治矣治宜清心順氣散肺火祛風熱戒淫欲方愈大麻瘋門主方首用煎方家祕防風甘菊花獨活荊芥穗甘枸杞羌活山梔子面部加白蒺藜當歸天花粉天麻鼠黏子薄荷蒼耳子蔓荊子穀精草下部加杜仲金銀花牛膝宣木瓜桔梗炙虎骨枳殼熟地黃木通連翹攝血歸元加元參補虛加桑螵蛸夏枯草血虛加蘇木紅花婦人加四物湯俱白水煎服後用天真玉髓丸家祕兼治紫雲風白蒺藜炒去刺草胡麻去土微炒苦參鮮明者荊芥當歸身酒洗防風去蘆各四兩海風藤香者為上如馬鞭一根切片花紋如檳榔尤妙枳殼去穰淨白朮有濕痰在胃則用如胃不痛無痰則不用木通各二兩乳香去油沒藥去油如不痛不必用乳香沒藥牛膝下部則加川桂枝手臂痛用如鼻塞不必用各一兩重全蠍七個大楓子五兩同天麻五錢煮去白衣膜石臼內搗碎和勻虎骨酥炙二兩止痛不痛不加共磨細末水法疊丸每早午晚各服三錢白湯送下用香櫞片過口忌食麵醬醬油火酒川椒羊鵝發物等味惟烏魚芝麻相宜如服此丸反覺飲食少進身體倦怠疲困則藥力到矣須耐心久服可保全功漸加至五錢七錢更妙痊愈後丸方光橘梨即十大功勞又名八角茶出在浙江上面刺用剪剪去以醇酒拌九蒸九曬再去葉中筋曬乾為末一斤元參四兩磨細末水法為丸每服二錢白湯送下凡治瘋證忌用興陽熱味並川烏草烏以及藥酒等類訣云須分氣血二治有養血養氣之別大麻瘋兼治癩證穿山甲一個不拘大小務要頭尾爪甲毫無損缺方可入藥倘有不全則患者亦於斯處不能痊愈矣以濕絹拭淨灰塵灰須去淨用上好嚴生漆一斤絞去渣將山甲遍身漆到陰乾又漆以漆完為度再陰乾用火酒浸一日夜取起風乾覓無烠大罐一個將山甲四肢分作五塊用雙銅絲穿縛懸放壇內四邊不可挨黏鹽泥封固壇口開一孔用文武火煅煉看壇口煙盡即退火候冷取出鋪放地上一二時研細末每穿山甲一兩加透明硃砂五分和研收貯每服三錢燒酒調服仍以燒酒過口每日三服忌鮮魚雞鵝羊肉麵食惟鴨臘肉豬腰可吃或病者欲頭先愈即先研山甲頭服之余仿此如聽其緩效即合研可也若發眉已落服完再服長松即仙茆可復生矣又方小胡麻苦參各十兩大楓子白芷防風各四兩荊芥八兩威靈仙蘇薄荷各一兩五錢蔓荊子大黃炒黃芩防己當歸尾薏苡仁宣木瓜各一兩連翹二兩春加薄荷葉一兩夏加黃連五錢秋加蒼朮一兩冬加烏藥一兩研末水洗疊丸清晨白湯送下三錢又方此方醫人不可受謝家祕大蜈蚣五十四條好酒一斤半瓶內煮透取起曬乾穿山甲六十片用蜈蚣酒煮薏苡仁檳榔宣木瓜各一兩陳壁土炒成珠四兩研細加明雄黃五錢和勻每服二錢清晨空心白酒調服儘量飲醉絮被取汗終身忌鯉魚江南洲傳祕授仙方蒼朮米泔浸炒麻黃去節各一兩當歸酒洗川烏防風草烏荊芥金銀花白芷各五錢天麻麵包煨桂枝赤芍藥叉石斛海風藤全蠍去尾酒洗薄荷陳皮甘草各三錢花蛇四兩酒洗切片炒上為細末瓷罐密收每日午時稱藥末五分無灰酒調服十日外加至六分草日外加至一錢不可間斷一料即愈止後服藥完多服補藥以培元氣蘄蛇酒黃柏苦參甘菊花丹參牡丹皮金銀花當歸赤芍藥百部赤茯苓枸杞子蔓荊子川萆薢各一兩桑枝一兩五錢生地二兩秦艽獨活威靈仙各五錢蘄蛇一具去頭尾如烏梢蛇亦可用共煮火酒生酒十五斤退火七日飲初服發汗清散之劑活人録荊芥三錢防風二錢秦艽羌活各一錢五分川芎薄荷淡豆豉各一錢蔥白頭二枚水煎空心午前服上皆輕揚升散之品能去肌表之風熱而無辛熱燥血之虞服後以後藥煎湯洗浴兼服前劑使表裡解散汗透為度七日後繼以後方探吐洗浴方紫背浮萍陰乾苦參各四兩防風百部各六兩荊芥八兩濃煎熱湯無風密室中熏洗中服探吐清利胃腑痰液之劑防風三錢淡豆豉二錢廣陳皮牛蒡子各一錢五分桔梗一錢皂角刺五分水煎午前午後服上藥專利陽明胃腑風熱之痰而兼能解毒如不吐以鵝毛探放喉間必使其吐盡積痰或膈中酸苦稠涎亦可吐後用稀爛陳米粥早暮調之忌用一切腥膻辛辣膩膈發病之物七日後精神復旺再用後方末用下劑蕩滌大腸蘊積之毒金銀花三錢當歸尾二錢枳實桃仁各一錢五分檳榔紅花各一錢木通甘草各五分水煎十分乘熱泡酒浸大黃末五錢以利為度不暢以陳皮湯催之不止以陳米飲補之上乃辛潤苦寒之味專除大腸積熱之毒兼能殺蟲並去痰穢調補煎方制首烏三錢生地二錢知母一錢五分車前白菊花各一錢牡丹皮薄荷各五分水煎午前午後服蓋肺與大腸相表裡吐利之後臟腑血液枯燥必然氣逆血熱前方清火滋燥涼血順氣亦治風活血之餘義也調補丸方功效等於前方取其便於常服制首烏八兩百部生地各五兩秦艽當歸各三兩車前子牡丹皮白菊花各二兩蜜丸早晚空心百滾湯吞服五錢膏方清氣清痰生津潤燥乃調補肺與大腸之要劑天冬肉八兩生地六兩麥冬肉川貝粉各四兩五錢牛膝三兩白菊花知母各二兩水熬成膏以滴水不散為度冷一周時調入川貝母粉收瓶伏土七日後臨睡時溫酒和服五錢祛風殺蟲服皂方百部新鮮者洗淨曬乾蒸爛十兩紫背浮萍陰乾溫火焙燥為末鮮肥皂各四兩浮皮硝二兩共搗爛至極細丸如青梅大早晚洗浴淨臉用以遍擦大麻瘋洗方衢艾楝樹皮椿白皮各半斤白礬四兩煎湯浴數次愈大麻瘋畢玉泉屢驗限日收功苦參大胡麻牛膝當歸各一斤白蒺藜一斤四兩荊芥孩兒菊各六兩防風馬鞭草羌活大楓子淨肉用白朮四兩同煮二十三滾去白朮各四兩共為細末以粗渣煎水疊丸如桐子大每服三四五六七錢每日三服六安茶送下春天三日見效冬天七日見效俱從頭上好起切忌大葷菜油一切發物蕎麥麵避大風大冷以暖為主戒房事宜吃牛肉雞魚野味大麻瘋苦參炒大胡麻蒼耳子牛膝焙當歸曬各一斤白蒺藜一斤六兩炒防風四兩羌活炒五兩紫背浮萍荊芥各六兩防己曬八兩如骨頭痛加獨活六兩共磨細末入甑內蒸以稱桿戳氣眼鋪平氣透為度冷定聽用大楓子浮肉十二兩用白朮二兩煮大楓子油盡去白朮復將大楓子土炒另研再將大楓子肉末和入前末內又磨勻篩下粗渣煎水疊丸曬一日晚用青布將丸藥攤在地上次日又曬又攤如此三日用麻布口袋盛丸藥令出藥味每日倒動三次掛檐口每日早午晚各服三錢六安細茶送下忌一切無鱗魚及動風之物戒百日房事要緊藜藿之人大麻瘋見效更速方爾聖火煉蛇一條入大麥或小麥三四升同蛇入罐煮至水乾肉爛為度其麥以紅雄雞食之其毛自落以線扣死去腸不用入罐煮熟打碎焙乾為末神麯打糊為丸每服三錢空心開水送下但服二三兩即愈矣大麻瘋盛天眷活癩蛤蟆一個用鹽泥搗熟做一匣入蛤蟆於內炭火燒熟存性去泥將蛤蟆研為細末每服三錢熱酒調服發汗得汗即止後服大麻瘋用明淨松香不拘多少化去渣取河水用淨鍋將松香煮化不住手攪視水色如米泔嘗味極苦即傾入冷水內將松香乘熱扯拔冷定堅硬另換清水再煮再拔如前法制不論數十次總以松香體潔白如玉所煮之水不苦為度陰乾為末羅極細末二斤聽用每日止食白粥量投藥末和勻食之不可多嚼日進數次不可更吃乾飯只以干筍乾菜過口一切油鹽醬醋葷腥酒果饃面等味概禁勿食渴時只飲白滾湯每日服三四錢以漸而加不可太驟服後大便必下毒物服完一料痊愈大麻瘋松香不拘多少以澄清河水不經礬者入銅鍋內煮約換水煮數十次水白為度每十兩楓茄花一名兔兒苗其木錢地如紫茉莉葉似蓼花其花甚多與白玉簪色形無二産野地及庵觀三四月出二兩炒紫背浮萍先曬乾後炒取淨末四兩共磨細末不拘茶酒食物俱可拌服以愈為度忌一切發物葷腥愈後仍忌百日要緊加減大造苦參丸治大麻瘋及諸風赤白癜風苦參一斤蔓荊子牛蒡子何首烏禹餘糧黃荊子枸杞子蛇床子各三兩防風胡麻子半生半熟荊芥皂角刺蒼耳子各十兩香白芷一兩五錢為末用皂角搗爛熬膏入前藥為丸桐子大每服五十丸茶酒任下醉仙散須量人大小虛實用之證候重而急者先以再造散下之方投此藥須斷厚味鹽醋椒果茄子煎炒燒炙等物止可淡物淡粥及煮淡熟菜或烏梢白花蛇以淡酒煮熟食之以助藥力也胡麻子牛蒡子蔓荊子枸杞子四味俱炒黑色各一兩白蒺藜苦參栝蔞根防風各五錢上為細末每一兩入輕粉一錢拌勻每服一錢茶清調晨午夕各一服服後五七日先於牙縫內出臭涎渾身痛昏悶如醉後利下惡物臭積為效通天再造散須調補氣壯方服此藥皂角刺獨生者去尖大黃炒各一兩鬱金五錢白醜頭末六錢五分半生半熟上為末每服五錢日未出時以無灰酒調面東服之當日必利下惡物或臭臟或蟲如蟲口黑色乃是年深者赤色是近日者數日後進一服無蟲積乃止丸方治大風肌頑麻木皮膚瘙癢遍身疥癩癮疹面上遊風或如蟲行紫白癜風賊風攻注腿腳生瘡川烏白芷苦參胡麻荊芥防風各三兩白附子白蒺藜山梔子川芎羌活當歸赤芍藥獨活各一兩大楓子去殼地龍何首烏威靈仙各二兩蔓荊子一兩五錢烏蛇一條好酒浸煮熟去骨取肉曬乾或焙為末酒糊丸桐子大每服四十丸茶湯下驗方蒼耳草於五月五日六月六日五更時帶露採搗汁熬膏作錠子取一斤半重鯉魚一尾剖開連腸入藥在內以線縫之用酒二碗慢火煮乾為度令患人吃盡魚不過四五尾即愈忌鹽百日洗法桃柳桑槐楮五枝煎濃湯大缸坐沒頭浸一日湯如油為效或紫背浮萍煎湯浸洗或地骨皮荊芥苦參細辛各五錢水煎熏洗遍身血出為效務要湯寬浸洗良久方佳麻瘋丸治大麻瘋鮮皂角刺二斤好醋煮九日曬乾取淨末一斤番木鱉羊油炙得法如金色者淨末八兩苦參取淨末二兩紫背浮萍曬乾取淨末一斤再用苦參八兩好酒打糊為丸每空心日三服先用蔥頭姜各二斤搗爛用麻油熬熟將新松布包作六七包先將番木鱉刮去皮毛碾為末壯盛者服二分老弱者服一分隨每人持藥一包在病人身上周身擦過用青布衫褲襪穿好綿被蓋緊睡處不可透風或生炭火待大汗後漸漸揭下乃起近前向火然後服前藥自能痊可如身若炭一般而作癢者將石菖蒲打碎煎湯四周圍住不可漏風連浴數次黑皮脫去平復如故若一見風必成癱瘓最宜謹防慎之慎之潤生丸治大麻瘋人參不拘多少川烏草烏白芷當歸槐角子何首烏枳殼連翹海風藤烏藥杜仲桔梗石楠葉肉桂各四兩乾薑白殭蠶甘草赤芍藥升麻虎骨防己白花蛇酒浸乳香沒藥沉香各一兩以上各為細末用麻黃二十斤去節水煎一日去渣將汁熬成膏入藥末和為丸每丸重五錢清晨送下一丸不可見風此丸能消風順氣諸般瘋證可服川烏草烏乃諸風之首藥必先制煉精詳莫待臨時忙亂制川烏草烏法川烏取八錢一枚者佳二物將米泔好醋各浸一夜用薑汁火酒調面將二物包裹在內慢火煨熟取出用陰陽瓦焙乾為末收貯聽用如逢大證面赤者宜減奪命還真丹此丹非止治大麻瘋癲瘋啞瘋冷瘋蛤蟆雞爪螻蟈諸證即中風癱瘓遍身筋骨疼痛驚癇口吐涎沫婦人胎前産後月經不調並皆治之全蠍白殭蠶陳皮生地杜仲蔓荊子知母甘菊花黃連各一兩黃芩熟地肉桂枳殼柴胡甘草石膏大茴香炒防風白朮半夏白茯苓各二兩明天麻川芎廣木香藁本白芍藥各二兩五錢人參菟絲餅酒浸焙獨活各一兩五錢北細辛五錢蛤蚧酥炙一對以上俱為末蜜為丸彈子大金箔為衣每用一丸隨證用引嚼下一方多犀牛黃冰片麝香地骨皮中風癱瘓大麻瘋癲瘋茶酒任下遍身筋骨疼痛不省人事熱醋下驚癇口吐涎沫溫酒下婦人胎前産後月經不調香附湯下冷風寒濕黑豆炒焦烹酒下清腎愈風湯治大麻瘋荊芥防風羌活獨活白鮮皮白芷蟬蛻川芎當歸威靈仙生地何首烏枳殼苦參甘草各一兩茅蒼朮黃柏穿山甲烏藥石菖蒲各二兩金銀花四兩上作十劑好酒煎服白花蛇丸治大麻瘋川芎明天麻羌活白附子炒當歸蔓荊子獨活威靈仙蟬蛻赤芍藥雷丸蒼耳子枳殼川萆薢雄黃石菖蒲甘草大楓子防風何首烏烏藥白殭蠶牛膝苦參皂角各等分白花蛇一條去皮骨酒浸炒上為末酒糊丸桐子大每服三十丸酒送下回生奪命神丹此方能治三十六瘋十四癩有起死回生之妙羌活白蒺藜藁本天南星防風川續斷蒼朮五加皮獨活海風藤白芷大腹皮烏藥仙靈脾防己皂角刺川烏明天麻桔梗北細辛柴胡蔓荊子黃芩川萆薢薄荷甘松白芍大黃各三兩紅花元參各七兩草烏四兩苦參二斤上用陰陽水各一大桶浸春五夏三秋七冬九日煎百沸去渣加煉蜜一斤煎成膏如漆白朮胡麻人參酒浸蒸熟曬乾砂仁礞石硝煅蕤仁去油各二兩沉香白茯苓木香檀香降香安息香乳香去油沒藥去油川芎牛膝紅花香蛇酒浸焙乾血竭白殭蠶松脂煮去苦水雲母石冰片鵝管石磁石肉蓯蓉原蠶蛾桑螵蛸各一兩蟾酥麝香各五錢人牙炙黃色五個白花蛇一條酒浸去皮曬乾上為末用前藥膏共搗丸彈子大硃砂為衣金箔包裹年深久遠者服十丸四五年者服四五丸一二年者服一二丸須麻姑酒磨下隨汗愈東華玉髓凡癱爛敗脫者非服此藥不能痊愈大楓肉四兩乳香沒藥血竭各二兩地龍七錢雄黃五錢珍珠琥珀冰片各三錢牛黃二錢五分阿膠一錢麝香六分上為末楓肉和勻每服一錢酒下如便閉加芒硝內熱者柿餅湯內寒者花椒湯虛怯者人參湯下順氣搜風接命丹滑石牛膝各一兩五錢大楓肉八兩荊芥一兩防風川芎當歸赤芍藥麻黃各五錢黑山梔黃芩連翹白朮甘草薄荷桔梗全蠍蟬蛻羌活獨活胡麻葛根各六錢石膏八錢人參二錢五分雄黃一錢五分木香七分五釐麝香五分上為末黃米酒煮糊丸桐子大每服五十丸酒下蜚龍分師丸白殭蠶白花蛇穿山甲香蛇蠶砂全蠍鹿角炒各一兩蜈蚣五錢蟬蛻二兩上為末每服四分酒下若此藥加入各方內無不取效守中丸防風胡黃連陳皮黃芩天麻升麻山梔荊芥苦參連翹各一兩牛蒡子當歸胡麻皂角白蒺藜蔓荊子各三兩羌活獨活各一兩五錢甘草硃砂白芷各五錢乳香沒藥麝香冰片各二錢牛黃一錢上為末米糊丸每服三錢鹽湯送下大麻瘋熏藥硃砂三錢槐花二錢水銀鉛皮各一錢銀硃五分先將鉛皮剪碎收入水銀和各藥為熏條每日熏臍二次要吃飽口含清水頻頻吐換以愈為度雄漆丸真漆一兩入蟹黃五錢拌勻曬之漸漸去浮面上水明雄黃牙皂各五錢和勻為丸不可見日陰乾每服三分酒下神仙紫菀丸白花蛇用酒一碗浸一宿去皮骨曬乾再入酒內浸再曬以酒盡為度甘草石決明各一兩防風羌活細辛川芎赤芍藥獨活白蒺藜蒼朮枇杷葉白芷苦參五加皮金銀花天麻牙皂各五錢人參當歸各七錢五分何首烏荊芥威靈仙各四兩白附子牛蒡子草烏石菖蒲川烏各二錢二分蛇床子麻黃各二錢木香沉香各二錢五分乳香沒藥胡麻各一錢雄黃辰砂各五分肉果一枚麝香定風草各一錢五分上為末用大楓子二斤去殼搗碎酒拌入罐內箬紙包口鍋內重湯煮一夜成膏入前藥末煉蜜為丸桐子大每服百丸酒下白玉蟾蜍遺方治麻癢癱瘓爛攣腫痛危困者並大麻雞爪嚲曳螻蟈冷麻等證如神胡麻牛膝木瓜山梔黃柏蒼朮天麻五加皮白蒺藜各五兩海風藤羌活苦參當歸各三兩代赭石醋煅七次蘄蛇各一兩蒼耳子水銀麵包煨硃砂各三錢取新鮮大楓子肉二十四兩敲碎以水二十碗煮至十碗濾干入石臼內杵爛入水銀硃砂代赭蒼耳四味研至不見水銀星為度再將楓肉汁打陳米糊丸每日卯午酉各服三錢或二錢五分酒下煎藥方大楓肉一斤當歸防風荊芥何首烏升麻羌活獨活威靈仙甘草各四兩苦參藿香天麻細辛各三兩川芎全蠍血竭番木鱉各一兩藥分作五十劑水煎服若紫雲瘋初起者加大黃瀉之若麻瘋用酒隔湯煮不拘時溫服內府藥酒方甘草破故紙蒼朮各二錢何首烏人參五加皮草烏肉蓯蓉砂仁白朮杏仁當歸川椒各一錢七分小茴香牛膝虎骨枳殼半夏香附青皮枸杞子菟絲子良薑木香厚朴白扁豆赤芍陳皮枳實防風生地黃熟地荊芥天門冬五味子麥門冬三稜莪朮檳榔吳茱萸桔梗桑白皮藁本各一錢胡桃肉去皮紅棗去核白糖各五兩六錢七分上用米燒酒白酒釀各六斤盛壇內以絹袋盛藥掛壇內扎緊放鍋內重湯煮三炷香為度埋土中七日出火毒每服用磁杯頓熱飲之再造至寶丹大楓肉去遍身風白蒺藜去腸內風防風去肌表風苦參去足風各二斤荊芥去皮毛風胡麻去五臟風當歸活血各一斤天麻去麻木十兩黃連退熱冷風不用烏藥遍身風各四兩棕灰去惡血雄黃去毒各五錢海風藤去手足風人參補氣各八兩官桂去寒濕熱風不用甘草各七兩天竺黃檀香根各二錢麝香通諸竅一兩上為末米糊丸酒服凡風證五臟各有所因五死有可治之法肺經毒盛眉毛先落加零陵香皂角刺各二兩肝經毒盛面起紫泡加何首烏五兩腎經毒盛腳底先穿加血竭二兩心經毒盛先損其目加珠屑一兩脾經毒盛遍身瘡癬加蒼朮八兩麻木不仁者冷風也加天麻蒂一兩肉死割切不痛加霹靂二兩血死則潰爛成膿加歸尾八兩筋死則手足脫落加白殭蠶三兩骨死則鼻梁崩塌加骨碎補三兩凡五死兼見者大命已絶雖盧扁再生不能活矣諸瘋初服開竅方雄黃天南星半夏川芎草烏明天麻硃砂各等分為末每服二錢酒下四仙丹治大麻等瘋三十六證如患者大肉已去者不治牛黃一錢番木鱉四十九枚去皮麻油一斤煎木鱉子三沉三浮以金色為度撈起放地上存性為末加硃砂一錢雄黃一錢五分麝香五分研細蜜丸如蘿蔔子大初日服一釐二日服二釐至十日服一分十一日仍服一釐至一分止三白酒送下宜清晨服忌風戒色欲葷腥要緊後服煎藥四五劑痊愈大麻瘋神方麻黃鬧陽花天雄各一斤紫背浮萍二斤當歸八兩明天麻羌活防風白芷白朮各一兩升麻枳殼薄荷白殭蠶苦參威靈仙防己皂角針白蒺藜大力子甘草川黃連各一兩用陰陽水煮半日去渣熬成膏沉香