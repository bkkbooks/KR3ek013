攻衝遍身疼痛不能起床蒼耳子豨蘞草胡桃肉各二兩金銀花五加皮地骨皮防風海風藤各一兩當歸五錢紅花二錢上用三白酒一罈將前藥用絹包好貯壇內隔湯煮令透冷一日每空心服一盅三四日後服盅半酒干病愈清氣飲治紫雲瘋麻黃去節紫荊皮荊芥海風藤防風明天麻羌活桑白皮辛夷牛蒡子檳榔各二兩北細辛桔梗乳香沒藥升麻各一兩白鮮皮金銀花牡丹皮黃柏生地苦參各四兩大楓肉去油白芷各三兩上藥用火酒一大壇浸三日每飲一小杯不可大醉終日勿絶酒氣服酒前先用後藥煎湯洗浴洗浴藥方苦參蛇床子蒼朮千里光白芷劉寄奴大黃番木鱉搗研防風白殭蠶烏藥白鮮皮各等分用水一桶煎去十分之三取湯洗浴必得汗出而止切勿透風浴後飲藥酒溫睡至四五日後又浴一次再五日後又浴一次酒到病除皮膚顏色如故飲酒將半兼服大補氣血丸藥致腠理固密永絶此患護元丹治干瘋白癜瘋防風白鮮皮麻黃大楓肉去油當歸牡丹皮山藥菟絲子牛膝川續斷黃柏黃耆各二兩澤瀉白茯苓黃芩廣桂枝乳香紫荊皮沒藥知母白芷荊芥各一兩熟地四兩胡麻四合上為末煉蜜丸桐子大先用愈風湯洗浴切忌避風食後暖酒送下百丸即睡取汗隔五日取汗一次三次即愈小棗丹治刺瘋防風白殭蠶荊芥何首烏全蠍蔓荊子苦參威靈仙黃芩牛蒡子大黃赤芍藥生地大楓肉羌活獨活各二兩白朮一斤兩頭尖重一錢一頭扁柏枝山梔各四兩甘草五錢薄荷甘枸杞明天麻天南星各一兩上為末棗肉為丸桐子大每服六十丸薄荷湯下玉樞丹治白癜疹瘋苦參當歸元參荊芥蒼朮各八兩羌活烏藥胡麻藁本蒼耳子川芎獨活白芷白蒺藜防風大楓肉甘草麻黃紅花牛蒡子天麻白殭蠶琉璃煅灰海風藤薄荷元胡索秋石夏枯草犀角旱蓮草虎骨血竭柴胡蘇木蟬蛻各二兩牛黃一錢麝香二錢廣木香沉香檀香乳香沒藥仙靈脾各一兩五錢桑螵蛸蕤仁大黃桔梗貝母烏藥半夏各一兩上為末將粗藥頭煎汁煮米糊丸桐子大硃砂為衣用黃芩大黃羌活獨活防己防風連翹黃柏桔梗荊芥當歸山梔木通甘草半夏紫蘇薄荷升麻川芎麻黃烏藥等味煎汁送下百丸或酒下朝夕服避風要緊冷瘋方蒼斑香豆一斗胡桃肉四斤連殼敲碎火酒十斤共入壇內浸五七日每用一大盅飯上蒸不時服藥到病除神效追瘋丸治蛤蟆瘋熱疙瘩瘋苦參六兩大楓肉四兩荊芥二兩五錢麻黃當歸羌活白朮各五錢黃芩白芍川芎白殭蠶人參白蒺藜胡麻防風各一兩乳香沒藥各二錢二分麝香四分為末酒煮黃米糊丸桐子大每服五十丸酒下斑龍八師丹治螻蟈瘋威靈仙蒼朮透骨草川烏草烏各等分為末每服三錢酒服取汗避風要緊麻黃散治漏蹄瘋乳香沒藥黃柏麻黃根萬年灰即陳石灰水龍骨各等分上為末摻之貼夾紙膏收其毒水治瘋爛瘡枯礬四兩花椒三兩蛇床子二兩白砒硫黃各一兩生礬五錢研如泥豬油調搽患處治癢塊方蒼耳子大楓肉硫黃潮腦雄黃各二錢用芝麻一合炒黑和研如泥生布包藥擦之無塊處不可擦治瘋癬癩神方顧玉書防風小青皮打碎直殭蠶炒去絲白鮮皮羌活各五錢鑽地風當歸刺蒺藜各一兩荊芥威靈仙蟬蛻各三錢制天麻二錢五分土荊皮三錢五分火酒五斤浸五日每日飲一二杯外用後方浸酒搓之其癩自愈經驗多人地黃根八兩荊芥白鳳仙花各四兩木鱉子公檳榔各三十個白砒雄黃潮腦各一兩白芷白芨各一兩五錢沉香研細二錢麝香一錢母丁香五錢防風六兩火酒十斤共入壇內封固浸七日搓之治癩奇方土荊皮一斤白芨尖檳榔白芷各一兩研細搽三天土荊皮一斤白芨尖檳榔白芷蛇床子各一兩胡椒枯白礬各五錢研細搽三天土荊皮一斤白芨尖檳榔白芷蛇床子各一兩胡椒枯白礬各五錢白砒三錢麝香一錢研細搽三天以上三次計搓九日俱用好醋調清晨搓上晚上以豆腐漿水洗去過夜次早又搓必愈
