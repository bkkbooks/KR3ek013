body:
  text: 卷二十七足踝部自足踝起至足趺底指止一切癰疽疔毒皆匯於此部中以便檢閲參治風疽門主論心法曰風疽生足脛骨及曲凹之處瘙癢皮損津流黃汁極其黏濃此由風邪留於血脈相搏而成因其根深故有疽名甚則身體煩熱昏冒而肌肉透紅更增腫痛宜服防風湯外塗青竹大豆油即效風疽門主方青竹大豆油金鑑青竹筒截三尺長徑一寸半內裝黑豆一升以穀粳馬糞二物燒火當竹筒中炙之以瓷器兩頭接取倘出油汁以漬入泔水和鹽熱洗患處拭乾即塗豆油不過三度極效內踝疽門主論靈樞云發於內踝名曰走緩其狀癰色不變數石其輸而止其寒熱不死王肯堂曰足內踝生癰名曰鞋帶癰由寒濕滯於足陽明與足厥陰經血澀氣阻所致準繩內踝疽門主方祛濕消邪湯岐天師薏苡仁二兩生甘草三錢金銀花蒲公英當歸各一錢水煎服此濕熱也祛濕清邪湯主之蓋濕氣必下受而水流必下行薏苡去濕而利關節之氣金銀花去火毒之邪助之以生甘草則邪易散而濕易退矣然而血虛則水氣易侵濕邪易入今用當歸以補其血血足水無所侵而濕難入故用之合宜而病可速效也外踝疽門主論王肯堂曰外踝疽又名腳拐毒生足外踝屬足少陽膽經足太陽膀胱經濕熱下注準繩申鬥垣曰腳拐毒又名鞋帶疽乃膀胱經寒濕注於皮膚傷於筋骨平常不覺久則疽發於兩踝是也啓玄心法曰外踝疽屬三陽經脈絡也由濕寒下注血澀氣阻而成其堅硬漫腫皮色不變時時隱痛難於行走宜服內托羌活湯若虛弱將欲作膿跳痛無時者俱服十全大補湯金鑑穿踝疽門主論陳實功曰穿踝疽即腳拐毒乃足三陰經濕熱下流停滯而成初起內踝腫痛徹骨舉動艱難甚則串及外踝通腫此證若不早治因循必成廢疾正宗又曰大法初起宜荊防敗毒散加牛膝脹者針之玉紅膏斂之虛者補之心法曰穿踝疽乃脾經寒濕下注血澀氣阻而成先從內踝骨發起串及外踝至蝕裡外通腫不紅以有頭為陽易破易治若只悶腫無頭為陰難潰難愈如初起寒熱往來有紅暈兼有熱也宜荊防敗毒散皮色不變者宜萬靈丹其餘悉同癰疽治法金鑑又曰內踝疽生兩足內踝近腕之處屬三陰經脈絡也由濕寒下注血澀氣阻而成其堅硬漫腫皮色不變時時隱痛難於行走初宜瘡科流氣飲加牛膝木瓜防己宣通之外以蒜灸消散已成服內托黃耆湯若虛弱者將欲作膿跳痛者十全大補湯外敷烏龍膏又曰穿踝疽內踝疽外踝疽若潰出清水或投方不應纏綿日久者必成廢疾難治澄曰內踝疽即鞋帶疽屬足三陰經脈絡外踝疽即腳拐毒足三陽經脈絡皆生兩足踝近腕之處俱由寒濕下注血澀氣阻而成初宜隔蒜艾灸驢眼瘡門主論澄曰脾經濕毒流滯足脛骨爛如臁瘡四邊紫黑時流毒水或淌臭膿名曰驢眼瘡俗名夾棍瘡因其疼痛難堪故名之也亦有碰傷而成亦有毒蚊蛇蚤咬傷而起最難收功驢眼瘡門主方驢眼瘡集驗田螺搗爛敷數次即愈足發背門主論鬼遺方云足跗發跗一作趺足面也起足胕及足下二十日不穴死十日可刺發赤白膿血不多其瘡上癢及赤黑者死王肯堂曰足趺結毒腫痛名足發背屬足厥陰肝陽明胃經之會多因濕熱乘虛而下注膿稠可治膿清紫陷者死準繩靈樞云發於足上下名曰四淫其狀大癰不急治之百日死王肯堂曰病蝦證患腳背手背腫大有赤痕如蝦之狀準繩又曰腳背或腳趾腫痛不可忍以腳高懸起其疼方止些若以腳垂下其疼不可當者名倒拔腫瘍申鬥垣曰腳發背一名蛇沿毒因草木蛇遊人行草上惹受蛇毒初起堅硬紅腫光澤疼痛作膿者可治其狀如湯潑發大水泡不久則變紫色而穿破者或經年不愈至骨成潭者俱難治矣啓玄又曰腳發背亦有腎經濕毒流滯而成汪省之曰足發背發於足背衝陽陷谷二穴乃足陽明胃經多血多氣初發令人寒熱作嘔痛癢麻木理例心法曰足發背一名足跗發足背雖屬三陽而偏主膽胃二經居多證由七情內郁或兼六經外傷而成經云三背不宜生瘡惟足背多筋少骨肉少皮薄又在至陰之下發瘡疽者升發遲慢所以謂為險候也宜別五善七惡而分順逆發背者大瘡之通名也或癰或疽均當細辨順逆既分則生死可判矣又曰初宜隔蒜艾灸令瘡速潰澄曰腳發背生於腳背筋骨之間乃足三陰三陽之所司也比之手發背為尤重皆緣濕熱相搏血滯於至陰之交或赤足行走沾染毒涎抑或撞破誤觸汙穢而成總之外染者輕內邪流滯者重足心癰門主論鬼遺方云兩腳心發徹骨者不治如腳心微皮破不至深發膿不多者可治王肯堂曰足心發毒腫痛亦名湧泉疽俗名病穿板又名穿窟天蛇屬少陰腎經虛損所致宜十全大補湯八味地黃湯大劑不問晝夜投之潰爛嘔逆迷悶脈微代者死準繩馮魯瞻曰腳心發毒淺者可治毒深者不治錦囊申鬥垣曰腳心癰乃心腎二經濕毒流注發於足心啓玄又曰腳底穿心疔又名井泉疽乃腎經外感風邪濕毒流於腳底久則穿爛遂成漏證心法曰湧泉疽乃足少陰腎經虛損兼濕熱下注而成生足心湧泉穴故名若十四日內即潰膿淺則為癰猶為可救悉照癰疽施治外用神燈照法若虛甚膿遲十全大補湯潰後八味地黃丸若黑陷不疼二十一日之內不潰膿者為疽屬陰敗之證難救金鑑田螺疱門主論心法曰田螺疱多生足掌而手掌罕見由脾經濕熱下注外寒閉塞或因熱體涉水濕冷之氣蒸鬱而成初生形如豆粒黃疱悶脹硬疼不能著地連生數疱皮厚難於自破傳度三五成片濕爛甚則足跗俱腫寒熱往來治宜苦參菖蒲野艾熬湯熱洗次用線針將疱挑破放出臭水加味太乙膏貼之再將疱皮剪去宜用石膏輕粉等分研末撒之仍以膏貼更有經年不愈者系下部濕寒以金匱腎氣丸常服甚效金鑑陳實功曰田螺疱乃脾經風濕攻注多生手足忽如火燒隨生紫白黃疱不久漸大脹痛不安用針挑破泄去毒水太乙膏蓋如挑破又生者須服解毒瀉脾湯正宗癆疽門主論汪省之曰癆疽乃足太陽膀胱經多氣少血生於足小指後趺在京骨金門二穴五七日得膿不多者吉如黑色不潰癢甚者凶理例婦人腳十指油煎門主論馮魯瞻曰婦女腳十指如熱油煎者此由榮衛氣虛濕毒之氣流滯經絡上攻心則心痛下攻腳則腳痛其腳指如焚如腳氣之類經云熱厥是也脫疽門主論靈樞云發於足指名曰脫癰其狀赤黑者死不治不赤黑者不死治之不衰急斬之否則死矣鬼遺方云痌敦疽發兩足指五日不穴死四日可刺其色發黑癰不堪未過節者可治王肯堂曰足指生疔重者潰而自脫故曰脫疽或曰惟足大指患之為脫疽其餘之指患之曰敦疽易治惟脫疽難治準繩陳遠公曰有足指頭忽先發癢已而作痛指甲黑色第二日足指俱黑三日足面俱黑黑至筋骨即死此無名腫毒得之多服春藥乃火熱之毒非足疽可比若足疽止黑左足指也然足疽最凶雖不如無名腫毒之橫而速殺人則一也蓋足為四餘之末宜毒所不到何以凶惡至此正以毒所不至之處而毒聚不散反出於指甲間則毒盛非常而治之轉不可輕視然則以泄毒之藥治之可乎而誰知不然人身之氣盛則周流於上下毒斷不聚於一處惟氣血大虧不能遍行經絡而火毒惡邪乃固結於骨節之際足疽之生乃氣血之虧不能周致之故然則烏可單泄毒以重傷氣血乎必大補氣血加泄毒之味則全勝之道也顧步湯牛膝一兩金叉石斛一兩人參三錢黃耆一兩當歸一兩金銀花三兩水煎服一劑黑色解二劑疼止三劑痊愈若已潰爛多服數劑無不愈也此方以銀花解毒非牛膝石斛不能直達足指非人參歸耆不能氣血周流使氣通血活以散毒也即無名腫毒此方治之亦效不但治足疽也世醫有以刀切去足指亦是治法然不若此方補中敗毒起死回生既無痛楚之傷又有全活之妙也冰鑑陳實功曰夫脫疽者外腐而內壞也此因平昔房術澀精丹石補藥消爍腎水房勞過度氣竭精傷而成手足乃五臟枝幹故凡患此者多生於足初生如粟一點黃泡其皮猶如煮熟紅棗黑色侵漫相傳五指傳遍上至腳面疼如湯泡火燃其形骨枯筋縱其穢異香難解其命仙方難活血死心敗筋死肝敗肉死脾敗皮死肺敗骨死腎敗死生付於度外孫真人曰在肉則割在指則切即此病也乘其未及延散時急用頭髮十餘根纏患指本節盡處繞扎十餘轉漸漸緊之毋使毒攻延良肉隨用蟾酥餅放原起粟米頭上加艾灸至肉枯瘡死為度次日本指盡黑方用利刀尋至本節縫中將患指徐順取下血流不止用金刀如聖散止之余腫以真君妙貼散敷之次日倘有黑色未盡單用蟾酥錠研末摻之膏蓋黑色自退患上生膿照常法用玉膏生肉護骨完口此為吉兆內服滋腎水養氣血健脾安神之劑若內無變證外無混雜此十中可保三四凡治此症不可一己醫治必與高明衆議聽患家願情割取方可動手因此證首尾吉凶變駁難定故不可輕易用之又有形似而來非真穴而受異治在活法又不可妄行切割也當臨證詳酌之正宗又曰脫疽多生手足初起如粟漸大其色如褐或似棗皮漸黑漸開漸大黑如烏羽不知痛癢熱臭難聞小兒多從積熱積毒大人多因誤服丹石興陽等藥霸阻精道房術所致古人雖有割截之法豫見三人俱至七八日而死馮魯瞻曰脫疽多因房術虧損腎水鬱怒有傷肝脾地位偏僻藥力罕到氣血難達易致筋潰骨脫故猶宜補托氣血為主以脈消息若黑色者不治錦囊竇漢卿曰脫疽乃肺經受熱發於兩手五指頭上七八日不瀉必死四日可刺如發黑癰不甚過節猶可治也黑甚過節者死雖過節猶可治者藥入及之也其狀因小黯肉中生點子點小者如粟豆大惟大者如梅李或赤或黑乍青乍白有實核即根也不浮腫慘痛應心至骨或身體發熱若不急治毒遂衝上面悉腫泡點紫黑爛壞入心殺人南方人得此名曰榻著毒即截去其指恐毒上攻罕有一生十指端忽然策策痛入於心不可忍也嚮明望者晃晃黃赤或黯青黑是熛疽齒間出臭水血者七日亡矣但厚肉處即割去用烙鐵烙之令焦如炭亦如治疽之法灸百壯為佳須頓飲葵根汁青靛花竹瀝犀角汁枳殼湯消毒飲若吐膿血不治宜以灰掩膿血上否則毒氣著人亦相染矣熛疽害人不旋踵惡風入肌脈初未知覺毒郁既發若火之烈其上隱小而深實點黑而不明其病應心稍緩則入臟矣心法曰脫疽多生足指之間手指生者間或有之蓋手足十指乃臟腑枝幹未發疽之先煩躁發熱頗類消渴日久始發此患初生如粟黃疱一點皮色紫暗猶如煮熟紅棗黑氣漫延腐爛延開五指相傳甚則攻於腳面痛如湯潑火燃其臭氣雖異香難解皆緣膏粱藥酒及房術丹石熱藥以致陽精煽惑淫火猖狂蘊蓄於臟腑消爍津液而成斯時血死心敗皮死肺敗筋死肝敗肉死脾敗骨死腎敗此五敗證雖遇靈丹亦難獲效初起宜服解毒濟生湯外用大麥米煮飯拌芙蓉葉菊花葉各五錢敷之止痛消之如不應必施割法須患者情願將死生付之度外不可輕易動手金鑑又曰諸方書論脫疽單生於足大指而別指生者俱是敦疽此非確論然脫疽偏生於屬足陰經之指者居多學者宜詳審之脫疽門主方陰陽二氣丹治脫疽久服丹石補藥致虧腎水多成口燥嗌乾至飲冰雪不知其冷此孤陽獨旺急宜服此元參湯泡去粗皮搗膏麥門冬搗膏天門冬搗膏人中白小兒溺者生用五味子炒研黃柏各一兩青黛色嬌嫩者枯礬辰砂水飛為衣澤瀉甘草各三錢冰片一錢各為細末同元參二冬膏子加煉蜜少許再搗千餘下軟硬得中丸如桐子大每服六十丸童便乳汁各一盅空心送下安睡一時其功如神清神散治脫疽疔瘡發背毒積甚者腠理髮越不盡多致煩躁悶亂睡則譫語嘔吐不食者並宜服之甘草節五錢緑豆粉真者一兩大硃砂三錢牛黃三分梅花片五分上為細末每服一錢淡竹葉燈心湯調服雌雄霹靂火治脫疽及一切發背初起不疼痛者並宜灸之艾茸二錢麝香一錢丁香雌黃雄黃各二分將藥研極細搓入艾中作豌豆大丸於患上灸之毋論痛癢以肉焦為度如毒已經走散就紅暈盡處排炷灸之痛則至癢癢則至痛為妙後仍用提疔麥子貼上膏蓋次服蟾酥丸及解毒濟生湯兼治轉回活色有膿為妙金液戊土丹治脫疽及疔瘡發背縱食膏粱厚味醇酒又或丹石補藥勉力房勞多致毒積臟腑久則胃汁中干腎水枯竭不能上制心火以致消渴消中消腎饒飲多幹能食多瘦九竅不通驚悸健忘此證若出後必發疽多難治療宜預服此亦可轉重就輕移深居淺又解五金八石之藥毒人中黃烏梅肉胡黃連白茯神五味子各一錢石菖蒲遠志肉明雄黃辰砂硝石各三錢犀牛黃冰片各一錢金箔二十張為衣各乳細末配準前數共入乳鉢內再研千轉於端午七夕或二至二分吉辰在淨室中先將烏梅地黃搗膏極爛和藥漸加煉蜜少許徐徐添搗軟硬得中每藥一兩分作十丸金箔為衣每服一丸用人乳童便共一大杯化藥隨病上下食前後服之此藥最解膏粱金石藥毒殺三尸除癆熱極有奇功又治煩癲主安神志避瘴避瘟及諸邪魅譫語妄想失心喪志者俱效修合之時服藥之際俱忌婦人僧尼孝服雞犬等見之此藥用蠟封固收藏勿泄藥味愈久愈效敦疽門主論心法曰敦疽多生於足指而手指亦間有生者此由膏梁太過則損脾房勞太甚則損腎脾既損則血生少腎既傷則精必竭更兼濕熱壅盛而成初起黃粟小泡痛如湯潑火燃其色紅活腫無黑暈潰破有膿腐無敗色此屬血脈未死之候然此證雖無敗色亦由臟腑發出未可視為小毒也急宜內服滋陰救燥補血理脾之藥清心寡欲調理庶無變證金鑑又曰首尾禁用灸法青蛇頭門主論王肯堂曰青蛇頭又名指風毒生足大指節上乃毒蛇所處之地人不知覺早起經過染受毒氣故生此毒初起狀如湯潑火燒痛不可忍內毒滋甚憎寒壯熱四肢痠痛後則胬肉突出痛如刀割用人龍散敷之胬肉自縮輕者經旬匝月重者二三月不收功潰敗筋骨多有之矣準繩青蛇頭門主方人龍散蛇頭胬肉突出人龍即蛔蟲人吐出者更佳廁中者亦可用一條雄黃二錢同搗爛敷胬肉上即時胬肉縮進腫消痛止而愈厲癰門主論王肯堂曰厲癰發於足傍其狀不大初從小指發急治去之其狀黑者不可消輒益不治百日死準繩心法曰靈樞云發於足上下名曰四淫發於足傍名曰厲癰不急治之俱百日死此二證俱由足三陰經虧損為疽者重若兼足三陽經濕熱下注而成癰者輕若紅腫疼痛潰後有膿腐脫無黑氣侵漫屬濕熱偏勝順證易治若微紅微腫潰出膿水屬陰氣凝結不能化膿險證難治若黑暗漫腫痛不潰膿煩熱作渴小水淋漓為陰敗惡證屬逆四淫無邊沿厲癰類敦疽首尾宜壯脾滋水或可成功若妄用苦寒克伐之藥多致不救金鑑痼發門主論陳實功曰痼發乃天時不正之氣感而發之非毒內作也此患多生手足掌心或腰腿臀下伸縮之處漫腫無頭憎寒壯熱四肢沉重煩渴為甚初起宜服萬靈丹發汗解表如仍不消者必欲作膿均照癰疽已成治法正宗心法曰此證疼如痛風其色淡紅臭田螺門主論陳實功曰臭田螺者乃足陽明胃經濕火攻注多生足指腳丫隨起白斑作爛先癢後痛破流臭水形同螺靨甚者腳面俱腫惡寒發熱先宜甘草湯洗淨貼蟾酥餅三日三換後用珍珠散豬脊髓調搓膏蓋腫處以真君妙貼散敷之正宗心法曰臭田螺由胃經濕熱下注而生腳丫破爛其患甚小其癢搓之不能住癢必搓至皮爛流腥臭水覺痛時其癢方止次日依然作癢經年不愈極其纏綿金鑑臭田螺門主方驗方甘草薏苡仁煎湯洗之用黃連膏潤之青蛙毒門主論申鬥垣曰青蛙毒因著濕鞋潮襪一時不覺日久漸成此毒狀如青蛙紅赤者可治紫黑者痛如刀刺經年者難愈必用乳香血竭膏貼之內服活血祛風之劑啓玄腳丫毒門主論申鬥垣曰腳丫毒是足經受證足背趺是足三陽經足掌心丫是足三陰經受證當分何經加引經藥以治之啓玄汪省之曰伏鼠疽多生於手足指上丫間在背外歷歷三五疽如球在皮中痛相應者乃伏鼠疽若不早治毒氣攻心即死理例腳丫癢爛門主論陳實功曰婦人腳丫作癢乃從三陽風濕下流凝結不散故先作癢而後生濕爛又或足底彎曲之處癢濕亦然正宗申鬥垣曰腳丫濕爛乃濕熱下注或熱足下水以致腳丫破爛如平素濕熱盛者聽其淌水不須醫治濕熱由此外泄若驟用燥藥收干反助濕熱內患也啓玄又曰久雨淹水跣足出入於中腳丫濕爛成瘡疼痛難行先用礬湯洗拭再以密陀僧煅赤置地下去火毒研極細末摻之次日即能行走胡公弼曰凡腳丫初起小泡作癢潰爛毒水流注之處即作癢潰爛出水此乃濕氣浸淫之證以神應散治之青囊腳丫癢爛門主方枯礬散石膏輕粉黃丹各三錢枯白礬五錢研勻溫湯洗淨搽藥其癢即止又方濟生五倍子炒枯一兩松香枯白礬水銀鉛各五錢同水銀煅死雄黃三錢上為細末先用荔枝草煎湯洗過將此藥摻之密陀僧散密陀僧一兩石膏枯白礬各二錢輕粉一錢研細桐油調搽濕則乾摻又方鵝掌皮焙研細末摻之香油調敷亦良又方松蘿茶葉焙研細末摻之又方稻草把燒煙燻之又方臭樹花煎湯浸洗又方九江礬紙揉軟夾腳丫內又方草紙煤石粉即婦女勻面撲粉各等分和研細乾摻甲疽門主論王肯堂曰甲疽嵌甲足三陰經皆起於足指氣血沮而不行結於指甲之間能成甲疽凡以經絡之所流注非特肌肉之病也或得於剪甲傷肌或得於甲長侵肉或得於履絇之不適使氣血沮遏而不通腐潰為疽久則爛指上引於脛膝之間而瘡疱者自已然病在四末不必治其內惟塗敷滌濯去惡而除穢及適其行履則愈矣準繩又曰按足指在人體最下氣血易沮藥力難到虛弱之人小有破損即成瘡瘍久而不斂況其大者若非大補氣血豈能易愈古云病在四末不必治內非通論也竇漢卿曰足三陰經皆起於足氣血阻滯不行潰於指甲間或鞋小不適血氣阻遏不通腐潰久則浸淫爛指用蔥椒湯浸洗快刀割去甲角入肉處挹干用白礬燒令沸定為末敷之濕則再敷數易即散矣陳實功曰甲疽因甲長侵肌或修甲損傷良肉或靴鞋窄小俱能生之其患胬肉裹上指甲腫痛異常當以白降丹化去胬肉珍珠散收口正宗申鬥垣曰嵌指即甲疽非氣血不和而生乃因靴鞋短窄或踢蹙故甲內長瘀肉時時流水痛不可忍百治不愈庸醫誤認指疳上藥罔效須令修腳人修去肉甲再上生肌散自愈啓玄甲疽門主方甲疽肉胬膿血疼痛厚牡蠣生研細末每服二錢加青靛少許酒調下又方鹽湯燙洗嵌甲入肉成疽延爛外臺祕要緑礬五兩燒至汁盡研末色如黃丹收之每以鹽湯洗拭用末厚敷以軟絹纏裹當日即汁斷瘡干每日只用一遍鹽水洗淨其痂干處不須上藥或作白膿即擦破敷之自愈華陀屢效散橄欖核三個煅存性黃丹三分硇砂乳香各一錢輕粉五分研細香油調搓牛程蹇門主論陳實功曰牛程蹇乃因程途奔走熱腳下水見風以致氣滯血枯結成頑硬皮肉榮衛不滋漸生腫痛腫高突起步履難行久則破裂膿水相流每日溫湯洗淨搽牛角散又有內膿攻注皮頑難破者以大線針抿頭挑破出膿乃寬硬皮蹺破者剪而去之肉不生者玉紅膏搽之肉滿不生皮者生肌散摻之正宗心法曰牛程蹇生於足跟及足掌內頑硬腫高埂起色黃疼痛不能行履此熱腳著冷水或遇寒邪襲於血脈致令氣滯血凝而成初起宜熏烙之法消之久則破裂膿水津流每日米泔水洗淨搽牛角散四圍頑皮浮起剪去換搽玉紅膏珍珠生肌斂口金鑑牛程蹇門主方牛角散正宗牛角尖燒灰松香水龍骨輕粉各等分共研細末牛骨髓調搽虛弱者兼服十全大補湯又方治腳後跟老皮肉痛起疽破頭成漏久不收口不能著地疼甚者用黃蠟松香各一錢許化開即投入水中取起看漏口大小用藥為丸塞住漏眼外用棉花裹腳扎住勿動十數日之間漏幹著地演試不痛漸漸行動漏內肉長自將藥頂出功難盡述熏法金鑑用瓦盆一個內安新磚磚上安放鴿糞糞上合笊籬以腳踏在笊籬上再以滾水從旁衝入蒸之後漬之冷則易之初起用之可消又法新磚燒紅韭菜汁潑之將病足踏於其上蕩之初起自消足跟疽門主論王肯堂曰足跟疽又名兔齧其狀若兔齧故名屬足太陽經穴名申脈在足跟骨下此處乃陰陽二蹺發源之所由臟腑積熱所致其毒深重最忌毒藥敷貼若紫陷麻木神昏脈亂者不治過時潰爛者有妨飲食二便不調或涉房勞怒氣迷悶者死準繩薛立齋曰足跟乃督脈發源之所腎經所過之地若飲食起居失宜虧損足三陽經則成瘡矣若漫腫寒熱或體倦少食屬脾虛下陷也施治之法滋肝腎扶脾胃為主馮魯瞻曰婦人足跟足指腫痛足心發熱皆因胎産經行失於調攝虧損足三陰虛熱所致若腫痛或出膿用六味地黃丸為主佐以八珍湯胃虛懶食佐以六君子湯寒熱內熱佐以逍遙散晡熱益甚頭目不清佐以補中益氣湯凡發熱晡熱內熱自汗盜汗等證皆陰虛假熱也故丹溪謂火起九泉陰虛之極也足跟乃督脈發源之所腎經所過之地諸骨承載之本若不求其屬泛用寒涼其為夭枉者多矣錦囊又曰男酒色過度者多患此證汪省之曰齧疽屬足太陽膀胱經多血少氣生於腳跟申脈穴又名足疽如初起赤腫有頭可刺黃白色膿可治如初起便破黑爛則凶若不早治令人足落不能生也理例又曰筋疽生兩足後跟崑崙二穴乃足太陽膀胱經多血少氣初起三五日皮如蟲蝕過一年有蟲內食其骨骨粗膿多時凶落蟲如筋頭黃赤色經年不瘥名曰痿漏一名曲疽如膿水不止名曰冷疽多死心法曰足跟疽生足跟俗名腳攣根此因臟腑積熱汗出涉水遠行傷筋而成初腫紅紫疼痛潰破膿水淋瀝狀如兔咬經云兔齧狀如赤豆深可至骨務須急治遲則害人蓋謂毒之深惡也屬足太陽膀胱經穴名申脈即陽蹺脈發源之所又乃腎經所過之路瘡口久潰不合陽蹺脈氣不能沖發腎氣由此漏泄以致患者益虛初起宜隔蒜片灸之服仙方活命飲加肉桂牛膝潰後宜補中益氣湯人參養榮湯桂附地黃丸隨證滋補治之金鑑王海藏曰兔齧久不收斂用鹽湯洗之白朮研末撒之兩日一易謹戒一切勞碌即效澄曰足跟疽多因汗足涉水或遠行有傷筋骨或濕熱流注而生初起必癢勿視容易可用艾灸或因循十餘日膿血淋漓經年不斂如癢以椒鹽湯洗之足跟疽門主方敷法乳香沒藥海螵蛸赤石脂各等分研細末用黃蠟化開和勻作餅敷上包扎即愈流水麻根瘡門主論申鬥垣曰流水麻根瘡多生於足後跟下赤爛內有肉絲縷縷如麻根相似故名之是足太陽膀胱經多血少氣又沾房事況在跟下最難收功必去陰染死肉臭氣用紅升藥加苧麻根煅灰乾摻啓玄宜內服腎氣丸土粟門主論心法曰土粟又名琉璃疽生在足跟之旁形如棗粟亮而色黃腫若琉璃此由行走崎嶇之路勞傷筋骨血脈而成膿熟針之膿少水多者陀僧膏貼之金鑑足疔怪病門主論申鬥垣曰兩足心凸腫上生黑痘瘡其硬如疔脛骨有碎孔髓流出身發寒戰惟思飲酒此名足疔怪病乃肝腎二經寒熱毒氣相合而成啓玄足跟冷疔門主論心法曰冷疔生足跟由濕寒凝結而成形如棗粟起紫白泡疼痛徹骨漸生黑氣腐爛孔深時流血水氣穢經久不斂者宜神燈照之金鑑足跟冷疔門主方鐵粉散金鑑生鐵粉即針砂如無用黑鉛四兩鐵杓化開傾水中冷定取出又化又傾以盡為度去水取淨末三錢黃丹水飛輕粉松香各一錢麝香一分各研細末共和一處再研勻將患處以蔥湯洗去血水腐臭香油調搽患上油紙蓋上線扎雞眼門主論心法曰雞眼本名肉刺生於足指形如雞眼故俗呼之根陷肉裡頂起硬凸疼痛步履不便此緣纏腳或著窄鞋奔行壓擠皆能生之宜貼加味太乙膏滋潤之或用紫玉簪根搗爛塗貼油紙蓋之或地骨皮紅花各等分研細香油調敷俱效金鑑雞眼門主方紫玉簪膏五倍子一兩紫玉簪葉二十片乳香沒藥各三錢河豚眼睛三十個血竭兒茶各二錢真芝麻油半斤東丹四兩先將藥同油熬枯再入乳沒茶竭化盡濾清復入鍋內熬滾徐徐下丹老嫩得宜攤貼又方蜈蚣一條煅研細末每用少許以膏蓋之雞眼膏鮮白果外面緑皮不拘多少捶碎桐油熬枯去渣滴水成珠不散為度加雄黃少許攪勻收貯先將雞眼熱水泡軟貼一伏時揭下內有紅絲拔出又方蜈蚣一條紫草三錢麻油一兩熬至藥枯去渣入淨鍋內加枯礬一錢東丹一錢熬至滴水不散投白蠟黃蠟各五錢每用少許攤貼又方蜈蚣二條白膠香麻油黃蠟各等分先將蜈蚣入油熬枯去渣滴水成珠不散再下膠香黃蠟成膏攤貼又方雞胃食指之餘者以石壓之立驗金蓮穩步膏地骨皮鮮紅花各等分杵成膏敷雞眼疼處即消若已割者敷之次日即痂落腳針膏阿魏莪朮各三錢三稜二錢麝香五分雞肫皮七個陰乾鱔魚血一杯大黃四兩荸薺連皮陰乾二十四個用麻油一斤先熬群藥去渣入阿魏熬枯再下鱔血滴水成珠入炒黃丹四兩徐徐投攪成膏冷定下麝末攤貼雞眼不可用鐵器割只用磁鋒割則再不生患處用荸薺搗爛敷上絹縛即愈腳上肉刺雞眼止痛黃丹朴硝枯礬各等分為末炒蔥白拌塗之雞眼膏荸薺線穿陰乾火丹草陰乾蟾酥萆麻子桃仁穿山甲三稜紅花莪朮天南星各二錢鱔魚血半杯陰乾為末雞肫皮不見水十個河豚眼陰乾十枚虎耳草陰乾阿魏各一錢五分麝香三分麻油六兩飛黃丹三兩熬膏將雞眼修淨攤貼又方烏梅肉荔枝肉各等分搗膏貼之自消肉刺雞眼集驗萆麻子為細末敷上一二時其刺自出痛即止又方蔥根荸薺搗汁一碗煎稠聽用另用松香四兩麻油同煎滴水成珠方入前汁略熬攤膏貼之即落又方集驗蜈蚣一條硼砂等分放磁盅內拌勻埋地下七日取出銀簪點上即脫又方玉簪花根搗爛敷又方荸薺一個喬麥面一錢搗敷一夜除根爛皮濕熱門主論足三陰濕熱腿腳紅腫皮破流脂類乎血瘋浸淫不止癢痛非常當用黃連膏治之爛皮濕熱門主方黃連膏治爛皮濕熱先用桐油一斤入鍋熬起白星為度加黃蠟一兩五錢熔化入研細炒黑大黃末一斤攪勻入冰片二分攤貼又方半枝蓮搗爛敷之遠行奔走腳上起泡門主論遠行奔走皆由包腳布縱而不平或釘鞋釘或襪底得汗縱起或鞋大小擠腳皆能起泡亦有傷及良肉潰膿焮痛者又曰行遠路者走十餘里將包腳布從新包扎則不起泡遠行奔走腳上起泡門主方又方飯黏搗敷以紙覆之過夜平復又方水調白麵敷之人走長路緊急被石塊腳底墊腫不能行步痛不可忍者名曰腳墊懷德堂祕録急用舊草鞋浸尿桶內一夜將新磚燒紅以浸濕草鞋放磚上隨以腫腳踏上火磚逼尿氣入內即消若不早治恐潰爛難愈如走長路腳腫疼痛亦用此法立消凡久行久立腳心腳痛單方蚯蚓屎水和敷一夕即愈足汗門主方止腳汗白礬乾葛各五錢煎湯連洗五日其汗自止小腳門主方桑杏湯桑白皮八錢朴硝一兩乳香杏仁各二錢五大碗水先煎桑杏至三碗再入乳硝封口化盡先熏後洗足大能小其軟如綿又方明礬一兩威靈仙川椒鳳仙花玉簪花各三錢皮硝五錢水煎一個時辰先熏後洗
