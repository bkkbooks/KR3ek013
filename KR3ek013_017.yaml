body:
  text: 卷十七咽喉部凡一切咽喉癰疽風痹音啞皆匯於此部中以便撿閲參治咽痛門主論陳實功曰咽喉雖屬於肺然所致各有不同有虛火實火之分緊喉慢喉之說咽為心肺肝腎呼吸之門飲食聲音出納之道此關係一身害人迅速虛火色淡微腫脈亦細微小便清白大便自利此乃思慮過多中氣不足脾氣不能中護虛火易於上炎咽嗌乾燥飲食妨礙咳吐痰涎呼吸不利斑生苔蘚纍若蝦皮有如茅草當刺喉中又如硬物嗌於咽下嘔吐酸水噦出甜涎甚則舌上白胎唇生礬色聲音雌啞喘急多痰以上現證皆出於虛火元氣不足中來治此不可誤用寒涼上午痛者屬氣虛補中益氣湯加麥冬五味牛蒡元參午後痛者屬陰虛四物湯加知母桔梗元參黃柏如服不效必加薑附以為引導即佐治之法也實火者醇酒辛烈熱積於中久則火動痰生發為咽腫甚則風痰上壅咽門閉塞少頃湯水不入聲音不出此為喉痹緊喉風是也用藥不及事先用針刺喉間發泄毒血隨用桐油餞雞翎探吐稠痰務使痰毒出盡咽門得松湯藥可入語聲得出乃止內服清咽利膈湯疏利餘毒如牙關緊閉難入必當先刺少商穴出血其閉自開如針刺探吐無痰聲如拽鋸鼻掀痰喘湯水不下語聲不出者真死候也難治正宗又曰虛火得者名慢喉風實火得者名緊喉風經曰凡喉閉不刺血喉風不吐痰喉癰不放膿喉痹喉蛾不針烙此皆非法岐天師曰如虛火沸騰於咽喉口齒間用寒涼之藥入口稍快少頃又甚又用寒涼腹瀉肚痛而上熱益熾欲用熱藥涼飲而病人不信不肯輕治乃用外治之法引之而愈方用附子一個為末米醋調成膏藥貼在湧泉穴上少頃火氣衰又少頃而熱止退變成冰涼世界然後以六味地黃湯大劑與之則火不再沸騰矣蓋此火乃雷火也見水則愈酷烈子不見雷霆之震濃陰大雨之時愈加震動驚天轟地更作威勢一見太陽當空則雨歇聲消寂然不聞矣又不見冬令之天地耶嚴寒霜雪冰凍郊原雨雪霏霏陰風慘厲此天氣下行而地氣反上蓋下熱則上自寒也又不見夏日之天地乎酷日炎蒸蘊隆火熱爍木焚林燔湯沸水天氣上升地氣下降此上熱而下寒也人身虛火亦猶是也今既火騰於上則下身冰冷今以附子大熱之藥湧泉引之者蓋湧泉雖是水穴水中實有火氣存焉火性炎上而穴中正寒忽然得火則水自沸溫水溫則火自降同氣相交必歸於窟宅之中矣火既歸於窟宅又何至沸騰於天上哉此咽喉口齒之火忽然消除有不知其然而然之妙此引治之巧又當知之者此即外施引火歸原之法也祕録戴氏曰硬舌根而爛兩旁此名纏舌喉風須用羊毛筆蘸甘草湯洗之然後再吹藥馮魯瞻曰咽喉者一身之總要水穀之道路也若胸膈之間蘊積熱毒致生風痰壅滯不散發為咽喉之疾或內生瘡狀如肉腐窒塞不通吐咽不下如單肉蛾雙肉蛾及痄腮腫脹甚者內外皆腫上攻頭面治宜先吐風痰以通咽膈然後解熱毒清肺胃遲則不救錦囊又曰咽瘡喉痛多屬虛熱血虛虛火遊行無制客於咽喉也虛者八味地黃湯加牛膝五味子煎與食前冷服實者黃連荊芥薄荷薑汁硝蜜噙化喉痛必用荊芥陰虛火炎上必用玄參有用茜草一兩作一服者以其能降血中之火也又曰喉與咽不同喉者肺脘呼吸之門戶主出而不納咽者胃脘水穀之道路主納而不出蓋咽喉司呼吸主升降此一身之緊關橐籥也經曰足少陰所生病者口渴舌乾咽腫上氣嗌乾及痛素問云邪客於足少陰之絡令人咽痛不可納食又曰足少陰之絡循喉嚨通舌本凡喉痛者皆少陰之病但有寒熱虛實之分少陰之火直如奔馬逆衝於上到此咽喉緊鎖處氣鬱結而不得舒故或腫或痛也其證必內熱口乾血赤痰涎湧上尺脈必數而無力蓋緣腎水虧損相火無制而然須用六味地黃湯加麥冬五味子大劑作湯服之又有色欲過度元陽虧損無根之火遊行無制客於咽喉者須用八味腎氣丸大劑煎成冰冷與飲引火歸源庶幾可救此論陰虛咽痛者如此治法正褚氏所謂上病療下也又曰陰氣大虛虛火無制孤陽飛越客於咽喉遂成咽痛者脈必浮大重取必澀去死則近宜人參一味濃煎細細飲之如作實證用以清降之藥禍在反掌愚用人參必同童便製附子同煎溫和食前頓服則監製虛火下歸乃愈如單用人參細細飲之恐浮火益熾亦非穩當奈世人但知熱咽痛不知有寒咽痛也經曰太陽在泉寒淫所勝民病咽痛頷腫陳藏器用附子去皮臍炮製切片以蜜塗炙令蜜入內噙咽其津甘味盡更易之仲景云下利清穀裡寒外熱脈微欲絶面赤咽痛以通脈四逆湯又曰冬月伏寒在於腎經發則咽痛下利附子湯溫其經則愈又曰又有司天運氣其年鄉村相染若惡寒者多是暴寒折熱寒閉於外熱鬱於內切忌膽礬酸寒之劑點喉反使陽郁不伸又忌硝黃等寒劑下之反使陽陷入里禍不旋踵須用表散若甘桔湯之類又曰有咽痛而諸藥不效者此非咽痛乃是鼻中生一條紅線如發懸一黑泡大如櫻桃垂掛到咽門而上難以探取宜用土牛膝根即鼓槌草獨條直而肥大者搗碎入好醋三五滴同研取濃汁滴入鼻中二三點即刻系斷珠破吐出瘀血即安李東垣曰夏傷寒伏於腎少陰之經多咽痛者名腎傷寒也宜熱藥冷飲之陳遠公曰咽喉乾燥久而疼痛人以為肺經之燥熱也孰知腎水涸竭乎夫肺金生腎水也肺氣清肅自下生水惟肺氣虛則肺液只可自養無如腎水大耗故欲救肺之乾燥必先救腎之涸也子母兩富湯熟地三兩麥冬二兩水煎服一劑燥少止三劑疼少止十劑全愈冰鑑又曰生長膏粱素耽於酒勞心過度以致咽喉臭痛人以為肺氣傷也誰知乃心火太盛移熱於肺乎夫飲酒傷胃胃熱熏蒸宜乎肺熱矣然胃火熏肺而胃土實生肺也故飲酒尚不傷肺惟勞心過度則火起於心而肺受刑矣胃火助之則火旺炎上而咽喉燔燒之路自然唾涕稠黏口舌乾燥氣味腥臭而痛矣蓋心主五臭入肺為腥臭矣解腥湯甘草桔梗麥冬貝母各五錢桑白皮天冬生地丹皮各三錢枯芩一錢水煎連服二劑痛止又四劑臭除此方治肺而兼治心又兼治胃者也因膏梁之人心肺之氣血原虛下滋二經之氣血但瀉其火則胃之氣血必傷反增火之焰矣妙在補肺以涼肺補心以涼心補胃以清胃火自退舍不止喉痛而痛自止也醫論選要曰夫咽喉者一身之總要氣與食出入之門戶也咽以納氣故咽氣通於天喉以納食故喉氣通於地自其風邪客於喉間氣鬱而熱則壅遏而為咽疼自其熱氣生於肺胃風毒蘊隆則腫結而為喉痹又有尸咽谷賊之證尸咽者陰陽不和脾肺壅盛風熱毒氣不能宣通故令尸蟲發動上蝕於喉或癢或痛如䘌之候也谷賊者稻芒強澀藏於米而誤食之滯於咽間不能傳化故風熱並聚與血氣搏遂令腫刺如咽嗌之生谷刺也胃脘實熱熏蒸上焦發為白頤赤根固有咽瘡之候竇漢卿曰呼者因陽出吸者隨陰入呼吸之間肺經主之喉嚨已下言五臟為手足之陰咽門已下言六腑為手足之陽蓋諸臟屬陰為里諸腑屬陽為表以臟者藏也藏諸神流通也腑者府庫主出納水穀糟粕轉輸之謂也自喉嚨已下五臟喉應天氣乃肺之系也以肺屬金乾為天乾金也故天氣之道其中空長可以通氣息但喉嚨與咽並行其實兩異而人多惑之蓋喉嚨為息道咽中下水穀其喉下接肺之氣一云喉中三竅者非果喉中具三竅則谷與氣各從一竅而俱下肺中肺下無竅何由傳送水穀入於下焦全書黃帝書云肺為諸臟之華蓋藏真高之氣於肺經也故清陽出上竅濁陰出下竅若世人不知保養六氣七情役冒非理百病生焉病瘍既成須尋所自若喉痹乳蛾纏喉風喉瘡喉痹風毒熱毒等證當刺則刺不可亂醫當吐則吐不可妄治此等證系性命之根本生死立見不識其標本而攻之失其法則禍不旋踵矣丹溪曰咽喉者一身總要與胃相授呼吸之所從出若胞膈蘊積熱毒致生風痰壅滯不散發而為咽喉之病喉內生瘡或狀如肉赤肉為腫窒塞不通吐咽不下甚則生出重舌大法先去風痰以通咽膈然後解其熱毒遲則有不救之患又有熱毒衝上齶而生瘡謂之懸癰及腑寒亦能令人咽閉舌吐不利宜用解施法或曰治法視火微甚微則正治甚則反治探痰出血隨所施治或於手大指少商穴出血行氣沖達於外者必外敷以藥豫嘗以鵝翎蘸米醋繳喉中摘去痰涎蓋酸能收痰又能消積血乳蛾而不散者以小刀就蛾上出血皆用馬牙硝吹點咽喉以退火邪服射干青黛甘草桔梗黃芩山梔大黃白礬牛蒡之類隨證加減為方以散上焦之熱外所敷藥如生地伏龍肝韭根皆可用若咽喉生瘡或白或赤者多血大率多是痰熱先以桐油吐之後用甘草湯解桐油之氣竇夢麟曰咽喉一科昔先太師公立論於前矣余豈敢復言乎獨座細思又不容已也咽喉之證司性命出納氣飲之所深為至重然飲食精氣之要路肺與大腸表裡之別臟腑上通咽喉下由大腸出入之門戶肺為華蓋發蔭五臟死生之玄門也入谷則昌絶谷則亡朝生暮死暮生朝死須臾之間變證不一惟肺主金生生不已循環無端順則五臟華敷百關通暢此所謂養身之道也陽明燥金以致火克而生疾矣咽喉之證從熱而系乎太陽之標故推而治之可以解熱除毒祛風順氣則自然平金也丹溪以米醋攪口中以出痰酸以收之之義也愚見以為太酸則燥先用黃虀汁加玄明粉少許灌喉中以吊其痰次用酸水仍前加玄明粉灌之後用蜜湯潤之漸漸探吐其痰則咽喉開利矣復以冰片散滋之無有不效若纏喉風用前三法不能探吐其痰宜用生桐油灌之鵝翎攪之再用蜜湯潤之急服牛黃清心丸或豁痰丸以墜其痰旋以二陳湯加減服之無不愈者若喉中聲出如雷嗆食眼張天柱倒陷面黑唇焦鼻無氣息目睛突出汗出如珠盧扁復生不能生矣然既患咽喉口舌之證延及頸項頭面而發腫紅如火光萬不可療急用磁鋒砭去惡血用雞子清調乳香末潤之立瘥再用芭蕉根汁潤之以解其毒若口舌腫大紫黑急用針點去血隨吹末藥甚效余久以此法行之頗活甚多故以此理論而發明之再俟高明校裁勿罪迂謬幸甚又云傷寒病四五日發熱鼻乾口燥咽痛者陽明自病也陽明屬胃汗多則胃汁干故津液不能潮咽而干痛者宜用人參敗毒散主之又云傷寒三五日咽喉中有腫其色鮮紅痰涎自出頭痛項強須知屬太陽經邪氣入於經絡觸動心間但積熱之毒攻咽則咽喉腫痛宜甘桔湯內加牛蒡子玄參生川連三味吹藥同前又云傷寒八九日已上身無潮熱腹痛自利而咽喉痛者此太陽經受病也傷寒得汗已不解轉入太陰腹滿時痛自利而咽喉腫痛其色微白此證可治用真武湯主之所謂真武者能補下元助陽正氣以手足和暖為妙經云但要口中紅活有痰可治宜隨證加減用藥若口中黑則血已枯乾聲啞目上視汗出者不能治矣切宜仔細看證又云傷寒八九日已上得汗已不散喉嚨痛舌乾唇燥者此少陰經自病也太陰經受病得汗後未解傳入少陰經少陰屬腎汗多則腎汁干其腎水不能潮潤咽喉故其病也如自利腹中痛手足厥冷咽中腫痛不可吞咽如無涎唾及舌上乾者不治又云病人八九日已上身微熱無他證但喉中痛而無腫聲啞者不治又云傷寒十餘日已上得汗已病解無潮熱脈平靜而咽喉痛者此餘毒上攻也宜用黏子解毒湯又云陰毒傷寒身體重背強眼痛不堪任小腹急痛青黑毒氣衝心四肢厥冷噁心吐逆咽喉不利脈沉細若能速治調醫數十日之內全愈否則難生又云若傷寒傳經日久證變後煩滿咽喉痛舌卷而卵縮者不治又云傷寒十餘日已上病不解傳變咽喉痛外證唇青舌卷者此屬厥陰經受病也難治又云咽喉干痛無痰不治又云咽喉痛而唇卷不治又云咽喉痛而盜汗出不治又云鼻中塞者不治又云口中黑者難治又云口中乾夜間潮熱不得睡臥時發譫語舉足妄動者用十味人參散主之又云若病人手足厥冷口唇搖動者宜用小續命湯薑棗煎熱服又云凡病傳咽喉右畔者乃餘毒未除急服牛蒡子湯降氣湯加減治之又云口中紅活吐得血又有痰涎息而清者不治又云手足冷者不治又云聲音不響喉中無腫干痛者不治又云手足冷不能自收頸低不能自舉眼暈暗者不治又云虛陽上攻上下不升降水火不既濟腰冷不知痛癢口中痰多唇黑者不治又云喉中如雷聲或嗆食不治又云面赤目睛上視不治又云心胸緊滿吐痰不出不治又云面黑頭汗出不治又云自利不治又云潮熱往來時發譫語不治又云自利而喘不治又云胸腹脹急不治又云手足厥冷不治又云心促四肢厥冷不治又云心中怔忡胸前紅甚舌卷面赤目上視者不治又云婦人胎前咽喉痛而脈浮者不治又云男婦法則一般惟女人喉中有腫而色紅者此月經不調也經不能行則壅塞於上故咽腫痛也蓋由榮衛不和但男子以氣為主婦人以血為主男婦各隨其氣血之分調治宜調榮湯可也如病勢重其色微白腳者此虛陽上攻宜服降氣湯探痰吹藥同前婦人有孕心頭痛者不治又云婦人傷寒身發潮熱咽痛者此經行也活人書云婦人傷寒經水適來晝則明明暮則譫語如見鬼神狀此乃熱入血室無犯胃氣及上二焦不可下也小柴胡湯主之今咽喉痛而潮熱往來面赤唇紅者此熱邪上壅也不用小柴胡湯宜用竹葉石膏湯清上膈除心煩所以為妙次用四物湯又云喉中有瘡其色帶黃探痰同前用小刀點瘡上出膿後即吹冰片散宜用鼠黏子解毒湯竇夢麟曰喉腫乃毒起於脾經因食煎煿油膩等物及飲酒太過而行房事以致毒氣不能流行聚結於喉根若不速治潰毒閉急即死治法先用醋水虀汁攪去痰涎再吹藥又曰咽喉間生肉層層相疊漸漸腫起有孔出臭氣用臭狗橘葉煎頻服之而愈汪省之曰虛陽上攻氣不升降致結患咽嗌痰涎壅塞治以蘇子降氣湯理例澄曰咽喉之病近世最多者有數證曰單乳蛾雙乳蛾曰子舌脹木舌脹纏喉痹走馬喉痹其熱氣上行轉於喉之兩旁近外結腫以其形似是謂乳蛾一為單二為雙也其比乳蛾差小者為喉痹熱結於舌下復生小舌名曰子舌脹熱結於舌中舌為之腫名曰木舌脹木舌者強硬而不柔和也熱結於咽喉腫繞於外且麻且癢腫而大者名曰纏喉風痹暴發痰涎湧盛水漿不入然名雖不同其證總不外乎手少陰君火手少陽相火為病也二脈並絡於喉氣熱則內結結甚則腫脹脹甚則痹痹甚則不通而死矣其危者可以咸軟之而大者以辛散之如薄荷烏頭殭蠶白礬朴硝之類用之自可消除至於走馬喉痹則非此等所療以其生死只在反掌之間耳急救之法無如砭針出血血出則病已此上策也後之患者萬勿畏針以自斃其命後之君子萬勿執小方而曰吾藥不動臟腑又妙於不用針砭出血在小疾幸而獲愈而大疾必致死亡特為拈出以告病者醫者勿自誤以誤人也又曰凡咽喉用針後有針創者宜搗姜塊和以熟白湯時時呷之則創口易合王奎光曰咽喉為人身飲食門戶呼吸關隘方寸之地受病危險其證甚繁大約總歸於火蓋少陰少陽君相二火其脈皆絡於咽喉故往往為火證之所結聚君火勢緩則結而為疼為腫相火勢速則腫甚不仁而為痹痹甚不通而痰塞以死經云一陰一陽結謂之喉痹火者痰之本痰者火之標火有虛實實火因過食煎炒炙煿蘊結積毒其證口渴二便祕塞風痰上壅將發喉痹必先胸膈不利脈弦而數治宜先去風痰後解熱毒虛火或因飲酒太過或因忿怒或因色欲火炎上攻咽喉乾燥必二便如常少陰脈微治宜補虛瀉火凡用藥不宜純用寒涼取效目前上熱未除中寒復起毒氣乘虛入腹胸前高腫上喘下瀉手足指甲青黑七日以後全不進食口如魚口者死且治咽喉最忌發汗針砭出血已寓出汗之意何堪更發其汗凡傷寒於腎及帝中喉名腫者斷不宜針至如內傷虛損咽喉失音無法可治又曰喉證初起一日寒戰即生髮者發後身涼口不碎又無重舌或二便俱利不可認作熱證皆因陰氣虛寒而發其痰不可吊盡此痰即身內之津液所化與熱證乳蛾廣八彖舌之痰壅一處以流盡則毒愈者不同若亦流盡則精神竭而必斃先宜藥吹或用水換之法使喉一通即便服藥初劑發散和解第二劑即施溫補滋養之藥設三四日再發寒戰或心疼骨痛脅疼等證皆屬難治又曰發時牙關緊閉舌喉俱腫口碎而臭或有重舌及舌上有黃屑者發後下午再發寒熱二便閉塞者即作熱證用石膏敗毒散主之然亦易愈之證如漸起三四日後而寒熱者雖極凶亦不為害惟有證未減而牙關反不緊閉唇口不腫紋如好人者不治舌腫滿口者不治色如胡桃如茄子如砂紙者不治或連重舌發寒熱者猶可治也舌以箸按之若色雪白起箸即紫紅色者此身內血已死然口若臭猶或可生尤忌口渴氣急痰多而稠如桃膠者死期已速又曰一頸俱紅腫者亦極危也面帶紅紫面青帶白神氣少者俱無救不語者死略能語者尚有可生之機面色少神喜坐低處者亦難治帝中喉也乃性命攸關舌系下通於腎白腫不治傷之者死又曰凡喉證至五日即重三日前證雖重尚未成膿藥能清散若至五六日患處多成膿隨便穿破後爛成窩為難愈如爛用口疳藥多加龍骨珍珠又曰凡喉非急證者一二日未必發熱病尚輕緩若至三日發熱證必加重須問其大小便通利與否如二便利證候雖加不過浮火上攻服解毒消風消火之藥即愈若二便不通利必內有實火非用降火解毒重劑及通利二便之藥火何從而出病何從而解亦須問其頭痛與否如頭痛即兼傷寒難治凡喉證必俟大便去後方可望痊若大便祕結未可輕許又曰凡喉證初起大便祕結宜大黃玄明粉通之則大便降而易痊若至五六日久而不食大便結用之立斃蓋病久元氣已虛豈宜再用硝黃當有善法以處之又曰凡患喉證者無痰不治又曰凡喉證先碎者先吹長肉藥後吹碧丹又曰凡吹喉證須吹藥四五管方得痰出三次可以痊愈其出痰初吹宜多用金丹必直對帝中重吹之急提出管恐痰即嘔出也又曰婦人喉證腫痛有因經閉致火上攻而成者宜內服通經藥月事通則愈又曰凡喉中無形紅腫者當用燈心又曰凡喉證凶者面發腫白亮無光彩脈微沉無力是神氣外泄無陽之證斷不治若面發紅腫脈來洪大有力證雖極重是有元氣火氣盛治之易痊又曰凡吹喉嚨藥醫家吹時氣須和平用管周遍為妙又曰凡初起吹藥須令患者低頭流出涎痰又曰凡吹喉證欲出痰涎藥中用皂莢末少許傷寒論曰咽中閉塞不可發汗發汗則吐血氣欲絶又曰咽喉乾燥者不可發汗咽痛門主方竇氏新增一切咽喉口舌等證神效方牛膽硝生黃連黑山梔生黃耆白硼砂各三錢青黛水飛去渣曬乾青梅乾煅存性人中白煅各五錢雞內金即雞肫內黃皮雄黃各一錢枯礬二錢各為細末和勻加真麝香三分真冰片六分再研和入小罐內用烏金紙塞緊罐口每用蘆管超藥吹入患上一日夜吹十餘次徐徐流出痰涎漸愈如有腐臭急用蚌水灌淨或用豬牙草扁柏子和搗加水去渣灌淨前藥五錢加牛黃二分銅青熊膽珍珠各五分兒茶八分研吹近世喉科每每勒財下藥者多凡有力之家宜修合施人以積子孫附制牛膽硝法冬月入朴硝在黑牛膽內掛在風處一百二十日去皮收之附制青梅乾法大青梅一斤去核入白礬食鹽各五錢拌和再加蝣蜒不拘多少層層間之一日夜取梅曬乾收盡汁再曬乾煅灰存性用時加入夏月宜服冷香薷其灌口用雪裡紅搗汁灌之冰片散竇太師真冰片雞內金燒存性生甘草枯礬各一錢黃連玄明粉黃柏蜜炙雄黃各二錢鹿角霜一兩硼砂五錢鈔三張煅灰靛花二錢各研細和勻吹入口中氣臭加人中白煅三分銅青略煅不宜太過五分紫雪竇太師青礬不拘多少火煅通紅取出放地上出火毒硼砂元明粉冰片麝香研極細放舌下或喉間雄黃化毒丸竇太師巴豆仁三十五粒雄黃水飛緑豆粉甘草節鬱金如無用蟬肚薑黃代之各一錢研末醋糊為丸黍大每服七丸茶清下吐出痰涎立醒未吐再服七丸如人死者心尚熱研末灌之牛黃清心丸竇太師膽南星一兩防風川黃連雄黃各二錢五倍子元參天竺黃桔梗白茯神當歸烏犀角鎊荊芥各一錢真冰片珍珠真麝香各五分輕粉三分上為細末和勻甘草膏為丸如龍眼大辰砂為衣日中曬乾入瓷瓶內塞緊瓶口勿令出氣臨服用薄荷湯磨服一丸冰硼散毋論新久咽喉口齒腫毒及久嗽痰火咽啞作痛玄明粉硼砂各五錢硃砂六分冰片五分研極細吹患上甚者日吹五六次柳華散治喉瘡及口舌生瘡走馬牙疳咽喉腫痛蒲黃炒黃柏炒人中白煅青黛各一兩冰片五分硼砂五錢共為細末吹喉極效漱藥山豆根夏枯草松羅茶陳者嫩菊葉蘇薄荷各等分煎湯頻漱三黃解毒湯黃連二錢黃芩黑山梔黃柏各一錢五分水煎服清胃湯生地二錢升麻連翹牡丹皮黃連水煎服引火湯雷真君熟地元參各一兩白茯苓五錢白芥子二錢山茱萸山藥各四錢北五味二錢肉桂一錢水煎服生肌散痧痘口瘡臭爛黃連土炒地骨皮黃柏五倍子生甘草各等分研細乾摻之若仍有作熱作膿而不即愈者乃內毒未盡也仍用大連翹飲解之二聖散痧痘咽喉腫痛不拘初起回後白殭蠶二錢苦參三錢研細吹入三四次即腫消痛止敗毒散疹後口臭口瘡唇爛咽喉疼痛生地一錢五分桔梗連翹牛蒡子天花粉元參金銀花各八分粉丹皮柴胡各七分生甘草三分黃柏蜜水炒薄荷赤芍藥各五分熟石膏一錢加淡竹葉一錢燈心五十寸同煎再加生犀角磨汁和藥服每日用米泔水洗十餘次若不頻洗又不服藥內熱熾甚則變走馬牙疳矣喉間腫長如瓜蒂者不可刺刺破則傷人鹽煅過研細以雞翎蘸搽即消喉下諸般腫蝸牛飛面研勻貼腫痛紫袍散周鶴仙治咽喉十八種證石膏青黛硃砂白硼砂各一兩人中白煅元明粉膽礬山豆根真冰片三分共乳極細末瓷瓶密貯急時用二三釐吹咽喉即愈熱痛咽痛童便三合含咽咽喉破爛倒掛塵陰陽瓦煅七分明礬三分研細吹回生救苦上清丹徐峨峰治咽喉十八種急證如神白殭蠶焙存性一錢生硝尖煅硝尖白硼砂各五分明礬熟礬各二分海螵蛸三分冰片一分共研極細末瓷瓶收貯每用少許吹上吐去痰涎即愈咽喉危證野蕎麥春間初發紅嘴形類海棠六七月間可長四五尺其莖葉頗似海棠節有紅節葉大如掌每採鮮葉搗汁入醋一匙以綿蘸掃涎出即活奎光祕傳咽喉口齒合藥法玉丹此宜預先多制愈久愈神將明礬指頭大塊者入罐內放桴炭火上熔化以箸試看罐底無塊時隨投火硝如礬一兩下硝三錢為則硼砂每礬一兩下硼砂三錢為則少頃又投明礬化盡又下硝硼如前法逐層投完待罐口鋪地如饅頭樣方用武火煉至乾枯用淨瓦覆罐口一時取起將研細牛黃少許用水五六匙調和以匙挑滴丹上將罐仍入火內烘乾即取起連罐覆淨地上下以紙襯地上用瓦蓋七日收貯聽用制黃柏法揀好黃柏切片用荊芥穗為君甘草佐之煎濃汁浸軟攤瓦上緩緩炙黃不可令焦酒白蜜湯曬乾研末聽用制燈心灰法取白色燈心先用水灑潮以厚筆管將燈心塞令堅緊筆管兩頭用紙塞實入火緩緩燒過去竹管塞紙開看如燒不過則生如燒太過則無有矣制須得法為妙制豬牙皂角法取堅小不蛀豬牙皂角放瓦上火炙脆去兩頭研末瓷瓶密貯聽用制硝法入金丹用者火硝以溫湯蘸過綿紙挹干包好放灶上洞內五六日收其濕氣入玉丹內不必如此合碧丹法每用玉丹三分配百草霜半匙研勻入燈心灰一釐甘草末三匙蘇薄荷葉末三分研極細然後入好冰片五釐多些更妙再研勻入小瓷瓶內勿泄氣此丹宜臨用旋合不可出三日不可過陰天春夏宜多加蘇薄荷葉末其色青秋冬宜多加玉丹其色白欲出痰加皂莢少許合金丹法每用提過硝一錢八分入生蒲黃羅細末四分共研細次下殭蠶末一分豬牙皂角一分和研成淡黃色加冰片一分再研此藥可以久留冰片臨用時加按金丹功主消腫出痰並牙咬舔舌穿牙疔毒專用此丹治之咽喉等證則兼用碧丹看證輕重加減如證重者再加牛黃於本方內如喉腫證及喉風加殭蠶牙皂輕證只用硝與蒲黃蓋碧丹消痰清熱解毒驅風固為良劑尚屬平緩不如金丹消腫毒除風熱開喉閉出痰涎最為神效但喉證初起金丹不宜多用因其能直透入內且善走散初起若多用之恐輕證不勝藥力反扞格難入也凡喉證及單雙蛾只用碧丹其他重證金碧兼之須分先後多寡初起碧丹九金丹一吹五管後碧丹八金丹二再吹碧丹七金丹三如證重者碧丹金丹各半用至三五次後痰涎必上湧然後金丹六碧丹四將管直入喉中重吹一次隨收出管即吊出痰竟用金丹八碧丹二亦可膏滋藥法蘇薄荷為君玉丹為臣川貝母為佐燈心灰百草霜甘草冰片為使先將玉丹百草霜研和後入燈心灰再研再入薄荷甘草貝母研極細方入冰片研蜜調服凡喉癰喉菌須時時噙咽之證重則兼煎藥及吹藥喉證主方牛蒡子炒研前胡連翹炒桔梗黑山梔栝蔞根枯黃芩元參甘草或加金銀花發熱加柴胡頭痛加熟石膏口渴加麥冬知母胸膈飽加枳殼鬱熱加芍藥貝母水煎服三黃散方生地為君蒲黃為臣牛黃為佐冰片為使共為極細末用芭蕉根汁或扁柏葉汁和蜜調敷此藥治頭癰面癰如腫硬不消因氣凝血滯或痰塊結而不散則兼陰證矣宜用薑汁蔥汁為要兼治小兒丹毒玉鎖匙方巴豆壓油於紙上捻成條子點燈滅火以煙薰入鼻中一時鼻若流涕其關即開犀角解毒丸犀角鎊一錢桔梗一兩赤茯苓牛蒡子生地各五錢元參連翹各六錢朴硝甘草青黛各二錢共研極細末煉蜜為丸如龍眼大薄荷湯化下挾驚者硃砂為衣此通治小兒諸瘡毒及痧痘後餘毒喉齒等證口疳藥即兼長肉方每薄荷三分配兒茶一分五釐制黃柏釐許龍骨二釐白芷二釐五毫如腫痛即用三四釐甘草珍珠各五釐各研細配合再研加冰片三釐再研勻入瓷罐內凡遇口碎及各種口疳用此若初腫起而熱甚者多用薄荷若不腫不甚熱病久宜用長肉為主本方多加兒茶珍珠龍骨如色成紫及一切喉證碎者亦用此長肉如治走馬疳穿牙疔及重舌口疳初生小兒胎毒口疳本方中加牛黃倍珍珠無不奏效若黑而臭腐者不治小兒黃色胎疳如干橘穰者不治如治痧痘後口疳去黃柏龍骨加牛黃倍珍珠各五釐多更妙大抵遇極凶證難效者或欲速愈見效加牛黃珍珠各五釐多些更妙痘後疳非此不效餘證加之亦無不神應凡用碧丹看證凶險時冰片宜多加些將愈甘草宜多加些吹咽痛壁蟢窩二十個橄欖核三個共於陰陽瓦上焙存性研細吹冰梅治咽喉百病半熟大梅子一百枚五月五日午時用食鹽朴硝各四兩水三碗入壇內浸梅子其水約過梅子三指浸一宿後入豬牙皂如眉毛大者作去核去弦防風甘草白礬各四兩鮮南星切片鮮半夏切片各三十五枚桔梗二兩研細拌入浸七日取梅曬乾又侵又曬以汁盡梅上起白霜為度瓷瓶收貯凡用取梅一枚絲棉包噙口內有水先咽五六口後有痰涎吐盡以口內無痰只有清水方去梅子可以食粥一枚可治二病赤麟丹吳振華治喉痹喉風喉蛾喉癰七十二證如神用傾元寶罐一個入明礬二兩好血竭二錢於罐內放巴豆仁二十一粒於礬內放炭火上煅令煙盡冷定加白硼砂二錢冰片一錢共研極細瓷瓶密貯每用少許吹之喉痹門主論陳實功曰喉痹咽喉腫痛半塞半開又寬又腫此乃標病雖重無妨用金鎖匙吐出痰涎利膈飲推蕩積熱正宗馮魯瞻曰喉痹者即纏喉風類是也其候面赤氣粗咽喉腫閉乃蓄熱生風積聚毒痰而作甚者內壅肉瘤一塊氣閉不通若至鼻而青黑塞噎頭低痰膠聲鋸者不治更有臟寒亦能令人咽閉而吞吐不利者蓋諸證下寒過極則上熱反盛不獨此也其候與蛾證相近而治法不能無異大抵無形腫閉者為痹有形腫痛者即是蛾耳先吐風痰者急則治其標也後解熱毒者緩則治其本也至於上熱下寒者用熱藥食前冷服之不可誤服涼藥也又曰經曰一陰一陽結謂之喉痹一陰君火也一陽少陽相火也手少陰心脈挾咽足少陰腎脈循喉嚨其人膈間素有痰涎或因飲酒過度或因忿怒失常或因房室不節蓋飲酒過度胃火動也富貴人多犯之忿怒失常肝火動也婦人多犯之房室不節腎火動也男子多犯之火動痰上而痰熱熏灼壅塞咽嗌之間痰者火之本火者痰之標火性急速所以內外腫痛水漿不入乃外證之最危者治療之法急則治標緩則治本治標用丸散以吐痰散熱治本用湯藥以降火補虛奈何治者但云治脾肺火而未云降肝腎火也必須以內經從治之法切不可驟用寒涼益促其危耳故實火須用正治虛火須用從治須分明白不可少誤又曰咽與喉會厭與舌四者同在一門其用各異喉以納氣故喉氣通於天咽以納食故咽氣通於地會厭管乎上以主開闔掩其氣喉令水穀能進食喉而不錯四者交相為用闕一則飲食廢而死矣云喉痹者謂喉中呼吸不通言語不出而天氣閉塞也云咽痛及嗌痛者謂咽喉不能納唾與食而地氣閉也云喉痹咽嗌痛者謂咽喉諸病天地之氣並閉塞也按咽之低處為嗌又曰咽在後主食喉在前主氣十二經中惟足太陽主表別下項余經皆內循咽喉盡得以病之而統在君相二火喉主天氣屬肺金變動為燥燥則澀而閉咽生地氣屬脾土變動為濕濕則腫而脹皆火鬱上焦致痰涎氣血結聚咽喉腫達於外麻癢且痛為纏喉風腫於兩旁為喉痹其單蛾雙蛾木舌舌脹纏喉走馬喉風病同於火故不分也惟纏喉走馬殺人最速又曰喉痹多屬痰熱重者用桐油探吐纏喉風亦屬痰熱謂其咽喉裡外皆腫者是也亦用桐油以鵝翎探吐又曰肺絶喉閉其脈浮散而微細其聲如鼾有如痰在喉中響者此為肺絶之候宜速用人參湯調入竹瀝薑汁服之若早治者十全七八次則十全三四遲則十不救一又曰喉痹用陳年霜梅入蜒蚰令化每患喉痹等證用梅噙於口中神效錦囊張子和曰治喉痹用針出血最為上策內經火鬱發之發謂發汗出血者乃發汗之一端也醫論選要曰臟腑停寒寒則氣縮如物窒礙於其間固有喉痹之證又曰陰證下虛令人喉痹又當治其下寒則痹自通矣又曰走馬喉痹者謂喉痹急甚其死又速藥緩不及救也惟針出毒血病即時愈竇漢卿曰或問風毒喉痹內外俱腫其故何也風毒之氣結於喉間則壅塞喉間乃風毒與痰相搏故也素問云無風則不動痰無痰則不受風風痰相搏結塞咽喉其外證咽喉形如雞子其色微白外面腮上有腫其形似瘡身發寒熱牙關緊強語聲不出者是也先用虀汁加元明粉或蜜湯探取其痰急服荊防消毒散牙間腫處紫黑用小刀點破即用冰片散吹之無不效驗全書又云風熱喉閉內外俱腫者謂其人久積熱毒因而感風風熱相搏發出外來則壅喉間其人面赤腮腫身發寒熱喉中有塊如拳外血鮮紅先用玉字藥蜜調點之次用荊防消毒加減治之又云如牙關緊強不得開者此皆風痰相搏壅塞咽喉先用木針排開或黃虀菜汁或溫蜜湯或醋水俱入元明粉灌喉再用鵝翎攪之吐出痰涎幾碗外用五倍子醋調敷之急服荊防二陳湯吹冰片散又云虛陽上攻由於久病元氣虛弱邪火上行咽喉腫痛上下不升降水火不既濟心火沖喉故腫痛而閉塞其形若何曰語聲不出牙關緊急痰涎滿口手足厥冷頭目昏眩者是也治法如前又云或厥重不省人事目張直視可用吳茱萸研爛醋調塗兩腳心然後用降氣湯治之氣喘加前胡烏藥氣短加沉香人參待手足溫飲薄粥以斂元氣入谷則昌絶谷則亡此之謂也又云如腮頷浮腫外面赤者此必感於風毒急用紫蘇楓葉柏枝煎湯洗之外用荊防羌活湯以祛其風或十宣散又云酒毒喉痹乃酒毒蒸於心脾二經則壅咽喉其人面赤而目睛上視者是也取痰法如前再用冰片散吹之清涼散飲之又云酒毒喉痹其形若雞子其腫鮮紅其光如鏡外證發熱惡寒頭痛頸強此上焦積熱心脾受之蓋心脾二經主上焦宜服黏子解毒湯又云風熱喉痹由於憂思勞碌太過或對風言語風入肺經作痰務多去痰為要其色鮮紅久而紫赤急用小䤵刀點之或用蘆刀點之血微出火已瀉矣再服煎劑並冰片散吹之甚效凡紫赤色者變為淡紅色愈之漸也又云氣癰喉痹此證為因聚毒塞於喉間痰涎稠實發寒熱者仍分上中下三關毒在下關者難治上中二關用吹藥吹喉茶湯送下雄黃化毒丸七粒竇夢麟曰喉閉此證因外感寒邪內傷熱物或大寒後便入熱湯洗故將寒氣逼入脾經冷氣阻於中脘邪氣熱客於心經故生此疾急用三稜針刺手腕中紫筋上或少商穴出血卻將雄黃化毒丸冷茶磨化灌之仍將冰片散次入喉中待漱出風涎稠痰為愈又云風毒喉痹外赤腫內腫微紅帶白色其形似蒸餅連腮腫痛外證身惡寒而無熱腮頷浮腫牙關緊強此乃風痰相搏結寒喉間治法必以去痰為主吹藥吹之若外面腫紅用圍藥敷之中留一小孔再潤之以助藥力又云風熱喉痹其腫紅而微紫其形如拳其人面青而目上視外證壯熱惡寒儼若傷寒此病人久積熱毒因而感風所致如病人聲音不響宜用潤肺之藥治之又云酒毒喉痹其腫黃其血黑其形若臂其腫若坎外證面赤目睛上視此乃熱毒傷於心脾氣通於口循環上下故咽喉痛治法先取其痰再吹藥鼠黏子湯多加乾薑花粉生黃連山梔枳殼連翹桔梗元參又云陰毒喉痹腫如紫李現黑色其色光血紅可治陰毒血黑不治外證惡寒其身瞤動振腰痛腳冷此乃冬月感陰濕火邪相干也其血微紅及腫處軟喉中有痰可治血紅黑甚腫硬喉干難治先服五福化毒丹次以蘇子降氣湯再吹藥一月之內戒酒又云傷寒喉痹乃傷寒遺毒不散致八九日後喉痹皆因熱毒入於心脾二經吹冰片散錢青掄曰喉閉必先兩日胸膈氣緊出氣短促驀然喉痛手足厥冷氣閉命懸頃刻速用雞翎或鵝毛蘸桐油喉間攪探吐痰立開切忌牛黃入口不救如無藥或有藥不進者急將兩臂以手勒數十次取油頭繩扎大拇指以針刺指甲邊即少商穴血滴下其喉即通只刺男左女右重者兩手齊針單方全集丹溪曰喉痹屬痰屬風屬熱皆因鬱火而兼熱毒腫甚不紅者乃咽喉之虛證奎光曰傷寒後發喉痹乳蛾難治為氣閉不通無形無勢其證喉項強硬目睛上視故多不治喉痹門主方祕法如初覺咽喉壅塞即以紙捻取嚏或皂角末吹鼻中取嚏可散熱也喉痹錦囊取山豆根汁含咽即開有藥不能進者急取病人兩臂捋數十次使血聚大指上以發繩扎住拇指針刺指甲縫邊出血如放痧一般左右手皆然其喉即寬蜜附子法三因治感寒咽閉不能咽大附子一枚生去皮臍切作大片蜜塗炙令黃每用一片口含咽津候甘味盡再換一片含之以效為度喉痹鴨嘴膽礬研細醋調灌吐膠痰喉痹雙單蛾地骨皮陰陽瓦焙研細末蘆管吹入即吐痰涎喉痹乳蛾蛤蟆衣風尾草擂細入鹽霜梅肉酒煮各少許和勻研布包絞汁以鵝翎刷患上吐痰即消喉痹喉蛾急救方烏梅肉包鼻涕蟲於內如元眼大絹包噙口內即愈喉痹壁錢即蟢蛛窩七個新瓦上焙用硼砂五分冰片一分研細密貯先用土牛膝草煎湯漱口吹少許喉痹雙單蛾豬膽將糯米灌滿陰乾共搗為末加冰片乳極細吹三次吐痰愈喉閉周鶴仙纏喉風急喉痹雙單蛾湯藥不下者巴豆七粒三粒生用再以四粒燈頭上燒存性明雄皂子大一塊鬱金一個如蟬肚大者佳共為細末每用一半清茶調服如口噤咽塞用竹管吹入喉中須臾吐痰即愈但能灌下無有不活者凡患喉痹在窮鄉僻野藥石不便者急將病人面朝上臥於地下令一人兩手揪住頭髮兩腳踏其肩頭自散又方食鹽炒紅研末以竹管吹五六次吐出痰涎即安治喉痹乳蛾咽喉腫痛湯水不入死在須臾巴豆去殼研末入北細辛少許同研卷在紙中間成條剪斷用針穿一孔如患在左塞右鼻孔患在右塞左鼻孔左右俱患塞兩鼻孔咽喉立通又方牆上壁錢七個內要活蜘蛛二個捻作一團再用生明礬七分一塊傾銀罐內化開將壁錢入礬內煅存性為末竹管吹入立時就好雖將死者亦能復活忌食熱物硬物又方真蟾酥為末用箸頭點入對嘴上即時消散又方白礬黃連豬牙皂角各等分同放新瓦上焙乾為末每用五分吹入喉中少頃膿血即出而愈又方青靛吹喉痹乳蛾如神又方膽礬二錢冰片二釐研勻吹上即消又方生芝麻油一合灌之又方韭菜地上挖取紅小蚯蚓同醋擂汁灌之即吐痰血而愈又方枯白礬末吹入喉中急用燈盞內油腳灌之即消又方馬屁勃研末吹咽喉立效又方蠐螬蟲取汁點入得下即通又方㸺牛角燒透為末每服二三錢酒調服又方馬蘭草葉入香油少許搗汁點上即消又方生韭菜搗敷項上立效又方硼砂含咽大能瀉熱利膈消腫清咽化痰喉痹及喉中熱痛口生瘡好雪梨取汁頻飲多食亦可二生散治喉閉並吹乳癰腫惡瘡生明礬生雄黃各等分研為極細末喉閉吹入吐出毒水日三次瘡毒醋調或涼水調敷喉痹喉風兒茶硼砂膽礬各等分共入鐵杓內熔化枯冷定刮下研細吹喉痹青魚膽陰乾為末收好壁錢焙秧根上螺螄用尖各等分研細吹之如吹三次不開關則無救矣喉痹喉風壅腫直殭蠶一兩蔥一把煎湯洗項下風熱即散然後吹藥喉風門主論醫論選要曰纏喉風者熱結於喉腫繞於外且麻且癢腫而大也治療之法微者可以咸軟之大者可以辛散之或去風痰或解熱毒如腫甚藥不能下者以藥灌鼻中令吐之外以拔毒之劑敷之熱退腫消為吉竇漢卿曰夫纏喉風屬痰熱咽喉裡外皆腫者是也外面無腫者必身發熱面赤此乃熱毒之氣極也外面有腫者身亦發熱邪火發外之原也或牙關不強外面不腫但喉中紅者曰暴感熱在心如左邊病退傳右邊此餘毒未盡故也咽喉有數證有積熱有風熱有客熱有病後餘毒未除變化雙乳蛾者且如病中喉間有腫紅色數月其光似鏡者此積熱也且如喉中有腫其色微白其形若臂者此風毒喉痹也此熱毒因而感風相搏而發故也或咽中有腫其色帶紫色者此乃客熱謂其人暴感熱毒之氣壅塞喉間須用木通元參生地黃芩黃連山梔仁瀉心經之火為要或有傳變木舌者皆心熱蘊積於胸中故口中痰臭服劑以涼膈為要搓藥以冰片散佐之或用小䤵刀點之以出紫血全書又云纏喉風外證如蛇纏頸身發潮熱頭目大痛其證腫如紫糖色內證其腫紅線白色腫塞不見咽下吹藥內加雄黃冰麝服荊防黏子二陳湯急用鵝毛蘸燈窩濁油攪去痰涎三四碗方活如痰不能去難生矣須要避風又云啞瘴喉風乃風痰犯於咽膈之間因此口不能言牙關不開急用蟾酥磨水滴入鼻孔即開隨用桐油滴入喉中仍將鵝毛攪喉間風痰出盡再用甘草湯解桐油之氣吹藥更服荊防敗毒散如若面紫舌青唇黑鼻流冷涕爪甲俱青目中多淚俱不治又云弄舌喉風此證啞不能言舌出常將手拿急將兩手大指側爪甲縫用三稜針每指刺三針有血可治無血不治若針少商穴亦妙用銅匙排開口用膽硝丹吹入喉中燈窩內油腳再用鵝翎蘸攪出痰涎仍服雄黃化毒丸七丸清茶送下後服疏風甘桔湯頻吹冰片散竇夢麟曰纏喉風因腎經有熱內枯不能上潤致令心火強盛故發此證如喉間雷響者不可治切宜仔細又曰嗆食喉風此證因熱毒在於心經咽喉燥而無痰若嗆食者不可治如久不治變為飛絲勞毒能傷人命又曰腳根喉風此證腳根發起至於喉間或一年發一次半年發一次切忌熱物不得傷於怒氣其病一日行一穴至七日行七穴雖然不妨只是要發用吹喉藥仍服敗毒藥如腫惡發泡者死男子患纏喉風腫表裡皆作藥不能下余以疏風清熱藥灌六十餘次外以陽起石燒研同伏龍肝等分和勻新汲水調掃百遍三日熱始退腫始消胡景周曰如用桐油探吐或吹藥吐痰後而腫不消或人事不知者急用針刺患處以去惡血即蘇奎光曰纏喉風因心中急躁而發先二日必胸膈氣緊出氣短促忽然咽喉腫痛手足厥冷頸如攪轉熱結於內腫擾於外且麻且癢喉內紅絲纏繞手指甲白手心壯熱喉腫而大風痰壅盛聲如拽鋸是其候也最為急證初起一日夜目直視喉中如雷聲者不治燈火近患人口吹滅者不治若喘急額汗危在旦夕又曰纏喉風者熱結於喉腫繞於外且麻且癢也又曰纏者自頤纏繞赤色寒熱也又曰纏喉風初起用金丹碧丹等分頻頻吹之內服煎劑下藥須兼牛黃方載咽喉門喉風門主方纏喉風喉痹此證胸膈氣急忽然咽喉腫痛手足厥冷氣閉不通真鬱金一錢明雄二錢巴豆霜三分研細水丸如芥菜子大每服十二丸用滾水些須送下如口噤喉塞用小竹管納藥入喉中須臾吐痰即活急喉風喉痹端午午時取蝣蜒百條放瓶內候化為水再用霜梅不拘多少浸在蝣蜒汁內三晝夜取梅曬乾復投汁內浸透又曬汁盡為度瓷瓶收貯每用一梅患者噙之鎖喉風萬年青搗汁和滴醋含漱即愈纏喉風麻油調白礬末和雞子白灌之緊喉風燈窩油和漿水灌之又方土牛膝根搗爛和醋灌之又方針刺紅腫之處發泄毒血自愈鎖喉風喉痹不能吞物數年不愈者土牛膝草不拘多少扁柏葉一把用井水浸透搗取汁大半碗加牛乳一酒杯和勻含吞數口二三次即愈纏喉風神方活人甚衆白礬細末五分烏雞子一個調勻灌喉中立效神效吹喉散治纏喉風閉塞及乳蛾喉痹重舌木舌等證蘇薄荷淨葉朴硝枯白礬青黛白殭蠶火硝白硼砂黃連各等分共研細末臘月初一日取雄豬膽七八個倒出膽汁以豬膽一個拌上藥五錢為率復灌膽殼內以線扎好膽外用青耳從龰紙包裹將地掘一地坑深一尺上用竹竿懸空橫吊再用板鋪以泥密蓋候至立春取出掛風處陰乾去青紙膽皮瓷罐密收每藥一兩加冰片三分同研極細吹患上神效金鑰匙纏喉風喉閉痰涎壅塞口噤不開湯水不下焰硝一兩五錢硼砂五錢雄黃二錢白殭蠶一錢冰片二分五釐各另研和勻以竹管吹患處痰涎即出如痰已出腫痛仍不消急針患處去惡血服煎劑又方多年溺壺垢半盞蜜五匙灌下愈又方牽牛鼻繩燒灰吹之又方臘月初一日取豬膽不拘大小五六枚黃連青黛蘇薄荷殭蠶白礬朴硝各五錢研細裝入膽內青布包好將地掘一孔方深一尺以竹橫懸此膽在內以物蓋定候立春日取出待風吹去膽皮青布研末密收每吹少許百靈丸簡便喉中結塊不通水食者百草霜研細煉蜜為丸芡實大水化一丸灌下甚者不過二丸吹喉藥祕方硼砂二錢五分雄黃三錢兒茶一錢冰片三分蘇薄荷三兩另研和勻密貯不可泄氣用蘆管吹入少許或用茶匙挑入舌上噙一刻咽下日八九次若鎖喉風口內乾枯者以井水調灌即能開關生津若脾泄胃弱者不宜多用余無禁忌急鎖喉風升麻四兩銼碎水四碗煎一碗灌服又方皂莢槌碎擂水灌服取吐即不吐亦安又方巴豆去殼取仁綿紙微裹隨左右塞鼻孔中立通又方鴨嘴膽礬一塊含口中其痰涎自壅出吐盡即愈喉風口噤死在須臾周鶴仙膽礬五分半生半熟木香各三分共為細末用番木鱉磨井華水調和以雞翎蘸掃患處如勢急口噤用箸啓齒掃下即消時氣纏喉風咽喉閉塞水穀不下牙關緊急不省人事雄黃枯礬藜蘆生用豬牙皂炙黃各等分研細每用豆大許吹入鼻內吐痰自愈纏喉風痰涎閉塞蛇蛻揉碎燒煙竹筒吸之即破又方人指甲煅灰冰片五釐同研吹又方雄黃一塊新汲水磨急灌得吐而愈又方朴硝一兩細細含咽又方桐油或燈盞油腳以鵝翎掃入喉中探吐再用遠志研末水調敷項外敷喉痹喉風湯飲不下皂角陰陽瓦焙研細末滴醋調敷喉外即愈奪命無憂散治纏喉風咽喉疼痛痰涎壅盛口舌生瘡心腹脹滿脾積癥塊小兒奶癖誤吞骨屑鯁塞不下以及諸般藥毒熱盛喉閉涎滿氣急悶亂不省人事並效寒水石煅三兩玄參黃連貫仲山豆根荊芥甘草硼砂滑石砂仁白茯苓各五錢共為極細末每用一錢乾摻舌上後以新汲水咽下不拘時服白降雪丹硼砂一錢熟石膏一錢五分焰硝膽礬各五分元明粉三分冰片二分研細吹喉風番木鱉一個冰片二分研細吹又方短頭髮五錢雄黃五分明礬一錢蟢蛛窩三十個共入罐內煅存性研細吹又方巴豆仁三尖粒明礬三兩同以大銀罐內煅枯冷定取黏巴豆的礬研細末喉風急救方程崙友生艾葉搗汁灌下如喉中壅閉不能灌入即灌在鼻孔內立刻開關又方用蛇床子燒煙燻喉中即流涎開關如神十八般喉痹喉風咽蛾用黃腳公雞取不見水雞肫皮以布揩淨陰乾粗紙包藏懷內俟乾燥乳細加冰片五釐吹之喉癰門主論王肯堂曰喉癰當結喉生又名猛疽以其毒勢猛烈可畏也屬任脈及手太陽手少陰經積熱憂憤所致若過時不治潰穿咽嗌者死準繩靈樞云癰發於嗌中名曰猛疽猛疽不治化為膿膿不瀉塞咽半日死其化為膿者瀉則合豕膏冷食三日而已朱丹溪曰喉癰生於結喉之間名曰海門第一關最為惡毒乃心肝火焰於脾肺毒氣攻喉切忌刀針陳實功曰咽喉紅腫瘀塞作痛此屬標病膿自出愈當以金鎖匙吐出痰涎推蕩積熱膿脹痛者開之損而痛者益之其患自安正宗經曰喉癰不放膿治皆非法蔣示吉曰喉癰生於咽外正中腫痛妨礙飲食紅腫發熱如必欲潰膿軟而脹痛者針之內服補托之劑玉紅膏搽貼其肌完口又有腐潰內通湯水隨孔出者曾治數人俱亦無妨說約竇漢卿曰積熱喉癰其腫如黃糖李微黃上面紅絲外證項上痛齒痛此胃經受熱胃氣通於喉嚨故患喉癰患痰法同吹藥加元明粉煎藥加當歸黃耆倍片芩全書又曰喉癰此毒因七情鬱結而成毒生喉間若不速治恐毒氣內攻喉骨若潰必致口內出膿雖不傷命即成冷瘻終身之痼疾也汪省之曰喉癰雖腫而咽門半塞半開其病雖凶而喉道又寬又緊此皆凶證雖重無妨理例奎光曰喉癰因過食辛辣灸煿厚味醇酒感熱而發屬肺喉間無形但紅腫而痛虛者亦發熱四五日可愈又曰廣八彖舌喉癰肥人感熱性燥者多患此凡舌下生如小舌為廣八彖舌連喉腫痛即發癰大抵兼者勢凶又曰治喉癰用碧丹加金丹少許內服膏子藥煎藥方載咽喉門又曰凡患廣八彖舌喉癰如大便祕煎藥內加元明粉大黃小便不利內加六一散治之又曰廣八彖舌喉癰用加減犀角地黃湯舌用金丹吹舌根及兩旁莫間斷喉用碧丹金丹頻頻吹入喉癰門主方治喉癰喉癬口疳鳳蛻即抱雞蛋殼燒存性兒茶橄欖核燒存性各等分共研細每一錢加冰片三分吹咽喉懸癰舌腫塞痛外科祕寶五倍子白殭蠶甘草各等分研末用白梅去核搗丸如彈子大噙噬其癰自破喉癬門主論書云喉癬即肺花瘡馮魯瞻曰陰虛咳嗽久之喉中痛者必有瘡名曰肺花瘡用坎離湯加元參桔梗甘草不可用冰片吹藥恐辛散瘡轉潰也錦囊陳實功曰凡痰火勞嗽咳傷咽痛者無法可治正宗汪省之曰肺花瘡即俗謂喉生魚鱗刺也難救理例奎光曰喉刺多因先患癆病重證既多虛火上升榮血已枯其喉上齶有紅點密密如蚊蚤咬者死勿治陳遠公曰人有生喉癬於咽門之內以至喉痛其證必先作癢面紅耳熱而不可忍後則咽唾隨覺乾燥必再加咽唾而後快久則成形作疼變為楊梅紅瘰或疼或癢而為癬矣夫癬必有蟲在咽喉之地此因腎水之耗以致腎火上衝而肺金又燥兼治殺蟲以治癬庶幾正固邪散蟲可盡掃也化癬神丹元參麥冬各一兩白蘇子白薇甘草紫菀鼠黏子白芥子各一錢百部三錢水煎服二劑疼少止又四劑癬蟲盡死換用潤喉湯熟地麥冬各一兩薏仁五錢桑白皮生地各三錢山萸肉四錢貝母甘草各一錢水煎服十劑癢痛俱除矣方中再加肉桂一錢飢服為善後之計萬舉萬全也辨證冰鑑奎光曰喉癬乃虛火上炎肺金太旺致攻牙關生如哥窯紋樣又如秋葉背後紅絲飲食阻礙咽痛雖不致殞命久則咽喉失音而不救又曰喉癬用碧丹吹不時服膏子藥再服煎劑加大貝母下氣守戒一月愈方載咽喉門喉癬門主方喉癬祕方頭胎黃牛屎以新瓦洗淨蓋屎周圍用文武火煅煙盡存性研末將蘆管徐吸入自愈又方犀牛黃冰片各一分大硼砂兒茶雄黃各八分山豆根二錢膽礬三分陳白梅去核三個研搗共研末將陳白梅肉入藥和勻丸如龍眼大臨臥含口內過夜即消喉菌門主論奎光曰喉菌屬憂鬱血熱氣滯而生婦人多患之狀如浮萍略高而厚紫色生於喉旁輕則半月二十日重者月餘要在治之得法患者守戒忌口又曰喉菌初用藥碧丹五金丹一後用金丹二碧丹三吹之更須頻服膏子藥兼投煎劑喉疳門主論申鬥垣曰喉乃性命呼吸之門不可輕忽喉中起疳若不早治一二日間死生干係輕則緩重則急宜涼膈解毒啓玄李東垣曰凡喉間作痛潰爛久而不愈此必楊梅瘡毒須以萆薢湯為主隨證佐以別藥汪省之曰過橋疳生咽喉之下肺管之上看之不見吹藥不到飲食妨礙此楊梅結毒於肺胃也理例喉疳門主方喉疳啓玄百草霜一錢兒茶五分冰片一分研極細每用五釐吹喉神效喉爛祕方槐花三錢兒茶黃連懷牛膝各一錢上為末夏月西瓜水調服冬月生梨汁服或丸如緑豆大每服三丸喉爛球粉即輕粉之細膩者一錢硃砂三分冰片一分乳勻吹之奇效異常又可作眼藥點眼又可做生肌藥長肉喉疳口疳牙疳降香一錢珍珠琥珀白芷各三分沒藥去油乳香去油麝香五倍子血竭各五分冰片牛黃各一分竹葉上吊掛繭蠶連蟲收取陰乾為末共乳細末吹之咽喉細毒成疳久不收口整蛇蛻一條剪去頭尾壁錢七個冰片三分將蛇蛻壁錢陰陽瓦煅存性研極細吹喉瘤門主論竇漢卿曰喉瘤生於喉間兩旁或單或雙形如圓眼大血絲相裹如瘤故名之此乃肺經受熱多語損氣或怒中高喊或誦讀太急或多飲燒酒或多啖炙蟢須要斂神晏息以藥攻之則此證脫落矣不可用刀點破全書心法曰喉瘤生於喉旁或單或雙亦有頂大蒂小者凡怒氣喊叫犯之則痛不犯不痛喉瘤門主方清瘤碧玉散硼砂三錢膽礬冰片各三分研細以箸蘸點喉節門主論竇漢卿曰喉節此候生於鳩尾之中初起如梅核在喉膈之間吐不出咽不下至三日漸上喉節之間名曰喉節其疾須用刺破後用膽硝丹吹入喉中再用雄黃化毒丸吞下七粒全書單雙蛾門主論陳實功曰單雙蛾皆標病也其患生於咽旁或單或雙其咽門雖腫半塞半開其病雖凶而喉道又寬又腫雖重無妨宜金鎖匙吐出痰涎推蕩積熱正宗經曰宜針烙馮魯瞻曰單雙肉蛾可針即針有不可針者亦用吹藥劫藥吐去風痰以圖捷效次服煎劑蓋急證難於久待也錦囊又曰腫於咽兩旁者為雙蛾易治腫於一邊者為單蛾難治如有惡寒表證用荊防敗毒散散之不惡寒而無表證者惟有辛涼清利外用鵝翎蘸米醋攪喉中去盡痰涎復以鵝翎探吐之令著實一咯咯破蛾中紫血即潰或紫金錠磨下即安慎勿輕用刀針古方有用巴豆油染紙作捻子點火吹滅以煙燻鼻中即時口鼻流涎牙關自開再用此搐患處即愈岐天師曰有病雙蛾者人以為熱也喉門腫痛痰如鋸拽不絶茶水一滴不能下咽豈非熱證然而痛雖甚至早少輕喉雖腫舌必不燥痰雖多必不黃而成塊此乃假熱之證也若以寒涼之藥急救之下喉非不暫快少頃而熱轉甚人以為涼藥之少也再加寒涼之品服之更甚急須刺其少商穴出血少許喉門必有一線之路開矣急以附子一錢熟地一兩山萸肉四錢白茯苓五錢麥冬牛膝北五味各三錢煎服下喉一聲響亮其火勢熱證立時消散蓋少陰之火直如奔馬凡人腎水大耗者腎中元陽不能下藏蓋無水以養火而火必上越也日日衝上而咽喉口小不能任其出入乃結成腫痛狀似雙蛾實非雙蛾也方中妙在附子辛熱之藥引龍雷之火下藏於窟宅夫龍雷之火乃相火也喜水而不喜火故藥中熟地山茱萸之類純是補陰之味使火有所歸而不再沸此因其逆勢而引道之也喜水而不喜火喜水者喜其真陰之水也而非寒涼之水不喜火者不喜邪熱之火也而非辛熱之火又曰日重夜輕治之猶易用山豆根桔梗各三錢甘草半夏各一錢治之一劑立愈張仲景曰陰虛雙蛾之證用附子一錢鹽水炒成片用一片含在口中立時有路可以用湯藥矣後以八味地黃丸一兩白湯送下立時而愈雷真君曰凡人有咽喉忽腫作痛生雙蛾者飲食不能下五日不食即死矣但此證實火易治而虛火難醫實火世人已有妙方芩連之類治之立消惟虛火乃腎火不藏於命門浮游於咽喉之間其證亦如實火惟夜重於日清晨反覺少輕若實火清晨反重夜間反輕實火口燥舌乾而開裂虛火口不甚渴舌滑而不裂也以此斷之決不差錯此種虛痛若亦以治實火之法治之是人已下井而又益之石也故不特不可用寒涼並不可用發散蓋虛火必須補也然徒補腎水雖水能制火可以少差而火勢太盛未易制伏又宜於水中補火則引火歸原而火勢頓除有消亡於頃刻矣方用引火湯主之一劑而痰聲靜痛頓除腫亦盡消二劑全愈蓋熟地山萸五味之類純是補腎水聖藥茯苓山藥又益精而利水助肉桂之下行元參以消在上之浮火白芥子以消壅塞之痰上焦既寬而下焦又得肉桂之熱則龍雷之火有不歸根於命門者乎一劑便生真有鬼神莫測之機又勝於八味地黃湯也倘喉腫閉塞勺水不能下咽雖有此神方將安施乎我更有法用附子一個破故紙五錢各研末調如糊作膏布攤如膏藥大如茶盅貼腳心中央以火烘之一時辰喉即寬而開一線路可以服藥矣又不可不知此妙法也又曰陰蛾之證乃腎水虧乏火不能藏於下乃飛越於上而喉中關狹火不得直泄乃結成蛾以蛾而非蛾也早晨痛輕下午痛重至黃昏而痛更甚得熱則快得涼則加其證之重者滴水不能下喉若作外感陽證治誤用山豆根芩連梔子之類則痛益甚而關不開有不盡命而死者也惟單補陰虛用引火歸源之法而痛頓失也治以化蛾湯主之此方大補腎之水不治蛾之痛壯水則火息引火則痛消可收全功誠奇絶之法也活人録華真君曰雙蛾陰證最難治而最易治也不知其竅則最難知其法則最易余常為人治此證用附子一枚鹽一合水煮透令其口含一片而火勢立止然後以六味地黃湯大劑飲之不再發神方也陳遠公曰人有感冒風寒咽喉腫痛其勢甚急變成雙蛾者其證痰涎稠濁不時口渴索飲疼痛水不能入喉此陽火壅阻咽喉勢若重而病實輕也夫陽火太陽之火也膀胱之火也膀胱之火與腎火為表裡膀胱火動腎火即來相助故直衝咽喉而肺脾胃之火亦復相從上升於是借三經之痰涎盡阻塞於咽喉結成火毒而不可解治法似宜統治數經矣然其本實始於太陽泄膀胱之火則諸經之火自安但咽喉地近於肺太陽既假道於肺肺經險要之地即狹路之戰場也安有舍戰場要地不解其圍而先搗其本國乎貴有兼治之法也清燥湯桔梗元參花粉各二錢甘草二錢白芍五錢山豆根柴胡麻黃各一錢水煎服一劑喉寬二劑蛾盡消矣冰鑑此方散太陽之邪者居四散各經之邪者居六尤加意於散肺邪者由近以及遠也又曰人一時咽喉腫大作痛吐痰如湧口渴求水下喉少快已而又熱索水喉成雙蛾既大且赤其形宛如雞冠此喉痹證即俗稱纏喉風也乃陰陽二火兼熾也一為少陽相火一為少陰君火今二火齊發其勢更暴喉管細小大難遽泄遂遏抑其間初作腫而後成蛾也蛾有二雙蛾單蛾也雙蛾生兩枚兩相壅擠中間反留一線之隙可通茶水藥食尚可下咽若單蛾則獨形反塞住水穀之路往往有勺水不能入者藥物既不可咽又從何路以進藥哉法先用刺法一則刺少商等穴尚非捷徑惟用刀直刺喉之處一分則喉腫必少消可用吹藥開之吹藥方皂角燒灰膽礬牛黃冰片各一分麝香三釐為細末吹喉中必大吐痰而愈後用煎劑名救喉湯元參一兩麥冬五錢花粉三錢甘草山豆根射干各一錢水煎一服全愈若雙蛾不必用刺法用此方自效元參為君足以瀉心腎君相火佐以豆根射干花粉祛邪消痰則火自歸經咽喉之關隘肅清矣又曰咽喉腫痛日輕夜重長成喉蛾宛如陽證但不甚疼咽喉自覺有一線乾燥之至飲水咽入稍快至水入腹而又不安吐痰如水甚多將涎投入水中即化為水人以為喉痛生蛾投瀉火之方不特不驗反增其重亦有勺水不能入者何也蓋屬陰蛾也陰蛾則日輕夜重陽蛾則日重夜輕此乃少陰腎火下無可藏之地直上炎於喉也治法宜大補腎水加入補火之味引火歸源下熱則上自寒矣引火湯熟地三兩巴戟天冬麥冬各一兩茯苓五錢北五味二錢水煎服一劑火下喉腫全消二劑全愈此方以熟地為君大補腎水麥冬五味重滋肺金金水相資子母有滂沱之沛水旺足以制火矣加入巴戟天之溫又是補水之藥則水火既濟水趨下而火不得不隨之又加茯苓前導則水火同趨共安腎宮如琴瑟之和矣何必用桂附大熱引火歸源乎然桂附為引火歸源之聖藥胡棄而不用不知此證因水之不足而火沸騰今用大熱雖引火於一時必耗水於日後所以只用巴戟天引火而又補水則腎無乾燥之虞喉有清肅之益也醫論選要曰單蛾者其形圓小如箸頭生於咽喉關上或左或右雙蛾則兩邊俱生也若生於關下為難治竇漢卿曰左咽軟主吞咽右喉主出聲咽門分兩路其受病不同全書又曰咽喉左畔虛陽上攻其腫微紅者名單乳蛾若肺氣外證手足厥冷痰涎自出頭重目昏急用虀菜酸汁加玄明粉灌之旋去痰涎吹藥如厥重不省人事氣欲絶者急以吳茱萸研爛醋調塗腳心右畔虛陽上攻其色微黃其形若蠶繭故謂之乳蛾其證亦手足厥冷又曰雙蛾風此證有兩枚在喉間兩邊如豆大急將黃虀汁蜜少許加玄明粉漱出風痰吹冰片散奎光曰乳蛾有單有雙有連珠多因酒色鬱結而發單輕雙重初起一日痛二日紅腫三日有形如細白星發寒熱者凶四日勢定治之四五日可愈其證生於喉傍一邊生者單蛾左右生者雙蛾二白星上下相連如纏袋者連珠也又曰治乳蛾先用碧丹五金丹一吹次用金丹二碧丹三同吹出痰兼用煎劑左加犀角黃連右加赤芍柴胡連珠兼用之大便祕加玄明粉大黃吹藥丹方詳載咽喉門心法曰乳蛾由肺經積熱受風凝結而成生咽喉旁狀如蠶蛾有單有雙雙者輕單者重生於關前者形多易見吹藥易到手法易施故易治生於關後者難見形色吹藥不到手法難施故難治又曰雙單蛾湯水不下看頭頂發內有細窠挑破即刻開關單雙蛾門主方喉蛾土牛膝即鼓捶草取三四根搗汁加人乳和勻左邊蛾滴右鼻孔中右邊蛾滴左鼻孔中雙蛾兩鼻孔俱滴吐出痰涎其毒立解重者滴二三次又方土牛膝搗爛醋浸取汁不時漱口重者滴入鼻中痰涎多者白礬研末飯丸每服一錢又方鮮菊花七朵煎漱又方青魚膽一個納糯米七粒懸避陰處四十九日收下單蛾用一粒雙蛾用二粒噙放舌下又方大蝣蜒不拘多少白鹽梅二個冰片一分搗丸如圓眼核大噙口內化汁咽下又方新艾葉絞汁和童便服又方醃白梅的滷調緑礬點患上又方蛇床子瓶內燒酒薰之又方先從兩手臂捋起捋至脈門後捋中指看中指下節有紫筋現出為度以針挑去紫血即可進飲食矣又方白鹽梅一小瓶入大蝣蜒蟲百十條任其常久如遇此證取梅煅研吹之以梅肉貼小兒惡癤並效又方取公鵝一隻以鵝嘴鬥在患者口中得鵝氣自消乳蛾至危者玉簪花根洗淨泯須搗化加白蜜少許和勻取汁挑三茶匙灌下忌見鐵器雙單蛾經過霜王瓜一條竹刀去蓋將穰去淨用火硝明礬各一兩裝滿蓋仍合上用竹籤扦緊懸放迎風背陰之所候王瓜外面生出白霜掃下加冰片少許密貯每用少許擦之自消喉蛾漫腫必須針去惡血湯水方可下咽可代刀針楊樹上楊辣子蟲窩焙研細末用骨簪蘸點蛾上立刻其泡自破膿血自泄即可進食但點時只可點在泡上不可誤點他處亦不可多用又方胡學海取大蜘蛛一個入傾銀罐內上加生明礬三錢煅枯加冰片一分研細吹之毒水勿咽下咽又方壁上蟢蛛白窩取下用患者腦後發一根纏定蟢蛛窩將銀簪刺在燈上燒之存性為末吹之乳蛾急證也此方甚效有力者宜預製以救人周鶴仙臘月八日雄豬膽一個裝入白礬末陰乾之後研末再入臘八日豬膽內如此三四次如遇患者用一二分吹之神驗雙單蛾喉癬喉癰腫痛吐咽不下命在須臾周鶴仙鳳凰衣微火焙黃橄欖核瓦上火煅存性孩兒茶各等分研為細末每一錢加真冰片五釐吹之即能進飲食極效無比喉蛾桔梗四錢甘草一錢金錢吊蛤蟆牛蒡子各三錢玄參二錢水二盅煎一盅食後服立愈喉蛾兼治口疳阮氏祕方杉木皮煅存性人中白煅粉兒茶各三錢珍珠琥珀蘆甘石煅青黛各一錢大冰片六分研勻收貯吹喉疳喉蛾牙疳要吹至一錢立消凡吹先用黃連甘草蘇薄荷松蘿茶各一錢煎水漱淨再吹如蛾可用鵝毛管剪成長條如菊花瓣樣夾在破開箸子頭上扎住刺患上出血水再吹藥再看耳後左右如有紅筋以針刺出血立愈雙單蛾火硝一錢五分硼砂五分冰片三釐雄黃一分不用亦可共乳極細每用三匙吹入喉中吐涎或從鼻孔吹入亦可又方鳳仙花子連根搗水吞下神效又方人指甲不拘多少明礬三錢大蜘蛛一個同入傾銀罐內煅研加冰片一分吹之乳蛾喉痹蟾酥草烏尖豬牙皂各等分共研細水丸豆大每研一丸點患上乳蛾將頭頂心發上用生薑擦紅即好西瓜霜治咽喉口齒雙蛾喉痹命在須臾用大黃泥鉢一個將西瓜一個照鉢大小鬆鬆裝入鉢內將瓜切蓋以皮硝裝滿瓜內仍以瓜蓋蓋竹籤扦定再以一樣大的黃泥鉢一個合上外用皮紙條和泥將縫封固放陰處過數日鉢外即吐白霜以鵝毛掃下收好仍將鉢存陰處再吐再掃以鉢外無霜為度收好每用少許吹之喉蛾巴豆去油遼細辛各半分研細用綿包好左蛾塞右鼻孔右蛾塞左鼻孔喉蛾喉痹喉風並治發背疔瘡烏龍瓜即白花菜取葉曬乾每細末一錢加冰片三五釐研勻吹之如發背疔毒取葉搗爛敷上即消天白蟻瘡門主論盛錫朋曰咽喉內生瘡鼻孔俱爛此名天白蟻瘡此證方書不載多有不識常作喉風醫最為誤事此乃肺脾蘊毒而成宜用穿山甲散治之天白蟻瘡門主方穿山甲散白霜梅燒存性一個枯礬一錢穿山甲炒雄黃各五分共研細末吹喉中立效鎖喉瘡門主論竇漢卿曰鎖喉瘡者乃心經毒氣小腸邪風發於聽會之端注於懸膺之側初生如癧瘰不能飲食閉塞難通漸次腫破化膿早治得生宜服當歸連翹之類用冰片散蜒蜉不拘多少加冰麝搗搽全書梅核氣門主論陳實功曰梅核氣乃痰氣結於喉中咽之不下吐之不出如茅草常刺作癢初則吐酸妨礙久則閉塞不通即此候也正宗馮魯瞻曰痰結塊在喉中如梗狀者梅核氣也宜噙化丸錦囊金匱曰婦人咽中有如炙臠半夏厚朴湯主之炙臠乾肉也咽中貼貼如有炙肉吐之不出吞之不下此病不因腸胃故不礙飲食二便不因表邪故無骨痛寒熱乃為積寒所傷不與血和血中之氣溢而浮於咽中得水濕之氣凝結難移男子亦間有之藥用半夏厚朴湯乃二陳湯去陳皮甘草加厚朴紫蘇生薑也專治婦人七情之氣鬱滯不散結成痰涎或如梅核在咽咯咽不下或中脘痞滿氣不舒暢或痰飲中滯嘔逆噁心並可取效蓋半夏降逆厚朴散結生薑茯苓宣至高之滯而下其濕蘇葉味辛氣香色紫性溫能入陰和血則氣與血和不復上浮也梅核氣門主方噙化丸梅核氣服之神效膽礬硼砂明礬牙皂雄黃各等分上為細末紅棗煮爛取肉為丸如芡實大空心噙化一丸溫黃酒一杯過口內服蘇子降氣湯驗方玫瑰花去淨心蒂浸火酒飲愈陳愈妙噙化丸痰結核在咽喉中不能出入栝蔞仁杏仁海石桔梗連翹各一兩朴硝四錢為末薑汁和蜜丸如櫻桃大噙服之小兒聲啞門主方小兒聲啞不能言語當急治以此方如遲至十二三歲知識少開則難治矣遠志石菖蒲酸棗仁炒小柴胡各一錢萆麻子連殼每一歲用一粒上為細末用豬肝一個竹刀剖作數層將藥摻入肝內紙包煨熟量兒大小白滾水服日服三五次至七日自能言語小兒失音不語經驗方蛤蟆膽點舌尖上立效音啞門主論風火侵肺誤服寒涼生冷音雌者輕虛癆肺損音啞難治竇漢卿曰病人瘥後氣短及聲不出者皆肺氣不行宜降氣湯多加前胡臨服加薑汁以佐之全書又曰病後聲啞不言此肺經受刑百無一生馮魯瞻曰喑謂有言而無聲故經曰不能言不能非絶然不說之謂凡音出於喉嚨發於舌本因胎肥大阻腎上行之經腎脈入肺循喉嚨系舌本喉者肺之部肺主聲音其人切切私語心雖有言而人不能聽故曰喑肺腎子母之臟故云不必治若大全解作不語則為心病以心主發聲也與子喑了不相干若張子和有降心火之說馬玄臺有補心腎之言如果腎之脈絡絶則其病不治豈有産後自復之理乎故經云胞之絡脈絶此絶字當作阻字解也又曰經云婦人重身九月而喑者胞之絡脈絶也無治當十月復謂人之受孕一月肝經養胎二月膽經養胎三月心經養胎四月小腸經養胎五月脾經養胎六月胃經養胎七月肺經養胎八月大腸經養胎九月腎經養胎十月膀胱經養胎先陰經而後陽經始於木終於水以五行之相生言也然以理推之十二經之脈晝夜流行無間無日無時而不共養胎氣也必無分經養胎之理今曰九月而喑時至九月兒體已長胞宮之絡繫於腎經者阻絶不通故間有之蓋腎經之脈上系舌本脈道阻絶則不能言故十月分娩後而自能言不必加治治之當補心腎又曰傷寒失音之源不一有因痰壅氣閉有因失血驚恐有因邪熱衝心心氣耗損有因火爍陰傷不能宣布然咽喉音聲如故而舌不能轉運者為舌喑如舌能轉運言語而咽喉音聲則無者為喉喑舌喑多因於心腎喉喑多因於肺胃丹溪云乾咳嗽極難治此係火鬱之甚乃痰鬱火邪在肺上以苦桔梗開之下用補陰降火藥不已即成癆宜重補養蓋肺為華蓋五臟六腑火自內起熏蒸焚灼水涸金傷若至久嗽聲啞是肺管破也不治在初起者是寒包熱辛以散之衍義云有婦人患熱久嗽身如炙肌瘦將成肺癆以枇杷葉木通款冬花紫菀杏仁桑皮各等分大黃減半如常制蜜丸櫻桃大食後夜臥含化一丸未終劑而愈又有久嗽不已飢則胸中大痛須視上唇有白點如粞者此蟲齧其肺也以百部膏一味加烏梅檳榔與服下其蟲則愈肺蟲其形如蠶令人咳嗽聲嘶也有嗽而聲啞者蓋金實不鳴痰火鬱於中也金破亦不鳴肺氣傷於內也實則清之破則補之皆治肺之道也又須知少陰之絡入肺中循喉嚨挾舌本肺為之標本虛則標弱故聲亂咽嘶舌萎聲不能前以救本為主亦有喉燥失音者古方用豬脂二斤熬油去渣入白蜜一斤再煉成膏一匙一匙挑服潤之有大聲喊叫喉破失音者不可作火治而用涼藥須大補八珍加甘桔倍參耆作傷損治然足少陰脈挾舌本而足太陰脈絡舌旁手少陰脈系舌本若三脈虛則痰涎乘虛閉塞其脈道而舌不能轉運言語也若三經血少不能營舌亦令人喑故久病失血後及誤汗下後心家氣血衰不能鼓舌者並用獨參湯八物加減有痰加竹瀝音啞門主方清音噙化丸久嗽咳傷肺氣聲音雌啞黃柏蜜炙麥門冬去心當歸白茯苓熟地生地黃各一兩訶子真阿膠天門冬鹽水拌炒知母各五錢烏梅肉十五個人參三錢人乳牛乳梨汁各一碗共熬稠膏共為細末和膏加煉蜜搗丸如芡實大每用一丸仰臥噙化日用三丸如改作小丸每服一錢訶子煎湯或蘿蔔湯送下暴失音公豬板油一斤入鍋先熬成油濾去渣入白蜜一斤再煉少頃絹濾淨瓷瓶內冷定成膏不時挑一茶匙服之其音自清無疾人亦可常服潤肺滑肌無故咽喉聲音不出名曰失音橘皮五兩水三升煮一升去渣頓服又方皂角一挺去皮子白蘿蔔三個切片水一盞煎半盞服之不過三服久失音啞者人乳白蜜雪梨汁香椿汁各四兩如無鮮香椿搗汁即用木香椿芽為末四兩代之共熬成膏白湯沖服音啞硼砂一兩元明粉訶子肉膽南星各二錢冰片三分百藥煎三個上乳細用烏梅肉一兩搗如泥丸如龍眼核大每用一丸噙化久嗽聲啞青蒿不拘多少童便煮服發聲湯渴飲涼水忽喑啞不出聲貝母桑白皮麥冬各三錢白茯苓元參各五錢枇杷葉五片百部紫蘇葉甘草各一錢水煎服三劑即聲大出傷寒喉腫門主論馮魯瞻曰喉腫者有陽毒有陰毒如面赤脈洪或吐膿血是火氣上衝心肺受熱是為陽毒如四肢冷而脈沉細是寒積於肺寒極生熱濕熱熏蒸此為陰毒治陽以清肺化熱治陰用引火歸源錦囊病人瘥後喉中干痛門主論竇漢卿曰病人瘥後喉中干痛者何皆腎水枯涸心火衝上耗散津液也全書病人瘥後喉中干痛門主方驗方竇漢卿生地黃生甘草人參麥門冬北五味天門冬杏仁桔梗生地天花粉水煎服雙清丸蘇薄荷杏仁桔梗砂仁甘草玄參上為極細末煉蜜丸芡實大不時噙化骨鯁門主方驗方砂糖威靈仙同酒煎飲之自化又方赤芍藥貫仲各三錢研末米糊丸放口內噙化咽下雞魚骨鯁威靈仙五錢砂仁三錢甘草二錢水一盅煎一半入口噙嗽入喉呵氣即化又方活鰍一條同飛面搗敷喉下即消又方犬涎灌之其骨自化又方鳳仙花子即急性子二十粒白湯送下立效又方白茯苓貫仲甘草各等分共磨細末米飲調服一錢骨鯁門主方化骨訣祝由科左手三山訣持杯或茶或酒俱可右手劍訣向東方看何骨刺即寫何字於內如魚刺即寫龍字於內余俱仿此書符於杯內再換印訣書雪山童子速降六字於杯內口中默念吾奉太上老君急急如律令敕與被骨刺人吞之即愈又訣祝由科淨水一碗面東用食指於碗內書此字如豬骨加虎字魚骨加龍字雞骨加貍字咒曰水碗化為東洋大海喉嚨化為萬丈龍潭九龍歸洞吾奉太上老君急急如律令敕又方砂糖威靈仙同酒煎飲之自化又方赤芍藥貫仲各三錢研末米糊丸放口內噙化咽下又方橄欖核磨汁咽又方象牙磨水頻咽又方燈草燒灰以米糖如指大蘸灰置喉中勿令黏住待糖化骨即化下又方細茶五倍子等分為末吹之又方勿令四眼見即將箸倒轉隨便箝肉一塊急吞下又方大蒜一瓣切去大頭鯁在左塞右鼻孔鯁在右塞左鼻孔雞骨鯁霜梅肉捶成指頭大丸子再將棉裹用線穿在內冷茶吞下扯住線頭在手一嘔即出螺靨入喉鴨涎化鯁如神麥芒入喉鵝涎灌之飛絲入咽腫痛嗆血生麻葉嚼之愈雞骨鯁香油煎滾溫服之即吐出骨刺筅帚鯁在喉中多年舊籬笆竹洗淨截斷煎湯飲之即下竹刺入咽王不留行此味生能軟篾煎服再吞糯米圓即下骨鯁喉中危急者蛇床子三錢焙研細末紅糖兩許開水沖和以湯匙灌咽下咽即化祕傳骨鯁方馬屁勃山上者一兩五靈脂三錢紅芽大戟五倍子各二錢共研細用鴨涎狗涎同和丸如元眼大如遇骨鯁用砂糖化服一丸即化又方白芍二寸三分長橫咬口中即出或切片細嚼咽之即消雞骨鯁生苧根搗汁飲之立化雞鵝豬魚骨鯁山楂根燒灰存性研細吹入喉中三四次即下又方家椿樹上結的白苓如牛乳一個個垂下者用七粒擂水服其骨即從大便中出又方草果醋炒澤瀉馬屁勃為末砂糖調服即化魚骨鯁多食青果又方如鯁時以自己箸子敲碗邊數下自愈又咒原缺里一條龍九頭十八尾問君吃何物專用此間水連誦九遍令被鯁人飲之即愈竹刺筅帚鯁在喉中多年舊籬笆竹截斷煎湯飲之即下化諸魚骨及竹木刺淨水一碗用濃墨筆寫癸水化為龍行六字在水上一氣飲如未化再寫一次服之必化又方以淨手寫一龍字在喉嚨上寫一龍字在水碗內呷下即化又方芫荽搗汁和滴醋咽之立出化鯁指甲燒灰存性吹入喉中食醋嗆喉門主方甘膽丸治食醋嗆喉哮嗽不止諸藥不效甘草去皮二兩作二段用豬膽五個浸三日取出火上炙乾為末蜜丸每服四五十丸臨臥茶清送下
