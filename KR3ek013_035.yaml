body:
  text: 卷三十五諸瘡部下自膿窠疥瘡血箭血痔以及疣子俱匯於此部中以便檢閲參治膿窠瘡門主論陳實功曰膿窠瘡乃肺經有熱脾經有濕二氣交感而成其患先從水泡作癢後變膿泡作疼治當清熱散風涼血除濕為主正宗蔣示吉曰膿窠瘡大如黃豆黃膿起疱痛甚者乃脾虛濕熱者多宜內服四妙湯加蒼朮防風外搓普濟丹説約膿窠瘡門主方何首烏湯濕熱風毒遍身膿窠黃水淋漓肌肉破爛何首烏防風金銀花荊芥蒼朮白鮮皮甘草苦參連翹木通燈心為引水煎或為細末水疊丸每服三錢淡酒送下溏泄加澤瀉夏熱加梔子黃芩癢加白蒺藜脾胃弱者去苦參加赤茯苓何首烏丸何首烏四兩荊芥威靈仙防風蔓荊子炒車前子炒甘草炙各二兩研細水法疊丸每早晚淡酒送下一錢五分連翹解毒湯四肢濕腫諸瘡牡丹皮牛膝天花粉木瓜桃仁去尖皮金銀花苡仁甘草白殭蠶連翹水煎服膿窠瘡生大黃二兩生石膏一兩研細麻油調搽又方芝麻炒黃色硫黃各等分研細柏油和丸搽之又方硫黃末麻油調用尖檳榔蘸在紅缸片上磨搽又方多年陳桐油竹燈盞燒之取滴下油加花椒末冷定搽之又方硫黃花椒炒各三錢潮腦一錢生明礬枯白礬各一錢五分豬板油二兩搗丸夏布包以火烘之候溫擦之又方蒼朮四錢老松香三錢枯礬二錢煙瀝鞋底皮煅灰輕粉各五錢檳榔二個共研細熬咸豬油調搽又方密陀僧硫黃石膏雄黃各等分雞蛋清調搽又方花椒白芷雄黃血竭明礬各等分研細末用陳燭油濾清調搽又方松香輕粉各一兩香油腳調搽並治疥瘡又方硫黃三錢包豆腐內煮半日用松香二錢東丹一錢共研極細末用雞子七個煮熟去白用蛋黃先將銅杓置火上加菜油少許入雞子黃煎至黑色油自出也取油調搽又方用雞蛋一個打一孔去黃留白入礦石灰二錢加紙封口外用鹽泥封固火煅通紅去泥研細茶油調搓又方雄豬油四兩花椒梔子防風蒼朮當歸連翹各五錢煮酒飲濕熱膿窠爛瘡大蚌殼火煅一兩輕粉一錢龍骨飛丹枯礬各少許研細桐油調搓百效丸劉氏祕方不拘遍身上下手足膿窠血瘋疥癬黃柏為君苦參為臣連翹川牛膝何首烏當歸尾生地牡丹皮為佐防風瘡在上為使防己荊芥紫蘇葉瘡在下此三味為使上為末神麯打糊為丸每服三錢白湯送下一斤服完除根不發加蛇蛻一兩研更妙又方蟬蛻一條豆腐皮三張同炒研末無灰酒調服令夜服之次早其瘡自愈並治疥瘡又方紅棗去核蔥去須葉搗爛煎湯先熏湯溫即洗洗久自然不痛掐破皮洗去膿一日即結痂膿窠疥瘡方配京鮮菖蒲根搗爛擦或同豬油搗勻布包擦遍身生瘡藥酒王樵邱虎骨醋炙薏苡仁各一兩當歸金銀花防風白茯苓連翹懷生地貝母各四錢蒼耳子羌活天花粉白芍各三錢海風藤黃柏茅蒼朮各二錢共入絹袋盛好酒十斤浸三日隔水煮埋地下七日出火毒每飲數杯膿窠瘡流黃水瘙癢不已延蔓無止宮粉一兩炒黑冰片三分研細搓濕熱膿窠生苡仁桑枝鮮松葉五加皮各四錢赤首烏八兩火酒十斤浸七日飲膿窠瘡防風金銀花花椒粉丹皮生地甘草羌活苦參當歸連翹荊芥各五錢上用麻油一斤入鍋熬枯濾去渣復入淨鍋內熬至滴水成珠入黃蠟一兩任其自化或加紫草五錢亦可離火放土地上出火毒搽之又方木鱉子樟腦蛇床子各三錢水銀雄黃各八分大楓子四錢共研至水銀無星為度加陳燭油為丸擦之疥瘡通用膿窠疥瘡藥酒方生地金銀花當歸蒼朮各二兩豬板油十兩入壇內加酒十五斤封口隔水煮一炷香退火氣三日任飲疥瘡門主論王肯堂曰疥有五種一曰大疥焮赤癢痛作癢有膿二曰馬疥隱起帶根搔不知痛三曰水疥㾦癗含漿摘破出水四曰乾疥癢而搔之皮起干痂五曰濕疥薄皮小瘡常常淫汁者是也宜分治之準繩陳實功曰疥瘡皆因脾經濕熱肺經風毒客於肌膚毒之淺者為疥毒之深者成癬脾受沴濕之熱發為膿窠爛瘡疥癬皆有小蟲染人最易切忌熱湯浸洗圖片刻之快暢殊不知熱毒攻裡蟲愈深入雖有良方何能刻日奏效患者戒之兼忌一切發物海鮮正宗生疥瘡不可在浴室內去浴必須以藥湯在自家屋內浴之至於藥裹紙內或在火爐或在被內熏治切不可為訓恐引毒入臟腑害人慎之慎之石室祕録蔣示吉曰疥有乾疥濕疥蟲疥砂疥紫疥之稱小如疹子干而且癢者是此乃風熱蟲也宜內服疥靈丹外搽三黃丹自愈説約心法曰疥有干濕蟲沙膿五種如肺經燥熱盛則生乾疥瘙癢皮枯而起白屑脾經濕盛則生濕疥臖腫作痛破津黃水甚流黑汁肝經風盛則生蟲疥瘙癢徹骨撓不知痛心血凝滯則生沙疥形如細砂焮赤癢痛抓之有水腎經濕熱則生膿窠疥形如豆粒便利作癢膿清淡白或脾經濕盛亦生膿窠疥但頂含稠膿癢痛相兼為異而體虛之人亦生以便祕為實便利為虛亦有虛而便燥者如氣祕則便燥血分枯燥則便澀又在瘡之形色脈之有無力辨之疥瘡門主方消毒散遍身癢疥金銀花連翹白蒺藜荊芥白芷牛蒡子防風白鮮皮赤芍藥甘草水煎服日久不愈加何首烏乾燥加當歸有熱加黃芩下部多加黃柏小便澀加木通疥靈丹枳殼麩炒山梔連翹荊芥當歸羌活各七錢白鮮皮炒白芷苦參糯米泔浸一日各一兩上為細末煉蜜為丸桐子大每服五十丸白湯送下立可除根疥癬膿窠一服除根何首烏石菖蒲荊芥防風漏蘆各等分上為末每服三錢酒調下療毒湯治一切久遠痛癢諸瘡何首烏荊芥獨活防風威靈仙胡麻石菖蒲苦參白湯煎服硫黃丸硫黃精明者一兩研細末糕搗丸如桐子大合三兩重看瘡上身多食後服下身多食前服俱用荊芥湯送下五六十丸搽疥方大楓子三十枚去殼同水銀研不見星杏仁十粒去皮水銀一錢生豬板油一兩同搗爛麻布包擦神效又方陳在賓藜蘆明雄蒼朮各三錢犍豬油二兩和藥包草紙內捲成條火燒滴油搓之但此法制時忌與人見人若見則油燒不下青桃丸油核桃豬板油各三錢白薇二錢輕粉防風蘇葉各一錢搗丸如彈子大擦之減味合掌丸大楓肉二十一個水銀制三錢潮腦一錢桕油四兩研細丸彈子大以火微烘搓之換肌丸白砒水銀各三分油核桃五錢大楓肉一錢同研不見星為度絹包每臨臥時擦心口片時兼戒口味蛇蛻丹水銀檳榔各一錢五分潮腦枯礬蛇蛻煅雄黃油核桃花椒焙各五分杏仁大楓肉各二十一枚共研細陳蠟燭油為丸每早五更時手搓鼻嗅三黃丹吳貢九硫黃雄黃黃丹潮腦川椒焙枯礬各等分用麻油四兩雞蛋一個將蛋煎枯如絮去蛋不用將藥末裝粗布袋內慢慢擺入油內取起冷定搓之或同豬板油搗勻搓之亦可又方芝麻炒硫黃輕粉火硝枯礬各等分搗丸搓之又方柏油和豬膽汁熬一滾候冷定搓上三日全愈又方大楓子肉十三粒搗爛入輕粉一錢和丸擦腳底數次即愈又方蛇床子五分先研細末白砒九分二次研細油核桃三十個四次研細水銀一兩五次研細作五次逐味加入研細臨晚浴淨先飲無灰酒待其作癢然後抓破分五日擦之三聖丸水銀潮腦各二錢川楓子肉五十粒共研極細加柏油二錢研勻為丸周身滾之立愈若兼膿窠加硫黃一錢諸瘡一掃光此藥治癢瘡不論新久及身上下或干或濕異類殊形但多癢少痛者用之俱各有效苦參黃柏各一斤煙膠一升枯礬木鱉肉大楓肉蛇床子點紅椒潮腦硫黃明礬水銀輕粉各二兩白砒五錢共為細末熟豬油二斤四兩化開入藥攪勻作丸龍眼大瓷瓶收貯用時搓擦瘡上二次即愈又方蒼朮一斤研末鋪床上單被掩之睡五七夜自痊又方山萸肉五錢黃豆一兩硫黃三錢先將萸肉黃豆炒研加硫再研銅鍋熬雞蛋油調搽三四日愈又方硫黃皂礬枯礬川椒油核桃檳榔各等分共研細豬油調搓又方鴿糞枯礬硫黃石膏蛇床子各等分共研細豬油調搓又方輕粉雄黃寒水石枯礬大楓肉潮腦各等分研細柏油調勻搓三五次見效除根又方岐天師蘇葉防風輕粉各一錢白薇二錢豬板油油核桃不可去油各三錢共搗成丸如彈子大擦瘡上一日愈合掌丸大楓肉四十九粒水銀制二錢枯礬番木鱉川椒各三錢海螵蛸雄黃各五分油核桃肉搗丸並治沙瘡又方水銀東丹各二錢潮腦枯礬鉛粉輕粉各三錢大楓肉雄黃各四錢熟菜油或陳蠟燭油調搽青金散松香二兩蛤粉五錢青黛二錢枯礬輕粉各三錢為末燭油調搽並治煉眉疥癬又方集驗治一切惡瘡醫所不識者明松香鉛粉水銀黃柏黃連甘草土蜂窩著土壁上者南方多有之各等分先將水銀放手掌中以唾津殺為泥入瓷器中以生麻油和研生絹濾如稀餳和藥末再研如稠餳用溫水洗瘡軟帛拭乾塗之一次即瘥有黃水者塗之隨手便乾癢不堪忍者塗之立止痛甚者立定治疥尤佳抓破搽藥洗疥紫背浮萍煎湯洗又方苦參半斤切片用河水三四瓢煎數滾添水二瓢住火片時濾去渣臨洗和公豬膽汁四五枚攪勻淋洗瘡上三日一洗三次其癢立止矣又方苦參一兩蛇床子黃柏荊芥各五分白礬二錢五分煎湯溫洗又方防風荊芥野菊花苦參馬鞭草白礬花椒水煎濃汁熏洗又方莧菜根煎湯洗又方岐天師蒼耳草半斤生黃耆三兩苦參四兩生甘草防風荊芥金銀花各一兩水煎湯一大鍋傾盆內乘熱熏之外用席二條裹在盆外用衣蓋之使氣不散俟稍涼浴之必至湯寒而後已一日再浴將渣再煎如前浴之三日瘡疥必全愈也諸瘡作癢並治痘瘡作癢茵陳一味燒煙燻之身上起窠子眼胞腫金銀花一兩當歸防風各五錢薄荷二錢甘草三錢煎湯先熏後洗祛風妙法滿頭癩瘡及手足身上陰器膚囊搔癢抓爛淋漓黃連五錢蛇床子二錢五分五倍子一錢二分五釐輕粉二十五貼研勻先以荊芥蔥白煎湯洗拭乾清油調搓膿疥瘡集驗方煙膏東丹各一兩雄黃硫黃各三錢輕粉一錢研末醃豬油調抹如連片將油紙攤藥縛好不動三日脫光身上生碎蟲瘡宮方大楓子油核桃各二錢五分水銀一錢信石一分共重六錢一分丸做六丸每日用一丸上身多於臍上揉之下身多於臍下揉之空臍處不揉連用五丸歇下一日再用第六丸收功疥癬膿窠神方劉氏祕法硫黃五錢巴豆霜四錢黃丸子即麥芽黃豆肉為末雄黃各三錢銀硃二錢白砒五分共研細末每用一錢入後製藥油一兩和勻搓之三日全愈附制瘡藥油法雄豬油一斤檳榔大黃黃柏麻黃各一兩水三碗同藥入鍋內熬至水乾油出濾去渣冷定收貯調一切瘡癬擦藥俱有奇功劉氏祕製金毛獅子瘡藥黃芩荊芥穗黃連五倍子茜草槐枝頭芒硝黃柏各二兩共為粗末再炒老黃色再加土硫黃醋煮枯礬各二兩共研細末再加巴豆肉三錢萆麻仁五錢大楓子淨肉二兩共搗如泥同前藥和研勻細再加水銀黑鉛各一兩同研雄黃潮腦各五錢共前藥研和一處每用一錢以前制瘡藥油調搓治一切血瘋疥癬手足諸瘡如神凡腳上患血瘋瘡多年不愈先以藥水洗淨拭乾再以研細輕粉薄薄掃上再搓瘡藥凡搓瘡藥先一日用油調鹿角霜細末厚敷瘡上過夜次日再搓瘡藥更妙胡麻丸小兒風癬疥瘡苦參五錢石菖蒲甘菊花各一兩何首烏威靈仙白蒺藜荊芥穗牛蒡子胡麻仁蔓荊子各三錢上磨細末酒糊丸緑豆大每服一錢竹葉燈心湯下疥瘡雄檳榔磨麻油搓又方大楓子肉油核桃肉各四兩共研爛裝入竹筒內封口放鍋內煮一炷香傾出加陳蠟燭油布包擦乾溼疥並膿窠黃水瘡作癢作痛枯礬四兩蛇蛻燒存性露蜂房燒存性各五分大楓肉二兩樟冰三錢共為末入柏油四兩水銀五錢同研成膏搓疥瘡及婦人陰蝕瘡諸般惡瘡蕪荑蛇床子各一兩雄黃大楓肉川椒硫黃各五錢枯礬一兩二錢潮腦輕粉各二兩共研細豬油調搓一切諸瘡發癢枯礬乾薑各等分研細先用細茶食鹽煎洗再幹摻諸瘡疥癬煙膏即硝皮坊內灶上煙燻油膩黃丹水飛各二兩硫黃五錢熔化地上掘一孔貯醋傾入冷定土貝母白芷羌活枯礬各二錢麝香一錢輕粉三分共為細末瓷瓶收貯有膿水者干搓無膿水者桕濁燭調搓如禿瘡剃淨頭以豆腐水洗拭乾搓又方熟雞蛋一個打破頭取去蛋黃入麻油於內加硫黃少許放炭火中坐定俟油滾起沫蘸油塗瘡上即愈參耆丸治疥瘡膿窠真黃耆苦參酒炒茅蒼朮米泔炒各一斤共磨細末水法疊丸緑豆大每服三錢白湯下驗方大楓子四十九粒去殼搗如泥放碗內外用麻黃三錢去根去梢斑蝥七個去頭足翅雄豬油二兩同煎化至炭去渣將滾油衝入大楓子碗內攪勻將瘡用穿山甲抓破搽之不過三日全愈此藥妙在外發並不內收須勤擦之又方水銀硫黃枯礬樟腦各二錢松香一錢先將松香水銀同麻油研如糊再入三味研如膏擦之疥瘡水銀一錢松蘿茶三錢麝香一分大楓肉二十個上研細擦前心後心兩手彎兩腳彎如神膿窠疥大楓肉杏仁桃仁各四十九粒研細用麻黃五錢豬油熬去渣和藥調搽膿窠疥北細辛麻黃大楓肉各五錢全蠍二個上用豬板油十兩熬枯去渣搓疥瘡石灰二升以湯五升浸取汁先用白湯洗瘡拭乾再以此汁洗之又方搗羊蹄跟和豬脂入鹽少許塗之又方大楓子五錢水銀一錢五分明礬花椒各二錢研勻以豬油拌藥搗爛搽薄皮瘡門主論薄皮瘡又名廣瘡破後只一薄皮者是此風熱鬱於皮毛而成也薄皮瘡門主方驗方苦參密陀僧蛤粉兒茶各等分研細先將瘡洗淨挹去白皮拭乾瘡上陳蠟豬油調搓如有膿水乾摻可也肥瘡門主論陳實功曰肥瘡由胎毒而成者少因飲食之後油手摩頭或枕頭不潔而成者多正宗申鬥垣曰此瘡宜槐條煎湯洗淨以煙膠枯礬輕粉研細熟油調搽啓玄馮魯瞻曰此瘡乃臟腑不和之氣上衝血熱之毒上注小兒陰氣未足陽氣有餘故最多犯之宜內服連翹天花粉荊芥防風貝母元參赤芍藥生地黃牛蒡子清熱解毒涼血和血之劑俟毒氣少解方外用藥以塗之切不可驟加寒涼塗遏以致熱毒內攻不救蓋小兒臟腑嬌嫩易入難出也錦囊肥瘡門主方肥瘡胡黃連輕粉雄黃各三分膽礬二分枯礬一錢豬蹄鞋三個煅存性研細將瘡洗淨搽之又方肥皂子煅存性研末豬膽汁調搽又方松香血丹各等分研細豬板油搗汁青布卷條燒之取油搽又方東丹八分枯礬一錢真鉛粉松香各二錢入蔥管內飯上蒸化等冷去蔥用共研細末熱香油調搽豬油亦可又方黃花燒灰輕粉少許研勻干搽小兒頭上肥瘡黃水瘡梅花禿銅緑松香各三錢黃蠟二錢香油一兩五錢熬勻塗之頭上生瘡俗名黏瘡絶妙方周氏集驗海螵蛸二錢白膠香輕粉各五分研勻清油潤瘡以藥乾摻肥瘡極凶者苦參何首烏當歸威靈仙甘草金銀花胡麻石菖蒲連翹生地蟬蛻酒水同煎又方鴻禧東房傳大楓肉五錢白信三分油核桃五個共搗勻作三丸夜間取一丸在心口用手擦至二更天氣藥散開仍聚胸膛仰面而臥次夕亦然間一夜再擦一丸七日後全愈頭面肥瘡經驗輕粉飛血丹白礬雄黃各等分研細裝入蔥管內兩頭扎煨過加龜版灰少許研菜油調搽立效柏油膏劉氏祕方治小兒頭上肥瘡羊胡瘡奶癬瘡膿窠瘡腳上血瘋瘡癬婦人鈕扣瘋裙邊瘡耳上濕瘡如神柏油一斤麻油四兩明礬銅緑各二兩鉛粉一兩共入鍋內熬成紅色下黃蠟二兩化盡俟溫不住手攪勻離火入羊膽汁二個如無入牛膽汁一個豬膽汁二個攪勻磁鉢收貯搓之或調金毛獅子瘡藥搓瘡更妙肥瘡王衣蘭紫草浸冰麝頭油搓二三次愈肥瘡瘌痢煮雞蛋黃二個入銅鍋內熬出油入松香一兩五錢熬枯為末又用麻油一兩入蜈蚣一條去頭尾入油內熬枯去渣冷定調前末聽用先將瘡用撏豬湯煎滾洗透去靨或剃頭後用雞蛋數枚加花椒五分以香油攤煎餅蓋頭上用氈帽蓋之過一宿再用蜈蚣油調松香末搽之又方海螵蛸研末炒微黃搽又方厚朴烘碎研細末麻油調搓又方香附枯礬各三錢煎水洗又方老鹽魚一塊香油炙焦去油以油搽之爛眉頭瘡小麥炒黑色為末酒調敷頭上肥瘡宰豬退毛湯洗數次天泡瘡門主論陳實功曰天泡瘡者乃心火妄動脾濕隨之有身體上下不同寒熱天時微異上體者風熱多於濕熱宜涼血散風下體者濕熱多於風熱宜滲濕為先若不早治久則變為頑風紫癜難愈正宗申鬥垣曰此瘡屬手太陰肺經肺主皮毛因受暑熱濕蒸之氣故遍身燎漿白泡疼痛難忍皮破赤沾也啓玄王肯堂曰天泡瘡即丹毒之類而有泡者由天行少陽相火為病故名天泡為風熱客於皮膚間外不得泄怫熱血液結而成泡如豌豆瘡根赤頭白或頭有赤隨處而起若自里達於外發在春夏三焦俱熱則服通聖散若止從頭項兩手起者此上焦熱也則服涼膈散若從身半以下起者則服黃連解毒和四物湯若發於秋冬則宜升麻葛根犀角或加柏芩一二味外敷如馬齒莧吳藍赤小豆苧根之類皆解毒消腫可用於初起之時或鱉甲水龍骨各煅存性則收濕生肌可用於浸淫之後準繩馮魯瞻曰有種天行斑瘡須臾遍身皆戴白漿此惡毒氣永徽四年此瘡自西域東流於海內但煮食葵菜葉以蒜虀啖之即止錦囊天泡瘡門主方胡粉散天泡紅腫發熱急脹疼痛用針挑破摻之石膏煅蛤蜊粉輕粉各三錢杭粉一錢共研極細挹干患上用此摻之或用絲瓜葉搗汁調搽如冬月無絲瓜葉用染布青紅汁調搽石珍散天泡日久作爛疼痛不已膿水淋漓石膏煅真輕粉各一兩青黛黃柏各三錢研細甘草湯洗淨以此藥摻之其痛即止又方銀粉煅赤用鮮絲瓜葉搗汁調搽又方馬齒莧搗濃汁搽又方靛花汁搽又方陳螺螄殼煅研干搽又方蚌殼煅研摻又方蛤蜊殼煅研摻又方苧麻根搗汁搽又方井底泥敷又方芭蕉根搗汁敷又方小麥炒焦研末生桐油調敷又方大紅紙剪如瘡大清水潤濕以紅紙正面貼瘡上又方馬桶中垢刮下新瓦焙乾麻油調搽七日愈又方蚯蚓泥略炒研末蜜調敷又方菊花根汁搽又方絲瓜皮汁搽又方荔枝核醋磨搽又方備要輕粉青黛等分研細瓦花汁調搽立效又方蠶豆殼燒灰塗之又方枯礬寒水石青黛各等分研細新汲水調搽翻花瘡門主論周文採曰初生如飯粒漸大而有根頭破血流膿出肉反如花開之狀故名翻花瘡集驗陳實功曰此瘡頭大而蒂小小者如豆大者如菌無苦無痛揩損每流鮮血久亦虛人大法當以津調冰螄散遍擦正面外用軟油紙包裹根蒂細處用線連紙扎緊十日後其患自落換搽珍珠散收口正宗鴉啖瘡門主論竇漢卿曰鴉啖者久中邪熱臟腑虛寒血氣衰少腠理不密發於皮膚之上相生如錢竅後爛似鴉啖日久損傷難治用鴉啖散全書鴉啖瘡門主方鴉啖散竇氏老鴉毛燒灰大紅絨燒灰黃丹各一錢珍珠五分冰片一分麝香少許輕粉三分枯礬五分上為細末先用苦茶洗淨乾摻面上熱毒惡瘡門主方面上生瘡胡粉輕粉松香各等分研細雞蛋黃煎油調搓面上熱毒惡瘡馮氏胡粉黃柏炙黃連各等分研細豬油調敷面上毒瘡初起凌潢章祕方急尋水蜒蚰一二條用醬少許共搗塗紙上留一小孔透氣貼上黃水瘡門主論申鬥垣曰黃水瘡又名滴膿瘡啓玄陳實功曰頭面耳項忽生黃泡破流脂水頃刻延開多生痛癢此因日曬風吹暴感濕熱或內飧濕熱之物風動火生者有之治用蛤粉散或四味異功散搽之正宗馮魯瞻曰面上耳邊生瘡時出黃水浸淫不愈名曰香瓣瘡錦囊凡初起細瘡手少動之即破毒水流入何處即生大水泡瘡即為黃水瘡此熱毒鬱於皮毛也當以湯洗之祕録黃水瘡門主方四味異功散松香煉老生礬枯礬銀粉各等分研細先將撏豬湯或米泔水熬洗去淨瘡靨拭乾穢水干則麻油調搽濕則乾摻面上黃水瘡酸棗荊芥羊胡各煅灰存性一錢鉛粉五錢研細先以槐條煎水洗淨將藥敷上其瘡自好洗法岐天師雄黃防風各五錢水十碗敷滾去渣取汁洗瘡即愈又方鉛粉用菜油調塗磁碟內多捲紙板點著合熏時時攪勻待遍黃聽用將靨剝去搓上立愈又方周氏抄方雄豬膽一個黃柏一兩浸焙乾為末摻之又方松香研細真麻油調搽又方銀粉井水調塗碗底以艾團燒煙燻轉緑色刮下研細濕則乾摻干則油調搓香瓣瘡門主論申鬥垣曰香瓣瘡又名浸淫瘡初生甚小先癢後痛汁出浸淫濕爛肌肉延及遍身多生面上耳邊啓玄香瓣瘡門主方面上耳邊香瓣瘡羖羊須荊芥干棗去核各煅存性三錢研細入銀粉五分每用少許油調先以溫湯洗淨拭乾塗上即愈小兒身上起白纍如珠綴一二日即破膿水外流癢甚一處方好一處又起如意草搗爛敷之以長布縛定一夜即安又方雞蛋殼煅存性研細豬油調搽又方紫草一錢麻油浸先搽一塊好了再搽一塊金絲瘡門主論金絲瘡形如繩線巨細不一上下至心即死治法將瘡頭截住刺之出血再用藥治集驗金絲瘡門主方驗方嚼浮萍草塗之即愈火珠瘡門主論火珠瘡其形如珠始於發中相染不已亦有傷命者其熱如烙四畔紅赤中藏明亮如珠此心肝二經積熱熾盛而成火珠瘡門主方驗方生蘿蔔搗爛將滴醋浸敷瘡上熱瘡門主論申鬥垣曰心神煩躁遍身發瘡赤爛如火啓玄李東垣曰熱瘡遍身發瘡膿血赤爛如丹儼如火燒瘡熱瘡門主方驗方劉禹錫傳信方雞蛋五枚煮熟去白取黃亂髮如雞子大相和於鐵銚中炭火熬之初甚干少頃即發焦乃有液出旋取置碗中以液盡為度取塗瘡上即以苦參細末敷之如神二黃散川黃連黃柏各三兩赤小豆緑豆粉各一兩寒水石紫蘇漏蘆各七錢共研細末麻油調搽一日三次寒瘡門主論竇漢卿曰寒瘡令人面上及遍身生瘡似貓眼有光彩無膿血久則近脛此乃脾家濕熱所化宜服雄黃解毒丸清肌滲濕湯多食魚雞蔥蒜自愈惟鯉鮎魚蝦蟹不可食全書心法曰貓眼瘡一名寒瘡每生於面及遍身由脾經久郁濕熱覆被外寒凝結而成初起形如貓眼光采閃爍無血但痛癢不常久則近脛宜服清肌滲濕湯外搓妙貼散冷瘡門主論申鬥垣曰身觸風寒冷氣以致血澀不行其瘡頑滯不知痛癢經久不愈宜用椒附雄礬膩粉油調敷啓玄肉刺毛門主論汪省之曰肉刺毛隱隱生人遍身皮膚手足間如蟲鑽刺令人難忍若一犯房欲其毒直刺心胸宜硼砂散主之理例魚脊瘡門主論竇漢卿曰魚脊瘡者乃臟中積冷腎氣虛寒故虛熱得傳經絡筋骨之間發動不知何處初生如疽癤破時黃水流注白泡似魚脊若不速治肉爛膿流命亦難保經驗赤炎瘡門主論申鬥垣曰赤炎瘡乃手太陰肺經感受風熱肺主皮毛其經多氣少血故遍身紅瘡點子又名赤炎風乃心火盛血熱也有赤點或有或無久而不愈變為厲風啓玄癌瘡門主論直指方云癌瘡上高下深纍垂如瞽眼其中帶青頭上各露一舌毒孔透里用生井蛙皮煅存性蜜水調敷良詳本草綱目部瘭瘡門主論馮魯瞻曰瘭瘡者因風熱毒氣所乘搏於皮膚生瘭士冖某木而潰成瘡故名之錦囊日曬瘡門主論申鬥垣曰此乃酷日曬曝先疼後破而成瘡此辛勤勞作傭工務農之人多有之宜制柏散加青黛治之啓玄水漬瘡門主論申鬥垣曰車鏇匠及染匠辛苦人久弄水漿不得停息以致手丫濕爛名曰水漬瘡啓玄水漬瘡門主方驗方啓玄礬水浸洗數次自愈凍瘡門主論陳實功曰凍瘡乃天時嚴冷氣血冰凝而成手足耳邊開裂作痛正宗申鬥垣曰凍瘡先痛後腫遇暖發燒破流膿血啓玄石室祕録云凍瘡乃人不耐寒而肌膚受冷驟用火烘乃成凍瘡至於耳上凍瘡必是人用手溫之反成此纍也正字通云今俗呼足跟凍瘡曰灶瘃蔣示吉曰凍瘡乃肌肉寒極氣血不行所謂死肌患也初起紫斑久則變黑腐爛作膿碧玉膏主之生肌斂口説約澄謂熱肌經冷風所激凝滯成片作癢此是凍風切勿火烤亦忌熱手摸擦越摸越甚一經紫黑破損即成凍瘡宜楝樹果煎湯洗極效凍瘡門主方凍瘡開裂桐油八兩白蠟黃丹各一兩熬膏貼之又方楝樹果煎湯淋洗即以楝樹果擦之神效又方五倍子牛鼻中繩煅灰各等分研末填凍裂處又方松香二兩黃蠟一兩熬勻瓦罐收貯先以熱湯洗令皮軟拭乾將藥於慢火上炙化塗之凍耳凍跟端午日取豬板油四兩去皮膜加乳香二分輕粉三分雄黃五分研入米燒酒內拌勻再入油拌過俟收干放懸屋簷下陰乾搽之手足開裂經春夏不愈者生薑搗汁紅糟食鹽臘豬油共研爛擦入皸內一時雖痛少頃便軟皸合再用即安免凍瘡法杏仁天花粉一兩紅棗十枚豬胰三副共搗如泥用好酒四杯浸於瓷器內早晚搽手及頭面冬月凍瘡皮裂疼痛黃蠟一兩熔化入松香三分攪勻每以溫湯洗拭裂處用前藥熔化滴入裂縫經旬即愈凍瘡未破者白礬研末一錢百沸湯半盅攪和雞毛掃塗烘乾擦去患處白屑再掃再烘藥儘自愈洗凍瘡秋茄根煎湯乘熱洗之如皮破以螃蟹殼煅灰摻之又方白芨二兩煎湯洗之如爛破者洗後用橄欖核燒研為末搽之又方陳石灰黃狗屎露天久者變成白色用炭火煅過各等分研細末以麻油調之敷上雖成瘡潰爛敷上即止痛生肌凍瘡久爛不愈糖塔餅杓內炒成灰研末一兩加冰片少許乾摻又方獨蒜煨杵爛貼又方熬熟桐油調密陀僧末敷又方五倍子研末和牛骨髓填縫內即好又方荊芥煎湯洗之三日愈又方生附子為末面水調敷或加楝樹子肉搗敷又方麻雀腦子塗之又方豬腦子加熱酒洗又方臘月羊油懸挂屋內愈陳愈妙搽之立愈又方白芨末調敷裂處又方羊屎不拘多少煅令存性砂糖調敷又方狗骨煅存性研末香油調填裂拆內又方附子皮煎湯洗又方陳蠟燭油同白蠟搽之又方糟湯浸洗薑汁塗之腳指凍風爛化棉花燒灰摻之凍瘡油胭脂搽之又方玉紅膏搽之又方五倍子豬油搗成膏填入裂縫凍耳薑汁煎塗凍跟茄根煎湯洗免凍櫻桃擦耳擦腳後跟冬季不生凍瘡凍瘡舊貂毛煅存性搓又方凍瘡已破者用黃柏末七分生皮硝三分未破者用黃柏末三分生皮硝七分俱用冷水調搓又方鴿糞煎湯洗又方蟹殼燒枯研細菜油調搓又方先用胡椒煎洗拭乾再用胡椒研細摻上外以新棉包裹用布扎好又方鮮蠶豆梗葉煎湯洗又方雪擦洗凍處又方魚膠熬化攤膏藥貼破裂上俟長平自落又方甘草甘遂煎湯熱洗二次凍風裂開敗荷葉梗燒存性頭垢桐油熬過調膏捺成一塊臥用切作小條丫在裂縫內又方醃菜滷煎湯滾洗汗浙瘡門主論申鬥垣曰肥人夏月久不洗浴被汗淹浙皮膚漸爛成瘡痛不可忍名曰汗浙瘡啓玄汗浙瘡門主方驗方真蛤粉滑石各等分研勻撲之皴裂瘡門主論凡撑船推車打魚染匠輾玉木瓦辛苦之人手足皴裂挽動出血痛不可忍名曰皴裂瘡啓玄皴裂瘡門主方驗方啓玄宜用地骨皮白礬煎湯洗之至軟再用蠟月羊油頓化入研細輕粉一錢搽之神效蜘蛛瘡門主論陳實功曰蜘蛛瘡或衣沾蜘蛛遺尿或蟲蟻遊走而成初生白泡紅根作癢日漸開成簇作痛正宗申鬥垣曰此瘡生於皮膚間如水窠瘡相似淡紅且痛五七個成簇亦能蔭開可用苧麻在瘡上揉搓出水即以苧麻燒灰為末摻在瘡上即愈啓玄汪省之曰蜘蛛尿著人身上即生瘡如粟粒纍纍似蜊蟲螫痛亦能惡寒發熱即以犀角磨汁塗之則愈不然以苧麻搓去瘡內水汁用金黃散搽之理例蜘蛛瘡門主方驗方公雞涎掃之又方公雞嘴爪甲煅灰敷之又方用蟾酥丸同陳京墨磨摻又方苧麻搓瘡令破出水以雄黃枯礬等分研細乾摻漆瘡門主論陳實功曰漆味辛熱火象有毒之物人之皮毛腠理不密故感其毒而成先發作癢抓之漸似癮疹出現皮膚傳遍肢體皮破爛斑流水作痛甚則寒熱交作忌浴熱湯兼戒口味不然即變頑風癬癩矣正宗申鬥垣曰漆瘡令人渾身上下腫起如痱如火刺刺而痛皮膚燥裂三五日比風熱瘡或疼或癢為異啓玄又曰宜韭菜搗汁調三白散塗之澄曰木形人遇漆起泡發癢變瘡肢腫作痛甚者寒熱交作此疾雖小有受者遍身頭面似疹癩浮腫生瘡痛癢毛髮脫落心神恍惚不得眠者因療之遲遂為他證或成風癲真可畏也漆瘡門主方驗方栗樹皮去淨外面黑皮用裡面青皮炒焦煎水冷洗三四次又方木匠店木柿煎湯洗之又方皮硝不拘多少用熟水化開新筆掃之又方生蟹取黃塗之又方老柳樹皮煎水洗一日三次又方乾荷葉一斤水煮濃汁洗又方柳葉煎湯洗二三遍內服香油一二碗外搽生蟹黃又方鐵匠店磨鐵槽中泥塗之即愈又方蟹沫塗之又方磨刀泥塗又方蟹殼滑石研細乾者蜜和塗之濕者乾末摻之又方石膏輕粉韭汁調搓煎方集驗元參知母石膏人中黃黃連升麻連翹牛蒡子各一錢甘草五分淡竹葉二十片煎不拘時服忌浴熱水兼戒口味否則變為頑風癬愈而又發者多矣又方柳葉搓爛煎湯洗又方生雞蛋黃塗干則又塗不過三五次又方搗韭菜洗之又方新鮮松木打碎煎水洗又方頻以鹽湯洗之凡素常遇漆味即患漆瘡者川椒三四十粒搗碎塗口鼻上即不能為害惡瘡門主論王肯堂曰惡瘡諸痛癢瘡皆屬於心諸濕腫滿皆屬於脾心主血脾主肉血熱而肉濕濕熱相合潰敗肌膚浸淫不休不可以定名命之故謂之惡瘡也然有辨焉如疥癬癮疹之屬拂鬱氣血在皮膚腠理間者可以表而散內經有謂汗之則瘡已是矣若鬱氣血在肌肉之分外達皮膚作寒熱而生膿者或七情所招或膏粱之變皆宜解內熱不宜汗也張仲景所謂瘡家不可發汗汗之則痙者是矣一瘡而有宜汗不宜汗之戒蓋熱有淺深表里故也故瘡在皮膚則當因其輕而揚之汗之浴之外以殺蟲潤燥皆解凝結涎沫之藥敷之瘡之在肌肉則當因其重而減之瀉經絡之熱清涼氣血外以化膿生肌膏熁之瘡在頭巔則當射而取之須酒製寒涼劑更以風藥升而上之外以殺蟲解熱藥敷之能明此三者其於治瘡思過半矣準繩惡瘡門主方驗方種福堂杏仁三十粒去皮尖雄黃一錢五分輕粉一錢研末洗淨以豬膽汁調上二三日即愈百發百中當歸蒺藜煎張景嶽治癰疽瘡疹血氣不足邪毒不化內無實熱而痛淋漓者悉宜用之此與芍藥蒺藜相為奇正者當酌其詳當歸熟地芍藥酒炒何首烏各二錢荊芥穗炙甘草防風川芎白芷各一錢白蒺藜炒搗碎五錢或酒或水煎服然水不如酒以行藥力陽虛不能化毒者加桂枝再加乾薑附子氣虛不能化毒者加人參黃耆毒陷不能外達者加山甲皂針芍藥蒺藜煎治通身濕熱瘡疹及下部紅腫熱痛諸瘡黃芩龍膽草木通山梔澤瀉各一錢五分生地芍藥各二錢白蒺藜連刺捶碎五錢甚者一兩白水煎服如火不甚者宜去龍膽草山梔一切惡瘡不愈白蜜敷之必效諸腫毒瘡疼痛不安人所不識者取獨頭蒜三四顆搗爛入麻油和研厚敷腫處干再易之又方初起即用赤小豆井水調敷立消丹毒惡瘡馬齒莧搗敷頑瘡門主論陳遠公曰人久生惡瘡或手足頭面胸背經年纍月不愈臭腐不堪百藥無效人所謂頑瘡者言其冥頑醫功無所施力也然亦治之不得法耳人身氣血和必不生瘡即間生瘡旬日速愈是生瘡者乃氣血不和也其不和者或因濕浸或因熱盛或濕熱寒邪交至以致氣結不宣血滯不散結於皮而皮生瘡結於肉而肉生瘡久則膿血不淨因而生蟲人又用殺蟲之藥傷其皮肉則氣血更虛力難兼到棄皮肉於膜外而不顧則成瘡矣故治瘡必以行氣活血為主而蟲與毒不必計也然行氣活血亦不易也非補氣血不可蓋氣得補而氣自行一身血得補而血自活於遍體也救頑湯當歸白朮黃耆熟地麥冬各一兩山萸茯苓各五錢生甘草三錢柴胡防風連翹各一錢熟附子一片半夏二錢水煎服二劑瘡口必腫此乃藥助氣血與瘡戰也乃速愈之兆又二劑不疼而癢矣又二劑不再發冰鑑此方單去行氣活血得補之力也氣行血活蟲將安寄故不必殺蟲頑瘡自愈矣又曰有內股生瘡斂如豆許翻出肉一塊宛如菌狀人以為蟲蝕外翻也誰知肝經風熱血燥之故乎夫肝熱則生風風乃內風而非外風也外風清涼內風蘊熱故外風宜散內風宜清然清其風而不補血則熱不能解而風不能疏也必於養血之中益以清熱之味則燥者不燥熱退則風自靜也清風湯白芍一兩人參當歸各五錢白朮黑梔丹皮沙參花粉各三錢川芎二錢柴胡連翹甘草各一錢水煎服數劑瘡口自斂此方滋血以養肝非消肉以化毒何以斂瘡而愈蓋瘡成於肝木之旺平肝而血無過燥之虞自然風散而熱無炎灼之患苟不平肝而內用降火之品外用追蝕之法則蝕而又翻翻而又蝕其肉愈大其氣益虛變出非常恐難援救耳席瘡門主論申鬥垣曰席瘡乃久病著床之人挨擦磨破而成上而背脊下而尾閭當用馬屁勃軟襯庶不致損而又損晝夜呻吟也病人但見席瘡死之徵也啓玄心法曰席瘡乃大病後久而生眠瘡也乃皮肉先死不治席瘡門主方驗方馬屁勃墊之又方小麥麩絹裝成墊褥墊之又方蓋屋陳爛草研細墊睡血箭門主論陳實功曰血箭乃心經火盛逼血從毛竅中出也治以桃花散涼水調敷或金墨塗搓自止內宜涼心涼血正宗馮魯瞻曰有毛竅中出血者名曰肌衄因陽氣怫鬱於內不能敷揚於外以致陰血上乘陽分留淫腠理日久陽氣開發則陰血不能歸經故血從毛竅出也宜開鬱清氣涼血之劑如相火內動而乘陰分以致熱血沸騰者宜滋陰降火之劑前人主乎肺熱以肺主皮毛也用男胎髮燒灰撲之有因大喜傷心喜則氣散血隨氣而溢於表者宜涼心以斂之錦囊岐天師曰如有人足上忽毛孔標血如一線者流之不止即死急以米醋三升煮滾熱以兩足浸之即血止後用人參一兩當歸三兩穿山甲一片火炒研末以參歸湯調服即不再發此乃酒色不禁恣意縱欲所致世上人多有之方書未載祕録血痣門主論陳實功曰血痣乃肝經怒火鬱結其形初起色紅如痣漸大如豆揩之血流須用冰螄散枯去本痣以珍珠散搽去生皮內服解鬱平肝之劑如血出不止過甚者涼血地黃湯主之正宗血疳門主論竇漢卿曰血疳乃臟中虛弱邪氣相侵真氣衰少風毒閉塞腠理發於肌膚初如紫疥破時出血瘡生遍身行處成瘡損傷皮肉癢痛難禁治法先宜養血清熱次宜清肌滲濕全書疣門主論經曰手太陽之別名曰支正上脘五寸虛則生疣疣與疣同疣音休俗乎雞眼子是也小者指痂疥取之所別也薛立齋曰疣屬肝膽少陽經風熱血燥或怒火肝火或肝客淫氣所致蓋肝熱水涸腎氣不榮故精亡而筋攣也宜以地黃丸滋腎水以生肝血為善若用蛛絲纏螳螂蝕著艾灸必多致誤大抵此證與血燥結核相同故外用腐蝕等法內服燥血消毒則精血愈虛肝筋受傷瘡口翻突開張卒成敗證矣正字通云疣小者俗謂之瘊子疣門主方驗方地膚子白礬各等分煎湯洗數次瘊子盡消又方天雨鳴雷時有疣者不與人知自己立於簷下迎著雷以手抹去瘊子口中默念雷打猴子快走念七遍抹七遍向天井外抹即自落千日瘡門主論申鬥垣曰千日瘡一名疣瘡又名瘊子又名晦氣瘡此瘡如魚鱗生於人手足上生一千日自落故名之用雞肫皮擦之自愈一法用蘄艾在初生第一個上灸之余皆自落而痊也啓玄千日瘡門主方驗方谷裕豐用銅錢一個套在千日瘡上按定取草紙捲了點著燒透熄下的紙煤子放瘡上以香點著燒過吹去又放紙煤燒之不過五七次其瘡根隨手自落並不痛楚又方杜祕治身上忽生豎頭肉肉猴子並斑痣新石灰鹼各等分燒酒泡一時即可用每周掃上即起紫泡挑破出水結疤如點癍痣須以針微挑破點之又方王德山用蛇蛻擦之即落
