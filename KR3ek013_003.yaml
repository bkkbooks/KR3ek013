body:
  text: 卷三內景圖説上心小腸肝膽脾胃肺大腸心經曰心者君主之官神明出焉又曰心者惺也言心氣旺則惺惺而運其神明也巵言曰心深也言深居高拱相火代之行事也又曰其合脈也其榮色也開竅於舌難經曰心重十二兩中有七孔三毛盛精汁三合主藏神又曰心象尖圓形如蓮蕊其中有竅多寡不同以導引天真之氣下無透竅上通乎舌其有四系以通四臟心外有赤黃裹脂是為心包絡心下有膈膜與脊脅周圍相著遮蔽濁氣使不得上熏心肺也經曰手少陰經心又曰其經常少血多氣又曰午時氣血注於心黃庭經曰人身神名曰心神丹元字守靈靈樞曰舌者心之官也心病者舌卷短顴赤又曰心居肺下肝上又曰心者在天為熱在地為火在人為心在時為夏在方為南在色為赤通竅於舌經曰南方火也萬物所以盛長也又曰臟真通於心心藏血脈之氣也肝木為母脾土為子小腸為腑剋金主血若久視則傷血司藏神其類火其畜羊一作馬其卦離其性禮其華面其應四時上為熒惑星其病在脈其音徵徵者止也物盛則止也其數七其臭焦其聲言其氣呵其充血其液汗其味苦外應掌色赤然赤如帛裹朱不欲如赭靈樞曰心應脈皮厚者脈厚脈厚者小腸厚更心主熱熱則傷心病主驚熱痘主紅斑若憂愁思慮則傷心寒氣勝則病其病候面赤喜笑心煩掌熱而口乾開目妄語臍上動氣若心實則上竄咬牙口乾喜笑身熱汗血而肋脅膺背痛滿或叫哭而搐若心虛則恍惚多驚憂煩少色咳嗽舌強腰背痠疼若心絶則搖頭直視形如煙燻然心絶者一日死平脈則夏旺七十二日而脈洪緩洪者浮大而散來疾去遲其賊脈則沉濡而微與面黑亦逆其危脈鉤如操帶鉤又曰心主夏其日丙丁南方生熱熱生火火生苦苦生心心者生之本也神之變也為陽中之太陽通於夏氣又曰在變動為憂在聲為笑在蟲為羽在果為杏在菜為薤仙經曰丹田有三腦為髓海上丹田心為絳宮中丹田臍下三寸為下丹田下丹田藏精之腑也中丹田藏神之腑也上丹田藏氣之腑也太乙真人曰少思慮養心氣薄滋味養血氣真誥曰面者神之庭發者腦之華心憂則面戚腦減則發白回春曰心者一身之主清淨之府外有包絡以羅之其中精華之聚萃者名之曰神通陰陽察纖毫無所紊亂邵子曰神統於心氣統於腎形統於首形氣交而神主乎其中三才之道也內經曰太上養神其次養形故養神者必知形之肥瘦榮衛血氣之盛衰血氣者人之神不可不謹養也注云神安則壽延神去則身斃故可不謹養也又曰天食人以五氣地食人以五味五氣入鼻藏於心肺上使五色修明音聲能彰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生曜仙曰心者神明之舍中虛不過徑寸而神明居焉事物之滑如理亂棼如涉驚濤或怵惕或懲創或喜怒若思慮一日之間一時之頃徑寸之地炎如火矣若嗜欲一萌即不善也歸而勿納是與良心兢也凡七情六欲之生於心皆然故曰心靜可以通乎神明事未至而先知是不出戶知天下不窺牖見天道也蓋心如水之撓久而澄清洞見其底是謂靈明宜乎靜可以固元氣則萬病不生故能長久若一念既萌神馳於外氣散於內血隨氣行榮衛昏亂百病相攻皆因心而生也大概恬養天君疾病不作此治心之法也內經曰心藏神神有餘則笑不休神不足則悲注云心藏脈脈舍神心氣虛則悲實則笑不休也皇甫士安曰心虛則悲悲則憂心實則笑笑則喜經曰神者精氣之化成也又曰五臟藏七神心藏神肺藏魄肝藏魂脾藏意腎藏志又曰脾藏意與智腎藏精與志是謂七神又曰心在志為喜喜傷心恐勝喜又曰暴喜傷陽又曰喜怒傷氣又曰喜怒不節寒暑過度生乃不固又曰喜則氣緩蓋喜則氣和志達榮衛通利故氣緩矣皇甫謐曰喜發於心而成於肺故過節則二臟俱傷靈樞曰喜樂者神蕩散而不藏丹溪曰喜傷心者以恐勝之以怒解之經曰得神者昌失神者亡失神者謂失精神而昏亂也靈樞曰心氣通於舌心和則舌能知五味矣五臟當內通於上七竅也又曰五臟不和則七竅七一作九不通六腑不和則留結為癰岐伯曰愁憂恐懼則傷心難經曰憂愁思慮則傷心又曰邪客使魂魄不安者血氣少也血氣少者屬於心心氣虛者其人多畏合目欲眠夢遠行而精神離散魂魄妄行陰氣衰者為癲陽氣衰者為狂仲景曰心傷者其人勞倦則頭面赤而下重心中痛而自煩發熱臍上跳其脈弦此為心臟傷所至也靈樞曰邪在心則病心痛喜悲時眩僕又曰心實則胸中痛脅支滿脅下痛膺背肩胛間痛兩臂內痛心虛則胸腹大脅上與腰相引而痛又曰腎傳之心病筋脈相引而急名曰瘛經曰心熱者色赤而絡脈溢也難經曰外證面赤口乾善笑內證臍上有動氣按之牢若痛其病煩心心痛掌中熱而啘有是者心也無是者非也入門曰健忘失記驚悸不安心內懊憹不樂皆心血少也內經曰大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項一月死真臟見乃與之期日注曰此心之藏也期後三十日內死又曰病在心愈在長夏長夏不愈甚於冬冬不死持於春起於夏又曰心病者愈在戊己戊己不愈加於壬癸壬癸不死持於甲乙起於丙丁又曰病者日中慧夜半甚平旦靜黃帝曰手少陰之脈獨無輸何也岐伯曰少陰者心脈也心者五臟六腑之大主也為帝主精神之所舍其臟堅固邪不能容容之則傷心心傷則神去神去則死矣故諸邪在於心者皆在心之包絡包絡者心主之脈也故少陰無輸也帝曰少陰無輸心不病乎岐伯曰在外經病而臟不病故獨取其經於掌後鋭骨之端即神門穴也直指曰邪客於陰神不守舍故心有所感夢而後泄也其候有三少年氣盛鰥曠矜持強制情欲不自知覺此泄如瓶之滿而溢者人或有之勿藥可也心家氣不能主宰或心受熱邪陽氣不收此泄如瓶之側而出者人多有之其病猶輕合用和平之劑臟腑積弱真元久虧心不攝念腎不攝精此泄如藏之罅而出者人少有之其病最重須當大作補湯入門曰蓋交感之精常有一點白膜裹藏於腎而元精以為此精之本者實在乎心日有所思夜夢而失之矣宜黃連清心飲經曰無故而喑脈不至不治自已謂氣暴逆也氣復則已皇甫謐曰思雖發於脾而成於心過節則二臟俱傷經曰怵惕思慮則傷神神傷則恐懼流淫而不止又曰血並於陰氣並於陽故為驚狂又曰悸者心跳動也綱目曰驚者心卒動而不寧也悸者心跳動而怕驚也三因曰驚悸因事有所大驚而成者名曰心驚膽懾病在心膽經其脈大動又曰五飲停蓄閉於中脘最使人驚悸屬飲家仲景曰心悸者火懼水也惟腎欺心故為悸傷寒飲水多必心下悸又曰食少飲多水停心下甚者則悸微者短氣丹溪曰驚悸者有時而作大概屬血虛與痰瘦人多是血虛肥人多是痰飲時覺心跳者亦是血虛入門曰驚悸因思慮過度及大驚恐而作甚則心跳欲厥時作時止者乃痰因火動又曰心膽虛怯觸事易驚涎與氣搏變生諸證直指曰血虛心虛多驚正傳曰憂愁思慮傷心令人惕然心跳動驚悸不安醫鑑曰憂愁思慮傷心或勤政勞心以致心神不足驚悸少睡宜養心湯又曰勞心思慮損傷精神頭眩目昏心虛氣短驚悸煩熱宜清心補血湯綱目曰怔忡心動而不寧也戴氏曰怔忡者心中躁動不安惕惕然如人將捕者是也多因汲汲富貴戚戚貧賤不遂所願而成也直指曰心虛而痰鬱則耳聞大聲目擊異物遇險臨危觸事喪志使人有惕惕之狀是為驚悸心虛而停水則胸中滲漉怏怏之狀是為怔忡正傳曰怔忡者心中惕惕然動搖而不得安靜無時而作者是也入門曰怔忡因驚悸久而成也痰在下火在上加味溫膽湯加川連梔子當歸貝母直指曰心下有水氣怔忡水飲為怔頭眩心悸宜五苓散濟生曰思慮過度耗傷心血怔忡恍惚宜益榮湯得效曰痰飲蓄於心胃怔忡不已宜茯苓飲子又曰虛人停飲怔忡宜薑朮湯回春曰心中無血如魚無水怔忡跳動宜四物安神湯入門曰心神不定恍惚健忘火不下降時復振跳宜朱雀丸怔忡亦曰怔忪與驚悸同看靈樞曰黃帝問人之善忘者何氣使然岐伯對曰上氣不足下氣有餘腸胃實而心肺虛虛則榮衛留於下久之不以時上故善忘也內經曰血並於下氣並於上亂而善忘丹溪曰健忘之證精神短少者多亦有痰者戴氏曰健忘者為事有始無終言談不知首尾此以為病之名非生成之愚頑不知人事者入門曰怔忡久則健忘由心脾血少神虧引神歸舍丹主之膽星硃砂附子豬心血為丸梧桐子大萱草根煎湯送下五十丸又曰如所稟陰魄不足善忘者宜定志丸開心散醫鑑曰健忘陡然而忘其事盡心力思量不來也主心脾二經蓋心之官則思脾之官亦主思此由思慮過多心傷則血耗散神不守舍脾傷則胃氣衰憊而慮愈深二者皆令人事卒然而忘治法必先養其心血培其脾土以凝神定智之劑調理之亦當以幽間之處安樂之中使其絶於憂慮遠其六淫七情如此則日漸以安矣綱目曰心淡淡動也因痰動也謂不怕驚而心自動也驚恐亦曰心中淡淡謂怕驚而亦動也舌血謂之舌衄汗孔出血謂之肌衄屬心與肝也凡驚而動血者屬心血吐水碗中如半沉半浮者是心血腫脹水腫有十種之分如氣短不得臥為心水經曰背為陽陽中之陽心也心為牡臟牡者陽也金匱真言論曰夏氣病在臟心之應也經曰喜笑皆屬心火蓋火得風而焰笑之象也又曰諸血者皆屬於心又曰頭者精明之府頭傾神深精神將奪矣又曰諸痛癢瘡皆屬於心又曰諸躁狂越皆屬於火又曰諸病跗腫疼酸驚駭皆屬於火又曰諸熱瞀瘛皆屬於火又曰諸逆衝上皆屬於火又曰諸禁鼓栗如喪神守皆屬於火黃帝問曰人生而有病癲疾者病名曰何安所得之岐伯對曰病為胎病此得之在母腹中時其母有所大驚氣上而不下精氣並居故令子發為癲疾也又曰厥成為癲疾又曰邪搏陽則為癲疾資生曰風眩之病起於心氣不足胸上蓄熱實痰熱相感而動風風心相亂則昏瞀故謂之風眩又曰痰在膈間則眩微不僕痰溢膈上則眩甚仆倒於地而不知人名曰癲癇又曰仆倒不省皆由邪氣逆上陽分而亂於頭中也癲癇者痰邪逆上也痰邪逆上則頭中氣亂頭中氣亂則脈道閉塞孔竅不通故耳不聞聲目不識人而昏眩仆倒也以其病在頭巔故曰癲疾綱目曰癇有五心曰馬癇肝曰雞癇脾曰牛癇肺曰羊癇腎曰豬癇以病名狀偶類故為名其實痰與火與驚三者而已又曰癲者異常也平日能言癇則沉默平日不言癲則呻吟甚則僵仆直視心常不樂言語無倫如醉發癡癇者卒然昏倒咬牙作聲吐涎沫不省人事隨後漸醒身熱脈浮為陽癇身涼脈沉為陰癇正傳曰凡癲癇僕時口中作聲將省事時吐涎沫省後又復發時作時止而不休息中風中寒中暑尸厥之類則僕時無聲省時無涎後不再發入門曰大率多因痰結於心胸間宜開痰鎮心神若神不守舍狂言妄作經年不愈如心經蓄熱當清心除熱如痰迷心竅當去痰寧心宜大吐大下而愈大人曰癲小兒曰癇其實一也內經曰黃帝問曰有病怒狂者此病安生岐伯對曰生於陽也帝曰陽何以使人狂岐伯曰陽氣者因暴折而難決故善怒也病名曰陽厥帝曰治之奈何岐伯曰奪其食即已夫食入於陰長氣於陽故奪其食即已使之服以生鐵落為飲夫生鐵落者下氣疾也又曰多喜曰癲多怒曰狂又曰陰不勝其陽則脈流薄疾並乃狂又曰衣被不斂言語善惡不避親疏此神明之亂也帝曰陽明病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上之處皆非其素能也病反能者何也岐伯曰四肢者諸陽之本也陽盛則四肢實則能登高也帝曰其棄衣而走者何也岐伯曰熱甚於身故棄衣欲走也帝曰其妄言罵詈不避親疏而歌者何也岐伯曰陽盛則使人妄言罵詈不避親疏而不欲食不欲食故妄言也又曰邪入於陽則狂難經曰重陽者狂重陰者癲又曰狂之始發少臥而多起自高賢也自辨智也自貴倨也妄笑好歌樂妄行不休是也癲疾始發意不樂直視僵仆其脈三部陰陽俱盛者是也百要曰癲者異常也精神癡呆言語失倫狂者凶狂也輕則自高自是好歌好舞甚則棄衣走而逾垣上屋又甚則披髮大叫不避水火且欲殺人此痰火壅盛而然又曰陽虛陰實則癲陰虛陽實則狂又曰陽盛則狂狂者欲奔走叫呼陰盛則癲癲者眩倒不省綱目曰狂謂妄言妄走也癲謂僵仆不省也經有言狂癲疾者又言癲疾為狂者是癲狂兼病也內經曰嘗貴後賤名曰脫營嘗富後貧名曰失精雖不中邪病從內生身體日減氣虛無精病深無氣灑灑然時驚病深者以其外耗於衛內奪於榮注云血為憂煎氣隨悲減故外耗於衛內奪於榮是證令人飲食無味神倦肌瘦靈樞曰癲疾嘔多涎沫氣下泄不治又曰癲癇之病乍作乍醒者蘇不食癡迷者死又曰凡癲狂之病若神脫而目瞪如愚癡者不可治又曰癲疾者疾發如狂死不治醫鑑曰人之所主者心心之所養者血心血一虛神氣不守此驚悸之所肇端也驚者恐怖之謂悸者怔忡之謂驚者與之豁痰定驚之劑悸者與之逐水消飲之劑直指曰健忘者心脾二臟血少神虧故也宜養血安神以調之正傳曰狂為痰火實盛癲為心血不足多為求望高遠不得志者有之癲病獨主乎痰因火動之所作也治法癲宜乎吐狂宜乎下癲則宜乎安神養血兼降痰火河間曰五志過極皆為火也蓋氣為陽而主輕微諸所動亂勞傷皆為陽化之火神狂氣亂而為病熱者多矣子和曰河間治五志獨得言外之意凡見喜怒悲思恐之證皆以平心火為主至於勞者傷於動動便屬陽驚者駭於心心便屬火二者亦皆以平心火為主也丹心靈樞曰心小則易傷以憂心大則憂不能傷心高則滿於肺悗而善忘難開以言心下則易傷於寒易恐以言心堅則臟安守固心脆則善病消疸熱中心端正則和利難傷心偏傾則操持不一無守司也又曰心病禁溫食熱衣經曰手少陰氣絶則脈不通故血不流血不流則色不澤故其黑如漆柴者血先死壬日篤癸日死仲景曰形體如煙煤直視搖頭者此為心絶經曰心絶一日死何以知之肩息回視立死脈經曰心絶二日死靈樞曰五臟皆小者苦焦心多憂愁五臟皆大者緩於事難使以憂五臟皆高者好高舉措五臟皆下者好出人下五臟皆堅者無病五臟皆脆者不離於病五臟皆端正者和利得人心五臟皆偏傾者邪心而善盜不可以為人乎反復言語也又曰心為血之主而肝又為血之臟是以血出於心而納之於肝也經曰主明則下安以此養生則壽主不明則十二官危以此養生則死又曰心以膻中為腑經曰十二官皆聽命於心故主不明則十二官危使道閉塞而不通形乃大傷又曰火王於夏相於春廢於季夏囚於秋死於冬其王日丙丁王時日中其困日庚辛困時晡時死日壬癸死時半夜又曰心俞在脊第五椎旁募在腹上巨闕又曰南方赤色入通於心開竅於耳火精之氣其藏神舌為心之官當言於舌舌用非竅故云耳也蓋手少陰之路會於耳中故也又曰心色赤而中虛離之象也又曰心氣通於舌舌和則知五味矣又曰雷氣通於心又曰背為陽陽中之陽心也又曰精氣並於心則喜又曰心惡熱又曰血病無多食鹹又曰久視傷血勞傷心也又曰損其心者調其榮衛又曰心熱病額先赤又曰心熱病先不樂數日乃熱熱爭則卒心痛煩悶善嘔頭痛面赤無汗壬癸甚丙丁大汗氣逆則壬癸死刺手少陰太陽又曰心瘧者令人煩心甚欲得清水反寒多不甚熱刺手少陰神門又曰肝移寒於心在隔中肝移熱於心則死又曰心咳之狀咳則心痛喉中介介如梗狀介音嘎甚則咽腫喉痹又曰心風之狀多汗惡風焦絶善怒嚇音下赤色病甚則不可言快疹在口其色赤又曰心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐又曰心氣熱則下脈厥而上上則下脈虛虛則主脈痿樞拆音托挈脛縱而不任地也又曰心病煩悶少氣大熱熱上燙心嘔吐咳逆狂語汗出如珠多厥其脈當浮今反沉而滑其色當赤而反黑者死此水剋火也脈經曰夏心脈欲洪大而散脾脈欲洪而遲緩肺脈欲洪而浮澀腎脈欲洪而沉滑命門與腎同肝脈欲洪而弦長又曰心脈搏堅而長當病舌卷不能言其軟而散者當消渴自已華陀曰肺下右側可見心系繫於脊髓下通於腎其心系有二一則上與肺通一則自心入肺兩大葉間曲折向後並脊膂細絡相連貫通脈髓而與腎系相通愚謂四臟之系皆通於心心則通於四臟之系也交相連輸其血氣滲灌骨髓故五臟有病先干於心其繫上連於肺其別自肺兩葉向後貫脊下腎又自腎而之膀胱與膀胱膜絡並行之於溲溺處也肺之系者上通氣喉其中與心系相通脾之系者自膈中微近左脅居胃之上並胃胞絡及胃脘相連貫膈與心肺相通與膈膜相綴也肝之系自膈下著右脅肋上貫膈入肺中與膈膜相連腎之系貼脊膂脂膜中兩腎相系相通而下行其上與心系通也綴音墜經曰是動病則嗌乾心痛渴而欲飲是為腎厥是主心又曰所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛盛者寸口大再倍於人迎虛者寸口反小於人迎也又曰苦先入心又曰心宜食酸又曰心虛以炒鹽補之虛則補其母木能生火肝乃心之母以生薑補肝如無他證用安神丸主之又曰心實以甘草瀉之如無他證用瀉心湯又曰凡心臟得病必先調其肝腎二臟腎者心之鬼肝氣通則心氣和肝氣滯則心氣乏故心病必先求於肝是澄源也五臟有病必先傳其所勝水能制火則腎邪必傳於心故先制其腎逐其邪診其肝腎俱和而心自疾則隨其本經虛實而治之手少陰心引經藥歌午心麻黃桂心獨活山梔黃芩生地當歸黃連代赭石紫石英更有細辛並半夏熟地北五味澤瀉同成針經曰心脈起足少陰少衝穴在小指內端又曰赤如雞冠者生赤如衃血者死又曰實則夢憂驚恐怖虛則夢煙火焰明又曰心苦緩急食酸以收之注曰心苦緩是心氣虛也心欲軟急食鹹以軟之用酸補之甘瀉之補棗仁遠志天竺黃山藥當歸麥門冬瀉貝母川黃連木香玄胡索溫藿香菖蒲涼牛黃犀角竹葉連翹硃砂引經報使獨活細辛小腸經曰小腸者受盛之官化物出焉又曰後附於脊前附於臍上左回疊積十六曲大二寸半徑八分分之少半長三丈二尺受谷二斗四升水六升三合之大半又曰小腸上口在臍上二寸近脊水穀由此而入復下一寸外附於臍為水分穴當小腸下口至是而泌別清濁水液滲入膀胱浮穢流入大腸難經曰重二斤十四兩經曰小腸為赤腸又曰小腸若寒甚獨肩上熱及手小指次指之間熱若脈陷者此其候也又曰小腸有寒則下重便膿血有熱必痔又曰小腸有宿食常暮發熱明日復止又曰小腸脹者小腸䐜滿䐜音嗔脹起也引腹而痛又曰膀胱移熱於小腸鬲腸不便上為口糜又曰心咳不已小腸受之其狀咳而失氣氣與咳俱失又曰厥氣客於小腸則夢聚邑街衢又曰是動病則嗌痛頸腫不可回顧肩似拔臑似折是主液又曰所生病者耳聾目黃頰腫頷肩臑肘臂外後廉痛盛者人迎大再倍於寸口虛者人迎反小於寸口也又曰小腸熱脹生口瘡小腸熱結滿不通小腸虛寒痛下赤白腸滑小腸冷氣非時刺痛小腸酒後飲冷氣裹熱結伏臍下結硬塊不通連外腎俱腫經曰手太陽小腸經又曰是經多血少氣又曰未時氣血注於小腸人門曰凡胃中腐熟水穀其滓穢自胃之下口傳入於小腸上口自小腸下口泌別清濁水液入膀胱上口滓穢入大腸上口難經曰小腸大腸會謂之闌門言由關闌分隔也靈樞曰唇厚人中長以候小腸又曰心應脈皮厚者脈厚脈厚者小腸厚皮薄者脈薄脈薄者小腸薄皮緩者脈緩脈緩者小腸大而長皮薄而脈衝小者小腸小而短諸陽經脈皆多紆屈小腸結也又曰中氣不足腸為之苦鳴又曰小腸病者小腹痛腰脊控睪而痛睪陰丸也時窘之候當耳前熱又曰小腸控睪引腰脊上衝心邪在小腸也內經曰小腸為泄入門曰小腸有氣則小腹痛小腸有血則小便澀小腸有熱則莖中痛又曰小腸者心之腑也有病宜通利用導赤散赤茯苓湯脈經曰小腸絶六日死何以知之髮直如干麻不得屈伸自汗不止溺血屬小腸膀胱經腫脹水腫有十種之分小腹急滿為小腸水補牡蠣石斛瀉蔥白木通紫蘇荔枝核溫大茴香小茴香烏藥涼黃芩天花粉引經報使羌活藁本上行黃柏下行肝經曰肝者將軍之官謀慮出焉又曰肝者干也其性多動而少靜好乾犯他臟者也又曰肝居膈下並胃著脊之九椎又曰其合筋也其榮爪也主藏魂開竅於目其繫上絡心肺下亦無竅也難經曰肝重四斤四兩左三葉右四葉凡七葉滑伯仁曰肝之為臟其治在左其臟在左脅左腎之前並胃著脊之第九椎也經曰足厥陰經肝又曰是經多血少氣又曰丑時氣血注於肝黃庭經曰人身神名曰肝神龍煙字含明靈樞曰目者肝之官也肝病者眥青經曰肝者在天為風在地為木在人為肝通竅於眼在時為春在方為東在色為青經曰東方木也萬物所以始生也又曰臟真散於肝肝藏筋膜之氣也腎水為母心火為子與膽為腑剋土養筋故久行則傷筋司藏魂其類草木其畜雞一作犬其蟲為毛其果為李其菜為韭其卦震生數三成數八一作巽其性仁其充筋其華爪其穀麥一作麻其應四時上為歲星是以春氣在頭也其音角角者觸也象陽氣觸動而生也其數八其病在筋其臭臊其聲呼在變動為握其氣噓其液淚其味酸有餘怒不足悲外應爪甲色青欲如青玉光澤不欲如藍靈樞曰爪厚者膽亦厚更肝主風風喜傷肝病主驚風痘主水泡若恚怒氣逆則傷肝氣若燥氣盛則病其病候面青筋急多怒眼痛目閉不欲見人或兩目連札臍左動氣若肝實則直視大叫呵欠項急頓悶目赤多怒頭眩痛引兩脅小腹之下若虛則目昏胸痛咬牙吹氣筋縮拘攣恐懼如人將捕若絶則唇腮反青四肢多汗然肝絶者八日死平脈則春旺七十二日脈弦緩而長然春弦者端直之狀細弱而長其賊脈則浮澀而短與夫面白亦逆其危脈弦如張弓弦又曰肝生於左又曰肝主春其日甲乙東方生風風生木木生酸酸生肝肝為陰中之少陽通於春氣靈樞曰肝者主為將使之候外欲短堅固視目大小又曰肝小則臟安無脅下之病肝大則逼胃迫咽苦膈中且脅下痛肝高則上支賁切脅悗為息賁肝下則逼胃脅下空易受邪肝堅則臟安難傷肝脆則善病消疸易傷肝端正則和利難傷肝偏傾則脅下痛又曰有所墜墮惡血留內有所大怒氣上不下積於脅下則傷肝又曰邪在肝則兩脅中痛寒中惡血在內又曰大怒氣逆則傷肝又曰肝藏血血舍魂肝氣虛則恐實則兩脅下痛引小腹善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕狀難經曰恚怒氣逆上而不下則傷肝又曰外證善潔面青善怒內證臍左有動氣按之牢若痛其病四肢滿閉淋澀便難轉筋有是者肝也無是者非也內經曰肝病者兩脅下痛引小腹令人善怒肺傳之肝病名曰肝疸一名曰厥脅痛出食肝熱者色蒼而爪枯又曰肝藏血血有餘則怒不足則恐又曰大骨枯稿大肉陷下胸中氣滿腹內痛心中不便肩項身熱破䐃脫肉目眶陷真臟見目不見人立死其見人者至其所不勝之時則死注曰此肝之藏也所不勝之時謂庚辛之日也入門曰人動則血運於諸經靜則血歸於肝臟肝主血海故也經曰病在肝愈於愈夏不愈甚於秋秋不死持於冬起於春又曰肝病者愈在丙丁丙丁不愈加於庚辛庚辛不死持於壬癸起於甲乙又曰肝病者平朝慧下晡甚夜半靜又曰肝苦急急食甘以緩之甘草宜食粳米牛肉棗葵注曰肝苦急是其氣有餘也肝欲散急食辛以散之川芎肝虛以生薑陳皮之類補之肝絶候靈樞曰足厥陰氣絶則筋絶厥陰者肝脈也肝者筋之合也筋者聚於陰器而絡於舌本也故脈不榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死庚日篤辛日死又曰厥陰終者中熱嗌乾善尿心煩甚則舌卷卵上縮而終矣仲景曰唇吻反青四肢漐習伸縮也汗出者此為肝絶也脈經曰肝絶八日死何以知之面青但欲伏眠而不見人汗出如水不止怒而動血者屬肝自兩脅逆上吐血者屬肝血吐水碗中沉者是肝也經曰腹為陰陰中之陽肝也肝為牡臟牡者陽也又曰膝者筋之府屈伸不能行則僂俯筋將憊矣又曰諸風掉眩皆屬於肝太乙真人曰莫嗔怒養肝氣經曰肝在志為怒怒傷肝悲勝怒丹溪曰怒傷肝者以憂一作悲勝之以恐解之靈樞曰兩精相薄謂之神隨神往來謂之魂經曰暴怒傷陰又曰大怒則形氣絶而血菀於上使人薄厥又曰血並於上氣並於下心煩惋善怒又曰怒則氣上又曰怒則氣逆甚則嘔血及飧泄矣注云怒則陽氣逆上而肝木乘脾故嘔血及飧泄也經曰肝者罷極之本魂之居也又曰肝青象木肝得水而沉木得水而浮何也然肝者非為純木也乙角也庚之柔大言陰與陽小言夫與婦釋其微陽而吸其微陰之氣其意樂金又行陰道多故令肝得水而沉也肝熟而復浮故知乙當歸甲也又曰木王於春相於冬廢於夏囚於季夏死於秋其王日甲乙王時平旦日出其困日戊己困時食時日中其死日庚辛死時晡時日入晡音逋申時又曰病發驚駭又曰風氣通於肝又曰精氣並於肝則憂又曰肝惡風又曰久行傷筋勞傷肝也又曰損其肝者緩其中又曰肝俞在脊九椎旁募在乳下期門又曰肝熱病者左頰先赤又曰肝氣虛則恐實則怒又曰肝熱病小便先黃腹痛多臥身熱熱爭則狂言及驚脅滿痛手足躁不得安臥庚辛甚甲乙大汗氣逆則庚辛死刺足厥陰少陽又曰邪在肝則兩脅痛中寒中惡血在內胻善瘈節肘腫瘈音記狂也又曰肝脹者脅下滿而痛引小腹又曰肝水者腹大不能自轉側兩脅下腹中痛時時津液微生小便續通又曰肝著者其病人常欲蹈其胸上先未若時但欲飲熱著本病也若時指病時也又曰肝瘧者令人色蒼蒼然太息其狀若死者刺足厥陰見血又曰脾移寒於肝癰腫筋攣又曰脾移熱於肝則為驚衄又曰肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿又曰肝風之狀多汗惡風善悲色微蒼嗌乾善怒時憎女子診在目下其色青又曰肝痹者夜臥則驚多飲數小便上引小腹如懷妊狀又曰肝病主胸中喘怒罵其脈沉胸中窒欲令推按之有熱鼻窒推蕩也擠也又曰凡有所墜墮惡血留內若有所大怒氣上而不下積於左脅下則傷肝肝傷者其人脫肉不臥口欲得張時時手足青目瞑瞳人痛又曰肝氣虛則夢園苑生花草盛則夢怒厥氣客於肝則夢山林樹木又曰肝脈搏堅而長色不青當病墜若搏因血在脅下脅音協又音吸左右脅下脅子骨令人喘逆其軟而散色澤者當病溢飲溢飲者渴暴多飲而溢入肌皮腸胃之外也又曰肝脈急甚為惡言微急為肥氣在脅下又曰肝病胸滿脅脹善恚怒叫呼身體有熱而腹惡寒四肢不舉而目白身清清冷也其脈當弦長而急今反短澀其色當清而反白者此金剋木十死不治又曰是動病則腰痛不可以俯仰丈夫㿗疝婦人小腹腫甚則嗌乾面塵脫色是主肝又曰所生病者胸滿嘔逆洞泄狐疝遣溺癃閉盛者寸口大一倍於人迎虛者寸口反小於人迎也足厥陰肝引經藥歌醜肝龍膽草吳茱萸山萸肉瞿麥阿膠甘草扶代赭石紫石英當歸白朮青皮羌活蔓荊子都又曰肝實以白芍藥瀉之又曰肝主風自病則風搐拘急急食甘以緩之佐以酸苦以辛散之實搐力大瀉青丸虛搐力小地黃丸又曰心乘肝實邪狀熱而搐又曰肺乘肝賊邪氣盛則前呻呵欠微搐法當瀉肺先補木臟肝地黃丸後瀉肺瀉白散又曰脾乘肝微邪多睡體重搐先當定搐瀉青丸搐止再見後證則別法治之又曰腎乘肝虛邪憎寒呵欠而搐羌活膏又曰凡肝經得病必先察其肺腎兩臟原其起病然後復審肝經之虛實然腎者肝之母金者木之賊今肝得病若非腎水不能相生必是肺金鬼來相攻故須審其來在肺先治肺攻其鬼也其來在腎滋其根也方審本臟虛實而用寒溫之劑以治之若肺克肝既受病先診肺脈若洪宜杏蘇菀桔扁鵲曰脈長而弦病出於肝脈大而洪病出於心脈下堅上虛病出於脾脈澀而浮病出於肺脈小而緊病出於腎喻嘉言曰肝至春月之榮不自春月始也始於秋冬收藏之固設冬月水臟所儲者少春月木即欲發榮其如泉竭不足以溉苞穰何蟄蟲尚知閉戶豈君子可無居室之功耶巵言曰肝者干也屬木象木枝幹也脈經曰春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃而有毛曰秋病毛甚曰今病經曰風傷筋燥勝風酸傷筋辛勝酸又曰酸走筋筋病毋多食酸又曰多食辛則筋攣急而爪枯又曰陰出之陽則怒丹心曰七情傷人惟怒為甚蓋怒則肝木便克脾土脾傷則四臟俱傷矣治怒方香附甘草各一兩和研細每服三錢白湯調下延壽書柳公度曰但平生未嘗以元氣佐喜怒使氣海常溫耳先賢詩曰怒來劇炎火焚和徒自傷觸來勿與競事過心清涼靈樞曰悲哀動中則傷魂經曰肝虛而肺氣並之則為悲又曰悲則氣消子和曰肝藏血血不足則恐蓋肝膽實則怒而勇敢虛則善恐而不敢也靈樞曰肝氣通於目肝和則能辨五色矣經曰諸暴強直皆屬於風又曰諸脈者皆屬於目又曰諸筋者皆屬於節又曰故人臥血歸於肝目受血而能視足受血而能步掌受血而能握指受血而能攝金匱真言論曰春氣者病在頭肝之應也真誥曰眼者身之鏡耳者體之牖視多則鏡昏聽衆則牖閉又曰腫脹水腫有十種之分兩脅緊痛為肝水經曰青如翠羽者生青如草色者死又曰實則夢山林大樹虛則夢細草苔蘚補木瓜棗仁阿膠薏苡仁膽經曰膽者中正之官決斷出焉六節藏象論曰凡十一臟皆取決於膽也經曰膽者擔也猶人之正直無私有力量善能擔當者也卮言曰膽者淡也清淨之府無所受輸淡淡然者也華元化曰膽者中清之府號曰將軍又曰主藏而不瀉難經曰膽在肝之短葉間重三兩三銖長三寸盛精汁三合水色金精無出入竅不同六腑傳化而為清淨之腑受水之氣與坎同位悲則淚出者水得火而煎陰必從陽也又曰足少陽膽經又曰是經多血少氣又早子時氣血注於膽黃庭經人身神名曰膽神龍曜字威明經曰膽為怒肝膽之病實則為怒脈訣曰肝之餘氣溢入於膽聚而成精由是內藏精而不泄外視物而得明為清淨之府能通眼目經曰膽主決斷入門曰膽生於金金主武故為中正之官決斷出焉人稟剛正果斷直而無疑無私者膽之氣正也靈樞曰目下裹大其膽乃橫又曰肝應爪爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無紋者膽直爪惡色黑多紋者膽結也經曰膽者敢也驚怕則膽傷矣子和曰面青脫色膽受怖也經曰膽為青腸又曰清淨之腑有入而無出又曰候在足少陽之本末其脈陷下者灸之其寒熱刺陽陵泉善嘔苦汁長撻心淡淡善悲恐如人將捕之邪在膽逆在胃膽溢則口苦逆則嘔苦汁刺三里以下胃氣逆刺足少陽血絡以閉膽又曰膽脹者脅下痛脹口苦太息又曰脾胃氣虛不能飲食由膽氣不升所以東垣有用升麻柴胡左遷少陽甲膽之氣又曰胃移熱於膽則為食㑊又曰勇士則膽滿而傍怯士則膽不滿而縱又曰厥氣客於膽則夢鬥訟又曰所生病者頭角頷痛目鋭眥病缺盆中腫痛腋下腫馬刀挾癭汗出振寒瘧胸脅肋髀膝外到脛絶骨外踝前及諸節皆痛小指次指不用盛者人迎大一倍於寸口虛者人迎反小於寸口也足少陽膽引經藥歌子膽柴胡半夏宜草龍膽劑更為奇柴胡又走青皮下向道功多不必疑靈樞曰膽病者善太息口苦嘔有苦汁心中淡淡恐如人將捕之嗌中吤吤然數唾又曰手厥陰之脈是動則心中淡淡大動經曰膽虛則恐畏不能獨臥膽實則怒又曰膽實則怒而勇敢膽虛則善恐而不敢也入門曰膽虛則不眠膽實則多睡又曰痛悶左邊五肋之中血瘀生癭馬刀又曰膽候咽門故熱壅則生瘡腫痛又曰膽病多寒熱又曰膽虛宜仁熟散膽實宜半夏湯又曰小柴胡湯治寒熱住來乃少陽經主藥也水煎澄清溫服則能入膽靈樞曰膽為足少陽其終者耳聾百節皆縱目罘音輕直視如驚貌絶系絶系者一日半死矣其死也色先青白乃死矣脈經曰膽絶七日死何以知之眉為之傾又曰腫脹水腫有十種之分口苦嗌乾為膽水補木通龍膽草瀉柴胡青皮溫半夏川芎生薑陳皮涼黃連竹茹引經報使柴胡本經川芎上行青皮下行脾脾者卑也在胃之下裨助胃氣以化谷也脾胃屬土俱從田字胃居正中田字亦中脾處於右田亦偏右經曰脾者倉廩之官五味出焉遺篇刺法論曰脾為諫議之官知周出焉滑氏曰掩乎太倉華元化曰脾主消磨養於四旁經曰形如刀鐮與胃同膜而附其上之左俞當十一椎下聞聲則動動則磨胃而主運化其合肉也其榮唇也開竅於口難經曰脾重二斤三兩廣扁三寸長五寸有散膏半斤主裹血溫五臟主藏意與智經曰足太陰脾經又曰是經多氣少血又曰已時氣血注於脾黃庭經人身神名曰脾神常在字魂停又曰脾藏意意者記而不忘者也內經曰脾在志為思又曰思則氣結注云繫心不散故氣亦停留而結也皇甫謐曰思發於脾而成於心過節則二臟俱傷靈樞曰因志而存變謂之思因思而遠慕謂之慮又曰怵惕思慮則傷神神傷則恐懼流淫而不止又曰心有所憶謂之意意之所存謂之志因慮而處物謂之智也又曰脾氣通於口脾和則能知五穀矣又曰口唇者脾之官也脾病者唇黃岐伯曰有所擊僕若醉入房汗出當風則傷脾難經曰飲食勞倦則傷脾入門曰脾居中脘一寸二分上去心三寸六分下去心三寸六分中間一寸二分名曰黃庭脾居一身之中故曰黃庭經曰脾者在天之濕在地之土在人為脾在時為四季在方為中央在色為黃通竅唇口經曰脾脈者土也孤臟以灌四旁者也又曰臟真濡於脾臟肌肉之氣也心火為母肺金為子與胃為腑克腎水主養肌肉若久坐則傷肉司藏意智其類土其畜牛其卦坤其性信其華在唇四白其谷稷其蟲蜾其果棗其菜葵其應四時上為鎮星其病在肉其音宮宮者中也土位居中為五行建級也其數五其臭香其聲歌其氣呼其液涎其味甘外應四肢而色黃然黃欲如羅裹雄黃不欲如土靈樞曰脾應肉肉困困分理也堅大者胃厚更脾主濕然濕則傷脾風氣勝則病其病之候則必面黃善思善嗜體重卵痛四肢不改而怠惰脾實則肢體重著而不舉腹脹尿祕而善飢昏睡身熱而飲水脾虛則少氣吐瀉生風或乳食不消腫脹腸鳴四肢無力脾絶則臍突唇反環口黧黑柔汁發黃然脾絶者十二日死平脈則寄旺於四季之末各十八日其脈溫厚蓋因氣行臟腑之間故和平不得見其衰乃形焉賊脈則弦長而緊與夫面青皆逆危脈則狀如雞雀啄止而復來經曰脾主長夏中央己土中央生濕濕生土土生甘甘生脾又曰脾變動為噦靈樞曰脾者主為衛使之回糧視唇舌好惡以知吉凶黃色小理者脾小粗理者脾大揭唇者脾高唇下者脾下唇堅者脾堅唇大而不堅者脾脆唇上下好者脾端正唇偏舉者脾偏傾也脾小則臟安難傷於邪脾大則苦湊䏚而痛不能即行脾高則䏚引季脅而痛脾下則下加於大腸臟苦受邪脾堅則臟安難傷脾脆則善病消疸脾端正則和利難傷脾偏傾則善滿善脹也又曰腹為陰陰中之至陰脾也脾為牝臟牝者陰也入門曰脾為諫議大夫蓋飲食人之大欲心所欲食而脾不能化則不敢食故名為諫議也巳脾土辰胃土位居中央謂之孤臟其形如馬蹄內包胃脘象土形也諸經之氣交歸於中以營運之氣意之舍也又云脾為陰臟位處中焦主養四臟故呼吸以受穀氣以其上有心肺下有腎肝故曰在中又曰土寄王於四季尤王於長夏六月也相於夏廢於秋囚於冬死於春其王日戊己王時食時日昳食時侵晨至食時也昳日囚也困日壬癸困時人定夜半死日甲乙死時平旦日出皆本時也昳音耋經曰脾胃大小腸三焦膀胱者倉廩之本營之居也名曰器能化糟粕轉味而出入者也其華在唇四白其充在肌此至陰之類通於土氣又曰中央黃色入通於脾開竅於口藏精於脾故病在舌本又曰穀氣通於脾又曰精氣並於脾則畏又曰脾惡濕又曰甘走肉肉病無多食甘又曰久坐傷肉勞於脾也又曰脾為萬物之母胃為水穀之海帝曰脾病而四肢不用何也岐伯曰四肢皆稟氣於胃而不得徑至必因於脾乃得稟也今脾病不能為胃行其津液四肢不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用也帝曰脾不主時何也曰脾者土也治中央常以四時長四臟各十八日寄治不得獨主於時也脾臟者常著胃土之精也土者生萬物而法天地故上不至頭下不至足不得主時也帝曰脾與胃以膜相連耳而能為之行其津液何也答曰足太陰者三陰也其脈貫胃屬脾絡嗌故太陰為之行氣於三陽臟腑各因其經而受氣於陽明又曰脾俞在背十一椎旁募在腹傍章門又曰黃欲如羅裹雄黃不欲如黃土又曰如縞裹栝蔞實者生又曰脾熱病鼻先赤又曰脾熱病者先頭重頰痛煩心欲嘔身熱熱爭則腰痛不可俯仰腹滿泄兩頷痛甲乙甚戊己大汗氣逆則甲乙死刺足太陰陽明又曰脈來實而盈數如雞舉足曰脾病又曰脈來堅鋭如鳥之喙如鳥之距如屋之漏如水之流曰脾死又曰脾氣盛則體重肢不舉又曰厥氣客於脾則夢丘陵大澤壞屋風雨又曰脾弱病下利白腸垢大便堅不更衣汗出不止或五液注下五色不更衣不大便也貴者入廁必更衣故名又曰脾脹者善噦四肢急體重不能勝之噦苑入聲臥不安又曰脾水者腹大四肢重津液不生但苦少氣小便難又曰脾約者大便堅小便利而反不渴又曰脾瘧者令人寒腹中痛熱則腸中鳴鳴已汗出刺足太陰又曰腎移熱於脾傳為虛腸澼死不可治又曰脾咳之狀咳則右胠下痛陰陰引肩背甚則不可以動動則咳劇劇音極增也又曰脾風之狀多汗惡風身體怠情四肢不欲動色薄微黃不嗜食診在鼻上其色黃診色診視也又曰脾痹者四肢懈惰發咳嘔汁上為大塞又曰脾氣熱則胃干而渴肌肉不仁發為肉痿帝曰四時之序逆從之變異也然脾脈獨何主岐伯曰脾脈者土也孤臟以灌四旁者也帝曰然則脾善惡可得見之乎曰善者不可得見惡者可見曰惡者何如可見曰其來如水之流者此謂太過病在外如鳥之喙者喙音誨鳥嘴也此謂不及病在中太過則令人四肢不舉不及則令人九竅不通名曰重強又曰食管乃胃管上原內景云脾長一尺掩太倉而靈樞云脾長五寸何不侔也脈經曰脾脈急甚為瘛瘲音訟微急為膈滿不食又曰緩甚為痿厥微緩為風痿四肢不收又曰大甚為擊僕微大為痞氣裹大膿血在腸胃之外又曰心乃脾之母以炒鹽補之又曰脾實以枳實瀉之如無他證以黃連瀉之又曰脾主濕自病則泄瀉多睡體重倦怠急以苦燥之又曰實則瀉赤黃睡不露睛瀉黃散又曰虛則泄瀉白色睡則露睛白朮散又曰肝乘脾賊邪風勝瀉而嘔茯苓半夏湯又曰心乘脾虛邪壯熱體重而瀉羌活黃芩蒼朮甘草湯又曰肺乘脾實邪能食不大便而嘔嗽煎檳榔大黃湯下葶藶丸又曰腎乘脾微邪惡寒而泄理中丸又曰凡脾之得病必先察其肝心兩臟之虛實原其所始而療之蓋肝為脾鬼心是脾母肝氣盛則鬼勝心氣虧則脾之生氣不足盛者抑之則退虧者益之則平故有抑肝益心二藥診其脈肝心二臟俱和是脾自生疾矣須察本經虛實而治之此即貴法又曰小甚為寒熱微小為消疸又曰澀甚為頽癃頽下墜也微滑為蟲毒腸鳴熱又曰滑甚為腸㿉㿉音頽陰病微澀為內㿉多下膿血也經曰是動則舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾氣音屁強音降又曰所生病者舌本痛體不能動搖食不下煩心心下急痛寒瘧溏瘕泄水閉黃疸不能臥強立股膝內腫厥厥發也足大指不用盛者寸口大三倍於人迎虛者寸口反小於人迎也足太陰脾引經藥歌己脾當歸縮砂仁黃耆防風益智仁代赭石吳茱萸赤茯苓蒼術白術白豆蔻甘草麻黃飴糖半夏元胡索白芍縮砂行赭音者赤色經曰脾受肝熱邪多吐逆受肝冷邪多飧泄又曰甘走肉肉病無多食甘又曰穀氣通於脾又曰久坐傷肉勞於脾也又曰精氣並於脾則畏又曰損其脾者調其飲食適其寒溫經曰濕勝則濡瀉濕勝則內攻於脾胃脾胃受濕則水穀不分故大腸傳導而注瀉也又曰得谷者昌失谷者亡又曰諸濕腫滿皆屬於脾又曰脾實則身重善飢肉痿足不收行善瘛腳下痛虛則腹滿腸鳴飧泄食不化脾有餘則腹脹涇溲不利不足則四肢不用靈樞曰邪在脾胃則病肌肉痛陽氣有餘陰氣不足則熱中善飢陽氣不足陰氣有餘則寒中腸鳴腹痛又曰脾藏營營舍意脾氣虛則四肢不用五臟不安實則腹脹涇溲不利注曰涇大便也溲小便也難經曰外證面黃善噫善思善味內證當臍有動氣按之牢苦痛其病腹脹滿食不消體重節痛怠惰嗜臥四肢不收有是者脾也無是者非也經曰大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破䐃真臟見十月之內死注曰此脾之臟也期三百日內死又曰肝傳之脾病名曰脾風發疸腹中熱煩心目黃脾熱者色黃而肉蠕動又曰病在脾愈在秋秋不愈甚於春春不死持於夏起於長夏凡病以五臟時日占病愈甚極準錢仲陽深得其理學者宜究心焉綱目又曰脾病者愈在庚辛庚辛不愈加於甲乙甲乙不死持於丙丁起於戊己又曰脾病者日昳慧日出甚下晡靜又曰脾在志為思思傷脾怒勝思丹溪曰思傷脾者以怒勝之以喜解之五志之火鬱而成痰為癲狂宜以人事制之所謂五志相勝為治也婦女思想氣結之證惟不食困臥如癡無他病多向里床坐蓋脾主思過思則脾氣結而不食怒屬肝木怒則木氣升發而衝開脾氣也故怒勝之夫醫貴有才無才則何以應變無窮經曰臟氣絶則神見於外一士人喜觀書忘食一日有紫衣人立於前曰公不可苦思思則我死矣問其何人曰我穀神也於是絶思而食如故矣經曰脾苦濕急食苦以燥之脾欲緩急食甘以緩之脾苦濕是有餘宜白朮脾欲緩是不足宜甘草以甘補之人參以苦瀉之黃連脾虛以甘草大棗之類補之脾實以枳實瀉之靈樞曰足太陰氣絶則脈不榮肌肉唇舌者肌肉之本也脈不榮則肌肉軟肌肉軟則舌痿人中滿人中滿則唇反唇反者肉先死甲日篤乙日死靈樞曰愁憂不解則傷意意為脾神也思而動血者屬脾腫脹水腫有十種之分四肢苦重為脾水總而論之腎虛不能行水脾虛不能制水凡腫先起於腹而散於四肢者可治自四肢而歸於腹者難療經曰黃如蟹膏者生黃如枳實者死又曰實則夢歡歌快樂虛則夢飲食相爭又曰太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通上下不通則面黑皮毛焦而終矣脈經曰脾絶十二日死一云五日死何以知之口冷足腫腹熱臚脹泄利不覺出時無度仲景曰環口黧黑柔汗發黃者此為脾絶補人參黃耆甘草蓮子扁豆蒼朮白朮茯苓山藥芡實陳皮瀉枳實石膏青皮溫丁香藿香胡椒吳茱萸附子肉桂良薑涼玄明粉滑石引經報使升麻白芍胃經曰胃者倉廩之官五味出焉又曰胃者匯也號為都市五味匯聚何所不容萬物歸土之義也又曰胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升其中之谷常留二斗水一斗五升而滿難經曰胃重二斤一兩經曰足陽明胃經又曰是經常多氣多血又曰辰時氣血注於胃又曰胃為水穀之海靈樞曰人所受氣者谷也谷之所注者胃也胃者水穀氣血之海也海之所行雲氣者天下也胃之所出氣血者經隧也經隧者五臟六腑之大絡也又曰胃者五臟六腑之海也水穀皆入於胃臟腑皆稟氣於胃五味各走其所喜酸先走肝苦先走心甘先走脾辛先走肺咸先走腎穀氣津液已行榮衛大通乃化糟粕以次傳下又曰飲食入胃則胃實而腸虛食下則腸實而胃虛胃滿則腸虛腸滿則胃虛更虛更實故氣得上下而無病矣入門曰胃為水穀之海脾為消化之器水入於經其血乃成谷入於胃脈道乃行血不可不養衛不可不溫血溫衛和得盡天年靈樞曰𩩲麗龷比以下至天樞長八寸過則胃大不及則胃小又曰胃為之海廣骸大頸脹胸五穀乃容又曰脾應肉肉䐃堅大者胃厚肉䐃松者胃薄肉䐃小而鬆者胃不堅肉䐃不稱身者胃下胃下者下脘約不利也肉䐃不堅者胃緩肉䐃無小裸纍者胃急肉䐃多小裸纍者胃結胃結者上脘約不利也䐃謂肘膝後肉如塊者又曰胃病者腹䐜脹胃脘當心而痛上支兩脅膈噎不通飲食不下又曰飲食不下膈塞不通邪在胃脘也又曰胃中寒則手魚際之絡脈多青胃中熱則手魚際之絡脈多赤又曰面熱者足陽明病兩跗之上脈豎堅者足陽明病此胃脈也經曰飲食自倍腸胃乃傷東垣曰胃傷之證不思飲食胸腹脹痛嘔噦噁心噫氣吞酸面黃肌瘦怠惰嗜臥常多自利又曰胃中元氣盛則能食而不傷過時而不飢脾胃俱旺則能食而肥脾胃俱虛則不能食而瘦或少食而肥雖肥而四肢不舉又曰胃病治法調其飲食適其寒溫澄心息慮從容以待真氣之復常也經曰胃脈實則脹虛則泄又曰胃為足陽明其終者口目動作善驚妄言色黃其上下經盛不仁則終矣又曰嘔吐血成盆成碗者屬胃經又曰牙宣出血屬胃腎虛火丹心曰人無根本水食為命蓋脾胃屬土主納水穀人之根本也回春曰五味淡薄令人神爽氣清必用曰胃實宜平胃散虛宜補中益氣湯不進飲食宜養胃進食湯蒼朮白朮人參各一錢陳皮厚朴白茯苓炙甘草各七分神麯麥芽各五分薑棗引或蜜丸米飲下二錢脈經曰胃絶五日死何以知之脊痛腰中重不可反復太乙真人曰美飲食養胃氣吐出多者為吐血又曰胃者倉廩之官布養四臟故五臟皆稟氣於胃乃五臟之本故食氣入胃散精於肝淫氣於筋食氣入胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於腑腑精神明留於四臟氣歸於權衡權衡以平氣口成寸以決死生東垣治內傷主於脾胃其謂脾司轉運之職胃為受氣營養於身是平人也若飲食失節脾胃乃傷脾傷則不能運化胃傷則不能容納而諸病生矣丹溪云百病先觀胃氣何如經曰厥氣客於胃則夢飲食又曰胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難又曰胃瘧者令人疸病也善飢而不能食食而支滿腹大刺足陽明太陰橫脈出血又曰胃風之狀頸多汗惡風食飲不下鬲塞不通腹善滿失衣則䐜脹食寒則泄疹形瘦而腹大疹唇也孫真人曰新食竟取風為胃風經曰谷入於胃脈道乃行又曰大腸移熱於胃善食而瘦又謂之食㑊㑊音亦又曰人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也又曰胃者水穀之海主稟四時皆以胃氣為本是謂四時之變病死生之要會也又曰胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣脈宗氣也又曰胃為之市水穀所歸五味所入如市之雜也太素曰胃者太倉也胃之五竅謂咽胃大腸小腸膀胱也閭里門戶也經曰脾之大絡名曰大包其系自膈下正中微著左脅於胃之上與胃包絡相附矣其胃之包在脾之上與胃相併結絡周回漫脂遍布上下有二系上者貫膈入肺中與肺系相併而在肺系之後其上即咽門也咽下胃脘也胃脘下即胃上口賁門是也水穀自此而入以胃出穀氣傳之於肺肺在膈上因曰賁門其門處膈膜相貼之間亦漫脂相包若胃中腐熟水穀則自幽門而傳入小腸故曰太倉之下口為幽門其位幽隱故名之也脈經曰胃脈搏堅而長其色赤當病折髀音陛其軟而散者當病食痹又曰趺音夫陽脈浮者胃氣虛也數者胃有熱即消穀引食澀者胃中有寒水穀不化粗而浮者其病難治浮遲其久病又曰胃脈若沉澀者氣逆氣逆者人迎盛人迎者胃脈也逆則盛而熱聚於胃口而不行故胃脘為癰也又曰是動則灑灑然振寒善伸數欠顏黑病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血骭音干脛骨也又曰所生病者狂瘧濕淫汗出鼽衄口喎唇疹音疹唇瘡頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔䯒外廉足跗上背痛中指不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒栗胃中寒則脹滿盛者人迎左手大二倍於寸口右手虛者人迎反小於寸口也喎音歪足陽明胃引經藥歌辰胃丁香防風砂仁豆寇白術半夏知母蔥白葛根神曲蒼術烏藥石膏白芷升麻檀香木香下治相沿效不辜經曰胃脈實則脹虛則泄帝曰見真臟脈者死何也岐伯曰五臟皆稟氣於胃胃者五臟之本也臟氣者不能自致於手太陰必因於胃氣乃至於手太陰也故五臟各以其時自為而至於手太陰也故邪氣盛者精氣衰也故病甚者胃氣不能俱至於太陰故真臟之氣獨見病勝臟故死又曰胃實不眠又曰臥寐不寧乃胃中之津液乾枯不能內榮其魂魄也凡飲食減而大便轉覺艱澀者胃病而運化之機遲也肌肉消瘦者胃主肌肉也形體困倦者胃病而約束之機關不利也陽明邪實惡人與火聞木聲則惕然而驚陽明正虛故喜火喜日月光者喜助正也腫脹水腫有十種之分小便閉澀為胃水經曰得谷者昌失谷者亡馮魯瞻曰脾胃尤為後天元氣之本化源生髮之機五臟六腑之大源氣血精微莫不賴之以長養也補白朮黃耆芡實陳皮扁豆蓮子山藥半夏蒼朮百合瀉枳實朴硝大黃溫藿香香附良薑益智胡椒吳茱萸肉豆寇丁香厚朴木香乾薑草寇生薑白豆寇涼滑石山梔黃連竹茹玄明粉黃芩石膏連翹石斛升麻天花粉葛根知母引經報使升麻葛根上行白芷石膏下行肺經曰肺者相傅之官治節出焉為生氣之源其形四垂附著於脊之第三椎中有二十四空行列分布以行諸臟之氣為臟之長為心之蓋又曰是經多氣少血其合皮也其榮毛也開竅於鼻難經曰肺重三斤三兩六葉兩耳凡八葉主藏魄肺葉白瑩謂為華蓋以覆諸臟虛如蜂窠下無透竅吸之則滿呼之則虛一呼一吸消息自然司清濁之運化為人身之橐鑰又曰寅時氣血注於肺肺者市也百脈朝會之所也凡飲食入胃不敢自專地道卑而上行朝於肺肺乃天道下濟而光明經曰肺者在天之燥在地為金在人為肺在時為秋在方為西在色為白通竅於鼻經曰西方金也萬物所以收成也又曰臟真高於肺以行榮衛陰陽也脾土為母腎水為子大腸為臟剋木主氣若久臥則傷氣司藏魄其類金其畜馬其卦乾其性義其華毛其候鼻其谷稻其應四時上為太白星其病在皮毛其音商商者強也象金性之堅強也其數九其臭腥其聲哭其氣呬其液涕其味辛外應皮毛而色白然貴如白玉光澤不欲如堊靈樞曰肺應皮皮厚者大腸厚更肺主燥然燥則傷肺病則為嗽痘主膿泡若熱氣勝則病其病之候則面白悲哭手捏眉目鼻面嚏涕吐衄喘咳寒熱脅有動氣肺虛則嘆息呼吸少氣鼻涕嗌乾喘乏咳血而唇白肺實則悶亂喘促咳嗽上氣鼻塞脛股肩痛而胸滿肺絶則汗出發潤喘而不休毛髮氣出然肺絶者三日死平脈則秋旺七十二日而脈浮毛毛者稀軟之狀輕虛似浮其賊脈浮大而牢與夫面赤皆逆危脈則毛如風吹華元化曰肺乃生氣之原五臟之華蓋經曰肺屬辛金為陰中之太陰通於秋氣肺配胸中與大腸為表裡其母脾土其子腎水其克肝木其賊心火主藏魄其色白其味辛其臭腥其華毛其候鼻其充皮其液涕其聲哭其氣呬其不足則太息其有餘則喘嗽其平脈浮短其賊脈洪手太陰氣絶則皮毛焦皮毛焦則津液去皮節傷皮節傷則皮枯毛折毛折者則毛先死丙日篤丁日死肺絶三日死肺至懸絶十二日死白如豕膏者生白如枯骨者死實則夢兵戈兢擾虛則夢田野平原憂傷肺喜勝憂以酸補之以辛瀉之以苦泄之岐伯曰形寒飲冷則傷肺飲冷以其兩寒相感中外皆傷故氣逆而上行金匱真言論曰秋氣者病在肩背肺之應也又曰脈變動為咳脈論云脈來厭厭聶聶如落榆夾錢曰肺平脈來不上不下如循雞羽浮曰肺病脈來如物輕飄如風吹毛曰肺死真肺脈至大而虛如以毛羽中人肌膚之狀經曰肺之見證也善嚏悲愁欲哭灑淅寒熱缺盆中痛肩背痛臍右少腹脹痛小便數溏泄皮膚痛及麻木喘少氣頰上氣見經曰肺主氣又曰諸氣皆屬於肺又曰肺藏氣氣有餘則喘咳上氣氣不足則息利少氣靈樞曰膻中為之氣海膻中者肺室也有餘則胸面俱赤不足則少氣力不多言丹溪曰冷氣滯氣逆氣上氣皆是肺受火邪氣得炎上之化有升無降熏蒸清導甚而轉成劇病局方例用辛香燥熱之劑是以火濟火也張子和曰諸病皆生於氣諸痛皆因於氣回春云風傷氣者為疼痛寒傷氣者為戰栗暑傷氣者為熱悶濕傷氣者為腫滿燥傷氣者為閉結入門曰逸則氣滯亦令氣結輕者行動自愈重者橘皮一物湯橘皮一兩洗淨新汲水煎服直指云七氣者喜怒悲思憂驚恐或以為寒熱恚怒喜憂愁皆通也經曰背為陽陽中之陰肺也肺為牝臟牝者陰也又曰諸氣膹郁皆屬於肺人有七情病生七氣氣結則生痰痰盛則氣愈結故調氣必先豁痰如七情湯以半夏主治而官桂佐之蓋良法也太乙真人曰少言語養內氣象川翁曰精能生氣氣能生神榮衛一身莫大於此黃帝問曰余知百病生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結九氣不同何病之生岐伯對曰怒則氣逆甚則嘔血及飧泄故氣上矣喜則氣和志達榮衛通利故氣緩矣悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故氣消矣恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣寒則腠理閉氣不行故氣收矣炅則腠理開榮衛通汗大泄故氣泄矣驚則心無所倚神無所歸慮無所定故氣亂矣勞則喘息汗出內外皆越故氣耗矣思則心有所存神有所歸正氣留而不行故氣結矣經曰氣為精神之根蒂李東垣曰氣者神之祖精乃氣之子氣者精神之根蒂也又曰久臥傷氣西山記曰近穢氣觸真氣近死氣亂生氣正傳曰男子屬陽得氣易散女人屬陰遇氣多郁是以男子之氣病常少女人之氣病常多故治法曰女人宜調其血以耗其氣男子宜調其氣以養其血氣生於穀靈樞曰人受氣於谷谷入胃以傳與肺五臟六腑皆以受氣其清者為榮濁者為衛榮在脈中衛有脈外營周不休五十度而復大會陰陽相貫如環無端又曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣又曰氣為衛衛於外正理曰日啖飲食之精熟者益氣此氣生於穀故氣從米上氣靈樞曰邪在肺則寒熱上氣上氣者呼多吸少氣息促急內經曰氣有餘則喘咳上氣下氣綱目曰下氣屬心經曰夏脈者心也心脈不及下為氣泄是也又曰癲癇勞瘵者若氣下泄不止者必死此真氣竭絶腸胃腠理閉塞穀氣不能宣通於腸胃之外故從腸胃中泄出也河間曰腸胃鬱結穀氣內發而不能宣通於腸胃之外故善噫而或下氣也仲景曰傷寒陽明病胃中有燥屎者必轉矢氣下之即愈轉矢氣乃氣下泄也短氣明理曰短氣者氣短而不能相續者是已若有氣上衝而實非氣上衝也呼吸雖數而不能相續似喘而不搖肩似呻吟而無痛實為難辨之證要識其真者氣急而短促是也仲景曰平人寒熱短氣不足以息者實也又曰短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸主之入門曰氣短者呼吸不相接續是也有結腫者有停水怔忡者有風濕相搏者有素弱氣虛者大抵心腹脹滿者為實為邪在裡心腹濡滿者為虛為邪在表東垣曰氣短小便利者四君子湯去茯苓加黃耆補之入門曰氣散則中虛倦怠無力短氣不足以息宜調中益氣湯人參養榮湯脈經曰寸口脈沉胸中氣短少氣綱目曰少氣者氣少不足以言也靈樞曰肺藏氣氣不足則息微少氣又曰肺虛則少氣不能報息又曰腎主氣腎虛則少氣乏言吸吸骨酸懈惰不能動又曰膻中為氣之海不足則少氣不足以言內經曰怯然少氣者是水道不行形氣消索也言而微終日乃復言者奪氣也宜生脈散易老曰真氣虛弱脈弱懶語宜四君子湯參耆益氣丸東垣曰內傷脾胃致中氣虛少宜補中益氣湯益胃升陽湯活人心法曰氣虛發熱百脈搖動有如蟲行相火自足上升心常煩悸頭重腦悶黃耆二錢人參甘草各一錢當歸五分五味子九粒煎服名黃耆湯乃清和調勻鎮定之劑也氣痛入門曰人身元氣與血循環被橫行臟腑之間而為疼痛積聚痃癖壅逆胸臆之上而為痞滿刺痛等證多因七情飲食郁為痰飲初起宜辛溫開鬱行氣豁痰消積久則宜辛寒降火除根氣滯上焦為心胸痞痛宜枳橘湯氣滯中焦為腹脅刺痛宜木香破氣散氣滯下焦為腰痛疝瘕宜四磨湯氣滯於外則周身刺痛或浮腫宜木香流氣飲氣逆靈樞曰黃帝曰何為逆而亂岐伯對曰清氣在陰濁氣在陽榮氣順脈衛氣逆行清濁相干亂於胸中是為太悗悗與悶同故氣亂於心則喘心密默俯首靜伏亂於肺則俯仰喘喝按手以呼亂於腸胃則為霍亂於臂脛則為四厥亂於頭則為厥逆頭重眩僕入門曰氣逆者氣自腹中時上衝也丹溪曰病人自言冷氣從下而上者此上升之氣自肝而出中挾相火其熱為甚自覺其冷非真冷也又曰氣之上逆屬陽無寒之理惡寒者乃火極似水也入門曰散火之法必先破氣氣降則火自降矣氣鬱丹溪曰氣之初病其端甚微或因七情或感六氣或因飲食以故津液不行清濁相干自氣成積自積成痰氣為之郁或痞或痛正傳曰氣鬱而濕滯濕滯而成熱故氣鬱之病多兼浮腫脹滿入門曰郁者病結不散也交感丹治諸氣鬱滯一切公私拂情名利失志抑鬱煩惱七情所傷不思飲食面黃形羸胸膈痞悶諸證神效大能升降水火香附子一斤長流水浸三日取炒茯神四兩搗末蜜丸彈子大每一丸細嚼以二陳湯送下氣不足生病靈樞曰邪之所在皆為不足故上氣不足腦為之不滿耳為之苦鳴頭為之苦傾目為之眩中氣不足溲便為之變腸為之苦鳴下氣不足乃為痿蹶心悗又曰上氣不足推而揚之下氣不足積而從之陰陽皆虛火自當之入門曰七情總髮於一心七氣總隸於一氣氣陽也動則為火故以降火化痰消積分治之大概氣虛四君子湯氣實小烏沉湯火多合黃連解毒湯痰多合二陳湯積多合平胃散丹溪曰久患氣證氣不歸元久服藥無效者破故紙為君破故紙炒一兩茴香炒乳香各五錢為末蜜丸梧桐子大空心白湯下五十丸方氏曰氣病用氣藥而不效者氣之所藏無以收也蓋肺主氣腎藏氣青木香圓木香順氣丸皆用破故紙所以使氣升降而歸於腎臟也入門曰氣病通用二陳湯上焦氣滯加枳殼桔梗香附砂仁中焦氣滯加厚朴枳實三稜蓬朮下焦氣滯加青皮木香檳榔氣痛加枳殼氣實加烏藥香附氣虛加參朮木香丹溪曰治上升之氣用芩連梔子香附又曰氣無補法世俗之言也不思正氣虛者不能運行邪氣著而為病經曰壯者氣行則愈怯者著而成病苟或氣怯不用補法氣何由行又曰氣鬱須用川芎香附梔子芩連又曰木香行中下焦氣香附快滯氣陳皮泄逆氣紫蘇散表氣厚朴泄衛氣檳榔泄至高之氣藿香上行胃氣沉香升降真氣腦麝散真氣凡此皆泄氣之標不能治氣之本痰中帶血絲者此陰虛火動勞傷肺臟也凡吐血吐於水碗中辨之浮於水上者肺血也內景曰肺之為氣三焦起又曰會厭聲音之門戶又曰下溉喉嚨神明通又曰璇璣玉衡色蘭墟又曰重中樓閣十二環中景曰下念喉嚨十二環自下通流兩乳間外景曰絳官重樓十二級人鏡經曰會厭綴於舌本之下正應乎氣管之上氣管即喉嚨也居於前主持呼吸為聲音之門戶又曰吸門十二節上三節微小下九節微大第四節乃結喉也結喉可容得上三節於內如進飲食則結喉即起套於上三節之外直抵於會厭之下而掩之令水穀不得而漏入焉一或誤投之即發嗆而不已又曰肺白象金肺得水而浮金得水而沉何也然肺者非為純金也辛商也丙之柔大言陰與陽小言夫與婦釋其微陰婚而就火其意樂火又行陽道多故令肺得水而浮也肺熟而復沉是辛歸庚也始由從化終則歸元又曰五臟俱等而心肺獨在膈上者何也然心者血肺者氣血為榮氣為衛相隨上下謂之榮衛通行經絡榮周於身故令心肺在膈上也內景曰肺部之宮似華蓋又曰過華蓋下清且涼又曰還過華下動腎精又曰肺之為氣三焦起開通百脈血液如又曰津液醴泉通六腑又曰肺屬金律應黃鐘象金石之有聲也經曰金王於秋相於季夏廢於冬困於春死於夏其王日庚辛王時日晡困日甲乙困時平旦其死日丙丁死時禺中晡音逋申時也禺中日中也禺音魚日在己日禺中又曰肺者氣之本魄之處也又曰五氣入鼻藏於肺肺有病鼻為之不利又曰脾胃一虛肺氣先絶又曰肺熱病右頰先赤又曰損其肺者益其氣又曰肺俞在背第三椎募在胸傍中府俞為陽扁鵲傳作輸猶委輸之輸經氣由此而輸於彼也募為陰猶募結之募經氣聚於此也又曰肺氣虛則鼻息不利少氣實則喘喝音褐胸盈仰息又曰肺病熱者先淅然厥起毫毛惡風寒舌上黃身熱熱爭則喘咳痛走胸膺背不得太息頭痛不堪汗出而寒丙丁甚庚辛大汗氣逆則丙丁死刺手太陰陽明出血如大豆立已淅音昔灑淅也厥冷也邪氣也即傷寒傷風類又曰肺瘧者令人心寒寒甚熱熱間善驚如有所見者刺手太陰陽明列缺穴又曰心移熱於肺傳為鬲消又曰肺咳之狀咳而喘息有音甚則唾血肺咳不已則大腸受之大腸咳而遺矢矢屎也又曰肺風之狀多汗惡風皏然白時咳短氣晝日則瘥暮則甚診在眉上其色白又曰肺脹者虛而滿喘咳倚息目如脫狀又曰肺水者身重而小便難時溏泄又曰肺中寒者吐濁涕又曰肺痹者煩滿喘而嘔又曰肺熱葉焦發為痿躄躄音壁跟也又曰右寸肺大腸脈所出浮短而澀肺也浮短而疾大腸也又曰肺脈其氣來毛而中央堅兩旁虛此謂太過病在外則令人逆氣而背痛慍慍然其氣來毛而微此謂不及病在中則令人喘呼吸少氣而咳上氣見血下聞病音又曰肺病身有熱咳嗽短氣吐出膿血其脈當短澀今反浮大色當白而反赤死是火剋金也又曰肺脈搏堅而長當病吐血其軟而散者當病灌汗至令不復發散也血汗者禁再汗至令謂至盛暑之令也又曰肺氣盛寸口右手大三倍於人迎虛者寸口反小於人迎也又曰肺為嬌臟又曰肺形如人肩二布大葉四垂如蓋附著於脊之第三椎中有二十零四孔以分布諸臟清濁之氣椎音捶顀同又曰所生病者咳嗽上氣喘喝煩心胸滿臑臂內前廉痛掌中熱氣盛有餘則肩背痛風汗出中風小便數而欠虛則肩背痛寒少氣不足以息溺色黃卒遺矢無度手太陰肺引經藥歌寅肺升麻南星款冬花桔梗元參臺香山藥麥門冬天門冬阿膠茯苓味子蔥白桑白皮枇杷葉杏仁麻黃豆蔻同梔子縮砂仁黃芩知母桔梗藿香石斛葶藶木瓜白芍枳殼紫蘇木通經曰鼻如煙煤肺氣已絶當汗出大喘若身熱無汗乃大腸燥結之徵尚可生也卮言曰肺者茷也茷茷然居乎上為五臟之華蓋醫旨緒餘曰肺者勃也言其氣勃鬱也經曰熱傷皮毛寒勝熱辛傷皮毛苦勝辛又曰辛走氣氣病毋多食辛又曰多食苦則皮膚稿而毛拔又曰白色見於鼻準及正面如枯骨如擦殘汗粉者為肺氣絶若如膩粉梅花白綿者是肺邪虛中寒鼻衄出血咳嗽有血屬肺經憂而動血者屬肺氣絶候靈樞曰五陰氣俱絶則目系轉轉則目運目運者為志先死志先死則遠一日半死矣六陽氣俱絶則陰與陽相離離則腠理發泄絶汗乃出故氣絶於外者上氣腳縮五臟氣絶於內者下利不禁甚者手足不仁又曰若陽氣前絶陰氣後竭者其人死必身色青陰氣先絶陽氣後竭者其人死身色必黃腋下溫心下熱也黃庭經人身神名曰肺神皓華字虛成七神注云魄者精氣之匡佐也靈樞曰並精出入謂之魄又曰喜樂無極則傷魄魄為肺神也皇甫謐曰脾胃一敗肺氣先絶經曰肺在志為憂肺之志為悲又曰憂則氣沉又曰愁憂者氣閉塞而不行蓋憂則隔塞痞閉氣脈斷絶而上下不通也氣固於內則大上便道偏不得通泄也經曰精氣並於肺則悲又曰肝虛而肺氣並之則為悲又曰悲則氣消又曰肺主殺故其志為悲又曰肺在志為憂憂傷肺喜勝憂丹溪曰憂傷肺者以喜勝之以怒解之靈樞曰肺色通於鼻肺和則鼻能知香臭矣又曰鼻者肺之官也肺病則喘息鼻張經曰肺主秋西方辛金西方生燥燥生金金生辛辛生肺其畜為雞一作馬其蟲為介其果為李其菜為韭其經為手太陰肺又曰肺藏於石靈樞曰五臟六腑肺為之蓋白色小理者肺小粗理者肺大巨肩反膺陷喉者肺高合腋張脅者肺下肩背厚者肺堅肩背薄者肺脆背膺厚者肺端正脅偏疏者肺偏傾也肺小則少飲不病喘喝肺大則多飲善病胸痹喉痹逆氣肺高則上氣肩息咳肺下則氣賁迫肝善脅下痛肺堅則不病咳上氣肺脆則苦消疸易傷肺端正則和利難傷肺偏傾則胸偏痛也脈經曰肺傷者其人勞倦則咳唾血其脈細緊浮數皆吐血此為躁擾嗔怒得之肺傷氣壅所致仲景曰熱在上焦因咳為肺痿其人咳口中反有濁唾涎沫寸口脈數此為肺痿也若口中辟辟燥咳咳則胸中隱隱痛脈反滑數此為肺癰也靈樞曰邪在肺則病皮膚痛寒熱上氣喘汗出咳動肩背經曰風寒入舍於肺名曰肺痹發咳上氣又曰肺病者喘咳逆氣肩背痛汗出尻陰股膝髀腨䟰足皆痛虛則少氣不能報息耳聾嗌乾又曰肺熱者色白而毛敗又曰肺實則令人逆氣而背痛慍慍然虛則令人喘呼吸少氣而咳上氣見血下聞病音又曰大骨枯稿大肉陷下胸中氣滿喘息不便其氣動形期六月死真臟脈見乃豫之期日此肺之臟也一百八十日內死難經曰外證面白善嚏悲愁不樂欲哭內證臍右有動氣按之牢苦痛其病喘咳灑淅寒熱肺苦氣上逆急食苦以泄之注曰肺氣上逆是其氣有餘也肺欲收急食酸以收之用酸補之辛瀉之又曰肺病禁寒飲食寒衣經曰病在肺愈在冬冬不愈甚於夏夏不死持於長夏起於秋又曰肺病者愈在壬癸壬癸不愈加於丙丁丙丁不死持於戊己起於庚辛又曰肺病者下晡慧日中甚夜半靜又曰肺受氣於腎傳之於肝氣舍於脾至心而死此皆逆死也一日一夜五分之此所以占死者之早暮也又曰悲哀動中者竭絶而失生又曰肺絶三日死何以知之口張一云口鼻虛張短氣氣出而不返仲景曰汗出發潤喘而不休者此為肺絶血隨咳出或帶痰中為咳血腫脹水腫有十種之分大便鶩溏為肺水肺為氣之主而腎又為氣之臟是以氣出之於肺而納之於腎也補人參山藥百部五味子阿膠黃芩紫菀茯苓麥門冬瀉防風葶藶澤瀉枳殼蘇子桑白皮溫乾薑生薑白豆蔻木香款冬花涼沙參黃芩桔梗馬兜鈴栝蔞仁元參梔子川貝母天門冬人溺引經報使白芷蔥白升麻大腸經曰大腸者傳導之官變化出焉上受胃家之糟粕下輸於廣腸舊谷出而新谷可進故字從肉從易又暢也通暢水穀之道也手陽明經大腸又曰回腸當臍右回十六曲大四寸徑一寸半長二丈一尺受谷一斗水七升半又曰廣腸傳脊以受回腸乃出滓穢之路大八寸徑二寸寸之大半長二尺八寸受谷九升三合八分合之一又曰大腸一名回腸以其回屈而受小腸之谷故名之也又曰大腸臍右回三十六曲又曰大腸俞在脊十六椎旁募在臍傍天樞俞為陽在背募為陰在腹又曰大腸為白腸又曰厥氣客大腸則夢田野又曰大腸有宿食寒栗發熱有時如瘧狀又曰水氣客於大腸疾行則鳴濯濯如囊裹漿又曰小腸移熱於大腸為虙瘕為沉虙即伏字瘕音假又曰廣腸一名肛門言其處如車虌形故曰肛門即廣腸也又曰直腸受大腸之谷而導出焉又曰魄門亦為五臟使水穀不得久藏又曰是動病則齒痛䪼腫是主津液䪼音拙手陽明大腸引經藥歌卯大腸有升麻白芷薤白火麻仁肉豆蔻阿膠白石脂石膏砂仁石斛使將軍即大黃麻葛根枳殼升麻連翹又曰是經多氣多血難經曰大腸二斤十一兩肛門重十二兩按回腸者以其回疊也廣腸即回腸之更大者直腸又廣腸之末節也下連肛門是為穀道後陰一名魄門總皆大腸也又曰上接小腸下口下接直腸肛門又曰卯時氣血注於大腸本臟篇云皮厚者大腸厚皮薄者大腸薄皮緩腹理大者大腸大而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結大腸之見證也大指次指難用耳聾輝輝焞焞耳鳴嘈嘈耳後肩臑肘臂外皆痛氣滿皮膚堅而不痛經曰鼻隧以長以候大腸靈樞曰天樞以下至橫骨長六寸半過則回腸廣大不滿則狹短又曰大腸病者腸中切痛而鳴濯濯冬日重感於寒即泄當臍而痛不能久立又曰腹痛腸鳴氣上衝胸喘不能久立邪在大腸又曰腸中寒則鳴飧泄腸中熱則出黃如糜經曰大腸小腸為泄又曰大腸乃肺之腑也又曰腸痹者數飲而出不得中氣喘爭時發飧泄仲景曰大腸有寒者多鶩溏有熱者便腸垢入門曰腸虛則鳴又寒氣相搏則為腸鳴靈樞曰黃帝問曰胃惡熱而喜清冷大腸惡清冷而喜熱兩者不和何以調之岐伯對曰調此者飲食衣服亦欲適寒溫寒無淒滄暑無出汗飲食熱無灼灼寒無滄滄寒溫中適故氣將持乃不致邪僻也大腸熱宜瀉白湯大腸寒宜實腸散脈經曰大腸絶不治何以知之泄利無度利絶則死補牡蠣粟殼五倍子肉豆蔻蓮子龍骨訶黎勒瀉枳殼桃仁麻仁石斛大黃檳榔芒硝溫乾薑吳茱萸肉桂涼槐花條芩引經報使葛根升麻白芷上行石膏下行下血屬大腸經腫脹水腫有十種之分乍虛乍實為大腸水
