body:
  text: 卷十二顴臉部凡屬顴臉腮頰頤鼻一切癰疽瘡毒皆匯於此部中以便檢閱參治面部望色辨證門主論面顴頰赤在午後此虛火上升不可作傷寒治面赤脈數無力此伏陰病假熱也面赤脈沉細此少陰病外熱內寒陰盛格陽宜溫誤用寒涼者死面赤脈弦數此少陽病宜小柴胡和解面部通赤色此陽明表證未解宜解肌不可攻裡面唇青是陰寒極面青兼舌卷囊縮是陰寒面青兼小腹㽲痛是夾陰傷寒面目身黃兼小水短澀是濕熱面目身黃小腹脹滿硬痛小便利是蓄血傷寒面白而無神或汗多是脫血所致面白人不宜大汗面黑人在傷寒內涉虛不宜參朮大補蓋氣多實故也面熱門主論靈樞曰手面與身形也天寒則裂地凌冰或手足懈墮然而其面不衣何也曰十二經脈三百六十五絡其血氣皆上於面而走空竅其精陽氣上走於目而為睛其別氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走唇舌而為味其氣之津液皆上熏於面而皮又厚其肉堅故天熱甚寒不能勝之也東垣曰飲食不節則胃病胃病則氣短精神少而生大熱有時而火上獨燎其面蓋陽明經多氣多血又兼挾風熱上行諸陽皆會於頭面故令面熱如醉治宜先散其風熱或以調胃承氣湯加黃連犀角疏下兩三行徹其本熱散其風熱以升麻湯加黃連主之馮魯瞻曰手足六陽之經皆上至於頭而惟陽明胃脈起鼻交頞中入上齒中挾口環唇循頰車上耳前過客主人故人之面部陽明之所屬也其或胃中有熱有鬱火則面熱升麻湯加黃連若風熱內甚而上攻令人面目浮腫或面鼻紫色或風刺癮疹隨證治之面熱門主方升麻加黃連湯治面熱升麻葛根各一錢白芷七分炙甘草白芍生犀角川芎荊芥穗薄荷各五分黃連酒炒四分水煎溫服面寒門主論馮魯瞻曰胃中有寒則面寒宜先以附子理中湯溫其中氣次以升麻湯加附子主之面寒門主方升麻加附子湯治面寒升麻葛根白芷黃耆熟附子各七分炙甘草人參草豆蔻各五分益智仁三分連須蔥頭二莖水煎溫服面痛門主論馮魯瞻曰面痛為火蓋諸陽之匯皆在於面而火陽也心之華在面而心君火也然暴痛多由火實久痛多因血虛蓋胃主正面而以腸胃為市因飲食之熱毒聚於中則發於外故為痛更有過勞與飢則痛者此中氣不足也粉花瘡門主論澄曰粉花瘡多生於室女火浮於上面生粟累或痛或癢旋滅旋起亦有婦女好搽鉛粉鉛毒所致兼有欲後汗出迎風揮扇而生粉花瘡門主方婦女面上粉花瘡鉛粉五錢輕粉五分枯礬三分研勻菜油調稠塗磁碗底內外用蘄艾一兩放炭火上燒煙燻碗內待艾盡為度覆地上出火毒逐早搽面上瘡自愈驗方上淨桶出恭時用粗紙先從臉往下一揩再揩恭隨手擲淨桶內數次自消又方乾荷葉揉碎每用五分每日沖滾湯服之久服之自消面遊風毒門主論王肯堂曰面遊風毒此積熱在內或多食辛辣厚味或服金石剛劑太過以致熱壅上焦氣血沸騰而作屬足陽明胃經初覺微癢如蟲蟻行搔損則成瘡痛楚難經準繩心法曰此症生於面上初發面目浮腫癢若蟲行肌膚乾燥時起白屑細如魚鱗次後極癢抓破濕熱盛者津黃水風燥盛者津血痛楚難堪皆由平素血燥過食辛辣厚味以致陽明胃經濕熱受風而成癢甚者宜消風散痛甚者宜服黃連消毒飲外搽摩風膏面遊風毒門主方摩風膏麻黃五錢白檀香白芨當歸身各一錢升麻防風各二錢羌活一兩香油五兩浸五日文火熬黃去渣加黃蠟五錢熔化絹濾冷塗面上熱毒惡瘡門主論書曰面上熱毒惡瘡乃醇酒炙煿飲食熱毒聚於胃腑故發於外宜柏連散主之面生熱毒惡瘡門主方柏連散胡粉黃柏炙黃連各等分研末豬脂調敷肺風粉刺門主論申鬥垣曰肺氣不清受風而生或冷水洗面熱血凝結而成啟玄粉刺即粉疵乃肺熱而風吹之多成此疵雖無關人累然書生嬌女各多此病亦欠豐致治以滅瘢丹為之添容秘錄馮魯瞻曰肺風是鼻生紫赤刺癮疹錦囊陳實功曰肺風屬肺熱粉刺酒齄鼻酒刺屬脾經此四名同類皆由血熱鬱滯不散又有好飲者胃中糟粕之味熏蒸肺臟而成經所謂有諸內形諸外當分受於何經以治之正宗又曰酒刺俗名谷嘴瘡又曰面上酒刺並酒齄切忌手搔手擠只用無灰好鹽炒過如癢即將炒鹽擦之如出血出水即將鹽按在傷處立止久即除根肺風粉刺門主方面上粉刺肘後方搗菟絲子絞取汁塗之滅瘢丹岐天師輕粉白附子黃芩微火略炒白芷防風各等分研細末蜜丸於每日洗面之時多擦數次臨睡之時又重洗面擦之不須三日自然消滅瘢矣肺風粉刺酒齄鼻鼻頭腫面赤杏仁二十粒去皮瓦上焙勿焦油核桃二枚連皮瓦上焙勿焦大楓肉三粒水銀三分唾津在手掌心內研成黑水共研勻搽之二三次即愈面部鼻臉生瘡赤風粉刺神方準繩生硫黃白芷栝蔞仁膩粉各五分蟬蛻洗芫青去翅足全蠍各七枚上研細聽用以麻油黃蠟火熬化離火入藥在內每用少許塗面上勿沾眼內清肺散治谷嘴瘡連翹川芎白芷黃連苦參荊芥山梔黃芩貝母桑白皮各一錢河水煎服面上酒刺枯礬一兩白附子硫黃各二錢研細末臨晚以唾津調搽朝上洗去肺風酒刺赤鼻大楓子仁木鱉子仁輕粉各等分研細夜以唾津調塗酒刺粉刺面生䵟黠小瘡並能去垢潤肌皂角三斤桃花瓣一升升麻八兩楮實子五兩白芷天花粉綠豆白芨各一兩砂仁白丁香甘松各五錢三柰三錢共為細末糯米飯搗丸或加肥皂肉搗丸洗面時擦之如擦下部換用煉蜜搗成團擦洗滿臉肺風酒刺乳香去油沒藥去油杭粉各三錢花椒五分膠棗一枚白果三枚共研細為丸清晨洗臉時擦酒刺榧子肉一千個甘菊花二兩水酒各一碗同煮乾再用微火烘脆每日嚼食食完自愈顛倒散硫黃大黃各等分研末涼水調敷肺風瘡無灰酒於砂缽內磨鹿角尖濃汁敷雀斑門主論陳實功曰雀斑乃腎水不能榮華於上火滯結而為斑治當六味地黃丸以滋化源搽洗兼施正宗又曰面生黑斑乃水虧不能制火血弱不能華肉以致火燥結成斑黑色枯不澤宜服腎氣丸以滋化源用玉容丸早晚擦之雀斑門主方玉容丸男婦雀斑酒刺及身體皮膚粗糙甘松明天麻藁本北細辛白蘞白殭蠶防風山梔仁川椒香白芷荊芥密陀僧山茶枯白礬白芨檀香末羌活甘菊花獨活各一錢紅棗肉七枚磨細末用去淨弦膜肥皂一斤同捶作丸如秋冬加生蜜五錢如皮膚粗槁加牛骨髓三錢早晚洗之肌膚自然瑩潔如玉溫潤細膩玉肌散一切風濕雀斑酒刺白屑風皮膚作癢白附子白芷滑石各二錢加綠豆半升研細每用三匙早晚洗面改容丸大貝母去心白附子菊花葉防風白芷滑石各五錢共為細末用大肥皂十莢蒸熟去筋膜搗丸同藥做丸早晚擦面又方白丁香五錢即小鵲糞鷹糞三錢羊蹄根二兩白附子一兩白蘞八錢白芨七錢共研末肥皂一斤去皮弦同藥搗丸擦於面上又方雄雀糞瓦花各等分研細同菜油調搽一月即光又方霜梅肉櫻桃枝牙皂角紫浮萍共搗丸擦面又方萆麻仁同肥皂捶擦又方白丁香白蘞白殭蠶白芷白附子白梅肉夜明砂皂角白芨甘松共研細蜜搗做餅洗面時擦之玉盤散男婦面上雀斑粉刺白牽牛甘松香附天花粉各一兩藁本白蘞白芷白附子宮粉白芨大黃各五錢肥皂一斤捶爛同藥和勻每日擦面有效玉容肥皂去白瘢黑點白癬諸般瘡痕令人面色好白芷白附子白蒺藜白殭蠶白芨白丁香甘松草烏杏仁綠豆粉各一兩兒茶三錢密陀僧樟腦各五錢白蘞三柰豬牙皂各四錢肥皂去裹外皮筋並子只取淨肉一茶盅輕粉三錢先將肥皂肉搗爛入雞子清和曬去氣息將各藥末同肥皂雞子清和丸擦面澡豆方洛生雀印或面生瘡癤疤痕色變赤黑大效密陀僧另研甘松杏仁生用白芷蛇床子各一兩白果肉四十個萆麻仁四十九粒白蒺藜杵去刺白牽牛酒浸各三兩白殭蠶二兩肥皂去皮弦子三斤搗細同藥末為丸早晚擦面洗去面生黑斑門主論陳實功曰女子面生黧黑斑此乃水虧不能制火血弱不能華肉以致火爍結成黑斑色枯不澤婦人生此不利於夫主又疑事不決者多有之治當朝以腎氣丸以滋化源早晚玉容丸洗擦自退當戒憂思動火勞傷等事正宗古一人登廁被臭氣熏觸隱忍良久明日滿面皆黑色月餘不散相士云不出月必死一良醫令以沉檀香各一兩銼碎安爐中燒熏帳內以被蓋定令病者瞑目端坐候香盡方可出帳門日引鑑照之面上黑色漸散矣蓋臭腐屬水香屬土土勝水也面生黑斑門主方驗方白殭蠶黑牽牛各二兩北細辛二兩研細蜜丸彈子大日洗數次一月後其斑自退並治雀斑面生黑點神效玉容散面上黑點雀斑甘松三柰茅香各五錢白芷白殭蠶白芨白蘞白附子天花粉綠豆粉各一兩肥皂二個防風藁本零陵香各三錢為細末每洗面用之痣門主論陳實功曰痣名黑子此腎中濁氣混滯於陽陽氣收束結成黑子堅而不散凡人生此終為不吉面部不善者去之正宗又曰冰螄散點之自落心法曰痣乃孫絡之血滯於衛分陽氣束結所致痣門主方點痣法糯稻數粒去殼用銀爐灰少許入水拌勻以糯米插灰中將痣用針挑破將稻米點之任其自脫又方糯米七粒搗爛石灰和勻挑破點之即落又方用櫟炭灰半盅以水調不幹不稀以手按實入糯米數粒按在灰中仍按實將碗覆於地上勿動俟明早灰中流出白漿如飴用盞取下看痣大小點之聽其自落又方夏至或冬至用酵鹼同石灰搗勻水磨點之自落又方白降丹水調少許點之自落臉發門主論申鬥垣曰臉發乃足陽明胃經多氣少血其瘡發於眼下臉上四白穴在目下一寸直目瞳子巨髎穴挾鼻旁八分直目瞳子色似葡萄形漸大或生子母瘡者八日死在左用內托藥加當歸兩倍右加三倍妙在斯也啟玄周文採曰氣血上壅結聚脾經故毒發於面名曰面毒集驗竇漢卿曰面發毒多起於房勞太過乘虛風入經絡陽明經虛發於面也或面生癤瘰患者欲求速愈而庸醫或以毒藥敷點或以艾火炙之或以針刀刺之或犯尻神惡宿或破後房事不戒或受狂風霜雪寒露暴戾之氣或服金石草木諸部惡毒相攻相反之劑以致病症日劇殊不知面為諸陽之首禁火禁刀禁毒況耳目口鼻之官總系一處比四肢不同若不保重命亦難生何也面為陽火氣入之熏蒸肌肉刀針刺之即傷經絡毒藥點之暴剝皮肉輾轉為患繼之以風邪入之則頭面虛腫目鼻腫脹患處日腐其臭穢難聞脾胃日削寒熱交作痛楚萬狀難以盡言若有五善而無七惡外敷清涼拔毒之藥內服參朮內托之劑再合犀角鬱金散服之以拔積毒其命方可保也否則難生全書奎光曰面癰大抵屬郁防內攻宜用碧丹方載咽喉門兼服煎藥外敷三黃散臉發門主方犀角鬱金散竇漢卿治面發毒犀角鬱金珍珠西牛黃粉甘草乳香真粉辰砂上為細末煉蜜為丸噙化顴癰門主論心法曰顴癰初小漸大如榴者發陽分由風熱而生初起焮紅浮腫疼痛七日即潰為毒輕根淺易愈顴疽者發陰分由積熱而生色紫漫腫堅硬麻木疼痛三七方潰為毒重根深難愈俱發於顴骨尖處不論左右皆屬小腸經澄曰治法悉同癰疽但不可妄用追蝕之藥蓋顴部骨多肉少防其穿潰過深致令顴骨倒陷之患不可不慎顴骨肉疽門主論王肯堂曰顴骨肉疽顴骨內卒然而痛經宿而痛甚寒熱大作屬上焦與陽明經鬱火所致汗之可消藥宜水酒同煎準繩靈樞經曰心病者顴赤腎病者顴與顏黑然則當察其色赤者宜以黃連安神丸降心火補心丸養心血黑者宜以地黃丸滋腎水未可專委之陽明鬱火也疔疽門主論王肯堂曰兩腮及鼻下焮腫生瘡惡血淋漓此名疔疽屬足陽明胃經三日口噤如痙角弓反張按之如疔釘著骨痛不可忍者是也治之稍緩則毒攻心嘔吐不食昏迷躁亂譫語者死準繩澄曰疔疽者乃醇酒炙煿膏粱厚味或誤食自死牛馬宿茶陳菜食中汗毒而成不可妄用刀針當照疔瘡門方法治之故毋庸另立主方托腮癰門主論奎光曰托腮癰生腮下乃飲食厚味醇酒熱毒所結而成腮頷發門主論王肯堂曰腮頷發生腮臉屬足陽明經風熱所致準繩又曰金腮瘡生於頰腮初如米粒漸大如豆久而不治潰蝕透頰屬陽明經治不得法潰爛不斂口吐臭痰喘急神昏者死馮魯瞻曰腮癰乃胃家經絡也錦囊又曰咽痛頷腫脈洪大面赤者羌活勝濕湯加黃芩甘草桔梗各五分朱丹溪治兩腮腫用細辛草烏等分為末入蚌粉豬脂調敷口含白梅置腮邊良久出涎腫退消時腫必先向下古一人因驚駭後常用手指甲掐住兩頰遂致兩頰破損心懊憹不安脈數而實諸藥不愈用活幼方中牛黃清心涼膈丸數服而愈澄曰腮頷發者其勢大即腮癰又名魚腮毒而金腮瘡者其勢小多生於嗜酒之人糟粕之味熏蒸胃腑是以腮頷結腫焮痛初起四妙湯主之寒熱加荊芥防風葛根赤芍已成加白芷將潰加穿山甲皂角刺潰後四妙湯加白芷排膿二三劑膿盡速於生肌收口不得妄自追蝕提藥防其透膜此症全賴補托兼戒房事庶不致收口腮凹亦可免夫成魚腮漏終年淌水也均照癰疽門治法毋庸另立主方頤發門主論王肯堂曰頤發生於顴骨之下腮頷之上耳前一寸三分古云不治屬足陽明胃經熱毒上攻若治不得法延及咽嗌潰爛穿口不食者死準繩又曰素問云腎熱者頤先赤故頤屬足少陰腎經也而今醫師以耳後一寸三分發銳毒者名曰發頤則是少陽分野而薛氏亦以為屬足少陰經當補腎水者何也蓋腎為相火之宅宅完且固而火得歸息焉則治腎正所以治少陽也此證傷寒汗出不徹者多患之亦有雜證客熱久而不散而發於頤者宜以藥速消散之失治成膿則費手矣倘誤服克伐之藥而不滋補其氣血者即穿口破唇而死申鬥垣曰頤發乃足陽明胃經多氣少血在唇旁腮上頰車穴穴在耳下曲頰端陷中大迎穴穴在曲頷前一寸三分陷中動脈上下左右相同雙發最凶如腫痛不可忍者八日可刺膿汁出四畔軟者生如反硬牙關緊不能食似蜂窠涓流黃水十無一生女子患此主四五日死啟玄竇漢卿曰發頤乃傷寒發汗未透而成在頭耳一寸三分在心窩兩脅在身者可治在身後相連咽喉恐毒氣內攻難進飲食藥餌鼻流清膿兩耳閉塞者即死不治陳實功曰發頤又名汗毒此症原因風寒用藥發表未盡日久傳化為熱不散以致項之前後結腫疼痛初起身熱口渴當用柴葛湯清熱解毒如患上紅腫熱痛者如意金黃散敷之正宗又曰如身涼不渴者宜牛蒡甘桔湯馮魯瞻曰頭痛腫大如斗是天行時疫大頭病也夫身半以上天之氣也身半以下地之氣也邪熱客於心肺之間陽明少陽之火復熾且感天地四時瘟疫之氣所以上焦壅熱不散干犯清道濕熱上乘巔頂而為腫木挾火邪而為痛甚至潰裂膿血復染他人所以謂之疫癘輕者名為發頤腫在兩耳前後有以承氣下之瀉胃中之實熱是誅伐太過矣治法不宜藥速速則過其病所謂上熱未除中寒復生必傷人命宜用緩藥徐徐少與再視腫勢在於何方隨經治之陽明為邪首大腫少陽之邪出與耳前後也大概普濟消毒飲主之頤發門主方牛蒡甘桔湯頤毒表邪已盡耳項結腫微熱不紅疼痛者黃連赤芍藥桔梗廣陳皮蘇木牛蒡子川芎天花粉甘草水煎服汗頤痄腮平頭紅豆即平常紅豆每升用生薑四兩取自然汁拌曬研為細末用雞蛋清調敷中留一孔透氣干以蔥汁潤之一日立消又且定痛痄腮門主論陳實功曰痄腮乃風熱濕痰所主或冬溫後天時不正感發傅梁兩腮腫痛初發寒熱以柴胡葛根湯散之外敷如意金黃散如在裡內熱口乾二便不利者四順清涼飲利之表裡俱解如腫仍不消必欲作膿者托裡為主膿熟者針之正宗馮魯瞻曰胸膈蘊積熱毒致生風痰上攻頭面壅滯不散發為痄腮重則磁鋒刺去惡血輕則或塗或點次投湯劑散風清熱解毒消痰自愈也錦囊王肯堂曰所患在肌肉浮而不著骨者名曰痄腮屬足陽明經風熱所致心法曰痄腮一名髭發一名含腮瘡生於兩腮肌肉不著骨之處總髮端於陽明胃熱也初起高腫色紅焮熱者系陽明風熱若平腫色淡不鮮者由胃經濕熱痄腮門主方敷痄腮染坊靛花頻敷自消又方肥皂同砂糖搗敷紙蓋留頂出氣又方黃柏鉛粉各等分研勻涼水調敷又方豬膽汁三個生薑汁米醋各半酒杯和勻磨京墨一敷即消腮腫土茯苓二斤天花粉苦參各二兩咀片分七劑每劑加皂角子七粒水煎露一宿食後溫服並治瘰癧時行風熱腮腫赤小豆搗細雞子清或米醋調敷立消又方霜後絲瓜煅存性豬膽汁調敷即消又方扁柏葉搗汁調蚯蚓泥搽上立消宋仁宗患痄腮道士贊寧用赤小豆七粒為末敷之立愈朱氏集驗方腮毒大黃末薑汁調敷中留一孔透氣自消兩腮紅腫百合一兩貝母山芝麻根去皮元明粉各一錢銀硃七分白麵少許同搗敷大頭傷寒門主論發於鼻額紅腫以至兩目腫盛而不開額上面部皆赤而腫者屬陽明也或壯熱氣喘口乾舌燥咽喉腫痛不利脈來數大者用普濟消毒飲主之如內實熱盛者用通聖消毒飲若發於耳之上下前後並頭角紅腫此屬少陽也或肌熱日晡熱寒熱往來口苦嗌乾目疼脅下滿宜小柴胡湯加花粉羌活荊芥連翹芩連主之若發於頭上並腦後項下及目後赤腫者此屬太陽也宜荊防敗毒散主之若三陽俱受邪並於頭面耳目鼻者以普濟消毒飲外用清涼救苦散敷之治法當先緩後急否則邪伏也先緩者宜退熱消毒虛人兼扶元氣胃虛食少者宜助胃氣候其大便內結熱甚方以大黃下之拔其毒根此先緩後急之法也蓋此毒先腫於鼻額次腫於目又次腫於耳從耳至頭上絡後腦結塊則止若不散必成膿也俗云大頭天行親戚不相訪問染者多不救泰和間多有病此者醫以承氣加藍根下之稍緩翌日如故下之又緩終莫能愈漸至危篤東垣視之曰夫身半以上天之氣也身半以下地之氣也此邪熱客於心肺之間上攻頭面為腫盛以承氣瀉胃中之實熱是為誅伐無過遂處普濟消毒飲子全活甚眾傷寒瘥後遺毒門主論傷寒汗下不徹餘部結在耳後一寸二三分或兩耳下俱硬腫者名曰遺毒宜速消散緩必成膿以連翹敗毒散治之如項腫痛加威靈仙大便實加大黃穿山甲如發腫有膿不消或已破未破者但用內托消毒散加皂針升麻銀花甘草之類然古人方書之論如此但實多由於久熱傷陰蓋少陽少陰陰虧已極乃因虛火上衝所以腮頰耳後腫痛也經曰榮氣不從逆於肉裡乃生癰腫況耳後方圓一寸皆屬於腎有何毒之謂歟治宜以滋陰化痰散郁和肝而腫自愈如熟地麥冬土貝母白芍連翹甘桔之類略佐青皮柴胡少許足已若尺脈甚弱者竟用上病療下之法投以引火歸源之藥則腫不治而自散若誤認以毒為事而攻之不惟腫結愈固而愈甚必致變生別病而危矣當詳酌之時毒門主論陳實功曰天行時氣感之而發初起與風寒相類惟頭面耳項為真寒熱體強頭眩脈浮緊數者為邪在表宜荊防敗毒散萬靈丹發汗如兩目鼻面漸次傳腫者乃正陽明受病其患焮腫發熱便秘多熱少寒口乾脈數有力為邪在裡宜五利大黃湯下之又頭角兩耳前後結腫者乃手少陽經受之其患耳鳴筋痛寒熱嘔吐口苦嗌乾煩躁時甚當以知母石膏湯小柴胡湯和之如凶荒沿門傳染者普濟消毒散藿香正氣散以安之表裡俱解腫尚不消宜砭去惡血腫熱甚者如意金黃散敷之自後仍不消者必欲作膿宜托裡消毒散加白芷皂角針托之膿穢食嘔者香砂六君子湯又有毒中三陽自頸項以上俱發腫光如水色雙目合縫唇似豬形口角流涎腫痛不消聲音不出飲食不入咽喉腫閉牙關難開破流臭水穢氣連綿不絕者犯此俱為不治正宗李東垣曰夫時毒者乃四時邪毒之氣而感之於人也其候發於鼻面耳項咽喉赤腫無頭或結核有根令人憎寒壯熱頭痛肢體作疼甚者恍惚不寧咽喉閉塞人不識者將謂傷寒便服解藥一二日腫氣增益方悟始召醫治原夫此疾古無方論世俗通為丹瘤病家惡言時毒竊恐傳染嘗考之與經曰人身忽經變赤狀如塗丹謂之丹毒此風熱惡毒所為謂之丹瘤與夫時毒特不同耳蓋時毒者感四時不正之氣初發狀如傷寒五七日之間乃能殺人治之宜精辨之先診其脈滑數浮洪沉緊弦澀皆其候也蓋浮數者邪氣在表也沉澀者邪氣深也識的時毒氣實者攻之下之有表者發之年高氣弱者連翹湯主之又於鼻內㗜通氣散取十餘嚏作效若㗜藥無嚏者不可治之如出膿血者治之必愈如左右看病之人日日用㗜藥取嚏必不傳染病人每日用嚏藥三五次以泄熱毒此治時毒之良法也經三四日不解者不可大下猶宜和解之至七八日大小便通利頭面腫起高赤者可服托裡黃耆散宜針鐮砭割出血泄其毒氣十日外不治自愈也此病若五日以前精神昏亂咽喉閉塞語聲不出頭面大腫食不知味者必死之候治之無功矣然此疾有陰有陽可汗可下切不可但云熱毒只用寒藥混治精義竇漢卿曰時毒乃凶荒勞役患之安里為主用普濟消毒飲最善然而此症有陰有陽有可汗有可下若誤認為熱毒而用寒藥則誤矣全書心法曰時毒初起狀類傷寒或兼咽痛一二日間發於腮項頷頤作腫無頭漸漸紅赤疼痛或似結核方有根漫腫色赤俱由感冒四時不正邪氣客於經絡釀結而成非發於病後之頤毒也惟在醫者精察瘡色辨別虛實治法須宜疏解不可驟用寒涼致毒不得外發而內攻咽喉者則險矣時毒門主方加味甘桔湯甘草桔梗荊芥各三錢牛蒡子炒二錢貝母一錢五分薄荷五分水煎服若兩頤腫盛者加丹皮三錢柴胡一錢五分普濟消毒飲神治天行疫毒大頭諸病牛蒡子炒連翹桔梗甘草板藍根馬屁勃橘紅玄參柴胡殭蠶炒各二錢黃芩酒炒黃連酒炒各五錢新升麻七分人參三錢為末湯調服之或蜜丸嚼化或有加當歸川芎如便閉加酒炒大黃一錢利之腫熱甚者砭法刺之一方有薄荷一錢無人參此方黃連黃芩味苦瀉心肺熱以為君橘紅元參苦寒生甘草甘寒瀉火補氣以為臣連翹鼠黏薄荷味苦辛平板藍根味甘寒馬屁勃殭蠶味苦平散腫消毒以為佐升麻柴胡苦平行少陽陽明不得伸之鬱氣桔梗味辛溫為舟楫不令下行如是調治方可保全耳邊腮腫五倍子濕紙包燒存性研末雞子白調糊遍敷立消無風寒腮赤腫安絲魚煨湯吃自消敷法如意金黃散用蔥汁黃蜜調敷中留一孔透氣外用桑皮紙扯碎貼之如干紙外以蜜水潤之自消時毒痄腮治風寒鬱熱耳邊腮頤結腫惡寒發熱焮赤口乾每年仲春小陽時令必多此症有隻腫一邊者有先腫一邊一二日又腫一邊亦有兩邊齊腫者名曰時毒更有兩頦硬腫頷下腫者名曰蛤蟆毒均宜疏寒散熱不得驟用寒涼冰伏葛根荊芥防風桔梗甘草白芷赤芍連翹澤瀉白水煎二三劑後加貝母牛蒡子玄參銀花夏枯草丹皮山梔柴胡按症加減七日自消頭疼耳邊發腫太陽痄腮俱疼不可忍周鶴仙生大黃一兩青木香薑黃檳榔各三錢共為細末醋蜜調敷患處中留一孔出氣干則換敷二三次即愈又方生大黃末蔥汁調敷四圍中露一頂自消又方醋調石灰敷之即消又方生大黃黃柏赤小豆石膏穿山甲各等分共研細末醋調敷傷寒瘥後碗頭瘡門主論馮魯瞻曰碗頭瘡者亦有汗下後餘毒不盡故瘥後而發碗頭瘡也只以黃連甘草歸尾紅花防風苦參荊芥連翹羌活白芷之類煎服外用芒硝赤小豆青黛為末以雞子清和豬膽汁調敷瘡上最效勿動其靨待其自脫鼻部望色辨證門主論鼻色青主腹中痛苦冷者死鼻色微黑者有水氣鼻色黃主小便難鼻色白主氣虛鼻色赤屬肺熱鼻色鮮明者有留飲鼻孔乾燥者必衄血鼻色燥如煙煤者陽毒熱極鼻孔冷滑色黑者陰毒冷極鼻流濁涕者屬風熱鼻流清涕者是肺寒鼻孔癖脹者肺熱有風黑氣入耳目鼻舌者死過梁疔門主論申鬥垣曰過梁疔乃勞傷太甚憂慮傷於肺經致氣血停滯熱毒內攻穿於心胸纏於四肢筋骨痠疼六七日添噁心八九日腫過耳目至十一日命促此疔生於眉心鼻上初起未見疔形最難識認五六日頭破身寒若痛甚冷汗出者不治救治均同疔瘡門施治啟玄鼻疽門主論王肯堂曰鼻疽生於鼻柱屬手太陰肺經風熱及上焦鬱火所致準繩澄曰鼻疽乃肺經蘊積熱邪或憂思損傷脾肺或過食五辛嗜飲炙煿而成初起鼻柱壅腫兩竅不通焮痛難經因蘊熱嗜飲而成者當用銀花甘草湯加麥冬花粉貝母赤芍當歸以清肺熱稍分其炎燔之勢如憂思內傷而成者又當保固肺脾為主敗毒清涼損氣傷脾之藥均不可濫施也治法於癰疽門中採擇用之毋庸另立主方鼻疔門主論申鬥垣曰鼻疔乃憂鬱太過勞傷太重臟腑毒氣傳於經脈而成二三日神思困倦筋骨痠痛四五日寒熱交作毒氣攻心頭面腫大八九日嘔逆昏迷痰升氣促十難救一醫者不可不察初起治法從疔瘡門施治啟玄陳實功曰鼻疔生於鼻內痛引腦戶不能運氣脹塞鼻竅甚者唇腮俱腫先宜針刺次照疔瘡治法正宗澄曰鼻疔生於鼻竅之中乃憂鬱傷肺或房欲傳腎火乘金位燔灼而成治當悉按疔瘡治法毋庸另立主方鼻腫門主論岐天師曰鼻腫者乃肺經火盛也用皂角末吹入打清嚏數十即愈蓋鼻因氣塞今打嚏則壅塞之氣盡開散故不用甘桔湯清肺而鼻腫自消也秘錄又曰有人鼻大如拳疼痛欲死此乃肺經之火熱壅於鼻而不得瀉法當清其肺中之邪去其鼻間之火可也以解壅湯主之此方全在群入肺經以去其火邪又何壅腫之不消耶鼻瘡門主論澄曰鼻乃肺之竅肺有蘊熱或醇酒炙煿胃熱薰金或肺火亢甚是以鼻竅生瘡燥裂作痛多起赤靨當用石斛麥冬湯清之或六味地黃湯加麥冬治之陳實功曰鼻瘡乃肺經實火鬱熱故生瘡也正宗鼻瘡門主方解鬱湯岐天師桔梗天門冬各五錢黃芩麥門冬甘草天花粉各三錢紫菀二錢紫蘇葉百部各一錢水煎服四劑鼻瘡全消鼻瘡宮粉血丹松香各一錢艾葉五錢研細紙卷香油浸透火燃滴油搽鼻內神效又方杏仁研爛人乳和敷又方烏牛耳垢敷鼻下生瘡牛鼻中舊木卷煅研敷之鼻頭紅腫破裂皂礬和灰面研勻水調貼之鼻疳門主論馮魯瞻曰風邪客於皮毛是以津液不收致流清涕頭楚若鋸者名曰鼻鼽更有金不生水則六陽虛火上升而成鼻乾者更有風濕之氣壅成內熱或因氣疳故鼻下兩旁瘡濕癢爛是名鼻疳俗呼鼻䘌瘡不甚痛汁所流處即成爛瘡錦囊又曰鼻下一道赤者名曰䘌以黃連末敷之申鬥垣曰鼻疳鼻乃肺竅鼻孔生疳乃肺中有積熱若不早治蝕其鼻內關竅令人言語不明啟玄鼻疳門主方驗方啟玄兒茶五錢雄黃輕粉各一錢冰片一分研細吹之如臭加鍋墨五分又方杏仁不拘多少去皮尖搗碎取連四紙壓去油如白粉一樣只用二分輕粉一錢吹患處三四次自愈鼻疳爛通其孔者鹿角銼碎焙焦枯白礬各一兩頭髮五錢燈上燒灰共研極細末先用椒水洗淨疳孔然後搽之如不收口可用瓦松燒存性研末搽之鼻痔門主論陳實功曰肺氣不清風濕鬱滯而成鼻痔也如鼻生息肉結如榴子漸大下垂閉塞孔竅氣不宣通宜服辛夷清肺飲外用點藥漸化為水自愈正宗馮魯瞻曰濕熱之氣外郁皮毛內應太陰故三焦之火得以上炎為鼻生贅如灶火上炎而成煤也又有胃中食積熱痰流注是以上燎而鼻生息肉猶濕地得熱而生菌也治宜利膈去熱切勿因礙傷動否則變成鼻痔矣錦囊又曰鼻為呼吸之門戶熱氣蒸於外則為肺風赤鼻不獨因於酒也熱氣壅於內則為息肉鼻瘡故息肉者上焦積熱鬱塞而生也竇漢卿曰鼻居面中為一生之血運而鼻孔為肺之竅其氣上通於腦下行於肺肺氣壅盛一有阻滯諸病生焉故有鼻痔之患又曰亦有熱伏於腦外寒侵襲鼻流臭涕所謂腦寒腦漏鼻淵均由此成鼻痔門主方鼻痔鼻生息肉硇砂五分枯礬二錢研細每用少許點鼻痔上即消驗法先用麻油掃鼻孔四周再以白降丹少許清水調點其痔自落又方明礬一兩甘遂一錢灰火煨白降丹一分或二分明雄五分共乳細吹痔上自愈又方明礬一兩萆麻仁七粒鹽梅五枚去核麝香一分共研成丸如棗核大綿包塞鼻內自化又方枯礬末和豬脂綿包塞數日自消又方藕節有毛處燒存性為末吹之腦崩鼻息甘草四兩煎湯用有嘴壺貯以鼻嗅之鼻中息肉下垂冰片點之又方黑牛耳垢敷之又方雄黃塞之十日自落又方雄雞腎塞之十日落又方黃連白蒺藜煎汁灌鼻中涕出息落鼻漏鼻孔中長出一塊辛夷去毛桑白皮蜜炙各四兩梔子一兩枳實桔梗白芷各二兩共為細末每服二錢淡蘿蔔湯調服鼻淵門主論馮魯瞻曰夫鼻為肺竅經曰天氣通於肺若腸胃無痰火積熱則平常上升皆清氣也肺家有病則鼻不利如傷熱之不散或傷寒之久郁成熱皆能使塞而不利若平人而多涕或黃或白或帶血如膿狀者皆腎虛所致不可過用涼藥錦囊又曰鼻淵者謂其涕下不止如淌水泉故名之也經曰是膽移熱於腦蓋膽脈起於目銳眥上抵頭角入絡於腦然陽明之脈亦挾鼻絡目旁約太陽之脈者也今因腦熱則足太陽逆與陽明之脈俱盛泊於額中是以鼻額痠痛涕下不止矣又曰更有寒邪未盡虛熱漸熾是以膿涕結聚香臭不聞此名鼻齄又曰更有熱血入面為寒所拂是以汙濁凝滯則成鼻齄又曰腦病有二若清水流出而不痛者為寒若流黃臭水而痛者為熱久而不愈即名腦漏治當內服清利膽熱外於囟會通天二穴灸之又曰鼻流濁涕不止者名曰鼻淵乃風熱爍腦而液下滲或黃或白或帶血如膿狀此腎虛之證也經曰腦滲為涕又曰膽移熱於腦原病式曰如以火爍金熱極則反化為水然究其原必腎陰虛而不能納氣歸元故火無所畏上迫肺金由是津液之氣不得降下並於空竅轉濁為涕津液為之逆流矣於是腎肝愈虛有升無降有陽無陰陰虛則病陰絕則死此最宜戒怒以養陽絕欲以養陰斷煿炙遠酒面以防作熱然後假之良醫滋腎清肺為君開鬱順氣為臣補陰養血為佐俾火息金清降令胥行氣暢郁分清竅無壅陽開陰闔相依相附臟腑各司乃職自慎以培其根藥餌以治其病間有可愈者苟或驕恣不慎或誤投涼藥雖倉扁不能使其長生矣又曰久患鼻流濃涕極臭者即名腦漏氣虛者補中益氣湯陰虛者麥味地黃湯經曰肺和則能知香臭矣肺中壅遏不和故鼻竅窒塞不聞香臭矣陳實功曰鼻淵又名腦漏總由風寒凝入腦戶與太陽濕熱交蒸而成其患鼻流濁涕或流黃水點點滴滴長濕無干久則頭眩虛暈不已治以藿香湯主之如日久虛眩內服補中益氣湯六味地黃丸以滋化源可也正宗陳遠公曰人有無端鼻流清水日久則流鼻涕又久則流黃濁之物如膿如髓腥臭難聞流至十年而死矣此得之飲酒太過臨風而臥風入膽中膽之酒毒不能外泄遂移熱於腦腦得熱毒之氣不能久藏從鼻竅出矣腦竅通於鼻而膽氣何以通於腦酒氣何以入於膽耶凡善飲者飲酒必先入膽膽不能受酒而能滲酒酒經膽滲則氣盡解倘飲多則膽不及滲矣膽不及滲則不勝酒既不及化酒則火毒存於中人臥則膽氣不行又加寒風之吹膽更不舒矣膽木最惡者寒風也內寒相侵則內熱益甚膽屬陽頭亦屬陽膽熱不能久藏膽中必移熱上走於頭矣腦在頭中頭無藏熱之處必遇穴即入況膽腦原相通者乎腦之穴大過於膽遂安居而不還於膽矣及居腦久動則思遷又尋竅而出乃順趨於鼻矣火毒淺則涕清深則涕濁愈久愈流愈重後則涕無可流並腦髓盡出欲不死不可得矣治法治其腦而仍治其膽者探源之治也用取淵湯辛夷二錢當歸黑山梔各三錢柴胡貝母各一錢元參一兩水煎服二劑涕減三劑全愈辛夷入膽引當歸以補腦之氣引元參以解腦之火加柴梔舒膽之郁則膽不來助火自受補氣之益也不止鼻之涕者清腦中之火益腦中之氣正所以止之也蓋鼻原無涕遏上游出涕之源何必又截下流之水乎或疑當歸過於多用不知腦髓盡出若不大補則腦氣不生辛夷耗散之物非可常用故乘其引導大用當歸補腦滲精不必日後再用倘日後減去辛夷即重用當歸無益矣此用藥先後之機也人疑當歸不可多用不過嫌其性滑有妨於脾耳誰知腦髓直流之人必髓不能化精者也精不化則必少矣精少則不能分布於大腸大腸必有乾燥之苦然則以當歸潤之正其所喜何患之有耶又曰人有鼻流清涕經年不愈人以為內熱成腦漏也誰知肺氣虛寒乎夫腦漏即鼻淵也有寒熱二證不獨膽熱而成之也何以別之蓋鼻涕濁而臭者熱也清而不臭者寒也熱屬實寒屬虛今流清涕而不臭正虛寒也熱宜清涼之藥寒宜溫和之劑若概用散而不用補則損肺氣而肺益寒愈流清涕矣用溫肺止流丹人參荊芥細辛各五分訶子甘草各一錢桔梗三錢水煎調石首魚腦骨五錢煅末服一劑即止此方氣味溫和自能暖肺性又帶散祛邪故奏功如神或謂石首魚腦骨古人以治內熱之鼻淵疑石首魚腦骨為物何以用治寒證鼻淵耶恐鼻淵皆屬熱而非寒乎不知鼻淵有寒熱二證而石首魚腦骨皆兼治之但熱病之涕通於腦寒證之涕出於肺所用之藥皆入肺無非溫和之味肺既寒涼得溫和自解又得石首魚腦骨截腦中之路則腦氣不下陷肺氣更閉矣所以一劑止流也又曰人有鼻塞不通濁涕稠黏已經數年人以為鼻淵火結於腦也誰知乃肺之鬱火不宣而非鼻淵也夫郁證五臟皆有不獨肺能郁也內經曰諸氣憤郁皆屬於肺肺鬱則氣不通也難經曰肺熱甚則出涕肺本清虛之府最惡熱也肺熱則氣必粗液必上拂而結為涕熱甚則涕黃熱極則涕濁則濁之物豈容於清虛之府必從鼻之門戶出矣用加味逍遙散柴胡白朮白茯苓各二錢桔梗白芍當歸各三錢黃芩半夏白芷甘草各一錢陳皮五分水煎服二劑輕八劑全愈此治肝鬱之方何以治肺郁亦效不知此方善治五郁非獨治肝一經已也又佐以桔梗散肺之邪黃芩瀉肺之熱且引眾味入肺何郁之不宣乎故塞通濁化也李東垣曰鼻塞不聞香臭者俗謂肺寒而用解利辛溫之藥不效殊不知多因肺經素有火邪故遇寒便塞也治當清肺降火為主佐以通氣之劑如原無鼻塞舊症但一時偶感風寒而致窒塞聲重或流清涕者自作風寒治之然氣虛之人氣弱不能上升則鼻塞滯所謂九竅不通腸胃之所生也多服補中益氣湯自通朱丹溪曰肺開竅於鼻陽明胃脈亦挾鼻上行腦為元神之府鼻為命門之竅人之中氣不足清陽不升則頭為之傾九竅為之不利經曰天氣通於肺若腸胃無痰火積熱則平常之升皆清氣也故十二經脈三百六十五絡其氣血皆上升於面而走空竅其宗氣出於鼻而為臭謂陽氣宗氣者皆胃中生髮之氣也若因飢飽勞役損傷脾胃則生髮之氣弱而營運之氣不能上升乃邪塞空竅故鼻不利而不聞香臭也治法宜養胃實營氣陽氣宗氣上升則通矣然難經云心主五臭肺主諸氣鼻者肺竅也反聞香臭者何也蓋以竅言之肺也以用言之心也若因衛氣失守寒邪客於頭而鼻亦受之不能為用是以不聞香臭矣經曰五氣入鼻藏於心肺心肺有病鼻為之不利也視聽明而清涼香臭辨而溫暖治法宜先散寒邪後補胃氣使心肺之氣得以交通則鼻利而香臭聞矣鼻淵門主方奇授藿香湯鼻淵黃水濁涕長流致腦戶虛眩不已藿香連枝帶葉者五錢水一碗煎七分加公豬膽汁一枚和勻食後通口服之至重者不過三服如此藥味苦不能服用藿香葉一兩公豬膽汁熬稠膏為丸每服二錢食後白湯送下亦效鼻流涕不止白芷一兩蒼耳子炒二錢五分辛夷仁薄荷甘菊花各五錢研細每服二錢清茶食後調服腦漏濟生當歸頭酒洗五錢辛夷仁三錢真川芎酒洗羚羊角鎊各二錢石青水飛一分研絕細和勻每服一錢臨臥時溫酒調下即睡古拜散荊芥穗為細末每服三錢生薑湯調下有火者用陳茶調服防風散鼻淵腦熱滲下濁涕不止人參黃芩酒炒麥門冬去心防風各二兩川芎生甘草各一兩上為細末每服二錢白湯調下鼻流臭涕百草霜研細空心冷水調服三錢五次可痊腦漏裝佛店中絞漆綿子煅灰研細蘆管吹鼻中三四次鼻淵周鶴仙辛夷防風白芷各八分蒼耳子一錢二分川芎五分北細辛七分甘草三分白水煎連服四劑全愈忌牛肉腦寒神方江仍度每用頭火燒酒一斤入小嘴砂壺內蓋旁四周封固將酒燉滾熱以鼻向壺嘴內聞酒味冷則又燉又聞聞至酒淡無味又換一斤如法燉聞重者五斤輕者不過三斤即可全愈腦漏白雞冠花不拘新陳用酒一斤煎服天羅散治鼻中常流黃臭水名控腦砂絲瓜藤取根下三寸或五寸燒灰存性溫酒調服數次即愈鼻淵陳香櫞砂仁扁柏葉川芎廣木香各等分水煎服鼻出臭氣黃芩石菖蒲生地遠志肉藁本黃連赤芍各八分甘草水浸炒三分水煎服腦寒辛夷頭黃芩各二兩白芷八兩蔥汁煮三次共磨細末水法疊丸每服二錢白湯送下赤鼻門主論陳實功曰平素嗜飲胃經濕熱糟粕之氣上熏肺金故有赤鼻之證也正宗馮魯瞻曰赤鼻乃肺中積熱六陽上蒸而成錦囊又曰凡鼻頭白者血亡也赤者血熱也蓋面為陽中之陽鼻居面中一身之血遠至面鼻皆為至清至精之血若血亡無以運則色白而不榮血熱而沸騰則獨紅而且赤蓋肺之為臟其位高其體脆性畏寒又惡熱故多酒之人酒氣熏蒸則為鼻齄准赤得熱愈紅熱血得冷則凝汙而不行故色紫黑其治之法亡血者溫補之熱血者清利之寒凝者化滯生新四物湯加酒芩酒紅花之類氣弱者更加酒浸黃耆以運之其酒齄鼻治法亦然也又曰鼻為呼吸之門戶熱氣蒸於外則為肺風赤鼻不獨因於酒也熱氣壅於內則為息肉鼻瘡故息肉者上焦積熱鬱塞而生也赤鼻門主方驗方金色密陀僧二兩研極細用人乳或白蜜調如薄糊樣每晚略蒸將熟為度敷鼻上次早以漱口水洗去一月可痊又方核桃肉連皮枸杞子元眼肉各三斤搗爛作點心不時食之其紅自落又方食鹽擦牙漱口水淋洗久而自退又方生白果嚼爛敷鼻上赤鼻酒齄黃柏苦參檳榔各等分研末以豬脂調敷血熱入肺而成酒齄鼻秘方當歸苦參各四兩研末酒糊為丸桐子大食後熱茶送下八十丸藥儘自愈赤鼻硫黃皮硝各等分研如面臨臥擦一月全愈又方牛黃明雄嫩色硫黃各五分白硼砂一錢明礬一兩乳極細末不時以津唾潤赤鼻上蘸藥擦之臨睡擦過夜尤效赤鼻神方血餘三斤用米泔水洗淨再以長流水洗用黃芩一斤當歸白芍各八兩用無根水五大碗煎三碗渣再煎汁濾清分作三次煮血餘倘有餘汁又拌血餘日曬夜露以汁盡為度天門冬去心麥門冬去心熟地黃白茯苓各四兩山梔乾葛桔梗枳殼甘草各二兩上藥連血餘共一處以棉紙包紮成球外以熟黃泥包裹約二寸厚成圓球曬乾倘有裂縫須添泥補固用桑柴火在八卦爐中煅至煙起白煙一起即取出埋土內七日去土研末煉蜜為丸桐子大每朝晚食後白湯送下二錢或三錢服至七日其紅即退矣赤鼻年久諸藥不效茶葉天門冬去心側柏葉各一兩共研每日用一撮入罐內滾水泡勿泄氣用湯當茶日飲五七次一月愈酒齄赤鼻新生白果口嚼數枚夜敷七次如舊加酒糟塗之亦可又方使君子肉以香油浸潤臥時嚼五枚久久自愈又方密陀僧末人乳調搽又方檳榔用茄汁浸拌曬乾為末津唾調搽又方苦參淨末四兩當歸淨末二兩酒糊丸食遠熱茶送下二錢赤鼻糟鼻硫黃四兩放砂銚內以燒酒三斤為率煮硫逐漸加添待乾為度取起每用少許將口唾放手心內化開搽之鼻衄門主論岐天師曰火氣鬱勃於上焦不能分散故上衝而為吐血衄血也七孔流血者乃腎虛熱也用六味地黃湯加麥冬五味子骨碎補治之秘錄馮魯瞻曰鼻衄者或心或肺或胃蘊熱過極迫血妄行上干清道而衄也鼻氣通於腦血上溢於腦故從鼻而出名曰鼻衄若因風寒暑濕流傳經絡湧泄清道而致者皆外所因積怒傷肝積憂傷肺煩思傷脾失志傷腎暴喜傷心皆能動血隨氣上溢而致者皆內所因飲食過多炙煿辛熱或墜車損撲而致者皆不內外因也原病式曰衄者陽熱怫鬱於足陽明經丹溪曰衄血出於肺言肺者以竅言也言陽明者以血海言也又有洗面而衄日以為常猶風行水動面熱而陽明之火上升血亦隨之也錦囊又曰若產後口鼻有黑氣及鼻衄者名胃絕此證多不可治遇有此者急取緋線一條併產婦頂心發兩條緊繫中指節即止如衄不止而頭汗者死陳實功曰鼻中出血乃肺經火旺逼血妄行上從鼻竅而出也用紫土散敷囟頂上內服羚羊清肺湯自止正宗東醫寶鑑云產後氣血散亂入於諸經不得還元故口鼻黑色起及傳變鼻衄名曰胃絕肺敗此證不可治宜用犀角地黃湯救之或急用荊芥散胡景周曰上下失血過多氣息幾微心慌神困脈細如絲或惡寒發熱作渴煩躁急用人參一兩大棗十枚去核水煎服蓋血生於氣故血脫補氣陽生陰長之義也一女子因往後一跌鼻血長流止後一有所感其血即出諸醫不效後一醫以水和白麵包大附子一個在內火煨熟去附子只用面燒存性為末每用二錢白湯和服用此永不再發傷寒論曰衄家不可發汗張景岳曰雜病衄血責熱在裡傷寒衄血責熱在表又曰陽明病口燥但欲漱水不欲咽者此必衄蓋陽明之脈絡於口鼻今其漱水不欲咽者以熱在經而里無熱故當鼻衄也又曰有動陰血者又非衄血之謂論曰少陰病但厥無汗而強發之必動其血未知從何道出故或從口鼻或從目出者是名下厥上竭此陰血也乃為危證澄曰書以產後口鼻黑氣及見鼻衄為不可治者何也蓋五臟之華皆上注於面凡色紅赤者陽熱之生氣也青黑者陰寒之絕氣也況口鼻為陽明多血多氣之部而見陰寒慘殺之氣則胃中陽和之氣衰敗可知矣復至鼻衄則陽亡陰走也胃絕肺敗陰陽兩亡故不可治及產後舌紫黑者為血先死不治蓋心主血少陰氣絕則血不上蔭耳鼻衄門主方神方岐天師生地當歸川芎玄參黃芩三七根荊芥穗炒甘草水煎服茜根散錦囊治衄血不止阿膠蛤粉炒茜草根黃芩側柏葉生地各一兩炙甘草五錢水煎服二神湯保命集耳鼻出血生地麥門冬各一兩水煎服鼻衄不止生地當歸酒洗各三錢白芍酒炒二錢辛夷五分木通六分茅花荊芥穗酒炒黑炒存性各一錢水煎服服後即臥立止水灰散山梔仁香白芷各等分研細吹少許於鼻中立止又方大蒜搗泥隨左右貼足心又方左鼻衄以線扎左手中指右如之兩鼻衄者雙手俱扎又方千瓣紅石榴花曬乾研極細用少許吹鼻中即止又方血竭蒲黃各等分研極細用竹管吹鼻內即止又方人乳童便好酒各等分碗盛重湯煮熱飲又方小兒胎髮燒灰吹鼻內又方胎髮燒灰存性為末用水調塗眉心其血立止急忙去藥略遲則鼻塞矣又方人中白發灰各一錢麝香一分共為末吹鼻中少許又方亂溺器內人中白新瓦上焙乾以溫湯調服錢許又方將患人頂發分開於百會穴上以新汲水滴之立止又方驢糞焙乾發灰各等分研勻吹鼻又方五倍子為末吹鼻又方屏風上舊紙燒灰酒調一錢服又方茅花塞鼻中仍以茅花煎濃汁飲大能止血又方青苔放囟門上頂之立止永不再發又方馬藺頭即本草馬藺草走肺經揉熟塞鼻孔即止鼻冷門主論馬魯瞻曰凡鼻冷與夫面黃面白乃陽氣大弱宜大劑參耆加附子主之鼻祟證門主論岐天師曰倘人鼻中生紅線一條長尺許少動之則痛欲死人以為飲酒之病也而余以為不然亦祟死方用硼砂冰片各一分研為末以人乳調勻輕輕點在紅線中間忽然覺有人如將病人打一拳一般頃刻即消奇絕之治也蓋硼砂亦是殺祟之物也秘錄書云凡人喜食豬羊鹿血血分積熱壅盛鼻毛如繩痛不可忍氣塞不能呼吸用乳香硇砂各等分飯丸桐子大每早晚冷水送下十五丸自然消落而愈
