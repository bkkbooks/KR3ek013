body:
  text: 卷三十八蛇虎傷部凡蛇虎蟲狗蜈蚣蠍蛛鼠咬皆匯於此部中以便檢閲參治馬汗瘡門主論凡患瘡人因騎騾馬沾其涎汗毒入瘡中焮腫疼痛名曰馬汗瘡馬汗瘡門主方驗方冬瓜皮煎湯洗又方絲瓜葉煎湯洗又方冬瓜皮乾為末敷之又方啓玄制柏散敷之馬咬門主方驗方皂角子燒灰香油調搽即追出毒氣矣又方薄荷汁塗之馬咬及踏傷服童便韭汁又方集驗寒水石研敷傷處旬日自愈馬咋踏人割雞冠血點咬處日三次牡馬用雌雞冠牝馬用雄雞冠又方馬鞭梢三寸鼠屎十四粒煅灰為末豬油調搽又方婦人月經搽又方人糞煅馬糞煅上共煅研為末豬油和調搽之虎咬門主論雷真君曰世人被虎咬傷血必大出其傷口即時潰爛其疼不可當即用豬肉貼之隨貼隨化隨易急用地榆一斤苦參四兩三七根三兩研極細摻之隨濕隨摻血即止痛即定蓋地榆涼血苦參止痛三七止血合三者之長故奏功實神祕録凡人遇虎不死必傷傷必潰爛虎之見人如貓捕鼠先有毒涎噴人人始昏潰陳遠公曰人遭虎傷流血必多大凡虎傷多在頸項必有深孔兩個或四個其孔一時即化為黑色急用生豬油塞之無則用生豬肉填之隨填隨化庶不再腐所傷之肉然後急買地榆半斤為末敷所傷之處血即頓止隨用湯藥以止渴蓋虎傷流血必多而虎又有熱毒直來犯心故口渴甚萬不得已可與小便飲之急投治虎湯三七根末地榆各二兩黃耆當歸麥冬生地各三兩水十碗煎恣其飲之必安然而臥明日傷處大癢又一服又臥如是五日瘡口生合而愈冰鑑此方大補氣血以生肌用地榆化虎傷之熱毒用三七根止血斂口但其藥料不奇奏功實神王御曰凡虎咬多服生薑汁或自尿淋洗傷口又用白礬研細末敷之虎咬門主方驗方真香油灌之外用香油洗之又方搗青松汁數斗頻頻飲之用渣敷咬傷處頻易即效熊虎爪牙所傷毒痛燒青布熏瘡口毒即出仍煮葛根汁煎濃洗瘡一日十次再搗葛根汁調服方寸匕每日五次甚者夜服兩次又方嚼栗塗又方煮生鐵令有味洗瘡又方雄黃硫黃紫石英各等分共研細末搽之蛇傷門主論陳遠公曰人被蛇傷不拘何處或上或下腹脹如箕三日不救毒氣攻心必死蛇乃陰物傷人最毒治用解毒為主惟是蛇毒乃陰毒也若用陽毒解之則毒愈熾必用陰分解毒之品順其性而解之也祛毒散用白芷紫花地丁蒲公英夏枯草各二兩生甘草五錢白礬三錢水煎服一劑腫消二劑毒從大小便而出三劑全愈冰鑑白芷雖陽分之藥得夏枯草則陽化為陰地丁公英甘草白礬盡消毒之味又且屬陰陰變以化陰毒自易奏功助白芷直攻蛇毒無留存之害也或問解蛇毒既不可用陽分之藥何以又用白芷不知蛇毒非白芷不除世人不善用之所以有不效者今用於陰分之中自無不效矣何可舍白芷反致無功乎或問雄黃亦制蛇毒何不用之不知白芷陽中有陰不比雄黃純陽也雄黃外用可建奇功內用每至僨事不若白芷用陰分之中可建全功耳諸蛇有毒惟土虺蛇最毒咬人若不急治則死矣凡蛇誤入人孔竅內即用針刺其尾不過兩三針則自褪出丹心云制蛇毒用雄黃末加人參湯調服綱目云人卒為蛇繞不解熱湯淋之無湯則令尿之即解凡毒蛇咬用針刺傷處出血用繩扎兩頭浸糞缸內毒不內攻若毒走腫痛者麻油紙捻焰熏之再解毒紫金丹一錢酒磨服之取汁蛇傷門主方毒蛇咬急於咬傷處上下扎緊使毒氣不散食蒜飲酒令飽使毒不攻心更搗蒜敷傷處加艾圓灸之又方五靈脂一兩水飛雄黃五錢研極細末用無灰酒調服二錢滓敷患處忌人參又方黃豆根上又有白豆取來口內嚼爛敷之又方川貝母為末酒調盡醉灌之少頃酒自傷處化水流出候水盡用渣敷咬處垂死可活又方明雄黃共蒜搗敷內取白芷護心散白芷護心散治毒蛇蜈蚣咬明雄黃炙甘草各五錢白芷一兩滴乳香去油三錢共研細末每服四錢酒調服又方水洗淨膿腐易水數斗拭乾用鴨嘴礬白芷麝香各等分研末敷之又方五靈脂白芷各五錢明雄黃三錢滴乳香去油沒藥去油各五分甘草二錢麝香三釐水酒各半煎服其渣敷毒蛇咬處起死回生又方半邊蓮藤葉一名金錢草用唾液揉洗並敷咬處立愈諺云有人識得半邊蓮終朝可伴毒蛇眠又方柏子樹葉不拘多少冷水搗爛洗過又搗敷上三五次可愈如咬破潰爛用鳳尾草搗如泥敷上即收口如不爛者不必用又方集驗白礬溶化乘熱滴傷處痛立止毒氣即趕出毒蛇及諸色惡蟲咬傷毒氣攻入肚腹者蒼耳草嫩葉搗汁灌之將渣厚敷傷處土虺毒咬孫真人令婦人對咬處出尿澆之用尿洗之毒蛇瘋狗咬傷孫真人人糞塗咬處極妙新糞猶佳諸藥皆不及也毒蛇咬用糯米半升揀去半粒者勿用令家內男婦衆人嚼爛敷於咬傷之上少停其咬處便有黑氣冒出隨又換敷即出紫黑血水則其腫自消其痛則自止矣蛇咬採鮮大藍葉搗汁或小藍葉搗汁乳細雄黃末敷之又方紫金錠酒磨服一錠多飲為妙取汗又再用紫金錠磨爛敷於咬傷之處又方黃豆葉搗至極爛敷於咬傷之處蛇咬毒走腫痛麻油紙捻燒煙燻之毒蛇咬煙袋燒熱滴油搽之百試百驗又方用泥蛤蛥搗爛敷咬處即好又方白芷末一兩開水調下死者立生又方穿山甲炮廣木香各錢五分研細末熱酒調下又方捕蛇師全蠍二個研蜈蚣一二條炙研勻酒調下立愈又方抄本北細辛白芷各五錢雄黃五分研細每服二錢酒調服又方煙袋內油四面塗腫處即消切不可塗咬傷孔內又方藍葉搗汁同雄黃末敷之又方雄黃一錢生礬二錢杓內溶化將箸頭蘸藥點傷處冷則易之連點七次又方櫻桃葉搗爛塗患處搗汁飲之毒不內攻又方半邊蓮搗爛取汁二兩熱酒四兩和汁服取汗渣敷更妙又方蒼耳草陰乾五錢水一盅煎熱服取汗又方炙油梳令汗出尉瘡口又方雄黃末敷日三四次蛇咬爛入骨者白芷一兩膽礬五分麝香三分乳為細末日日摻之即愈赤煉蛇咬用活公雞刀割一塊貼之換貼兩三塊自愈蛇咬方周鶴仙雞蛋三個敲破蛋頭合在蛇咬之處聽蛋內有聲變黑色再用一個合之俟蛋內色變黃白不甚黑再用一蛋合之自愈不疼極妙良方又方蒲公英搗爛貼上即愈又方廣木香不拘多少水煎服效不可述解毒散治一切毒蛇並獸所傷重者毒入腹則眼黑口噤手足強直此藥平易不傷氣血大有神效不可以其易而忽之白礬甘草各等分為末每服二錢不拘時冷水調下敷傷處毒蛇咬傷跌撲不起將死者香白芷搗末麥門冬去心好酒煎服良久有黃水自傷口出俟水盡腫消皮合仍將藥渣搗融敷水蛇刺傷莧菜根順擂滾酒泡以碗蓋之熱飲取汗為度渣仍敷咬處蝮蛇螫人燒蜈蚣研末搽又方北細辛雄黃各等分研細搽傷處並治諸蛇及虎傷俱效救蛇入口門主方睡著蛇入口中拔之不出先將快錐橫刺蛇尾即將刀剖尾以川椒數粒納入纏定自然退出闢諸蛇門主方驗法但燒羚羊角令煙出蛇即去矣又方燒雄黃祛之又方乾薑麝香雄黃等分搗勻用小絳袋盛之男左女右佩帶則蛇遠避如人遭蛇傷便以此搽之無麝香即以射罔和佩之狗咬門主論陳遠公曰癲狗傷者人必發癲有如狂證世人以生小狗於腹中此誤傳也因如發狂有如狗狀見人則咬見女則嬲非狗生腹中不宜有此景象況人為癲狗傷二便必閉不能即出二便同力虛努似生産艱難且外勢急痛腰腹作脹而死人以為腹中有狗不能産而死腰痛者乃小狗內咬也豈不可笑此乃狗誤食毒物而發癲咬人則毒氣傳染於人狗愈人死可畏之證也然治之得法毒解病去如掃矣夫犬性最熱狗食物發癲乃食熱物之故或食自死之肉或飧熱病之尸多成癲病然則狗之發癲必熱上加熱也解其熱毒何不愈之有但人不知解法所以不救耳豫逢異傳名活命仙丹木鱉子三個切片斑蝥七個陳土炒去頭足米一撮炒劉寄奴大黃茯苓各五錢麝香一分各研細末和勻每服三錢黃酒調服毒氣全解神方藥也不必二服七日可奏功七日外者多服數次忌色欲二月並忌發物余無所忌冰鑑是方用木鱉斑蝥者以狗最畏二物木鱉大涼又瀉熱毒得大黃迅掃之則熱毒難留寄奴善逐血走竅茯苓利水引毒從小便而出麝香亦走竅用之不過制斑蝥木鱉之毒又何畏癲犬之傷哉人被犬咬傷即煩躁口乾小便澀頭頂有紅髮數根急急拔去輕者用天南星防風各一錢五分研細以酒調服重者用斑蝥五個去頭尾翅足以糯米合許同炒黃色去米將斑蝥研末酒一杯煎半杯空心溫服從小便行下惡物如小狗狀必待小便清白方為毒盡如毒未盡須再服之咬處輕者則以栗子嚼敷或紫蘇葉嚼敷重則必用男子熱糞敷之冷則更易待大勢將定即用於人糞燒灰麻油調敷澄曰瘋犬者乃朝夕露臥為四時不正之氣所侵陰陽肅殺之氣所感故舌出涎流頭低耳垂目紅尾拖急走無定多見於春末夏初之間人被咬傷即煩躁口乾小便澀痛最為難救狗咬門主方驗方防風六錢五分牽牛大黃各一錢半雄黃一錢三分麝香一分五釐斑蝥去頭足糯米炒五分共為末溫白湯調服三錢有血絲從小便出愈如未愈可再服三錢必效再用虎骨醋炙研末陰陽水調服三錢除患又方斑蝥九個去頭足翅入糯米二合同炒硃砂滴乳香去油沒藥去油明雄黃血竭兒茶各二分共為細末每服二分空心黃酒調服溯源散治瘋犬咬神效但服此藥切忌飲酒食豬肉羊肉等雞鵝魚蝦一切發物仍忌房事一百二十日終身不可食狗肉如誤食犬肉後必再發此發之後則無藥可救矣斑蝥七個去頭足翅研末溫酒調服於小便桶內見尿沫如狗形為效雖無犬形亦不再發後用辰砂益元散一兩煎服解之又方杭粉一錢斑蝥七個去頭足翅同糯米炒黃色去米研勻空心酒調下即解如小便痛服甘草梢湯自利又方急用人便下熱糞塗之極驗又方荔枝肉貼咬處其痛立止又方明雄五錢杏仁去皮尖炒一百粒共研細虎骨煎酒調服二錢咬處即用此藥敷之又方杏仁砂糖各等分搗敷又方桃樹頭搗敷又方舊錫器刮下錫末放咬處又方圓眼核去外漆皮煅灰搽又方洋糖同蔥搗敷咬處腫痛立止又方孫真人刺蝟皮頭髮各等分燒灰水和飲一杯口噤者折齒灌之又方虎骨煅存性研末摻之定風散羅太無瘋犬咬先口噙漿水洗淨用綿拭乾貼藥更不再發大有神效生南星防風各等分共為極細末幹上再潰膿功難盡述濟世方治癲犬咬先用人溺洗去血水再用核桃殼半個將極幹人糞填滿罨於傷處外用艾於桃殼上灸十四壯即愈永不再發瘋犬咬急於無風處捏去惡血孔乾者針刺出血鹽湯洗淨搗蔥貼上用糯米一撮番木鱉半個切碎斑蝥七個去翅足若過一日多加一個連前藥炒黃去斑蝥不用研為細末用好酒調服但細看頭上若有紅髮即行拔去切忌房事並忌鑼聲終身忌食犬肉羊肉家犬咬感應篇先須忍痛用河水洗淨血水刮生虎骨末摻咬處為佳家犬咬感應篇刮肉店內砧板上油膩拌砂糖敷之又方鼠屎搗爛敷之即止其痛瘋犬咬川連虎頸骨各三錢甘草一錢番木鱉三個先用麻油四兩將藥煎汁服下將渣再入生酒煎服飲醉取汗忌食鵝犬羊肉七日余物不禁又方青布煎汁三升服之又方飲驢尿一二升為良又方梔子皮燒灰石硫黃各等分共處研為細末敷於咬傷處一日一換其人頭頂必有紅毛數根急拔去用男子熱糞敷冷則易待大勢將定用男子干糞燒灰麻油調敷家犬咬如傷不甚重治以栗子搗敷又方紫蘇葉搗敷犬咬用水洗瘡任血出勿止仍洗勿住手俟血止帛扎緊又方嫩蒼耳草葉搗汁如無用乾者一把酒水同煎五分熱服又方白礬七分番木鱉一個共為末分三服先用水服後二次用酒服之又方斑蝥七個去翅足研細末用酒調服令被咬者小便於盆內見沫如狗形不再復發又方野菊花香附小兒胎髮炒煅研末酒服盡醉又方不見日色瓦上青苔刮下敷於咬處豬咬門主方驗方松脂熔化作餅貼之又方屋溜中泥敷之貓咬門主方驗方薄荷汁塗之鼠咬門主論鼠咬傷手足及肉最難愈者何也因其齒細而長上有毒黃能傷筋骨故也鼠咬門主方驗方宜用貓尿洗其毒去其血再用貓尿填傷處又方纂要斑蝥燒灰麝香少許津唾調敷又方貓毛燒灰加麝香少許唾津敷又方香椿樹皮搗汁一酒杯和黃酒調下則其毒氣自消蜈蚣咬門主方驗方雄雞冠血塗咬處又方取大蜘蛛放傷處吸去其毒即愈隨投蜘蛛於水內令吐出毒氣以全其命又方新竹一段火上烘出瀝取瀝搽之止痛又方頭垢搽之其痛立止蜈蚣叮咬其痛切骨渾身麻木雄黃研為細末捻香油紙條點火熏其咬處則其疼痛立止矣蜈蚣蠍子咬薄荷葉研末搽咬處立止又方蟾酥丸水磨塗又方燒鐵刀頭令赤置白礬於刀頭上化汁乘熱將礬汁滴於被傷之處立瘥又方手指探入雞喉內取雞口內涎塗之立愈又方取雄雞嘴對傷處吸吸盡毒雞嘴自去又方雞蛋一個輕敲一小孔合傷處立效又方木梳齒內垢燈上燒滴傷處立止又方人頭垢封傷處立效又方細嚼香附塗之立效又方五靈脂炒令煙盡一錢蒲黃炒二錢共研細醋調塗傷處立效又方獨蒜搗敷咬處其痛立止又方燈草心蘸香油點著向患處焠數下祛蜈蚣法凡人家蜈蚣多用頭髮燒煙或床下或廚房蜈蚣聞之入土三尺蜈蚣咬草紙卷點著隔錫片熏之熱氣透入其痛即止又方趕雄雞令走急然後以雞嘴氣呵之不過兩三次即好又方桑葉搗汁敷又方燒頭髮煙燻之亦好蜈蚣蠍螫生半夏蓽茇各二錢五分生南星一錢五分雄黃白礬各二錢為末就痛處搽之或醋調敷又方甘草雄黃磨菜油搽又方草紙卷燒煙燻又方蘄艾作小丸放咬處灸之又方先用鹽湯洗傷處再用劉寄奴擦之又方用生薑汁調雄黃搽壁虎咬門主方驗方青苔塗擦內用敗毒散加青苔三錢煎服又方桑柴灰水煎滾濾濃汁調白礬末塗之又方用清水淋壁上注咬傷處神效蠍螫門主論陳嘉謨曰蠍有雌雄兩種雄者螫人痛在一處雌者螫人痛牽遍體惟聞雞啼之聲則其痛漸減耳書云凡見一切毒螫之物不可起惡念向之亦不得殺之如動此念後必遭螫治亦難愈慎之慎之外臺祕要云余身曾遭蠍螫手指痛苦不可忍諸方治之無效有人見余令用冷水漬手指指不痛則漬手手即不痛水微微暖手又痛即換冷水漬之稍暖又換冷水或冷水浸舊布溻之實有奇效吳天麟曰凡蛇蠍蜈蚣咬傷雖有疼痛不可號呼但呵呵大笑數聲其痛即可十減其七蓋毒物咬人之後聞人號呼彼反為喜則其蜈蚣蠍子自己將尾巴搖動他若動一下咬處即錐痛一下但聞大笑之聲彼即氣殺澄曾連被蠍螫即發大笑之聲咬處果然不甚疼痛亦妙法也此亦不可不知蠍螫門主方驗方糞清搽之其痛立止又方水膠一條沾水濕之將火熾熱於傷處擦之又方草紙卷緊點著用煙燻之又方白礬半夏各等分研末醋調敷又方啓玄香油蘸青布捻子點著插在筆管內扣定痛處用煙燻之少刻即止痛矣又方井底泥塗螫傷處干則再易又方古今録驗但用木碗合之即愈又方新汲水以青布隨痛處搭之干則再易雄蠍螫人一處作痛井泥塗之干則再易雌蠍螫人諸處牽痛瓦溝下泥塗之若遇天晴可用新汲水從屋上淋下取泥塗之蠍螫淨官硝明雄各一錢二分麝香一分二釐研細瓷瓶密貯每用少許點男左女右大眼角聞香即止痛又方大蝸牛一個搗敷其痛立止矣良薑膏治毒瘡並蠍螫諸惡蟲咬高良薑穿山甲各六兩真麻油二斤浸七日熬枯去渣入炒黃丹一斤成膏攤貼蠍螫蜈蚣咬預於五月五日用水膠乳香各一兩水燉化攤勻紙上剪作小條每用少許水濕貼之立刻止痛又方搗蒜塗又方硼砂和水塗又方嚼茱萸封之又方生烏頭末唾和塗又方滴熱蠟燭油於傷處兩三次易之又方溫物浸之又方嚼乾薑塗又方苦李子仁嚼敷又方拔蛇盤草取汁敷蜘蛛咬門主論申鬥垣曰若蜘蛛咬人中其毒者一身生蜘蛛絲不知人事啓玄蟢蛛咬人其毒最能殺人蜘蛛咬門主方驗方啓玄艾燒煙燻之又方啓玄羊乳灌之立解又方傳信方大藍汁一碗入雄黃麝香少許搽於患處仍服其汁蜘蛛咬急用桑柴灰煎取汁調白礬末敷又方以生鐵衣醋研汁塗又方烏麻油和胡粉如泥塗干則易之又方洋桃葉搗敷又方炮薑切片貼又方雄黃末敷之又方蒜切作兩段揩之或蒜磨地上泥塗壁蟢咬門主論本草云壁蟢咬毒人必死宜用桑柴灰淋濃汁調白礬塗聖惠云醋磨雄黃塗蜂叮門主方蜂子叮人必有毒刺入肉內務須挑之好黃酒洗之又方生芋梗擦之立刻止痛消腫如無梗用子亦效又方青苔擦上痛止腫消又方人乳搽之又方小便洗擦拭乾用香油搽又方雄黃末摻之又方蜂房研末搽之又方陽物上垢手捏擦傷處又方就螫處地上寫一玉字口中默念金木水火土念一字寫一筆臨了念土字寫一點即取點下之土捻起就傷處敷之又方蜂房焙為末豬油調敷又方野莧菜搗敷又方火紙捲煙熏又方香油搽又方野苧葉擦又方桑樹汁擦又方手抓頭垢用鹽擦蝸牛傷門主論本草云蝸牛傷人毒氣遍身者宜搗蓼子汁浸即瘥蚯蚓咬傷門主論凡是蚯蚓毒形如大麻瘋眉發脫落亦有蚯蚓呵傷令人發腫又云蚯蚓蛟即受其毒但夜則蚯蚓鳴於體中為異耳用鹽湯頻頻洗之其毒自去蚯蚓咬傷門主方小兒受傷用鹽湯溫洗又方鴨血塗之中蚯蚓毒形如大麻瘋眉發脫落用石灰泡熱水候冷洗患處浸良久愈楊辣蟲辣門主論楊𦬸蟲即楊辣蟲又有瓦蝲蟲俱能辣人即令皮膚腫痛如火燎一般治用淡豆豉搗敷之又曰瓦蝲蟲即射工乃樹間雜毛蟲也人觸之即能放毛射人初癢次痛熱如火燎久則外癢內痛骨肉皆爛諸藥罔效但用豆豉同清油搗敷少時則毛出楊辣蟲門主方驗方淡豆豉搗敷之辣毛即出不痛如毛未出仍須再擦之毛出自愈如無豆豉或醋或鹽滷洗之又方白芷煎湯洗之如肉已爛海螵蛸細末摻之蠶咬傷門主方蠶咬苧麻根搗汁塗之馬蜞咬門主論韓秋岩曰雁山春夏多馬蜞毒物善齧人流血不止以燒竹葉塗之血立止檀丸叢書八腳蟲傷門主論韓秋岩曰八腳蟲隱壁間以尿射人遍身生瘡狀如湯火傷其痛如烙者是又曰蠼螋蟲一名多腳蟲若中尿者令人皮膚起療漿水泡痛如火燒初如飯糝漸如豆大宜用鹽湯綿蘸拓泡上數次即消八腳蟲傷門主方驗方烏雞翎燒灰雞子清調搽沙蝨毒門主方沙蝨在水中著人及陰雨日即著人便攢入皮里初著有赤點一如米粒鹽五合水一斗煮一沸清洗又方鹽和麝香塗諸色惡蟲咬傷門主方驗方先用薑汁洗再用雄黃明礬研細搽之又方生芝麻嚼細塗之又方大黃磨水塗二次再用香油紙捻點著熏傷處百蟲入耳門主方驗方宜閉口勿言以紙塞耳竅鼻竅只空中入之耳以麻油點入耳竅中或出或死又方貓尿滴耳中其蟲即出取貓尿法以生薑擦貓鼻上即溺又方韭汁和醋灌入耳中蜈蚣蜜蜂大蟲入耳用肉炙香安放耳邊其蟲聞香即出又方火炙桃葉塞之立出蝣蜒入耳用蚯蚓入蔥內化水滴耳內蟲自出又方羊乳灌入耳內即化為水百蟲入耳雞血滴耳或韭汁薑汁滴之皆效又方膽礬和醋灌之即出壁蝨入耳稻杆灰煎汁灌之即隨水而出百蟲入耳川椒末一撮以醋半斤調灌耳中行二十四步即出蚤蝨入耳菖蒲塞之蜈蚣入耳雞肉炒香放耳邊即引出又方生薑汁灌之螞蟻入耳穿山甲炒研調水灌之八角蝨門主論澄曰八角蝨即八角蟲又名陰蝨瘡其形如花蜘蛛叮於陰毛之上生於前陰毛際其癢如錐內由肝腎氣濁生熱兼淫欲失於浣洗二精不潔摶滯而成瘙癢難忍抓破色紅中含紫點宜內服蘆柏地黃丸主之又曰此蟲最易傳染得此者勿近女子近之則婦人即生此蟲不可不慎又曰亦有髮辮內生八角蝨者主其人運氣顛倒八角蝨門主方陰毛內生紅白蝨八腳如蝨癢不可忍磨鐿子泥塗之又方生白果嚼爛塗之又方銀硃紙燒煙熏之發內陰毛生蝨百部煙筋各等分煎湯洗之發內生蝨蘆藜不拘多少研末摻在發中經宿其蝨自死又方水銀和棗肉研爛塗氈帽上帶一夕盡絶又方百部煎洗立絶衣被生蝨百部同衣用滾湯泡洗蟣蝨俱絶蘆柏地黃丸熟地八兩丹皮白茯苓各三錢山萸肉懷山藥各四兩澤瀉三兩黃柏一兩蘆薈五錢共煉蜜為丸每服三錢白湯送下闢虼蚤門主方闢虼蚤五月五日採向東桃枝菖蒲根陰乾於十月初一日研末篩席下即除根又方鮮桃葉展淨曬乾研末先鋪葉末後灑微水立除祛蝨門主方祛蝨法水銀勒綿線繫腰間即去又方百部煎湯洗衣蝨俱滅又方白果搗碎漿衣祛蚊門主方治蚊蟲鰻魚骨如無即他魚骨幹的亦可室內燒之蚊化為水又方端午午時用金墨一錠放蛤蟆肚內封口陰乾每用墨在硯磨濃汁以筆蘸墨畫圈於壁或畫大小口葫蘆蚊蟲皆飛聚圈內此墨又可敷圍腫毒祛臭蟲門主方驗方採鮮繡救花置床四角其患自絶又方晚蠶砂燒床下臭蟲化水又方羊骨頭燒煙燻即無矣但此煙最爛絲綢布帛熏時須將衣帳搬開免破壞又方蕎麥秸煎湯淋臭蟲即死又方蒼朮番木鱉潮腦香白芷共研末燒酒搗丸蠶豆大每燒一丸臭蟲即成皮殼又方香木瓜燒煙燻即變空殼
