body:
  text: 卷二十五腿膝部自胯至腿膝彎止一切癰疽疔毒皆匯於此部中以便檢閲參治骨痿瘡門主論申鬥垣曰骨痿瘡乃足少陽膽經多氣少血其瘡生於兩胯骨上漸大筋骨俱痛蔭開流水水盡則死如胯間相對生瘡者十無一生用大馬屁勃墊睡莫令磨著內服補中益氣湯啓玄腿遊風門主論王肯堂曰腿遊風腿股忽然赤腫風熱相搏屬足太陽經宜砭去惡血準繩心法曰腿遊風在兩腿忽里忽外忽上忽下不定紅色形如堆云焮痛由榮衛風熱相搏結滯而成凡遇此證先施砭石砭去惡血外貼牛肉片以拔風甚效肚門癰門主論心法曰肚門癰生於大腿肚屬足太陽膀胱經所主上水魚門主論心法曰上水魚生委中折紋兩梢腫如高埂長若魚形色紫作痛由血熱遇外寒稽留則血瘀凝結而成外宜向腫埂上砭出惡血用二黃散即顛倒散香油調敷甚效黃鰍癰門主論申鬥垣曰黃鰍癰生於大腿外側連臀處有一條如鰍形深陷窄長或不見紅腫堅硬如石約長七八寸大者為頭小者為尾鰍頭向上者防毒內攻小腹難治鰍頭向下毒雖凶不傷命名為順證凡醫必尋其頭用三稜針先針住鰍肚次針鰍尾再用小針針住鰍頭兩邊當用艾灸三十壯左右轉針先起尾針視鰍形不動是鰍已死如動再依前法灸之內服內托流氣飲或真人活命飲外以薑汁豬膽汁好醋同調鐵箍散敷之啓玄心法曰黃鰍癰生小腿肚裡側硬腫長有數寸形如泥鰍其色微紅由肝脾二經濕熱凝結而成如期潰出稠膿者吉如潰流汙水敗漿者凶治同癰疽金鑑王肯堂曰腔陰疽又名黃鰍癰生足小肚內側微紅微腫堅硬如石三四寸許痛楚難禁足太陰與足厥陰二經濕熱又積憤所致若過時潰出清水虛火上升嘔吐不食者不治準繩大腿癰門主論陳遠公曰有腿上忽腫一塊其色如常不疼人以為癰疽也誰知氣虛之故乎夫癰成於腫未有腫而不變為癰者豫謂氣虛非癰人誰識之嗟乎氣所以行血者也氣行則血行總有邪氣斷難成腫彼邪氣之盛每成於氣血之衰其腫為癰每每作痛色必變紅赤也今即不疼色又不變是有腫之名無腫之實全是氣虛血無以養非邪盛而氣不能鼓也治法補氣以扶正不必化毒以祛邪用補中益氣湯人參五錢白朮一兩生黃耆一兩當歸五錢柴胡一錢升麻五分陳皮一錢生甘草二錢半夏二錢茯苓三錢水煎服十劑腫消此方益氣聖藥非消毒之劑何以用之消腫耶蓋真氣奪則虛邪氣盛則實真氣既虛邪氣益盛不用補氣氣何以行腫何以化耶此方補氣即所以消腫也況益以化痰去濕之品故更易收功耳冰鑑馮魯瞻曰腿癰者發於內側屬肝脾二經發於外側屬膽胃二經平陷堅硬者為氣虛當用內補黃耆湯勢焮腫痛者當用內托柴胡湯外用蒜灸錦囊申鬥垣曰陰包毒在大腿內是足厥陰肝經風熱之毒宜黃耆柴胡湯此湯治腿內近股癰疽大有神功啓玄竇漢卿曰肫疽在腿內側腫高而硬俗言此疽堅硬無膿殊不知內膿已成一時不能透出皮膚須用內托方潰膿急宜針馮魯瞻曰腿前廉為陽明白芷升麻為引後廉太陽羌活防風為引外廉少陽柴胡為引內廉厥陰青皮吳萸為引內前廉太陰蒼朮白芷為引治無遺法矣附骨疽門主論陳實功曰附骨疽乃陰寒入骨之病凡受者皆由體虛之人夏秋露臥寒濕內襲或房欲之後蓋覆單薄寒氣乘虛入里初起寒熱交作狀似風邪隨後臀腿筋骨作痛不熱不紅疼至徹骨甚者曲伸不能轉側日久陰變為陽寒化為熱熱甚則腐肉為膿此疽已成也初起萬靈丹發汗散寒通行經絡次以大防風湯行經活血滲濕補虛如生於尻臀部位漫腫作痛者內托羌活湯腿內近膝股漫腫木痛者內托耆柴湯腿外側者內托酒煎湯虛者十全大補湯加羌活牛膝防風防己如已成欲作膿者附子八珍湯膿成脹痛者針之切不可誤用損脾泄氣敗毒等藥外忌寒涼敷搽誤治必致冰凝氣血內肉瘀腐日久化為汙水敗膿流而不禁大腿漸漸腫如東瓜上過胯腹下連足底牽連漫腫皮色不紅日久潰膿色白腥穢腫仍不消痛仍不減元氣日衰身體縮小唇舌乾焦二便枯祕飲食不進者終為不吉正宗馮魯瞻曰如環跳穴即胯眼及腳跟徹痛不已外皮如故脈沉數或滑者防生附骨疽乃三陰經虛寒濕流注毒氣附著於骨而成究竟有何毒氣乃腎經陽和之氣不足故腎部隧道骨縫之間氣不宣行陰血凝滯內郁濕熱為潰為膿所以有久服八味丸令人無骨疽之語謂骨暖氣行血無壅滯毒何生焉錦囊又曰凡一切附骨癰疽皆起於腎腎主骨治宜溫補腎氣骨得陽和則腫硬自能冰解矣李東垣曰附骨疽者以其毒氣深沉附著於骨也此疾與賊風相類而不同人能辨此庶無誤焉蓋附骨疽者由秋夏露臥為冷折之風熱伏結附骨成疽賊風之候由風邪之氣搏於骨節故其痛深徹骨髓遇寒則痛甚附骨疽痛而不能轉側初按之應骨皮肉微急洪洪如肥狀是也其賊風皮骨不甚熱而索索惡寒時復汗出常欲熱尉痛處即得少寬其附骨疽初時但痛無時乍寒乍熱而無汗者經久不消極陰生陽寒化為熱而潰也賊風不治久而變為攣曲偏枯所以不同也竇漢卿曰附骨疽又名貼骨疽初起用箸頭按患處極痛是穴以墨點定灸百壯為率不拘壯數總以艾壯爆起乃其驗也可不必多灸矣大法初宜灸之方可保命若待膿成然後火針刺之百人之中能生幾何又曰骨疽之發皆由血凝氣滯徹骨痠疼或房事過勞或乘虛入水感風合寒或風毒邪熱侵乎榮衛或憂鬱傷於心肝膽腎或醇酒炙煿是以腫痛日久成膿初起宜灸百壯以骨熱為度久則宜用銀針破之血膿乃元氣盛易愈白膿乃氣弱難愈治法以獨活寄生湯兼服十全大補湯倍加茅蒼朮新昌白朮及肉桂乾薑人參黃耆當歸為先鋒之要劑治之無不愈者外用肉桂乾薑白芷防風蒼朮烏藥龜版酥炙五倍子陳小粉各等分為末加麝香少許和勻老薑汁五合醋三合蔥半斤蜜一兩同搗取汁火上熬滾乘熱調藥搽患處四向空中出毒氣時用余汁煎熱潤之以助藥力少勞戒氣絶欲除想十旬方愈若病人不遵從醫師之訓任一己之見恣情傲物憂慮萬端不能制六氣七情之私雖天醫院靈官亦不能治何況中醫乎胡公弼曰貼骨癰即附骨疽生大腿外側骨上高不見高腫不見紅痛深至骨者是也青囊陳實功曰初起通用人參敗毒散加木瓜牛膝蘇木紅花虛者十全大補湯加羌活防己牛膝已成欲作膿者附子八珍湯膿成針之體實膿黃十全大補湯體弱膿清保元大成湯又曰又有風濕相乘之證初起寒熱交作次傳腿腫作痛其形光亮微紅發熱腫痛按之如泥不便起者宜當歸拈痛湯又曰又有房欲傷寒受熱互變氣血乖違經脈橫解受病日深此等證候皆由元氣不足中來切不可誤用寒涼胡公弼曰附骨疽皮色不變熱不高阜微覺痛癢經久不潰又無膿血者發於骨髓腎主骨腎經虛憊寒邪易入入則骨氣冷而患成疽毒緊附骨而外無形證是疽之根原起於腎也宜用八味丸多加附子以溫腎氣更以十全大補湯助之腎氣一溫骨不寒而毒勢外出則疽不附骨病者自得生機矣青囊汪省之曰附骨疽乃流注之敗證也如用涼藥則內傷其脾外冰其血脾主肌肉脾氣受傷飲食必減肌肉不生血為脈絡血既受冰則血氣不旺而愈滯宜用甘溫大理脾氣脾氣一健則中州不寒而生機暢達肌肉自長氣血自運行矣理例按準繩等書咸云傷寒汗後餘邪成流注流注之壞證成附骨疽夫汗後流注易愈惟失治乃為壞證不能復生似不能變成附骨疽況附骨疽系調治可愈之證若果數變之後則壞而又壞矣又豈能復有成功乎是流注壞證變成附骨疽之說存而不論可也附骨疽門主方雷火神針治風寒濕毒襲於經絡為患漫腫無頭皮色不變筋骨疼痛起坐艱難不得安臥者用此針之蘄艾三錢丁香五分麝香二分藥與蘄艾揉和先將夾紙筒如指拇大用艾藥疊實收用臨用以蕭山紙七層平放患上將針點著一頭對患向紙捺實待不痛方起針病甚者再復一次七日後火瘡大發自取功效矣追風逐濕膏治風寒暑濕相傷以致骨節疼痛筋攣不能步履或麻木濕痹等證並效豨蘞草川烏天南星羌活萆麻子打碎半夏海風藤草烏真桂枝麻黃各三兩茅蒼朮獨活當歸白芷大黃各一兩北細辛一兩以上藥咀片用蔥汁薑汁各二碗拌藥先浸一宿次日用香油半斤同藥入鍋內慢火煎至蔥姜二汁將幹不爆時再下香油十斤方與藥相煎渣枯為度細絹濾清每油一斤下飛過炒黃丹十兩為準配用再將前油入鍋內煎滾以油滴水成珠不散方下黃丹徐徐攪入其膏已成再下研淨松香末一斤四兩再同熬化取下鍋來以盆頓穩再下乳香木香胡椒輕粉各二兩白芥子末四兩漸入攪和極勻傾入鉢內收貯旋用熱湯頓化綾緞攤貼七日後諸病可痊百發百中附骨癰將成用此法即散其法急掘地坑以火煅紅沃以童便赤體坐其上以被席圍抱下截使熱氣熏蒸腠理開氣血暢毒氣解而自愈洗寒濕腿痛真川椒一錢蘄艾四兩透骨草一兩煎湯洗附骨疽古銅錢刮末三分黃蠟三錢油核桃肉六個搗碎和勻軟豆腐衣包好用酒空心送下貼骨癰疽並寒濕氣疼痛川烏河水換煮七次草烏河水換煮七次甘草羊角尖炙研番木鱉用麻黃五錢煎湯泡一宿去毛切片土拌炒脆土木鱉去殼淨肉切片香油炒脆各一兩共為細末用赤沙糖打糊為丸如緑豆大每服一錢無灰酒送下鶴膝筋骨腫痛熟附子一兩全蠍黑豆各四十九粒八角川烏一個蚯蚓劈開繃新瓦上曬乾一兩研細末糕糊為丸每服一錢溫酒送下多骨疽門主論陳遠公曰有大腿邊旁長強穴間忽疼痛高腫變成癰疽久則肉中生骨以鐵箝取出已而又生人以為多骨癰也誰知是濕熱毒所化乎夫多骨癰之生因人多食瓜果濕熱所成者也早治一二劑便可解散無如因循失治以至濕壅添熱熱盛而化骨日久遷延臥床不能起也說者謂初起時未嘗有骨可以內散既生骨後必須爛骨外取未可全恃解散誰知不然蓋多骨證無形所化非肉中真生骨也似骨而非骨耳真骨難化似骨又何難化之有治法利濕清熱而主之補氣血之藥骨自消矣五神湯茯苓一兩金銀花三兩牛膝五錢紫花地丁一兩車前子一兩水煎服二劑輕三劑骨消四劑瘡口平五劑痊愈此以車前茯苓利水地丁清熱牛膝銀花補中散毒安得不奏功哉冰鑑王肯堂曰多骨疽又名曰剩骨又名朽骨生足脛上生疽既潰甚久而不愈腐爛出骨者是蓋因毒氣壅盛結成此骨非正骨也此疽因未潰之前補劑太過故結毒而不散也準繩岐天師曰多骨疽乃生於大腿之中多生一骨者是乃濕熱而生者也治之得法則易易耳否則變生可畏治以化骨至神丹即愈苟或失治即長一骨橫插於皮間作痛必須取出此骨始愈以鐵鋏鉗出之外以生肌膏貼之此方妙在用白芍蓋白芍能平肝木又能活筋多骨疽者非骨也筋變為骨似骨而非骨也白芍不特平肝木之火兼能散肝木之邪邪去則筋舒筋舒則似骨非骨者盡化又加金銀花原能去毒此二味之所以相濟也祕録雷真君曰大凡毒生環跳之穴即多骨疽也張仲景曰多骨之生也雖生於濕熱而成之不由濕熱也必平時喜飲涼水好食果品而成之初起宜消毒散敷之陳實功曰多骨疽者由瘡潰後久不收口乃氣血不能運行至此骨無榮養所致細骨由毒氣結聚化成大骨由受胎時精血交錯而結日後必成此疽也但腎主骨宜服腎氣丸十全大補湯先補脾腎次用艾附餅灸之令溫暖腐毒朽骨自然脫盡生肌斂口而愈正宗汪省之曰多骨疽患一二年不愈常落出骨一片或細骨或有蛀蝕眼或三五個月落骨一片此骨非營氣不從而生乃母受孕復感精氣而成理例心法曰多骨疽毋論老小皆有生者多在腮齶牙床眼胞頦下手足腿膊等處有因腎虛之人生瘡久硬不消口不收斂外被寒邪襲入與膿毒凝結於中借人之氣血化成多骨者又有初生落草肌肉之中按之如有脆骨由胎元受之精血交錯而致逮其人長大後必於脆骨之處突然發腫而生疽及潰後多骨脫出其口方收亦有多骨出之不休者名曰骨脹難愈以上二因治法皆同俱用隔附子並艾灸之以宣寒凝令骨速脫蓋骨屬腎遇寒則凝故從熱治也多骨疽門主方固本養榮湯治骨疽已成骨不吐出或既出不能收斂由氣血之虛脾胃弱也宜服之骨不出者自出口不斂者自斂大熟地當歸白芍藥川芎牡丹皮人參山萸肉白朮懷山藥黃耆蜜炙各一錢北五味炙甘草肉桂各五分水二盅姜三片棗二枚煎八分食前服生肌散治腐骨脫出肌肉生遲不能收斂者石膏赤石脂輕粉各一兩滴乳香去油一錢潮腦瓜兒竭龍骨各三錢上乳極細末先用當歸白芷甘草各一錢煎湯洗淨患上用此乾摻軟油紙蓋扎二日一洗一換化骨至神丹岐天師金銀花當歸白芍藥各一兩茵陳龍膽草白朮生甘草各三錢柴胡一錢水煎服消毒散張仲景治多骨疽初起並敷一切癰疽癤毒無論有骨無骨用之神效凡疽生於環跳之間不用此圍藥多成多骨前疽用此藥則可免多骨之患芙蓉葉曬乾大黃五倍子各一兩藤黃生明礬各三錢冰片麝香各三分各為末米醋調成如厚糊塗於多骨疽之左右四邊以藥圍其皮肉中留一頂如豆大外以醋用鵝翎不時掃之若不掃任藥干圍則無益矣一日夜即內消內消神方雷真君人參天花粉各三錢大黃五錢蒲公英一兩金銀花二兩薏苡仁三兩先用水六碗煎薏苡仁取汁三碗投藥再煎三碗分作二次服一日服兩劑即消神效咬骨疽門主論陳實功曰咬骨疽發在大腿內股不腫不紅痛徹骨髓初宜雷火針針之內用萬靈丹以酒調服之正宗箕門癰門主論汪省之曰箕門癰生於股內近膝乃足太陰脾經濕毒所生理例又曰骨毒滯瘡又名腿發乃足太陰脾經生於腿上箕門穴如痛可治不痛難治十二日可刺如膿黃赤色可治青稀腐臭者不治其瘡赤白色是骨毒氣發於外十日內未膿必死肉蜈蜂門主論申鬥垣曰肉蜈蜂生大腿外面皮膚不覺紅腫內里疼痛難忍治斯證者切不可輕用刀刺若誤犯之毒氣直透心胸疼痛不止多致不救治當用白降丹摻膏藥上貼三日後取下敗肉如蜂之狀再用生肌等藥收功啓玄胡公弼曰肉蜈蜂所生之處乃足厥陰肝經部位風濕鬱積氣血阻滯注久而成此毒一犯刀刺蜂毒直入心胸母傳子受肆毒無忌直犯君主故多不救青囊玄疽門主論陳實功曰玄疽生於左腿夾縫之下三寸漫腫連陰疼及大腿正宗陰疽門主論陳實功曰陰疽生於右腿夾縫之下三寸痛連腎子小腹亦痛正宗膝蓋癰門主論心法曰膝癰生膝蓋色紅焮腫疼痛屬氣血實疪疽亦生在膝蓋腫大如癰其色不變寒熱往來屬氣血虛和軟為順堅硬如石者逆經云肉之小會為溪溪者二肘二膝四腕也凡脾病在溪腎有邪其氣留於兩腰凡筋病皆屬於節筋乃肝之餘故又屬肝是以溪會有病皆從脾腎肝三經邪氣乘之也惟兩膝俱生屬敗證不可治也膝眼毒門主論申鬥垣曰膝眼毒先必膝眼痠痛乃成此證乃腎經感受風邪寒濕相侵而成啓玄汪省之曰膝外癰是足少陽膽經膝內癰是足太陰脾經俱多氣少血乃膝間樞紐骨節行動之處宜仔細治之免成廢疾理例王肯堂曰托疽生於膝傍腿側乃足少陽膽經多氣少血陽關穴陽陵泉穴腫焮作痛半月有膿可治如不痛出鮮血或出青黑膿及長出頭漸多或腫無定處者不治準繩靈樞云發於膝名曰疪疽其狀大癰色不變寒熱而堅勿石之石之者死須其柔乃石之者生堅如石者用生樟六根擦之效書曰諸癰疽之發於節而相應者劉涓子云應者內發透外也不可治也發於陽者百日死陽謂諸節之背發於陰者三十日死陰謂諸節之膕郤間膝眼風門主論心法曰膝眼風生於膝眼穴又名鬼眼穴在膝蓋之下左右兩骨空陷中由下焦素虛外邪易於侵襲先從膝眼隱隱作痛如風勝則其痛走注不定寒勝則痛如錐刺濕勝則胖腫曲不能伸其病在筋伸不能曲其病在骨動移不遂沉寒錮冷之候也惟在臨證詳辨單膝生者輕雙膝生者重若左膝方愈復病右膝右膝方愈復病左膝者名過膝風屬險鶴膝風門主論王肯堂曰兩膝腫痛股漸小曰鶴膝風一名鼓槌風起於中濕或因痢後腳弱緩痛不能行履名曰痢風或傷寒餘毒不能發散風寒濕氣結於經絡血脈不流以致筋愈縮而股愈細屬足少陽足陽明經準繩又曰膝上腫痛此非一端須要辨明若兩膝內外皆腫痛如虎咬之狀寒熱間作股漸細小膝愈腫大名鶴膝風急宜隔蒜灸服大防風湯倍加乳香以住痛舒筋但一膝痛引上下不甚腫而微紅名膝遊風膝之兩旁腫痛憎寒壯熱晝夜偏劇腫處手不可近為膝眼毒膝蓋上腫痛者為膝癰準繩又曰膝內臁近折紋之處結核腫痛但核形長如魚之狀名上水魚陳實功曰鶴膝風乃三陰虧損不足之證上下腿細惟膝眼腫大狀如仙鶴膝行初起寒熱交作亦宜汗解如汗後腫痛仍不見消此陰寒深伏以大防風湯溫暖經絡重者兼灸膝眼二穴敷以琥珀膏亦可漸漸收功如以上諸法治之不效終成痼疾不必勉強消之只宜先天大造丸史國公藥酒常常服之或可轉重就輕移步行履尚可圖也正宗岐天師曰此乃因濕而戰立而行房水氣襲衣故成此疾祕録李子永曰鶴膝風古人多用大防風湯內氣血藥並用以病在下焦陰分故也如岐天師除去血藥想用宜於初起之時如病久古方恐不可廢馮魯瞻曰膝間腫痛不消防成鶴膝風以膝腫如鶴足脛細脈多弦緊是也乃三陰經虛寒濕流注為患人多誤為濕熱乃至膿成氣血大虧已不可救矣不知此證與附骨疽俱腎虛者多患之因真氣衰弱邪氣得以深襲前人用附子者以溫補腎經又能行藥勢散寒邪也故體虛之人為冷氣所襲經久不消極陰生陽寒化為熱而潰也若誤用寒涼必成廢疾或攣曲偏枯或痿弱不起或堅硬如石為石疽或日久始潰皮肉俱腐為緩疽下部道遠非桂附不能下達也況腎主骨而臀以下俱屬腎非桂附不能入其經而宣行也錦囊可法良規云鼓槌鶴膝起於中濕蓋足膝屬肝肝有風寒濕氣則血脈阻滯不能流行注膝成病下股之血脈有去而無返是以愈瘦愈冷而筋愈縮上腿之血脈有積而無散是以愈腫愈熱而肌愈削其源若起於流注則肉凝者必爛爛則冷毒腐骨腐骨一出神仙無術遂成難治廢疾當皮膚未破之時則肌肉尚未死急以玉龍膏熱酒調敷膝之上腿回接陽氣以住骨痛又以沖和膏敷上腿冷處引其氣血使流動而下通貫血脈又以玉龍膏敷骨膠處以接引所引之血脈以驅散所積之陰氣內服追風丸倍加乳沒則無有不愈者矣又云一切濕痰濕熱或死血凝滯等證患在關節流注不行非用辛溫開發腠理流通隧道使氣行血和焉能得效人畏附子有毒多不肯服若用童便炮製何毒之有況中病即已又不常服何足為慮經曰有是病用是藥者此也故大防風湯活絡丹治腳氣鶴膝風證多效張真人曰此病乃立而行房風濕侵於兩膝故成此疾然治法絶不治腎止治氣而自愈亦不必治風濕也良方補遺心法曰鶴膝風一名遊膝風又名鼓槌風痢後得者為痢風單生者輕雙生者最重潰後如出白漿浮皮腫痛仍前不可用蝕藥只宜用芙蓉葉菊花葉各五錢研末大麥米飲拌勻貼之亦可止痛或豆腐渣蒸熱捏作餅貼之亦可此證系外證中之敗證收功甚難鶴膝風門主方神方岐天師黃耆八兩薏苡仁四兩白朮白茯苓各二兩防風五錢上肉桂三錢水十餘碗煎二碗分作二服上午一服臨睡一服服後以厚被蓋之必出大汗不可輕去其被令汗自干即愈一服可也不必再服此方妙在用黃耆以補氣蓋兩足之所以能動而舉步者氣以行之也今鶴膝之病則人之氣虛不能周到行步自然艱難今用黃耆半斤則氣旺極矣又佐之肉桂以通其氣又佐之防風以散邪始相惡而相濟又佐之白朮薏苡仁以去其寒濕之氣邪氣去則正氣自固此功之所以速成也若以為人不能受畏而不用則反害之矣又方黃耆四兩薏苡仁二兩防風川萆薢各三錢牛膝二兩上肉桂一錢秦艽一錢五分水八大碗煎四碗作早中晚三次服不必蓋汗服下自有汗出閉坐房中不可見風俟汗乾再出房門又方懷生地牛膝各三錢炙黃耆白朮土炒赤芍藥防己川續斷薑黃獨活各一錢當歸白茯苓各一錢五分紅花上肉桂各六分加姜二片棗二枚煎服如浸藥酒照方十倍用木瓜酒二十斤龍眼肉四兩浸飲又方生薑蔥去須各三斤共搗汁入酒糟半盅熬一盅聽用先以酒調麝香分許塗手內擦兩膝眼上紅赤令透再用陳油紙攤前膏貼患處其熱如蒸拔出大小孔如針眼其腿即可伸縮行動矣兩膝風當歸五加皮生地薏苡仁木瓜各一兩牛膝焙八錢防己二錢廣皮半夏各三錢嫩桑葉炒二兩秦艽續斷各五錢火酒八斤浸飲鶴膝風無名異五錢地骨皮三錢乳香沒藥各一錢五分麝香一分研勻用車前草搗汁入老酒調敷之五日愈張真人神方生黃耆一斤叉石斛四兩遠志肉此味最能健膝懷牛膝各三兩用水十碗煎二碗再入金銀花一兩煎一碗一氣服之服後覺兩足如火之熱教病人睡了以厚被蓋之汗出至湧泉始可去被否則斷斷不可去也一服病去大半再服痊愈不分久暫俱可如法治之鶴膝風鎮江何仁源當歸二錢粟殼獨活羌活蒿本蔓荊子川芎半夏甘草各一錢明天麻一錢二分白茯苓八分防風七分漢防己六分生薑三片水二盅煎服鶴膝風真蘄艾每次半斤煎湯乘熱熏洗洗一次漸消一日洗數次消盡鶴膝風番木鱉四兩酒泡蒸去皮用麻油四兩熬枯浮起為度再用陳壁土炒乾研細只用二兩大楓子淨仁二兩燈心同水煮過研細去油只用一兩穿山甲洗淨土炒研細一兩西附子二兩大者童便煮過去皮臍切片焙乾研細用一兩以上四味共五兩和勻收貯瓷瓶中每服七分空心溫酒調服極醉出汗七服除根小兒鶴膝門主論馮魯瞻曰小兒鶴膝如鶴之膝又名鶴節因稟受腎虛血氣不充以致肌肉瘦削形如鶴膝外色不變膝內作痛屈伸艱難若焮赤壅腫而作膿者為外因可治若腫硬色白不作膿者是屬本性難療屬外因者以荊防為主佐以益氣養榮屬本性者以六味加鹿茸補其精血仍須調補脾胃以助生化之源錦囊人面瘡門主論陳實功曰人面瘡瘡象全似人面眼鼻俱全多生膝上亦有臂上患者據古書云積冤所致先須清心懺悔改過自新內服流氣飲外用貝母為末敷之乃聚眉閉口次用生肌斂口兼服調理藥正宗岐天師曰人生人面瘡有口鼻雙眼之全與之肉且能食豈非怪病乎世人有以貝母末敷之而即愁眉閉口人以為冤家債主也而余以為不然蓋亦有祟憑焉用輕雷丸其效甚捷蓋雷丸最能去毒而逐邪加入輕粉深入骨髓邪將何隱用茯苓不過去其水濕之氣耳祕録又曰如有人臂上忽生頭一個眼耳口鼻俱全且能呼人姓名此乃債主索負之鬼結成此奇病也此證初起之時必然臂痛發癢以手搔之漸漸長大久則漸漸露形大如茶盅但無頭髮鬚眉而已如用刀割之立刻死亡不救宜服解冤神丹服後亦宜懺經念佛為妙申鬥垣曰此瘡似人而有口鼻眼多生肘膝一種活者能食口眼能動一種死者口眼不能動啓玄人面瘡門主方輕雷丸岐天師輕粉白茯苓各一錢雷丸三錢研細敷上即消解冤神丹岐天師人參八兩白朮五兩川貝母白芥子白茯苓生甘草青鹽各三兩半夏白礬各二兩共為末米飲為丸每早晚白湯各送下五錢自然漸縮小而愈病雖奇而方更神也治人面瘡痛甚者精豬肉切片貼之又方川貝母研末小蘆筒灌瘡口數日愈治死人面瘡法啓玄雖瘡有口眼人面俱全不能動不能食故名曰死人面瘡也須俟人家有死人裝棺材煞釘時斧頭敲釘一下用手指將瘡按一下男人患瘡用女人手按女人患瘡用男人手按按一下問患人一聲瘡好了患人即答應一聲好了好了待敲釘聲止則止即愈骨槽疽門主論申鬥垣曰骨槽疽生於膝蓋上並腳跗上腕痛如刀割癢似蟲鑽急用艾灸疽上三五壯治同附骨疽啓玄伏兔疽門主論心法曰伏兔疽乃胃經穴道在膝蓋之上六寸正中用力大如手掌一堆高肉處是也患疽禁用針灸如發寒熱交作疼痛徹心由胃火毒滯而成潰後最難收斂下石疽門主論心法曰下石疽生於膝間毋論膝蓋及左右俱可生堅硬如石牽筋疼痛腫如雞卵皮色不變並無焮熱難消難潰難斂但此證腫潰俱涼若能涼化為熱見諸善證者始吉否則難痊腿膝緩疽門主論王肯堂曰緩疽其患熱緩慢積日不潰久乃赤紫黯色皮肉俱壞故名緩疽是寒氣深伏腿膝骨間而成治宜溫補準繩心法曰緩疽由外寒深襲血瘀凝滯而成生於兩膝上或生於兩膝傍腫硬如饅木痛日增其色紫黯積日不潰證之情形與下石疽相似惟多焮熱腫久則腐爛肌肉皮膚治與癰疽門法同下𤷍𥱽門主論申鬥垣曰下𤷍𥱽又名膝彎癰乃腎經感受寒濕攻注膀胱血凝氣滯風寒不散遂成此證治當千金內托散加木通車前子何首烏淡竹葉啓玄委中毒門主論王肯堂曰委中毒在膝後折紋即膝後膕內約紋中堅硬如石微紅微腫屬少陽膽經由臟腑積熱流入膀胱治之稍遲則筋縮必成廢疾準繩申鬥垣曰委中毒生於膝彎內乃腎經氣血阻滯而成啓玄心法曰委中毒生委中穴穴在膝後膕中央約紋陷中即是約紋者折紋也又名血郤穴屬膀胱經俗名腿凹經曰膕中由膽經積熱流入膀胱壅遏不行而成木硬腫痛微紅屈伸艱難治宜速用活血化瘀逐下惡血為效緩則筋縮而成廢疾諸書皆云兼刺委中穴血出自消然刺穴必兼有腰痛不能轉移者方可刺之即出血亦不可過多多則令人身撲面色脫色亦有焮痛色赤潰速者由濕熱凝結所致故耳四彎風門主論心法曰四彎風生於兩腿彎及兩腳拗每月一發形如風癬乃風邪襲入腠理而成其癢無度搔破津水形如濕癬治當大麥一升熬湯先熏後洗搽三妙散滲濕殺蟲之藥其癢自止緩緩取效金鑑流火門主論凡腿上或頭面紅赤腫熱流散無定以鹼水掃上旋起白霜者此流火也流火兩腳紅腫光亮其熱如火者是駱潛庵曰腿腳紅腫名火延丹流火門主方貼骨火天茄子搗爛醋調敷之諸般火黃柏草烏各等分研細末用水口中漱過吐出調藥鵝毛掃數次腳下火煤炭研細陳醋調敷流火衛生備要野辣芥子五錢研細醋調敷腳上流火廣煤用紅糖醋磨敷流火當歸生地防己川牛膝知母各三錢生薑汁半杯水煎臨晚服服後再吃晚飯不可過飽一劑自好流火蘇薄荷黃柏豬苓赤芍木瓜甘草陳皮川芎蒼朮川牛膝羌活薏苡仁天花粉蔥姜引服一二劑加當歸澤瀉木通引換薑棗自愈敷流火雄黃百草霜食鹽各等分蚯蚓糞塊煤炭加倍醋調敷流火馬前子水磨濃汁雞翎掃紅腫上一日五七次其疼即止紅自退兩三日腫全消流火腿腳通紅用炭三斤燒紅以水一盆將紅炭淬入水內其水必熱將紅處洗之即消流火腳氣取活大蛤蟆肚子合足底以絹帛縛好看蛤蟆眼睛紅即解下放去另換一個再縛之自愈火延丹白海蜇皮洗淨拭乾包扎腫處一伏時揭開看如蜇皮黃枯即另換一張包裹如此者三四張即能消散矣腓腨部自三里穴起至腓腨止一切癰疽瘡毒皆匯於此部以便檢閲參治三里發門主論鬼遺方云三里兩處起癰疽名三里發初發如牛眼睛青黑五七日破穴出黑血汁膿腫攻膀肚連腿里拘急冷痛此因傷筋氣勞力所成宜用湯藥注射其外毒自平息矣心法曰三里發生膝眼下三寸外側前廉兩筋間初腫形如牛眼拘急冷痛由勞力致傷筋骨鬱熱凝結而成漸增腫痛其色青黑潰出紫血次出稀膿治同癰疽金鑑合陽疽門主論汪省之曰合陽疽乃足太陽膀胱經濕熱之毒在膝下腿外側理例腳氣瘡門主論心法曰腳氣瘡生於膝之下足之上腿脛腫胖癢痛破津黃水上結黃痂皆由濕熱內搏滯於膚腠外為風乘不得宣通形類黃水瘡惟身體壯熱心神煩躁經久難瘥為異金鑑臁瘡門主論陳實功曰臁瘡乃風熱濕毒相聚而成也外臁多服四生丸內臁多服腎氣丸正宗馮魯瞻曰婦人兩臁生瘡或胎産調理失宜傷損脾胃或憂思鬱怒虧損肝脾以致濕熱下注外臁屬足三陽易治內臁屬三陰難痊若初起發腫赤痛屬濕毒所乘人參敗毒散若漫腫作痛或不腫不痛屬脾虛濕熱下注補中益氣湯或八珍湯加萆薢銀花之類若膿水淋瀝體倦少食內熱口乾屬脾氣虛弱補中益氣湯加白茯苓酒炒白芍若午後發熱體倦屬血虛前湯加川芎熟地或六味地黃丸若肢體畏寒飲食少思脾腎虛寒十全大補湯八味地黃丸色赤屬熱毒易治色黯屬虛寒難治錦囊周文採曰夫臁瘡者皆由腎臟虛寒風邪毒氣外攻三里之旁灌於陰交之側風熱毒氣流注兩腳生瘡腫爛疼痛臭穢步履艱難此瘡生於臁骨為重以其骨上肉少皮薄故難易愈也集驗申鬥垣曰里臁是足厥陰肝經外臁是足陽明胃經主之啓玄又曰裙邊瘡是受裙邊風所致不戒房事故久久不瘥又曰腿臁生瘡最忌房事犯之則漸漸開張腐臭故有傷守瘡之名言其不守禁忌也今人因其搔癢遂疑瘡中惹指甲鋒名之曰傷手瘡實非也又曰裙邊瘡即褲口風瘡又曰褲口毒生踝骨之上者是也明醫集云一女子患臁瘡百藥罔效每月醫治新肉長滿忽瘡中流血三日漸止別無他苦衆醫不識或一醫問曰月經如期否女曰已一年不至矣醫遂用引血歸經藥服之月餘外以生肌膏丹收口而愈此乃抑鬱損傷肝脾錯經之證所以引血歸經歸故道而瘡自愈矣心法曰外臁屬足三陽經濕熱結聚而成早治易於見效內臁屬足三陰經濕兼血分虛熱而成且臁骨皮肉澆薄難得見效極其纏綿金鑑蔣示吉曰臁瘡紅者多熱腫者多濕癢者多風痛者屬實早寬而暮腫者屬氣虛下陷初起者風熱濕毒為多日久者下陷濕熱為勝說約臁瘡門主方驗方陳燭油熬去渣淨四兩白蠟黃蠟各五錢共入鍋內熬數滾入研細銅緑三錢熬一滾傾入瓷瓶內退火氣取陳油紙一塊銀針多戳小孔照瘡大小將藥攤上不可見火再用戳孔油紙一塊蓋上縫合聽用先將花椒蔥煎湯洗瘡絹片拭乾貼上軟袱縛緊一晝夜揭開又洗拭淨將膏翻貼戒房事發物又方白蠟五錢真銀粉二錢冰片五分蘆甘石一兩火煅兩個時辰黃白色用黃連一錢煎水拌勻曬乾研細用麻油調勻攤油紙上照瘡大小煎成以下米水洗瘡拭乾貼上一膏可貼三日又方石決明一個煅赤石脂一錢煅蘆甘石童便浸煅一兩五錢冰片四分麝香二分研細犍豬油調搽又方茵陳二兩白鮮皮蒼朮各五錢煎湯洗再用陳石灰黃柏末各等分研細篩於患上包扎數日即愈又方黃蠟化攤冬青葉上貼縛定一伏時換一葉七日換七葉愈又方溏雞屎敷之又方黃蠟熔化油紙攤成膏十二張半日一換換者以先貼者加於上不待盡而愈矣又方韭菜地上蚯蚓糞干為末入輕粉末清油調搽白珏膏銀粉密陀僧黃蠟各二兩乳香去油沒藥去油象皮白蠟各五錢輕粉四錢除黃白蠟不研余俱另研細末聽用以真桐油一斤放鍋內熬滾去沫油清入密陀僧末攪勻取起入二蠟熔化攪勻待油稍溫方入乳沒象輕末攪二百餘遍以大棉紙攤上陰乾隨瘡大小圓長煎貼初貼時瘡中毒水流出膏藥變黑再換新者貼之又方先用蠟豬油一兩黃蠟六錢熔化入研細鉛粉二兩輕粉三錢攪勻加冰片一分任搽之又方黃蠟八錢香油一兩熬化入銅青一錢冷定敷之又方天花粉五錢熟石膏八錢研勻麻油調搽又方大片黃柏用犍豬膽汁浸透曬乾又浸又曬如是七日研細仍用豬膽汁調搽或乾摻先以花椒湯洗拭乾搽之住癢止水又方白蠟八錢黃蠟五錢川椒二錢銅青三錢先將麻油四兩同黃白蠟入銅杓內熔化次下川椒銅青末收之以油紙作夾紙膏用銀針戳眼數百孔先以蔥椒湯洗淨貼之日換三次四五日自痊愈又方冬青葉不拘多少入香油內煎成膏攤帛上貼之又方甘蔗渣曬乾炒極燥為細末桐油調敷裹腳纏好三日後方可開看先用蔥椒湯洗夾紙膏川黃連黃柏各二兩大黃黃丹各一兩牡蠣鬱金各五錢沒藥四錢乳香三錢血竭二錢五分麝香一錢五分輕粉三十貼共為細末清油調勻攤油紙上每一個貼三日先用豆腐漿水洗三次後貼膏藥膏藥亦翻轉三次兩層夾紙以針刺眼透藥臨用旋攤隔紙膏胡公弼無名異洗淨微炒一兩龍骨血竭乳香沒藥雄黃牛黃阿膠海螵蛸各二錢赤石脂鬱金黃柏黃丹各五錢輕粉一錢上為細末香油調用黑傘紙刺孔作隔紙膏先用鹽蔥花椒湯洗淨拭乾貼之三日一換臁潰成潭方長平白菊花不拘多少預收曬乾去蒂研末先以米泔水溫洗瘡淨拭乾將花末填滿瘡中用指按實有水浮起添末又按按至瘡干無水再以草紙包好軟絹扎少頃開看如紙濕添末又按實包起過夜即結疤不必開看亦不可剝動五日痊愈年久臁瘡疼痛不堪濟生老松香如琥珀者一兩血竭輕粉枯礬赤石脂各二錢銅緑八釐真麝香冰片各二分上將各藥稱准乳鉢內不換手順研極細瓷瓶盛封固如用每次二錢真桐油調勻油紙攤成隔紙膏兩邊不可戳孔用濃茶洗患處膿淨貼上每膏一張兩邊各貼一日第三日須另換新者半月可愈千槌膏治頑臁久不收口輕粉銀硃銀粉各等分同犍豬脊髓千槌成膏攤隔紙膏貼之又方此由腎臟虛寒風熱毒氣流注兩腿水銀當歸各五錢川芎貝母各二錢五分乳香沒藥各五錢真麻油五兩黃丹二兩五錢除黃丹水銀外先將群藥同麻油熬黑色去渣下黃丹水銀又煎黑色用桃柳枝攪成膏以油紙攤貼臁瘡血瘋臭不可聞痛不可忍者柏油桐油入鍋內熬以老嫩得宜取傘紙攤勻照瘡大小剪就針戳密眼貼之或用陳油紙亦可攤貼白玉膏治多年頑臁兼治大毒刀瘡久不收口白蠟二兩豬板油四兩熔化濾清入潮腦六錢研勻冷定加輕粉三錢冰片二錢和勻抿腳挑塗油紙蓋上臁瘡並治乳癰桑白皮取在土中根不見天日者去外面白皮又去內里筋骨只用白皮槌極爛如棉絮者陳石灰各等分研勻同生桐油搗爛敷之臁瘡並治血瘋瘡白蠟黃蠟各一兩頭髮面洗去油罐內煅灰螵朱各三錢金頭蜈蚣十條煅上用麻油四兩熬滾中調攪勻以陳油紙或舊氈攤勻聽用先將患上用五皮湯或甘草湯蘄艾湯蔥湯童便俱可淋洗洗去瘡上黑腐穢物絹帕拭乾用黃蠟貼患上拔去惡水務須勤洗勤換為主俟惡水去盡約十日外後用此膏貼之腐肉自脫新肉漸生再上玉紅膏收口傷守瘡江以言廣炭燒紅透悶熄松花粉各等分研極細先將瘡用冷米泔水洗淨拭乾將藥乾摻絹片扎好每日一換數次即愈裙邊瘡啓玄大楓子一百粒川椒輕粉各一錢枯礬五分研細以真柏油調搽臁瘡數年爛腿錢青掄白蘆甘石煅淬醋內七次研極細麻油調敷日換取效又方呂蜀生嫩松香鉛粉各二錢蔥白七寸豬板油一兩同搗成膏貼之腿瘡年久不愈罐口泥研細摻上立愈濕毒臁瘡章子試桐油二兩加川椒三十粒煎枯椒為度去椒不用加研細輕粉二錢白蠟一兩收成膏用棉紙拖成膏藥先用苦參洗淨瘡上貼之兩日一換三次愈又方醋浸冬青葉飯上蒸透拭乾貼之又方韭菜邊葉淨水洗過入滾水煎數沸取湯洗臁瘡拭乾以渣槌爛敷瘡口扎緊一日一換數日自愈裙邊瘡心鏡傳嫩長桑根白皮刮去粗皮用不落水豬油搗勻敷即愈又方梨葉百斤豬油二兩將葉在鍋內炒拌次下研碎上好白蠟二兩拌在葉內令化在葉上又下蠟一兩亦拌在內但宜用微火燒不可使藥炒焦取起冷定貼之神效又方小蒜地上蚯蚓糞焙研麻油調搽治腳上一切瘡抄本珍珠琥珀輕粉乳香去油沒藥去油石膏黃丹各一錢壁上蝸牛殼四錢乳細末搽臁瘡五六年者鉛一兩打極薄片剪碎和水銀三錢加去膜豬板油研爛攤油紙上外以川椒二兩煎湯洗淨貼之又方黃牛屎尖用陰陽水各一碗和勻化開濾去渣加醋一碗大冬青葉四十九片砂罐內用文武火煮乾留水醋半盞浸在內每日以葉貼瘡一天換三次葉盡即愈矣永不發臁瘡潰爛心岐傳川椒松香黃蠟各一錢四分共研忌鐵器用連根蔥白十四段共搗爛做夾紙膏攤貼抓傷腿臁傷水腫痛難忍者鄭師甫云豫嘗病此一丐傳此方遂愈耳垢封之一夕水盡出痊愈不拘遠近臁瘡周鶴仙舊爛牛皮鞋掌子取下砍碎陰陽瓦煅存性為末麻油調敷神驗之極又方油麵饊子一兩把蔥白五六根同搗極爛將瘡洗淨敷上用布扎緊即愈神效無比切切不可忽視臁瘡棒瘡腫毒生肌收口可做隔紙膏貼劉長隨黃連黃芩黃柏銀硃紅花紫草各二錢苦參當歸各五錢大黃三錢研為細末先用臘月豬油一斤切碎隔水煮出油來去渣再入藥加羊膽二三個或牛膽一個煮半炷香又濾去渣又加乳香去油沒藥去油血竭兒茶明雄各二錢潮腦五錢冰片一錢黃蠟切片三兩乳細入內攪勻再煮半炷香傾入瓷瓶內不可泄氣凡一切大毒敷之如神棒瘡貼一二張即好如有腐爛不盡之肉少摻輕粉腐去肌生如不收口用南北鉛霜一錢加紅升藥四分細細篩瘡上一二次即愈臁瘡吳魯南鮮桑樹白皮搗爛同粽子再搗照瘡大小做成餅貼上不過七枚痊愈又方線香研細桐油調將油紙以針刺孔攤夾紙膏貼又方鳳尾草搗爛作餅敷之又方劉太和萆麻仁研爛黃丹乳香沒藥百草霜松香各等分香油調或陳燭油調攤油紙上貼外以筍殼布條扎住三日一換換時以蔥根五七莖煎洗之又方烏桕樹葉入醋內浸一宿貼患處不時換之臁瘡並治杖瘡桐油一半香油一半入槐花一合熬枯去渣入松香五錢煎一沸濾去渣又入黃蠟五錢熬至滴水不散為度再入乳細陳石灰枯礬各二錢乳香沒藥血竭各一錢五分再熬黑單油紙攤膏先用蔥白防風煎湯洗淨膏貼患處候瘡好皮老再去膏藥又方犍豬膽汁四兩嫩松香八兩共搗千槌再入土地黃根一寸搗膏用六安茶簍上箬葉水浸軟以針刺孔將膏攤貼又方金元立先用石膏豆腐同桐油拌勻作餅如瘡口大貼上用油紙蓋住一日一換連換七日再用川黃柏細末同濃茶和成餅貼上絹片扎好每日揭去餅俱用自己小便洗淨再用龍骨二兩煅乳香沒藥俱用箬葉焙去油鳳凰衣新瓦焙乾血竭兒茶各二錢共乳細末以竹筒用紗幔作篩篩藥於瘡口自愈戒房事忌發物此法並治驢眼瘡一切腳下毒瘡又方大蒜瓣子燒灰麻油調搽又方柿葉燒灰存性同川椒末搽積年爛腿新鮮白蘿蔔陰乾一兩日其皮剝下貼上干則再換數次愈臁瘡風濕膏藥張念亭糧船上北蔥三十六根先將麻油一斤半熬入蔥一根熬枯取起又熬一根如法將蔥熬完濾清熬至滴水成珠入炒杭粉一斤和勻成膏攤貼頑臁汪七來犍豬脊髓五條熬油入銅緑三錢乳香沒藥各二錢成膏攤貼收口時去銅緑另熬一料貼之臁瘡並諸瘡不收口青石上白筋以刀刮下乳細同荔枝肉搗成餅貼又方五倍子焙百草霜各等分研細入黃蠟化勻攤隔紙膏貼又方黃柏輕粉研細豬膽汁調用濃茶洗淨貼上絹包好一旬一換又方桑樹里白嫩皮槐樹里白嫩皮搗膏做餅以生桐油浸之貼上疼痛漸止三日收口又方牛蹄甲油拌燒灰敷又方白蘿蔔搗爛罨一晝夜每日一換數日效又方豆腐皮為末人乳調敷又方海螵蛸研極細末搽之又方不見水豆腐渣做餅貼上毒水拔出然後用藥又方乳香去油沒藥去油研細搽之定痛血瘋瘡門主論陳實功曰血瘋瘡乃風熱濕熱血熱交感而成也初起瘙癢無度破流脂水日漸沿開形同針眼外搽解毒雄黃散如意金黃散俱可如年久紫黑堅硬氣血不行者用磁鋒砭去惡血再以神燈照法熏之以解鬱毒正宗馮魯瞻曰婦人血瘋瘡因肝脾二經風熱鬱火血燥所致其外證身發疙瘩癢痛非常搔破成瘡膿水淋漓內證月經無定小便不調夜熱盜汗惡寒憎熱倦怠懶食宜先用加味逍遙散或小柴胡湯合四物湯多加胡麻子後以歸脾湯加熟地去木香此乃遍身所發血瘋瘡治法非單指足下血瘋瘡也錦囊申鬥垣曰血瘋瘡多在兩小腿裡外臁上至膝下至踝骨乃血分受風邪而生也多癢抓破出黃水成瘡況內有蟲啓玄血瘋瘡門主方驗方白螺殼叮東壁土牆上者煅密陀僧竹蛀蟲糞各等分研細將瘡用五皮湯或甘草湯洗乾摻之又方田中蚯蚓糞瓦焙末醋調貼上即癢不痛但癢定即長肉矣又方龜殼一個燒存性桐油調搽又方密陀僧研末多年陳竹燈掛燒瀝下油調搽又方輕粉銀粉舊皮靴底糠煨各等分共研細乾摻又方土黃連一兩花椒七粒食鹽二錢胡椒陳醋浸搽又方茵陳不拘多少煎濃汁洗又方土茯苓一兩犍豬油一塊威靈仙白朮紅花蒼朮金銀花生地黃白殭蠶荊芥豬苓澤瀉各一錢水二盅煎一半早晚各服半盞又方白蠟五錢松香二錢生蔥一根豬油一塊蜜糖半杯共搗爛攤隔紙膏貼又方烏藥切碎以屋上陰陽瓦焙為末醋調以雞翎掃上慢慢的半日功夫一二次即好又方先看腿上瘡大小買紅油紙照瘡略大一分剪如式將鍋燒熱以紙鋪鍋內炙熱用黃蠟在紅紙上摩遍取起冷片刻又放鍋內炙熱加輕粉末一二指甲掃勻貼上奇效又方男子頭垢不拘多少破舊棉網巾燒灰一錢真香油煎熟調勻入真輕粉五分作膏貼之七日痊愈又方濟生人指甲三錢血餘二錢乳香沒藥各一錢輕粉白蠟各五錢冰片五分水銀二錢同鉛二錢煅死同桐油一盅先將血餘指甲熬至指甲枯血餘化取出研細俟油滴水不散離火下群藥惟冰片待冷方入攤貼潮腦膏啓玄黃連一兩白芷五錢輕粉川椒各三錢潮腦二錢共為細末用熟菜子油調稠攤在一個大碗底上倒合將瓦高墊用艾四兩揉作十團燒煙燻碗底上藥如油干再添油拌再熏必待艾盡乘熱搽在患上外用油紙草紙包之次日即消不過三宿全好血瘋臁瘡先將溫茶將瘡痂潤透再以熱湯熏洗使痂自落再用染坊靛花浮沫鵝翎掃上堆積為度將膏貼之如作癢以手撲之切勿抓破如有潰陷之處用銅店極薄銅片照瘡大小剪貼吸盡毒水自然新生矣血瘋瘡及腳面瘡窠形如針孔黃水淋漓隨流隨化先用豆渣敷拔去水再用棉花燒灰冷定研細干則生桐油調搽濕則乾摻血瘋瘡並治疥瘡煙膠三錢黃丹一錢五分研細香油或柏油調搽血瘋瘡牛皮癬三日見效除根輕粉黃蠟各一錢真麻油半盅煎化調勻用油紙攤膏貼上將布扎緊不可輕動自有功效血瘋臁瘡隔紙膏麻油半斤文武火熬入白蠟一兩黃蠟二兩又熬離火下飛丹二兩攪勻入乳細蘆甘石乳香沒藥血竭兒茶各五錢輕粉三錢冰片一錢作隔紙膏貼之血瘋瘡馬齒莧焙乾淨末五錢黃丹飛黃柏兒茶枯礬各三錢輕粉一錢共為末生桐油調攤紙上先用蔥椒湯洗淨貼之血瘋瘡並治癬瘡蟲瘡坐板瘡疥癩瘡大楓肉蛇床子各五錢水銀二錢枯礬白錫各一錢為末先將錫化開次入水銀再入末藥柏油共搗勻搽瘡宜幹些臘豬油亦可用血瘋頑臁揚州房揚文蘆甘石用黃連黃芩黃柏各一錢煎湯將石火煅淬湯中七次如有餘汁煮乾象牙末微炒銀硃各三錢黃蠟白蠟各五錢輕粉一錢五分官粉煉黃色一兩冰片三分豬板油四兩先熬去渣入二蠟化開離火即下細藥攪勻用連四紙七張層層攤勻將瘡先用蔥湯洗淨貼之三日揭去貼肉一張即好七張重疊一齊貼上三日揭去揭完痊愈血瘋瘡張太和野芹菜搗爛敷五七分厚油紙裹緊兩次愈年久生瘡孔如蜂窩及膿水瘡血瘋瘡如意草搗爛敷或陰乾微炒研末雞蛋清調搽血瘋瘡流水作癢煮雞蛋黃熬油和黃丹再加輕粉少許搽又方飛丹輕粉各一錢冰片一分共乳細先用防風荊芥銀花甘草煎湯洗淨再搽紙包好又方枯礬海螵蛸黃蠟銅緑輕粉各一錢研細入麻油熬成膏敷血槽風門主論申鬥垣曰血槽風生小腿實處可治毒氣多流腳面如腳發背啓玄濕腫門主論陳實功曰濕腫者胸膈不寬小水不利而目浮腫漸至遍身此乃土傷不能主化之故也有飲食後驟受風寒有飢渴時誤餐生冷寒積於中食不克化皆能致之治當疏通稼土溫養脾元則小水自利浮腫自消二蛟散主之正宗濕腫門主方敷水腫干黃土四兩朴硝一兩生大黃二兩研細蔥汁調敷腎臟風瘡門主論王肯堂曰腎臟風屬腎虛風邪乘於臁脛以致皮膚如癬或漸延上腿久則延及遍身外證則瘙癢成瘡膿水淋漓眼目昏花內證則口燥舌乾腰腿倦怠吐痰發熱盜汗體疲治當用六味地黃丸準繩心法曰腎氣遊風多生於腎虛之人腿肚紅腫形如雲片遊走不定痛如火烘此由腎熱內蘊外受風邪膀胱氣滯而成腎臟風瘡門主方腎氣遊風紅腫痛疼如烘豆腐研調黃柏末敷之黃蠟膏龍骨煅赤石脂煅血竭各三錢共研細末用香油一兩入血餘栗子大一團炸枯去渣再入黃蠟一兩白膠香三錢熔化離火再入前三味末攪勻候冷瓷罐盛之用時捏作薄片貼瘡上絹帛縛定三日後翻轉貼之濕毒流注門主論王肯堂曰濕毒流注生足脛之間生瘡狀如牛眼或紫或黑膿水淋漓止處即潰爛久而不斂乃暴風疾雨寒濕暑氣侵入腠理而成準繩又曰下注瘡又名濕毒瘡生腳膝間膿水不絶連年不愈因脾胃虧虛濕熱下注以致肌肉不仁而成瘡也在外屬足太陽少陽經在內屬足厥陰太陰經女貞葉貼之效胡公弼曰皮如針眼淌水腥臭腿腳延蔓者是也拖紙膏主之青囊申鬥垣曰兩腿腐爛臭氣難聞者是也乃濕熱為患宜清濕熱啓玄凡濕毒所生之瘡皆在兩足脛足踝足背足跟初起微癢水出久而不愈內服補中益氣湯合二妙散外搽制柏散為主良規心法曰此症生於腿脛流行不定或發一二處瘡口形似牛眼根腳漫腫輕則色紫重則色黑潰破膿水浸損好肉破爛日久不斂乃暴風疾雨寒濕暑火侵入肌膚而成也初覺急服荊防通聖散加木瓜牛膝防己蒼朮消之若腿脛至晚發熱者宜服當歸拈痛湯加牛膝腫痛全消再搽輕粉散斂之金鑑濕毒流注門主方制柏散厚黃柏數斤入糞坑內浸一百日取出入黃土內埋三日取出曬乾研細末如瘡有水乾摻干則以蜜調搽之分濕消毒丹黃丹二兩鉛粉炒白蠟各一兩乳香去油沒藥去油兒茶潮腦松香各三錢輕粉一錢血竭五錢冰片麝香各五分銅緑三分蚯蚓糞韭菜地上者二兩炒乾一兩五錢共為絶細末先用蔥湯洗濕之時摻在瘡口之上必然癢不可當但不可用手抓其癢少頃必流黃水如金汁者數碗再用蔥湯洗之又摻又流又摻如是者三次則水漸少而痛漸止矣明日用前膏藥以厚皮紙攤膏仍入此藥二錢任其水出倘癢之極外以鶴翎掃之則不癢分濕內化湯薏苡仁二兩金銀花白茯苓各一兩牛膝半夏甘草川萆薢各五錢肉桂五分水煎服拖紙膏吳丹垣麻油半斤入廣膠一條熬化再下黃蠟二兩熔化傾碗內入血丹玄明粉各二錢五分皮紙攤貼數次即干輕粉散輕粉一錢五分黃丹黃柏密陀僧茶葉乳香去油各三錢麝香三分研細密貯先用蔥熬湯洗淨再搽爛腿瘡懷德堂百草霜乳香去油窯煤各三分沒藥去油一分五釐血竭龍骨輕粉各一分生芝麻一撮研生雞子調做隔紙膏貼兩腳俱是青疙瘩腫痛骨疼獨蒜切片約三個錢厚放青處艾灸三炷換蒜又灸至愈若患處大搗蒜餅鋪上聚艾灸之腿上濕瘡成片出水時痛時癢黃柏一兩乳香三錢如癢加潮腦二錢共為末乾摻如瘡干豬油調搽三妙散生蒼朮檳榔生黃柏各等分研細搽之滲濕止癢如濕癬用蘇合油調搽螵蛸散張景嶽治濕熱破爛毒水淋漓等瘡或下部腎囊足股腫痛下疳諸瘡無不神效海螵蛸不必浸淡人中白或人中黃亦可各等分上為細末先以百草多煎濃湯乘熱熏洗後以此藥摻之如干者以麻油或熟豬油蜜水俱可調搽如腫而痛甚者加冰片少許更妙若濕瘡膿水甚者加密陀僧等分或煅過官粉亦可或煅蘆甘石更佳飛丹散寒濕風濕腳腿等瘡先用百草煎湯乘熱熏洗飛丹人中黃白更妙輕粉水粉各等分為末乾摻外以油紙包扎若干陷者以豬骨髓或豬油調貼之附陰疽門主論陳實功曰附陰疽生在內踝上三寸初生小泡漸生赤腫破流血水痛亦徹骨不能步履者是正宗心法曰附陰疽生內踝上三寸初如紅粟疼痛日增堅硬赤腫漸如雞卵系三陰交會濕熱積聚而成治同癰疽但三陰交系純陰之穴收斂遲緩調理不可不慎金鑑瓜藤纏門主論王肯堂曰瓜藤纏生於足股生核數枚腫痛久之潰爛不已屬足太陽經由臟腑之濕熱流注下部所致準繩心法曰若濕熱下注繞脛而髮結核數枚日久腫痛腐爛不已名曰瓜藤纏金鑑接骨發門主論鬼遺方云兩腳接骨近上膀肚下一處起丹疽如胡桃大硬如物打磕之狀不苦痛但腫急脹慮其損筋亦須早出膿毒可保平安心法曰接骨發生於腿肚之下脛骨與足後跟骨相接處故名之此屬膀胱濕熱凝結而成初如核桃其硬如物打磕碰之狀急脹微疼色紅漫腫膿宜速潰遲則膿毒損筋筋脈既傷腿缺踵行踵行者不能全足踏地惟恃足指著力而行也治同癰疽門法金鑑黃鰍癰門主論心法曰黃鰍癰生於小腿肚裡側疼痛硬腫長有數寸形如泥鰍其色微紅由肝脾二經濕熱凝結而成破出稠膿者吉潰出汙水者危治同癰疽門法鱔漏門主論心法曰鱔漏緣濕熱而成初起頗類濕瘡生於腿肚痛癢相乘破流黃水綿綿不已其孔深如鑽眼復受寒氣侵入瘡口以致瘡寒肌冷宜每日用艾葉老蔥熬湯先熏後洗俟瘡口發熱覺癢時貼黃蠟膏收斂而愈金鑑青蛇便門主論鬼遺方云青蛇便生足肚之下結塊長二三寸許寒熱大作飲食不進屬足少陰與足太陽二經由腎經虛損濕熱下注所致頭向上者難治頭向下者刺出惡血如老弱之人嘔吐腹脹神昏脈躁者必死王肯堂曰青蛇便生足小膀上下頭生望上攻走入腹者不可治頭生向下尾在上即為順可治也準繩申鬥垣曰青蛇便即青蛇癰生小腿上有一條如蛇大者為頭小者為尾初起宜表汗啓玄心法曰青蛇毒即青蛇便生於小腿肚之下形長二三寸結腫紫塊僵硬頭大尾小憎寒壯熱火痛不食皆由腎經素虛膀胱濕熱下注而成蛇頭向下者毒輕而淺急刺蛇頭半寸出紫黑血隨針孔搽拔疔散外敷離宮錠內服仙方活命飲加黃柏牛膝木瓜亦有蛇頭向上者毒深而惡急刺蛇頭一二寸出紫黑血針孔用白降丹細條插入五六分外貼太乙膏敷紫金錠若毒入腹嘔吐腹脹神昏脈躁俱為逆證金鑑脛疽門主論靈樞曰發於脛名曰兔齧其狀如赤豆至骨急治之不急治害人也魚肚癰門主論申鬥垣曰魚肚癰生小腿肚上多因幼小坐臥濕地引入風邪寒濕透入骨間遂成此證半月不治毒氣攻心則死啓玄腓腨疽門主論王肯堂曰腓腨疽生足小肚寒熱煩躁屬足少陰腎經由腎水不足積熱所致古云不治潰出血膿者生潰出清水者死準繩又曰風疽生腳腨及曲䐐中癢搔則黃汁出準繩心法曰腓腨即小腿肚也由腎虛膀胱積熱凝結而成古方悉云不治若焮赤高腫疼痛潰出正膿而兼血者為順如漫腫下塌紫暗臖痛潰出清水者為凶初服仙方活命飲潰後八珍湯氣血兩虛十全大補湯下虛者用八味地黃丸補之金鑑
