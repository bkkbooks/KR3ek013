body:
  text: 卷九論辨膿法李東垣曰夫瘡腫之疾毒氣已結者不可論內消之法即當辨膿生熟淺深不可妄開視之可否不至於危殆矣凡瘡疽腫大按之乃痛者膿深也小按之便痛者膿淺也按之不甚痛者未成膿也若按之即復者有膿也不復者無膿也非也必有水也以手掩其上大熱者膿成而自軟也若其薄皮剝起者膿成也其腫不甚熱者膿未成也十書經曰膿血交黏用藥可全色鮮紅活腐肉易脫氣敗血衰神仙嘆哉齊氏曰若發腫部軟而不痛者血瘤也發腫日漸增長而不大熱時時牽痛者氣瘤也氣結微腫久而不消後亦成膿此是寒熱所為也留積經久極陰生陽寒化為熱以此潰者必多成瘤伍氏曰瘡腫赤色按之色不變者此膿已成也按之隨手赤色者其亦有膿也按之白色良久方赤者此遊毒已息可就赤白盡處灸斷赤腫自消凡以手按之若牢硬未有膿也若半軟半硬已有膿也又按腫上下不熱者為無膿熱甚者為有膿宜急破之澄曰凡腫瘍按之軟陷隨手起者為有膿按之堅硬雖按之有凹不即隨手起者為膿尚未成不可輕易決破又曰凡大按乃痛者病深小按便痛者病淺按之處陷不復者無膿按之處即復者有膿按之不復者可消若按之都牽強者未有膿也按之半軟者有膿也又以手按上下不熱者無膿若熱者有膿凡覺有膿急當破之無膿但氣腫若有血慎之慎之不可針破也用諸拔毒之藥敷散四圍堅中間軟者此為有膿也一邊軟亦可有膿都堅硬者此為惡核或有氣也都軟者此為有血或血瘤也當審堅硬虛實為要若堅疽積久後若更變熱中有軟處當軟處切不可針破也軟疽者只溫暖裹衣置之耳若針灸刺破不可療矣論開口除膿法程山齡曰凡治癰疽口小膿多則膿不出或出而不盡或薄膿可出硬膿難出以致瘀不出而新不生延綿難愈法當爛開大口俾瘀膿多出為善其爛藥烏金散最佳瘀肉能去不傷新肉且不甚焮痛為至妙也若有膿管以棉紙捻裹藥紝入頻換數條即化祛耳亦有頑硬之極非烏金膏所能去者則用白降丹或化腐紫霞膏搽之然終不及烏金膏為至穩十法李東垣曰夫瘡瘍生於外皆由積熱蘊於內內經謂血熱肉敗榮衛不行必將為膿留於節腠必將為敗蓋瘡疽膿爛之時頭小未破瘡口未開或毒氣不出疼痛難忍者所以立追蝕膿之方法使毒氣外泄而不內攻惡肉易去好肉易生也若其瘡紝之血出不止者則未可紝當於瘡上摻追蝕之藥待其熟可紝方紝若其瘡紝之痛應心根者亦不可強紝之誤觸其瘡其焮痛必倍變證不無不可不慎也若瘡癤膿成未破於上薄皮剝起者即當用破頭代針之劑安其上以膏貼之膿出之後用搜膿化毒之藥取效如神矣十書竇漢卿曰凡瘡瘍之起疼痛固屬於心火久而陽氣升上蒸肉化而為膿若不三思原其膿之有無遽而開刀則鮮血突出膿從何來致患者煎寒發熱日夜疼痛無法可止必先將指頭按患上隨手而起四畔悉軟觀其頭聚擇尻神不犯吉日將刀頭向上開之方不致傷新肉取出刀再捻綿紙條潤油度之使膿水齊會半日扯出則膿水易干外貼膏藥四圍敷藥全書論吸膿法陳實功曰古之良醫有好生之德以口吮膿後世人漸嫌穢每多重手強擠致患者狼狽不堪或因循聽其自潰膿毒不得外發必致內攻乃生煩躁重如負石非用藥筒拔提內蓄之膿毒氣終難外泄也法預用徑口一寸二三分新鮮嫩竹一段長七寸一頭留節用刀劃去外青留內白一半約厚分許靠節鑽一小孔以杉木條緊塞將羌活獨活紫蘇蘄艾鮮菖蒲白芷甘草各五錢連須蔥二兩灌入筒內筒口用蔥塞之將筒橫放鍋內以物壓住勿得浮起用清水十大碗淹筒煮數滾約內藥濃熟為度候用再用披針於瘡頂上一寸內品字放開三孔深入淺寸約在筒圈內將藥筒連湯用大磁鉢盛貯患者榻前將筒藥倒出急用筒口乘熱對瘡合上以手捺緊自然吸住約待片時藥筒已溫拔去塞孔木條其筒自脫將器倒出筒中物色看其何樣如有膿血相黏鮮明紅黃之色亦有一二杯許此是活瘡治必終愈如拔出物色純是敗血氣穢紫黑稀水而無膿意相黏者其人氣血內敗肌肉不活必是死瘡強治亦無功矣此法家傳屢經有驗如陽瘡易潰易膿之證不必用此以傷氣血此法陰瘡用之要在十五日前後堅硬不潰不膿者行之最當此法的有回天之效醫家真不可缺也正宗論膿熟不宜開遲薛立齋曰凡瘡瘍有膿之際乃肉腐而為膿是毒氣侵蝕而潰也若不速去之恐毒氣蓄而侵潰好肉如肘膝樞紐關節之所筋骨壞廢疾成也有等畏針之徒多致不救或密針之或以賽針散即透出膿極妙汪省之曰夫癰疽瘡癤皆由氣血壅滯而生當推虛實表裡而早治之可以內消此內消之法宜早治也若毒氣已結者勿泥內消之法當辨膿之有無深淺急宜酌量刺之緩而不刺毒則內攻穿通臟腑腐爛筋骨可不慎哉若脈緊為膿未成緊去但數為膿已成以手按之熱者有膿不熱無膿按之牢硬未有膿按之半軟半硬已有膿大軟方是膿成若大按之痛者膿深按之不甚痛者膿未成按之即復痛者為有膿不復痛者無膿薄皮剝起者膿淺皮色不變不高阜者膿深淺者宜砭深者宜針手足指梢及乳必候膿大軟方可開放若夫麻痘之後餘毒未盡肢節有癰稍覺有膿便用決破遲則成攣曲之疾矣理例論內托法汪省之曰凡癰疽或已成氣血虛者邪氣深者邪氣散漫不能突起亦難潰膿或破後膿少或膿清稀或堅硬不軟或雖得膿而根腳紅腫開大皆氣血虛邪氣盛兼以六淫之邪變生諸證必用內托令其毒熱出於肌表則易愈也內托以補藥為主活血驅邪之藥為臣或以芳香之藥行其鬱滯或以溫熱之藥御其風寒理例周文採曰夫托者起也上也癰毒之法外之內者邪必攻內自然之理當用托裡湯液加升麻銀花使榮衛通行血脈調和瘡毒消散故云瘡家無一日不託里也啓玄王肯堂曰癰疽已成大抵托裡消毒散托裡散小托裡散十宣散皆為要藥但用隨時加減耳如冬月並氣滯之人五香連翹湯虛弱人去大黃素不宜寒藥者小五香湯形脈實膿色稠不可用補藥者忍冬丸之類大膿出敗肉去紅腫消當用人參黃耆當歸白朮大劑補之令氣血滋茂新肉易生也準繩薛新甫曰有隨證加減用藥例以托裡消毒為主誠內托之良法癰疽已成門主方七味活命飲梅祕一切癰疽氣血虛憊白塌下陷立可紅活生黃耆川芎各三錢金銀花蒲公英各一兩當歸八錢穿山甲炙皂角針各一錢五分作一劑水三斤砂鍋內煎一半熱服避風取汗靜臥自潰透膿散正宗潰頂排膿捷法金銀花當歸各五錢生黃耆四錢白芷牛蒡子川芎穿山甲皂針各一錢酒水同煎服瘡上宜覆暖栝蔞托裡湯正宗跌撲傷損腫痛積久欲潰或氣血鬱結痰停血壅致成瘡瘍未成即消已成自潰生肌解毒栝蔞一個金銀花一兩蘇木五錢乳香去油甘草節沒藥去油各二錢作一劑酒煎分三服一日服盡渣焙為末酒糊丸彈子大當歸酒化下回陽三建湯正宗陰疽發背初起不痛不腫不熱不紅硬若牛皮堅如頑石十日外脈細身涼肢體倦怠皮如鱉甲色似土朱粟頂多生孔孔流血根腳平散軟陷無膿又皮不作腐手熱足涼者俱急服之人參熟附子川芎白茯苓當歸枸杞子陳皮山萸肉黃耆各一錢廣木香紫草茅蒼朮獨活鮮紅花厚朴炙甘草各五分煨薑三片皂角樹根上白皮二錢水二碗煎八分入酒一杯隨病上下食前後服之用綿帛蓋暖瘡上預先不得大開瘡孔走泄元氣為要澄按背瘡屬陰者皆由臟腑先壞而內毒不得發越於外也當急救之遲則無濟矣散寒救陰至聖丹岐天師生黃耆人參金銀花各三兩當歸一兩白芥子二錢附子三錢水煎服二劑即愈不須多服牛膠飲截險處癰疽惡瘡使毒不攻於內不傳惡證上好牛皮膠四兩用酒一碗納膠重湯燉攪勻傾出更浸酒隨意飲盡出汗若善飲者以醉為度此法活人甚多遠志酒韓大夫家此方救人極衆一切癰疽發背惡毒有死血陰毒在中則不痛用之內服外敷則痛有憂怒等氣積而內攻則痛不可近用之內服外敷則不痛或蘊熱在內壯熱手不可近用之內服外敷即清涼或氣虛血冷潰而不斂七情內郁不問虛實並效遠志米泔浸洗去心磨細蜜貯每用酒一盞調藥三錢遲頃澄清飲之以渣敷病處內托榮衛湯黃耆五錢防風連翹柴胡紅花各二錢羌活甘草人參黃芩蒼朮各一錢當歸一錢五分桂枝八分上銼分二服酒水各二盞煎八分溫服二仙散黃賓江發背癰疽未成已成已潰未潰痛不可忍者白芷未潰用一兩已潰用五錢貝母未潰用五錢已潰用一兩作一劑水酒同煎服琥珀蠟礬丸正宗癰疽已成未潰之際恐毒氣不能外出必致內攻預服此丸護心護膜散血解毒生明礬一兩二錢雄黃硃砂各一錢二分琥珀一錢同燈草另研極細研細用黃蠟一兩蜂蜜二錢銅勺內熔化離火片時候蠟四邊稍凝時方入上藥攪勻共成一塊用時將藥火上微烘衆手急圓小寒豆大以硃砂為衣瓷罐收貯每服二三十丸白湯食後送下病甚者早晚日進二次其功最效有用黃蠟二兩明礬一兩為丸亦名蠟礬丸丸如桐子大每服五七十丸食前酒下未破即消已破即合有種遍身生瘡狀如蛇頭服之立效蓋心為君主之官不易受邪凡癰疽及蛇犬所傷毒上攻心則命立傾此藥能防毒氣內攻解毒定痛祕授蠟礬丸淮安楊祕有定痛生肌化膿厚膜解毒去穢之功黃蠟白礬各胡桃大一塊研銀硃一錢蛇蛻一條陰陽瓦焙研先將蠟熔化入蜂蜜少許再下生礬蛇蛻銀硃研末攪勻將銅勺放滾水內急手丸如桐子大如遇患者先令洗浴飲熱酒數杯初服二十一丸儘量飲醉被蓋取汗初起即消已成疼痛不可忍者服之可止一半已潰服之必出稠厚黃膿看人虛實與服頭一日服二十一丸第二日只服十九丸逐日遞減兩丸服至一丸為止奇效如神透膿散諸癰疽瘡及貼骨癰不破者不必用刀針以此服之不移時其膿自透屢驗蛾口繭子一枚燒存性研末酒調服只用一枚不可多用如誤用二三枚即出兩三個頭慎之透膿法黃蠟熔化乘熱捻如大麥樣兩頭俱要尖用酒或白湯吞服一粒其頭自破至驗金針散啓玄治癰疽瘡腫已破未破用之直達潰所春月取皂角針不拘多少半青半黑的灰火內炮干為末看瘡上下分食前後服之每服二三錢好酒調服取汗為度如瘡在頭頂者用樹梢上的如背癰取樹身上向陽處的如便毒懸癰取樹芽內的此取象之義即有所歸附焉護心丹正宗患井疽宜多用他證亦宜緑豆粉二兩乳香去油一兩炙甘草五錢辰砂水飛二錢乳細白湯調服三錢蔣示吉照本方加遠志肉甘草水泡炒為末一兩五錢亦名護心丹護心丹李嗣立凡癰疽三日內宜連進十服方不變證使毒氣外出稍遲內攻漸生嘔吐或鼻生瘡菌不食則危矣五日後亦宜用真緑豆粉一兩乳香去油燈心灰同研五錢用生甘草濃煎湯調下一錢時時呷之若毒氣衝心有嘔吐之證者大宜服此澄按緑豆之性可能消腫解毒乳香消諸癰腫毒服之一二次生滿瘡孔中真聖藥也論補法周文採曰經云虛者補之凡癰疽已成不分部位但根腳散漫頂不高尖氣虛補氣血虛補血加銀花甘草節白芷桂心等藥使頂自高尖根窠收束易潰易膿如已潰之後膿血出多則當峻補氣血庶易於收口也論桑木灸法陳實功曰凡瘡破已久膿血多出氣血敗壞不能得愈者十常八九又因色欲令瘡腐而多生歹肉存而不長新肉以敗肉滑而時出清水亦有不得其治法雖數歲不能愈者內宜服補中益氣加托毒藥外以藥水洗淨而桑條曬乾一頭燒著吹滅焰以火在於瘡口稍遠灸之勿令痛亦不可太遠遠則無益灸令熱而微癢為妙日灸數次亦不為多灸後少刻以長肉生肌膏貼方能取效神速也正宗論神妙拔根法陳實功曰凡腦疽發背陰證初起不腫高不焮熱灸不疼其病將來難治必致壞人十日以前用披針當頂插入知痛處方止隨用蟾酥條插至孔底每日二條膏蓋三日後加添插藥其根高腫作疼外用神燈照法助陰為陽插照七日其瘡裂縫流膿至十三日其根自脫如日多根深蒂固不能脫者披針取之內用玉紅膏不脫者自脫不斂者自斂此法百人百活再無不愈者哉正宗論瘡瘍去腐肉法薛立齋曰夫瘡瘍之證膿成者當辨其生熟淺深肉死者當驗其腐潰連脫丹溪云癰疽因積毒在臟腑當先助胃壯氣為主使根本堅固而行經活血佐之令其內消余常治脈證虛弱者用托裡之藥則氣血壯而肉不死脈證實熱者用清熱之劑則毒氣退而肉自生凡瘡聚於筋骨之間肌肉之內因氣血虛弱用十全大補湯壯其脾胃則未成自散已成自潰又何死肉之有若不大痛或不痛或不赤或內膿不潰或外肉不腐乃氣血虛弱宜用桑枝灸及十全大補加薑桂壯其陽氣則四畔即消瘡頭即腐其毒自解又何待於針割若脾胃虛弱飲食少思用六君倍加白朮壯其榮氣則肌肉受毒者自活已死者自潰已潰者自斂若初起或因克伐或犯房事以致色黯而不痛者乃陽氣脫陷變為陰證急用參附湯溫補回陽亦有可生竇漢卿曰凡取腐肉先用豬蹄湯洗淨以去其垢方見新舊之肉看其果腐爛者用鉤摘定輕手徐徐忍臭氣割之切不可誤傷新肉以致鮮血淋漓切勿急驟多加工夫割取畢上靈藥外用膏貼明日如有末盡之腐仍照法去之全書論死肉當去申鬥垣曰凡癰疽杖毒及楊梅結毒臁瘡便毒疔瘡等內多有死肉停蝕好肉若痛難禁若不早去愈加腐爛正謂之惡如狼虎毒似蛇蠍有傷性命恐致不救當視其緩急死肉大小或以針刀割去緩以腐肉綻子或末藥膏藥貼之以平為期後上生肌長肉等藥上之內服大補湯丸等劑而愈世多庸俗只知敷貼長肉生肌等藥為神殊不知有死肉為害反加腐爛是也如不去淨亦不能得愈宜熟玩之啓玄論湯洗法程山齡曰煎好豬蹄湯絹片濾去渣俟湯半溫再用方盤盛湯安放瘡下隨以軟絹淋湯瘡上併入孔內輕手捺盡內膿庶敗腐宿膿隨湯而下以淨為度再以軟帛疊成七八重勿令太乾帶湯覆於瘡上以手輕盈旋按片時帛冷再換如此洗六七次自然痛減毒消洗時避風及人口氣十法馮魯瞻曰夫癰疽已潰日用豬蹄湯淋洗將愈之際三日一次錦囊王肯堂曰潰瘍宜洗若非行補接之藥以實其內竊恐淋洗有一時之快少頃恐病體自覺疲憊有不耐煩之意非虛而何可不先議補接乎準繩又曰洗漏瘡當用干艾作湯投白礬末二三錢洗瘡口蓋人血氣冷必假艾力以助陽而艾性亦能殺蟲也此瘡漏不可遽合結毒實蟲所為之者陳良甫曰若癰久不合其肉白而膿少者此氣血俱虛不能潮運而瘡口冷澀也每日用艾葉一把煎湯避風熱洗及燒松香煙燻之或用豬蹄湯洗之更以神異膏貼之必須守禁調理否則不效唐元禎曰凡背瘡腐肉不去不用刀割用降香煎湯不可用手洗將湯入酒壺內淋於瘡上以新羊毛筆掃之拭乾再用巴豆炒黑搗成膏搽數次腐肉自去新肉自生癰疽湯洗門主方豬蹄湯正宗治癰疽已潰流膿時用此湯洗消毒氣去惡肉回死肌潤瘡口又能散風消腫腐盡則已羌活當歸赤芍黃芩白芷甘草露蜂房各等分豬前蹄一隻上為粗末看瘡疽大小用藥多少先將豬蹄用白水六碗煮蹄軟為度將汁濾清吹去汁上油花用藥一兩投於汁中再用微火煎十數沸密絹濾去藥渣候湯半熱將軟絹蘸湯淋於瘡上輕手挹去瘀膿腐肉其惡物隨湯而下洗訖以絹帛挹干按法如式次第用藥防風湯十法防風白芷甘草赤芍川芎當歸尾各二錢連須蔥去尾五根先將雄豬前蹄煨十數沸吹去浮油濾取三大碗入藥煎熟以絹片蘸湯淋洗其深曲處以新羊毛筆洗之軟絹拭乾再上丹藥洗方十法當歸獨活白芷甘草各二錢蔥頭五個水三碗煎至藥爛濾清以絹帛蘸湯挹淨瘡上隨搓貼紅黑二膏洗時切忌風寒為要如背瘡輕淺易治者以此代豬蹄湯其功亦效洗方陳冬瓜瓤子煎洗洗藥神硝散集驗專治癰疽潰爛臭穢蛇床子二兩研破朴硝一兩和勻每用三錢水一碗煎三五沸通手洗之癰疽潰瘍門主方參耆內托散丹溪金銀花五錢黃耆酒炒三錢遠志肉甘草湯泡焙炙甘草各一錢五分牡丹皮一錢川芎陳皮各五分當歸二錢人參聽用大棗五枚水煎服丹溪曰癰疽未潰以疏托解毒為主已潰以托補元氣為主此二語可為外科樞要四君子湯治一切陽虛氣弱脾衰肺損面色枯白飲食少思四肢無力體瘦面黃皮聚毛落脈來細軟人參白朮土炒白茯苓各二錢甘草炙一錢薑棗水煎服脾者萬物之母也肺者氣之母也脾胃一虛肺氣先絶脾不健運故飲食減少則營衛無所資養脾主肌肉故體瘦面黃肺主皮毛故皮聚毛落脾肺皆虛故脈來細軟也是方以人參補五臟之元氣白朮補五臟之母氣茯苓致五臟之清氣甘草調五臟之乖氣四藥皆甘溫甘得中之味溫得中之氣猶之不偏倚之君子也展布德澤以行春之令經曰氣主煦之是也夫四物湯治一切血虛日晡發熱生地黃當歸酒炒各三錢白芍藥二錢川芎一錢五分水煎服經曰血主濡之四物皆濡潤之品故為血分主藥地黃甘寒入心腎以沃血之源當歸辛溫入心脾而壯主血攝血之本芍藥酸寒入肝家而斂疏泄之血海川芎陰中之陽可上可下通足三陰而行血中之氣然吳氏曰失血太多者禁勿與之四物皆陰陰者天地閉塞之令非所以生萬物者也本方加牡丹皮山藥白茯苓麥門冬玉竹退虛熱至效八珍湯治氣血俱虛惡寒發熱煩躁作渴大便不實飲食不進小腹脹痛眩暈昏憒等證人參白茯苓白朮生地黃川芎白芍藥當歸炙甘草薑棗水煎服氣為衛屬陽營為血屬陰此人身中之兩儀也純用四物則獨陰不長純用四君子則孤陽不生二方合用則氣血有調和之益而陰陽無偏勝之虞矣經曰氣血正平長有天命十全大補湯人參白朮土炒黃耆蜜炙熟生地酒炒各二錢白芍藥炙甘草川芎各八分當歸一錢五分肉桂去皮五分白茯苓一錢水煎服丹溪曰實火可瀉芩連之屬虛火可補參耆之屬凡人根本受傷虛火遊行泄越於外若誤攻其熱變成危證多致難救此方以四物補血四君子補氣又加黃耆助陽固表肉桂導火歸原薛立齋曰飲食勞倦五臟虧損一切熱證皆是無根虛火但服此湯固其根本諸證悉退金匱曰虛者十補勿一瀉之此方是也此方乃扶危定傾之大藥為收功保命之金丹六君子湯治氣虛脾熱食少痰多人參白茯苓白朮土炒廣陳皮半夏制熟各二錢炙甘草一錢薑棗水煎服半夏燥痰治痰之本陳皮利氣泄痰之標標本既得攻補互行補而不滯攻而不峻故曰六君子經曰壯者氣行則愈怯者著而為病六君子者壯其氣矣氣壯則升降自如清以奉上濁以歸下尚有何物可停為滯耶本方加藿香砂仁名香砂六君子湯其用稍峻者矣香砂六君子湯理脾化痰溫胃進食止嘔人參白朮白茯苓製半夏廣陳皮藿香砂仁炙甘草薑棗水煎服藿香正氣湯散風寒消飲食止嘔吐定瀉痢白朮陳皮半夏桔梗砂仁藿香蘇葉白芷甘草白茯苓厚朴薑水煎服六味地黃丸治腎經不足發熱作渴小便淋祕氣壅痰嗽頭目眩暈眼花耳聾咽燥舌痛齒牙不固腰膝萎軟自汗盜汗諸血失音水泛為痰血虛煩躁下部瘡瘍足根作痛等證熟地黃八兩酒煮杵膏山茱萸酒潤去核炒乾山藥炒黃各四西牡丹皮酒洗微炒白茯苓人乳制焙澤瀉淡鹽酒拌炒各三兩為末蜜丸如桐子大空心淡鹽湯下四錢按腎惡燥脾惡濕補陰藥中多是濕藥腎虛而脾胃壯實者宜若脾腎兩虛則不可也惟此六味丸八味丸及八物腎氣丸專補腎虛兼理脾胃不濕不燥於脾腎兩虛者甚得其宜矣腎者水臟也水衰則龍雷之火無畏而亢上故壯水之主以制陽光地黃味厚為陰中之陰補腎填精以為君山茱味酸歸肝乙癸同治之義且腎主閉藏而酸斂之性相宜也山藥味甘歸脾安水之仇故用為臣丹皮亦入肝其用主宣通所以佐茱萸之澀也茯苓亦入脾其用主通利所以佐山藥之滯也且色白屬金能培肺部又有虛則補母之義至於澤瀉有三功焉一曰利小便以清相火二曰行地黃之滯引諸藥速達腎經三曰有補有瀉無喜攻增氣之虞故用為使此方為益腎之聖藥而昧者薄其功緩蓋用藥者有四失也一則地黃非懷慶則力淺一則地黃非九蒸則不熟一則疑地黃之滯而減之則君主弱一則惡澤瀉之滲而減之則使者微蹈是四失焉望其藥之有功乎本方加黃柏知母各二兩名知柏八味丸治陰虛火動骨痿髓枯王冰所謂壯水之主以制陽光也尺脈旺者宜之本方加五味子三兩名都氣丸治勞嗽本方加五味子二兩麥門冬三兩名八仙長壽丸再加紫河車一具並治虛損勞熱本方加杜仲牛膝各二兩治腎虛腰膝痠痛本方去澤瀉加益智仁三兩治小便頻數七味地黃丸治腎水不足虛火上炎發熱作渴口舌生瘡牙齦潰爛咽喉作痛或形體憔悴寢汗發熱即六味丸加肉桂一兩臨用去皮忌火勿出氣腎水不足虛陽僭上必用此方以引火歸原夫五志之火可以濕伏可以直折龍雷之火惟當從其性而伏之肉桂性熱與火同性雜在下焦壯水藥中能引虛火降而歸經且肉桂之質在中半以下其性專走腎經本乎地者親下之義況相火寄於甲乙之間肝膽木旺則巽風動而烈火焰明古人謂北方不可瀉肝瀉肝即所以瀉腎本草曰木得桂而枯取其義也經曰熱因熱用此之謂也或者畏其熱而遺之豈達造化升降之微乎黃柏知母治相火僅可施於壯實若虛火而誤用之則腎因瀉而愈虛愈虛而火愈熾矣八味地黃丸治命門火衰不能生土以致脾胃虛寒飲食少思大便不實臍腹疼痛夜多漩溺或陰盛格陽內真寒而外假熱等證即七味丸加熟附子一兩切片微火焙腎有兩枚皆屬於水雖有左右之分初無水火之別考之內經昭然可覽仙經曰兩個一般無二樣中間一點是真精又曰兩腎中間一點明夫真精者明也即命門相火也命門乃穴名而其穴在兩腎中間蓋一陽生二陰之間所以成乎坎而象天之北也經曰少火生氣人無此火生化之源幾乎息矣非附子健悍不足以噓既稿之陽春王太僕曰益火之原以消陰翳此方是也馮魯瞻曰按脾胃虛寒之至者丹皮澤瀉甚非所宜減此二味加牛膝杜仲鹿茸五味子更佳又曰六味地黃丸專補左尺腎水八味丸兼補右腎相火少年水虧火旺宜服六味丸老年水火俱虧宜服八味丸況老年腎臟真水既虛邪火乘之而為濕熱以作腰痛足痿痰唾消渴小便不禁淋閉等證非桂附之溫散而能治之乎昧者畏其熱殊不知所補之火乃真陽之元也真陽之元一得陰翳之火潛消矣金匱腎氣丸治脾腎大虛腰重腳重小便不利肚腹腫脹四肢浮腫喘急痰盛已成蠱證其效如神熟地黃四兩白茯苓三兩山茱萸去核乾山藥炒川牛膝酒炒車前子微焙牡丹皮酒洗炒澤瀉炒肉桂去皮各二兩熟附子五錢為末蜜丸桐子大空心白湯下土為萬物之母水為萬物之源身中所最重者也若脾虛則土不能制水腎虛則水不能安位故逆行而泛濫於皮膚妄加攻逐禍不旋踵八味丸脾腎要藥佐以車前泄太陰之水佐以牛膝開少陰之竅則小便行而脹自已且有益於真元也八物腎氣丸平補腎氣堅齒駐顏熟地八兩山茱萸山藥各四兩牡丹皮澤瀉白茯苓各三兩肉桂去皮五味子各一兩為末蜜丸每用六七十丸空心白湯下逍遙散治血虛煩熱肢體疼痛口乾盜汗嗜臥月水不調寒熱如瘧痰嗽骨蒸白茯苓白朮土炒當歸白芍酒炒柴胡各一錢甘草五分薄荷八分煨薑煎服本方加山梔牡丹皮名加味逍遙散肝虛則血病歸芍養血而斂陰木盛則土衰術草和中而補土柴胡升陽散熱合芍藥以平肝使術得條達茯苓清熱利濕令心氣安寧煨薑暖胃祛痰能調中解鬱薄荷搜肝瀉肺理血消風諸證自已所以有逍遙之名補中益氣湯人參白朮炙黃耆炙甘草廣陳皮升麻柴胡當歸身薑棗引歸脾湯治思慮傷脾不能攝血健忘怔忡驚悸不寐心脾作痛嗜臥少食大便不調身痛及盜汗月經不調人參白朮土炒白茯苓龍眼肉去核酸棗仁炒各二錢遠志去骨當歸身各一錢木香生用炙甘草各五分炙黃耆一錢五分薑水煎服心藏神而生血脾藏意而統血思慮太過則兩臟受傷而血不歸經心血不足則健忘怔忡驚悸不寐脾血不足則嗜臥少食體倦肢痛不能統血遂致妄行甚則氣鬱而心脾作痛在女人則帶下而月經不調茲取參苓耆朮炙草甘溫可以補脾龍眼棗仁歸身遠志濡潤可以養心佐以木香者蓋思慮所傷三焦氣阻藉其宣暢調氣舒脾則氣和而血和且平肝可以實脾而血之散於外者悉歸中州而聽太陰所攝矣故命之曰歸脾湯理中湯臟腑中寒四肢強直人參炮乾薑炙甘草白朮各等分水煎服附子理中湯治脾胃虛寒飲食不化或手足厥冷腸鳴切痛或痰氣不利口舌生瘡或嘔吐泄瀉等證即人參理中湯加熟附子人有元陽命曰真火此火一衰則不能生土而資生之本大虛今以附子回少火乾薑暖中州而參朮甘草為之補氣氣旺則火足而脾土自能健運經曰氣主煦之又曰寒淫所勝平以辛熱即補火之謂也夫心上腎下肝左肺右而脾獨居中中氣空虛四臟不能相生得此方以理之則萬物之母安而四臟皆得稟矣故曰理中湯去參朮即名四逆湯為四肢厥者設也生脈散生津止渴治熱傷元氣氣短倦怠口乾出汗人參一錢麥門冬二錢五味子八分水煎服火氣赫曦則金為所制而絶寒水生化之源故氣短倦怠出汗者皆手太陰本證也人參補氣為君所謂損其肺者益其氣也五味子酸斂能收肺家耗散之金麥門冬甘寒濡肺金燥枯之液三者皆扶其不勝使火邪不能為害也司天屬火之年時令燥熱之際尤為至要之藥參苓白朮散健脾養胃人參去蘆廣陳皮砂仁各一兩白茯苓蒸二兩白朮土炒四兩扁豆山藥薏苡仁蓮子肉各三兩神麯炙甘草各五錢磨細每服三錢白湯調服乳香黃耆湯治癰疽發背諸毒疔瘡疼痛不可忍者或未成者速散已成者速潰敗腐膿毒不假刀砭其惡肉自然脫下並治跌打損傷筋骨疼痛人參白芍沒藥去油當歸乳香去油黃耆熟地罌粟殼蜜炙去筋甘草川芎陳皮白水煎量病上下分前後服托裡定痛散潰後血虛疼痛不可忍者熟地當歸白芍乳香去油沒藥去油罌粟殼蜜炙去筋川芎肉桂白水煎托裡內補散馮氏十全大補湯加金銀花白芷防風各等分水煎服人參養榮湯正宗潰瘍發熱惡寒或四肢倦怠肌肉消瘦面目痿黃呼吸短氣飲食無味不能收斂或氣血原不足不能收斂大瘡愈後宜多服之不變他證即十全大補湯去川芎加陳皮遠志五味子聖愈湯潰瘍膿水出多氣血虛極脈細空而無力以致心煩不安睡臥不寧或五心煩躁等證即四物湯加人參黃耆保元大成湯潰瘍元氣素虛精神怯弱或膿水出多神無所主以致睡臥昏倦六脈虛細手冷身涼便溏或祕胸膈或寬不寬舌雖潤而少津口雖食而無味瘡弦不緊肉色微紅總由不足大補堪題人參白朮白茯苓當歸白芍黃耆熟附子山萸肉砂仁北五味陳皮廣木香炙甘草薑棗引食遠服服至精神回手足暖脾胃醒肉色紅為度凡見此等證候乃真氣虛脫已欲變壞之病非此不回也獨參湯潰後膿水出多氣血虛極或惡寒或發熱或自汗冷汗或手足指甲青冷或身涼脈細人參二兩切片作一劑水二盅棗十枚煎一盅徐徐服之若煎至稠厚即為膏矣作三次用溫酒化服亦可清震湯正宗潰瘍脾胃虛弱或誤飧生冷或氣惱勞役或入房夢遺致火邪乘入中脘乃生厄逆宜急服之人參陳皮半夏炙甘草益智仁香附柿蒂熟附子澤瀉薑棗燈心引如手足不冷去附子不用如口乾便燥火厄者去附子加川連五分托裡黃耆湯治氣虛作渴嫩黃耆蜜炙六錢甘草天花粉各一錢水二盅煎八分頻服加人參一錢尤妙黃耆六一湯當服此藥終身可免癰疽之疾治渴補虛綿黃耆去蘆六兩一半生一半焙一半鹽水潤飯上蒸三次焙乾銼細粉甘草一兩一半生銼一半炙黃水煎服亦可或為細末每服二錢早晨日午以白湯調服初服酒調亦妙止痛當歸湯治腦疽背疽穿潰疼痛當歸生地白芍人參炙甘草官桂各等分黃耆水煎服此足陽明厥陰藥也當歸生地活血涼血人參黃耆益氣補中官桂解毒化膿毒化成膿則痛漸止芍藥和脾酸以斂之甘草扶胃甘以緩之則痛自減矣參朮地黃膏正宗癰疽發背等證大膿後氣血大虛急宜用此上好人參半斤切片用水五大碗砂鍋內慢火熬至三碗將渣再煎汁一碗共用密絹濾清復熬稠厚將瓷罐收貯聽用之耳云片白朮六兩熬同上法懷慶地黃六兩熬同上法以上三膏各熬完畢各用磁蓋碗盛之頓入水中待冷取起蓋勿泄氣如患者精神短少懶於言動短氣自汗者以人參膏三匙白朮膏二匙地黃膏一匙俱用無灰好酒一杯頓熱化服如脾氣虛弱飲食減少或食不知味或已食不化者用白朮膏三匙人參膏二匙地黃膏一匙好熱酒化服如患者腰膝痠軟腿腳無力皮膚手足粗澀枯稿者用地黃膏三匙人參白朮膏各二匙化服如氣血脾胃相等無偏勝者三膏各二匙熱酒化服此膏用於清晨並臨睡時各進一次自然強健精神頓生氣血新肉易生瘡口易合任瘡危險勢大膿多者可保終無變證如夏炎天熱恐膏易變分作二次熬用亦好愈後能服鬚髮變黑返老還童以上諸方功難盡此八仙糕正宗癰疽脾胃虛弱精神短少飲食無味食不作飢及平常無病久病但脾虛食少嘔泄者並妙人參白茯苓山藥芡實蓮子肉各六兩糯米三升梗米七升白蜜一斤白糖霜二斤半上將人參等五味各為細末又將糯粳米亦為粉與上藥末和勻將白糖和蜜湯中頓化隨將粉藥乘熱和勻攤鋪籠內切成條糕蒸熟火上烘乾瓷器密貯每日清早用白湯泡食數條或干吃亦可但遇知覺飢時隨用數條甚便服至百日輕身耐老壯助元陽培養脾胃妙難盡述八仙糕鄭氏祕方治脾泄腎泄並遠年休息痢神效菟絲子魚膘切片乾麵炒珠山藥炒芡實炒白茯苓建蓮肉去心炒薏苡仁炒白扁豆炒各四兩穀芽炒八兩粳米炒黃十八兩秈鍋巴三十六兩共磨細末每早用開水入白糖少許調服一二兩屢建奇功胃愛丸正宗治潰瘍脾胃虛弱飲食諸味不喜屢用開胃進食之藥不效者此脾崩之象宜服此丸進食為吉清河人參一兩云片白朮鮮白者米泔浸去澀水切片曬乾同麥芽拌炒一兩懷慶山藥肥大上白者切片用男乳拌濕候潤透曬乾微焙一兩上白茯苓咀一兩一分厚片用砂仁二錢同茯苓合用內飯上蒸熟只用茯苓甘草炙三錢白豆蔻仁三錢真廣陳皮用陳老米先炒黃色方下陳皮同炒微燥勿焦六錢建蓮子肉去心去皮切片五錢真小紫蘇蜜拌透曬乾微蒸片時連梗葉切片五錢上為細末用老米二合微焙研粉泡荷葉湯打糊丸梧子大每服八十丸清米湯不拘時服紅鉛造化丹正宗治癰疽元氣不足軟陷不起發或已發覆被風寒內外所侵以致瘡毒下陷變為陰塌不痛者急宜服此亦可轉陰為陽返出毒氣復腫為吉人參白茯苓山藥各一兩辰砂寒食麵各七錢五分紅鉛另有取法三錢枯礬甘草炙五錢冰片六分麝香八分乳粉二錢用頭生男乳每盤內用一小盅曬乾刮取收之上各研細方為一處共研極細用白蜜二兩頭生男乳一大杯慢火重湯內用磁碗頓蜜滴水不散為度候稍溫和入前藥軟硬得宜丸如龍眼核大金箔為衣瓷罐收貯或以蠟固亦妙每用一丸好熱酒一杯化藥食遠服之用厚綿帛復暖患上其熱如蒸瘡必復起作痛乃此丹之效也諸證嘔吐怔忡瀉痢屢藥不瘥異證並效大率心經之病石菖蒲肝經之病遠志肉脾經之病生薑肺經之病麥門冬腎經之病五味子各隨五經之症用引煎湯化服其應如響修合時務要端午天醫黃道日為佳製藥時忌婦人雞犬生人異物預期齋戒誠心多靈附載取紅鉛法女子十四歲而天癸至此陰中之真陽氣血之元稟遇此將行時兩腮先若桃花之狀陽獻陰藏其經只在半月之裡必來預用白綿紬一尺五寸洗淨時常用棉帶一條束臍下綿紬兩尖頭前後繫帶上中間常兜陰器小便時解一頭便罷即系之經至盡染紬上取初至紅鉛一顆大如魚眼紅色明亮如珠此為接命至室隨與好酒一杯和服一時後如醉不醒只以人乳飲之一日後自生已後能絶房事者延壽一紀余經換紬兜取陰乾浸上白童便內片時其經自然脫下取置磁盤內陰乾聽用如不升煉者謂之坌紅鉛亦可補益虛勞接續命脈如次經已後但未破身者俱可取聚陰乾磁盞升煉色如紫霜一般合入三元丹內人乳服之接命長年卻除百病此方神祕不宜輕泄故不可傳但取紅鉛之女生平愛惜飽暖適時無拘束者為上人參黃耆湯治潰瘍虛熱不睡少食或穢氣所觸作痛黃耆蜜炙人參白朮土炒當歸身蒼朮炒麥門冬升麻五味子炒神麯廣陳皮甘草各五分黃柏酒拌炒三分薑棗引煎服內補黃耆湯治癰疽發背潰後虛弱無力體倦懶言精神短少飲食無味自汗口乾脈澀不睡人參白茯苓黃耆蜜炙當歸身肉桂遠志肉炒川芎麥門冬熟地白芍藥各一錢甘草五分薑棗引煎食遠服托裡清中湯癰疽脾胃虛弱咳嗽痰氣不清飲食少思人參白茯苓白朮半夏陳皮桔梗各一錢麥門冬五味子甘草各五分薑棗引煎食遠服托裡和中湯癰疽中氣虛弱飲食少思腫不消潰不斂人參白茯苓白朮陳皮半夏炮薑各一錢廣木香甘草各五分薑棗引煎食遠服托裡建中湯癰疽元氣素虛或因寒涼損傷脾胃飲食少思凡飧無味或作嘔泄瀉急服以健中氣人參白朮白茯苓各一錢半夏炮薑各一錢甘草五分熟附子八分煨薑三片棗二枚煎不拘時服托裡溫中湯癰疽陽弱陰寒脈虛身冷或瘡為寒變反致不疼或膿水清稀心下痞滿腸鳴腹痛大便微溏食則氣短嘔逆不得安臥時發昏憒白朮廣木香丁香各五分人參益智仁乾薑炮半夏陳皮羌活白蔻仁甘草各一錢熟附子二錢白茯苓二錢薑棗引煎不拘時服此方與舊不同余制此嘗治癰疽陰證及雜證陽氣脫陷與寒氣逼陽於外者發熱煩躁口乾作渴投以薑附之類津液頓生煩熱頓退其應如響醒脾益胃湯潰瘍脾胃虛弱過傷飲食生冷以致胸膈不寬四肢面目浮腫及小水不利人參白茯苓白朮山藥廣皮半夏老黃米炒各一錢蒼朮厚朴澤瀉廣木香麥芽蘇子豬苓山楂各五分薑三片燈心二十根煎食前服神應異功散潰瘍陰盛陽虛發熱作渴手足並冷脈虛無力大便自利至飲沸湯而不知其熱者必服之人參白朮陳皮白茯苓當歸廣木香官桂各一錢半夏丁香肉豆蔻厚朴熟附子各五分薑棗引煎服二神丸癰疽脾胃虛弱飲食不消大便溏泄並治尋常腎虛脾泄俱效破故紙四兩微炒香色肉果肥大者二兩生用用大棗四十九枚老薑四兩切片水浸棗薑煮至水乾為度取棗肉為丸桐子大每服七十丸清米湯送下四神丸脾胃虛寒不便不實飲食不思肉果麵包煨五味子各二兩補骨脂四兩吳茱萸水浸炒一兩為末薑八兩紅棗一百枚煮熟取棗肉去皮和丸桐子大每服四錢空心米飲下論生肌法汪省之曰夫肌肉脾之主也潰後收斂遲速者乃氣血盛衰使然世人但知生肌用龍竭止痛用乳沒余謂不然生肌之法當先理脾胃助氣血為主則肌肉自生豈假龍竭之屬設若膿未盡就用生肌反生潰爛壯者輕者不過復潰或遲斂而已怯者重者必致內攻或潰爛不斂者多矣至於止痛之法熱者清之寒者溫之實者瀉之虛者補之膿郁不出者開之惡肉侵蝕者去之如是則痛自止豈在乳沒然後痛止乎理例薛立齋曰夫肌者脾胃之所主收斂者氣血之所使但當純補脾胃不宜泛敷生肌之劑夫瘡不生肌而腫赤甚者血熱也四物加山梔連翹色白而無神者氣虛也四君加歸耆晡熱陰血虛也四物加參朮膿水稀者氣血虛也十全大補湯食少體倦脾氣虛也補中益氣湯煩熱作渴飲食如常胃火也竹葉黃耆湯不應竹葉石膏湯熱渴而小便頻數腎水虛也用加減八味丸料煎服若敗血去後新肉微赤四沿白膜者此胃中生氣也用四君子湯以培補之則不日而斂若妄用生肌之藥餘毒未盡而反益甚耳殊不知瘡瘍之作由胃氣不調瘡瘍之潰由胃氣腐化瘡瘍之斂由胃氣榮養東垣曰胃乃生髮之源為人身之本丹溪亦謂治瘡瘍當助胃壯氣使根本堅固誠哉是言也可不慎歟經驗全書馮魯瞻曰凡肌肉傷而瘡口不斂者用六君子湯以補脾胃為主或氣虛惡寒而瘡口不斂者用補中益氣湯以補脾肺若血虛發熱而瘡口不斂者用四物參耆以滋肝脾若膿多而瘡口不斂者八珍湯或十全大補湯以養血氣經曰脾主肌肉如前藥未應但用四君歸耆以補脾胃若更不應乃下元陽虛急用八味丸以壯火生土若脈數發渴者難治此真氣虛而邪氣實也錦囊又曰若敗肉去後新肉微赤四沿白膜者此胃中生氣也但用四君子湯以培補之則不日而斂蓋瘡瘍之作由胃氣不調瘡瘍之潰由胃氣腐化瘡瘍之斂由胃氣榮養論收口法程山齡曰凡癰疽最難收口者皆由瘀肉夾雜瘀膿不盡所致庸工不識妄用補澀之劑勉強收口恐他日內毒復發更甚於日前惟將海浮散玉螺散敷上堪稱至寶瘀血自脫不必用刀新肉自生又不藏毒萬舉萬當大法先用防風湯洗之或豬蹄湯若是痔瘡用無花果葉煎湯洗之再上末藥洗時須避風為主書云頻將湯洗切忌風吹是以更有體虛不能收口者須內服補藥以助之十法李東垣曰若膿血未盡便用生肌斂瘡之劑務其早愈殊不知惡肉不盡其瘡早合後必再發不可不慎十法馮魯瞻曰癰疽將斂宜用膏貼如毒未盡不可遽用生肌等劑錦囊又曰癰疽將安宜補氣血肌肉易生若進寒涼便難長滿癰疽門生肌丹散膏方生肌散錦囊生肌長肉神效珍珠生研大冰片各二分象皮切方塊瓦灰拌炒珠上白蠟各一錢乳香箬上烘燥瓜兒竭沒藥箬上烘燥鉛粉各五分輕粉真掃盆者四分兒茶三分共乳極細先用豬蹄湯或濃茶洗盡用少許摻之生肌散人參西牛黃珍珠琥珀熊膽乳香去油沒藥去油各二兩蘆甘石煅海螵蛸龍骨石膏煅輕粉各五錢杭粉二兩共乳極細入冰片五分再乳千下瓷瓶密貯每用少許收口如神八寶丹珍珠布包入豆腐內煮一伏時研細如治顛頂十手指尖十足指尖龜頭此二十一處非圓滾珍珠合藥不能包裹還原若治癰疽一切瘡瘍即飲塊珍珠皆可用也一錢牛黃五分象皮切片琥珀燈心同乳龍骨煅輕粉各一錢五分冰片三分蘆甘石銀罐內煅紅研細三錢共乳極細瓷瓶貯每用少許生肌長肉收口如神神妙生肌散龔敏中乳香去油赤石脂兒茶海螵蛸血竭鱉甲黑鉛各一錢硼砂生肌全在此味沒藥各二錢初起加黃柏一錢作癢加白芷一錢先將黑鉛加水銀一錢同煎化再將前藥研細入於鉛汞內研極細摻之生肌散紅升丹一錢血竭海螵蛸象皮焙焦黃丹輕粉各三錢赤石脂兒茶紫河車煅各五錢乳香去油沒藥去油各二錢瘡口紅熱加珍珠二錢瘡口寒白加肉桂一錢瘡口虛陷加人參二錢共乳極細末摻上膏貼珍珠十寶膏治癰疽大毒及刀傷斧砍咬傷杖瘡生肌定痛百發百中珍珠一錢豆腐包煮輕粉杭粉各五錢潮腦四錢乳香去油沒藥去油各二錢白蠟八錢琥珀八分冰片三分先將豬板油四兩入鍋熬化去渣再入白蠟化盡離火入研細珠輕杭乳沒五末將凝始下冰片琥珀潮腦和勻冷定收貯用時以淨手心抿腳挑放掌心溶化塗之再貼膏藥生肌玉紅膏正宗專治癰疽發背諸般潰爛等瘡用在已潰流膿時先用甘草湯甚者用豬蹄湯藥湯淋洗患上軟絹挹淨用抿腳挑膏於手掌中捺化遍搽新腐肉上外以太乙膏蓋之大瘡早晚洗換二次內兼服大補脾胃暖藥其腐肉易脫新肉即生瘡口自斂此乃外科收斂藥中之神藥也白蠟當歸身各二兩白芷五錢瓜兒竭輕粉各四錢紫草二錢甘草一兩二錢真麻油一斤先將白芷甘草當歸紫草四味入油內浸三日大杓內慢火熬藥枯色若熬太枯其油則黑細絹濾清將油復入杓內煎滾下整塊血竭化盡次下白蠟微火化盡先用茶盅四雙預頓水中將膏分作四處傾入盅內候片時方下研細輕粉每盅投和一錢攪勻候至一伏時取起綿紙復好勿犯灰塵本方不得加減致取不效太素膏説約凡瘡久不收口是元氣虛極急投大補湯劑內托外用此法輕粉三錢冰片五分乳細用豬脊髓調勻攤絹帛貼上必效豬腦膏廣城黎醫士公豬腦子一個放鍋內好陳醋泡透文武火煮成膏藥樣取出細布攤隨瘡大小貼之先將小米泔水洗淨瘡上貼膏二三日揭看內生肉芽再用小米泔煎洗又貼三五日肌肉長平忌房勞怒氣發物玉容膏諸惡瘡久不收口以及臁瘡敗龜版一兩胎髮豬毛羊毛鵝毛雞毛各四兩牛油豬板油桐油各二兩飛黃丹八兩炒麻油一斤同熬枯濾清以丹收之攤貼白玉膏雄豬油半斤入鍋內熬去渣復入鍋內熬滾投白蠟黃蠟各二錢化盡再入鉛粉五錢輕粉兒茶各一錢五分乳香沒藥去油各一錢攪勻攤貼貼久不收口諸瘡膏豬板油一兩熬化入白蠟五錢黃蠟八錢化盡再入乳香沒藥輕粉末各一錢成膏搽之玉液膏發背癰疽潰爛用此生肌止痛香油二兩黃蠟一兩化開入黃丹寒水石煅各一兩研細熔化為膏攤貼當歸膏生肌止痛補血續筋當歸身生地各一兩白蠟黃蠟各一錢麻油六兩入鍋內先將歸地熬枯去渣復熬投二蠟溶化待溫攪成膏生肌散多年朝東土牆上的白螺螄殼取來清水浸透淘去泥沙務須潔淨放傾銀罐內炭火煅紅冷定研細如霜加冰片摻上膏貼收口生肌散輕粉一錢血竭兒茶各一錢自死螺螄連泥者十個煅研極細加冰片一分收貯每用少許男用女乳女用男乳調搽三次全愈久不收口者用人參淨口嚼爛掩瘡口上自斂收口鮮白荷花瓣夾在書頁內每日移夾一頁不然要爛凡癰疽臁瘡上生肌藥收口時以此貼之斂口甚速如凍瘡破爛貼之亦效生肌散鮮鹿腿骨紙包灰火內煨至黃脆為度如焦黑則無用矣研極細摻瘡上生肌甚速諸瘡毒久不收口生鉛二分敲成薄片剪如香茶樣每日用鉛一分同核桃細嚼好酒吞下三日服完大便出毒物其口即收論背癰頭開不住王肯堂曰癰疽發背皆營氣不從逆於肉裡之所生即成之後焮腫疼甚五七日內或一頭從上開發或兩頭開闊上下侵展不住帝曰何氣使然岐伯曰不善於調養乃七情之擾房勞之變穢氣所撞惡氣所襲皆令開而不住當以內託大補之劑內加白蘞白芨等藥服之外以收斂之藥敷貼淋溻則聚而不開矣準繩論癰疽內肉不合法陳實功曰夫癰疽對口大瘡內外腐肉已盡惟結痂時內肉不黏連者用軟綿帛七八層放患上以絹繫緊將患處壓實數次內外之肉自然黏連一片長如生成之肉矣倘患口仍有未完處再搽玉紅膏其肉自平矣正宗繃縛背瘡法陳實功曰夫發背對口大瘡等疾已潰流膿時冬夏宜絹帛四五層放所貼膏藥外再用棉布見方八寸四角用蛇皮細帶釘之安蓋絹上以帶系在前胸繃實瘡上庶使瘡中暖氣不泄易於腐潰洗瘡時預備二繃更換務要患內暖氣烘者此法最善正宗澄曰凡發背潰後口小內大大膿已泄內肉不合宜用鉛片如鏡中鑿一眼如錢狀四邊錐眼以針穿縫綿布鋪上夏月則用兩層布鋪襆上六面釘闊絹帶六條先將膏藥蓋好加以新棉將鉛片鋪合瘡上先將左右二帶繫緊胸前再將左上角帶與右下角帶由左肩向右脅下斜系右上角帶與左下角帶由右肩向左脅下斜系則兩層新肉合成一塊矣倘左半邊虛處多右半邊實處多可將膏外襯棉左半邊墊厚些右半邊襯薄些如右半邊虛處多亦照此法總在看瘡取膿揩洗時留心察其虛實自明論生胬肉申鬥垣曰夫瘡瘍已潰愈加保護若不謹慎恐致敗壞倘七情內亂怒則傷肝肝為將軍之官肝主怒怒氣盛則刑脾脾主肉脾傷則瘡口內脹出名曰胬肉胬肉長滿不能自消若不去之雖瘡愈後肉高硬積久亦癢痛倘生面目之端形容醜怪乃不知去此之過也宜為烏梅燒灰少加輕粉一上即平愈後亦無瘡疤也矣啓玄周文採曰一曰著水二曰著風三曰著怒四乃庸俗醫生以手擠膿核時用力太重五乃妄用涼藥涼了瘡皮故生胬肉也集驗澄曰瘡口胬肉患者誤食生薑香菌菌子及違犯房幃均易將良肉胬出更有肩脊生胬者乃挑輕負重掙出肘腕手指生胬者必是拿甚重物所致足跟足指生胬者必是奔走跳動而胬凡視瘡毒出膿後肩脊上膏外加以厚紙或鉛片壓住肘腕手足跟指等處膏外須用厚紙或繭殼襯護薄絹繫好則可免良肉胬出且易收功論驗透膜法張景嶽曰凡背疽大潰欲驗穿透內膜者不可用皂角散嚏法但以紙封患處令病者用意呼吸如紙不動者未穿膜也倘用取嚏法鼓動內膜則反致穿透慎之慎之全書澄曰背疽潰爛但以草紙捻蘸麻油以火點著向瘡照之如燈光向外鼓動者里膜已破矣論瘡疽鎖口澄曰凡患瘡毒潰後不慎房欲以致瘡口漸高堅硬不斂此名鎖口又有誤食瓜子雞蛋亦能鎖口須用銀針輕手四圍挑斷以木耳焙研極細麻油調搽即消又曰瘡毒潰後已久風熱濕毒感受亦能鎖口論將息法程山齡曰凡病中設有挾風寒者即宜斷去葷腥油膩微服散藥俟外邪祛盡再用滋味調補大抵將息癰腫不可缺少滋味以血肉能生血肉也然又不宜過多使肉氣勝穀氣更忌生冷滯氣之物恐反傷脾胃耳並宜避風邪戒嗔怒寡思慮少言語兢兢保養為貴至於病後將息毒大者三年內宜遠幃幕毒小者期年內宜遠幃幕犯之則成虛損或成偏枯或陰減天年不可不慎也其他戒怒慎風亦須常作有病時想十法王肯堂曰保全胃氣厚味與生冷皆除勿冒風寒大熱與大寒當避多言多動不免真氣之有傷久坐久行皆致起居之不適寡思節欲尤戒恚怒悲憂湯粥適時更宜清虛恬靜準繩論培護法陳實功曰冬月發背須穿有袖綿背褡一件服下不可縫合取其易於揭看也且要預生炭火使暖逼盡余寒然後揭開用藥為妙正宗又曰如發背高腫須防撞傷須用細草照瘡大小作一圈子外用棉花絹片縫如串鈴樣四邊釘細帶四條安在瘡上護住瘡根以兩條帶子繫頸上以兩條帶子擊胸前則不致有撞傷之患矣薛立齋曰凡患背瘡切不容他仰臥若仰臥則瘡陷矣其欲生也得乎經驗全書李氏曰若背疽難於隱几宜用緑豆十斗作一袋隱伏其上以解毒涼心也十書論瘡久成瘻胡公弼曰夫瘡久不斂多成漏證常有膿水流而不絶其膿亦臭內無歹肉須先服參耆歸朮芎大劑托裡再用附子制過者以童便浸透切作二三分厚片安瘡上著艾灸之仍服托裡之劑隔三日再灸不五七次則瘻化肌生肉自長滿矣青囊論九漏王肯堂曰瘡漏是孔竅出水不止者是也氣漏或腫或消痛脹難忍者是也風漏瘡孔內癢甚者是也陰漏男女陰內痛而出水者是也冷漏孔內出白膿黃水不止者是也痔漏痔瘡日久不忌房事破而流膿不收口者是也血漏時時下鮮血不止名熱漏也瘻痼漏是平肉上生孔竅出膿血者是也痿腮漏因瘡忽黑爛出黃黑水者是也澄曰凡破漏之證多因氣血虧損潰後先膿後則清稀流水久而不斂遂成漏管亦有因庸醫日以藥線插入將瘡內嫩肉磨成厚肉瘡口不能驟合初則嫩管久則長成硬管漸生岔管者甚多亦有膿血去多陰分受虧陽火亢盛夢泄遺精或不慎房欲多成九漏之候最為難治必須內服補托謹戒房勞外用化管之藥內服退管丸丹化去內管方能收功又曰凡瘡潰後忌蔥以免生管識知百病生死法陳實功曰死生非神聖不能洞其機關疾病無明醫亦不能決其吉凶否則使人疑惑決斷不常余異授呂祖一枝梅真仙方也正宗呂祖一枝梅治大人男婦小兒新久諸病生死難定之間用藥芡實大一餅貼印堂之中點官香一枝香盡去藥已後一時許藥處有紅斑暈色腫氣飛散謂紅霞捧日病雖危篤其人不死如貼藥處一時後無腫無紅皮肉照舊不變謂白雲漫野病雖輕淺終歸冥路小兒急慢驚風一切老幼痢疾俱貼之紅腫即愈此方用之可預知生死也硃砂三錢銀硃五錢一分五靈脂三錢麝香三分萆麻子五分雄黃巴豆仁各五錢不去油上各研細末於端午日淨室中午時共研加油胭脂為膏瓷盒收藏勿經婦女人手臨用豆大一丸捏餅貼印堂中其功立見用過餅送河中夏月諸瘡傷闢蠅蛆門主方蟬花散東醫寶鑑夏月諸般傷損潰爛蛆蟲極盛臭不可近蛇蛻燒存性一兩蟬蛻青黛各五錢細辛二錢五分上為末每三錢酒調下日二次夏月諸瘡臭爛寒水石研細摻闢瘡瘍惡穢法辟惡氣張仲景蒼朮同豬蹄甲燒煙燻又方紅棗茶葉燒煙置房中又方荔枝殼燒煙解穢
