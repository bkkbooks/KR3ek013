body:
  text: 卷二十三後陰部自尾閭穀道起至臀股止一切痔漏瘡疽皆匯於此部中以便檢閲參治鸛口疽門主論靈樞曰發於尻名曰鋭疽其狀赤堅大急治之不治三十日死矣鬼遺方云湧泉疽腫起發太陰太陰尻尾前是也如伏鼠二十日不穴死十日可刺發清膿赤黑者死白色可治陳實功曰此乃三陰虧損督脈之經濁氣濕痰流結而成其患發在尾閭之穴高骨尖上初起形似魚胞久則突如鸛嘴朝寒暮熱日輕夜重潰後稀膿出而無禁又或鮮血出而不停凡發此者壯年猶可老者可危正宗汪省之曰初起滋陰除濕已成和氣養榮已潰滋腎保元久而成漏宜琥珀蠟礬丸先天大造丸兼服理例澄曰鸛口疽老弱難斂易於成漏尾閭發門主論王肯堂曰尾閭發生於尾閭穴乃督脈所主最痛難忍更難得膿準繩又曰病亞王不生尾䐐骨處結毒如桃李之大紅赤焮痛不能行動申鬥垣曰得之奔走勞傷或久坐血凝氣滯者易治得之酒色過度忍精強戰督脈虧損者破必成漏難以收功啓玄臀癰門主論王肯堂曰腫高根淺為臀癰腫平根深為臀疽俱屬足太陽膀胱經濕熱所致準繩薛立齊曰臀乃膀胱經部分也居小腹之後此陰中之陰其道遠其位僻雖太陽多血氣運難及血亦罕到中年後尤慮此患治者毋傷脾胃毋損氣血但當固根本為主陳實功曰臀癰生於小腹之後位遠僻奧氣亦罕到血亦少來凡生此者濕熱流結凝滯而成此證必須托毒外發庶不內攻初起毒從五臟蘊積者患必有頭紅腫墜重如石內必口乾發熱治當通利積熱外以膏貼金黃散敷四圍拔出瘀膿血內兼補托自愈若誤用敗毒寒劑外敷涼藥冰凝氣血毒氣不得外泄反致內攻如瘡頭軟陷無膿根腳平散不痛口乾煩躁譫語痰喘氣粗恍惚不寧者俱為不治但此證多從毒積五臟自內至表者十有八九風寒暑熱自外至里者百中一二嘗既出而復入里者終為死候正宗申鬥垣曰臀疽乃太陽膀胱經多血少氣生於承扶穴最痛宜托之生於實處者易治近大小便處者難治啓玄馮魯瞻曰癰發於臀乃膀胱之濕毒蒸熱或稟賦陰虛此地最難高聳潰膿大宜托裡為要錦囊朱丹溪曰臀癰生於臀上胯下近大腿處由濕熱相侵氣血凝聚郁毒而成形如大盤腫闊盈尺上覆其腰下遮其胯此為陰中之陰務須宣熱拔毒大補氣血培養腎胃滋補根源如此庶血易聚而膿易作毒易出而熱可宣不然經年纍月腫仍如故疼痛日深是以中年之後猶慮患此一見虛弱便與滋補可保終吉若妄以清涼敗毒內服外敷則氣血得寒益凝多致不救臀癰門主方臀癰五爪龍草連根搗汁酒沖服日進四五次膿從大便出未成者立消已成膿者以渣敷上立消洗臀癰潰後並治股瘡苦參金銀花白芷當歸黑皮硝各等分絹包砂銚內煎濃汁先熏後洗消臀癰金銀花四兩甘草節一兩熬膏每日空心和酒服渣留煎湯熏洗痤痱瘡門主論陳實功曰痤痱瘡者俗名坐板瘡生於兩股密如撒粟尖如芒刺癢痛非常渾身毛刺此因熱體見風毛竅所閉或因患瘡濕熱留結於此洗用苦參湯甚者皮損黏衣治以鵝黃散主之正宗蔣示吉曰坐板瘡或有因久坐卑濕之地或坐烈日石上釀成濕熱皆能致之說約申鬥垣曰此乃脾經濕熱濕毒郁久而成最痛最癢況股乃至陰之所血亦罕來藥力少至當用外治之藥治之啓玄心法曰坐板瘡一名風疳痤痱瘡門主方苦參湯治坐板瘡作癢抓之又疼坐如糠穩難以安睡苦參四兩大菖蒲二兩河水五瓢同煎數滾添水二瓢蓋片時臨洗入公豬膽汁四五枚淋洗患上不二三次全愈愈後避風忌發物又方槽坊吊大麥酒底水洗三四次效鵝黃散治痤痱瘡作癢抓之皮損隨後又疼用此撲之緑豆粉一兩黃柏三錢輕粉二錢滑石五錢研細以軟絹帛蘸藥撲於患上止痛收干又方薑黃一錢當歸苦參各五分紅花三分用麻油一盞同藥熬枯濾去渣入研細松香末五錢攪成嫩膏日搽二次忌口味又方麻黃枯礬豬油煎枯濾清以熱油擦之又方岐天師輕粉一錢冰片半分杏仁去皮尖十四粒蘿蔔種子三錢研細擦之又方雞蛋一個鑿孔入硫黃明礬細末各三錢調勻糊口灰火內煅研細麻油調搽又方醒齊筆記松香五錢雄黃一錢如濕加蒼朮二錢研末和勻棉紙條作捻兩個蠟豬油溶化浸透火燒滴下油搽瘡上立效又方明礬煎湯洗又方冬青葉牛舌草煎湯熏洗又方松香五錢雄黃一錢研細如濕癢加蒼朮三錢和勻以棉紙捲成藥條用臘月豬油或麻油浸透點火燒著取滴下油搽之加潮腦治疥又方芫花川椒黃柏熬湯溫洗即消毒盛癢痛不止油缸青布三指寬一條香油調雄黃末一錢攤於布上卷緊燃著吹滅焰頭向瘡薰之癢痛即止坐板瘡硃砂雄黃各一錢輕粉枯礬黃柏各三錢研細先用川椒煎洗後搽坐板瘡並陰囊發癢陳荷葉煎湯入白礬洗一二次坐板瘡陳崙友生白蘿蔔搗爛擦之不過三次或蘿蔔子研細擦又方硫黃一塊放豆腐內煮數滾加蒼朮各等分為末用醃豬油搗爛搽痔瘡門主論陳實功曰夫痔者乃素有濕熱過食炙煿或因久坐而血脈不行又有七情過傷生冷以及擔輕負重竭力遠行氣血縱橫經絡交錯又或酒色過度腸胃受傷以致濁氣瘀血流注肛門又有婦人臨産用力過甚血逆肛門亦能致此初起為痔久則成漏正宗陳遠公曰人肛門內外四旁忽生紅瘰先癢後疼後成為痔日久不愈此用濕熱所致也而得之縱飲者為多江南人常多患此皆由地之濕熱加之酒熱之毒所以結於肛門不能遽化也夫肛門通於大腸凡有濕熱應隨大便同出何以積而成痔蓋濕在大湯不能久留必盡趨肛門而肛門為大腸鎖鑰有防範之司不容濕熱出於門外於是蓄積既久而濕熱之毒肛門獨受之矣有毒必然外形不生肛門之內必生肛門之外雖內外少殊而作楚則一也治法烏可舍濕熱而他求乎但肛門去脾胃甚遠化濕熱之毒必假道於脾胃肛門未必受益而脾胃先損所以無功耳故用藥必須毋損於脾胃有益於肛門者始可奏功益後湯治之白芍茯苓山藥薏仁各一兩地榆三錢穿山甲一片土炒水煎服四劑肛門寬快又四劑內外痔消再以此方十倍蜜丸每日開水下五錢服完一料不再發冰鑑此方利水去濕既無損於脾胃又有益於脾與肛門兩得也又曰有肛門邊先生小癤因不戒酒色以致腐爛變成痔漏不能收口長成肉管每年一管流膿淌血甚以為苦世人治法多用刀針掛線徒受苦楚而內毒未除外口難長經年纍月難以奏功豈漏瘡終不可治乎抑犯酒色之戒乎皆治不得法耳夫肛門之肉不比他處肛門之皮亦不比他處他處肌肉非橫生即直生惟肛門肌肉有縱有橫最難生合況大便不時出入加以刀針掛線是已傷又傷安能遽長皮肉乎故刀針掛線切戒輕試惟消濕熱之毒內治為佳然漏卮既久勿論漏不可止而氣血反傷終難奏效也當於補中兼消則何患漏之不痊哉青龜丸烏龜一個茯苓五兩黃耆八兩當歸三兩人參二兩薏仁六錢穿山甲五錢土炒瓦松二條陰乾不可見火白芷槐米干青苔各一兩羊蹄後爪四副土炒研末將龜石臼內搗死以藥末拌之飯鍋內蒸熟將龜肉與甲火焙乾為末同前藥蜜丸每日服三錢一月漏痔干二月漏痔滿服完全愈不復發但服丸時必戒酒色三月倘犯之不能奏功此方治漏神效非俗方可比有不可思議之炒去濕而不散氣敗毒又不損血補破於無形填隙於有孔願人敬信此方堅三月之戒以去宿疾也又曰有大便時先射血幾許始下糞者人以為便血證誰知肛門暗生血痔乎夫痔久必變漏宜流膿血殊不知受病不同見證亦異此多得過飲火酒熱走直腸而不得遽泄乃結成小痔久則皮破血出此血乃外出直腸之外非出直腸之中乃膀胱之血也夫膀胱化氣而不化血酒毒滲入膀胱將酒氣化水出於陰器而酒毒爍血不能從陰器而出不得趨大腸肛門而出矣無奈門徑各別戶口牢閉無可出路而酒毒結直腸之外毒向內攻而直腸之痔生矣痔生必破有隙可乘而膀胱之血注之久則以血引血不但膀胱之血盡歸之也乘大便之開關血先奪門而出耳治當急填其隙使血出而無路然私竇既開漏卮易泄不急清上游之源而但截下流之隙非計之善也清源散黃連槐花地榆人參各三錢茯苓白朮各五錢車前子葛根各三錢白芷三分穿山甲土炒一錢研末三七根研末三錢水煎調末服三劑血較前更多減去黃連又三劑血止痔愈必須戒酒終身勿服也若女色只忌三月永不再發倘不能禁不必徒治瀆吾方也此方炒在多用黃連以解酒熱之毒所謂清源也上游無病下流自安各藥又分派得宜無非去濕化熱堵截有方故慶平成何患洪流沖決哉蔣示吉曰痔類不一有牛奶痔雞心痔雞冠痔菱角痔蓮花痔珍珠痔珊瑚痔蜂窩痔雞肝痔翻花痔穿腸痔鼠奶痔櫻桃痔鼠尾痔核桃痔蜆肉痔內痔外痔因形定名總不外乎醉飽入房膏粱醇酒負重致遠以致濕熱風燥濁氣瘀血流注肛門俱能生痔婦人産後用力太過瘀血凝滯亦能致此毒淺者其形正而平常毒深者其形異而頑惡久則崩潰成漏新則墜重刺疼甚者糞從孔出血自竅流氣血日虧形容日削治法當以涼血行氣為主其外治法須分內外內痔以喚痔枯痔之法治之外痔疼甚者清之頭大蒂小者線結之頭小根大者枯之說約又曰凡瘡久不收口日流膿水甚而醫家任意以紙捻紝入日逐磨璘漸生膿管如燈草蔥管遂名曰漏證此皆氣血虧損熱毒鬱結使榮衛運行而失職也遍身虛怯處多有之惟痔瘡成漏最易若用刀針掛線徒受痛楚不若以推車客散內消之為妙也內服十全大補湯補中益氣湯以培助之馮魯瞻曰痔漏其名有五曰牡曰牝曰氣曰血曰酒又有腸風痔脈痔雌雄痔皆五痔之別名也初生具在肛邊狀如鼠乳或結小核癢痛注悶甚者身熱惡寒皆由房勞飲酒過度久嗜甘肥不慎醉飽以致陰陽勞撓血脈腸澼滲漏沖注下部而成治法始覺便服秦艽槐角連翹土貝之類外用熏洗以取內消倘仍姿情嗜欲則腐潰膿血逗留日久傍穿竅穴即變為漏必須補氣血慎調攝方可以漸收功錦囊又曰痔者肛門之傍生瘡腫痛者是也亦有生瘡有孔惡水不幹而為漏者皆由母食酒面煿炙在胎受之或因後天失調心經蘊熱熱傳於肺注於大腸而成者治小兒痔瘡宜內服涼血解毒外用熏洗可也又曰痔漏之源受病者燥氣也為病者濕熱也皆由酒色過度濕而生熱充於臟腑溢於經絡墜乎穀道左右衝突為痔雖見證於大腸實陰虛而火實所致經所謂開竅於二陰久則潰而成漏然痔輕而漏重痔實而漏虛治痔不過涼血清熱治漏初則涼血清熱燥濕久則澀竅殺蟲兼乎溫散或曰痔漏火是根源何故而用濕澀殊不知痔只出血始終是熱漏流膿水始是濕熱終是濕寒不用溫藥何以去濕而散寒乎非止痔漏百病中多有始熱而終寒者即如瀉利嘔吐初則腸胃氣實而熱久則腸胃虛為寒丹溪下血條云下血久不愈者後用溫劑正此義也朱丹溪曰漏瘡須先服補藥生氣血參朮耆歸為主大劑服之隨以附子末唾和作餅如錢厚以艾炙之漏大炷大漏小炷小灸令微熱不可使痛干則易餅再灸如困則止來日又灸直至肉平為效亦有用附子片灸仍用前補劑膏貼之尤妙治漏法李東垣曰腸頭成塊者濕也作大痛者風也大便燥結者兼受火熱也是濕熱風燥四氣合邪法當瀉火潤燥疏風和血止痛是其治也十書馮魯瞻曰痔漏初起須用芩連之類以涼大腸枳殼以寬大腸澀竅用赤白石脂枯礬黃丹腦子之類錦囊又曰痔漏若能味無味之味正味足矣事無事之事百事備矣若服餌調節謹慎合宜未有不瘥者也若不知謹慎強治無功竇漢卿曰大法治痔以涼血為主如肛旁別有一竅出膿血名曰單漏治之宜溫暖之劑補其內生肌之藥敷其外竇夢麟曰竅在皮膚者易愈臟腑有損而致竅者未易治也養生必效方載乾義傳僧覺海少年患痔疾其行業比冰霜緣此飽食久坐知痔疾者不必酒色過度矣故素問云因而飽食筋脈橫解腸澼為痔三神丸治僧道痔疾故治有不同也岐天師曰人有糞門內拖出一條似蛇非蛇或進或出便糞之時又安然無礙此乃大腸濕熱之極生此怪物長於直腸之間非蛇也乃肉也但伸縮如意又似乎蛇法當用逐邪殺蛇丹服之外用好木耳一兩煎湯洗之洗後用冰片一分研末掃上掃盡即縮進而愈神驗祕録澄曰治痔漏鸛口等證患者欲坐不能須用定鋪極厚蘆花坐墊中開一洞將患處坐向洞中自無壓擠傷瘡之患痔瘡門主方諸痔初起煎方槐角子黑牛膽制生地當歸連翹枳殼升麻荊芥穗陳皮防風地榆各等分黃連黃柏黃芩此三味春秋用七分夏用一錢五分冬用五分水煎空心服大便祕加蒸大黃火麻仁又方柴胡甘草厚朴獨活生地牡丹皮陳皮槐角子黃芩白芍金銀花當歸黃柏水煎服痔瘡初起大便下血未破無膿皆可內消象牙煅白殭蠶煅地榆煅胡黃連各一兩槐花火酒拌炒貫衆火酒拌炒生地各二錢石燕一對火煅醋淬研細蜜丸清晨淡鹽湯送下二錢熊膽散痔瘡堅硬作痛脫肛腫泛不收冰片一分熊膽二分研細先將大田螺一個用尖刀挑起螺靨入藥在內放片時待螺化出漿水用雞翎掃痔上頻頻用之即愈又方田螺水養伺其靨開入冰片少許螺自化水雞翎掃上又方槐花研末灌入雄牛膽內陰乾為丸白湯送下三錢又方雄鵝膽汁調冰片搽之又方白鵝膽取汁三四枚熊膽二分冰片一分調勻塗痔上又方橄欖核煅灰熊膽二錢冰片六分研勻鵝膽汁調搽內痔樹上干桃枚陰陽瓦焙乾再入冰片三分入瓶內加豬膽汁擠入肛內立止痔疼烏梅肉七枚陰陽瓦焙研細末冰片三分兒茶七分研細末先以瓦松皮硝湯洗過再搽又方活蚯蚓洗淨泥土搗爛沖熱酒服外用豬膽調杏仁冰片末雞翎掃上痔內生蟲鰻鱺魚骨燒煙薰肛門其痔內蟲盡死藥線方諸痔癭瘤凡根蒂小而頭面大者用此線系其患根自落芫花五錢壁錢二錢白色細扣線三錢水一碗同浸小瓷罐內慢火煮水乾為度取線陰乾凡遇前患用線一根患大者二根雙扣繫於根蒂兩頭留線日漸緊之其患自然冰冷紫黑枯落後長肉藥收口又方蜘蛛網四邊粗絲合成線結患根上枯痔法凡痔瘡泛出即用此藥塗之痔自乾黑枯落欲用此方四邊好肉須先用護痔散護住良肉明礬四兩輕粉硃砂各三錢白砒四錢先將礬入銅杓內煅滾次入砒末攪勻以礬枯為度去火毒片時次入輕粉硃砂再研極細瓷罐收貯每日辰午申三時以溫湯洗淨痔上唾津調塗七八日其痔自然枯盡方上生肌藥護痔散白芨大黃苦參寒水石緑豆粉黃柏各等分研細熱水調塗四邊好肉上方搽枯痔藥喚痔散痔在肛門內腸頭上外面看不見痛苦不勝用此藥喚出痔來以蔥湯洗淨上藥磁石一兩活而吸鐵者草烏尖生用五分枯礬五錢乾薑三分泡另研共研極細用生薑汁或蔥汁調塗肛門上少頃肛自內脫出痔瘡上下洗淨四邊好肉上用前護藥次上枯藥一日三上洗用新筆蘸藥洗之如此六七日脫盡痔根即用生肌藥收口後用貼頂升陽散收入其腸內服槐角丸貼頂升陽散萆麻子四五粒去殼麝香三分共搗膏將頭心發去錢大一塊貼此藥少頃其肛即收入如緩再用醋一口噴患人面上立收熏痔法蓮蓬殼一個五倍子一個將倍子開一孔納明雄五分於內再將倍子有孔一頭納入蓮蓬殼內以線扎緊入小口砂鍋內水煎十數沸對痔上熏之冷則又溫頻熏自效又方蒼耳子荊芥黃芩花椒馬齒莧瓦松皮硝白礬槐花各等分每用五錢加蔥白五根煎湯熏洗又方魚腥草煎湯熏洗仍以草挹痔上又方鳳尾草煎湯熏洗又方梓桐樹枝葉煎湯熏洗又方豨蘞草連根煎湯熏洗又方槐花泡汁當茶飲渣再煎熏洗又方新蠶豆花梗葉煎湯熏洗又方芒硝瓦松陳蓮蓬殼煎湯熏洗又方苦𦼫菜煮爛為度和湯置器中坐熏待溫下手以菜頻頻洗之每日洗三次又方陳枳殼干茄蒂冬瓜皮陳槐花各等分煎湯熏洗又方桃樹根皮煮汁每日熏洗三四次又方馬齒莧煎湯熏洗內食生熟荸薺又方苦參茵陳各五錢煎湯熏洗兼治脫肛又方枳殼二兩荔枝草四兩河水煎湯先熏後洗又方無花果葉煎湯熏洗洗痔黃硝湯痔瘡腫痛大黃二兩水十二碗煎至八碗再入朴硝一兩略滾傾桶內薰洗之肛門四邊腫硬癢痛不可忍者白礬三分研碎用童便化開洗痔上每日二三次洗痔膏此膏能洗痔瘡用刀剪不疼不痛槐花明礬各一斤或用膽礬先將槐花用河水熬取濃汁濾清復入淨鍋內投礬於內熬至極稠瓷罐收貯每用少許入開水內化開洗之其痛立止外痔瓦花朝北者同冰片搗敷外痔五倍子五個焙冰片五釐研細麻油調搽痔瘡初起熊膽三錢冰片四分研細豬膽汁調搽痔上如已潰者不可用豬膽汁如用在已破之瘡便要極疼消痔千金散孩兒茶黃連寒水石各五分硼砂赤石脂蘆甘石各三分熊膽二分冰片一分研細清茶調敷患上腫痛立止蝸牛膏集驗蝸牛一枚加麝香冰片研爛瓷盒盛次早取汁塗消痔丸痔瘡痔漏初起人壯便祕血分壅熱者生地四兩水洗片芩一兩五錢金銀花枳殼麩炒秦艽各一兩防風大黃九制當歸蒼朮米泔浸炒地龍槐花炒赤芍各二兩研末煉蜜為丸空心白湯送下三錢又方白雞膽二三枚取汁入熊膽二分冰片五釐共研一處瓷盒收藏勿使出氣用時以手指搽之神繭散蠶繭納入男子指甲以滿為度外用童發纏裹燒灰存性研細蜜調搽鯽魚散鯽魚一尾刮去腸淨入白礬令滿瓦