錠約重三錢共研細末煉蜜為丸每早服三錢至七日後服二錢五分又七日服二錢忌火酒又七日服一錢五分每早晚用柳須花椒煎水熏洗一料服完永不再發忌羊肉驢肉公雞鯉魚辛辣又方蚯蚓半斤用竹刀剖開去淨腹內泥砂鍋上焙乾象牙二兩共研極細末用白糖水和勻為丸如梧桐子大每早空心用陳無灰酒送下三錢三服後即有效驗服至十日有管者漸漸退出內自生肌勿吃一切發物腥酒豬首公雞等類尤忌房事此方屢用驗過多人萬勿輕視推車客散痔漏不論遠年近日最凶者百日收其管自出酸棗仁炒遠志肉蒼朮鹽醋米泔童便四制穿山甲炙側柏葉白礬水煮枳殼醋煮地骨皮各一兩槐角子炒貫衆酒拌九蒸九曬陳棕炭各三兩蝟皮煅存性一兩白花地丁七八月採生白花者六兩如法制度為極細末空心酒調服三錢或白湯亦可服一月後每服加推車客即蜣螂細末三分管自退出如出以快剪去之柏膠丸內消痔漏雄黃同蜜煎老去蜜小茴香各三錢川黃連側柏葉各一兩廣膠八兩切斷以牡蠣粉八兩炒成珠去牡蠣熊膽一錢槐角子一莢四五粒者佳四兩研細鍊白蜜為丸早晚各服三錢白湯送下葷用雞蛋素用豆腐過口如痔痛極者加乳香去油沒藥去油各二錢蟾酥一錢五分追毒丸痔漏通腸汙從孔出先用此丸追盡膿毒後服閉管丸立效胡連切片薑汁拌炒蝟皮炙切片再炒黃色各一兩麝香二分研細軟飲為丸麻子大每服一錢食前酒下服丸後膿水反多藥力到也莫懼閉管丸胡連一兩槐花微炒穿山甲麻油內煮黃色石決明煅各五錢煉蜜丸麻子大每服一錢空心清米湯送下早晚日進二服至重四十日而愈如漏四邊有硬肉突起者加蠶繭二十個炒研和入藥中並治遍身諸漏皆效痔漏不拘蜂窠翻花通腸三十二孔者不用刀針掛線立建神功黑醜連皮炒大黃酒拌蒸極爛白蓮蕊各三兩紅礬醋煮五倍子炒五味子炒川當歸各一兩黃連七錢乳香去油沒藥去油各一錢山豆根五錢研細酒疊丸每服一錢五分肉湯送下退管童血餘煅槐角子炒各一兩白蒺藜炒去刺二兩直殭蠶炒皮硝炒兒茶沒藥去油各五錢蟬蛻酒洗焙三錢蜂房焙四錢犀角瓦上炙鹿茸各五錢肥皂子四十九粒取肉瓦焙研細用黃蠟四錢狗油一兩化勻和丸如桐子大每服六七十丸早晚酒送下半月其管自退加味槐角丸痔漏通用並治腸風下血川芎真阿膠白芷各五錢槐角子生地當歸身各二兩黃連條芩枳殼連翹防風秦艽地榆升麻各一兩黃耆二兩研末蜜丸或酒糊丸桐子大每服五十丸漸加至七八十丸百丸空心溫酒或米湯送下釣腸丸久漏虛漏肛門腫痛生瘡時有膿血及腸風下血虛寒久不愈者生附子去皮臍枯緑礬各一兩訶子煨枳殼去穰麩炒天南星生用白附子半夏枯白礬各二兩雞冠花微炒五兩栝蔞燒後存性蝟皮燒存性各二個胡桃仁十五兩不去油罐內煅存性研末醋糊丸桐子大每服二十丸空心臨臥時俱用溫酒送下痔漏出血不止孫真人熟附子焙明礬各一兩研細蜜丸桐子大每服二丸酒下一日三服數日血止百日除根痔漏神方柿餅放炭火上燒灰存性每一兩入嫩滴乳石一錢共研細末每服一匙一日服四五次或茶或米飲或糕或飯俱可服俱在食前服初服五七日必流血水管漸化出或痛或不痛次流黃水結疤全愈永不再發遠年者用半斤近者數兩滴乳石要極嫩的指甲颳得下者為佳生用不必煅治痔油藥靈祕丹藥蘇合油熊膽各五分雞蛋頭生者二個取蛋清將雞蛋清熬油三味和勻敷之有一趙姓患痔垂死用之即愈治痔藥水片腦一分朴硝五分熊膽三分蝸牛田螺肉各十兩橄欖核燒灰五分將蝸牛田螺肉搗爛入藥浸一夜取水並藥敷瘡無不斷根痔漏洪武帝親驗犀角象牙乳香沒藥各一兩明礬黃蠟各五錢銅器熔化蠟入藥丸梧子大用連翹金銀花入好酒煎半日去渣酒服二十一丸自愈槐角丸槐角子槐花各八兩檳榔四兩黃芩三兩刺蝟皮兩個酒浸焙共為細末煉蜜為丸桐子大空心白湯送下每服一百丸又方外科祕書青苔青石上者焙末加生礬少許再研聽用先將瓦花一把水煎滾加鹽滷一碗坐上浴洗其痔漸漸縮小揩乾將藥抹上但要痛三四次即愈永不再發痔漏周鶴仙金銀花揀淨梗葉粉甘草各一斤上二味以一斤為末煉蜜為丸如桐子大以一斤浸黃酒每用一杯送丸藥二錢一日三服一料即愈一切痔俱枯落漏管漸退出神效無比海州州尊李公方治痔漏血痔如箭腸風下血並效橡斗子殼四兩黃耆蜜炙枳殼麩炒黃連酒炒地榆去下半截只用上頭半截取淨末各二兩共為細末老米打糊為丸如緑豆大每清晨用槐花米三錢煎湯送下一錢重者二錢半月全愈至重者兼用小靈丹必效小靈丹番木鱉不拘多少用麻油煎枯存性取起為末麵糊為丸如蘿蔔子大臨臥時用清茶調服一分六釐蓋暖出汗切忌不可說話其油用熊膽為末冰片少許和勻留搽外痔如外痔先以荊芥防風瓦松煎湯熏洗塗藥如內痔則只服二方丹藥自愈此丹兼治中風口眼喎斜如神此油搽梅花瘌痢三日即好痔漏活磁石六兩打如豆大用硫黃一兩研細以白芨水浸磁石將硫黃為衣曬乾入陽城罐內鐵盞蓋定鹽泥固濟升七炷香冷定開看其靈藥只有三錢聽用又用硃砂明礬火硝青鹽各四兩入陽城罐內照前升七炷香刮取靈藥又用紋銀一兩硫黃三錢白砒三分入傾銀罐內煉化攪成粉將三項藥各稱等一分米飯為丸空心白芷煎湯送下一分半日許下部作脹痛時要人手拍左右其管退出外用好生肌藥收口其功甚速如瘡口小可另用好爛藥爛開瘡口其管更易退出如欲速於退管可用萆麻子一兩煎水熏洗其退更速治痔良方夫痔何由而生乃心經之積熱流於大腸經為害於穀道古人名之曰痔曰漏此證男女皆患蓋緣美味多飧醇醪過飲醉飽貪欲喜怒交加漸積而成其患初起結纍如牛乳雞心不破為痔破流膿水為漏變為蓮花通腸雞冠其禍不小不醫則患重於一切世人不審痔源不解漏根動輒藥線穿蝕致受痛苦男子強求一時之功而婦人豈能穿線乎譬夫瓦破則漏水下流不補其瓦漏安能免豫得此方男婦並治不理其瘡惟補其氣血為主使其上不漏則下無害矣且無號痛之慘潰爛之險服此藥者不惟能愈痔漏抑且以保壽延年耳人參甘枸杞生地當歸身各一兩五錢茯苓麥門冬去心棗仁炒遠志肉白芍酒炒各八錢粉甘草去皮五錢白朮土炒一兩上為細末用豬心血略加煉蜜為丸如桐子大每臨臥時無灰酒送下七八十丸先看瘡之輕重輕者煎五六劑重者十劑候瘡痛止水收再照方合丸藥服服時仰臥一二時勿令心亂妄想宜少房欲忌火酒蔥蒜生酒小雞宜永斷羊肉痔漏方方君達若久漏倍人參二三兩雞冠石榴等痔先宜止痛為主再搽枯痔藥冰螺散或用熊膽磨搽或番木鱉磨搽阿魏一兩人參五錢生地三兩熟地全蠍米泔浸洗槐花去梗灰炒阿膠蛤粉炒各二兩象皮土炒紅花川連各五錢柿餅八兩陳茶浸同生熟地搗膏槐角子連子炒二兩上為末以柿餅膏和杵為丸如緑豆大每早晚空心開水送下二錢戒氣惱房事生冷發物如痔流水時不可行走內外痔漏並下部有漏久服神效痔漏混元丹郭朗仙青礞石八兩黑色打碎有金星者佳黑鉛三兩同硫黃四兩炒成青金色陳明瓦三兩二錢明雄水銀雌黃各二兩白砒八錢皂礬四兩牙硝六兩同青礞石煅金色各研粗末用升量有多少好做混元球大小先以灰如藥數成球庶不致藥多球小也球成將藥裝入混元球內以泥蓋蓋之封固入灰缸內用金粟火煨一日至夜又翻轉四面俱煨到取起去蓋看時如藥茶褐色黃色俱好如白色黑白色可再封口煨之養火一日取出配後藥每靈藥一兩加鳳頭貫衆去心淨二兩以濕紙包鹽泥固濟曬乾入炭煅紅取出悶息存性研細末一兩黑棗肉一兩二錢同入石臼內杵為丸如黃豆大每空心酒下三四丸或五丸服後倘喉痛破損止藥一二日待喉中不痛照前又服以愈為度做紫土混元球法用紫土槌熟加舊草鞋或舊棉絮和入土內多杵為妙再以舊絹一小方藥多少即用灰多少於內包裹成球要圓些上扎之入泥內包裹成球以木板打之入灰內過一二日換灰取起又打之待乾若有縫以泥塗之以無縫為度俟極乾透解去繩取去灰入藥內其口先做有子口小蓋現成裝藥入內以蓋蓋之再以熟泥封固要緊再下缸煨之醜午丹治痔瘡痔漏能止膿水不用退管自然斂口誠乃痔中之聖藥也馬藺子三錢炒研細牛黃三釐梨一個去皮上剜一孔去心將藥裝入梨內仍以蓋蓋之竹籤扦好飯鍋內燉熟不可入水服時入白蜜七八錢槌爛食之一日吃一個奏功最捷內外痔均效凡痔漏發背疔毒臁瘡破流黃水到處起瘡杭粉一兩入銀罐內化開成老金色冷定研末加冰片三分搽之其水自止其痛亦定即不成瘡矣痔漏退管貓耳朵刺即十大功勞五錢槐花一兩煎湯先熏後洗如打噴嚏其管即脫下治痔漏二三十孔出糞者犬肉青黛福建者各八兩共搗千杵為丸每空心白酒或白湯送下二錢至重者一斤全好熏洗痔漏瓦松皮硝川椒地骨皮槐條用鱉一個煨湯煎藥傾淨桶內先熏後洗又方花椒艾葉蔥白白茄根馬齒莧皮硝五倍子煎湯先熏後洗蝟皮丸刺蝟皮三四個酒浸焙經霜槐角子一斤當歸三兩共為末煉蜜丸桐子大每服一二百丸溫酒送下痔漏湯道士穿山甲炙一兩槐花明礬各二兩共研細黃蠟二兩熔化為丸每服一錢五分痔漏丸金銀花一斤甘草節連翹去心各三兩共研細末用夏枯草八兩熬膏加煉蜜少許和杵為丸如彈子大約重三錢每早晚用開水或酒調服一丸戒色欲燒酒余者不忌一料全愈痔漏象牙屑二斤研極細末每早用熟雞蛋三個蘸屑吃或入稀粥內服完一料全愈三十年痔漏三料除根白蓮鬚黑牽牛各一兩五錢當歸五錢研末每服二錢空心酒下忌熱物五日見效臟毒門主論陳實功曰臟毒生於肛門之兩旁乃濕熱相火內灼肺金而成也或醇酒膏粱勤勞辛苦蘊毒流注肛門結成腫塊發於外者多實多熱脈數有力肛門突腫大便祕結肚腹不寬小水不利甚則肛門肉泛如箍孔頭緊閉此為外發屬易治宜通利大小二便珍珠散人中白散搽之膿熟針之發於內者屬陰虛濕熱滲入肛門內臟結腫刺痛如錐小便淋漓大便虛祕咳嗽生痰脈數虛細寒熱往來遇夜尤甚此為內發屬陰難治當用四物湯加知母黃柏花粉甘草兼以六味地黃丸調治候內藏膿出則安又有生平性情暴急縱食膏粱或兼補術蘊毒結於臟腑火熱流注肛門結而為腫其患痛連小腹肛門墜重二便乖違或瀉或祕肛門內蝕串爛經絡汙水流通大孔無禁飲食不飧作渴尤甚凡犯此候未得見其有生又有虛勞久嗽痰火結腫肛門如粟破必成漏此名癆疰乃內傷壞證不可勉治正宗心法曰臟毒有內外陰陽之別發於外者由醇酒厚味勤勞辛苦蘊注於肛門兩旁腫突形如桃李大便祕結小水短赤甚者肛門重墜緊閉下氣不通刺痛如錐脈數有力多實多熱屬陽易治發於內者兼陰虛濕熱下注肛門內結壅腫刺痛如錐大便虛閉小水淋漓寒熱往來遇夜尤甚脈微細為虛為濕屬陰難治馮魯瞻曰內證中有謂臟毒者乃腸風日久氣血俱虛下陷日甚大腸濕熱蘊積遂生窠穴為積血之器從便之前後而來其腹則痛血濁而色黯者名曰臟毒內傷蘊積久而始發者也謂之挾熱下血雖有毒名實非毒也腸風者風邪淫乎腸胃也臟毒者濕邪淫乎腸胃也若血射如線者蟲痔也腸風臟毒之血自腸臟而來五痔之血自肛門蝕孔處出也臟毒門主方臟毒下血三吳醫案槐花木耳各三錢大黃酒浸九蒸九曬二兩郁李仁皂角子象牙屑條芩升麻血餘炭荊芥穗各五錢共為細末煉蜜為丸如赤豆大外以四物湯加黑蒲黃各一兩為衣米湯送下空心及下午各二錢服完立愈又方乾柿餅燒灰米飲調下二錢加味臟連丸治臟毒黃連八兩枳殼六兩大麥餡子一升甘草四兩先為粗末裝入犍豬大腸內不拘幾段用線扎緊酒水同煮極爛搗成餅曬乾為細末水疊為丸白湯送下二錢洗臟毒痔瘡葉台山五倍子當歸黃柏槐花木鱉子各一兩瓦松十根紅花五錢煎湯熏洗消毒百應丸治臟毒痔漏蒼朮豬牙皂槐花或槐角子金銀花黃柏當歸各四兩上六味用河井水各四碗煎取濃汁濾清入錦紋大黃一斤石槌打碎浸透取起曬乾又浸又曬汁盡為度研細末用陳蕎麥麵和杵為丸如緑豆大如血多加地榆四兩煎湯尋常用二十丸沉重用六十四丸體厚者用八十一丸白湯送下並治內外諸證湯引開後心痛艾醋煎湯下追蟲下積檳榔湯下肚痛乾薑湯下咳嗽薑湯下傷食酒下夜多小便山茱萸湯下疝氣茴香湯下風火時眼黃連湯下白痢薑湯下赤痢甘草湯下渾身痛乳香湯下五勞七傷鹽湯下腸風下血吐血當歸湯下難産童便下五淋大小便祕大黃湯下痔瘡漏瘡頭痛眼脹傷寒發熱紫蘇湯或大黃湯下經水不通紅花湯或當歸湯下肚大青筋膨脹石榴湯下黃腫陳皮湯下四肢無力熟地湯下疔瘡磨刀水下臟毒下血丹溪車前草連根一握生薑一小塊和新水搗爛去渣取汁候血欲下時腰間必覺重即服此一盞少傾漸覺冷下腹中登廁便不見血矣臟毒下血錦囊黃連四兩酒浸春秋五日夏三日冬十日曬乾為末烏梅肉六兩搗爛丸桐子大每服二三十丸空心白湯下腸風門主論林氏曰或問風邪何由入於大腸毒氣何因聚於臟腑此風與毒有所分別否答曰此風非外感風寒之風此毒非癰疽膿血之毒總當以氣字看而腸風亦如春傷於風之義本足陽明清氣不能升發透達於四肢腠理之間而反下陷於大腸大腸之血脈亦隨此氣而虛陷陷久則氣血鬱結而化為濕熱因此血隨氣滯凡登圊氣陷火迫之時其血先糞而至至則清散不多初起謂之腸風蓋因方中多用荊芥防風升麻諸風藥升舉清陽之氣遂疑為外感之風也即使是風亦血熱所化之風豈外風能入於大腸也哉至於臟毒者因腸風日久氣血兩虛虛陷之氣日甚而大腸之濕熱蘊積日深手陽明大腸為積血之處其勢必隨氣下陷從糞之前後而來來雖不痛而其色多黑黯成塊故有毒之名而實無痔漏腸癰膿血疼痛之毒也若其病久遠氣血愈虧則脾胃之元氣諒必先虧不能統運周身血脈使之流行無礙亦隨陷於大腸而成結陰便血之證在下清氣不舉便血而兼飧泄之病在上濁氣凝結中滿而兼喘嗽之恙甚至肢體浮腫胸腹脹悶而死是證應分為三輕曰腸風甚至臟毒重則結陰也活人録彙編又曰初起之脈或沉數有力或弦數不清久則芤數無力或沉澀而弱或結陰脾虛之脈非芤澀則虛傳初則宜於升陽清熱次則清補相兼和血解毒結陰則當升清利濁兼於溫補其血可也又曰近世患痔者多而痔中出血者亦不少多有誤認腸風臟毒而用寒劑者不止復用升提者再不應而亦用溫補者總與痔血無干而補瀉盡屬妄投及余細審脈證方知此血實從痔瘡中出痔愈則血不治而自止於是病者大悟求治於專門者痔果全愈而血從此止醫者亦當細心體察特詳贅以詔後學醫論選要曰腸澼者大便下血也經云風客淫氣其精乃亡邪傷肝也因而飽食筋脈橫解腸澼為痔蓋緣風氣通於肝肝生風風生熱風客則淫氣傷精精亡則邪熱傷肝因飽行房則筋脈橫解而腸澼痔漏之證生焉人之不避風毒恣飲醇酒炙煿之物縱欲喜怒無常臟腑鬱抑飲食自倍腸胃乃傷陰陽不和關格壅滯熱毒下注血滲大腸而成腸澼痔漏之疾矣俗謂之腸風臟毒是也其病身寒脈沉者生身熱脈浮者死治法宜祛風消毒解熱涼臟和血潤燥為主錢青掄曰腸風下血貴在節欲戒酒方可除根朱丹溪曰腸風獨在胃與大腸出血兼風者宜蒼朮秦艽香附芍藥之類馮魯瞻曰腸風者邪氣外入隨感隨見所以色清臟毒者蘊積毒久而始見所以色濁治腸風以散風行濕治臟毒以清熱涼血又要看其虛實新久新者實者降之瀉之虛者久者升之補之夫血之在身有陰有陽陽者順氣而行循流脈中調和五臟灑陳六腑謂之營血陰者居於絡脈專守臟腑滋養神氣濡潤筋骨若感內外之邪而受傷則或循經之陽血至其傷處為邪氣所沮漏泄經外或居絡之陰血因留著之邪潰裂而出則皆滲入腸胃而泄矣世俗率以腸風名之不知風乃六淫之一耳若腸胃受火熱二淫與寒燥濕怫鬱其氣及飲食勞力傷其陰絡之血者亦可謂之腸風乎針經曰陽絡傷則血外溢而吐衄陰絡傷則血內溢而便溺是也不可純用寒涼藥必加辛散為佐久之不愈宜理胃氣兼升舉藥蓋精氣血氣皆生於穀氣大便下血多以胃藥收功徒用苦寒而不理脾胃是絶氣危生之下工也又曰腸胃本無血而有下血者大腸之病也大腸何以病下血邪以感之也蓋陰絡不傷腸胃不虛雖有外邪亦不能患惟醉飽房勞坐臥風濕恣啖生冷以致濕熱陰絡受傷外邪得以乘之經云陰絡傷則血內溢而便血又云結陰者便血一升再結二升三結三升此言陰氣內結不得外行滲入腸間乃寒濕生災而陰邪之勝也外邪者何風寒暑濕熱是也風喜傷肝肝傷則不能藏血而下者醉後飲冷寒飲內傷血為寒凝滲入大腸而下者內外傷濕濕傷凝胃隨氣下流而致者膏粱人厚味酒色藜藿人勞役過度以致熱積下焦而致者然濕毒下血者腹中不痛熱毒下血者腹中多痛更有內傷陽氣不足下焦之陰無元陽以維之而下血者書所謂病人面無色脈浮弱平按之絶者下血是也有脾虛陽氣下陷不能統血以致血隨氣降而下者蓋陰必從陽血必從氣脾為氣血生化之源故必賴補中升陽以胃藥收功有以先便後血者為遠血由足陽明隨經入胃先血後便者為近血由手陽明大腸隨經下滲有以心肺為遠血而屬陽肝腎為近血而屬陰以論者名為腸風臟毒實非外感之風腫熱之毒之謂蓋陽明之氣不能上越下陷大腸腸胃之脈隨氣虛陷陷久則濕熱蘊毒隨氣陷而先至其腹不痛血清而色鮮者名曰腸風邪氣外入隨感而見者也謂之挾寒下血後人因古方多用荊防升散而窒之為風寒非風也又曰凡下血身涼血寒者生身熱血溫者死腸風門主方通治腸風主方活人録防風三錢生黃耆山藥各一錢五分茜根槐米秦艽各一錢黃連五分甘草三分水煎空心午後服防風佐黃耆達清升之氣以透表山藥甘草和中益脾使血無虛滲之虞秦艽茜根清風熱以和血黃連槐米消蘊積之熱毒初起加炒黑荊芥黃芩各一錢去黃耆之驟補日久加黑荊芥一錢烏梅肉升麻各五分再久則加生地三錢白芍二錢升麻五分已上氣血未虧火盛便燥可服剪紅丸或犀角地榆丸如臟毒加生地三錢茜根升麻陳皮各五分減防風一半去槐米日久氣血兩虛加人參白芍各一錢五分當歸頭一錢升麻陳皮各五分減防風二錢去槐米秦艽服犀角解毒丸如結陰便血浮腫氣喘者加茯苓二錢人參桑皮各一錢五分炮薑車前各一錢陳皮五分減防風二錢去槐米秦艽黃連甘草兼服結陰丸犀角地榆丸犀角黃芩黃連地榆枳殼槐米當歸防風各等分生地黃烏梅肉木耳各加倍蜜丸早空心滾湯吞服三錢犀角解毒丸犀角升麻羌活防風甘草荊芥牛蒡子連翹土枸杞各等分金銀花當歸身生地黃白芍藥各加倍蜜丸早空心滾湯吞服三錢腸風便血壯實者宜槐角子五錢黃連陳枳殼地榆貫衆各三錢水煎服昔潘大司馬患此孫文垣用此方治之一服即止書其方於壁間遇有便血者治之無不立愈大腸瀉血普濟方發灰五錢雞冠花扁柏葉各一兩研細末臥時酒調下二錢來早以溫酒投之一服見效腸風下血祕方豆腐末入袋濾出漿者帶渣取出鍋內炒燥研末每用三錢如下紫血塊者白糖湯下紅血塊者砂糖湯下雖遠年便血垂危者每日用三次神效又方唐云峰陳蕎麥麵和犍豬膽汁為丸桐子大每早空心開水送下三錢又方昭隱寺浣塵和尚傳刀豆陰乾陰陽瓦焙三錢臭梧桐白根切片三錢煎湯調服又方吳韻清柿餅七個用好醋一斤同煮醋將干取起曬乾每早用開水細嚼一個服至三四個即止血痢亦效又方懷德堂自驗黃芩炒黑四兩研細黑棗頭半斤煮爛去皮核和搗為丸桐子大每早晚各服二錢終劑即愈便血江仍度黃耆蜜炙白朮土炒黃色茯苓神各二兩棗仁炒三兩當歸身酒炒一兩五錢蓮鼻酒炒二十四個粉甘草蜜炙七錢山梔酒炒六錢遠志肉一兩去心甘草水炒地榆酒炒五錢姜灰四錢元眼肉六兩煨爛搗膏共磨細末用龍眼膏略加煉白蜜和丸如桐子大每早白湯送下四錢冬月白蜜不妨多用夏月白蜜宜少用便血方配京茶館內地下瓜子殼一撮煎湯空心服數次即愈腸風下血久不愈者兼面黃浮腫者蒲公英連根採來洗淨槌爛青鹽醃一宿曬乾收一斤木耳炒黃存性槐角子炒黑各一兩柿餅炒焦存性鹿角膠各二兩陳棕煅灰五錢川連一錢五分共為末神麯糊丸每服二錢空心白湯下腸風下血婦人血崩男子血痔扁柏葉明礬各一兩月月紅炒黑陳棕煅廣三七各三錢共研細煉蜜為丸白湯送下一錢或二錢忌大葷腸風下血青羊糞秋後茄蒂各等分俱焙黑上研末用荷葉湯打老米糊為丸白湯送下二錢寒火瘡門主論王肯堂曰寒火瘡生肛門外潰爛如破時流脂水每晚發寒繼如火燎多癢少痛是也準繩澄曰曾見江西班糧艘周姓患此每晚必用礬末摻之方能定癢安睡想風濕相乘濕邪化蟲使然也脫肛門主論林氏曰或問方書云脫肛有氣虛者有血虛者有血熱或火盛者人患此四者甚多何遂至於脫肛也答曰肛乃大腸之盡處凡有形之糟粕從此而出為人一身之門戶虛滑則滯下不收枯燥則堅澀而難於轉出皆足以致病而必責之於一氣蓋凡有形之物全賴無形之元氣以轉運出入且肺與大腸為表裡而肺正統一身之元氣故人之登圊亦由元氣為之傳導使大腸有形之糟粕得以傳導而出出已則清升之氣復自下而上達於臟腑腠理四肢是為常度若脾肺久虛氣血虧損則統運轉輸之機不利全藉勉力努送而出久久氣滯則肛門因之脫下矣其次有病久氣虛氣陷而自脫者亦有氣虛不能傳導而血隨因之枯澀於是努力掙脫者有陽明燥火亢極而熱結便燥難出因用力強掙火性下迫肛門脫出者有老年血燥或産後血虛液燥結滯難下氣弱無力以送勉強掙脫者有久瀉或久痢氣血兩虛濕熱下陷於大腸因而滑脫者有小兒亦因瀉痢氣虛濕火下迫而脫者總由氣血不和失其轉輸傳導出入升降之常度則有是證自在醫者參其脈證體其虛實以治之活人録彙編又曰久病虛陷自脫者脈必虛微無力以補氣升提為主氣虛血竭努力掙脫者脈必澀弱而虛數當以益氣之中加補血潤燥升清之劑大腸實火燥結肛門腫痛而下迫者其脈洪大而數或沉實有力以清火解毒之中佐以升提老年産後總由氣虛血少脈必澀數無力當以滋補升提久瀉久痢無論大小脈必虛微沉弱雖主補益升提倘余病未清則清補相兼活人録彙編醫論選要曰脫肛治法內宜溫胃厚腸收斂解毒之劑外宜溫湯頻洗令和軟然後摩挲而入則自愈矣馮魯瞻曰夫肺與大腸為表裡肛者大腸之門也肺實則溫溫則內氣充而有所蓄虛則寒寒則內氣餒而不能收是以腸頭出露矣多得於久痢不止裡急後重努力肛開外風所吹而致者或伏暑暴注洞瀉腸頭不禁者或稟賦怯弱易於感冷啼叫努氣大腸虛脫者蓋瀉痢未有不因風暑濕熱傷脾脾虛則肺氣即弱大腸亦虛土為金母母虛不能生金是以少被風冷則腸頭即為虛脫治宜補脾溫胃使金受母之益而上升次投固腸之劑外用熏摻等方若久出而堅者先以溫暖藥湯澆軟漸漸納入又曰肛門為大腸之使大腸受熱受寒皆能脫肛且大腸者傳導之官腎者作強之官酒色過度則腎虛而盜泄母氣肺因以虛大腸氣無所主故令脫肛小兒血氣未壯老人血氣已衰皆有此證按丹溪所論脫肛因氣虛血虛者固多亦有因氣熱血熱者宜兼脈候詳察氣虛者補氣參耆朮草制升麻之類血虛者四物湯血熱者涼血四物湯加炒柏氣熱者條芩升麻之類並宜升提脫肛門主方驗方李常山梧桐葉煎湯熏洗提肛散久痔氣虛肛門下墜及脫肛便血脾胃虛弱人參白朮川芎黃耆陳皮當歸甘草各一錢柴胡升麻條芩黃連白芷各五分水煎食遠服渣再煎通治脫肛主方活人録生黃耆三錢人參當歸各一錢五分白朮川芎陳皮各一錢柴胡防風各七分升麻五分甘草二分水煎空心午前服補中益氣湯加防風川芎於至陰之中升提清陽之氣達於腠理不外地氣上騰之義若地氣上騰則天氣自然下降矣真氣虛寒而自脫者加附子五分血枯液竭燥結下墜及老年産後血燥者加松子泥五錢生地三錢減黃耆一錢五分去白朮川芎防風服益血潤腸丸或滋燥養血潤腸丸陽明燥火自亢實熱下墜者加黃連一錢五分生地三錢白芍二錢去參耆朮芎防服搜風順氣丸或潤下丸脾胃氣虛泄痢而脫者加茯苓一錢五分白朮肉果各一錢去芎歸服培元固本啓脾丸或香連固本丸小兒久痢久瀉濕熱下迫而虛脫者加白芍一錢黃連三分減黃耆一錢五分人參五分去芎歸服香連健脾丸或香連固本丸脫肛人參黃耆當歸身升麻川芎水二碗煎八分食前服血虛加芍藥熟地血熱加炒黃柏虛寒加炒黑乾薑外以五倍子末托而上之又方剃頭店蕩刀舊青布煅灰托之即上又方以手托上用烘熱舊鞋底尉之即上又方番木鱉子去殼取仁用冰麝油磨汁掃上即縮入因久痢脫肛蝸牛燒灰豬油和敷立縮脫肛因久患瀉痢所致者蔥湯熏洗令軟送上或以五倍子末敷之頻頻托入或煎湯洗亦可又方生鱉頭燒存性研細香油調敷托上小兒脫肛黃狗一隻將繩捆狗四足後將狗倒掛候其口中流出黏涎搽上其肛即收矣脫肛白礬三分童便二盞燉熱洗之即上龍骨散小兒大腸虛肛門脫出龍骨二錢五分訶子煨去核沒石子各二個赤石脂罌粟殼去蓋帶穰醋炒各二錢為極細末米飲調化食前服伏龍肝散治小兒陰證脫肛伏龍肝一兩鱉頭骨五錢百藥煎二錢五分為細末用紫蘇煎濃候溫和清油同敷又方五倍子二錢研白礬一錢同煎湯洗又方木賊草燒灰存性為末摻肛門上按入即愈又方浮萍為末干貼又方陳壁土泡湯先熏後洗臟頭風門主論糞門生蟲奇癢萬狀以人之勢進出而後快者此乃幼時為人戲耍乘風而入之故見此怪證也石室祕録臟頭風門主方蜜煎止癢丹石室祕録蛇床子楝樹根各三錢生甘草一錢共為細末同蜜煎成做如人勢導入糞門聽其自化一條即止癢而愈風疳門主論心法曰風疳者乃風濕客於穀道形如風癬作癢破流黃水浸淫遍體微痛宜用如聖散治之馮魯瞻曰穀道癢痛多因濕熱生蟲欲成痔瘻宜以雄黃和艾燒煙燻之或用桃葉一斤蒸之極熱納小口瓶中坐熏立死風疳門主方如聖膏當歸五錢巴豆仁三錢麻油八兩熬枯入黃蠟三兩化盡絹濾入輕粉二錢攪勻搽之股陽疽門主論心法曰股陽疽生於股之外側胯尖之後其毒內搏骨節膿深至骨故漫腫不變色也股陰疽門主論心法曰股陰疽一名赤施發生於股內合縫下近陰囊之側因偏在厥陰經故名股陰也騎馬癰門主論騎馬癰皆由少年人不保重或串花街柳巷或貪倚翠偎紅忍精而戰耐飢而守或將泄而提其氣或已走而再返其陽或人方泄精未經洗淨重與交合皆足以生此惡毒也治以七味聖神湯主之蓋此毒乃乘虛而入必大補其血而佐以逐邪之品則病去如失否則婉轉留連禍不旋踵與其毒勢瀰漫到後來發散何不乘其初起正氣未衰一劑而大加祛逐之為快哉方中妙在用金銀花而以當歸補血為君人參為佐大黃為使重輕多寡之得宜也祕録王肯堂曰騎馬癰乃手足三陰經所司毒在腎經濕熱流於大小腸分熱血積而為毒緩治則成漏證大小便俱從此出矣此處不可用刀針如用只可針一二分慎之慎之心法曰騎馬癰亦名騙馬墜生於腎囊之旁大腿根里側股縫夾空中由肝腎濕火結滯而成此處乃至陰之下醫治不可過用寒涼藥騎馬癰門主方七味聖神湯岐天師金銀花四兩蒲公英二兩人參當歸甘草各一兩大黃五錢天花粉二錢水煎服一劑即消二劑全愈潰者三劑愈騎馬癰已成膿者新都治驗黃耆三錢人參二錢川芎當歸各一錢白芷防風肉桂甘草各五分白水煎一貼痛止再服自潰十貼肉生坐馬癰門主論心法曰坐馬癰生於尻骨略上屬督經由濕熱凝結而成虛人患此易於成漏上馬癰門主論心法曰上馬癰生於左臀之下折紋中下馬癰門主論心法曰下馬癰生於右臀之下折紋中湧泉疽門主論心法曰湧泉疽生於尻骨之前肛門之後長強穴屬督經首穴由濕熱凝結而成老弱患此多成冷漏難痊穿襠疽門主論王肯堂曰穿襠宜生背之下極屬督脈及太陽經由勞傷憂思積鬱所致宜速治稍緩則潰爛難收斂欲成漏者多麻木黑陷泄瀉嘔噦疲倦者不治準繩心法曰穿襠疽生於會陰穴在穀道之前腎囊之後此係皮囊空處如痛連睪丸及腰背肛門根深遲潰腐傷尿管漏溺不能收斂者至險懸癰門主論鬼遺方云胯下兩臀尖下大道前穀道小道後水道成懸癰皆是虛極人患此近穀道左右乃名痔癰宜急補脾臟及發處貼藥即用發穴藥破後用抽膿膏膿盡用合瘡口藥合之慎勿過冬即成冷漏難治王肯堂曰懸癰生於篡間謂前陰之後後陰之前屏翳處也即會陰穴屬任脈別絡俠督脈衝脈之會癰生其間人起立則若懸然故名懸癰屬足三陰虧損之證輕則為漏瀝盡氣血而亡重則內潰而即殞原屬肝腎二經陰虛雖一於補猶恐不治若又加克伐不死何待準繩又曰懸癰與騎馬癰惟制甘草內服外洗又曰交𦱌一處近稜線上名騙馬墜俗名跨馬癰防漏陳實功曰懸癰生於腎囊之後肛門之前又名海底漏最難收功初起腫痛繼即潰膿總由濕熱相火內灼肺金而然也宜服國老散加減地黃丸此一定之治法也正宗蔣示吉曰懸癰生於穀道之前陰器之後又謂海底穴也乃三陰虧損濕熱結聚而成初生狀如蓮子少癢多痛日久漸如桃李赤腫焮痛潰而流膿破後輕則成漏重則氣血瀝盡變為癆瘵不起之候者多矣初起壯實者瀉其病根稍虛者利其濕熱已成者托裡排膿已潰者溫補滋陰切忌寒涼損胃冰凝氣血致生變證說約馮魯瞻曰懸癰者穀道前後生瘡是也初發形如松子漸如蓮子數十日後甚赤腫如桃即破破最難收其治每用粉草一兩無灰酒煎服以解毒此證多屬陰虛故不足人患之大禁寒涼克削肝腎虛極之證也重為滋陰峻補併為絶欲急令收功否則成漏癆瘵之根矣錦囊汪省之曰懸癰即騎馬癰也此證多因酒色不慎濕熱壅滯而作況穀道之前乃任脈會陰發源之地又乃肝經宗筋所會之處患此多屬肝腎二經陰虛今人每以敗毒流氣等攻伐之劑治之殊不知陰既虛矣須一於補尚恐不能成膿斂口反加克伐不死何待理例懸癰門主方生熟地黃丸大熟地九蒸九曬大生地酒洗各三兩柏子仁去殼隔紙炒當歸酒蒸白芍酒炒各二兩牡丹皮酒蒸山藥乳蒸白茯苓乳蒸各一兩五錢澤瀉水蒸一兩敗龜版童便浸去牆酥炙研為極細末遠志肉甘草水泡透各四兩共為細末用金叉石斛四兩金銀花十二兩熬膏和煉蜜搗丸每早淡鹽湯送下四錢國老散甘草七段用急流水一碗浸之炙乾又浸又炙以水盡為度研細末每日空心白湯調服二錢忌煎炒烟酒炙煿辛辣發物天粉草膏懸癰已成服藥不得內消者服此未成者即消已成者即潰已潰者即斂此治斯證之良方大粉草用長流水浸透炭火上炙乾再浸再炙如此三度切片當歸身各三兩水三碗慢火煎至稠膏去渣再煎稠厚為度每日三錢無灰酒一大杯化開空心服之四神湯專治懸癰一切腫毒不紅不腫氣血虛者當歸八錢嫩黃耆金銀花各五錢甘草節二錢水酒各一碗煎服仍以酒助藥力又方甘草梢四兩水煎服敷法大黃一兩熟石膏三錢紫金錠一錠同搗碎水調敷
