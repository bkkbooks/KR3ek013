body:
  text: 卷四十奇病部古今奇病附寒門祕法俱匯於此部中以便檢閲參治奇病門治法張仲景曰生蛇腹中以身上辨之身必乾涸如柴似有鱗甲者蛇毒也最易辨惟白芷一味為丸每日米湯送下五錢即痊愈人有腹中生蛇者乃毒氣化成也或感山嵐水溢之氣或感四時不正之氣或感尸氣病氣而成者方名誅毒丹用雄黃一兩生甘草二兩白芷五錢端五日修合為末粽子米和丸如桐子大飯前食之食後必作痛用力忍之切勿飲水一飲水則不效矣華真君曰人手上皮現蛇形一條痛不可忍此乃蛇乘人之睡而作交感於人身乃生此怪病服湯藥不效用刀刺之出血如墨汁外用白芷為末摻之少愈明日又刺血如前又用白芷末摻之二次化去其形先刺頭後刺尾不宜亂刺也人有胃脘作痛過飢更甚尤畏大寒日日作痛預用大蒜三兩搗汁灌之忽吐蛇一條長三尺而愈蓋蛇最畏蒜氣此一奇證也人有背上忽然疼痛裂開一縫竄出蛇一條長二尺者頗善跳躍仲景先生親手治之而驗其證必先背脊疼甚而又無腫塊久則腫矣長有一尺許一條直似立在脊上乃用刀輕輕破其皮而蛇忽跳出其人驚絶用人參一兩附子一錢半夏天南星各三錢治之忽蘇生肌散敷其患處而愈余問其故而背忽痛耶彼人曰我至一廟見塑一女娘甚見美麗非常偶興雲雨之思頓起背脊之痛今三月以來痛不可忍若有蛇鑽毒刺光景余心疑似生怪物見其人又健旺故用刺開皮肉不意蛇出而人竟死也余隨用三生飲救之而愈可立醫案以見病之奇而神聖之不可藐玩也人有臍口忽長出二寸似蛇尾狀而又非蛇不痛不癢此乃祟證也然亦因任帶之脈痰氣壅滯遂結成此異病也人世之間忽生此病必有難愈之災蓋人身而現龜蛇之象其家必然敗落而時運亦未必興隆也法當用硼砂冰片麝香各一分兒茶二錢白芷雄黃各一錢研細末將其尾刺出血必然昏暈欲死急以藥點之立刻化為黑水急用白芷三錢煎服自愈倘不愈則聽之不可再治蓋妖旺非藥能去非前世之冤家即今生之妖孽也人身忽長鱗甲於腹間脅上此證婦女居多而男子亦間生焉蓋孽龍多化人與婦女交即成此證而男子與龍合亦間生鱗甲也此病速治為妙少遲則人必變為龍矣今傳一方用雷丸大黃白礬鐵衣雄黃各三錢研細棗肉為丸凡得此病用酒送下三錢立時便下如人精者一碗胸中便覺開爽再服三錢則鱗甲盡落矣此方之妙妙在無毒不散而龍又最惡雄黃故相濟而成功又何疑哉況各藥又皆去毒去水之品此方之最神最奇者也如人先遍體發癢以錐刺之少已再癢以刀割之快甚少頃又癢甚以刀割之覺疼必流血不已再癢以石灰止之則血止而癢作又以刀割之又流血又以石灰止之止之又癢勢必割至體無完膚而後止此乃冤鬼索命之報也無法可救岐天師憫恤世人不知作惡誤犯者亦有之特定救割全生湯救之方用人參一兩當歸三兩荊芥三錢水煎服貧人無力買參以黃耆二兩代之服三劑必有效而癢止痛亦平但須對上天盟誓萬勿作犯法之事有冤仇者為之懺經禮佛庶幾不再發否則發之再不能有法救矣人有生鳥鵲於頭上臂上外有皮一層包之或如瘤狀或不如瘤而皮膚高起一塊者內作鳥鵲之聲逢天明則啼逢天雨則叫逢飢寒則痛疼百藥不效此乃不敬神聖而戲弄之報也必須用刀割破其皮則鳥鵲難以藏形乃破孔而出宛似鳥鵲但無羽毛耳鳥鵲出孔之後以生肌散敷之外用神膏方載癰疽門三日後依然生合此病岐天師見之數次扁鵲之治華他之醫皆岐天師之教人有心窩外忽然生瘡如碗大變成數口能作人聲叫喊此乃憂鬱不舒而祟憑之也方用金銀花生甘草各三兩人參五錢茯神白礬各三錢水煎服即安靜不鳴矣再用二劑即愈蓋甘草消毒人參茯神以安其心白礬以止其鳴金銀花以解其火熱故能易於奏功也如人無故見鬼如三頭六臂者或如金甲神或如斷手無頭死鬼或黑或白或青或紅之狀皆奇病也然此皆心虛而祟憑之用石室祕丹主之方用白朮蒼朮各三兩半夏大戟山茨菰各一兩天南星三錢附子一錢共為細末加麝香一錢做成餅子如玉樞丹一樣此方更妙於紫金錠凡遇前病用一餅薑湯化開服之必吐頑痰碗許自愈人腰間忽長一條肉痕如帶圍至臍間不痛不癢久之飲食少進氣血枯槁此乃腎經與帶脈不和又過於房事盡情縱送乃生此疾久之帶脈氣衰血亦漸耗顏色黯然雖無大病而病實篤也法當大補腎水而兼補帶脈自然身壯而形消方用滅痕丹熟地山萸肉各一斤杜仲山藥各半斤白朮一斤白芍六兩白果肉炒破故紙當歸車前子各三兩共為末蜜丸每日早晚各服一兩十日後覺腰輕再服十日其肉漸淡再服全消不須兩料也然必須忌房事三月否則無效此方乃純補腎經而少兼任帶脈也任帶之病而用任帶之藥何愁不建功哉人腹中忽有應聲蟲有用殺蟲祛痰熱藥寒藥治之俱不應然則終將何以治之哉古人有將本草讀之而此蟲不應聲者用之即愈今岐天師別有神奇法治之省閲本草之勞神方用生甘草一味入白礬各等分不須二錢飲下即愈蓋應聲蟲非蟲也乃臟中毒氣有祟以憑之也用甘草以消毒用白礬以消痰況二物一仁一勇又以智用之智仁勇三者俱全祟不覺低首而卻走矣凡山魈木客狐貍蟲蛇作祟憑身者用生桐油搽其下身不便處最妙或以本人褲子包頭則妖自大笑而去永不再犯蓋妖原欲盜人之精氣然最喜清潔見人汙物包頭則其人不潔可知故棄之而去亦因其好潔而亂之也不成器之物而睡夢來壓人者亦以此法治之腹中生鱉乃飲食飢飽之時過於多食一時不能消化乃生鱉甲之蟲似鱉而非鱉也亦用誅毒丹以馬尿一碗童便半合飲之即消雄黃乃殺蛇之藥白芷乃爛蛇之品甘草乃去毒之劑而馬尿乃化鱉之聖藥也故用之隨手而效耳此則奇病而用奇藥也如有腹中高大宛似坐胎形容惟悴面目瘦黃骨幹毛枯此乃鬼胎也方用紅花半斤大黃五錢雷丸三錢水煎服傾盆瀉出血塊如雞肝者數百片而愈後乃用六君子湯調治之自然復原此等之病乃婦人淫心忽起有物以憑之才生此證無論室女出嫁之人生此病者邪之所湊其氣必虛況又起淫心有不邪以親邪者乎方中妙在紅花為君又用至半斤則血行難止有躍躍自動之貌又加以大黃走而不守之味則雷丸蕩邪之物自然功成之速也如有頭角生瘡當日即頭重如山第二日即變青紫第三日青至身上即死此乃毒氣攻心而死也此病多得之好吞春藥蓋春藥之類不過一丸食之即強陽善戰非用大熱之藥何能致此世間大熱之藥無不過陽起石附子二味俱有大毒且陽起石必經火煅而後入藥是乾燥之極自然克我津液況窮極工巧博婦女之歡筋骸氣血俱動久戰之後必大泄盡歡水去而火益熾矣久久貪歡必然結成大毒火氣炎上所以多發在頭角太陽之部位也初起之時若頭重如山便是此惡證速以金銀花一斤煎湯飲之數十碗可少解其毒可保全性命之不亡而終不能免其瘡口潰爛也再用金銀花玄參各三兩當歸二兩生甘草一兩煎湯日用一劑七日仍服瘡口始能收斂而愈此種病世間最多而人最不肯戒用春方痛哉如腳大指生疽亦多不救治法同此人忽頭面腫如斗大者看人小如三寸飲食不思呻吟如睡此痰也用瓜蒂散吐之而頭目之腫消又吐之而見人如故矣後用六君子湯水煎服三劑痊愈此亦祟憑之也人有中心悶甚面赤不能飲食此得之食腥有蟲在胸中也以加味瓜蒂散治之方用人參半夏甘草各三錢黃連陳皮各一錢瓜蒂七個吐之吐蟲數升皆赤頭而尾如魚須斷酒色否則三年後必飽滿而死張仲景曰有人腿腫痛堅硬如石痛苦異常欲以繩系足高懸梁上其疼乃止放下疼即如斫腿中大響一聲前腫即移大臀之上腫如巴斗不可著席將布兜之懸掛其疼乃可此亦祟憑之也方用生甘草一兩白芍三兩水煎服蓋生甘草專瀉毒氣白芍平肝木以止痛也痛止則腫可消毒出則祟可杜也正宗孽病門亦有此證人遍身生疙瘩或內如核塊或外似香菌磨菰木耳之狀者乃濕熱而生也數年之後必然破孔出血而死當先用外藥洗之然後用湯藥消之則愈浴洗方用蒼耳子草一斤荊芥苦參白芷各三兩水一大鍋煎湯傾在浴盆內外用席圍而遮之熱則熏溫則洗洗至水冷而止三日後乃用煎方名紅黃霹靂散人參薏苡仁各一兩白朮芡實各五錢茵陳白芥子半夏澤瀉黃芩各三錢附子一錢水煎服十劑自然全消無蹤矣外邊亦無不消也張仲景曰有人足板下忽生兩指痛不可忍者乃濕熱之氣結成觸犯神祗之故方用消指散硼砂一分人參一錢冰片三分瓦蔥一兩為末用刀輕刺出血刺在生出指上即時出水敷星星在血流之處隨出隨摻以血盡為度流三日不流水矣而痛亦少止再用化水湯薏苡仁一兩白朮五錢人參牛膝川萆薢生甘草白芥子各三錢半夏一錢水煎服四劑痊愈而指盡化為水矣外用岐天師膏藥加生肌散敷之即愈矣凡皮膚手足之間如蚯蚓唱歌者乃水濕生蟲也方用蚯蚓糞水調敷患處厚一寸可也其鳴即止再用煎湯薏苡仁芡實各一兩白朮五錢生甘草三錢黃芩二錢附子三分防風五分水煎服即愈此治濕則蟲無以養況又以生甘草解毒化蟲防風去風而逐瘀附子斬關而搗邪所以奏功如神也人手掌忽高起一寸不痛不癢此乃陽明經之火不散而鬱於手也論理該痛癢而今不痛癢不特火鬱於腠理而且水壅於皮毛也法當用外藥消之蓋陽明之火盛必然作渴引飲不休今又不渴是胃中之火盡消而流毒於掌中必其人陽明之火盛手按於床席之上作意行房過於用力使掌上之氣血不行久而突突而高也不痛不癢乃成死肉矣附子一個煎湯以手漬之至冷而止如是者十日必然作痛再漬必然作癢又漬而高者平矣蓋附子大熱無經不入雖用外漬無不內入者也倘用附子湯飲之則周身俱熱又引動胃火掌肉不消而內證峰起余所以外治而愈之也或附子湯中加輕粉一分引入骨髓更效人腳板中色紅如火不可落地又非痰毒終歲經年不愈此病乃用熱藥立而行房火聚於腳心而不散故經歲經年不愈也法當用內藥消之若作外治必然爛去腳板宜用祛火湯熟地三兩麥冬玄參沙參叉斛各一兩山萸肉甘菊花茯苓各五錢丹皮牛膝車前子澤瀉各三錢萆薢二錢水煎服十劑消二十劑痊愈然須戒房事三月否則必發發則死矣慎之慎之有人手足脫下而人仍不死之證此乃傷寒之時口渴過飲涼水以救一時之渴孰知水停腹內不能一時分消遂至四肢受病氣血不行久而手足先爛手指與腳指墜落或腳指脫落之後又爛腳板久之連腳板一同墜落矣若有傷寒口渴過飲涼水者愈後倘手足指出水者急用岐天師之方可救指節腳板之墜落也方用薏苡仁三兩白朮一兩茯苓二兩車前子五錢肉桂一錢水煎服一連十服小便大利而手腳不出水矣永無後患不必多服人有手指甲盡行脫下不痛不癢此乃腎經火虛又於行房之後冷水洗手遂成此病方用六味地黃湯加柴胡白芍骨碎補治之而愈人有指縫流血不止有蟲如浮蝣之小鑽出少頃即能飛出此證乃濕熱生蟲也然何故生蟲而能飛耶蓋不止濕熱而又有風邪也凡蟲感風者俱有羽翼能飛安有人身得風之氣轉不能飛也方用黃耆苡仁熟地各五錢當歸白芍茯苓白朮甘草各三錢人參柴胡荊芥川芎各一錢水煎服此方之妙全不去殺蟲而但補其氣血而佐之去濕去風人身氣血和自不生蟲補氣血之和則蟲自無藏身之窟況又逐水消風蟲更從何處生活耶此方之所以平而奇也服四劑則血不流而蟲不出再服四劑手指完好如初矣人有腳肚之上忽長一大肉塊如瘤非瘤如肉非肉按之痛欲死此乃脾經濕氣結成此塊而中又帶火邪故手不可按按而痛欲死也法當峻補脾氣而分消其濕為是然而外長怪狀若在內一時消之恐不易得當用內外夾攻之法自然手到病除內服消濕化怪湯白朮芡實苡仁各一兩澤瀉五錢人參茯苓車前子白芥子白礬萆薢各三錢牛膝半夏陳皮各二錢水煎服二劑後用蚯蚓糞炒一兩黃柏炒五錢兒茶三錢水銀一錢冰片麝香各五分硼砂一分共研至不見水銀為度將米醋調膏敷患處一日即全消矣極有神效此膏凡有塊者以此內外治之無不效應如響人自覺腸胃癢而無處抓搔者只覺置身無地此乃火鬱結而不散之故法當用表散之藥宜化癢湯柴胡黑山梔天花粉各三錢白芍一兩甘草二錢水煎服即愈人糞從小便出小便從大便出者此夏天暑熱之證醫以五苓散治之亦妙今止用車前子三兩煎湯三碗一氣服完即愈人有小便中溺五色之石未溺之前痛甚已溺之後少覺寬快此即石淋也交感之後入水或入水之後交感皆有此證宜用消石丹方用熟地山萸肉澤瀉各三兩茯苓苡仁麥冬車前子各五兩骨碎補二兩芡實一兩青鹽一兩肉桂三錢共為末蜜丸早晚白滾湯吞下各一兩十日必無溺石之苦矣此證成之最苦欲溺而不溺而又欲溺溺尿管中痛如刀割用盡氣力止溺一塊其聲錚然見水不化乃膀胱之火熬煎而成此異病也其色或紅或白或黃或青或黑不一總皆水鬱而火煎之也此方之妙全不去治石淋而轉去補腎水之不足水足而火自消火消而水自化其中有奧妙之旨也倘治膀胱則氣不能出而又何以化水哉以上詳載石室祕録目睛忽垂至鼻如黑角塞痛不可忍或時時大便血出作痛名曰肝脹用羌活一味煎汁服數盞自愈夏子益奇疾方徐之才曰眼見空中有五色物此色欲過多大虛所致當以補藥飲之入門入門云眼中視物皆倒植此必因酒吐時上焦反覆致倒膽府故視物皆倒法用瓜蒂藜蘆復吐以正其膽入門得效云寒熱不止經日後四肢堅如石以物擊之一似鐘磬聲日漸瘦弱吳茱萸木香等分煎服自愈又云手十指節斷壞惟有筋連無節肉蟲出如燈心長數尺余遍身緑色名曰血餘赤茯苓胡黃連煎服又曰四肢節脫但有皮連不能舉動名曰筋解用酒浸黃蘆三兩經一宿焙乾為末每二錢酒調下又云人自覺其形作兩人並臥不辨真假不語問亦無對乃是離魂辰砂人參白茯苓濃煎湯服真者氣爽假者化也大腸頭出名曰截腸初截寸余者可治若腸盡出不治用麻油盛器內臀坐上飲天麻子汁數升愈蝨出怪病臨臥渾身蝨出血肉俱壞每夕漸多痛癢難言且舌尖出血身齒俱黑唇動鼻開但飲鹽醋湯半月即安奇疾方筋肉化蟲有蟲如蟹走於皮下作聲如兒啼急用雄黃雷丸一兩為末摻豬肉上炙熟吃盡自愈奇疾方破腸證乃腹破腸出鼻穢急以香油摸腸用手送入煎人參枸杞淋之皮自合矣吃羊腎粥十日即愈奇疾方乳懸婦人産後兩乳伸長細小如腸垂過小腹痛不可忍名曰乳懸將川芎當歸各二斤以半斤銼末瓦器水煎不拘時服仍余斤半銼大塊用香爐慢火逐漸燒煙安病人面前桌下要煙氣不絶令伏桌上將口鼻及病乳常吸烟氣如藥盡未痊如前法煎服及燒煙燻吸必安如用兩料已盡兩乳雖縮上而不復舊用冷水磨萆麻子一粒於頭頂心塗之片時後洗去則全安矣奇疾方發斑怪證有人眼赤鼻張大喘渾身出斑毛髮如銅乃熱毒結於下焦也用白礬滑石各一兩為末作一服水三碗煎半不住服即愈奇疾方眉毛動搖目不交睫喚之不應但能飲食有經日不效者用蒜三兩取汁酒沖服即愈採醫書麻骨證自頂麻至心窩而死者或自足心麻至膝而死者用人屎燒灰豆腐漿調飲即止萬病回春氣奔怪病人忽滿身皮底混混如波浪聲癢不可忍抓之血出不能解謂之氣奔用苦桔人參青鹽細辛各一兩作一服水煎一大碗細飲之服盡便愈經驗方脈溢乃毛竅血出若血不出皮脹如膨須臾眼耳口鼻被氣脹合此名脈溢飲生薑汁水各一盞即安奇方試驗大腸蟲行行坐不得用鶴蝨灰水調五錢服之自愈奇證單方惡肉毒瘡一女子年十四腕軟處生物如豆半在肉中紅紫色痛甚方士用水銀四兩白紙兩張揉熟蘸擦三日自落李樓怪證方昔一士兩足不酸不痛每行動絶不聽其所用或扭於左而又墜於右或扭於右而又墜於左之玄而行不能一步步正走孫文垣以為由筋軟不能束骨所致用人參黃耆白芍以補肺金苡仁虎骨龜板杜仲以壯筋骨以鐵華粉專制肝木煉蜜為丸早晚服之竟愈三吳治驗咽喉生肉層層相疊漸漸腫起不痛多日乃有竅臭氣自出遂退飲水用臭橘皮煎湯連服愈外科方附刊寒門祕法寒門五法一曰發發則重解肌者為表之表藥用辛甘言腠理致密非辛甘不能開發故曰發發者發正表也寒傷營無汗麻黃湯風傷衛有汗桂枝湯二曰解解則輕於發為表之輕藥用辛涼言腠理將疏惡寒已罷邪將化而為熱但表病里和非辛不能散表非涼不能解熱故曰解解肌肉也升麻葛根湯主之三曰和和又輕於解表將罷藥用辛者少涼者重言邪將入腑而未深入腑曰表不可曰里不可發於解俱難施於表裡之中故曰和和者和其半表半裡也小柴胡湯主之四曰攻攻則重於和為表已罷邪氣入腑藥用苦寒言邪自三陽經入結於腸胃非苦寒不能攻故曰攻攻者攻其實熱也承氣湯主之五曰救救則與攻大異熱則攻寒則救藥有溫熱言邪不由陽經而入竟中三陰名曰直中內寒盛極陽氣已危故曰救救者急救危陽也寒客中焦理中湯陰證厥逆四逆湯吐法大意五法獨不言吐者蓋仲景有汗吐下三法為皮毛胃腑而設汗之言邪在皮毛吐之言邪在胃之上脘下之言邪在胃腑凝結今人用吐法用在半表半裡所害非淺蓋少陽膽經汗吐下三法皆禁誤吐之遂變為壞證則吐不施於半表半裡明矣若胃上脘痰涎胸痞者方敢議吐實邪用瓜蒂赤小豆吐之虛煩用梔子淡豆豉吐之虛痰以人參蘆吐之風痰以皂角白礬吐之乾霍亂以燒鹽熱童便吐之陽經分經腑三陽在經者可汗凡言經者皆邪舍於皮毛經行皮毛之裡肉之外邪客於經有太陽陽明少陽之分可發可解可和皆邪之在經者故仲景云三陽主病在經則不可下下之為痞氣為結胸也三陽已入腑者可下而已凡言腑者皆邪居腸胃腑主泄水穀傳從糟粕邪之入腑有自太陽入腑有自陽明入腑有自少陽入腑可下可清可攻皆邪之入腑者仲景云三陽之病在腑則不可汗汗之則譫語為厥竭經腑既明攻發自然不混亂矣陰經分傳中邪自陽經次第而入謂之傳經可攻蓋傳經乃邪自外而入內為實為熱不可用直中溫藥若誤投名曰動陰血是實其實也邪不由陽經而入謂之直中可溫言直中者乃邪不由外入為虛為寒忌用傳經寒藥若誤投則使寒愈盛令重虛其虛矣能明傳中則承氣理中無有不當耳皮毛肌肉筋骨臟腑論凡寒之侵人也必先入皮毛而邪在皮毛作何景象發熱如火燎惡寒毛豎鼻塞不汗皮痛不可近席此邪在皮毛也正屬太陽表證故曰發表內經云邪在皮毛者汗而發之此之謂也由皮毛傳於肌肉則邪稍進一步惡寒已去必唇焦熱盛口唇者肌肉之本也今見唇焦則知肌肉受邪故不言發表而曰解肌由肌肉傳於筋骨則邪又進一步必齒燥自汗蓋齒乃骨之餘熱入筋骨故齒乾燥肌肉者身之牆垣熱熏於肉致腠理開則自汗皆熱在筋骨也故用白虎湯石膏知母甘草粳米亦有加人參者名人參白虎湯以瀉骨中之熱耳由筋骨傳於臟腑邪已深入外證悉具必惡熱便閉下利黃赤或腹痛時作極則發狂此乃邪熱深入臟腑不曰泄里而曰攻裡有不從陽經傳來者謂之直中三陰內純寒而外無陽經之形證必是厥逆清穀囊縮甲青等證此直中之寒者也此不曰攻裡而曰救里由三陽傳腑之熱證亦復有厥逆過肘膝者經云熱深厥亦深熱微厥亦微此種萬不可誤認為直中三陰之厥逆妄投四逆表證曰發表一脈浮表也一身痛表也一發熱表也一頭痛表也一惡寒表也一目舌和表也一脊項強太陽正表也一喘與咳嗽表也一四肢拘急表也一口不渴大小便如常表也一脈不出表也一面慘灑淅表也上證一見知邪在表必待發表方可攻裡若誤下必為痞為結胸為懊襆矣邪傳肌肉曰解肌一脈尺寸俱長邪在陽明肌肉也一身熱不惡寒目痛鼻乾邪在肌肉也一漱水不欲咽邪在肌肉也一唇焦邪在陽明肌肉也上證一見知邪在陽明經不在陽明腑也慎勿混治邪在半表半裡曰和解一脈不浮不沉半表半裡也一嘔吐半表半裡也一胸中脹滿未經下過半表半裡也一耳聾脅痛半表半裡也一舌滑半表半裡也一往來寒熱半表半裡也一頭汗盜汗半表半裡也一口苦目眩半表半裡也一默默不欲飲食半表半裡也上證一見知邪在半表半裡此經有三禁惟小柴胡湯加減和解誤用他藥則變壞證矣傳經里證曰攻裡一脈沉滑有力里也一下利清黃水里也一小腹滿而脹痛或硬里也一譫語或發狂里也一發斑里也一轉矢氣里也一頭痛發熱俱止里也一自汗里也一小便多里也一潮熱里也一下利腸垢里也一惡熱里也一目不得明里也一腹痛里也一不得眠里也一手足心並腋下有汗里也一嗌乾齒燥里也一舌苔黃黑及津液枯涸里也一大便閉里也上證一見不拘日數遲早即知傳經里證下之無疑若誤汗為斑爛矣直中寒證曰救里一脈沉細無力直中寒也一背惡寒直中寒也一嘔吐清涎直中寒也一四肢厥逆過肘膝直中寒也一多眠直中寒也一乾嘔不渴直中寒也一腹痛綿綿下利清穀直中寒也一吐蛔直中寒也一蜷臥直中寒也一囊縮唇甲青直中寒也一惡寒身痛不頭痛不發熱直中寒也一四肢拘急不發熱直中寒也一身痛如被杖直中寒也一小便清長直中寒也上證一見即知直中溫之宜亟亟焉表裡俱見一頭痛發熱表證若下利清穀里也寒也屬表裡俱見寒證也一腹痛口渴甚者里證或脈浮是表證亦屬表裡俱見熱證也一大便閉屬裡證倘微惡寒此乃表未盡亦屬表裡俱見為熱證也傳經表裡俱見為熱為實宜解表為主攻裡次之若里證急者又在活法直中表里俱見為寒為虛宜救里為主發表次之此治表裡俱見之大法也脈浮或問脈浮何以是表證曰浮者脈在肉上行也按之不足如木浮水面經云寸口脈浮主病在表表者外也如邪在裡必沉細又焉得浮故一見浮脈屬表證無疑又曰脈浮屬表倘里證而脈尚浮者治法奈何曰里證脈浮者表未盡也必先解表而後攻裡仲景云解表不開不可攻裡太陰篇云腹痛脈尚浮者桂枝加大黃結胸證悉具脈浮不可下是里證固當下今脈浮又不敢攻矣若表已罷便閉譫語脈浮者當從權下之此乃取證不取脈也身痛或問身痛何以是表證曰寒則傷榮邪客於人必由皮毛肌肉今邪舍於皮毛肌肉血脈凝滯不行令人身痛若熱在肌肉血脈榮衛周流一身暢於四體焉有身痛之理內經論咳云時感於寒微則為咳甚則為痛為泄針經云寒甚則痛熱甚則肉消䐃破內經諸痛皆以為寒未有以熱為痛者由此論之知痛為寒明矣故謂凡見身痛屬表無疑宜用辛散令血氣流行而痛自已又曰身痛既為表證在裡證亦有身痛者何故蓋里證身痛乃直中里證非傳經里證也若傳經里證則屬熱熱主流行又何得身痛哉夫直中身痛者寒氣襲入臟腑陽已衰危氣血凝滯令人身痛宜急溫之別之何如有頭痛發熱痛如繩縛者表證也無頭疼發熱而痛如被杖者直中也或曰太陽表證亦有身痛不用麻黃而用四逆者何也曰表證悉具脈當浮緊反沉遲無力是中寒也故不可與麻黃而用四逆是病表有虛寒故脈不能浮緊用四逆湯溫之此入太陽脈似少陰假脈浮緊正屬太陽表證又孰敢用四逆乎此取脈不取證也發熱或問發熱何以是表證曰寒鬱腠理則閉塞而發熱翕翕然烙手此熱只在皮膚而內無熱名曰表病里和內經諸證亦論凡風寒客人使人毫毛畢直皮膚閉而為熱而汗又云體若燔炭汗出而解又熱病論云人傷於寒則為熱病若大汗其熱解矣即此觀之發熱屬表明甚又曰發熱固屬表倘發熱便結里證又急治法從表乎從里乎曰裡急者當從權下之亦不敢離表藥何也即以三黃石膏湯論之三黃石膏芩柏連梔子麻黃淡豉全薑棗細茶煎熱服寒因熱用表裡三焦熱盛宣其湯治發狂口渴及發熱證內有麻黃者為發熱而設也可見里證雖急亦不敢純用寒涼尚加辛散況尋常發熱有不以為表者乎又問凡發熱皆在陽經不在陰經仲景云少陰發熱用麻附細辛湯此又何說曰少陰發熱者表裡俱傷惡寒為直中非傳經少陰也雖名直中今有發熱者亦不得結為直者故用麻附細辛今表裡兩解不得受其中也若傳經少陰則惡寒而不發熱然表熱因而中少陰熱別者奈何蓋少陰發熱脈雖沉遲緊澀外無頭痛或下利清穀厥逆諸寒證此少陰證而太陽者此證兼頭痛者是表裡俱見為兩感寒熱又何以為少陰熱乎總之裡證盛急而外發熱者利藥加麻黃少陰發熱溫藥加細辛可見熱屬表證仲景又曰三陰無發熱蓋言傳經也頭痛或問頭痛何以屬表曰三陽經上至於頭惟太陽經脈最長其痛居多夫三陽俱有頭痛各分其證以別之故一見頭痛即是表證又曰三陰經無頭痛厥陰何以有頭痛曰三陰至頸而還何得頭痛惟厥陰與督會於顛頂都攝諸陽故有頭痛然厥陰頭痛亦不常見必嘔吐涎沫內無熱證乃直中也當溫之傷寒循經傳至厥陰倘頭痛脈浮為欲愈不愈用小建中湯小建中湯芍藥多桂姜甘草大棗和更加飴糖補中腸虛勞腹痛服之瘥惡寒或問惡寒何以是表曰人身外為陽為表寒屬陰邪今表虛為寒所乘名曰陰盛陽虛蓋陽不能溫其膚衛於外致令空虛雖居密室亦引衣自蓋謂之惡寒仲景云陰盛陽虛汗之則愈故惡寒屬表假熱在肌膚必裸體煩躁是曰惡熱又焉得惡寒乎若見惡寒知寒在肌膚急投甘辛之劑可也又曰里證亦有惡寒者何故曰里證惡寒者直中也非傳經里證也蓋傳經之證其熱已入腑必然惡熱焉得惡寒直中惡寒者乃寒氣盛極陽微不溫故厥逆而惡寒別在何處直中惡寒無頭痛發熱之證為異經云發熱惡寒發於陽無熱惡寒發於陰也又問惡寒固屬表倘傳經里證盛急亦微惡寒治法如何微惡寒者表未盡也必先解表表解然後攻裡若裡急權下之此活法也又曰設誤下而為結胸令邪在胸而痛盛急微惡寒何法治之曰結胸為誤下而成今惡寒是邪未盡而結於胸必先解表方服陷胸藥若再攻之表邪又結於胸必不可救故結胸有一毫惡寒不可攻可見惡寒屬表矣目舌和或問目舌和何以屬表蓋目乃五臟精華所繫舌者所以司內因寒熱而變之者若臟腑有熱目必黃赤舌必乾燥黃黑今目舌如常知邪未入臟腑表病里和專屬於表無疑脊項強或問脊項強何以見其是表曰太陽經起於目內眥上抵額角自顛頂下行入項走肩膊由肩脊至足小指皆太陽經絡部位邪客背脊循膂上下故脊項強屬太陽表證至於他經各行其道又何至脊項強哉既曰項強屬太陽屬表當發汗又言結胸項強者當下何故曰結胸項強者非真項強也蓋結胸誤下致表邪入胸胸於項近邪結上焦襯於項氣不得宣通其道仰不能俯俯則胸痛危在須臾故結胸項強脹痛者當急下之非太陽經項強也別之奈何太陽經證其證首能俯仰俯亦胸中不痛是太陽經項強也若已經下過其首俯而胸痛者結胸項強也喘或問喘者何以是表證曰肺主皮毛寒邪外傷必從皮毛而入肺有七葉同氣升降表受寒邪斂束於肺至氣不可上下故發喘也以麻黃湯論之用杏仁者為肺金而設麻黃所以去皮毛之寒邪皮毛與肺同氣連合所以喘屬表證今久病喘者尚用麻杏況新病乎又曰喘既屬肺為表指掌云喘滿不惡寒者當下而痊何也又曰有一等傳經里證因便閉不通故濁氣壅塞而成喘者此則不出於肺故當下之必察其外證若有一毫表證而喘者勿作里證治也誤為里證而攻之則逆仲景云喘家無里證當投杏子此言明甚咳嗽或曰咳嗽何以屬表曰肺為五臟華蓋形如覆釜今寒邪客之則葉斂束不能開發故氣上衝經云時感於寒乃為咳嗽可見咳嗽屬表矣曰里證亦有咳嗽否曰里證雖有咳嗽屬直中而不屬傳經蓋直中咳嗽者乃寒急上束於肺故咳嗽下利清穀四肢厥逆外無表證為異倘兼有表證而咳嗽者又非直中咳也若云傳經咳嗽則不是夫傳經屬熱熱主流通其氣出入疾速又寧有咳嗽耶問曰裡熱無咳嗽人言咳嗽屬火者何也曰咳嗽屬火者雜證也病有虛實二火火主炎上亦令咳嗽或先受寒起咳久則變熱亦屬火嗽二者皆久病也內外無寒證惟咳嗽而已故有新久之別新則為傷風為傷寒久則為虛火為實火風寒者散之虛火者從治之實火者清涼之曰逆治曰從治皆治雜證咳嗽也至於傷寒一見咳嗽非表即直中傳經斷無之四肢拘急或問四肢拘急何以是表證曰寒侵皮毛則拘急經云寒多則筋骨攣痛熱甚則筋弛肉緩故四肢拘急屬表無疑曰陰經每見拘急者何也曰乃直中陰經因傷寒拘急何以別之有身熱頭痛者表證也無身熱頭痛者直中也至於汗吐下後四肢拘急者此津液內竭血不能潤筋骨宜真武湯真武湯芍術苓草附子炮來一氣煎咳嗽辛甘並五味下痢去芍乾薑全小便利時茯苓減嘔者去附生薑添口不渴大小便如常或問口不渴大小便如常何以是表證曰蓋皮毛肌肉為表筋骨臟腑為里邪在表則內和口不渴二便如常若裡熱熏灼臟腑必口渴便閉或不利腸垢而小水短赤拂其常矣脈不出或問脈不出胡為表病也曰夫脈者血之府熱則血行豈有脈伏之理惟表寒受深脈遂隱伏曰里證亦有伏脈何謂也夫里證伏脈惟直中者有之乃寒極凝滯不行用四逆湯加豬膽汁治之四逆湯中姜附草三陰厥逆太陽沉或益薑蔥參芍桔通陽復脈力堪任若傳經里證則屬熱熱則血行脈何得伏有陽厥熱極脈亦伏者此又何說熱極脈伏百無一二外或見大熱證脈雖伏指必溫亦或有痛處痛極故脈伏也至於尋常脈伏非表證即直中矣以上俱表證當發表尺寸脈俱長或問尺寸俱長何以知邪在肌肉曰長者泛濫也過乎本位陽明乃氣血俱多之經邪一傳之熏蒸肌膚氣血淖溢故脈陰陽俱長耳當用辛涼解表不可用辛甘正表之藥或云脈長者邪舍陽明肌肉有投承氣者何也蓋用承氣者乃陽明之腑非陽明之經也夫陽明腑病當下之其脈長洪有力便閉譫語等證方敢投承氣若陽明經病其脈長而浮乃表病里和又孰敢用承氣乎又云凡病在陽明不可下又曰陽明當急下之今醫者是非莫辨蓋仲景所立諸法淺人莫解而叔和以六經各集成篇致陽經不分經腑陰經不分傳中抑知仲景用攻者攻陽明之腑不攻陽明之經表者表陽明之經不表陽明之腑又安得以經為腑以腑混經乎目痛鼻乾或問目痛鼻乾何以是邪在肌肉也余謂目乃陽明胃腑所居之經絡胃司肌肉邪必由皮毛而入肌肉目痛鼻乾故云邪在陽明肌肉至於他經則各行其道何有是證漱水不欲咽或問漱水不欲咽何謂邪在肌肉曰唇者肌肉之本今唇焦思漱水是邪在肌肉然不欲咽者何故蓋熱邪只在肌肉臟腑無熱不過漱水以潤唇耳故不欲咽乃表病里和又曰表證已除遂屬裡證或亦漱水而不咽者治法從表乎從里乎曰既無表證里必有熱熱則消水漱當咽矣若不咽者是內有瘀血也何以辨之外無表證必見小腹硬滿小便自利大便枯黑者是也宜用桃仁承氣湯攻之桃仁承氣五般奇甘草硝黃並桂枝熱結膀胱小腹脹如狂蓄血最相宜以上俱邪在肌肉當解肌脈不浮不沉或問脈不浮不沉何以是半表半裡證曰浮為表沉為里今不浮不沉表邪將入腑故脈不浮里邪尚未入臟故脈不沉非表非里知邪在中也屬半表半裡無疑嘔吐或問嘔吐何以是半表半裡曰蓋邪將入里裡氣上衝邪正相爭雖出於胃原是少陽部位膽為清淨之府毫物不能容納今邪氣相干故令嘔吐屬半表半裡又有胃熱胃寒之分辨之以口渴與不渴耳胸前脹滿或問胸前脹滿何以是半表半裡也曰身上半屬陽身下半屬陰胸前乃清陽之分正在半表半裡之間邪至此將此入里而未深入里今胸滿而腹未滿者乃邪氣非有物也故胸滿在半表半裡之間若腹滿是有物而非邪氣也但痞氣亦脹滿胸前何以別之曰痞氣因邪在表誤下以至胸脹必問其人曾經下否若經下過即是痞氣未經下而胸前脹滿者即半表半裡證耳聾或問耳聾何以是半表半裡證曰蓋足少陽膽經上絡於耳故見耳聾知屬半表半裡也脅痛或問脅痛何以為半表半裡曰蓋足少陽膽經布於脅脅痛故為半表半裡至於他經或出於巔背或布於面目何得脅痛或云水氣亦令人脅痛曰水氣必作乾嘔心滿咳引脅痛及頭汗出此乃水氣脅痛非少陽脅痛也若半表半裡脅痛者外必見膽經之證耳舌滑或問舌滑何以是半表半裡曰舌司腸胃寒熱之變系矣邪在表則舌和如常在裡則舌乾而各色現出今舌滑尚有津液潤澤但不如常其邪將入腑未入腑非在表非在裡故云屬半表半裡往來寒熱或問寒熱往來何以是半表半裡曰夫邪在陰則寒在陽則熱少陽膽經正陰陽交界之所邪至此經致陰陽相爭寒熱相半故寒熱往來屬半表半裡或問曰陽明亦有寒熱往來者何意曰若陽明經病邪在肌肉則身發熱焉有寒熱往來已傳陽明之腑鬱熱熏蒸結糞在內故寒熱或往或來是陽明之腑非陽明之經當用調胃承氣湯攻之調胃承氣硝黃草甘暖微和將胃保不用朴實傷上焦中焦燥實服之好故云陽明內實故寒熱往來耳頭汗或問頭汗為半表半裡者蓋以諸陽經脈絡上至頭則有汗諸陰經脈絡系背至頸而還焉得有頭汗故一見頭汗即屬半表半裡或問曰既諸陽脈上至頭今汗出當雲表證何以為半表半裡曰若表證尚有寒邪閉塞焉能有汗今既有汗是寒邪將化為熱名曰里證則頭有汗名曰表證則頭無汗故云半表半裡又曰瘀血水氣發黃亦有頭汗者何也夫瘀血頭汗小便自利水氣頭汗胸滿咳嘔發黃頭汗小便不利若半表半裡頭汗必往來寒熱也然三證頭汗皆未離乎陽可見頭汗屬半表半裡也盜汗或問盜汗何為半表半裡曰夫熱邪熏灼腠理使人有汗寒則腠理閉密無汗是里當出汗不止今汗在睡而出覺而收乃邪將旺於陰分獨未深入於陰亦屬半表半裡又問曰雜證盜汗亦作半表半裡治乎曰雜證盜汗乃陰虛至極血分虧損名勞怯之證今傷寒盜汗乃有餘之邪名曰外感非雜證一例論也目眩口苦或問目眩口苦何以是半表半裡曰目者肝之竅膽汁藏於肝病在少陽膽經故目眩口苦者膽之汁也熱泄膽汁故口苦二者是少陽膽經病半表半裡法宜和解至於他經便無此證以上俱邪在半表半裡當和解脈沉有力或問脈沉有力何以是傳經里證曰夫脈存則生脈絶則死太過不及則病內實則脈實內虛則脈虛今沉者病脈也主病在裡有力者實也主病為熱今脈沉有力是裡實且熱也下利清黃水或問下利清黃水何為里證曰蓋腸胃因久失下致燥糞結實成塊則清黃水下漏魄門如物之聚而結實者水液不能滲漏物堅如磊石者沃之水必滲漏矣今病者下利清黃水糞結如磊石在內此水從結糞旁流走而出急下之無疑往往以直中下利清穀者為漏底傷寒若誤認此證為漏底投以四逆如抱薪救火殆哉故下利清黃水是里證當急下之小腹滿小腹滿者胡為里證曰夫胸膈屬清陽之分雖脹滿是邪氣而非有物小腹乃糟粕之區若脹滿非邪氣也故知有物急下之又曰瘀血證及溺澀證者亦少腹脹滿何以別之凡小便自利小腹硬滿而痛者此瘀血證也小便不利而少腹脹滿者即溺澀不通也若小便短赤大便祕結致小腹硬者乃內有燥糞故爾滿也即瘀血溺澀皆是里證譫語發狂譫語發狂為里證者蓋熱實於胃熱極故發狂輕則令人譫語皆是傳經里證難經曰發狂譫語乃實熱陽盛所使經言有虛有實何也曰驚狂屬虛或當汗不得汗火迫致狂名曰火邪驚狂當用柴胡龍骨牡蠣之類非若實熱發狂可下也發斑或問發斑亦裡證耶曰斑有溫毒有熱毒有胃爛溫毒者即冬受寒至春陽與陰氣相搏而發者是也熱毒者是暑氣伏胃因遇寒而發者是也胃爛者或誤下而熱乘虛入胃或失下而熱不得外泄毒氣入胃深極也故斑者毒也毒者乖戾失常偏陰偏陽之至也外因六氣相感胃有熱毒熏蒸胃主肌肉熱甚傷血裡實表虛故令周匝遍體狀如蚊齧紅赤者生紫黑者死以熱極而胃爛也舌苔唇裂者不治治當解毒清涼不可表藥取汗蓋表虛里實發汗則益令開泄更增斑爛矣又問陰證亦有發斑者何也曰或因汗吐下後中氣虛乏或因俗事耗損真陽或因過服涼藥遂成陰證寒伏於下逼其無根失守之火上熏肺胃而發斑點其色淡紅隱隱見於肌表與陽證發斑色紫赤者不同此胃氣極虛若服涼藥立見危殆吳鶴皋曰以參耆桂附而治斑法之變也醫不達權安足語此又問曰內傷亦有發斑者何也曰內傷元氣不足之病因氣血兩虛亦身痛心煩作熱但脈虛大懶於言動倦怠自汗為異耳若妄作外感有餘治立見傾危速進補中益氣湯熟眠熱止自愈丹溪曰內傷發斑者胃氣極虛一身之火遊行於外宜補以降之大建中湯最佳參耆歸芍炙草半夏桂附加薑棗水煎服若內有伏陰誤服涼藥逼其虛陽浮散於外而為陰斑脈雖洪大按之無力或手足逆冷過肘膝者先用炮姜理中湯以復其陽次隨證治不應加附子轉矢氣或問轉矢氣何以是里證曰言其氣下泄也觀無病人將欲大便必先氣泄病者內有燥糞結而不通則氣必下失陽明篇云若不轉矢氣者不可投承氣湯是知轉矢氣屬裡矣頭痛發熱俱止頭痛發熱俱止是里也邪之初中始於太陽太陽為表之表頭痛發熱俱多少陽陽明為表之中亦頭痛發熱若邪入里必表證盡除焉得頭痛發熱乎自汗自汗何為里證經云寒則腠理閉塞熱則腠理開疏太陽始受寒邪未化為熱腠理致密無汗當用麻黃湯始無汗忽變為有汗者知熱已入腑熏蒸鼎沸故自汗為里證假寒在表焉有汗乎或問自汗為里有用桂枝湯又何故蓋自汗用桂枝湯者乃太陽傷風證夫里證自汗為陽盛孰敢用桂枝仲景云桂枝下咽陽盛則斃別之奈何淅淅然惡風頭痛發熱悉具者太陽傷風自汗也煩躁惡熱不惡風寒者里證自汗也小便多或問小便多者何為里證曰蓋飲食入胃由胃傳於小腸經曰小腸者受盛之官胃司水穀清濁不分一概混受由小腸而下則有膀胱與大腸清者從溺滲入膀胱糟粕從胃之下口傳於大腸膀胱竅閉水入大腸必作泄瀉若大便堅閉津液走前則小便頻數今小便多者大便閉結故證屬裡也小便若少大便雖閉水液不久浸入大腸當先硬滿而後溏泄矣仲景云小便少者不可攻以其不久當自便也潮熱或問潮熱何以是里證曰潮熱者如潮水之汛不失其期如今日發於未申至明日仍發於未申蓋未申時屬陰今見潮熱是邪居陰分熱結在裡熏灼結糞當下之又問曰潮熱屬裡故當下猶有表證何以治之曰已有潮熱尚兼表證未退必先解表然後攻裡乃為當耳下利腸垢或問下利腸垢何以是里曰下利出於腸胃若表有邪則里和焉得下利因邪入腑熱灼腸胃致有此證又曰表證亦下利否曰三陽合病則有下利或少陽陽明合病陽明者內主胃腑故有下利三陽合病若不入腑又無下利何者為辨但有發熱及諸表證耳下利固為里證又當分傳中傳經則腸垢直中則清穀二者下利以腸垢清穀為異耳惡熱或問惡熱何以是里證曰熱傳臟腑熏蒸煩冤揭去衣被揚手露體此熱傳裡也若有寒在內則惡寒焉有惡熱之理目不明或疑目不明以為里者何解曰目系五臟精華五臟屬陰陰居於里故云在裡況瞳人屬腎內熱灼極則腎水枯涸不能照物譬之炎天熱甚致目昏蔽當速下之以救腎家將絶之水設謂此證屬虛誤投熱藥害豈淺鮮哉腹痛或問腹痛何以屬裡曰嘗考坤為腹乃純陰也謂之曰陰則腹痛非表明甚若腹未痛而胸前痛者邪未深入尚作半表半裡證今腹痛知邪已傳腑矣曰既腹痛屬裡當投大黃又用桂枝者何意曰或太陽證誤下致腹痛尚有微表未解或太陰里證而脈帶浮者故用桂枝大黃令表裡兩解然腹痛雖屬裡又有傳經直中之分須慎之不眠或問不眠何以見里證曰蓋熱邪入腑令人煩躁不安若寒盛為直中則屬陰陰主靜靜則多眠又豈能不眠又問不得眠固屬傳經里證有投寒藥愈盛者何故此乃汗吐下後證也名曰津液內竭不得眠必心蘊虛煩脈未浮弱者當用真武湯及酸棗仁湯而里證不眠者則煩躁口渴不已脈必有力故知之手足心腋下有汗手足心及腋下出汗為里證者蓋人身諸背屬陽諸腹屬陰手足掌心腋下皆屬陰地五臟經絡所繫熱邪熏蒸臟腑致掌中腋下汗出若掌中腋下未滋潤者邪尚在表未入里即謂之表病里和今掌心腋下有汗知大便已硬當急下之為里證無疑嗌乾齒燥或問嗌乾齒燥何以屬裡曰夫咽為胃之路齒乃骨之餘今嗌乾者腑熱盛也齒燥者熱灼骨也骨與胃非里乎或問曰內熱甚當咽痛寒證亦咽痛何也蓋直中之寒為咽痛必下利清穀四肢厥逆此乃寒極而成反致咽痛與之水則不欲咽不若傳經嗌乾齒燥極喜飲水耳以上俱傳經里證當攻裡脈沉細無力或問脈沉細無力何以是直中寒證曰蓋元氣固於一身暢於四肢熱則脈數寒則脈遲定理也沉者陰也無力者虛也是寒中陰經陽氣衰微故脈不能有力假內有熱脈必實而且滑安得無力若脈無力即為寒為虛為直中耳外雖有表證或大熱之證不敢用攻裡及發表藥若不憑脈而概投麻黃令重虛其虛欲救晚矣背惡寒或問背惡寒如何是直中曰陰邪入於陽分陰盛陽衰當用附子理中湯或曰陽明腑病背亦惡寒何也曰夫陽明腑病背惡寒者外無寒證必見口渴煩躁背屬陽陽熱內陷入腑則背空虛致微惡寒故用白虎湯若口中和者正屬直中寒證又孰敢用白虎耶總之渴則內有熱不渴則內有寒也嘔吐清涎沫或問嘔吐涎沫何以為直中曰胃腑有寒熱必先現涎沫內經云諸嘔吐酸水及水液渾濁者皆屬於熱諸病吐涎及澄沏清冷者皆屬於寒如天寒則水清天熱則水濁之意若有熱有火在胃脘之間自燒耗津液以致口渴化為酸濁之水又安得有清涎沫乎四肢厥逆或問四肢厥逆何為直中寒證曰蓋四肢屬陽寒邪屬陰陽衰陰盛故發厥過乎肘膝況肘膝乃人之四關今寒過之是為直中脈沉遲無力者急溫之或問又有陽厥者何也此物極則反雖厥指甲尚溫不似寒厥冷極外證必口渴煩躁惡熱小便短赤大便或閉或下利腸垢脈必沉實有力但有一證即以為別多眠或問多眠何以屬直中曰陰盛則靜靜則使人多眠若傳經熱證則屬陽陽主動焉得多眠又云表證亦有多眠者何說曰表證是感邪深重必頭痛發熱方為表證多眠若傳經里證則煩躁惡熱揭去衣被甚則譫語發狂又何能多眠也總之多眠非直中寒證即是表證矣乾嘔或問乾嘔何以是陰寒證曰蓋寒鬱中脘陽氣不舒欲吐不吐名曰乾嘔若有熱在內則吐出物或嘔酸苦水便無此證或謂太陽少陽水氣亦令人乾嘔何也曰太陽乾嘔頭痛發熱少陽乾嘔胸滿脅痛水氣乾嘔咳引脅下痛惟直中乾嘔則外無一毫表證必見下利清穀面慘灑淅及諸寒證然太陽少陽水氣三者乾嘔究未離乎寒也下利清穀或問下利清穀何以是直中寒證夫寒邪居內則水穀不化經云食下即化腐臭而出者是有火也食下不化完穀而出者是有寒也又云天寒則水清天熱則水濁病機云諸水液澄沏清冷者皆屬乎寒今下利清穀非寒而何若傳經熱證便下利腸垢而不下利清穀矣吐蛔或問吐蛔何為直中曰蛔得熱則安遇寒則泛吐蛔必膈上有寒也投以涼藥則逆當急溫之又問曰倘外大熱證而吐蛔亦禁用寒涼藥否曰如烏梅理中丸系安蛔藥也皆用附子乾薑雖有熱證必先安蛔而後可治他證不然膈上虛寒犯之必危蜷臥或問蜷臥何為直中曰熱則舒暢流通何有蜷臥試觀常人冬月獨臥寒極必蜷臥天氣稍暖則手足伸舒臥便自如曰陽經表證亦有蜷臥者寒耶熱耶曰陽經蜷臥表中寒深故也須大發表分別在有頭痛發熱及諸表證乃是陽經蜷臥蓋陰經蜷臥則無一毫表證囊縮或問囊縮何以屬直中者曰蓋熱主流通寒則斂縮且直中寒證乃陰盛陽衰不能溫其下故令陰囊收縮如常人遇冬睪丸反隱於上此寒盛也遇夏睪丸下垂此陽盛也然指掌以囊縮用承氣者何意曰厥陰者肝也肝主筋膜若次第傳至厥陰六經已盡邪氣盛者致筋急舌卷如中風狀而囊為之斂搐以筋聚於陰器故也非似直中曰隱曰縮夫指掌以囊縮當下者必口渴煩滿極方敢投承氣至於口不渴兼有一毫厥逆清穀誤投承氣必危唇甲青或問唇甲青何以是寒證曰蓋指得血而能握唇得血而色赤今寒中之血凝不能濡潤唇甲色變況色之赤者為熱青者為寒急溫無疑或曰陽厥亦唇甲青別之如何曰陽厥熱深也熱極反厥然唇甲似青實非青也乃紫黑色唇雖紫口必渴與之水則飲啓唇視之咽喉如煤指甲雖紫尚溫若直中者唇青而口和甲青而厥逆寒熱之辨相隔千里司命者凜之毋急小便清長或問小便清長何為內有寒乎曰夫內熱則便赤短少內寒則便清且長或曰邪在皮毛未入腑者亦便清長何以別之曰邪在表為表病里和言便如常今謂之曰清長則異於常時耳要知直中小便清長必見厥逆清穀外無表證為異若有頭痛發熱而小便清長如舊者則又屬表矣以上俱直中寒證當救里似證辨疑少陰似太陽有少陰直中發熱似太陽發熱何以辨之曰蓋太陽發熱必有頭痛脈浮而緊宜麻黃湯少陰屬裡寒不當發熱今發熱何也乃表裡俱傷惟表有寒故發熱雖發熱脈必沉遲或下利清穀當用麻黃細辛以發表附子以溫中令表裡寒邪兩解若有頭痛發熱而脈重緊即是太陽表證又何以為少陰熱乎經云陰證少頭痛設有頭痛發熱兼之下利清穀即是兩感於寒也而非少陰熱矣陽明經證似腑證有陽明經證誤作陽明腑證者如何辨蓋陽明經病表病里和也陽明腑病里病表和也經腑同見者表裡俱病也經則目痛鼻乾無便閉譫語惡熱等證此不可下腑則惡熱自汗便結無頭痛惡風惡寒此不可汗然汗解者汗陽明之經而不汗陽明之腑下者下陽明之腑而非下陽明之經也表證自汗似里證自汗有表汗認為里汗何以別之蓋表病自汗太陽傷風也里病自汗熱邪傳腑也風者善行數變性主舒暢萬物人身腠理開故自汗必惡風頭痛發熱其脈浮而緩若里證自汗因熱傳腑熏蒸鼎沸亦腠理開而自汗惡熱甚外無大表證其脈洪而有力一惡風脈浮而緩一惡熱脈洪有力須細察之表證身痛似直中身痛表病身痛似直中身痛從何分別蓋表證身痛太陽傷寒也里證身痛寒邪直中三陰也名曰表則頭痛發熱名曰陰又何有頭痛發熱表證身痛者重表之直中身痛者重溫之皆寒為病以寒主凝滯血脈故令人身痛若熱則無身痛證如狂似正狂如狂未若正狂之甚陽熱盛極令人發狂其證大便閉結小便短赤面紅口乾經曰重陽者狂此之謂與若如狂乃蓄血下焦小便自利唇焦漱水不欲咽當用桃仁承氣湯一小便短少而狂甚一小便自利而糞黑為別動陰血似衄血證動陰血與鼻衄何以異蓋衄從鼻孔中流出若動陰血則不止在鼻乃少陰傳經里證熱極而反厥逆者是誤用麻附以熱證而用熱藥使內熱愈甚迫血妄行故從耳目口鼻中滴流名曰動陰血非衄血也表惡寒似里惡寒表惡寒不同里惡寒者直中里證惡寒外無一毫身熱頭痛若表證惡寒必有發熱頭痛之異經曰發熱惡寒者發於陽無熱惡寒者發於陰此乃千古確論陰躁似陽躁有陰極反煩燥似陽躁者何法辨之蓋熱極煩躁必口渴飲水能咽或大便閉或下利腸垢腹中急痛若直中陰寒反躁者乃物極則反口雖渴欲飲水不上咽大概以脈消息之耳辨其有力無力脈稍有力而能咽水者即是陽躁非陰躁也瘀血發黃似鬱熱發黃瘀血發黃與鬱熱發黃何以別之蓋當汗失汗致熱邪傳裡熏灼肌肉熱弗能升越令人發黃則小便不利若膀胱熱不解瘀血蓄於下焦而發黃則小腹硬痛而小便自利二證發黃惟視小便利與不利耳熱厥似寒厥寒熱之厥辨在何處蓋寒厥四肢逆冷過乎肘膝指甲青脈沉細無力有寒證見於外若熱極而厥者火極似水雖厥而指甲尚溫不似寒厥過乎肘膝脈來沉實大而有力以此為別直中咽痛似傳經咽痛直中傳經皆有咽痛不知傳經咽痛必口燥渴能消水大便閉不閉則下利腸垢小便短赤若直中咽痛則脈來無力或下利清穀口不渴而咽痛者名曰腎傷寒急用半夏桂甘湯即傳經咽痛宜用苦寒之劑二者總在渴不渴消水與不消水辨焉太陽無脈似陰脈太陽無脈即脈不出也認作陽證見陰脈者不可也蓋太陽無脈因寒邪在肌膚凝滯不行血脈難以周流故無脈乃表感寒邪深重外必見太陽證方是當大發表以通血脈豈得混作陽證見陰脈乎太陽脈似少陰有太陽脈似少陰別之奈何在外絶是太陽表證頭痛發熱惡寒身痛脈當浮緊今反沉遲無力此取脈不取證也是太陽表證得少陰脈此裡虛久寒正氣衰弱故脈不能浮緊而見沉細若正氣旺脈必浮緊何至沉遲無力故用四逆湯使正氣旺逼寒外出脈遂自然浮緊設誤投麻黃髮表是重虛其虛矣太陽腑證似里證太陽腑證與里證有辨蓋太陽腑者膀胱也膀胱所以盛溺若溺短赤即太陽腑病誤以溺赤為里證者非太陽始受病必頭痛發熱甚則邪傳於本腑遂便赤此邪只在太陽經腑其他臟腑平和無恙勿作里證治當兩解太陽經腑之邪發散中加滲利藥如五苓散五苓散治太陽腑白朮澤瀉豬茯苓膀胱氣化添官桂利便消暑煩渴清除桂名為四苓散無寒但渴服之靈湯頭即太陽腑藥也今人見病起有表證兼溺赤即不敢用發散然果是里證而小便短赤無一毫表證清利無防若溺赤而兼有表證外無胃腑證者此是太陽經腑俱病當即發表又何疑焉津液內竭誤利小便有津液內竭小便不利而失錯利之過矣蓋人身之汗與溺同源經云天寒衣厚則為氣為溺天熱衣薄則為汗言寒則溺多而汗少熱則汗多而溺少陽明腑病汗多小便不利者皆津液內竭妄利之重虛其虛而便愈不利矣果是里證熱在下焦及未曾大汗而小便不利者方用滲利之品若一見自汗或大汗後小便不利者乃津液內竭切勿輕利也兩感須分傳中兩感者陰陽雙傳也表裡並行如膀胱與腎脾與胃肝與膽俱傷若與他經同見即為合病或表裡俱見遂非兩感矣如活人書宜先救里以四逆湯以六書言不可救以攻為主二者偏見非活法也果見下利清穀必先救里果見煩滿口乾則先攻裡大法傳經兩感先治表直中兩感先救里或救或攻以治其急為上以陰經中分寒熱於裡證內別虛實故知屬於傳中不可拘傳中二字不然既兩感何得又傳中既傳中又何得謂之兩感耶試以直中兩感論外證頭痛發熱脊項強痛者太陽表證也下利清穀脈來沉遲無力少陰寒證也表急者麻黃湯為主加溫熱之品如麻附細辛湯是也裡急者以四逆湯為主加發表藥令表裡兩解表裡俱急則先治其一若表盛於外而熱盛於內名曰傳經兩感外證頭痛發熱太陽也嗌乾口渴腹滿少陰也如是隻以解表為主加辛涼藥如口渴腹脹滿里證急者方敢攻裡必加辛涼解表何也凡傳經不與直中同看直中寒邪徑入陰經五臟已危必先救里傳經自表入里若里證不急有一毫表證必先解表而後攻裡內經所謂逐邪必絶其源者是也如陽明與太陽俱盛於外頭疼目痛發熱陽明也腹脹自利口渴太陰也陽明經病在者宜解肌為主加涼藥治里陽明腑病同見者調胃承氣湯下之如少陽與厥陰證俱盛於外耳聾口苦發熱少陽也口渴囊縮厥陰也少陽證急以小柴胡湯主之加以涼藥治里厥陰消渴囊縮者則以承氣為主加柴胡半夏治表噫兩感固為不救司命者能操活法或可冀生總之兩感之寒宜先救里兩感之熱宜先解表此治兩感之大法亦治兩感之活法也合病並病夫合病者用也或二陽形證俱見或三陰形證俱見謂之曰合並者歸也先二陽形證俱病後一陽病里一陽形證在外方謂之曰並其合病並病形證辨在何處合病如外見脊腰疼痛及耳聾脅痛乃太陽與少陽合病也外見耳聾脅痛及目痛鼻乾乃少陽與陽明合病也如此方謂之合併病如外先見腰脊強及耳聾脅痛後耳聾脅痛止單腰脊項強者此少陽並於太陽也外先見耳聾脅痛後目痛鼻乾鼻乾止而單耳聾脅痛者此陽明並於少陽也外先見目痛鼻乾及腰脊項強已而單目痛鼻乾此太陽並於陽明也如此方謂並病又曰一經不徹復過一經亦名並病蓋陽主動動則合合則並陰主靜靜則無合併之理假如與陰經同見或兩感或為表裡俱見則不為合病並病矣仲景云三陽有合病有並病陰經既無合併治法當從表不從里明矣三陽合病以解表發表為主看某一經形證多者則以某一經藥為主治加他經藥在內此治合病之大法也若並病看並於何經並於太陽則發表並於陽明經則解肌並於腑則下之並於少陽則和解此治並病之大法也然而三陽合病間有下者何也蓋三陽合病宜下外無惡寒必惡熱譫語已合陽明之腑方可用調胃承氣湯若有一毫惡寒不見惡熱譫語孰敢下乎熱人血室傷寒有熱入血室一證晝則明瞭夜則譫語如見鬼狀醫誤認為里隨大下之或昏冒終日不知人事又誤為表隨大汗之邪在血脈或誤攻裡或誤發表必致不救試思何以為血何以為熱人身之血譬如江河周流不息隨氣而轉在於脈中內經云諸血皆屬於脈又曰脈者血之府夫熱者邪氣也婦人傷於寒邪必不免於病熱或病中經水適來或已病經水忽絶經去血空熱邪乘虛陷入蓋血之源在心心為血本又主藏神今熱邪入於血室使人昏冒譫語治惟毋犯表裡毋傷胃氣只有小柴胡一湯和解或用地黃湯倘誤用他藥令重虛其虛斃而後已否則聽其自愈以經行則熱隨血去倘經來適斷者證如瘧狀其血必結結者血滯不行用小柴胡湯加紅花主之若誤認熱人血室為表為里則死生在乎須臾危哉胎前傷寒蓋胎賴血養血去則胎不能存孕婦設受寒邪大汗則傷血大下則傷陰皆能動胎內經云奪汗者無血如發汗攻裡必先安胎為主外有表邪用四物湯為主倍加黃芩白朮佐以蘇葉乾葛羌活柴胡即孕婦表藥也外有半表半裡證用小柴胡湯去半夏倍加黃芩白朮即孕婦和解藥也內有里證用四物湯加黃芩白朮佐以大黃厚朴枳實即孕婦攻裡藥也假如證候危急非毒藥不能攻又當救母不救子設拘執救胎則母亦不救矣內經云婦人身重毒如之何岐伯曰有故無殞者亦無殞也大積大聚衰其大半而止言有故母有故也上無殞者無損母也即救其已生不救其未生亦無殞者言子亦無損蓋言毒藥只攻邪氣邪去病愈則子亦安故言不損也言衰其大半而止者假如發表汗一半則止不可過汗其大下下一半則止不可過下恐多汗過下有傷陰血胎氣亦損治孕婦用藥之難如此産後久病傷寒夫産後血氣大虛久病血氣必弱二者設感寒邪治不與正傷寒同産後氣血虧以致惡寒發熱脈必虛弱無力非傷寒也當大補氣血用小柴胡湯加減在裡用大柴胡湯加甘草大柴胡湯用大黃枳實芩夏白芍將煎加薑棗表兼里妙法內攻並外攘若虛弱甚而里證急者用大柴胡湯加人參固下蓋參能補肺氣肺與大腸相為表裡用參以助藥力雖行而不傷其氣血此産後傷寒用藥之法也若久病虛疾亦惡寒發熱與傷寒相似慎勿作傷寒治虛疾惡寒發作有時鼻口息均脈虛無力非正傷寒也若脈來有力發熱惡寒無有間時鼻息氣盛方是外感久病之中又感寒邪若表證則用參蘇飲參蘇飲內用陳皮枳殼前胡半夏宜乾葛木香甘桔茯內傷外感此方推或人參敗毒散羌活獨活柴胡前胡川芎枳殼桔梗茯苓人參甘草以表之不可大用燥熱辛甘之劑恐愈耗津液若在半表半裡以小柴胡湯去半夏加減和之蓋半夏能燥津液故去之若邪在裡用調胃承氣湯去芒硝加減用之慎勿用寒涼以傷胃氣胃氣一傷飲食便廢矣此治久病感寒之大法也夫久病産後但傷其寒者不可大發表大攻裡發表則重虛其陽攻裡則重虛其陰必致夭亡産後久病固不宜大汗大下設病勢危篤又當從權也感冒感冒者非冬時正傷寒也今人不分感冒與正傷寒一概混治者多矣蓋冬中殺厲之氣名正傷寒春秋夏則為溫為涼為暑何得有寒間有非時寒邪人或感之名曰感冒既曰感冒則所病非輕亦不得用冬時正傷寒辛甘辛溫之藥當用微辛涼以解之如紫蘇乾葛羌活之類況人春夏皮膚緩而腠理疏則邪易入或勞力汗出而遇微寒或自外卸衣或畏暑貪涼或天時暴寒皆能傷之其證鼻塞清涕咳嗽頭痛身微發熱微惡寒此感冒證也又何得謂之傷寒哉或曰夏天既無寒間有陰證而用四逆湯何也曰夏月三陰在內用事此人必有房事致腎經空虛或食冷物徑中本經而成此證足者陰經所過之處或是履寒水徑中本經之絡而成此證則不謂夏月有寒此自傷之也亦急溫之此夏月腎虛中寒之證除此則為中暑為熱病所以春夏只有溫暑間有微寒人或感之則名為感冒不得律為正傷寒矣
