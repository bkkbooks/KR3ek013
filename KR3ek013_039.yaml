body:
  text: 卷三十九救急部凡解一切中毒以及誤吞金石蟲螫等證俱匯於此部中以便檢閲參治解救砒霜門主論雷真君曰世人有服砒霜之毒五臟欲裂者腹必大痛舌必伸出眼必流血而死最可憐也急用瀉毒神丹飲之如立時大瀉則生否則死矣此砒已入於臟非可用羊血生甘草上吐能愈特又變下法救之飲之如不瀉此腸已斷矣又何救乎倘用之早未有不生者不可執吐法而無變通若初飲砒霜但飲甘草羊血立吐而愈如不吐速用瀉毒神丹瀉之則無不救矣活人録凡中砒毒其證煩躁如狂心腹攪痛頭旋欲吐不吐面色青黑四肢極冷者是凡服砒人不可仰臥恐毒流四肢難治愈後須忌百日煙酒薑椒煎炒願體集凡中信毒因氣腦自服者急用香油一碗灌之或吐或下即活若系酒調者難救其毒發散於周身也陳遠公曰服砒毒疼欲死若不急救必腐腸胃吐紫血而死蓋砒石乃天生之石不曾經火煅煉何毒至此不知砒石生南嶽之山鍾南山火毒又經火氣則其性大熱酷烈之至安得不殺人哉性又善走砒石下喉必升降於腸胃之上下往來數十次腸剝皮穿人乃死矣疼欲死者正毒氣上下攻也毒藥之橫莫此為甚治法必吐出其毒然不能盡出其毒也必用解毒之味但初下喉用羊血吐之亦有能生之者食久入胃則無益矣宜用救死丹久暫皆可救用生甘草一兩玄參二兩地榆五錢瓜蒂七個水煎下喉即吐煮渣服之又吐砒毒全解矣甘草解毒得瓜蒂上湧而吐砒能上升故引之盡出也然砒又下行得元參地榆解大腸之火毒砒之大毒已從上而出走下者亦餘毒耳得二味解之則上下共相解紛毒又何能施其燥烈哉況元榆俱潤中解毒所以能製毒也此方十可活八若不吐者此腸胃已壞不可救矣非方不效也倘藥不及煎於飯鍋中煮灌之庶不至因循失救也解救砒霜門主方解信毒法願體集速取梁上燕子窠用井水三四大碗放水桶內將手多攪調之用夏布手巾如榨腐法濾去泥葉取所攪之水連灌兩三碗自吐不吐再灌吐盡方醒初中砒毒雷真君活人録吐法生甘草三兩急煎湯加羊血半碗和勻飲之立吐即愈飲之不吐速用下法瀉毒神丹雷真君活人録下法當歸三兩大黃一兩白礬一兩生甘草五錢水煎湯數碗飲之立時大瀉則生否則死矣又方黑鉛一兩磨水灌之凡中砒霜一切毒藥垂死者急用上號潔白糖靛花淡豆豉甘草各等分研勻冷水調灌即蘇又方無名異即漆匠用者和生雞蛋清攪勻服之又方陳壁土攪水灌之又方急飲人溺及人糞汁或金汁灌之又方虎耳草葉洗淨搗汁攪冷水灌之又方牙硝不拘多少研末冷水調下又方生鴨血灌之又方小薊根搗汁灌之又方大黃明礬研末新汲水調灌得吐利即解誤中砒毒渾身紫纍有解不效此名砒霜纍瘡黃土地上挖一斗大坑以井水滿之攪令渾濁以一碗與之少刻又與之待渾身紫纍俱散一吐即蘇雖冬月間亦宜用之此法必效解砒霜及一切藥草六畜肉中毒白花扁豆經過霜者生收曬乾研末用新汲水調服三錢又方真緑豆粉黃土各四兩研極細用生雞蛋清九個共一處以浸緑豆冷水和稀服之即解若有黑羊血再灌碗許更妙又方天竺果煎服如無取根搗汁煎服亦可又方明礬三錢研末冷水攪勻送下一吐即愈又方未盡用緑豆甘草夏枯草煎湯冷服又方生漆渣子瓦上煉存性研末滾湯沖服五分救誤服蒙汗藥門主論蒙汗藥大約用天仙子為君加狐心等物雖不殺人然令人迷而不醒山東村杏多乘心迷以取財物醒來全不記憶恍惚不能辨別所以道途誤服蒙汗藥以致頭重足輕口吐涎沫目瞪不言此迷心之故也雖不殺人久迷不醒亦可畏人涼水解之亦能少蘇但涼水入心水停心下倘虛人必變他證或曰此證必是痰迷心竅宜生薑開之投以薑汁乎殊不知藥中天仙子居多得薑汁愈迷其心矣故不可用也救誤服蒙汗藥門主方止迷湯白茯苓五錢生甘草二錢瓜蒂七個陳皮五分水煎服即大吐而醒其從前事斷不遺忘不似涼水之解如醉如癡也又方飲涼水即安救飲鴆酒毒門主論凡飲鴆酒白眼朝天身發寒戰忽忽不知大醉之狀心中明白但不能言至目閉即死夫鴆毒乃鴆鳥之糞非鴆之羽毛亦非鶴頂紅也鴆羽與鶴頂紅皆不殺人不過生病惟鴆糞則毒此鳥出異國異國人恐言鳥糞則人必賤之故但言鴆以貴重之也此鳥非蛇蠍不食故毒甚於孔雀之糞孔雀糞沖酒飲有死有不死者而飲鴆則無不死也蓋鴆毒性熱功緩善閉人氣所以不能言必寒戰者心中熱毒心脈通目大眥心熱則目上視目閉而死者心絶目乃閉也幸其緩可施救鴆音逞救飲鴆酒毒門主方消鴆金銀花八兩煎取汁二碗白礬寒水石天花粉各三錢石菖蒲二錢麥冬五錢同煎灌之一時後目不上視口即能言矣再照方減半煎湯二劑全愈救誤服銀烠門主方驗方濃煎烏梅湯灌之即解又方黃泥水服二茶盅即解救誤服水銀門主方驗方揀開口花椒二兩吞下即裹水銀從大便出救誤吞五金門主方誤吞金銀銅鐵錫蠶豆炒研末砂糖調服其物從大便出又方豬板油同青菜煮食自出吞金丹方羊脛骨燒焦研末三錢米飲調下從大便出吞鐵物丹方栗樹炭二塊將鐵錘搗極細砂糖和細丸米飲送下三錢立出吞銅錢羊脛灰煮粥食之吞銅錢或銅多嚼生荸薺食之自化吞金紅棗煮爛不時食之金從大便自出吞金銀銅錫先飲生鴨血杯許再多食炒蠶豆不切熟韭菜其物即從大便裹出吞鐵艾蒿一把挫以水五升煮取一升頓服即下吞錢在喉不出麩炭末指彈入喉中其錢當即咯出吞釘及箭金針鐵多食肥羊肉及諸肥肉自裹出吞金環及叉飴糖一斤一頓漸漸食盡多食之環及叉便出知是服金屑死而未絶者水銀一兩灌口中搖動令下咽喉入腹金即消減成泥而出解金銀銅鐵毒鴨屎汁解之一人以銅條兩個作戲法由鼻孔進而從口出忽一日銅條滑入腦中奇癢難忍無法可救黃公曰爾磕我三百個頭我當救爾其價即連磕其頭叩未百餘其銅條從鼻出此亦聰明人慧心智囊耳吞錢桑柴燒灰研末米飲調服二錢又方緑豆粉冷水調服三錢又方多服飴糖吞金銀銅鐵砂糖同砂仁煎濃湯多服自下救誤吞針門主方吞針入腹蠶豆煮熟同生韭菜食之針從大便而出又方櫟炭末井水調服三錢又方蛤蟆眼睛一對冷水送下針穿眼內而出冬月無蛤蟆在桑根下尋又方黑砂糖和黃泥為丸吞下泥即裹針在大便中出誤吞針刺咽中痛者亂麻筋一團搓龍眼大以線穿系留線頭在外以湯浸濕急吞下咽頃刻扯出其針必刺於麻中而出如一回不中節再吞再扯又方雄磁石研末水丸如櫻桃大吞下即服通利之藥針從大便而出針入咽喉無藥可施癩蛤蟆數個將頭剁去倒垂流血以甌接之得一杯許灌入喉中移時連針吐出針自軟曲又方舊笤籬煅存性研末每服三錢酒調服亦能化針又方將半生半熟出芽蠶豆搗爛以韭汁為丸吞下又方磁石如棗核大吞之其針立出又方磁石研細將黃蠟和捻如針大小涼水下裹針從大便出誤吞諸木竹叉門主方驗方取剪刀故鋸燒赤入漬酒中以女人大指甲二枚燒存性研末和服吞桃枝竹杖但口中數數多食白糖自消去木屑嗆喉鐵斧磨汁灌之竹絲鯁不拘黑白芝麻炒熟泡湯飲再以干芝麻嚼服幾口或以生芝麻搗爛嚼食救誤吞磁鋒門主方驗方生紅蘿蔔搗爛吞下其磁鋒即從大便而出解誤服鉛粉門主論凡服鉛粉者非婦女角口憤不欲生冀其鉛能墜腸而殞更有婦女打胎服之不惟不效每冀求生不得欲死不能且生子多癡呆身體發瘡毒更有因服鉛粉鑽筋入骨老來遍身筋骨疼痛無法可療此故自取之也深可憫焉特立此門救之新增其見證面色呈青腹中墜痛欲死者是解誤服鉛粉門主方驗方麻油黃蜜紅砂糖攪勻服之又方多食生荸薺即解又方香油灌之即解又方急搗蘿蔔汁飲之解誤服銀硃藤黃門主方驗方虀水溫服即解驗中蠱毒門主論令病人朝取井華水唾水中唾如柱直下沉者是蠱也浮者非蠱也三因中蠱者大便黑如漆或堅或薄或微赤者是蠱也千金孫真人曰凡中蠱毒噙白礬不澀而味反甘嚼生黑豆不腥者是若含甘草而不吐者非蠱也徵今鐸遁齊閒覽云海南魚有石首蓋魚枕也取其石為器可盛飲食如遇蠱毒器必裂其效甚者閩人制作最精人但玩其色而鮮有識其用者又曰唾津在淨水中沉即是浮則非又曰口含大豆中蠱者豆即脹而皮脫無蠱者豆雖脹皮不脫又曰煮雞蛋一枚去殼以銀簪一隻插入蛋中並含入口內一飲之頃取視簪卵俱黑即為中蠱訣曰脈緊數如叉股弦直而吐甚者即中蠱也急治之又曰脈洪大者生微細者死陳遠公曰有遊兩粵與女人交好或與男子成仇下蠱於飲食之中食之則兩目漸黃飲食倦怠一年三載無藥解之必致暴亡世傳造蠱土人各將蠱毒與蛇蠍等物共投缸內彼此相食食完止存一物不死者取為蠱母此訛傳也蓋彼地別有蠱藥乃天生之毒也土人治此證有方可解大約用礬石化蠱恐外人知之故祕不言礬石化痰又善化堅蠱積腹中內必堅硬而外以痰包之所以一物二用奏功如神惟人身柔弱者多強健者少而蠱積胸腹間必正氣大虛倘用礬石不更虛其虛乎必於補氣血之中加消痰化蠱之味有益無損始稱萬全也宜破蠱全生湯解中蠱毒門主方治中蠱毒濃煎石榴皮汁飲之使吐惡毒又方熱茶化膽礬半分服之令吐又方米飲調鬱金末三錢服之又方徵今鐸先取炙甘草一寸嚼之咽汁若中毒隨即吐出仍以炙甘草三兩生薑四兩水六升煮二升日三服若嚼甘草不吐則非蠱也又方範石湖文集昔李熹為雷州推官得治蠱方毒在上用升麻吐之毒在腹用鬱金下之或合二味服之不吐則瀉活人甚多破蠱全生湯人參當歸各一兩白礬生甘草半夏各三錢白茯苓五錢水煎服解中斷腸草毒門主論人有服斷腸草者初則胸中隱隱作痛久則氣不能通及至腹痛二便俱不能出而死此草即鉤吻也至陰之物狀似黃精葉如毛鉤子二個此草喜閉氣尤使血不行氣血閉故爾人死非腸斷也閩廣間多生此草婦女小忿往往短見食之覓死如飴以其不大苦楚也有用羊血灌之得吐則生然亦有不吐者往往不救此草殺人甚緩用解毒通利之味無不生者不似砒之酷也宜通腸解毒湯冰鑑解中斷腸草毒門主方誤中斷腸草即珍珠蘭之類又曰水莽藤毒生雞蛋三四個敲開灌之又方黑豆一杯研生甘草五錢煎濃汁服之登時即解又方白礬化水解之又方熱羊血灌碗許以吐盡惡物自蘇又方冬青樹葉冷水搗汁服下即解又方雞抱雛卵劈開以清油調勻灌之通腸解毒湯金銀花生甘草各一兩大黃一錢水煎服一瀉而愈解中藥毒門主論凡中草烏川烏天雄附子毒則心煩躁悶甚則頭岑岑然遍身皆黑而死入門凡服藥過多生出毒病頭腫如斗唇裂流血或心口飽悶或臍腹撮痛皆中藥毒也脈訣曰人中百藥毒傷其脈洪大者生微細者死又曰洪大而遲者生微細而數者死凡解藥毒湯劑不可熱服宜涼飲之蓋毒得熱則勢愈盛也然此物以中熱毒為言耳若解木鱉菌覃黃連石膏之類而中陰毒者豈仍避熱而猶堪以寒飲乎解中藥毒門主方凡中相反藥毒面青脈絶腹脹吐血蠶退紙即出過蠶的紙燒灰研一錢冷水調服雖危可救其復活中草烏川烏天雄附子毒入門煎緑豆黑豆汁冷服之黑豆即馬料豆又方防風甘草湯冷飲之入口即定又方甘草黑豆濃煎飲汁川椒毒戟人咽喉氣閉欲絶入門吃大棗三枚解之多服犀角則令人煩入門麝香一字調水飲之解百藥毒緑豆研開甘草同煎服誤服巴豆口渴面赤五心煩熱泄不止者川黃連一錢煎服立解又方石菖蒲汁立解又方用小豆汁立解又方藿汁立解又方大豆汁立解皂礬毒急取曲糊一碗服之救中雄斑蝥毒早用馬料豆煎汁服之凡敷搽藥內有砒霜患處作痛或腐潰者用濕泥頻塗換之若毒氣入腹胸膈苦楚或作吐瀉冷飲米醋一兩杯即止多亦不妨生緑豆末麻油調服亦可敷貼雄黃藥悶亂或吐瀉防己煎湯解之服川烏草烏等藥悶亂流涎或昏憒嘔吐或吐血下血大黑豆遠志肉防風甘草任用一味煎湯解之大凡服風藥過多皆宜用之如不應急用生薑汁甘草解之敷貼巴豆患處作痛肌肉潰爛生黃連末水調敷之即解若毒入內吐瀉等證更以水調服一二錢或大小豆菖蒲汁皆可敷貼藜蘆毒入內煎蔥湯解之解諸藥毒生薑汁灌之又方薺苨汁灌之餳糖汁灌之白扁豆汁灌之米糖汁灌之解一切藥草中毒濃煎甘草飲之無不生也又食蜜少許更佳解服鹽滷門主論服鹽滷者口咸作渴腹痛身蜷足縮而死夫鹽能補腎何便殺人不知鹽滷味苦苦先入心心遇鹽滷氣鬱不通滷見心不受乃犯於腎腎見味苦又不受遂往來心腎之間心腎之氣交相悖而滷流入於腸則不可救矣夫大小腸最惡鹽滷入之必縮小其腸而成結結則氣不通安得不蜷曲而死乎治法用甘草湯解之解服鹽滷門主方驗方急搗肥皂汁和水灌之即吐如吐未盡用熱豆腐漿灌之即吐腐形如不吐用鵝翎絞喉數次必吐甘草湯生甘草三兩煎湯救之如滷未久加淡豆豉一兩同煎服之腸潤未必皆死要在活用之耳又方冷豆腐漿灌之又方抹桌布瀝水灌之又方皂角水冷服中飲食毒門主論書云善解毒者無如火蓋火能革物之性陳遠公曰誤食漏脯以致胸膈滿飽上吐下瀉腸如刀割痛瀉不止而有死者夫漏脯乃隔宿之肉為屋漏水滴入名之也似無大害何以殺人此言歲久之屋梁塵甚多屋上必有蛇蠍行走塵灰倒掛蛛綱結成無非毒物天雨之水順流而下凡毒氣得水則化然化於水中也水入肉內毒將何往自然結於肉中而不化食之安得不變生不測哉亦有食而不死又何故此必非歲久之屋未經毒物故也雖不死而病必不免所以為太上所戒急用解毒之藥自可得生中飲食毒門主方凡一切飲食毒用麻油一兩杯飲之得吐毒即解化漏湯大黃山楂厚朴各三錢白芷麥芽各二錢生甘草五錢水煎服解百般飲食毒生粉甘草二兩緑豆一升水煎頻頻服之解燒酒毒門主論人有恣飲燒酒大醉而死必身腐爛臭穢夫酒為大熱之物純陽無陰尤為至熱多飲過度力不能勝一時醉倒而熱性發作腐爛腸胃其人已入醉鄉不知生死用井水頻撲其心胸解開頭髮浸頭於冷水中候溫即換涼水後用解炎化酒湯主之又曰錫壺盛燒酒過夜有毒飲之傷人又曰鱔魚浸燒酒內即成泥解燒酒毒門主方凡過飲燒酒人事昏沉將醉人放在板門上矮橙架住頭低腳高將頭髮打散用盆乘水入生研緑豆於水內隨將頭髮浸水盆內如水將溫即另換一盆浸至酒散人事清白方止仍用大片熱豆腐鋪胸前豆腐蒸變拔出酒毒又換熱豆腐貼之自活醒後宜吃緑豆湯又方葛花濃煎汁或葛根湯灌之又方枳椇子搗研煎湯解又方甘蔗削去皮搗汁飲乾嘔自止又方白蘿蔔汁灌之並救受狼煙煤炭毒又方熱尿灌之又方鍋蓋上的氣汗水數盅徐徐灌之解炎化酒湯人參一兩如無用黃耆二兩代之柞木枝二兩白茯苓五錢黃連寒水石各三錢石菖蒲一錢水煎一碗待冷灌之得入口即活此方用柞木解酒毒黃連寒水石解火毒菖蒲引入心中茯苓分消酒食之氣用人參者所以固真氣使不傷酒而散蓋火酒系氣酒也熱極則氣易散固真氣則火可瀉毒可解氣不脫也解中煤炭毒門主方中煤炭毒者一時悶倒不救殺人言瑤方急用新汲清水灌之中煤毒昏暈噁心跌倒急移在風涼處所鹹菜水灌之解中閉口椒毒門主方閉口椒食之令人身冷吐白沫欲絶金匱方地漿水飲之即解解誤食桐油毒門主方桐油入咽令人發吐不止祕方急飲熱酒即解救誤吞田螺門主方誤吞田螺鯁喉不下死在須臾活鴨以水灌於鴨子喉中少頃將鴨倒懸令鴨吐出涎水與患者服之其螺自化救誤吞桃李門主方誤吞桃李不下狗骨煮汁摩頭上即下又方以少許水灌小兒頭承其水與飲之即下救誤食豬骨門主方驗方象牙刮末浮於新汲水上吸之即下救誤吞雞骨門主方驗方隔年灶糖食之自化又方香油煎滾溫服即下救誤中豬肉毒門主方驗方豬牙燒為末一錢開水調服救誤吞頭髮門主方吞發繞喉不出自己亂髮煅灰開水調服一錢救誤吞蜈蚣門主方驗方急吞生雞蛋二個不可嚼次日即裹出之蜈蚣誤入咽喉中咬之垂死生公雞熱血灌入喉中蜈蚣即出人喉中似有物行動吐痰則痛更甚身上皮膚開裂有水流出目紅腫而又不痛足如斗腫而又可行真絶世莫辨之證此乃人食生菜有蜈蚣在葉上不知而食之乃生蜈蚣於胃口之上入胃則胃痛上喉則喉痛飢則痛更甚也方用雞一隻煮熟五香調治芬馥之氣逼人乘人睡熟將雞列在病人口邊則蜈蚣自然外走倘有蜈蚣走出立時拿住不可讓其仍進口中或一條或數條出盡自愈大約喉間無物走動則無蜈蚣矣然後用全膚湯茯苓三兩黃耆當歸薏仁各一兩白芍五錢生甘草二錢荊芥陳皮各一錢防風五分水煎服十劑則皮膚之裂自愈而雙足如斗亦消矣蓋蜈蚣在上焦非藥食能殺因藥下喉即至胃中而蜈蚣卻在胃口之上故不能殺之也所以引其外出然後用藥調治其氣血自愈皮膚開裂者乃蜈蚣毒氣盤踞肺邊肺主皮毛故皮膚開裂足如斗者足乃腎之部位肺居上為腎之母母病則子亦病然腎水終是不乏而毒氣留於腎部故足之皮大而浮非骨之病也所以能走也眼屬肝肝受肺氣之毒熏蒸故紅腫也祕録救誤吞螞蝗門主論芹菜內螞蝗極多摘洗不淨每每誤食下咽肚腹作痛或云螞蝗煅灰研細散於水碗內露一宿即變細螞蝗何況誤吞活螞蝗乎螞蝗一名水蛭以火焙為灰見水復活惟土井及藏芹菜根內小如米麥人所難防誤食必害人若知此物在腹但以芝麻油潤肛門蠱聞香盡出可無害矣救誤吞螞蝗門主方驗方水田泥為丸桐子大每服二三錢用水送下螞蝗即隨泥解出空心服之更效又方蜜糖一杯和水服之又方空心飲地漿水少許自下救誤中蛇虺百蟲毒門主方驗方雄黃一錢巴豆去油一粒乾薑五分麝香一分共研細末開水調服解中蜈蚣毒門主方驗方桑汁或桑根或桑葉煎湯服解中蜘蛛毒門主方驗方藍青汁服之解中蚯蚓毒門主方凡中蚯蚓毒者形如大麻瘋眉發脫落石灰泡熱水候冷浸良久即愈小兒受之鹽湯溫洗或鴨血塗之解中瘟牛肉毒門主論人有食牛犬肉一時心疼不能吐瀉此毒結心胃不升不降也亦宜用吐如吐之不效當用消肉化毒丹夫牛犬無毒本補精血之物何以毒至於此必牛犬抱病將死又加縛束以激動怒氣毒結於皮肉之間適當其處人誤食之故食之生病卒至暴亡也凡中馬犬河豚魚蟹毒者心下必堅硬或腹脹口渴忽發熱妄語者是解中瘟牛肉毒門主方凡誤食瘟牛肉口吐白沫不省人事早稻草煎湯灌之立醒又方烏桕樹根皮酒煎同熱酒服又方菊花連根搗汁同熱酒服消肉化毒丹山楂神麯大黃雷丸各三錢枳殼厚朴各一錢水煎服解中馬肉毒門主方驗方蘆根搗汁一碗飲之或煮汁服並煎湯洗浴解中犬馬肉毒門主方犬馬肉毒杏仁去皮四兩研以百沸湯和仁絞汁作三服吃即解又方急吃冷粥一碗頃刻毒解思食犬馬河豚諸魚蟹毒心下堅硬或腹脹口渴發熱譫語梅師方蘆根煮汁服立解中六畜肉毒水煎牆上黃土二錢飲之即解食自死六畜諸肉中毒搗黃柏末以水和方寸匕服未愈再服解中河豚毒門主論人有愛食河豚以至血毒中人舌麻心悶重者腹脹而氣難舒口開而聲不出若久延則害人夫河豚水族也有食之死有食之無事者何也乃人之腸胃有宜有不宜耳大約肝經血燥胃氣又弱者多能中毒蓋河豚乃魚中善怒者也食之自能動氣況肝血本燥之人肝氣自急以急濟急安得不增急暴之氣哉氣急難舒故心悶也氣急聲難出故舌麻也治當吐出其肉則氣舒腹寬聲出何有舌麻心悶之害乎古有拚死吃河豚之語其實河豚不能殺人但性怒不甚相宜耳宜瓜蒂散加味治之又曰河豚魚血令人麻子能令人脹眼睛令人昏凡食之者必須洗盡血去其子其眼庶無害也又曰河豚魚第一宜洗淨血水第二防有灰塵落在鍋內所以炒河豚賣者多在露天地上免灰塵落在鍋內也又曰以蘆筍同炮則解毒矣解中河豚毒門主方驗方槐花煎濃汁服之即解又方橄欖煎湯服又方急飲人糞汁中河豚子毒急取臘鵝煮食即不脹矣河豚菌毒錢氏多服金汁即解如難得即於乾地上挖一潭用水和泥漿稍定服水一二碗即解又方香油灌之吐出毒物即愈又方磨紫金錠服加味瓜蒂散白茅根蘆根各一兩瓜蒂一個水煎汁服必大吐吐後必愈解食魚中毒門主方驗方冬瓜仁煎汁飲之又方煮橘皮湯停冷飲之解黃鱔魚毒門主方驗方簡便食此犯荊芥能害人急服地漿解之解誤食毒蟹毒門主方驗方家紫蘇汁或乾紫蘇煎湯即解又方薑汁服又方靛青汁或小藍汁服又方蒜汁服又方薤汁飲之又方冬瓜汁服又方黑豆汁煎服解中鱉毒門主論有食鱉腹痛欲死手足發青而亡者夫鱉雖介屬本無大毒然鱉類多屬化生有蛇化有龜化有魚化者龜魚所化皆益人惟蛇化最毒其腹下必隱隱蛇皮之狀其色大紅必不可食食必殺人腹大痛者乃毒氣攻腸也不必解鱉之毒仍當解蛇之毒解中鱉毒門主方誤將鱉肉同莧菜吃成鱉腹脹急飲白馬尿一碗即化中鱉毒白芷雄黃各三錢丹砂山楂枳實各一錢白茯苓五錢水煎服一劑痛止二劑毒出矣又方飲藍汁數碗或靛青水亦效又方鹽汁飲解中野菌地菌靈芝毒門主論陳遠公曰人誤食竹菌或吞樹菌以致心疼胸脹腸瀉腹痛而死夫菌亦芝草之類生於莎葉朽木所謂臭腐出神奇何以毒種於中乎殊不知竹根樹柯而生菌菌者以土之濕熱也濕熱之下必聚蛇蠍惡蟲其氣上騰而菌菌得氣易於生髮故較他産更肥其味極美而其質實毒也解菌湯救之解中野菌地菌靈芝毒門主方驗方黃泥漿灌之即解地漿能解百毒真神方也又方橄欖搗為泥食之即解又方金汁解又方紫金錠磨服即解又方緑豆研生甘草煎濃汁飲即解解菌湯生甘草二兩白芷三錢水煎服以鵝翎探喉必盡吐而愈如已入腸探引不出亦必腹痛下瀉可保生全解豆腐毒門主方驗方蘿蔔湯飲之即解解面毒門主方驗方多食生蘿蔔即解解中白果毒門主方凡中白果毒驟然一聲即暈去儼如驚狀者是白鯗頭煎湯灌三四次即蘇又方麝香一分煎湯服解誤服輕粉門主方誤服輕粉筋骨疼痛川椒去目每日清晨白湯不拘多少吞之救六畜瘟疫法立救丹白硼砂白附子高良薑豬牙皂各一錢雄黃五分火硝二分麝香一分共乳極細末凡牛馬驢三分豬羊只用一分俱吹左鼻孔內再點眼角避風立效癩犬欲死用蜈蚣三條研末入飯與癩犬食之數日立愈解中櫻桃毒門主方驗方甘蔗汁解之
