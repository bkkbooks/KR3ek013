body:
  text: 卷二十二腦背部自腦後肩脊背腹癰疽皆匯於此部中以便檢閲參治腦疽門主論鬼遺方云正腦上一處起為腦癰及腦疽腦鑠並在大椎骨上入髮際生王肯堂曰腦癰皮起易得破穴急破急出膿不害腦疽皮厚難得破穴須急發內毒使破穴方可腦鑠一處初起如橫木掘上起頂門下止大椎發腫如火燒其色青黑如靴皮大硬不見膿即損外皮如犬咬去肉之迹難愈準繩靈樞經云陽氣大發消腦溜項名曰腦爍其色不樂腦項如刺以針煩心者死不可治薛立齋曰腦屬足太陽膀胱經積熱或濕毒上湧或陰虛火熾或腎水虧損陰精消涸始成疽也陳遠公曰有生疽於頭頂者始名腦疽若對口偏對口俱非真腦疽也此疽九死一生大約生此疽者皆腎火沸騰也腦為髓海通於腎腎無火則髓不能化精腎多火髓亦不能化精不但不化精而隨火升降且化為毒以生癰疽矣蓋腎之化精必得腦中之氣以相化若腦中無非腎火勢必氣化為火火性炎上不及下降即於腦中髓海自發其毒較之腦氣不流而為毒者更甚故往往有更變形容改換聲音瘡形紫黑煩躁口乾甚至腦骨俱腐片片脫下狼狽之狀不可言語形容者又何以救之耶此證須問飲食若何倘飲食知味即可用藥名曰五聖丹金銀花八兩玄參麥冬各三兩黃耆四兩人參二兩水煎服四劑漸愈改用十全大補湯重四兩服四劑又改用八味地黃湯恣其酣飲自可痊愈矣此救九死一生之法然舍此實無第二法也此疽得於房術者居多興陽澀精俱是丹石燥烈之品霸阻精道日積月纍真陰枯爍髓竭火發遂至潰頂而不可救人又何苦博女子之歡喪千金之命耶冰鑑竇漢卿曰腦疽若色黯不潰或潰而不斂乃陰精消涸名曰腦爍為不治全書髮際疽門主論王肯堂曰髮際瘡初起如粟米頭白肉赤熱痛如錐刺婦人患此者多丈夫患此者少始因風濕上攻或因風熱上壅若如芡實漫腫寒熱或痛或癢者是髮際疽也準繩心法曰此疽生項後髮際形如黍豆痛如錐刺癢如火燎破津膿水亦有浸淫發內者此由內郁濕熱外兼受風相搏而成焮腫高腫者易治平塌漫腫毒流肩背未膿先腐者難治十四日得膿為吉後腦發門主論申鬥垣曰玉枕疽即後腦發乃足太陽兼督脈陽維脈所主多血少氣在玉枕二穴風府穴端啓玄陳實功曰玉枕疽生於腦後枕骨中堅而難潰痛引肩項鼻塞氣粗此足太陽膀胱濕熱凝滯而成痛癢不一正宗頭後蜂窩疽門主論申鬥垣曰蜂窩疽乃熱毒結成形如蜂窩中多碎孔多生頭後焮痛紅腫者可治疾發者難治毒流兩肩不可救矣啓玄胡公弼曰此證與蜂窩發背不同與對口同治青囊夭疽鋭毒門主論左名夭疽右名鋭毒生於耳後一寸三分陷中致命之處陳實功曰夭疽鋭毒生於耳後一寸三分致病之處左為夭疽夭者妖也妖變之物屬於肝木右為鋭毒鋭者利也鋒利之器屬於肺金二者皆起於積想在心謀慮不決以致火旺而又郁鬱而又旺誠為險惡之候故形多堅硬頭多隱伏未潰先黑未膿先腐臭穢易生元氣易敗凡得此者毒多不得外發後必內攻而死初起生於隱微令人多不知覺及其知覺毒已入內矣倘紅活高腫易於膿腐者無妨正宗汪省之曰夭疽鋭毒又名痼發又名耳後發理例胡公弼曰耳後鋭毒乃心腎二經受毒若不急治恐熱氣壅心毒攻喉下必致傷命青囊耳下石疽門主論馮魯瞻曰耳下石疽者不膿不疼是也大宜養肝血滋腎水溫補可化如少年脈實者少佐以清肝然不可輕用行氣破血之藥錦囊汪省之曰石疽多生耳項理例竇漢卿曰石疽與石癰同惟石疽深寒客於經絡血氣結聚不散隱於皮內堅腫按之如石此毒若連頸項之節內先腐爛方出皮膚如膿出頸項者即死初起宜艾火灸三四十壯發於額面者不可灸也又曰商陸搗敷石疽最效項門癰門主論汪省之曰項門癰乃陰陽不調氣熱壅上結在風府之傍聚而成毒傷於腦後此惡候也治同癰疽法理例項上肉龜瘡門主論心法曰肉龜瘡即胖人項後髮際疽蓋胖人項後髮際肉厚而多折紋其發反刺瘡內因循日久不瘥又兼外襲風寒凝結形如臥瓜破爛津水時破時斂俗名謂之肉龜經年不愈亦無傷害項後生疙瘩門主方項後生疙瘩肉色不變不論大小年深日久者生山藥去皮一塊萆麻仁十粒搗爛攤帛上貼之奇驗失榮證門主論陳實功曰失榮證得之於先得後失始富終貧亦有雖居富貴其心或因六欲不遂損傷中氣鬱火相凝隧痰失道停結而成其患多生肩之上初起微腫皮色不變日久漸大堅硬如石推之不移按之不動半載一年方能作痛氣血日衰形容瘦削破爛紫斑滲流血水或腫泛如蓮穢氣熏蒸晝夜不歇平生疙瘩愈久愈大越潰越堅犯此俱為不治當以和榮散堅丸飛龍阿魏化堅膏治之雖不能愈誠緩命之金丹也治此證與乳岩相似正宗失榮證門主方和營散堅丸正宗失榮證堅硬如石不熱不紅漸腫漸大者服人參當歸身白朮白茯神香附廣橘紅熟地各二兩天南星貝母柏子仁遠志牡丹皮酸棗仁各一兩角沉蘆薈各八錢龍齒一對煅如無龍齒以鹿角尖二兩煅代之硃砂六錢乳細為衣上為末煉蜜丸桐子大每服八十丸食後用合歡樹根皮煎湯送下患者若改往從新淡薄甘命其中有得愈者十中一二否則難脫然也飛龍阿魏化堅膏正宗治失榮證及癭瘤乳岩瘰癧結毒初起堅硬如石皮色不紅日久漸大或疼或不疼但未破者俱用此貼用蟾酥丸藥末一料加金頭蜈蚣五條炙黃去頭足研末同入熬就乾坤一氣膏二十四兩化開攪極均重湯內頓化紅緞攤貼半月一換輕者漸消重者亦可停止常貼保後無虞矣天柱疽門主論王肯堂曰天柱疽生天柱骨上極癢入骨噁心吐逆肩背拘急急用隔蒜灸癢止為度灸而有泡者吉無泡者凶服發汗劑得汗可治無汗難治若潰後神昏嘔噦噁心血不止者死準繩夭壽疽門主論申鬥垣曰夭壽疽其狀大而紫黑生於項背是三陰三陽經脈交會之處故毒易於內攻若不早治致熱毒入於淵液膽經穴名恐傷肝肺旬日之間必死初起不論陰陽寒熱當以隔蒜或豆豉餅灸之治同癰疽法啓玄對口門主論申鬥垣曰對口生於風府啞門穴風府一名舌本入項髮際一寸腦戶後一寸五分項大筋內宛宛中啞門在風府後五分入髮際五分入系舌本陽維之會仰頭取之對口有正有偏毒流於肩則肩腫毒流於背則背腫汪省之曰偏對口又名髮際發理例陳遠公曰對口初生小瘡先癢後疼隨至潰爛人以為至凶之癰也不知生正對口者反輕而生於偏傍者尤重蓋頸項之上乃腎督之部位也其地屬陰所生多是陰疽非陽癰也陽證必高突色紅腫發亮疼痛呼號若陰疽色必黑黯疼亦不甚身困欲臥沉重呻吟無力瘡口不突或現無數小瘡世人不知何處覓頭然陰陽二證皆可內消何可令其皮破腫潰而後治之乎惟內消之法不必分解陰陽但既破潰膿設陰陽不審漫投藥餌則禍生傾刻也內消用三星湯金銀花二兩蒲公英一兩生甘草三錢水煎二服全消陽證已破者亦以此方治之三服必膿盡肉生若陰證大潰者改用七聖湯人參黃耆當歸白朮各一兩金銀花二兩水煎一服血止二劑肉生三劑口小四劑皮合又二劑痊愈冰鑑此方治各部癰疽低陷不收口者神效不止治對口陰毒而已也總以陽證可以涼瀉陰證必須溫補故耳陳實功曰對口又名腦疽生於項後而對前口者是也正對口是督脈所主督脈起於下而貫脊行於上故毒氣得之反能衝突高腫使毒氣不致下流低陷乃能外發故多易治偏對口乃太陽所司太陽膀胱主司寒水性質多沉起於巔頂貫項兩旁順行而下與瘡毒交會下流故瘡多平塌難治之證以十五日內得膿為吉正宗馮魯瞻曰腎消亦有腦疽背癰者蓋腎主骨腦者髓之海背者太陽經寒水所過之地水涸海竭陰火上炎安得不發而為癰疽也其瘡甚而不潰或赤水者甚則或黑或紫火極似水之象乃腎水已竭不治若峻補其陰能食便調神安無別惡證或可救也薛立齋曰腦疽俗名對口乃濕熱交蒸而成從外感受者輕從五臟蘊結內發於外者重項後雖屬於督脈又乃太陽膀胱寒水司行之道從外感得者多生正穴氣稟純陽故多不治而愈正穴屬於督脈起自尾閭穴貫脊而上氣血交會故易於高腫潰膿生肌收口偏穴屬太陽膀胱經太陽膀胱主司寒水起於巔頂分脊而下此處發疽毒壅於此氣血流行隨毒而下瘡形平塌腫不高尖根腳走散兩肩漫腫背如負石難以成膿難潰難斂決不可治又曰五臟蘊結而成者其源有五心緒煩擾煽動不寧以致火旺而沸騰行於項間與寒水交滯而為膿者一也惱怒傷肝項乃三陽統筋之所肝傷則血脈不潮筋無榮養凝結為腫故項緊急強痛不能轉側其患未潰前肉色紫暗堅硬漫腫破流血水木痛無膿者二也思慮傷脾脾氣日損又或膏粱損胃胃汁乾枯以致中脘痞塞氣不運行逆於肉理乃生壅腫其患外皮雖腐內堅不潰口燥舌乾飲食不進根腳走散膿穢色敗者三也憂鬱傷肺肺傷則毛孔閉塞腠理不通氣不舒暢縱橫經絡結而為腫其形瘡多平塌色淡不華皮腐脂流形如湯潑氣粗短促鼻黴鼻掀碌碌生痰殷殷發嗽者四也恣欲傷腎腎傷則真陰之氣敗真陰一敗相火相生此火最能自升自降或動或靜瘡形紫黑脈數乖度煩躁口乾隨飲隨渴者五也故云從內發外者重又曰凡不紅不疼不腫灸亦不痛急用披針當頂點入知痛處出其惡血通其瘡竅隨插蟾酥條直入瘡底用膏蓋好取膿為吉余如癰疽治法托毒對口門主方祕方連翹去心牛蒡子研蟬蛻白芍川芎當歸尾防風赤芍藥各一錢五分甘草節必要真節川貝母去心各三錢蒲公英二錢厚朴一錢桔梗一錢四分乳香去油研沒藥去油研各七分逐味另稱分釐不可增減水二盅煎加童便一盞和服服後出汗二三劑即愈對口初起鮮烏魚皮貼瘡上干則以火酒掃之日換五次又方豬首眼瞪中肉取下兩塊盛碗內用木箸搗極爛如糊敷四圍中留豆大一孔透氣至重敷二次即消又方山藥同獨核肥皂搗敷又方蝣蜒蟲同霜梅搗敷又方上好心紅三錢蝣蜒十條搗膏視毒大小貼之未成即消已成即出膿立時見效對口背癰仙方活鯽魚一尾去鱗腸頭垢五錢共搗爛加蜜半杯攪勻從外圍入裡面留一孔出毒氣二次全消即時止痛對口癤初起桃葉尖九個搗爛摻上又方抱小雞的母雞熱屎塗消又方豬膽剖汁碗盛塗完即愈男子用雄豬膽女用母豬膽又方天茄即白牽牛葉帶莖子採來同生薑三片搗敷早晚一換三日全愈又方甘蔗渣焙乾白狗屎焙燥研末和勻用竹管將稀絹蒙一頭入藥篩膏藥上貼之雖垂危亦愈對口薺菜同醋搗爛敷立消百脈疽門主論鬼遺方云百脈疽腫起環圍頸項疼痛身體大熱不敢動止悁悁不能食此有大畏恐駭上氣咳嗽其發引耳不可以腫十五日可刺導引不導引見血八十日必死準繩肩癰門主論陳實功曰肩毒左肩為癰屬肝右肩為疽屬肺正宗胡公弼曰發肩乃腎與膀胱受證氣血凝滯不得流行結成癰疽得膿為吉青囊肩疽門主論王肯堂曰肩疽此處乃手足三陽交會之所由風熱鬱結所致或因負重損傷而作準繩靈樞云發於肩及臑名曰疪癰其狀赤黑急治之令人汗出至足不害五臟癰發四五日逆𤋲之鬼遺方云丁疽發兩肩惡血留結內外榮衛不通發成疔疽五日腫大令人口噤寒戰十二日可刺不治二十日死陳氏曰干疽腫發起兩肩及兩大臂連胛骨二七日痛不息亦不可動五十日身熱不赤六十日可刺刺之無血者死薛立齋曰肩疽生於肩骨之上乃肝脾二經積熱毒上衝肩井始生多不知覺惟肩骨中痠痛竟有六七個月方現形影既潰失治五六載不能收功甚至肩井骨露則危矣初起宜用艾灸心法曰肩中疽生肩正中左右相同屬三焦膽二經一名疪癰又曰肩風毒生於肩稍臑上骨尖處屬大腸肩髃穴由邪風深襲骨縫與濕稽留化熱而成又曰干疽生於肩前廉左右皆同屬大腸經一名疔疽過肩疽門主論王肯堂曰過肩疽又名筋疽生肩後夾脊兩邊腫硬痛疼寒熱似瘧但初起無頭急用灸法鬼遺方云筋疽髮夾脊兩邊大筋上其色蒼八日可刺有癰在肥腸中九十日死心法曰過肩疽生在肩後廉左右皆同總由濕熱風邪遏鬱而成亦有負重瘀血凝結而成肩井毒門主論申鬥垣曰肩井毒又名氣癰其穴在肩上骨膠動處陷中是也乃怒氣相干氣血凝滯而成初起必用鐵箍散圍住根腳否則毒流肩脊不可治矣啓玄擔肩門主論申鬥垣曰此乃肩挑負重壓傷肩頭氣血凝滯而成或因枕臥冷處致令隧道不通蓄血而成破則流膿出血此外因也治當早灸始能消散啓玄又有匾擔因婦女在上跨過即害擔肩擔肩門主方驗方剪貓頭上毛用不語唾黏之上中下三發背門主論王肯堂曰上中下三發背俱在脊中屬督脈上發者傷於肺發於天柱骨下中發者傷於肝為對心發下發者傷於腎為對臍發皆由積熱怒氣所致初如粟米或麻或癢或拘急或不痛或大痛初覺便宜隔蒜灸之或汗或下或托量其虛實施治準繩又曰腦發背發在上者不可用木通恐導虛下元故也老弱者尤宜戒然三發背總要之地與他處不同尤所當謹微有痛癢宜速治之鬼遺方云人生最可憂者發背也其種有五一曰陽毒發背因風而有或患熱毒消渴或先患傷寒余有陽毒未解蓄積起於背脊膂之間不問椎數但從兩夾脊起止腰上滿背焮腫熱如炊之狀赤紫或紅如焰膿毒難成成後不止止後痛不除驀忽數日之間復平如舊將謂腫消此是內攻肉陷不可療矣二曰陰毒發背是氣冷而作初如黍米粒起情緒不快愔愔而痛直應前心心內忪怔頭目昏重寒熱如瘧五七日後始發引攻腫開闊難收內積有膿深沉遲緩未透宜急以補氣湯藥內托外以抽膿藥貼之宜急見膿無膿即平愈無期三曰有人多服金石燒煉之藥毒惡流滯成發背者初起如丹疹之狀漐漐漸開如湯火瘡面色如朱心膈煩躁多渴嗜冷其瘡難起起即驚人猶勝於陰陽兩毒者緣此有解金石藥毒湯散治其內也賴有根底分明亦須急療方安四曰人有患酒食毒發背者此疾非近得之乃臟腑久積乘飢乘困食之便睡或多食酒肉冷熱黏滯肥鮮熾膩未下胸膈房室不禁恣意當風取快脾臟氣虛不能受乘發毒攻背兩夾脊不問椎數初起癰頭如小彈子後大如拳堅如石痛遍四肢加之拘急口苦舌乾腹急大小便澀十數日後頭面手足虛腫及臟腑通泄如利內急痛者是其證也乘方腫引急用攻腫發穴潰膿湯藥內實外泄膿水不可放縱遲緩則皮肉腐壞傷骨爛筋漸成膿多因而感邪內敗者死矣五曰人有冒山嵐瘴氣發背毒氣先在臟腑年月浸遠氣血虛損衰弱初起腫色青黑如靴皮頑痹痛深附筋骨徹髓按之如木石引手加深方覺似有痛處至五七日毒氣浮淺腫高色變青白有如拳打之狀寒戰似瘧及有風候頭動口偏手足厥逆眼黑睛小白多而慢此內有邪氣相搏急破出清血三五升有黃膿白汁相和發泄其皮不寬不慢亦急脹痛亦不住直至色退熱痛方愈亦宜急追趕膿與毒氣外出無害初患腫三日內灸者生八日內膿成針烙導引者生未瘥慎勞力者生慎忌食者生慎喜怒者生懼腫猛療者生急療者生不諱發背者生待膿自出不導引者死未內攻而針烙用藥導引者生內攻後導引針烙者死腫焮熱痛方盛已前療者生如過此後已內攻者死膿成後不出不導引但敷藥者死如赤白痢氣急者是已內攻醫療無益必死癰不救十得五生疽不療十全死輕腫怕痛者必死不遇良方者死節候不依法者必死愚執恣意用性逸情者死王肯堂曰有發背癰有發背疽如毒氣勇猛而發如火燎茅易於敗壞初起如黍米粒大兩三日漸赤引腫如手掌面大五七日如碗麵大即易為攻焮熱赤引如火燒之狀浮面漸潰爛闊開內發腫如炊之狀外爛皮肉如削去紫瘀膿汁多而腫不退疼亦不止發渴發逆飲食不下嘔吐氣急浮淺開闊者尤宜發膿托毒湯藥服之必愈陽證實也其間有隻如盞面大者此非不大緣為毒氣深沉內虛毒氣近膜也此必內攻近入臟腑卻外入四肢先攻頭面虛浮後攻手面次攻兩足面腫名曰毒氣散入四肢其人聲嘶氣脫眼睛黑小十指腫黑乾焦不治陰證虛也始發一粒如麻豆大身體便發熱生疽處腫大熱痛此為發於外雖大如盆治之百可百活陽證實也或身體不熱自覺倦怠生疽處亦不熱數日後漸大不腫不痛低陷而壞爛此為發於內雖神仙無如之何準繩陳遠公曰背心間先發紅瘰後漸紅腫此發背之兆也最為可畏古人云外大如豆內大如拳外大如拳內大如盤言外小而內實大也然癰疽大毒必辨其陰陽有先陰變陽者有先陽變陰者有前後俱陽者有前後俱陰者陽證雖重而實輕陰證雖輕而實重先陰變陽者生先陽變陰者死何以知之陽證形高大而腫起陰證形底平而陷下陽證色紅陰證色帶黑陽證初起必痛陰證初起必癢陽證潰爛多膿陰證潰爛多血陽證收口身必輕爽陰證收口身必沉重至於辨陰辨陽以此消息必不差也凡紅腫高突乃陽證也乘其肉腫初發肉猶未化急以散毒之藥治之可隨手愈也發背至橫決者皆因循失治以至破敗而不可救陽變陰者多矣救癰如救火宜速撲滅否則延燒屋舍不盡不止切勿見為陽證輕緩治也急消湯金銀花二兩紫花地丁一兩茜草甘菊花桔梗天花粉生甘草各三錢貝母二錢黃柏一錢水煎服三劑全消不四劑也冰鑑此方消陽毒初起極神既無迅烈之患大有和解之妙人不知法則謂陽毒易於祛除浪用虎狼之味毒雖消散而真氣耗損往往變成他證乃醫者成之也何若王霸並施有益無損為妙又曰背心發瘰癢甚已而背如山重隱隱發紅暈如盤大此陰癰初起之形最為可畏非前證可比乃一生罪孽鬼祟憑身必胡言譫語將平日欺心之事盡情宣布此證本不可救然人心善惡成於一念苟能悔艾而刀圭無術亦見吾道之無奇矣夫陽證有救之條陰證豈無可生之理惟在治之得法耳陰證雖成於鬼祟之纏亦必正氣大虛邪得入之也故治法必用補氣血之藥佐以散郁解毒之品則正旺邪自散矣變陽湯人參黃耆各二兩金銀花八兩白芍一兩天花粉生甘草各五錢荊芥炒黑三錢柴胡二錢附子一錢水十餘碗煎汁二碗先服一半後又服一碗陰必變陽而作痛又一劑痛消再一劑痊愈世人不見皮破血出斷不可信然先用此方以治發背無論病人不肯服即醫士亦不肯用往往決裂潰爛瘡口至如碗大而不可收始悔參耆之遲用矣所以論證而多戒辭勸人早服此方以免喪命蓋陽毒可用攻毒陰毒必須補正以參耆補氣氣旺則幽陰之毒不敢入心肺之間金銀花性補善解陰毒得參耆而功益大然非附子不能直入陰毒之中而又出於陰毒之外毒深者害深又加生甘草以解餘毒然毒結於背者氣血之壅也壅極者郁之極也故加柴荊粉芍消痰通滯開鬱引經自然氣宣血活痰散毒消也又曰背癰潰爛洞見肺腑瘡口黑陷身不能臥口渴思飲人以為陽證敗壞孰知陰虛不能變陽乎夫癰雖有陰陽之分及至潰膿之後宜補內而不宜消則陰陽之證一也潰爛而見肺腑足見失補之故使毒過於延燒將好肉化為瘀肉耳肉瘀必腐腐則洞見底裡此證九死一生之兆倘胃氣健能食者猶可治若見食則惡者必無生理然能受參耆峻補者尚可生也轉敗湯人參熟地各二兩生黃耆當歸山萸各一兩白朮金銀花各四兩麥冬二兩遠志三錢肉桂茯苓各二錢北五味一錢水煎一服胃氣大開者即可轉敗為吉倘服後少能健飯亦在可救若杳無應驗者胃氣將絶無救矣此方補氣血更補肺腎之陰蓋陰生則陽長陰陽生長則有根易於接續後以銀花解餘毒則毒散而血生血生而肉長肉長而皮合倘以解毒為事不補氣血之陰陽則陰毒不能變陽有死而已矣不亦悲哉倘服之而飽悶少頃漸安者尚有生機不可棄置又曰背癰將愈瘡口不收治無一效人以為餘毒未盡也孰知陰虛不能濟陽乎夫癰疽初起則毒盛變膿則毒衰膿盡則毒化矣瘡口不收乃陰之虛非毒之旺人不知治法以敗毒攻之是重虛其虛欲肌肉之長得乎或亦有補而不效者必系只用陽分之品以補陽不用陰分之品以補陰也蓋獨陰不長獨陽不生今膿血已盡陰必大虛只補陽則陽旺陰虛陰不能交於陽矣雖陽有濟陰之心而陰無濟陽之力所以補陽而陰愈虛瘡口愈難合也治必大補其陰使陰精盛滿自能灌注瘡口不必生肌外敷瘡口之肉自生矣生膚散麥冬山萸銀花當歸各一兩熟地二兩人參白朮各五錢肉桂一錢水煎二服肉自內長又二服外口自平又二劑痊愈此方補陰多於補陽使陰勝於陽也然補陽之藥仍是補陰之助以其能入陰中交於陽內也銀花非恃以解餘毒取其能領各味至瘡口之間也又曰背瘡長肉瘡口已平忽開裂流紅人以為瘡口肉未堅也孰知色欲惱怒不謹乎夫癰證最忌色欲次忌惱怒犯惱怒新肉有開裂之虞犯色欲新肉有流水之害然此猶些小瘡癰也其在背癰犯惱怒者不過疾病犯色欲者多致死亡瘡口開裂之處色必變紫黑流血之處肉必變敗壞矣此時必急補氣血切不可仍治其毒蓋前毒未盡必難收口復至敗壞實新肉不堅而自決裂也況發背新愈其精神氣血空虛交合泄精遂變出非常舍補氣血又安求活乎然補氣血必用大劑方能收危亂之功也定變回生湯人參四兩黃耆三兩當歸麥冬白朮銀花各二兩茯苓一兩山萸五錢肉桂三錢北五味二錢水煎二服肉自生矣三劑皮仍合矣平復如故再犯禁忌無不死矣此方難救此方救瘡瘍壞證仙丹不止治發背愈後犯色敗腐也人疑泄精以至決裂宜熟地大補之何故不用因熟地補陰最緩而證犯甚急所以不用熟地多用氣血之藥救其垂危非熟地不可用輕棄之也此方數劑之後正宜減半而多加熟地以為善後計耳又曰夏日生背癰瘡口不起脈大無力發熱作渴自汗盜汗用參耆補劑益加手足逆冷大便不實喘促嘔吐人以為火毒太盛也誰知元氣大虛補不足以濟之乎夫癰分陰陽瘡口不起乃陰證也脈大似乎陽證大而無力非陰而何發熱作渴此水不足以濟火故作渴作熱也即陰證似陽用參耆助陽足以祛陰而返陽矣何以愈補反作逆冷嘔吐此陰寒之氣甚而微陽之品力不能勝耳非加附子之辛熱何能斬關以祛蕩陰邪哉助陽消毒湯人參八兩黃耆一斤當歸白朮各四兩陳皮一兩附子五錢水煎膏二次服諸證退服數劑瘡起乃減半又服數劑而愈此非治癰之法也然以治癰之法輕劑治此鮮不立亡可見治癰不可執也大約陽癰可用消毒化痰而陰癰切不可用消毒化痰之藥今舍癰從證乃治癰變法醫者不可不知也又曰背生癰疽潰膿之後或發熱或惡寒或作痛或膿多或流清水自汗盜汗膿成不潰口爛不收人以為毒氣未盡也誰知五臟虧損血氣大虛之故也凡人氣血壯盛陰陽和平何能生毒惟臟腑內損而毒氣得以內藏久之外泄及至癰疽發出其毒自不留內臟腑原虛又加流膿血則已虛益虛觀其外面瘡口未斂似乎有餘審其內而氣血未生實為不足法當全補不必偏補一臟致有偏勝之虞用十全大補湯為妙以其兼補氣血耳然有不效者非方之不佳乃用之不得法也夫背癰何等之證豈細小之劑所能補哉必大劑始克有濟余酌一方人參當歸各一兩黃耆熟地各二兩白芍白朮茯苓各五錢川芎生甘草各三錢肉桂二錢水煎服一劑有一劑之效也人以此方絶不敗毒如何毒化肉生不知癰疽未潰以化毒為先癰疽已潰以補正為急縱有餘毒未盡不必敗毒也敗毒之味非寒涼即消耗消耗即損人真氣寒涼敗傷人胃氣胃氣傷則穀氣全無真氣損則邪氣反盛何能生肌肉哉此方專助真氣以益胃氣故能收全效且此方不但治背癰已潰凡瘡瘍已潰者皆宜用之惜世人未知也申鬥垣曰上搭中搭下搭皆由酒色過度怒氣相干寒熱壅盛而成膿血稀少謂之裡虛難於醫治啓玄胡公弼曰按足太陽膀胱一經始於睛明攢竹終於通谷至陰凡六十三穴去脊中寸半之間貼脊而行自大杼而下第三椎肺俞五椎心俞七椎肝俞十椎膽俞十一椎脾俞十四椎腎俞生髮背者上發則傷肺中發則傷心與肝名為對心發下發則傷脾與腎名曰對臍發家祕云發背一日生二日大三日爛一七出水一七不遇良醫爛開四圍毒熾甚矣若爛見心透膜犯主神手醫救亦難余以為初起莫妙於灸中間莫妙於熏若有腐而不潰白降紅升提腐去毒俟毒盡肌生之時再行生肌自無鎖口之患青囊汪省之曰凡辨發背令患者以兩手上下摸看搭不著著方是發背若搭的著者上為上搭下為下搭左為左搭右為右搭中為中搭俱以手搭治之若手摸不著則是真正發背必須內外相參上緊醫救方可保其無變也理例陳實功曰心之以上多危險者因屬於五臟故也蓋心肝脾肺四臟皆繫於背惟腎經一臟獨居於下雖居於下其本臟精華津液元氣元神盡行灌溉榮注於上故四臟之火皆賴一臟之水以濟之所謂五臟根本皆繫於背即此之義也況背乃太陽膀胱督脈所主太陽者乃六經之首領督脈者十二經絡之統脈瘡生於背毒犯於此須分陰陽虛實治之正宗又曰發背在心之以下腎俞以上者輕因屬於腑分故曰心之以下多成順蓋其形在下其氣主表其病為癰正宗汪省之曰癌發生於神道靈臺二穴乃督脈膀胱經初起時不作寒熱疼痛紫黑色不破里而先自黑爛二十歲以後房勞積熱所生皮黑者不治理例胡公弼曰對心發蜂窠發蓮子發兩頭尖皆發背之別名以瘡口開張深淺而言也此證最忌香菌燒酒豬羊牛驢等肉前後切忌寒涼之劑以免毒攻內陷青囊上中下三發背門主方發背毒瘡用面調勻做圈圈住瘡根將黃蠟切薄片鋪平瘡內勿使滲漏以炭火炙化變青色乃毒氣出也再如法行之三五次以黃蠟不變色為度即消矣發背滴乳香去油沒藥去油白兒茶銀硃貞定粉黃丹各四兩銅緑三錢上研極細末照瘡大小用夾連四油紙戳孔每張稱藥五錢真麻油調攤四圍用線縫好貼上外用軟絹扎自然止痛化腐生新三日翻轉貼之如對口調膏敷之發背大狗牙炒焦黑研細搽之如神又方不拘男婦頭髮一把入真麻油一斤將發熬化令病人飲之則毒氣漸消不致傷生也對心發門主論陳實功曰對心發生於背徑對前心者是也此乃心火妄動熱極所致心為君主之官豈容毒邪干犯誠乃毒剗君位最易傷人形截督經害非輕淺況心為一身之主宰周身蘊熱流會於此共結為患且此穴背脊多坑固難起發瘡形落陷腫不高尖治當大降心火急疏蘊熱頂用針通隨行拔法務使毒氣內外宣通各從門出庶不內攻方為成守十五日後內無變證得膿為吉如至期變證漸生堅硬漸大不作膿者死在二十二朝前後正宗蓮子蜂窩發門主論王肯堂曰蓮子發即太陰疽生肩胛內痛漸至潰爛屬手太陰肺經積熱所致赤色者可治青黑者不治喘嗽大渴胸滿脈微者死準繩又曰蜂窩髮狀如蜂房十日平塌寒熱痛楚鬼遺方云蜂窩疽發髀背起心俞及心包絡俞若肩髃二十日不穴死十日可刺其色赤黑膿清者可治陳實功曰蓮子蜂窩二發此言其形似而名之也多生於背與心相近與脊中平輕者形長高腫或偏半背重則形斜平塌兩脅俱傷孔似蜂窩突如蓮子形雖可畏常能多險多生羸弱不堪反取常安常穩大規只怕不純陽治法何妨瘡勢急治宜護心護膜謹防毒氣內攻正宗汪省之曰蜂窩者言其頭有五七十不止蓮子者頭不過一二十通背腫者不救理例又曰瘡頭向上發者名曰反證最凶瘡頭向下發者稍順如無膿痰發及串流於肩膊者不治穿膜者不治又有兩頭開發者更凶理例兩頭尖疽門主論申鬥垣曰兩頭尖又名滿天星乃飲食辛熱蘊釀鬱積毒壅所致氣虛相沖因虛成毒故此證形口開而闊上可至肩下可至腰此千無一有之證治與癰疽同法啓玄王肯堂曰兩頭髮又名滿天星又名廣錦背發兩頭小四邊散因積怒蓄熱所致腫高紅闊者生低陷黑暗者死準繩癭瘤發門主論申鬥垣曰癭瘤發發於脊之正中近於大椎穴在第一椎上陷中三陽督脈所發陶道穴在項大椎節下間督脈足太陽經之會俯而取之自得身柱穴在第三椎節下間俯而取之三穴之端俱督脈所絡之處甚利害急早托之此是陽維之海督領百脈若生癰疽乃督脈不能統督之意故凶啓玄體疽發門主論申鬥垣曰體疽發上至肺俞穴在第三椎下各俠脊相去一寸五分下至肝俞穴在第九椎下兩旁各一寸五分出出眺附經左右相同在高骨之旁乃足太陽膀胱經多血少氣八日可刺如不潰二十日死或初發時腫上如椒子者死啓玄王肯堂曰竟體發一名椒眼發背上生疽肉色不變麻木微癢頑如牛領之皮二三尺由盛暑時空腹感觸穢氣及憤怒積鬱所致七日內未成膿宜隔蒜灸灸而起發神清脈和者可治灸而不起腹脹神昏脈微或促或代者死服汗劑得汗者生無汗者死服補劑紅潤起發知痛者生膨脹不食乾枯黑陷者死準繩陰陽疽門主論王肯堂曰陰陽疽背上麻木不常時腫時塌忽軟忽硬乍寒乍熱由七情內乖陰陽不和也此證必大渴神清脈定者可治昏迷躁亂飲食不進者死十日得黃白膿者可治數日無膿者死準繩特疽門主論王肯堂曰特疽發肺俞及肝俞不穴二十日死八日可刺其色紅赤內隱起如椒子者死準繩陰陽二氣疽門主論王肯堂曰陰陽二氣疽廣闊滿背或大或小不常腫熱脹大十日可刺導引出膿不拘深淺多少發渴體倦十日外不見膿不治準繩黃瓜疽門主論王肯堂曰黃瓜疽一名肉龜生背側高二寸長尺許狀如黃瓜肉色不變疼痛引心四肢麻木是也此證多不可治準繩丹毒發疽門主論王肯堂曰丹毒發疽背上細瘰無數浸淫一二尺如湯火傷煩躁多渴因服丹石剛劑所致紅潤者生紫黯者死惡證少者黃連消毒散國老膏惡證多神昏脈躁膨脹嘔噦者死準繩酒毒發門主論王肯堂曰酒毒發背當心而痛麻木不常纍纍如彈如拳堅硬如石痛徹五內遍身拘急由飢飽勞傷炙煿厚味所致神昏脈亂大渴狂言有妨飲食者死二便閉結者死有因寒變而內陷者用托裡溫中湯準繩上搭門主論王肯堂曰肩後疽又名鼠疽即上搭也生肩膊後骨上乃怒氣積鬱所致屬太陽兼少陽經宜灸準繩汪省之曰凡辨手搭腰搭發背三證務令患者以手搭肩上搭著者左為左搭右為右搭頭多如蜂窠者易治向下手搭著者謂之腰搭惟兩手上下俱搭不著者謂之發背理例陳實功曰肩下脊上癰疽者乃脾經蘊積膏粱熱毒所致腫形根腳不過兩肩者為順如腫平堅硬漸大漸開攻注兩肩胸項腫而不定者危正宗心法曰上搭手生於脊骨第三節旁中搭手生於脊骨第四節旁開三寸膏肓穴名青龍疽下搭手生脊骨第十四節腰窩內旁開三寸肓門穴上搭門主方消上搭方單方集驗全蠍三個核桃肉三個共研細熱酒沖服一二次自消中搭疽門主論王肯堂曰中搭即龍疽生第九椎兩旁忽腫痛而無頭寒熱大作屬太陽經由七情不和憤怒積熱所致色赤起發潤澤者可治色黑低陷噁心眩暈大便滑泄小便如淋譫語者死準繩左右搭串門主論王肯堂曰左右搭串者左肩骨上生疽串於右者可治右肩骨上生疽串於左者難治古有此説愚謂不然攻注左右者氣血不調陰陽交錯也七惡證少何慮難痊元氣虛憊治之何補哉準繩陳實功曰左搭屬肝右搭屬肺俱生於左右肩骨移動之處為可治如左搭串右右搭串左俱為難治正宗申鬥垣曰兩肩左右齊發名雙串肩搭疽啓玄瘭疽發門主論申鬥垣曰瘭疽發發於背之兩旁屬足太陽膀胱經多血少氣發於脊中屬督脈經初起如豆如梅李黑白色不定慘痛應心四畔如牛唇四十歲以前可治已衰弱者難痊啓玄禽疽門主論鬼遺方云禽疽始發者如疹數十處如拳打之狀發寒齒噤如此者十四日死十日可刺導引膿出即愈王肯堂曰禽疽背忽麻木拘急不痛十數處肉紫色如拳觸狀七日內寒熱口噤者死得汗可治無汗不治神昏脈躁或微或代者死漫腫不潰宜服臺閣紫微丸準繩九疽門主論汪省之曰九疽一生即有九處當驗人之虛實毒之淺深膿之稀稠遺之遲速以決死生如二三處者則輕理例小兒龜背門主論龜背者多因未滿半周強令坐早失護背脊以致客風吹撲傳入於髓寒則體痿故變成斯證又謂五臟皆繫於背凡五臟受過而成五疳久則蟲蝕脊髓背骨似折高露如龜矣書曰腮腫疳還盛脊高力已衰腎無生氣骨無堅長故為惡候也小兒龜背門主方孫真人千金方紅藥首烏研末龜尿調敷脊骨漸漸自平脊縫出蝨門主論岐天師曰如人背脊裂開一縫出蝨千餘此乃腎中有風得陽氣吹之不覺破裂而蝨出治以活水止風丹裂縫生蝨盡死祕録脊縫出蝨門主方活水止風丹岐天師熟地山萸肉各三兩杜仲一兩白朮五錢防己一錢豨蘞草三錢白水煎脊縫生蝨張仲景萆麻子三粒研成如膏同紅棗三枚搗成丸如彈子大火燒之薰衣上則蝨死而縫合蓋萆麻子能殺蝨而去風風去蝨出則脊自合縫矣肉龜瘡門主論汪省之曰肉龜瘡乃心腎二經受證生於胸背兩脅間有頭有尾且有四足皮色不紅突起二寸或有頭向上者毒攻心口或有毒向下者足如刀割或左或右其痛難忍急用神針針住頭尾四足上用艾灸二十八壯龜瘡即死不可去針內服荊防敗毒散加天花粉乳香沒藥然後再瀉其針理例鼠攢瘡門主論汪省之曰鼠攢瘡又名遊走血脾癰生於脅背之間此乃自幼受其胎毒或因缺乳多食麵果熱毒之物臟腑嬌脆不能克化久作寒熱骨蒸內熱日夜不寧因此毒發生於皮膜之外儼如流注一般狀似鼠形大小不一七八日有膿可治無膿難於收斂理例王肯堂曰老鼠攢一名遊走血脾癰生於背脅之間三兩處發疽由怒氣積熱所致多發於足少陽足厥陰部位七日不見膿及黑陷躁亂者死準繩心法曰串疽生於背脅之間初發一處挨次發出二三處形雖不同而色仍同也潰後多相串通故又名老鼠攢又名遊走血脾癰淵疽門主論陳實功曰淵疽發於脅下初起不紅堅硬久則破潰有聲如嬰兒啼狀膏蓋無聲去膏仍有異哉難治真不能也正宗心法淵疽生於脅下三寸憂恚太過以致肝膽兩傷而成初起堅硬腫而不紅日久方潰得稠白膿者順如豆漿者險瘡口有似乎兒啼此屬內膜透也可於陽陵穴在膝臏骨外廉下一寸陷中蹲灸二七壯其聲即止將潰未潰宜坐取之即得多服護膜散可免透膜淵疽門主方護膜散白蠟白芨各等分研末輕者用一錢微重用二錢重者用三錢或酒或米湯調下石疽門主論王肯堂曰石疽生腰胯之間肉色不變堅硬如石經月不潰者此係屬少陽陽明二經積熱所致邪毒固結元氣不足故不能起發若黑陷不起麻木不痛嘔噦不食精神昏亂脈散或代者死準繩汪省之曰石疽乃寒氣所作深伏於骨髓之間腿膝有腫與皮肉相似苦疼而堅硬如石故謂之石疽治宜溫補理例腎俞發門主論王肯堂曰腎俞發即腰疽又名連腎發又名下搭生十四椎傍腰腎之間由房勞太過致傷腎水令人口乾寒熱大作百節俱痛治之稍緩潰爛透膜者死若見咳嗽嘔噦腰間似折不能俯仰飲食不納者死潰而膿水清稀腐爛腥穢迷悶不醒厥逆者不治準繩陳遠公曰有腰眼間忽生疽毒疼痛呼叫似乎陽證然腰腎乃至陰之地未可作陽證治之也此證雖本於忍精欲泄不泄以成此毒似乎純是陰分之過但腰雖不遠於內腎火發而毒成則陰中有陽未可純以陰證治之也必陰陽並治以化毒則毒去如掃倘不補陰竟治其毒則腎益傷而毒難速化即補陰而不補陽則陰無以生毒且深藏腎宮不得外泄矣兩治散白朮杜仲當歸各一兩金銀花三兩豨蘞草三錢防己一錢水煎一服痛輕二劑痛止三劑痊愈冰鑑此方以杜仲白朮利其腰臍氣通毒自難結又得銀花當歸補中有散而防己豨蘞直入腎宮祛濕熱之毒陰陽無偏勝之虞邪正有解紛之妙自然二三劑成功也申鬥垣曰腰疽乃足太陽膀胱經多血少氣生於腰間腎俞胃倉二穴托之得膿則安若上赤下黑二十日不潰或青黑色無膿出血水者死啓玄又曰腰癰發於軟肋下近腰乃帶脈五樞維道穴是少陽經多氣少血寒熱焮腫作痛余曾治一人膿出一桶余內託大補而愈竇漢卿曰此證切忌怒氣行房犯之不治又曰治宜補腎加知母黃柏沒藥廣膠胡公弼曰此發生於兩腰陷肉之間或生兩腰中間在大杼下第十二椎是也此乃欲火消陰十五日前後必死若瘡形紅活高腫有膿尚有可生機括青囊陳實功曰腎俞發生於兩腰內腎陷肉之間或正中亦發凡生於此最為險候蓋腎為性命根本藏精藏氣藏神又乃受命先天育女育男育壽此必房勞過度氣竭精傷欲火銷陰外陽煽動以致真陰從此而耗既耗之後其臟必虛所以諸火諸邪乘虛而入如本臟稍有真陰制火瘡形自可高腫紅活為膿治以人參養榮湯加山萸肉北五味子知母黃柏及加減八味丸以救其源若瘡形紫黑乾枯堅硬不作膿者為真陰內敗再無可生之理死在十五日前後正宗對臍發疽門主論王肯堂曰對臍發發於背下命門穴與臍相對故名乃督脈經毒發有膿者生如出血水譫語發渴者死準繩竇漢卿曰對臍毒即沖疽又名歷腎生於腰腎間也若內腎疼變為渴者萬無一生全書環跳疽門主論心法曰環跳疽生胯骨節間之環跳穴所以腰難曲伸漫腫隱痛此證皆由風濕寒邪凝結而成屬足少陽膽經初起宜服黃狗下頦散更刺委中穴出黑血其腿即能轉動矣環跳疽門主方黃狗下頦散黃狗下頦連舌皮毛劈下入罐內鹽泥封固鐵盞蓋口煅一炷香覺煙青即止務宜存性取出黑如炭為度若帶白色其性已過則無用矣用時研細取狗下頦宜用屠家已殺之犬若生取特殺一犬恐傷德反招不祥豌豆粉白蘞各等分三味和勻每服五錢溫黃酒空心調服出臭汗及熟睡為效外將此藥用香油調敷患處陰毒門主論陳實功曰陰毒者乃純陰無陽被天時寒冷肅殺之氣侵入肌膚流入骨髓以致氣不能升血不能行凝滯經絡疼痛切骨初起不紅不腫不熱朝輕暮重久則作腫漸紅爛斑黑靨臭水淋漓穢氣熏蒸腐爛漸開終久必死正宗無名腫毒門主論王肯堂曰無名腫毒者不拘於頭面手足胸腹等處焮赤腫硬結核疼痛又名腫瘍又名虛瘍但腫無頭無面者俱是也腫熱勢盛者以稜針刺去惡血切不可以火針烙之若暴發赤腫切不可以針破之只宜以洗腫方法淋洗準繩又曰紫遊風紫遊虛瘍均屬無名腫毒陳遠公曰頭面無端忽生小瘡癢甚第二日頭重如山第三日面目青紫此至危之證苟不速治數日內一身發青黑而死若青不至心胸者尚可救因此人素服熱藥熱極而變為毒也人入房久戰雖氣主之而實火主之也氣旺而非火濟之則不足鼓其興趣博久戰之歡補氣之藥斷不能捨參耆而求異味世人貪歡者多而吝惜者不少用熱藥助火非多加人參不足以駕馭其猛烈之威無如人參力難多備方士不得已遷就世人之心乃少減參則功力薄多加熱藥以壯火於是金石火煅之藥紛然雜投謂不如此不足以助命門之火也夫命門之火腎火也非真陰之水不養不同於脾胃之火可以外水解之也且腎水既旺則外勢剛強多御女戎亦復何傷無奈淫心無盡火熾則水乾火沸則水涸水不足以制火熱毒結於腸胃況戰久必大泄精精泄過多火自更旺未免再戰或歸咎前藥太少更多服以助其勢不知藥益多而火益烈戰益頻而水益燥乎久之水涸火炎陽易舉而不能久戰即有忍精勉強而鬥精不化而變為毒結於陰之部位則成癰結於陽之部位則成毒頭上陽部位也較陰部尤為可畏非多用化毒之藥安能起死回生哉回生至聖丹金銀花八兩元參蒲公英各三兩川芎一兩生甘草五錢天花粉三錢水煎服一劑頭輕青紫色淡又一劑全愈此方化毒而不耗氣敗毒而不損精所以奇也此毒原系水虧之極而瀉毒之味皆損於陰陽惟銀花攻補兼妙故以之為君必多用而力始大加元參去火甘草瀉毒公英清熱花粉消痰川芎散結自然相助成功也石室祕録奇病門中亦有此證治法宜參看辨證冰鑑又曰腫毒生於思慮不到之處其勢凶惡有生死之關皆以無名腫毒名之不必分上中下也前條只言頭上而身之左右前後四肢尚未言也治之得法可以通治也大凡上中下生腫毒者多起於淫欲無度加之氣惱憂鬱火乘其隙處蘊藏結毒故一發而不可救所以此證盡屬陰證而無陽證也治法似用解陰毒之藥矣然解陰毒之藥大半消爍真陰本因虛而結毒復解毒而虧陰安有濟乎余得異傳於補陰之中以行散郁之法佐以解毒之品少助行經之味是以多收其功不敢祕傳書之於册以救萬世之人也黑虎湯元參一斤柴胡三錢生甘草一兩煎湯十碗生頭面者加川芎二兩附子二兩再煎汁取三碗分二日服完未破者即消已破者生肌自愈不必二劑生身左右前後者加當歸二兩甘菊花一兩附子三分如前服生手足四肢者加白朮二兩茯苓一兩附子五分亦如前服無不收功按元參退浮遊之火得甘草之助解其迅速之威得柴胡之佐能舒抑鬱之氣又有引經之味引至毒處大為祛除用至一斤力量更大又是補中兼散則解陰毒不傷陰氣所以建功人勿見藥之重不敢輕試負余殷殷濟世之心也若些小之證與非陰證不必用此重劑不可不知也又曰有四肢間或頭面上忽然生疽頭黑皮紫疼痛異常此陽證之毒也亦能殺人此證其勢甚驟不急散毒則養成大橫世人每以生疽甚小不似生癰之大往往不以為意誰知變成大毒疽與癰實有不同癰潰於內而疽腫於外也潰內者難外治腫外者易內消雖癰疽之毒盡由內而發外宜皆治內而外愈而疽尤宜內治也消疽散生地地榆連翹天花粉各三錢忍冬藤夏枯草當歸各一兩白芷生甘草各二錢水煎服未潰者二劑即消已潰者四劑痊愈此方通治惡疽無不神效蓋補血以散毒則血活而毒難留涼血以清火則血寒而火易散疽多陽證所以治無不宜也無名腫毒門主方太乙丹敬恕堂江敷一切無名腫毒頂好藤黃五十兩赤小豆天南星各二十兩川五倍子一百兩炒微黃當門子五兩上研極細末用白芨二十兩打糊和搗成錠用醋磨敷自消升麻膏貼疔瘡頑瘡癰疽瘰癧痰核未成自消已潰自斂升麻二十兩真麻油五斤浸一宿煎枯去渣慢火熬至滴水不散入飛淨黃丹二十四兩收成膏一氣丹胡學海一切癰疽對口發背無名大毒斑蝥去頭足翅糯米拌炒五錢乳香去油沒藥去油各三錢雄黃二錢血竭一錢麝香一錢五分冰片七分五釐元胡索元參各五分共杵極細末量瘡大小施用以膏貼上初起立消已成易潰已潰易斂較之紅升丹其功更捷且紅升丹不利對口惟此最穩久不收口爐甘石銀罐內煅水淬七次研細搽之久不收口犬頭骨煅貓頭骨煅研細搽之即斂敷無名毒小粉炒黃研用不經鐵器握死雞將雞撕開取雞心肝䏶不用腸搗爛敷上一伏時必效五虎丹雄黃菖蒲艾葉尖硃砂不拘多少蜈蚣一條五月五日午時配合研細敷搽即消消腫毒極肥皂角子陰陽瓦焙研酒調服出汗即消又方榆樹南行根條洗淨加鹽少許入糖同搗敷即散
